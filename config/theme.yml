# Visual theme configuration.
# Colors, typography, spacing for the generated artifacts.
# Used by build.py → render.py → CSS generation.

colors:
  # Base
  bg_page: "#1a1612"
  bg_card: "#2a2520"
  bg_subcard: "#1a1612"
  
  # Text
  text_primary: "#f0ece4"
  text_secondary: "#aaa"
  text_muted: "#888"
  text_dim: "#666"
  
  # Borders
  border: "#444"
  border_subtle: "#3a3530"
  border_light: "#555"
  
  # Badge colors (metal indicators) — rendered in .gw-head as `.bx` (silver,
  # default) and `.bx.gold`. No fuss currently uses metal: giro/tarif; if
  # added, declare new tokens here and add a matching `.bx.<metal>` rule
  # in scripts/lib/styles.py.
  badge_silver_bg: "#555"
  badge_silver_fg: "#ddd"
  badge_gold_bg: "#5c3d00"
  badge_gold_fg: "#fcd34d"
  
  # Subcat dividers
  subcat_kurant_bg: "#1f2d1a"
  subcat_kurant_border: "#6b8e4e"
  subcat_kurant_fg: "#c4d9a6"
  
  subcat_scheide_bg: "#2d231a"
  subcat_scheide_border: "#c28b4b"
  subcat_scheide_fg: "#e6c590"

  subcat_copper_bg: "#2a1f19"
  subcat_copper_border: "#a8673c"
  subcat_copper_fg: "#d69a6e"
  
  # Δ-deviation indicators — 4-state spectrum: yellow-brown for under-weight,
  # green for at-or-above standard. Each side has «mild» (within remedium) and
  # «deep»/«strong» (beyond remedium) variants.
  #
  # Sign × magnitude table:
  #   −∞ … −1%   → under_deep   (vivid amber — significant deficit)
  #   −1% … 0    → under_mild   (muted tan — slight deficit, within remedium)
  #   0 … +1%    → over_mild    (calm green — slight surplus, within remedium)
  #   +1% … +∞   → over_strong  (vivid green — significant surplus)
  under_deep: "#c97a3d"
  under_deep_bg: "#2a1e14"
  under_mild: "#a08966"
  under_mild_bg: "#221a13"
  over_mild: "#68a257"
  over_mild_bg: "#1a2a1a"
  over_strong: "#92d24c"
  over_strong_bg: "#1f3017"
  # Legacy aliases — kept for any references that still use the old names
  ok: "#68a257"
  ok_bg: "#1a2a1a"
  dev: "#c97a3d"
  dev_bg: "#2a1e14"
  dev_pos: "#92d24c"
  dev_pos_bg: "#1f3017"
  
  # Purple accent (secondary labels, dual-denom context)
  accent_purple: "#b5a0d0"
  accent_purple_bg: "#1a1612"

  # Cite / quotation
  cite_color: "#e3c789"

# ---------------------------------------------------------------------
# Accents — semantic colour family used by phase header, Fuß column,
# dual-nominal ranks, summary pills. All values are RGB hex strings.
# Extracted from the original holstein_muentzwesen artifact.
# ---------------------------------------------------------------------
accents:
  # Gold family — phase headers, Fuß primary text, mt-caption
  gold_deep: "#d4a574"          # main Fuß gold (accent bars, axis ticks)
  gold_light: "#e8b888"          # brightest gold (phase-header title)
  gold_muted: "#c0a680"          # muted gold (sf-line.primary text, mt-caption)
  gold_border: "#5a4a38"         # dark-brown border / left edge
  gold_border_active: "#7a5a38"  # lit-up details border
  gold_bullet: "#8a7350"         # ▸ Primär bullet colour

  # Purple family — secondary rank
  purple_text: "#a898c4"         # sf-line.secondary text
  purple_bullet: "#8575b0"       # ▸ Sekundär bullet colour

  # Blue family — tertiary rank
  blue_text: "#8ab0c4"           # sf-line.tertiary text
  blue_bullet: "#5585a0"         # ▸ Tertiär bullet colour

  # Phase-header (dark gradient band)
  phase_head_from: "#3a2e20"
  phase_head_to: "#2a2520"

  # <details> pill (Hintergrund, Kontext und Details)
  pill_fg: "#a58b6c"
  pill_active_bg: "#2a2320"

  # .phd — phase short description
  phd_fg: "#a89880"

  # Coin tables
  table_header_bg: "#2e2620"      # <thead> background
  table_row_hover_bg: "#221d18"   # <tr>:hover background
  table_scroll_border: "#3a3530"  # rounded frame around .mt-scroll

# Timeline bar palette — each bar ID pairs a gradient with an optional text override.
# Bars reference these IDs via color_class in location YAML.
#
# `from_light` (optional): light-theme override for the layer end-colour.
# Used pre-calibrated as-is on v1/v2 themes (skips the global 0.7
# darkening factor applied to plain `from`). Reason: the cool-silver
# `from` values carry a +28-channel blue offset that, on the cream
# light-theme bg, rendered as a blue-grey indistinguishable from the
# Krone-Mønt (krm) Prussian-blue palette — both groups merged into
# one «cool dark» band on light pages. Replacing the silver `from`s
# with NEUTRAL-grey values for light themes restores hue separation:
# pure silvers read as neutral grey (the perceptually authentic
# silver-content colour), while krm stays distinctly blue. Dark
# themes are unaffected — they use `to`, not `from`.
timeline_bars:
  # Pure-silver palettes — single shared cool-silver gradient. The five
  # IDs (rt / si / kr / vt / rb) historically encoded Feinsilbergehalt
  # via progressively darker steps to differentiate full-Kurant standards
  # (9-Thaler, 9¼-Thaler, 11⅓-Thaler, 30-Thaler/Vereinsthaler,
  # 18½-Thaler/Rigsbankdaler). Per project decision 2026-05-24 the
  # silver-content axis is no longer encoded by hue brightness — all
  # non-tariff silver standards now read as the same neutral silver,
  # since the differentiation was visual noise rather than information.
  # Tariff-silver families (krm — Krone-Mønt) stay in a distinct hue
  # family below so they're visually separable from pure-silver bars.
  # `from_light` = #a09c95 — warm-neutral pewter for cream paper. The
  # dark-theme cool-silver `from: #92a0ae` (B-dominant: R=146 G=160 B=174)
  # read as too blue / too «winter» on the warm cream bg. A warm-neutral
  # alternative (R>G>B by small steps: 160 / 156 / 149) keeps the
  # «silver metal» feeling without the artificial-blue cast. Dark theme
  # uses `from`, so this only affects v1 atlas / v2 codex; dark `noir`
  # theme is unchanged.
  rt:  { from: "#92a0ae", to: "#bcc6d2", from_light: "#a09c95" }  # 9-Thaler-Fuß    (25,98 g fein)
  si:  { from: "#92a0ae", to: "#bcc6d2", from_light: "#a09c95" }  # 9¼-Thaler-Fuß   (25,28 g fein) — canonical Speciedaler
  kr:  { from: "#92a0ae", to: "#bcc6d2", from_light: "#a09c95" }  # 11⅓-Thaler-Fuß  (20,63 g fein)
  vt:  { from: "#92a0ae", to: "#bcc6d2", from_light: "#a09c95" }  # 30-Thaler-Fuß   (16,67 g fein) — Vereinsthaler
  rb:  { from: "#92a0ae", to: "#bcc6d2", from_light: "#a09c95" }  # 18½-Thaler-Fuß  (12,64 g fein) — Rigsbankdaler
  sh:  { from: "#5a4d6d", to: "#8575b0" }
  # Krone-Mønt-Familie. `from_light` = #3a78b8 — clear sky-blue tone
  # for the light themes, sourced to push the tariff-silver bars away
  # from the merely-cold dark-navy reading they had with plain `from`
  # darkening. The neutral-grey pure-silver palettes (rt-rb) are now
  # at the same brightness band as krm, but krm is in the saturated-
  # blue hue and silvers are achromatic — hue separation does the work
  # of distinguishing «tariff silver» from «pure silver».
  krm: { from: "#1d3557", to: "#457b9d", from_light: "#3a78b8", fg: "#f0ece4" }   # Krone-Mønt-Familie (kronemont_chr_iv / kronemont / kronemont_fine) — preußisch-blaue Gamme
  # `from_light` (warm bronze) lifts the Guldkrone-Fuß layer on Atlas/Codex —
  # without it, plain `from × 0.7 = (96,76,29)` rendered as a near-black
  # olive stripe on the cream paper, indistinguishable from the surrounding
  # narrow bars. The mid-bronze stays in the warm-gold hue family of the
  # `to` end so the bar still reads as «kein Pfennig-Gold sondern Tarif-Gold».
  rm:  { from: "#8a6d2a", to: "#d4a574", from_light: "#a87838", fg: "#1a1612", weight: 600 }
  g:   { from: "#5c4a00", to: "#fcd34d", fg: "#1a1612", weight: 600 }

typography:
  family_body: 'Georgia, serif'
  family_mono: '"SF Mono", Consolas, monospace'
  size_body: "14px"
  size_small: "12px"
  size_xsmall: "11px"
  size_tiny: "10px"
  line_height: "1.45"
  letter_spacing_small: "0.05em"
  letter_spacing_cap: "0.07em"

layout:
  max_width: "1200px"     # used only as .mt table min-width (so the note column has
                          # ≈400 px even on narrow viewports — see .mt CSS in
                          # render.py). Body itself stays full-window-width.
  padding_page: "1rem"
  gap_cards: "12px"
  
  radius_card: "8px"
  radius_block: "4px"
  radius_pill: "12px"
  
  border_width: "0.5px"

# Language-specific tweaks
language_overrides:
  uk:
    # Ukrainian text tends to run longer; slightly looser line-height
    line_height: "1.55"
  en:
    # English is ≈10% shorter; can use tighter
    line_height: "1.40"
