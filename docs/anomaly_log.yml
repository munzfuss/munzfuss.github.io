  summary: IKMK discover query «Hamburg» returns OOS records (fuzzy-search false-positives outside mission
    scope).
  status: resolved
  instance_first_seen: '2026-05-26T23:23:08Z'
  last_seen: '2026-05-27T19:22:57Z'
  occurrence_count: 4
  affected_ids:
    ikmk:
    - 18203249
    - 18203499
    - 18203503
    - 18203512
    - 18203516
  occurrences:
  - run_utc: '2026-05-26T23:23:08Z'
    batch_label: '157'
    detail: IKMK quick_search queries "Hamburg" + "Kassel" return Roman-era coins (pre-mission) — discovery
      is too broad. Affects batch C all 5 mds_ids.
    full_context:
      action_taken: Saved cache files (per §5.5.4); flagged in commit + end-of-run report. No data lost;
        downstream filters absorb.
      ikmk_batch: C
      numista_batch: EU
      ucoin_batch: '157'
  - run_utc: '2026-05-27T10:23:15Z'
    batch_label: '168'
    detail: IKMK discovery queries "Christian V." and "Hamburg" continue catching full-text false-positives
      (Phanagoria + Roman Republic this batch). Pattern recurring since batch M (2026-05-27T09:21:43Z).
    full_context:
      action_taken: Cached the 5 records; flagged in commit body as off-scope; manifest unchanged.
      ikmk_batch: N
      numista_batch: FF
      ucoin_batch: '168'
  - run_utc: '2026-05-27T18:25:44Z'
    batch_label: '176'
    detail: IKMK Christian V. + Hamburg queries returned 4/5 ancient records (Roman Constans + Greek Pantikapaion,
      Croatia mint) — manifest fuzzy-search false positives at mds_id 18203249/314/325/382/418.
    full_context:
      action_taken: Committed cache writes for audit trail; flagged in commit message and end-of-run report.
      ikmk_batch: V
      numista_batch: FN
      ucoin_batch: '176'
  - run_utc: '2026-05-27T19:22:57Z'
    batch_label: '177'
    detail: 'IKMK batch W: 5/5 records OOS (18203499/500 Bundesrepublik post-1914, 18203503 Byzanz ancient,
      18203512 Meißen medieval, 18203516 Iulia Titi Roman). Manifest sequential walk hitting non-project-scope
      mds_ids systematically — sibling case to batch V (Christian V + Hamburg fuzzy queries).'
    full_context:
      action_taken: Committed cache writes for audit trail; flagged in commit message and end-of-run report.
      ikmk_batch: W
      numista_batch: FO
      ucoin_batch: '177'
  proposed_fix: 'Manifest-scoping pass needed: ADD oos_excluded_mds_ids slot to scripts/cache/ikmk/_manifest.json,
    OR tighten QUERIES list in scripts/fetch_ikmk.py to exclude buckets matching Bundesrepublik / Byzanz
    / medieval Meißen / ancient Roman patterns.'
  resolution: 'Year-range mission-scope filter added to scripts/fetch_ikmk.py (MISSION_YEAR_MIN=1514,
    MISSION_YEAR_MAX=1914). New _is_in_mission_scope() predicate tests overlap of IKMK record''s year_start/year_end
    against [1514, 1914]; applied in _fetch_one() at-fetch-time. OOS records get recorded to manifest''s
    new oos_excluded_mds_ids slot (skipped by future fetch() runs without re-fetching). New `scan-cache`
    CLI mode walks already-cached records: identified 5424/7194 (75%) as OOS — populated the slot in one
    pass. Effective in-scope IKMK pool drops from 11558 to 6140 (5418 still-cached OOS + 5424 marked filtered
    + 6140 in-scope kept or to be fetched). Predicate unit-tested: 10/10 edge cases pass (BCE/CE, single-year/range,
    year_end=0 collapse, missing-field conservative-keep). Fix is class-wide — resolves ALL 8 IKMK query
    scope-drift anomaly entries because the filter is applied to every fetched record regardless of which
    query originally surfaced it.'
  resolved_at: '2026-05-27T20:28:26Z'
  resolved_by: serhii
  in_progress_at: '2026-05-27T20:25:22Z'
  in_progress_note: 'Single coordinated fix planned: add year-range mission-scope filter [1514, 1914]
    to scripts/fetch_ikmk.py::_fetch_one(). Discovered via 30-record sample analysis that ~67% of currently-cached
    IKMK records are OOS by year (Abbasid/Umayyad/ancient Greek-Roman/Merowingian/medieval German), not
    just the handful tracked in occurrence detail. IKMK records carry clean year_start/year_end integer
    fields; filter test: year_start <= 1914 AND year_end >= 1514. Fix scope: forward-filter (skip OOS
    writes) + cache scan mode (populate oos_excluded_mds_ids in manifest from currently-cached OOS records).
    One fix resolves all 8 IKMK scope-drift anomaly entries.'
