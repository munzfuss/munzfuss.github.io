name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate data
        run: python scripts/build.py --validate-only

      - name: Setup Pages
        uses: actions/configure-pages@v5
        id: pages

      - name: Build site
        # base_path is provided by configure-pages: "/repo-name" for project pages,
        # "/" for user/org pages and custom domains. We strip a lone "/" so it
        # doesn't produce double slashes when prefixed to asset URLs.
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          BASE_URL="${PAGES_BASE_PATH%/}"
          python scripts/build.py \
            --clean \
            --base-url "$BASE_URL" \
            --repo-url https://github.com/${{ github.repository }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
