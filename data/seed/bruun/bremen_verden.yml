scope_note:
  de: Erzbisthum Bremen mit Bisthum Verden — Reichslehen mit Münzstätten Bremervörde und Stade. Unter dänischen Administratoren
    biß zum Westfälischen Frieden 1648, danach schwedisch (1648–1712). NICHT zu verwechseln mit der Freien Hansestadt Bremen.
  en: Archbishopric of Bremen with Bishopric of Verden — imperial fief with mints at Bremervörde and Stade. Under Danish administrators
    until the Peace of Westphalia 1648, then Swedish (1648–1712). NOT to be confused with the Free Hansestadt of Bremen.
  uk: Архієпископство Бремен з єпископством Верден — імперський лен з монетними дворами Бремерферде та Штаде. Під данськими
    адміністраторами до Вестфальського миру 1648, потім шведське (1648–1712). НЕ плутати з Вільним ганзейським містом Бременом.
