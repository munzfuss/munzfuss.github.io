name:
  de: Herzogthum Sachsen-Lauenburg (ab 1815 unter dänischer Krone)
  en: Duchy of Saxe-Lauenburg (under the Danish crown from 1815)
  uk: Герцогство Саксен-Лауенбург (з 1815 під данською короною)
scope_note:
  de: Reichsherzogtum Sachsen-Lauenburg, ab 1689 unter Hannoveraner Personalunion, ab 1815 (Wiener Kongreß) unter dänischer
    Krone in Personalunion biß 1864 (Gasteiner Konvention → Preußen). Eigene Münzprägung in Altona-Mint nach lauenburgischem
    Konventionsfuß-Standard, separat vom restlichen Schleswig-Holstein-Münzwesen.
  en: Imperial Duchy of Saxe-Lauenburg, in personal union with Hanover from 1689, then with the Danish crown from 1815 (Congress
    of Vienna) until 1864 (Gastein Convention → Prussia). Distinct Lauenburg-Konventionsfuß coinage at the Altona mint, separate
    from the rest of Schleswig-Holstein.
  uk: Імперське герцогство Саксен-Лауенбург, з 1689 в особистій унії з Ганновером, з 1815 (Віденський конгрес) під данською
    короною в особистій унії до 1864 (Гаштайнська конвенція → Пруссія). Окреме лауенбурзьке Konventionsfuß-карбування на Альтонському
    монетному дворі, відмінне від решти Шлезвіг-Гольштейну.
