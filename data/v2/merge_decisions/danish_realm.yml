  # because the bare-KM-564 sources (ucoin tid 94338, Numista 342563,
  # NumisMaster MC_65825 — all KM 564, no Hede) carry no Hede tag and got
  # matched onto the Hede-11AB seed (danskmoent f5h11, no KM). Curator
  # verdict: «KM 564 і Hede 11AB це різні монети» — four separate types:
  #   (1) KM 564          = dk-tid-94338 + dk-numista-342563 + numismaster-65825
