no_merges:
  # Gottorp John Adolphus / Frederik III Thaler cluster — THREE distinct coins
  # (curator 2026-06-29, corrects an earlier over-merge that fused all three):
  #   Coin 1: KM 35, Lange 271/271d, Dav EC II 3690 — {313301, 313303, 99446}
  #   Coin 2: KM 33, Dav EC II 3688 (1611-1612, 1615) — {99444}
  #   Coin 3: Lange 274b, 1 Daler Johan Adolf 1614 — {kmk-348805} (a Johan-Adolf
  #           member of the Lange-274 series whose Frederik-III sibling 274e = KM 78).
  # The auto-matcher separates Coin 1 from both others on catalogue conflict
  # (KM 35≠33 / Dav 3690≠3688, and Lange 271≠274). It WRONGLY fused Coin 2 and
  # Coin 3 because they share no overlapping index to disagree on (KM 33 / Dav
  # 3688 vs Lange 274b). Block that single spurious edge:
  - members: [schleswig_holstein-numismaster-99444, kmk-348805]
    reason: >-
      KM 33 / Dav EC II 3688 8-Skilling-weight Thaler (NumisMaster MC_99444,
      1611-1612 + 1615) is NOT the Lange-274b 1 Daler of Johan Adolf 1614 (KMM
      348805, Lange-274 series, Frederik-III sibling = KM 78 / Lange 274e). No
      shared catalogue index spans them, so the matcher saw no conflict and
      fused them — but they are two distinct Gottorp Thaler types. Keep apart.

merges:
  # Coin 3 of the cluster above — a curator-vetted cross-catalogue IDENTITY, not
  # an over-merge. The auto-matcher already unites these two (ruler+nominal+year+
  # weight), but they share NO catalogue base (KM 41 / Dav 3692 vs Lange 274b),
  # so the §9.4 over-merge `scan` would flag it forever. Record the curator
  # decision («хай буде 3», 2026-06-29) explicitly: it documents KM 41 ≡ Lange
  # 274b ≡ Dav 3692 = ONE Johan-Adolf 1614 Gottorp Thaler, makes the union
  # durable against future matcher changes, and tells `scan` it is intentional.
  - members: [kmk-348805, schleswig_holstein-numismaster-99448]
    reason: >-
      1 Thaler / 1 Daler, Johan Adolf, 1614, Gottorp — KMM 348805 (Lange 274b,
      28.76 g) and NumisMaster MC_99448 (KM 41, Dav EC II 3692) are the SAME
      coin: same ruler, nominal, year and ~28.77 g weight. The Danish/museum
      catalogue (Lange) and Krause/Davenport simply index it differently and
      neither cross-references the other, so there is no shared base to confirm
      the identity from data alone — curator-confirmed it is one coin. KM /
      Lange / Dav accumulate list-form per §9a.
