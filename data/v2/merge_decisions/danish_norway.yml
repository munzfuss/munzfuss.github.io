# Curator merge decisions — entity `danish_norway`.
#
# Two decision surfaces, both authoritative over the auto-matcher:
#
#   merges:    force these member-ids into one unified class
#   no_merges: forbid these member pairs from ever uniting
#
# Both lists are loaded by `merge_seeds_cross_source.py::_load_decisions`
# on every Phase 3.2 run and applied via union-find:
#
#   • A `merges` entry unconditionally unites its members. Other coins
#     that auto-match any class member then join the class transitively
#     — curator's decision does NOT block legitimate enrichments. If a
#     Numista entry comes in next month that confidently matches our
#     forced merge target, it auto-joins the same class.
#
#   • A `no_merges` entry registers a forbidden pair. The union-find
#     refuses any auto-merge that would put both members in the same
#     class (direct OR transitive). The pair stays in separate classes
#     forever until the curator removes the constraint.
#
# IDs reference V2 seed-layer entries (`data/v2/seed/<src>/<entity>.yml`).
# When the matcher iterates pairs, it consults this file FIRST — the
# explicit decisions land in union-find before any auto-rule fires.

merges:
