      - denmark-numismaster-110665
      - dk-hede-nc5h41
    reason: |
      Curator decision 2026-05-18. Both records describe the SAME
      physical coin type: 4 Mark Christiania 1670-1680 under Christian V,
      22.272 g rough × .672 fineness. NumisMaster's MC_110665 records
      the type's full circulation span (1669-1680) as one entry per
      its rollup convention; Hede nc5h41 catalogues the same type's
      Christian-V portion at danskmoent.dk/norge/nc5h41.htm. The 1669
      year that NumisMaster includes is covered by the separate Hede
      nf3h66 entry (Frederik III); see no_merges below.

  - members:
      - denmark-numismaster-86229
