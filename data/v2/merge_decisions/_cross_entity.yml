# Cross-entity curator merges — GLOBAL (distinct from per-entity
# merge_decisions/<entity>.yml). Each entry declares one physical coin whose
# source seeds were bucketed into DIFFERENT entities, plus the entity it truly
# belongs to.
#
# Applied by scripts/maintenance/merge_seeds_cross_source.py:
#   _load_cross_entity_decisions() pre-scans this file (globally, before the
#   per-entity loop). For each entry:
#     • members are PULLED into `target_entity`'s processing set (from their
#       home seed buckets) and force-unioned into ONE unified entry;
#     • members are EXCLUDED from their source entity (no duplicate there);
#     • the unified entry is stamped issuing_entity = target_entity.
#   Members may name ids from any bucket; a Hede bare-id expands to sub-letters.
#
# Run the merger WITHOUT --entity (or over every affected entity) so the
# source-side exclude applies too.
#
# Schema (per entry):
#   target_entity  str       - V2 entity the merged coin belongs to
#   members        [str]     - seed ids across any bucket (Hede bare-ids expand)
#   reason         str       - curator justification

merges:
  - target_entity: royal_holstein
    members:
      - dk-hede-c4h8a       # home: royal_holstein  (Hede 8A, Ungersk Gylden 1591-1592)
      - dk-hede-c4h8b       # home: royal_holstein  (Hede 8B, Ungersk Gylden 1593)
      - dk-bruun-4602       # home: danish_realm     (Goldgulden, Hede 8B, Bruun I lot 1012)
      - dk-numista-142133   # home: danish_realm     (Goldgulden, N#142133)
      - dk-tid-163398       # home: danish_realm     (1 Gulden, ucoin UC#12)
    reason: |
      One coin — Christian IV «Ungersk Gylden», Hede 8A/8B, minted at Haderslev
      (royal Schleswig) 1591-1593. Hede catalogues the type as sub-variants 8A
      (1591-92) and 8B (1593) of ONE coin. The Bruun/Numista/ucoin copies carry
      no mint → the classifier defaulted them to danish_realm; the Hede copies
      carry mint=Haderslev → royal_holstein (mint_registry: Haderslev = royal
      Schleswig-Holstein bucket). True issuing entity = royal_holstein. The
      «Goldgulden» label is Numista's generic name; Hede's «Ungersk Gylden»
      (.986) is authoritative. Curator merge 2026-06-13 (Serhii).

  - target_entity: royal_holstein
    members:
      - dk-hede-c7h33a            # Hede 33A
      - dk-hede-c7h33b            # Hede 33B
      - dk-hede-c7h33c            # Hede 33C
      - kmk-122089                # KMM, Hede 33B
      - kmk-122886                # KMM, Hede 33A
      - kmk-159749                # KMM, Hede 33B
      - kmk-340595                # KMM, Hede 33
      - denmark-numismaster-58047 # KM 631.1 (Kopenhagen)
      - km-631-chr-v-1778         # ucoin, KM 631
      - denmark-numismaster-58048 # KM 631.2 (Altona)
      - denmark-numismaster-58049 # KM 631.3 (Altona)
      - dk-numista-42563          # numista N#42563, KM 631 (Altona + Kopenhagen)
    reason: |
      One coin — Christian VII «2 Skilling», Hede 33 (sub-variants 33A/33B/33C),
      KM 631 (.1/.2/.3), struck 1778-1785 at Altona AND Kopenhagen. Was
      fragmented into THREE final rows: unified-dk-hede-c7h33a (Hede 33A, KM
      631/631.1) + unified-dk-hede-c7h33c (Hede 33C, KM 631.3) + unified-denmark-
      numismaster-58049 (+ numista N#42563, no Hede, seed_unsorted). The split is
      the same class as the Frederik D'or (cross-letter Hede 33A/C the §9a gate
      won't unite on RAW overlap) plus cross-source (numismaster/numista Altona
      copies). KM 631.1/.2/.3 + Hede 33A/B/C are mint sub-variants of ONE type →
      list-form accumulation per §9a.

      target_entity = royal_holstein: the merger writes seed_unified + the absorb
      writes final BY PROCESSING ENTITY (= target), not by _home_entity, so the
      target IS the home file. royal_holstein is the SH∩Denmark overlap entity
      (consumed by BOTH pages via Pass 1), so the merged coin must process in
      royal_holstein to render on both — exactly the overlap-home rule
      (_home_entity, e8de501). The cross-entity stamp (e414a0a) then DERIVES the
      issuing_entity from the merged mint [Altona, Kopenhagen] → joint
      [danish_realm, royal_holstein] (the circulation signal), so the VALUE
      stays joint while the home is royal_holstein. fuss/phase carry from the
      c7h33a/c7h33c foundation (11⅓-Thaler-Fuß, phase I) + their
      classification_decisions assignments. Curator merge 2026-06-15, target
      corrected danish_realm→royal_holstein 2026-06-16 (Serhii).
