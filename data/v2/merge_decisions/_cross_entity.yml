      issuing_entity from the merged mint [Altona, Kopenhagen] → joint
      [danish_realm, royal_holstein] (the circulation signal), so the VALUE
      stays joint while the home is royal_holstein. fuss/phase carry from the
      c7h33a/c7h33c foundation (11⅓-Thaler-Fuß, phase I) + their
      classification_decisions assignments. Curator merge 2026-06-15, target
      corrected danish_realm→royal_holstein 2026-06-16 (Serhii).

