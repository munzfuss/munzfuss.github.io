    category: out_of_scope
    reason: >-
      Frederik IV gold coin, natmus.dk «Sted: Danmark, Ostindien» (Bech nr. 977)
      — a Danish East India (Tranquebar) colonial gold issue, outside the
      North-German + Danish-Norwegian Münzfuß scope of this project (same class
      as the earlier Pagode exclusion dk-numista-159818). Curator (Serhii)
