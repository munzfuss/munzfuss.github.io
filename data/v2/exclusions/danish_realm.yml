      type's number). Verbatim label in scripts/cache/kmk/137188.json.
    curator: Serhii
    date: 2026-07-12
  - id: kmk-137189
    category: undocumented_stub
    reason: >-
      «¼ Portugaløser 1602, Schou 1a» — anomalous, unusable KMM record: danskmoent
      documents NO 1602 ¼-Portugaløser (the ¼ types are Hede 3 [1592], 7A/7B
