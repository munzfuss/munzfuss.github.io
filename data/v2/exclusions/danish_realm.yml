  # Dukat) struck from the dies of a SILVER Speciedaler / Krone / Mark — the
  # stamped nominal (silver, low value) is far below the gold-bullion value →
  # §9.5. The SILVER mother coins are SEPARATE finals in their own fusses
  # (9¼-Thaler / kronemont) and are KEPT. Verified per-coin (ruler = F.III, gold
  # metal, silver-die source) against Bruun-lot descriptions + danskmoent
  # (10dukat.htm / f3h57 / f3h80 / f3h107 / norge). NOT to be confused with the
  # Christian IV Portugaløsere (dedicated dies, nominal = metal → kept). ---
