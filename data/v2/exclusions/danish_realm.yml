      them. No weight, no image, no cross-source match — nothing verifiable to
      classify against (§0). Curator: out-of-scope, «не вписується нікуди».
    curator: Serhii
    date: 2026-07-12

  # --- Frederik III «Portugaløser» = Guldafslag off-strikes (§9.5 off-nominal),
