      da: 'Forside: våbenskjold; omskrift 15 STYKKER 1 RIGSDALER SPECIES bagside: værdiangivelse: 12 STYKKER 1 RIGSDALER COURANT, Den tilsyneladende forvirrede værdiangivelse skyldes to parallelle regnemåder:
        én mønt med værdien 1 speciedaler indeholdt mere sølv end samme nominelle værdi i småmønt. Derfor ville en sælger forlange overpris, hvis en vare skulle betales i småmønt, den såkaldte kurant. Speciedaleren
        (= 1 daler i ét stykke) havde således en højere værdi, som direkte kan aflæses af vor mønt: Der skal 15 af den til at svare til 1 speciedaler, men kun 12 til at opnå værdien 1 rigsdaler kurant…'
