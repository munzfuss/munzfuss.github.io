    _source_note:
      da: 'Forside: portræt, bagside: mangedelt våbenskjold (Hede 71, Schou 21, Sieg 89). Guldafslag 10 Dukat 1666 (dvs. med ændret årstal). Møntmestermærke GK . "Den første mønt, på hvilken Femerns mærke
        og i øvrigt også Grønlands mærke er anbragt, er en nu unik speciedaler 1665, Wilcke auktion 3 (19) nr. 369. Femerns krone er at finde yderst til heraldisk venstre, for beskueren til højre i skjoldets
        nederste felt, Grønlands her gående isbjørn yderst til heraldisk højre, for beskueren til venstre i nederste felt. Kronen var for at følge tidens modelune gjort lukket. Våbnerne optræder derefter
        på en…'
