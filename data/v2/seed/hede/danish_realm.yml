    en: 'Hede seed: Müntzfuß assignment, phase and per-coin verification still outstanding. Privately-minted speciedaler (per
      Aagaard NNUM 2/2009), not state issue; «III MARCK DANSKE» legend is the nominal-account label (1 Speciedaler = 3 Mark
      Danske under Christian-III pre-1602 convention). Mintage 16 specimens (1560). Marken-fin 8.827 speciedaler — same Christian-III-1541
      base standard as c3h3 Hede 3A. A Guldafslag off-strike variant (Schou 6, RRR, 10 Dukat face) exists separately — excluded
      per CLAUDE.md §9 exclusion #3.'
    uk: 'Hede-seed: призначення Müntzfuß, фази та покоінна верифікація очікуються. Приватно карбований Speciedaler (за Aagaard
      NNUM 2/2009), не державний випуск; легенда «III MARCK DANSKE» — це обліковий номінал (1 Speciedaler = 3 Mark Danske
      за дочиновальною конвенцією Кристіана III). Тираж 16 шт. (1560). Marken-fin 8,827 speciedaler — той самий стандарт Christian-III
