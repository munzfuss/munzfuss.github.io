    de: 'Hede-Seed: Müntzfuß-Zuordnung, Phase und Per-Münze-Verifikation stehen noch aus. Privat udmøntet Speciedaler (per
      Aagaard NNUM 2/2009), nicht staatliche Ausgabe; «III MARCK DANSKE»-Legende als Nominalbezeichnung (1 Speciedaler = 3
