    _source_note:
      da: 'Forside: portræt Christian 10., bagside: portræt Frederik 8. Møntmester- og medaillørmærke VBP / AH . (Hede 3, Sieg 20) Erindringsmønt i anledning af tronskiftet. Oplag 101.917 stk. Møntens to
        sider er drejet 180 grader i forhold til hinanden. I anledning af tronskiftet. Frederik VIII døde 14. maj 1912. Møntens udprægning og udseende blev meddelt ved Bekendtgørelse nr. 254 af 14. november
        1912 efter at kongen den 11. oktober samme år havde bifaldet, at der skulle præges en sådan mønt, hvilket alt meddeltes i Lov-Tidende A 1912 af 21. november. 30. januar 1913 og selve dagen indrykkkedes…'
