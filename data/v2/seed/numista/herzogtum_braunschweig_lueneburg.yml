    note:
      de: 'Revers-Inschrift »* VEREINSMÜNZE * 1 KRONE 1858 50 EIN PFUND FEIN« — beide Wertangaben werden zugleich auf der Münze geführt: Nominal »1 KRONE« und Müntzfuß-Divisor »50 EIN PFUND FEIN« (50 auf
        ein feines Pfund). Inschrift »VEREINSMÜNZE« klassifiziert das Stück als Vereinsgoldmünze. Die rechnerische Äquivalenz »3⁄5 Vereinsthaler« ist nicht inschriftlich, sondern Auswertung des Vereinsthaler-Gold-Tier-Verhältnisses.'
      en: 'Reverse legend "* VEREINSMÜNZE * 1 KRONE 1858 50 EIN PFUND FEIN" — both denominational values appear together on the coin: nominal "1 KRONE" and Müntzfuß divisor "50 EIN PFUND FEIN" (50 to one
        fine Pfund). The inscription "VEREINSMÜNZE" classifies the piece as Vereins-gold. The computed "3⁄5 Vereinsthaler" equivalent is not inscribed but follows from the gold-tier relation to the Vereinsthaler.'
      uk: 'Реверс-напис «* VEREINSMÜNZE * 1 KRONE 1858 50 EIN PFUND FEIN» — обидва значення наведено на монеті разом: номінал «1 KRONE» і Müntzfuß-дивізор «50 EIN PFUND FEIN» (50 на один тонкий Пфунд).
        Напис «VEREINSMÜNZE» класифікує монету як Vereins-золото. Розрахункова відповідність «3⁄5 Vereinsthaler» не інскрибована, а виводиться зі співвідношення золотого тиру до Vereinsthaler.'
