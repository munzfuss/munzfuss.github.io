        Märchen „Sterntaler“ der Gebrüder Grimm erwähnten Taler in Beziehung zu den hessischen Talern zu setzen. Vielfach wird der Taler auch Blutdollar (Blood Dollar) genannt. Landgraf Friedrich II, 
        hatte dem englischen König 12.000 hessische Soldaten für dessen Kampf gegen die abtrünnigen Kolonien an der Ostküste Nordamerikas „verkauft“. Von dem dafür erhaltenen Silber sollen diese Taler
