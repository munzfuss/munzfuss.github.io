    inscription_obv: ZV / EREN / MARGRAF / ALBRECHTEN / VND ZV SCHAN/DEN ALEN PFA/FEN KNEC/HT BLA/SSEN / BE
    inscription_rev: SI DE9 PRO NOBIS QVIS CONTRA NOS
    note:
      de: Dieses Stück, als Denkmüntze auf den Pfaffenkrieg bezeichnet, stammt aus der Markgräflich-Ansbacher Sammlung. Für die Rückseite wurde der Stempel der Viertelthaler von 1549 verwandt. Die 
        Stempel entstanden unter den Müntzmeistern Hans und Andreas Zehenntner, die Prägung von 1553 aber erst unter dem Müntzmeister Anton Coburger zu Erlangen. Der Pfaffen- oder Markgräflerkrieg 
        führte dazu, daß über Albrecht Alcibiades die Reichsacht verhängt wurde und er aus seinen Landen fliehen mußte; 1557 gingen seine Besitzungen an Georg Friedrich über.
      en: This piece, described as a commemorative coin on the Pfaffenkrieg, comes from the Margravial Ansbach collection. For the reverse the die of the Vierteltaler of 1549 was used. The dies were 
        made under the mintmasters Hans and Andreas Zehenntner, but the striking of 1553 only under the mintmaster Anton Coburger at Erlangen. The Pfaffen- or Markgräflerkrieg resulted in the imperial
        ban being imposed on Albrecht Alcibiades and his having to flee his lands; in 1557 his possessions passed to Georg Friedrich.
      uk: Ця штука, названа пам'ятною монетою на честь Pfaffenkrieg, походить із маркграфсько-ансбахської збірки. Для реверсу використали штемпель Vierteltaler 1549 року. Штемпелі виготовлено за 
        монетних майстрів Hans і Andreas Zehenntner, а карбування 1553 року — лише за монетного майстра Anton Coburger в Erlangen. Pfaffenkrieg, або Markgräflerkrieg, призвела до того, що на Albrecht 
        Alcibiades наклали імперську опалу й він мусив тікати зі своїх земель; 1557 року його володіння перейшли до Georg Friedrich.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18214785
