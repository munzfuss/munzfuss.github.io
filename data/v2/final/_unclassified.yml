    inscription_obv: CARL HERZOG ZU BR U LUEN -/ I / DUCAT / 1825 -/ AUS HARZ GOLD
    note:
      de: Der Ausbeutedukat stammt aus dem Gold der Silber- und Kupfergruben bei Grund (Bad Grund) und Wildemann. Sein Feingewicht wurde geringfügig von 3,442 auf 3,43 Gramm verringert, um die Müntze 
        den älteren, leicht abgenutzten Dukaten im Wert anzupassen. Bei der geringen Auflage von 530 Exemplaren spielte sie im Geldumlauf keine Rolle, sondern war mehr ein Erinnerungsstück, das u. a. 
        den Bergbaubeamten bei Gehaltszahlungen ausgehändigt wurde.
      en: This mining-yield ducat was made from the gold of the silver and copper mines at Grund (Bad Grund) and Wildemann. Its fine weight was slightly reduced from 3.442 to 3.43 grams to match the 
        value of older, slightly worn ducats. With a small mintage of 530 pieces it played no role in circulation but was rather a keepsake, handed out among other things to mining officials with 
        their pay.
      uk: Цей видобувний дукат виготовлено із золота срібних і мідних копалень поблизу Grund (Bad Grund) та Wildemann. Його чисту вагу трохи зменшили з 3,442 до 3,43 грама, щоб прирівняти монету за 
        вартістю до старіших, злегка потертих дукатів. За малого накладу в 530 примірників він не відігравав ролі в грошовому обігу, а був радше пам'ятною річчю, яку, зокрема, видавали гірничим 
        урядовцям при виплаті платні.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18224400
