      en: The coin was struck on the occasion of the election of the Prussian king Friedrich Wilhelm IV as German emperor in 1849. The mintage was only 200 pieces. Friedrich Wilhelm IV, however, did 
        not accept this election, and only his brother, the later King Wilhelm I, was crowned German emperor on 18 January 1871 at Versailles.
      uk: Монету викарбувано з нагоди обрання прусського короля Friedrich Wilhelm IV німецьким імператором 1849 року. Наклад становив лише 200 штук. Проте Friedrich Wilhelm IV не прийняв цього 
        обрання, і лише його брат, згодом король Wilhelm I, був коронований німецьким імператором 18 січня 1871 року у Версалі.
    verification_note: *id001
