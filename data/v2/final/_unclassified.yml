    inscription_obv: XAVER D G R PR POL & L DVX SAX EL ADM
    inscription_rev: X EINE - ZUR ERMUNTERUNG DES FLEISSES - F MARK // BERG ACADEMIE ZV FREYBERG / WARD GESTIFTET / D 13 NOVEMBER / 1765
    note:
      de: Prinz Xaver war Vormund des minderjährigen Kurfürsten Friedrich August III. (1763-1806). Prämienthaler sind unter seinem Namen und nicht unter dem des unmündigen Kurfürsten geprägt worden. 
        Diese Prämienthaler waren Auszeichnungen für besondere Leistungen auf wirtschaftlichem oder künstlerischem Gebiet, somit Vorläufer der späteren tragbaren Ehrenzeichen. Die Prämienthaler der 
        Bergakademie Freiberg sind in einer Auflage von nur 220 Stück geprägt worden. Den Entwurf zur Rückseite lieferte der Leiter der Zeichenschule der Bergakademie, Charpentier, und erhielt dafür 
        acht dieser Prämienthaler.
      en: Prince Xaver was guardian of the minor elector Friedrich August III (1763-1806). Prämientaler were struck under his name, not that of the underage elector. These Prämientaler were awards for
        special achievements in economic or artistic fields — thus forerunners of the later wearable decorations. The Prämientaler of the Freiberg Mining Academy were struck in an edition of only 220 
        pieces. The reverse design was supplied by the head of the drawing school of the Mining Academy, Charpentier, who received eight of these Prämientaler for it.
      uk: Принц Xaver був опікуном малолітнього курфюрста Friedrich August III (1763-1806). Prämientaler карбували під його ім'ям, а не під ім'ям неповнолітнього курфюрста. Ці Prämientaler були 
        відзнаками за особливі досягнення в господарській чи мистецькій царині — отже, попередниками пізніших носних відзнак. Prämientaler Фрайберзької гірничої академії викарбувано накладом лише 220 
        штук. Проєкт реверсу надав керівник рисувальної школи академії Charpentier, отримавши за це вісім таких Prämientaler.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18206325
