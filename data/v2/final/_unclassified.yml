    note:
      de: Albertusthaler, so genannt nach dem Albertuskreuz auf der Rückseite, waren Handelsmüntzen im Ostseeraum, geschlagen in den Niederlanden biß Anfang des 19. Jahrhunderts. Wegen dieser 
        internationalen Geltung wurden sie auch in Preußen 1766, 1767 und 1797 geprägt. Stempel durch Jakob Abraham.
      en: Albertustaler, so named after the Albertus cross on the reverse, were trade coins in the Baltic region, struck in the Netherlands until the early 19th century. Because of this international 
        standing they were also struck in Prussia in 1766, 1767 and 1797. Dies by Jakob Abraham.
      uk: Albertustaler, названі так за хрестом Albertus на реверсі, були торговими монетами балтійського регіону, карбованими в Нідерландах до початку XIX століття. Через це міжнародне визнання їх 
        карбували також у Пруссії 1766, 1767 і 1797 років. Штемпелі роботи Jakob Abraham.
