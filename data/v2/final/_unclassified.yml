        cannot yet be precisely determined.
      uk: Це напівталеровий відбиток талеровими штемпелями, використаними для показового Thaler на вступ на посаду Adolph IV Borken 1667 року. Через відсутність знака монетника місце карбування досі 
        точно не встановлено.
