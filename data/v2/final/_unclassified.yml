    note:
      de: Prägung auf den Einzug Kaiser Maximilians II. mit seiner Gemahlin Maria von Spanien in Nürnberg; Huldigungsprägung der Stadt. Es war die erste Müntze, die der damals 18-jährige Hermann 
        Dannenberg am 16. März 1842 an das Müntzkabinett veräußerte.
      en: A strike on the entry of Emperor Maximilian II with his consort Maria of Spain into Nürnberg; a homage issue of the city. It was the first coin that the then eighteen-year-old Hermann 
        Dannenberg sold to the coin cabinet, on 16 March 1842.
      uk: Карбування на в'їзд імператора Maximilian II з дружиною Maria Іспанською до Nürnberg; вірнопідданська емісія міста. Це була перша монета, яку тодішній 18-річний Hermann Dannenberg продав 
        монетному кабінету 16 березня 1842 року.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18277662
