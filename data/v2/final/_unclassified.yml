    inscription_rev: QVI VICERIT SIC VESTIETUR VESTIMENTIS ALBIS Apoc 3 V 5
    note:
      de: 'Text der Vorderseite: SIBYLLA - URSULA / AUGUSTI DUC BRUNS & LUNAEB / FILIA NATU MAXMA / CHRISTIANI H N DUC SCHL HOLSAT / CONIUX SVAVISSIMA / NAT IV DECEMB A C MDCXXIX / RENAT IV MART MDCXXX
