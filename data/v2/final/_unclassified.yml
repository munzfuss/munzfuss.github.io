    inscription_obv: FRIEDR WILHELM IV KOENIG V PREUSSEN
    inscription_rev: EIN THALER XXX EIN PFUND FEIN -/ SEGEN DES / MANSFELDER / BERGBAUES
    note:
      de: Diese Ausbeute- bzw. Bergsegensthaler genannten Müntzen wurden aus dem Silber geprägt, das bei der Verarbeitung des Mansfelder Kupfers gewonnen wurde. Erstmalig wurden Mansfelder 
        Ausbeutethaler im Königreich Westfalen unter Hieronymus Napoleon (1807-1813) geprägt. Zu diesem Zeitpunkt gehörte das Mansfelder Land zum Königreich des „Königs Lustik“, des Bruders Kaiser 
        Napoleons I. von Frankreich; erst 1815 kam das Gebiet zu Preußen.
      en: These coins, called Ausbeutetaler or Bergsegenstaler, were struck from the silver obtained in processing Mansfeld copper. Mansfeld Ausbeutetaler were first struck in the Kingdom of 
        Westphalia under Hieronymus Napoleon (1807-1813). At that time the Mansfeld region belonged to the kingdom of 'King Lustik', the brother of Emperor Napoleon I of France; only in 1815 did the 
        territory come to Prussia.
      uk: Ці монети, звані Ausbeutetaler або Bergsegenstaler, карбували зі срібла, здобутого під час переробки мансфельдської міді. Уперше мансфельдські Ausbeutetaler викарбували в Королівстві 
        Вестфалія за Hieronymus Napoleon (1807-1813). Тоді Мансфельдський край належав до королівства «короля Lustik», брата імператора Napoleon I Французького; лише 1815 року територія відійшла до 
        Пруссії.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18205961
