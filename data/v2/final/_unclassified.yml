    inscription_obv: SOLI - DEO - GLORIA
    inscription_rev: MATTI DEI GRA ROM IM SM A
    note:
      de: Die Zuweisung der Müntze an die Müntzstätte Gittelde bedarf der Überprüfung. Die welfischen Spruchmüntzen der Kipperzeit zeigen häufig Teile des welfischen Gesamtwappens — hier u. a. die 
        Gittelder Schlüssel —, doch sind diese Wappenteile nicht zwingend ein Hinweis auf die Müntzstätte.
      en: The attribution of the coin to the mint of Gittelde requires review. The Guelph motto-coins of the Kipper period often show parts of the full Guelph arms — here among others the Gittelde 
        keys — but these heraldic elements are not necessarily an indication of the mint.
      uk: Атрибуцію монети до монетного двору Gittelde слід перевірити. Вельфські девізні монети кіперівської доби часто містять частини повного вельфського герба — тут, зокрема, ключі Gittelde, — 
        проте ці геральдичні елементи не обов'язково вказують на монетний двір.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18254953
