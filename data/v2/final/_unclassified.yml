    note:
      de: Auf den Sieg über die Schweden in der Schlacht bei Fehrbellin am 18. Juni 1675. Dieser überraschende Sieg über das gefürchtete schwedische Heer bedeutete für Brandenburg einen hohen 
        Prestigegewinn und trug Friedrich Wilhelm den Ehrennamen der Große Kurfürst ein; nach dieser Niederlage räumten die Schweden Brandenburg.
      en: On the victory over the Swedes at the Battle of Fehrbellin on 18 June 1675. This unexpected victory over the feared Swedish army brought Brandenburg great prestige and earned Friedrich 
        Wilhelm the honorific 'the Great Elector'; after this defeat the Swedes evacuated Brandenburg.
      uk: На честь перемоги над шведами в битві під Fehrbellin 18 червня 1675 року. Ця несподівана перемога над грізним шведським військом принесла Бранденбургу велику славу й здобула Friedrich 
        Wilhelm почесне ім'я «Великий курфюрст»; після цієї поразки шведи залишили Бранденбург.
    verification_note: *id001
