    inscription_obv: 4 LIVRE 4 S / LANDAV 1702
    note:
      de: 1702 belagerte Ludwig Wilhelm, Markgraf von Baden, Anführer der kaiserlichen Rhein-Armee, die Festung Landau unter deren französischem Kommandanten Mélac. Um die Truppen bezahlen zu können, 
        ließ der belagerte Kommandant sein Silbergeschirr zerteilen und mit entsprechenden Stempeln versehen. Er ließ 4-, 2- und 1-Livrestücke daraus herstellen. Als man feststellen mußte, daß der 
        innere Wert höher als der Nennwert war, wurde pro Stück ein Sou daraufgeschlagen. Das vorliegende Exemplar ist aus der Randpartie eines Tellers entstanden.
      en: In 1702 Ludwig Wilhelm, Margrave of Baden, commander of the imperial Rhine army, besieged the fortress of Landau under its French commander Mélac. To pay his troops the besieged commander 
        had his silver plate cut up and stamped with appropriate dies, making 4-, 2- and 1-livre pieces from it. When it was found that the intrinsic value exceeded the face value, one sou was 
        counterstamped on each piece. The present specimen was made from the rim section of a plate.
      uk: У 1702 році Людвіг Вільгельм, маркграф Баденський, командувач імперської Рейнської армії, обложив фортецю Ландау під французьким комендантом Мелаком. Щоб платити війську, обложений комендант
        наказав розрізати свій срібний посуд і позначити його відповідними штемпелями, виготовивши з нього штуки по 4, 2 та 1 ліврі. Коли виявилося, що внутрішня вартість перевищує номінал, на кожну 
        штуку додатково набивали один су. Наявний примірник виготовлено з крайової частини тарілки.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18200553
