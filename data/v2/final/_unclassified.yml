    inscription_obv: 'MONET : R : D : N : VIC : PHIL : REINH : C : S :'
    inscription_rev: QVID NON PRO RELIGIONE AO 1627 -/ C 4
    note:
      de: Während des Dreißigjährigen Krieges besetzte Philipp Reinhard Graf von Solms, Statthalter und Kommandant des dänischen Königs Christian IV., die Festung Wolfenbüttel. Der kaiserliche 
        Feldmarschall Graf Heinrich von Pappenheim belagerte ihn und zwang ihn im Dezember 1627 zur Übergabe. Zur Bezahlung seiner Garnison ließ Graf von Solms das fürstliche goldene und silberne 
        Tafelgeschirr in Dukaten und Thaler umprägen; es soll später fast vollständig wieder eingeschmolzen worden sein.
      en: During the Thirty Years' War, Philipp Reinhard, Count of Solms, governor and commander for the Danish King Christian IV, held the fortress of Wolfenbüttel. The imperial field marshal Count 
        Heinrich von Pappenheim besieged him and forced his surrender in December 1627. To pay his garrison, the count had the princely gold and silver tableware restruck into Dukaten and Thaler; most
        of it is said to have later been melted down again.
      uk: Під час Тридцятилітньої війни Philipp Reinhard, граф von Solms, намісник і комендант на службі данського короля Christian IV, утримував фортецю Wolfenbüttel. Імперський фельдмаршал граф 
        Heinrich von Pappenheim узяв її в облогу й у грудні 1627 року змусив до капітуляції. Щоб сплатити гарнізону, граф von Solms наказав перекарбувати княже золоте й срібне столове начиння на 
        Dukaten і Thaler; згодом його, як кажуть, майже повністю переплавили.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18250994
