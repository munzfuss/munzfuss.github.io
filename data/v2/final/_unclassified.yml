    inscription_obv: DEO ET PATRIAE AN 1624
    inscription_rev: BRAUN MUNTZ VON FEIN SILB -/ I / HALBE / MARIE/GULD
    note:
      de: Nach der Reichsmüntzordnung von 1566 war für die Müntzen des Heiligen Römischen Reiches deutscher Nation eine Silberlegierung von 889/1000 bei einem Thalergewicht von 29,23 g vorgeschrieben.
        Zur Finanzierung ihrer Kriege verschlechterten die lokalen Prägeherren den Feingehalt ihrer Müntzen jedoch oftmals. Einer dieser Tiefpunkte war die Kipper- und Wipperzeit zu Beginn des 17. 
        Jahrhunderts, als dem Silber Kupfer zulegiert wurde, was den Müntzfuß verschlechterte und dem Prägeherrn Gewinn brachte.
      en: The Reichsmünzordnung of 1566 prescribed a silver alloy of 889/1000 at a Thaler weight of 29.23 g for the coinage of the Holy Roman Empire. To finance their wars, however, local issuing 
        lords frequently debased the fineness of their coins. One such low point was the Kipper und Wipper period in the early 17th century, when copper was added to the silver, degrading the Münzfuß 
        and yielding profit for the issuer.
      uk: Reichsmünzordnung 1566 року приписував для монет Священної Римської імперії німецької нації срібний сплав 889/1000 при вазі Thaler 29,23 г. Однак задля фінансування воєн місцеві монетні 
        сеньйори часто погіршували пробу своїх монет. Одним із таких занепадів була доба Kipper und Wipper на початку XVII століття, коли до срібла домішували мідь, що погіршувало Münzfuß і давало 
        сеньйору прибуток.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18217113
