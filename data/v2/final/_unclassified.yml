    inscription_obv: DEUS PROUIDEB
    inscription_rev: Z0 FER D G R I S A
    note:
      de: 'Kraaz (1895) vermutete erstmals eine lauenburgische Herkunft dieses Müntztyps. Dorfmann (1933) sah zwar Ähnlichkeiten mit Geprägen Herzog Friedrich Ulrichs von Braunschweig-Wolfenbüttel, ordnete
        den Typ aber dennoch Sachsen-Lauenburg zu. Bornemann (1935) widersprach: Der Stil spreche für eine braunschweigische Müntzstätte, und wegen des Wappens vermutete er eine Auftragsprägung für einen
        sächsischen Fürsten, am ehesten Herzog Friedrich von Sachsen-Altenburg.'
      en: 'Kraaz (1895) first proposed a Lauenburg origin for this coin type. Dorfmann (1933) noted similarities with issues of Duke Friedrich Ulrich of Braunschweig-Wolfenbüttel yet still assigned the
        type to Saxe-Lauenburg. Bornemann (1935) disagreed: the style pointed to a Brunswick mint, and from the arms he inferred a commissioned strike for a Saxon prince, most likely Duke Friedrich of Saxe-Altenburg.'
      uk: 'Kraaz (1895) вперше припустив лауенбурзьке походження цього типу. Dorfmann (1933), хоч і бачив подібність до карбувань герцога Friedrich Ulrich von Braunschweig-Wolfenbüttel, усе ж відніс тип
        до Saxe-Lauenburg. Bornemann (1935) заперечив: стиль вказує на брауншвейзький монетний двір, а з огляду на герб він припустив замовне карбування для саксонського князя, найімовірніше герцога Friedrich
        von Sachsen-Altenburg.'
    verification_note: *id001
    composed_of:
      - unified-ikmk-18283601
      - unified-ikmk-18286826
