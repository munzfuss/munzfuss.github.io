    inscription_obv: IOACH D G MARC BRAN [EL]ECT
    inscription_rev: FERDI IMP AVG P F DECRE
    note:
      de: Im Zuge der Reichsmüntzreformen des 16. Jahrhunderts sollte per kaiserlichem Dekret in ganz Deutschland die süddeutsch-österreichische Kreuzerwährung eingeführt werden. In den nach Groschen 
        und Schillingen rechnenden mittel- und norddeutschen Territorien paßte sie nicht in das Währungssystem und wurde dort meist ignoriert. Kurfürst Joachim II. versuchte aus Kaisertreue, die 
        Kreuzerwährung in Brandenburg zu etablieren, doch konnten sich diese Müntzen im Zahlungsverkehr nicht durchsetzen.
      en: In the course of the imperial coinage reforms of the 16th century, an imperial decree was to introduce the South German–Austrian Kreuzer currency throughout Germany. In the central and 
        northern German territories, which reckoned in Groschen and Schilling, it did not fit the monetary system and was mostly ignored. Out of loyalty to the emperor, Elector Joachim II tried to 
        establish the Kreuzer currency in Brandenburg, but these coins failed to gain acceptance in payments.
      uk: У ході імперських монетних реформ XVI століття імператорським декретом мали запровадити по всій Німеччині південнонімецько-австрійську валюту Kreuzer. У центрально- та північнонімецьких 
        землях, що рахували в Groschen і Schilling, вона не вписувалася в грошову систему й здебільшого ігнорувалася. З відданості імператорові курфюрст Joachim II спробував утвердити валюту Kreuzer у
        Brandenburg, проте ці монети не прижилися в платіжному обігу.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18224485
