    inscription_obv: CONIUNCTIO FELIX
    inscription_rev: NVPTIARVM / SOLENNIA CELEBR / COBVRGI / MDCCLIV
    note:
      de: Auf die Vermählung der Friederike Karoline von Sachsen-Coburg-Saalfeld mit dem Markgrafen Christian Friedrich Carl Alexander von Brandenburg-Ansbach 1754 stellte der Müntzmeister Johann 
        Christian Eberhardt in der Saalfelder Müntze Doppeldukaten, Dukaten und Silberabschläge her. Da das Stück in Saalfeld und offensichtlich im Auftrag des Brautvaters entstand, gehört es in die 
        Müntzreihe Sachsen-Coburg-Gothas, nicht in die von Brandenburg-Ansbach.
      en: For the marriage of Friederike Karoline of Saxe-Coburg-Saalfeld to Margrave Christian Friedrich Carl Alexander of Brandenburg-Ansbach in 1754, the mint master Johann Christian Eberhardt 
        produced double ducats, ducats and silver off-strikes at the Saalfeld mint. As the piece was made in Saalfeld, evidently commissioned by the bride's father, it belongs to the coinage of 
        Saxe-Coburg-Gotha, not to that of Brandenburg-Ansbach.
      uk: З нагоди шлюбу Friederike Karoline von Sachsen-Coburg-Saalfeld із маркграфом Christian Friedrich Carl Alexander von Brandenburg-Ansbach 1754 року монетний майстер Johann Christian Eberhardt 
        виготовив на монетному дворі Saalfeld подвійні дукати, дукати та срібні відбитки. Оскільки монету зроблено в Saalfeld і вочевидь на замовлення батька нареченої, вона належить до карбування 
        Sachsen-Coburg-Gotha, а не Brandenburg-Ansbach.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18224404
