    inscription_obv: WILHELM KOENIG - AUGUSTA KOENIGIN V PREUSSEN
    inscription_rev: SUUM - CUIQUE - KROENUNGS-THALER 1861
    note:
      de: Seit 1701 erste (und letzte) Gedenkmüntze auf eine preußische Königskrönung. Am 18. Oktober 1861 wurden Wilhelm I. und seine Gemahlin Augusta in Königsberg gekrönt. Augusta von 
        Sachsen-Weimar-Eisenach, geboren 1811 in Weimar, gestorben 1890 in Berlin, war die Mutter Kaiser Friedrichs III. und Luises, der Großherzogin von Baden, sowie Großmutter Wilhelms II. von 
        Preußen. Die liberale Königin galt als Gegnerin des Kanzlers Bismarck und wurde von diesem ebenso gehaßt; als preußische Königin, die Kriege ablehnte, gründete sie 1864 den Vaterländischen 
        Frauenverein.
      en: The first (and last) commemorative coin on a Prussian royal coronation since 1701. On 18 October 1861 Wilhelm I and his consort Augusta were crowned at Königsberg. Augusta of 
        Saxe-Weimar-Eisenach, born 1811 in Weimar, died 1890 in Berlin, was the mother of Emperor Friedrich III and of Luise, Grand Duchess of Baden, and grandmother of Wilhelm II of Prussia. The 
        liberal queen was regarded as an opponent of Chancellor Bismarck and was hated by him accordingly; as Prussian queen, who rejected wars, she founded the Patriotic Women's Association in 1864.
      uk: Перша (і остання) від 1701 року пам'ятна монета на честь прусської королівської коронації. 18 жовтня 1861 року Wilhelm I та його дружину Augusta коронували в Königsberg. Augusta von 
        Sachsen-Weimar-Eisenach, народжена 1811 року у Ваймарі, померла 1890 року в Берліні, була матір'ю імператора Friedrich III і Luise, великої герцогині Баденської, та бабусею Wilhelm II 
        Прусського. Ліберальну королеву вважали супротивницею канцлера Bismarck, і він так само її ненавидів; як прусська королева, що заперечувала війни, вона 1864 року заснувала Вітчизняне жіноче 
        товариство.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18214677
