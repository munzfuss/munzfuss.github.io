    inscription_obv: + FRIEDRICH I 1701 - WILHELM II 1901
    inscription_rev: DEUTSCHES - REICH 1901 - FÜNF MARK
    note:
      de: Die Gedenkmüntzen auf das zweihundertjährige Jubiläum des Königreichs Preußen entstanden auf Anregung der Berliner Müntze. Eine Anfrage kam vor den Kaiser, der die Prägung wünschte; biß zum 
        Jubiläum blieb nur ein Vierteljahr. Die Entwürfe von Emil Döpler, mit eigenhändigen Korrekturen des Kaisers, wurden vom Müntzmedailleur Schultz umgesetzt und in Sonn- und Feiertagsarbeit 
        rechtzeitig fertiggestellt; die Prägungen wurden von der Bevölkerung stark nachgefragt.
      en: The commemorative coins for the bicentenary of the Kingdom of Prussia arose on the initiative of the Berlin Mint. An enquiry reached the Kaiser, who wished the coinage struck; only a quarter
        of a year remained until the jubilee. The designs by Emil Döpler, with the Kaiser's own corrections, were executed by the mint medallist Schultz and completed in time through Sunday and 
        holiday work; the strikings were in strong demand among the population.
      uk: Пам'ятні монети до двохсотліття Королівства Пруссія постали з ініціативи Берлінського монетного двору. Запит дійшов до кайзера, який побажав карбування; до ювілею лишалася тільки чверть 
        року. Проєкти Emil Döpler з власноручними правками кайзера втілив монетний медальєр Schultz, завершивши їх вчасно завдяки праці в неділі та свята; карбування мали великий попит серед 
        населення.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18201784
