    inscription_obv: L AVXILIVM F BRAV H NAV Z ANOBIS S - 9 / IM (MAY) VF
    note:
      de: Die Klippen wurden 1743 vom Kommandanten der bayerischen Besatzung von Braunau, Ludwig Friedrich, Herzog von Sachsen-Hildburghausen, während des Österreichischen Erbfolgekrieges geschlagen. 
        Er war kaiserlicher und kurbayerischer General-Feldzeugmeister. Die Bayern waren von der Armee des Erzherzogs Karl von Österreich unter General Khevenhüller geschlagen worden. Um seine Truppen
        bezahlen zu können, ließ er sowohl aus seinem Tafelservice als auch aus Kirchen- und Innungssilber Klippen schlagen.
      en: The Klippen were struck in 1743 by the commander of the Bavarian garrison of Braunau, Ludwig Friedrich, Duke of Saxe-Hildburghausen, during the War of the Austrian Succession. He was 
        imperial and Electoral-Bavarian master-general of ordnance. The Bavarians had been defeated by the army of Archduke Charles of Austria under General Khevenhüller. To pay his troops he had 
        Klippen struck both from his table service and from church and guild silver.
      uk: Klippen викарбував 1743 року комендант баварської залоги Браунау Людвіг Фрідріх, герцог Саксен-Гільдбурггаузен, під час війни за австрійську спадщину. Він був імперським і 
        курфюрстсько-баварським генерал-фельдцейхмейстером. Баварців розбила армія ерцгерцога Карла Австрійського під командуванням генерала Кевенгюллера. Щоб платити війську, він наказав карбувати 
        Klippen як зі свого столового сервізу, так і з церковного та цехового срібла.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18200862
