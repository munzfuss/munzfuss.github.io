    inscription_obv: ALBERTVS DEI GRA - DVX FRIEDLANDIAE
    inscription_rev: SACRI ROMANI IMPE PRINCEPS 1627
    note:
      de: 'Albrecht Wenzel Eusebius von Waldstein (Wallenstein), geboren 1583, ist der bekannteste Feldherr des Dreißigjährigen Krieges. Seit dessen Beginn 1618 kämpfte er auf der Seite der Katholischen
        Liga und Kaiser Ferdinands II. und machte in den 1620er Jahren eine steile Karriere: seit 1625 kaiserlicher General, wurde er in den Reichsfürstenstand erhoben und erhielt bedeutende Territorien
        und Privilegien. Seinen böhmischen Stammsitz Gitschin baute er zu einem Musterbetrieb des Absolutismus aus.'
      en: "Albrecht Wenzel Eusebius von Waldstein (Wallenstein), born in 1583, is the best-known general of the Thirty Years' War. From its outbreak in 1618 he fought on the side of the Catholic League
        and Emperor Ferdinand II and rose rapidly in the 1620s: imperial general from 1625, he was raised to the rank of imperial prince and received important territories and privileges. He developed his
        Bohemian seat at Gitschin into a model estate of absolutism."
      uk: "Albrecht Wenzel Eusebius von Waldstein (Wallenstein), народжений 1583 року, — найвідоміший полководець Тридцятилітньої війни. Від її початку 1618 року він воював на боці Католицької ліги та імператора
        Ferdinand II і у 1620-х роках зробив стрімку кар'єру: з 1625 року імперський генерал, він був піднесений до стану імперського князя й отримав значні території та привілеї. Свою чеську резиденцію
        Gitschin він розбудував на взірцеве господарство абсолютизму."
    verification_note: *id001
    composed_of:
      - unified-ikmk-18224821
