      en: After the piece long known in the Coin Cabinet of the Hermitage in St Petersburg, this second known specimen surfaced in 1997. It shows a strong striking fault (double strike) that 
        considerably impairs the obverse portrait and the legends on both sides. It is attributed to the Frankfurt an der Oder mint.
      uk: Після штуки, здавна відомої в Монетному кабінеті Ермітажу в Санкт-Петербурзі, 1997 року з'явився цей другий відомий екземпляр. Він має сильний карбувальний дефект (подвійний удар), що значно
        псує погруддя аверсу та леґенду з обох боків. Його атрибутують монетному двору Frankfurt an der Oder.
