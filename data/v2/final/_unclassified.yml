    note:
      de: Wegen der Unleserlichkeiten ist eine genauere Bestimmung nicht möglich; die Eingrenzung erfolgte anhand der verwendeten Trennzeichen. Nach Grimm (2004) läßt sich die Müntze der Müntzstätte 
        Clingen zuweisen, da nur dort die aneinandergereihten VV das W in SCHWART ersetzen; geprägt wurde sie von einem unbekannten Pächter der Müntzstätte.
      en: Because of the illegible passages a more precise determination is not possible; the attribution rests on the divider marks used. According to Grimm (2004) the coin can be assigned to the 
        mint of Clingen, since only there the strung-together VV replace the W in SCHWART; it was struck by an unknown lessee of the mint.
      uk: Через нерозбірливі місця точніше визначення неможливе; звуження зроблено за використаними розділовими знаками. За Grimm (2004), монету можна віднести до монетного двору Clingen, бо лише там 
        поставлені поряд VV заміняють W у SCHWART; її карбував невідомий орендар монетного двору.
    verification_note: *id004
    composed_of:
