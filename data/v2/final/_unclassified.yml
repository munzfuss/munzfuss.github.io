        mintmaster active in Dortmund and Mülheim am Rhein.
      uk: Знак монетника у вигляді двох схрещених ливарних гачків на реверсі досі не витлумачено однозначно, проте, за Ilisch, його з високою ймовірністю можна віднести до монетника Johann Longerich, 
        який працював у Dortmund і Mülheim am Rhein.
