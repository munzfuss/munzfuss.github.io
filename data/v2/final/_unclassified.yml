    inscription_obv: FRIED WILHELM KOENIG VON PREUSSEN
    note:
      de: Massenprägung eines preußischen Friedrichsdor unter König Friedrich Wilhelm II. Nach dem Gesetz von 1770 sollte ein Friedrichsdor 6,682 Gramm wiegen (902,778/1000) und durfte durch Abnutzung
        höchstens 1½ As (0,0872 g) verlieren; lag der Verlust höher, mußte die Müntze nicht angenommen werden. Zur schnellen Gewichtskontrolle prägte die Berliner Müntze ab 1750 sogenannte Norm- und 
        Passiergewichte aus Messing, die Banken und Kaufleute erwerben konnten.
      en: A mass issue of a Prussian Friedrichsdor under King Friedrich Wilhelm II. Under the law of 1770 a Friedrichsdor was to weigh 6.682 grams (902.778/1000) and might lose at most 1½ As (0.0872 
        g) through wear; if the loss was greater, the coin need not be accepted. For quick weight control the Berlin mint from 1750 struck so-called standard and passing weights in brass, which banks 
        and merchants could obtain.
      uk: Масове карбування прусського Friedrichsdor за короля Friedrich Wilhelm II. За законом 1770 року Friedrichsdor мав важити 6,682 грама (902,778/1000) і від зносу міг втратити щонайбільше 1½ As
