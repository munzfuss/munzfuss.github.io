    inscription_obv: MON - NO ARG - R D H AB - [IN W ET] - HEL
    inscription_rev: MATH I D G [ELEC ROM IM]P SEMP AVGV
    note:
      de: 'Das Müntzmeisterzeichen Lilie läßt sich der Müntzmeisterfamilie Wintgens zuordnen, wegen der fehlenden Datierung jedoch nicht einem bestimmten Wintgens: Zwischen 1613/14 und dem 7. Oktober 1615
        prägte Heinrich Wintgens die Werdener Müntzen in Mülheim am Rhein, danach kurzzeitig sein Sohn Balthasar Wintgens, der wiederum von seinem Bruder Johann Wintgens abgelöst wurde.'
      en: "The mintmaster's mark of a lily can be assigned to the Wintgens family of mintmasters, but — for want of a date — not to a particular Wintgens: between 1613/14 and 7 October 1615 Heinrich Wintgens
        struck the Werden coins at Mülheim am Rhein, then briefly his son Balthasar Wintgens, who in turn was succeeded by his brother Johann Wintgens."
      uk: 'Знак монетника у вигляді лілії можна віднести до родини монетників Wintgens, але через відсутність дати — не до конкретного Wintgens: між 1613/14 і 7 жовтня 1615 року монети Werden карбував Heinrich
        Wintgens у Mülheim am Rhein, потім недовго його син Balthasar Wintgens, якого змінив брат Johann Wintgens.'
    verification_note: *id001
    composed_of:
      - unified-ikmk-18283811
