    inscription_rev: + GRO-S COM-ITIS-TIROL
    note:
      de: 'Der Sechser (6 Kreuzer) wird auch als „kleiner Groschen“ bezeichnet. Er war die erfolgreichste Sorte der Müntzreform Erzherzog Sigismunds: die Ausprägung begann 1482, dauerte biß mindestens zum
        Tode des Erzherzogs 1496 an und umfaßt zahlreiche Stempel.'
      en: "The Sechser (6 Kreuzer) is also called the 'little Groschen'. It was the most successful denomination of Archduke Sigismund's coinage reform: minting began in 1482, continued at least until the
        archduke's death in 1496, and encompasses numerous dies."
      uk: 'Sechser (6 Kreuzer) називають також «малим Groschen». Це був найуспішніший номінал монетної реформи ерцгерцога Sigismund: карбування почалося 1482 року, тривало щонайменше до смерті ерцгерцога
        1496 року й охоплює численні штемпелі.'
