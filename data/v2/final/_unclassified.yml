    inscription_obv: FRIDERI-CVS - GEOR-GIVS IOH-ANNES
    inscription_rev: MONET - ARGENT - DVCVM - SAXONI
    note:
      de: Ungewöhnlich kleiner Schrötling. Der Typ ohne Müntzmeisterzeichen dürfte an den Anfang der Prägungen Friedrichs III. mit den Herzögen Johann und Georg gehören; abgesehen von der 
        Vorderseiten-Umschrift ähnelt er dem zwischen 1500 und 1507 geprägten Thaler Friedrichs III. mit den Herzögen Georg und Johann.
      en: An unusually small flan. The type, lacking a mintmaster's mark, probably belongs to the beginning of the coinage of Friedrich III with the Dukes Johann and Georg; apart from the obverse 
        legend it resembles the Thaler of Friedrich III with the Dukes Georg and Johann struck between 1500 and 1507.
      uk: Незвично малий кружок. Тип без знака монетника, ймовірно, належить до початку карбування Friedrich III з герцогами Johann і Georg; окрім легенди аверсу, він подібний до Thaler Friedrich III 
        з герцогами Georg і Johann, карбованого між 1500 і 1507 роками.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18203544
