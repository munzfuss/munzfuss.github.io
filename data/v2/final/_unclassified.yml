    inscription_obv: MO NO REIP MAGDE - DE IVBILAEO Ao C 1617
    inscription_rev: CENT ANN REU DEO ET MIHI RESP UAT IOAN HUSSY AO 1415 COMBUST / HIS LAP D M LUTHER AD REP DOCT COE A DEO EXCIT AO 1517
    note:
      de: 'Übersetzung der Rückseitenumschrift: „Einhundert Jahre sind vergangen, seit Johannes Hus in Antwort auf Gott und mich im Jahre 1415 verbrannt wurde. Nach seinem Falle wurde Doktor Martin Luther
        von Gott inspiriert, die himmlische Lehre zu reinigen im Jahre 1517.“ Zur Zweihundertjahrfeier der Reformation prägten, wie schon ein Jahrhundert zuvor, mehrere Herrscher und Städte die Reformation
        und Martin Luther verherrlichende Gedenkmüntzen. Auf dieser Müntze der Stadt Magdeburg ist neben Luther auch der tschechische Reformator Jan Hus abgebildet.'
      en: "Translation of the reverse legend: 'One hundred years have passed since Johannes Hus was burned in answer to God and me in the year 1415. After his fall, Doctor Martin Luther was inspired by
        God to purify the heavenly doctrine in the year 1517.' For the bicentenary of the Reformation, as a century before, several rulers and cities struck commemorative coins glorifying the Reformation
        and Martin Luther. On this coin of the city of Magdeburg, besides Luther, the Czech reformer Jan Hus is also depicted."
      uk: "Переклад напису реверсу: «Минуло сто років, відколи Johannes Hus був спалений в ім'я Бога й моє в році 1415. Після його падіння доктор Martin Luther був натхнений Богом очистити небесне вчення
        в році 1517». До двохсотліття Реформації, як і століттям раніше, кілька правителів і міст карбували пам'ятні монети, що прославляли Реформацію та Martin Luther. На цій монеті міста Magdeburg поряд
        із Luther зображено також чеського реформатора Jan Hus."
    verification_note: *id001
    composed_of:
      - unified-ikmk-18206020
