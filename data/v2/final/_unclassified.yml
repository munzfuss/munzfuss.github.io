    inscription_obv: DOMINUS - PROVIDEBIT
    inscription_rev: IIII MARCK DANSKE 1669
    note:
      de: Keine offizielle Prägung der königlichen Müntzstätte in Christiania (Oslo), sondern das Erzeugnis einer professionellen „Heckenmüntzstätte“ in Norddeutschland. Während die offiziellen 
        Gepräge dort biß zur Schließung der Müntzstätte 1695 mit losem Stempel hergestellt wurden, sind diese Nachahmungen mit fester Stempelstellung (12 bzw. 6 Uhr) geprägt.
      en: Not an official issue of the royal mint at Christiania (Oslo) but the product of a professional clandestine mint (Heckenmünzstätte) in northern Germany. Whereas the official issues there 
        were struck with loose dies until the mint closed in 1695, these imitations have a fixed die axis (12 or 6 o'clock).
      uk: Це не офіційне карбування королівського монетного двору в Christiania (Oslo), а виріб професійного нелегального монетного двору («Heckenmünzstätte») у Північній Німеччині. Тоді як офіційні 
        випуски там аж до закриття двору 1695 року карбували вільним штемпелем, ці наслідування мають фіксоване положення штемпеля (на 12 чи 6 годині).
    verification_note: *id001
    composed_of:
      - unified-ikmk-18219876
