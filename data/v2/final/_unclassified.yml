    inscription_obv: KARL KOENIG VON WUERTTEMBERG
    inscription_rev: DEUTSCHES - REICH 1877 - 5 MARK
    note:
      de: Das Gesetz über die Ausprägung von Goldmüntzen vom 4. Dezember 1871 führte im Deutschen Reich die Goldwährung ein; ausgegeben wurden Goldmüntzen zu 20, 10 und 5 Mark. Ihre offizielle 
        Bezeichnung als Doppelkrone, Krone und halbe Krone setzte sich nicht durch. Alle Reichsgoldmüntzen wurden in einer Legierung von 900 Teilen Gold und 100 Teilen Kupfer geprägt.
      en: The law on the minting of gold coins of 4 December 1871 introduced the gold standard in the German Empire; gold coins of 20, 10 and 5 Mark were issued. Their official designations as 
        Doppelkrone, Krone and half Krone did not catch on. All imperial gold coins were struck in an alloy of 900 parts gold and 100 parts copper.
      uk: Закон про карбування золотих монет від 4 грудня 1871 року запровадив у Німецькій імперії золотий стандарт; випускали золоті монети по 20, 10 і 5 Mark. Їхні офіційні назви Doppelkrone, Krone 
        та піврова Krone не прижилися. Усі імперські золоті монети карбували у сплаві з 900 частин золота і 100 частин міді.
    verification_note: *id001
    composed_of:
