    inscription_obv: IOACHIM MARC BRAN ELECTOR 5Z
    inscription_rev: CAROLI V IMP AVG P F DECRETO
    note:
      de: Ein Original dieses Goldguldens war biß 1901 unbekannt, weshalb die ältere Literatur die auf Köhler (1759) zurückgehende fehlerhafte Beschreibung tradiert, in der die Jahreszahl nicht als 
        Zahl, sondern als EZ gelesen ist. Das 1901 im Fund von Fulda aufgetauchte und in die Sammlung Ströhlin gelangte Stück wurde 1905 vom Müntzkabinett erworben; ein zweites Exemplar liegt in der 
        Ermitage in Sankt Petersburg. Die Rückseitenumschrift zeigt an, daß die Müntze nach den Bestimmungen der Reichsmüntzordnung Kaiser Karls V. von 1551 geprägt wurde.
      en: An original of this Goldgulden was unknown until 1901, so the older literature transmits the faulty description going back to Köhler (1759), in which the date is read not as a number but as 
        'EZ'. The piece that surfaced in 1901 in the Fulda hoard and passed into the Ströhlin collection was acquired by the Coin Cabinet in 1905; a second specimen is in the Hermitage in St 
        Petersburg. The reverse legend indicates that the coin was struck according to the provisions of Emperor Karl V's Reichsmünzordnung of 1551.
      uk: Оригінал цього Goldgulden був невідомий до 1901 року, тому старіша література передає хибний опис, що сягає Köhler (1759), у якому дату прочитано не як число, а як «EZ». Штуку, що з'явилася 
        1901 року у скарбі з Fulda і потрапила до збірки Ströhlin, Монетний кабінет придбав 1905 року; другий екземпляр зберігається в Ермітажі в Санкт-Петербурзі. Напис реверсу вказує, що монету 
        викарбувано за приписами Reichsmünzordnung імператора Karl V від 1551 року.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18205824
