    inscription_obv: CHRISTIAN HERTZ ZV BRAVNSCHW V LVNENB
    inscription_rev: TOVT AVEC DIEV 1622
    note:
      de: Die sogenannten Pfaffenfeindthaler sind als Spottmüntzen auf die katholische Geistlichkeit (die „Pfaffen“) von dem braunschweigischen Herzog geprägt worden und wurden aus Kirchensilber — 
        eingeschmolzenem Kirchengerät und -schmuck — geprägt, das vor allem aus dem Paderborner Dom stammen soll. Die Müntzstätte Lippstadt ist nicht gesichert. Im Dreißigjährigen Krieg überzog der 
        Herzog vor allem das westfälische Land mit seinen Soldaten und ließ aus dem gestohlenen Kirchensilber Müntzen prägen; wegen seiner Zügellosigkeit ist er als der „tolle Christian“ bekannt.
      en: The so-called Pfaffenfeindtaler were struck by the Brunswick duke as mocking coins against the Catholic clergy (the 'Pfaffen') and were made from church silver — melted-down church vessels 
        and ornaments — said to come mainly from Paderborn Cathedral. The mint of Lippstadt is not certain. During the Thirty Years' War the duke overran the Westphalian lands especially with his 
        soldiers and had coins struck from the stolen church silver; because of his unruliness he is known as 'mad Christian'.
      uk: Так звані Pfaffenfeindtaler карбував брауншвейзький герцог як глузливі монети проти католицького духовенства («Pfaffen»); їх виготовляли з церковного срібла — переплавленого церковного 
        начиння та оздоб, — яке нібито походило переважно з Падерборнського собору. Монетний двір Lippstadt не встановлено певно. Під час Тридцятилітньої війни герцог особливо спустошив вестфальські 
        землі своїми солдатами й наказував карбувати монети з викраденого церковного срібла; через свою нестримність він відомий як «шалений Christian».
    verification_note: *id001
    composed_of:
      - unified-ikmk-18206035
