    inscription_obv: MONAST WESTPH OBSESSVM
    note:
      de: Münster wollte nach der Wahl des Kaisers Leopold mit Holland und Schweden ein Bündnis eingehen, was schließlich zur Verhängung der Reichsacht und zur Belagerung der Stadt durch den Bischof 
        von Galen und die kaiserlichen Truppen führte. Fehlende Unterstützung zwang die Stadt 1661 zur Übergabe. Die Notmüntzen in der Stadt sollen aus dem Silber der Bürger, Kirchen und Innungen 
        geprägt worden sein, in erster Linie aber aus Gold- und Silbergeschirr und Müntzen der Geistlichkeit, die die Stadt verlassen hatte.
      en: After the election of Emperor Leopold, Münster sought to form an alliance with Holland and Sweden, which ultimately led to the imposition of the imperial ban and the siege of the city by the
        Bishop von Galen and imperial troops. Lack of support forced the city to surrender in 1661. The emergency coins are said to have been struck from the silver of the citizens, churches and 
        guilds, but chiefly from the gold and silver plate and coin of the clergy who had left the city.
      uk: Після обрання імператора Леопольда Мюнстер прагнув укласти союз із Голландією та Швецією, що зрештою призвело до накладення імперської опали та облоги міста єпископом фон Галеном і 
        імперськими військами. Брак підтримки змусив місто 1661 року здатися. Облогові монети, як кажуть, викарбувано зі срібла містян, церков і цехів, але передусім із золотого й срібного посуду та 
        монет духівництва, що залишило місто.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18200580
