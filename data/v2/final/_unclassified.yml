    inscription_obv: LUDOVICA D G MAR AC ELEC BRAN NAT PR ARAUS
    inscription_rev: NAT HAGAE Ao 1627 / 17 NOV NUPTA / IBID 1646 27 NOV / DENA COLO A SPRE / Ao 1667 8 IUNII
    note:
      de: Kurfürstin Luise Henriette (1627–1667), geborene Gräfin von Oranien-Nassau, heiratete mit 19 Jahren den Großen Kurfürsten Friedrich Wilhelm und war ihm eine wichtige politische Beraterin. 
        1650 schenkte ihr der Kurfürst das Amt Bötzow bei Berlin, wo sie ein Schloß im holländischen Stil errichten ließ und es „Oranienburg“ nannte; der Ort nahm später diesen Namen an. Sie war die 
        Mutter des ersten preußischen Königs Friedrich I.
      en: Electress Luise Henriette (1627–1667), born Countess of Orange-Nassau, married the Great Elector Friedrich Wilhelm at the age of 19 and became an important political adviser to him. In 1650 
        the Elector gave her the district of Bötzow near Berlin, where she had a palace built in the Dutch style and named it 'Oranienburg'; the town later took that name. She was the mother of the 
        first Prussian king, Friedrich I.
      uk: Курфюрстина Luise Henriette (1627–1667), уроджена графиня Oranien-Nassau, у 19 років одружилася з великим курфюрстом Friedrich Wilhelm і стала його важливою політичною радницею. 1650 року 
        курфюрст подарував їй округ Bötzow під Берліном, де вона звела палац у голландському стилі й назвала його «Oranienburg»; згодом цю назву прийняло й місто. Вона була матір'ю першого прусського 
        короля Friedrich I.
    verification_note: *id001
