    note:
      de: Jefimok (Plural Jefimki) ist die russische Bezeichnung für den Thaler (Jefim = Joachim, nach dem Joachimsthaler). Der Handel mit diesen Thalern war ein russisches Staatsmonopol; 1655 wurden 
        aus dem Staatsschatz europäische Thalermüntzen mit einem Kopekenstempel (Zar zu Pferde) und einem länglichen Stempel mit der Jahreszahl „1655“ überprägt und galten je 64 Kopeken. 1659 wurden 
        die Jefimki offiziell verboten, blieben aber vor allem in der Ukraine länger im Umlauf.
      en: Jefimok (plural Jefimki) is the Russian term for the Thaler (Jefim = Joachim, after the Joachimsthaler). Trade in these Thaler was a Russian state monopoly; in 1655 European Thaler from the 
        state treasury were overstruck with a kopeck stamp (the tsar on horseback) and an oblong stamp bearing the year '1655' and passed for 64 kopecks each. In 1659 the Jefimki were officially 
        banned but remained in circulation longer, especially in Ukraine.
      uk: Jefimok (мн. Jefimki) — російська назва Thaler (Jefim = Йоахим, від Joachimsthaler). Торгівля цими Thaler була російською державною монополією; 1655 року європейські Thaler з державної 
        скарбниці надкарбовували копійчаним штемпелем (цар на коні) та довгастим штемпелем із роком «1655» і вони йшли по 64 копійки кожен. 1659 року Jefimki офіційно заборонили, проте вони довше 
        залишалися в обігу, надто в Україні.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18234771
