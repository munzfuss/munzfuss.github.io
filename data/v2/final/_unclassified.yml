    inscription_obv: BERNHARD9 D - G D S I C M A ET W
    inscription_rev: TEMPL S S TRIN ELISABETHAEBVRGI CONSECR D LX NOV 1692 / TVRRIS FORTISSIMA NOMEN DOMINI
    note:
      de: Auf die Einweihung der Schloßkirche am 9. November 1692 und damit die Vollendung der Gesamtanlage wurden Doppeldukaten, Dukaten, Thaler und Groschen geprägt; der Grundstein war 1682 gelegt 
        worden, und die Gedenkstücke wurden in den Turmknopf eingelegt. Die Stempel schuf Christian Wermuth. Das Schloß ist nach der zweiten Gemahlin des Herzogs, Elisabeth Eleonore von 
        Braunschweig-Wolfenbüttel, benannt.
      en: For the consecration of the palace church on 9 November 1692 — completing the whole complex — double ducats, ducats, Thaler and Groschen were struck; the foundation stone had been laid in 
        1682, and the commemorative pieces were placed in the tower knob. The dies were made by Christian Wermuth. The palace is named after the duke's second wife, Elisabeth Eleonore von 
        Braunschweig-Wolfenbüttel.
      uk: На освячення палацової церкви 9 листопада 1692 року — що завершило весь ансамбль — викарбували подвійні дукати, дукати, Thaler і Groschen; наріжний камінь було закладено 1682 року, а 
        пам'ятні монети вклали в маківку вежі. Штемпелі виконав Christian Wermuth. Палац названо на честь другої дружини герцога, Elisabeth Eleonore von Braunschweig-Wolfenbüttel.
    verification_note: *id001
    composed_of:
