    inscription_rev: 12 / EINEN / REICHS/THALER
    note:
      de: Nach Berghaus wurde das Stück 1922 in Osteel, Altendeich (Kreis Norden), gemeinsam mit fünf Gold- und ca. 450–500 Silbermüntzen sowie zwei weiteren 1/12 Thalern dieses Typs unter einem 
        Pflasterweg in einem zweihenkeligen, innen bräunlich glasierten Tongefäß gefunden. Der Schatz wurde zwischen Grundeigentümer und Findern aufgeteilt.
      en: According to Berghaus, the piece was found in 1922 at Osteel, Altendeich (Kreis Norden), together with five gold and some 450–500 silver coins and two further 1/12 Thalers of this type, 
        buried under a paved path in a two-handled clay vessel glazed brownish inside. The hoard was divided between the landowner and the finders.
      uk: За Berghaus, монету знайдено 1922 року в Osteel, Altendeich (Kreis Norden) разом із пʼятьма золотими та близько 450–500 срібними монетами й ще двома 1/12 Thaler цього типу під брукованою 
        доріжкою у двовухому глиняному глеку, зсередини вкритому коричнюватою глазурʼю. Скарб поділили між власником землі та знахідцями.
