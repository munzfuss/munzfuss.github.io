    inscription_obv: GEORG II D G M B F ET H REX F D
    inscription_rev: BRUNS ET LUN DUX S R I A T ET EL -/ IIII GOLD/GULDEN / 8 THALER / N D R FUS
    note:
      de: 'Die Goldgulden des Herzogs Georg August von Braunschweig-Lüneburg — als Georg II. König von England (1727–1760) — vermittelten zwischen bestehenden Goldmüntzen: ein bayerischer Maxdor (5,009
        g Feingold) galt etwa zwei Goldgulden oder vier Silberthaler nach dem 12-Thalerfuß, ein Karolin (7,504 g Feingold) dagegen 3 Goldgulden bzw. 6 Silberthaler. Eigens für die Goldprägung ließ Georg
        II. die Müntze in Hannover nach Jahren der Schließung wieder instand setzen, da die günstigen Goldpreise Gewinn erhoffen ließen.'
      en: 'The gold gulden of Duke Georg August of Brunswick-Lüneburg — as George II, King of England (1727–1760) — mediated between existing gold coins: a Bavarian Maxdor (5.009 g fine gold) was worth
        about two gold gulden or four silver Thaler on the 12-Thalerfuß, whereas a Karolin (7.504 g fine gold) equalled 3 gold gulden or 6 silver Thaler. Expressly for this gold coinage George II had the
        Hanover mint restored after years of closure, since the favourable gold prices promised a profit.'
      uk: 'Золоті Gulden герцога Georg August von Braunschweig-Lüneburg — як George II, короля Англії (1727–1760) — посідали проміжне місце між наявними золотими монетами: баварський Maxdor (5,009 г чистого
        золота) дорівнював близько двох золотих Gulden або чотирьох срібних Thaler за 12-Thalerfuß, натомість Karolin (7,504 г чистого золота) — 3 золотим Gulden чи 6 срібним Thaler. Задля цього золотого
        карбування George II звелів після років простою відновити монетний двір у Hannover, адже сприятливі ціни на золото обіцяли прибуток.'
    verification_note: *id001
    composed_of:
      - unified-ikmk-18224414
