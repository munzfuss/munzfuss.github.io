        Magdeburg mint. Ducats and half-ducats were produced alongside the double ducats. Sophia Dorothea later became Queen in Prussia and was the mother of Friedrich II.
      uk: Цей подвійний дукат карбували за короля Friedrich I (1701–1713) з нагоди весілля спадкоємця Friedrich Wilhelm із Sophia Dorothea von Hannover 28 листопада 1706 року — і не в Берліні, а на 
