    inscription_obv: FRIDERICUS BORUSSORUM REX
    inscription_rev: EIN BANCO THALER
    note:
      de: Eine der sogenannten Handelsmüntzen Friedrichs II., geschaffen als Einlage für die 1765 gegründete königliche Giro- und Lehnbank. Stempel von Jacob Abraham. Von diesen Bankothalern sollen 
        damals 100.000 Stück geprägt worden sein; 1787 wurden von den Originalstempeln 16 Exemplare nachgeprägt, wie dies auch beim Speciesthaler von 1755 der Fall war. 1790 wurden alle im 
        Staatsschatz befindlichen Exemplare der Bankothaler eingeschmolzen.
      en: One of the so-called trade coins of Friedrich II, created as a deposit for the royal Giro- und Lehnbank founded in 1765. Dies by Jacob Abraham. 100,000 of these Bankotaler are said to have 
        been struck at the time; in 1787, 16 specimens were restruck from the original dies, as was also the case with the Speziestaler of 1755. In 1790 all specimens of the Bankotaler held in the 
        state treasury were melted down.
      uk: Одна з так званих торгових монет Friedrich II, створена як внесок для королівського Giro- und Lehnbank, заснованого 1765 року. Штемпелі роботи Jacob Abraham. Цих Bankotaler тоді нібито 
        викарбували 100 000 штук; 1787 року з оригінальних штемпелів додатково викарбували 16 екземплярів, як це було й зі Speziestaler 1755 року. 1790 року всі екземпляри Bankotaler зі скарбниці 
        держави переплавили.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18205933
