    note:
      de: Während die Goldprägungen zu 5 Thaler (Augustdor) in neun Jahrgängen vorkommen, wurde der doppelte Augustdor (10 Thaler) nur mit den Jahreszahlen 1777, 1778 und 1779 ausgegeben. Er hatte ein
