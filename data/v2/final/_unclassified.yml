    inscription_obv: MINDA / OBSESSA / 1634
    inscription_rev: 8 / GROS/CHEN
    note:
      de: Während des Dreißigjährigen Krieges ist die Stadt Minden durch kaiserliche Truppen unter Oberst Waldecker besetzt und durch Herzog Georg von Braunschweig belagert worden. Der Oberst 
        kapitulierte, als die Lebensmittel knapp wurden. Die Müntzen wurden aus Geldmangel aus Silbergeschirr gefertigt.
      en: During the Thirty Years' War the city of Minden was occupied by imperial troops under Colonel Waldecker and besieged by Duke Georg of Brunswick. The colonel capitulated when provisions ran 
        short. For lack of money the coins were made from silver plate.
      uk: Під час Тридцятилітньої війни місто Мінден було зайняте імперськими військами під командуванням полковника Вальдекера й обложене герцогом Георгом Брауншвейзьким. Полковник капітулював, коли 
        забракло провіанту. Через брак грошей монети виготовили зі срібного посуду.
    verification_note: *id001
