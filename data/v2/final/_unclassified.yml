    inscription_rev: I VERDER DOBBELSCHILLING 1621
    note:
      de: Die kupfernen Doppelschillinge des Jahrgangs 1621 wurden eingezogen und davon Müntzen im Gesamtwert von 1.200 Reichsthalern gegengestempelt. Die gegengestempelten Stücke sollten bei 
        Zahlungen biß zu 9 Reichsthalern als vollwertig gelten; zugleich bestand die Möglichkeit, sie in Verden in Reichswährung umzutauschen.
      en: The copper Doppelschillinge of 1621 were withdrawn, and from them coins to a total value of 1,200 Reichsthaler were countermarked. The countermarked pieces were to be accepted at full value 
        in payments of up to 9 Reichsthaler; at the same time they could be exchanged for imperial currency at Verden.
      uk: Мідні Doppelschillinge випуску 1621 року вилучили, і з них контрамаркували монети на загальну суму 1200 Reichsthaler. Контрамарковані штуки мали прийматися за повну вартість у платежах до 9 
        Reichsthaler; водночас їх можна було обміняти на імперську валюту у Verden.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18288239
