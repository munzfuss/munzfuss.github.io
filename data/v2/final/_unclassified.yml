      uk: Так звані Guineadukaten, карбовані між 1682 і 1696 роками за данським зразком із золота бранденбурзької колонії в Африці, були особливо популярні й завжди мають на реверсі трищоглове 
        вітрильне судно; через це зображення їх також називають Schiffsdukaten (корабельні дукати).
