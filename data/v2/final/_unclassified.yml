    inscription_obv: FRID AVGVST D G DVX SAX ELECTOR
    inscription_rev: ZUR BELOHNUNG - DES FLEISSES // 1780 / V / EINE MARK FEIN
    note:
      de: Der breite Prämiendoppelthaler mit der Jahreszahl 1780 ist tatsächlich erst 1793 geprägt worden. Sein Vorläufer (1. Typ) wurde von dem Medailleur Johann Friedrich Stieler gefertigt; als der 
        Stempel aber schon nach wenigen Prägungen sprang, mußte der Nachfolger Stielers, der 1. Medailleur an der Dresdener Müntze, Friedrich Heinrich Krüger, neue Stempel schneiden. Der 
        Rückseitenstempel unterscheidet sich nur durch wenige Details vom Stielerschen. Geprägt wurden nur 20 Exemplare. Der Doppelthaler und ebenso die Thaler sind Prämien, also staatliche 
        Auszeichnungen für Verdienste.
      en: The broad Prämiendoppeltaler dated 1780 was in fact struck only in 1793. Its predecessor (1st type) was made by the medallist Johann Friedrich Stieler; but when the die cracked after only a 
        few strikings, Stieler's successor, the first medallist at the Dresden mint, Friedrich Heinrich Krüger, had to cut new dies. The reverse die differs only in a few details from Stieler's. Only 
        20 specimens were struck. The Doppeltaler, and likewise the Taler, are Prämien — that is, state awards for merit.
      uk: Широкий Prämiendoppeltaler з датою 1780 насправді викарбувано лише 1793 року. Його попередника (1-й тип) виготовив медальєр Johann Friedrich Stieler; коли ж штемпель тріснув уже після 
        кількох карбувань, наступник Stieler, перший медальєр Дрезденського монетного двору Friedrich Heinrich Krüger, мусив вирізати нові штемпелі. Реверсний штемпель відрізняється від Stieler лише 
        кількома деталями. Викарбувано лише 20 екземплярів. Doppeltaler, як і Taler, є Prämien — тобто державними відзнаками за заслуги.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18206246
