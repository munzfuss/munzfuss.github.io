    inscription_obv: FRIEDRICH WILH V G G GROSSH V MECKLENB STRL
    inscription_rev: EIN THALER XXX EIN PF F - 1870
    note:
      de: 'Der Orden des blauen Hosenbandes wurde 1348 durch den englischen König Edward III. begründet und ist der älteste und bekannteste Ritterorden der Welt. Der Wahlspruch heißt übersetzt etwa: Ein
        Schelm, wer Arges dabei denkt. Anlaß der Stiftung war ein auf einem Bankett verlorenes Strumpfband der Gräfin Salisbury, das der König aufhob. Aufgenommen wurden nur Familienmitglieder, hochgestellte
        Persönlichkeiten und ausländische Staatsoberhäupter; die Ernennung fand am Tag des heiligen Georg (23. und 24. April) statt.'
      en: The Order of the Blue Garter was founded in 1348 by the English king Edward III and is the oldest and best-known order of chivalry in the world. The motto translates roughly as 'Shame on him
        who thinks ill of it.' The occasion of its founding was a garter of the Countess of Salisbury lost at a banquet, which the king picked up. Only family members, high-ranking personages and 
        foreign heads of state were admitted; the appointment took place on St George's Day (23 and 24 April).
      uk: Орден блакитної підв'язки заснував 1348 року англійський король Edward III; це найдавніший і найвідоміший лицарський орден світу. Девіз перекладається приблизно як «Хай буде соромно тому, 
        хто погано про це подумає». Приводом до заснування стала підв'язка графині Salisbury, загублена на бенкеті, яку король підняв. До ордену приймали лише членів родини, високопоставлених осіб та 
        іноземних глав держав; призначення відбувалося в день святого Georg (23 і 24 квітня).
