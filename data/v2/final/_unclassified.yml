    inscription_obv: FRID WILH D G M B S R I AR C & EL
    inscription_rev: MONETA AUREA PRINC HALBERST
    note:
      de: Das Bistum Halberstadt wurde 1648 im Westfälischen Frieden aufgehoben und als Fürstentum an Brandenburg übertragen. 1651 richtete der Große Kurfürst hier eine Müntzstätte ein, die mit 
        Unterbrechungen biß 1680 in Betrieb war. Dieser prachtvolle, vermutlich nur in diesem Exemplar erhaltene Dukat ist die einzige Goldprägung dieses Zeitraums; es dürfte sich um das Exemplar der 
        Sammlung von Arnim 1800 handeln. Nach 1680 ist in Halberstadt nicht mehr gemüntzt worden.
      en: The bishopric of Halberstadt was dissolved in the Peace of Westphalia in 1648 and transferred as a principality to Brandenburg. In 1651 the Great Elector established a mint here, which 
        operated with interruptions until 1680. This splendid ducat, probably preserved only in this specimen, is the sole gold striking of this period; it is likely the specimen of the von Arnim 
        collection of 1800. After 1680 no more coins were struck at Halberstadt.
      uk: Єпископство Halberstadt було скасоване Вестфальським миром 1648 року й передане як князівство Бранденбургу. 1651 року Великий курфюрст заснував тут монетний двір, що з перервами діяв до 1680
        року. Цей чудовий дукат, збережений, імовірно, лише в цьому екземплярі, — єдине золоте карбування цього періоду; це, ймовірно, екземпляр зі збірки von Arnim 1800 року. Після 1680 року в 
        Halberstadt більше не карбували.
    verification_note: *id001
