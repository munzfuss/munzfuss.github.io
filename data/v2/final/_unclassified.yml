    inscription_obv: IOHAN SIGIS D G MA BR SAC R I ARCHIC E E
    inscription_rev: I PRV-SS IVLI-AE CLIVI-AE MON-T D
    note:
      de: Die vier in der Umschrift stehenden Wappenschilde beziehen sich auf die 1609 im Erbweg erworbenen Ansprüche Brandenburgs auf die niederrheinischen Territorien Jülich, Cleve und Berg sowie 
        auf die Anwartschaft auf das Herzogtum Preußen. Bahrfeldt hat diesen Dukaten nur nach der Literatur beschrieben und kannte kein Original. Neben dem hier vorliegenden Stück — 2003 mit Mitteln 
        des Kuratoriums Museumsinsel als „Morgengabe“ zur Wiedereröffnung des Müntzkabinetts erworben — existiert noch ein zweites Exemplar im Müntzkabinett Wien.
      en: The four shields in the legend refer to Brandenburg's claims to the Lower Rhine territories of Jülich, Cleve and Berg acquired by inheritance in 1609, as well as the expectancy of the Duchy 
        of Prussia. Bahrfeldt described this ducat only from the literature and knew no original. Besides the present piece — acquired in 2003 with funds of the Museumsinsel board as a 'Morgengabe' 
        for the reopening of the Coin Cabinet — a second specimen exists in the Vienna Coin Cabinet.
      uk: Чотири гербові щити в леґенді стосуються здобутих 1609 року у спадок претензій Бранденбургу на нижньорейнські території Jülich, Cleve і Berg, а також очікуваного права на герцогство Пруссія.
        Bahrfeldt описав цей дукат лише за літературою й не знав оригіналу. Крім наявної тут штуки — придбаної 2003 року коштом кураторіуму Museumsinsel як «Morgengabe» до повторного відкриття 
        Монетного кабінету — існує ще другий екземпляр у Віденському монетному кабінеті.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18214572
