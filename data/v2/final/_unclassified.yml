    inscription_obv: FRID WILH EL BRA Imo DUCI MAGDEB PR OPT
    inscription_rev: SCEPTRIFERUM IAM PARTHENOPE SIC SUSCIPIT ALMUM // PARTHENOP HOMAG / PRAEST 30 MAY / 16-81
    note:
      de: Das Erzstift Magdeburg wurde im Westfälischen Frieden 1648 aufgehoben und in ein weltliches Herzogtum umgewandelt, das nach dem Tode des seit 1638 regierenden Administrators August von 
        Sachsen-Weißenfels (gest. 4. Juni 1680) an Brandenburg fallen sollte. Die Huldigung der Stadt an den neuen Herrn erfolgte erst ein Jahr später am 30. Mai 1681; auf diesen Anlaß sind silberne 
        und goldene Gedenkstücke geprägt worden, die in der Literatur teils als Müntzen, teils als Medaillen aufgefaßt werden. Die Silberstücke entsprechen dem Thalergewicht.
      en: The Archbishopric of Magdeburg was dissolved in the Peace of Westphalia in 1648 and converted into a secular duchy, due to pass to Brandenburg after the death of the administrator August von
        Sachsen-Weißenfels (who had ruled since 1638, died 4 June 1680). The city's homage to the new lord followed only a year later, on 30 May 1681; silver and gold commemorative pieces were struck 
        for the occasion, regarded in the literature partly as coins, partly as medals. The silver pieces correspond to the Thaler weight.
      uk: Архієпископство Magdeburg було скасоване Вестфальським миром 1648 року й перетворене на світське герцогство, яке після смерті адміністратора August von Sachsen-Weißenfels (правив із 1638, 
        помер 4 червня 1680) мало перейти до Бранденбургу. Присяга міста новому володарю відбулася лише через рік, 30 травня 1681; з цієї нагоди карбували срібні та золоті пам'ятні штуки, які в 
        літературі трактують почасти як монети, почасти як медалі. Срібні штуки відповідають ваговій нормі Thaler.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18201678
