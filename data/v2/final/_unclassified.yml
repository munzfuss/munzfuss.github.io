    inscription_obv: STAT DVA - MARCAR - LVBECN
    inscription_rev: MONET - CIVITAT - WANDAV
    note:
      de: Sogenannter Wendenthaler. Obwohl Lüneburg in der Umschrift nicht genannt ist, ergibt sich die Urheberschaft der Stadt aus dem beiderseits mittig stehenden Löwenschild. Da der Müntzmeister 
        Hermann Gante seine Tätigkeit in Lüneburg erst 1544 aufnahm, kann die Prägung nicht schon 1541 erfolgt sein; Bahrfeldt nimmt daher an, daß sich die Jahreszahl auf eine nicht überlieferte 
        Müntzvereinbarung der wendischen Städte bezieht und Gante die Stücke gewissermaßen als Präsente zu seinem Dienstantritt prägte.
      en: A so-called Wendentaler. Although Lüneburg is not named in the legend, the city's authorship follows from the lion shield placed centrally on both sides. Since the mintmaster Hermann Gante 
        only took up his post in Lüneburg in 1544, the striking cannot already have taken place in 1541; Bahrfeldt therefore assumes the date refers to an unrecorded coinage agreement of the Wendish 
        towns and that Gante struck the pieces as presents on entering office.
      uk: Так званий Wendentaler. Хоча Lüneburg не названо в леґенді, авторство міста випливає з лев'ячого щита, розміщеного посередині з обох боків. Оскільки монетний майстер Hermann Gante обійняв 
        посаду в Lüneburg лише 1544 року, карбування не могло відбутися вже 1541; тому Bahrfeldt припускає, що дата стосується незбереженої монетної угоди вендських міст, а Gante карбував ці штуки 
        немовби як подарунки з нагоди вступу на посаду.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18202035
