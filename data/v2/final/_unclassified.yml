    inscription_obv: FERDINAND D G ABBAS WERDIN ET HELMSTAD 16-98
    inscription_rev: VIRGO IMMACULATA IUGITER SIS PATRONA
    note:
      de: Die Mariendarstellung auf diesem Thaler entspricht dem Gnadenbild in der Wallfahrtskirche zu Neviges (Kreis Mettmann). Die dortigen Wallfahrten mit der Verehrung des Gnadenbildes begannen 
        mit einer Dankwallfahrt am 15. Oktober 1681, die der Fürstbischof von Paderborn und Münster, Ferdinand von Fürstenberg, aus Dankbarkeit für seine Genesung von schwerer Krankheit veranstaltete.
      en: The image of the Virgin on this Thaler corresponds to the miraculous image in the pilgrimage church at Neviges (Mettmann district). The pilgrimages there, venerating the image, began with a 
        thanksgiving pilgrimage on 15 October 1681 held by Ferdinand von Fürstenberg, Prince-Bishop of Paderborn and Münster, in gratitude for his recovery from a serious illness.
      uk: Зображення Богородиці на цьому Thaler відповідає чудотворному образу в паломницькій церкві в Neviges (округ Mettmann). Тамтешні прощі з шануванням образу почалися вдячною процесією 15 жовтня
        1681 року, яку влаштував князь-єпископ Paderborn і Münster Ferdinand von Fürstenberg на подяку за одужання від тяжкої хвороби.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18274139
