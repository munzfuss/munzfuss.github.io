    inscription_obv: AUGU - D G
    inscription_rev: MATTHIAS D G R IM S A
    note:
      de: Nach H. Thormann handelt es sich bei den Kippermüntzen ab etwa März 1621 nicht mehr um Gemeinschaftsprägungen der anhaltinischen Fürsten; von da an ließ jeder Fürst selbständig in seinem 
        eigenen Territorium müntzen. Die Zuordnung zu den einzelnen anhaltinischen Linien nimmt Thormann anhand der jeweils einem Teilfürstentum zurechenbaren Müntzstätten vor.
      en: According to H. Thormann, from about March 1621 the Kipper coins were no longer joint issues of the Anhalt princes; from then on each prince minted independently in his own territory. 
        Thormann assigns the coins to the individual Anhalt lines by the mints attributable to each sub-principality.
      uk: За H. Thormann, приблизно з березня 1621 року кіперівські монети вже не були спільним карбуванням ангальтських князів; відтоді кожен князь карбував самостійно на своїй території. Thormann 
        відносить монети до окремих ангальтських ліній за монетними дворами, що приписуються кожному з уділів.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18283480
