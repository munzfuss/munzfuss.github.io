    inscription_obv: SIM C E N D I L ANNO 1621
    inscription_rev: LANTMVNZ ZV G SC
    note:
      de: Die Ziffer 6 in der Jahreszahl auf der Vorderseite scheint bei der Herstellung des Stempels vergessen und handschriftlich ergänzt worden zu sein, da sich keine Abnutzungsspuren finden. Da 
        das Müntzmeisterzeichen fehlt und 1621 sowohl Ipo Rizema als auch Melchior Kuttner Müntzmeister in Detmold waren, ist eine sichere Zuordnung des Müntzmeisters nicht möglich.
      en: The figure 6 in the date on the obverse seems to have been forgotten when the die was made and added by hand, since no traces of wear are found. Since the mintmaster's mark is missing and in
        1621 both Ipo Rizema and Melchior Kuttner served as mintmasters in Detmold, the mintmaster cannot be securely identified.
      uk: Цифра 6 у даті на аверсі, схоже, була забута при виготовленні штемпеля й дописана від руки, бо слідів зношення немає. Оскільки знак монетника відсутній, а 1621 року монетниками в Detmold 
        були і Ipo Rizema, і Melchior Kuttner, надійно визначити монетника неможливо.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18291939
