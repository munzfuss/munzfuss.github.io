    inscription_obv: 1-7 / 4 / SCHILL / WISM / 1-5
    note:
      de: Während der Belagerung der schwedischen Stadt Wismar 1715 durch dänische, hannoversche und preußische Truppen wurde unter dem schwedischen Vizegouverneur Generalmajor Freiherr Martin Schultz
        von Ascheraden Notgeld hergestellt. Von diesen kleinen, einseitigen Kupferplatten sind Nominale zu 4, 8 und 16 Schillingen aus Kanonenmetall gefertigt worden.
      en: During the 1715 siege of the Swedish city of Wismar by Danish, Hanoverian and Prussian troops, emergency money was produced under the Swedish vice-governor Major-General Baron Martin Schultz
        von Ascheraden. Denominations of 4, 8 and 16 Schilling were made from cannon metal as these small, uniface copper plates.
      uk: Під час облоги шведського міста Вісмар 1715 року данськими, ганноверськими та прусськими військами під шведським віцегубернатором генерал-майором бароном Мартіном Шульцом фон Ашераденом 
