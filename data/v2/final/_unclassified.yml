    inscription_obv: D G FRID AUG REX POL DUX SAX ARCHIMARESCHALL & ELECT
    inscription_rev: IN PROVINCIIS IUR SAXON PROVISOR ET VICARIUS 1741
    note:
      de: Die Thaler und Mehrfachthaler sind auf das Vikariat Sachsens geprägt worden. Diese Vikariatsmüntzen wurden unter den sächsischen und pfälzischen Kurfürsten herausgegeben, erstmals 1612 und 
        letztmalig 1792. Sie erschienen nach dem Tode des Kaisers biß zur Krönung des neuen Kaisers, wenn die Kurfürsten von Sachsen und der Pfalz als Stellvertreter des Kaisers amtierten; 1740 war 
        Kaiser Karl VI. verstorben.
      en: The Taler and multiple Taler were struck for the vicariate of Saxony. These vicariate coins were issued under the Saxon and Palatine electors, first in 1612 and last in 1792. They appeared 
        in the interval between an emperor's death and the coronation of his successor, when the electors of Saxony and the Palatinate acted as the emperor's deputies; in 1740 Emperor Karl VI had 
        died.
      uk: Taler і кратні Taler викарбувано на честь вікаріату Саксонії. Ці вікаріатні монети (Vikariatsmünzen) випускали саксонські та пфальцські курфюрсти, уперше 1612 і востаннє 1792 року. Вони 
        з'являлися в проміжку від смерті імператора до коронації наступника, коли курфюрсти Саксонії та Пфальцу правили як заступники імператора; 1740 року помер імператор Karl VI.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18206250
