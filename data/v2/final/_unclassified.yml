    inscription_obv: GEORG II D G M B F ET H REX F D
    inscription_rev: BRUNS ET LUN DUX S R I A TH ET ELECT -/ V / THALER / 1758
    note:
      de: Georgsdor ist die Bezeichnung für eine Pistole bzw. ein Fünfthalerstück, das unter den hannoverschen Kurfürsten und Königen von Großbritannien 1758 biß 1856 geprägt wurde. Auf einigen dieser
        dem französischen Louisdor nachempfundenen Müntzen steht die Wertbezeichnung „I PISTOLE“. Der englische König Georg II. war zugleich Kurfürst und Herzog von Braunschweig-Lüneburg.
      en: Georgsdor is the name of a pistole, i.e. a five-Thaler piece, struck under the Hanoverian electors and kings of Great Britain from 1758 to 1856. Some of these coins, modelled on the French 
        Louisdor, bear the value designation 'I PISTOLE'. The English king George II was at the same time Elector and Duke of Brunswick-Lüneburg.
      uk: Georgsdor — назва пістоля, тобто п'ятиталерової монети, яку карбували за ганноверських курфюрстів і королів Великої Британії з 1758 до 1856 року. На деяких із цих монет, створених за взірцем
        французького Louisdor, стоїть позначення вартості «I PISTOLE». Англійський король George II був водночас курфюрстом і герцогом Braunschweig-Lüneburg.
