    inscription_rev: FEINES GOLD -/ AUS DER / FÜRSTEN/ZECHE / 1803
    note:
      de: Diese äußerst seltene Müntze — es sind insgesamt nur zwei Exemplare bekannt — ist unter dem preußischen König Friedrich Wilhelm III. in Bayreuth geprägt worden. Der kinderlose Markgraf Karl 
        Alexander von Brandenburg-Ansbach und Brandenburg-Bayreuth hatte 1791 seine Lande an seinen Verwandten, den preußischen König, abgetreten. Die Vorderseite dieser Ausbeutemüntze ist 
        offensichtlich mit dem Stempel der Sechskreuzerstücke von 1797 biß 1802 geprägt worden. Das Gold stammt aus einer der sechs Gruben bei Goldkronach in Oberfranken (Fürstenzeche).
      en: This extremely rare coin — only two specimens are known in all — was struck under the Prussian king Friedrich Wilhelm III at Bayreuth. The childless margrave Karl Alexander of 
        Brandenburg-Ansbach and Brandenburg-Bayreuth had ceded his lands in 1791 to his kinsman, the Prussian king. The obverse of this mining coin was evidently struck with the die of the six-Kreuzer
        pieces of 1797-1802. The gold comes from one of the six mines near Goldkronach in Upper Franconia (Fürstenzeche).
      uk: Ця надзвичайно рідкісна монета — усього відомо лише два екземпляри — викарбувана за прусського короля Friedrich Wilhelm III у Bayreuth. Бездітний маркграф Karl Alexander von 
        Brandenburg-Ansbach und Brandenburg-Bayreuth 1791 року відступив свої землі родичеві — прусському королю. Аверс цієї видобувної монети, вочевидь, викарбувано штемпелем шестикрейцерових штук 
        1797-1802 років. Золото походить з однієї з шести копалень поблизу Goldkronach у Верхній Франконії (Fürstenzeche).
    verification_note: *id001
    composed_of:
      - unified-ikmk-18204549
