    inscription_obv: D G AVGVSTVS III REX POLONIARUM
    inscription_rev: SAC ROM IMP ARCHIM ET ELECT 1753
    note:
      de: Die 8 Groschen (Dritteltaler) Augusts III. von Sachsen-Polen mit der Jahreszahl 1753 sind durch Friedrich II. während des Siebenjährigen Krieges in den Jahren 1757–1762 in den Müntzstätten 
        Leipzig, Dresden, Berlin, Magdeburg, Aurich und Breslau millionenfach nachgeprägt worden. Sie sind die klassische ‚Kriegsmüntze‘ der Neuzeit. Alle preußischen Müntzstätten waren in dieser Zeit
        an das jüdische Konsortium des Veitel Ephraim verpachtet, so daß diese Müntzen als ‚Ephraimiten‘ bezeichnet werden.
      en: The 8-Groschen pieces (third-Thaler) of August III of Saxony-Poland dated 1753 were re-struck in their millions by Frederick II during the Seven Years' War in 1757–1762 at the mints of 
        Leipzig, Dresden, Berlin, Magdeburg, Aurich and Breslau. They are the classic 'war coin' of the modern era. At that time all the Prussian mints were leased to the Jewish consortium of Veitel 
        Ephraim, so these coins are known as 'Ephraimiten'.
      uk: 8 грошів (третину талера) Августа III Саксонсько-Польського з датою 1753 Фрідріх II під час Семилітньої війни у 1757–1762 роках мільйонними накладами перекарбовував на монетних дворах 
        Лейпцига, Дрездена, Берліна, Магдебурга, Ауріха та Бреслау. Це класична «воєнна монета» Нового часу. Усі прусські монетні двори в той час були в оренді єврейського консорціуму Файтеля Ефраїма,
        тож ці монети називають «Ephraimiten».
    verification_note: *id001
    composed_of:
      - unified-ikmk-18201327
