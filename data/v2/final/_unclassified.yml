    inscription_obv: GEORGIUS III D G BRITANNIAR REX F D // 1817
    inscription_rev: HONI SOIT QUI MAL Y PENSE
    note:
      de: Der 1817 erstmals geprägte Sovereign mit der charakteristischen Rückseitendarstellung des heiligen Georg im Kampf mit dem Drachen setzt die Namenstradition des tudorzeitlichen Sovereigns 
        fort, ist aber wie alle englischen Goldmüntzen seit dem späten 17. Jahrhundert nur noch 22 Karat fein (917/1000) bei einem Gewicht von 123,3 grains (7,99 g). Nur zwischen 1825 und 1871 (in 
        Australien biß 1887) wurde diese von Benedetto Pistrucci (1784–1855) entworfene Darstellung durch das Landeswappen ersetzt.
      en: The sovereign, first struck in 1817 with the characteristic reverse of St George fighting the dragon, continues the naming tradition of the Tudor-era sovereign but, like all English gold 
        coins since the late 17th century, is only 22 carat fine (917/1000) at a weight of 123.3 grains (7.99 g). Only between 1825 and 1871 (in Australia until 1887) was this design by Benedetto 
        Pistrucci (1784–1855) replaced by the national coat of arms.
      uk: Sovereign, уперше викарбуваний 1817 року з характерним реверсом — святим Георгієм у боротьбі з драконом — продовжує іменну традицію соверена тюдорівської доби, але, як усі англійські золоті 
        монети від кінця XVII століття, має пробу лише 22 карати (917/1000) за ваги 123,3 грана (7,99 г). Лише між 1825 і 1871 роками (в Австралії до 1887 року) це зображення роботи Benedetto 
        Pistrucci (1784–1855) заміняли державним гербом.
    verification_note: *id001
