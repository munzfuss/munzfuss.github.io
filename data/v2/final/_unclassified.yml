    inscription_obv: SERINISSIMVS PRINCEPS ET DOMINVS DOMIN AVGUSTVS FRIDERICVS DVX BRVNSUICENS ET LVNEBVRG // DVLCE EST PRO PA/TRIA MORI
    note:
      de: Schaustück zum Begräbnis des Prinzen August Friedrich, Sohn des Herzogs Anton Ulrich. Er wurde bei der Belagerung des damals französisch besetzten Philippsburg von einer Kugel getroffen und 
        starb einen Monat später in Speyer an seiner Verletzung.
      en: Presentation piece for the funeral of Prince August Friedrich, son of Duke Anton Ulrich. He was struck by a bullet during the siege of Philippsburg, then held by the French, and died a month
        later of the wound at Speyer.
      uk: Церемоніальна пам'ятна пластина на поховання принца August Friedrich, сина герцога Anton Ulrich. Його поранила куля під час облоги тоді зайнятого французами Philippsburg, і за місяць він 
        помер від рани в Speyer.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18232462
