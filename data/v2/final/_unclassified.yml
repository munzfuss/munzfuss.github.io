        abgekürzter Form (CL E D I) auf der Pferdedecke. Die Haager Thaler sind von großer Seltenheit.
      en: The arms of the county of Haag show the so-called Haag grey horse on a red ground. The count of Haag's motto 'Cum Labore Et Deo Iuvante' (With labour and God's help) appears in abbreviated 
        form (CL E D I) on the horse's caparison. The Haag Thaler are of great rarity.
      uk: Герб графства Haag — так званий гаазький білий кінь на червоному тлі. Девіз гаазького графа «Cum Labore Et Deo Iuvante» (Працею і з Божою поміччю) вміщено в скороченій формі (CL E D I) на 
        попоні коня. Гаазькі Thaler мають велику рідкість.
