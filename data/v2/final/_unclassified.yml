    inscription_obv: FRID WILH D G M BR S R I EL
    inscription_rev: DEO - DVCE 1683
    note:
      de: Die 1682–1696 nach dem Vorbild dänischer Prägungen aus dem Gold der brandenburgischen Kolonie in Afrika gemüntzten sogenannten Guineadukaten erfreuten sich besonderer Beliebtheit und zeigen 
        auf der Rückseite stets einen segelnden Dreimaster; wegen dieser Darstellung werden sie auch Schiffsdukaten genannt.
      en: The so-called Guinea ducats, struck 1682–1696 after the model of Danish issues from the gold of the Brandenburg colony in Africa, enjoyed particular popularity and always show a sailing 
        three-master on the reverse; because of this image they are also called ship ducats.
      uk: Так звані Guineadukaten, карбовані 1682–1696 років за взірцем данських випусків із золота бранденбурзької колонії в Африці, тішилися особливою популярністю й завжди мають на реверсі 
        трищоглове вітрильне судно; через це зображення їх називають також корабельними дукатами.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18224409
