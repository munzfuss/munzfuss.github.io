    inscription_obv: PHS D - G HISPANIAR REX A O TRANS-ISL
    inscription_rev: CONCORDIA RES PARVAE CRESVNT
    note:
      de: Sogenannter Rosenoble. Als Geusen wurden die sich unter Führung u. a. Wilhelms I. von Oranien dem spanischen Herrschaftsanspruch widersetzenden Bewohner der spanischen Niederlande 
        bezeichnet. Ursprünglich ein Schimpfname (franz. gueux, der Bettler), wurde die Bezeichnung rasch in eine positive Eigenbezeichnung verwandelt.
      en: A so-called Rosenoble. 'Geusen' denoted the inhabitants of the Spanish Netherlands who, under leaders including William I of Orange, resisted the Spanish claim to rule. Originally a term of 
        abuse (French gueux, beggar), the name was quickly turned into a positive self-designation.
      uk: Так званий Rosenoble. «Geusen» називали мешканців іспанських Нідерландів, які під проводом, зокрема, Wilhelm I von Oranien чинили опір іспанському пануванню. Спершу це була лайлива назва 
        (фр. gueux, жебрак), яку швидко перетворили на позитивне самоназвання.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18202224
