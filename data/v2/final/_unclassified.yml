    inscription_obv: D G ANNA - AMALIA
    inscription_rev: TVTR REG SAX - VINAR & ISENAC // 5 TH
    note:
      de: Anna Amalia war die Tochter Karls I. von Braunschweig, des Schwagers Friedrichs II. von Preußen. 1756 heiratete sie Herzog Ernst August II. von Sachsen-Weimar-Eisenach und wurde nach dessen 
        Tod 1758 Regentin des Landes; sie regierte als Vormünderin für ihren Sohn Karl August, dem sie 1775 die Regierungsgeschäfte übergab. 1773 kam Goethe hier an den Hof nach Weimar. Mit ihrem 
        Namen sind der „Musenhof“ in Weimar und das „Klassische Weimar“ eng verbunden.
      en: Anna Amalia was the daughter of Karl I of Brunswick, brother-in-law of Friedrich II of Prussia. In 1756 she married Duke Ernst August II of Saxe-Weimar-Eisenach and, after his death in 1758,
        became regent of the country, ruling as guardian for her son Karl August, to whom she handed over government in 1775. In 1773 Goethe arrived here at the Weimar court. With her name the 
        'Musenhof' in Weimar and 'Classical Weimar' are closely associated.
      uk: Anna Amalia була донькою Karl I von Braunschweig, шваґра Friedrich II Прусського. 1756 року вона одружилася з герцогом Ernst August II von Sachsen-Weimar-Eisenach і після його смерті 1758 
        року стала регенткою краю; вона правила як опікунка свого сина Karl August, якому 1775 року передала врядування. 1773 року сюди, до ваймарського двору, прибув Goethe. З її ім'ям тісно 
        пов'язані «Musenhof» у Ваймарі та «класичний Ваймар».
    verification_note: *id001
    composed_of:
      - unified-ikmk-18206395
