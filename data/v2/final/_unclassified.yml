    inscription_obv: PAUL FRIEDR GROSSHERZOG V MECKLENBURG SCHWERIN
    inscription_rev: FÜNF - THALER // 1840
    note:
      de: 'Die Goldprägung unter Großherzog Paul Friedrich war die umfangreichste, die in Mecklenburg je stattfand: in nur zwei Jahren (1839/40) wurden 1,1 Tonnen Gold in Paulsdor, doppelten und halben
        Paulsdor (10, 5 und 2½ Thaler) vermüntzt. Der Paulsdor hat ein Normgewicht von 6,659 g und einen Goldanteil von 5,966 g (21½ Karat, 896/1000 fein). Die Prägung diente mehr der Reputation des Landesherrn
        und der Erhaltung der Müntzstätte Schwerin als einer Notwendigkeit für das Nominal.'
      en: "The gold coinage under Grand Duke Paul Friedrich was the largest ever carried out in Mecklenburg: in just two years (1839/40), 1.1 tonnes of gold were coined into Paulsdor, double and half Paulsdor
        (10, 5 and 2½ Thaler). The Paulsdor has a standard weight of 6.659 g and a gold content of 5.966 g (21½ carat, 896/1000 fine). The issue served the ruler's prestige and the upkeep of the Schwerin
        mint more than any need for the denomination."
      uk: 'Золоте карбування за великого герцога Paul Friedrich було найбільшим із будь-коли здійснених у Mecklenburg: лише за два роки (1839/40) 1,1 тонни золота перекарбували на Paulsdor, подвійні та
        піврові Paulsdor (10, 5 і 2½ Thaler). Paulsdor має нормову вагу 6,659 г і вміст золота 5,966 г (21½ карата, 896/1000 проби). Карбування слугувало радше престижу правителя й утриманню монетного двору
        Schwerin, ніж дійсній потребі в цьому номіналі.'
    verification_note: *id001
    composed_of:
      - unified-ikmk-18224426
