    inscription_obv: CAROLVS GVIL FERD D G DVX BR ET LVN
    inscription_rev: X EINE FEINE MARK CONVENTIONS M 1783
    note:
      de: Speciestaler (oder Speziestaler) war die übliche Bezeichnung für tatsächlich ausgeprägte Thalermüntzen im 9-Thalerfuß, im Gegensatz zu ideeller Rechnungsmüntze oder Papiergeld, also bares 
        Geld. Zuerst wurde diese Bezeichnung auf die nach der Reichsmüntzordnung von 1566 ausgeprägten Thaler aus der feinen Gewichtsmarck angewandt. Dieser braunschweigische Thaler ist nach der 
        Konvention von 1753 geprägt, wobei 10 Thaler aus der feinen Marck geprägt wurden.
      en: Speciestaler (or Speziestaler) was the usual term for Thaler coins actually struck to the 9-Thalerfuß, as opposed to a notional money of account or paper money — that is, cash. The term was 
        first applied to the Thaler struck from the fine weight Mark under the Imperial Coinage Ordinance of 1566. This Brunswick Thaler was struck to the Convention of 1753, by which 10 Thaler were 
        struck from the fine Mark.
      uk: Speciestaler (або Speziestaler) — звичайна назва для талерних монет, справді викарбуваних за 9-Thalerfuß, на противагу уявній лічильній монеті чи паперовим грошам, тобто готівка. Спершу цю 
        назву застосовували до талерів, викарбуваних із чистої вагової Marck за імперським монетним статутом 1566 року. Цей брауншвейзький Thaler викарбувано за конвенцією 1753 року, коли з чистої 
        Marck карбували 10 талерів.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18201589
