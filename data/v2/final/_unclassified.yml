    inscription_obv: MON ARGENT CIVITAT GEDANENSIS
    inscription_rev: D G AVGVSTVS III REX POL M D L R PR D S & EL
    note:
      de: Tympf oder Achtzehngröscher war die Bezeichnung für eine polnische Müntze im Wert eines Fünftel-Thalers. Der Name führte von dem polnischen Müntzpächter Andreas Timpff her, der während der 
        Kriegsjahre 1654-1660 und 1663-1665 solch minderwertige Müntzen ausprägte, daß sein Name zum Inbegriff schlechten Geldes wurde. Im Siebenjährigen Krieg wurde der Tympf auch als Ephraimit 
        bezeichnet, nach den Müntzpächtern unter Friedrich II. von Preußen, die geringhaltiges Geld im Auftrag des Königs prägten.
      en: Tympf, or Achtzehngröscher, was the name for a Polish coin worth one-fifth of a Taler. The name derived from the Polish mint lessee Andreas Timpff, who during the war years 1654-1660 and 
        1663-1665 struck coins so debased that his name became a byword for bad money. In the Seven Years' War the Tympf was also called Ephraimit, after the mint lessees under Friedrich II of Prussia
        who struck low-grade money on the king's behalf.
      uk: Tympf, або Achtzehngröscher, — назва польської монети вартістю однієї п'ятої Thaler. Назва походить від польського монетного відкупника Andreas Timpff, який у воєнні роки 1654-1660 та 
        1663-1665 карбував настільки неповноцінні монети, що його ім'я стало уособленням поганих грошей. У Семирічній війні Tympf називали також Ephraimit — за монетними відкупниками при Friedrich II 
        Прусському, які карбували низькопробні гроші за дорученням короля.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18203910
