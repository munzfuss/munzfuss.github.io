        Müntzforschern seiner Zeit — Professor Köhler, Hofrat D. S. von Madai und Joachim in Halle — stand er in Briefwechsel.
      en: Count Christian August left the numismatic world a considerable number of attractive commemorative coins. Their creation sprang from his inclination for coin collecting; he corresponded with
        the foremost numismatists of his day — Professor Köhler, Hofrat D. S. von Madai and Joachim in Halle.
      uk: Граф Christian August залишив нумізматичному світові чималу кількість вишуканих пам'ятних монет. Приводом до їх появи була його схильність до збирання монет; він листувався з найвизначнішими
        нумізматами свого часу — професором Köhler, надвірним радником D. S. von Madai та Joachim у Halle.
