    inscription_obv: FRIDERICVS BORVSSORVM REX
    note:
      de: Auch die Friedrichsdor wurden im Siebenjährigen Krieg 1756–1763 in verschlechtertem Feingehalt ausgebracht, wenn auch längst nicht in dem Umfang wie das Silbergeld. Wegen ihrer Zeitstellung 
        zwischen den alten Friedrichsdor biß 1755 und den neuen ab 1763 werden sie auch 'Mittelfriedrichsdor' genannt; sie tragen rückdatierte Jahreszahlen.
      en: The Friedrichsdor too were issued at reduced fineness during the Seven Years' War of 1756–1763, though by no means to the extent of the silver money. On account of their position between the
        old Friedrichsdor up to 1755 and the new ones from 1763 they are also called 'Mittelfriedrichsdor'; they bear backdated years.
      uk: Friedrichsdor також випускали зі зниженою пробою під час Семилітньої війни 1756–1763 років, хоч і далеко не в тих обсягах, що срібні гроші. Через їхнє проміжне становище між старими 
        Friedrichsdor до 1755 року й новими від 1763 року їх також називають «Mittelfriedrichsdor»; вони несуть заднім числом проставлені роки.
    verification_note: *id001
