        and contained 12.064 g of gold (21⅔ carat, 902.8/1000 fine).
      uk: Тоді як золоті випуски по 5 Thaler (Augustdor) відомі за дев'ять років, подвійний Augustdor (10 Thaler) випускали лише з роками 1777, 1778 і 1779. Він мав повну вагу 13,364 г і містив 12,064
        г золота (21⅔ карата, 902,8/1000 проби).
