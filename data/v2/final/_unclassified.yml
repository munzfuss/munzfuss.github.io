    inscription_obv: AMELIA ELISABETHA HASSIAE LANDGRAVIA HANOVIAE COMES - NATA / 29 IAN 1602 / PRINCEPS PIETATE FIDE/ AC CONSTANTIA INCLYTA / POST 13 ANN TUTELAM / AC REGIMEN GLORIOSUM / PLACIDA 
      MORTE / OBYT 8 AUG / A 1651 G
    inscription_rev: WIEDER MACHT UND LIST MEIN FELS GOTT IST
    note:
      de: Die Gedenkmüntzen sind auf den Tod der Mutter des Landgrafen Wilhelm VI. (1637-1663) geprägt worden. Als sein Vater 1637 mit 35 Jahren starb, übernahm Amalie Elisabeth die Regentschaft; sie 
        vertrat die Geschicke des Landes in den besonders schwierigen Zeiten des Dreißigjährigen Krieges umsichtig und geschickt gegen den Kaiser und Georg II. von Hessen-Darmstadt. Erst 1650 übernahm
        der nun volljährige Wilhelm die Regierung; ein Jahr zuvor hatte er die Markgräfin von Brandenburg, Hedwig Sophia, Schwester des Großen Kurfürsten, geheiratet.
      en: The commemorative coins were struck on the death of the mother of Landgrave Wilhelm VI (1637-1663). When his father died in 1637 aged 35, Amalie Elisabeth assumed the regency; she managed 
        the country's affairs prudently and skilfully in the especially difficult times of the Thirty Years' War against the emperor and Georg II of Hesse-Darmstadt. Only in 1650 did the now adult 
        Wilhelm take over government; a year earlier he had married the margravine of Brandenburg, Hedwig Sophia, sister of the Great Elector.
      uk: Пам'ятні монети викарбувано на смерть матері ландграфа Wilhelm VI (1637-1663). Коли його батько 1637 року помер у віці 35 років, регентство перебрала Amalie Elisabeth; вона розважливо й 
        уміло вела справи краю в особливо тяжкі часи Тридцятилітньої війни проти імператора та Georg II von Hessen-Darmstadt. Лише 1650 року повнолітній Wilhelm перебрав правління; роком раніше він 
        одружився з бранденбурзькою маркграфинею Hedwig Sophia, сестрою Великого курфюрста.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18206224
