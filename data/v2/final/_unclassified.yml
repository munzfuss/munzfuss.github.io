    inscription_obv: D G IOHA CHRIS ET GEOR RVDO DVC SIL LI BR
    inscription_rev: MONET NOV REICHSTEI 1617
    note:
      de: Im Rückseitenstempel ist die Jahreszahl von 1616 in 1617 geändert worden. Reichenstein in Schlesien, das heutige polnische Złoty Stok, war seit dem Mittelalter für seinen Bergbau und reiche 
        Goldvorkommen bekannt; die Herrschaft gelangte 1599 durch Verkauf an die Herzöge von Liegnitz-Brieg, welche die dortige Müntzstätte fortführten. Gegen Ende des 17. Jahrhunderts waren die 
        Vorkommen weitgehend erschöpft.
      en: On the reverse die the date was altered from 1616 to 1617. Reichenstein in Silesia — today the Polish Złoty Stok — had been known since the Middle Ages for its mining and rich gold deposits;
        in 1599 the lordship passed by sale to the Dukes of Liegnitz-Brieg, who continued the mint there. By the end of the 17th century the deposits were largely exhausted.
      uk: На реверсному штемпелі дату змінено з 1616 на 1617. Reichenstein у Сілезії — нинішній польський Złoty Stok — від Середньовіччя славився гірництвом і багатими покладами золота; 1599 року 
        володіння шляхом продажу перейшло до герцогів Liegnitz-Brieg, які продовжили тамтешній монетний двір. Наприкінці XVII століття поклади були здебільшого вичерпані.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18201944
