    inscription_obv: DEO ET PATRIAE AO 1624
    inscription_rev: BRAVN MVNTZ VON FEINEM SILBER -/ I / MARIEN/GVLDE
    note:
      de: Nach der Reichsmüntzordnung von 1566 war für die Müntzen des Heiligen Römischen Reiches deutscher Nation die Legierung des Silbers mit 889/1000 Silber bei einem Thalergewicht von 29,23 g 
        vorgeschrieben. Bei den lokalen Müntzen trugen die Prägeherren die Verantwortung, die für die Finanzierung ihrer Kriege den Feingehalt ihrer Müntzen oftmals verschlechterten. Einer dieser 
        negativen Höhepunkte war die Zeit der Kipper und Wipper Anfang des 17. Jahrhunderts; dem Silber wurde Kupfer zulegiert, was zu einer Verschlechterung des Müntzfußes und Gewinn für den 
        Prägeherrn führte.
      en: According to the Reichsmünzordnung of 1566, the alloy for the coins of the Holy Roman Empire of the German Nation was prescribed as 889/1000 silver at a Taler weight of 29.23 g. For local 
        coins the minting lords bore the responsibility, and often debased the fineness of their coins to finance their wars. One negative peak of this was the time of the Kipper and Wipper at the 
        start of the 17th century; copper was alloyed into the silver, leading to a deterioration of the Münzfuß and profit for the minting lord.
      uk: За Reichsmünzordnung 1566 року для монет Священної Римської імперії німецької нації приписувалася проба срібла 889/1000 за ваги Taler 29,23 г. За місцеві монети відповідали володарі 
        карбування, які для фінансування своїх воєн нерідко погіршували пробу своїх монет. Одним із таких негативних піків був час Kipper und Wipper на початку XVII століття; до срібла домішували 
        мідь, що вело до погіршення Münzfuß і зиску для володаря карбування.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18217111
