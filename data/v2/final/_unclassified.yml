    inscription_obv: FRIEDR WILHELM IV KOENIG V PREUSSEN // A
    inscription_rev: ZWEI VEREINSTHALER - XV EIN PFUND FEIN // 1858
    note:
      de: Der Vereinsdoppelthaler von 1858 ist der erste geprägte preußische Doppelthaler nach dem Wiener Müntzvertrag von 1857. Dieser deutsch-österreichische Vertrag vom 24. Januar 1857 legte den 
        30-Thaler-Fuß fest, der besagte, daß aus einem Zollpfund von 500 Gramm 30 Vereinsthaler zu prägen sind. Im Volksmund hießen zwischen 1838 und 1871 geprägte Doppelthaler auch Champagnerthaler, 
        da der Preis für eine Flasche Champagner bei zwei Thalern lag.
      en: The Vereinsdoppeltaler of 1858 is the first Prussian Doppeltaler struck to the Wiener Münzvertrag of 1857. This German-Austrian treaty of 24 January 1857 fixed the 30-Taler-Fuß, which 
        provided that 30 Vereinstaler be struck from a customs pound of 500 grams. Colloquially, double Taler struck between 1838 and 1871 were also called Champagnertaler, since the price of a bottle
        of champagne was two Taler.
      uk: Vereinsdoppeltaler 1858 року — перший прусський Doppeltaler, карбований за Wiener Münzvertrag 1857 року. Цей німецько-австрійський договір від 24 січня 1857 року встановив 30-Taler-Fuß, за 
        яким із митного фунта 500 грамів мали карбувати 30 Vereinstaler. У народі подвійні Taler, карбовані між 1838 і 1871 роками, називали також Champagnertaler, оскільки ціна пляшки шампанського 
        становила два Taler.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18205959
