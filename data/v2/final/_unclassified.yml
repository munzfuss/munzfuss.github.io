    inscription_obv: CHRISTINA D G SVECO GOT VAND Q DES REGINA
    inscription_rev: MONETA NOVA ARGENT DVCATVS POMERAN 1640
    note:
      de: Ein großer Teil des Herzogtums Pommern wurde im Dreißigjährigen Krieg von Schweden besetzt. Nach dem Tode des Herzogs Bogislaus XIV. kam das Gebiet 1637 unter schwedische Oberhoheit. Nach 
        dem Westfälischen Frieden 1648 erhielt Schweden Vorpommern mit Stettin und Stralsund sowie die Odermündung, die Stadt Wismar, die Bistümer Bremen-Verden und einige kleinere Gebiete.
      en: A large part of the Duchy of Pomerania was occupied by Sweden in the Thirty Years' War. After the death of Duke Bogislaus XIV the territory came under Swedish overlordship in 1637. After the
        Peace of Westphalia in 1648, Sweden received Western Pomerania with Stettin and Stralsund and the Oder estuary, the town of Wismar, the bishoprics of Bremen-Verden and some smaller 
        territories.
      uk: Значну частину герцогства Померанія Швеція окупувала під час Тридцятилітньої війни. Після смерті герцога Bogislaus XIV територія 1637 року перейшла під шведське верховенство. Після 
        Вестфальського миру 1648 року Швеція отримала Передню Померанію зі Stettin і Stralsund та гирлом Одеру, місто Wismar, єпископства Bremen-Verden і кілька менших областей.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18206324
