    inscription_obv: OTTO I - IM AV MA-GD CIVIT - FVNDAT
    inscription_rev: SIT PAX INT MVROS ET - PROSPE IN PALAT TVIS
    note:
      de: Mit der Darstellung Kaiser Ottos des Großen (936-973) und der ihn als Gründer der Stadt bezeichnenden Inschrift gab die Stadt Magdeburg goldene und silberne Prunkmüntzen aus, mit denen sie 
        weniger auf ihr ehrwürdiges Alter als auf ihre imperiale Herkunft aufmerksam machen wollte. Für den aus Sachsen stammenden, 962 zum Kaiser gekrönten Otto I. war Magdeburg fast eine Residenz; 
        hier gründete er 968 das östliche Erzbistum des Reiches und erbaute einen Dom.
      en: With the depiction of Emperor Otto the Great (936-973) and the inscription naming him as founder of the city, Magdeburg issued gold and silver show pieces, by which it sought to advertise 
        less its venerable age than its imperial origin. For Otto I — of Saxon stock, crowned emperor in 962 — Magdeburg was almost a residence; here in 968 he founded the eastern archbishopric of the
        empire and built a cathedral.
      uk: Із зображенням імператора Otto the Great (936-973) та написом, що називає його засновником міста, Magdeburg випустив золоті й срібні парадні штуки, якими прагнув наголосити не так на своєму 
        поважному віці, як на імперському походженні. Для Otto I — саксонця, коронованого імператором 962 року — Magdeburg був майже резиденцією; тут 968 року він заснував східне архієпископство 
        імперії та звів собор.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18203611
