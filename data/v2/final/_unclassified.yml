    inscription_obv: GEORGIUS GVILELMUS D G MARCHIO BRANDENB -/ NAT / ANN 1678 / DIE 16 NOV / DENAT A 1726 / DIE 18 DEC / AET 48 AN / REG 14
    inscription_rev: TOUJOURS LE MEME
    note:
      de: Die Stempel der doppelten Begräbnisdukaten schnitt vermutlich Georg Wilhelm Vestner. Auf der Rückseite ist das Ordenskreuz des 1705 von Georg Wilhelm gestifteten Ordens der Aufrichtigkeit 
        („Ordre de la Sincérité“), des Vorgängers des preußischen Roten Adlerordens, an einem Orangenbäumchen zu sehen.
      en: The dies of the double funeral ducats were probably cut by Georg Wilhelm Vestner. The reverse shows the cross of the Order of Sincerity ('Ordre de la Sincérité'), founded in 1705 by Georg 
        Wilhelm and the forerunner of the Prussian Order of the Red Eagle, hanging on a small orange tree.
      uk: Штемпелі подвійних поховальних дукатів вирізав, імовірно, Georg Wilhelm Vestner. На реверсі зображено орденський хрест ордена Щирості («Ordre de la Sincérité»), заснованого 1705 року Georg 
        Wilhelm і попередника прусського ордена Червоного орла, що висить на деревці помаранча.
    verification_note: *id001
