    inscription_obv: ER-[...] - [...] - C HO - E S
    inscription_rev: XXI ZV EINEM TALER
    note:
      de: Weinmeister führt diese Müntze als Fürstengroschen. Da 21 Stück auf den Gulden gingen, entspräche sie einem 1/21 Gulden; die Müntze selbst gibt jedoch ausdrücklich an, daß 21 auf den Thaler 
        gehen — es handelt sich also um ein 1/21-Thaler-Stück, nicht um einen Fürstengroschen. Trotz fehlender Jahreszahl wurde sie nach Weinmeister 1621 geprägt; wegen des fehlenden 
        Müntzmeisterzeichens ist die Müntzstätte nicht eindeutig zuzuordnen.
      en: Weinmeister lists this coin as a Fürstengroschen. Since 21 pieces went to the Gulden it would be a 1/21 Gulden; the coin itself, however, states expressly that 21 go to the Thaler — so it is
        a 1/21 Thaler piece, not a Fürstengroschen. Despite the missing date it was struck, per Weinmeister, in 1621; the missing mintmaster's mark leaves the mint uncertain.
      uk: Weinmeister відносить цю монету до Fürstengroschen. Оскільки 21 штука йшла на Gulden, це відповідало б 1/21 Gulden; проте сама монета прямо зазначає, що 21 йде на Thaler — тобто це 1/21 
        Thaler, а не Fürstengroschen. Попри відсутність дати, за Weinmeister її карбовано 1621 року; через відсутність знака монетника монетний двір лишається невизначеним.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18286681
