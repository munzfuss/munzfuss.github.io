    inscription_obv: D G AVGVSTVS III REX POLONIARUM
    inscription_rev: SAC ROM IMP ARCHIM ET ELECT 1758
    note:
      de: Die sächsischen Augustdor der Jahre 1755 und 1756 wurden als sogenannte Mittel- und Neu-Augustdor nachgemüntzt; die Müntzen sind rückdatiert und tragen die fiktive Signatur des Leipziger 
        Müntzmeisters Ernst Dietrich Croll (E–C). Während die Mittel-Augustdor mit vergleichsweise hohem Feingehalt äußerlich nicht auffallen, sind die geringwertigen Neu-Augustdor an kupfriger Farbe 
        und größerer Dicke zu erkennen. Dieses Stück wurde 1761 oder 1762 geprägt, aber auf 1758 rückdatiert.
      en: The Saxon Augustdor of 1755 and 1756 were restruck as so-called Mittel- and Neu-Augustdor; the coins are back-dated and bear the fictitious signature of the Leipzig mint master Ernst 
        Dietrich Croll (E–C). Whereas the Mittel-Augustdor, of comparatively high fineness, are outwardly inconspicuous, the debased Neu-Augustdor can be recognised by their coppery colour and greater
        thickness. This piece was struck in 1761 or 1762 but back-dated to 1758.
      uk: Саксонські Augustdor 1755 і 1756 років перекарбовували як так звані Mittel- та Neu-Augustdor; монети зворотно датовані й несуть вигадану сигнатуру лейпцизького монетного майстра Ernst 
        Dietrich Croll (E–C). Тоді як Mittel-Augustdor із порівняно високою пробою зовні непримітні, малоцінні Neu-Augustdor можна впізнати за мідним відтінком і більшою товщиною. Цей примірник 
        викарбувано 1761 чи 1762 року, але зворотно датовано 1758-м.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18204298
