      uk: Монета вказує на посаду генерал-намісника (Generalstatthalter), надану курфюрсту королем Maximilian I на рейхстазі в Konstanz 8 серпня 1507 року. Після повернення Maximilian I з обрання 
        римським імператором у Trient 4 лютого 1508 року намісництво Friedrich Мудрого припинилося; на знак пошани йому дозволили довічно носити титул генерал-намісника.
