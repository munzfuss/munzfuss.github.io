    note:
      de: Auf den Sieg über die Schweden in der Schlacht bei Fehrbellin am 18. Juni 1675. Die Rückseitenumschrift besagt sinngemäß, daß Friedrich Wilhelm das ganze schwedische Heer, welches die Mark 
        Brandenburg und Pommern verheerte, während er andernorts den Unterdrückten beistand, bei Fehrbellin am 18. Juni 1675 stellte und schlug.
      en: On the victory over the Swedes at the Battle of Fehrbellin on 18 June 1675. The reverse legend states, in substance, that Friedrich Wilhelm confronted and defeated at Fehrbellin on 18 June 
        1675 the entire Swedish army, which had been devastating the Mark Brandenburg and Pomerania while he was elsewhere aiding the oppressed.
      uk: На честь перемоги над шведами в битві під Fehrbellin 18 червня 1675 року. Напис реверсу за змістом свідчить, що Friedrich Wilhelm під Fehrbellin 18 червня 1675 року протистав і розбив усе 
        шведське військо, яке спустошувало Mark Brandenburg і Померанію, поки він деінде допомагав пригнобленим.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18215045
