    inscription_obv: GEORG V V G G KOENIG V HANNOVER
    inscription_rev: DEN / SIEGERN / BEI / WATERLOO / GEWIDMET / AM 18 JUNI / 1865
    note:
      de: Diese Gedenkprägung ist den Siegern der Schlacht von Waterloo (Belle Alliance) gewidmet, in der die verbündeten Truppen unter Wellington und Blücher — darunter hannoveranische Einheiten wie 
        die King's German Legion — Napoleon am 18. Juni 1815 südlich von Brüssel endgültig schlugen. Die Randschrift gibt den Wahlspruch des 1815 von König Georg IV. gestifteten Guelphenordens „NEC 
        ASPERA TERRENT“ (Widrigkeiten schrecken nicht) wieder.
      en: This commemorative issue is dedicated to the victors of the Battle of Waterloo (Belle Alliance), in which the allied troops under Wellington and Blücher — including Hanoverian units such as 
        the King's German Legion — finally defeated Napoleon south of Brussels on 18 June 1815. The edge inscription reproduces the motto of the Guelphenorden, founded in 1815 by King George IV, 'NEC 
        ASPERA TERRENT' (Adversity does not deter).
      uk: Ця пам'ятна емісія присвячена переможцям битви при Waterloo (Belle Alliance), у якій союзні війська під проводом Wellington і Blücher — зокрема ганноверські частини на кшталт King's German 
