    inscription_obv: IOHAN[S] / VAN GOTT / GNA ERWE / ZV NORW[E] / HER ZV SC/HL HOL
    note:
      de: Diese im Volksmund Reuterpfennige genannten Müntzen orientieren sich an den 1619 unter König Christian IV. von Dänemark geprägten Denningen, die 1625 in Dänemark eingezogen wurden und 
        ihrerseits den russischen Dengas (Tropf- oder Draht-Kopeken) nachempfunden sind.
      en: These coins, popularly called Reuterpfennige, follow the Denninge struck in 1619 under King Christian IV of Denmark — withdrawn in Denmark in 1625 — which themselves imitated the Russian 
        denga (drop or wire kopeck).
      uk: Ці монети, у народі звані Reuterpfennige, наслідують Denninge, карбовані 1619 року за короля Christian IV Данського (вилучені в Данії 1625 року), які самі копіювали російську денгу 
        (крапельні або дротяні копійки).
    verification_note: *id001
    composed_of:
      - unified-ikmk-18284712
