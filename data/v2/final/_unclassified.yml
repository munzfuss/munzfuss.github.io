    inscription_obv: SECVLVM NOVVM CELEBRAT RESP NORIBERGENSIS
    inscription_rev: TEMPORA NOSTRA PATER DONATA PACE CORONA
    note:
      de: Die Nürnberger Lammdukaten, benannt nach dem Bild des Gotteslamms auf der Weltkugel, waren eine besonders beliebte Geschenkmüntze. Die Dukaten auf die Jahrhundertwende — auch Friedenswunsch-
        und Neujahrsdukaten genannt — wurden in sieben Wertstufen vom Doppeldukaten biß zum winzigen 1/32-Dukaten („Linsendukat“) geprägt. Das Jahr 1700 ist auf einigen Stücken durch ein Chronogramm 
        (MDCC) in der Umschrift der Vorderseite angegeben.
      en: The Nuremberg Lamb Ducats, named after the image of the Lamb of God on the globe, were an especially popular gift coin. The turn-of-the-century ducats — also called peace-wish and New Year 
        ducats — were struck in seven denominations from the double ducat down to the tiny 1/32 ducat ('lentil ducat'). On some pieces the year 1700 is given by a chronogram (MDCC) in the obverse 
        legend.
      uk: Нюрнберзькі Lammdukaten, названі за зображенням Агнця Божого на земній кулі, були особливо популярною подарунковою монетою. Дукати на злам століть — звані також дукатами з побажанням миру та
        новорічними — карбували у семи номіналах від подвійного дуката до крихітного 1/32 дуката («сочевичного дуката»). На деяких примірниках рік 1700 позначено хронограмою (MDCC) у леґенді аверсу.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18224394
