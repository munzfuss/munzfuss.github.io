    inscription_obv: CAPITULUM CATHEDRALE OSNABRUGENSE SEDE VACANTE
    inscription_rev: orIetVr InfenebrIs LVX tVa es tenebrae tVae erVnt sICVt MerIDIes IsaIae 58 -/ occiduo pandunt se sidera Phoebo
    note:
      de: Geprägt während der Sedisvakanz in der kurfürstlichen Müntzstätte Hannover durch das Domkapitel Osnabrück; die Rückseitenaufschrift dient als Chronogramm für das Jahr 1698. Insgesamt wurden 
        1.000 Reichsspeciesthaler hergestellt, also 1333⅓ Reichsthaler nach Leipziger Fuß, bei berechneten Kosten von 1381 Thalern, so daß die Prägekosten bei 47⅔ Thalern lagen.
      en: Struck during the sede vacante at the electoral mint of Hannover by the cathedral chapter of Osnabrück; the reverse inscription serves as a chronogram for the year 1698. In all, 1,000 
        Reichsspeciestaler were produced — that is, 1333⅓ Reichstaler by the Leipziger Fuß — against a computed cost of 1,381 Taler, so the minting cost amounted to 47⅔ Taler.
      uk: Карбовано під час вакансії кафедри на курфюрстівському монетному дворі Hannover капітулом Osnabrück; напис реверсу слугує хронограмою 1698 року. Загалом виготовлено 1000 Reichsspeciestaler, 
        тобто 1333⅓ Reichstaler за Leipziger Fuß, за розрахункових витрат 1381 Thaler, отже вартість карбування становила 47⅔ Thaler.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18201768
