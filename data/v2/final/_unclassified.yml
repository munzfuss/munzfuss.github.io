    inscription_obv: D G FRID AUG REX POL DUX SAX ARCHIMARESCHALL & ELECT
    inscription_rev: IN PROVINCIIS IUR SAXON PROVISOR ET VICARIUS 1741
    note:
      de: In der Zeit zwischen dem Tod des alten und der Krönung des neuen deutschen Königs fungierten nach der Goldenen Bulle von 1356 die Kurfürsten von der Pfalz und von Sachsen als Reichsvikare. 
        Auf dieses Amt wurde erstmals 1612 und zuletzt 1792 durch besondere Müntzprägungen hingewiesen. Nach dem Tod Kaiser Karls VI. 1740 übernahm Friedrich August II. das Vikariat für alle Länder 
        sächsischen Rechts.
      en: In the interval between the death of the old and the coronation of the new German king, the Electors of the Palatinate and of Saxony acted as imperial vicars under the Golden Bull of 1356. 
        This office was marked by special coin issues, first in 1612 and last in 1792. After the death of Emperor Karl VI in 1740, Friedrich August II assumed the vicariate for all lands under Saxon 
        law.
      uk: У проміжку між смертю старого й коронацією нового німецького короля курфюрсти Пфальцу та Саксонії за Золотою буллою 1356 року виконували обов'язки імперських вікаріїв. На цю посаду вперше 
        вказали особливим карбуванням 1612 року, а востаннє — 1792 року. Після смерті імператора Karl VI 1740 року Friedrich August II перебрав вікаріат для всіх земель саксонського права.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18224403
