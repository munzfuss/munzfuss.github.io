    inscription_obv: FRIEDR WILHELM III KOENIG V PREUSSEN
    inscription_rev: EIN THALER - XIV EINE F M // 18-40
    note:
      de: Der Thaler von 1840 wurde nach dem Dresdener Müntzvertrag von 1838 ausgegeben. Von diesem Vereinsthaler wurden 14 Stück aus der Cöllnischen Marck (233,857 Gramm Feinsilber) geprägt; er 
        markierte den Anschluß des süddeutschen Guldens an den preußischen Thaler. Die Vereinsmüntze im Wert von zwei Thalern galt 3½ Gulden süddeutscher Währung.
      en: The Thaler of 1840 was issued under the Dresdener Münzvertrag of 1838. Fourteen of these Vereinsthaler were struck from the Cologne mark (233.857 grams of fine silver); it marked the linking
        of the South German Gulden to the Prussian Thaler. The Vereinsmünze worth two Thaler equalled 3½ Gulden in South German currency.
      uk: Thaler 1840 року випущено за Dresdener Münzvertrag 1838 року. Із Кельнської марки (233,857 грама чистого срібла) карбували 14 таких Vereinsthaler; він означав приєднання південнонімецького 
        Gulden до прусського Thaler. Vereinsmünze вартістю у два Thaler дорівнювала 3½ Gulden південнонімецької валюти.
