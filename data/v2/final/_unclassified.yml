    note:
      de: Kull (1889) wies diesen Typ Wilhelm Fugger zu Pfirt zu. Bürklin (1924) legte hingegen überzeugend dar, daß das W nicht für Wilhelm, sondern für die Müntzstätte Wasserburg steht; damit gehört
        der Typ zu den Kipperprägungen Georgs IV.
      en: Kull (1889) assigned this type to Wilhelm Fugger of Pfirt. Bürklin (1924), however, argued convincingly that the W stands not for Wilhelm but for the mint of Wasserburg; the type therefore 
        belongs to the Kipper coinage of Georg IV.
      uk: Kull (1889) відніс цей тип до Wilhelm Fugger zu Pfirt. Натомість Bürklin (1924) переконливо показав, що W означає не Wilhelm, а монетний двір Wasserburg; отже, тип належить до кіперівського 
        карбування Georg IV.
    verification_note: *id001
