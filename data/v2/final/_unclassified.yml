    inscription_obv: MONE REGI DAN NOR VICARI PHI REINH C S -/ I / GOLDT / GVL / 1627
    inscription_rev: QVID NON PRO RELIGIO -/ C 4
    note:
      de: Während des Dreißigjährigen Krieges besetzte Philipp Reinhard, Graf von Solms, Statthalter und Kommandant des dänischen Königs Christian IV., die Festung Wolfenbüttel. Hier belagerte ihn der
        kaiserliche Feldmarschall Graf Heinrich von Pappenheim und zwang ihn im Dezember 1627 zur Übergabe. Graf von Solms hatte zur Bezahlung seiner Garnison das fürstliche goldene und silberne 
        Tafelgeschirr in Dukaten und Thaler umprägen lassen. Es soll später fast vollständig wieder eingeschmolzen worden sein.
      en: During the Thirty Years' War Philipp Reinhard, Count of Solms, governor and commander for the Danish king Christian IV, occupied the fortress of Wolfenbüttel. There the imperial field 
        marshal Count Heinrich von Pappenheim besieged him and forced him to surrender in December 1627. To pay his garrison the Count of Solms had the princely gold and silver table plate re-struck 
        into Dukaten and Thaler. It is said to have been almost entirely melted down again later.
      uk: Під час Тридцятилітньої війни Філіпп Райнгард, граф Сольмс, намісник і командувач данського короля Христіана IV, зайняв фортецю Вольфенбюттель. Тут його обложив імперський фельдмаршал граф 
        Гайнріх фон Паппенгайм і в грудні 1627 року змусив здатися. Щоб платити гарнізону, граф Сольмс наказав перекарбувати княжий золотий і срібний столовий посуд на Dukaten і Thaler. Пізніше його, 
        як кажуть, майже повністю переплавили.
