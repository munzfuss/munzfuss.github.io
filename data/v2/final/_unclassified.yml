    inscription_obv: I COSEL X / 1761
    note:
      de: 'Während des Siebenjährigen Krieges wurde die preußische Festung Kosel (Cosel) von der österreichischen Armee unter Laudon belagert. Der Kommandant der Festung, Christoph Friedrich von Lattorf,
        schreibt in einem Brief an den Kriegs- und Etatminister für Schlesien, von Schlabrendorf, von den von ihm verausgabten Müntzen: „… die hiesigen messingnen Groschen, Kreutzer und Gröschel, welche
        ich in dieser Absicht anfertigen und roulliren lassen, …“. Die Stücke sind einseitige Prägungen.'
      en: "During the Seven Years' War the Prussian fortress of Kosel (Cosel) was besieged by the Austrian army under Laudon. The fortress commander, Christoph Friedrich von Lattorf, wrote in a letter to
        von Schlabrendorf, the war and finance minister for Silesia, of the coins he had issued: '… the local brass Groschen, Kreutzer and Gröschel, which I have had made and put into circulation for this
        purpose …'. The pieces are uniface strikes."
      uk: 'Під час Семилітньої війни прусську фортецю Козель (Cosel) облягала австрійська армія під командуванням Лаудона. Комендант фортеці Крістоф Фрідріх фон Латторф писав у листі до фон Шлабрендорфа,
        воєнного та фінансового міністра Сілезії, про випущені ним монети: «… тутешні латунні Groschen, Kreutzer і Gröschel, які я з цією метою наказав виготовити та пустити в обіг …». Ці штуки — односторонні
        карбування.'
