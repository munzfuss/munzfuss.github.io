    inscription_obv: FELICIT - TEMPORUM
    inscription_rev: F CONIVGIO / S W H L C / HAN CUM / S W C DAN P / STAB DEV / RPR SEN / NEO HAN / 1764 / I I E
    note:
      de: 'Der Dukat ist ein Präsent der Neustadt Hanau anläßlich der Vermählung Wilhelms von Hessen-Kassel mit der dänischen Prinzessin Wilhelmine Caroline. Die Stempel zu dieser Goldmüntze wurden von
        einer Frau geschnitten: Charlotte Rebecca Damisel, geb. Schildt aus Frankfurt-Sachsenhausen, war 1734 als Tochter des Stempelschneiders Christian Leberecht Schildt geboren worden; sie heiratete
        1756 den Siegelstecher Jerome Damisel. 1761 biß 1765 war sie Stempelschneiderin in Hanau, später ging sie nach Paris.'
      en: 'The ducat is a present of the Neustadt of Hanau on the occasion of the marriage of Wilhelm of Hesse-Kassel to the Danish princess Wilhelmine Caroline. The dies for this gold coin were cut by
        a woman: Charlotte Rebecca Damisel, née Schildt of Frankfurt-Sachsenhausen, born in 1734 as daughter of the die-cutter Christian Leberecht Schildt; she married the seal-engraver Jerome Damisel in
        1756. From 1761 to 1765 she was a die-cutter in Hanau; later she went to Paris.'
      uk: 'Дукат є подарунком Нового міста Hanau з нагоди одруження Wilhelm von Hessen-Kassel з данською принцесою Wilhelmine Caroline. Штемпелі для цієї золотої монети вирізала жінка: Charlotte Rebecca
        Damisel, уроджена Schildt із Frankfurt-Sachsenhausen, народилася 1734 року як донька різьбяра штемпелів Christian Leberecht Schildt; 1756 року вона одружилася з різьбярем печаток Jerome Damisel.
        Від 1761 до 1765 року вона була різьбяркою штемпелів у Hanau, згодом переїхала до Парижа.'
    verification_note: *id001
    composed_of:
      - unified-ikmk-18206361
