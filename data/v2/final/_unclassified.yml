    inscription_obv: FRID DVX SAXONIE PRINCEPS ELECTOR ET SACRI -/ ROMA IMPER LOCVM TENENS GENE
    inscription_rev: MAXIMILIANVS ROM REX SEMPER AVGVSTVS
    note:
      de: Die Prägung verweist auf die Generalstatthalterwürde, die dem Kurfürsten am 8. August 1507 von König Maximilian I. auf dem Reichstag zu Konstanz übertragen wurde. Nach der Rückkehr 
        Maximilians I. von seiner am 4. Februar 1508 in Trient erfolgten Wahl zum Römischen Kaiser erlosch das Statthalteramt Friedrichs des Weisen; ehrenhalber durfte er den Titel des 
        Generalstatthalters jedoch auf Lebenszeit führen.
      en: The coin refers to the office of Generalstatthalter conferred on the Elector by King Maximilian I at the Diet of Constance on 8 August 1507. After Maximilian I returned from his election as 
        Roman Emperor at Trent on 4 February 1508, Frederick the Wise's governorship lapsed; he was nonetheless permitted to bear the title of Generalstatthalter for life as an honour.
      uk: Монета вказує на посаду генерал-намісника (Generalstatthalter), надану курфюрсту королем Maximilian I на рейхстазі в Konstanz 8 серпня 1507 року. Після повернення Maximilian I з обрання 
        римським імператором у Trient 4 лютого 1508 року намісництво Friedrich Мудрого припинилося; на знак пошани йому дозволили довічно носити титул генерал-намісника.
    verification_note: *id001
