    inscription_rev: I VERDER DOBBELSCHILLING 1621
    note:
      de: Der Gegenstempel VD wird teils als „Verdener Domkapitel“, teils als „Verder Doppelschilling“ gedeutet. Die Gegenstempel wurden ab 1624 auf die Kupfermüntzen des verstorbenen Bischofs 
        geschlagen, um diese gegen grobes Reichsgeld eintauschen zu können.
      en: The countermark VD has been interpreted variously as 'Verdener Domkapitel' (Verden cathedral chapter) or as 'Verder Doppelschilling'. From 1624 the countermarks were applied to the copper 
        coins of the deceased bishop so that they could be exchanged for coarse imperial money.
      uk: Контрамарку VD тлумачать то як «Verdener Domkapitel» (Верденський соборний капітул), то як «Verder Doppelschilling». Від 1624 року ці контрамарки ставили на мідні монети покійного єпископа, 
        щоб їх можна було обміняти на грубу імперську монету.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18236473
