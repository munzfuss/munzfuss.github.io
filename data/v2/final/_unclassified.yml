      de: Heller waren dünne Silbermüntzen, die erstmals in Schwäbisch Hall geprägt wurden und daher ihren Namen erhielten. Später waren sie auch in anderen Städten, besonders Süddeutschlands, 
        verbreitet. Seit dem 16. Jahrhundert bezeichnete der Heller eine Scheidemüntze aus Kupfer, die in Hessen biß 1866 herausgegeben wurde.
      en: Heller were thin silver coins first struck at Schwäbisch Hall, from which they took their name. Later they became widespread in other cities, especially in southern Germany. From the 16th 
        century the Heller denoted a copper token coin, issued in Hesse until 1866.
      uk: Heller — тонкі срібні монети, які вперше викарбували у Швебіш-Галлі, звідки й походить їхня назва. Пізніше вони поширилися і в інших містах, особливо на півдні Німеччини. Від XVI століття 
        Heller позначав мідну розмінну монету, яку в Гессені випускали до 1866 року.
