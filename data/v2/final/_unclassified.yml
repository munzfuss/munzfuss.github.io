    inscription_obv: H H F G K
    note:
      de: Johann Friedrich (auch Hans Friedrich) verehrte diese Müntzen in Gold den Reichsherolden, die ihm das kaiserliche Achtsmandat überbrachten; diese Stücke in Silber von drei Groschen biß 
        Talergröße erhielten auch die Truppen Johann Friedrichs. Anlaß der aus Gotha stammenden Prägungen und der verhängten Acht waren die sogenannten Grumbacher Händel, durch die Johann Friedrich 
        wieder in den Besitz der durch seinen Vater Johann Friedrich den Älteren verlorenen Kurwürde gelangen wollte. Er bezahlte diesen Versuch mit Gefängnis.
      en: Johann Friedrich (also Hans Friedrich) presented these coins in gold to the imperial heralds who delivered the imperial ban to him; the silver pieces, from three Groschen up to Thaler size, 
        were also given to Johann Friedrich's troops. The occasion of these Gotha strikings and of the ban imposed on him was the so-called Grumbach Affair, by which Johann Friedrich sought to regain 
        the electoral dignity lost by his father Johann Friedrich the Elder. He paid for the attempt with imprisonment.
      uk: Йоганн Фрідріх (також Ганс Фрідріх) підносив ці монети в золоті імперським герольдам, які вручили йому імперську опалу; срібні ж штуки — від трьох грошів до розміру талера — отримали й 
        війська Йоганна Фрідріха. Приводом для цих карбувань з Готи та накладеної опали були так звані Ґрумбахські чвари, якими Йоганн Фрідріх прагнув повернути курфюрстську гідність, втрачену його 
        батьком Йоганном Фрідріхом Старшим. За цю спробу він поплатився увʼязненням.
