        auf den Tod der Herzogin 1671 geprägt worden. Sibylla Ursula war die Tochter des Herzogs August von Braunschweig-Wolfenbüttel und soll eine gelehrte und gottesfürchtige, des Lateinischen mächtige
        Dame gewesen sein.'
      en: 'Obverse text: SIBYLLA - URSULA / AUGUSTI DUC BRUNS & LUNAEB / FILIA NATU MAXMA / CHRISTIANI H N DUC SCHL HOLSAT / CONIUX SVAVISSIMA / NAT IV DECEMB A C MDCXXIX / RENAT IV MART MDCXXX / NUP XX
        SEPT MDCLXIII / ET POSTQ IV UMPARTUM X DEC EDID / DENAT XII DECEMB MDCLXXI / HUMA CU FILIOL VI FE MDCLXXII / PRINCEPS PIA SAPIENS / DOCTA BENE FICA IN/COMPARABILIS. This show piece was struck on
        the death of the duchess in 1671. Sibylla Ursula was the daughter of Duke August of Braunschweig-Wolfenbüttel and is said to have been a learned and God-fearing lady, well versed in Latin.'
      uk: 'Текст аверсу: SIBYLLA - URSULA / AUGUSTI DUC BRUNS & LUNAEB / FILIA NATU MAXMA / CHRISTIANI H N DUC SCHL HOLSAT / CONIUX SVAVISSIMA / NAT IV DECEMB A C MDCXXIX / RENAT IV MART MDCXXX / NUP XX
        SEPT MDCLXIII / ET POSTQ IV UMPARTUM X DEC EDID / DENAT XII DECEMB MDCLXXI / HUMA CU FILIOL VI FE MDCLXXII / PRINCEPS PIA SAPIENS / DOCTA BENE FICA IN/COMPARABILIS. Цю парадну штуку викарбувано
        на смерть герцогині 1671 року. Sibylla Ursula була донькою герцога August von Braunschweig-Wolfenbüttel і, як переказують, була вченою та богобоязливою пані, що добре володіла латиною.'
    verification_note: *id001
