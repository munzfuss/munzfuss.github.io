        seit 1877 mit Marie, Prinzessin von Waldeck und Pyrmont, verheiratet gewesen.
      en: The coin was struck in 1911 at the Stuttgart mint for the silver wedding of King Wilhelm II and Charlotte, Princess of Schaumburg-Lippe. Wilhelm II had earlier been married, in his first 
        marriage from 1877, to Marie, Princess of Waldeck and Pyrmont.
      uk: Монету викарбувано 1911 року на монетному дворі Штутгарта з нагоди срібного весілля короля Вільгельма II та Шарлотти, принцеси Шаумбург-Ліппе. Раніше, у першому шлюбі від 1877 року, 
        Вільгельм II був одружений з Марією, принцесою Вальдек-Пірмонт.
