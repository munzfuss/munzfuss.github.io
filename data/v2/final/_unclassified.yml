    inscription_obv: FRID D G REX - BORVSS EL BR
    inscription_rev: A REGIA AD - COELESTEM // OBIIT 25 FEBR / SEPVLT 2 MAI / 1713
    note:
      de: Am 2. Mai wurde für den am 25. Februar 1713 gestorbenen König Friedrich I. in Berlin eine prunkvolle Begräbnisfeier zelebriert. Der sofort nach dem Tode des Vaters ein drastisches 
        Sparprogramm über Preußen verhängende Nachfolger Friedrich Wilhelm I. ließ dies als das letzte Fest des Pomp liebenden Vaters noch zu; danach wurde am Berliner Hof eisern gespart, und Hoffeste
        in der Tradition des ersten Königs in Preußen fanden nicht mehr statt.
      en: On 2 May a splendid funeral was held in Berlin for King Friedrich I, who had died on 25 February 1713. His successor Friedrich Wilhelm I, who imposed a drastic austerity programme on Prussia
        immediately after his father's death, still allowed this as the last festivity of his pomp-loving father; thereafter the Berlin court economised strictly, and court festivities in the 
        tradition of the first King in Prussia no longer took place.
      uk: 2 травня в Берліні відбулася пишна поховальна церемонія для короля Friedrich I, який помер 25 лютого 1713 року. Його наступник Friedrich Wilhelm I, що одразу після смерті батька запровадив у
        Пруссії сувору ощадливість, дозволив це як останнє свято схильного до пишноти батька; згодом при Берлінському дворі економили залізно, і придворні свята в традиції першого короля в Пруссії 
        більше не відбувалися.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18203866
