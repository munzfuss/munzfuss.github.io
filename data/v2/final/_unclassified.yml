    inscription_obv: SIGISMVNDVS FRANC C D G ARCHIDVX AVS
    inscription_rev: DVX BVRGVNDI COM TYROLIS 16-65
    note:
      de: Am 22. Juli 1870 fand in Mehlbek, Kreis Steinburg, der Tagelöhner Hinrich Schmidt beim Reinigen eines Grabens einen Topf mit 99 Silbermüntzen. Die Müntzen wurden an den Landrat in Itzehoe 
        gesandt, von dort an die königliche Regierung in Schleswig, von hier an den „Conservator vaterländischer Alterthümer“ in Kiel. Dieser schlug vor, den Fund dem königlichen Müntzkabinett in 
        Berlin zum Kauf anzubieten (biß auf eine Müntze); Generaldirektor J. Friedländer erwarb drei Müntzen zum Gesamtpreis von neun Thalern für das Berliner Kabinett.
      en: On 22 July 1870 at Mehlbek, Kreis Steinburg, the day-labourer Hinrich Schmidt found a pot with 99 silver coins while cleaning a ditch. The coins were sent to the Landrat at Itzehoe, thence 
        to the royal government in Schleswig, and from there to the 'Conservator of national antiquities' in Kiel. He proposed to offer the find to the royal Coin Cabinet in Berlin for purchase (all 
        but one coin); director-general J. Friedländer acquired three coins for a total of nine Taler for the Berlin cabinet.
      uk: 22 липня 1870 року в Mehlbek, округ Steinburg, поденник Hinrich Schmidt під час чищення канави знайшов горщик із 99 срібними монетами. Монети надіслали ландратові в Itzehoe, звідти — до 
        королівського уряду в Schleswig, а далі — до «консерватора вітчизняних старожитностей» у Kiel. Той запропонував продати знахідку королівському Монетному кабінету в Берліні (окрім однієї 
        монети); генеральний директор J. Friedländer придбав три монети за загальну ціну дев'ять Taler для берлінського кабінету.
    verification_note: *id001
    composed_of:
      - unified-ikmk-18214517
