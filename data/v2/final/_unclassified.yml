    inscription_obv: FRID WILH D G M BR S R I ARC & EL
    inscription_rev: MONETA NOVA ARGENTEA 1679
    note:
      de: Um dem gestiegenen Silberpreis Rechnung zu tragen, einigten sich 1667 die Kurfürsten von Brandenburg und Sachsen auf einer Zusammenkunft im Kloster Zinna bei Jüterbog auf einen gemeinsamen, 
        vom Reichsfuß abweichenden Müntzfuß, der ab 1670 für alle brandenburgischen Müntzstätten verbindlich war. Dieser sogenannte Zinnaische Müntzfuß (10½-Thalerfuß), der 1682 und 1687 nochmals 
        verringert wurde, galt für alle Müntzsorten. Um das Recht von Kaiser und Reich nicht zu verletzen, wurde der Thaler aber nicht angetastet und als neue Großsilbermüntze ein Zweidritteltalerwert
        (Gulden) eingeführt.
      en: To take account of the risen silver price, in 1667 the electors of Brandenburg and Saxony agreed at a meeting in the Zinna monastery near Jüterbog on a common Münzfuß deviating from the 
        imperial standard, binding for all Brandenburg mints from 1670. This so-called Zinnaischer Münzfuß (10½-Talerfuß), reduced again in 1682 and 1687, applied to all coin types. In order not to 
        infringe the right of emperor and empire, the Taler itself was left untouched, and a two-thirds-Taler value (Gulden) was introduced as the new large silver coin.
      uk: Щоб урахувати зрослу ціну срібла, 1667 року курфюрсти Бранденбургу та Саксонії на зустрічі в монастирі Zinna поблизу Jüterbog домовилися про спільний Münzfuß, відмінний від імперської стопи,
        обов'язковий для всіх бранденбурзьких монетних дворів від 1670 року. Ця так звана Zinnaischer Münzfuß (10½-Talerfuß), ще раз знижена 1682 і 1687 років, стосувалася всіх видів монет. Щоб не 
        порушувати права імператора та імперії, самого Taler не чіпали, а як нову велику срібну монету запровадили вартість у дві третини Taler (Gulden).
    verification_note: *id001
    composed_of:
      - unified-ikmk-18214596
