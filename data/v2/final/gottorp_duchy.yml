      Samuel Timpf (1617–1620), Kipper-period sub-emission far below the Reichsmüntzfuß standard. Die-variants Lange 339b
      (1618) and 339c (1619) documented under the KM#46 type; further sub-dies with legend variations (HOL/HO, HER/HAER, SCHL/SLES,
      etc.) flagged «cf. Lange 339 B/C» — see the IKMK specimen corpus.
    uk: 1/16 Thaler · Фредерік III (Гольштейн-Ґотторп), 1617–1619 · монетний двір Burg auf Fehmarn під монетмайстром Samuel
