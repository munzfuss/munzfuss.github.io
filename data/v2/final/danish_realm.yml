  note:
    de: 1 Kroneskilling — Subeinheit der Corona Danica im offiziellen Tarif 1 Krone = 96 Kroneskilling<sup><a href="#ref2">[2]</a><a
      href="#ref3">[3]</a></sup>. Empirisches Feinsilber 0,33 g ist ca. 2× höher als der Krone-Müntzfuß (16,250÷96 = 0,17
      g) prophezeien würde — typisch für Kleinmünzen, die mehr Silber pro Tarif tragen als die übergeordnete Tarifmünze.
    en: 1 Kroneskilling — subunit of the Corona Danica at the official tariff 1 Krone = 96 Kroneskilling<sup><a href="#ref2">[2]</a><a
      href="#ref3">[3]</a></sup>. Empirical fine silver 0.33 g is about 2× what the Krone standard (16.250÷96 = 0.17 g) would
      predict — typical for petty coins, which carry more silver per tariff than the parent tariff coin.
    uk: 1 Kroneskilling — субодиниця Corona Danica за офіційним тарифом 1 Krone = 96 Kroneskilling<sup><a href="#ref2">[2]</a><a
      href="#ref3">[3]</a></sup>. Емпіричне чисте срібло 0,33 г — приблизно 2× більше, ніж передбачає Krone-стопа (16,250÷96
      = 0,17 г) — типово для дрібних монет, які несуть більше срібла на тариф, ніж батьківська тарифна монета.
