      114A-E folded under KM-82: 114A trekløver (Schwabe, Sieg-1971 64.1), 114B crossed clubs (Sieg-1971 64.2), 114C bird
      (Sieg-1971 64.3), 114D crossed fire-hooks (Sieg-1971 64.4), 114E scallop (Johan Post — uncertain, Sieg-1971 64.5, one
      of the most-disputed Christian IV rarities) · Bruttovægt 2.101g · Finvægt 1.806g · 10.793 daler per Marken-fein · Numista/ucoin
      1.85g likely typo (≈ Finvægt, not Brutto) · Literature: Fornitz in Bruun Rasmussen auktion 752 (2005).'
    uk: '8 Kroneskilling 1620-1621 — найбільша Kroneskilling-монета, реверс «1/18 krone» · п''ять варіантів монетмейстера
