      en: 'Hede f3h44 records this type verbatim as «Pålydende: 1 Guldkrone» (Bruttovægt 5.590 g · Finhed 0.917 · Finvægt 5.126 g · København 1666). Late Frederik III Guldkrone, Copenhagen continuation after the Glückstadt 1657-1660 mass-issue; slight under-weight (Δ −6 %) typical for the 1666 late issue. Previously misplaced under reichsdukatenfuss × 2; bullion fineness .917 ≠ Reichsdukat .986 — no fit. Sister entries km-40-2-fr-iii-1657 (Glückstadt Hede 145B) and km-303-fr-iii-1668 (Copenhagen) were already correctly placed under guldkrone × 1 kind=tarif.'
      uk: 'Hede f3h44 verbatim класифікує цей тип як «Pålydende: 1 Guldkrone» (Bruttovægt 5,590 г · Finhed 0,917 · Finvægt 5,126 г · København 1666). Пізня Frederik-III-Guldkrone, копенгагенське продовження після ґлюкштадтського масового 1657-1660; легке під-вага (Δ −6 %) типове для 1666 пізнього випуску. Раніше помилково під reichsdukatenfuss × 2; проба .917 ≠ .986 Reichsdukat — не вписується. Sister-записи km-40-2-fr-iii-1657 (Glückstadt Hede 145B) і km-303-fr-iii-1668 (Копенгаген) вже були правильно під guldkrone × 1 kind=tarif.'
