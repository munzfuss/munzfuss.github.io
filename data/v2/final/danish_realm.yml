  note:
    de: '6 Skilling Christians IV. 1628-1629 (Kopenhagen, deutsche Umschrift «VI SCHILL DANSCH») — 1/16 Speciedaler · Sondervariante:
      gemeinsam mit Bürgermeister Jacob Michelsen und Johan Brahm betrieb Matthias Clausen 1629 kurzzeitig die sog. Borgerskabets
      Mønt in Kopenhagen; nach Wilcke wurde die 6-Skilling-Münze trotz deutscher Inschrift hier geprägt · zwei Müntzmeister-Varianten
      nach Hede 140 unter KM-110 zusammengefaßt: 140A kombiniertes R+D-Mzz (1628 + 1629 R), Standard nach Forordning 22 dec
      1627: Finhed 0.781, Finvægt 1,384g, Marken-fin 10,560 daler; 140B treblad-Mzz (1629), Standard nach Forordning 15 nov
      1628: Finhed 0.774, Finvægt 1,372g, Marken-fin 10,654 daler · gemeinsame Bruttovægt 1,771g · Tarif am 10. okt 1629 auf
      5½ skilling gesenkt · Literatur: Aagaard / Märcher, NNUM 2016/4 s.117-127.'
    en: '6 Skilling Christian IV 1628-1629 (Copenhagen, German legend «VI SCHILL DANSCH») — 1/16 Speciedaler · special variant:
      alongside Burgomaster Jacob Michelsen and Johan Brahm, Matthias Clausen briefly operated the so-called Borgerskabets
      Mønt («Citizens'' Mint») in Copenhagen during 1629; per Wilcke, despite the German legend this 6-skilling was struck
      there · two mint-master variants per Hede 140 folded under KM-110: 140A combined R+D privy mark (1628 + 1629 R), standard
      per Forordning 22 Dec 1627: Finhed 0.781, Finvægt 1.384g, 10.560 daler per Marken-fein; 140B trefoil (treblad) privy
      mark (1629), standard per Forordning 15 Nov 1628: Finhed 0.774, Finvægt 1.372g, 10.654 daler per Marken-fein · shared
      Bruttovægt 1.771g · tariff lowered to 5½ skilling on 10 Oct 1629 · Literature: Aagaard / Märcher, NNUM 2016/4 pp.117-127.'
    uk: '6 Skilling Кристіана IV 1628-1629 (Копенгаген, німецький легенда «VI SCHILL DANSCH») — 1/16 Speciedaler · спецваріант:
      спільно з бургомістром Jacob Michelsen та Johan Brahm Matthias Clausen 1629 р. короткочасно керував так званим Borgerskabets
      Mønt у Копенгагені; за Wilcke попри німецьку легенду 6-скилінгівка карбувалась саме там · два варіанти монетмейстера
      за Hede 140 об''єднані під KM-110: 140A комбінований Mzz R+D (1628 + 1629 R), стандарт за Forordning 22 dec 1627: Finhed
      0.781, Finvægt 1,384г, Marken-fin 10,560 daler; 140B treblad Mzz (1629), стандарт за Forordning 15 nov 1628: Finhed
      0.774, Finvægt 1,372г, Marken-fin 10,654 daler · спільний Bruttovægt 1,771г · 10 окт 1629 тариф знижено до 5½ skilling
      · Література: Aagaard / Märcher, NNUM 2016/4 с.117-127.'
  verification_note:
    de: Mzm. ursprünglich als Glückstadt erfaßt; bei späterer Auditierung gegen Hede c4h140 + ucoin tid 97086 als königlich-dänische
      Kopenhagener (Borgerskabets-Mønt) Prägung re-attribuiert. KM-110 ist Denmark-Register.
    en: Mint originally recorded as Glückstadt; on later audit against Hede c4h140 + ucoin tid 97086 re-attributed as a Royal
      Danish Copenhagen (Borgerskabets Mønt) issue. KM-110 is Denmark register.
