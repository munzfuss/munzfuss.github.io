      помилку Hede 1971 («mistakenly listed as 80A»), хоча Hede 1971 f3h80 документує лише срібний 1 Speciedaler 1668-1669.
      Монетмайстер Gotfred Krüger; єдиний інший відомий екземпляр у Національному музеї Данії (Beskrivelsen 884).
