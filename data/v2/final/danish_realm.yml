      (1612, 1613, 1614), <b>99B</b> blomst (1614), <b>99C</b> trekløver (1614 RR, 1615–1618), <b>99D</b> korslagte køller
      (1614–1618). Identische Iconographie (Forside Porträt, bagside værdiangivelse + Schild), identische Tarif-Theilung.
      Krause-DK bündelt alle vier Mzm.-Untervarianten unter KM-DK# 52. Spätauditierung gegen ucoin Period (Speciedaler 1582–1624
      — Royal Danish Copenhagen) bestätigt die Kopenhagener Herkunft; kein direkter Hede-Mzm.-Beleg für eine bestimmte Untervariante
      in unserem Datensatz.'
    en: '1 Mark of Christian IV (1612–1618) — 1/3 Speciedaler subdivision, Copenhagen. Hede c4h99 publishes a single specification
      for four mintmark sub-variants: Bruttovægt 8.661 g, Finhed 0.593, Finvægt 5.143 g, Marken fin udbragt til 11.368 daler.
      The sub-variants differ only by mintmaster privy mark: <b>99A</b> rose over crossed fire-hooks (1612, 1613, 1614), <b>99B</b>
      flower (1614), <b>99C</b> trefoil (1614 RR, 1615–1618), <b>99D</b> crossed clubs (1614–1618). Identical iconography
      (obverse portrait, reverse value + shield) and identical tariff subdivision. Krause-DK groups all four mintmark sub-variants
      under KM-DK# 52. Later audit against the ucoin Period («Speciedaler 1582–1624» — Royal Danish Copenhagen) confirms the
      Copenhagen mint; no direct Hede mint-master attestation pins a single sub-variant in our dataset.'
    uk: '1 Mark Кристіана IV (1612–1618) — поділ 1/3 Speciedaler, Копенгаген. Hede c4h99 публікує спільну специфікацію для
      чотирьох sub-варіантів за карбівником: Bruttovægt 8,661 г, Finhed 0,593, Finvægt 5,143 г, Marken fin udbragt til 11,368
      daler. Sub-варіанти різняться лише позначкою карбівника: <b>99A</b> троянда на схрещених жарових гаках (1612, 1613,
      1614), <b>99B</b> квітка (1614), <b>99C</b> трилисник (1614 RR, 1615–1618), <b>99D</b> схрещені палиці (1614–1618).
      Тотожна іконографія (аверс портрет, реверс позначення вартості + щит) і тотожний тарифний поділ. Krause-DK групує всі
      чотири sub-варіанти під KM-DK# 52. Пізніший аудит проти ucoin-періоду («Speciedaler 1582–1624» — королівсько-данський
      Копенгаген) підтверджує копенгагенський монетний двір; прямого підтвердження карбівника за Hede для окремого sub-варіанта
      в нашому наборі немає.'
