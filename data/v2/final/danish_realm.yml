    note:
      de: '1/16 Dukat Christians IV. (1648 — letztes Regierungsjahr, Christian IV. † 28. Februar 1648). Goldemission der Reichsdukatenfuß-Theilung (3,49 g rau / 16 = 0,218 g pro Stück). Münzstätte ist nicht eindeutig: ucoin-Periode «Rigsdaler 1625–1699» deckt sowohl Glückstadt als auch København ab. ucoin gibt weder Rohgewicht noch Feingehalt an — beide Werte hier <em>aus dem Reichsdukatenfuß-Standard berechnet</em>. ucoin-Eintrag tid 97384 (KM-DK# 174); in Numista nicht direkt katalogisiert.'
      en: '1/16 Ducat of Christian IV (1648 — last regnal year, Christian IV. † 28 February 1648). Gold issue at the Reichsdukatenfuß subdivision (3.49 g rough / 16 = 0.218 g per piece). Mint is not unambiguous: the ucoin period «Rigsdaler 1625–1699» covers both Glückstadt and Copenhagen. ucoin gives neither weight nor fineness — both values here are <em>computed from the Reichsdukatenfuß standard</em>. ucoin entry tid 97384 (KM-DK# 174); not catalogued directly by Numista.'
      uk: '1/16 Dukat Кристіана IV (1648 — останній рік правління, Кристіан IV † 28 лютого 1648). Золотий випуск Reichsdukatenfuß-поділу (3,49 г груб. / 16 = 0,218 г на штуку). Монетний двір неоднозначний: ucoin-період «Rigsdaler 1625–1699» покриває як Глюкштадт, так і Копенгаген. ucoin не дає ні ваги, ні проби — обидва значення тут <em>обчислено зі стандарту Reichsdukatenfuß</em>. ucoin запис tid 97384 (KM-DK# 174); у Numista окремо не каталогізовано.'
    verification_note:
      de: Mzm. ursprünglich als Glückstadt erfaßt; bei späterer Auditierung gegen ucoin Period (Rigsdaler 1625-1699 bzw. Speciedaler 1582-1624 — Royal Danish Copenhagen) und KM-DK# 174 (Royal-Danish-Krause-Index ohne SH-Pendant) als königlich-dänische Kopenhagener Prägung re-attribuiert (1648). Mzm. weiterhin (?) — kein direkter Hede/Wilcke-Beleg.
      en: Mint originally recorded as Glückstadt; on later audit against ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) and KM-DK# 174 (Royal Danish Krause index with no SH counterpart), re-attributed as a Royal Danish Copenhagen issue (1648). Mint still (?) — no direct Hede / Wilcke attestation.
      uk: Монетний двір спочатку записано як Глюкштадт; під час подальшого аудиту проти ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) та KM-DK# 174 (Royal-Danish-Krause-індекс без SH-аналогу) переатрибутовано як королівсько-данську копенгагенську монету (1648). Монетний двір лишається (?) — прямого підтвердження за Hede/Wilcke немає.
