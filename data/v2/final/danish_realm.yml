    verification_note:
      de: 'Hede-Seed: Müntzfuß-Zuordnung, Phase und Per-Münze-Verifikation stehen noch aus. Privat udmøntet Speciedaler (per Aagaard NNUM 2/2009 + Wilcke «Speciedaleren (3 Mark) 1563» in *Daler, Mark og Kroner 1481-1914* S. 76-78), nicht staatliche Ausgabe; «III MARCK DANSKE»-Legende als Nominalbezeichnung. Marken-fin 8,533 speciedaler — etwas schwerer als Christian-III.-1541 (8,827), eigene private Wahl des Münzherrn. Jahresangabe «LXIII» (1563). Verwandt mit c4h43 «1 Speciedaler 1590» (gleiches Aagaard-Article).'
      en: 'Hede seed: Müntzfuß assignment, phase and per-coin verification still outstanding. Privately-minted speciedaler (per Aagaard NNUM 2/2009 + Wilcke «Speciedaleren (3 Mark) 1563» in *Daler, Mark og Kroner 1481-1914* pp. 76-78), not state issue; «III MARCK DANSKE» legend as nominal-account label. Marken-fin 8.533 speciedaler — slightly heavier than Christian-III-1541 (8.827), the private mintmaster''s own choice. Year inscribed as «LXIII» (1563). Related to c4h43 «1 Speciedaler 1590» (same Aagaard article).'
      uk: 'Hede-seed: призначення Müntzfuß, фази та покоінна верифікація очікуються. Приватно карбований Speciedaler (за Aagaard NNUM 2/2009 + Wilcke «Speciedaleren (3 Mark) 1563» в *Daler, Mark og Kroner 1481-1914* с. 76-78), не державний випуск; легенда «III MARCK DANSKE» як обліковий номінал. Marken-fin 8,533 speciedaler — трохи важче за Christian-III-1541 (8,827), власний вибір приватного карбувальника. Рік на легенді «LXIII» (1563). Споріднений з c4h43 «1 Speciedaler 1590» (та сама стаття Aagaard).'
    composed_of:
      - unified-dk-hede-f2h8b
