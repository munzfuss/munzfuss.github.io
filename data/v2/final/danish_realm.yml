  verification_note:
    de: 'Reckoning 2 Mark = 1/2 Speciesdaler nach Wikipedia DE «Speciestaler»: «seit vor 1619 Speciesdaler (4 Rigsmarker zu
      20 Skillinger Currentmönt) im 9 1/4 Taler-Fuß» — d. h. 4 Mark Danske = 1 Speciedaler pre-Corona-Danica (1604 vor der
      späteren Umstellung auf 6 Mark = 1 Speciedaler im Krone-Zeitalter ab 1644). Hede c4h76 und das danskmoent.dk-Index «2mark.htm»
      bestätigen Hede 76 / Sieg 82 / Schou 13-16 als KM-23-Typ-Klassifikation; Total-Auflage 424 Daler-equivalent. Gewichtsspread
      Numista 18,37 g vs ucoin 16,58 g (≈ 10 %) typisch für einen 424-Daler-Kleintirage — beide Werte als Specimen-Belege
      in weight_rough_g aufgeführt. Δ unter 1/2 × 9-Fuß: Numista -8,7 %, ucoin -17 %; Numista-Wert paßt besser zu der Norm
      für eine Kleinauflage Christians IV. vor der Kipper-Zeit.'
    en: 'Reckoning «2 Mark = 1/2 Speciedaler» per Wikipedia DE «Speciestaler»: «seit vor 1619 Speciesdaler (4 Rigsmarker zu
      20 Skillinger Currentmönt) im 9 1/4 Taler-Fuß» — i.e. 4 Mark Danske = 1 Speciedaler pre-Corona-Danica (1604 predates
      the shift to 6 Mark = 1 Speciedaler under the Krone era from 1644). Hede c4h76 and the danskmoent.dk «2mark.htm» index
      confirm Hede 76 / Sieg 82 / Schou 13-16 as the KM-23 type classification; total mintage 424 Daler-equivalent. Weight
      spread Numista 18.37 g vs ucoin 16.58 g (≈ 10 %) is typical for a 424-Daler small mintage — both values preserved as
      specimen attestations in weight_rough_g. Δ under 1/2 × 9-Fuß: Numista -8.7 %, ucoin -17 %; Numista''s value matches
      the norm for a small pre-Kipper Christian IV emission better.'
    uk: 'Reckoning «2 Mark = 1/2 Speciedaler» згідно Wikipedia DE «Speciestaler»: «seit vor 1619 Speciesdaler (4 Rigsmarker
      zu 20 Skillinger Currentmönt) im 9 1/4 Taler-Fuß» — тобто 4 Mark Danske = 1 Speciedaler до Corona Danica (1604 — до
      пізнішого переходу на 6 Mark = 1 Speciedaler у Krone-епосі з 1644). Hede c4h76 та danskmoent.dk-індекс «2mark.htm» підтверджують
      Hede 76 / Sieg 82 / Schou 13-16 як KM-23-тип; повний тираж 424 Daler-equivalent. Розкид ваги Numista 18,37 g vs ucoin
      16,58 g (≈ 10 %) типовий для малого тиражу 424 Daler — обидва значення збережено як specimen-attestation у weight_rough_g.
      Δ під 1/2 × 9-Fuß: Numista -8,7 %, ucoin -17 %; Numista-значення краще пасує до норми малотиражного pre-Kipper Christian-IV-карбування.'
