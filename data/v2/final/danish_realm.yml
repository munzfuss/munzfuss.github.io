  note:
    de: '3 Krone 1726 Frederik IV. (KM-525, Hede 41, Schou 2, Sieg 22, Fr 4, Dav 1293) — Repräsentationsausgabe in zwei Stempel-Varianten
      dokumentiert: Hede 1971 (f4h41), Numista (N# 190127), Bruun Part I lot 1136 und ucoin (tid 173635) führen die <b>Umlauf-Variante</b>
      (Silber 0,671 ≈ 10 Loth, Bruttogewicht ≈ 67 g); NumisMaster MC_65367 verzeichnet eine <b>höher-feine Variante</b> (Silber
      0,993, Bruttogewicht 45,287 g, mintage 86 für 1726). Beide Lesungen sind auf der Feinsilber-Achse äquivalent — 67 g
      × .671 ≈ 44,8 g fein vs 45,287 g × .993 ≈ 45,0 g fein (Δ ≈ 0,3 % innerhalb Spezimen-Toleranz). Krause-Mishler katalogisiert
      beide Varianten unter einem einzigen KM-525 ohne Sub-Index. Akkumulierte <code>fineness</code>- und <code>weight_rough_g</code>-Listen
      bewahren alle Lesungen mit Quellenattribution — der Leser sieht beide Stempel-Varianten mit Provenienz.'
    en: '3 Krone 1726 Frederik IV (KM-525, Hede 41, Schou 2, Sieg 22, Fr 4, Dav 1293) — presentation issue documented in two
      strike variants: Hede 1971 (f4h41), Numista (N# 190127), Bruun Part I lot 1136 and ucoin (tid 173635) record the <b>circulation
      variant</b> (silver 0.671 ≈ 10 Loth, gross weight ≈ 67 g); NumisMaster MC_65367 records a <b>higher-fineness variant</b>
      (silver 0.993, gross weight 45.287 g, mintage 86 for 1726). The two readings are equivalent on the fine-silver axis
      — 67 g × .671 ≈ 44.8 g fine vs 45.287 g × .993 ≈ 45.0 g fine (Δ ≈ 0.3 % within specimen tolerance). Krause-Mishler catalogues
      both variants under a single KM-525 without sub-index. The accumulated <code>fineness</code> and <code>weight_rough_g</code>
      lists preserve every reading with source attribution — the reader sees both strike variants with provenance.'
    uk: '3 Krone 1726 Frederik IV (KM-525, Hede 41, Schou 2, Sieg 22, Fr 4, Dav 1293) — презентаційна емісія задокументована
      у двох штемпель-варіантах: Hede 1971 (f4h41), Numista (N# 190127), Bruun Part I lot 1136 та ucoin (tid 173635) подають
      <b>обігову варіанту</b> (срібло 0,671 ≈ 10 Loth, повна вага ≈ 67 г); NumisMaster MC_65367 подає <b>вищу-проби варіанту</b>
      (срібло 0,993, повна вага 45,287 г, mintage 86 за 1726). Обидва значення еквівалентні по осі чистого срібла — 67 г ×
      .671 ≈ 44,8 г чистого vs 45,287 г × .993 ≈ 45,0 г чистого (Δ ≈ 0,3 % у межах допусків специмена). Krause-Mishler катологує
      обидва варіанти під єдиним KM-525 без sub-індексу. Акумульовані списки <code>fineness</code> і <code>weight_rough_g</code>
      зберігають усі значення з джерельною атрибуцією — читач бачить обидва штемпель-варіанти з provenance.'
  verification_note:
