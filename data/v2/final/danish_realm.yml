      114C fugl (Sieg-1971 64.3), 114D korslagte glødehager (Sieg-1971 64.4), 114E ibskal (Johan Post — usikkert, Sieg-1971
      64.5, одна з найбільш дискусійних рідкостей Christian IV) · Bruttovægt 2,101г · Finvægt 1,806г · 10,793 daler з Marken-fin
