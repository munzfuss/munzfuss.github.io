  note:
    de: 2 Gold Krone 1621 (Hede-25C) · Münzmeister Johan Post · zwei Bruun-Specimen, einjähriger Typ den Johan Post mit Genehmigung
      des Königs an die Krone zurückkaufen mußte · seltene Stempelvariante mit Vogel-Münzzeichen.
    en: 2 Gold Krone 1621 (Hede-25C) · mintmaster Johan Post · two Bruun specimens of this one-year type that Johan Post had
      to buy back at the king's behest · rare die variant with bird privy mark.
    uk: 2 Gold Krone 1621 (Hede-25C) · монетмейстер Johan Post · два зразки Bruun однорічного типу, який Johan Post мусив
      викупити за наказом короля · рідкісний штемпельний варіант із знаком пташки.
  verification_note:
    de: 'Hede c4h25 verzeichnet die Hede-25-Serie verbatim als «Pålydende: 2 Guldkrone» (Hede 25C · Bruttovægt 5,996 g · Finhed
      0,917 · Finvægt 5,496 g — identisch mit unserer guldkrone-Fuß-Soll). Christian-IV-Guldkroner sind Tarifmünzen: Pålydende
      «2 Guldkrone» (Christian-IV-Krone-Einheit) entspricht dem bullion-Inhalt 1 Guldkrone-fein unter Frederik III.s nachfolgender
      Krone-Einheit-Reform. Fraktion «2» bezeichnet den Hede-Pålydende-Tarif; die Δ-Spalte zeigt rund −50 % als die durch
      die Krone-Einheits-Umdefinition entstandene Seigniorage (Christian-IV-Krone = ½ Frederik-III-Krone in Tarifeinheiten).
      Vorher fälschlich unter reichsdukatenfuß × 2 (= 2 Dukaten Ducat-fein); Bullionfeingehalt .917 ≠ Reichsdukat .986 — kein
      Fit. Projekt-Dokumentation `fuesse.yml` `guldkrone.events.first_adoption.note` zitiert bereits Ingvardson & Märcher
      2010 zur Christian-IV-Predecessor-Continuity.'
    en: 'Hede c4h25 records the Hede 25 series verbatim as «Pålydende: 2 Guldkrone» (Hede 25C · Bruttovægt 5.996 g · Finhed
      0.917 · Finvægt 5.496 g — identical to our guldkrone-Fuß Soll). Christian IV Guldkroner are Tarifmünzen: the «2 Guldkrone»
      Pålydende (in Christian IV''s Krone unit) corresponds to 1 Guldkrone fein-content under Frederik III''s later Krone
      unit reform. Fraction «2» reflects the Hede Pålydende tariff; the Δ column shows ~−50 % as the seigniorage arising from
      the Krone-unit redefinition (Christian IV''s Krone = ½ Frederik III''s Krone in tariff terms). Previously misplaced
      under reichsdukatenfuss × 2 (= 2 Ducats fein); bullion fineness .917 ≠ Reichsdukat .986 — no fit. The project''s own
      `fuesse.yml` `guldkrone.events.first_adoption.note` already cites Ingvardson & Märcher 2010 on Christian IV predecessor
      continuity.'
    uk: 'Hede c4h25 verbatim класифікує серію Hede 25 як «Pålydende: 2 Guldkrone» (Hede 25C · Bruttovægt 5,996 г · Finhed
      0,917 · Finvægt 5,496 г — ідентично нашій guldkrone-Fuß-Soll). Christian-IV-Guldkroner — Tarifmünzen: Pålydende «2 Guldkrone»
      (в одиниці Krone Кристіана IV) відповідає 1 Guldkrone fein-вмісту під одиницею Krone Frederik III післяреформеною. Фракція
      «2» означає Hede-Pålydende-тариф; колонка Δ показує ~−50 % як сеньйораж від переозначення Krone-одиниці (Krone Кристіана
      IV = ½ Krone Frederik III у тарифних одиницях). Раніше помилково під reichsdukatenfuss × 2 (= 2 Ducats фейн); проба
      .917 ≠ .986 Reichsdukat-стандарту — не вписується. У `fuesse.yml` `guldkrone.events.first_adoption.note` уже цитується
      Ingvardson & Märcher 2010 щодо continuity Christian-IV-предтечі.'
