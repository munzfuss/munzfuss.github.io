  verification_note:
    de: 'Einzelquellen-Eintrag. ucoin (tid 163075) gibt <i>Composition: Gold</i> direkt auf der Seite an (im 2026-05 nachgeprüft);
      unser <code>scripts/cache/ucoin/_url_index.json</code> trägt das Composition-Feld nicht — Harvest-Lücke, kein ucoin-Defekt.
      Kein Krause-Eintrag bekannt; ucoin verwendet die hauseigene Notation UC# 10 (in <code>catalog.others</code> erhalten).
      Hede 1971 verzeichnet kein Frederik-II.-10-Ducat-Stück; die nächste Multi-Dukat-Eintragung in der Frederik-II.-Reihe
      (f2h7a) ist der Portugaløser 1584 (35,20 g, Unik). Gewicht 39,45 g überschreitet den Reichsdukatenfuß-Standard für 10
      Dukaten (~34,9 g) — passt zu einer einmaligen Trauer- oder Gedenkprägung anlässlich des Todes Frederiks II. am 4. April
      1588. Phase <code>reichsdukatenfuss/pre-A</code> ist die nächste Müntzfuß-Heimat per Konvention (Gold, Reichsdukat-Standard-Familie);
      per-Münze-Verifikation per Hede / Bruun / Galster steht weiterhin aus.'
    en: 'Single-source entry. ucoin (tid 163075) publishes <i>Composition: Gold</i> on the page itself (verified 2026-05);
      our <code>scripts/cache/ucoin/_url_index.json</code> doesn''t carry the Composition field — harvest gap, not an ucoin
      defect. No known Krause assignment; ucoin uses its in-house notation UC# 10 (kept in <code>catalog.others</code>). Hede
      1971 carries no Frederik II 10 Ducat; the closest multi-Dukat entry in the Frederik II run (f2h7a) is the Portugaløser
      1584 (35.20 g, unique). Weight 39.45 g exceeds the Reichsdukatenfuß standard for 10 Ducats (~34.9 g) — matches a one-off
      mourning or commemorative strike around the death of Frederik II on 4 April 1588. Phase <code>reichsdukatenfuss/pre-A</code>
      is the natural Müntzfuß bucket by convention (gold, Reichsdukat-standard family); per-coin verification against Hede
      / Bruun / Galster remains outstanding.'
    uk: 'Запис із одним джерелом. ucoin (tid 163075) безпосередньо на сторінці подає <i>Composition: Gold</i> (перевірено
      2026-05); наш <code>scripts/cache/ucoin/_url_index.json</code> не містить поля Composition — це харвест-пропуск, не
      дефект ucoin. Записа в Krause не відомо; ucoin використовує власну нотацію UC# 10 (збережено в <code>catalog.others</code>).
      Hede 1971 не містить Frederik II 10 Ducat; найближчий multi-Dukat запис у серії Frederik II (f2h7a) — Portugaløser 1584
      (35,20 г, унік). Вага 39,45 г перевищує Reichsdukatenfuß-стандарт для 10 дукатів (~34,9 г) — це вкладається в разову
      траурно/мемор''яльну емісію довкола смерті Фредеріка II 4 квітня 1588 р. Фаза <code>reichsdukatenfuss/pre-A</code> —
      природний Müntzfuß-кошик за конвенцією (золото, сім''я Reichsdukat-стандарту); покоінна верифікація за Hede / Bruun
      / Galster досі очікується.'
