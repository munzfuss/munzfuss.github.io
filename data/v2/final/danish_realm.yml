    note:
      de: 8 Daler Klippe 1604 · Münzmeister Nicolaus Schwabe · vorzüglich geprägt mit reichlichem Münzglanz · seltener Goldtarif-Klippe
      en: 8 Daler Klippe 1604 · mintmaster Nicolaus Schwabe · superbly struck with copious mint luster · rare gold tariff klippe
      uk: 8 Daler Klippe 1604 · монетмейстер Nicolaus Schwabe · чудово карбований з рясним монетним блиском · рідкісний золотий тарифний кліпе
    verification_note:
      de: 'Tarifmünze (§ 6): Daler-Nominaltarif liegt über dem reinen Goldinhalt — Christian IV.s 8-Daler-Klippe trägt ca. 4,8 Dukaten Feingold (16,51 g) für einen 8-Daler-Tarif, d. h. ein Aufgeld von rund 40 %. Die Fraktion «8» nennt den Daler-Tarif (Münzaufschrift), die Δ-Spalte zeigt die Differenz zur Reichsdukatenfuß-Soll für 8 Dukaten Feingold (27,54 g) — Δ ≈ −40 % macht den Seigniorage-Aufgeld sichtbar. Schwester-Klippe (km dk-tid-163410, 6 Daler Hede-11) folgt demselben Muster bei ≈ −41 %; Bruun notiert dort verbatim «6 Daler corresponded to 3.5 Ducats».'
      en: 'Tarifmünze (§ 6): the Daler nominal tariff sits above the actual gold content — Christian IV''s 8-Daler Klippe carries ~ 4.8 Ducats fein gold (16.51 g) for an 8-Daler tariff, i.e. a ~ 40 % premium. The fraction «8» names the Daler tariff (coin legend); the Δ column displays the gap vs the Reichsdukatenfuß Soll for 8 Ducats fein gold (27.54 g) — Δ ≈ −40 % makes the seigniorage premium visible. Sister Klippe (dk-tid-163410, 6 Daler Hede-11) follows the same pattern at ≈ −41 %; Bruun there notes verbatim «6 Daler corresponded to 3.5 Ducats».'
      uk: 'Tarifmünze (§ 6): Daler-номінальний тариф вище за реальний gold-content — 8-Daler-Klippe Christian IV містить ~ 4,8 Ducats фейн-золота (16,51 г) під 8-Daler-тариф, тобто ~ 40 % сеньйораж-надбавки. Фракція «8» означає Daler-тариф (легенда на монеті); колонка Δ показує розрив до Reichsdukatenfuß-Soll за 8 Ducats фейн-золота (27,54 г) — Δ ≈ −40 % робить сеньйораж видимим. Sister-Klippe (dk-tid-163410, 6 Daler Hede-11) слідує тому ж патерну при ≈ −41 %; Bruun там verbatim зазначає «6 Daler corresponded to 3.5 Ducats».'
