  note:
    de: '8 Skilling Christian V. 1693 (KM-423, Hede 110, Schou 64-65, Sieg 13) — Scheidemünze nach dem 9¼-Speciedaler-Fuß-Standard.
      Mint <i>København</i> per Hede c5h110 attestiert. Drei Quellen, zwei Feingehaltsangaben: Hede 1971 und NumisMaster melden
      <b>0,833</b> (10 Loth Silber); ucoin (tid 97090) meldet <b>0,671</b> (≈ 8 Loth). Die akkumulierte <code>fineness</code>-Liste
      bewahrt alle drei Lesungen mit Quellenattribution — der Leser sieht die Divergenz mit Provenienz.'
    en: '8 Skilling Christian V 1693 (KM-423, Hede 110, Schou 64-65, Sieg 13) — Scheidemünze under the 9¼-Speciedaler-Fuß
      standard. Mint <i>København</i> attested per Hede c5h110. Three sources, two fineness readings: Hede 1971 and NumisMaster
      report <b>0.833</b> (10-Loth silver); ucoin (tid 97090) reports <b>0.671</b> (≈ 8 Loth). The accumulated <code>fineness</code>
      list preserves all three readings with source attribution — the reader sees the divergence with provenance.'
    uk: '8 Skilling Christian V 1693 (KM-423, Hede 110, Schou 64-65, Sieg 13) — Scheidemünze за стандартом 9¼-Speciedaler-Fuß.
      Mint <i>København</i> засвідчено за Hede c5h110. Три джерела, два значення проби: Hede 1971 і NumisMaster подають <b>0,833</b>
      (10-Loth срібло); ucoin (tid 97090) подає <b>0,671</b> (≈ 8 Loth). Акумульований список <code>fineness</code> зберігає
      всі три значення з джерельною атрибуцією — читач бачить розбіжність з provenance.'
