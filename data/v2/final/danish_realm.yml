    en: '2 Kroneskilling 1619-1621 — Kronemont subdivision (reverse «1/48 Speciedaler» equals «1/18 Krone» tariff) · post-1619-reform
      standard (Bruttovægt 0.525g, Finhed 0.859, Finvægt 0.451g, Marken-fein 10.793 daler — same ratio as KM-81 / KM-82) ·
      two mint-master variants per Hede 116 folded under KM-69: 116A crossed clubs (Sieg-1971 40, 1619 + 1621 RRR), 116B bird
      (Sieg-1971 40, 1620) · the 1621 variant of 116A per Ernst (NNÅ 1949) is a tvepræg (double-strike anomaly) · Literature:
      Dahl, NNÅ 2003; Ernst, NNÅ 1949 «Johan Post».'
    uk: '2 Kroneskilling 1619-1621 — Kronemont-субподіл (реверс «1/48 Speciedaler» відповідає тарифу «1/18 Krone») · стандарт
      після реформи 5 квітня 1619 (Bruttovægt 0,525г, Finhed 0,859, Finvægt 0,451г, Marken-fin 10,793 daler — той самий коефіцієнт
      як у KM-81 / KM-82) · два варіанти монетмейстера за Hede 116 об''єднані під KM-69: 116A korslagte køller (Sieg-1971
      40, 1619 + 1621 RRR), 116B fugl (Sieg-1971 40, 1620) · 1621-варіант 116A за Ernst (NNÅ 1949) — tvepræg (аномалія подвійного
      штемпеля) · Література: Dahl, NNÅ 2003; Ernst, NNÅ 1949 «Johan Post».'
