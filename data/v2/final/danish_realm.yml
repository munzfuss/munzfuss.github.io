    note:
      de: '2 Gold Krone, Christian IV. (1619–1648), Hede c4h25-Serie · Tarifmünze nach Guldkrone-Fuß · Mintmaster-Sub-Varianten: Hede 25B (1619 Bruun-5109), 25C (1621 Johan Post, Vogel-Münzzeichen, Bruun-5272/5273 — einjähriger Typ, Johan Post mußte mit königlicher Genehmigung zurückkaufen), 25D (1628 Peter Grüner, Blume-Münzzeichen, Bruun-5542), 25E (1648 Heinrich Köhler, postume Prägung nach Tod Christians IV. im Februar 1648, Bruun-5829).'
      en: '2 Gold Krone, Christian IV (1619–1648), Hede c4h25 series · Tarifmünze on Guldkrone standard · Mintmaster sub-variants: Hede 25B (1619 Bruun-5109), 25C (1621 Johan Post, bird privy mark, Bruun-5272/5273 — one-year type, Johan Post had to buy back at royal command), 25D (1628 Peter Grüner, flower privy mark, Bruun-5542), 25E (1648 Heinrich Köhler, posthumous issue after Christian IV''s death in February 1648, Bruun-5829).'
      uk: '2 Gold Krone, Кристіан IV (1619–1648), серія Hede c4h25 · Tarifmünze за стандартом Guldkrone · Підваріанти за монетмайстрами: Hede 25B (1619 Bruun-5109), 25C (1621 Johan Post, знак пташки, Bruun-5272/5273 — однорічний тип, Johan Post мусив викупити за наказом короля), 25D (1628 Peter Grüner, знак квітка, Bruun-5542), 25E (1648 Heinrich Köhler, посмертна емісія після смерті Кристіана IV у лютому 1648, Bruun-5829).'
    verification_note:
      de: 'Hede c4h25 verzeichnet die Hede-25-Serie verbatim als «Pålydende: 2 Guldkrone» (Hede 25C · Bruttovægt 5,996 g · Finhed 0,917 · Finvægt 5,496 g — identisch mit unserer guldkrone-Fuß-Soll). Christian-IV-Guldkroner sind Tarifmünzen: Pålydende «2 Guldkrone» (Christian-IV-Krone-Einheit) entspricht dem bullion-Inhalt 1 Guldkrone-fein unter Frederik III.s nachfolgender Krone-Einheit-Reform. Fraktion «2» bezeichnet den Hede-Pålydende-Tarif; die Δ-Spalte zeigt rund −50 % als die durch die Krone-Einheits-Umdefinition entstandene Seigniorage (Christian-IV-Krone = ½ Frederik-III-Krone in Tarifeinheiten). Vorher fälschlich unter reichsdukatenfuß × 2 (= 2 Dukaten Ducat-fein); Bullionfeingehalt .917 ≠ Reichsdukat .986 — kein Fit. Projekt-Dokumentation `fuesse.yml` `guldkrone.events.first_adoption.note` zitiert bereits Ingvardson & Märcher 2010 zur Christian-IV-Predecessor-Continuity.'
      en: 'Hede c4h25 records the Hede 25 series verbatim as «Pålydende: 2 Guldkrone» (Hede 25C · Bruttovægt 5.996 g · Finhed 0.917 · Finvægt 5.496 g — identical to our guldkrone-Fuß Soll). Christian IV Guldkroner are Tarifmünzen: the «2 Guldkrone» Pålydende (in Christian IV''s Krone unit) corresponds to 1 Guldkrone fein-content under Frederik III''s later Krone unit reform. Fraction «2» reflects the Hede Pålydende tariff; the Δ column shows ~−50 % as the seigniorage arising from the Krone-unit redefinition (Christian IV''s Krone = ½ Frederik III''s Krone in tariff terms). Previously misplaced under reichsdukatenfuss × 2 (= 2 Ducats fein); bullion fineness .917 ≠ Reichsdukat .986 — no fit. The project''s own `fuesse.yml` `guldkrone.events.first_adoption.note` already cites Ingvardson & Märcher 2010 on Christian IV predecessor continuity.'
      uk: 'Hede c4h25 verbatim класифікує серію Hede 25 як «Pålydende: 2 Guldkrone» (Hede 25C · Bruttovægt 5,996 г · Finhed 0,917 · Finvægt 5,496 г — ідентично нашій guldkrone-Fuß-Soll). Christian-IV-Guldkroner — Tarifmünzen: Pålydende «2 Guldkrone» (в одиниці Krone Кристіана IV) відповідає 1 Guldkrone fein-вмісту під одиницею Krone Frederik III післяреформеною. Фракція «2» означає Hede-Pålydende-тариф; колонка Δ показує ~−50 % як сеньйораж від переозначення Krone-одиниці (Krone Кристіана IV = ½ Krone Frederik III у тарифних одиницях). Раніше помилково під reichsdukatenfuss × 2 (= 2 Ducats фейн); проба .917 ≠ .986 Reichsdukat-стандарту — не вписується. У `fuesse.yml` `guldkrone.events.first_adoption.note` уже цитується Ingvardson & Märcher 2010 щодо continuity Christian-IV-предтечі.'
    composed_of:
      - unified-dk-bruun-5109
      - unified-dk-hede-c4h25d
      - unified-dk-hede-c4h25e
