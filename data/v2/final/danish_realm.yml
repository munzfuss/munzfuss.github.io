  note:
    de: 'XVI SKILLING · Frederik IV., Kopenhagen, 1713 · Bruttovægt 5,197 g, Finhed 0,625, Finvægt 2,247 g; Marken fin udbragt
      til 12 daler (Hede 47).

      Mit denselben Stempeln wurde ein Goldabschlag (dänisch <i>Guldafslag</i>, Schou 1a) zum Tarif von 2 Reichsdukaten geprägt
      — Doppeldukaten-Gewichtsstandard ca. 6,93 g, nicht für den Umlauf bestimmt und daher hier nicht als eigene Karte geführt<sup><a
      href="#ref26">[26]</a></sup>.'
    en: 'XVI SKILLING · Frederik IV, Copenhagen, 1713 · Bruttovægt 5.197 g, Finhed 0.625, Finvægt 2.247 g; 12 daler per Marken
      fein (Hede 47).

      With the same dies a Goldabschlag (Danish <i>Guldafslag</i>, Schou 1a) was struck at the 2-Reichsdukaten tariff value
      — Double-Ducat weight standard ≈ 6.93 g, not intended for circulation and therefore not given its own card here<sup><a
      href="#ref26">[26]</a></sup>.'
    uk: 'XVI SKILLING · Фредерик IV, Копенгаген, 1713 · Bruttovægt 5,197 г, Finhed 0,625, Finvægt 2,247 г; 12 daler з Marken
      fein (Hede 47).

      Тими ж штемпелями виконано Goldabschlag (данською <i>Guldafslag</i>, Schou 1a) за тарифом 2 Reichsdukaten — Doppeldukaten-ваговий
      стандарт ≈ 6,93 г, для обігу не призначався і тому окремою карткою тут не подається<sup><a href="#ref26">[26]</a></sup>.'
