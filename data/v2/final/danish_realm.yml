  note:
    de: '2 Speciedaler Christians IV. (1647) — späte Christian-IV.-Großprägung am Reichsmüntzfuß-Standard (9-Thaler-Fuß):
      Feingehalt 0,888 (16/18 Loth), Bruttovægt 58,46 g → 51,91 g fein, Δ −0,11 % gegen den 9-Fuß-Soll 51,968 g je 2 Speciedaler.
      Der Δ-Abstand vom 9¼-Fuß-Soll 50,563 g beträgt +2,67 % (außerhalb der ±2 %-Spezimen-Toleranz), was die 9-Fuß-Zuordnung
      empirisch bestätigt — eine Prestige-Großprägung an der älteren Reichsmüntzfuß-Norm, parallel zur 9¼-Fuß-Hauptlinie der
      1- und ½-Speciedaler dieser Jahre. Mzm. nicht eindeutig. <b>KM-DK# 146</b>; in Numista nicht katalogisiert.'
    en: '2 Speciedaler of Christian IV (1647) — late Christian IV large strike at the Reichsmüntzfuß standard (9-Thaler-Fuß):
      fineness 0.888 (16/18 Loth), Bruttovægt 58.46 g → 51.91 g fine, Δ −0.11 % vs the 9-Fuß Soll of 51.968 g per 2 Speciedaler.
      The Δ distance from the 9¼-Fuß Soll of 50.563 g is +2.67 % (outside the ±2 % specimen tolerance), confirming the 9-Fuß
      placement empirically — a prestige large strike at the older Reichsmüntzfuß norm, in parallel with the 9¼-Fuß main line
      of 1- and ½-Speciedaler issues of these years. Mint not unambiguous. <b>KM-DK# 146</b>; not catalogued by Numista.'
    uk: '2 Speciedaler Кристіана IV (1647) — пізня велика емісія Кристіана IV на стандарті Reichsmüntzfuß (9-Thaler-Fuß):
      проба 0,888 (16/18 Loth), Bruttovægt 58,46 г → 51,91 г чистого, Δ −0,11 % від 9-Fuß-Soll 51,968 г на 2 Speciedaler.
      Δ-розрив від 9¼-Fuß-Soll 50,563 г становить +2,67 % (поза ±2 %-діапазоном специмен-толерантності), що емпірично підтверджує
      9-Fuß-приналежність — престижна велика емісія за старою нормою Reichsmüntzfuß, паралельна 9¼-Fuß-головній лінії 1- та
      ½-Speciedaler цих років. Монетний двір неоднозначний. <b>KM-DK# 146</b>; у Numista не каталогізовано.'
  verification_note:
    de: Mzm. ursprünglich als Glückstadt erfaßt; bei späterer Auditierung gegen ucoin Period (Rigsdaler 1625-1699 bzw. Speciedaler
      1582-1624 — Royal Danish Copenhagen) und KM-DK# 146 (Royal-Danish-Krause-Index ohne SH-Pendant) als königlich-dänische
      Kopenhagener Prägung re-attribuiert (1647). Mzm. weiterhin (?) — kein direkter Hede/Wilcke-Beleg.
    en: Mint originally recorded as Glückstadt; on later audit against ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624
      — Royal Danish Copenhagen) and KM-DK# 146 (Royal Danish Krause index with no SH counterpart), re-attributed as a Royal
