  note:
    de: 'Kopenhagener Pendant zu km-32 (Glückstadter Hebræermønt 1645) — selber Tetragramm יהוה auf der Rückseite, selber
      reduzierter Feingehalt .593 unter dem Druck des Torstensson-Krieges (1643–1645). Beide Münzstätten — København und Glückstadt
      — prägten die Hebræermønt parallel; Krause weist sie als getrennte Typen aus (vgl. KM# 32 für die Glückstädter Parallele).
      Strukturell identisch zu km-32: Tarif unverändert ⅓ Speciedaler, kumulativer Seigniorage-Aufschlag durch das Debasement
      bei ca. +27,6 %.'
    en: 'Copenhagen pendant to km-32 (Glückstadt Hebræermønt 1645) — same Tetragrammaton יהוה on the reverse, same reduced
      fineness .593 under the strain of the Torstensson War (1643–1645). Both mints — Copenhagen and Glückstadt — struck the
      Hebræermønt in parallel; Krause lists them as separate types (cf. KM# 32 for the Glückstadt parallel). Structurally
      identical to km-32: tariff unchanged at ⅓ Speciedaler, cumulative seigniorage premium from the debasement at about +27.6
      %.'
    uk: 'Копенгагенська пара до km-32 (ґлюкштатський Hebræermønt 1645) — той самий тетраграматон יהוה на реверсі, та сама
      знижена проба .593 під тиском Торстенсонської війни (1643–1645). Обидва монетні двори — Копенгаген і Glückstadt — карбували
      Hebræermønt паралельно; Krause виділяє їх як окремі типи (пор. KM# 32 для ґлюкштатської пари). Структурно ідентично
      до km-32: тариф незмінний ⅓ Speciedaler, кумулятивна сеньйораж-надбавка через debasement ~+27,6 %.'
