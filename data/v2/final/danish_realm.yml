      Kopenhagener Prägung re-attribuiert (1664). Mzm. weiterhin (?) — kein direkter Hede/Wilcke-Beleg.
    en: Mint originally recorded as Glückstadt; on later audit against ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624
      — Royal Danish Copenhagen) and KM-DK# 250 (Royal Danish Krause index with no SH counterpart), re-attributed as a Royal
      Danish Copenhagen issue (1664). Mint still (?) — no direct Hede / Wilcke attestation.
