  inscription_obv: IOHAN D G HAERES NORWG
  inscription_rev: D SCHL E HO C I OL E D 1618
  note:
    de: '2 Schilling (Doppelschilling = 1/16 Taler) 1618 · Johann (Hans d. J.) von Schleswig-Holstein-Sonderburg · Reinfeld
      (MM Tobias Reinhardt) · Lange (1912) Nr. 532 / 532 B — gleicher Avers-Typ wie KM#5 (Lange 535), aber abweichender Revers;
      separate Krause-Klassifikation steht aus. IKMK Berlin dokumentiert fünf Stücke mit mindestens vier Stempelvarianten
      innerhalb der Reihe: (a) Lange 532 mit kurzer Avers-Legende (IOHAN D G HAERES NOR) und Reichsapfel im Revers; (b) cf.
      Lange 532 mit kurzer Avers-Legende, jedoch Revers ohne Reichsapfel in der Umschrift; (c) Lange 532 B mit langer Avers-Legende
      (IOHAN D G HAERES NORWG) und Revers OL E D, mit Gegenstempel; (d) Lange 532 B mit langer Avers-Legende und Revers O
      E D (statt OL E D), mit Gegenstempel.'
    en: '2 Schilling (Doppelschilling = 1/16 Taler) 1618 · Johann (Hans the Younger) of Schleswig-Holstein-Sonderburg · Reinfeld
      (mintmaster Tobias Reinhardt) · Lange (1912) no. 532 / 532 B — same obverse type as KM#5 (Lange 535) but different reverse;
      separate Krause classification pending. IKMK Berlin documents five specimens spanning at least four die variants within
      the series: (a) Lange 532 with short obverse legend (IOHAN D G HAERES NOR) and imperial orb on reverse; (b) cf. Lange
      532 with short obverse legend but reverse lacking the imperial orb in the legend; (c) Lange 532 B with long obverse
      legend (IOHAN D G HAERES NORWG) and reverse OL E D, with countermark; (d) Lange 532 B with long obverse legend and reverse
      O E D (in place of OL E D), with countermark.'
    uk: '2 Schilling (Doppelschilling = 1/16 Taler) 1618 · Йоганн (Ганс Молодший) Гольштейн-Зондербург · Reinfeld (мюнцмайстер
      Tobias Reinhardt) · Lange (1912) Nr. 532 / 532 B — аверс того самого типу, що й у KM#5 (Lange 535), але інший реверс;
      окрема Krause-класифікація очікується. IKMK Berlin документує пʼять екземплярів щонайменше з чотирма штемпельними варіантами
      в межах серії: (а) Lange 532 з короткою аверсною легендою (IOHAN D G HAERES NOR) та Reichsapfel на реверсі; (б) cf.
      Lange 532 з короткою аверсною легендою, проте реверс без Reichsapfel в обводці; (в) Lange 532 B з довгою аверсною легендою
      (IOHAN D G HAERES NORWG) та реверсом OL E D, з контрамаркою (Gegenstempel); (г) Lange 532 B з довгою аверсною легендою
      та реверсом O E D (замість OL E D), з контрамаркою.'
  verification_note:
    de: Stempel-/Reverstyp-Variante des Hans-Sonderburg 2-Schilling 1618; im Krause-Verzeichnis nicht separat klassifiziert.
      Per-Münze-Verifikation und KM-Zuordnung stehen aus.
    en: Die / reverse-type variant of the Hans-Sonderburg 2-Schilling 1618; not separately classified in Krause. Per-coin
      verification and KM assignment outstanding.
    uk: Штемпельний / реверс-варіант 2-Schilling 1618 Hans-Sonderburg; у Krause-каталозі не виділений окремо. Покоінна верифікація
      та призначення KM очікуються.
