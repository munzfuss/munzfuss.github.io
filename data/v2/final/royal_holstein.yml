  note:
    de: 8 Skilling Danske Friedrichs IV. (Type II) · Obverse «FRID • IIII • DEI • GRAT»; Reverse «DAN • NOR • VAN • GOT •
      REX ✿ 1711 ✿ 8 S • D • M • A •» mit Krone und Glückstadt-Mzz. Spätere Variante zu km-1 (Type I 1702–1705) — selbe Müntzfuß,
      neue Münzbild-Gravur. · <em>Ist-Feingehalt 1,718 g entspricht bereits der späteren 11⅓-Fuß-Theilung (8/96 RCour = 1,720
      g) — Vorläufer der Forordning Kurantmøntfod 1726, formal aber unter Speciedaler-Rechnung.</em>
    en: 8 Skilling Danske of Frederik IV (Type II) · obverse «FRID • IIII • DEI • GRAT»; reverse «DAN • NOR • VAN • GOT •
      REX ✿ 1711 ✿ 8 S • D • M • A •» with crown and Glückstadt mintmark. Later variant of km-1 (Type I 1702–1705) — same
      standard, new die engraving. · <em>Actual fine weight 1.718 g already matches the later 11⅓-Fuß subdivision (8/96 RCour
      = 1.720 g) — a forerunner of the Kurantmøntfod Forordning of 1726, though formally under Speciedaler accounting.</em>
    uk: 8 Skilling Danske Фредеріка IV (Type II) · аверс «FRID • IIII • DEI • GRAT»; реверс «DAN • NOR • VAN • GOT • REX ✿
      1711 ✿ 8 S • D • M • A •» з короною і ґлюкштатською монограмою. Пізніший варіант до km-1 (Type I 1702–1705) — та сама
      стопа, новий гравер штампів. · <em>Фактичний вміст чистого срібла 1,718 г уже відповідає пізнішому поділу 11⅓-Fuß (8/96
      RCour = 1,720 г) — попередник Forordning Kurantmøntfod 1726 р., формально ще в межах Speciedaler-рахунку.</em>
