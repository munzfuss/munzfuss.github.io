  note:
    de: 2 Skilling Danske Christians V. · Obverse gekröntes C5-Monogramm zwischen den geteilten Datumsziffern «16 C5 94»;
      Reverse «* II * SKILLING DANSKE * *» mit Mzz. ⚒ (gekreuzte Hämmer/Glödehager = Glückstadt). 1/48 Speciedaler · Billon
      .344. · <em>Ist-Feingehalt 0,385 g liegt rechnerisch ~10 % unter der späteren 11⅓-Fuß-Theilung (2/96 RCour = 0,430 g)
      und ~27 % unter der Speciedaler-Theilung (2/96 Sp = 0,527 g) — typische Scheide-Reduktion auf dem Vorläufer des Kurantmøntfod-Standards.</em>
    en: 2 Skilling Danske of Christian V · obverse a crowned C5 monogram between the split date digits «16 C5 94»; reverse
      «* II * SKILLING DANSKE * *» with mintmark ⚒ (crossed hammers / glødehager = Glückstadt). 1/48 Speciedaler · billon
      .344. · <em>Actual fine weight 0.385 g sits ~10 % below the later 11⅓-Fuß subdivision (2/96 RCour = 0.430 g) and ~27
      % below the Speciedaler subdivision (2/96 Sp = 0.527 g) — a typical petty-coin reduction on the forerunner of the Kurantmøntfod
      standard.</em>
    uk: 2 Skilling Danske Кристіана V · аверс — коронований монограм C5 між розділеними цифрами дати «16 C5 94»; реверс «*
      II * SKILLING DANSKE * *» з монограмою ⚒ (схрещені молоти / glødehager = Glückstadt). 1/48 Speciedaler · білон .344.
