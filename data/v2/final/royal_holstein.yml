  note:
    de: 8 Skilling Danske Friedrichs IV. (Type I) · Obverse Königsbüste mit Locken «FRID • IV • DEI • GRAT»; Reverse «DAN
      • NOR • VAN • GOT • REX» mit Krone, Münzmeister-Initialen «D.M.A.» und Glückstadt-Mzz. ✿ (Brennessel) · 1/12 Speciedaler
      · Silber .562. · <em>Ist-Feingehalt 1,718 g entspricht bereits der späteren 11⅓-Fuß-Theilung (8/96 RCour = 1,720 g)
      — Vorläufer der Forordning Kurantmøntfod 1726, formal aber unter Speciedaler-Rechnung.</em>
    en: 8 Skilling Danske of Frederik IV (Type I) · obverse king's curly-haired bust «FRID • IV • DEI • GRAT»; reverse «DAN
      • NOR • VAN • GOT • REX» with crown, mintmaster initials «D.M.A.», and Glückstadt mintmark ✿ (nettle leaf) · 1/12 Speciedaler
      · silver .562. · <em>Actual fine weight 1.718 g already matches the later 11⅓-Fuß subdivision (8/96 RCour = 1.720 g)
      — a forerunner of the Kurantmøntfod Forordning of 1726, though formally under Speciedaler accounting.</em>
    uk: 8 Skilling Danske Фредеріка IV (Type I) · аверс — кучерявий бюст короля «FRID • IV • DEI • GRAT»; реверс «DAN • NOR
      • VAN • GOT • REX» з короною, ініціалами монетмайстра «D.M.A.» і ґлюкштатською монограмою ✿ (кропива) · 1/12 Speciedaler
      · срібло .562. · <em>Фактичний вміст чистого срібла 1,718 г уже відповідає пізнішому поділу 11⅓-Fuß (8/96 RCour = 1,720
      г) — попередник Forordning Kurantmøntfod 1726 р., формально ще в межах Speciedaler-рахунку.</em>
