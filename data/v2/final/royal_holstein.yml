      .888 für Vollstücke) — typisch für Glückstadter Scheidemünzen-Theilung. Frühvariante der späteren KM# 26-Serie (1640er
      Jahre). Im ucoin-Katalog (tid 163589) belegt; Numista- oder Hede-Eintrag bislang nicht gefunden.'
    en: '1/16 Speciedaler · Christian IV (Glückstadt 1623–1625) · reverse «MO NO: C I GLV» (Moneta Nova Christiani IV Glückstadiana),
      obverse crowned monogram «16C4 / CHRIS 4 / D:G:D». Reduced fineness .812 (vs the standard 9¼-Fuß .888 for full pieces)
      — typical for Glückstadt sub-unit issues. Early variant of the later KM# 26 series (1640s). Attested in the ucoin catalogue
      (tid 163589); no Numista or Hede entry found so far.'
    uk: '1/16 Speciedaler · Кристіан IV (Glückstadt 1623–1625) · реверс «MO NO: C I GLV» (Moneta Nova Christiani IV Glückstadiana),
      аверс — коронована монограма «16C4 / CHRIS 4 / D:G:D». Знижена проба .812 (порівняно зі стандартним для 9¼-Fuß .888
      для повновагових монет) — типово для ґлюкштатських поділкових випусків. Ранній варіант пізнішої серії KM# 26 (1640-і
      роки). Засвідчений у каталозі ucoin (tid 163589); запису в Numista чи Hede поки не знайдено.'
