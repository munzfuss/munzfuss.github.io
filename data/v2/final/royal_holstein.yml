  note:
    de: 'Type II (Numista) · weiterhin «IS»-Signatur Jacob Schwiegers; Obverse Königsmonogramm, Reverse «IIII · MARCK · DANSKE»;
      Datum <b>am Ende der Umschrift</b> «DOMINVS P · ROVIDEBIT 1659» = <b>Hede 153A</b> (Sieg 153.1). Pendant zum Schwesterstück
      km-x000 (Type I, Hede 153B, Datum am Schild). Numista führt einen weiteren parallelen Eintrag zur selben Davenport-Typologie
      (Dav EC II# 3675): N#313341 unter «Schleswig-Holstein duchies» (KM# 95) — gleiche Münze, Numista-Duplikatnotierung.
      Glückstadter Kronen-Fuß wie Type I.'
    en: 'Type II (Numista) · still the «IS» signature of Jacob Schwieger; obverse a royal monogram, reverse «IIII · MARCK
      · DANSKE»; date <b>at the end of the legend</b> «DOMINVS P · ROVIDEBIT 1659» = <b>Hede 153A</b> (Sieg 153.1). Sister-piece
      is km-x000 (Type I, Hede 153B, date at the sides of the shield). Numista carries one further parallel entry for the
      same Davenport type (Dav EC II# 3675): N#313341 under «Schleswig-Holstein duchies» (KM# 95) — same coin, Numista duplicate.
      Glückstadt Kronen-Fuß as in Type I.'
    uk: 'Type II (Numista) · досі підпис «IS» Jacob Schwieger; аверс — королівський монограм, реверс «IIII · MARCK · DANSKE»;
      дата <b>в кінці легенди</b> «DOMINVS P · ROVIDEBIT 1659» = <b>Hede 153A</b> (Sieg 153.1). Парна монета — km-x000 (Type
      I, Hede 153B, дата з боків щита). Numista має ще один паралельний запис для тієї самої Davenport-типології (Dav EC II#
      3675): N#313341 під «Schleswig-Holstein duchies» (KM# 95) — одна монета, дубль у Numista. Ґлюкштатський Kronen-Fuß як
      у Type I.'
