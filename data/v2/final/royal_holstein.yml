  note:
    de: '1 Thaler Species · Christian V. (Kgr. Dänemark, Glückstadt), 1683 · Münzmeister Christoph Friedrich Woltereck (CW)
      · Edge-Legende «PIETATE · ET · IUSTITIA … ANNO M·DC·LXXXIII · C W». Hede c5h120<sup>[ref:hede-1957-kronemoenten-nnum]</sup>
      belegt 9-Fuß (1 Marck Feinsilber → 9 Speciedaler): 29,232 g rau · .888 · 25,984 g fein = 233,856 / 9 — Reichsthaler-Prägung
      außerhalb der für Holstein zu dieser Zeit etablierten 9¼-Fuß-Reihe. Krause-Mishler indexiert den Typ in zwei Issuer-Volumes
      parallel: KM 105 unter «Schleswig and Holstein, Danish duchies of» (Numista N#301630, Lange 82) sowie KM 73 unter «City
      of Glückstadt» (Numista N#308517, Lange 82 A — Stempelvariante des gleichen physischen Typs); Hede führt beide zusammenfassend
      als c5h120, Bruun-Sammlung-Specimen 6987 (Lot 13182, Lange 82 A).'
    en: '1 Thaler Species · Christian V of Denmark (Glückstadt mint), 1683 · mintmaster Christoph Friedrich Woltereck (CW)
      · edge legend «PIETATE · ET · IUSTITIA … ANNO M·DC·LXXXIII · C W». Hede c5h120<sup>[ref:hede-1957-kronemoenten-nnum]</sup>
      documents the 9-Fuß (1 fine mark → 9 Speciedaler): 29.232 g rough · .888 · 25.984 g fine = 233.856 / 9 — a Reichsthaler
      issue outside the 9¼-Fuß series established in Holstein at that time. Krause-Mishler indexes the type across two issuer
      volumes in parallel: KM 105 under «Schleswig and Holstein, Danish duchies of» (Numista N#301630, Lange 82) and KM 73
      under «City of Glückstadt» (Numista N#308517, Lange 82 A — die-variant of the same physical type); Hede consolidates
      both as c5h120, the Bruun-collection specimen 6987 (lot 13182) being a Lange 82 A piece.'
    uk: '1 Thaler Species · Кристіан V (король Данії, Глюкштадт), 1683 · монетмайстер Christoph Friedrich Woltereck (CW) ·
      edge-легенда «PIETATE · ET · IUSTITIA … ANNO M·DC·LXXXIII · C W». Hede c5h120<sup>[ref:hede-1957-kronemoenten-nnum]</sup>
      фіксує 9-Fuß (1 марка чистого → 9 Speciedaler): 29,232 г повної ваги · .888 · 25,984 г чистого = 233,856 / 9 — карбування
      Reichsthaler поза 9¼-Fuß-стандартом, утвердженим у Гольштейні на той час. Krause-Mishler індексує цей тип паралельно
      у двох issuer-volume''ах: KM 105 під «Schleswig and Holstein, Danish duchies of» (Numista N#301630, Lange 82) і KM 73
      під «City of Glückstadt» (Numista N#308517, Lange 82 A — штемпельний варіант того ж фізичного типу); Hede зводить обидва
      під c5h120, специмен Bruun-колекції 6987 (лот 13182) — це екземпляр Lange 82 A.'
