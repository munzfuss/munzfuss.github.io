    de: '1 Dukat Friedrichs IV. (Glückstadt) · Obverse Panzerbüste mit Locken «FRID • IV • D • G • | DAN • N • V • G • REX
      •»; Reverse Krone und Devise «DOMINUS • MIHI • ADIUTOR • » («Der Herr ist mein Helfer») mit Glückstadt-Mzz. Zwei Untertypen:
