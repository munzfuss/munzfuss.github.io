  note:
    de: 'Obverse «FRIDERICK 3 D·G: D·N·R·» mit gekrönter Büste · Reverse <b>«MONNO GLVCKSTAD 1659 · XVI · E·REIC· HS·DA ·
      IS»</b> = «Moneta Glückstadiensis 1659 · <i>XVI [auf] ein Reichs Holstein Daler</i> · IS (Münzmeister Jacob Schwiegelt)».
      Die Münze deklariert sich als <b>«1/16 Reichs Holstein Daler»</b> — nicht als «Speciedaler» oder «Skilling Lybsk». Die
      moderne Bezeichnung «1/16 Speciedaler» ist historiographische Zuordnung zum 9¼-Fuß (dem Thaler-Species-Standard Holsteins
      vor 1726); das Rechnungsäquivalent «3 Schilling lübisch» ergibt sich aus der hanseatischen Parallelrechnung, steht <i>nicht
      auf der Münze</i>. · 1/16 Reichs Holstein Daler = 1,58011 g fein (nach Münzlegende «XVI E·REIC·HS·DA»)'
    en: 'Obverse «FRIDERICK 3 D·G: D·N·R·» with a crowned bust · reverse <b>«MONNO GLVCKSTAD 1659 · XVI · E·REIC· HS·DA ·
      IS»</b> = «Moneta Glückstadiensis 1659 · <i>XVI [to] one Reichs Holstein Daler</i> · IS (mintmaster Jacob Schwiegelt)».
      The coin declares itself <b>«1/16 Reichs Holstein Daler»</b> — not «Speciedaler» or «Skilling Lybsk». The modern label
      «1/16 Speciedaler» is a historiographical assignment to the 9¼-Fuß (Holstein''s Thaler Species standard before 1726);
      the accounting equivalent «3 Schilling lübisch» arises from the parallel Hanseatic reckoning and <i>does not appear
      on the coin itself</i>. · 1/16 Reichs Holstein Daler = 1.58011 g fine (as per the coin''s legend «XVI E·REIC·HS·DA»)'
    uk: 'Аверс «FRIDERICK 3 D·G: D·N·R·» з коронованим погруддям · реверс <b>«MONNO GLVCKSTAD 1659 · XVI · E·REIC· HS·DA ·
      IS»</b> = «Moneta Glückstadiensis 1659 · <i>XVI [на] ein Reichs Holstein Daler</i> · IS (монетмайстер Jacob Schwiegelt)».
      Сама монета декларує себе як <b>«1/16 Reichs Holstein Daler»</b> — а не як «Speciedaler» чи «Skilling Lybsk». Сучасна
      назва «1/16 Speciedaler» — це історіографічне віднесення до 9¼-Fuß (гольштинського стандарту Thaler Species до 1726);
      розрахунковий еквівалент «3 Schilling lübisch» виникає з паралельного ганзейського рахунку і <i>на самій монеті не зазначений</i>.
      · 1/16 Reichs Holstein Daler = 1,58011 г чистого (за легендою монети «XVI E·REIC·HS·DA»)'
