  note:
    de: '1 Guldkrone Frederik III. (Glückstadt 1657–1660) · Mzm. <b>Jacob Schwieger</b> (Glückstadt 1648–1664), Mzz. korslagte
      glødehager · Stempelschneider Matthias Först (Avers) und Johan Blum (Revers) laut Bruun-Provenienz Lot 11222. Avers
      «· FRIDERICVS · III · D · G · DAN ·» mit gekröntem Wappenschild im Strickkreis; Revers Krone und Devise «<i>Dominus
      Providebit</i>» über Datum. Drei Jahresvarianten der Außenlegende: 1657 «NORWEGIÆ · VANDA : GOTTO : Q : REX», 1659 «NORWEG
      : VAND : GOTHOR : Q : REX», 1660 «NORWEG : VANDALOR : GOTHOR : Q : REX». Tarif <b>1 Guldkrone = 3½ Speciedaler = 21
      Mark Dansk</b>;.917 Feingehalt (22 Karat).<br><br>

      <b>Quellen-Hierarchie:</b> Hede 145B (kanonisch); Sieg-160(B); Schou-2; Aagaard-4.1 (Belegspezifika 57.1–60.4); Bruun-6344;
      Friedberg-120; Krause KM-40.2 (Untertyp). Belegexemplar Bruun III, Lot 11222 (5,91 g rau, ex Bruun → Brahesminde Privatverkauf
      1922 → Stack''s Bowers 29. Okt. 2025).'
    en: '1 Guldkrone of Frederik III (Glückstadt 1657–1660) · mintmaster <b>Jacob Schwieger</b> (Glückstadt 1648–1664), mintmark
      crossed pokers · engravers Matthias Först (obverse) and Johan Blum (reverse) per the Bruun provenance, Lot 11222. Obverse
      «· FRIDERICVS · III · D · G · DAN ·» with crowned coat of arms inside a rope circle; reverse a crown above the motto
      «<i>Dominus Providebit</i>» and the date. Three annual outer-legend variants: 1657 «NORWEGIÆ · VANDA : GOTTO : Q : REX»,
      1659 «NORWEG : VAND : GOTHOR : Q : REX», 1660 «NORWEG : VANDALOR : GOTHOR : Q : REX». Tariff <b>1 Guldkrone = 3½ Speciedaler
      = 21 Mark Dansk</b>;.917 fineness (22 carat).<br><br>

      <b>Source hierarchy:</b> Hede 145B (canonical); Sieg-160(B); Schou-2; Aagaard-4.1 (specimen detail 57.1–60.4); Bruun-6344;
      Friedberg-120; Krause KM-40.2 (sub-type). Reference specimen Bruun III, Lot 11222 (5.91 g rough, ex Bruun → Brahesminde
      private sale 1922 → Stack''s Bowers 29 Oct. 2025).'
    uk: '1 Guldkrone Фредеріка III (Glückstadt 1657–1660) · монетмайстер <b>Jacob Schwieger</b> (Glückstadt 1648–1664), монограма
      — схрещені граблі · різьбярі штемпелів Matthias Först (аверс) і Johan Blum (реверс) за провенансом Bruun, лот 11222.
      Аверс «· FRIDERICVS · III · D · G · DAN ·» з коронованим гербовим щитом у мотузковому колі; реверс — корона над девізом
      «<i>Dominus Providebit</i>» і дата. Три річні варіанти зовнішньої легенди: 1657 «NORWEGIÆ · VANDA : GOTTO : Q : REX»,
      1659 «NORWEG : VAND : GOTHOR : Q : REX», 1660 «NORWEG : VANDALOR : GOTHOR : Q : REX». Тариф <b>1 Guldkrone = 3½ Speciedaler
      = 21 Mark Dansk</b>; проба.917 (22 карати).<br><br>

      <b>Ієрархія джерел:</b> Hede 145B (канонічне); Sieg-160(B); Schou-2; Aagaard-4.1 (специфіка зразка 57.1–60.4); Bruun-6344;
      Friedberg-120; Krause KM-40.2 (підтип). Еталонний зразок Bruun III, лот 11222 (5,91 г повної ваги, ex Bruun → Brahesminde
      приватний продаж 1922 → Stack''s Bowers 29 жовтня 2025).'
