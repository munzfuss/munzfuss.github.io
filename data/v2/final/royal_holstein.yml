  verification_note:
    de: 'Hede-Seed: Müntzfuß-Zuordnung, Phase und Per-Münze-Verifikation stehen noch aus; Daten direkt aus danskmoent.dk übernommen.
      Probe nicht direkt belegt. Per Projekt-Konvention (CLAUDE.md §4) für strikt-monoprobe Müntzfüße der Kategorie 1 (reichsdukatenfuss,
      Anker 0.9861) auf den kanonischen Müntzfuß-Wert gesetzt; Δ -0.07% gegen den Soll-Wert liegt im ±2-%-Streifen der zulässigen
      Spezimen-Toleranz, also widerspricht der angenommene Wert keinem belegten Datum.'
    en: 'Hede seed: Müntzfuß assignment, phase and per-coin verification are still outstanding; data lifted directly from
      danskmoent.dk. Fineness not directly attested. Per project convention (CLAUDE.md §4) set to the canonical Müntzfuß value
      for strict-single-fineness Category-1 standards (reichsdukatenfuss, anchor 0.9861); Δ -0.07% against the soll value
      sits within the ±2 % specimen-tolerance envelope, so the assumed value contradicts no sourced datum.'
    uk: 'Hede-seed: призначення Müntzfuß, фази та покоінна верифікація ще очікуються; дані взято безпосередньо з danskmoent.dk.
      Проба не засвідчена джерелом. За проєктною конвенцією (CLAUDE.md §4) для строго-однопробних стоп Категорії 1 (reichsdukatenfuss,
      якірна проба 0.9861) встановлена на канонічне значення стандарту; Δ -0.07% проти Soll лежить у смузі ±2 % допустимої
      специмен-толерантності, тож припущене значення не суперечить жодному задокументованому показнику.'
