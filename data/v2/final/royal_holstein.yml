  note:
    de: 2 Skilling Danske Friedrichs IV. · Obverse doppeltes Spiegelmonogramm «F44F · D · G · REX · DAN & NOR ·»; Reverse
      «C W * II SKIL DANSKE 1715 *» mit gekröntem Wappenschild. Münzmeister Christoph Friedrich Woltereck (CW, Glückstadt
      1680–1702 — Mzz. überdauert seine Amtszeit, was auf Ende der Periode hinweist; Numista listet ihn als Engraver). 1/48
      Speciedaler · Billon .365. <em>Anmerkung:</em> einige 1715-Stücke tragen wegen Stempelschadens Datum «1713»; das Jahr
      1713 als Eigenjahrgang existiert nicht. · <em>Ist-Feingehalt 0,404 g liegt rechnerisch ~6 % unter der späteren 11⅓-Fuß-Theilung
      (2/96 RCour = 0,430 g) und ~23 % unter der Speciedaler-Theilung (2/96 Sp = 0,527 g) — typische Scheide-Reduktion auf
      dem Vorläufer des Kurantmøntfod-Standards.</em>
    en: 2 Skilling Danske of Frederik IV · obverse a doubled mirrored monogram «F44F · D · G · REX · DAN & NOR ·»; reverse
      «C W * II SKIL DANSKE 1715 *» with a crowned coat of arms. Mintmaster Christoph Friedrich Woltereck (CW, Glückstadt
      1680–1702 — the mark persists past his nominal tenure; Numista lists him as engraver). 1/48 Speciedaler · billon .365.
      <em>Note:</em> some 1715 specimens carry «1713» as a die-damage date; no genuine 1713 issue exists. · <em>Actual fine
      weight 0.404 g sits ~6 % below the later 11⅓-Fuß subdivision (2/96 RCour = 0.430 g) and ~23 % below the Speciedaler
      subdivision (2/96 Sp = 0.527 g) — a typical petty-coin reduction on the forerunner of the Kurantmøntfod standard.</em>
    uk: 2 Skilling Danske Фредеріка IV · аверс — подвійний дзеркальний монограм «F44F · D · G · REX · DAN & NOR ·»; реверс
      «C W * II SKIL DANSKE 1715 *» з коронованим гербовим щитом. Монетмайстер Christoph Friedrich Woltereck (CW, Glückstadt
      1680–1702 — підпис лишився після його каденції; Numista наводить його як гравера). 1/48 Speciedaler · білон .365. <em>Примітка:</em>
      деякі екземпляри 1715 р. через пошкодження штампа мають дату «1713»; справжнього випуску 1713 р. не існує. · <em>Фактичний
      вміст чистого срібла 0,404 г на ~6 % нижче пізнішого поділу 11⅓-Fuß (2/96 RCour = 0,430 г) і на ~23 % нижче Speciedaler-поділу
      (2/96 Sp = 0,527 г) — типове Scheide-зниження на попереднику Kurantmøntfod-стандарту.</em>
