  note:
    de: '= 1 Krone = ⅔ Speciedaler (nominal) · Obverse «PIETATE ET IUSTITIA» · Reverse «IIII · MARCK · DANSKE» · <b>Glückstadter
      Kronen-Fuß</b>: 4 Marck Danske als ⅔-Speciedaler-Äquivalent, aber mit reduziertem Feingehalt (.671 statt der reinen
      Thaler-Species-Silber .875) — deshalb Ist-Fein ca. 14,964 g statt 16,85449 g. Colleconline-Exemplar mit 20,9 g trägt
      Schmuckspuren (Jewelry traces) und ist deshalb abgenutzt; Numista-Standardgewicht für Christian-V.-Krone (KM# 370, 378
      u. a.) bestätigt 22,272 g · Glückstadter Prägung (nicht Kopenhagen) — abzugrenzen von Hede 67A; im Aagaard-2022-Corpus
      belegt.'
    en: '= 1 Krone = ⅔ Speciedaler (nominal) · obverse «PIETATE ET IUSTITIA» · reverse «IIII · MARCK · DANSKE» · <b>Glückstadt
      Kronen-Fuß</b>: 4 Marck Danske as the ⅔ Speciedaler equivalent but at reduced fineness (.671 instead of the pure .875
      silver of the Thaler Species) — hence an actual fine weight of ca. 14.964 g (Hede) instead of 16.85449 g. The Colleconline
      specimen at 20.9 g carries jewellery traces and is therefore worn; the Numista standard weight for Christian V''s Krone
      (KM# 370, 378 etc.) confirms 22.272 g · Glückstadt issue (not Copenhagen) — to be distinguished from Hede 67A; documented
      in the Aagaard 2022 corpus.'
    uk: '= 1 Krone = ⅔ Speciedaler (номінально) · аверс «PIETATE ET IUSTITIA» · реверс «IIII · MARCK · DANSKE» · <b>ґлюкштатський
      Kronen-Fuß</b>: 4 Marck Danske як еквівалент ⅔ Speciedaler, але зі зниженою пробою (.671 замість чистого .875 срібла
      Thaler Species) — звідси фактична чиста вага бл. 14,964 г замість 16,85449 г. Екземпляр Colleconline вагою 20,9 г має
      сліди ювелірної обробки, тому зношений; стандартна вага Numista для Krone Кристіана V (KM# 370, 378 та ін.) підтверджує
      22,272 г · Карбування Glückstadt (не Копенгаген) — відрізняти від Hede 67A; задокументовано в корпусі Aagaard 2022.'
