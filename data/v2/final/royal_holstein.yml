  note:
    de: 'Reverse-Legende: <b>«2 ½ SCHILLING COURANT»</b> — <u>ohne SP-Angabe</u>, trotzdem <b>vollwertig</b>: Feinsilbergehalt
      1,054 g entspricht exakt 1/24 Thaler Species (Δ ≈ 0). Die rechnerische Zuordnung 1/24 Thaler Species = 2½ Schilling
      Courant (via 60 Sch.C. = 1 Sp.) steht <i>nicht auf der Münze</i>, ergibt sich aber aus dem Silbergehalt im 9¼-Fuß. ·
      1/24 Thaler Species = 1,05341 g fein · 2½ Sch.C. = 1/24 Thaler Species'
    en: 'Reverse legend: <b>«2 ½ SCHILLING COURANT»</b> — <u>without a SP designation</u>, yet <b>full-value</b>: fine silver
      content 1.054 g matches exactly 1/24 Thaler Species (Δ ≈ 0). The arithmetic correspondence 1/24 Thaler Species = 2½
      Schilling Courant (via 60 Sch.C. = 1 Sp.) <i>does not appear on the coin</i> but follows directly from the silver content
      within the 9¼-Fuß. · 1/24 Thaler Species = 1.05341 g fine · 2½ Sch.C. = 1/24 Thaler Species'
    uk: 'Легенда реверса: <b>«2 ½ SCHILLING COURANT»</b> — <u>без позначення SP</u>, але <b>повноцінна</b>: вміст чистого
      срібла 1,054 г точно відповідає 1/24 Thaler Species (Δ ≈ 0). Арифметичне віднесення 1/24 Thaler Species = 2½ Schilling
      Courant (через 60 Sch.C. = 1 Sp.) <i>на монеті не зазначене</i>, але прямо випливає з вмісту срібла в межах 9¼-Fuß.
      · 1/24 Thaler Species = 1,05341 г чистого · 2½ Sch.C. = 1/24 Thaler Species'
  verification_note:
    de: 'Bruun-Seed: spezifikische Münzfuß- und Phase-Zuordnung sowie Per-Münze-Verifikation stehen noch aus; Daten direkt
      aus dem Bruun-Auktionskatalog (Stack''s Bowers L. E. Bruun Collection 2024-2026) übernommen. Brutto-Gewicht ist ein
