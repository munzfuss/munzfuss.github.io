    de: 2 Skilling Lybsk = 1/24 Speciedaler · Christian IV. (Glückstadt 1620, früheste dokumentierte Glückstädter Sk-Lybsk-Stufe
      in der Reichsmüntzfuß-Phase 1617–1622). <b>Reichsmünzordnung-Standard-Feingehalt .888</b>; rohes Gewicht 1,01 g entspricht
      etwa der Standard-Theilung (1/24 Speciedaler-soll = 1,083 g rau). Im Schleswig-Holstein-Register nicht erfasst, sondern
      nur als <b>KM-DK# 8</b> im Royal-Danish-Register. ucoin-Eintrag tid 163588; in Numista nicht katalogisiert.
    en: 2 Skilling Lybsk = 1/24 Speciedaler · Christian IV (Glückstadt 1620, earliest documented Glückstadt Sk-Lybsk denomination
      from the Reichsmüntzfuß phase 1617–1622). <b>Reichsmünzordnung standard fineness .888</b>; rough weight 1.01 g is close
      to the standard subdivision (1/24 Speciedaler soll = 1.083 g rough). Not recorded in the Schleswig-Holstein KM register,
      only in the Royal Danish register as <b>KM-DK# 8</b>. ucoin entry tid 163588; not catalogued by Numista.
    uk: 2 Skilling Lybsk = 1/24 Speciedaler · Кристіан IV (Glückstadt 1620, найраніший задокументований ґлюкштадтський номінал
      Sk Lybsk із Reichsmüntzfuß-фази 1617–1622). <b>Стандартна проба Reichsmünzordnung .888</b>; груба вага 1,01 г близька
      до стандартного поділу (1/24 Speciedaler-soll = 1,083 г груб.). У шлезвіг-гольштинському KM-реєстрі не зафіксовано,
      лише в данському Royal-реєстрі як <b>KM-DK# 8</b>. ucoin запис tid 163588; у Numista не каталогізовано.
