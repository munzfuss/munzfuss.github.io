      .979 (Hede 57B).'
    en: '1 Ducat of Frederik IV (Glückstadt) · obverse armoured bust with curly hair «FRID • IV • D • G • | DAN • N • V •
      G • REX •»; reverse crown above the motto «DOMINUS • MIHI • ADIUTOR • » («The Lord be my aid») with Glückstadt mintmark.
      Two sub-types: KM# 2.1 (Type 1, date below the crown) and KM# 2.2 (Type 2, smaller armour with date below the bust).
      Glückstadt practice fineness .979 (Hede 57B).'
    uk: '1 Ducat Фредеріка IV (Glückstadt) · аверс — броньований бюст із кучерявим волоссям «FRID • IV • D • G • | DAN • N
      • V • G • REX •»; реверс корона над девізом «DOMINUS • MIHI • ADIUTOR • » («Господь — мій помічник») з ґлюкштатською
      монограмою. Два суб-типи: KM# 2.1 (Type 1, дата під короною) і KM# 2.2 (Type 2, менший обладунок із датою під бюстом).
      Ґлюкштатська практична проба .979 (Hede 57B).'
