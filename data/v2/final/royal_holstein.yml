    de: 1 Skilling Frederiks IV. von Dänemark · interimistische Prägung für die <b>besetzten Gottorpschen Lande</b> nach der
      dänischen Eroberung Schleswigs 1713 (während des Großen Nordischen Krieges) und vor der formellen Annektierung 1721
      (Frederiksborger Frieden). ucoin-Periode «Holstein-Gottorp-Rendsburg (1716–1720)» — Münzstätte vermutlich <b>Rendsburg</b>.
      Nicht im Schleswig-Holstein-KM-Register erfasst, sondern als <b>KM-DK# 5</b> im Royal-Danish-Register. ucoin-Eintrag
      tid 169251; in Numista nicht katalogisiert.
    en: 1 Skilling of Frederik IV of Denmark · interim issue for the <b>occupied Gottorp lands</b> after the Danish conquest
      of Schleswig in 1713 (Great Northern War) and before formal annexation in 1721 (Treaty of Frederiksborg). ucoin period
      «Holstein-Gottorp-Rendsburg (1716–1720)» — mint presumably <b>Rendsburg</b>. Not recorded in the Schleswig-Holstein
      KM register, only as <b>KM-DK# 5</b> in the Royal Danish register. ucoin entry tid 169251; not catalogued by Numista.
    uk: 1 Skilling Фредеріка IV Данського · інтеримне карбування для <b>окупованих ґотторпських земель</b> після данського
      завоювання Шлезвігу 1713 (Велика Північна війна) і до формальної анексії 1721 (Фредеріксборгський мир). Період ucoin
      «Holstein-Gottorp-Rendsburg (1716–1720)» — монетний двір імовірно <b>Рендсбург</b>. У шлезвіг-гольштинському KM-реєстрі
      не зафіксовано, лише як <b>KM-DK# 5</b> у данському Royal-реєстрі. ucoin запис tid 169251; у Numista не каталогізовано.
