    de: '1 Speciedaler Christians V. (Glückstadt, ND 1682) · Obverse stehende Königsfigur «CHRISTIANUS · V · D · G | REX ·
      DAN · NOR · VAN · G ·» mit Zepter und Reichsapfel — Pose ähnlich Christian-IV.-Speciedaler. Reverse Krone über doppeltem
      Spiegelmonogramm, Devise «PIETATE ET IUSTITIA». Zwei Edge-Varianten: KM# 74.1 (glatt) und KM# 74.2 (Inschrift «SI VIGILANT
      ALII · ET ME VIGILARE DECET ⚒» mit Mzz. CW = Christoph Friedrich Woltereck). Davenport EC II# 3676 / 3676A.'
    en: '1 Speciedaler of Christian V (Glückstadt, ND 1682) · obverse standing king «CHRISTIANUS · V · D · G | REX · DAN ·
      NOR · VAN · G ·» with sceptre and globus cruciger — pose similar to Christian IV''s Speciedaler. Reverse crown above
      doubled mirrored monogram, motto «PIETATE ET IUSTITIA». Two edge variants: KM# 74.1 (smooth) and KM# 74.2 (lettered
      edge «SI VIGILANT ALII · ET ME VIGILARE DECET ⚒» with mintmaster CW = Christoph Friedrich Woltereck). Davenport EC II#
      3676 / 3676A.'
    uk: '1 Speciedaler Кристіана V (Glückstadt, ND 1682) · аверс — стояча фігура короля «CHRISTIANUS · V · D · G | REX · DAN
      · NOR · VAN · G ·» зі скіпетром і державою — поза подібна до Speciedaler-ів Кристіана IV. Реверс корона над подвійним
      дзеркальним монограмом, девіз «PIETATE ET IUSTITIA». Два варіанти гурту: KM# 74.1 (гладкий) і KM# 74.2 (написаний гурт
      «SI VIGILANT ALII · ET ME VIGILARE DECET ⚒» з монетмайстром CW = Christoph Friedrich Woltereck). Davenport EC II# 3676
      / 3676A.'
