  note:
    de: '2 Speciedaler Christians IV. (Glückstadt 1623, Mzz. ♔) · Obverse stehende Königsfigur in voller Rüstung, linke Hand
      am Schwertknauf, rechte auf gekröntem Wappenschild «CHRISTIANVS·4·D:G:DAN:NOR:V:G:R:»; Reverse stehende Fortuna auf
      Erdkugel mit langer Banderole «MO : NO : CIVI : GLVCKSTADENSIS · 6Z3». Davenport EC II# 3667. Numista-Eintrag ohne Feingehaltsangabe
      — übernommen vom parallelen 1 Speciedaler (KM# 15) im 9¼-Fuß.'
    en: '2 Speciedaler of Christian IV (Glückstadt 1623, mintmark ♔) · obverse standing king in full armour, left hand on
      sword pommel, right on a crowned shield «CHRISTIANVS·4·D:G:DAN:NOR:V:G:R:»; reverse standing Fortuna on the globe with
      long banner «MO : NO : CIVI : GLVCKSTADENSIS · 6Z3». Davenport EC II# 3667. Numista entry has no fineness — adopted
      from the parallel 1 Speciedaler (KM# 15) at 9¼-Fuß.'
    uk: '2 Speciedaler Кристіана IV (Glückstadt 1623, монограма ♔) · аверс — стояча фігура короля в повному обладунку, ліва
      рука на руків''ї меча, права на коронованому щиті «CHRISTIANVS·4·D:G:DAN:NOR:V:G:R:»; реверс — Фортуна на земній кулі
      з довгою бандероллю «MO : NO : CIVI : GLVCKSTADENSIS · 6Z3». Davenport EC II# 3667. У Numista пробу не вказано — взято
