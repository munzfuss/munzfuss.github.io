  note:
    de: 'Glückstädter Standard-Typ Christians V. (1680–1685, Münzmeister CW = Christoph Friedrich Woltereck, 1680–1702 — Nachfolger
      seines Onkels Johan(n) Woltereck/IW 1664–1679) · Obverse «CHRISITANVS · V · D · G · REX · DAN · NOR ·», Reverse «PIETATE.
      ET. | IUSTITIA. | 1680. C·⚒·W·» mit Hammer-Mzz. zwischen den CW-Initialen. Reichsdukatenfuß-Standardprobe.986 (23 K
      8 Gr). Bruun-6913 / Auktionslos 13180: «<i>An eminently lustrous example with razor-sharp details. The Ducats struck
      in Glückstadt differ from the ones struck in Copenhagen in being minted for regular trade use rather than just as occasion
      coins.</i>» <em>Anmerkung:</em> die CW-Initialen hier nicht mit Christian Wineke senior zu verwechseln, der zeitgleich
      an der Kopenhagener Münze (KM# 414, N#112811, Fr# 201) tätig war. Schwesterstück: KM# 72 (1682-only, Hede 118, Vægterdukat,
      reduzierter Feingehalt.979).'
    en: 'Glückstadt standard issue under Christian V (1680–1685, mintmaster CW = Christoph Friedrich Woltereck, 1680–1702
      — successor to his uncle Johan(n) Woltereck/IW 1664–1679) · obverse «CHRISITANVS · V · D · G · REX · DAN · NOR ·», reverse
      «PIETATE. ET. | IUSTITIA. | 1680. C·⚒·W·» with hammer mintmark between the CW initials. Reichsdukatenfuß standard fineness.986
      (23 K 8 Gr). Bruun-6913 / Auction lot 13180: «<i>An eminently lustrous example with razor-sharp details. The Ducats
      struck in Glückstadt differ from the ones struck in Copenhagen in being minted for regular trade use rather than just
      as occasion coins.</i>» <em>Note:</em> the CW initials here are not to be confused with Christian Wineke senior, who
      was simultaneously active at the Copenhagen mint (KM# 414, N#112811, Fr# 201). Sister type: KM# 72 (1682-only, Hede
      118 Vægterdukat, reduced fineness.979).'
    uk: 'Ґлюкштадтський стандартний тип Кристіана V (1680–1685, монетмайстер CW = Christoph Friedrich Woltereck, 1680–1702
      — наступник свого дядька Johan(n) Woltereck/IW 1664–1679) · аверс «CHRISITANVS · V · D · G · REX · DAN · NOR ·», реверс
      «PIETATE. ET. | IUSTITIA. | 1680. C·⚒·W·» з молотом-монограмою між ініціалами CW. Reichsdukatenfuß-стандартна проба.986
      (23 K 8 Gr). Bruun-6913 / аукціонний лот 13180: «<i>An eminently lustrous example with razor-sharp details. The Ducats
      struck in Glückstadt differ from the ones struck in Copenhagen in being minted for regular trade use rather than just
      as occasion coins.</i>» <em>Зауваження:</em> ініціали CW тут не плутати з Christian Wineke senior, що паралельно працював
      у копенгагенському монетному дворі (KM# 414, N#112811, Fr# 201). Сестринський тип: KM# 72 (тільки 1682, Hede 118 Vægterdukat,
      знижена проба.979).'
