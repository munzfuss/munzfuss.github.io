  note:
    de: '1 Marck Lübisch = ⅓ Speciedaler = 16 Schilling Lübisch · Christian IV. (Glückstadt). Belegjahre laut ucoin: 1617,
      1627, 1628, 1629 — die Spannweite umfasst sowohl die Reichsmüntzfuß-Phase (1617–1622) als auch die frühe 9¼-Fuß-Phase
      nach der Kipperzeit (1622+); die hier dokumentierte Marck ist Übergangstypus aus dem Glückstädter Hauptmünzstandard.
      <em>Ist-Feingehalt 4,92 g (= 8,35 × .589) liegt deutlich unter dem Par-Wert 8,42 g — typische Kipper-Wipper-Krise (1620–1623)
      bzw. nachfolgende Scheide-Reduktion.</em>'
    en: '1 Marck Lübisch = ⅓ Speciedaler = 16 Schilling Lübisch · Christian IV (Glückstadt). Documented years per ucoin: 1617,
      1627, 1628, 1629 — the span covers both the Reichsmüntzfuß phase (1617–1622) and the early 9¼-Fuß phase after the Kipper
      crisis (1622+); the Marck documented here is a transitional type from the Glückstadt main mint. <em>Actual fine weight
      4.92 g (= 8.35 × .589) sits well below the par value of 8.42 g — typical of the Kipper-Wipper crisis (1620–1623) and
      subsequent petty-coin reduction.</em>'
    uk: '1 Marck Lübisch = ⅓ Speciedaler = 16 Schilling Lübisch · Кристіан IV (Glückstadt). Задокументовані роки за ucoin:
      1617, 1627, 1628, 1629 — період охоплює і Reichsmüntzfuß-фазу (1617–1622), і ранню 9¼-Fuß-фазу після Kipper-кризи (1622+);
      ця Marck — перехідний тип з головного ґлюкштадського карбування. <em>Фактичний вміст чистого срібла 4,92 г (= 8,35 ×
      .589) значно нижче par-значення 8,42 г — типове для Kipper-Wipper-кризи (1620–1623) і подальшого Scheide-зниження.</em>'
  verification_note:
    de: 'Daten aus ucoin.net-Listung; Krause-Mishler KM #A4. Numista hat keine eigene type-id zugeordnet. Belegjahre 1617,
