  note:
    de: Portugaloser 1623 (Glückstadt) — Goldabschlag des silbernen Speciedaler-Stempels (Hede 156 silver companion type).
      Bruun-Auktionskatalog (Lot I/1029) zitiert die Referenz als «Hede-156» nach dem gleichen Stempeldesign, obwohl Hede
      1971 c4h156 nur den silbernen 1-Speciedaler 1623-1630 dokumentiert. Mintage 237 Stück, 4 erhalten (2 in Nationalmuseet,
      1 in Eremitage St. Petersburg, dieses Exemplar in privater Hand).
    en: Portugaloser 1623 (Glückstadt) — gold strike of the silver Speciedaler die (Hede 156 silver companion type). Bruun
      auction catalogue (lot I/1029) cites «Hede-156» by same-design reference, although Hede 1971 c4h156 documents only the
      silver 1 Speciedaler 1623-1630. Mintage 237 pieces, 4 survive (2 in the National Museum of Denmark, 1 in the Hermitage
      St. Petersburg, this example in private hands).
    uk: Portugaloser 1623 (Glückstadt) — золотий strike зі срібного штемпеля Speciedaler (Hede 156 silver companion type).
      Аукціонний каталог Bruun (лот I/1029) цитує «Hede-156» за тим самим дизайном штемпеля, хоча Hede 1971 c4h156 документує
      лише срібний 1 Speciedaler 1623-1630. Карбування 237 шт., 4 збереглося (2 у Національному музеї Данії, 1 в Ермітажі
      С.-Петербурга, цей екземпляр у приватних руках).
