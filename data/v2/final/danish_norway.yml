  - type: numista
    url: https://en.numista.com/55898
    ref: Numista
  note:
    de: 'Norwegische Reichsprägung des dänisch-norwegischen Verbundes, Müntzstätte <b>Kongsberg</b> (Mzz. ⚒ — gekreuzte Bergmannshämmer),
      Münzmeister Johann Heinrich Madelung (<b>IHM</b>, 1772–1775) und Hans Jacob Arnold Branth (<b>HIAB</b>, 1783, 1788).
      Reverse mit gekröntem norwegischen Löwen mit Hellebarde · Reverse-Legende: «24·SKILLING DANSKE COUR·M [Jahr] [Mzm.-Initialen]
      ⚒» · Obverse-Legende: «D·G·DAN·NOR·VAN·GOT·REX·» (königl. Titel der Realmkrone, ohne Holstein-Bezug). Die numismatische
      Bezeichnung <b>«Rigsort»</b> (= ¼ Rigsdaler Courant) ist <u>historiographischer Beiname</u>, <i>nicht auf der Münze
      graviert</i>. Prüfung 5,15354 × 4 = 20,61416 ≈ 20,63435 g ✓ gegen 11⅓-Thaler-Fuß.'
    en: 'Norwegian realm issue of the Danish-Norwegian union, struck at the <b>Kongsberg</b> mint (mintmark ⚒ — crossed miner''s
      hammers), under mintmasters Johann Heinrich Madelung (<b>IHM</b>, 1772–1775) and Hans Jacob Arnold Branth (<b>HIAB</b>,
      1783, 1788). Reverse: crowned Norwegian lion holding a halberd · reverse legend: «24·SKILLING DANSKE COUR·M [year] [mintmaster
      initials] ⚒» · obverse legend: «D·G·DAN·NOR·VAN·GOT·REX·» (royal title of the realm crown, no Holstein reference). The
      numismatic designation <b>«Rigsort»</b> (= ¼ Rigsdaler Courant) is <u>a historiographical nickname</u>, <i>not engraved
      on the coin</i>. Verification: 5.15354 × 4 = 20.61416 ≈ 20.63435 g ✓ against the 11⅓-Thaler-Fuß.'
    uk: 'Норвезький реалмовий випуск Дансько-Норвезького союзу, карбовано на монетному дворі <b>Kongsberg</b> (монетна позначка
      ⚒ — схрещені гірницькі молоти) за монетмайстрів Johann Heinrich Madelung (<b>IHM</b>, 1772–1775) і Hans Jacob Arnold
      Branth (<b>HIAB</b>, 1783, 1788). Реверс: коронований норвезький лев з алебардою · легенда реверса: «24·SKILLING DANSKE
      COUR·M [рік] [монограма монетмайстра] ⚒» · легенда аверса: «D·G·DAN·NOR·VAN·GOT·REX·» (королівський титул реалмової
      корони, без покликання на Гольштейн). Нумізматичне позначення <b>«Rigsort»</b> (= ¼ Rigsdaler Courant) є <u>історіографічне
      прізвисько</u>, <i>не вигравірувано на монеті</i>. Перевірка: 5,15354 × 4 = 20,61416 ≈ 20,63435 г ✓ проти 11⅓-Thaler-Fuß.'
  verification_note:
    de: Aus dem Schleswig-Holstein-Artefakt hierher verlegt — KM# 250 / Hede# 12A–12B / Brekke# 31–36 gehören zur Christian-VII.-<b>Norge</b>-Serie
      (nicht zur Dänemark-Hede 12, die eine Altona ½ Speciedaler darstellt), Mzz. ⚒ und Norwegischer Löwe weisen die Müntzstätte
      Kongsberg eindeutig aus, Legende «DAN·NOR·VAN·GOT·REX» ohne Holstein-Bezug. Innerhalb des dänisch-norwegischen Reichs
      (1537–1814) als <code>gesamtstaat</code> einsortiert; Müntzfuß-Klassifikation 11⅓-Thaler-Fuß, Phase A — wird übernommen,
      sobald <code>11_333_thaler</code> in der Dänemark-Datei als eigene Sektion ausgebaut ist.
    en: Moved here from the Schleswig-Holstein artefact — KM# 250 / Hede# 12A–12B / Brekke# 31–36 belong to the Christian
      VII <b>Norway</b> series (not the Denmark-side Hede 12, which is an Altona ½ Speciedaler); the ⚒ mintmark and Norwegian
      lion identify the mint as Kongsberg unambiguously, and the legend «DAN·NOR·VAN·GOT·REX» carries no Holstein reference.
      Filed under <code>gesamtstaat</code> within the Danish-Norwegian Realm (1537–1814); Müntzfuß classification 11⅓-Thaler-Fuß,
      Phase A — to be re-applied once <code>11_333_thaler</code> is built out as its own section in the Denmark file.
    uk: Перенесено сюди зі Schleswig-Holstein-артефакту — KM# 250 / Hede# 12A–12B / Brekke# 31–36 належать до <b>норвезької</b>
      серії Кристіана VII (не данського Hede 12, який є альтонівським ½ Speciedaler); монетна позначка ⚒ та норвезький лев
      однозначно визначають Kongsberg як монетний двір, а легенда «DAN·NOR·VAN·GOT·REX» не містить покликань на Гольштейн.
      Числиться в <code>gesamtstaat</code> у межах Дансько-Норвезького союзу (1537–1814); класифікація — 11⅓-Thaler-Fuß, фаза
      A; її буде відновлено, щойно у файлі Данії розгорнуть власну секцію <code>11_333_thaler</code>.
