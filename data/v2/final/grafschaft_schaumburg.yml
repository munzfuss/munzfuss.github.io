    de: Trotz fehlender Jahreszahl ist diese Müntze Weinmeister zufolge 1621 geprägt worden. Die Müntzmeisterstelle für die
      beiden von den Grafen von Holstein-Schauenburg betriebenen Müntzstätten wurde seit 1609 in Personalunion ausgeübt, da
      jene die Müntzstätte in der Grafschaft Schauenburg (zunächst Oldendorf, 1618 Rinteln, 1620 wieder Oldendorf) als der
      Altonaer Müntze zugehörig erklärten, um rechtliche Probleme mit dem Kreis wegen des Betriebs von mehr als einer Müntzstätte
      in ihrem Territorium zu vermeiden.
    en: Although it bears no date, according to Weinmeister this coin was struck in 1621. From 1609 the post of mintmaster
      for the two mints operated by the Counts of Holstein-Schauenburg was held in personal union, since the counts declared
      the mint in the county of Schauenburg (first Oldendorf, in 1618 Rinteln, in 1620 again Oldendorf) to belong to the Altona
      mint, to avoid legal difficulties with the Imperial Circle over running more than one mint in their territory.
    uk: Попри відсутність дати, за Вайнмайстером цю монету викарбувано 1621 року. Від 1609 року посаду монетного майстра для
      двох монетних дворів графів Гольштейн-Шауенбурзьких обіймали в персональній унії, оскільки графи оголосили монетний
      двір у графстві Шауенбург (спершу Ольдендорф, 1618 року Рінтельн, 1620 року знову Ольдендорф) належним до Альтонського
      двору, щоб уникнути правових труднощів з імперським округом через утримання більш ніж одного двору на своїй території.
