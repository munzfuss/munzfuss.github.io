  inscription_obv: '[E]RNES D G P E C [HO E S]'
  inscription_rev: FERD Z D G RO IM SE A 16-Z1
  note:
    de: Das Müntzmeisterzeichen Zainhaken läßt sich bisher nicht eindeutig zuordnen, da sowohl der schauenburgische Müntzmeister
      Kaspar Kohl als auch sein Nachfolger Justus Arnoldi einen solchen als ihr Müntzmeisterzeichen führten, und beide im
      Jahr 1621 an der Müntze Oldendorf tätig waren. Die Müntzmeisterstelle für die beiden von den Grafen von Holstein-Schauenburg
      betriebenen Müntzstätten wurde seit 1609 in Personalunion ausgeübt, da jene die Müntzstätte in der Grafschaft Schauenburg
      (zunächst Oldendorf, 1618 Rinteln, 1620 wieder Oldendorf) als der Altonaer Müntze zugehörig erklärten, um rechtliche
      Probleme mit dem Kreis wegen des Betriebs von mehr als einer Müntzstätte in ihrem Territorium zu vermeiden.
    en: The mintmaster's mark Zainhaken (a rod-hook) cannot yet be assigned with certainty, since both the Schauenburg mintmaster
      Kaspar Kohl and his successor Justus Arnoldi used one as their mark, and both were active at the Oldendorf mint in 1621.
      From 1609 the post of mintmaster for the two mints operated by the Counts of Holstein-Schauenburg was held in personal
      union, since the counts declared the mint in the county of Schauenburg (first Oldendorf, in 1618 Rinteln, in 1620 again
      Oldendorf) to belong to the Altona mint, to avoid legal difficulties with the Imperial Circle over running more than
      one mint in their territory.
    uk: Монетмейстерський знак Zainhaken поки що не вдається однозначно атрибутувати, оскільки і шауенбурзький монетний майстер
      Каспар Коль, і його наступник Юстус Арнольді використовували такий знак, і обидва 1621 року працювали на монетному дворі
      Ольдендорф. Від 1609 року посаду монетного майстра для двох монетних дворів графів Гольштейн-Шауенбурзьких обіймали
      в персональній унії, оскільки графи оголосили монетний двір у графстві Шауенбург (спершу Ольдендорф, 1618 року Рінтельн,
      1620 року знову Ольдендорф) належним до Альтонського двору, щоб уникнути правових труднощів з імперським округом через
      утримання більш ніж одного двору на своїй території.
  verification_note:
    de: Bulk-Seed aus IKMK Berlin (Holstein-Schauenburg, Ernst III.). Müntzstadt — Pinneberg (modernes SH) oder Stadthagen
      / Bückeburg (Niedersachsen) — und Müntzfuß-Zuordnung sind ungeklärt; Per-Münze-Recherche via Weinmeister 1908 + Bei
      der Wieden 1961 ausstehend.
    en: Bulk seed from IKMK Berlin (Holstein-Schauenburg, Ernst III). Mint city — Pinneberg (modern SH) vs. Stadthagen / Bückeburg
      (Lower Saxony) — and Müntzfuß assignment are unresolved; per-coin research via Weinmeister 1908 + Bei der Wieden 1961
      pending.
    uk: Bulk-сід з IKMK Berlin (Holstein-Schauenburg, Ernст III). Місто карбування — Піннеберг (сучасний SH) чи Stadthagen
      / Bückeburg (Нижня Саксонія) — і призначення Müntzfuß не визначені; покоінне дослідження через Weinmeister 1908 + Bei
      der Wieden 1961 очікується.
