      легенда «III MARCK DANSKE» як обліковий номінал. Marken-fin 8,533 speciedaler — трохи важче за Christian-III-1541 (8,827),
      власний вибір приватного карбувальника. Рік на легенді «LXIII» (1563). Споріднений з c4h43 «1 Speciedaler 1590» (та
      сама стаття Aagaard).'
