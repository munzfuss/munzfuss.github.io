      Aagaard NNUM 2/2009 + Wilcke «Speciedaleren (3 Mark) 1563» in *Daler, Mark og Kroner 1481-1914* pp. 76-78), not state
      issue; «III MARCK DANSKE» legend as nominal-account label. Marken-fin 8.533 speciedaler — slightly heavier than Christian-III-1541
      (8.827), the private mintmaster''s own choice. Year inscribed as «LXIII» (1563). Related to c4h43 «1 Speciedaler 1590»
      (same Aagaard article).'
    uk: 'Hede-seed: призначення Müntzfuß, фази та покоінна верифікація очікуються. Приватно карбований Speciedaler (за Aagaard
