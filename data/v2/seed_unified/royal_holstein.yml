      for strict-single-fineness Category-1 standards (reichsdukatenfuss, anchor 0.9861); Δ -0.07% against the soll value
      sits within the ±2 % specimen-tolerance envelope, so the assumed value contradicts no sourced datum.'
    uk: 'Hede-seed: призначення Müntzfuß, фази та покоінна верифікація ще очікуються; дані взято безпосередньо з danskmoent.dk.
      Проба не засвідчена джерелом. За проєктною конвенцією (CLAUDE.md §4) для строго-однопробних стоп Категорії 1 (reichsdukatenfuss,
      якірна проба 0.9861) встановлена на канонічне значення стандарту; Δ -0.07% проти Soll лежить у смузі ±2 % допустимої
      специмен-толерантності, тож припущене значення не суперечить жодному задокументованому показнику.'
