phases:
  11_333_thaler:
  - id: I
    year_from: 1727
    year_to: 1801
    from_label: '1727'
    to_label: '1801'
    title:
      de: Lübischer Münzfuß im 34-Marck-Fuß
      en: Lübischer Münzfuß as 34-Marck-Fuß
      uk: Любецький Münzfuß у 34-Marck-Fuß
    description:
      de: Lübeck und Hamburg übernahmen 1726 den 34-Marck-Fuß als gemeinsamen Lübischen Courant-Fuß; die hier abgebildeten
        Stücke folgen dem System 1 Marck Courant = 6,87811 g fein = 16 Schilling Lübisch · 1 Thaler Courant = 3 Marck = 48
        Schilling = 20,63432 g fein.<sup><a href="#ref1">[1]</a></sup>
      en: Lübeck and Hamburg adopted the 34-Marck-Fuß in 1726 as the common Lübisch Courant standard; the issues shown here
        follow the system 1 Marck Courant = 6.87811 g fine = 16 Schilling Lübisch · 1 Thaler Courant = 3 Marck = 48 Schilling
        = 20.63432 g fine.<sup><a href="#ref1">[1]</a></sup>
      uk: У 1726 р. Любек і Гамбург ухвалили 34-Marck-Fuß як спільний любецький курантний стандарт; показані тут монети дотримуються
        системи 1 Marck Courant = 6,87811 г чистого = 16 Schilling Lübisch · 1 Thaler Courant = 3 Marck = 48 Schilling = 20,63432
        г чистого.<sup><a href="#ref1">[1]</a></sup>
  9_thaler:
  - id: I
    year_from: 1776
    year_to: 1776
    from_label: '1776'
    to_label: '1776'
    title:
      de: Reichsmüntzfuß · Speciesthaler 1776
      en: Reichsmüntzfuß · Speciesthaler 1776
      uk: Reichsmüntzfuß · Speciesthaler 1776
    description:
      de: 'Einzelner Lübecker Speciesthaler 1776 (KM-185, Davenport 2422, Behrens 312) am Reichsmüntzfuß im 9-Thaler-Fuß:
        233,856 g ÷ 9 = 25,98400 g Feinsilber bei 888 8/9 ‰ Münzlegierung — eigenständige Kurs-Stope neben dem 34-Marck-Fuß-Courant.<sup><a
        href="#ref2">[2]</a></sup>'
      en: 'Single Lübeck Speciesthaler 1776 (KM-185, Davenport 2422, Behrens 312) at the Reichsmüntzfuß as 9-Thaler-Fuß: 233.856
        g ÷ 9 = 25.98400 g fine silver at 888 8/9 ‰ alloy — an independent accounting standard alongside the 34-Marck-Fuß
        Courant.<sup><a href="#ref2">[2]</a></sup>'
      uk: 'Одинокий любецький Speciesthaler 1776 (KM-185, Davenport 2422, Behrens 312) у Reichsmüntzfuß як 9-Thaler-Fuß: 233,856
        г ÷ 9 = 25,98400 г чистого срібла за пробою 888 8/9 ‰ — самостійний розрахунковий стандарт паралельно з 34-Marck-Fuß-Courant.<sup><a
        href="#ref2">[2]</a></sup>'
  reichsdukatenfuss:
  - id: I
    year_from: 1789
    year_to: 1801
    from_label: '1789'
    to_label: '1801'
    title:
      de: Reichsdukatenfuß · Lübecker Ducaten 1789–1801
      en: Reichsdukatenfuß · Lübeck Ducats 1789–1801
      uk: Reichsdukatenfuß · Любецькі дукати 1789–1801
    description:
      de: Der Reichsdukatenfuß ist der reichsweite Goldducaten-Standard, durch die Augsburger Reichsmünzordnung vom 19. August
        1559 als kaiserliche Hauptgoldmünze des Heiligen Römischen Reichs eingeführt.<sup><a href="#ref5">[5]</a></sup> Lübeck,
        dem Kaiser Ludwig der Bayer bereits 1340 das Goldmünzrecht verliehen hatte,<sup><a href="#ref6">[6]</a></sup> schloß
        seine eigenen Goldducaten an diesen reichsweiten Standard an. Der Fuß endet mit dem Reichsmünzgesetz vom 4. Dezember
        1871, mit dem die neue Reichsgoldmünze in Mark zur Grundlage des deutschen Goldgeldes wird.<sup><a href="#ref7">[7]</a></sup>
      en: The Reichsdukatenfuß is the imperial gold-ducat standard, introduced as the empire's principal gold coin by the
        Augsburger Reichsmünzordnung of 19 August 1559.<sup><a href="#ref5">[5]</a></sup> Lübeck — granted the gold-minting
        privilege by Emperor Ludwig the Bavarian as early as 1340<sup><a href="#ref6">[6]</a></sup> — aligned its own gold-ducat
        issues with this imperial standard. The Fuß ends with the Reichsmünzgesetz of 4 December 1871, by which the new imperial
        gold coin denominated in Mark became the basis of German gold currency.<sup><a href="#ref7">[7]</a></sup>
      uk: Reichsdukatenfuß — загальноімперський стандарт золотих дукатів, запроваджений Augsburger Reichsmünzordnung від 19
        серпня 1559 р. як головна імперська золота монета Священної Римської імперії.<sup><a href="#ref5">[5]</a></sup> Любек,
        якому імператор Людвіг Баварський ще 1340 р. надав право карбування золота,<sup><a href="#ref6">[6]</a></sup> підпорядкував
        свої золоті дукати цьому загальноімперському стандарту. Стопа завершується Reichsmünzgesetz 4 грудня 1871 р., згідно
        з яким нова імперська золота монета у Mark стає основою німецької золотої валюти.<sup><a href="#ref7">[7]</a></sup>
