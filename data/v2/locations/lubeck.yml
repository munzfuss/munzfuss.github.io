id: lubeck
name:
  de: Lübeck
  en: Lübeck
  uk: Любек
summary:
  de: Freie Hansestadt Lübeck — Reichsstadt mit eigener Müntzstätte. Der hier dokumentierte Bestand 1727–1801 deckt den Lübischen
    Müntzfuß (34-Marck-Fuß) für Schillinge und Courantthaler, den Reichsmüntzfuß (9-Thaler-Fuß) für den Speciesthaler 1776
    sowie den Reichsdukatenfuß für die Goldducaten 1789–1801.
  en: Free Hanseatic City of Lübeck — imperial city with its own mint. The documented scope (1727–1801) covers the Lübisch
    Münzfuß (34-Marck-Fuß) for the Schilling pieces and Courantthaler, the Reichsmüntzfuß (9-Thaler-Fuß) for the 1776 Speciesthaler,
    and the Reichsdukatenfuß for the gold ducats of 1789–1801.
  uk: Вільне ганзейське місто Любек — імперське місто з власним монетним двором. Документований обсяг (1727–1801) охоплює
    Любецький Müntzfuß (34-Marck-Fuß) для шилінгів і куранттталера, Reichsmüntzfuß (9-Thaler-Fuß) для Speciesthaler 1776 і
    Reichsdukatenfuß для золотих дукатів 1789–1801.
