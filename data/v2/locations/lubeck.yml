fuss_periods:
  11_333_thaler:
    pdate_label:
      de: Geltung in Lübeck&nbsp;1727&nbsp;→&nbsp;1854 · belegter Bestand 1727–1797
      en: In force in Lübeck 1727 → 1854 · attested holdings 1727–1797
      uk: Чинність у Любеку 1727 → 1854 · задокументований корпус 1727–1797
    hintergrund:
      de: 'Mit den dänischen <em>Forordningen</em> vom 15./31. Juli 1726 wurde der 34-Marck-Fuß als gemeinsamer

        norddeutscher Lübischer Courant-Fuß eingeführt;<sup><a href="#ref1">[1]</a></sup> Lübeck und Hamburg übernahmen ihn
        fristgleich.

        Der Bestand reicht hier von Christian VI''s Schilling-Reform 1727 biß zur letzten 1-Schilling-Prägung

        unter Carl Friedrich von Schweden 1789, ergänzt um den Sonderfall Doppelmark 1749–1750 (KM&nbsp;163, 900&nbsp;‰

        anstelle der späteren 750&nbsp;‰).

        '
      en: 'The Danish <em>Forordninger</em> of 15/31 July 1726 instituted the 34-Marck-Fuß as a common North German Lübisch
        courant standard;<sup><a href="#ref1">[1]</a></sup> Lübeck and Hamburg adopted it at the same time. The present holdings
        span Christian VI''s 1727 Schilling reform to the last 1-Schilling issue under Carl Friedrich of Sweden in 1789, plus
        the Doppelmark special case of 1749–1750 (KM&nbsp;163, 900&nbsp;‰ instead of the subsequent 750&nbsp;‰).

        '
      uk: 'Данські <em>Forordninger</em> від 15/31 липня 1726 р. запровадили 34-Marck-Fuß як спільний північнонімецький любецький
        курантний стандарт;<sup><a href="#ref1">[1]</a></sup> Любек і Гамбург ухвалили його одночасно. Наявний корпус охоплює
        реформу шилінга Крістіана&nbsp;VI 1727 р. до останньої 1-шилінгової емісії за Карла Фрідріха Шведського 1789 р., а
        також винятковий випадок подвійної марки 1749–1750 (KM&nbsp;163, 900&nbsp;‰ замість пізніших 750&nbsp;‰).

        '
  9_thaler:
    pdate_label:
      de: Geltung als Reichsmüntzfuß im Lübisch-Hanseraum 1566 → 1875 · belegtes Stück 1776
      en: In force as Reichsmüntzfuß in the Lübisch-Hanseatic area 1566 → 1875 · attested specimen 1776
      uk: Чинність як Reichsmüntzfuß у любецько-ганзейському просторі 1566 → 1875 · задокументований зразок 1776
    hintergrund:
      de: 'Der 9-Thaler-Fuß behielt in Hamburg und Lübeck biß 1875 Buchwährungsstatus für den Großhandel<sup><a href="#ref4">[4]</a></sup>
        —

        physisch geprägte Speciesthaler sind in Lübeck eine Seltenheit. Der einzige Beleg im vorliegenden

        Bestand ist die einmalige Spec­ies­thaler-Emission 1776 (KM-185, Davenport 2422), parallel zum laufenden

        34-Marck-Fuß-Courant.

        '
      en: 'The 9-Thaler-Fuß retained book-money status in Hamburg and Lübeck for wholesale trade until 1875;<sup><a href="#ref4">[4]</a></sup>
        physically struck Speciesthaler are rare in Lübeck. The single specimen in this scope is the one-off Speciesthaler
        issue of 1776 (KM-185, Davenport 2422), parallel to the everyday 34-Marck-Fuß Courant.

        '
      uk: '9-Thaler-Fuß зберігав статус облікової грошової одиниці в Гамбурзі та Любеку для гуртової торгівлі до 1875 р.;<sup><a
        href="#ref4">[4]</a></sup> фізично карбовані Speciesthaler у Любеку рідкісні. Єдиний зразок у цьому корпусі — одноразова
        емісія Speciesthaler 1776 (KM-185, Davenport 2422), паралельно з повсякденним 34-Marck-Fuß-Courant.

        '
  reichsdukatenfuss:
    pdate_label:
      de: Geltung in Lübeck als Goldfuß biß 1801 · belegter Bestand 1789–1801
      en: In force in Lübeck as the gold standard until 1801 · attested holdings 1789–1801
      uk: Чинність у Любеку як золотий стандарт до 1801 · задокументований корпус 1789–1801
    hintergrund:
      de: 'Der Reichsdukatenfuß codifiziert den Goldducaten-Standard des Heiligen Römischen Reichs. Mit der

        Augsburger Reichsmünzordnung vom 19. August 1559 wird der Dukat zur kaiserlichen Hauptgoldmünze

        erklärt;<sup><a href="#ref5">[5]</a></sup> über die folgenden drei Jahrhunderte bleibt er die kanonische Goldnorm
        der

        Reichsstände. Goldducaten dieses Fußes zirkulierten neben den niederländischen Handelsdukaten —

        der maßgeblichen Welthandelsmünze des Nord- und Ostseeraums im 17. und 18. Jahrhundert<sup><a href="#ref9">[9]</a></sup>
        —

        und wurden gleichermaßen mit ungarischen, venezianischen und türkischen Stücken desselben

        Standards nach Edelmetallgehalt angenommen.<sup><a href="#ref8">[8]</a></sup> Lübeck, dem Kaiser Ludwig der Bayer
        bereits

        1340 das Goldmünzrecht verliehen hatte, blieb als Freie Reichsstadt einer der Anschlussorte des

        Reichsdukatenfußes und nahm den Standard für eigene städtische Goldducaten-Emissionen biß ins

        späte 18. Jahrhundert auf — die letzten städtischen Goldprägungen vor dem Reichsdeputationshauptschluss

        1803.<sup><a href="#ref6">[6]</a></sup> Mit dem Reichsmünzgesetz vom 4. Dezember 1871 und seiner Erweiterung vom 9.
        Juli 1873

        wird der Goldgehalt der neuen Reichswährung „Mark" festgelegt — damit endet der Reichsdukatenfuß

        als reichsweiter Goldstandard.<sup><a href="#ref7">[7]</a></sup>

        '
      en: 'The Reichsdukatenfuß codifies the gold-ducat standard of the Holy Roman Empire. The Augsburger Reichsmünzordnung
        of 19 August 1559 declared the Dukat the empire''s principal gold coin;<sup><a href="#ref5">[5]</a></sup> over the
        following three centuries it remained the canonical gold norm of the imperial estates. Gold ducats struck to this
        standard circulated alongside the Dutch Handelsdukaten — the dominant world trade gold coin of the 17th-18th-century
        North and Baltic Sea region<sup><a href="#ref9">[9]</a></sup> — and were accepted by precious-metal content together
        with Hungarian, Venetian and Ottoman pieces of the same standard.<sup><a href="#ref8">[8]</a></sup> Lübeck, granted
        the gold-minting privilege by Emperor Ludwig the Bavarian as early as 1340, remained as a free imperial city one of
        the participating mints of the Reichsdukatenfuß and adopted the standard for its own municipal gold-ducat issues into
        the late 18th century — the city''s last municipal gold strikes before the Reichsdeputationshauptschluss of 1803.<sup><a
        href="#ref6">[6]</a></sup> The Reichsmünzgesetz of 4 December 1871 and its extension of 9 July 1873 fixed the gold
        content of the new imperial currency, the Mark — bringing the Reichsdukatenfuß to a close as the empire-wide gold
        standard.<sup><a href="#ref7">[7]</a></sup>

        '
      uk: 'Reichsdukatenfuß кодифікує стандарт золотих дукатів Священної Римської імперії. Augsburger Reichsmünzordnung від
        19 серпня 1559 р. проголосила Dukat головною імперською золотою монетою;<sup><a href="#ref5">[5]</a></sup> протягом
        наступних трьох століть він залишався канонічною золотою нормою імперських станів. Золоті дукати цього стандарту перебували
        в обігу поряд з нідерландськими Handelsdukaten — провідною світовою торговою золотою монетою Північного та Балтійського
        морів XVII–XVIII ст.<sup><a href="#ref9">[9]</a></sup> — і приймались за вмістом дорогоцінного металу нарівні з угорськими,
        венеційськими й турецькими екземплярами того ж стандарту.<sup><a href="#ref8">[8]</a></sup> Любек, якому імператор
        Людвіг Баварський ще 1340 р. надав право карбування золота, залишався як вільне імперське місто одним із учасників
        Reichsdukatenfuß і перейняв стандарт для власних міських емісій золотих дукатів до пізнього XVIII ст. — останні міські
        золоті карбування міста перед Reichsdeputationshauptschluss 1803 р.<sup><a href="#ref6">[6]</a></sup> Reichsmünzgesetz
        4 грудня 1871 р. та його розширення 9 липня 1873 р. встановили вміст золота нової імперської валюти Mark — на цьому
        Reichsdukatenfuß завершується як загальноімперський золотий стандарт.<sup><a href="#ref7">[7]</a></sup>

        '
  seed_unsorted:
    pdate_label:
      de: Bulk-Seed-Sammelbucket — Geltungsbereich pro Münze noch zuzuweisen
      en: Bulk seed bucket — period of validity to be assigned per coin
      uk: Bulk-seed загальний кошик — період дії потрібно призначити per coin
    hintergrund:
      de: Technischer Sammelbucket für bulk-importierte Münzen aus ucoin. Bei künftiger Detail-Bearbeitung wandern die Stücke
        in den jeweils passenden eigentlichen Müntzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>,
        <code>30_thaler</code>, <code>reichsdukatenfuss</code> etc.).
      en: Technical catch-all bucket for bulk-imported coins from ucoin. On future detailed work the pieces will move to their
        proper Münzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>30_thaler</code>,
        <code>reichsdukatenfuss</code>, etc.).
      uk: Технічний загальний кошик для bulk-імпортованих монет із ucoin. При майбутній детальній роботі монети перейдуть
        у відповідну Müntzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>30_thaler</code>,
        <code>reichsdukatenfuss</code> тощо).
