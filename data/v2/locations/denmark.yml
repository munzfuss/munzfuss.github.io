      uk: 'Фаза A1 · Lovkompleks baseline 1514-1517 · 14 Lod (875 ‰), 27,51 г повної / 24,07 г чистого на Sølvgylden — Мальме'
    description:
      de: '<em>Precursor-Akte 1513</em> (NICHT Teil des Lovkompleks selbst): <b>22. Juli 1513 Haandfæstning</b> (Wilcke 7-2 S. 4 verbatim «<i>Den 22. Juli 1513 udstedtes Kong Christian II.s Haandfæstning</i>») etabliert die Forderung «<i>thue mark giør fyldest for en riksdlr.</i>»; <b>1. August 1513 Dynes Blicher Beskikkelsesbrev</b> ernennt Diens (Hans) Blicher zum Mzm. in Malmø — Skilling-Hvid-Tarif Wilcke 7-2 S. 150 (Skilling 96 Stk./M @ 5¾ Lod, Hvid 222 Stk./M @ 4½ Lod). Diese 1513-Akte sind die unmittelbare Vorbereitung nach Hans'' Tod 20. Februar 1513 und gehen der Krönung 11. Juni 1514 voraus. <b>Lovkompleks-Karbung beginnt 1514</b> mit der <b>Møntordning af Sommeren 1514 «Dienis Malmö Brev»</b> (Wilcke 7-2 S. 152-153), die den Hauptkurant-Sølvgylden 8½ Stk./Cölln. Marck rauh @ 14 Lod (27,51 g rauh / 24,07 g fein) etabliert. Begleitende Aktien des Lovkompleks: Norge-Forordning 3. August 1514 (Kalmar-Union-Extension), Kvittering Paasketid 1515, Sjælland åbent Brev 24. August 1515. Hauptmünze Malmö unter Mzm. Diens (Hans) Blicher; Galster c2g-38 attestiert Sølvgylden 1516+1518+1523 (.875/27,06 g). Skillinge 1515-1517 sind «<i>betydelig tungere</i>» als das Brev specifiziert (Wilcke S. 153) — Specimen-Drift über die Ordnung-Soll.'
      en: '<em>Precursor acts 1513</em> (NOT part of the Lovkompleks itself): <b>22 July 1513 Haandfæstning</b> (Wilcke 7-2 p. 4 verbatim «<i>Den 22. Juli 1513 udstedtes Kong Christian II.s Haandfæstning</i>») establishes the requirement «<i>thue mark giør fyldest for en riksdlr.</i>»; <b>1 August 1513 Dynes Blicher Beskikkelsesbrev</b> appoints Diens (Hans) Blicher as mintmaster at Malmø — Skilling-Hvid tariff per Wilcke 7-2 p. 150 (Skilling 96/M at 5¾ Lod, Hvid 222/M at 4½ Lod). These 1513 acts are the immediate preparation after Hans''s death of 20 February 1513 and predate the coronation of 11 June 1514. <b>Lovkompleks coinage begins in 1514</b> with the <b>Møntordning af Sommeren 1514 «Dienis Malmö Brev»</b> (Wilcke 7-2 pp. 152-153), which establishes the Hauptkurant Sølvgylden at 8½ pieces/Cologne mark rough at 14 Lod (27.51 g rough / 24.07 g fine). Companion acts of the Lovkompleks: Norge ordinance 3 August 1514 (Kalmar Union extension), Kvittering Paasketid 1515, Sjælland åbent Brev 24 August 1515. Main mint Malmö under mintmaster Diens (Hans) Blicher; Galster c2g-38 attests Sølvgylden 1516+1518+1523 (.875/27.06 g). Skilling pieces 1515-1517 are «<i>betydelig tungere</i>» than the Brev specifies (Wilcke p. 153) — specimen drift above the ordinance soll.'
      uk: '<em>Прекурсорні акти 1513</em> (НЕ частина Lovkompleks): <b>22 липня 1513 Haandfæstning</b> (Wilcke 7-2 с. 4 verbatim «<i>Den 22. Juli 1513 udstedtes Kong Christian II.s Haandfæstning</i>») встановлює вимогу «<i>thue mark giør fyldest for en riksdlr.</i>»; <b>1 серпня 1513 Dynes Blicher Beskikkelsesbrev</b> призначає Diens (Hans) Blicher монетмайстром у Мальме — тариф Skilling-Hvid за Wilcke 7-2 с. 150 (Skilling 96/M за 5¾ Lod, Hvid 222/M за 4½ Lod). Ці акти 1513 — безпосередня підготовка після смерті Hans 20 лютого 1513 і передують коронації 11 червня 1514. <b>Карбування Lovkompleks починається 1514</b> з <b>Møntordning af Sommeren 1514 «Dienis Malmö Brev»</b> (Wilcke 7-2 с. 152-153), яка встановлює Hauptkurant-Sølvgylden у 8½ шт. з повної кельнської марки за 14 Lod (27,51 г повної / 24,07 г чистого). Супутні акти Lovkompleks: норвезький ордонанс 3 серпня 1514 (Kalmar-Union extension), Kvittering Paasketid 1515, Sjælland åbent Brev 24 серпня 1515. Головний монетний двір Мальме за монетмайстра Diens (Hans) Blicher; Galster c2g-38 засвідчує Sølvgylden 1516+1518+1523 (.875/27,06 г). Skilling 1515-1517 «<i>betydelig tungere</i>» ніж specifiziert у Brev (Wilcke с. 153) — specimen drift над soll-ом ордонансу.'
  - id: A2
    year_from: 1518
    year_to: 1522
    from_label: '1518'
    to_label: '1522'
    title:
      de: 'Phase A2 · Klipping-Debasierung 1518-1522 («ydel Kobber») — 18-Penning + 1-Skilling Klippinge'
      en: 'Phase A2 · Klipping debasement 1518-1522 («ydel Kobber») — 18-Penning + 1-Skilling Klippinge'
      uk: 'Фаза A2 · Klipping-девальвація 1518-1522 («ydel Kobber») — 18-Penning + 1-Skilling Klippinge'
    description:
      de: '1518 Klipping-Ordnung führt radikal abgesenkte Notmünz-Klippinge ein — Wilcke 7-2 S. 157 verbatim «<i>ydel Kobber</i>» (im Wesen Kupfer). Belegserie Galster S. 26-27 + S. 29-31 (18-Penning + 1-Skilling Klippinge); Numista-297656 attestiert 18 Penning Klipping 1518. Karbung im Vorfeld der Absetzung 1523 — Christian IIs Versuch, durch Notgeld die Bauernkrise + den Schwedenkrieg zu finanzieren. Vægt der Klippinge variiert stark (1,47-2,35 g per Bruchstück), Probe nicht im Brev fixiert; Wilcke S. 153 charakterisiert sie als «<i>betydelig tungere</i>» Skillinger gefolgt von einem deutlich abwärtigen Drift.'
      en: 'The 1518 Klipping ordinance introduces radically debased emergency Klippinge — Wilcke 7-2 p. 157 verbatim «<i>ydel Kobber</i>» (essentially copper). Reference series Galster S. 26-27 and S. 29-31 (18-Penning and 1-Skilling Klippinge); Numista-297656 attests 18 Penning Klipping 1518. Struck in the run-up to the 1523 deposition — Christian II''s attempt to fund the peasant crisis and the war with Sweden through emergency money. Klipping weights vary widely (1.47-2.35 g per fragment), fineness not fixed in the Brev; Wilcke p. 153 characterises them as «<i>betydelig tungere</i>» Skilling pieces followed by a sharp downward drift.'
      uk: 'Klipping-ордонанс 1518 запроваджує радикально девальвовані надзвичайні Klippinge — Wilcke 7-2 с. 157 verbatim «<i>ydel Kobber</i>» (по суті мідь). Еталонна серія Galster S. 26-27 + S. 29-31 (18-Penning + 1-Skilling Klippinge); Numista-297656 засвідчує 18 Penning Klipping 1518. Карбування напередодні скинення 1523 — спроба Кристіана II через надзвичайні гроші фінансувати селянську кризу + шведську війну. Вага Klippinge сильно варіює (1,47-2,35 г на уламок), проба у Brev не зафіксована; Wilcke с. 153 характеризує їх як «<i>betydelig tungere</i>» Skilling-и з подальшим різким спадом.'
  - id: A3
    year_from: 1523
    year_to: 1523
    from_label: '1523'
    to_label: '1523'
    title:
      de: 'Phase A3 · Final-Konsolidierung 1523 · Massen-Sølvgylden Malmö pre-Absetzung 13. April 1523'
      en: 'Phase A3 · Final consolidation 1523 · mass Sølvgylden Malmö pre-deposition 13 April 1523'
      uk: 'Фаза A3 · Фінальна консолідація 1523 · масова Sølvgylden Мальме напередодні скинення 13 квітня 1523'
    description:
      de: 'Letzte Sølvgylden-Massenkarbung in Malmö am Vorabend der Absetzung. Wilcke 7-2 S. 156 verbatim «<i>meget almindelig</i>» (sehr verbreitet). Belegexemplare <b>Bruun-3933 + Bruun-3934</b> (Bruun-Lots im Stack''s Bowers Auktionskatalog Part I) attestieren Specimen-Brutto 28,74-29,49 g — 4-7 % über dem ordinance-Soll 27,51 g, typische frühneuzeitliche Specimen-Spannweite. Karbung endet abrupt mit Christian IIs Flucht ins Exil (13. April 1523); Frederik I übernimmt die dänische Krone und erläßt 25. Februar 1524 eine neue Møntordning (<code>8_gylden_fod</code>), die die Sølvgylden-Stückzahl auf 8/M strafft.'
      en: 'Last Sølvgylden mass coinage at Malmö on the eve of the deposition. Wilcke 7-2 p. 156 verbatim «<i>meget almindelig</i>» (very common). Reference specimens <b>Bruun-3933 + Bruun-3934</b> (Bruun lots in the Stack''s Bowers Part I auction catalogue) attest specimen brutto 28.74-29.49 g — 4-7 % over the ordinance soll 27.51 g, typical early-modern specimen range. Coinage ends abruptly with Christian II''s flight into exile (13 April 1523); Frederik I takes the Danish crown and issues a new Møntordning on 25 February 1524 (<code>8_gylden_fod</code>), which tightens the Sølvgylden count to 8/M.'
      uk: 'Остання масова Sølvgylden-карбування у Мальме напередодні скинення. Wilcke 7-2 с. 156 verbatim «<i>meget almindelig</i>» (дуже поширене). Еталонні зразки <b>Bruun-3933 + Bruun-3934</b> (Bruun-лоти у каталозі Stack''s Bowers Part I) засвідчують повну вагу зразка 28,74-29,49 г — 4-7 % понад ordinance-soll 27,51 г, типовий ранньомодерний specimen-діапазон. Карбування завершується раптово втечею Кристіана II до вигнання (13 квітня 1523); Frederik I приймає данську корону і 25 лютого 1524 видає нову Møntordning (<code>8_gylden_fod</code>), яка стискає кількість Sølvgylden до 8/M.'
  8_gylden_fod:
  - id: A1
    year_from: 1524
    year_to: 1531
    from_label: '1524'
    to_label: '1531'
    title:
      de: 'Phase A1 · Hauptphase 1524-1531 · 8 Sølvgylden/M @ 14 Lod, mf 9,143, 25,578 g fein je Sølvgylden — København + Malmö'
      en: 'Phase A1 · Main phase 1524-1531 · 8 Sølvgylden/M at 14 Lod, mf 9.143, 25.578 g fine per Sølvgylden — Copenhagen + Malmö'
      uk: 'Фаза A1 · Головна фаза 1524-1531 · 8 Sølvgylden/M за 14 Lod, mf 9,143, 25,578 г чистого на Sølvgylden — Копенгаген + Мальме'
    description:
      de: 'Baseline-Phase der Møntordning vom 25. Februar 1524. <b>Karbung beginnt mit dem 14-Penning-Stück</b> (separater Akt 26. Februar 1524) als Klipping-Indfrielse-Mønt: Christian-IIs Klippinge werden gegen 14-Penning-Stücke umgetauscht. Numista-Belege f1g-* attestieren 14 Penning / 14 Penny aus Kopenhagen 1524 (Frederik I); Mzm. Jørgen Koch in Malmö, Hans Dringenberg in Aalborg (vorübergehende Filiale). 4 Skilling 1525 København (Galster f1g-Belegserie). Sølvgylden-Karbung erst ab 1531 dokumentiert — vermutlich pre-1531 Sølvgylden-Stücke in Wilcke-Reichweite, aber spezifische Galster-Datierungen ab 1531. Hauptmünzanstalt: Hovedmønten Malmö unter Mzm. Jørgen Koch (1520s).'
      en: 'Baseline phase of the Møntordning of 25 February 1524. <b>Coinage begins with the 14-Penning piece</b> (separate act of 26 February 1524) as Klipping redemption coin: Christian II''s Klippinge are exchanged for 14-Penning pieces. Numista records f1g-* attest 14 Penning / 14 Penny from Copenhagen 1524 (Frederik I); mintmaster Jørgen Koch at Malmö, Hans Dringenberg at Aalborg (temporary branch). 4 Skilling 1525 Copenhagen (Galster f1g reference series). Sølvgylden coinage first documented from 1531 — likely pre-1531 Sølvgylden pieces within Wilcke''s reach, but specific Galster datings begin in 1531. Main mint: Hovedmønten Malmö under mintmaster Jørgen Koch (1520s).'
      uk: 'Baseline-фаза Møntordning від 25 лютого 1524. <b>Карбування починається з 14-Penning-штуки</b> (окремий акт 26 лютого 1524) як Klipping-обмінна монета: Klippinge Кристіана II обмінювалися на 14-Penning штуки. Numista-записи f1g-* засвідчують 14 Penning / 14 Penny з Копенгагена 1524 (Frederik I); монетмайстер Jørgen Koch у Мальме, Hans Dringenberg у Aalborg (тимчасова філія). 4 Skilling 1525 Копенгаген (еталонна серія Galster f1g). Sølvgylden-карбування вперше задокументовано з 1531 — імовірно пре-1531 Sølvgylden-штуки в межах досяжності Wilcke, але специфічні Galster-датування починаються з 1531. Головний монетний двір: Hovedmønten Мальме за монетмайстра Jørgen Koch (1520-ті).'
  - id: A2
    year_from: 1532
    year_to: 1532
    from_label: '1532'
    to_label: '1532'
    title:
      de: 'Phase A2 · Final-Konsolidierung 1532 · Galster 47-52 Sølvgylden-Serie · København'
      en: 'Phase A2 · Final consolidation 1532 · Galster 47-52 Sølvgylden series · Copenhagen'
      uk: 'Фаза A2 · Фінальна консолідація 1532 · серія Galster 47-52 Sølvgylden · Копенгаген'
    description:
      de: 'Finale Karbungs-Periode Frederik Is, dominiert von der <b>Sølvgylden-Serie Galster 47-52</b>: 1 Sølvgylden 1532 (Galster 47, 37,75 g brutto), 1½ Sølvgylden 1532 (Galster 48, 45,58 g — Doppel-Stück), ½ Sølvgylden 1532 mit Pillars/Statues-Obvers (Galster 48, 14,98 g), ¼ Sølvgylden 1532 (Galster 52, 7 g). Karbung in København unter Mzm. Jørgen Drews (transferiert von Husum) im <b>«<i>Nødens Aaret 1532</i>»</b> (Wilcke 7-2 S. 187 verbatim) — Frederik Is letztes volles Karbungs-Jahr. Tod des Königs 10. April 1533; Karbungs-Pause bis Christian IIIs Krönung 1537 + de-facto-Etablierung 1534-1540 <code>8_daler_fod</code> Phase 0 1534-1540.'
      en: 'Frederik I''s final coinage period, dominated by the <b>Galster 47-52 Sølvgylden series</b>: 1 Sølvgylden 1532 (Galster 47, 37.75 g brutto), 1½ Sølvgylden 1532 (Galster 48, 45.58 g — double piece), ½ Sølvgylden 1532 with Pillars/Statues obverse (Galster 48, 14.98 g), ¼ Sølvgylden 1532 (Galster 52, 7 g). Coinage at Copenhagen under mintmaster Jørgen Drews (transferred from Husum) in <b>«<i>Nødens Aaret 1532</i>»</b> (Wilcke 7-2 p. 187 verbatim) — Frederik I''s last full year of coinage. King''s death 10 April 1533; coinage pause until Christian III''s coronation 1537 + de-facto establishment 1534-1540 <code>8_daler_fod</code> Phase 0 1534-1540.'
      uk: 'Фінальний період карбування Frederik I, домінований <b>серією Galster 47-52 Sølvgylden</b>: 1 Sølvgylden 1532 (Galster 47, 37,75 г повної), 1½ Sølvgylden 1532 (Galster 48, 45,58 г — подвійна штука), ½ Sølvgylden 1532 з Pillars/Statues-обверсом (Galster 48, 14,98 г), ¼ Sølvgylden 1532 (Galster 52, 7 г). Карбування у Копенгагені за монетмайстра Jørgen Drews (переведений з Хузума) у <b>«<i>Nødens Aaret 1532</i>»</b> (Wilcke 7-2 с. 187 verbatim) — останній повний рік карбування Frederik I. Смерть короля 10 квітня 1533; пауза карбування до коронації Кристіана III 1537 + де-факто-встановлення 1534-1540 <code>8_daler_fod</code> Phase 0 1534-1540.'
  8_daler_fod:
  - id: '0'
    year_from: 1534
    year_to: 1540
    from_label: '1534'
    to_label: '1540'
    title:
      de: Phase 0 · De-facto-Etablierung 1534-1540 · Grevens-Fejde-Notmünz-Kaskade + 1537 Joachimsdaler Kopenhagen 14½-Lod-Anker — Mzm. Reynold Junge
      en: Phase 0 · De-facto establishment 1534-1540 · Counts' Feud emergency-coinage cascade + 1537 Joachimsdaler Copenhagen 14½-Lod anchor — mintmaster Reynold Junge
      uk: Фаза 0 · Де-факто-встановлення 1534-1540 · каскад надзвичайної монети Grevens Fejde + 1537 Joachimsdaler Копенгаген 14½-Lod якір — монетмайстер Reynold Junge
    description:
      de: "Vor-Møntordnungs-Phase: das 14½-Lod-Daler-Standard <b>de facto</b> etabliert durch Reynold Junges Karbung. Wilcke 1950 Kap. 7-3 S. 242 verbatim: «<i>die 1537 Karbung etabliert das 14½-Lod-Daler-Standard</i>». Drei interne Sub-Phasen: <b>(1) 1534-1536 Grevens-Fejde-Notmünz-Kaskade</b> — 2-Mark-Klippinge bei 10/8/7 Lod (.625/.500/.4375), 4-Skilling-Klippinge bei 5/4/3½ Lod (.3125/.250/.219), sub-Skilling-Tiers bei 3-2½ Lod — Kriegszeit-Debasierung der unteren Stückelungs-Tiers, ohne Veränderung des Hauptkurant-Standards (Junge zieht von Aarhus 1535 nach Roskilde 1535-37 — Mzm-Bewegung dokumentiert Frontverschiebung im Bürgerkrieg). <b>(2) 1537 Joachimsdaler-Anker Kopenhagen</b> — 8 Stk./Marck rauh @ 14½ Lod = 29,232 g rauh / 26,494 g fein (Bruun-4276 + 4277 + 4278 drei Stack''s-Bowers-Lots ≈ 28,5-28,94 g brutto). <em>Metrisch identisch mit Phase A1 ab 1541</em> — die 1537 Karbung etabliert das Daler-Standard de facto 4 Jahre vor der formalen Møntordning. <b>(3) 1538-1540 Konsolidierungs-Übergang</b> — Sub-Skilling-Notmünzen laufen fort, Junge bereitet aber die zentrale Kopenhagener Hauptmünze für die Møntordnungs-Karbung vor; ab Aufdeckung als Betrüger 1540-41 Übergabe an Povel Fechtel. <em>Belegexemplare</em>: Bruun-4155 2 Mark Klippe 1535 Aarhus (Galster 92B, 11,05 g, variant 2 @ 8 Lod), Bruun-4156 8 Skilling Klippe 1535 Aarhus (Galster 93, 2,72 g), Bruun-4194 1 Mark 1535 Roskilde, Bruun-4232 8 Skilling 1535 Stockholm (Sieg-24), Bruun-4276/4277/4278 Joachimsdaler 1537 Kopenhagen, Bruun-4279 ½ Joachimsdaler 1537. <em>Modellierungsnotiz</em>: vormals als <code>christian_iii_grevens_fejde_fod</code> separat modelliert; zusammengeführt 2026-05-21 gemäß danskmoent.dk Galster-Hede-Katalog (kontinuierliche Auflistung), Wilcke 1950 Metric-Continuity-Statement, und Reynold-Junge-Mintmaster-Kontinuität 1534-1540."
      en: "Pre-Møntordning phase: the 14½-Lod Daler standard <b>de facto</b> established through Reynold Junge's coinage. Wilcke 1950 Kap. 7-3 p. 242 verbatim: «<i>die 1537 Karbung etabliert das 14½-Lod-Daler-Standard</i>» (the 1537 coinage establishes the 14½-Lod Daler standard). Three internal sub-phases: <b>(1) 1534-1536 Counts' Feud emergency-coinage cascade</b> — 2-Mark Klippinge at 10/8/7 Lod (.625/.500/.4375), 4-Skilling Klippinge at 5/4/3½ Lod (.3125/.250/.219), sub-Skilling tiers at 3-2½ Lod — wartime debasement of the lower-denomination tiers, without altering the Hauptkurant standard (Junge moves from Aarhus 1535 to Roskilde 1535-37 — mintmaster movement tracks the civil-war front). <b>(2) 1537 Joachimsdaler anchor Copenhagen</b> — 8 pieces/mark rough at 14½ Lod = 29.232 g rough / 26.494 g fine (Bruun-4276 + 4277 + 4278 three Stack's Bowers lots ≈ 28.5-28.94 g brutto). <em>Metrically identical to Phase A1 from 1541</em> — the 1537 coinage establishes the Daler standard de facto four years before the formal Møntordning. <b>(3) 1538-1540 consolidation transition</b> — sub-Skilling emergency coinage continues, but Junge prepares the central Copenhagen royal mint for the Møntordning programme; upon his exposure as fraudster 1540-41 hand-over to Povel Fechtel. <em>Reference specimens</em>: Bruun-4155 2 Mark Klippe 1535 Aarhus (Galster 92B, 11.05 g, variant 2 at 8 Lod), Bruun-4156 8 Skilling Klippe 1535 Aarhus (Galster 93, 2.72 g), Bruun-4194 1 Mark 1535 Roskilde, Bruun-4232 8 Skilling 1535 Stockholm (Sieg-24), Bruun-4276/4277/4278 Joachimsdaler 1537 Copenhagen, Bruun-4279 ½ Joachimsdaler 1537. <em>Modelling note</em>: previously modelled separately as <code>christian_iii_grevens_fejde_fod</code>; merged 2026-05-21 per danskmoent.dk Galster-Hede catalogue (continuous listing), Wilcke 1950 metric-continuity statement, and Reynold Junge mintmaster continuity 1534-1540."
      uk: "Pre-Møntordning фаза: стандарт 14½-Lod Daler <b>де факто</b> встановлено карбуванням Reynold Junge. Wilcke 1950 Kap. 7-3 с. 242 verbatim: «<i>die 1537 Karbung etabliert das 14½-Lod-Daler-Standard</i>» (карбування 1537 встановлює стандарт 14½-Lod Daler). Три внутрішні sub-фази: <b>(1) 1534-1536 каскад надзвичайної монети Grevens Fejde</b> — 2-Mark Klippinge за 10/8/7 Lod (.625/.500/.4375), 4-Skilling Klippinge за 5/4/3½ Lod (.3125/.250/.219), sub-Skilling-tier-и за 3-2½ Lod — воєнна девальвація нижніх tier-ів номіналів, без зміни Hauptkurant-стандарту (Junge переміщується з Aarhus 1535 до Roskilde 1535-37 — рух монетмайстра простежує фронт громадянської війни). <b>(2) 1537 Joachimsdaler-якір Копенгаген</b> — 8 шт./марку повної ваги за 14½ Lod = 29,232 г повної / 26,494 г чистого (Bruun-4276 + 4277 + 4278 — три Stack''s-Bowers-лоти ≈ 28,5-28,94 г повної). <em>Метрично ідентичний фазі A1 від 1541</em> — карбування 1537 встановлює стандарт Daler де факто за чотири роки до формальної Møntordning. <b>(3) 1538-1540 перехідна консолідація</b> — sub-Skilling надзвичайна монета триває, але Junge готує центральний Копенгагенський королівський монетний двір до програми Møntordning; з викриттям як шахрая 1540-41 передача Povel Fechtel. <em>Еталонні зразки</em>: Bruun-4155 2 Mark Klippe 1535 Aarhus (Galster 92B, 11,05 г, варіант 2 за 8 Lod), Bruun-4156 8 Skilling Klippe 1535 Aarhus (Galster 93, 2,72 г), Bruun-4194 1 Mark 1535 Roskilde, Bruun-4232 8 Skilling 1535 Stockholm (Sieg-24), Bruun-4276/4277/4278 Joachimsdaler 1537 Копенгаген, Bruun-4279 ½ Joachimsdaler 1537. <em>Нотатка моделювання</em>: раніше модельовано окремо як <code>christian_iii_grevens_fejde_fod</code>; об'єднано 2026-05-21 згідно з каталогом Galster-Hede на danskmoent.dk (безперервне списування), заявою Wilcke 1950 про метричну неперервність, та неперервністю Reynold Junge як монетмайстра 1534-1540."
  - id: A1
    year_from: 1541
    year_to: 1543
    from_label: '1541'
    to_label: '1543'
    title:
      de: 'Phase A1 · Baseline 1541-1543 · mf 8,827, 14½ Lod (906¼ ‰), 26,494 g fein je Daler — København'
      en: 'Phase A1 · Baseline 1541-1543 · mf 8.827, 14½ Lod (906¼ ‰), 26.494 g fine per Daler — København'
      uk: 'Фаза A1 · Baseline 1541-1543 · mf 8,827, 14½ Lod (906¼ ‰), 26,494 г чистого на Daler — Копенгаген'
    description:
      de: 'Baseline-Phase der <b>Møntordning vom 20. September 1541</b> Christians III.<sup><a href="#ref29">[29]</a></sup>: acht Daler aus der Cölln. Marck fein bei 14½ Lod, Marken-fin <b>mf 8,827</b>, 26,494 g fein je Daler. Dreistufige Stückelung: vollwertige Kurantmünze (Daler / Mark / 8 Skilling / 4 Skilling) @ 14½ Lod; Scheidemünze (1 Skilling) @ 4 Lod (250 ‰); Billon (Hvid 4 Lod, Penning 2 Lod). Hauptmünze København unter Mzm. Reynold Junge.'
      en: 'Baseline phase of Christian III''s <b>Møntordning of 20 September 1541</b><sup><a href="#ref29">[29]</a></sup>: eight Daler per Cologne mark fine at 14½ Lod, Marken-fin <b>mf 8.827</b>, 26.494 g fine per Daler. Three-tier denomination: full-value Kurantmünze (Daler / Mark / 8 Skilling / 4 Skilling) at 14½ Lod; Scheidemünze (1 Skilling) at 4 Lod (250 ‰); billon (Hvid 4 Lod, Penning 2 Lod). Principal mint København under mintmaster Reynold Junge.'
      uk: 'Baseline-фаза <b>Møntordning від 20 вересня 1541</b> Кристіана III<sup><a href="#ref29">[29]</a></sup>: вісім Daler з кельнської марки чистого срібла за 14½ Lod, Marken-fin <b>mf 8,827</b>, 26,494 г чистого на Daler. Триступенева структура: повноцінна Kurantmünze (Daler / Mark / 8 Skilling / 4 Skilling) за 14½ Lod; Scheidemünze (1 Skilling) за 4 Lod (250 ‰); billon (Hvid 4 Lod, Penning 2 Lod). Головний монетний двір Копенгаген за монетмайстра Reynold Junge.'
  - id: A2
    year_from: 1544
    year_to: 1555
    from_label: '1544'
    to_label: '1555'
    title:
      de: 'Phase A2 · Debasierung 1544-1555 · Tillæg 27. September 1544 · mf 9,481, ≈ 24,67 g fein je Daler — København'
      en: 'Phase A2 · Debasement 1544-1555 · supplement of 27 September 1544 · mf 9.481, ≈ 24.67 g fine per Daler — København'
      uk: 'Фаза A2 · Девальвація 1544-1555 · Tillæg 27 вересня 1544 · mf 9,481, ≈ 24,67 г чистого на Daler — Копенгаген'
    description:
      de: 'Tillæg vom 27. September 1544 erhöht den Marken-fin auf <b>mf 9,481</b> (≈ 24,67 g fein je Daler)<sup><a href="#ref30">[30]</a></sup><sup><a href="#ref31">[31]</a></sup>. Feingehalt unverändert bei 14½ Lod (906¼ ‰); Raugewicht reduziert. Wirtschaftlicher Hintergrund: nordeuropäische Silberpreisaufwärtsbewegung 1544+ und Bedarf an Münzgeld für Schmalkaldischer-Krieg-Subventionszahlungen Christians III.'
      en: 'The supplement of 27 September 1544 raises Marken-fin to <b>mf 9.481</b> (≈ 24.67 g fine per Daler)<sup><a href="#ref30">[30]</a></sup><sup><a href="#ref31">[31]</a></sup>. Fineness unchanged at 14½ Lod (906¼ ‰); rough weight reduced. Economic background: northern-European silver price uptrend from 1544 onwards and Christian III''s need for mint money to fund Schmalkaldic War subsidies.'
      uk: 'Tillæg від 27 вересня 1544 підвищує Marken-fin до <b>mf 9,481</b> (≈ 24,67 г чистого на Daler)<sup><a href="#ref30">[30]</a></sup><sup><a href="#ref31">[31]</a></sup>. Проба незмінна 14½ Lod (906¼ ‰); повна вага зменшена. Економічний контекст: північноєвропейський підйом цін на срібло з 1544+ і потреба Кристіана III у монетних коштах для субсидій Шмалькальденської війни.'
  8_daler_lybsk_fod:
  - id: I
    year_from: 1545
    year_to: 1571
    from_label: '1545'
    to_label: '1571'
    title:
      de: 'Phase I · Flensborg Bestalling 1547 · 14¼ Lod (890⅝ ‰) · mf 8,982, 26,029 g fein je Daler · Lybsk-Untertheilung'
      en: 'Phase I · Flensborg Bestalling 1547 · 14¼ Lod (890⅝ ‰) · mf 8.982, 26.029 g fine per Daler · Lybsk subdivision'
      uk: 'Фаза I · Flensborg Bestalling 1547 · 14¼ Lod (890⅝ ‰) · mf 8,982, 26,029 г чистого на Daler · любекська підструктура'
    description:
      de: 'Flensborg Bestalling vom 22. Januar 1547 unter Mzm. Jørgen Kock dem Jüngeren<sup><a href="#ref29">[29]</a></sup>. Daler-Brutto identisch zur königlichen Linie (29,232 g, 8 Stück / Cölln. Marck rauh), aber Feingehalt abgesenkt auf 14¼ Lod (890⅝ ‰) ⇒ <b>mf 8,982</b>, 26,029 g fein je Daler (1,75 % leichter als royal). Sub-Mark in Lybsk-Untertheilung: <b>1 Gylden = 24 ß lybsk = 288 Penning lybsk</b><sup><a href="#ref29">[29]</a></sup><sup><a href="#ref32">[32]</a></sup> (vs königliche 48 ß danske). Hauptphase 1545-1554; Auslauf biß 1571 unter Frederik II. Geprägt: Rhinsk Gylden, Sølvgylden, Søsling lybsk (Hede c3h15-c3h22 — Specimen-Coverage in unserem Datensatz noch unvollständig, abhängig vom §AZ Galster + Jensen-Skjoldager Paper-Source-Import).'
      en: 'Flensborg Bestalling of 22 January 1547 under mintmaster Jørgen Kock the Younger<sup><a href="#ref29">[29]</a></sup>. Daler brutto identical to the royal line (29.232 g, 8 pieces per Cologne mark rough), but fineness reduced to 14¼ Lod (890⅝ ‰) ⇒ <b>mf 8.982</b>, 26.029 g fine per Daler (1.75 % lighter than royal). Sub-Mark in Lybsk subdivision: <b>1 Gylden = 24 ß lybsk = 288 Penning lybsk</b><sup><a href="#ref29">[29]</a></sup><sup><a href="#ref32">[32]</a></sup> (vs royal 48 ß danske). Main phase 1545-1554; tail through 1571 under Frederik II. Coinage: Rhinsk Gylden, Sølvgylden, Søsling lybsk (Hede c3h15-c3h22 — specimen coverage in our dataset is still incomplete, pending the §AZ Galster + Jensen-Skjoldager paper-source import).'
      uk: 'Flensborg Bestalling від 22 січня 1547 за монетмайстра Jørgen Kock молодшого<sup><a href="#ref29">[29]</a></sup>. Daler повної ваги ідентично royal-лінії (29,232 г, 8 шт. з кельнської марки повної), але проба знижена до 14¼ Lod (890⅝ ‰) ⇒ <b>mf 8,982</b>, 26,029 г чистого на Daler (на 1,75 % легший за royal). Sub-Mark у любекській підструктурі: <b>1 Gylden = 24 ß lybsk = 288 Penning lybsk</b><sup><a href="#ref29">[29]</a></sup><sup><a href="#ref32">[32]</a></sup> (vs royal 48 ß danske). Головна фаза 1545-1554; заник до 1571 за Фредеріка II. Карбування: Rhinsk Gylden, Sølvgylden, Søsling lybsk (Hede c3h15-c3h22 — покриття зразків у нашому наборі даних ще неповне, очікується §AZ Galster + Jensen-Skjoldager paper-source імпорт).'
  rhinsk_gylden_fod:
  - id: '0'
    year_from: 1536
    year_to: 1536
    from_label: '1536'
    to_label: '1536'
    title:
      de: 'Phase 0 · Christian III 1536 (Roskilde) · .764 · 3,19 g rauh / 2,44 g fein · früheste Belegspur (Galster fejlagtigt henført til Gottorp)'
      en: 'Phase 0 · Christian III 1536 (Roskilde) · .764 · 3.19 g rough / 2.44 g fine · earliest documented trace («Galster fejlagtigt henført til Gottorp»)'
      uk: 'Фаза 0 · Кристіан III 1536 (Роскілле) · .764 · 3,19 г повної / 2,44 г чистого · найраніший задокументований слід («Galster fejlagtigt henført til Gottorp»)'
    description:
      de: 'Früheste Belegspur der Rhinsk-Gylden-Linie in der dänischen Königsmünze, 27 Jahre vor Frederik IIs Standardisierung von 1563. Belegexemplar <b>Galster 131</b> (1 Rhinsk gylden 1536, Christian III, Roskilde) — danskmoent.dk hält verbatim fest: «<i>Roskilde, af Galster fejlagtigt henført til Gottorp</i>» — Galster ordnete das Stück fälschlich Gottorp zu, danskmoent.dk korrigiert auf Roskilde<sup><a href="#ref29">[29]</a></sup>. Metrische Daten: <b>3,19 g rauh / 0,764 Probe / 2,44 g fein</b> — innerhalb des ~2 %-Δ-Korridors zum Phase-II-Soll (2,469 g fein @ .76) und zum Phase-I-Soll (2,501 g fein @ .77). Cross-Referenzen: Schou 1-7, Sieg 23, Reinhold Junge s. XX,18; Bruun-14770 (Bruun II, lot 14258) attestiert ein zweites Roskilde-1536-Stück mit Brutto 3,37 g (Probe nicht erfaßt). Christian III. setzt damit die Rhenish-Gulden-Tradition <em>vor</em> der Augsburger Reichsmünzordnung 1559 und vor Frederik IIs offizieller Standardisierung 1563 fort — wahrscheinlich Übergangs-Karbung der Münzreform 1541 / Møntordning vom 20. September 1541.'
      en: 'The earliest documented trace of the Rhinsk-Gylden line in the Danish royal mint, 27 years before Frederik II''s standardisation of 1563. Reference specimen <b>Galster 131</b> (1 Rhinsk gylden 1536, Christian III, Roskilde) — danskmoent.dk records verbatim: «<i>Roskilde, af Galster fejlagtigt henført til Gottorp</i>» — Galster erroneously attributed the piece to Gottorp; danskmoent.dk corrects to Roskilde<sup><a href="#ref29">[29]</a></sup>. Metric data: <b>3.19 g rough / 0.764 fineness / 2.44 g fine</b> — within the ~2 % Δ corridor of the Phase II soll (2.469 g fine at .76) and the Phase I soll (2.501 g fine at .77). Cross-references: Schou 1-7, Sieg 23, Reinhold Junge p. XX,18; Bruun-14770 (Bruun II, lot 14258) attests a second Roskilde 1536 specimen at brutto 3.37 g (fineness not recorded). Christian III thus continues the Rhenish-Gulden tradition <em>before</em> the Augsburg Reichsmünzordnung of 1559 and before Frederik II''s official standardisation in 1563 — probably a transition coinage of the 1541 mint reform / Møntordning of 20 September 1541.'
      uk: 'Найраніший задокументований слід лінії Rhinsk-Gylden у данській королівській монеті, на 27 років раніший за стандартизацію Фредеріка II 1563 р. Еталонний зразок <b>Galster 131</b> (1 Rhinsk gylden 1536, Кристіан III, Роскілле) — danskmoent.dk фіксує verbatim: «<i>Roskilde, af Galster fejlagtigt henført til Gottorp</i>» — Galster помилково відніс зразок до Gottorp; danskmoent.dk виправляє на Роскілле<sup><a href="#ref29">[29]</a></sup>. Метричні дані: <b>3,19 г повної / проба 0,764 / 2,44 г чистого</b> — у межах ~2 %-Δ-коридору від soll-значення фази II (2,469 г чистого за .76) та soll-значення фази I (2,501 г чистого за .77). Cross-references: Schou 1-7, Sieg 23, Reinhold Junge с. XX,18; Bruun-14770 (Bruun II, lot 14258) засвідчує другий зразок Роскілле 1536 з повною вагою 3,37 г (проба не зафіксована). Кристіан III таким чином продовжує традицію Rhenish-Gulden <em>до</em> Augsburger Reichsmünzordnung 1559 і до офіційної стандартизації Фредеріка II 1563 р. — імовірно перехідне карбування монетної реформи 1541 / Møntordning від 20 вересня 1541.'
  - id: I
    year_from: 1563
    year_to: 1564
    from_label: '1563'
    to_label: '1564'
    title:
      de: 'Phase I · Frederik II 1563-1564 · .77 (≈ 18½ Karat) · 2,501 g fein je Stück'
      en: 'Phase I · Frederik II 1563-1564 · .77 (≈ 18½ carats) · 2.501 g fine per piece'
      uk: 'Фаза I · Фредерік II 1563-1564 · .77 (≈ 18½ карат) · 2,501 г чистого на штуку'
    description:
      de: 'Pioniereinführung der Rhenish-Gulden-Linie in der dänischen Königsmünze unter Frederik II. Zwei dated Belege: <b>Hede f2h3</b> (1 Rhinsk Gylden 1563, 3,248 g rauh / 2,501 g fein @ .77) und <b>Hede f2h6</b> (1 Rhinsk Gylden 1564). Reformations-Übergangsphase — kurz nach der Augsburger Reichsmünzordnung von 1559, die den Reichsdukatenfuß als imperialen Goldstandard verankert hat; Frederik II setzt parallel die ältere Rhenish-Gulden-Tradition für deutsch-orientierten Handel fort.'
      en: 'Pioneer introduction of the Rhenish-Gulden line in the Danish royal mint under Frederik II. Two dated specimens: <b>Hede f2h3</b> (1 Rhinsk Gylden 1563, 3.248 g rough / 2.501 g fine at .77) and <b>Hede f2h6</b> (1 Rhinsk Gylden 1564). Reformation transition phase — shortly after the Augsburg Reichsmünzordnung of 1559 anchored the Reichsdukatenfuß as the imperial gold standard; Frederik II continues the older Rhenish-Gulden tradition in parallel for German-oriented trade.'
      uk: 'Піонерське запровадження лінії Rhenish-Gulden у данській королівській монеті за Фредеріка II. Два dated-зразки: <b>Hede f2h3</b> (1 Rhinsk Gylden 1563, 3,248 г повної / 2,501 г чистого за .77) та <b>Hede f2h6</b> (1 Rhinsk Gylden 1564). Перехідна фаза Реформації — невдовзі після Augsburger Reichsmünzordnung 1559, що закріпила Reichsdukatenfuß як імперський золотий стандарт; Фредерік II паралельно продовжує давнішу традицію Rhenish-Gulden для торгівлі з німецьким простором.'
  - id: II
    year_from: 1625
    year_to: 1632
    from_label: '1625'
    to_label: '1632'
    title:
      de: 'Phase II · Christian IV 1625-1632 · Kaiserlich-Dänischer Krieg · .76 (minimal abgesenkt) · 2,469 g fein je Stück'
      en: 'Phase II · Christian IV 1625-1632 · Imperial-Danish War · .76 (slightly reduced) · 2.469 g fine per piece'
      uk: 'Фаза II · Кристіан IV 1625-1632 · Імперсько-данська війна · .76 (мінімально знижено) · 2,469 г чистого на штуку'
    description:
      de: 'Wiederaufnahme der Rhinsk-Gylden-Karbung unter Christian IV. nach 61-jährigem Belegfenster-Hiat. Hede c4h29 dokumentiert die Jahrgänge <b>1625, 1627, 1628, 1632</b> — exakt der Belegfenster-Bereich des <b>Kaiserlich-Dänischen Krieges</b> (1625-1629, Christian IV. tritt 1625 in den Dreißigjährigen Krieg ein, Niederlage bei Lutter am Barenberge 1626, Lübecker Frieden 1629). Die minimal abgesenkte Probe .76 (vs Phase-I-.77) spiegelt die Kriegsfinanzierungs-Praxis wider. Mit dem Ende der Hauptkarbung 1632 läuft die Linie aus; Christian IV. pivotiert die Goldprägung später zur silbernen Krone-Mønt (Hebræermønt 1644).'
      en: 'Resumption of Rhinsk Gylden coinage under Christian IV after a 61-year documented-window hiatus. Hede c4h29 documents the years <b>1625, 1627, 1628, 1632</b> — exactly the range of the <b>Imperial-Danish War</b> (1625-1629, Christian IV enters the Thirty Years'' War in 1625, defeat at Lutter am Barenberge 1626, Peace of Lübeck 1629). The slightly reduced fineness .76 (vs Phase-I-.77) reflects wartime financing practice. With the end of main coinage in 1632 the line winds down; Christian IV later pivots gold coinage to the silver Krone-Mønt (Hebræermønt 1644).'
      uk: 'Відновлення карбування Rhinsk Gylden за Кристіана IV після 61-річної паузи у задокументованому вікні. Hede c4h29 документує роки <b>1625, 1627, 1628, 1632</b> — саме діапазон <b>Імперсько-данської війни</b> (1625-1629, Кристіан IV вступає у Тридцятилітню війну 1625 р., поразка під Lutter am Barenberge 1626, Любекський мир 1629). Мінімально знижена проба .76 (vs фаза-I-.77) відображає практику воєнного фінансування. З завершенням головного карбування 1632 лінія заникає; Кристіан IV згодом повертає золоте карбування до срібної Krone-Mønt (Hebræermønt 1644).'
  f2_guldkrone_fod:
  - id: I
    year_from: 1563
    year_to: 1564
    from_label: '1563'
    to_label: '1564'
    title:
      de: 'Phase I · Klipping-Karbung 1563-1564 · .934 / 3,341 g rauh / 3,120 g fein · Kriegsfinanzierung Nordische Siebenjährige Krieg'
      en: 'Phase I · Klipping coinage 1563-1564 · .934 / 3.341 g rough / 3.120 g fine · Northern Seven Years'' War financing'
      uk: 'Фаза I · Klipping-карбування 1563-1564 · .934 / 3,341 г повної / 3,120 г чистого · фінансування Північної Семирічної війни'
    description:
      de: 'Einzige Phase der Frederik-II-Guldkrone-fod, Klipping-Notmünz-Emission der frühen Phase der Nordischen Siebenjährigen Krieges<sup><a href="#ref35">[35]</a></sup>. <b>Karbung 17. Oktober 1563 verbatim:</b> «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» (Wilcke Rentmeister-Rechnungen Kap. 6)<sup><a href="#ref33">[33]</a></sup>. Belegexemplare Hede f2h2 (1563, Unikat) + Hede f2h5 (1564), Kopenhagen / Bremerholm-Hauptmünze<sup><a href="#ref34">[34]</a></sup>. Reversinschrift «<i>I GOLT KRONE</i>». Karbung endet 1564 (vermutlich aufgrund knapper Kroneguld-Bestände); Frederik II. wechselt für die restliche Kriegszeit (1565-1570) zu silbernen Klippinge-Notmünzen und zum imperialen 9-Thaler-Fuß ab 1566.'
      en: 'The single phase of the Frederik-II-Guldkrone-fod, a Klipping emergency-coinage emission of the early phase of the Northern Seven Years'' War<sup><a href="#ref35">[35]</a></sup>. <b>17 October 1563 coinage verbatim:</b> «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» (Wilcke Rentmeister account records, Kap. 6)<sup><a href="#ref33">[33]</a></sup>. Reference specimens Hede f2h2 (1563, unique) + Hede f2h5 (1564), Copenhagen / Bremerholm royal mint<sup><a href="#ref34">[34]</a></sup>. Reverse inscription «<i>I GOLT KRONE</i>». Coinage ends in 1564 (presumably due to limited Kroneguld stocks); for the remainder of the war (1565-1570) Frederik II shifts to silver Klipping emergency coins and to the imperial 9-Thaler-Fuß from 1566.'
      uk: 'Єдина фаза Frederik-II-Guldkrone-fod, Klipping-надзвичайна емісія ранньої фази Північної Семирічної війни<sup><a href="#ref35">[35]</a></sup>. <b>Карбування 17 жовтня 1563 verbatim:</b> «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» (рент-майстерські рахунки Wilcke, Kap. 6)<sup><a href="#ref33">[33]</a></sup>. Еталонні зразки Hede f2h2 (1563, унікат) + Hede f2h5 (1564), Копенгаген / Bremerholm-королівський монетний двір<sup><a href="#ref34">[34]</a></sup>. Реверс-напис «<i>I GOLT KRONE</i>». Карбування завершується 1564 (ймовірно через обмежені запаси Kroneguld); на решту війни (1565-1570) Frederik II переходить до срібних Klipping-надзвичайних монет та до імперського 9-Thaler-Fuß з 1566 р.'
  rosenobel_fod:
  - id: I
    year_from: 1584
    year_to: 1584
    from_label: '1584'
    to_label: '1584'
    title:
      de: 'Phase I · Frederik II 1584 (Frederiksborg) · Brutto 7,69 g · Probe unbekannt · unikat (Rose-Noble-Vorläufer)'
      en: 'Phase I · Frederik II 1584 (Frederiksborg) · brutto 7.69 g · fineness unknown · unique (Rose Noble predecessor)'
      uk: 'Фаза I · Frederik II 1584 (Frederiksborg) · повна вага 7,69 г · проба невідома · унікат (передвісник Rose Noble)'
    description:
      de: 'Unikales Belegexemplar Hede f2h7b — 1 Rosenobel 1584, Münzstätte <b>Frederiksborg</b>, Brutto 7,69 g (Probe nicht im Cache erfaßt). Wahrscheinlich näher am englischen Klassik-Rose-Noble-Standard 7,78 g (Edward IV. 1465). Karbung wurde von Frederik II. nicht fortgesetzt — 27-jährige Pause biß zur Wiederaufnahme unter Christian IV. 1611. Hede 7B / Schou 2 / Sieg 29<sup><a href="#ref39">[39]</a></sup>.'
      en: 'Unique reference specimen Hede f2h7b — 1 Rosenobel 1584, <b>Frederiksborg</b> mint, brutto 7.69 g (fineness not recorded in the cache). Probably closer to the classical English Rose Noble standard 7.78 g (Edward IV 1465). Frederik II did not continue the coinage — a 27-year pause until Christian IV resumed it in 1611. Hede 7B / Schou 2 / Sieg 29<sup><a href="#ref39">[39]</a></sup>.'
      uk: 'Унікальний еталонний зразок Hede f2h7b — 1 Rosenobel 1584, монетний двір <b>Frederiksborg</b>, повна вага 7,69 г (проба у кеші не зафіксована). Імовірно ближче до класичного англійського стандарту Rose Noble 7,78 г (Edward IV 1465). Frederik II не продовжив карбування — 27-річна пауза до відновлення за Christian IV 1611 р. Hede 7B / Schou 2 / Sieg 29<sup><a href="#ref39">[39]</a></sup>.'
  - id: II
    year_from: 1611
    year_to: 1629
    from_label: '1611'
    to_label: '1629'
    title:
      de: 'Phase II · Christian IV 1611-1629 (Kopenhagen) · 8,994 g rauh / 7,492 g fein @ .833 · Kalmar-Krieg + Imperial-Dänischer Krieg'
      en: 'Phase II · Christian IV 1611-1629 (Copenhagen) · 8.994 g rough / 7.492 g fine at .833 · Kalmar War + Imperial-Danish War'
      uk: 'Фаза II · Christian IV 1611-1629 (Копенгаген) · 8,994 г повної / 7,492 г чистого за .833 · Кальмарська війна + Імперсько-данська війна'
    description:
      de: 'Hauptkarbungsphase: Christian IV. revives das Rosenobel-Programm 1611 in <b>Kopenhagen</b> mit neuem standardisiertem Format. Hede c4h23a — 1 Rosenobel 1611, 1612, 1613, 1627, 1629 · 8,994 g rauh × .833 = 7,492 g fein. Sub-Stückelung Hede c4h24 — ½ Rosenobel 1611, period-Spitzname <i>«Guldridder»</i> («Goldritter»). 1611-1613 fällt exakt mit dem <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">Kalmar-Krieg</a> (Christian IVs Versuch, Schweden zur Kalmar-Union zurück zu zwingen — Schweden zahlt 1 Mio. Riksdaler Älvsborg-Lösegeld)<sup><a href="#ref40">[40]</a></sup>; 1627 + 1629 fällt in den Imperial-Dänischen Krieg (1625-1629, Christian IVs Beteiligung am Dreißigjährigen Krieg). Funktion: Söldnerbezahlung + diplomatische Repräsentation, kein Tagesumlauf. Tarif rechnerisch ≈ 3-4 Speciedaler per Feingewicht-Konversion (kein period-attestierter formaler Tarif gefunden; pending §AX-Verifizierung).'
      en: 'Main coinage phase: Christian IV revives the Rosenobel programme in 1611 in <b>Copenhagen</b> at a new standardised format. Hede c4h23a — 1 Rosenobel 1611, 1612, 1613, 1627, 1629 · 8.994 g rough × .833 = 7.492 g fine. Sub-denomination Hede c4h24 — ½ Rosenobel 1611, period nickname <i>«Guldridder»</i> («gold knight»). 1611-1613 coincides exactly with the <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">Kalmar War</a> (Christian IV''s attempt to force Sweden back into the Kalmar Union — Sweden pays a 1 million riksdaler Älvsborg ransom)<sup><a href="#ref40">[40]</a></sup>; 1627 + 1629 falls within the Imperial-Danish War (1625-1629, Christian IV''s involvement in the Thirty Years'' War). Function: mercenary pay + diplomatic representation, not daily circulation. Tariff computed ≈ 3-4 Speciedaler via fine-weight conversion (no period-attested formal tariff found; pending §AX verification).'
      uk: 'Головна фаза карбування: Christian IV відновлює програму Rosenobel 1611 р. у <b>Копенгагені</b> з новим стандартизованим форматом. Hede c4h23a — 1 Rosenobel 1611, 1612, 1613, 1627, 1629 · 8,994 г повної × .833 = 7,492 г чистого. Субномінал Hede c4h24 — ½ Rosenobel 1611, period-прізвисько <i>«Guldridder»</i> («золотий лицар»). 1611-1613 точно збігається з <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">Кальмарською війною</a> (спроба Christian IV примусити Швецію повернутися до Кальмарської унії — Швеція виплачує 1 млн riksdaler Älvsborg-викупу)<sup><a href="#ref40">[40]</a></sup>; 1627 + 1629 припадає на Імперсько-данську війну (1625-1629, участь Christian IV у Тридцятилітній війні). Функція: оплата найманців + дипломатична репрезентація, не щоденний обіг. Тариф розрахунково ≈ 3-4 Speciedaler через конверсію чистої ваги (period-attested формального тарифу не знайдено; очікує §AX-уточнення).'
  kronemont_chr_iv:
  - id: I
    year_from: 1618
    year_to: 1624
    from_label: '1618'
    to_label: '1624'
    title:
      de: Christian IV. · Corona Danica · Tarif 1½ Speciedaler
      en: Christian IV · Corona Danica · tariff 1½ Speciedaler
      uk: Кристіан IV · Corona Danica · тариф 1½ Specie
    description:
      de: 'Erste Phase der Christian-IV.-Müntzformel: eingeführt durch das <b>åbne Brev af 12. Juli 1618</b> (Wilcke II Anm. 53<sup><a href="#ref16">[16]</a></sup>: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I S. 156–157<sup><a href="#ref16">[16]</a></sup>). Im Patent wird die Münze als «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» beschrieben — der spätere Latin-Name «Corona Danica» ist Numismatik-Usus, nicht Patent-Sprache. Alle Prägungen 1618–1624 laufen unter dem ursprünglichen Tarif <b>1½ Speciedaler</b> — eine Wertigkeit, die im Volksmund die satirische Umdeutung des königlichen Wahlspruches <b>RFP</b> (regna firmat pietas) als <b>R(iget) F(attes) P(enge)</b> hervorrief.<sup><a href="#ref5">[5]</a></sup> Die offizielle Tarifsenkung auf 1⅓ Speciedaler erfolgt erst <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup>, unmittelbar nach Einstellung der Karbverfahrensphase. Stilistische Untergruppen: Corona-Danica-Originalprägungen 1618–1622 (KM# 57–61, 58a, 59a) und «Dicke» / Open-Crown-Varianten 1624 (KM# 94–99) — alle innerhalb desselben Tarifregimes. Wikipedia DE «Corona Danica»: «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup><a href="#ref12">[12]</a></sup>.'
      en: 'First phase of the Christian IV Müntzformel: introduced by the <b>åbne Brev af 12. Juli 1618</b> (Wilcke II note 53<sup><a href="#ref16">[16]</a></sup>: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I pp. 156–157<sup><a href="#ref16">[16]</a></sup>). In the patent the coin is described as «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» — the later Latin name «Corona Danica» is a numismatic convention, not patent language. All 1618–1624 issues run under the original <b>1½ Speciedaler</b> tariff — a parity that in folk parlance prompted the satirical reread of the royal motto <b>RFP</b> (regna firmat pietas) as <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref5">[5]</a></sup> The official tariff cut to 1⅓ Speciedaler only comes in <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup>, right after the Christian-IV personnel mintage phase ends. Stylistic sub-groups: Corona Danica original strikes 1618–1622 (KM# 57–61, 58a, 59a) and «Dicke» / Open-Crown variants 1624 (KM# 94–99) — all within the same tariff regime. Wikipedia DE «Corona Danica»: «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup><a href="#ref12">[12]</a></sup>.'
      uk: 'Перша фаза монетної формули Кристіана IV: запроваджено <b>åbne Brev af 12. Juli 1618</b> (Wilcke II прим. 53<sup><a href="#ref16">[16]</a></sup>: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I с. 156–157<sup><a href="#ref16">[16]</a></sup>). У патенті монета описана як «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» — пізніша латинська назва «Corona Danica» — нумізматична умовність, не мова патенту. Усі емісії 1618–1624 під оригінальним тарифом <b>1½ Speciedaler</b> — паритет, який у народі породив сатиричне переосмислення королівського девізу <b>RFP</b> (regna firmat pietas) як <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref5">[5]</a></sup> Офіційне зниження тарифу до 1⅓ Speciedaler відбувається лише <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup> — одразу після припинення фази персонального карбування Кристіана IV. Стилістичні підгрупи: оригінальні Corona Danica 1618–1622 (KM# 57–61, 58a, 59a) та варіанти «Dicke» / Open-Crown 1624 (KM# 94–99) — усі в одному тарифному режимі. Wikipedia DE «Corona Danica»: «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup><a href="#ref12">[12]</a></sup>.'
  - id: II
    year_from: 1651
    year_to: 1652
    from_label: '1651'
    to_label: '1652'
    title:
      de: Frederik III. · Fortsetzung der Christian-IV.-Müntzformel · Übergang zum 10½-Krone-Fuß
      en: Frederik III · Christian IV Müntzformel continuation · transition to 10½-Krone-Fuß
      uk: Фредерік III · продовження монетної формули Кристіана IV · перехід до 10½-Krone-Fuß
    description:
      de: 'Zweite Phase der Christian-IV.-Müntzformel: Frederik III. (1648–1670) nimmt die Krone-Prägung 1651 in Kopenhagen wieder auf und folgt zunächst der älteren Müntzformel mit 16,25 g Feinsilber, bevor er 1652 zum neuen 10½-Krone-Fuß (.672 / 14,964 g fein) übergeht. Wikipedia DE «Corona Danica»<sup><a href="#ref12">[12]</a></sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup><a href="#ref9">[9]</a></sup> klassifiziert die gesamte Müntzformel als <b>1618–1652</b>; die feinste Typologie der Übergangsphase 1651–1652 in Aagaard 2004<sup><a href="#ref13">[13]</a></sup> «Frederik III Kronemønt København 1651–1670».'
      en: 'Second phase of the Christian IV Müntzformel: Frederik III (1648–1670) resumes Krone production at Copenhagen in 1651 and at first follows the older formula with 16.25 g fine silver, before transitioning to the new 10½-Krone-Fuß (.672 / 14.964 g fine) in 1652. Wikipedia DE «Corona Danica»<sup><a href="#ref12">[12]</a></sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup><a href="#ref9">[9]</a></sup> classifies the full Müntzformel as <b>1618–1652</b>; the finest typology of the 1651–1652 transition is in Aagaard 2004<sup><a href="#ref13">[13]</a></sup> «Frederik III Kronemønt København 1651–1670».'
      uk: 'Друга фаза монетної формули Кристіана IV: Фредерік III (1648–1670) поновлює карбування Krone у Копенгагені 1651 р. і спочатку йде за старішою формулою з 16,25 г чистого срібла, перш ніж 1652 р. перейти на нову 10½-Krone-Fuß (.672 / 14,964 г чистого). Wikipedia DE «Corona Danica»<sup><a href="#ref12">[12]</a></sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup><a href="#ref9">[9]</a></sup> класифікує повну монетну формулу як <b>1618–1652</b>; найточніша типологія перехідного періоду 1651–1652 — в Aagaard 2004<sup><a href="#ref13">[13]</a></sup> «Frederik III Kronemønt København 1651–1670».'
  - id: III
    year_from: 1665
    year_to: 1675
    from_label: '1665'
    to_label: '1675'
    title:
      de: Sonderemissionen — Pumphosenkrone (1665) und 2-Krone (1675)
      en: Special issues — Pumphosenkrone (1665) and 2-Krone (1675)
      uk: Спец-випуски — Pumphosenkrone (1665) і 2-Krone (1675)
    description:
      de: Hede 1957<sup><a href="#ref9">[9]</a></sup> verzeichnet zwei nachträgliche Sonderemissionen, die der Christian-IV.-Müntzformel-Lötigkeit nahekommen, aber Hede explizit als spezielle Schaumünzen wertet, nicht als Formelfortsetzungen:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Krone und ½ Krone Frederiks III. (Schou 39/40), bei höherer Lötigkeit für ein schöneres Karbverfahren;<br>· <b>1675 2-Krone</b> — Doppelkronenprägung Christians V. (Schou 11–15) unter Reskript vom 11. März 1675 über den Münzgewinn.<br>Beide Stücke werden in Hedes Klassifikation als «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» behandelt — also außerhalb des regulären 10½-Krone-Fußes (Grobe Krone).
      en: Hede 1957<sup><a href="#ref9">[9]</a></sup> records two later special issues that approach the Christian IV Müntzformel's fineness, but which Hede explicitly classifies as specialised Schaumünzen rather than formula continuations:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Frederik III's Krone and ½ Krone (Schou 39/40), at higher fineness for a more attractive strike;<br>· <b>1675 2-Krone</b> — Christian V's double-Krone strike (Schou 11–15) under the rescript of 11 March 1675 regarding the mint gain.<br>Both pieces are handled by Hede as «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» — i.e. outside the regular 10½-Krone-Fuß (Grobe Krone).
      uk: Hede 1957<sup><a href="#ref9">[9]</a></sup> фіксує два пізніші спеціальні випуски, які за пробою наближаються до монетної формули Кристіана IV, але Hede явно класифікує їх як спеціальні Schaumünzen, а не продовження формули:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Krone та ½ Krone Фредеріка III (Schou 39/40), за вищою пробою для красивішого карбування;<br>· <b>1675 2-Krone</b> — карбування подвійної Krone Кристіана V (Schou 11–15) за рескриптом 11 березня 1675 про монетний прибуток.<br>Обидва випуски Hede трактує як «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» — тобто поза регулярною 10½-Krone-Fuß (Grobe Krone).
  reichsdukatenfuss:
  - id: pre-I
    year_from: 1514
    year_to: 1558
    from_label: '1514'
    to_label: '1558'
    title:
      de: Phase pre-I · Hungarian Goldgulden de-facto 1481-1558 (sichtbar 1514+) · .986 / 3,49 g rauh / 3,44 g fein
      en: Phase pre-I · Hungarian Goldgulden de facto 1481-1558 (visible 1514+) · .986 / 3.49 g rough / 3.44 g fine
      uk: Фаза pre-I · Hungarian Goldgulden де факто 1481-1558 (видиме 1514+) · .986 / 3,49 г повної / 3,44 г чистого
    description:
      de: 'Pre-Reichsmünzordnungs-Phase: Hungarian-Venetian Dukat-Tradition de facto in der dänischen Königsmünze etabliert. <b>Hans I (1481-1513)</b> setzt die Tradition ein — frühestes belegtes Stück Numista N#355730 (3,30 g rauh, Δ −5,4 % zum Soll 3,49 g, im Remedium). Frederik I (1523-1533) kontinuiert die Karbung ab 1527 (f1h** Belege pending §AZ Galster + Jensen-Skjoldager Paper-Source-Import); Christian III (1534-1559) mit Hede c3h1 (Ungersk Gylden 1557 Kopenhagen) und Hede c3h2 (2 Ungersk Gylden 1557 Kopenhagen). Metrisch identisch zur post-1559 Phase I — Augspurgische Reichsmünzordnung 1559 kodifizierte den seit 1481 in Dänemark de-facto gepägten Standard ohne metrischen Bruch. <em>Sichtbares Fenster mission-scope-clipped zu 1514+; Hans 1481-1513 + Frederik I 1527-1533 + Christian III 1534-1558 Karbung dokumentiert in Description, aber Specimens pre-1514 nicht gerendert. Modellierungsnotiz: vormals als <code>goldgulden_fod</code> Phase I separat modelliert, zusammengeführt 2026-05-21.</em>'
      en: 'Pre-Reichsmünzordnung phase: Hungarian-Venetian Dukat tradition de facto established in the Danish royal mint. <b>Hans I (1481-1513)</b> introduces the tradition — earliest documented specimen Numista N#355730 (3.30 g rough, Δ −5.4 % from soll 3.49 g, within remedium). Frederik I (1523-1533) continues the coinage from 1527 (f1h** references pending §AZ Galster + Jensen-Skjoldager paper-source import); Christian III (1534-1559) with Hede c3h1 (Ungersk Gylden 1557 Copenhagen) and Hede c3h2 (2 Ungersk Gylden 1557 Copenhagen). Metrically identical to post-1559 Phase I — the Augsburg Imperial Coinage Ordinance of 1559 codified the standard de facto struck in Denmark since 1481 without a metric break. <em>Visible window mission-scope-clipped to 1514+; Hans 1481-1513 + Frederik I 1527-1533 + Christian III 1534-1558 coinage documented in description but pre-1514 specimens not rendered. Modelling note: previously modelled as <code>goldgulden_fod</code> Phase I separately, merged 2026-05-21.</em>'
      uk: "Pre-Reichsmünzordnung фаза: Hungarian-Venetian Dukat-традиція де факто встановлена в данській королівській монеті. <b>Hans I (1481-1513)</b> запроваджує традицію — найраніший задокументований зразок Numista N#355730 (3,30 г повної, Δ −5,4 % від soll 3,49 г, у межах remedium). Frederik I (1523-1533) продовжує карбування з 1527 (f1h** очікують імпорт §AZ Galster + Jensen-Skjoldager paper-source); Christian III (1534-1559) з Hede c3h1 (Ungersk Gylden 1557 Копенгаген) та Hede c3h2 (2 Ungersk Gylden 1557 Копенгаген). Метрично ідентичний post-1559 фазі I — Авґсбурзький імперський монетний ордонанс 1559 кодифікував стандарт, що де факто карбувався в Данії з 1481 без метричного розриву. <em>Видиме вікно mission-scope-clipped до 1514+; карбування Hans 1481-1513 + Frederik I 1527-1533 + Christian III 1534-1558 задокументовано в описі, але pre-1514 specimens не рендеряться. Нотатка моделювання: раніше модельовано окремо як <code>goldgulden_fod</code> Phase I, об'єднано 2026-05-21.</em>"
  - id: I
    year_from: 1591
    year_to: 1726
    from_label: 1591 (Haderslev)
    to_label: '1726'
    title:
      de: Christian IVs frühe Goldprägung (Haderslev 1591–1599) → Kopenhagen / Glückstadt / Tönning (1600–1726)
      en: Christian IV's early gold (Haderslev 1591–1599) → Copenhagen / Glückstadt / Tönning (1600–1726)
      uk: Раннє золото Христіяна IV (Haderslev 1591–1599) → Копенгаген / Glückstadt / Tönning (1600–1726)
    mt_caption:
      de: Dukat-Prägung nach Reichsdukatenfuß (.986) · zunächst Christian-IV.-Prägungen Haderslev (Portugaloser, Goldgulden 1591–1593) · dann Kopenhagen, Glückstadt (Chr. IV. / Chr. V.) und Tönning (Chr. Albrecht / Fr. IV. / Karl Fr.) · sortiert nach Jahr
      en: Ducat issues to the Reichsdukatenfuß (.986) · initially Christian IV's Haderslev issues (Portugaloser, Goldgulden 1591–1593) · then Copenhagen, Glückstadt (Christian IV / Christian V) and Tönning (Christian Albrecht / Frederik IV / Karl Friedrich) · sorted by year
      uk: Карбування дукатів за Reichsdukatenfuß (.986) · спочатку Гадерслевські емісії Христіяна IV (Portugaloser, Goldgulden 1591–1593) · далі Копенгаген, Glückstadt (Христіян IV / Христіян V) і Tönning (Христіян Альбрехт / Фредерік IV / Карл Фрідріх) · впорядковано за роком
  - id: II
    year_from: 1726
    year_to: 1771
    from_label: '1726'
    to_label: '1771'
    title:
      de: Courantdukat-Fuß durch Courantverbund
      en: Courantdukat standard via the Courant union
      uk: Стопа Courantdukat через Courant-союз
    context:
      de: Mit dem Kurantmøntfod von 1726 entwickelt sich parallel zum Reichsdukatenfuß der <b>Courantdukat</b> — Dukat mit leichter Feingewichtsreduktion zur festen Kurs-Anbindung (2 Rigsdaler Courant = 1 Courantdukat, später 2½ Rigsdaler Courant). Altona-Münze wird erst 1771 eröffnet; Dukaten in dieser Phase werden in Kopenhagen bzw. Glückstadt für den gesamtstaatlichen Handel geprägt.
      en: With the Kurantmøntfod of 1726 a <b>Courantdukat</b> grows up alongside the Reichsdukatenfuß — a ducat with slightly reduced fine weight, designed for a fixed exchange link (2 Rigsdaler Courant = 1 Courantdukat, later 2½ Rigsdaler Courant). The Altona mint is only opened in 1771; the ducats of this phase are struck in Copenhagen and Glückstadt for the trade of the composite state.
      uk: З Kurantmøntfod 1726 паралельно до Reichsdukatenfuß виростає <b>Courantdukat</b> — дукат із трохи зниженою чистою вагою, призначений для фіксованої курсової привʼязки (2 Rigsdaler Courant = 1 Courantdukat, пізніше 2½ Rigsdaler Courant). Монетний двір в Альтоні відкриють лише 1771; дукати цієї фази карбують у Копенгагені й Glückstadt для торгівлі цілісної держави.
  - id: III
    year_from: 1771
