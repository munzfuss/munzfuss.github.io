      de: 'Reskript Christians V. vom 31. Dezember 1692 (Hede 1957 verbatim): «<i>der vil blive slået kroner ''efter den allerbedste Godhed som den nogen Tid udi vores Regerings Tid haver været slagen''</i>» — 13 Specieskronen aus 1 feinen Cöllnischen Marck (≈ 14,98 g fein je Krone) · ausschließlich an der Kopenhagener Hauptmünze geprägt 1693–1771 · Reformcharakter weitgehend symbolisch: nominelle Lötigkeit steigt von 10¾ Loth (.672) auf 13⅓ Loth (.833), aber der tatsächliche Feinsilbergehalt nur um 0,02 g (von 14,964 g auf 14,984 g je Krone) · Skuemønter (ceremonelle Schaumünzen) zur Tronwechselfeier: 3 Kroner 1699 (Frederik IV.) und 1746 (Frederik V.) — Hede: «<i>3 kroner 1699 og 1746 ... slået i anledning af et tronskifte som skuemønter</i>» · letzte Krone-Mønt der dänischen Monarchie 1771 (Christian VII., Kopenhagen, Hede 23, mit Pamätsnotiz «<i>DEN 29. JANUARII</i>» zum Geburtstag des Königs) · ältere Bestände kursierten biß zum Statsbankerot 1813'
      en: 'Christian V''s rescript of 31 December 1692 (Hede 1957 verbatim): «<i>der vil blive slået kroner ''efter den allerbedste Godhed som den nogen Tid udi vores Regerings Tid haver været slagen''</i>» — 13 specie kroner from 1 fine Cöllnische Marck (≈ 14.98 g fine per Krone) · struck exclusively at the Copenhagen royal mint 1693–1771 · reform character largely symbolic: nominal fineness rises from 10¾ Loth (.672) to 13⅓ Loth (.833), but the actual fine-silver content only by 0.02 g (from 14.964 g to 14.984 g per Krone) · Skuemønter (ceremonial Schaumünzen) for ascension celebrations: 3 Kroner 1699 (Frederik IV) and 1746 (Frederik V) — Hede: «<i>3 kroner 1699 og 1746 ... slået i anledning af et tronskifte som skuemønter</i>» · the last Krone-Mønt of the Danish monarchy in 1771 (Christian VII, Copenhagen, Hede 23, bearing the inscription «<i>DEN 29. JANUARII</i>» commemorating the king''s birthday) · older stocks remained in circulation until the Statsbankerot of 1813'
      uk: 'Рескрипт Кристіана V від 31 грудня 1692 р. (Hede 1957 verbatim): «<i>der vil blive slået kroner ''efter den allerbedste Godhed som den nogen Tid udi vores Regerings Tid haver været slagen''</i>» — 13 Specieskronen з 1 марки чистого срібла кельнської ваги (≈ 14,98 г чистого на одну Krone) · карбувався виключно на Копенгагенському королівському монетному дворі 1693–1771 · характер реформи переважно символічний: номінальна проба зростає з 10¾ Loth (.672) до 13⅓ Loth (.833), але фактичний вміст чистого срібла лише на 0,02 г (з 14,964 г до 14,984 г на одну Krone) · Skuemønter (церемоніальні Schaumünzen) на честь коронацій: 3 Kroner 1699 (Фредерік IV) та 1746 (Фредерік V) — Hede: «<i>3 kroner 1699 og 1746 ... slået i anledning af et tronskifte som skuemønter</i>» · остання Krone-Mønt данської монархії 1771 р. (Кристіан VII, Копенгаген, Hede 23, з гравіруванням «<i>DEN 29. JANUARII</i>» на честь дня народження короля) · старі запаси в обігу до Statsbankerot 1813'
