  kronemont:
  - id: I
    year_from: 1644
    year_to: 1669
    from_label: '1644'
    to_label: '1669'
    title:
      de: 10½-Krone-Fuß · Hebræermønt und Frederik-III.-Glückstadt-Serie
      en: 10½-Krone-Fuß · Hebræermønt and Frederik III Glückstadt series
      uk: 10½-Krone-Fuß · Hebræermønt та серія Frederik III Glückstadt
    description:
      de: 'Nach dem 19-jährigen Stillstand 1625–1643 (siehe <i>Christian IVs kroner</i> oben) kehrt die Krone-Mønt 1644 im <b>10½-Krone-Fuß</b> («<i>Grobe Krone</i>») zurück: <b>10½ Krone je rauer Marck</b> von 10¾ Loth (.672 Feingehalt, 14,964 g fein je Stück, Hede / Wilcke II p. 203) — ~8 % weniger Feinsilber pro Münze als unter Christian IV. Beginn mit der <b>Hebræermønt</b> (KM# 32, KM# 137) und der regulären Glückstadter 4-Marck-Danske-Serie unter Frederik III. Tarif weiterhin 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
      en: 'After the 19-year hiatus of 1625–1643 (see <i>Christian IV''s kroner</i> above), the Krone returns in 1644 under the <b>10½-Krone-Fuß</b> («<i>Coarse Krone</i>»): <b>10½ Krone per raw mark</b> at 10¾ Loth (.672 fineness, 14.964 g fine per coin, Hede / Wilcke II p. 203) — ~8 % less fine silver per coin than under Christian IV. The series opens with the <b>Hebræermønt</b> (KM# 32, KM# 137) and the regular Glückstadt 4-Marck-Danske series under Frederik III. The tariff remains 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
      uk: 'Після 19-річного припинення 1625–1643 (див. <i>Christian IV''s kroner</i> вище) Krone-Mønt повертається 1644 р. у <b>10½-Krone-Fuß</b> («<i>Груба Крона</i>»): <b>10½ Krone з повної марки</b> проби 10¾ Loth (.672 проби, 14,964 г чистого на монету, Hede / Wilcke II с. 203) — ~8 % менше чистого срібла на монету, ніж за Кристіана IV. Серія відкривається <b>Hebræermønt</b> (KM# 32, KM# 137) та регулярною ґлюкштатською серією 4 Marck Danske за Фредеріка III. Тариф лишається 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
    context:
      de: <p>Die <b>Hebræermønt</b> wird parallel in zwei Münzstätten geprägt — København (KM# 137, 1644–1646) und Glückstadt (KM# 32, 1645) — beide mit dem Tetragramm יהוה auf der Rückseite und beide bei .593 Feingehalt (gegen den Kronemønt-Standard .671 reduziert). Bei unverändertem Tarif von ⅓ Speciedaler steigt der kumulative Seigniorage-Aufschlag durch dieses zweite Debasement auf ca. +27,6 % (siehe Sondertabelle).</p><p>Parallel dazu Glückstadter 4-Marck-Danske-Serie unter Frederik III. (KM# A43, B43) am Standardfeingehalt .671 — die Norm­fortsetzung, die später die Christian-V.-Serie ablöst.</p>
      en: <p>The <b>Hebræermønt</b> is struck in parallel at two mints — Copenhagen (KM# 137, 1644–1646) and Glückstadt (KM# 32, 1645) — both bearing the Tetragrammaton יהוה on the reverse and both at .593 fineness (reduced from the Kronemønt standard of .671). At an unchanged tariff of ⅓ Speciedaler, this second debasement raises the cumulative seigniorage premium to about +27.6 % (see separate sub-table).</p><p>Alongside, the Glückstadt 4-Marck-Danske series under Frederik III (KM# A43, B43) at standard fineness .671 — the normative continuation that the Christian V series later carries forward.</p>
      uk: <p><b>Hebræermønt</b> карбується паралельно на двох монетних дворах — Копенгаген (KM# 137, 1644–1646) і Glückstadt (KM# 32, 1645) — обидва з тетраграматоном יהוה на реверсі та обидва на пробі .593 (знижено від стандартної kronemønt-проби .671). За незмінним тарифом ⅓ Speciedaler це другий шар debasement піднімає кумулятивну сеньйораж-надбавку до ~+27,6 % (див. окрему підтаблицю).</p><p>Паралельно — ґлюкштатська серія 4 Marck Danske за Фредеріка III (KM# A43, B43) на стандартній пробі .671 — нормативне продовження, яке пізніше підхоплює серія Кристіана V.</p>
  - id: II
    year_from: 1670
    year_to: 1699
    from_label: '1670'
    to_label: '1699'
    title:
      de: 10½-Krone-Fuß · Christian-V.-Reihe (Krone und 2/4 Mark)
      en: 10½-Krone-Fuß · Christian V series (Krone and 2/4 Mark)
      uk: 10½-Krone-Fuß · серія Кристіана V (Krone і 2/4 Mark)
    description:
      de: 'Christian V. setzt den <b>10½-Krone-Fuß</b> ab 1670 in Kopenhagen-Reihen fort: 1 und 2 Krone sowie die parallel laufenden 2- und 4-Mark-Danske auf demselben Standard. Hede 1971 verzeichnet für diese Stücke jeweils <i>Marken fin udbragt til ≈ 10,4 daler / rd je Marck fein</i>, was den Müntzfuß identifiziert. Ende mit Christian V.s Tod 1699.'
      en: 'Christian V continues the <b>10½-Krone-Fuß</b> from 1670 in Copenhagen series: 1 and 2 Krone plus the parallel 2- and 4-Mark Danske on the same standard. Hede 1971 records <i>Marken fin udbragt til ≈ 10.4 daler / rd per Marck fein</i> for these pieces, identifying the Müntzfuß. Series ends with Christian V''s death in 1699.'
      uk: 'Кристіан V продовжує <b>10½-Krone-Fuß</b> з 1670 р. у копенгагенських серіях: 1 і 2 Krone та паралельні 2- і 4-Mark Danske на тому ж стандарті. Hede 1971 фіксує для цих монет <i>Marken fin udbragt til ≈ 10,4 daler / rd за марку чистого срібла</i> — це і визначає прив''язку. Серія завершується зі смертю Кристіана V у 1699 р.'
  - id: III
    year_from: 1726
    year_to: 1726
    from_label: '1726'
    to_label: '1726'
    title:
      de: 10½-Krone-Fuß · Frederik-IV.-Sonderprägung «Trekrone af 1726»
      en: 10½-Krone-Fuß · Frederik IV special issue «Trekrone af 1726»
      uk: 10½-Krone-Fuß · спеціальна емісія Фредеріка IV «Trekrone af 1726»
    description:
      de: 'Einzelne 1726-Sonderprägung im alten Kronemøntfod-Standard nach Schließung der Reihe 1699: <b>3 Krone</b> (KM# 525, Hede 41, Dav-1293, Schou 2, Sieg 22) — 66,816 g rauh, .671 Feingehalt, 44,892 g fein, <i>Marken udbragt til 10,418 rd.k.</i> (Hede 1971 f4h41) — also derselbe Müntzfuß wie Christian V.s 1, 2, 4 Mark / Krone-Reihen. Stempelschneider Peter Berg. Findes in Nypræg (Restrike) für die Jahre 1788 und 1927 dokumentiert. Tarif des Originalstücks: 3 Krone = 1 Speciedaler.'
      en: 'A single 1726 special issue at the old Kronemøntfod standard after the series closed in 1699: <b>3 Krone</b> (KM# 525, Hede 41, Dav-1293, Schou 2, Sieg 22) — 66.816 g raw, .671 fineness, 44.892 g fine, <i>Marken udbragt til 10.418 rd.k.</i> (Hede 1971 f4h41) — i.e. the same Müntzfuß as Christian V''s 1, 2, 4 Mark / Krone series. Engraver Peter Berg. Restrikes («Findes i Nypræg») documented for 1788 and 1927. Tariff of the original piece: 3 Krone = 1 Speciedaler.'
      uk: 'Окрема емісія 1726 р. за старим стандартом Kronemøntfod після закриття серії 1699 р.: <b>3 Krone</b> (KM# 525, Hede 41, Dav-1293, Schou 2, Sieg 22) — 66,816 г повної ваги, .671 проба, 44,892 г чистого, <i>Marken udbragt til 10,418 rd.k.</i> (Hede 1971 f4h41) — тобто той самий Müntzfuß, що й серії Кристіана V (1, 2, 4 Mark / Krone). Різьбяр штемпелів Петер Берг. Hовокарбування («Findes i Nypræg») задокументовано для 1788 і 1927 років. Тариф оригінального випуску: 3 Krone = 1 Speciedaler.'
  guldkrone:
  - id: pre-I
    year_from: 1618
    year_to: 1648
    from_label: '1618'
    to_label: 1648 (Hede 25 series end)
    title:
      de: Christian-IV.-Vorgängerphase · Hofgeschenk und Soldzahlung
      en: Christian IV predecessor phase · court gift and mercenary pay
      uk: Передфаза Кристіана IV · придворний подарунок та плата найманцям
    description:
      de: 'Die Guldkrone-Tarif-Logik beginnt parallel zur silbernen Christian-IV.-Müntzformel mit dem <b>åbne Brev af 12. Juli 1618</b><sup><a href="#ref16">[16]</a></sup>: Christian IV. läßt 2-Guldkroner («dobbelt guldkrone») schlagen, die im Konzept dasselbe 22-Karat-Gold und denselben Tarif tragen wie die spätere Frederik-III.-Form. Belegt durch den <b>Esrum-Schatzfund</b> (Ingvardson & Märcher 2010<sup><a href="#ref17">[17]</a></sup>, peer-reviewed in <i>Danefæ — Skatte fra den danske muld</i>, Nationalmuseet, S. 254–257): drei Doppelguldkroner Hede 28, alle datiert <b>1628</b>, gefunden auf den Feldern um Esrum Kloster und Møllegård (Detektor-Aufnahmen 2008/2011, Grabung Gilleleje Museum). Aus 12 weltweit bekannten Exemplaren des Typs hält das Nationalmuseet nun 5 (≈ 25 % des erhaltenen Korpus); Esrum liefert den ersten dokumentierten Fundort für diesen Typ. <em>Christian-IV.-Guldkroner waren keine Massenkarbung im täglichen Umlauf, sondern dienten als Hofgeschenk und Soldzahlung — daher liegen für den Standard-Datenanker (Frederik-III.-Massenkarbung) die first_mint und first_adoption auf 1655 (Kopenhagen-erste-Karbung Frederik III.); die Christian-IV.-Phase 1618-≥1628 ist als Vorgängerphase auf der Timeline mit eigenem from-/to-Label sichtbar.</em>'
      en: 'The Guldkrone tariff logic begins in parallel with the silver Christian IV Müntzformel via the <b>åbne Brev af 12. Juli 1618</b><sup><a href="#ref16">[16]</a></sup>: Christian IV strikes 2-Guldkroner («dobbelt guldkrone») on the same 22-carat gold and the same tariff<sup><a href="#ref27">[27]</a></sup> as the later Frederik III form. Attested by the <b>Esrum hoard</b> (Ingvardson & Märcher 2010<sup><a href="#ref17">[17]</a></sup>, peer-reviewed in <i>Danefæ — Skatte fra den danske muld</i>, Nationalmuseet, pp. 254–257): three double Guldkroner Hede 28, all dated <b>1628</b>, found in the fields around Esrum Abbey and Møllegård (detector finds 2008 / 2011, follow-up excavation by Gilleleje Museum). Of the 12 known specimens of this type worldwide, the National Museum now holds 5 (≈ 25 % of the surviving corpus); Esrum delivers the first documented find spot for this type. <em>Christian IV Guldkroner were not mass production for daily circulation but served as court gifts and mercenary pay — hence the standard data anchor (Frederik III mass production) keeps first_mint and first_adoption at 1655 (Copenhagen-first issue under Frederik III); the Christian IV phase 1618-≥1628 is shown on the timeline as a predecessor phase with its own from/to label.</em>'
      uk: 'Тарифна логіка Guldkrone починається паралельно зі срібною монетною формулою Кристіана IV через <b>åbne Brev af 12. Juli 1618</b><sup><a href="#ref16">[16]</a></sup>: Кристіан IV карбує 2-Guldkroner («dobbelt guldkrone») на тому самому 22-каратному золоті й за тим самим тарифом<sup><a href="#ref27">[27]</a></sup>, що й пізніша форма Фредеріка III. Засвідчено <b>Esrum-скарбом</b> (Ingvardson & Märcher 2010<sup><a href="#ref17">[17]</a></sup>, рецензоване видання в <i>Danefæ — Skatte fra den danske muld</i>, Nationalmuseet, с. 254–257): три подвійні Guldkrone Hede 28, усі датовані <b>1628 р.</b>, знайдені на полях довкола Esrum Kloster та Møllegård (детекторні знахідки 2008 / 2011 рр., наступні розкопки Gilleleje Museum). Із 12 відомих у світі екземплярів цього типу Nationalmuseet тримає 5 (≈ 25 % збереженого корпусу); Esrum дає перше задокументоване місце знахідки для цього типу. <em>Guldkrone Кристіана IV не були масовим карбуванням для повсякденного обігу, а слугували придворним подарунком та платою найманцям — тому стандартний якір даних (масове карбування Фредеріка III) тримає first_mint і first_adoption на 1655 (перше копенгагенське карбування за Фредеріка III); фазу Кристіана IV 1618-≥1628 показано на таймлайні як передфазу з власним from/to-міткою.</em>'
  - id: I
    year_from: 1657
    year_to: 1666
    from_label: '1657'
    to_label: '1666'
    title:
      de: Frederik III. · Hauptprägung Glückstadt 1657–1660 + Kopenhagen 1666
      en: Frederik III · main series Glückstadt 1657–1660 + Copenhagen 1666
      uk: Фредерік III · основна серія Glückstadt 1657–1660 + Копенгаген 1666
    description:
      de: 'Hauptprägephase Frederiks III. am Guldkrone-Standardstandard (.917, ≈ 5,996 g rauh, Tarif 3½ Speciedaler). Hede 1971 verzeichnet zwei Münzstätten-Reihen: <b>Glückstadt 1657–1660</b> (f3h145; Mzm. Jacob Schwieger, kanonischer Standardtyp) und <b>Kopenhagen 1666</b><sup><a href="#ref28">[28]</a></sup> (f3h44 für 1 Guldkrone, f3h45 für 2 Guldkrone — letzteres bei 11,181 g rauh = 2 × 5,59 g). Tarif unverändert; 1666 zeigt Hede gegenüber dem Glückstädter Standard eine leichte Rauungewicht-Reduktion (5,59 g vs 5,996 g), die Phase B (1668) als ausgewiesene Tarifreduktion ablöst.'
      en: 'Frederik III main minting phase at the Guldkrone standard (.917, ≈ 5.996 g raw, tariff 3½ Speciedaler). Hede 1971 records two mint runs: <b>Glückstadt 1657–1660</b> (f3h145; mintmaster Jacob Schwieger, canonical standard type) and <b>Copenhagen 1666</b><sup><a href="#ref28">[28]</a></sup> (f3h44 for the 1 Guldkrone, f3h45 for the 2 Guldkrone at 11.181 g raw = 2 × 5.59 g). Tariff unchanged; the Copenhagen 1666 issue already shows a small rough-weight reduction (5.59 g vs 5.996 g) ahead of the formal tariff drop documented under phase B (1668).'
      uk: 'Основна емісійна фаза Фредеріка III. за стандартним Guldkrone-стандартом (.917, ≈ 5,996 г повної ваги, тариф 3½ Speciedaler). Hede 1971 фіксує дві монетдвірські серії: <b>Glückstadt 1657–1660</b> (f3h145; монетмайстер Jacob Schwieger, канонічний еталонний тип) і <b>Копенгаген 1666</b><sup><a href="#ref28">[28]</a></sup> (f3h44 для 1 Guldkrone, f3h45 для 2 Guldkrone при 11,181 г повної ваги = 2 × 5,59 г). Тариф незмінний; Копенгаген 1666 показує невелике зниження повної ваги (5,59 г проти 5,996 г) перед формальним зниженням тарифу, задокументованим у фазі B (1668).'
  - id: II
    year_from: 1668
    year_to: 1668
    from_label: '1668'
    to_label: '1668'
    title:
      de: Frederik III. · Kopenhagen · Tarif 3 Speciedaler (Tarifsenkung)
      en: Frederik III · Copenhagen · tariff 3 Speciedaler (tariff reduction)
      uk: Фредерік III · Копенгаген · тариф 3 Speciedaler (зниження тарифу)
    description:
      de: 'Späte Kopenhagener Folgeprägung der Guldkrone-Serie 1668: Tarif gegenüber der Glückstadter Phase 1657–1660 von 3½ auf <b>3 Speciedaler = 18 Mark Dansk</b> reduziert, Raugewicht von 5,996 auf 5,47 g abgesenkt. Feingehalt unverändert .917 (22 Karat). Belegtyp: <b>KM# 303 / Friedberg# 92 / Numista N#308327</b>; Münzmeister <b>Gotfred Krüger</b> (Kopenhagen 1664–1680), Mzz. <b>GK</b>. Reverslegende «<i>Dominus Providebit</i> XVIII · M · 1668 · G · K ·».'
      en: 'A late Copenhagen follow-up to the Guldkrone series in 1668: tariff reduced from the Glückstadt phase 1657–1660 of 3½ to <b>3 Speciedaler = 18 Mark Dansk</b>, rough weight lowered from 5.996 to 5.47 g. Fineness unchanged at .917 (22 carat). Reference type: <b>KM# 303 / Friedberg# 92 / Numista N#308327</b>; mintmaster <b>Gotfred Krüger</b> (Copenhagen 1664–1680), mintmark <b>GK</b>. Reverse legend «<i>Dominus Providebit</i> XVIII · M · 1668 · G · K ·».'
      uk: 'Пізніший копенгагенський наступний випуск серії Guldkrone 1668 р.: тариф знижено з ґлюкштадтської фази 1657–1660 з 3½ до <b>3 Speciedaler = 18 Mark Dansk</b>, повна вага зменшена з 5,996 до 5,47 г. Проба незмінна .917 (22 карати). Еталонний тип: <b>KM# 303 / Friedberg# 92 / Numista N#308327</b>; монетмайстер <b>Gotfred Krüger</b> (Копенгаген 1664–1680), монограма <b>GK</b>. Легенда реверсу «<i>Dominus Providebit</i> XVIII · M · 1668 · G · K ·».'
    context:
      de: '<b>Außerhalb Holsteins, eingearbeitet zur Vollständigkeit der Frederik-III.-Tarif-Serie:</b> die Münze wurde in Kopenhagen geprägt, gehört also nicht zum Kern-Skopus dieses Verzeichnisses. Sie ist hier aufgeführt, weil sie das einzige weitere bekannte Stück der <i>Guldkrone</i>-Tarifserie überhaupt ist und das Tarifregime der Glückstadter Phase 1657–1660 historisch ablöst.<br><br>

        <b>Müntzfuß-Verhältnis zur Glückstadter Form:</b> bei gleichem Feingehalt .917 ist das Raugewicht um ≈ 8,8 % gesenkt (5,47 statt 5,996 g) — das Feinsilberäquivalent geht entsprechend zurück. Aus der Cöllnischen Marck Raulegierung lassen sich nun ≈ 233,856 ÷ 5,47 ≈ 42,75 Stück je Marck schlagen, gegen 39 in Glückstadt. Da die Form keine glatte ganze Zahl ergibt und der Tarif ebenfalls nicht zum 22-karätigen Raugewicht passt (3 Specie ≈ 18 Mark Dansk), liegt physikalisch ein eigener Müntzfuß vor — die Münze wird in der Δ-Spalte daher als «außer Remedium» gegen die kanonische Glückstadter Form ausgewiesen.

        '
      en: <b>Outside Holstein, included for completeness of the Frederik III tariff series:</b> the coin was struck in Copenhagen, so it does not belong to the core scope of this register. It is listed here because it is the only other known piece of the <i>Guldkrone</i> tariff series and historically supersedes the tariff regime of the Glückstadt phase 1657–1660.<br><br> <b>Standard relative to the Glückstadt form:</b> at the same fineness .917 the rough weight is reduced by ≈ 8.8 % (5.47 g instead of 5.996 g) — fine-silver equivalent falls in step. From a Cologne mark of raw alloy one now strikes ≈ 233.856 ÷ 5.47 ≈ 42.75 pieces per mark, versus 39 at Glückstadt. Since the form does not yield a clean integer and the tariff also fails to match the 22-carat rough weight (3 Specie ≈ 18 Mark Dansk), the coin physically belongs to its own standard — the Δ column accordingly flags it as «outside tolerance» against the canonical Glückstadt form.
      uk: <b>Поза Гольштейном, наведено для повноти тарифної серії Фредеріка III:</b> монету викарбувано в Копенгагені, тож вона не належить до основного скоупу цього реєстру. Включена тут, бо це єдина інша відома штука серії <i>Guldkrone</i> і вона історично змінює тарифний режим ґлюкштадтської фази 1657–1660.<br><br> <b>Стопа щодо ґлюкштадтської форми:</b> при тій же пробі .917 повна вага знижена на ≈ 8,8 % (5,47 г замість 5,996 г) — чистий срібно-золотий еквівалент пропорційно падає. З кельнської марки сплаву тепер виходить ≈ 233,856 ÷ 5,47 ≈ 42,75 штук на марку проти 39 у Glückstadt. Оскільки форма не дає круглого цілого числа й тариф теж не відповідає 22-каратному повному вагому (3 Specie ≈ 18 Mark Dansk), монета фізично належить до власної стопи — у стовпці Δ її буде відмічено як «поза допуском» щодо канонічної ґлюкштадтської форми.
  kronemont_fine:
  - id: I
    year_from: 1693
    year_to: 1771
    from_label: '1693'
    to_label: '1771'
    title:
      de: Christian V. → Christian VII. · Kopenhagener Hauptmünze · «Feine Krone»
      en: Christian V → Christian VII · Copenhagen royal mint · «Fine Crown»
      uk: Кристіан V → Кристіан VII · Копенгагенський королівський монетний двір · «Тонка Крона»
    description:
      de: 'Einzige Phase der dänischen «Feinen Krone»: nach dem Reskript Christians V. vom 31. Dezember 1692 werden 13 Specieskronen aus 1 feinen Cöllnischen Marck ausgeprägt — Feingewicht ≈ 14,98 g je Krone (gegenüber 14,964 g im Glückstadter 10½-Krone-Fuß). Geprägt ausschließlich an der Kopenhagener Hauptmünze 1693–1771 unter den Münzmeistern der jeweiligen Regenten (Christian V. biß 1699, Friedrich IV. 1699–1730, Christian VI. 1730–1746, Friedrich V. 1746–1766, Christian VII. 1766–1808). Tarif ⅔ Speciedaler durchgehend übernommen. Ältere Bestände kursierten biß zum Statsbankerot 5. Januar 1813.'
      en: 'Sole phase of the Danish «Fine Crown»: per Christian V''s Reskript of 31 December 1692, 13 Specieskronen are struck from 1 fine Cologne mark — fine weight ≈ 14.98 g per Krone (versus 14.964 g in the Glückstadt 10½-Krone-Fuß). Struck exclusively at the Copenhagen royal mint 1693–1771 under the mintmasters of the respective regents (Christian V to 1699, Friedrich IV 1699–1730, Christian VI 1730–1746, Friedrich V 1746–1766, Christian VII 1766–1808). The ⅔-Speciedaler tariff is carried through unchanged. Older stocks remained in circulation until the Statsbankerot of 5 January 1813.'
      uk: 'Єдина фаза данської «Тонкої Корони»: за Рескриптом Кристіана V від 31 грудня 1692 р. карбується 13 Specieskronen з 1 марки чистого срібла кельнської ваги — чиста вага ≈ 14,98 г на одну Krone (проти 14,964 г у ґлюкштадтському 10½-Krone-Fuß). Карбувалася виключно на Копенгагенському королівському монетному дворі 1693–1771 за монетмайстрів відповідних регентів (Кристіан V до 1699, Фредерік IV 1699–1730, Кристіан VI 1730–1746, Фредерік V 1746–1766, Кристіан VII 1766–1808). Тариф ⅔ Speciedaler зберігається без змін. Старі запаси в обігу до Statsbankerot 5 січня 1813.'
  11_333_thaler:
  - id: I
    year_from: 1726
    year_to: 1813
    from_label: 15./31. Juli 1726
    to_label: 5. Januar 1813
    title:
      de: Kurantmøntfod im dänisch-norwegischen Verbund · Hauptalltagswährung
      en: Kurantmøntfod in the Danish-Norwegian composite state · main everyday currency
      uk: Kurantmøntfod у Королівстві Данії і Норвегії · основна повсякденна валюта
    description:
      de: 'Etabliert durch die Forordning Friedrichs IV. vom 15./31. Juli 1726: 11⅓ Rigsdaler Courant aus 1 feinen Cöllnischen Marck — Feingewicht ≈ 20,63 g pro Daler. Hauptträger des dänisch-norwegischen Geldumlaufs während fast des gesamten 18. Jahrhunderts (Friedrich IV., Christian VI., Friedrich V., Christian VII., Friedrich VI.). Endet im Königreich Dänemark mit dem Statsbankerot vom 5. Januar 1813 (Forordning Friedrichs VI.); in Holstein bereits 1788 durch die Schimmelmann-Reform außer Kraft gesetzt. Altbestände 1726–1813 blieben ab 1813 noch jahrzehntelang als Scheidemünzen im Umlauf, biß zur Krone-Reform 1875.'
      en: 'Established by Friedrich IV''s Forordning of 15/31 July 1726: 11⅓ Rigsdaler Courant from 1 fine Cologne mark — fine weight ≈ 20.63 g per daler. Principal vehicle of the Danish-Norwegian money supply through most of the 18th century (Friedrich IV, Christian VI, Friedrich V, Christian VII, Friedrich VI). In the Kingdom of Denmark it ends with the Statsbankerot of 5 January 1813 (Forordning of Friedrich VI); in Holstein it had already been retired by the Schimmelmann reform of 29 February 1788. Old stocks from 1726–1813 remained in circulation as petty coinage for decades after 1813, until the Krone reform of 1875.'
      uk: 'Встановлений Forordning Фредеріка IV від 15/31 липня 1726 р.: 11⅓ Rigsdaler Courant з 1 марки чистого срібла кельнської ваги — чиста вага ≈ 20,63 г на даллер. Основний носій дансько-норвезького грошового обігу впродовж майже всього XVIII ст. (Фредерік IV, Кристіан VI, Фредерік V, Кристіан VII, Фредерік VI). У Королівстві Данії дія тривала до Statsbankerot 5 січня 1813 (Forordning Фредеріка VI); у Гольштейні дію припинено ще реформою Шіммельмана 29 лютого 1788 р. Старі запаси 1726–1813 ще десятиліттями залишалися в обігу як розмінна монета після 1813 — аж до Krone-реформи 1875.'
  18_5_thaler:
  - id: I
    year_from: 1813
    year_to: 1875
    from_label: 5. Januar 1813
    to_label: 1873/1875
    title:
      de: Rigsbankdaler → Rigsdaler Rigsmønt · Krone-Reform
      en: Rigsbankdaler → Rigsdaler Rigsmønt · Krone reform
      uk: Rigsbankdaler → Rigsdaler Rigsmønt · Krone-реформа
    description:
      de: Notreform Friedrichs VI. nach dem dänischen Staatsbankrott. Forordning vom 5. Januar 1813 setzt 18½ Rigsbankdaler aus 1 feinen Cöllnischen Marck (≈ 12,64 g fein pro Daler). §10 verankert ausdrücklich 1 Speciedaler = 2 Rigsbankdaler — eine glatte ½-Anteil-Anbindung an den 9¼-Thaler-Fuß, die den Übergang vom Kurantfuß logisch glättet. 1854 ohne Fußänderung in Rigsdaler Rigsmønt umbenannt; 1873–1875 ersetzt die Krone der Skandinavischen Münzunion (Schweden, Norwegen, Dänemark) den Rigsdaler.
      en: Friedrich VI's emergency reform after the Danish state bankruptcy. The Forordning of 5 January 1813 sets 18½ Rigsbankdaler per fine Cologne mark (≈ 12.64 g fine per daler). §10 explicitly anchors 1 Speciedaler = 2 Rigsbankdaler — a clean ½-share link to the 9¼-Thaler-Fuß that smoothly carries the transition from the Kurantfuß. Renamed Rigsdaler Rigsmønt in 1854 without any change of standard; in 1873–1875 the Krone of the Scandinavian Monetary Union (Sweden, Norway, Denmark) supersedes the Rigsdaler.
      uk: Надзвичайна реформа Фредеріка VI після данського державного банкрутства. Forordning 5 січня 1813 встановлює 18½ Rigsbankdaler з 1 марки чистого срібла кельнської ваги (≈ 12,64 г чистого на даллер). §10 явно закріплює 1 Speciedaler = 2 Rigsbankdaler — чиста привʼязка ½-частки до 9¼-Thaler-Fuß, яка логічно згладжує перехід з Kurantfuß. 1854 р. перейменовується на Rigsdaler Rigsmønt без зміни стопи; 1873–1875 рр. Krone Скандинавської монетної унії (Швеція, Норвегія, Данія) заміщує Rigsdaler.
  kronefod:
  - id: I
    year_from: 1873
    year_to: 1914
    from_label: 23. Mai 1873 (Mønlov)
    to_label: 2. Aug. 1914 (Goldkonvertibilität ausgesetzt)
    title:
      de: Skandinavische Krone-Mønt — Gold-Hauptkurant + Silber/Bronze-Subsidiare — Christian IX. → Christian X.
      en: Scandinavian Krone-Mønt — gold Hauptkurant + silver/bronze subsidiaries — Christian IX → Christian X
      uk: Скандинавська Krone-Mønt — золотий Hauptkurant + срібні/бронзові субсидіари — Христіян IX → Христіян X
    description:
      de: 'Vollständige Krone-Mønt-Reihe nach <b>Mønlov vom 23. Mai 1873</b>: <b>Gold</b> 10 / 20 Kroner (.900), <b>Silber-Kurant</b> 1 / 2 Kroner (.800), <b>Silber-Scheide</b> 25 / 10 øre (.600 / .400), <b>Bronze</b> 5 / 2 / 1 øre — alle Stückelungen aus demselben Müntzfuß unter einheitlichem Akkonto-System (100 øre = 1 Krone). Tarif gegenüber Reichs-Goldmark fest 8 Kroner = 9 Mark; Goldkonvertibilität durch die Danmarks Nationalbank am 2. August 1914 ausgesetzt.'
      en: 'Full Krone-Mønt series under the <b>Mønlov of 23 May 1873</b>: <b>gold</b> 10 / 20 Kroner (.900), <b>silver Kurant</b> 1 / 2 Kroner (.800), <b>silver Scheide</b> 25 / 10 øre (.600 / .400), <b>bronze</b> 5 / 2 / 1 øre — all denominations from the same Müntzfuß on a uniform accounting system (100 øre = 1 Krone). Tariff against the Reichsmark fixed at 8 Kroner = 9 Mark; gold convertibility suspended by Danmarks Nationalbank on 2 August 1914.'
      uk: 'Повна серія Krone-Mønt за <b>Mønlov від 23 травня 1873</b>: <b>золото</b> 10 / 20 Krone (.900), <b>срібний Kurant</b> 1 / 2 Krone (.800), <b>срібний Scheide</b> 25 / 10 øre (.600 / .400), <b>бронза</b> 5 / 2 / 1 øre — усі номінали з однієї Müntzfuß за єдиною обліковою системою (100 øre = 1 Krone). Тариф проти Reichsmark фіксований 8 Krone = 9 Mark; конвертованість у золото призупинено Danmarks Nationalbank 2 серпня 1914.'
    mt_caption:
      de: Krone-Mønt vollständig (1873-1914) · Gold-Hauptkurant 10/20 Kr + Silber-Kurant 1/2 Kr + Silber-Scheide 25/10 øre + Bronze 5/2/1 øre — sortiert nach Stückelungs-Hierarchie und Jahr
      en: Krone-Mønt complete (1873-1914) · gold Hauptkurant 10/20 Kr + silver Kurant 1/2 Kr + silver Scheide 25/10 øre + bronze 5/2/1 øre — sorted by denomination hierarchy and year
      uk: Krone-Mønt повна (1873-1914) · золотий Hauptkurant 10/20 Kr + срібний Kurant 1/2 Kr + срібний Scheide 25/10 øre + бронза 5/2/1 øre — впорядковано за ієрархією номіналів і роком
