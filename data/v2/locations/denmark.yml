      de: 'Skandinavische Müntzunion 5. Mai 1873 (Stockholm) → dänisches Mønlov vom 23. Mai 1873, wirksam ab 1. Januar 1875 · vier Stückelungs-Stufen unter demselben Müntzfuß: Gold-Hauptkurant 10/20 Kr (.900, 4,48/8,96 g rauh), Silber-Kurant 1/2 Kr (.800, 7,5/15 g), Silber-Scheide 25/10 øre (.600/.400, 2,42/1,45 g), Bronze-Scheide 5/2/1 øre (8/4/2 g) · 100 øre = 1 Krone · feste Goldparität gegenüber Reichs-Goldmark: 8 Kr = 9 Mark · Goldkonvertibilität ausgesetzt 2. August 1914 · Skandinavische Müntzunion formell aufgelöst 1924'
