  8_daler_lybsk_fod:
    - id: I
      year_from: 1545
      year_to: 1571
      from_label: '1545'
      to_label: '1571'
      title:
        de: 'Phase I · Flensborg Bestalling 1547 · 14¼ Lod (890⅝ ‰) · mf 8,982, 26,029 g fein je Daler · Lybsk-Untertheilung'
        en: 'Phase I · Flensborg Bestalling 1547 · 14¼ Lod (890⅝ ‰) · mf 8.982, 26.029 g fine per Daler · Lybsk subdivision'
        uk: 'Фаза I · Flensborg Bestalling 1547 · 14¼ Lod (890⅝ ‰) · mf 8,982, 26,029 г чистого на Daler · любекська підструктура'
      description:
        de: 'Flensborg Bestalling vom 22. Januar 1547 unter Mzm. Jørgen Kock dem Jüngeren<sup>[ref:denmark-ref29-no-url]</sup>. Daler-Brutto identisch zur königlichen Linie (29,232 g, 8 Stück / Cölln. Marck
          rauh), aber Feingehalt abgesenkt auf 14¼ Lod (890⅝ ‰) ⇒ <b>mf 8,982</b>, 26,029 g fein je Daler (1,75 % leichter als royal). Sub-Mark in Lybsk-Untertheilung: <b>1 Gylden = 24 ß lybsk = 288 Penning
          lybsk</b><sup>[ref:denmark-ref29-no-url]</sup><sup>[ref:denmark-ref32-no-url]</sup> (vs königliche 48 ß danske). Hauptphase 1545-1554; Auslauf biß 1571 unter Frederik II. Geprägt: Rhinsk Gylden,
          Sølvgylden, Søsling lybsk (Hede c3h15-c3h22.'
        en: 'Flensborg Bestalling of 22 January 1547 under mintmaster Jørgen Kock the Younger<sup>[ref:denmark-ref29-no-url]</sup>. Daler brutto identical to the royal line (29.232 g, 8 pieces per Cologne
          mark rough), but fineness reduced to 14¼ Lod (890⅝ ‰) ⇒ <b>mf 8.982</b>, 26.029 g fine per Daler (1.75 % lighter than royal). Sub-Mark in Lybsk subdivision: <b>1 Gylden = 24 ß lybsk = 288 Penning
          lybsk</b><sup>[ref:denmark-ref29-no-url]</sup><sup>[ref:denmark-ref32-no-url]</sup> (vs royal 48 ß danske). Main phase 1545-1554; tail through 1571 under Frederik II. Coinage: Rhinsk Gylden, Sølvgylden,
          Søsling lybsk (Hede c3h15-c3h22.'
        uk: 'Flensborg Bestalling від 22 січня 1547 за монетмайстра Jørgen Kock молодшого<sup>[ref:denmark-ref29-no-url]</sup>. Daler повної ваги ідентично royal-лінії (29,232 г, 8 шт. з кельнської марки
          повної), але проба знижена до 14¼ Lod (890⅝ ‰) ⇒ <b>mf 8,982</b>, 26,029 г чистого на Daler (на 1,75 % легший за royal). Sub-Mark у любекській підструктурі: <b>1 Gylden = 24 ß lybsk = 288 Penning
          lybsk</b><sup>[ref:denmark-ref29-no-url]</sup><sup>[ref:denmark-ref32-no-url]</sup> (vs royal 48 ß danske). Головна фаза 1545-1554; заник до 1571 за Фредеріка II. Карбування: Rhinsk Gylden, Sølvgylden,
          Søsling lybsk (Hede c3h15-c3h22.'
  rhinsk_gylden_fod:
    - id: '0'
      year_from: 1497
      year_to: 1546
      from_label: '1497'
      to_label: '1546'
      title:
        de: 'Phase 0 · Hans ~1497 (Malmø) + Frederik I. 1527 (Malmø) + Christian III. 1536 (Roskilde) + 1546 (Flensborg) · .75 / .764 · früheste Belegspur der Rhinsk-Gylden-Linie (Galster fejlagtigt henført til Gottorp)'
        en: 'Phase 0 · Hans ~1497 (Malmø) + Frederik I 1527 (Malmø) + Christian III 1536 (Roskilde) + 1546 (Flensburg) · .75 / .764 · earliest documented trace of the Rhinsk-Gylden line («Galster fejlagtigt henført til Gottorp»)'
        uk: 'Фаза 0 · Hans ~1497 (Мальме) + Фредерік I 1527 (Мальме) + Кристіан III 1536 (Роскілле) + 1546 (Фленсбург) · .75 / .764 · найраніший задокументований слід лінії Rhinsk-Gylden («Galster fejlagtigt henført til Gottorp»)'
      description:
        de: 'Christian-III-Beleg der Rhinsk-Gylden-Linie in der dänischen Königsmünze, im Anschluß an die ältesten Goldmünzen Skandinaviens (Hans ~1497, Galster 27) und Frederik Is 1527er Malmø-Stück (Galster 59) und 27 Jahre vor Frederik IIs Standardisierung von 1563. Belegexemplar <b>Galster 131</b> (1 Rhinsk gylden 1536, Christian
          III, Roskilde) — danskmoent.dk hält verbatim fest: «<i>Roskilde, af Galster fejlagtigt henført til Gottorp</i>» — Galster ordnete das Stück fälschlich Gottorp zu, danskmoent.dk korrigiert auf
          Roskilde<sup>[ref:denmark-ref29-no-url]</sup>. Metrische Daten: <b>3,19 g rauh / 0,764 Probe / 2,44 g fein</b> — innerhalb des ~2 %-Δ-Korridors zum Phase-II-Soll (2,469 g fein @ .76) und zum Phase-I-Soll
          (2,501 g fein @ .77). Hinzu tritt 1546 die Flensburger Karbung von 1 und 2 Rhinsk Gylden (Hede c3h14/c3h15, .75) — Zuschreibung nach Reynold Junges Müntzzeichen<sup>[ref:danskmoent-c3-rhinsk-gylden-1546]</sup>.
          Cross-Referenzen: Schou 1-7, Sieg 23, Reinhold Junge s. XX,18; Bruun-14770 (Bruun II, lot 14258) attestiert ein zweites Roskilde-1536-Stück mit Brutto 3,37 g (Probe nicht
          erfaßt). Christian III. setzt damit die Rhenish-Gulden-Tradition <em>vor</em> der Augsburger Reichsmünzordnung 1559 und vor Frederik IIs offizieller Standardisierung 1563 fort — wahrscheinlich
          Übergangs-Karbung der Münzreform 1541 / Møntordning vom 20. September 1541.'
        en: 'A Christian III specimen of the Rhinsk-Gylden line in the Danish royal mint, following the oldest gold coins in Scandinavia (Hans ~1497, Galster 27) and the Frederik I 1527 Malmø piece (Galster 59) and 27 years before Frederik II''s standardisation of 1563. Reference specimen <b>Galster 131</b> (1 Rhinsk gylden
          1536, Christian III, Roskilde) — danskmoent.dk records verbatim: «<i>Roskilde, af Galster fejlagtigt henført til Gottorp</i>» — Galster erroneously attributed the piece to Gottorp; danskmoent.dk
          corrects to Roskilde<sup>[ref:denmark-ref29-no-url]</sup>. Metric data: <b>3.19 g rough / 0.764 fineness / 2.44 g fine</b> — within the ~2 % Δ corridor of the Phase II soll (2.469 g fine at .76)
          and the Phase I soll (2.501 g fine at .77). The Flensburg coinage of 1 and 2 Rhinsk Gylden follows in 1546 (Hede c3h14/c3h15, .75) — attributed by the mintmark of Reynold Junge<sup>[ref:danskmoent-c3-rhinsk-gylden-1546]</sup>.
          Cross-references: Schou 1-7, Sieg 23, Reinhold Junge p. XX,18; Bruun-14770 (Bruun II, lot 14258) attests a second Roskilde 1536 specimen at brutto 3.37
          g (fineness not recorded). Christian III thus continues the Rhenish-Gulden tradition <em>before</em> the Augsburg Reichsmünzordnung of 1559 and before Frederik II''s official standardisation in
          1563 — probably a transition coinage of the 1541 mint reform / Møntordning of 20 September 1541.'
        uk: 'Christian-III-зразок лінії Rhinsk-Gylden у данській королівській монеті, услід за найдавнішими золотими монетами Скандинавії (Hans ~1497, Galster 27) та Malmø-штукою Фредеріка I 1527 р. (Galster 59) і на 27 років раніший за стандартизацію Фредеріка II 1563 р. Еталонний зразок <b>Galster 131</b> (1 Rhinsk
          gylden 1536, Кристіан III, Роскілле) — danskmoent.dk фіксує verbatim: «<i>Roskilde, af Galster fejlagtigt henført til Gottorp</i>» — Galster помилково відніс зразок до Gottorp; danskmoent.dk виправляє
          на Роскілле<sup>[ref:denmark-ref29-no-url]</sup>. Метричні дані: <b>3,19 г повної / проба 0,764 / 2,44 г чистого</b> — у межах ~2 %-Δ-коридору від soll-значення фази II (2,469 г чистого за .76)
          та soll-значення фази I (2,501 г чистого за .77). У 1546 р. додається фленсбурзьке карбування 1 і 2 Rhinsk Gylden (Hede c3h14/c3h15, .75) — атрибуція за монетним знаком Reynold Junge<sup>[ref:danskmoent-c3-rhinsk-gylden-1546]</sup>.
          Cross-references: Schou 1-7, Sieg 23, Reinhold Junge с. XX,18; Bruun-14770 (Bruun II, lot 14258) засвідчує другий зразок Роскілле 1536 з повною
          вагою 3,37 г (проба не зафіксована). Кристіан III таким чином продовжує традицію Rhenish-Gulden <em>до</em> Augsburger Reichsmünzordnung 1559 і до офіційної стандартизації Фредеріка II 1563 р.
          — імовірно перехідне карбування монетної реформи 1541 / Møntordning від 20 вересня 1541.'
    - id: I
      year_from: 1563
