  courantdukatenfuss:
    - id: I
      year_from: 1714
      year_to: 1796
      from_label: '1714'
      to_label: '1796'
      title:
        de: Kurantdukat · Kopenhagen + Altona · 12-Mark-Tarif
        en: Kurantdukat · Copenhagen + Altona · 12-Mark tariff
        uk: Kurantdukat · Копенгаген + Альтона · тариф 12 Mark
      description:
        de: 'Tarif-tragende Goldlinie der dänischen Krone in zwei Phasen: <b>Frederik IV. 1714–1717</b> (Großer Nordischer Krieg, 81½ Stück / Mark, 2,511 g fein, 12 Mark Tarif; 1727 auf 11 Mark gesenkt;
          1757 zur Einschmelzung eingezogen) und <b>Frederik V. ab 1757</b> (Reform: 75 Stück / Mark, 2,72832 g fein, .875 Probe, 12 Mark Tarif zurück) mit Massenprägung 1757–1765 (≈ 3 030 742 Stück) und
          Christian-VII.-Hauptphase 1781–1796 (≈ 237 000 Stück Altona + Kopenhagen) auf Grundlage des Plakat 2. Dezember 1782<sup>[ref:danskmoent-c7mord-plakat-1782]</sup>. KM-Belege in unseren Daten: KM-586
          (1757), KM-587.1–587.7 (1758–1764). Letzte Prägung 1796 mit 1785-Datum.<sup>[ref:ernst-axel-kurantdukat]</sup>'
        en: 'Tariff-bearing gold line of the Danish crown in two phases: <b>Frederik IV 1714–1717</b> (Great Northern War, 81½ pieces per Mark, 2.511 g fine, 12-Mark tariff; reduced to 11 Mark in 1727;
          called in for melting in 1757) and <b>Frederik V from 1757</b> (reform: 75 pieces per Mark, 2.72832 g fine, .875 fineness, 12-Mark tariff restored) with mass coinage 1757–1765 (≈ 3,030,742 pieces)
          and the Christian VII main phase 1781–1796 (≈ 237,000 pieces Altona + Copenhagen) under the Plakat of 2 December 1782<sup>[ref:danskmoent-c7mord-plakat-1782]</sup>. KM records in our data: KM-586
          (1757), KM-587.1–587.7 (1758–1764). Last issue 1796 with 1785 dies.<sup>[ref:ernst-axel-kurantdukat]</sup>'
        uk: 'Тариф-несуча золота лінія данської корони у двох фазах: <b>Frederik IV 1714–1717</b> (Велика Північна війна, 81½ штук з марки, 2,511 г чистого, тариф 12 Mark; 1727 знижено до 11 Mark; 1757
          скликано на переплав) і <b>Frederik V з 1757</b> (реформа: 75 штук з марки, 2,72832 г чистого, проба .875, тариф 12 Mark відновлено) з масовим карбуванням 1757–1765 (≈ 3 030 742 шт.) і головною
          фазою Christian VII 1781–1796 (≈ 237 000 шт. Альтона + Копенгаген) на основі Plakat 2 грудня 1782<sup>[ref:danskmoent-c7mord-plakat-1782]</sup>. KM-записи в наших даних: KM-586 (1757), KM-587.1–587.7
          (1758–1764). Останнє карбування 1796 зі штемпелями 1785.<sup>[ref:ernst-axel-kurantdukat]</sup>'
  pistolenfuss:
    - id: I
      year_from: 1771
      year_to: 1870
      from_label: '1771'
      to_label: '1870'
      title:
        de: Christian d'or / Frederik d'or · Altona + Kopenhagen · 5-Speciedaler-Tarif
        en: Christian d'or / Frederik d'or · Altona + Copenhagen · 5-Speciedaler tariff
        uk: Christian d'or / Frederik d'or · Альтона + Копенгаген · тариф 5 Speciedaler
      description:
        de: 'Pistolen-Goldlinie der dänischen Monarchie: Christian d''or 1771 unter Christian VII. (Altona, Vorbild Louis d''or<sup>[ref:danskmoent-w6b1]</sup>); fortgeführt unter Frederik VI. (Frederik
          d''or, 2 Frederik d''or 1826–1838 trotz Statsbankerot 1813), Christian VIII. (2 Christian d''or 1841–1843), Frederik VII. (Frederik d''or, 2 Frederik d''or 1850–1859), Christian IX. (Frederik
          d''or 1869, 2 Christian d''or 1866 / 1869) — letzte Prägung 1870. Standard 130/144 Probe (≈ 903 ‰), 6,03 g Feingold, 5-Speciedaler-Tarif. Demonetisierung mit der Krone-Reform 1873 (Skandinavische
          Münzunion).'
        en: 'Pistole gold line of the Danish monarchy: Christian d''or in 1771 under Christian VII (Altona, modelled on the Louis d''or<sup>[ref:danskmoent-w6b1]</sup>); continued under Frederik VI (Frederik
          d''or, 2 Frederik d''or 1826–1838 despite the Statsbankerot of 1813), Christian VIII (2 Christian d''or 1841–1843), Frederik VII (Frederik d''or, 2 Frederik d''or 1850–1859), Christian IX (Frederik
          d''or 1869, 2 Christian d''or 1866 / 1869) — last issue 1870. Standard 130/144 fineness (≈ 903 ‰), 6.03 g fine gold, 5-Speciedaler tariff. Demonetised by the Krone reform of 1873 (Scandinavian
          Monetary Union).'
        uk: 'Pistolen-золота лінія данської монархії: Christian d''or 1771 за Christian VII (Альтона, зразок Louis d''or<sup>[ref:danskmoent-w6b1]</sup>); продовжено за Frederik VI (Frederik d''or, 2 Frederik
          d''or 1826–1838 попри Statsbankerot 1813), Christian VIII (2 Christian d''or 1841–1843), Frederik VII (Frederik d''or, 2 Frederik d''or 1850–1859), Christian IX (Frederik d''or 1869, 2 Christian
          d''or 1866 / 1869) — остання емісія 1870. Стандарт 130/144 проба (≈ 903 ‰), 6,03 г чистого золота, тариф 5 Speciedaler. Демонетизована Krone-реформою 1873 (Скандинавська монетна унія).'
  9_thaler:
    - id: I
      year_from: 1566
      year_to: 1625
      from_label: 30. Mai 1566
      to_label: '1625'
      title:
        de: Reichsmünzordnung in Holstein-Gottorp
        en: Imperial Mint Decree in Holstein-Gottorp
        uk: Імперський монетний ордонанс у Гольштейн-Ґотторпі
      description:
        de: Holsteinische Reichsthaler-Prägungen unter Adolf I., Johann Adolf, frühem Friedrich III. und Hans Jr. von Sonderburg — Kipper-Wipper-Krise (1620–1623), ab 1622 parallel vom leichteren 
          9¼-Fuß abgelöst, letzte Holstein-Prägung 1625.
        en: Holstein Reichsthaler issues under Adolf I, Johann Adolf, early Friedrich III and Hans Jr. of Sonderburg — Kipper-Wipper crisis (1620–1623), superseded in parallel by the lighter 9¼-Fuß 
          from 1622, last Holstein strike 1625.
        uk: Гольштинські карбування Reichsthaler за Адольфа I, Йоганна Адольфа, раннього Фредеріка III та Hans Jr. Sonderburg — Kipper-Wipper-криза (1620–1623); з 1622 паралельно витісняється легшим 
          9¼-Fuß; останнє карбування в Гольштейні — 1625.
    - id: II
      year_from: 1624
      year_to: 1683
      from_label: '1624'
      to_label: '1683'
      title:
        de: 9-Fuß-Speciedaler-Familie · Christian IV. + Frederik III. + späte Glückstadt
        en: 9-Fuß Speciedaler family · Christian IV + Frederik III + late Glückstadt
        uk: Родина 9-Fuß Speciedaler · Кристіан IV + Фредерік III + пізня Glückstadt
      description:
        de: 'Nach dem Holstein-weiten Umstieg auf den 9¼-Fuß 1622–1625 prägt Dänemark-Norwegen weiterhin systematisch Großstücke nach dem alten 9-Fuß. Hede 1971 dokumentiert eine durchlaufende Familie mit
          der Spezifikation <i>Marken fin udbragt til 9 speciedalere</i> (≈9.071) bzw. <i>Marken fin udbragt til 9 daler</i> (≈9.0): Christian IV.s Kopenhagener 2-Speciedaler Hede 56 (1624–1628) und ½-Speciedaler
          Hede 59 (1624–1634, 1646), die späte Prestige-Großprägung Christian IV.s aus Kopenhagen 1647 (km-x035, 2 Speciedaler bei Reichsmüntzfuß-Standardprobe .888; Δ −0,11 % gegen den 9-Fuß-Soll vs. +2,67
          % gegen den 9¼-Fuß-Soll bestätigt die Zuordnung empirisch), frühe Frederik-III.-Kopenhagen-Speciedalere und -Theilstücke (Hede f3h47–f3h51, 1648–1651) sowie Glückstadt-Speciedalere unter Frederik
          III. (f3h148, 1664–1666) und Christian V. (c5h120, 1683). Glückstadt blieb damit über sechs Dezennien am alten Reichs-Speciesstandard, während das übrige dänisch-norwegische Münzwesen seit 1622
          im 9¼-Fuß lief; die Kopenhagener Großprägungen Christian IV.s zeigen, daß der königlich-dänische Hauptmünzhof bei Großstücken systematisch an die ältere Norm zurückgreifen konnte.'
        en: 'After the Holstein-wide shift to the 9¼-Fuß in 1622-1625, Denmark-Norway continues to strike large coins systematically on the old 9-Fuß. Hede 1971 documents a continuous family with the specification
          <i>Marken fin udbragt til 9 speciedalere</i> (≈9.071) or <i>Marken fin udbragt til 9 daler</i> (≈9.0): Christian IV''s Copenhagen 2 Speciedaler Hede 56 (1624–1628) and ½ Speciedaler Hede 59 (1624–1634,
          1646); the late Christian-IV prestige issue from Copenhagen 1647 (km-x035, 2 Speciedaler at Reichsmüntzfuß standard fineness .888; Δ −0.11 % from the 9-Fuß Soll vs. +2.67 % from the 9¼-Fuß Soll
          empirically confirms the placement); early Frederik III Copenhagen Speciedaler and divisional pieces (Hede f3h47–f3h51, 1648–1651); Glückstadt Speciedaler under Frederik III (f3h148, 1664–1666)
          and Christian V (c5h120, 1683). Glückstadt thus held to the old imperial Specie standard for six decades after the rest of Danish-Norwegian coinage moved to the 9¼-Fuß in 1622.'
        uk: 'Після гольштинського переходу на 9¼-Fuß 1622–1625 рр. Данія-Норвегія продовжує систематично карбувати великі номінали за старим 9-Fuß. Hede 1971 фіксує безперервну родину зі специфікацією <i>Marken
          fin udbragt til 9 speciedalere</i> (≈9,071) чи <i>Marken fin udbragt til 9 daler</i> (≈9,0): копенгагенські 2 Speciedaler Кристіана IV. Hede 56 (1624–1628) та ½ Speciedaler Hede 59 (1624–1634,
          1646); пізня престижна емісія Кристіана IV. з Копенгагена 1647 р. (km-x035, 2 Speciedaler за Reichsmüntzfuß-стандартом .888; Δ −0,11 % від 9-Fuß-Soll проти +2,67 % від 9¼-Fuß-Soll емпірично підтверджує
          атрибуцію); ранні Speciedaler Фредеріка III. з Копенгагена та їх поділки (Hede f3h47–f3h51, 1648–1651); ґлюкштадські Speciedaler за Фредеріка III. (f3h148, 1664–1666) і Кристіана V. (c5h120, 1683).
          Glückstadt таким чином тримався старого імперського Speciedaler-стандарту понад шість десятиліть після того, як решта дансько-норвезького монетарства 1622 р. перейшла на 9¼-Fuß.'
      context:
        de: '<b>Reichsstandard biß 1625:</b> Reichsthaler 9-Fuß (.889/14²⁄₉ Loth, 25,984 g fein), Mark-lübisch-Theilstücke (½, ¼, ⅛ Thaler), Schillinge (1/32, 1/48 Thaler), Pfennig-Scheidemünzen (1/96,
          1/128 Thaler).<br>

          <b>Münzstätten:</b> in Holstein-Gottorp vor allem Schleswig und Husum. Nach dem Kipper-Wipper-Zusammenbruch (~1620) verlieren die Reichsstände das einheitliche Münzwesen — ab 1622 setzt sich in
          Holstein der leichtere 9¼-Fuß (Thaler Species, 25,28173 g fein gegen 25,984 g im 9-Fuß) durch, die letzte holsteinische 9-Fuß-Prägung erfolgt 1625 (Hans Jr. Sonderburg, 2 Schilling Lübisch).<br>

          <b>Außerhalb Holsteins lebt der 9-Fuß weiter:</b> Hamburg behält ihn als <i>Bank-Mark</i> der Hamburger Bank, Lübeck als <i>Speciemark</i> — beide biß 1875.

          '
        en: <b>Imperial standard until 1625:</b> Reichsthaler at 9-Fuß (.889/14²⁄₉ Loth, 25.984 g fine), Mark-lübisch sub-units (½, ¼, ⅛ Thaler), Schilling pieces (1/32, 1/48 Thaler), Pfennig petty 
          coins (1/96, 1/128 Thaler).<br> <b>Mints:</b> in Holstein-Gottorp mainly Schleswig and Husum. After the Kipper-Wipper collapse (~1620) the imperial estates lose unified coinage; from 1622 
          the lighter 9¼-Fuß (Thaler Species, 25.28173 g fine vs. 25.984 g in the 9-Fuß) takes over in Holstein, with the last 9-Fuß strike falling in 1625 (Hans Jr. of Sonderburg, 2 Schilling 
          Lübisch).<br> <b>Beyond Holstein the 9-Fuß lived on:</b> Hamburg kept it as the <i>Bank-Mark</i> of the Hamburger Bank, Lübeck as the <i>Speciemark</i> — both until 1875.
        uk: <b>Імперський стандарт до 1625:</b> Reichsthaler у 9-Fuß (.889/14²⁄₉ Loth, 25,984 г чистого), частки Mark lübisch (½, ¼, ⅛ Thaler), Schilling-монети (1/32, 1/48 Thaler), Pfennig-розмінні 
          монети (1/96, 1/128 Thaler).<br> <b>Монетні двори:</b> в Гольштейн-Ґотторпі переважно Шлезвіг і Гузум. Після колапсу Kipper-Wipper (~1620) імперські стани втрачають єдину монетну систему; з 
          1622 у Гольштейні утверджується легший 9¼-Fuß (Thaler Species, 25,28173 г чистого проти 25,984 г у 9-Fuß), а останнє 9-Fuß-карбування припадає на 1625 р. (Hans Jr. Sonderburg, 2 Schilling 
          Lübisch).<br> <b>Поза Гольштейном 9-Fuß продовжує існувати:</b> Гамбург тримає його як <i>Bank-Mark</i> Гамбурзького банку, Любек — як <i>Speciemark</i>; обидва до 1875 р.
  9_25_thaler:
    - id: I
      year_from: 1622
      year_to: 1726
      from_label: '1622'
      to_label: 15. Juli 1726
      title:
        de: Etablierung unter dänischer und gottorpischer Herrschaft
        en: Establishment under Danish and Gottorp rule
        uk: Становлення під данським і ґотторпським правлінням
      description:
        de: 'Holstein zweigetheilt: Königsl. dänischer Antheil (Glückstadt, Pinneberg, Rantzau) und Gottorpischer Antheil (Tönning, Schleswig, Kiel) · keine einheitliche Münzstruktur · Aufgeld zwischen
          Species und Umlaufmünzen üblich.'
        en: 'Holstein divided in two: the royal Danish part (Glückstadt, Pinneberg, Rantzau) and the Gottorp part (Tönning, Schleswig, Kiel) · no unified coinage structure · a premium between Species and
          circulating coins is the norm.'
        uk: 'Гольштейн розділений на дві частини: королівська данська частина (Glückstadt, Pinneberg, Rantzau) і ґотторпська частина (Tönning, Schleswig, Kiel) · єдиної монетної структури немає · надбавка
          (Aufgeld) між Species і обіговими монетами — звична практика.'
      context:
        de: '<b>Dominierende Großsilbermünze:</b> Thaler Species im 9¼-Fuß, nach dänischer Tradition etabliert; daneben lübisch geprägte Schilling-Scheidemünzen. <b>Zeitgenössische Nomenklatur:</b> auf
          den Münzen «SPECIES» oder Mark-Danske-Denomination; in Auktionskatalogen auch «Speciedaler».<br>

          <b>Hauptumlauf in Holstein:</b> Neben heimischen Prägungen zirkulieren lübische, hamburgische und norddeutsche Thaler Species; niederländische Patagonen/Albertusthaler; schwedische 4-Mark-Stücke;
          spanische Piaster — der Handel akzeptiert jede Species nach Silbergehalt.<br>

          <b>Parallel zur Thaler-Species-Prägung: die Kronemønt-Kategorie (1618 → 1696).</b> Siehe eigene Sektion <i>10½-Krone-Fuß · Kronemønt-Tarifmünze</i> unten, wo die Tarifhistorie 1½ → 1⅓ → ⅔ Speciedaler
          und die Prägetabelle 1644–1696 detailliert dokumentiert sind.

          '
        en: <b>Dominant large silver coin:</b> the Thaler Species in the 9¼-Fuß, established by Danish tradition; alongside it, Schilling petty coinage in Lübeck reckoning. <b>Contemporary 
          nomenclature:</b> on the coins themselves «SPECIES» or a Mark-Danske denomination; auction catalogues often use «Speciedaler».<br> <b>Main circulation in Holstein:</b> besides domestic 
          issues, Lübeck, Hamburg and North-German Thaler Species circulate; Dutch Patagonen/Albertusthaler; Swedish 4-Mark pieces; Spanish piastres — trade accepts every Species by silver 
          content.<br> <b>In parallel with the Thaler Species issues — the Kronemønt category (1618 → 1696).</b> See the dedicated section <i>10½-Krone-Fuß · Kronemønt tariff coin</i> below, which 
          documents the tariff history 1½ → 1⅓ → ⅔ Speciedaler and the strike table 1644–1696 in detail.
        uk: <b>Домінантна велика срібна монета:</b> Thaler Species у 9¼-Fuß, закріплений данською традицією; поруч — Schilling-розмінна монета у любецькому рахунку. <b>Сучасна термінологія:</b> на 
          самих монетах «SPECIES» або номінал у Mark-Danske; аукціонні каталоги вживають також «Speciedaler».<br> <b>Основний обіг у Гольштейні:</b> крім місцевих карбувань, обертають любецькі, 
          гамбурзькі й північнонімецькі Thaler Species; нідерландські Patagonen/Albertusthaler; шведські 4-Mark; іспанські піастри — торгівля приймає кожен Species за вмістом срібла.<br> <b>Паралельно
          з карбуванням Thaler Species — категорія Kronemønt (1618 → 1696).</b> Див. окрему секцію <i>10½-Krone-Fuß · тарифна монета Kronemønt</i> нижче, де докладно задокументовано історію тарифу 1½ 
          → 1⅓ → ⅔ Speciedaler і таблицю карбувань 1644–1696.
      mt_caption:
        de: Münzstätte Tönning · Gottorpisches Holstein · 1689–1726 · Scheidemünzen mit lübischer Nominalangabe (im 9¼-Fuß-System) + Thaler Species und Dukaten (aus Bruun Coll. Stack's Bowers Auktion 
          Zürich 14.–15. März 2025)
        en: Tönning mint · Gottorp Holstein · 1689–1726 · petty coins denominated in Lübeck reckoning (within the 9¼-Fuß system) plus Thaler Species and ducats (from the Bruun Coll., Stack's Bowers 
          auction, Zurich 14–15 March 2025)
        uk: Монетний двір Tönning · ґотторпський Гольштейн · 1689–1726 · розмінна монета з номіналом у любецькому рахунку (в межах системи 9¼-Fuß) плюс Thaler Species і дукати (з колекції Bruun, 
          аукціон Stack's Bowers, Цюрих 14–15 березня 2025)
