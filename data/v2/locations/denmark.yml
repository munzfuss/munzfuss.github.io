  nobel_fod:
  - id: I
    year_from: 1496
    year_to: 1532
    from_label: '1496'
    to_label: '1532'
    title:
      de: 'Phase I · Sovereign-Tier Prestige-Karbung 1496-1532 · ≈ 14,46 g fein @ .986 (Range .979-.995)'
      en: 'Phase I · Sovereign-tier prestige coinage 1496-1532 · ≈ 14.46 g fine at .986 (range .979-.995)'
      uk: 'Фаза I · Sovereign-tier престижне карбування 1496-1532 · ≈ 14,46 г чистого за .986 (діапазон .979-.995)'
    description:
      de: 'Einzige Phase der Nobel-fod über drei Regenten: <b>Hans</b> 1496 Malmø/København + 1502 Malmø (Galster 24)<sup><a href="#ref37">[37]</a></sup>, <b>Christian II.</b> 1516 + 1518 Malmø (Galster 37), <b>Frederik I.</b> 1532 København/Malmø (Galster 45) + undatiertes Ribe (Galster 68 + 69). 36-jährige Linie, alle Belegexemplare RRR oder unik. Modell: englischer Sovereign Heinrichs VII. 1489 (15,55 g, 23 Karat)<sup><a href="#ref38">[38]</a></sup>; Hans-Nobel-Brutto 14,67 g per <a href="https://stacksbowers.com/the-l-e-bruun-collection/" target="_blank">Stack''s Bowers Bruun Lot 1001</a><sup><a href="#ref36">[36]</a></sup>. Übermittlung über Øresund-Zoll. <b>Aktuell NULL Belegexemplare im Cache</b> — pending §AZ Galster + Jensen-Skjoldager Paper-Source-Import.'
      en: 'The single phase of Nobel-fod across three rulers: <b>Hans</b> 1496 Malmø/Copenhagen + 1502 Malmø (Galster 24)<sup><a href="#ref37">[37]</a></sup>, <b>Christian II</b> 1516 + 1518 Malmø (Galster 37), <b>Frederik I</b> 1532 Copenhagen/Malmø (Galster 45) + undated Ribe (Galster 68 + 69). A 36-year line, all reference specimens RRR or unique. Model: Henry VII''s English Sovereign of 1489 (15.55 g, 23 carats)<sup><a href="#ref38">[38]</a></sup>; Hans Nobel gross 14.67 g per <a href="https://stacksbowers.com/the-l-e-bruun-collection/" target="_blank">Stack''s Bowers Bruun Lot 1001</a><sup><a href="#ref36">[36]</a></sup>. Transmitted via the Øresund Toll. <b>Currently ZERO reference specimens in the cache</b> — pending the §AZ Galster + Jensen-Skjoldager paper-source import.'
      uk: 'Єдина фаза Nobel-fod через трьох правителів: <b>Hans</b> 1496 Malmø/Копенгаген + 1502 Malmø (Galster 24)<sup><a href="#ref37">[37]</a></sup>, <b>Christian II</b> 1516 + 1518 Malmø (Galster 37), <b>Frederik I</b> 1532 Копенгаген/Malmø (Galster 45) + недатовані Ribe (Galster 68 + 69). 36-річна лінія, усі еталонні зразки RRR або унікат. Модель: англійський Sovereign Генрі VII 1489 (15,55 г, 23 карати)<sup><a href="#ref38">[38]</a></sup>; повна вага Hans Nobel 14,67 г за <a href="https://stacksbowers.com/the-l-e-bruun-collection/" target="_blank">Stack''s Bowers Bruun лот 1001</a><sup><a href="#ref36">[36]</a></sup>. Передача через Øresund-мито. <b>Наразі НУЛЬ еталонних зразків у кеші</b> — очікує імпорт §AZ Galster + Jensen-Skjoldager paper-source.'
