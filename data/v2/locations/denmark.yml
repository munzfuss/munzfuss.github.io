      de: 'Christian-IVs-Müntzformel (.859 / 16,250 g fein) · åbent Brev 12. Juli 1618 (Wilcke II Anm. 53; Wilcke I S. 156–157) — im Patent als «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» beschrieben, der spätere Latin-Name «Corona Danica» ist Numismatik-Usus → 1652 (Frederik III. wechselt zum 10½-Krone-Fuß) · Kopenhagener Hauptmünze · Tarifmünze, Anfangstarif 1½ Speciedaler, 1625 auf 1⅓ Speciedaler abgewertet · personnelle Christian-IV.-Karbung 1618–1624/25 + Frederik-III.-Fortsetzung 1651–1652 an derselben Müntzformel (Hede 1957: «<i>1618-1652</i>»; Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 ... Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>») · Sonderemissionen 1665 «Pumphosenkrone» (Schou 39/40) und 1675 2-Krone (Schou 11–15) folgen einer leicht höheren Lötigkeit und sind Hede-klassifiziert als spezielle Schaumünzen, nicht als Formelfortsetzung'
      en: 'Christian IV''s Müntzformel (.859 / 16.250 g fine) · åbent Brev of 12 July 1618 (Wilcke II note 53; Wilcke I pp. 156–157) — in the patent the coin is described as «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>», the later Latin name «Corona Danica» being a numismatic convention → 1652 (Frederik III shifts to the 10½-Krone-Fuß) · Copenhagen royal mint · tariff coin, initial tariff 1½ Speciedaler, reduced to 1⅓ Speciedaler in 1625 · Christian IV personal mintage 1618–1624/25 plus Frederik III continuation 1651–1652 at the same Müntzformel (Hede 1957: «<i>1618-1652</i>»; Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 ... Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>») · special issues 1665 «Pumphosenkrone» (Schou 39/40) and 1675 2-Krone (Schou 11–15) follow a slightly higher fineness and are Hede-classified as specialised Schaumünzen, not formula continuations'
      uk: 'Монетна формула Кристіана IV (.859 / 16,250 г чистого) · åbent Brev 12 липня 1618 р. (Wilcke II прим. 53; Wilcke I с. 156–157) — у патенті монета описана як «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>», пізніша латинська назва «Corona Danica» — нумізматична умовність → 1652 (Фредерік III переходить на 10½-Krone-Fuß) · Копенгагенський королівський монетний двір · тарифна монета, початковий тариф 1½ Speciedaler, 1625 знижено до 1⅓ Speciedaler · персональне карбування Кристіана IV 1618–1624/25 + продовження Фредеріка III 1651–1652 на тій самій формулі (Hede 1957: «<i>1618-1652</i>»; Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 ... Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>») · спец-випуски 1665 «Pumphosenkrone» (Schou 39/40) і 1675 2-Krone (Schou 11–15) йдуть за дещо вищою пробою і Hede-класифіковані як особливі Schaumünzen, а не продовження формули'
