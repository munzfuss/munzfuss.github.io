fuss_periods:
  nobel_fod:
    pdate_label:
      de: 'Geltungsbereich: 1496 (Hans) → 1532 (Frederik I) · 36 Jahre Prestige-Karbung über drei Regenten'
      en: 'Period of validity: 1496 (Hans) → 1532 (Frederik I) · 36 years of prestige coinage across three rulers'
      uk: 'Період дії: 1496 (Hans) → 1532 (Frederik I) · 36 років престижного карбування через трьох правителів'
    hintergrund:
      de: '<b>Sovereign-Tier-Prestige-Goldmünze der dänisch-norwegischen Königsmünze 1496-1532</b>, modeliert nach dem <a href="https://en.wikipedia.org/wiki/Sovereign_(British_coin)" target="_blank">englischen Sovereign Heinrichs VII. von 1489</a> (15,55 g, 23 Karat — «<i>twice the weight of the existing gold coin, the ryal</i>»)<sup><a href="#ref38">[38]</a></sup>. Hans'' Nobel von 1496 — Brutto <b>14,67 g</b>, dokumentiert über das <a href="https://stacksbowers.com/the-l-e-bruun-collection/" target="_blank">Stack''s Bowers L. E. Bruun-Lot 1001</a> (NGC AU-55, Auktionspreis €1,2 Mio. 14. September 2024)<sup><a href="#ref36">[36]</a></sup> — ist die <b>erste datierte dänische Goldmünze</b>. Hans (1496 Malmø/København + 1502 Malmø unik), Christian II. (1516 + 1518 Malmø je RRR) und Frederik I. (1532 København/Malmø RRR + undatierte Ribe-Karbung Galster 68/69) setzen die Linie fort<sup><a href="#ref37">[37]</a></sup>. Karbung an drei Münzstätten: Malmø (primär), København, Ribe (undatiert). Per Stück Probe ≈ 23 Karat 8 Grän (.986) — derselbe Goldstandard wie der zeitgenössische Goldgulden (<code>reichsdukatenfuss</code> Phase pre-I), aber im Sovereign-Gewicht-Tier (14,67 g vs 3,49 g, Faktor 4,2). Vermittlungs-Kanal des Sovereign-Standards in DK: der <a href="https://en.wikipedia.org/wiki/Sound_Dues" target="_blank">Øresund-Zoll</a> (Hans führte ihn 1497 ein), durch den englische Schiffsgold-Bestände direkt in die königliche Münzstätte flossen. <b>Aktuell NULL Belegexemplare im Projekt-Cache</b> — Fuß-Karte rendert strukturell, Coin-Tabelle bleibt leer biß zur §AZ-Promotion.'
      en: '<b>Sovereign-tier prestige gold coinage of the Danish-Norwegian royal mint, 1496-1532</b>, modelled on Henry VII''s <a href="https://en.wikipedia.org/wiki/Sovereign_(British_coin)" target="_blank">English Sovereign of 1489</a> (15.55 g, 23 carats — «<i>twice the weight of the existing gold coin, the ryal</i>»)<sup><a href="#ref38">[38]</a></sup>. Hans''s Nobel of 1496 — gross weight <b>14.67 g</b>, documented through the <a href="https://stacksbowers.com/the-l-e-bruun-collection/" target="_blank">Stack''s Bowers L. E. Bruun Lot 1001</a> (NGC AU-55, auction price €1.2 M, 14 September 2024)<sup><a href="#ref36">[36]</a></sup> — is the <b>first dated Danish gold coin</b>. Hans (1496 Malmø/Copenhagen + 1502 Malmø unique), Christian II (1516 + 1518 Malmø, each RRR) and Frederik I (1532 Copenhagen/Malmø RRR + undated Ribe coinage Galster 68/69) continue the line<sup><a href="#ref37">[37]</a></sup>. Coinage at three mints: Malmø (primary), Copenhagen, Ribe (undated). Per piece fineness ≈ 23 carats 8 grains (.986) — the same gold standard as the contemporary Goldgulden (<code>reichsdukatenfuss</code> Phase pre-I), but in the Sovereign-weight tier (14.67 g vs 3.49 g, factor 4.2). Channel of the Sovereign standard''s transmission to Denmark: the <a href="https://en.wikipedia.org/wiki/Sound_Dues" target="_blank">Øresund Toll</a> (introduced by Hans in 1497), through which English ship-gold reserves flowed directly into the royal mint. <b>Currently ZERO reference specimens in the project cache</b> — the Fuß card renders structurally, the coin table stays empty pending the §AZ promotion.'
      uk: '<b>Sovereign-tier престижне золоте карбування дансько-норвезького королівського монетного двору, 1496-1532</b>, за моделлю <a href="https://en.wikipedia.org/wiki/Sovereign_(British_coin)" target="_blank">англійського Sovereign Генрі VII 1489</a> (15,55 г, 23 карати — «<i>twice the weight of the existing gold coin, the ryal</i>»)<sup><a href="#ref38">[38]</a></sup>. Hans Nobel 1496 — повна вага <b>14,67 г</b>, задокументований через <a href="https://stacksbowers.com/the-l-e-bruun-collection/" target="_blank">Stack''s Bowers L. E. Bruun лот 1001</a> (NGC AU-55, аукціонна ціна €1,2 млн, 14 вересня 2024)<sup><a href="#ref36">[36]</a></sup> — <b>перша датована данська золота монета</b>. Hans (1496 Malmø/Копенгаген + 1502 Malmø унікат), Christian II (1516 + 1518 Malmø, кожен RRR) і Frederik I (1532 Копенгаген/Malmø RRR + недатоване Ribe-карбування Galster 68/69) продовжують лінію<sup><a href="#ref37">[37]</a></sup>. Карбування на трьох монетних дворах: Malmø (головний), Копенгаген, Ribe (недатоване). На штуку проба ≈ 23 карати 8 гран (.986) — той самий золотий стандарт, що й сучасний Goldgulden (<code>reichsdukatenfuss</code> Phase pre-I), але в Sovereign-ваговому-tier (14,67 г vs 3,49 г, коефіцієнт 4,2). Канал передачі стандарту Sovereign у Данію: <a href="https://en.wikipedia.org/wiki/Sound_Dues" target="_blank">Øresund-мито</a> (запроваджене Hans 1497 р.), через яке англійські корабельні запаси золота переходили безпосередньо у королівський монетний двір. <b>Наразі НУЛЬ еталонних зразків у проєктному кеші</b> — Fuß-карта рендeриться структурно, таблиця монет залишається порожньою до §AZ-промоції.'
    closing_label:
      de: Zusammenfassung · 36 Jahre Sovereign-Tier-Prestige-Linie
      en: Summary · 36 years of the Sovereign-tier prestige line
      uk: Підсумок · 36 років Sovereign-tier престижної лінії
    closing:
      de: 'Linie endet 1533 mit Frederiks I. Tod. Christian III. (1534-1559) und die Møntordning af 20. September 1541 verschieben die Goldprägung vollständig auf die Dukat / Ungersk-Gylden-Tier (<code>reichsdukatenfuss</code> Phase pre-I bzw. Phase I). Sovereign-Tier-Prestige-Karbung wird in DK erst 1611 unter Christian IV. mit dem Rosenobel-Programm wieder belebt — aber als separate Müntzfuß-Linie (§AX TODO), nicht als Fortsetzung dieser Nobel-Linie. <em>Nicht zu verwechseln</em> mit Christian IVs Rosenobel (1611-1629, eigene Karbungs-Linie im Kalmar-Krieges-Kontext).'
      en: 'The line ends in 1533 with Frederik I''s death. Christian III (1534-1559) and the Møntordning af 20. September 1541 shift gold coinage entirely to the Dukat / Ungersk Gylden tier (<code>reichsdukatenfuss</code> Phase pre-I / Phase I). Sovereign-tier prestige coinage is not revived in Denmark until 1611 under Christian IV''s Rosenobel programme — but as a separate Müntzfuß line (§AX TODO), not as a continuation of this Nobel line. <em>Not to be confused</em> with Christian IV''s Rosenobel (1611-1629, a separate coinage line in the Kalmar War context).'
      uk: 'Лінія завершується 1533 зі смертю Frederik I. Christian III (1534-1559) та Møntordning af 20. September 1541 повністю переносять золоте карбування до Dukat / Ungersk-Gylden-tier (<code>reichsdukatenfuss</code> Phase pre-I / Phase I). Sovereign-tier престижне карбування у Данії відновлюється лише 1611 за Christian IV з програмою Rosenobel — але як окрема Müntzfuß-лінія (§AX TODO), не як продовження цієї Nobel-лінії. <em>Не плутати</em> з Rosenobel Кристіана IV (1611-1629, окрема лінія карбування у контексті Кальмарської війни).'
  8_5_gylden_fod:
    pdate_label:
      de: 'Geltungsbereich: 1514 (Lovkompleks) → 1523 (Christian II Absetzung) · 9 Jahre, drei Phasen · vorausgehende Akte 22. Juli 1513 Haandfæstning + 1. August 1513 Dynes Blicher Beskikkelsesbrev sind PRECURSOR (nicht Teil des Lovkompleks)'
      en: 'Period of validity: 1514 (Lovkompleks) → 1523 (Christian II deposition) · 9 years, three phases · precursor acts of 22 July 1513 Haandfæstning + 1 August 1513 Dynes Blicher beskikkelsesbrev are PRECURSOR (not part of the Lovkompleks)'
      uk: 'Період дії: 1514 (Lovkompleks) → 1523 (скинення Кристіана II) · 9 років, три фази · попередні акти 22 липня 1513 Haandfæstning + 1 серпня 1513 Dynes Blicher Beskikkelsesbrev — це ПРЕКУРСОРНІ акти (не частина Lovkompleks)'
    hintergrund:
      de: '<b>Erste umfassende Müntzgesetzgebung des dänisch-norwegischen Reichs für beide Metalle und beide Königreiche</b>, etabliert durch das <b>Christian-II-Lovkompleks 1514-1515</b><sup><a href="#ref29">[29]</a></sup> — eine vierteilige Aktion: Møntordning af Sommeren 1514 («<i>Dienis Malmö Brev</i>», nach Mzm. Diens (Hans) Blicher), Norge-Forordning 3. August 1514 (Erweiterung auf Norwegen unter Kalmar-Union), Kvittering Paasketid 1515 (Compliance-Quittung des Rigsråd), Sjælland åbent Brev 24. August 1515 (Sjælland-spezifische Erneuerung). Auf der Silber-Seite definiert das Lovkompleks die <b>Sølvgylden-Skilling-Hvid-Triade</b> — 8½ Sølvgylden aus der Cölln. Marck rauh @ 14 Lod (875 ‰), 27,51 g rauh / 24,07 g fein je Stück; Skilling 96 Stk./M @ 5¾ Lod und Hvid 222 Stk./M @ 4½ Lod als Scheidemünzen<sup><a href="#ref29">[29]</a></sup>. Drei Phasen: <b>A1</b> (1514-1517) Lovkompleks-Karbung mit Sølvgylden 1516+1518 aus Malmö (Mzm. Diens Blicher) — vorausgehende 1513-Akte (22. Juli 1513 Haandfæstning + 1. August 1513 Dynes-Blicher-Beskikkelsesbrev) sind PRECURSOR, NICHT Teil des Lovkompleks; <b>A2</b> (1518-1522) Klipping-Debasierung («<i>ydel Kobber</i>», Wilcke 7-2 S. 157) — 18-Penning- und 1-Skilling-Klippinge als Notmünze im Vorfeld der Absetzung; <b>A3</b> (1523) Final-Konsolidierung mit Massen-Sølvgylden-Karbung Malmö am Vorabend der Flucht 13. April 1523 (Wilcke 7-2 S. 156 verbatim «<i>meget almindelig</i>»). Standard endet 1524 mit Frederik Is Møntordning 25. Februar 1524 (separate Fuß <code>8_gylden_fod</code>), die die Sølvgylden-Stückzahl auf 8/M strafft.'
      en: '<b>The first comprehensive coinage legislation of the Danish-Norwegian realm covering both metals and both kingdoms</b>, established through the <b>Christian II Lovkompleks of 1514-1515</b><sup><a href="#ref29">[29]</a></sup> — a four-part act: Møntordning af Sommeren 1514 («<i>Dienis Malmö Brev</i>», after mintmaster Diens (Hans) Blicher), Norge ordinance of 3 August 1514 (extension to Norway under the Kalmar Union), Kvittering Paasketid 1515 (compliance receipt from the Rigsråd), Sjælland åbent Brev of 24 August 1515 (Sjælland-specific renewal). On the silver side the Lovkompleks defines the <b>Sølvgylden-Skilling-Hvid triad</b> — 8½ Sølvgylden per Cologne mark rough at 14 Lod (875 ‰), 27.51 g rough / 24.07 g fine per piece; Skilling 96/M at 5¾ Lod and Hvid 222/M at 4½ Lod as Scheidemünzen<sup><a href="#ref29">[29]</a></sup>. Three phases: <b>A1</b> (1514-1517) Lovkompleks coinage with Sølvgylden 1516+1518 from Malmö (mintmaster Diens Blicher) — preceding 1513 acts (22 July 1513 Haandfæstning + 1 August 1513 Dynes Blicher beskikkelsesbrev) are PRECURSOR, NOT part of the Lovkompleks; <b>A2</b> (1518-1522) Klipping debasement («<i>ydel Kobber</i>», Wilcke 7-2 p. 157) — 18-Penning and 1-Skilling Klippinge as emergency coinage in the run-up to the deposition; <b>A3</b> (1523) final consolidation with mass Sølvgylden coinage at Malmö on the eve of the flight of 13 April 1523 (Wilcke 7-2 p. 156 verbatim «<i>meget almindelig</i>»). The standard ends in 1524 with Frederik I''s Møntordning of 25 February 1524 (separate Fuß <code>8_gylden_fod</code>), which tightens the Sølvgylden count to 8/M.'
      uk: '<b>Перше комплексне монетне законодавство дансько-норвезького реалму, що охоплює обидва метали та обидва королівства</b>, запроваджене через <b>Lovkompleks Кристіана II 1514-1515</b><sup><a href="#ref29">[29]</a></sup> — чотирискладовий акт: Møntordning af Sommeren 1514 («<i>Dienis Malmö Brev</i>», за монетмайстра Diens (Hans) Blicher), норвезький ордонанс 3 серпня 1514 (поширення на Норвегію в Кальмарській унії), Kvittering Paasketid 1515 (compliance-квитанція Rigsråd), Sjælland åbent Brev 24 серпня 1515 (Sjælland-специфічне відновлення). На срібній стороні Lovkompleks визначає <b>тріаду Sølvgylden-Skilling-Hvid</b> — 8½ Sølvgylden з повної кельнської марки за 14 Lod (875 ‰), 27,51 г повної / 24,07 г чистого на штуку; Skilling 96/M за 5¾ Lod і Hvid 222/M за 4½ Lod як Scheidemünzen<sup><a href="#ref29">[29]</a></sup>. Три фази: <b>A1</b> (1514-1517) Lovkompleks-карбування з Sølvgylden 1516+1518 з Мальме (монетмайстер Diens Blicher) — попередні акти 1513 (22 липня 1513 Haandfæstning + 1 серпня 1513 Dynes Blicher Beskikkelsesbrev) — ПРЕКУРСОРНІ, НЕ частина Lovkompleks; <b>A2</b> (1518-1522) Klipping-девальвація («<i>ydel Kobber</i>», Wilcke 7-2 с. 157) — 18-Penning та 1-Skilling Klippinge як надзвичайна монета напередодні скинення; <b>A3</b> (1523) фінальна консолідація з масовою Sølvgylden-карбуванням у Мальме напередодні втечі 13 квітня 1523 (Wilcke 7-2 с. 156 verbatim «<i>meget almindelig</i>»). Стандарт завершується 1524 р. з Møntordning Frederik I 25 лютого 1524 (окрема стопа <code>8_gylden_fod</code>), яка стискає кількість Sølvgylden до 8/M.'
    closing_label:
      de: Zusammenfassung · 10 Jahre Christian-II-Silber-Lovkompleks · drei Phasen
      en: Summary · 10 years of the Christian II silver Lovkompleks · three phases
      uk: Підсумок · 10 років срібного Lovkompleks Кристіана II · три фази
    closing:
      de: 'Das <b>Christian-II-Lovkompleks</b> ist die genealogische Wurzel der post-mittelalterlichen Sølvgylden-Skilling-Hvid-Tradition im dänisch-norwegischen Reich. Der 14-Lod (.875)-Hauptkurant-Anker wird unverändert von Frederik I 1524 übernommen (<code>8_gylden_fod</code>), dann von Christian III 1541 leicht auf 14½ Lod (.906) angehoben (<code>8_daler_fod</code>). Die Skilling-Scheidemünz-Logik (.359 Probe, weit über dem Sølvgylden-Fein-Wert tariffiert) ist das früheste systematische Beispiel der Token-Münzgebung im Reich.'
      en: 'The <b>Christian II Lovkompleks</b> is the genealogical root of the post-medieval Sølvgylden-Skilling-Hvid tradition in the Danish-Norwegian realm. The 14-Lod (.875) Hauptkurant anchor is taken over unchanged by Frederik I in 1524 (<code>8_gylden_fod</code>), then raised slightly by Christian III in 1541 to 14½ Lod (.906) (<code>8_daler_fod</code>). The Skilling Scheidemünze logic (.359 fineness, tariffed far above the Sølvgylden fine value) is the earliest systematic example of token coinage in the realm.'
      uk: '<b>Lovkompleks Кристіана II</b> — генеалогічний корінь пост-середньовічної традиції Sølvgylden-Skilling-Hvid у дансько-норвезькому реалмі. Якір Hauptkurant 14 Lod (.875) незмінно переймає Frederik I 1524 р. (<code>8_gylden_fod</code>), потім Кристіан III 1541 р. злегка піднімає до 14½ Lod (.906) (<code>8_daler_fod</code>). Логіка Skilling-Scheidemünze (проба .359, тарифована значно вище фейн-вартості Sølvgylden) — найраніший систематичний приклад токенної монети в реалмі.'
  8_gylden_fod:
    pdate_label:
      de: 'Geltungsbereich: 1524 → 1532 · 8 Jahre · Frederik I post-Christian-II-Absetzung-Müntzfuß'
      en: 'Period of validity: 1524 → 1532 · 8 years · Frederik I post-deposition-of-Christian-II Müntzfuß'
      uk: 'Період дії: 1524 → 1532 · 8 років · Müntzfuß Frederik I після скинення Кристіана II'
    hintergrund:
      de: '<b>Frederik Is Müntzfuß-Norm nach der Absetzung Christians II.</b>, etabliert durch die <b>Møntordning vom 25. Februar 1524</b> (København, Wilcke 1950 Kap. 7-2 S. 184-187)<sup><a href="#ref29">[29]</a></sup>. Königliche Verordnung verbatim: «<i>Vi Fr. ... at slaa, i Guld: Nobler (den vegne Mark skal holde 23½ Karat og skraade 16 Stkr.), Rinske Gylden (18 Karat, 72 Stkr.) ...</i>» — und auf der Silber-Seite: <b>acht Sølvgylden</b> aus der Cölln. Marck rauh bei <b>14 Lod (.875)</b>, 29,232 g rauh / 25,578 g fein je Stück, Marken-fin <b>mf 9,143</b>. Gegenüber Christian IIs Lovkompleks 1514 wird die Sølvgylden-Stückzahl von 8½/M auf 8/M gestrafft — Frederik I erhöht das Per-Stück-Gewicht um 6,3 % bei unveränderter 14-Lod-Probe. Innovation: <b>Lybsk-aligned 24-ß-Mark-Subdivision</b> (vs Christian-IIs 32-ß-Tarif) — Wilcke 7-2 S. 193 verbatim «<i>Mynten ville udgøre eens og liig ved vores Mynt (o: Hertugdømmets) og udi de Vendiske Stæder</i>». Separater Akt 26. Februar 1524 etabliert das <b>14-Penning-Stück</b> («14 %») als Klipping-Indfrielse-Mønt — Christian-IIs Klippinge werden gegen 14-Penning-Stücke umgetauscht. Hauptphase 1524-1531; finale Konsolidierung 1532 (Galster 47-52 Sølvgylden-Serie). Standard endet mit Frederik Is Tod 10. April 1533; der Christian-III-Interregnum 1534-1540 läuft unter <code>8_daler_fod</code> Phase 0 (de-facto-Etablierung 1534-1540, Phase 0).'
      en: '<b>Frederik I''s Müntzfuß norm after the deposition of Christian II</b>, established by the <b>Møntordning of 25 February 1524</b> (Copenhagen, Wilcke 1950 Kap. 7-2 pp. 184-187)<sup><a href="#ref29">[29]</a></sup>. Royal decree verbatim: «<i>Vi Fr. ... at slaa, i Guld: Nobler (den vegne Mark skal holde 23½ Karat og skraade 16 Stkr.), Rinske Gylden (18 Karat, 72 Stkr.) ...</i>» — and on the silver side: <b>eight Sølvgylden</b> per Cologne mark rough at <b>14 Lod (.875)</b>, 29.232 g rough / 25.578 g fine per piece, Marken-fin <b>mf 9.143</b>. Compared with Christian II''s Lovkompleks of 1514, the Sølvgylden count is tightened from 8½/M to 8/M — Frederik I raises the per-piece weight by 6.3 % at unchanged 14-Lod fineness. Innovation: <b>Lybsk-aligned 24-ß Mark subdivision</b> (vs Christian II''s 32-ß tariff) — Wilcke 7-2 p. 193 verbatim «<i>Mynten ville udgøre eens og liig ved vores Mynt (o: Hertugdømmets) og udi de Vendiske Stæder</i>». Separate act of 26 February 1524 establishes the <b>14-Penning piece</b> («14 %») as Klipping redemption coin — Christian II''s Klippinge are exchanged for 14-Penning pieces. Main phase 1524-1531; final consolidation 1532 (Galster 47-52 Sølvgylden series). Standard ends with Frederik I''s death 10 April 1533; the Christian III interregnum 1534-1540 runs under <code>8_daler_fod</code> Phase 0 (de-facto establishment 1534-1540, Phase 0).'
      uk: '<b>Müntzfuß-норма Frederik I після скинення Кристіана II</b>, запроваджена <b>Møntordning від 25 лютого 1524</b> (Копенгаген, Wilcke 1950 Kap. 7-2 с. 184-187)<sup><a href="#ref29">[29]</a></sup>. Королівський декрет verbatim: «<i>Vi Fr. ... at slaa, i Guld: Nobler (den vegne Mark skal holde 23½ Karat og skraade 16 Stkr.), Rinske Gylden (18 Karat, 72 Stkr.) ...</i>» — а на срібному боці: <b>вісім Sølvgylden</b> з повної кельнської марки за <b>14 Lod (.875)</b>, 29,232 г повної / 25,578 г чистого на штуку, Marken-fin <b>mf 9,143</b>. Порівняно з Lovkompleks Кристіана II 1514, кількість Sølvgylden стиснута з 8½/M до 8/M — Frederik I підвищує вагу на штуку на 6,3 % за незмінної 14-Lod проби. Інновація: <b>Lybsk-aligned 24-ß Mark-підструктура</b> (vs тариф Кристіана II 32 ß) — Wilcke 7-2 с. 193 verbatim «<i>Mynten ville udgøre eens og liig ved vores Mynt (o: Hertugdømmets) og udi de Vendiske Stæder</i>». Окремий акт 26 лютого 1524 встановлює <b>14-Penning-штуку</b> («14 %») як Klipping-обмінну монету — Klippinge Кристіана II обмінюються на 14-Penning штуки. Головна фаза 1524-1531; фінальна консолідація 1532 (серія Galster 47-52 Sølvgylden). Стандарт завершується смертю Frederik I 10 квітня 1533; інтеррегнум Кристіана III 1534-1540 проходить під <code>8_daler_fod</code> Phase 0 (де-факто-встановлення 1534-1540, фаза 0).'
    closing_label:
      de: Zusammenfassung · 8 Jahre 8-Gylden-Fod · Lybsk-Tarif + Klipping-Indfrielse
      en: Summary · 8 years of 8-Gylden-Fod · Lybsk tariff + Klipping redemption
      uk: Підсумок · 8 років 8-Gylden-Fod · Lybsk-тариф + Klipping-обмін
    closing:
      de: 'Die <b>8-Gylden-Fod</b> ist der erste dänische Müntzfuß mit <b>Lybsk-aligned 24-ß-Mark-Subdivision</b> — strukturell ein Vorläufer der späteren Schleswig-Holstein-Helstaten-Müntzwesen-Lineage. Der 14-Lod-Anker bleibt vom Christian-II-Lovkompleks erhalten; das spätere Christian-III-Daler 1541 hebt die Probe auf 14½ Lod und etabliert den Daler als 1/3-Untertheilung anstelle der Sølvgylden-Untertheilung. Reine Reckoning-Konvergenz mit dem Hansestädernes Mynt 1524; volle metrische Konvergenz mit der Schleswig-Holstein-Lybsk-Linie erst 1547 (Flensborg Bestalling, <code>8_daler_lybsk_fod</code>).'
      en: '<b>8-Gylden-Fod</b> is the first Danish Müntzfuß with a <b>Lybsk-aligned 24-ß Mark subdivision</b> — structurally a precursor of the later Schleswig-Holstein-Helstaten coinage lineage. The 14-Lod anchor is preserved from the Christian II Lovkompleks; the later Christian III Daler of 1541 raises the fineness to 14½ Lod and establishes the Daler as a 1/3 subdivision in place of the Sølvgylden subdivision. Pure reckoning convergence with the Hansestädernes coinage in 1524; full metric convergence with the Schleswig-Holstein-Lybsk line only in 1547 (Flensborg Bestalling, <code>8_daler_lybsk_fod</code>).'
      uk: '<b>8-Gylden-Fod</b> — перший данський Müntzfuß з <b>Lybsk-aligned 24-ß Mark-підструктурою</b> — структурно попередник пізнішої лінії Schleswig-Holstein-Helstaten-Müntzwesen. Якір 14 Lod збережено з Lovkompleks Кристіана II; пізніший Daler Кристіана III 1541 піднімає пробу до 14½ Lod і встановлює Daler як 1/3-підструктуру замість Sølvgylden-підструктури. Чиста reckoning-конвергенція з Hansestädernes-монетою 1524; повна метрична конвергенція з лінією Schleswig-Holstein-Lybsk лише 1547 р. (Flensborg Bestalling, <code>8_daler_lybsk_fod</code>).'
  8_daler_fod:
    pdate_label:
      de: 'Geltungsbereich: 1541 → 1555 · 14 Jahre (Phase A1 1541-1543 baseline + Phase A2 1544-1555 debasiert)'
      en: 'Period of validity: 1541 → 1555 · 14 years (Phase A1 1541-1543 baseline + Phase A2 1544-1555 debased)'
      uk: 'Період дії: 1541 → 1555 · 14 років (фаза A1 1541-1543 baseline + фаза A2 1544-1555 знижена)'
    hintergrund:
      de: '<b>Erste systematische Müntzfuß-Norm des dänisch-norwegischen Reichs nach der Reformation</b>, eingeführt durch die <b>Møntordning vom 20. September 1541</b> Christians III.<sup><a href="#ref29">[29]</a></sup>. Acht Daler aus einer Cölln. Marck fein bei 14½ Lod (906¼ ‰, period-attestiert «<i>Hallffemtandeskab Lod</i>») — entspricht Marken-fin <b>mf 8,827</b> bzw. <b>26,494 g fein</b> je Daler. Drei-stufige Stückelung: vollwertige Kurantmünze (Daler / Mark / 8 Skilling / 4 Skilling) @ 14½ Lod, abgesenkte Scheidemünze (1 Skilling) @ 4 Lod (250 ‰), Billon (Hvid 4 Lod, Penning 2 Lod) — 3,6-facher Feingehaltsabfall zwischen 4 Skilling Kurant und Hvid Scheide markiert den Übergang von vollwertiger Müntze zu Sub-Mark-Token mit Tariffung über dem Metallwert<sup><a href="#ref29">[29]</a></sup>. Am <b>27. September 1544</b> hebt ein Tillæg den Marken-fin auf 9,481 (≈ 24,67 g fein je Daler) an — Phase A2 (1544-1555); Feingehalt unverändert 14½ Lod, Raugewicht reduziert. Norwegische Münzanstalt zu Trondheim folgt ab 1546 demselben Standard (Møntordning af 3. August 1514 erweitert auf das Norge-Reich). Standard endet faktisch mit der <b>Reichsmünzordnung 1559</b> und Frederik IIs Adoption des imperialen 9-Fuß ab 1566; Christian-III-Daler zirkulieren neben Reichsthalern biß zur Münzconvention 1566.'
      en: '<b>The first systematic Müntzfuß norm of the Danish-Norwegian realm after the Reformation</b>, established by the <b>Møntordning of 20 September 1541</b> of Christian III<sup><a href="#ref29">[29]</a></sup>. Eight Daler per Cologne mark fine at 14½ Lod (906¼ ‰, period-attested «<i>Hallffemtandeskab Lod</i>») — Marken-fin <b>mf 8.827</b> and <b>26.494 g fine</b> per Daler. Three-tier denomination: full-value Kurantmünze (Daler / Mark / 8 Skilling / 4 Skilling) at 14½ Lod; reduced Scheidemünze (1 Skilling) at 4 Lod (250 ‰); billon (Hvid 4 Lod, Penning 2 Lod) — the 3.6× fineness drop between 4 Skilling Kurant and Hvid Scheide marks the step from full-value coin to sub-Mark token tariffed above metal value<sup><a href="#ref29">[29]</a></sup>. On <b>27 September 1544</b>, a Tillæg raises the Marken-fin to 9.481 (≈ 24.67 g fine per Daler) — Phase A2 (1544-1555); fineness unchanged at 14½ Lod, rough weight reduced. The Norwegian mint at Trondheim follows the same standard from 1546 (Møntordning of 3 August 1514 extended to the Norwegian realm). The standard effectively ends with the <b>Reichsmünzordnung of 1559</b> and Frederik II''s adoption of the imperial 9-Fuß from 1566; Christian-III Dalers circulate alongside Reichsthalers until the 1566 Münzconvention.'
      uk: '<b>Перша систематична Müntzfuß-норма дансько-норвезької держави після Реформації</b>, запроваджена <b>Møntordning від 20 вересня 1541</b> Кристіана III<sup><a href="#ref29">[29]</a></sup>. Вісім Daler з кельнської марки чистого срібла за пробою 14½ Lod (906¼ ‰, period-attested «<i>Hallffemtandeskab Lod</i>») — Marken-fin <b>mf 8,827</b> і <b>26,494 г чистого</b> на Daler. Триступенева структура номіналів: повноцінна Kurantmünze (Daler / Mark / 8 Skilling / 4 Skilling) за 14½ Lod; знижена Scheidemünze (1 Skilling) за 4 Lod (250 ‰); billon (Hvid 4 Lod, Penning 2 Lod) — 3,6-кратне падіння проби між 4 Skilling Kurant та Hvid Scheide позначає перехід від повноцінної монети до Sub-Mark-токена з тарифом понад металеву вартість<sup><a href="#ref29">[29]</a></sup>. <b>27 вересня 1544</b> Tillæg підвищує Marken-fin до 9,481 (≈ 24,67 г чистого на Daler) — фаза A2 (1544-1555); проба незмінна 14½ Lod, повна вага зменшена. Норвезький монетний двір у Тронгеймі дотримується того самого стандарту з 1546 р. (Møntordning af 3. August 1514 поширено на Норге-реалм). Стандарт фактично завершується <b>Reichsmünzordnung 1559</b> та запровадженням імперського 9-Fuß Фредеріком II з 1566 р.; Кристіанові III Daler циркулюють поряд з Reichsthaler-ами до уніфікації Müntzconvention 1566.'
    closing_label:
      de: Zusammenfassung · 14 Jahre 8-Daler-Fod (baseline + 1544 Tillæg-Debasierung)
      en: Summary · 14 years of 8-Daler-Fod (baseline + 1544 debasement supplement)
      uk: Підсумок · 14 років 8-Daler-Fod (baseline + tillæg-девальвація 1544)
    closing:
      de: 'Die <b>8-Daler-Fod</b> markiert die erste post-Reformations-Müntzfuß-Norm des dänisch-norwegischen Reichs. Phase A1 (1541-1543) baseline mf 8,827; Phase A2 (1544-1555) debasiert per Tillæg vom 27. September 1544 auf mf 9,481. Im Royalen Track parallel läuft seit 1547 die <code>8_daler_lybsk_fod</code> Lybsk-aligned ducal-zone (siehe nächste Sektion). Der Standard endet faktisch mit der Reichsmünzordnung 1559 und Frederik IIs 9-Fuß-Adoption ab 1566.'
      en: '<b>8-Daler-Fod</b> marks the first post-Reformation Müntzfuß norm of the Danish-Norwegian realm. Phase A1 (1541-1543) baseline mf 8.827; Phase A2 (1544-1555) debased per Tillæg of 27 September 1544 to mf 9.481. Running in parallel from 1547 is the Lybsk-aligned ducal-zone <code>8_daler_lybsk_fod</code> (see next section). The standard effectively ends with the Reichsmünzordnung 1559 and Frederik II''s adoption of the 9-Fuß from 1566.'
      uk: '<b>8-Daler-Fod</b> позначає першу пост-реформаційну Müntzfuß-норму дансько-норвезького реалму. Фаза A1 (1541-1543) baseline mf 8,827; фаза A2 (1544-1555) знижена за Tillæg 27 вересня 1544 до mf 9,481. Паралельно з 1547 діє любекська ducal-zone <code>8_daler_lybsk_fod</code> (див. наступну секцію). Стандарт фактично завершується Reichsmünzordnung 1559 та адопцією 9-Fuß Фредеріком II з 1566 р.'
  8_daler_lybsk_fod:
    pdate_label:
      de: 'Geltungsbereich: 1547 (Flensborg Bestalling) → 1571 · 24 Jahre Hauptphase 1545-1554, Auslauf biß 1571'
      en: 'Period of validity: 1547 (Flensborg Bestalling) → 1571 · 24 years; main phase 1545-1554, tail through 1571'
      uk: 'Період дії: 1547 (Flensborg Bestalling) → 1571 · 24 роки; головна фаза 1545-1554, заник до 1571'
    hintergrund:
      de: '<b>Dukal-zone Müntzfuß-Stamm</b> für die Flensborger Münzanstalt (1545-1554 Hauptphase, 1554-1571 Auslauf), eingeführt durch die <b>Flensborg Bestalling vom 22. Januar 1547</b> Christians III. unter Mzm. Jørgen Kock dem Jüngeren<sup><a href="#ref29">[29]</a></sup>. Strukturell ein paralleler Standard zum <code>8_daler_fod</code>: gleiches Cölln.-Marck-Raulegierungs-Brutto (29,232 g je Daler), gleiches 8-stk-pro-Marck-Grid — aber abgesenkter Feingehalt von <b>14¼ Lod (890⅝ ‰)</b> statt königlichem 14½ Lod, und Lybsk-aligned Untertheilung (24 ß lybsk = 1 Gylden) statt der königlichen 48-ß-Danske-Theilung. Marken-fin <b>mf 8,982</b> ⇒ <b>26,029 g fein je Daler</b> (1,75 % leichter als der königliche Christian-III-Daler) — die Differenz wird über Markthandel mit Lybsk realisiert, nicht über Tarif-Konversion. Genealogisch das <em>Saatkorn der späteren 18½-Thaler-Fuß-Linie</em>, das unter Christian IV in der Glückstadt-Krone-Mønt fortgeführt und unter Frederik III als Rigsbankdaler-Standard formalisiert wird. Münzstand Hauptmünzen Hede c3h15-c3h22 (Rhinsk Gylden + Sølvgylden + Søsling lybsk) — die Stücke selbst sind im aktuellen Projekt-Cache (Hede danskmoent.dk) noch nicht vollständig erfaßt; vollständige Per-Münze-Verifikation hängt am §AZ Galster + Jensen-Skjoldager Paper-Source-Import. Standard endet faktisch mit Frederik IIs 9-Thaler-Fuß-Adoption ab 1571.'
      en: '<b>Ducal-zone Müntzfuß lineage</b> for the Flensborg mint (1545-1554 main phase, 1554-1571 tail), established by the <b>Flensborg Bestalling of 22 January 1547</b> of Christian III under mintmaster Jørgen Kock the Younger<sup><a href="#ref29">[29]</a></sup>. Structurally parallel to <code>8_daler_fod</code>: same Cologne-mark rough-alloy brutto (29.232 g per Daler), same 8-pcs-per-mark grid — but reduced fineness of <b>14¼ Lod (890⅝ ‰)</b> instead of the royal 14½ Lod, and Lybsk-aligned subdivision (24 ß lybsk = 1 Gylden) instead of the royal 48-ß-danske division. Marken-fin <b>mf 8.982</b> ⇒ <b>26.029 g fine per Daler</b> (1.75 % lighter than the royal Christian-III-Daler) — the gap is realised through market trade with Lybsk, not through tariff conversion. Genealogically the <em>seed of the later 18½-Thaler-Fuß lineage</em>, continued under Christian IV in the Glückstadt Krone-Mønt and formalised under Frederik III as the Rigsbankdaler standard. Main coinage Hede c3h15-c3h22 (Rhinsk Gylden + Sølvgylden + Søsling lybsk) — the specimens themselves are not yet fully captured in the current project cache (Hede danskmoent.dk); full per-coin verification depends on the §AZ Galster + Jensen-Skjoldager paper-source import. The standard effectively ends with Frederik II''s adoption of the 9-Thaler-Fuß from 1571.'
      uk: '<b>Герцогська Müntzfuß-лінія</b> для Flensborg-ського монетного двору (1545-1554 головна фаза, 1554-1571 заник), запроваджена <b>Flensborg Bestalling від 22 січня 1547</b> Кристіана III за монетмайстра Jørgen Kock молодшого<sup><a href="#ref29">[29]</a></sup>. Структурно паралельна до <code>8_daler_fod</code>: те саме кельнсько-маркове повне (29,232 г на Daler), та сама 8-шт-на-марку сітка — але знижена проба <b>14¼ Lod (890⅝ ‰)</b> замість королівського 14½ Lod, та любекська підструктура (24 ß lybsk = 1 Gylden) замість королівського поділу 48 ß danske. Marken-fin <b>mf 8,982</b> ⇒ <b>26,029 г чистого на Daler</b> (на 1,75 % легший за королівський Christian-III-Daler) — різниця реалізується через ринкову торгівлю з Любеком, не через тарифну конверсію. Генеалогічно <em>зерно подальшої лінії 18½-Thaler-Fuß</em>, продовжене за Кристіана IV у ґлюкштадтській Krone-Mønt і формалізоване за Фредеріка III як стандарт Rigsbankdaler. Основне карбування Hede c3h15-c3h22 (Rhinsk Gylden + Sølvgylden + Søsling lybsk) — самі зразки ще не повністю охоплено поточним проєктним кешем (Hede danskmoent.dk); повна покоінна верифікація залежить від імпорту §AZ Galster + Jensen-Skjoldager paper-source. Стандарт фактично завершується з прийняттям 9-Thaler-Fuß Фредеріком II з 1571 р.'
    closing_label:
      de: Zusammenfassung · 24 Jahre Lybsk-aligned ducal-zone (Saatkorn der 18½-Thaler-Fuß-Linie)
      en: Summary · 24 years of the Lybsk-aligned ducal zone (seed of the 18½-Thaler-Fuß lineage)
      uk: Підсумок · 24 роки любекської ducal-zone (зерно лінії 18½-Thaler-Fuß)
    closing:
      de: 'Die <b>8-Daler-Lybsk-Fod</b> ist der erste belegte Punkt, an dem die königliche (14½ Lod, 48 ß danske) und die dukale (14¼ Lod, 24 ß lybsk) Müntz-Linie strukturell auseinandertreten. Die Lybsk-aligned sub-Mark-Logik überlebt das Ende des Standards 1571 — sie migriert nach Glückstadt unter Christian IV (Krone-Mønt 1618+) und wird unter Frederik III als Rigsbankdaler-Standard (18½ Thaler je Cölln. Marck fein) formalisiert. Specimen-Coverage in unserem Datensatz noch unvollständig — abhängig vom §AZ Paper-Source-Import.'
      en: '<b>8-Daler-Lybsk-Fod</b> is the first documented point at which the royal (14½ Lod, 48 ß danske) and the ducal (14¼ Lod, 24 ß lybsk) coinage lines structurally diverge. The Lybsk-aligned sub-Mark logic survives the end of the standard in 1571 — it migrates to Glückstadt under Christian IV (Krone-Mønt 1618+) and is formalised under Frederik III as the Rigsbankdaler standard (18½ Thaler per Cologne mark fine). Specimen coverage in our dataset is still incomplete — pending the §AZ paper-source import.'
      uk: '<b>8-Daler-Lybsk-Fod</b> — перший задокументований момент, у якому королівська (14½ Lod, 48 ß danske) та герцогська (14¼ Lod, 24 ß lybsk) монетні лінії структурно розходяться. Любекська sub-Mark-логіка переживає завершення стандарту 1571 — мігрує до Glückstadt за Кристіана IV (Krone-Mønt 1618+) і формалізується за Фредеріка III як стандарт Rigsbankdaler (18½ Thaler з кельнської марки чистого срібла). Покриття зразків у нашому наборі даних ще неповне — залежить від §AZ paper-source імпорту.'
  rhinsk_gylden_fod:
    pdate_label:
      de: 'Geltungsbereich: 1536 (Christian III, Roskilde) → 1632 (Christian IV) · 96 Jahre Belegfenster mit zwei Hiaten (27 Jahre 1536→1563, 61 Jahre 1564→1625)'
      en: 'Period of validity: 1536 (Christian III, Roskilde) → 1632 (Christian IV) · 96-year documented window with two hiatus periods (27 years 1536→1563, 61 years 1564→1625)'
      uk: 'Період дії: 1536 (Кристіан III, Роскілле) → 1632 (Кристіан IV) · 96-річне задокументоване вікно з двома паузами (27 років 1536→1563, 61 рік 1564→1625)'
    hintergrund:
      de: '<b>Dänische Königsmünz-Variante der Rhenish-Gulden-Tradition</b>, bereits 1536 unter Christian III. belegt und 1563 unter Frederik II. standardisiert als Handelsmünze für den deutsch-norddeutschen Markt; metrisch verankert im <b>Wormser Reichsabschied 1495</b> (72 Stück je Cölln. Marck rauh @ 18½ Karat / 770 ‰)<sup><a href="#ref29">[29]</a></sup>. Per Stück 3,248 g rauh / 2,501 g fein. Drei Phasen: <b>Phase 0</b> (Christian III. 1536, Roskilde) als früheste Belegspur — Galster 131 attestiert <b>0,764</b> Probe und 3,19 g Brutto / 2,44 g fein; danskmoent.dk vermerkt verbatim «<i>Roskilde, af Galster fejlagtigt henført til Gottorp</i>»<sup><a href="#ref29">[29]</a></sup>; <b>Phase I</b> (Frederik II 1563-1564, Hede f2h3 + f2h6) als Standardisierung am Reformations-Übergang; <b>Phase II</b> (Christian IV 1625-1632, Hede c4h29) als Kriegsfinanzierung des <b>Kaiserlich-Dänischen Krieges</b> (1625-1629), mit minimal abgesenkter Probe .76 (vs Phase-I-.77). Tarif ≈ 0,73 Reichsdukat per Feingewicht; keine starke Tarifbindung an Speciedaler oder Goldkrone — Marktmünze, nicht Tarifmünze. Standalone Müntzfuß-Stamm (NICHT Reichsdukatenfuß .986/3,44 g fein; NICHT Guldkrone .917-.934/5,50 g fein).'
      en: '<b>The Danish royal-mint variant of the Rhenish-Gulden tradition</b>, attested as early as 1536 under Christian III and standardised in 1563 under Frederik II as a trade coin for the German / northern-German market; metrically anchored in the <b>Worms Reichsabschied of 1495</b> (72 pieces per Cologne mark rough at 18½ carats / 770 ‰)<sup><a href="#ref29">[29]</a></sup>. Per piece 3.248 g rough / 2.501 g fine. Three phases: <b>Phase 0</b> (Christian III 1536, Roskilde) — earliest documented trace; Galster 131 attests <b>0.764</b> fineness and 3.19 g rough / 2.44 g fine; danskmoent.dk records verbatim «<i>Roskilde, af Galster fejlagtigt henført til Gottorp</i>» — Roskilde, Galster erroneously attributed to Gottorp<sup><a href="#ref29">[29]</a></sup>; <b>Phase I</b> (Frederik II 1563-1564, Hede f2h3 + f2h6) — standardisation at the Reformation transition; <b>Phase II</b> (Christian IV 1625-1632, Hede c4h29) — wartime financing of the <b>Imperial-Danish War</b> (1625-1629), at slightly reduced fineness .76 (vs Phase-I-.77). Tariff ≈ 0.73 Reichsdukat by fine weight; no strong tariff link to Speciedaler or Guldkrone — market coin, not tariff coin. Standalone Müntzfuß lineage (NOT Reichsdukatenfuß .986/3.44 g fine; NOT Guldkrone .917-.934/5.50 g fine).'
      uk: '<b>Данський королівсько-монетний варіант традиції Rhenish-Gulden</b>, задокументований уже 1536 р. за Кристіана III і стандартизований 1563 р. за Фредеріка II як торгова монета для німецько-північнонімецького ринку; метрично прив''язаний до <b>Wormser Reichsabschied 1495</b> (72 штуки з повної кельнської марки за 18½ карат / 770 ‰)<sup><a href="#ref29">[29]</a></sup>. На штуку 3,248 г повної / 2,501 г чистого. Три фази: <b>фаза 0</b> (Кристіан III 1536, Роскілле) — найраніший задокументований слід; Galster 131 засвідчує пробу <b>0,764</b> і 3,19 г повної / 2,44 г чистого; danskmoent.dk фіксує verbatim «<i>Roskilde, af Galster fejlagtigt henført til Gottorp</i>» — Роскілле, Galster помилково відніс до Gottorp<sup><a href="#ref29">[29]</a></sup>; <b>фаза I</b> (Фредерік II 1563-1564, Hede f2h3 + f2h6) — стандартизація на переході Реформації; <b>фаза II</b> (Кристіан IV 1625-1632, Hede c4h29) — фінансування <b>Імперсько-данської війни</b> (1625-1629), з мінімально зниженою пробою .76 (vs фаза-I-.77). Тариф ≈ 0,73 Reichsdukat за чистою вагою; без жорсткої тарифної прив''язки до Speciedaler чи Guldkrone — ринкова монета, не тарифна. Самостійна Müntzfuß-лінія (НЕ Reichsdukatenfuß .986/3,44 г чистого; НЕ Guldkrone .917-.934/5,50 г чистого).'
    closing_label:
      de: Zusammenfassung · 96 Jahre Rhenish-Gulden-Lineage in der dänischen Königsmünze
      en: Summary · 96 years of the Rhenish-Gulden lineage in the Danish royal mint
      uk: Підсумок · 96 років лінії Rhenish-Gulden у данській королівській монеті
    closing:
      de: 'Die <b>Rhinsk-Gyldenfod</b> ist eine eigenständige Müntzfuß-Familie der Rhenish-Gulden-Tradition, parallel zum Reichsdukatenfuß ohne Tarif-Bindung. Christian IIIs früheste Belegspur 1536 in Roskilde (Phase 0, .764), Frederik IIs Standardisierung 1563-1564 (Phase I, .77) und Christian IVs Kriegsphase 1625-1632 (Phase II, .76) belegen einen kontinuierlichen Standard mit zwei Hiat-Phasen. Mit dem Auslauf der Hauptphase 1632 und Christian IVs Pivot zur silbernen Krone-Mønt (Hebræermønt 1644, Glückstadter 10½-Krone-Fuß 1671) endet die Linie faktisch — Frederik III. setzt sie nicht fort.'
      en: '<b>Rhinsk-Gyldenfod</b> is a standalone Müntzfuß family of the Rhenish-Gulden tradition, parallel to the Reichsdukatenfuß without tariff binding. Christian III''s earliest documented trace 1536 in Roskilde (Phase 0, .764), Frederik II''s standardisation 1563-1564 (Phase I, .77) and Christian IV''s wartime phase 1625-1632 (Phase II, .76) document a continuous standard across two hiatus periods. With the end of the main phase in 1632 and Christian IV''s pivot to the silver Krone-Mønt (Hebræermønt 1644, Glückstadt 10½-Krone-Fuß 1671) the line effectively ends — Frederik III does not continue it.'
      uk: '<b>Rhinsk-Gyldenfod</b> — самостійна Müntzfuß-родина традиції Rhenish-Gulden, паралельна Reichsdukatenfuß без тарифної прив''язки. Найраніший задокументований слід Кристіана III 1536 у Роскілле (фаза 0, .764), стандартизація Фредеріка II 1563-1564 (фаза I, .77) і воєнна фаза Кристіана IV 1625-1632 (фаза II, .76) документують безперервний стандарт з двома паузами. Із завершенням головної фази 1632 та поворотом Кристіана IV до срібної Krone-Mønt (Hebræermønt 1644, ґлюкштадтський 10½-Krone-Fuß 1671) лінія фактично завершується — Фредерік III її не продовжує.'
  f2_guldkrone_fod:
    pdate_label:
      de: 'Geltungsbereich: 1563 → 1564 · 2 Jahre · Klipping-Notmünz-Emission der Nordischen Siebenjährigen Krieges'
      en: 'Period of validity: 1563 → 1564 · 2 years · Klipping emergency-coinage of the Northern Seven Years'' War'
      uk: 'Період дії: 1563 → 1564 · 2 роки · Klipping-надзвичайна емісія Північної Семирічної війни'
    hintergrund:
      de: '<b>Frederik IIs Klipping-Goldmünze 1563-1564 als Kriegsfinanzierung der <a href="https://www.historyofwar.org/articles/wars_nordic_seven_years.html" target="_blank">Nordischen Siebenjährigen Krieges</a></b> (1563-1570, der größten nationalen Krise von Frederiks II. Regierung)<sup><a href="#ref35">[35]</a></sup>. Hede f2h2 (1563, Unikat) und Hede f2h5 (1564)<sup><a href="#ref34">[34]</a></sup> sind rechteckige Klipping-Stücke aus <b>Kroneguld-Legierung</b> bei <b>934 ‰ Feingehalt</b>, 3,341 g Brutto / 3,120 g Feingewicht; ≈ 70 Stück je Cölln. Marck rauh. <b>Karbung 17. Oktober 1563 verbatim aus den Rentmeister-Rechnungen:</b> «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>»<sup><a href="#ref33">[33]</a></sup> — 4860 Stück aus 66½ Marck Kroneguld in Kopenhagen / Bremerholm, Mzm. Hans de Wüllers (1563), Hans Köppelin (1564), Laurits Hammer (1565). Reversinschrift <b>«I GOLT KRONE»</b> — parallel zu den Schwester-Klipping-Goldarten Ungersk Gylden («I DOK KATE», Reichsdukatenfuß) und Rhinsk Gylden («I GOLT GILDEN», Rhinsk-Gyldenfod). Drei parallele Goldarten in derselben Karbungs-Periode für drei Markt-Bestimmungen: imperialer Handelsreserve, deutsch-norddeutscher Handel, dänisch-königliche Kriegsfinanzierung. Modernes generisches «Kroneguld» wird heute als 22-Karat-Legierung (.9167) verstanden; Hedes f2h2/f2h5-Belegexemplare attestieren spezifisch <b>0,934</b> — ≈ 1,9 % über dem generischen Standard, möglicherweise Renaissance-Zeit-Variation.'
      en: '<b>Frederik II''s 1563-1564 Klipping gold coinage as wartime financing of the <a href="https://www.historyofwar.org/articles/wars_nordic_seven_years.html" target="_blank">Northern Seven Years'' War</a></b> (1563-1570, the greatest national crisis of Frederik II''s reign)<sup><a href="#ref35">[35]</a></sup>. Hede f2h2 (1563, unique) and Hede f2h5 (1564)<sup><a href="#ref34">[34]</a></sup> are rectangular Klipping pieces struck from <b>Kroneguld alloy</b> at <b>934 ‰ fineness</b>, 3.341 g rough / 3.120 g fine; ≈ 70 pieces per Cologne mark rough. <b>17 October 1563 coinage verbatim from the Rentmeister account records:</b> «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>»<sup><a href="#ref33">[33]</a></sup> — 4,860 pieces from 66½ marks of Kroneguld at Copenhagen / Bremerholm, mintmasters Hans de Wüllers (1563), Hans Köppelin (1564), Laurits Hammer (1565). Reverse inscription <b>«I GOLT KRONE»</b> — paralleling the sister Klipping gold types Ungersk Gylden («I DOK KATE», Reichsdukatenfuß) and Rhinsk Gylden («I GOLT GILDEN», Rhinsk-Gyldenfod). Three parallel gold types in the same coinage period serve three market roles: imperial trade reserve, German / northern-German trade, Danish-royal wartime financing. The modern generic «Kroneguld» is taken as the 22-karat alloy (.9167); Hede''s f2h2/f2h5 reference specimens specifically attest <b>0.934</b> — ≈ 1.9 % above the generic standard, possibly Renaissance-era variation.'
      uk: '<b>Klipping-золоте карбування Frederik II 1563-1564 як воєнне фінансування <a href="https://www.historyofwar.org/articles/wars_nordic_seven_years.html" target="_blank">Північної Семирічної війни</a></b> (1563-1570, найбільшої національної кризи правління Frederik II)<sup><a href="#ref35">[35]</a></sup>. Hede f2h2 (1563, унікат) і Hede f2h5 (1564)<sup><a href="#ref34">[34]</a></sup> — прямокутні Klipping-зразки зі сплаву <b>Kroneguld</b> при пробі <b>934 ‰</b>, 3,341 г повної / 3,120 г чистого; ≈ 70 штук з повної кельнської марки. <b>Карбування 17 жовтня 1563 verbatim з рент-майстерських рахунків:</b> «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>»<sup><a href="#ref33">[33]</a></sup> — 4860 штук з 66½ марок Kroneguld у Копенгагені / Bremerholm, монетмайстри Hans de Wüllers (1563), Hans Köppelin (1564), Laurits Hammer (1565). Реверс-напис <b>«I GOLT KRONE»</b> — паралельно сестринським Klipping-золотим типам Ungersk Gylden («I DOK KATE», Reichsdukatenfuß) і Rhinsk Gylden («I GOLT GILDEN», Rhinsk-Gyldenfod). Три паралельні золоті типи у тому самому періоді карбування слугують трьом ринковим ролям: імперський торговельний резерв, німецько-північнонімецька торгівля, дансько-королівське воєнне фінансування. Модерне родове «Kroneguld» сьогодні розуміють як 22-каратний сплав (.9167); еталонні зразки Hede f2h2/f2h5 специфічно засвідчують <b>0,934</b> — ≈ 1,9 % над родовим стандартом, можливо ренесансна варіація.'
    closing_label:
      de: Zusammenfassung · 2-Jahre Klipping-Notmünz-Emission · separater Müntzfuß-Stamm
      en: Summary · 2-year Klipping emergency-coinage emission · standalone Müntzfuß lineage
      uk: Підсумок · 2-річна Klipping-надзвичайна емісія · самостійна Müntzfuß-лінія
    closing:
      de: 'Die <b>Frederik-II-Guldkrone-fod</b> ist eine kurze (2-jährige), engstündige Klipping-Notmünz-Emission der frühen Phase der Nordischen Siebenjährigen Krieges. <b>Eigenständiger Müntzfuß-Stamm</b>, nicht zu verwechseln mit der späteren Tarif-Guldkrone Christians IV. und Frederiks III. (<code>guldkrone</code>, 1618-1668 mit eigener Tarif-Logik 3½ Speciedaler und kanonischen 5,996 g rauh / 5,498 g fein @ .917): 55-jähriger Belegfenster-Hiat zwischen 1564 und 1619; metrische Diskontinuität (kleines Klipping-Stück bei Frederik II. vs großes Tarif-Stück bei Christian IV.); funktionale Diskontinuität (Notmünze vs Tarif-Hauptkurant). Frederik II. wechselt für die restliche Kriegszeit (1565-1570) zu silbernen Klippinge und zum imperialen 9-Thaler-Fuß für Speciedaler ab 1566; die Krone-Goldlinie wird erst 1618 unter Christian IV. mit ganz anderer Metrik und Tarif-Logik wieder aufgenommen.'
      en: '<b>Frederik-II-Guldkrone-fod</b> is a brief (2-year), narrow Klipping emergency-coinage emission of the early phase of the Northern Seven Years'' War. <b>Standalone Müntzfuß lineage</b>, not to be confused with the later tariff Guldkrone of Christian IV and Frederik III (<code>guldkrone</code>, 1618-1668 with its own tariff logic 3½ Speciedaler and canonical 5.996 g rough / 5.498 g fine at .917): 55-year documented-window hiatus between 1564 and 1619; metric discontinuity (small Klipping piece under Frederik II vs large tariff piece under Christian IV); functional discontinuity (emergency coin vs tariff Hauptkurant). For the remainder of the war (1565-1570) Frederik II shifts to silver Klippings and to the imperial 9-Thaler-Fuß for Speciedaler from 1566; the Krone gold line is only resumed in 1618 under Christian IV with an entirely different metric and tariff logic.'
      uk: '<b>Frederik-II-Guldkrone-fod</b> — коротка (2-річна), вузька Klipping-надзвичайна емісія ранньої фази Північної Семирічної війни. <b>Самостійна Müntzfuß-лінія</b>, не плутати з пізнішою тарифною Guldkrone Кристіана IV і Фредеріка III (<code>guldkrone</code>, 1618-1668 з власною тарифною логікою 3½ Speciedaler та канонічними 5,996 г повної / 5,498 г чистого за .917): 55-річна пауза у задокументованому вікні між 1564 і 1619; метрична розривність (мала Klipping-штука за Frederik II vs велика тарифна штука за Christian IV); функційна розривність (надзвичайна монета vs тарифна Hauptkurant). На решту війни (1565-1570) Frederik II переходить до срібних Klippinge та до імперського 9-Thaler-Fuß для Speciedaler з 1566 р.; лінія Krone-золота відновлюється лише 1618 за Кристіана IV з геть іншою метрикою і тарифною логікою.'
  rosenobel_fod:
    pdate_label:
      de: 'Geltungsbereich: 1584 (Frederik II, Frederiksborg unikat) → 1611-1629 (Christian IV, Kopenhagen) · 45 Jahre Belegfenster mit 27-jährigem Hiat zwischen den Phasen'
      en: 'Period of validity: 1584 (Frederik II, Frederiksborg unique) → 1611-1629 (Christian IV, Copenhagen) · 45-year documented window with a 27-year hiatus between phases'
      uk: 'Період дії: 1584 (Frederik II, Frederiksborg унікат) → 1611-1629 (Christian IV, Копенгаген) · 45-річне задокументоване вікно з 27-річною паузою між фазами'
    hintergrund:
      de: '<b>Renaissance-Anpassung des englischen Rose-Noble-Modells in der dänischen Königsmünze.</b> Verbatim aus <a href="https://www.danskmoent.dk/1rosenob.htm" target="_blank">danskmoent.dk</a>: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>»<sup><a href="#ref39">[39]</a></sup>. Frederik II. prägt 1584 in <b>Frederiksborg</b> einen unikalen Rosenobel-Vorläufer bei klassisch-englischer Brutto-Masse 7,69 g (Hede 7B / Schou 2 / Sieg 29) — wahrscheinlich näher am englischen Original 7,78 g (Edward IV. 1465 Rose Noble). Christian IV. nimmt das Programm 1611 in Kopenhagen wieder auf — standardisiertes Brutto <b>8,994 g bei 20 Karat (.833) Probe = 7,492 g fein</b> per Stück (Hede c4h23a + c4h24 verbatim). Sub-Stückelung <b>½ Rosenobel</b> (Hede 24, 1611, period-Spitzname <i>«Guldridder»</i> = «Goldritter»). Hauptkarbungsperiode 1611-1613 fällt exakt mit dem <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">Kalmar-Krieg</a> (1611-1613)<sup><a href="#ref40">[40]</a></sup>: «<i>King Christian IV attacked Sweden in the 1611-13 Kalmar War but failed to accomplish his main objective of forcing Sweden to return to the union with Denmark. The war led to no territorial changes, but Sweden was forced to pay a war indemnity of 1 million silver riksdaler to Denmark.</i>» Folge-Karbung 1627 + 1629 fällt in den Beginn der dänischen Beteiligung am Dreißigjährigen Krieg (Kaiserlich-Dänischer Krieg 1625-1629). Funktion durchgehend: <b>Prestige-Goldemission zur Söldnerbezahlung und diplomatischen Repräsentation</b>, nicht Tagesumlauf. Tarif zum Speciedaler rechnerisch ≈ 3-4 Specie (kein period-attestierter formaler Tarif gefunden; pending §AX-Verifizierung gegen Wilcke / Bobzin / Period-Ordnung).'
      en: '<b>A Renaissance adaptation of the English Rose Noble model in the Danish royal mint.</b> Verbatim from <a href="https://www.danskmoent.dk/1rosenob.htm" target="_blank">danskmoent.dk</a>: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>»<sup><a href="#ref39">[39]</a></sup>. Frederik II strikes a unique Rosenobel predecessor at <b>Frederiksborg</b> in 1584 at the classical English brutto of 7.69 g (Hede 7B / Schou 2 / Sieg 29) — probably closer to the English original 7.78 g (Edward IV 1465 Rose Noble). Christian IV resumes the programme in Copenhagen in 1611 — standardised brutto <b>8.994 g at 20 carats (.833) fineness = 7.492 g fine</b> per piece (Hede c4h23a + c4h24 verbatim). Sub-denomination <b>½ Rosenobel</b> (Hede 24, 1611, period nickname <i>«Guldridder»</i> = «gold knight»). The main coinage period 1611-1613 coincides exactly with the <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">Kalmar War</a> (1611-1613)<sup><a href="#ref40">[40]</a></sup>: «<i>King Christian IV attacked Sweden in the 1611-13 Kalmar War but failed to accomplish his main objective of forcing Sweden to return to the union with Denmark. The war led to no territorial changes, but Sweden was forced to pay a war indemnity of 1 million silver riksdaler to Denmark.</i>» The follow-up coinage 1627 + 1629 falls within the start of Danish involvement in the Thirty Years'' War (Imperial-Danish War 1625-1629). Function throughout: <b>a prestige gold issue for mercenary pay and diplomatic representation</b>, not daily circulation. Tariff vs. Speciedaler computed ≈ 3-4 Specie (no period-attested formal tariff found; pending §AX verification against Wilcke / Bobzin / period ordinance).'
      uk: '<b>Ренесансна адаптація моделі англійського Rose Noble у данській королівській монеті.</b> Verbatim з <a href="https://www.danskmoent.dk/1rosenob.htm" target="_blank">danskmoent.dk</a>: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>»<sup><a href="#ref39">[39]</a></sup>. Frederik II карбує унікального попередника Rosenobel у <b>Frederiksborg</b> 1584 р. з класичною англійською повною вагою 7,69 г (Hede 7B / Schou 2 / Sieg 29) — імовірно ближче до англійського оригіналу 7,78 г (Edward IV 1465 Rose Noble). Christian IV відновлює програму в Копенгагені 1611 р. — стандартизована повна вага <b>8,994 г за 20 карат (.833) пробою = 7,492 г чистого</b> на штуку (Hede c4h23a + c4h24 verbatim). Субномінал <b>½ Rosenobel</b> (Hede 24, 1611, period-прізвисько <i>«Guldridder»</i> = «золотий лицар»). Головний період карбування 1611-1613 точно збігається з <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">Кальмарською війною</a> (1611-1613)<sup><a href="#ref40">[40]</a></sup>: «<i>King Christian IV attacked Sweden in the 1611-13 Kalmar War but failed to accomplish his main objective of forcing Sweden to return to the union with Denmark. The war led to no territorial changes, but Sweden was forced to pay a war indemnity of 1 million silver riksdaler to Denmark.</i>» Наступне карбування 1627 + 1629 припадає на початок данської участі у Тридцятилітній війні (Імперсько-данська війна 1625-1629). Функція впродовж: <b>престижна золота емісія для оплати найманців і дипломатичної репрезентації</b>, не щоденний обіг. Тариф до Speciedaler розрахунково ≈ 3-4 Specie (period-attested формального тарифу не знайдено; очікує §AX-уточнення проти Wilcke / Bobzin / period-ордонансу).'
    closing_label:
      de: Zusammenfassung · 45 Jahre Rose-Noble-Renaissance-Anpassung
      en: Summary · 45 years of Rose Noble Renaissance adaptation
      uk: Підсумок · 45 років ренесансної адаптації Rose Noble
    closing:
      de: 'Die <b>Rosenobel-fod</b> ist eine Sonderlinie der dänischen Prestige-Goldmünze über zwei Regenten mit unterschiedlicher Metrik: Frederik IIs einzelnes 1584-Stück folgt noch dem englischen Klassik-Standard (~7,78 g), während Christian IVs Massenkarbung 1611-1629 ein neues dänisches Standard-Format (8,994 g @ .833 = 7,492 g fein) etabliert. <em>Distinkter Müntzfuß-Stamm</em>, nicht zu verwechseln mit der zeitgenössischen <code>nobel_fod</code> (Sovereign-Tier 14,67 g @ .986, 1496-1532) oder der späteren <code>guldkrone</code>-Tarifmünze Christians IV (5,996 g @ .917, 1618+, eigene Tarif-Logik 3½ Speciedaler).'
      en: '<b>Rosenobel-fod</b> is a special line of Danish prestige gold coinage across two rulers with different metrics: Frederik II''s single 1584 piece still follows the classical English standard (~7.78 g), while Christian IV''s mass coinage 1611-1629 establishes a new Danish standard format (8.994 g at .833 = 7.492 g fine). <em>A distinct Müntzfuß lineage</em>, not to be confused with the contemporary <code>nobel_fod</code> (Sovereign tier 14.67 g at .986, 1496-1532) or the later <code>guldkrone</code> tariff coin of Christian IV (5.996 g at .917, 1618+, with its own 3½-Speciedaler tariff logic).'
      uk: '<b>Rosenobel-fod</b> — особлива лінія данського престижного золотого карбування через двох правителів з різною метрикою: окремий зразок Frederik II 1584 р. ще слідує класичному англійському стандарту (~7,78 г), тоді як масове карбування Christian IV 1611-1629 встановлює новий данський стандартний формат (8,994 г за .833 = 7,492 г чистого). <em>Окрема Müntzfuß-лінія</em>, не плутати з сучасною <code>nobel_fod</code> (Sovereign-tier 14,67 г за .986, 1496-1532) чи пізнішою тарифною <code>guldkrone</code> Christian IV (5,996 г за .917, 1618+, з власною тарифною логікою 3½ Speciedaler).'
  kronemont_chr_iv:
    pdate_label:
      de: 'Geltungsbereich: 1618 → 1624 · ca. 6 Jahre'
      en: 'Period of validity: 1618 → 1624 · ~6 years'
      uk: 'Період дії: 1618 → 1624 · ~6 років'
    hintergrund:
      de: Christian IVs kroner 1618–1624. Tarifmünze, 1618 als <i>Corona Danica</i> mit Anfangstarif 1½ Speciedaler eingeführt — eine fiskalische Maßnahme der Krone mit einem Seigniorage-Aufschlag von ca. 11 % über dem Silberwert<sup><a href="#ref8">[8]</a></sup>. Die Prägung endet 1624; im Folgejahr <b>1625</b> wird der Tarif offiziell auf 1⅓ Speciedaler gesenkt. Danach folgt eine 19-jährige Pause der Krone-Prägung biß zur Wiederaufnahme im 10½-Krone-Fuß (Glückstadt) 1644.<sup><a href="#ref1">[1]</a><a href="#ref2">[2]</a><a href="#ref3">[3]</a><a href="#ref4">[4]</a></sup>
      en: Christian IV's kroner 1618–1624. A tariff coin, introduced in 1618 as the <i>Corona Danica</i> at an initial tariff of 1½ Speciedaler — a Crown fiscal measure with a seigniorage premium of ca. 11 % above the silver value<sup><a href="#ref8">[8]</a></sup>. Production ends in 1624; in the following year, <b>1625</b>, the tariff is officially cut to 1⅓ Speciedaler. Thereafter a 19-year hiatus of Krone production follows, until the revival in the 10½-Krone-Fuß (Glückstadt) in 1644.<sup><a href="#ref1">[1]</a><a href="#ref2">[2]</a><a href="#ref3">[3]</a><a href="#ref4">[4]</a></sup>
      uk: Christian IV's kroner 1618–1624. Тарифна монета, запроваджена 1618 р. як <i>Corona Danica</i> за початковим тарифом 1½ Speciedaler — фіскальний інструмент Корони з сеньйораж­ною надбавкою бл. 11 % над срібною вартістю<sup><a href="#ref8">[8]</a></sup>. Карбування завершується 1624 р., наступного <b>1625</b> року тариф офіційно знижено до 1⅓ Speciedaler. Далі настає 19-річна перерва карбування Krone — аж до відновлення у 10½-Krone-Fuß (Glückstadt) 1644 р.<sup><a href="#ref1">[1]</a><a href="#ref2">[2]</a><a href="#ref3">[3]</a><a href="#ref4">[4]</a></sup>
    details:
      de: '<p>Die Christian-IV.-Krone war keine Handelsmünze nach Silbergehalt, sondern eine fiskalische Tarifmünze: ihr Nennwert wurde vom König per Mandat über dem tatsächlichen Silberwert festgesetzt, die Differenz floß als Seigniorage in die Staatskasse<sup><a href="#ref8">[8]</a></sup>.</p><p><b>Primärkanonische Hede-Formel</b><sup><a href="#ref4">[4]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ Stück je 13¾-lötiger Marck</b> = 18,909 g rau bei .859 Feingehalt = 16,250 g fein je Krone. Die Bruchform (12,367 statt 12½) ergibt sich daraus, daß der Münzedikt 1618 den Fuß über die <b>Daler-Ausbringung</b> definiert — den nominellen Gesamtwert in Speciedaler aus einer feinen Marck Silber als Krone-Münzen. Bei Anfangstarif 1½ Specie pro Doppelkrone (= ¾ Specie pro Krone) ergeben 233,856 g Feinsilber 14,391 Krone, deren Nennwert sich auf 10,793 Speciedaler addiert (Hede H105<sup><a href="#ref4">[4]</a></sup>). Nach der Forordning vom 14. Februar 1624 wird die Specie selbst auf 100 Skilling neu tarifiert; die physische Krone bleibt unverändert, aber dieselbe Marck Feinsilber bringt nach der neuen Specie-Skala nur noch 10,361 Speciedaler aus (Hede H124<sup><a href="#ref4">[4]</a></sup>).</p><p>1618 wurde nur die 2 Krone (damals einfach «Krone» genannt) nach dieser Formel geprägt; ½, ¼ und ⅛ Krone des Jahres 1618 folgten einer leicht niedrigeren Münzfod. Ab 1619 prägt auch die ½ Krone nach der Hauptformel<sup><a href="#ref4">[4]</a></sup>.</p><p>Spezialliteratur zur Christian-IV.-Phase: Hede / Schou (H105–H107, H124–H126); Bruun-Lots 13089 ff. (Stack''s Bowers Auktion Part II, Zürich 14.–15. März 2025).</p>'
      en: '<p>The Christian IV Krone was not a trade coin valued by silver content but a fiscal tariff coin: its face value was set by royal mandate above the actual silver value, the gap accruing to the treasury as seigniorage<sup><a href="#ref8">[8]</a></sup>.</p><p><b>Primary catalogue formula (Hede)</b><sup><a href="#ref4">[4]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ pieces per 13¾-lødig mark</b> = 18.909 g rough at .859 fineness = 16.250 g fine per Krone. The fractional form (12.367 rather than 12½) follows from the 1618 mint edict defining the standard via the <b>daler output</b> — the total face value, expressed in Speciedaler, that one fine mark of silver yields once struck into Krone coin. At the initial tariff of 1½ Specie per Doppelkrone (= ¾ Specie per Krone), 233.856 g of fine silver yields 14.391 Krone, whose face values add up to 10.793 Speciedaler (Hede H105<sup><a href="#ref4">[4]</a></sup>). After the Forordning of 14 February 1624 the Specie itself is re-rated to 100 Skilling; the physical Krone is unchanged, but on the new Specie scale the same fine mark now yields only 10.361 Speciedaler (Hede H124<sup><a href="#ref4">[4]</a></sup>).</p><p>In 1618 only the 2 Krone (then simply called «Krone») was struck on this formula; the ½, ¼ and ⅛ Krone of 1618 followed a slightly lower Münzfod. From 1619 the ½ Krone also follows the main formula<sup><a href="#ref4">[4]</a></sup>.</p><p>Specialist literature on the Christian IV phase: Hede / Schou (H105–H107, H124–H126); Bruun lots 13089 ff. (Stack''s Bowers auction Part II, Zurich 14–15 March 2025).</p>'
      uk: '<p>Krone Кристіана IV не була торговельною монетою за вмістом срібла, а фіскальною тарифною: її номінал встановлювався королівським мандатом вище фактичної срібної вартості, різниця надходила до скарбниці як сеньйораж<sup><a href="#ref8">[8]</a></sup>.</p><p><b>Першоджерельна Hede-формула</b><sup><a href="#ref4">[4]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ штук з 13¾-lødig марки</b> = 18,909 г повної ваги за проби .859 = 16,250 г чистого на Krone. Дробова форма (12,367 замість 12½) випливає з того, що монетний едикт 1618 р. задавав стопу через <b>вихід у даллерах (daler-udbringning)</b> — сумарну номінальну вартість у Speciedaler, яку одна марка чистого срібла «приносила» при карбуванні в Krone-монети. За початкового тарифу 1½ Specie на Doppelkrone (= ¾ Specie на одну Krone) з 233,856 г чистого срібла виходить 14,391 Krone, сумарна номінальна вартість яких становить 10,793 Speciedaler (Hede H105<sup><a href="#ref4">[4]</a></sup>). Після Forordning 14 лютого 1624 р. сам Specie перетарифовано на 100 Skilling; фізично Krone лишається без змін, але та сама марка чистого срібла за новою Specie-шкалою «приносить» уже лише 10,361 Speciedaler (Hede H124<sup><a href="#ref4">[4]</a></sup>).</p><p>1618 р. за цією формулою карбувалась лише 2 Krone (тоді просто «Krone»); ½, ¼ та ⅛ Krone 1618 р. йшли за дещо нижчою møntfod. З 1619 р. ½ Krone теж переходить на головну формулу<sup><a href="#ref4">[4]</a></sup>.</p><p>Спеціальна література по фазі Кристіана IV: Hede / Schou (H105–H107, H124–H126); лоти Bruun 13089 і далі (Stack''s Bowers auction Part II, Цюрих 14–15 березня 2025).</p>'
  reichsdukatenfuss:
    pdate_label:
      de: 'Geltungsbereich: 1481 (Hans I de facto) → 1876 (Reichsmünzgesetz Demonetisation) · 395 Jahre Hungarian-Venetian Dukat-Tradition in der dänisch-norwegischen Königsmünze'
      en: 'Period of validity: 1481 (Hans I de facto) → 1876 (Reichsmünzgesetz demonetisation) · 395 years of the Hungarian-Venetian Dukat tradition in the Danish-Norwegian royal mint'
      uk: 'Період дії: 1481 (Hans I де факто) → 1876 (Reichsmünzgesetz демонетизація) · 395 років Hungarian-Venetian Dukat-традиції у дансько-норвезькій королівській монеті'
    hintergrund:
      de: 'Reichsdukatenfuß der Augsburger Reichsmünzordnung vom 19. August 1559: 67 Dukaten aus der feinen Cöllnischen Marck (233,856 g). Im Königreich Dänemark fortgeführt durch das gesamte 17.–18. Jahrhundert. Die hier erfaßten drei Stücke fallen in die Periode 1726–1771 mit der parallelen Etablierung des Courantdukat neben dem Reichsdukat.'
      en: 'Reichsdukatenfuß under the Augsburg Imperial Coinage Ordinance of 19 August 1559: 67 ducats from the fine Cologne mark (233.856 g). Continued in the Kingdom of Denmark throughout the 17th–18th century. The three pieces catalogued here fall within the period 1726–1771, when the Courantdukat is established alongside the Reichsdukat.'
      uk: 'Reichsdukatenfuß за Аугсбурзькою імперською монетною постановою 19 серпня 1559 р.: 67 дукатів з чистої кельнської марки (233,856 г). У Королівстві Данія дія тривала впродовж усього 17–18 ст. Три каталогізовані тут монети належать до періоду 1726–1771 рр., коли Courantdukat утверджується поряд із Reichsdukat.'
  courantdukatenfuss:
    pdate_label:
      de: 'Geltungsbereich in Dänemark: 1714 (Frederik IV., Großer Nordischer Krieg) → 1796 (letzte Restprägung) · 82 Jahre Neuprägung; faktischer Zahlungsmittelstatus biß 1873 (Skandinavische Münzunion)'
      en: 'In force in Denmark: 1714 (Frederik IV, Great Northern War) → 1796 (last restrike) · 82 years of new coinage; factual legal-tender status until 1873 (Scandinavian Monetary Union)'
      uk: 'Дія в Данії: 1714 (Frederik IV, Велика Північна війна) → 1796 (останнє рестрайк-карбування) · 82 роки нових емісій; фактичний статус законного платіжного засобу до 1873 (Скандинавська монетна унія)'
    hintergrund:
      de: 'Spezifisch dänische tarif-tragende Goldlinie, die in <b>zwei metrischen Phasen</b> verläuft. <b>Phase I — Frederik IV. (1714–1717):</b> Erstprägung als Kriegsfinanzierungsmaßnahme im Großen Nordischen Krieg, 81½ Stück / rauer Cölln. Marck, 21 Karat (.875), 2,511 g Feingold; Tarif 12 Mark Kurant = 2 Rigsdaler Courant. Forordning <b>9. Juli 1727</b> senkt Tarif auf 11 Mark («reducerede Kurant-Dukater»); Forordning <b>4. Juli 1757</b> ruft die alten Stücke zur Einschmelzung ein.<sup><a href="#ref36">[36]</a></sup> <b>Phase II — Frederik V. Reform (1757–1796):</b> im Juni 1757 neuer Standard 75 Stück / Marck, 3,118 g rau, 2,72832 g fein; 12-Mark-Tarif zurück. Massenprägung 1757–1765 in Kopenhagen: <b>≈ 3 030 742 Stück</b> (Finanzkollegium 1791) — die größte Goldmünzproduktion in der dänischen Geschichte (≈ 8,3 t Feingold).<sup><a href="#ref36">[36]</a></sup> Christian-VII.-Geburtstagsstrich 27. Januar 1771 (131 Stück Kopenhagen). <b>Plakat 2. Dezember 1782</b> erlaubt jedermann die freie Goldablieferung zur Kurantdukat-Prägung («<i>Gold aus der rauen Marck zu 75 Stück bei 21 Karat ausprägen</i>»)<sup><a href="#ref38">[38]</a></sup> — Hauptphase 1781–1796 in Altona + Kopenhagen, ≈ 237 000 Stück. Plakat-Widerruf 1795; letzte Prägung 1796 in Altona (≈ 30 700 Stück mit 1785-Datum).<sup><a href="#ref36">[36]</a></sup> Der Statsbankerot vom 5. Januar 1813 reformiert nur die Silber-Courantlinie<sup><a href="#ref40">[40]</a></sup>; der Kurantdukat behält rechtlich Zahlungsmittelstatus zum 12-Mark-Tarif biß zur Skandinavischen Münzunion 1873.

        '
      en: 'A specifically Danish tariff-bearing gold line in <b>two metric phases</b>. <b>Phase I — Frederik IV (1714–1717):</b> first issue as a war-finance measure in the Great Northern War; 81½ pieces per rough Cologne Mark, 21 carats (.875), 2.511 g fine gold; tariff 12 Mark Kurant = 2 Rigsdaler Courant. The Forordning of <b>9 July 1727</b> reduces the tariff to 11 Mark («reducerede Kurant-Dukater»); the Forordning of <b>4 July 1757</b> calls the old pieces in for melting.<sup><a href="#ref36">[36]</a></sup> <b>Phase II — Frederik V reform (1757–1796):</b> in June 1757 a new standard of 75 pieces per Mark, 3.118 g rough, 2.72832 g fine; the 12-Mark tariff is restored. Mass coinage 1757–1765 at Copenhagen: <b>≈ 3,030,742 pieces</b> (Finanzkollegium 1791) — the largest gold-coin production in Danish history (≈ 8.3 t fine gold).<sup><a href="#ref36">[36]</a></sup> Christian-VII-birthday strike on 27 January 1771 (131 pieces, Copenhagen). <b>Plakat of 2 December 1782</b> permits anyone to deliver gold freely for Kurantdukat coinage («<i>gold to be coined at 75 pieces per rough Mark of 21 carats</i>»)<sup><a href="#ref38">[38]</a></sup> — the main phase 1781–1796 in Altona + Copenhagen, ≈ 237,000 pieces. The plakat is revoked in 1795; the final issue is 1796 in Altona (≈ 30,700 pieces with 1785 dies).<sup><a href="#ref36">[36]</a></sup> The Statsbankerot of 5 January 1813 reforms only the silver Courant line<sup><a href="#ref40">[40]</a></sup>; the Kurantdukat retains legal-tender status at the 12-Mark tariff until the Scandinavian Monetary Union of 1873.'
      uk: 'Специфічно данська тариф-несуча золота лінія у <b>двох метричних фазах</b>. <b>Фаза I — Frederik IV (1714–1717):</b> перша емісія як засіб фінансування Великої Північної війни; 81½ штук з повної Кельнської марки, 21 карат (.875), 2,511 г чистого золота; тариф 12 Mark Kurant = 2 Rigsdaler Courant. Forordning <b>9 липня 1727</b> знижує тариф до 11 Mark («reducerede Kurant-Dukater»); Forordning <b>4 липня 1757</b> кличе старі монети на переплав.<sup><a href="#ref36">[36]</a></sup> <b>Фаза II — реформа Frederik V (1757–1796):</b> у червні 1757 новий стандарт 75 штук з марки, 3,118 г повної, 2,72832 г чистого; тариф 12 Mark відновлено. Масове карбування 1757–1765 у Копенгагені: <b>≈ 3 030 742 шт.</b> (Finanzkollegium 1791) — найбільше виробництво золотих монет в історії Данії (≈ 8,3 т чистого золота).<sup><a href="#ref36">[36]</a></sup> Меморіальний strike Christian VII 27 січня 1771 (131 шт. Копенгаген). <b>Plakat 2 грудня 1782</b> дозволяє будь-кому вільно здавати золото на карбування Kurantdukat («<i>золото карбувати по 75 штук з повної марки при 21 караті</i>»)<sup><a href="#ref38">[38]</a></sup> — головна фаза 1781–1796 в Альтоні + Копенгагені, ≈ 237 000 шт. Plakat скасовано 1795; останнє карбування 1796 в Альтоні (≈ 30 700 шт. зі штемпелями 1785).<sup><a href="#ref36">[36]</a></sup> Statsbankerot 5 січня 1813 реформує лише срібну Courant-лінію<sup><a href="#ref40">[40]</a></sup>; Kurantdukat юридично зберігає статус законного платіжного засобу за 12-Mark-тарифом до Скандинавської монетної унії 1873.'
    closing_label:
      de: Zusammenfassung · 82 Jahre Neuprägung, biß 1873 Tarif-Zahlungsmittel
      en: Summary · 82 years of new coinage, legal-tender at tariff until 1873
      uk: Підсумок · 82 роки нового карбування, до 1873 тарифний платіжний засіб
    closing:
      de: 'Der Courantdukatenfuß ist die <b>spezifisch dänische Antwort</b> auf das Problem einer domestizierten Goldwährung neben dem Reichsdukat: ein tariffierter, niedriger probiger (.875) Dukat zum festen 12-Mark-Wert, gegenüber dem höheren-probigen (.986) freien Reichsdukat. Über die ganze Phase II (1757–1796) ist er die <b>«almindeligst gangbare Guldmønt»</b> in Dänemark<sup><a href="#ref36">[36]</a></sup> — dominantes Goldgeld der Krone. In den Herzogtümern Schleswig-Holstein dient er ab 1771 als territoriale Goldversorgung der Altonaer Münze.<sup><a href="#ref37">[37]</a></sup> Keine formale Demonetisierungsverordnung; faktischer Endpunkt 1873 mit der Krone-Reform.

        '
      en: 'The Courantdukatenfuß is the <b>specifically Danish answer</b> to the problem of a domesticated gold currency alongside the Reichsdukat: a tariffed, lower-fineness (.875) ducat at the fixed 12-Mark value, set against the higher-fineness (.986) free-floating Reichsdukat. Throughout Phase II (1757–1796) it is the <b>«almindeligst gangbare Guldmønt»</b> in Denmark<sup><a href="#ref36">[36]</a></sup> — the Crown''s dominant gold currency. In the duchies of Schleswig-Holstein it serves from 1771 onward as the Altona mint''s territorial gold supply.<sup><a href="#ref37">[37]</a></sup> No formal demonetisation ordinance; the factual endpoint is 1873 with the Krone reform.'
      uk: 'Courantdukatenfuß — <b>специфічно данська відповідь</b> на проблему домашньої золотої валюти поруч з Reichsdukat: тарифний дукат із нижчою пробою (.875) за фіксованою вартістю 12 Mark проти вільноторгового вищопробного (.986) Reichsdukat. Протягом усієї фази II (1757–1796) він є <b>«almindeligst gangbare Guldmønt»</b> у Данії<sup><a href="#ref36">[36]</a></sup> — домінантна золота валюта Корони. У герцогствах Шлезвіг-Гольштейн з 1771 р. слугує територіальним золотим забезпеченням Альтонського монетного двору.<sup><a href="#ref37">[37]</a></sup> Формальної демонетизаційної постанови нема; фактичний кінець — 1873 р. з реформою Krone.'
  pistolenfuss:
    pdate_label:
      de: 'Geltungsbereich in Dänemark: 1771 (Christian VII., Altonaer Münze) → 1870 (Christian IX., letzte Christian-d''or-Prägung) · 99 Jahre'
      en: 'In force in Denmark: 1771 (Christian VII, Altona mint) → 1870 (Christian IX, last Christian d''or issue) · 99 years'
      uk: 'Дія в Данії: 1771 (Christian VII, монетний двір Альтона) → 1870 (Christian IX, остання емісія Christian d''or) · 99 років'
    hintergrund:
      de: 'Pistolen-Goldlinie nach norddt. <b>5-Thaler-Tarif</b>-Tradition (Vorbild Wilhelm d''or 1737, Friedrich d''or 1741<sup><a href="#ref32">[32]</a></sup>). In Dänemark eingeführt 1771 unter Christian VII. an der neu eröffneten Altonaer Münze als <b>Christian d''or</b> nach französischem Louis-d''or-Vorbild<sup><a href="#ref33">[33]</a></sup> — derselbe Standard wie der reduzierte preußische Friedrich d''or (130/144 Probe ≈ 903 ‰, 6,03 g Feingold, 5-Speciedaler-Tarif = 12 Mark Dansk-Anteil). Die Linie wird kontinuierlich unter <b>fünf Regenten</b> fortgeführt: Christian VII. (1771–1808), Frederik VI. (1808–1839, von 1808 als Frederik d''or — fortgesetzt trotz Statsbankerot 1813), Christian VIII. (1839–1848), Frederik VII. (1848–1863), Christian IX. (1863–1870, letzte Prägung 1870). Verwendung «<i>mest til internationale betalinger</i>»<sup><a href="#ref33">[33]</a></sup> — Außenhandelsmünze, kein gesetzliches Zahlungsmittel im Inland. Ende: dänisches Münzgesetz 1873 (Skandinavische Münzunion) ersetzt Speciedaler / d''or durch die Krone.

        '
      en: 'Pistole gold line of the North-German <b>5-thaler tariff</b> tradition (modelled on the Wilhelm d''or of 1737 and Friedrich d''or of 1741<sup><a href="#ref32">[32]</a></sup>). Introduced in Denmark in 1771 under Christian VII at the newly opened Altona mint as the <b>Christian d''or</b>, on the French Louis-d''or model<sup><a href="#ref33">[33]</a></sup> — at the same standard as the reduced Prussian Friedrich d''or (130/144 fineness ≈ 903 ‰, 6.03 g fine gold, 5-Speciedaler tariff = 12 Mark Dansk-share). The line continues without interruption under <b>five rulers</b>: Christian VII (1771–1808), Frederik VI (1808–1839, from 1808 as the Frederik d''or — kept on through the Statsbankerot of 1813), Christian VIII (1839–1848), Frederik VII (1848–1863), Christian IX (1863–1870, last issue 1870). Used «<i>mest til internationale betalinger</i>»<sup><a href="#ref33">[33]</a></sup> — a foreign-trade coin, not domestic legal tender. End: the Danish Coinage Act of 1873 (Scandinavian Monetary Union) replaces the Speciedaler / d''or with the Krone.'
      uk: 'Pistolen-золота лінія північно-німецької тарифної традиції <b>5 талерів</b> (зразки Wilhelm d''or 1737 і Friedrich d''or 1741<sup><a href="#ref32">[32]</a></sup>). У Данії запроваджено 1771 р. за Christian VII у новому монетному дворі Альтони як <b>Christian d''or</b> за зразком французького Louis d''or<sup><a href="#ref33">[33]</a></sup> — за тим самим стандартом, що й редукований прусський Friedrich d''or (проба 130/144 ≈ 903 ‰, 6,03 г чистого золота, тариф 5 Speciedaler = частка 12 Mark Dansk). Лінія безперервно продовжується за <b>п''яти регентів</b>: Christian VII (1771–1808), Frederik VI (1808–1839, з 1808 як Frederik d''or — продовжено попри Statsbankerot 1813), Christian VIII (1839–1848), Frederik VII (1848–1863), Christian IX (1863–1870, остання емісія 1870). Вживалися «<i>mest til internationale betalinger</i>»<sup><a href="#ref33">[33]</a></sup> — як зовнішньоторговельна, не як внутрішній законний платіжний засіб. Кінець: данський Закон про монету 1873 (Скандинавська монетна унія) замінює Speciedaler / d''or на Krone.'
  9_thaler:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 1566 (Augspurger Reichsmünz-Abschied) → 1625 (letzte Prägung; ab 1622 parallel vom 9¼-Fuß abgelöst) · 59 Jahre'
      en: 'In force in Holstein: 1566 (Augsburg Imperial Mint Decree) → 1625 (last strike; from 1622 already being superseded in parallel by the 9¼-Fuß) · 59 years'
      uk: 'Дія в Гольштейні: 1566 (Авґсбурзький імперський монетний ордонанс) → 1625 (останнє карбування; з 1622 паралельно витісняється 9¼-Fuß) · 59 років'
    hintergrund:
      de: 'Reichsstandard nach dem Augspurger Reichsmüntz-Abschied vom 30. Mai 1566 — verbindlich für sämtliche Reichsstände. In Holstein-Gottorp dominierte er unter Adolf I., Johann Adolf und Friedrich III.; Münzstätten Glückstadt und Tönning prägten nach diesem Fuß Thaler Species, Mark-lübisch-Theilstücke und Schillinge. Während der Kipper-Wipper-Krise (1620–1623) brach das einheitliche Reichsmünzwesen zusammen — bereits ab 1622 (Friedrich III. von Gottorp, Glückstadt) setzt sich der leichtere 9¼-Thaler-Fuß als Großsilberstandard durch, die letzte holsteinische 9-Fuß-Prägung erfolgt 1625 (Hans Jr. von Sonderburg, 2 Schilling Lübisch). <b>Über Holstein hinaus blieb der 9-Fuß als Banktauschmünze in Kraft:</b> Hamburg führte ihn als <i>Bank-Mark</i> der Hamburger Bank weiter, Lübeck als <i>Speciemark</i> — beide bis zur Reichsmünzreform 1875.

        '
      en: Imperial standard following the Augsburg Imperial Mint Decree of 30 May 1566 — binding on all imperial estates. In Holstein-Gottorp it dominated under Adolf I, Johann Adolf and Friedrich III; the Glückstadt and Tönning mints struck Thaler Species, Mark-lübisch sub-units and Schilling petty coins on this standard. The Kipper-Wipper crisis (1620–1623) collapsed the unified imperial coinage; from 1622 onward (Friedrich III of Gottorp, Glückstadt) the lighter 9¼-Thaler-Fuß took over as the large-silver standard, and the last Holstein 9-Fuß strike falls in 1625 (Hans Jr. of Sonderburg, 2 Schilling Lübisch). <b>Beyond Holstein the 9-Fuß remained in force as bank-exchange money:</b> Hamburg kept it as the <i>Bank-Mark</i> of the Hamburger Bank, Lübeck as the <i>Speciemark</i> — both until the imperial coinage reform of 1875.
      uk: Імперський стандарт за Авґсбурзьким імперським монетним ордонансом 30 травня 1566 р. — обов'язковий для всіх імперських станів. У Гольштейн-Ґотторпі домінував за Адольфа I, Йоганна Адольфа й Фредеріка III; монетні двори Glückstadt і Tönning карбували за цим стандартом Thaler Species, частки Mark lübisch і дрібні Schilling-монети. Криза Kipper-Wipper (1620–1623) зруйнувала єдину імперську монетну систему — вже з 1622 (Фредерік III Ґотторпський, Glückstadt) у Гольштейні утверджується легший 9¼-Thaler-Fuß як великосрібний стандарт, а останнє 9-Fuß-карбування припадає на 1625 р. (Hans Jr. Sonderburg, 2 Schilling Lübisch). <b>Поза Гольштейном 9-Fuß продовжував існувати як банковий рахунок:</b> Гамбург тримав його як <i>Bank-Mark</i> Гамбурзького банку, Любек — як <i>Speciemark</i>; обидва до імперської монетної реформи 1875 р.
    closing_label:
      de: Übergang zum 9¼-Fuß (Thaler Species) ab 1622, letzte Holstein-Prägung 1625
      en: Transition to the 9¼-Fuß (Thaler Species) from 1622; last Holstein strike 1625
      uk: Перехід до 9¼-Fuß (Thaler Species) з 1622; останнє карбування в Гольштейні — 1625
    closing:
      de: 'Der 9-Thaler-Fuß war kurzlebig in Holstein selbst (Adolf I. → Hans Jr. Sonderburg, letzte Prägung 1625; ab 1622 vom 9¼-Fuß abgelöst), bleibt aber <b>außerhalb Holsteins als Hamburger Bank-Mark und Lübecker Speciemark Rechnungseinheit biß 1875</b>. Die holsteinischen Reichsthaler unter Johann Adolf gehören zu den frühesten dokumentierten Großsilbermünzen der Region und bilden die Grundlage für die spätere 9¼-Fuß-Tradition.

        '
      en: The 9-Thaler-Fuß was short-lived in Holstein itself (Adolf I → Hans Jr. of Sonderburg, last strike 1625; superseded by the 9¼-Fuß from 1622), but it survived <b>beyond Holstein as the Hamburg Bank Mark and the Lübeck Speciemark unit of account until 1875</b>. The Holstein Reichsthaler under Johann Adolf are among the earliest documented large-silver coins in the region and form the foundation for the later 9¼-Fuß tradition.
      uk: 9-Thaler-Fuß у самому Гольштейні був недовговічним (Адольф I → Hans Jr. Sonderburg, останнє карбування 1625; з 1622 витіснений 9¼-Fuß), однак <b>поза Гольштейном залишався розрахунковою одиницею як Гамбурзька Bank-Mark і Любецька Speciemark до 1875 р.</b> Гольштинські рейхсталери за Йоганна Адольфа належать до найдавніших задокументованих великосрібних монет регіону і становлять основу пізнішої традиції 9¼-Fuß.
  9_25_thaler:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 1622 (Friedrich III.) → 24. Aug. 1866 (preuß. Annexion) · 244 Jahre'
      en: 'In force in Holstein: 1622 (Friedrich III) → 24 Aug. 1866 (Prussian annexation) · 244 years'
      uk: 'Дія в Гольштейні: 1622 (Фредерік III) → 24 серпня 1866 (прусська анексія) · 244 роки'
    hintergrund:
      de: 'Großsilbermünze nach dänisch-holsteinischer Tradition; etwas leichter als der Reichs-9-Fuß. Durchgehend stabil seit 1622 (Friedrich III. von Gottorp, Glückstadt) biß zur preußischen Annexion 1867. Mit der Schleswig-Holsteinischen Reform von 1788 (siehe Phase C) wird er zur Alleingrundmünze aller holsteinischen Courant-Nominale.

        '
      en: A large silver coin in the Danish-Holstein tradition; slightly lighter than the imperial 9-Fuß. Stable without interruption since 1622 (Friedrich III of Gottorp, Glückstadt) until the Prussian annexation of 1867. With the Schleswig-Holstein reform of 1788 (see Phase C) it becomes the sole base coin of all Holstein Courant denominations.
      uk: Велика срібна монета дансько-гольштинської традиції; дещо легша за імперський 9-Fuß. Безперервно стабільна з 1622 р. (Фредерік III Ґотторпський, Glückstadt) до прусської анексії 1867 р. З Шлезв.-Гольштинською реформою 1788 р. (див. Фазу C) стає єдиною базовою монетою для всіх гольштинських Courant-номіналів.
    closing_label:
      de: Zusammenfassung · 240 Jahre Geltung
      en: Summary · 240 years in force
      uk: Підсумок · 240 років чинності
    closing:
      de: 'Der 9¼-Thaler-Fuß ist der <b>längstlebige und stabilste</b> Silberstandard in der holsteinischen Geldgeschichte. Über politische Umwälzungen hinweg (Gottorp-Vereinigung 1773, Staatsbankrott 1813, mehrere Herrscherwechsel, Kondominium 1864<sup><a href="#ref11">[11]</a></sup>) blieb der Feingehalt von 25,28173 g konstant. Erst die preußische Annexion 1866 beendet seine Funktion als gesetzliches Zahlmittel. Numismatisch wirkt er biß 1907 nach, als der letzte Vereinsthaler (nachfolger-Fuß) ausser Kurs gesetzt wird.

        '
      en: The 9¼-Thaler-Fuß is the <b>longest-lived and most stable</b> silver standard in Holstein's monetary history. Through every political upheaval (the Gottorp union of 1773, the state bankruptcy of 1813, several royal successions, the condominium of 1864<sup><a href="#ref11">[11]</a></sup>) the fine weight of 25.28173 g remained unchanged. Only the Prussian annexation of 1866 ended its function as legal tender. Numismatically it lived on until 1907, when the last Vereinsthaler (its successor standard) was withdrawn from circulation.
      uk: 9¼-Thaler-Fuß — <b>найдовговічніший і найстабільніший</b> срібний стандарт у грошовій історії Гольштейну. Через усі політичні переломи (обʼєднання з Готторпом 1773, державне банкрутство 1813, кілька зміни правителів, кондомініум 1864<sup><a href="#ref11">[11]</a></sup>) чиста вага 25,28173 г залишалася незмінною. Лише прусська анексія 1866 поклала край його статусу законного платіжного засобу. Нумізматично він діяв до 1907 року, коли останній Vereinsthaler (стопа-наступник) було вилучено з обігу.
  kronemont:
    pdate_label:
      de: 'Geltungsbereich: 1644 → 1696 · ca. 52 Jahre'
      en: 'Period of validity: 1644 → 1696 · ~52 years'
      uk: 'Період дії: 1644 → 1696 · ~52 років'
    hintergrund:
      de: 'Silberne Tarifmünze des dänisch-norwegischen Verbunds. Die Krone-Tarifprägung beginnt 1618 unter Christian IV. mit der <i>Corona Danica</i> (eigene Münzformel, höhere Lötigkeit und höherer Tarif pro Krone als der spätere 10½-Krone-Fuß). 1644 wird in Glückstadt während des Torstenson-Krieges (1643–1648) die <b>Hebræermønt</b> ausgegeben — eine Kriegsmünze mit deutlich unterwertigem Silbergehalt, deren Feingehalt absichtlich verschleiert wurde; eine formelle Münzfuß-Ordnung lag dieser Phase nicht zugrunde<sup><a href="#ref7">[7]</a></sup>. Der reguläre <b>10½-Krone-Fuß</b> wird formell erst durch die Münzordnung Christians V. vom <b>22. März 1671</b> festgelegt: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» je Marck Feinsilber<sup><a href="#ref6">[6]</a></sup>. Dieselbe Ordnung verankert die Speciemønt mit 9¼ rd. je Marck als Hauptstandard; die Krone gilt ausdrücklich als untergeordnete, sekundäre Münzfuß-Stufe und erreicht zu keiner Zeit Parität mit dem Specie als Primärstandard<sup><a href="#ref6">[6]</a></sup>. Im Tagesumlauf verdrängte die übertarifierte Krone den Speciedaler nach Greshamschem Mechanismus: gute Specietaler wurden für Auslandszahlungen einbehalten und gelangten kaum in den inländischen Verkehr<sup><a href="#ref4">[4]</a></sup><sup><a href="#ref8">[8]</a></sup>.'
      en: 'Silver tariff coin of the Danish-Norwegian composite state. Krone tariff coinage begins in 1618 under Christian IV with the <i>Corona Danica</i> (a separate coin formula, with higher fineness and a higher per-Krone tariff than the later 10½-Krone-Fuß). In 1644, during the Torstenson War (1643–1648), the <b>Hebræermønt</b> is issued at Glückstadt — a war coinage substantially under-weight, with the fineness deliberately concealed; this phase rested on no formal Münzfuß ordinance<sup><a href="#ref7">[7]</a></sup>. The regular <b>10½-Krone-Fuß</b> is formally established only by Christian V''s Mint Ordinance of <b>22 March 1671</b>: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» per mark of fine silver<sup><a href="#ref6">[6]</a></sup>. The same ordinance anchors Speciemønt at 9¼ rd. per mark as the principal standard; the Krone is explicitly a subordinate, secondary Münzfuß tier and never achieves parity with Specie as a primary standard<sup><a href="#ref6">[6]</a></sup>. In day-to-day circulation the over-tariffed Krone displaced the Speciedaler by Gresham''s mechanism: good Specie was held back for foreign payments and scarcely entered domestic exchange<sup><a href="#ref4">[4]</a></sup><sup><a href="#ref8">[8]</a></sup>.'
      uk: 'Срібна тарифна монета Королівства Данії і Норвегії. Тарифне карбування Krone розпочинається 1618 р. за Кристіана IV з <i>Corona Danica</i> (окрема монетна формула, вища проба і вищий тариф на одну Krone, ніж пізніший 10½-Krone-Fuß). У 1644 р. під час війни Торстенсона (1643–1648) у Glückstadt випускається <b>Hebræermønt</b> — воєнна монета з суттєво недоваженим вмістом срібла, пробу свідомо приховано; формальна Münzfuß-постанова в основу цієї фази не покладена<sup><a href="#ref7">[7]</a></sup>. Регулярний <b>10½-Krone-Fuß</b> формально встановлюється лише Монетною постановою Кристіана V від <b>22 березня 1671 р.</b>: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» з марки чистого срібла<sup><a href="#ref6">[6]</a></sup>. У тій самій постанові Speciemønt закріплено за 9¼ rd. з марки як головний стандарт; Krone виразно є підпорядкованим, вторинним рівнем Münzfuß і ніколи не досягає паритету зі Specie як первинним стандартом<sup><a href="#ref6">[6]</a></sup>. У повсякденному обігу надтарифікована Krone витіснила Speciedaler за механізмом Грешема: добротні Specie притримували для зовнішньоторговельних розрахунків і вони майже не потрапляли у внутрішній обіг<sup><a href="#ref4">[4]</a></sup><sup><a href="#ref8">[8]</a></sup>.'
    details:
      de: '<p>Der Anfangstarif (1 Krone = 1½ Speciedaler) bedeutete eine Aufschlag von ca. 11 % über dem Silberwert<sup><a href="#ref8">[8]</a></sup>; der königliche Wahlspruch <b>RFP</b> (regna firmat pietas — «Frömmigkeit stärkt die Reiche») wurde im Volksmund daraufhin als <b>R(iget) F(attes) P(enge)</b> — «Dem Reich fehlt Geld» — gelesen<sup><a href="#ref5">[5]</a></sup>. 1625 sank der Tarif auf 1⅓ Specie; um 1670 stabilisierte ihn Christian V. auf <b>⅔ Specie</b> = 2 Marck Danske, eine Wertigkeit, die fortan auf den Münzen explizit als «<b>2 MARCK</b>» eingeprägt erscheint.</p>

        <p>Geprägt wurde an der Kopenhagener Hauptmünze und ab 1644 dominant in Glückstadt. Die Serie endet 1696. Mit der Forordning vom 15./31. Juli 1726 (Rigsdaler Courant nach Kurantmøntfod) verliert das Krone-Tarif-System seine Funktion als Hauptträger des Geldumlaufs zugunsten einer Metalläquivalenz-Logik<sup><a href="#ref4">[4]</a></sup>.</p>

        <p>Die Müntzfuß-Werte folgen aus der Münzordnung 1671: 22,272 g Raugewicht × 10,5 = 233,856 g = 1 Cöllnische Marck. Der Feingehalt entspricht der kanonischen Loth-Grän-Stufe ⁴³⁄₆₄ = 10 Loth 12 Grän = .671875 (Numista führt .671 als gerundete Form). Belegexemplare: N#111284, N#111285, N#108760, N#108735.</p>

        <p>Spezialliteratur zur Glückstadter Phase: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>

        '
      en: '<p>The initial tariff (1 Krone = 1½ Speciedaler) implied a premium of ca. 11 % above the silver value<sup><a href="#ref8">[8]</a></sup>; the royal motto <b>RFP</b> (regna firmat pietas — «piety strengthens kingdoms») was therefore reread in folk parlance as <b>R(iget) F(attes) P(enge)</b> — «the realm lacks money»<sup><a href="#ref5">[5]</a></sup>. In 1625 the tariff fell to 1⅓ Specie; around 1670 Christian V stabilised it at <b>⅔ Specie</b> = 2 Marck Danske, a parity which thereafter appears explicitly on the coins as «<b>2 MARCK</b>».</p>

        <p>Striking took place at the Copenhagen royal mint and, from 1644 onward, predominantly at Glückstadt. The series ends in 1696. With the Forordning of 15/31 July 1726 (Rigsdaler Courant on the Kurantmøntfod) the Krone tariff system loses its function as principal medium of circulation in favour of a metal-equivalence logic<sup><a href="#ref4">[4]</a></sup>.</p>

        <p>The Müntzfuß values follow from the 1671 ordinance: 22.272 g rough × 10.5 = 233.856 g = 1 Cologne mark. The fineness matches the canonical Loth-Grän step ⁴³⁄₆₄ = 10 Loth 12 Grän = .671875 (Numista gives .671 as a rounded form). Reference specimens: N#111284, N#111285, N#108760, N#108735.</p>

        <p>Specialist literature on the Glückstadt phase: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>'
      uk: '<p>Початковий тариф (1 Krone = 1½ Speciedaler) означав надбавку бл. 11 % над срібною вартістю<sup><a href="#ref8">[8]</a></sup>; королівський девіз <b>RFP</b> (regna firmat pietas — «побожність зміцнює царства») у народі переосмислили як <b>R(iget) F(attes) P(enge)</b> — «Державі бракує грошей»<sup><a href="#ref5">[5]</a></sup>. 1625 року тариф знижено до 1⅓ Specie; близько 1670 року Кристіан V стабілізував його на рівні <b>⅔ Specie</b> = 2 Marck Danske — паритет, який відтоді з''являється на монетах явно як «<b>2 MARCK</b>».</p>

        <p>Карбування здійснювалося на Копенгагенському королівському монетному дворі та з 1644 р. — переважно у Glückstadt. Серія завершується 1696 р. З Forordning 15/31 липня 1726 р. (Rigsdaler Courant за Kurantmøntfod) тарифна система Krone втрачає роль головного носія грошового обігу на користь логіки еквівалентності металу<sup><a href="#ref4">[4]</a></sup>.</p>

        <p>Значення Müntzfuß випливають з постанови 1671 р.: 22,272 г повної ваги × 10,5 = 233,856 г = 1 кельнська марка. Проба збігається з канонічною точкою Loth-Grän ⁴³⁄₆₄ = 10 Loth 12 Grän = .671875 (Numista наводить .671 як округлену форму). Зразки-приклади: N#111284, N#111285, N#108760, N#108735.</p>

        <p>Спеціальна література по ґлюкштадтській фазі: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>'
  kronemont_fine:
    pdate_label:
      de: 'Geltungsbereich: 1693 → 1771 (Kopenhagener Hauptmünze) · ältere Bestände kursierten biß zum Statsbankerot 5. Januar 1813'
      en: 'Period of validity: 1693 → 1771 (Copenhagen royal mint) · older stocks remained in circulation until the Statsbankerot of 5 January 1813'
      uk: 'Період дії: 1693 → 1771 (Копенгагенський королівський монетний двір) · старі запаси в обігу до Statsbankerot 5 січня 1813'
    hintergrund:
      de: '<b>13-Krone-Fuß («Feine Krone»)</b> — Kopenhagener Sonderstandard, etabliert durch das <b>Reskript vom 31. Dezember 1692</b> Christians V.: aus einer feinen Cöllnischen Marck (233,856 g) sollten <b>13 Specieskronen</b> ausgeprägt werden, was einem Feingewicht von ≈ 14,98 g je Krone entspricht. Geprägt ausschließlich an der Kopenhagener Hauptmünze 1693–1771; läuft chronologisch parallel zur holsteinischen Glückstadter 10½-Krone-Fuß-Phase (1644–1696) und löst diese als Hauptträger der Krone-Tarifprägung in Dänemark ab. Im Gegensatz zur Glückstadter «Groben Krone» trägt die «Feine Krone» einen leicht höheren Feingehalt (≈ 14,98 g vs. 14,964 g) und verzichtet auf die Glückstadter Tradition der Tarif-Reduktionen — der ⅔-Speciedaler-Tarif aus 1670+ wird übernommen.<br>

        <b>Hinweis:</b> derzeit liegen für diese Sektion noch keine katalogisierten Münzen im Datensatz vor; die Sektion ist als Platzhalter eingerichtet und wird bei künftiger Detail-Bearbeitung mit konkreten Belegtypen aus Hede / Bruun / IKMK København befüllt.

        '
      en: '<b>13-Krone-Fuß («Fine Crown»)</b> — a Copenhagen-specific standard established by Christian V''s <b>Reskript of 31 December 1692</b>: <b>13 Specieskronen</b> were to be struck from one fine Cologne mark (233.856 g), corresponding to a fine weight of ≈ 14.98 g per Krone. Struck exclusively at the Copenhagen royal mint 1693–1771; chronologically parallel to the Holstein-side Glückstadt 10½-Krone-Fuß phase (1644–1696), which it replaces as the principal vehicle of Krone tariff coinage in Denmark. Unlike the Glückstadt «Coarse Krone», the «Fine Crown» carries a slightly higher fine weight (≈ 14.98 g vs. 14.964 g) and dispenses with the Glückstadt tradition of tariff reductions — the ⅔-Speciedaler tariff from 1670 onward is carried forward.<br>

        <b>Note:</b> no catalogued coins for this section are present in the dataset yet; the section is set up as a placeholder and will be populated with concrete reference types from Hede / Bruun / IKMK København in future detailed work.

        '
      uk: '<b>13-Krone-Fuß («Тонка Крона»)</b> — копенгагенський особливий стандарт, встановлений <b>Рескриптом 31 грудня 1692 р.</b> Кристіана V: з однієї марки чистого срібла кельнської ваги (233,856 г) мали карбуватись <b>13 Specieskronen</b>, що дає чисту вагу ≈ 14,98 г на одну Krone. Карбувався виключно на Копенгагенському королівському монетному дворі 1693–1771; хронологічно паралельний гольштинській ґлюкштадтській фазі 10½-Krone-Fuß (1644–1696) і змінює її як головний носій тарифного карбування Krone в Данії. На відміну від ґлюкштадтської «Грубої Крони», «Тонка Крона» має дещо вищу чисту вагу (≈ 14,98 г проти 14,964 г) і відмовляється від ґлюкштадтської традиції тарифних знижень — тариф ⅔ Speciedaler з 1670+ зберігається.<br>

        <b>Примітка:</b> наразі в наборі даних немає каталогізованих монет для цієї секції; секція налаштована як заготовка і буде наповнена конкретними еталонними типами з Hede / Bruun / IKMK København у майбутній детальній роботі.

        '
  guldkrone:
    pdate_label:
      de: 'Geltungsbereich: 1618 → 1671 · 53 Jahre (Christian IV. 1618–1648 + Frederik III. 1655–1668)'
      en: 'Period of validity: 1618 → 1671 · 53 years (Christian IV 1618–1648 + Frederik III 1655–1668)'
      uk: 'Період дії: 1618 → 1671 · 53 роки (Кристіан IV 1618–1648 + Фредерік III 1655–1668)'
    hintergrund:
      de: 'Die Guldkrone-Tarif-Logik beginnt schon 1618 parallel zur silbernen Christian-IV.-Corona-Danica: Christian IV. läßt 2-Guldkronen («dobbelt guldkrone») schlagen, die metrisch identisch zur späteren Frederik-III.-Form sind (.917 Feingehalt, 5,996 g rau / 5,496 g fein)<sup><a href="#ref27">[27]</a></sup>. Die Serie Hede 25 (Jahrgänge 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648) und Hede 28 (Doppelguldkrone 1628, im Esrum-Schatzfund Ingvardson & Märcher 2010 dokumentiert<sup><a href="#ref27">[27]</a></sup>) diente nicht der Massenkarbung sondern als Hofgeschenk und Soldzahlung. Goldene <b>Tarifmünze</b> Frederik III., 1657 in Glückstadt eingeführt; goldenes Pendant der Krone-Mønt-Kategorie mit gleicher Tarif-Logik wie die silberne Krone, aber in 22-karätigem Gold und mit eigener metrischer Definition (≈ 39 Stück je Cöllnische Marck Raulegierung von 22 Karat = 5,996 g rau / 5,498 g fein je Stück). Tarif <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Geprägt in Glückstadt 1657–1660 (Hede 145B, Mzm. Jacob Schwieger), Kopenhagen-Folgeprägung 1666 (Hede 44 «1 Guldkrone» und Hede 45 «2 Guldkrone», jüngere Müntzformel 5,590 g rau / 5,126 g fein)<sup><a href="#ref28">[28]</a></sup> und in Kopenhagen 1668 (KM# 303, bei reduziertem Tarif von 3 Speciedaler und kleinerem Raugewicht von 5,47 g — ein verwandter, aber physikalisch anderer Müntzfuß). Mit dem Tod Frederiks III. 1670 endet die Guldkrone-Tarifprägung; Christian V. setzt sie nicht fort und prägt in Glückstadt nur noch nach dem Reichsdukatenfuß. <b>Nicht zu verwechseln mit dem Goldgulden</b> (HRR-Goldmünze nach Reichsmünzordnung 1559, andere Lineage und andere Tarifeinheit).

        '
      en: 'The Guldkrone tariff logic already begins in 1618 in parallel with Christian IV''s silver Corona Danica: Christian IV strikes 2-Guldkroner («dobbelt guldkrone») that are metrically identical to the later Frederik III form (.917 fineness, 5.996 g rough / 5.496 g fine)<sup><a href="#ref27">[27]</a></sup>. The Hede 25 series (years 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648) and Hede 28 (double Guldkrone 1628, documented in the Esrum hoard, Ingvardson & Märcher 2010<sup><a href="#ref27">[27]</a></sup>) served as court gifts and mercenary pay rather than mass production. A gold <b>tariff coin</b> of Frederik III, introduced at Glückstadt in 1657; the gold counterpart of the Krone-Mønt category, with the same tariff logic as the silver Krone but in 22-carat gold and with its own metric definition (≈ 39 pieces per Cologne mark of raw 22-carat alloy = 5.996 g rough / 5.498 g fine each). Tariff <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Struck at Glückstadt 1657–1660 (Hede 145B, mintmaster Jacob Schwieger), Copenhagen follow-up 1666 (Hede 44 «1 Guldkrone» and Hede 45 «2 Guldkrone», younger Müntzformel 5.590 g rough / 5.126 g fine)<sup><a href="#ref28">[28]</a></sup> and at Copenhagen in 1668 (KM# 303, at a reduced tariff of 3 Speciedaler and a smaller rough weight of 5.47 g — a related but physically distinct standard). With the death of Frederik III in 1670 Guldkrone tariff coinage ends; Christian V does not continue it and strikes Glückstadt gold only on the Reichsdukatenfuß. <b>Not to be confused with the Goldgulden</b> (Holy Roman Empire gold coin under the Reichsmünzordnung of 1559, separate lineage and a different tariff unit).'
      uk: 'Тарифна логіка Guldkrone починається вже 1618 р. паралельно зі срібною Corona Danica Кристіана IV: Кристіан IV карбує 2-Guldkroner («dobbelt guldkrone»), метрично ідентичні пізнішій формі Frederik III (.917 проби, 5,996 г повної / 5,496 г чистого)<sup><a href="#ref27">[27]</a></sup>. Серія Hede 25 (роки 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648) і Hede 28 (подвійна Guldkrone 1628, задокументована у Esrum-скарбі Ingvardson & Märcher 2010<sup><a href="#ref27">[27]</a></sup>) слугувала придворним подарунком та платою найманцям, а не масовим карбуванням. Золота <b>тарифна монета</b> Фредеріка III, запроваджена в Glückstadt 1657 р.; золотий аналог Krone-Mønt-категорії з тією ж тарифною логікою, що й срібна Krone, але в 22-каратному золоті й з власним метричним означенням (≈ 39 штук з кельнської марки сплаву 22 карат = 5,996 г повної ваги / 5,498 г чистого на штуку). Тариф <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Карбувалася в Glückstadt 1657–1660 (Hede 145B, монетмайстер Jacob Schwieger), копенгагенський наступний випуск 1666 (Hede 44 «1 Guldkrone» і Hede 45 «2 Guldkrone», новіша монетна формула 5,590 г повної / 5,126 г чистого)<sup><a href="#ref28">[28]</a></sup> і в Копенгагені 1668 р. (KM# 303, зі зниженим тарифом 3 Speciedaler і меншою повною вагою 5,47 г — споріднена, але фізично окрема стопа). Зі смертю Фредеріка III 1670 р. тарифне карбування Guldkrone завершується; Кристіан V його не продовжує і в Glückstadt карбує золото лише за Reichsdukatenfuß. <b>Не плутати з Goldgulden</b> (золота монета Священної Римської імперії за Reichsmünzordnung 1559, окрема лінія й інша тарифна одиниця).'
    closing_label:
      de: Zusammenfassung · 53 Jahre Krone-Mønt-Goldparallele (Christian IV 1618-1648 + Frederik III 1655-1668)
      en: Summary · 53 years of the Krone-Mønt gold parallel (Christian IV 1618-1648 + Frederik III 1655-1668)
      uk: Підсумок · 53 роки золотої паралелі Krone-Mønt (Кристіан IV 1618-1648 + Фредерік III 1655-1668)
    closing:
      de: 'Der Guldkrone-Fuß ist die <b>goldene Parallele der Krone-Mønt-Lineage über zwei Regenten</b>: er beginnt 1618 unter Christian IV. als 2-Guldkrone-Vorgängerphase parallel zur silbernen Corona Danica — Hofgeschenk- und Soldzahlungs-Karbung, Hede 25/28-Serie biß 1648<sup><a href="#ref27">[27]</a></sup> — und mündet 1655 in Frederik III.s formale Massenkarbung der 1-Guldkrone (Hede 145B-Glückstadt-Hauptphase 1657–1660; Kopenhagener Folgeprägung 1666 Hede 44/45 und 1668 KM-303 mit reduziertem Tarif)<sup><a href="#ref28">[28]</a></sup><sup><a href="#ref10">[10]</a></sup>. Mit der Commerce-Collegium-Empfehlung vom 14. Februar 1671 endet die reguläre Karbung. Christian V. setzt die Linie nicht fort; die Goldprägung läuft danach nur noch im Reichsdukatenfuß.'
      en: 'The Guldkrone-Fuß is the <b>gold parallel of the Krone-Mønt lineage spanning two rulers</b>: it begins in 1618 under Christian IV as a 2-Guldkrone predecessor phase running alongside the silver Corona Danica — court-gift and mercenary-pay coinage, the Hede 25/28 series through 1648<sup><a href="#ref27">[27]</a></sup> — and flows in 1655 into Frederik III''s formal mass coinage of the 1-Guldkrone (Hede 145B Glückstadt main phase 1657–1660; Copenhagen follow-up issues 1666 Hede 44/45 and 1668 KM-303 at a reduced tariff)<sup><a href="#ref28">[28]</a></sup><sup><a href="#ref10">[10]</a></sup>. The Commerce Collegium recommendation of 14 February 1671 ends regular minting. Christian V does not continue the line; gold coinage thereafter runs only on the Reichsdukatenfuß.'
      uk: 'Guldkrone-Fuß — це <b>золота паралель лінії Krone-Mønt через двох правителів</b>: вона починається 1618 р. за Кристіана IV як передфаза 2-Guldkrone паралельно зі срібною Corona Danica — карбування придворного подарунку та плати найманцям, серія Hede 25/28 до 1648 р.<sup><a href="#ref27">[27]</a></sup> — і 1655 р. впадає у формальне масове карбування Frederik III 1-Guldkrone (головна фаза Hede 145B Glückstadt 1657–1660; копенгагенські наступні випуски 1666 Hede 44/45 та 1668 KM-303 зі зниженим тарифом)<sup><a href="#ref28">[28]</a></sup><sup><a href="#ref10">[10]</a></sup>. Рекомендація Commerce Collegium від 14 лютого 1671 завершує регулярне карбування. Кристіан V лінію не продовжує; золоте карбування далі ведеться лише за Reichsdukatenfuß.'
  11_333_thaler:
    pdate_label:
      de: 'Geltungsbereich: 15./31. Juli 1726 (Forordning Friedrichs IV., Kurantmøntfod) → 5. Januar 1813 (Statsbankerot, Forordning Friedrichs VI.) · ca. 87 Jahre als Hauptalltagswährung; Altbestände als Scheidemünzen biß zur Krone-Reform 1875'
      en: 'Period of validity: 15/31 July 1726 (Forordning of Friedrich IV, Kurantmøntfod) → 5 January 1813 (Statsbankerot, Forordning of Friedrich VI) · ca. 87 years as main everyday currency; old stocks circulated as petty coinage until the Krone reform of 1875'
      uk: 'Період дії: 15/31 липня 1726 (Forordning Фредеріка IV, Kurantmøntfod) → 5 січня 1813 (Statsbankerot, Forordning Фредеріка VI) · бл. 87 років як основна повсякденна валюта; старі запаси як розмінна монета до Krone-реформи 1875'
    hintergrund:
      de: '<b>11⅓-Thaler-Fuß · Rigsdaler Courant</b> — etabliert durch die <b>Forordning vom 15./31. Juli 1726</b> Friedrichs IV. als <i>Kurantmøntfod</i> des dänisch-norwegischen Verbundes. Aus einer feinen Cöllnischen Marck (233,856 g) wurden 11⅓ Rigsdaler Courant ausgeprägt — Feingewicht ≈ 20,63 g pro Daler. <b>Hauptalltagswährung des Gesamtstaats</b> während fast des gesamten 18. Jahrhunderts; läuft im Königreich Dänemark/Norwegen biß zum Staatsbankrott am 5. Januar 1813 (Forordning Friedrichs VI.), als der Rigsbankdaler im 18½-Thaler-Fuß den Kurantfuß ablöst. <b>In Holstein</b> hingegen nur biß zur Schimmelmann-Reform vom 29. Februar 1788 in Geltung. Altbestände aus 1726–1813 blieben ab 1813 noch jahrzehntelang als Scheidemünzen im Umlauf, biß sie mit der Krone-Reform 1875 (Skandinavische Münzunion) endgültig eingezogen wurden.

        '
      en: '<b>11⅓-Thaler-Fuß · Rigsdaler Courant</b> — established by Friedrich IV''s <b>Forordning of 15/31 July 1726</b> as the <i>Kurantmøntfod</i> of the Danish-Norwegian composite state. From one fine Cologne mark (233.856 g) 11⅓ Rigsdaler Courant were struck — fine weight ≈ 20.63 g per daler. <b>Main everyday currency of the composite state</b> through most of the 18th century; in the Kingdom of Denmark/Norway it remained in force until the state bankruptcy of 5 January 1813 (Forordning of Friedrich VI), when the Rigsbankdaler on the 18½-Thaler-Fuß replaced the Kurantfuß. <b>In Holstein</b>, by contrast, it was in force only until the Schimmelmann reform of 29 February 1788. Old stocks from 1726–1813 remained in circulation as petty coinage for decades after 1813, until they were finally withdrawn by the Krone reform of 1875 (Scandinavian Monetary Union).

        '
      uk: '<b>11⅓-Thaler-Fuß · Rigsdaler Courant</b> — встановлений <b>Forordning 15/31 липня 1726</b> Фредеріка IV як <i>Kurantmøntfod</i> Королівства Данії і Норвегії. З однієї марки чистого срібла кельнської ваги (233,856 г) карбувалося 11⅓ Rigsdaler Courant — чиста вага ≈ 20,63 г на одного даллера. <b>Основна повсякденна валюта цілісної держави</b> впродовж майже всього XVIII ст.; у Королівстві Данії/Норвегії дія тривала до державного банкрутства 5 січня 1813 р. (Forordning Фредеріка VI), коли Rigsbankdaler у 18½-Thaler-Fuß замістив Kurantfuß. <b>У Гольштейні</b> ж — лише до реформи Шіммельмана 29 лютого 1788 р. Старі запаси 1726–1813 ще десятиліттями залишалися в обігу як розмінна монета після 1813 — аж до Krone-реформи 1875 р. (Скандинавська монетна унія), коли їх остаточно вилучили з обігу.

        '
  18_5_thaler:
    pdate_label:
      de: 'Geltungsbereich: 5. Januar 1813 (Forordning Friedrichs VI., nach Statsbankerot) → Krone-Reform 1873–1875 · 1854 ohne Fußänderung in Rigsdaler Rigsmønt umbenannt'
      en: 'Period of validity: 5 January 1813 (Forordning of Friedrich VI, after the Statsbankerot) → Krone reform 1873–1875 · renamed Rigsdaler Rigsmønt in 1854 without a change of standard'
      uk: 'Період дії: 5 січня 1813 (Forordning Фредеріка VI, після Statsbankerot) → Krone-реформа 1873–1875 · 1854 перейменовано на Rigsdaler Rigsmønt без зміни стопи'
    hintergrund:
      de: '<b>18½-Thaler-Fuß · Rigsbankdaler / Rigsdaler Rigsmønt</b> — Notreform Friedrichs VI. nach dem dänischen Staatsbankrott. Die <b>Forordning vom 5. Januar 1813</b> setzt den neuen Hauptstandard auf 18½ Rigsbankdaler aus einer feinen Cöllnischen Marck (233,856 g) — Feingewicht ≈ 12,64 g pro Daler. <b>§10 der Forordning</b> verankert ausdrücklich <b>1 Speciedaler = 2 Rigsbankdaler</b>, also eine glatte ½-Anteil-Anbindung an den 9¼-Thaler-Fuß. 1854 wird die Münze ohne Fußänderung in <b>Rigsdaler Rigsmønt</b> umbenannt; 1873–1875 ersetzt die <b>Krone</b> der Skandinavischen Münzunion (Schweden, Norwegen, Dänemark) den Rigsdaler. Hauptträger des dänischen Geldumlaufs in der zweiten Hälfte des 19. Jahrhunderts. In Schleswig-Holstein parallel zum 9¼-Thaler-Fuß als kleinerer Realsubstandard im Einsatz biß zur preußischen Annexion 24. August 1866.<br>

        <b>Hinweis:</b> derzeit liegen für diese Sektion noch keine katalogisierten Münzen im Datensatz vor; die Sektion ist als Platzhalter eingerichtet und wird bei künftiger Detail-Bearbeitung mit Belegtypen aus Hede / Sieg / IKMK København befüllt.

        '
      en: '<b>18½-Thaler-Fuß · Rigsbankdaler / Rigsdaler Rigsmønt</b> — Friedrich VI''s emergency reform after the Danish state bankruptcy. The <b>Forordning of 5 January 1813</b> sets the new principal standard at 18½ Rigsbankdaler per fine Cologne mark (233.856 g) — fine weight ≈ 12.64 g per daler. <b>§10 of the Forordning</b> explicitly anchors <b>1 Speciedaler = 2 Rigsbankdaler</b>, a clean ½-share link to the 9¼-Thaler-Fuß. In 1854 the coin is renamed <b>Rigsdaler Rigsmønt</b> without any change of standard; in 1873–1875 the <b>Krone</b> of the Scandinavian Monetary Union (Sweden, Norway, Denmark) supersedes the Rigsdaler. The main carrier of the Danish money supply in the second half of the 19th century. In Schleswig-Holstein it ran in parallel with the 9¼-Thaler-Fuß as a lesser actual sub-standard until the Prussian annexation of 24 August 1866.<br>

        <b>Note:</b> no catalogued coins for this section are present in the dataset yet; the section is set up as a placeholder and will be populated with reference types from Hede / Sieg / IKMK København in future detailed work.

        '
      uk: '<b>18½-Thaler-Fuß · Rigsbankdaler / Rigsdaler Rigsmønt</b> — надзвичайна реформа Фредеріка VI після данського державного банкрутства. <b>Forordning 5 січня 1813</b> встановлює новий головний стандарт на 18½ Rigsbankdaler з однієї марки чистого срібла кельнської ваги (233,856 г) — чиста вага ≈ 12,64 г на даллер. <b>§10 Forordning</b> явно закріплює <b>1 Speciedaler = 2 Rigsbankdaler</b>, тобто чисту привʼязку ½-частки до 9¼-Thaler-Fuß. 1854 р. монета перейменовується на <b>Rigsdaler Rigsmønt</b> без зміни стопи; 1873–1875 рр. <b>Krone</b> Скандинавської монетної унії (Швеція, Норвегія, Данія) витісняє Rigsdaler. Головний носій данського грошового обігу в другій половині XIX ст. У Шлезвіг-Гольштейні діяв паралельно з 9¼-Thaler-Fuß як менший фактичний підстандарт до прусської анексії 24 серпня 1866 р.<br>

        <b>Примітка:</b> наразі в наборі даних немає каталогізованих монет для цієї секції; секція налаштована як заготовка і буде наповнена еталонними типами з Hede / Sieg / IKMK København у майбутній детальній роботі.

        '
  kronefod:
    pdate_label:
      de: 'Geltungsbereich: 23. Mai 1873 (Mønlov, Lov nr. 66) → 2. August 1914 (Aussetzung der Goldkonvertibilität) · 41 Jahre als aktiver Hauptstandard, formell biß 1924'
      en: 'Period of validity: 23 May 1873 (Mønlov, Lov nr. 66) → 2 August 1914 (suspension of gold convertibility) · 41 years as the active principal standard, formally until 1924'
      uk: 'Період дії: 23 травня 1873 (Mønlov, Lov nr. 66) → 2 серпня 1914 (призупинення золотої конвертованості) · 41 рік активним головним стандартом, формально до 1924'
    hintergrund:
      de: '<b>Krone-fod</b> — gemeinsamer Hauptstandard der dänisch-schwedisch-norwegischen Krone, eingeführt durch das <b>dänische Mønlov vom 23. Mai 1873</b> (Lov nr. 66) und die <b>Skandinavische Müntzkonvention</b> Stockholm 5. Mai 1873.<sup><a href="#ref18">[18]</a></sup><sup><a href="#ref19">[19]</a></sup> Wirksam ab 1. Januar 1875; Norwegen tritt 1875 bei. Dänemark hatte zuvor die Lateinische Münzunion (1865) ausdrücklich abgelehnt, da deren bimetallische Goldsilberbindung «<i>både praktisk umuligt og økonomisk ufornuftigt</i>» sei.<sup><a href="#ref20">[20]</a></sup><br>

        <b>Tagesumlauf vs. Reservenrolle:</b> die täglich umlaufenden Stücke waren die Silber- und øre-Scheidemünzen; das Gold-Hauptkurant diente vorrangig als Auslandszahlungsreserve und als Bankdeckung. Die drei nordischen Länder prägten alle Stückelungen in einheitlicher Größe, Gewicht und Feingehalt mit nationalspezifischen Motiven — alle Reihen frei umlauffähig in allen drei Ländern biß 1914.<sup><a href="#ref19">[19]</a></sup> Konvertibilität von Banknoten in Goldmünzen am <b>2. August 1914</b> durch die Danmarks Nationalbank ausgesetzt (Kriegsausbruch).<sup><a href="#ref21">[21]</a></sup> Die Skandinavische Müntzunion bleibt für Münzgeld formell biß 1924 in Kraft.

        '
      en: '<b>Krone-fod</b> — common principal standard of the Danish-Swedish-Norwegian krone, established by the <b>Danish Mønlov of 23 May 1873</b> (Lov nr. 66) and the <b>Scandinavian Monetary Convention</b> of 5 May 1873 (Stockholm).<sup><a href="#ref18">[18]</a></sup><sup><a href="#ref19">[19]</a></sup> Effective from 1 January 1875; Norway accedes in 1875. Denmark had previously rejected joining the Latin Monetary Union (1865) because its bimetallic gold-silver linkage was «<i>both practically impossible and economically irrational</i>».<sup><a href="#ref20">[20]</a></sup><br>

        <b>Daily circulation vs. reserve role:</b> the everyday coins were the silver and øre subsidiary pieces; the gold Hauptkurant primarily served as a foreign-payment reserve and as bank backing. The three Nordic countries struck every denomination to uniform size, weight and fineness with country-specific motifs — all series circulated freely in all three countries until 1914.<sup><a href="#ref19">[19]</a></sup> Convertibility of banknotes into gold coins suspended on <b>2 August 1914</b> by Danmarks Nationalbank (outbreak of war).<sup><a href="#ref21">[21]</a></sup> The Scandinavian Monetary Union remained formally in force for coinage until 1924.'
      uk: '<b>Krone-fod</b> — спільний головний стандарт дансько-шведсько-норвезької крони, запроваджений <b>данським Mønlov від 23 травня 1873</b> (Lov nr. 66) і <b>Скандинавською монетною конвенцією</b> 5 травня 1873 р. (Стокгольм).<sup><a href="#ref18">[18]</a></sup><sup><a href="#ref19">[19]</a></sup> Чинний з 1 січня 1875; Норвегія приєднується 1875 р. Данія раніше явно відмовилася приєднуватися до Латинського монетного союзу (1865), оскільки його біметалева золото-срібна привʼязка була «<i>både praktisk umuligt og økonomisk ufornuftigt</i>» (практично неможлива та економічно нераціональна).<sup><a href="#ref20">[20]</a></sup><br>

        <b>Повсякденний обіг vs. резервна роль:</b> повсякденними обіговими монетами були срібні та øre-розмінні; золотий Hauptkurant передусім слугував резервом для закордонних платежів і банківським забезпеченням. Три північні країни карбували усі номінали єдиного розміру, ваги й проби з національно-специфічними мотивами — усі серії вільно оберталися в усіх трьох країнах до 1914 р.<sup><a href="#ref19">[19]</a></sup> Конвертованість банкнот у золоті монети призупинено <b>2 серпня 1914 р.</b> Danmarks Nationalbank (початок війни).<sup><a href="#ref21">[21]</a></sup> Скандинавська монетна унія формально лишалася чинною для монетного грошового обігу до 1924 р.'
    closing_label:
      de: Zusammenfassung · 41 Jahre Krone-fod
      en: Summary · 41 years of the Krone-fod
      uk: Підсумок · 41 рік Krone-fod
    closing:
      de: 'Der dänische Krone-fod ist <b>der kürzlebigste reguläre Hauptstandard</b> in der hier behandelten Geldgeschichte — knapp vier Jahrzehnte funktionierender Goldumlauf mit voll integrierter Silber- und Bronze-Subsidiarstruktur. Strukturmerkmal: die abgestufte Feingehalts-Leiter <b>.900 Au → .800 Ag → .600 / .400 Ag → Bronze</b> ist die langlebigste Innovation des Mønlovs — nach der Krone-Goldsuspendierung 1914 prägt Dänemark die Subsidiarstückelungen kontinuierlich weiter (die 25 øre wechselt 1920–1922 von Silber auf Cupro-Nickel, die 10 øre folgt; die Bronze-øre werden 1973 außer Umlauf gesetzt).<sup><a href="#ref23">[23]</a></sup> Die Skandinavische Müntzunion blieb wirtschaftlich erfolgreich, biß der Kriegsausbruch 1914 die einheitliche Goldparität faktisch beendete; danach driften die drei nordischen Kroner auseinander, was 1924 zur formellen Auflösung der Münzunion führt.<sup><a href="#ref19">[19]</a></sup> Dänemark kehrt 1927 mit demselben Goldgehalt wie 1913 zum Goldstandard zurück, gibt ihn 1931 endgültig auf.<sup><a href="#ref21">[21]</a></sup>

        '
      en: 'The Danish Krone-fod is <b>the shortest-lived regular principal standard</b> in the monetary history covered here — barely four decades of working gold circulation with a fully integrated silver and bronze subsidiary structure. Structural feature: the graded fineness ladder <b>.900 Au → .800 Ag → .600 / .400 Ag → bronze</b> is the longest-lived innovation of the Mønlov — after the 1914 gold suspension, Denmark continues to mint the subsidiary denominations (the 25 øre transitions from silver to cupro-nickel in 1920–1922, the 10 øre follows; the bronze øre are withdrawn from circulation in 1973).<sup><a href="#ref23">[23]</a></sup> The Scandinavian Monetary Union remained economically successful until the outbreak of war in 1914 effectively ended the unified gold parity; thereafter the three Nordic kroner diverged, leading in 1924 to the formal dissolution of the monetary union.<sup><a href="#ref19">[19]</a></sup> Denmark returned to the gold standard in 1927 at the same gold content as in 1913, and abandoned it permanently in 1931.<sup><a href="#ref21">[21]</a></sup>'
      uk: 'Данський Krone-fod — <b>найкоротший регулярний основний стандарт</b> в усій розглянутій тут грошовій історії: ледь чотири десятиліття справжнього золотого обігу з повністю інтегрованою срібно-бронзовою субсидіарною структурою. Структурна риса: ступенева сходова шкала проб <b>.900 Au → .800 Ag → .600 / .400 Ag → бронза</b> — найдовговічніша інновація Mønlov; після призупинення золотого Krone 1914 р. Данія продовжує карбувати субсидіарні номінали (25 øre 1920–1922 рр. переходить зі срібла на купроникель, 10 øre йде вслід; бронзові øre виведено з обігу 1973 р.).<sup><a href="#ref23">[23]</a></sup> Скандинавська монетна унія залишалася економічно успішною до 1914, коли початок війни де-факто завершив єдину золоту паритетність; потім три північні крони розходяться, що 1924 р. призводить до формального розпуску монетної унії.<sup><a href="#ref19">[19]</a></sup> Данія повертається до золотого стандарту 1927 р. з тим самим золотим вмістом, що й 1913, остаточно полишає його 1931.<sup><a href="#ref21">[21]</a></sup>'
  seed_unsorted:
    pdate_label:
      de: Bulk-Seed-Sammelbucket — Geltungsbereich pro Münze noch zuzuweisen
