          g fine per Daler. Three-tier denomination: full-value Kurantmünze (Daler / Mark / 8 Skilling / 4 Skilling) at 14½ Lod; Scheidemünze (1 Skilling) at 4 Lod (250 ‰); billon (Hvid 4 Lod, Penning 2
          Lod). Principal mint København under mintmaster Reynold Junge.'
        uk: 'Baseline-фаза <b>Møntordning від 20 вересня 1541</b> Кристіана III<sup>[ref:denmark-ref29-no-url]</sup>: вісім Daler з кельнської марки чистого срібла за 14½ Lod, Marken-fin <b>mf 8,827</b>,
          26,494 г чистого на Daler. Триступенева структура: повноцінна Kurantmünze (Daler / Mark / 8 Skilling / 4 Skilling) за 14½ Lod; Scheidemünze (1 Skilling) за 4 Lod (250 ‰); billon (Hvid 4 Lod, Penning
          2 Lod). Головний монетний двір Копенгаген за монетмайстра Reynold Junge.'
