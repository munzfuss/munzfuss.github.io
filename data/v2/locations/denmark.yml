      title:
        de: 'Phase I · Frederik II 1563-1564 · .77 (≈ 18½ Karat) · 2,501 g fein je Stück'
        en: 'Phase I · Frederik II 1563-1564 · .77 (≈ 18½ carats) · 2.501 g fine per piece'
        uk: 'Фаза I · Фредерік II 1563-1564 · .77 (≈ 18½ карат) · 2,501 г чистого на штуку'
      description:
        de: 'Pioniereinführung der Rhenish-Gulden-Linie in der dänischen Königsmünze unter Frederik II. Zwei dated Belege: <b>Hede f2h3</b> (1 Rhinsk Gylden 1563, 3,248 g rauh / 2,501 g fein @ .77) und
          <b>Hede f2h6</b> (1 Rhinsk Gylden 1564). Reformations-Übergangsphase — kurz nach der Augsburger Reichsmünzordnung von 1559, die den Reichsdukatenfuß als imperialen Goldstandard verankert hat;
          Frederik II setzt parallel die ältere Rhenish-Gulden-Tradition für deutsch-orientierten Handel fort.'
        en: 'Pioneer introduction of the Rhenish-Gulden line in the Danish royal mint under Frederik II. Two dated specimens: <b>Hede f2h3</b> (1 Rhinsk Gylden 1563, 3.248 g rough / 2.501 g fine at .77)
          and <b>Hede f2h6</b> (1 Rhinsk Gylden 1564). Reformation transition phase — shortly after the Augsburg Reichsmünzordnung of 1559 anchored the Reichsdukatenfuß as the imperial gold standard; Frederik
          II continues the older Rhenish-Gulden tradition in parallel for German-oriented trade.'
        uk: 'Піонерське запровадження лінії Rhenish-Gulden у данській королівській монеті за Фредеріка II. Два dated-зразки: <b>Hede f2h3</b> (1 Rhinsk Gylden 1563, 3,248 г повної / 2,501 г чистого за .77)
          та <b>Hede f2h6</b> (1 Rhinsk Gylden 1564). Перехідна фаза Реформації — невдовзі після Augsburger Reichsmünzordnung 1559, що закріпила Reichsdukatenfuß як імперський золотий стандарт; Фредерік
          II паралельно продовжує давнішу традицію Rhenish-Gulden для торгівлі з німецьким простором.'
    - id: II
      year_from: 1625
      year_to: 1632
      from_label: '1625'
      to_label: '1632'
      title:
        de: 'Phase II · Christian IV 1625-1632 · Kaiserlich-Dänischer Krieg · .76 (minimal abgesenkt) · 2,469 g fein je Stück'
        en: 'Phase II · Christian IV 1625-1632 · Imperial-Danish War · .76 (slightly reduced) · 2.469 g fine per piece'
        uk: 'Фаза II · Кристіан IV 1625-1632 · Імперсько-данська війна · .76 (мінімально знижено) · 2,469 г чистого на штуку'
      description:
        de: 'Wiederaufnahme der Rhinsk-Gylden-Karbung unter Christian IV. nach 61-jährigem Belegfenster-Hiat. Hede c4h29 dokumentiert die Jahrgänge <b>1625, 1627, 1628, 1632</b> — exakt der Belegfenster-Bereich
          des <b>Kaiserlich-Dänischen Krieges</b> (1625-1629, Christian IV. tritt 1625 in den Dreißigjährigen Krieg ein, Niederlage bei Lutter am Barenberge 1626, Lübecker Frieden 1629). Die minimal abgesenkte
          Probe .76 (vs Phase-I-.77) spiegelt die Kriegsfinanzierungs-Praxis wider. Mit dem Ende der Hauptkarbung 1632 läuft die Linie aus; Christian IV. pivotiert die Goldprägung später zur silbernen Krone-Mønt
          (Hebræermønt 1644).'
        en: 'Resumption of Rhinsk Gylden coinage under Christian IV after a 61-year documented-window hiatus. Hede c4h29 documents the years <b>1625, 1627, 1628, 1632</b> — exactly the range of the <b>Imperial-Danish
          War</b> (1625-1629, Christian IV enters the Thirty Years'' War in 1625, defeat at Lutter am Barenberge 1626, Peace of Lübeck 1629). The slightly reduced fineness .76 (vs Phase-I-.77) reflects
          wartime financing practice. With the end of main coinage in 1632 the line winds down; Christian IV later pivots gold coinage to the silver Krone-Mønt (Hebræermønt 1644).'
        uk: 'Відновлення карбування Rhinsk Gylden за Кристіана IV після 61-річної паузи у задокументованому вікні. Hede c4h29 документує роки <b>1625, 1627, 1628, 1632</b> — саме діапазон <b>Імперсько-данської
          війни</b> (1625-1629, Кристіан IV вступає у Тридцятилітню війну 1625 р., поразка під Lutter am Barenberge 1626, Любекський мир 1629). Мінімально знижена проба .76 (vs фаза-I-.77) відображає практику
          воєнного фінансування. З завершенням головного карбування 1632 лінія заникає; Кристіан IV згодом повертає золоте карбування до срібної Krone-Mønt (Hebræermønt 1644).'
  f2_guldkrone_fod:
    - id: I
      year_from: 1563
      year_to: 1564
      from_label: '1563'
      to_label: '1564'
      title:
        de: 'Phase I · Klipping-Karbung 1563-1564 · .934 / 3,341 g rauh / 3,120 g fein · Kriegsfinanzierung Nordische Siebenjährige Krieg'
        en: 'Phase I · Klipping coinage 1563-1564 · .934 / 3.341 g rough / 3.120 g fine · Northern Seven Years'' War financing'
        uk: 'Фаза I · Klipping-карбування 1563-1564 · .934 / 3,341 г повної / 3,120 г чистого · фінансування Північної Семирічної війни'
      description:
        de: 'Einzige Phase der Frederik-II-Guldkrone-fod, Klipping-Notmünz-Emission der frühen Phase der Nordischen Siebenjährigen Krieges<sup>[ref:historyofwar-wars-nordic-seven-years]</sup>. <b>Karbung
          17. Oktober 1563 verbatim:</b> «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» (Wilcke Rentmeister-Rechnungen Kap. 6)<sup>[ref:danskmoent-w6b1]</sup>. Belegexemplare Hede
          f2h2 (1563, Unikat) + Hede f2h5 (1564), Kopenhagen / Bremerholm-Hauptmünze<sup>[ref:danskmoent-1guldkro]</sup>. Reversinschrift «<i>I GOLT KRONE</i>». Karbung endet 1564 (vermutlich aufgrund knapper
          Kroneguld-Bestände); Frederik II. wechselt für die restliche Kriegszeit (1565-1570) zu silbernen Klippinge-Notmünzen und zum imperialen 9-Thaler-Fuß ab 1566.'
        en: 'The single phase of the Frederik-II-Guldkrone-fod, a Klipping emergency-coinage emission of the early phase of the Northern Seven Years'' War<sup>[ref:historyofwar-wars-nordic-seven-years]</sup>.
          <b>17 October 1563 coinage verbatim:</b> «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» (Wilcke Rentmeister account records, Kap. 6)<sup>[ref:danskmoent-w6b1]</sup>. Reference
          specimens Hede f2h2 (1563, unique) + Hede f2h5 (1564), Copenhagen / Bremerholm royal mint<sup>[ref:danskmoent-1guldkro]</sup>. Reverse inscription «<i>I GOLT KRONE</i>». Coinage ends in 1564 (presumably
          due to limited Kroneguld stocks); for the remainder of the war (1565-1570) Frederik II shifts to silver Klipping emergency coins and to the imperial 9-Thaler-Fuß from 1566.'
        uk: 'Єдина фаза Frederik-II-Guldkrone-fod, Klipping-надзвичайна емісія ранньої фази Північної Семирічної війни<sup>[ref:historyofwar-wars-nordic-seven-years]</sup>. <b>Карбування 17 жовтня 1563
          verbatim:</b> «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» (рент-майстерські рахунки Wilcke, Kap. 6)<sup>[ref:danskmoent-w6b1]</sup>. Еталонні зразки Hede f2h2 (1563,
          унікат) + Hede f2h5 (1564), Копенгаген / Bremerholm-королівський монетний двір<sup>[ref:danskmoent-1guldkro]</sup>. Реверс-напис «<i>I GOLT KRONE</i>». Карбування завершується 1564 (ймовірно через
          обмежені запаси Kroneguld); на решту війни (1565-1570) Frederik II переходить до срібних Klipping-надзвичайних монет та до імперського 9-Thaler-Fuß з 1566 р.'
  rosenobel_fod:
    - id: I
      year_from: 1584
      year_to: 1584
      from_label: '1584'
      to_label: '1584'
      title:
        de: 'Phase I · Frederik II 1584 (Frederiksborg) · Brutto 7,69 g · Probe unbekannt · unikat (Rose-Noble-Vorläufer)'
        en: 'Phase I · Frederik II 1584 (Frederiksborg) · brutto 7.69 g · fineness unknown · unique (Rose Noble predecessor)'
        uk: 'Фаза I · Frederik II 1584 (Frederiksborg) · повна вага 7,69 г · проба невідома · унікат (передвісник Rose Noble)'
      description:
        de: 'Unikales Belegexemplar Hede f2h7b — 1 Rosenobel 1584, Münzstätte <b>Frederiksborg</b>, Brutto 7,69 g (Probe nicht überliefert). Wahrscheinlich näher am englischen Klassik-Rose-Noble-Standard
          7,78 g (Edward IV. 1465). Karbung wurde von Frederik II. nicht fortgesetzt — 27-jährige Pause biß zur Wiederaufnahme unter Christian IV. 1611. Hede 7B / Schou 2 / Sieg 29<sup>[ref:danskmoent-1rosenob]</sup>.'
        en: 'Unique reference specimen Hede f2h7b — 1 Rosenobel 1584, <b>Frederiksborg</b> mint, brutto 7.69 g (fineness not transmitted). Probably closer to the classical English Rose Noble standard 7.78
          g (Edward IV 1465). Frederik II did not continue the coinage — a 27-year pause until Christian IV resumed it in 1611. Hede 7B / Schou 2 / Sieg 29<sup>[ref:danskmoent-1rosenob]</sup>.'
        uk: 'Унікальний еталонний зразок Hede f2h7b — 1 Rosenobel 1584, монетний двір <b>Frederiksborg</b>, повна вага 7,69 г (пробу не зафіксовано в джерелі). Імовірно ближче до класичного англійського
          стандарту Rose Noble 7,78 г (Edward IV 1465). Frederik II не продовжив карбування — 27-річна пауза до відновлення за Christian IV 1611 р. Hede 7B / Schou 2 / Sieg 29<sup>[ref:danskmoent-1rosenob]</sup>.'
    - id: II
      year_from: 1611
      year_to: 1629
      from_label: '1611'
      to_label: '1629'
      title:
        de: 'Phase II · Christian IV 1611-1629 (Kopenhagen) · 8,994 g rauh / 7,492 g fein @ .833 · Kalmar-Krieg + Imperial-Dänischer Krieg'
        en: 'Phase II · Christian IV 1611-1629 (Copenhagen) · 8.994 g rough / 7.492 g fine at .833 · Kalmar War + Imperial-Danish War'
        uk: 'Фаза II · Christian IV 1611-1629 (Копенгаген) · 8,994 г повної / 7,492 г чистого за .833 · Кальмарська війна + Імперсько-данська війна'
      description:
        de: 'Hauptkarbungsphase: Christian IV. revives das Rosenobel-Programm 1611 in <b>Kopenhagen</b> mit neuem standardisiertem Format. Hede c4h23a — 1 Rosenobel 1611, 1612, 1613, 1627, 1629 · 8,994
          g rauh × .833 = 7,492 g fein. Sub-Stückelung Hede c4h24 — ½ Rosenobel 1611, period-Spitzname <i>«Guldridder»</i> («Goldritter»). 1611-1613 fällt exakt mit dem <a href="https://www.historyofwar.org/articles/wars_kalmar.html"
          target="_blank">Kalmar-Krieg</a> (Christian IVs Versuch, Schweden zur Kalmar-Union zurück zu zwingen — Schweden zahlt 1 Mio. Riksdaler Älvsborg-Lösegeld)<sup>[ref:historyofwar-wars-kalmar]</sup>;
          1627 + 1629 fällt in den Imperial-Dänischen Krieg (1625-1629, Christian IVs Beteiligung am Dreißigjährigen Krieg). Funktion: Söldnerbezahlung + diplomatische Repräsentation, kein Tagesumlauf.
          Tarif rechnerisch ≈ 3-4 Speciedaler per Feingewicht-Konversion (kein period-attestierter formaler Tarif gefunden).'
        en: 'Main coinage phase: Christian IV revives the Rosenobel programme in 1611 in <b>Copenhagen</b> at a new standardised format. Hede c4h23a — 1 Rosenobel 1611, 1612, 1613, 1627, 1629 · 8.994 g
          rough × .833 = 7.492 g fine. Sub-denomination Hede c4h24 — ½ Rosenobel 1611, period nickname <i>«Guldridder»</i> («gold knight»). 1611-1613 coincides exactly with the <a href="https://www.historyofwar.org/articles/wars_kalmar.html"
          target="_blank">Kalmar War</a> (Christian IV''s attempt to force Sweden back into the Kalmar Union — Sweden pays a 1 million riksdaler Älvsborg ransom)<sup>[ref:historyofwar-wars-kalmar]</sup>;
          1627 + 1629 falls within the Imperial-Danish War (1625-1629, Christian IV''s involvement in the Thirty Years'' War). Function: mercenary pay + diplomatic representation, not daily circulation.
          Tariff computed ≈ 3-4 Speciedaler via fine-weight conversion (no period-attested formal tariff found).'
        uk: 'Головна фаза карбування: Christian IV відновлює програму Rosenobel 1611 р. у <b>Копенгагені</b> з новим стандартизованим форматом. Hede c4h23a — 1 Rosenobel 1611, 1612, 1613, 1627, 1629 · 8,994
          г повної × .833 = 7,492 г чистого. Субномінал Hede c4h24 — ½ Rosenobel 1611, period-прізвисько <i>«Guldridder»</i> («золотий лицар»). 1611-1613 точно збігається з <a href="https://www.historyofwar.org/articles/wars_kalmar.html"
          target="_blank">Кальмарською війною</a> (спроба Christian IV примусити Швецію повернутися до Кальмарської унії — Швеція виплачує 1 млн riksdaler Älvsborg-викупу)<sup>[ref:historyofwar-wars-kalmar]</sup>;
          1627 + 1629 припадає на Імперсько-данську війну (1625-1629, участь Christian IV у Тридцятилітній війні). Функція: оплата найманців + дипломатична репрезентація, не щоденний обіг. Тариф розрахунково
          ≈ 3-4 Speciedaler через конверсію чистої ваги (period-attested формального тарифу не знайдено).'
  kronemont_chr_iv:
    - id: I
      year_from: 1618
      year_to: 1624
      from_label: '1618'
      to_label: '1624'
      title:
        de: Christian IV. · Corona Danica · Tarif 1½ Speciedaler
        en: Christian IV · Corona Danica · tariff 1½ Speciedaler
        uk: Кристіан IV · Corona Danica · тариф 1½ Specie
      description:
        de: 'Erste Phase der Christian-IV.-Müntzformel: eingeführt durch das <b>åbne Brev af 12. Juli 1618</b> (Wilcke II Anm. 53<sup>[ref:danskmoent-w2ref]</sup>: «<i>I det aabne Brev af 12. Juli 1618,
          hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I S. 156–157<sup>[ref:danskmoent-w2ref]</sup>). Im Patent wird die Münze als «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>»
          beschrieben — der spätere Latin-Name «Corona Danica» ist Numismatik-Usus, nicht Patent-Sprache. Alle Prägungen 1618–1624 laufen unter dem ursprünglichen Tarif <b>1½ Speciedaler</b> — eine Wertigkeit,
          die im Volksmund die satirische Umdeutung des königlichen Wahlspruches <b>RFP</b> (regna firmat pietas) als <b>R(iget) F(attes) P(enge)</b> hervorrief.<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup>
          Die offizielle Tarifsenkung auf 1⅓ Speciedaler erfolgt erst <b>1625</b><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup>, unmittelbar nach Einstellung
          der Karbverfahrensphase. Stilistische Untergruppen: Corona-Danica-Originalprägungen 1618–1622 (KM# 57–61, 58a, 59a) und «Dicke» / Open-Crown-Varianten 1624 (KM# 94–99) — alle innerhalb desselben
          Tarifregimes. Wikipedia DE «Corona Danica»: «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup>[ref:wikipedia-de-corona-danica]</sup>.'
        en: 'First phase of the Christian IV Müntzformel: introduced by the <b>åbne Brev af 12. Juli 1618</b> (Wilcke II note 53<sup>[ref:danskmoent-w2ref]</sup>: «<i>I det aabne Brev af 12. Juli 1618,
          hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I pp. 156–157<sup>[ref:danskmoent-w2ref]</sup>). In the patent the coin is described as «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>»
          — the later Latin name «Corona Danica» is a numismatic convention, not patent language. All 1618–1624 issues run under the original <b>1½ Speciedaler</b> tariff — a parity that in folk parlance
          prompted the satirical reread of the royal motto <b>RFP</b> (regna firmat pietas) as <b>R(iget) F(attes) P(enge)</b>.<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup> The official
          tariff cut to 1⅓ Speciedaler only comes in <b>1625</b><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup>, right after the Christian-IV personnel mintage
          phase ends. Stylistic sub-groups: Corona Danica original strikes 1618–1622 (KM# 57–61, 58a, 59a) and «Dicke» / Open-Crown variants 1624 (KM# 94–99) — all within the same tariff regime. Wikipedia
          DE «Corona Danica»: «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup>[ref:wikipedia-de-corona-danica]</sup>.'
        uk: 'Перша фаза монетної формули Кристіана IV: запроваджено <b>åbne Brev af 12. Juli 1618</b> (Wilcke II прим. 53<sup>[ref:danskmoent-w2ref]</sup>: «<i>I det aabne Brev af 12. Juli 1618, hvorved
          Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I с. 156–157<sup>[ref:danskmoent-w2ref]</sup>). У патенті монета описана як «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» — пізніша
          латинська назва «Corona Danica» — нумізматична умовність, не мова патенту. Усі емісії 1618–1624 під оригінальним тарифом <b>1½ Speciedaler</b> — паритет, який у народі породив сатиричне переосмислення
          королівського девізу <b>RFP</b> (regna firmat pietas) як <b>R(iget) F(attes) P(enge)</b>.<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup> Офіційне зниження тарифу до 1⅓ Speciedaler
          відбувається лише <b>1625</b><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup> — одразу після припинення фази персонального карбування Кристіана IV.
          Стилістичні підгрупи: оригінальні Corona Danica 1618–1622 (KM# 57–61, 58a, 59a) та варіанти «Dicke» / Open-Crown 1624 (KM# 94–99) — усі в одному тарифному режимі. Wikipedia DE «Corona Danica»:
          «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup>[ref:wikipedia-de-corona-danica]</sup>.'
    - id: II
      year_from: 1651
      year_to: 1652
      from_label: '1651'
      to_label: '1652'
      title:
        de: Frederik III. · Fortsetzung der Christian-IV.-Müntzformel · Übergang zum 10½-Krone-Fuß
        en: Frederik III · Christian IV Müntzformel continuation · transition to 10½-Krone-Fuß
        uk: Фредерік III · продовження монетної формули Кристіана IV · перехід до 10½-Krone-Fuß
      description:
        de: 'Zweite Phase der Christian-IV.-Müntzformel: Frederik III. (1648–1670) nimmt die Krone-Prägung 1651 in Kopenhagen wieder auf und folgt zunächst der älteren Müntzformel mit 16,25 g Feinsilber,
          bevor er 1652 zum neuen 10½-Krone-Fuß (.672 / 14,964 g fein) übergeht. Wikipedia DE «Corona Danica»<sup>[ref:wikipedia-de-corona-danica]</sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen
          erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup>[ref:danskmoent-hedekron]</sup> klassifiziert die gesamte Müntzformel als <b>1618–1652</b>;
          die feinste Typologie der Übergangsphase 1651–1652 in Aagaard 2004<sup>[ref:denmark-ref13-no-url]</sup> «Frederik III Kronemønt København 1651–1670».'
        en: 'Second phase of the Christian IV Müntzformel: Frederik III (1648–1670) resumes Krone production at Copenhagen in 1651 and at first follows the older formula with 16.25 g fine silver, before
          transitioning to the new 10½-Krone-Fuß (.672 / 14.964 g fine) in 1652. Wikipedia DE «Corona Danica»<sup>[ref:wikipedia-de-corona-danica]</sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen
          erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup>[ref:danskmoent-hedekron]</sup> classifies the full Müntzformel as <b>1618–1652</b>;
          the finest typology of the 1651–1652 transition is in Aagaard 2004<sup>[ref:denmark-ref13-no-url]</sup> «Frederik III Kronemønt København 1651–1670».'
        uk: 'Друга фаза монетної формули Кристіана IV: Фредерік III (1648–1670) поновлює карбування Krone у Копенгагені 1651 р. і спочатку йде за старішою формулою з 16,25 г чистого срібла, перш ніж 1652
          р. перейти на нову 10½-Krone-Fuß (.672 / 14,964 г чистого). Wikipedia DE «Corona Danica»<sup>[ref:wikipedia-de-corona-danica]</sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut
          Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup>[ref:danskmoent-hedekron]</sup> класифікує повну монетну формулу як <b>1618–1652</b>; найточніша
          типологія перехідного періоду 1651–1652 — в Aagaard 2004<sup>[ref:denmark-ref13-no-url]</sup> «Frederik III Kronemønt København 1651–1670».'
    - id: III
      year_from: 1665
      year_to: 1675
      from_label: '1665'
      to_label: '1675'
      title:
        de: Sonderemissionen — Pumphosenkrone (1665) und 2-Krone (1675)
        en: Special issues — Pumphosenkrone (1665) and 2-Krone (1675)
        uk: Спец-випуски — Pumphosenkrone (1665) і 2-Krone (1675)
      description:
        de: Hede 1957<sup>[ref:danskmoent-hedekron]</sup> verzeichnet zwei nachträgliche Sonderemissionen, die der Christian-IV.-Müntzformel-Lötigkeit nahekommen, aber Hede explizit als spezielle 
          Schaumünzen wertet, nicht als Formelfortsetzungen:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Krone und ½ Krone Frederiks III. (Schou 39/40), bei höherer Lötigkeit für ein 
          schöneres Karbverfahren;<br>· <b>1675 2-Krone</b> — Doppelkronenprägung Christians V. (Schou 11–15) unter Reskript vom 11. März 1675 über den Münzgewinn.<br>Beide Stücke werden in Hedes 
          Klassifikation als «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» behandelt — also außerhalb des regulären 10½-Krone-Fußes (Grobe Krone).
        en: Hede 1957<sup>[ref:danskmoent-hedekron]</sup> records two later special issues that approach the Christian IV Müntzformel's fineness, but which Hede explicitly classifies as specialised 
          Schaumünzen rather than formula continuations:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Frederik III's Krone and ½ Krone (Schou 39/40), at higher fineness for a more 
          attractive strike;<br>· <b>1675 2-Krone</b> — Christian V's double-Krone strike (Schou 11–15) under the rescript of 11 March 1675 regarding the mint gain.<br>Both pieces are handled by Hede 
          as «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» — i.e. outside the regular 10½-Krone-Fuß (Grobe Krone).
        uk: Hede 1957<sup>[ref:danskmoent-hedekron]</sup> фіксує два пізніші спеціальні випуски, які за пробою наближаються до монетної формули Кристіана IV, але Hede явно класифікує їх як спеціальні 
          Schaumünzen, а не продовження формули:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Krone та ½ Krone Фредеріка III (Schou 39/40), за вищою пробою для красивішого 
          карбування;<br>· <b>1675 2-Krone</b> — карбування подвійної Krone Кристіана V (Schou 11–15) за рескриптом 11 березня 1675 про монетний прибуток.<br>Обидва випуски Hede трактує як 
          «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» — тобто поза регулярною 10½-Krone-Fuß (Grobe Krone).
  reichsdukatenfuss:
    - id: pre-I
      year_from: 1514
      year_to: 1558
      from_label: '1514'
      to_label: '1558'
      title:
        de: Phase pre-I · Hungarian Goldgulden de-facto 1513-1558 (sichtbar 1514+) · .986 / 3,49 g rauh / 3,44 g fein
        en: Phase pre-I · Hungarian Goldgulden de facto 1513-1558 (visible 1514+) · .986 / 3.49 g rough / 3.44 g fine
        uk: Фаза pre-I · Hungarian Goldgulden де факто 1513-1558 (видиме 1514+) · .986 / 3,49 г повної / 3,44 г чистого
      description:
        de: 'Pre-Reichsmünzordnungs-Phase: Hungarian-Venetian Dukat-Tradition de facto in der dänischen Königsmünze etabliert. <b>Christian II (1513-1523)</b> gibt das früheste belegte Ungersk-Gylden-Stück — Galster c2g-89/90 (1513). Der Hans-Goldgulden ~1497 (N#355730) gehört zum Rhinsk-Gyldenfod (.75), nicht zu diesem Ungersk-Standard (.986). Frederik I (1523-1533) kontinuiert mit dem Ungersk Gylden 1531 (Galster 46); Christian III (1534-1559) mit Hede c3h1 (Ungersk Gylden 1557 Kopenhagen)
          und Hede c3h2 (2 Ungersk Gylden 1557 Kopenhagen). Metrisch identisch zur post-1559 Phase I — Augspurgische Reichsmünzordnung 1559 kodifizierte den seit 1513 in Dänemark de-facto gepägten Standard
          ohne metrischen Bruch. <em>Christian II 1513 + Frederik I 1531 + Christian III 1557 Karbung dokumentiert.</em>'
        en: 'Pre-Reichsmünzordnung phase: Hungarian-Venetian Dukat tradition de facto established in the Danish royal mint. <b>Christian II (1513-1523)</b> gives the earliest documented Ungersk Gylden — Galster c2g-89/90 (1513). The Hans gold gulden ~1497 (N#355730) belongs to the Rhinsk-Gyldenfod at .75, not this Ungersk .986 standard. Frederik I (1523-1533) continues with the 1531 Ungersk Gylden (Galster 46); Christian III (1534-1559) with Hede c3h1 (Ungersk Gylden 1557
          Copenhagen) and Hede c3h2 (2 Ungersk Gylden 1557 Copenhagen). Metrically identical to post-1559 Phase I — the Augsburg Imperial Coinage Ordinance of 1559 codified the standard de facto struck in Denmark since 1513 without a metric break. <em>Christian II 1513 + Frederik I 1531 + Christian III 1557 coinage documented.</em>'
        uk: "Pre-Reichsmünzordnung фаза: Hungarian-Venetian Dukat-традиція де факто встановлена в данській королівській монеті. <b>Christian II (1513-1523)</b> дає найраніший задокументований Ungersk Gylden — Galster c2g-89/90 (1513). Hans-Goldgulden ~1497 (N#355730) належить до Rhinsk-Gyldenfod (.75), не до цього Ungersk-стандарту (.986). Frederik I (1523-1533) продовжує Ungersk Gylden 1531 (Galster 46); Christian III (1534-1559) з Hede c3h1 (Ungersk Gylden 1557
          Копенгаген) та Hede c3h2 (2 Ungersk Gylden 1557 Копенгаген). Метрично ідентичний post-1559 фазі I — Авґсбурзький імперський монетний ордонанс 1559 кодифікував стандарт, що де факто карбувався в Данії з 1513 без метричного розриву. <em>карбування Christian II 1513 + Frederik I 1531 + Christian III 1557 задокументовано.</em>"
    - id: I
      year_from: 1591
      year_to: 1726
      from_label: 1591 (Haderslev)
      to_label: '1726'
      title:
        de: Christian IVs frühe Goldprägung (Haderslev 1591–1599) → Kopenhagen / Glückstadt / Tönning (1600–1726)
        en: Christian IV's early gold (Haderslev 1591–1599) → Copenhagen / Glückstadt / Tönning (1600–1726)
        uk: Раннє золото Христіяна IV (Haderslev 1591–1599) → Копенгаген / Glückstadt / Tönning (1600–1726)
      mt_caption:
        de: Dukat-Prägung nach Dukatfod (.986) · zunächst Christian-IV.-Prägungen Haderslev (Portugaloser, Goldgulden 1591–1593) · dann Kopenhagen, Glückstadt (Chr. IV. / Chr. V.) und Tönning 
          (Chr. Albrecht / Fr. IV. / Karl Fr.) · sortiert nach Jahr
        en: Ducat issues to the Dukatfod (.986) · initially Christian IV's Haderslev issues (Portugaloser, Goldgulden 1591–1593) · then Copenhagen, Glückstadt (Christian IV / Christian V) and 
          Tönning (Christian Albrecht / Frederik IV / Karl Friedrich) · sorted by year
        uk: Карбування дукатів за Dukatfod (.986) · спочатку Гадерслевські емісії Христіяна IV (Portugaloser, Goldgulden 1591–1593) · далі Копенгаген, Glückstadt (Христіян IV / Христіян V) і 
          Tönning (Христіян Альбрехт / Фредерік IV / Карл Фрідріх) · впорядковано за роком
    - id: tarif-1604
      year_from: 1604
      year_to: 1605
      from_label: '1604'
      to_label: '1604'
      title:
        de: Gold-Tarifdaler-Klippe 1604 (Forordning 8. September 1602)
        en: Gold tariff-Daler klippe 1604 (Ordinance of 8 September 1602)
        uk: Золоті тарифні Daler-кліпе 1604 (Forordning 8 вересня 1602)
      description:
        de: 'Goldene Tarifmünze-Klippe Christian IVs, 1604 in Kopenhagen geschlagen (Mzm. Nicolaus Schwabe). Die Forordning vom 8. September 1602 setzte die Karbungsformeln für 8, 6 und 4 Daler (Hede
          10–12); die 3-Daler (Hede 13) erscheint 1604 ohne Erwähnung in der Ordnung. <b>Tarifmünze</b>: der «Daler»-Nennwert ist ein Fiat-Tarif — pro Daler-Einheit rund 2,03 g feines Gold (6 Daler ≈
          3,5 Reichsdukaten). Prachtmünzen — Repräsentations- und Soldgold, keine Umlaufmünze. Die Feinheit variiert je Stückelung (4 Daler .833 · 6 Daler .923 · 8 Daler .937); das Porträt lehnt sich an
          den ungarischen Gulden an.<sup>[ref:danskmoent-firkantede-gulddalere]</sup>'
        en: 'Gold Tarifmünze klippe of Christian IV, struck 1604 at Copenhagen (mintmaster Nicolaus Schwabe). The ordinance of 8 September 1602 set the minting formulas for the 8, 6 and 4 daler (Hede
          10–12); the 3 daler (Hede 13) appears in 1604 without being named in the ordinance. <b>Tarifmünze</b>: the «Daler» face is a fiat tariff — about 2.03 g fine gold per daler unit (6 daler ≈ 3.5
          imperial ducats). prestige coins — display and military-pay gold, not circulation money. Fineness varies by denomination (4 daler .833 · 6 daler .923 · 8 daler .937); the portrait follows the
          Hungarian gulden.<sup>[ref:danskmoent-firkantede-gulddalere]</sup>'
        uk: 'Золота Tarifmünze-кліпе Христіяна IV, карбована 1604 у Копенгагені (монетмейстер Nicolaus Schwabe). Forordning 8 вересня 1602 задала формули карбування для 8, 6 і 4 daler (Hede 10–12);
          3-daler (Hede 13) зʼявляється 1604 без згадки в ордонансі. <b>Tarifmünze</b>: номінал «Daler» — фіатний тариф, близько 2,03 г чистого золота на одиницю daler (6 daler ≈ 3,5 імперського дуката).
          Престижні монети — репрезентативне й платіжне золото, не для звичайного обігу. Проба варіює за номіналом (4 daler .833 · 6 daler .923 · 8 daler .937); портрет наслідує угорський гульден.<sup>[ref:danskmoent-firkantede-gulddalere]</sup>'
    - id: II
      year_from: 1726
      year_to: 1771
      from_label: '1726'
      to_label: '1771'
      title:
        de: Courantdukat-Fuß durch Courantverbund
        en: Courantdukat standard via the Courant union
        uk: Стопа Courantdukat через Courant-союз
      context:
        de: Mit dem Kurantmøntfod von 1726 entwickelt sich parallel zum Dukatfod der <b>Courantdukat</b> — Dukat mit leichter Feingewichtsreduktion zur festen Kurs-Anbindung (2 Rigsdaler Courant =
          1 Courantdukat, später 2½ Rigsdaler Courant). Altona-Münze wird erst 1771 eröffnet; Dukaten in dieser Phase werden in Kopenhagen bzw. Glückstadt für den gesamtstaatlichen Handel geprägt.
        en: With the Kurantmøntfod of 1726 a <b>Courantdukat</b> grows up alongside the Dukatfod — a ducat with slightly reduced fine weight, designed for a fixed exchange link (2 Rigsdaler 
          Courant = 1 Courantdukat, later 2½ Rigsdaler Courant). The Altona mint is only opened in 1771; the ducats of this phase are struck in Copenhagen and Glückstadt for the trade of the composite
          state.
        uk: З Kurantmøntfod 1726 паралельно до Dukatfod виростає <b>Courantdukat</b> — дукат із трохи зниженою чистою вагою, призначений для фіксованої курсової привʼязки (2 Rigsdaler Courant = 1 
          Courantdukat, пізніше 2½ Rigsdaler Courant). Монетний двір в Альтоні відкриють лише 1771; дукати цієї фази карбують у Копенгагені й Glückstadt для торгівлі цілісної держави.
