          suspended by Danmarks Nationalbank on 2 August 1914.'
        uk: 'Повна серія Krone-Mønt за <b>Mønlov від 23 травня 1873</b>: <b>золото</b> 10 / 20 Krone (.900), <b>срібний Kurant</b> 1 / 2 Krone (.800), <b>срібний Scheide</b> 25 / 10 øre (.600 / .400), <b>бронза</b>
          5 / 2 / 1 øre — усі номінали з однієї Müntzfuß за єдиною обліковою системою (100 øre = 1 Krone). Тариф проти Reichsmark фіксований 8 Krone = 9 Mark; конвертованість у золото призупинено Danmarks
          Nationalbank 2 серпня 1914.'
