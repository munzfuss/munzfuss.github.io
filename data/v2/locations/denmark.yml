      de: '10½-Krone-Fuß («Grobe Krone») · Hebræermønt-Vorläufer 1644–1648 in Glückstadt (Aagaard: Kriegsmünze des Torstenson-Krieges, kein formeller Müntzfuß) → reguläre Karbung Norge 1649, Danmark 1652 (Hede 1957) · formelle Festschreibung durch Münzordnung Christians V. vom 22. März 1671: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» je Marck Feinsilber · Hede-Verifikation: «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>» · ⅔-Speciedaler-Tarif (ab Christian V., 1670+) · 1665 Sonderemission «Pumphosenkrone» / «Pumpbucksen Thaler» (Schou 39/40), 1675 2-Krone (Schou 11–15, Reskript 11. März 1675) · letzte Karbung 1732 unter Christian VI. (Hede 4) · ab 1692 Krone-Mønt verliert Dominanz an Kurantmønt (lex.dk: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>») · ältere Bestände kursierten biß zum Statsbankerot 1813'
      en: '10½-Krone-Fuß («Coarse Krone») · Hebræermønt predecessor 1644–1648 at Glückstadt (Aagaard: war coinage of the Torstenson War, no formal Müntzfuß) → regular minting Norge 1649, Danmark 1652 (Hede 1957) · formally codified by Christian V''s mint ordinance of 22 March 1671: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» per mark of fine silver · Hede verification: «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>» · ⅔ Speciedaler tariff (from Christian V, 1670 onward) · 1665 special issue «Pumphosenkrone» / «Pumpbucksen Thaler» (Schou 39/40), 1675 2-Krone (Schou 11–15, Reskript of 11 March 1675) · last strike 1732 under Christian VI (Hede 4) · from 1692 the Krone-Mønt loses dominance to Kurantmønt (lex.dk: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>») · older stocks remained in circulation until the Statsbankerot of 1813'
      uk: '10½-Krone-Fuß («Груба Крона») · попередник Hebræermønt 1644–1648 у Glückstadt (Aagaard: воєнна монета Торстенсонської війни, без формальної Müntzfuß-постанови) → регулярне карбування Norge 1649, Danmark 1652 (Hede 1957) · формально закріплено монетною постановою Кристіана V від 22 березня 1671 р.: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» з марки чистого срібла · Hede-верифікація: «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>» · тариф ⅔ Speciedaler (від Кристіана V, з 1670) · 1665 спец-випуск «Pumphosenkrone» / «Pumpbucksen Thaler» (Schou 39/40), 1675 2-Krone (Schou 11–15, Reskript 11 березня 1675) · останнє карбування 1732 за Кристіана VI (Hede 4) · з 1692 Krone-Mønt втрачає домінування на користь Kurantmønt (lex.dk: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>») · старі запаси в обігу до Statsbankerot 1813'
