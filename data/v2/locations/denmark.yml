fuss_periods:
  nobel_fod:
    pdate_label:
      de: 'Geltungsbereich: 1496 (Hans) → 1532 (Frederik I) · 36 Jahre'
      en: 'Period of validity: 1496 (Hans) → 1532 (Frederik I) · 36 years'
      uk: 'Період дії: 1496 (Hans) → 1532 (Frederik I) · 36 років'
    hintergrund:
      de: '<b>Dänisch-norwegischer Goldstandard 1496–1532.</b> König Hans prägt 1496 in Malmø und Kopenhagen den ersten dänischen Nobel<sup>[ref:danskmoent-1nobel]</sup> — die erste datierte Goldmünze Dänemarks<sup>[ref:stacksbowers-bruun-1496-nobel]</sup>. Vorbild ist nach Galster nicht der englische Nobel, sondern der holländische «groote gouden reaal» von 1487, dem das dänische Stück in Gepräge und Gewicht folgt, wenn auch bei etwas geringerer Feinheit<sup>[ref:galster-unionstidens-nobel]</sup>. Es handelt sich um Prachtmünzen — kein Umlauf-, sondern Repräsentations- und Soldgold, geschlagen im Zusammenhang mit der Rüstung gegen Schweden und deutlich schwerer als der zeitgleiche Dukat-Goldgulden / Ungersk Gylden ([fuss:reichsdukatenfuss])<sup>[ref:galster-unionstidens-nobel]</sup>. Seine maßgebliche Spezifikation — 16 Stück aus der Cöllnischen Marck zu 23½ Karat — erhält der Nobel de jure in der Christian-II-Møntordning vom Sommer 1514 zu Malmø, die das seit 1496 de facto geprägte schwere Goldstück normiert<sup>[ref:wilcke-1950-nobel-ordinance]</sup>; die Probe der vor 1514 geschlagenen Hans-Nobler ist unabhängig nicht belegt. Die niedrigere Probe der Frederik-I-Ordnung von 1524 ist an keinem erhaltenen Stück belegt — die datierten 1532-Nobler tragen dieselbe höhere Feinheit wie die Vorgabe von 1514<sup>[ref:danskmoent-nobel-finhed-f1g45]</sup>. Über drei Regenten hinweg bleibt die Linie eine Reihe seltener Einzelprägungen — Hans 1496 und 1502, Christian II. 1516 und 1518, Frederik I. 1532 —, geschlagen zu Malmø und Kopenhagen — für die Hans- und Frederik-I-Jahrgänge läßt Galster die Münzstätte zwischen beiden offen — sowie, undatiert, zu Ribe<sup>[ref:danskmoent-1nobel]</sup>. Mit dem Tod Frederiks I. 1533 endet die Karbung; Christian III. (1534–1559) führt die Nobel-Linie nicht fort und konzentriert das Goldgeld auf die Dukaten-Tradition<sup>[ref:danskmoent-1nobel]</sup>.'
      en: '<b>Danish-Norwegian gold standard 1496–1532.</b> King Hans strikes the first Danish Nobel at Malmø and Copenhagen in 1496<sup>[ref:danskmoent-1nobel]</sup> — the first dated gold coin of Denmark<sup>[ref:stacksbowers-bruun-1496-nobel]</sup>. Per Galster the model is not the English Noble but the Dutch «groote gouden reaal» of 1487, which the Danish piece follows in design and weight, though at a slightly lower fineness<sup>[ref:galster-unionstidens-nobel]</sup>. These are prestige coins — not circulation money but display and military-pay gold, struck in connection with the armament against Sweden and markedly heavier than the contemporary Dukat-tier Goldgulden / Ungersk Gylden ([fuss:reichsdukatenfuss])<sup>[ref:galster-unionstidens-nobel]</sup>. The Nobel receives its governing specification — 16 pieces from the Cologne mark at 23½ carats — de jure in the Christian II Møntordning of Summer 1514 at Malmø, which codifies the heavy gold piece struck de facto since 1496<sup>[ref:wilcke-1950-nobel-ordinance]</sup>; the fineness of the pre-1514 Hans Nobler is not independently attested. The lower fineness of the Frederik I ordinance of 1524 is borne out by no surviving piece — the dated 1532 Nobler carry the same higher fineness as the 1514 specification<sup>[ref:danskmoent-nobel-finhed-f1g45]</sup>. Across three rulers the line stays a series of rare individual issues — Hans 1496 and 1502, Christian II 1516 and 1518, Frederik I 1532 — struck at Malmø and Copenhagen — for the Hans and Frederik I issues Galster leaves the mint undecided between the two — and, undated, at Ribe<sup>[ref:danskmoent-1nobel]</sup>. With the death of Frederik I in 1533 the coinage ends; Christian III (1534–1559) does not continue the Nobel line and concentrates gold coinage on the ducat tradition<sup>[ref:danskmoent-1nobel]</sup>.'
      uk: '<b>Дансько-норвезький золотий стандарт 1496–1532.</b> Король Hans 1496 р. карбує перший данський Nobel у Malmø і Копенгагені<sup>[ref:danskmoent-1nobel]</sup> — першу датовану золоту монету Данії<sup>[ref:stacksbowers-bruun-1496-nobel]</sup>. За Galster прообразом є не англійський Noble, а голландський «groote gouden reaal» 1487 р., якому данська монета слідує у гравіруванні й вазі, хоч і за дещо нижчої проби<sup>[ref:galster-unionstidens-nobel]</sup>. Це престижні монети — не для звичайного обігу, а репрезентативне й платіжне золото, карбоване у звʼязку з озброєнням проти Швеції й помітно важче за тогочасну дукатну групу Goldgulden / Ungersk Gylden ([fuss:reichsdukatenfuss])<sup>[ref:galster-unionstidens-nobel]</sup>. Свою визначальну специфікацію — 16 штук з кельнської марки за 23½ карати — Nobel дістає de jure в Møntordning Christian II літа 1514 р. у Malmø, що кодифікує важке золоте карбування, наявне de facto від 1496 р.<sup>[ref:wilcke-1950-nobel-ordinance]</sup>; проба до-1514 нобелів Hans незалежно не засвідчена. Нижча проба Ordnung Frederik I 1524 р. не засвідчена на жодному збереженому примірнику — датовані 1532-нобелі мають ту саму вищу пробу, що й специфікація 1514<sup>[ref:danskmoent-nobel-finhed-f1g45]</sup>. Через трьох правителів лінія лишається низкою рідкісних поодиноких випусків — Hans 1496 і 1502, Christian II 1516 і 1518, Frederik I 1532 —, карбованих у Malmø і Копенгагені — для випусків Hans і Frederik I двір за Galster лишається невизначеним між обома — та, недатовано, у Ribe<sup>[ref:danskmoent-1nobel]</sup>. Зі смертю Frederik I 1533 р. карбування припиняється; Christian III (1534–1559) лінію Nobel не продовжує й зосереджує золоте карбування на дукатній традиції<sup>[ref:danskmoent-1nobel]</sup>.'
    closing_label:
      de: Zusammenfassung · Ende der Nobel-Linie
      en: Summary · end of the Nobel line
      uk: Підсумок · кінець лінії Nobel
    closing:
      de: 'Nach 1532 ist keine weitere Nobel-Karbung dokumentiert<sup>[ref:danskmoent-1nobel]</sup>. Eine schwere Goldlinie in DK wird erst 1611 unter
        Christian IV. mit dem Rosenobel-Programm wieder aufgenommen — eine separate Müntzfuß-Linie<sup>[ref:danskmoent-1rosenob]</sup>, nicht die Fortsetzung dieser ([fuss:rosenobel_fod]).'
      en: 'No further Nobel coinage is documented after 1532<sup>[ref:danskmoent-1nobel]</sup>. A heavy gold line is not revived in Denmark until 1611
        under Christian IV''s Rosenobel programme — a separate Müntzfuß line<sup>[ref:danskmoent-1rosenob]</sup>, not a continuation of this one ([fuss:rosenobel_fod]).'
      uk: 'Подальше карбування Nobel після 1532 не задокументовано<sup>[ref:danskmoent-1nobel]</sup>. Важка золота лінія в Данії відновлюється лише 1611 за
        Christian IV з програмою Rosenobel — окрема Müntzfuß-лінія<sup>[ref:danskmoent-1rosenob]</sup>, не продовження цієї ([fuss:rosenobel_fod]).'
  8_5_gylden_fod:
    pdate_label:
      de: 'Geltungsbereich: 1514 (Lovkompleks) → 1523 (Christian II Absetzung) · 9 Jahre, drei Phasen · vorausgehende Akte 22. Juli 1513 Haandfæstning + 1. August 1513 Dynes Blicher Beskikkelsesbrev sind
        PRECURSOR (nicht Teil des Lovkompleks)'
      en: 'Period of validity: 1514 (Lovkompleks) → 1523 (Christian II deposition) · 9 years, three phases · precursor acts of 22 July 1513 Haandfæstning + 1 August 1513 Dynes Blicher beskikkelsesbrev are
        PRECURSOR (not part of the Lovkompleks)'
      uk: 'Період дії: 1514 (Lovkompleks) → 1523 (скинення Кристіана II) · 9 років, три фази · попередні акти 22 липня 1513 Haandfæstning + 1 серпня 1513 Dynes Blicher Beskikkelsesbrev — це ПРЕКУРСОРНІ
        акти (не частина Lovkompleks)'
    closing_label:
      de: Zusammenfassung · 10 Jahre Christian-II-Silber-Lovkompleks · drei Phasen
      en: Summary · 10 years of the Christian II silver Lovkompleks · three phases
      uk: Підсумок · 10 років срібного Lovkompleks Кристіана II · три фази
    closing:
      de: 'Das <b>Christian-II-Lovkompleks</b> ist die genealogische Wurzel der post-mittelalterlichen Sølvgylden-Skilling-Hvid-Tradition im dänisch-norwegischen Reich. Der 14-Lod (.875)-Hauptkurant-Anker
        wird unverändert von Frederik I 1524 übernommen ([fuss:8_gylden_fod]), dann von Christian III 1541 leicht auf 14½ Lod (.906) angehoben ([fuss:8_daler_fod]). Die Skilling-Scheidemünz-Logik
        (.359 Probe, weit über dem Sølvgylden-Fein-Wert tariffiert) ist das früheste systematische Beispiel der Token-Münzgebung im Reich.'
      en: 'The <b>Christian II Lovkompleks</b> is the genealogical root of the post-medieval Sølvgylden-Skilling-Hvid tradition in the Danish-Norwegian realm. The 14-Lod (.875) Hauptkurant anchor is taken
        over unchanged by Frederik I in 1524 ([fuss:8_gylden_fod]), then raised slightly by Christian III in 1541 to 14½ Lod (.906) ([fuss:8_daler_fod]). The Skilling Scheidemünze logic (.359
        fineness, tariffed far above the Sølvgylden fine value) is the earliest systematic example of token coinage in the realm.'
      uk: '<b>Lovkompleks Кристіана II</b> — генеалогічний корінь пост-середньовічної традиції Sølvgylden-Skilling-Hvid у дансько-норвезькому реалмі. Якір Hauptkurant 14 Lod (.875) незмінно переймає Frederik
        I 1524 р. ([fuss:8_gylden_fod]), потім Кристіан III 1541 р. злегка піднімає до 14½ Lod (.906) ([fuss:8_daler_fod]). Логіка Skilling-Scheidemünze (проба .359, тарифована значно вище фейн-вартості
        Sølvgylden) — найраніший систематичний приклад токенної монети в реалмі.'
  8_gylden_fod:
    pdate_label:
      de: 'Geltungsbereich: 1524 → 1532 · 8 Jahre · Frederik I post-Christian-II-Absetzung-Müntzfuß'
      en: 'Period of validity: 1524 → 1532 · 8 years · Frederik I post-deposition-of-Christian-II Müntzfuß'
      uk: 'Період дії: 1524 → 1532 · 8 років · Müntzfuß Frederik I після скинення Кристіана II'
    closing_label:
      de: Zusammenfassung · 8 Jahre 8-Gylden-Fod · Lybsk-Tarif + Klipping-Indfrielse
      en: Summary · 8 years of 8-Gylden-Fod · Lybsk tariff + Klipping redemption
      uk: Підсумок · 8 років 8-Gylden-Fod · Lybsk-тариф + Klipping-обмін
    closing:
      de: 'Die <b>8-Gylden-Fod</b> ist der erste dänische Müntzfuß mit <b>Lybsk-aligned 24-ß-Mark-Subdivision</b> — strukturell ein Vorläufer der späteren Schleswig-Holstein-Helstaten-Müntzwesen-Lineage.
        Der 14-Lod-Anker bleibt vom Christian-II-Lovkompleks erhalten; das spätere Christian-III-Daler 1541 hebt die Probe auf 14½ Lod und etabliert den Daler als 1/3-Untertheilung anstelle der Sølvgylden-Untertheilung.
        Reine Reckoning-Konvergenz mit dem Hansestädernes Mynt 1524; volle metrische Konvergenz mit der Schleswig-Holstein-Lybsk-Linie erst 1547 (Flensborg Bestalling, [fuss:8_daler_lybsk_fod]).'
      en: '<b>8-Gylden-Fod</b> is the first Danish Müntzfuß with a <b>Lybsk-aligned 24-ß Mark subdivision</b> — structurally a precursor of the later Schleswig-Holstein-Helstaten coinage lineage. The 14-Lod
        anchor is preserved from the Christian II Lovkompleks; the later Christian III Daler of 1541 raises the fineness to 14½ Lod and establishes the Daler as a 1/3 subdivision in place of the Sølvgylden
        subdivision. Pure reckoning convergence with the Hansestädernes coinage in 1524; full metric convergence with the Schleswig-Holstein-Lybsk line only in 1547 (Flensborg Bestalling, [fuss:8_daler_lybsk_fod]).'
      uk: '<b>8-Gylden-Fod</b> — перший данський Müntzfuß з <b>Lybsk-aligned 24-ß Mark-підструктурою</b> — структурно попередник пізнішої лінії Schleswig-Holstein-Helstaten-Müntzwesen. Якір 14 Lod збережено
        з Lovkompleks Кристіана II; пізніший Daler Кристіана III 1541 піднімає пробу до 14½ Lod і встановлює Daler як 1/3-підструктуру замість Sølvgylden-підструктури. Чиста reckoning-конвергенція з Hansestädernes-монетою
        1524; повна метрична конвергенція з лінією Schleswig-Holstein-Lybsk лише 1547 р. (Flensborg Bestalling, [fuss:8_daler_lybsk_fod]).'
  8_daler_fod:
    pdate_label:
      de: 'Geltungsbereich: 1541 → 1555 · 14 Jahre (Phase A1 1541-1543 baseline + Phase A2 1544-1555 debasiert)'
      en: 'Period of validity: 1541 → 1555 · 14 years (Phase A1 1541-1543 baseline + Phase A2 1544-1555 debased)'
      uk: 'Період дії: 1541 → 1555 · 14 років (фаза A1 1541-1543 baseline + фаза A2 1544-1555 знижена)'
    closing_label:
      de: Zusammenfassung · 14 Jahre 8-Daler-Fod (baseline + 1544 Tillæg-Debasierung)
      en: Summary · 14 years of 8-Daler-Fod (baseline + 1544 debasement supplement)
      uk: Підсумок · 14 років 8-Daler-Fod (baseline + tillæg-девальвація 1544)
    closing:
      de: 'Die <b>8-Daler-Fod</b> markiert die erste post-Reformations-Müntzfuß-Norm des dänisch-norwegischen Reichs. Phase A1 (1541-1543) baseline mf 8,827; Phase A2 (1544-1555) debasiert per Tillæg vom
        27. September 1544 auf mf 9,481. Im Royalen Track parallel läuft seit 1547 die [fuss:8_daler_lybsk_fod] Lybsk-aligned ducal-zone (siehe nächste Sektion). Der Standard endet faktisch mit der
        Reichsmünzordnung 1559 und Frederik IIs 9-Fuß-Adoption ab 1566.'
      en: '<b>8-Daler-Fod</b> marks the first post-Reformation Müntzfuß norm of the Danish-Norwegian realm. Phase A1 (1541-1543) baseline mf 8.827; Phase A2 (1544-1555) debased per Tillæg of 27 September
        1544 to mf 9.481. Running in parallel from 1547 is the Lybsk-aligned ducal-zone [fuss:8_daler_lybsk_fod] (see next section). The standard effectively ends with the Reichsmünzordnung 1559 and
        Frederik II''s adoption of the 9-Fuß from 1566.'
      uk: '<b>8-Daler-Fod</b> позначає першу пост-реформаційну Müntzfuß-норму дансько-норвезького реалму. Фаза A1 (1541-1543) baseline mf 8,827; фаза A2 (1544-1555) знижена за Tillæg 27 вересня 1544 до
        mf 9,481. Паралельно з 1547 діє любекська ducal-zone [fuss:8_daler_lybsk_fod] (див. наступну секцію). Стандарт фактично завершується Reichsmünzordnung 1559 та адопцією 9-Fuß Фредеріком II
        з 1566 р.'
  8_daler_lybsk_fod:
    pdate_label:
      de: 'Geltungsbereich: 1547 (Flensborg Bestalling) → 1571 · 24 Jahre Hauptphase 1545-1554, Auslauf biß 1571'
      en: 'Period of validity: 1547 (Flensborg Bestalling) → 1571 · 24 years; main phase 1545-1554, tail through 1571'
      uk: 'Період дії: 1547 (Flensborg Bestalling) → 1571 · 24 роки; головна фаза 1545-1554, заник до 1571'
    closing_label:
      de: Zusammenfassung · 24 Jahre Lybsk-aligned ducal-zone (Saatkorn der 18½-Thaler-Fuß-Linie)
      en: Summary · 24 years of the Lybsk-aligned ducal zone (seed of the 18½-Thaler-Fuß lineage)
      uk: Підсумок · 24 роки любекської ducal-zone (зерно лінії 18½-Thaler-Fuß)
    closing:
      de: 'Die <b>8-Daler-Lybsk-Fod</b> ist der erste belegte Punkt, an dem die königliche (14½ Lod, 48 ß danske) und die dukale (14¼ Lod, 24 ß lybsk) Müntz-Linie strukturell auseinandertreten. Die Lybsk-aligned
        sub-Mark-Logik überlebt das Ende des Standards 1571 — sie migriert nach Glückstadt unter Christian IV (Krone-Mønt 1618+) und wird unter Frederik III als Rigsbankdaler-Standard (18½ Thaler je Cölln.
        Marck fein) formalisiert.'
      en: '<b>8-Daler-Lybsk-Fod</b> is the first documented point at which the royal (14½ Lod, 48 ß danske) and the ducal (14¼ Lod, 24 ß lybsk) coinage lines structurally diverge. The Lybsk-aligned sub-Mark
        logic survives the end of the standard in 1571 — it migrates to Glückstadt under Christian IV (Krone-Mønt 1618+) and is formalised under Frederik III as the Rigsbankdaler standard (18½ Thaler per
        Cologne mark fine).'
      uk: '<b>8-Daler-Lybsk-Fod</b> — перший задокументований момент, у якому королівська (14½ Lod, 48 ß danske) та герцогська (14¼ Lod, 24 ß lybsk) монетні лінії структурно розходяться. Любекська sub-Mark-логіка
        переживає завершення стандарту 1571 — мігрує до Glückstadt за Кристіана IV (Krone-Mønt 1618+) і формалізується за Фредеріка III як стандарт Rigsbankdaler (18½ Thaler з кельнської марки чистого срібла).'
  rhinsk_gylden_fod:
    pdate_label:
      de: 'Geltungsbereich: ~1497 (Hans, Malmø) / 1527 (Frederik I., Malmø) / 1536/1546 (Christian III, Roskilde + Flensborg) → 1632 (Christian IV) · 135 Jahre Belegfenster mit vier Hiaten (30 Jahre 1497→1527, 9 Jahre 1527→1536, 17 Jahre 1546→1563, 61 Jahre 1564→1625)'
      en: 'Period of validity: ~1497 (Hans, Malmø) / 1527 (Frederik I, Malmø) / 1536/1546 (Christian III, Roskilde + Flensburg) → 1632 (Christian IV) · 135-year documented window with four hiatus periods (30 years 1497→1527, 9 years 1527→1536, 17 years 1546→1563, 61 years 1564→1625)'
      uk: 'Період дії: ~1497 (Hans, Мальме) / 1527 (Фредерік I, Мальме) / 1536/1546 (Кристіан III, Роскілле + Фленсбург) → 1632 (Кристіан IV) · 135-річне задокументоване вікно з чотирма паузами (30 років 1497→1527, 9 років 1527→1536, 17 років 1546→1563, 61 рік 1564→1625)'
    closing_label:
      de: Zusammenfassung · 96 Jahre Rhenish-Gulden-Lineage in der dänischen Königsmünze
      en: Summary · 96 years of the Rhenish-Gulden lineage in the Danish royal mint
      uk: Підсумок · 96 років лінії Rhenish-Gulden у данській королівській монеті
    closing:
      de: 'Die <b>Rhinsk-Gyldenfod</b> ist eine eigenständige Müntzfuß-Familie der Rhenish-Gulden-Tradition, parallel zum Reichsdukatenfuß ohne Tarif-Bindung. die früheste Belegspur ~1497 unter Hans in Malmø (Phase 0, Galster 27, .75 — älteste Goldmünze Skandinaviens), Frederik I 1527 (Galster 59), Christian IIIs 1536 in Roskilde (.764), Frederik IIs Standardisierung 1563-1564 (Phase I, .77) und Christian IVs Kriegsphase 1625-1632 (Phase II, .76) belegen einen kontinuierlichen Standard mit zwei Hiat-Phasen. Mit
        dem Auslauf der Hauptphase 1632 und Christian IVs Pivot zur silbernen Krone-Mønt (Hebræermønt 1644, Glückstadter 10½-Krone-Fuß 1671) endet die Linie faktisch — Frederik III. setzt sie nicht fort.'
      en: '<b>Rhinsk-Gyldenfod</b> is a standalone Müntzfuß family of the Rhenish-Gulden tradition, parallel to the Reichsdukatenfuß without tariff binding. the earliest documented trace ~1497 under Hans in Malmø (Phase 0, Galster 27, .75 — oldest gold coin in Scandinavia), Frederik I 1527 (Galster 59), Christian III''s 1536 in Roskilde (.764), Frederik II''s standardisation 1563-1564 (Phase I, .77) and Christian IV''s wartime phase 1625-1632 (Phase II, .76) document a continuous standard across two hiatus
        periods. With the end of the main phase in 1632 and Christian IV''s pivot to the silver Krone-Mønt (Hebræermønt 1644, Glückstadt 10½-Krone-Fuß 1671) the line effectively ends — Frederik III does
        not continue it.'
      uk: '<b>Rhinsk-Gyldenfod</b> — самостійна Müntzfuß-родина традиції Rhenish-Gulden, паралельна Reichsdukatenfuß без тарифної прив''язки. Найраніший задокументований слід ~1497 за Hans у Мальме (фаза 0, Galster 27, .75 — найдавніша золота монета Скандинавії), Фредеріка I 1527 (Galster 59), Кристіана III 1536 у Роскілле (.764), стандартизація Фредеріка II 1563-1564 (фаза I, .77) і воєнна фаза Кристіана IV 1625-1632 (фаза II, .76) документують безперервний стандарт з двома паузами. Із завершенням головної
        фази 1632 та поворотом Кристіана IV до срібної Krone-Mønt (Hebræermønt 1644, ґлюкштадтський 10½-Krone-Fuß 1671) лінія фактично завершується — Фредерік III її не продовжує.'
  f2_guldkrone_fod:
    pdate_label:
      de: 'Geltungsbereich: 1563 → 1564 · 2 Jahre · Klipping-Notmünz-Emission der Nordischen Siebenjährigen Krieges'
      en: 'Period of validity: 1563 → 1564 · 2 years · Klipping emergency-coinage of the Northern Seven Years'' War'
      uk: 'Період дії: 1563 → 1564 · 2 роки · Klipping-надзвичайна емісія Північної Семирічної війни'
    closing_label:
      de: Zusammenfassung · 2-Jahre Klipping-Notmünz-Emission · separater Müntzfuß-Stamm
      en: Summary · 2-year Klipping emergency-coinage emission · standalone Müntzfuß lineage
      uk: Підсумок · 2-річна Klipping-надзвичайна емісія · самостійна Müntzfuß-лінія
    closing:
      de: 'Die <b>Frederik-II-Guldkrone-fod</b> ist eine kurze (2-jährige), engstündige Klipping-Notmünz-Emission der frühen Phase der Nordischen Siebenjährigen Krieges. <b>Eigenständiger Müntzfuß-Stamm</b>,
        nicht zu verwechseln mit der späteren Tarif-Guldkrone Christians IV. und Frederiks III. ([fuss:guldkrone], 1618-1668 mit eigener Tarif-Logik 3½ Speciedaler und kanonischen 5,996 g rauh / 5,498
        g fein @ .917): 55-jähriger Belegfenster-Hiat zwischen 1564 und 1619; metrische Diskontinuität (kleines Klipping-Stück bei Frederik II. vs großes Tarif-Stück bei Christian IV.); funktionale Diskontinuität
        (Notmünze vs Tarif-Hauptkurant). Frederik II. wechselt für die restliche Kriegszeit (1565-1570) zu silbernen Klippinge und zum imperialen 9-Thaler-Fuß für Speciedaler ab 1566; die Krone-Goldlinie
        wird erst 1618 unter Christian IV. mit ganz anderer Metrik und Tarif-Logik wieder aufgenommen.'
      en: '<b>Frederik-II-Guldkrone-fod</b> is a brief (2-year), narrow Klipping emergency-coinage emission of the early phase of the Northern Seven Years'' War. <b>Standalone Müntzfuß lineage</b>, not
        to be confused with the later tariff Guldkrone of Christian IV and Frederik III ([fuss:guldkrone], 1618-1668 with its own tariff logic 3½ Speciedaler and canonical 5.996 g rough / 5.498 g
        fine at .917): 55-year documented-window hiatus between 1564 and 1619; metric discontinuity (small Klipping piece under Frederik II vs large tariff piece under Christian IV); functional discontinuity
        (emergency coin vs tariff Hauptkurant). For the remainder of the war (1565-1570) Frederik II shifts to silver Klippings and to the imperial 9-Thaler-Fuß for Speciedaler from 1566; the Krone gold
        line is only resumed in 1618 under Christian IV with an entirely different metric and tariff logic.'
      uk: '<b>Frederik-II-Guldkrone-fod</b> — коротка (2-річна), вузька Klipping-надзвичайна емісія ранньої фази Північної Семирічної війни. <b>Самостійна Müntzfuß-лінія</b>, не плутати з пізнішою тарифною
        Guldkrone Кристіана IV і Фредеріка III ([fuss:guldkrone], 1618-1668 з власною тарифною логікою 3½ Speciedaler та канонічними 5,996 г повної / 5,498 г чистого за .917): 55-річна пауза у задокументованому
        вікні між 1564 і 1619; метрична розривність (мала Klipping-штука за Frederik II vs велика тарифна штука за Christian IV); функційна розривність (надзвичайна монета vs тарифна Hauptkurant). На решту
        війни (1565-1570) Frederik II переходить до срібних Klippinge та до імперського 9-Thaler-Fuß для Speciedaler з 1566 р.; лінія Krone-золота відновлюється лише 1618 за Кристіана IV з геть іншою метрикою
        і тарифною логікою.'
  rosenobel_fod:
    pdate_label:
      de: 'Geltungsbereich: 1584 (Frederik II, Frederiksborg unikat) → 1611-1629 (Christian IV, Kopenhagen) · 45 Jahre Belegfenster mit 27-jährigem Hiat zwischen den Phasen'
      en: 'Period of validity: 1584 (Frederik II, Frederiksborg unique) → 1611-1629 (Christian IV, Copenhagen) · 45-year documented window with a 27-year hiatus between phases'
      uk: 'Період дії: 1584 (Frederik II, Frederiksborg унікат) → 1611-1629 (Christian IV, Копенгаген) · 45-річне задокументоване вікно з 27-річною паузою між фазами'
    closing_label:
      de: Zusammenfassung · 45 Jahre Rose-Noble-Renaissance-Anpassung
      en: Summary · 45 years of Rose Noble Renaissance adaptation
      uk: Підсумок · 45 років ренесансної адаптації Rose Noble
    closing:
      de: 'Die <b>Rosenobel-fod</b> ist eine Sonderlinie der dänischen Prestige-Goldmünze über zwei Regenten mit unterschiedlicher Metrik: Frederik IIs einzelnes 1584-Stück folgt noch dem englischen Klassik-Standard
        (~7,78 g), während Christian IVs Massenkarbung 1611-1629 ein neues dänisches Standard-Format (8,994 g @ .833 = 7,492 g fein) etabliert. <em>Distinkter Müntzfuß-Stamm</em>, nicht zu verwechseln mit
        der früheren [fuss:nobel_fod] (Sovereign-Tier 14,61 g @ .986, 1496-1532) oder der späteren [fuss:guldkrone]-Tarifmünze Christians IV (5,996 g @ .917, 1618+, eigene Tarif-Logik
        3½ Speciedaler).'
      en: '<b>Rosenobel-fod</b> is a special line of Danish prestige gold coinage across two rulers with different metrics: Frederik II''s single 1584 piece still follows the classical English standard
        (~7.78 g), while Christian IV''s mass coinage 1611-1629 establishes a new Danish standard format (8.994 g at .833 = 7.492 g fine). <em>A distinct Müntzfuß lineage</em>, not to be confused with the
        earlier [fuss:nobel_fod] (Sovereign tier 14.61 g at .986, 1496-1532) or the later [fuss:guldkrone] tariff coin of Christian IV (5.996 g at .917, 1618+, with its own 3½-Speciedaler
        tariff logic).'
      uk: '<b>Rosenobel-fod</b> — особлива лінія данського престижного золотого карбування через двох правителів з різною метрикою: окремий зразок Frederik II 1584 р. ще слідує класичному англійському стандарту
        (~7,78 г), тоді як масове карбування Christian IV 1611-1629 встановлює новий данський стандартний формат (8,994 г за .833 = 7,492 г чистого). <em>Окрема Müntzfuß-лінія</em>, не плутати з ранішою
        [fuss:nobel_fod] (Sovereign-tier 14,61 г за .986, 1496-1532) чи пізнішою тарифною [fuss:guldkrone] Christian IV (5,996 г за .917, 1618+, з власною тарифною логікою 3½ Speciedaler).'
  kronemont_chr_iv:
    pdate_label:
      de: 'Geltungsbereich: 1618 → 1624 · ca. 6 Jahre'
      en: 'Period of validity: 1618 → 1624 · ~6 years'
      uk: 'Період дії: 1618 → 1624 · ~6 років'
    hintergrund:
      de: Christian IVs kroner 1618–1624. Tarifmünze, 1618 als <i>Corona Danica</i> mit Anfangstarif 1½ Speciedaler eingeführt — eine fiskalische Maßnahme der Krone mit einem Seigniorage-Aufschlag von
        ca. 11 % über dem Silberwert<sup>[ref:danskmoent-w2ref]</sup>. Die Prägung endet 1624; im Folgejahr <b>1625</b> wird der Tarif offiziell auf 1⅓ Speciedaler gesenkt. Danach folgt eine 
        19-jährige Pause der Krone-Prägung biß zur Wiederaufnahme im 10½-Krone-Fuß (Glückstadt) 
        1644.<sup>[ref:danskmoent-1krone]</sup><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup><sup>[ref:danskmoent-hedekron]</sup>
      en: Christian IV's kroner 1618–1624. A tariff coin, introduced in 1618 as the <i>Corona Danica</i> at an initial tariff of 1½ Speciedaler — a Crown fiscal measure with a seigniorage premium of 
        ca. 11 % above the silver value<sup>[ref:danskmoent-w2ref]</sup>. Production ends in 1624; in the following year, <b>1625</b>, the tariff is officially cut to 1⅓ Speciedaler. Thereafter a 
        19-year hiatus of Krone production follows, until the revival in the 10½-Krone-Fuß (Glückstadt) in 
        1644.<sup>[ref:danskmoent-1krone]</sup><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup><sup>[ref:danskmoent-hedekron]</sup>
      uk: Christian IV's kroner 1618–1624. Тарифна монета, запроваджена 1618 р. як <i>Corona Danica</i> за початковим тарифом 1½ Speciedaler — фіскальний інструмент Корони з сеньйораж­ною надбавкою 
        бл. 11 % над срібною вартістю<sup>[ref:danskmoent-w2ref]</sup>. Карбування завершується 1624 р., наступного <b>1625</b> року тариф офіційно знижено до 1⅓ Speciedaler. Далі настає 19-річна 
        перерва карбування Krone — аж до відновлення у 10½-Krone-Fuß (Glückstadt) 1644 
        р.<sup>[ref:danskmoent-1krone]</sup><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup><sup>[ref:danskmoent-hedekron]</sup>
    details:
      de: '<p>Die Christian-IV.-Krone war keine Handelsmünze nach Silbergehalt, sondern eine fiskalische Tarifmünze: ihr Nennwert wurde vom König per Mandat über dem tatsächlichen Silberwert festgesetzt,
        die Differenz floß als Seigniorage in die Staatskasse<sup>[ref:danskmoent-w2ref]</sup>.</p><p><b>Primärkanonische Hede-Formel</b><sup>[ref:danskmoent-hedekron]</sup>: <b>12 ²⁵⁷⁄₇₀₀ Stück je 13¾-lötiger
        Marck</b> = 18,909 g rau bei .859 Feingehalt = 16,250 g fein je Krone. Die Bruchform (12,367 statt 12½) ergibt sich daraus, daß der Münzedikt 1618 den Fuß über die <b>Daler-Ausbringung</b> definiert
        — den nominellen Gesamtwert in Speciedaler aus einer feinen Marck Silber als Krone-Münzen. Bei Anfangstarif 1½ Specie pro Doppelkrone (= ¾ Specie pro Krone) ergeben 233,856 g Feinsilber 14,391 Krone,
        deren Nennwert sich auf 10,793 Speciedaler addiert (Hede H105<sup>[ref:danskmoent-hedekron]</sup>). Nach der Forordning vom 14. Februar 1624 wird die Specie selbst auf 100 Skilling neu tarifiert;
        die physische Krone bleibt unverändert, aber dieselbe Marck Feinsilber bringt nach der neuen Specie-Skala nur noch 10,361 Speciedaler aus (Hede H124<sup>[ref:danskmoent-hedekron]</sup>).</p><p>1618
        wurde nur die 2 Krone (damals einfach «Krone» genannt) nach dieser Formel geprägt; ½, ¼ und ⅛ Krone des Jahres 1618 folgten einer leicht niedrigeren Münzfod. Ab 1619 prägt auch die ½ Krone nach
        der Hauptformel<sup>[ref:danskmoent-hedekron]</sup>.</p><p>Spezialliteratur zur Christian-IV.-Phase: Hede / Schou (H105–H107, H124–H126); Bruun-Lots 13089 ff. (Stack''s Bowers Auktion Part II, Zürich
        14.–15. März 2025).</p>'
      en: '<p>The Christian IV Krone was not a trade coin valued by silver content but a fiscal tariff coin: its face value was set by royal mandate above the actual silver value, the gap accruing to the
        treasury as seigniorage<sup>[ref:danskmoent-w2ref]</sup>.</p><p><b>Primary catalogue formula (Hede)</b><sup>[ref:danskmoent-hedekron]</sup>: <b>12 ²⁵⁷⁄₇₀₀ pieces per 13¾-lødig mark</b> = 18.909
        g rough at .859 fineness = 16.250 g fine per Krone. The fractional form (12.367 rather than 12½) follows from the 1618 mint edict defining the standard via the <b>daler output</b> — the total face
        value, expressed in Speciedaler, that one fine mark of silver yields once struck into Krone coin. At the initial tariff of 1½ Specie per Doppelkrone (= ¾ Specie per Krone), 233.856 g of fine silver
        yields 14.391 Krone, whose face values add up to 10.793 Speciedaler (Hede H105<sup>[ref:danskmoent-hedekron]</sup>). After the Forordning of 14 February 1624 the Specie itself is re-rated to 100
        Skilling; the physical Krone is unchanged, but on the new Specie scale the same fine mark now yields only 10.361 Speciedaler (Hede H124<sup>[ref:danskmoent-hedekron]</sup>).</p><p>In 1618 only the
        2 Krone (then simply called «Krone») was struck on this formula; the ½, ¼ and ⅛ Krone of 1618 followed a slightly lower Münzfod. From 1619 the ½ Krone also follows the main formula<sup>[ref:danskmoent-hedekron]</sup>.</p><p>Specialist
        literature on the Christian IV phase: Hede / Schou (H105–H107, H124–H126); Bruun lots 13089 ff. (Stack''s Bowers auction Part II, Zurich 14–15 March 2025).</p>'
      uk: '<p>Krone Кристіана IV не була торговельною монетою за вмістом срібла, а фіскальною тарифною: її номінал встановлювався королівським мандатом вище фактичної срібної вартості, різниця надходила
        до скарбниці як сеньйораж<sup>[ref:danskmoent-w2ref]</sup>.</p><p><b>Першоджерельна Hede-формула</b><sup>[ref:danskmoent-hedekron]</sup>: <b>12 ²⁵⁷⁄₇₀₀ штук з 13¾-lødig марки</b> = 18,909 г повної
        ваги за проби .859 = 16,250 г чистого на Krone. Дробова форма (12,367 замість 12½) випливає з того, що монетний едикт 1618 р. задавав стопу через <b>вихід у даллерах (daler-udbringning)</b> — сумарну
        номінальну вартість у Speciedaler, яку одна марка чистого срібла «приносила» при карбуванні в Krone-монети. За початкового тарифу 1½ Specie на Doppelkrone (= ¾ Specie на одну Krone) з 233,856 г
        чистого срібла виходить 14,391 Krone, сумарна номінальна вартість яких становить 10,793 Speciedaler (Hede H105<sup>[ref:danskmoent-hedekron]</sup>). Після Forordning 14 лютого 1624 р. сам Specie
        перетарифовано на 100 Skilling; фізично Krone лишається без змін, але та сама марка чистого срібла за новою Specie-шкалою «приносить» уже лише 10,361 Speciedaler (Hede H124<sup>[ref:danskmoent-hedekron]</sup>).</p><p>1618
        р. за цією формулою карбувалась лише 2 Krone (тоді просто «Krone»); ½, ¼ та ⅛ Krone 1618 р. йшли за дещо нижчою møntfod. З 1619 р. ½ Krone теж переходить на головну формулу<sup>[ref:danskmoent-hedekron]</sup>.</p><p>Спеціальна
        література по фазі Кристіана IV: Hede / Schou (H105–H107, H124–H126); лоти Bruun 13089 і далі (Stack''s Bowers auction Part II, Цюрих 14–15 березня 2025).</p>'
  reichsdukatenfuss:
    name:
      de: Dukatfod
      en: Dukatfod
      uk: Dukatfod
    historical_name: Hungarian-Venetian Goldgulden-Tradition in der dänisch-norwegischen Königsmünze (1513 Christian II → 1876 Reichsmünzgesetz)
    description:
      de: |
        <b>Dänisch-norwegische Variante der Hungarian-Venetian Goldgulden-Tradition</b>, de facto durch <b>Christian II.</b> 1513 etabliert (Ungersk Gylden, Galster c2g-89/90) und durch die <b>Augsburger Reichsmünzordnung vom 19. August 1559</b> de jure imperial codifiziert. Metrisch identisch mit dem deutschen Reichsdukatenfuß: 67 Dukaten je rauer Cöllnischer Marck @ 23 Karat 8 Grän (.986), 3,49 g rauh / 3,44 g fein. <b>Dukatfod</b> ist die dänische Bezeichnung dieses Standards.
      en: |-
        <b>The Danish-Norwegian variant of the Hungarian-Venetian Goldgulden tradition</b>, de facto established under <b>Christian II in 1513</b> (Ungersk Gylden, Galster c2g-89/90) and de jure imperially codified by the <b>Augsburg Imperial Coinage Ordinance of 19 August 1559</b>. Metrically identical to the German Reichsdukatenfuß: 67 ducats per rough Cologne mark at 23 carats 8 grains (.986), 3.49 g rough / 3.44 g fine. <b>Dukatfod</b> is the Danish name for this standard.
      uk: |-
        <b>Дансько-норвезький варіант традиції Hungarian-Venetian Goldgulden</b>, де факто запроваджений за <b>Christian II 1513 р.</b> (Ungersk Gylden, Galster c2g-89/90) і де юре імперсько кодифікований <b>Augsburзькою імперською монетною постановою 19 серпня 1559</b>. Метрично ідентичний німецькому Reichsdukatenfuß: 67 дукатів з повної кельнської марки за 23 карати 8 гран (.986), 3,49 г повної / 3,44 г чистого. <b>Dukatfod</b> — данська назва цього стандарту.
    grundwerte:
      heading:
        de: "Grundwerte · Dukatfod (dänisch-norwegische Hungarian-Goldgulden-Tradition)"
        en: "Base values · Dukatfod (Danish-Norwegian Hungarian-Goldgulden tradition)"
        uk: "Базові значення · Dukatfod (дансько-норвезька Hungarian-Goldgulden-традиція)"
      subheading:
        de: "Cöllnische Marck rauh = 233,856 g Goldlegierung · Feingehalt 23 Karat 8 Grän = 986 1/9 ‰ · de facto 1513 (Christian II) → de jure 1559 · 67 Dukaten je rauer Cölln. Marck · per Stück 3,49 g rauh /
          3,44 g fein"
        en: "Cologne mark rough = 233.856 g gold alloy · fineness 23 carats 8 grains = 986 1/9 ‰ · de facto 1513 (Christian II) → de jure 1559 · 67 ducats per rough Cologne mark · per piece 3.49 g rough / 3.44
          g fine"
        uk: "Кельнська марка повна = 233,856 г золотого сплаву · проба 23 карати 8 гран = 986 1/9 ‰ · де факто 1513 (Christian II) → де юре 1559 · 67 дукатів з повної кельнської марки · на штуку 3,49 г повної
          / 3,44 г чистого"
    pdate_label:
      de: 'Geltungsbereich: 1513 (Christian II de facto) → 1876 (Reichsmünzgesetz Demonetisation) · 363 Jahre Hungarian-Venetian Dukat-Tradition in der dänisch-norwegischen Königsmünze'
      en: 'Period of validity: 1513 (Christian II de facto) → 1876 (Reichsmünzgesetz demonetisation) · 363 years of the Hungarian-Venetian Dukat tradition in the Danish-Norwegian royal mint'
      uk: 'Період дії: 1513 (Christian II де факто) → 1876 (Reichsmünzgesetz демонетизація) · 363 років Hungarian-Venetian Dukat-традиції у дансько-норвезькій королівській монеті'
    hintergrund:
      de: '<b>Dukatfod</b> — dänisch-norwegische Surface der Hungarian-Venetian Dukat-Tradition: 67 Dukaten je rauer Cöllnischer Marck @ 23 Karat 8 Grän (.986), 3,49 g rauh / 3,44 g fein. <b>De facto</b>
        durch Christian II. 1513 etabliert; <b>de jure</b> durch die Augsburger Reichsmünzordnung vom 19. August 1559 imperial codifiziert. Phase pre-I (1514-1558) Hungarian-Goldgulden-Periode; Phase I (1559-1876)
        codifizierter Reichsdukat bis Reichsmünzgesetz-Demonetisation. Metrisch identisch mit dem deutschen Reichsdukatenfuß.'
      en: '<b>Dukatfod</b> — the Danish-Norwegian surface of the Hungarian-Venetian Dukat tradition: 67 ducats per rough Cologne mark at 23 carats 8 grains (.986), 3.49 g rough / 3.44 g fine. <b>De
        facto</b> established under Christian II in 1513; <b>de jure</b> imperially codified by the Augsburg Imperial Coinage Ordinance of 19 August 1559. Phase pre-I (1514-1558) Hungarian-Goldgulden period;
        Phase I (1559-1876) codified Reichsdukat through the Reichsmünzgesetz demonetisation. Metrically identical to the German Reichsdukatenfuß.'
      uk: '<b>Dukatfod</b> — дансько-норвезький surface традиції Hungarian-Venetian Dukat: 67 дукатів з повної кельнської марки за 23 карати 8 гран (.986), 3,49 г повної / 3,44 г чистого. <b>De facto</b>
        запроваджений за Christian II 1513 р.; <b>de jure</b> імперсько кодифікований Augsburзькою імперською монетною постановою 19 серпня 1559 р. Фаза pre-I (1514-1558) період Hungarian Goldgulden; Фаза I (1559-1876)
        кодифікований Reichsdukat до демонетизації Reichsmünzgesetz. Метрично ідентичний німецькому Reichsdukatenfuß.'
  courantdukatenfuss:
    pdate_label:
      de: 'Geltungsbereich in Dänemark: 1714 (Frederik IV., Großer Nordischer Krieg) → 1796 (letzte Restprägung) · 82 Jahre Neuprägung; faktischer Zahlungsmittelstatus biß 1873 (Skandinavische Münzunion)'
      en: 'In force in Denmark: 1714 (Frederik IV, Great Northern War) → 1796 (last restrike) · 82 years of new coinage; factual legal-tender status until 1873 (Scandinavian Monetary Union)'
      uk: 'Дія в Данії: 1714 (Frederik IV, Велика Північна війна) → 1796 (останнє рестрайк-карбування) · 82 роки нових емісій; фактичний статус законного платіжного засобу до 1873 (Скандинавська монетна
        унія)'
    hintergrund:
      de: 'Spezifisch dänische tarif-tragende Goldlinie, die in <b>zwei metrischen Phasen</b> verläuft. <b>Phase I — Frederik IV. (1714–1717):</b> Erstprägung als Kriegsfinanzierungsmaßnahme im Großen Nordischen
        Krieg, 81½ Stück / rauer Cölln. Marck, 21 Karat (.875), 2,511 g Feingold; Tarif 12 Mark Kurant = 2 Rigsdaler Courant. Forordning <b>9. Juli 1727</b> senkt Tarif auf 11 Mark («reducerede Kurant-Dukater»);
        Forordning <b>4. Juli 1757</b> ruft die alten Stücke zur Einschmelzung ein.<sup>[ref:ernst-axel-kurantdukat]</sup> <b>Phase II — Frederik V. Reform (1757–1796):</b> im Juni 1757 neuer Standard 75
        Stück / Marck, 3,118 g rau, 2,72832 g fein; 12-Mark-Tarif zurück. Massenprägung 1757–1765 in Kopenhagen: <b>≈ 3 030 742 Stück</b> (Finanzkollegium 1791) — die größte Goldmünzproduktion in der dänischen
        Geschichte (≈ 8,3 t Feingold).<sup>[ref:ernst-axel-kurantdukat]</sup> Christian-VII.-Geburtstagsstrich 27. Januar 1771 (131 Stück Kopenhagen). <b>Plakat 2. Dezember 1782</b> erlaubt jedermann die
        freie Goldablieferung zur Kurantdukat-Prägung («<i>Gold aus der rauen Marck zu 75 Stück bei 21 Karat ausprägen</i>»)<sup>[ref:danskmoent-c7mord-plakat-1782]</sup> — Hauptphase 1781–1796 in Altona
        + Kopenhagen, ≈ 237 000 Stück. Plakat-Widerruf 1795; letzte Prägung 1796 in Altona (≈ 30 700 Stück mit 1785-Datum).<sup>[ref:ernst-axel-kurantdukat]</sup> Der Statsbankerot vom 5. Januar 1813 reformiert
        nur die Silber-Courantlinie<sup>[ref:forordning-pengevaesenet-1813]</sup>; der Kurantdukat behält rechtlich Zahlungsmittelstatus zum 12-Mark-Tarif biß zur Skandinavischen Münzunion 1873.

        '
      en: 'A specifically Danish tariff-bearing gold line in <b>two metric phases</b>. <b>Phase I — Frederik IV (1714–1717):</b> first issue as a war-finance measure in the Great Northern War; 81½ pieces
        per rough Cologne Mark, 21 carats (.875), 2.511 g fine gold; tariff 12 Mark Kurant = 2 Rigsdaler Courant. The Forordning of <b>9 July 1727</b> reduces the tariff to 11 Mark («reducerede Kurant-Dukater»);
        the Forordning of <b>4 July 1757</b> calls the old pieces in for melting.<sup>[ref:ernst-axel-kurantdukat]</sup> <b>Phase II — Frederik V reform (1757–1796):</b> in June 1757 a new standard of 75
        pieces per Mark, 3.118 g rough, 2.72832 g fine; the 12-Mark tariff is restored. Mass coinage 1757–1765 at Copenhagen: <b>≈ 3,030,742 pieces</b> (Finanzkollegium 1791) — the largest gold-coin production
        in Danish history (≈ 8.3 t fine gold).<sup>[ref:ernst-axel-kurantdukat]</sup> Christian-VII-birthday strike on 27 January 1771 (131 pieces, Copenhagen). <b>Plakat of 2 December 1782</b> permits
        anyone to deliver gold freely for Kurantdukat coinage («<i>gold to be coined at 75 pieces per rough Mark of 21 carats</i>»)<sup>[ref:danskmoent-c7mord-plakat-1782]</sup> — the main phase 1781–1796
        in Altona + Copenhagen, ≈ 237,000 pieces. The plakat is revoked in 1795; the final issue is 1796 in Altona (≈ 30,700 pieces with 1785 dies).<sup>[ref:ernst-axel-kurantdukat]</sup> The Statsbankerot
        of 5 January 1813 reforms only the silver Courant line<sup>[ref:forordning-pengevaesenet-1813]</sup>; the Kurantdukat retains legal-tender status at the 12-Mark tariff until the Scandinavian Monetary
        Union of 1873.'
      uk: 'Специфічно данська тариф-несуча золота лінія у <b>двох метричних фазах</b>. <b>Фаза I — Frederik IV (1714–1717):</b> перша емісія як засіб фінансування Великої Північної війни; 81½ штук з повної
        Кельнської марки, 21 карат (.875), 2,511 г чистого золота; тариф 12 Mark Kurant = 2 Rigsdaler Courant. Forordning <b>9 липня 1727</b> знижує тариф до 11 Mark («reducerede Kurant-Dukater»); Forordning
        <b>4 липня 1757</b> кличе старі монети на переплав.<sup>[ref:ernst-axel-kurantdukat]</sup> <b>Фаза II — реформа Frederik V (1757–1796):</b> у червні 1757 новий стандарт 75 штук з марки, 3,118 г
        повної, 2,72832 г чистого; тариф 12 Mark відновлено. Масове карбування 1757–1765 у Копенгагені: <b>≈ 3 030 742 шт.</b> (Finanzkollegium 1791) — найбільше виробництво золотих монет в історії Данії
        (≈ 8,3 т чистого золота).<sup>[ref:ernst-axel-kurantdukat]</sup> Меморіальний strike Christian VII 27 січня 1771 (131 шт. Копенгаген). <b>Plakat 2 грудня 1782</b> дозволяє будь-кому вільно здавати
        золото на карбування Kurantdukat («<i>золото карбувати по 75 штук з повної марки при 21 караті</i>»)<sup>[ref:danskmoent-c7mord-plakat-1782]</sup> — головна фаза 1781–1796 в Альтоні + Копенгагені,
        ≈ 237 000 шт. Plakat скасовано 1795; останнє карбування 1796 в Альтоні (≈ 30 700 шт. зі штемпелями 1785).<sup>[ref:ernst-axel-kurantdukat]</sup> Statsbankerot 5 січня 1813 реформує лише срібну Courant-лінію<sup>[ref:forordning-pengevaesenet-1813]</sup>;
        Kurantdukat юридично зберігає статус законного платіжного засобу за 12-Mark-тарифом до Скандинавської монетної унії 1873.'
    closing_label:
      de: Zusammenfassung · 82 Jahre Neuprägung, biß 1873 Tarif-Zahlungsmittel
      en: Summary · 82 years of new coinage, legal-tender at tariff until 1873
      uk: Підсумок · 82 роки нового карбування, до 1873 тарифний платіжний засіб
    closing:
      de: 'Der Courantdukatenfuß ist die <b>spezifisch dänische Antwort</b> auf das Problem einer domestizierten Goldwährung neben dem Reichsdukat: ein tariffierter, niedriger probiger (.875) Dukat zum
        festen 12-Mark-Wert, gegenüber dem höheren-probigen (.986) freien Reichsdukat. Über die ganze Phase II (1757–1796) ist er die <b>«almindeligst gangbare Guldmønt»</b> in Dänemark<sup>[ref:ernst-axel-kurantdukat]</sup>
        — dominantes Goldgeld der Krone. In den Herzogtümern Schleswig-Holstein dient er ab 1771 als territoriale Goldversorgung der Altonaer Münze.<sup>[ref:danskmoent-1nobel]</sup> Keine formale Demonetisierungsverordnung;
        faktischer Endpunkt 1873 mit der Krone-Reform.

        '
      en: 'The Courantdukatenfuß is the <b>specifically Danish answer</b> to the problem of a domesticated gold currency alongside the Reichsdukat: a tariffed, lower-fineness (.875) ducat at the fixed 12-Mark
        value, set against the higher-fineness (.986) free-floating Reichsdukat. Throughout Phase II (1757–1796) it is the <b>«almindeligst gangbare Guldmønt»</b> in Denmark<sup>[ref:ernst-axel-kurantdukat]</sup>
        — the Crown''s dominant gold currency. In the duchies of Schleswig-Holstein it serves from 1771 onward as the Altona mint''s territorial gold supply.<sup>[ref:danskmoent-1nobel]</sup> No formal
        demonetisation ordinance; the factual endpoint is 1873 with the Krone reform.'
      uk: 'Courantdukatenfuß — <b>специфічно данська відповідь</b> на проблему домашньої золотої валюти поруч з Reichsdukat: тарифний дукат із нижчою пробою (.875) за фіксованою вартістю 12 Mark проти вільноторгового
        вищопробного (.986) Reichsdukat. Протягом усієї фази II (1757–1796) він є <b>«almindeligst gangbare Guldmønt»</b> у Данії<sup>[ref:ernst-axel-kurantdukat]</sup> — домінантна золота валюта Корони.
        У герцогствах Шлезвіг-Гольштейн з 1771 р. слугує територіальним золотим забезпеченням Альтонського монетного двору.<sup>[ref:danskmoent-1nobel]</sup> Формальної демонетизаційної постанови нема;
        фактичний кінець — 1873 р. з реформою Krone.'
  pistolenfuss:
    pdate_label:
      de: 'Geltungsbereich in Dänemark: 1771 (Christian VII., Altonaer Münze) → 1870 (Christian IX., letzte Christian-d''or-Prägung) · 99 Jahre'
      en: 'In force in Denmark: 1771 (Christian VII, Altona mint) → 1870 (Christian IX, last Christian d''or issue) · 99 years'
      uk: 'Дія в Данії: 1771 (Christian VII, монетний двір Альтона) → 1870 (Christian IX, остання емісія Christian d''or) · 99 років'
    hintergrund:
      de: 'Pistolen-Goldlinie nach norddt. <b>5-Thaler-Tarif</b>-Tradition (Vorbild Wilhelm d''or 1737, Friedrich d''or 1741<sup>[ref:denmark-ref32-no-url]</sup>). In Dänemark eingeführt 1771 unter Christian
        VII. an der neu eröffneten Altonaer Münze als <b>Christian d''or</b> nach französischem Louis-d''or-Vorbild<sup>[ref:danskmoent-w6b1]</sup> — derselbe Standard wie der reduzierte preußische Friedrich
        d''or (130/144 Probe ≈ 903 ‰, 6,03 g Feingold, 5-Speciedaler-Tarif = 12 Mark Dansk-Anteil). Die Linie wird kontinuierlich unter <b>fünf Regenten</b> fortgeführt: Christian VII. (1771–1808), Frederik
        VI. (1808–1839, von 1808 als Frederik d''or — fortgesetzt trotz Statsbankerot 1813), Christian VIII. (1839–1848), Frederik VII. (1848–1863), Christian IX. (1863–1870, letzte Prägung 1870). Verwendung
        «<i>mest til internationale betalinger</i>»<sup>[ref:danskmoent-w6b1]</sup> — Außenhandelsmünze, kein gesetzliches Zahlungsmittel im Inland. Ende: dänisches Münzgesetz 1873 (Skandinavische Münzunion)
        ersetzt Speciedaler / d''or durch die Krone.

        '
      en: 'Pistole gold line of the North-German <b>5-thaler tariff</b> tradition (modelled on the Wilhelm d''or of 1737 and Friedrich d''or of 1741<sup>[ref:denmark-ref32-no-url]</sup>). Introduced in
        Denmark in 1771 under Christian VII at the newly opened Altona mint as the <b>Christian d''or</b>, on the French Louis-d''or model<sup>[ref:danskmoent-w6b1]</sup> — at the same standard as the reduced
        Prussian Friedrich d''or (130/144 fineness ≈ 903 ‰, 6.03 g fine gold, 5-Speciedaler tariff = 12 Mark Dansk-share). The line continues without interruption under <b>five rulers</b>: Christian VII
        (1771–1808), Frederik VI (1808–1839, from 1808 as the Frederik d''or — kept on through the Statsbankerot of 1813), Christian VIII (1839–1848), Frederik VII (1848–1863), Christian IX (1863–1870,
        last issue 1870). Used «<i>mest til internationale betalinger</i>»<sup>[ref:danskmoent-w6b1]</sup> — a foreign-trade coin, not domestic legal tender. End: the Danish Coinage Act of 1873 (Scandinavian
        Monetary Union) replaces the Speciedaler / d''or with the Krone.'
      uk: 'Pistolen-золота лінія північно-німецької тарифної традиції <b>5 талерів</b> (зразки Wilhelm d''or 1737 і Friedrich d''or 1741<sup>[ref:denmark-ref32-no-url]</sup>). У Данії запроваджено 1771
        р. за Christian VII у новому монетному дворі Альтони як <b>Christian d''or</b> за зразком французького Louis d''or<sup>[ref:danskmoent-w6b1]</sup> — за тим самим стандартом, що й редукований прусський
        Friedrich d''or (проба 130/144 ≈ 903 ‰, 6,03 г чистого золота, тариф 5 Speciedaler = частка 12 Mark Dansk). Лінія безперервно продовжується за <b>п''яти регентів</b>: Christian VII (1771–1808),
        Frederik VI (1808–1839, з 1808 як Frederik d''or — продовжено попри Statsbankerot 1813), Christian VIII (1839–1848), Frederik VII (1848–1863), Christian IX (1863–1870, остання емісія 1870). Вживалися
        «<i>mest til internationale betalinger</i>»<sup>[ref:danskmoent-w6b1]</sup> — як зовнішньоторговельна, не як внутрішній законний платіжний засіб. Кінець: данський Закон про монету 1873 (Скандинавська
        монетна унія) замінює Speciedaler / d''or на Krone.'
  9_thaler:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 1566 (Augspurger Reichsmünz-Abschied) → 1625 (letzte Prägung; ab 1622 parallel vom 9¼-Fuß abgelöst) · 59 Jahre'
      en: 'In force in Holstein: 1566 (Augsburg Imperial Mint Decree) → 1625 (last strike; from 1622 already being superseded in parallel by the 9¼-Fuß) · 59 years'
      uk: 'Дія в Гольштейні: 1566 (Авґсбурзький імперський монетний ордонанс) → 1625 (останнє карбування; з 1622 паралельно витісняється 9¼-Fuß) · 59 років'
    hintergrund:
      de: 'Reichsstandard nach dem Augspurger Reichsmüntz-Abschied vom 30. Mai 1566 — verbindlich für sämtliche Reichsstände. In Holstein-Gottorp dominierte er unter Adolf I., Johann Adolf und Friedrich
        III.; Münzstätten Glückstadt und Tönning prägten nach diesem Fuß Thaler Species, Mark-lübisch-Theilstücke und Schillinge. Während der Kipper-Wipper-Krise (1620–1623) brach das einheitliche Reichsmünzwesen
        zusammen — bereits ab 1622 (Friedrich III. von Gottorp, Glückstadt) setzt sich der leichtere 9¼-Thaler-Fuß als Großsilberstandard durch, die letzte holsteinische 9-Fuß-Prägung erfolgt 1625 (Hans
        Jr. von Sonderburg, 2 Schilling Lübisch). <b>Über Holstein hinaus blieb der 9-Fuß als Banktauschmünze in Kraft:</b> Hamburg führte ihn als <i>Bank-Mark</i> der Hamburger Bank weiter, Lübeck als
        <i>Speciemark</i> — beide bis zur Reichsmünzreform 1875.

        '
      en: Imperial standard following the Augsburg Imperial Mint Decree of 30 May 1566 — binding on all imperial estates. In Holstein-Gottorp it dominated under Adolf I, Johann Adolf and Friedrich 
        III; the Glückstadt and Tönning mints struck Thaler Species, Mark-lübisch sub-units and Schilling petty coins on this standard. The Kipper-Wipper crisis (1620–1623) collapsed the unified 
        imperial coinage; from 1622 onward (Friedrich III of Gottorp, Glückstadt) the lighter 9¼-Thaler-Fuß took over as the large-silver standard, and the last Holstein 9-Fuß strike falls in 1625 
        (Hans Jr. of Sonderburg, 2 Schilling Lübisch). <b>Beyond Holstein the 9-Fuß remained in force as bank-exchange money:</b> Hamburg kept it as the <i>Bank-Mark</i> of the Hamburger Bank, Lübeck 
        as the <i>Speciemark</i> — both until the imperial coinage reform of 1875.
      uk: Імперський стандарт за Авґсбурзьким імперським монетним ордонансом 30 травня 1566 р. — обов'язковий для всіх імперських станів. У Гольштейн-Ґотторпі домінував за Адольфа I, Йоганна Адольфа й
        Фредеріка III; монетні двори Glückstadt і Tönning карбували за цим стандартом Thaler Species, частки Mark lübisch і дрібні Schilling-монети. Криза Kipper-Wipper (1620–1623) зруйнувала єдину 
        імперську монетну систему — вже з 1622 (Фредерік III Ґотторпський, Glückstadt) у Гольштейні утверджується легший 9¼-Thaler-Fuß як великосрібний стандарт, а останнє 9-Fuß-карбування припадає на
        1625 р. (Hans Jr. Sonderburg, 2 Schilling Lübisch). <b>Поза Гольштейном 9-Fuß продовжував існувати як банковий рахунок:</b> Гамбург тримав його як <i>Bank-Mark</i> Гамбурзького банку, Любек — 
        як <i>Speciemark</i>; обидва до імперської монетної реформи 1875 р.
    closing_label:
      de: Übergang zum 9¼-Fuß (Thaler Species) ab 1622, letzte Holstein-Prägung 1625
      en: Transition to the 9¼-Fuß (Thaler Species) from 1622; last Holstein strike 1625
      uk: Перехід до 9¼-Fuß (Thaler Species) з 1622; останнє карбування в Гольштейні — 1625
    closing:
      de: 'Der 9-Thaler-Fuß war kurzlebig in Holstein selbst (Adolf I. → Hans Jr. Sonderburg, letzte Prägung 1625; ab 1622 vom 9¼-Fuß abgelöst), bleibt aber <b>außerhalb Holsteins als Hamburger Bank-Mark
        und Lübecker Speciemark Rechnungseinheit biß 1875</b>. Die holsteinischen Reichsthaler unter Johann Adolf gehören zu den frühesten dokumentierten Großsilbermünzen der Region und bilden die Grundlage
        für die spätere 9¼-Fuß-Tradition.

        '
      en: The 9-Thaler-Fuß was short-lived in Holstein itself (Adolf I → Hans Jr. of Sonderburg, last strike 1625; superseded by the 9¼-Fuß from 1622), but it survived <b>beyond Holstein as the 
        Hamburg Bank Mark and the Lübeck Speciemark unit of account until 1875</b>. The Holstein Reichsthaler under Johann Adolf are among the earliest documented large-silver coins in the region and 
        form the foundation for the later 9¼-Fuß tradition.
      uk: 9-Thaler-Fuß у самому Гольштейні був недовговічним (Адольф I → Hans Jr. Sonderburg, останнє карбування 1625; з 1622 витіснений 9¼-Fuß), однак <b>поза Гольштейном залишався розрахунковою 
        одиницею як Гамбурзька Bank-Mark і Любецька Speciemark до 1875 р.</b> Гольштинські рейхсталери за Йоганна Адольфа належать до найдавніших задокументованих великосрібних монет регіону і 
        становлять основу пізнішої традиції 9¼-Fuß.
  9_25_thaler:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 1622 (Friedrich III.) → 24. Aug. 1866 (preuß. Annexion) · 244 Jahre'
      en: 'In force in Holstein: 1622 (Friedrich III) → 24 Aug. 1866 (Prussian annexation) · 244 years'
      uk: 'Дія в Гольштейні: 1622 (Фредерік III) → 24 серпня 1866 (прусська анексія) · 244 роки'
    closing_label:
      de: Zusammenfassung · 240 Jahre Geltung
      en: Summary · 240 years in force
      uk: Підсумок · 240 років чинності
    closing:
      de: 'Der 9¼-Thaler-Fuß ist der <b>längstlebige und stabilste</b> Silberstandard in der holsteinischen Geldgeschichte. Über politische Umwälzungen hinweg (Gottorp-Vereinigung 1773, Staatsbankrott 1813,
        mehrere Herrscherwechsel, Kondominium 1864<sup>[ref:lex-dansk-m-ntv-sen]</sup>) blieb der Feingehalt von 25,28173 g konstant. Erst die preußische Annexion 1866 beendet seine Funktion als gesetzliches
        Zahlmittel. Numismatisch wirkt er biß 1907 nach, als der letzte Vereinsthaler (nachfolger-Fuß) ausser Kurs gesetzt wird.

        '
      en: The 9¼-Thaler-Fuß is the <b>longest-lived and most stable</b> silver standard in Holstein's monetary history. Through every political upheaval (the Gottorp union of 1773, the state 
        bankruptcy of 1813, several royal successions, the condominium of 1864<sup>[ref:lex-dansk-m-ntv-sen]</sup>) the fine weight of 25.28173 g remained unchanged. Only the Prussian annexation of 
        1866 ended its function as legal tender. Numismatically it lived on until 1907, when the last Vereinsthaler (its successor standard) was withdrawn from circulation.
      uk: 9¼-Thaler-Fuß — <b>найдовговічніший і найстабільніший</b> срібний стандарт у грошовій історії Гольштейну. Через усі політичні переломи (обʼєднання з Готторпом 1773, державне банкрутство 
        1813, кілька зміни правителів, кондомініум 1864<sup>[ref:lex-dansk-m-ntv-sen]</sup>) чиста вага 25,28173 г залишалася незмінною. Лише прусська анексія 1866 поклала край його статусу законного 
        платіжного засобу. Нумізматично він діяв до 1907 року, коли останній Vereinsthaler (стопа-наступник) було вилучено з обігу.
  kronemont:
    pdate_label:
      de: 'Geltungsbereich: 1644 → 1696 · ca. 52 Jahre'
      en: 'Period of validity: 1644 → 1696 · ~52 years'
      uk: 'Період дії: 1644 → 1696 · ~52 років'
    hintergrund:
      de: 'Silberne Tarifmünze des dänisch-norwegischen Verbunds. Die Krone-Tarifprägung beginnt 1618 unter Christian IV. mit der <i>Corona Danica</i> (eigene Münzformel, höhere Lötigkeit und höherer Tarif
        pro Krone als der spätere 10½-Krone-Fuß). 1644 wird in Glückstadt während des Torstenson-Krieges (1643–1648) die <b>Hebræermønt</b> ausgegeben — eine Kriegsmünze mit deutlich unterwertigem Silbergehalt,
        deren Feingehalt absichtlich verschleiert wurde; eine formelle Münzfuß-Ordnung lag dieser Phase nicht zugrunde<sup>[ref:danskmoent-aag1]</sup>. Der reguläre <b>10½-Krone-Fuß</b> wird formell erst
        durch die Münzordnung Christians V. vom <b>22. März 1671</b> festgelegt: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» je Marck Feinsilber<sup>[ref:danskmoent-c5mord]</sup>.
        Dieselbe Ordnung verankert die Speciemønt mit 9¼ rd. je Marck als Hauptstandard; die Krone gilt ausdrücklich als untergeordnete, sekundäre Münzfuß-Stufe und erreicht zu keiner Zeit Parität mit dem
        Specie als Primärstandard<sup>[ref:danskmoent-c5mord]</sup>. Im Tagesumlauf verdrängte die übertarifierte Krone den Speciedaler nach Greshamschem Mechanismus: gute Specietaler wurden für Auslandszahlungen
        einbehalten und gelangten kaum in den inländischen Verkehr<sup>[ref:danskmoent-hedekron]</sup><sup>[ref:danskmoent-w2ref]</sup>.'
      en: 'Silver tariff coin of the Danish-Norwegian composite state. Krone tariff coinage begins in 1618 under Christian IV with the <i>Corona Danica</i> (a separate coin formula, with higher fineness
        and a higher per-Krone tariff than the later 10½-Krone-Fuß). In 1644, during the Torstenson War (1643–1648), the <b>Hebræermønt</b> is issued at Glückstadt — a war coinage substantially under-weight,
        with the fineness deliberately concealed; this phase rested on no formal Münzfuß ordinance<sup>[ref:danskmoent-aag1]</sup>. The regular <b>10½-Krone-Fuß</b> is formally established only by Christian
        V''s Mint Ordinance of <b>22 March 1671</b>: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» per mark of fine silver<sup>[ref:danskmoent-c5mord]</sup>. The same ordinance anchors
        Speciemønt at 9¼ rd. per mark as the principal standard; the Krone is explicitly a subordinate, secondary Münzfuß tier and never achieves parity with Specie as a primary standard<sup>[ref:danskmoent-c5mord]</sup>.
        In day-to-day circulation the over-tariffed Krone displaced the Speciedaler by Gresham''s mechanism: good Specie was held back for foreign payments and scarcely entered domestic exchange<sup>[ref:danskmoent-hedekron]</sup><sup>[ref:danskmoent-w2ref]</sup>.'
      uk: 'Срібна тарифна монета Королівства Данії і Норвегії. Тарифне карбування Krone розпочинається 1618 р. за Кристіана IV з <i>Corona Danica</i> (окрема монетна формула, вища проба і вищий тариф на
        одну Krone, ніж пізніший 10½-Krone-Fuß). У 1644 р. під час війни Торстенсона (1643–1648) у Glückstadt випускається <b>Hebræermønt</b> — воєнна монета з суттєво недоваженим вмістом срібла, пробу
        свідомо приховано; формальна Münzfuß-постанова в основу цієї фази не покладена<sup>[ref:danskmoent-aag1]</sup>. Регулярний <b>10½-Krone-Fuß</b> формально встановлюється лише Монетною постановою
        Кристіана V від <b>22 березня 1671 р.</b>: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» з марки чистого срібла<sup>[ref:danskmoent-c5mord]</sup>. У тій самій постанові Speciemønt
        закріплено за 9¼ rd. з марки як головний стандарт; Krone виразно є підпорядкованим, вторинним рівнем Münzfuß і ніколи не досягає паритету зі Specie як первинним стандартом<sup>[ref:danskmoent-c5mord]</sup>.
        У повсякденному обігу надтарифікована Krone витіснила Speciedaler за механізмом Грешема: добротні Specie притримували для зовнішньоторговельних розрахунків і вони майже не потрапляли у внутрішній
        обіг<sup>[ref:danskmoent-hedekron]</sup><sup>[ref:danskmoent-w2ref]</sup>.'
    details:
      de: '<p>Der Anfangstarif (1 Krone = 1½ Speciedaler) bedeutete eine Aufschlag von ca. 11 % über dem Silberwert<sup>[ref:danskmoent-w2ref]</sup>; der königliche Wahlspruch <b>RFP</b> (regna firmat pietas
        — «Frömmigkeit stärkt die Reiche») wurde im Volksmund daraufhin als <b>R(iget) F(attes) P(enge)</b> — «Dem Reich fehlt Geld» — gelesen<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup>.
        1625 sank der Tarif auf 1⅓ Specie; um 1670 stabilisierte ihn Christian V. auf <b>⅔ Specie</b> = 2 Marck Danske, eine Wertigkeit, die fortan auf den Münzen explizit als «<b>2 MARCK</b>» eingeprägt
        erscheint.</p>

        <p>Geprägt wurde an der Kopenhagener Hauptmünze und ab 1644 dominant in Glückstadt. Die Serie endet 1696. Mit der Forordning vom 15./31. Juli 1726 (Rigsdaler Courant nach Kurantmøntfod) verliert
        das Krone-Tarif-System seine Funktion als Hauptträger des Geldumlaufs zugunsten einer Metalläquivalenz-Logik<sup>[ref:danskmoent-hedekron]</sup>.</p>

        <p>Die Müntzfuß-Werte folgen aus der Münzordnung 1671: 22,272 g Raugewicht × 10,5 = 233,856 g = 1 Cöllnische Marck. Der Feingehalt entspricht der kanonischen Loth-Grän-Stufe ⁴³⁄₆₄ = 10 Loth 12 Grän
        = .671875 (Numista führt .671 als gerundete Form). Belegexemplare: N#111284, N#111285, N#108760, N#108735.</p>

        <p>Spezialliteratur zur Glückstadter Phase: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>

        '
      en: '<p>The initial tariff (1 Krone = 1½ Speciedaler) implied a premium of ca. 11 % above the silver value<sup>[ref:danskmoent-w2ref]</sup>; the royal motto <b>RFP</b> (regna firmat pietas — «piety
        strengthens kingdoms») was therefore reread in folk parlance as <b>R(iget) F(attes) P(enge)</b> — «the realm lacks money»<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup>. In 1625
        the tariff fell to 1⅓ Specie; around 1670 Christian V stabilised it at <b>⅔ Specie</b> = 2 Marck Danske, a parity which thereafter appears explicitly on the coins as «<b>2 MARCK</b>».</p>

        <p>Striking took place at the Copenhagen royal mint and, from 1644 onward, predominantly at Glückstadt. The series ends in 1696. With the Forordning of 15/31 July 1726 (Rigsdaler Courant on the
        Kurantmøntfod) the Krone tariff system loses its function as principal medium of circulation in favour of a metal-equivalence logic<sup>[ref:danskmoent-hedekron]</sup>.</p>

        <p>The Müntzfuß values follow from the 1671 ordinance: 22.272 g rough × 10.5 = 233.856 g = 1 Cologne mark. The fineness matches the canonical Loth-Grän step ⁴³⁄₆₄ = 10 Loth 12 Grän = .671875 (Numista
        gives .671 as a rounded form). Reference specimens: N#111284, N#111285, N#108760, N#108735.</p>

        <p>Specialist literature on the Glückstadt phase: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>'
      uk: '<p>Початковий тариф (1 Krone = 1½ Speciedaler) означав надбавку бл. 11 % над срібною вартістю<sup>[ref:danskmoent-w2ref]</sup>; королівський девіз <b>RFP</b> (regna firmat pietas — «побожність
        зміцнює царства») у народі переосмислили як <b>R(iget) F(attes) P(enge)</b> — «Державі бракує грошей»<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup>. 1625 року тариф знижено до
        1⅓ Specie; близько 1670 року Кристіан V стабілізував його на рівні <b>⅔ Specie</b> = 2 Marck Danske — паритет, який відтоді з''являється на монетах явно як «<b>2 MARCK</b>».</p>

        <p>Карбування здійснювалося на Копенгагенському королівському монетному дворі та з 1644 р. — переважно у Glückstadt. Серія завершується 1696 р. З Forordning 15/31 липня 1726 р. (Rigsdaler Courant
        за Kurantmøntfod) тарифна система Krone втрачає роль головного носія грошового обігу на користь логіки еквівалентності металу<sup>[ref:danskmoent-hedekron]</sup>.</p>

        <p>Значення Müntzfuß випливають з постанови 1671 р.: 22,272 г повної ваги × 10,5 = 233,856 г = 1 кельнська марка. Проба збігається з канонічною точкою Loth-Grän ⁴³⁄₆₄ = 10 Loth 12 Grän = .671875
        (Numista наводить .671 як округлену форму). Зразки-приклади: N#111284, N#111285, N#108760, N#108735.</p>

        <p>Спеціальна література по ґлюкштадтській фазі: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>'
  kronemont_fine:
    pdate_label:
      de: 'Geltungsbereich: 1693 → 1771 (Kopenhagener Hauptmünze) · ältere Bestände kursierten biß zum Statsbankerot 5. Januar 1813'
      en: 'Period of validity: 1693 → 1771 (Copenhagen royal mint) · older stocks remained in circulation until the Statsbankerot of 5 January 1813'
      uk: 'Період дії: 1693 → 1771 (Копенгагенський королівський монетний двір) · старі запаси в обігу до Statsbankerot 5 січня 1813'
    hintergrund:
      de: '<b>13-Krone-Fuß («Feine Krone»)</b> — Kopenhagener Sonderstandard, etabliert durch das <b>Reskript vom 31. Dezember 1692</b> Christians V.: aus einer feinen Cöllnischen Marck (233,856 g) sollten
        <b>13 Specieskronen</b> ausgeprägt werden, was einem Feingewicht von ≈ 14,98 g je Krone entspricht. Geprägt ausschließlich an der Kopenhagener Hauptmünze 1693–1771; läuft chronologisch parallel
        zur holsteinischen Glückstadter 10½-Krone-Fuß-Phase (1644–1696) und löst diese als Hauptträger der Krone-Tarifprägung in Dänemark ab. Im Gegensatz zur Glückstadter «Groben Krone» trägt die «Feine
        Krone» einen leicht höheren Feingehalt (≈ 14,98 g vs. 14,964 g) und verzichtet auf die Glückstadter Tradition der Tarif-Reduktionen — der ⅔-Speciedaler-Tarif aus 1670+ wird übernommen.<br>

        <b>Hinweis:</b> derzeit liegen für diese Sektion noch keine katalogisierten Münzen im Datensatz vor; die Sektion ist als Platzhalter eingerichtet und wird bei künftiger Detail-Bearbeitung mit konkreten
        Belegtypen aus Hede / Bruun / IKMK København befüllt.

        '
      en: '<b>13-Krone-Fuß («Fine Crown»)</b> — a Copenhagen-specific standard established by Christian V''s <b>Reskript of 31 December 1692</b>: <b>13 Specieskronen</b> were to be struck from one fine
        Cologne mark (233.856 g), corresponding to a fine weight of ≈ 14.98 g per Krone. Struck exclusively at the Copenhagen royal mint 1693–1771; chronologically parallel to the Holstein-side Glückstadt
        10½-Krone-Fuß phase (1644–1696), which it replaces as the principal vehicle of Krone tariff coinage in Denmark. Unlike the Glückstadt «Coarse Krone», the «Fine Crown» carries a slightly higher fine
        weight (≈ 14.98 g vs. 14.964 g) and dispenses with the Glückstadt tradition of tariff reductions — the ⅔-Speciedaler tariff from 1670 onward is carried forward.<br>

        <b>Note:</b> no catalogued coins for this section are present in the dataset yet; the section is set up as a placeholder and will be populated with concrete reference types from Hede / Bruun / IKMK
        København in future detailed work.

        '
      uk: '<b>13-Krone-Fuß («Тонка Крона»)</b> — копенгагенський особливий стандарт, встановлений <b>Рескриптом 31 грудня 1692 р.</b> Кристіана V: з однієї марки чистого срібла кельнської ваги (233,856
        г) мали карбуватись <b>13 Specieskronen</b>, що дає чисту вагу ≈ 14,98 г на одну Krone. Карбувався виключно на Копенгагенському королівському монетному дворі 1693–1771; хронологічно паралельний
        гольштинській ґлюкштадтській фазі 10½-Krone-Fuß (1644–1696) і змінює її як головний носій тарифного карбування Krone в Данії. На відміну від ґлюкштадтської «Грубої Крони», «Тонка Крона» має дещо
        вищу чисту вагу (≈ 14,98 г проти 14,964 г) і відмовляється від ґлюкштадтської традиції тарифних знижень — тариф ⅔ Speciedaler з 1670+ зберігається.<br>

        <b>Примітка:</b> наразі в наборі даних немає каталогізованих монет для цієї секції; секція налаштована як заготовка і буде наповнена конкретними еталонними типами з Hede / Bruun / IKMK København
        у майбутній детальній роботі.

        '
  guldkrone:
    pdate_label:
      de: 'Geltungsbereich: 1618 → 1671 · 53 Jahre (Christian IV. 1618–1648 + Frederik III. 1655–1668)'
      en: 'Period of validity: 1618 → 1671 · 53 years (Christian IV 1618–1648 + Frederik III 1655–1668)'
      uk: 'Період дії: 1618 → 1671 · 53 роки (Кристіан IV 1618–1648 + Фредерік III 1655–1668)'
    hintergrund:
      de: 'Die Guldkrone-Tarif-Logik beginnt schon 1618 parallel zur silbernen Christian-IV.-Corona-Danica: Christian IV. läßt 2-Guldkronen («dobbelt guldkrone») schlagen, die metrisch identisch zur späteren
        Frederik-III.-Form sind (.917 Feingehalt, 5,996 g rau / 5,496 g fein)<sup>[ref:danskmoent-c4h25]</sup>. Die Serie Hede 25 (Jahrgänge 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648) und Hede
        28 (Doppelguldkrone 1628, im Esrum-Schatzfund Ingvardson & Märcher 2010 dokumentiert<sup>[ref:danskmoent-c4h25]</sup>) diente nicht der Massenkarbung sondern als Hofgeschenk und Soldzahlung. <b>Hede
        1957 dokumentiert den nomenklatorischen Wechsel zwischen den beiden Regenten ausdrücklich in Fußnote (1)</b>: «<i>Betegnelsen guldkrone dækker under Frederik III den mønt, Christian IV kaldte 2
        guldkrone</i>»<sup>[ref:danskmoent-f3guldkr]</sup> — was Frederik III. als «1 Guldkrone» führt, ist physisch dieselbe Münze, die Christian IV. «2 Guldkrone» nannte; Christian IVs eigene «1 Guldkrone»
        (Hede 26, ~3 g rau) entspricht physisch der ½ Guldkrone unter Frederik III.s Definition. Goldene <b>Tarifmünze</b> Frederik III., 1657 in Glückstadt eingeführt; goldenes Pendant der Krone-Mønt-Kategorie
        mit gleicher Tarif-Logik wie die silberne Krone, aber in 22-karätigem Gold und mit eigener metrischer Definition (≈ 39 Stück je Cöllnische Marck Raulegierung von 22 Karat = 5,996 g rau / 5,498 g
        fein je Stück). Tarif <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Geprägt in Glückstadt 1657–1660 (Hede 145B, Mzm. Jacob Schwieger), Kopenhagen-Folgeprägung 1666 (Hede 44 «1 Guldkrone»
        und Hede 45 «2 Guldkrone», jüngere Müntzformel 5,590 g rau / 5,126 g fein)<sup>[ref:danskmoent-f3h44]</sup> und in Kopenhagen 1668 (KM# 303, bei reduziertem Tarif von 3 Speciedaler und kleinerem
        Raugewicht von 5,47 g — ein verwandter, aber physikalisch anderer Müntzfuß). Mit dem Tod Frederiks III. 1670 endet die Guldkrone-Tarifprägung; Christian V. setzt sie nicht fort und prägt in Glückstadt
        nur noch nach dem Reichsdukatenfuß. <b>Nicht zu verwechseln mit dem Goldgulden</b> (HRR-Goldmünze nach Reichsmünzordnung 1559, andere Lineage und andere Tarifeinheit).

        '
      en: 'The Guldkrone tariff logic already begins in 1618 in parallel with Christian IV''s silver Corona Danica: Christian IV strikes 2-Guldkroner («dobbelt guldkrone») that are metrically identical
        to the later Frederik III form (.917 fineness, 5.996 g rough / 5.496 g fine)<sup>[ref:danskmoent-c4h25]</sup>. The Hede 25 series (years 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648) and
        Hede 28 (double Guldkrone 1628, documented in the Esrum hoard, Ingvardson & Märcher 2010<sup>[ref:danskmoent-c4h25]</sup>) served as court gifts and mercenary pay rather than mass production. <b>Hede
        1957 records the nomenclature shift between the two reigns explicitly in footnote (1)</b>: «<i>Betegnelsen guldkrone dækker under Frederik III den mønt, Christian IV kaldte 2 guldkrone</i>»<sup>[ref:danskmoent-f3guldkr]</sup>
        — what Frederik III calls «1 Guldkrone» is physically the same coin Christian IV called «2 Guldkrone»; Christian IV''s own «1 Guldkrone» (Hede 26, ~3 g rough) physically corresponds to ½ Guldkrone
        under Frederik III''s definition. A gold <b>tariff coin</b> of Frederik III, introduced at Glückstadt in 1657; the gold counterpart of the Krone-Mønt category, with the same tariff logic as the
        silver Krone but in 22-carat gold and with its own metric definition (≈ 39 pieces per Cologne mark of raw 22-carat alloy = 5.996 g rough / 5.498 g fine each). Tariff <b>1 Guldkrone = 3½ Speciedaler
        = 21 Mark Dansk</b>. Struck at Glückstadt 1657–1660 (Hede 145B, mintmaster Jacob Schwieger), Copenhagen follow-up 1666 (Hede 44 «1 Guldkrone» and Hede 45 «2 Guldkrone», younger Müntzformel 5.590
        g rough / 5.126 g fine)<sup>[ref:danskmoent-f3h44]</sup> and at Copenhagen in 1668 (KM# 303, at a reduced tariff of 3 Speciedaler and a smaller rough weight of 5.47 g — a related but physically
        distinct standard). With the death of Frederik III in 1670 Guldkrone tariff coinage ends; Christian V does not continue it and strikes Glückstadt gold only on the Reichsdukatenfuß. <b>Not to be
        confused with the Goldgulden</b> (Holy Roman Empire gold coin under the Reichsmünzordnung of 1559, separate lineage and a different tariff unit).'
      uk: 'Тарифна логіка Guldkrone починається вже 1618 р. паралельно зі срібною Corona Danica Кристіана IV: Кристіан IV карбує 2-Guldkroner («dobbelt guldkrone»), метрично ідентичні пізнішій формі Frederik
        III (.917 проби, 5,996 г повної / 5,496 г чистого)<sup>[ref:danskmoent-c4h25]</sup>. Серія Hede 25 (роки 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648) і Hede 28 (подвійна Guldkrone 1628,
        задокументована у Esrum-скарбі Ingvardson & Märcher 2010<sup>[ref:danskmoent-c4h25]</sup>) слугувала придворним подарунком та платою найманцям, а не масовим карбуванням. <b>Hede 1957 явно фіксує
        номенклатурний зсув між двома правліннями у виносці (1)</b>: «<i>Betegnelsen guldkrone dækker under Frederik III den mønt, Christian IV kaldte 2 guldkrone</i>»<sup>[ref:danskmoent-f3guldkr]</sup>
        — те, що Фредерік III називає «1 Guldkrone», фізично та сама монета, яку Кристіан IV називав «2 Guldkrone»; власна «1 Guldkrone» Кристіана IV (Hede 26, ~3 г повної ваги) фізично відповідає ½ Guldkrone
        в означенні Фредеріка III. Золота <b>тарифна монета</b> Фредеріка III, запроваджена в Glückstadt 1657 р.; золотий аналог Krone-Mønt-категорії з тією ж тарифною логікою, що й срібна Krone, але в
        22-каратному золоті й з власним метричним означенням (≈ 39 штук з кельнської марки сплаву 22 карат = 5,996 г повної ваги / 5,498 г чистого на штуку). Тариф <b>1 Guldkrone = 3½ Speciedaler = 21 Mark
        Dansk</b>. Карбувалася в Glückstadt 1657–1660 (Hede 145B, монетмайстер Jacob Schwieger), копенгагенський наступний випуск 1666 (Hede 44 «1 Guldkrone» і Hede 45 «2 Guldkrone», новіша монетна формула
        5,590 г повної / 5,126 г чистого)<sup>[ref:danskmoent-f3h44]</sup> і в Копенгагені 1668 р. (KM# 303, зі зниженим тарифом 3 Speciedaler і меншою повною вагою 5,47 г — споріднена, але фізично окрема
        стопа). Зі смертю Фредеріка III 1670 р. тарифне карбування Guldkrone завершується; Кристіан V його не продовжує і в Glückstadt карбує золото лише за Reichsdukatenfuß. <b>Не плутати з Goldgulden</b>
        (золота монета Священної Римської імперії за Reichsmünzordnung 1559, окрема лінія й інша тарифна одиниця).'
    closing_label:
      de: Zusammenfassung · 53 Jahre Krone-Mønt-Goldparallele (Christian IV 1618-1648 + Frederik III 1655-1668)
      en: Summary · 53 years of the Krone-Mønt gold parallel (Christian IV 1618-1648 + Frederik III 1655-1668)
      uk: Підсумок · 53 роки золотої паралелі Krone-Mønt (Кристіан IV 1618-1648 + Фредерік III 1655-1668)
    closing:
      de: 'Der Guldkrone-Fuß ist die <b>goldene Parallele der Krone-Mønt-Lineage über zwei Regenten</b>: er beginnt 1618 unter Christian IV. als 2-Guldkrone-Vorgängerphase parallel zur silbernen Corona
        Danica — Hofgeschenk- und Soldzahlungs-Karbung, Hede 25/28-Serie biß 1648<sup>[ref:danskmoent-c4h25]</sup> — und mündet 1655 in Frederik III.s formale Massenkarbung der 1-Guldkrone (Hede 145B-Glückstadt-Hauptphase
        1657–1660; Kopenhagener Folgeprägung 1666 Hede 44/45 und 1668 KM-303 mit reduziertem Tarif)<sup>[ref:danskmoent-f3h44]</sup><sup>[ref:danskmoent-f3guldkr]</sup>. Mit der Commerce-Collegium-Empfehlung
        vom 14. Februar 1671 endet die reguläre Karbung. Christian V. setzt die Linie nicht fort; die Goldprägung läuft danach nur noch im Reichsdukatenfuß.'
      en: 'The Guldkrone-Fuß is the <b>gold parallel of the Krone-Mønt lineage spanning two rulers</b>: it begins in 1618 under Christian IV as a 2-Guldkrone predecessor phase running alongside the silver
        Corona Danica — court-gift and mercenary-pay coinage, the Hede 25/28 series through 1648<sup>[ref:danskmoent-c4h25]</sup> — and flows in 1655 into Frederik III''s formal mass coinage of the 1-Guldkrone
        (Hede 145B Glückstadt main phase 1657–1660; Copenhagen follow-up issues 1666 Hede 44/45 and 1668 KM-303 at a reduced tariff)<sup>[ref:danskmoent-f3h44]</sup><sup>[ref:danskmoent-f3guldkr]</sup>.
        The Commerce Collegium recommendation of 14 February 1671 ends regular minting. Christian V does not continue the line; gold coinage thereafter runs only on the Reichsdukatenfuß.'
      uk: 'Guldkrone-Fuß — це <b>золота паралель лінії Krone-Mønt через двох правителів</b>: вона починається 1618 р. за Кристіана IV як передфаза 2-Guldkrone паралельно зі срібною Corona Danica — карбування
        придворного подарунку та плати найманцям, серія Hede 25/28 до 1648 р.<sup>[ref:danskmoent-c4h25]</sup> — і 1655 р. впадає у формальне масове карбування Frederik III 1-Guldkrone (головна фаза Hede
        145B Glückstadt 1657–1660; копенгагенські наступні випуски 1666 Hede 44/45 та 1668 KM-303 зі зниженим тарифом)<sup>[ref:danskmoent-f3h44]</sup><sup>[ref:danskmoent-f3guldkr]</sup>. Рекомендація
        Commerce Collegium від 14 лютого 1671 завершує регулярне карбування. Кристіан V лінію не продовжує; золоте карбування далі ведеться лише за Reichsdukatenfuß.'
  11_333_thaler:
    pdate_label:
      de: 'Geltungsbereich: 15./31. Juli 1726 (Forordning Friedrichs IV., Kurantmøntfod) → 5. Januar 1813 (Statsbankerot, Forordning Friedrichs VI.) · ca. 87 Jahre als Hauptalltagswährung; Altbestände als
        Scheidemünzen biß zur Krone-Reform 1875'
      en: 'Period of validity: 15/31 July 1726 (Forordning of Friedrich IV, Kurantmøntfod) → 5 January 1813 (Statsbankerot, Forordning of Friedrich VI) · ca. 87 years as main everyday currency; old stocks
        circulated as petty coinage until the Krone reform of 1875'
      uk: 'Період дії: 15/31 липня 1726 (Forordning Фредеріка IV, Kurantmøntfod) → 5 січня 1813 (Statsbankerot, Forordning Фредеріка VI) · бл. 87 років як основна повсякденна валюта; старі запаси як розмінна
        монета до Krone-реформи 1875'
    hintergrund:
      de: '<b>11⅓-Thaler-Fuß · Rigsdaler Courant</b> — etabliert durch die <b>Forordning vom 15./31. Juli 1726</b> Friedrichs IV. als <i>Kurantmøntfod</i> des dänisch-norwegischen Verbundes. Aus einer feinen
        Cöllnischen Marck (233,856 g) wurden 11⅓ Rigsdaler Courant ausgeprägt — Feingewicht ≈ 20,63 g pro Daler. <b>Hauptalltagswährung des Gesamtstaats</b> während fast des gesamten 18. Jahrhunderts; läuft
        im Königreich Dänemark/Norwegen biß zum Staatsbankrott am 5. Januar 1813 (Forordning Friedrichs VI.), als der Rigsbankdaler im 18½-Thaler-Fuß den Kurantfuß ablöst. <b>In Holstein</b> tritt der Kurant ab der Schimmelmann-Reform 1788 (Speciesbank) hinter den Speciedaler zurück, bleibt aber in Kraft und wird in Altona weiter geprägt. Altbestände aus 1726–1813 blieben ab 1813 noch jahrzehntelang als Scheidemünzen im Umlauf, biß sie mit der Krone-Reform 1875 (Skandinavische
        Münzunion) endgültig eingezogen wurden.

        '
      en: '<b>11⅓-Thaler-Fuß · Rigsdaler Courant</b> — established by Friedrich IV''s <b>Forordning of 15/31 July 1726</b> as the <i>Kurantmøntfod</i> of the Danish-Norwegian composite state. From one fine
        Cologne mark (233.856 g) 11⅓ Rigsdaler Courant were struck — fine weight ≈ 20.63 g per daler. <b>Main everyday currency of the composite state</b> through most of the 18th century; in the Kingdom
        of Denmark/Norway it remained in force until the state bankruptcy of 5 January 1813 (Forordning of Friedrich VI), when the Rigsbankdaler on the 18½-Thaler-Fuß replaced the Kurantfuß. <b>In Holstein</b>, by contrast, the kurant recedes behind the Speciedaler from the Schimmelmann reform of 1788 (Speciesbank) onward, but it remains in force and is still struck at Altona. Old stocks from 1726–1813 remained in circulation as petty coinage for decades after 1813, until they were finally
        withdrawn by the Krone reform of 1875 (Scandinavian Monetary Union).

        '
      uk: '<b>11⅓-Thaler-Fuß · Rigsdaler Courant</b> — встановлений <b>Forordning 15/31 липня 1726</b> Фредеріка IV як <i>Kurantmøntfod</i> Королівства Данії і Норвегії. З однієї марки чистого срібла кельнської
        ваги (233,856 г) карбувалося 11⅓ Rigsdaler Courant — чиста вага ≈ 20,63 г на одного даллера. <b>Основна повсякденна валюта цілісної держави</b> впродовж майже всього XVIII ст.; у Королівстві Данії/Норвегії
        дія тривала до державного банкрутства 5 січня 1813 р. (Forordning Фредеріка VI), коли Rigsbankdaler у 18½-Thaler-Fuß замістив Kurantfuß. <b>У Гольштейні</b> ж kurant від реформи Шіммельмана 1788 р. (Speciesbank) відступає за Speciedaler, але лишається чинним і далі карбується в Альтоні. Старі запаси 1726–1813 ще десятиліттями залишалися в обігу як розмінна монета після 1813 — аж до Krone-реформи 1875 р. (Скандинавська монетна унія), коли їх остаточно вилучили з обігу.

        '
  18_5_thaler:
    pdate_label:
      de: 'Geltungsbereich: 5. Januar 1813 (Forordning Friedrichs VI., nach Statsbankerot) → Krone-Reform 1873–1875 · 1854 ohne Fußänderung in Rigsdaler Rigsmønt umbenannt'
      en: 'Period of validity: 5 January 1813 (Forordning of Friedrich VI, after the Statsbankerot) → Krone reform 1873–1875 · renamed Rigsdaler Rigsmønt in 1854 without a change of standard'
      uk: 'Період дії: 5 січня 1813 (Forordning Фредеріка VI, після Statsbankerot) → Krone-реформа 1873–1875 · 1854 перейменовано на Rigsdaler Rigsmønt без зміни стопи'
    hintergrund:
      de: '<b>18½-Thaler-Fuß · Rigsbankdaler / Rigsdaler Rigsmønt</b> — Notreform Friedrichs VI. nach dem dänischen Staatsbankrott. Die <b>Forordning vom 5. Januar 1813</b> setzt den neuen Hauptstandard
        auf 18½ Rigsbankdaler aus einer feinen Cöllnischen Marck (233,856 g) — Feingewicht ≈ 12,64 g pro Daler. <b>§10 der Forordning</b> verankert ausdrücklich <b>1 Speciedaler = 2 Rigsbankdaler</b>, also
        eine glatte ½-Anteil-Anbindung an den 9¼-Thaler-Fuß. 1854 wird die Münze ohne Fußänderung in <b>Rigsdaler Rigsmønt</b> umbenannt; 1873–1875 ersetzt die <b>Krone</b> der Skandinavischen Münzunion
        (Schweden, Norwegen, Dänemark) den Rigsdaler. Hauptträger des dänischen Geldumlaufs in der zweiten Hälfte des 19. Jahrhunderts. In Schleswig-Holstein parallel zum 9¼-Thaler-Fuß als kleinerer Realsubstandard
        im Einsatz biß zur preußischen Annexion 24. August 1866.<br>

        <b>Hinweis:</b> derzeit liegen für diese Sektion noch keine katalogisierten Münzen im Datensatz vor; die Sektion ist als Platzhalter eingerichtet und wird bei künftiger Detail-Bearbeitung mit Belegtypen
        aus Hede / Sieg / IKMK København befüllt.

        '
      en: '<b>18½-Thaler-Fuß · Rigsbankdaler / Rigsdaler Rigsmønt</b> — Friedrich VI''s emergency reform after the Danish state bankruptcy. The <b>Forordning of 5 January 1813</b> sets the new principal
        standard at 18½ Rigsbankdaler per fine Cologne mark (233.856 g) — fine weight ≈ 12.64 g per daler. <b>§10 of the Forordning</b> explicitly anchors <b>1 Speciedaler = 2 Rigsbankdaler</b>, a clean
        ½-share link to the 9¼-Thaler-Fuß. In 1854 the coin is renamed <b>Rigsdaler Rigsmønt</b> without any change of standard; in 1873–1875 the <b>Krone</b> of the Scandinavian Monetary Union (Sweden,
        Norway, Denmark) supersedes the Rigsdaler. The main carrier of the Danish money supply in the second half of the 19th century. In Schleswig-Holstein it ran in parallel with the 9¼-Thaler-Fuß as
        a lesser actual sub-standard until the Prussian annexation of 24 August 1866.<br>

        <b>Note:</b> no catalogued coins for this section are present in the dataset yet; the section is set up as a placeholder and will be populated with reference types from Hede / Sieg / IKMK København
        in future detailed work.

        '
      uk: '<b>18½-Thaler-Fuß · Rigsbankdaler / Rigsdaler Rigsmønt</b> — надзвичайна реформа Фредеріка VI після данського державного банкрутства. <b>Forordning 5 січня 1813</b> встановлює новий головний
        стандарт на 18½ Rigsbankdaler з однієї марки чистого срібла кельнської ваги (233,856 г) — чиста вага ≈ 12,64 г на даллер. <b>§10 Forordning</b> явно закріплює <b>1 Speciedaler = 2 Rigsbankdaler</b>,
        тобто чисту привʼязку ½-частки до 9¼-Thaler-Fuß. 1854 р. монета перейменовується на <b>Rigsdaler Rigsmønt</b> без зміни стопи; 1873–1875 рр. <b>Krone</b> Скандинавської монетної унії (Швеція, Норвегія,
        Данія) витісняє Rigsdaler. Головний носій данського грошового обігу в другій половині XIX ст. У Шлезвіг-Гольштейні діяв паралельно з 9¼-Thaler-Fuß як менший фактичний підстандарт до прусської анексії
        24 серпня 1866 р.<br>

        <b>Примітка:</b> наразі в наборі даних немає каталогізованих монет для цієї секції; секція налаштована як заготовка і буде наповнена еталонними типами з Hede / Sieg / IKMK København у майбутній
        детальній роботі.

        '
  kronefod:
    pdate_label:
      de: 'Geltungsbereich: 23. Mai 1873 (Mønlov, Lov nr. 66) → 2. August 1914 (Aussetzung der Goldkonvertibilität) · 41 Jahre als aktiver Hauptstandard, formell biß 1924'
      en: 'Period of validity: 23 May 1873 (Mønlov, Lov nr. 66) → 2 August 1914 (suspension of gold convertibility) · 41 years as the active principal standard, formally until 1924'
      uk: 'Період дії: 23 травня 1873 (Mønlov, Lov nr. 66) → 2 серпня 1914 (призупинення золотої конвертованості) · 41 рік активним головним стандартом, формально до 1924'
    closing_label:
      de: Zusammenfassung · 41 Jahre Krone-fod
      en: Summary · 41 years of the Krone-fod
      uk: Підсумок · 41 рік Krone-fod
    closing:
      de: 'Der dänische Krone-fod ist <b>der kürzlebigste reguläre Hauptstandard</b> in der hier behandelten Geldgeschichte — knapp vier Jahrzehnte funktionierender Goldumlauf mit voll integrierter Silber-
        und Bronze-Subsidiarstruktur. Strukturmerkmal: die abgestufte Feingehalts-Leiter <b>.900 Au → .800 Ag → .600 / .400 Ag → Bronze</b> ist die langlebigste Innovation des Mønlovs — nach der Krone-Goldsuspendierung
        1914 prägt Dänemark die Subsidiarstückelungen kontinuierlich weiter (die 25 øre wechselt 1920–1922 von Silber auf Cupro-Nickel, die 10 øre folgt; die Bronze-øre werden 1973 außer Umlauf gesetzt).<sup>[ref:en-8493]</sup>
        Die Skandinavische Müntzunion blieb wirtschaftlich erfolgreich, biß der Kriegsausbruch 1914 die einheitliche Goldparität faktisch beendete; danach driften die drei nordischen Kroner auseinander,
        was 1924 zur formellen Auflösung der Münzunion führt.<sup>[ref:wikipedia-da-den-skandinaviske-m-ntunion]</sup> Dänemark kehrt 1927 mit demselben Goldgehalt wie 1913 zum Goldstandard zurück, gibt
        ihn 1931 endgültig auf.<sup>[ref:econstor-386525536]</sup>

        '
      en: 'The Danish Krone-fod is <b>the shortest-lived regular principal standard</b> in the monetary history covered here — barely four decades of working gold circulation with a fully integrated silver
        and bronze subsidiary structure. Structural feature: the graded fineness ladder <b>.900 Au → .800 Ag → .600 / .400 Ag → bronze</b> is the longest-lived innovation of the Mønlov — after the 1914
        gold suspension, Denmark continues to mint the subsidiary denominations (the 25 øre transitions from silver to cupro-nickel in 1920–1922, the 10 øre follows; the bronze øre are withdrawn from circulation
        in 1973).<sup>[ref:en-8493]</sup> The Scandinavian Monetary Union remained economically successful until the outbreak of war in 1914 effectively ended the unified gold parity; thereafter the three
        Nordic kroner diverged, leading in 1924 to the formal dissolution of the monetary union.<sup>[ref:wikipedia-da-den-skandinaviske-m-ntunion]</sup> Denmark returned to the gold standard in 1927 at
        the same gold content as in 1913, and abandoned it permanently in 1931.<sup>[ref:econstor-386525536]</sup>'
      uk: 'Данський Krone-fod — <b>найкоротший регулярний основний стандарт</b> в усій розглянутій тут грошовій історії: ледь чотири десятиліття справжнього золотого обігу з повністю інтегрованою срібно-бронзовою
        субсидіарною структурою. Структурна риса: ступенева сходова шкала проб <b>.900 Au → .800 Ag → .600 / .400 Ag → бронза</b> — найдовговічніша інновація Mønlov; після призупинення золотого Krone 1914
        р. Данія продовжує карбувати субсидіарні номінали (25 øre 1920–1922 рр. переходить зі срібла на купроникель, 10 øre йде вслід; бронзові øre виведено з обігу 1973 р.).<sup>[ref:en-8493]</sup> Скандинавська
        монетна унія залишалася економічно успішною до 1914, коли початок війни де-факто завершив єдину золоту паритетність; потім три північні крони розходяться, що 1924 р. призводить до формального розпуску
        монетної унії.<sup>[ref:wikipedia-da-den-skandinaviske-m-ntunion]</sup> Данія повертається до золотого стандарту 1927 р. з тим самим золотим вмістом, що й 1913, остаточно полишає його 1931.<sup>[ref:econstor-386525536]</sup>'
  seed_unsorted:
    pdate_label:
      de: Bulk-Seed-Sammelbucket — Geltungsbereich pro Münze noch zuzuweisen
      en: Bulk seed bucket — period of validity to be assigned per coin
      uk: Bulk-seed загальний кошик — період дії потрібно призначити per coin
    hintergrund:
      de: Technischer Sammelbucket für bulk-importierte Münzen aus mehreren Quellen. Pro Quelle eine eigene Phase (<code>A</code> = ucoin-Bulk; <code>hede</code> = Hede 1971 via danskmoent.dk, 
        automatisch via Build aus <code>data/seed/hede/denmark.yml</code> eingespeist). Bei künftiger Detail-Bearbeitung wandern die Stücke in den jeweils passenden eigentlichen Müntzfuß 
        ([fuss:9_25_thaler], [fuss:11_333_thaler], [fuss:18_5_thaler], [fuss:kronefod], [fuss:reichsdukatenfuss] etc.).
      en: Technical catch-all bucket for bulk-imported coins from several sources. One phase per source (<code>A</code> = ucoin bulk; <code>hede</code> = Hede 1971 via danskmoent.dk, auto-merged at 
        build time from <code>data/seed/hede/denmark.yml</code>). On future detailed work the pieces move to their proper Münzfuß ([fuss:9_25_thaler], [fuss:11_333_thaler], 
        [fuss:18_5_thaler], [fuss:kronefod], [fuss:reichsdukatenfuss], etc.).
      uk: Технічний загальний кошик для bulk-імпортованих монет із кількох джерел. Окрема фаза на джерело (<code>A</code> = ucoin-bulk; <code>hede</code> = Hede 1971 через danskmoent.dk, авто-merge 
        при build з <code>data/seed/hede/denmark.yml</code>). При майбутній детальній роботі монети перейдуть у відповідну Müntzfuß ([fuss:9_25_thaler], [fuss:11_333_thaler], 
        [fuss:18_5_thaler], [fuss:kronefod], [fuss:reichsdukatenfuss] тощо).
phases:
  nobel_fod:
    - id: I
      year_from: 1496
      year_to: 1532
      from_label: '1496'
      to_label: '1532'
      title:
        de: 'Phase I · Prestige-Karbung 1496-1532'
        en: 'Phase I · prestige coinage 1496-1532'
        uk: 'Фаза I · престижне карбування 1496-1532'
      description:
        de: 'Einzige Phase der 16-Nobelfod über drei Regenten und drei Münzstätten: <b>Hans</b> 1496 Malmø/København + 1502 Malmø (Galster 24)<sup>[ref:danskmoent-1nobel]</sup>, <b>Christian II.</b> 1516 +
          1518 Malmø (Galster 37), <b>Frederik I.</b> 1532 København/Malmø (Galster 45) + undatiertes Ribe (Galster 68 + 69).'
        en: 'The single phase of 16-Nobelfod across three rulers and three mints: <b>Hans</b> 1496 Malmø/Copenhagen + 1502 Malmø (Galster 24)<sup>[ref:danskmoent-1nobel]</sup>, <b>Christian II</b> 1516 + 1518
          Malmø (Galster 37), <b>Frederik I</b> 1532 Copenhagen/Malmø (Galster 45) + undated Ribe (Galster 68 + 69).'
        uk: 'Єдина фаза 16-Nobelfod через трьох правителів і три монетні двори: <b>Hans</b> 1496 Malmø/Копенгаген + 1502 Malmø (Galster 24)<sup>[ref:danskmoent-1nobel]</sup>, <b>Christian II</b> 1516 + 1518
          Malmø (Galster 37), <b>Frederik I</b> 1532 Копенгаген/Malmø (Galster 45) + недатовані Ribe (Galster 68 + 69).'
  8_5_gylden_fod:
    - id: A1
      year_from: 1514
      year_to: 1517
      from_label: '1514'
      to_label: '1517'
      title:
        de: 'Phase A1 · Lovkompleks baseline 1514-1517 · 14 Lod (875 ‰), 27,51 g rauh / 24,07 g fein je Sølvgylden — Malmö'
        en: 'Phase A1 · Lovkompleks baseline 1514-1517 · 14 Lod (875 ‰), 27.51 g rough / 24.07 g fine per Sølvgylden — Malmö'
        uk: 'Фаза A1 · Lovkompleks baseline 1514-1517 · 14 Lod (875 ‰), 27,51 г повної / 24,07 г чистого на Sølvgylden — Мальме'
      description:
        de: '<em>Precursor-Akte 1513</em> (NICHT Teil des Lovkompleks selbst): <b>22. Juli 1513 Haandfæstning</b> (Wilcke 7-2 S. 4 verbatim «<i>Den 22. Juli 1513 udstedtes Kong Christian II.s Haandfæstning</i>»)
          etabliert die Forderung «<i>thue mark giør fyldest for en riksdlr.</i>»; <b>1. August 1513 Dynes Blicher Beskikkelsesbrev</b> ernennt Diens (Hans) Blicher zum Mzm. in Malmø — Skilling-Hvid-Tarif
          Wilcke 7-2 S. 150 (Skilling 96 Stk./M @ 5¾ Lod, Hvid 222 Stk./M @ 4½ Lod). Diese 1513-Akte sind die unmittelbare Vorbereitung nach Hans'' Tod 20. Februar 1513 und gehen der Krönung 11. Juni 1514
          voraus. <b>Lovkompleks-Karbung beginnt 1514</b> mit der <b>Møntordning af Sommeren 1514 «Dienis Malmö Brev»</b> (Wilcke 7-2 S. 152-153), die den Hauptkurant-Sølvgylden 8½ Stk./Cölln. Marck rauh
          @ 14 Lod (27,51 g rauh / 24,07 g fein) etabliert. Begleitende Aktien des Lovkompleks: Norge-Forordning 3. August 1514 (Kalmar-Union-Extension), Kvittering Paasketid 1515, Sjælland åbent Brev 24.
          August 1515. Hauptmünze Malmö unter Mzm. Diens (Hans) Blicher; Galster c2g-38 attestiert Sølvgylden 1516+1518+1523 (.875/27,06 g). Skillinge 1515-1517 sind «<i>betydelig tungere</i>» als das Brev
          specifiziert (Wilcke S. 153) — Specimen-Drift über die Ordnung-Soll.'
        en: '<em>Precursor acts 1513</em> (NOT part of the Lovkompleks itself): <b>22 July 1513 Haandfæstning</b> (Wilcke 7-2 p. 4 verbatim «<i>Den 22. Juli 1513 udstedtes Kong Christian II.s Haandfæstning</i>»)
          establishes the requirement «<i>thue mark giør fyldest for en riksdlr.</i>»; <b>1 August 1513 Dynes Blicher Beskikkelsesbrev</b> appoints Diens (Hans) Blicher as mintmaster at Malmø — Skilling-Hvid
          tariff per Wilcke 7-2 p. 150 (Skilling 96/M at 5¾ Lod, Hvid 222/M at 4½ Lod). These 1513 acts are the immediate preparation after Hans''s death of 20 February 1513 and predate the coronation of
          11 June 1514. <b>Lovkompleks coinage begins in 1514</b> with the <b>Møntordning af Sommeren 1514 «Dienis Malmö Brev»</b> (Wilcke 7-2 pp. 152-153), which establishes the Hauptkurant Sølvgylden
          at 8½ pieces/Cologne mark rough at 14 Lod (27.51 g rough / 24.07 g fine). Companion acts of the Lovkompleks: Norge ordinance 3 August 1514 (Kalmar Union extension), Kvittering Paasketid 1515,
          Sjælland åbent Brev 24 August 1515. Main mint Malmö under mintmaster Diens (Hans) Blicher; Galster c2g-38 attests Sølvgylden 1516+1518+1523 (.875/27.06 g). Skilling pieces 1515-1517 are «<i>betydelig
          tungere</i>» than the Brev specifies (Wilcke p. 153) — specimen drift above the ordinance soll.'
        uk: '<em>Прекурсорні акти 1513</em> (НЕ частина Lovkompleks): <b>22 липня 1513 Haandfæstning</b> (Wilcke 7-2 с. 4 verbatim «<i>Den 22. Juli 1513 udstedtes Kong Christian II.s Haandfæstning</i>»)
          встановлює вимогу «<i>thue mark giør fyldest for en riksdlr.</i>»; <b>1 серпня 1513 Dynes Blicher Beskikkelsesbrev</b> призначає Diens (Hans) Blicher монетмайстром у Мальме — тариф Skilling-Hvid
          за Wilcke 7-2 с. 150 (Skilling 96/M за 5¾ Lod, Hvid 222/M за 4½ Lod). Ці акти 1513 — безпосередня підготовка після смерті Hans 20 лютого 1513 і передують коронації 11 червня 1514. <b>Карбування
          Lovkompleks починається 1514</b> з <b>Møntordning af Sommeren 1514 «Dienis Malmö Brev»</b> (Wilcke 7-2 с. 152-153), яка встановлює Hauptkurant-Sølvgylden у 8½ шт. з повної кельнської марки за
          14 Lod (27,51 г повної / 24,07 г чистого). Супутні акти Lovkompleks: норвезький ордонанс 3 серпня 1514 (Kalmar-Union extension), Kvittering Paasketid 1515, Sjælland åbent Brev 24 серпня 1515.
          Головний монетний двір Мальме за монетмайстра Diens (Hans) Blicher; Galster c2g-38 засвідчує Sølvgylden 1516+1518+1523 (.875/27,06 г). Skilling 1515-1517 «<i>betydelig tungere</i>» ніж specifiziert
          у Brev (Wilcke с. 153) — specimen drift над soll-ом ордонансу.'
    - id: A2
      year_from: 1518
      year_to: 1522
      from_label: '1518'
      to_label: '1522'
      title:
        de: 'Phase A2 · Klipping-Debasierung 1518-1522 («ydel Kobber») — 18-Penning + 1-Skilling Klippinge'
        en: 'Phase A2 · Klipping debasement 1518-1522 («ydel Kobber») — 18-Penning + 1-Skilling Klippinge'
        uk: 'Фаза A2 · Klipping-девальвація 1518-1522 («ydel Kobber») — 18-Penning + 1-Skilling Klippinge'
      description:
        de: '1518 Klipping-Ordnung führt radikal abgesenkte Notmünz-Klippinge ein — Wilcke 7-2 S. 157 verbatim «<i>ydel Kobber</i>» (im Wesen Kupfer). Belegserie Galster S. 26-27 + S. 29-31 (18-Penning
          + 1-Skilling Klippinge); Numista-297656 attestiert 18 Penning Klipping 1518. Karbung im Vorfeld der Absetzung 1523 — Christian IIs Versuch, durch Notgeld die Bauernkrise + den Schwedenkrieg zu
          finanzieren. Vægt der Klippinge variiert stark (1,47-2,35 g per Bruchstück), Probe nicht im Brev fixiert; Wilcke S. 153 charakterisiert sie als «<i>betydelig tungere</i>» Skillinger gefolgt von
          einem deutlich abwärtigen Drift.'
        en: 'The 1518 Klipping ordinance introduces radically debased emergency Klippinge — Wilcke 7-2 p. 157 verbatim «<i>ydel Kobber</i>» (essentially copper). Reference series Galster S. 26-27 and S.
          29-31 (18-Penning and 1-Skilling Klippinge); Numista-297656 attests 18 Penning Klipping 1518. Struck in the run-up to the 1523 deposition — Christian II''s attempt to fund the peasant crisis and
          the war with Sweden through emergency money. Klipping weights vary widely (1.47-2.35 g per fragment), fineness not fixed in the Brev; Wilcke p. 153 characterises them as «<i>betydelig tungere</i>»
          Skilling pieces followed by a sharp downward drift.'
        uk: 'Klipping-ордонанс 1518 запроваджує радикально девальвовані надзвичайні Klippinge — Wilcke 7-2 с. 157 verbatim «<i>ydel Kobber</i>» (по суті мідь). Еталонна серія Galster S. 26-27 + S. 29-31
          (18-Penning + 1-Skilling Klippinge); Numista-297656 засвідчує 18 Penning Klipping 1518. Карбування напередодні скинення 1523 — спроба Кристіана II через надзвичайні гроші фінансувати селянську
          кризу + шведську війну. Вага Klippinge сильно варіює (1,47-2,35 г на уламок), проба у Brev не зафіксована; Wilcke с. 153 характеризує їх як «<i>betydelig tungere</i>» Skilling-и з подальшим різким
          спадом.'
    - id: A3
      year_from: 1523
      year_to: 1523
      from_label: '1523'
      to_label: '1523'
      title:
        de: 'Phase A3 · Final-Konsolidierung 1523 · Massen-Sølvgylden Malmö pre-Absetzung 13. April 1523'
        en: 'Phase A3 · Final consolidation 1523 · mass Sølvgylden Malmö pre-deposition 13 April 1523'
        uk: 'Фаза A3 · Фінальна консолідація 1523 · масова Sølvgylden Мальме напередодні скинення 13 квітня 1523'
      description:
        de: 'Letzte Sølvgylden-Massenkarbung in Malmö am Vorabend der Absetzung. Wilcke 7-2 S. 156 verbatim «<i>meget almindelig</i>» (sehr verbreitet). Belegexemplare <b>Bruun-3933 + Bruun-3934</b> (Bruun-Lots
          im Stack''s Bowers Auktionskatalog Part I) attestieren Specimen-Brutto 28,74-29,49 g — 4-7 % über dem ordinance-Soll 27,51 g, typische frühneuzeitliche Specimen-Spannweite. Karbung endet abrupt
          mit Christian IIs Flucht ins Exil (13. April 1523); Frederik I übernimmt die dänische Krone und erläßt 25. Februar 1524 eine neue Møntordning ([fuss:8_gylden_fod]), die die Sølvgylden-Stückzahl
          auf 8/M strafft.'
        en: 'Last Sølvgylden mass coinage at Malmö on the eve of the deposition. Wilcke 7-2 p. 156 verbatim «<i>meget almindelig</i>» (very common). Reference specimens <b>Bruun-3933 + Bruun-3934</b> (Bruun
          lots in the Stack''s Bowers Part I auction catalogue) attest specimen brutto 28.74-29.49 g — 4-7 % over the ordinance soll 27.51 g, typical early-modern specimen range. Coinage ends abruptly with
          Christian II''s flight into exile (13 April 1523); Frederik I takes the Danish crown and issues a new Møntordning on 25 February 1524 ([fuss:8_gylden_fod]), which tightens the Sølvgylden
          count to 8/M.'
        uk: 'Остання масова Sølvgylden-карбування у Мальме напередодні скинення. Wilcke 7-2 с. 156 verbatim «<i>meget almindelig</i>» (дуже поширене). Еталонні зразки <b>Bruun-3933 + Bruun-3934</b> (Bruun-лоти
          у каталозі Stack''s Bowers Part I) засвідчують повну вагу зразка 28,74-29,49 г — 4-7 % понад ordinance-soll 27,51 г, типовий ранньомодерний specimen-діапазон. Карбування завершується раптово втечею
          Кристіана II до вигнання (13 квітня 1523); Frederik I приймає данську корону і 25 лютого 1524 видає нову Møntordning ([fuss:8_gylden_fod]), яка стискає кількість Sølvgylden до 8/M.'
  8_gylden_fod:
    - id: A1
      year_from: 1524
      year_to: 1531
      from_label: '1524'
      to_label: '1531'
      title:
        de: 'Phase A1 · Hauptphase 1524-1531 · 8 Sølvgylden/M @ 14 Lod, mf 9,143, 25,578 g fein je Sølvgylden — København + Malmö'
        en: 'Phase A1 · Main phase 1524-1531 · 8 Sølvgylden/M at 14 Lod, mf 9.143, 25.578 g fine per Sølvgylden — Copenhagen + Malmö'
        uk: 'Фаза A1 · Головна фаза 1524-1531 · 8 Sølvgylden/M за 14 Lod, mf 9,143, 25,578 г чистого на Sølvgylden — Копенгаген + Мальме'
      description:
        de: 'Baseline-Phase der Møntordning vom 25. Februar 1524. <b>Karbung beginnt mit dem 14-Penning-Stück</b> (separater Akt 26. Februar 1524) als Klipping-Indfrielse-Mønt: Christian-IIs Klippinge werden
          gegen 14-Penning-Stücke umgetauscht. Numista-Belege f1g-* attestieren 14 Penning / 14 Penny aus Kopenhagen 1524 (Frederik I); Mzm. Jørgen Koch in Malmö, Hans Dringenberg in Aalborg (vorübergehende
          Filiale). 4 Skilling 1525 København (Galster f1g-Belegserie). Sølvgylden-Karbung erst ab 1531 dokumentiert — vermutlich pre-1531 Sølvgylden-Stücke in Wilcke-Reichweite, aber spezifische Galster-Datierungen
          ab 1531. Hauptmünzanstalt: Hovedmønten Malmö unter Mzm. Jørgen Koch (1520s).'
        en: 'Baseline phase of the Møntordning of 25 February 1524. <b>Coinage begins with the 14-Penning piece</b> (separate act of 26 February 1524) as Klipping redemption coin: Christian II''s Klippinge
          are exchanged for 14-Penning pieces. Numista records f1g-* attest 14 Penning / 14 Penny from Copenhagen 1524 (Frederik I); mintmaster Jørgen Koch at Malmö, Hans Dringenberg at Aalborg (temporary
          branch). 4 Skilling 1525 Copenhagen (Galster f1g reference series). Sølvgylden coinage first documented from 1531 — likely pre-1531 Sølvgylden pieces within Wilcke''s reach, but specific Galster
          datings begin in 1531. Main mint: Hovedmønten Malmö under mintmaster Jørgen Koch (1520s).'
        uk: 'Baseline-фаза Møntordning від 25 лютого 1524. <b>Карбування починається з 14-Penning-штуки</b> (окремий акт 26 лютого 1524) як Klipping-обмінна монета: Klippinge Кристіана II обмінювалися на
          14-Penning штуки. Numista-записи f1g-* засвідчують 14 Penning / 14 Penny з Копенгагена 1524 (Frederik I); монетмайстер Jørgen Koch у Мальме, Hans Dringenberg у Aalborg (тимчасова філія). 4 Skilling
          1525 Копенгаген (еталонна серія Galster f1g). Sølvgylden-карбування вперше задокументовано з 1531 — імовірно пре-1531 Sølvgylden-штуки в межах досяжності Wilcke, але специфічні Galster-датування
          починаються з 1531. Головний монетний двір: Hovedmønten Мальме за монетмайстра Jørgen Koch (1520-ті).'
    - id: A2
      year_from: 1532
      year_to: 1532
      from_label: '1532'
      to_label: '1532'
      title:
        de: 'Phase A2 · Final-Konsolidierung 1532 · Galster 47-52 Sølvgylden-Serie · København'
        en: 'Phase A2 · Final consolidation 1532 · Galster 47-52 Sølvgylden series · Copenhagen'
        uk: 'Фаза A2 · Фінальна консолідація 1532 · серія Galster 47-52 Sølvgylden · Копенгаген'
      description:
        de: 'Finale Karbungs-Periode Frederik Is, dominiert von der <b>Sølvgylden-Serie Galster 47-52</b>: 1 Sølvgylden 1532 (Galster 47, 37,75 g brutto), 1½ Sølvgylden 1532 (Galster 48, 45,58 g — Doppel-Stück),
          ½ Sølvgylden 1532 mit Pillars/Statues-Obvers (Galster 48, 14,98 g), ¼ Sølvgylden 1532 (Galster 52, 7 g). Karbung in København unter Mzm. Jørgen Drews (transferiert von Husum) im <b>«<i>Nødens
          Aaret 1532</i>»</b> (Wilcke 7-2 S. 187 verbatim) — Frederik Is letztes volles Karbungs-Jahr. Tod des Königs 10. April 1533; Karbungs-Pause bis Christian IIIs Krönung 1537 + de-facto-Etablierung
          1534-1540 [fuss:8_daler_fod] Phase 0 1534-1540.'
        en: 'Frederik I''s final coinage period, dominated by the <b>Galster 47-52 Sølvgylden series</b>: 1 Sølvgylden 1532 (Galster 47, 37.75 g brutto), 1½ Sølvgylden 1532 (Galster 48, 45.58 g — double
          piece), ½ Sølvgylden 1532 with Pillars/Statues obverse (Galster 48, 14.98 g), ¼ Sølvgylden 1532 (Galster 52, 7 g). Coinage at Copenhagen under mintmaster Jørgen Drews (transferred from Husum)
          in <b>«<i>Nødens Aaret 1532</i>»</b> (Wilcke 7-2 p. 187 verbatim) — Frederik I''s last full year of coinage. King''s death 10 April 1533; coinage pause until Christian III''s coronation 1537 +
          de-facto establishment 1534-1540 [fuss:8_daler_fod] Phase 0 1534-1540.'
        uk: 'Фінальний період карбування Frederik I, домінований <b>серією Galster 47-52 Sølvgylden</b>: 1 Sølvgylden 1532 (Galster 47, 37,75 г повної), 1½ Sølvgylden 1532 (Galster 48, 45,58 г — подвійна
          штука), ½ Sølvgylden 1532 з Pillars/Statues-обверсом (Galster 48, 14,98 г), ¼ Sølvgylden 1532 (Galster 52, 7 г). Карбування у Копенгагені за монетмайстра Jørgen Drews (переведений з Хузума) у
          <b>«<i>Nødens Aaret 1532</i>»</b> (Wilcke 7-2 с. 187 verbatim) — останній повний рік карбування Frederik I. Смерть короля 10 квітня 1533; пауза карбування до коронації Кристіана III 1537 + де-факто-встановлення
          1534-1540 [fuss:8_daler_fod] Phase 0 1534-1540.'
  8_daler_fod:
    - id: '0'
      year_from: 1534
      year_to: 1540
      from_label: '1534'
      to_label: '1540'
      title:
        de: Phase 0 · De-facto-Etablierung 1534-1540 · Grevens-Fejde-Notmünz-Kaskade + 1537 Joachimsdaler Kopenhagen 14½-Lod-Anker — Mzm. Reynold Junge
        en: Phase 0 · De-facto establishment 1534-1540 · Counts' Feud emergency-coinage cascade + 1537 Joachimsdaler Copenhagen 14½-Lod anchor — mintmaster Reynold Junge
        uk: Фаза 0 · Де-факто-встановлення 1534-1540 · каскад надзвичайної монети Grevens Fejde + 1537 Joachimsdaler Копенгаген 14½-Lod якір — монетмайстер Reynold Junge
      description:
        de: "Vor-Møntordnungs-Phase: das 14½-Lod-Daler-Standard <b>de facto</b> etabliert durch Reynold Junges Karbung. Wilcke 1950 Kap. 7-3 S. 242 verbatim: «<i>die 1537 Karbung etabliert das 14½-Lod-Daler-Standard</i>».
          Drei interne Sub-Phasen: <b>(1) 1534-1536 Grevens-Fejde-Notmünz-Kaskade</b> — 2-Mark-Klippinge bei 10/8/7 Lod (.625/.500/.4375), 4-Skilling-Klippinge bei 5/4/3½ Lod (.3125/.250/.219), sub-Skilling-Tiers
          bei 3-2½ Lod — Kriegszeit-Debasierung der unteren Stückelungs-Tiers, ohne Veränderung des Hauptkurant-Standards (Junge zieht von Aarhus 1535 nach Roskilde 1535-37 — Mzm-Bewegung dokumentiert Frontverschiebung
          im Bürgerkrieg). <b>(2) 1537 Joachimsdaler-Anker Kopenhagen</b> — 8 Stk./Marck rauh @ 14½ Lod = 29,232 g rauh / 26,494 g fein (Bruun-4276 + 4277 + 4278 drei Stack''s-Bowers-Lots ≈ 28,5-28,94 g
          brutto). <em>Metrisch identisch mit Phase A1 ab 1541</em> — die 1537 Karbung etabliert das Daler-Standard de facto 4 Jahre vor der formalen Møntordning. <b>(3) 1538-1540 Konsolidierungs-Übergang</b>
          — Sub-Skilling-Notmünzen laufen fort, Junge bereitet aber die zentrale Kopenhagener Hauptmünze für die Møntordnungs-Karbung vor; ab Aufdeckung als Betrüger 1540-41 Übergabe an Povel Fechtel. <em>Belegexemplare</em>:
          Bruun-4155 2 Mark Klippe 1535 Aarhus (Galster 92B, 11,05 g, variant 2 @ 8 Lod), Bruun-4156 8 Skilling Klippe 1535 Aarhus (Galster 93, 2,72 g), Bruun-4194 1 Mark 1535 Roskilde, Bruun-4232 8 Skilling
          1535 Stockholm (Sieg-24), Bruun-4276/4277/4278 Joachimsdaler 1537 Kopenhagen, Bruun-4279 ½ Joachimsdaler 1537.dk Galster-Hede-Katalog (kontinuierliche Auflistung), Wilcke 1950 Metric-Continuity-Statement,
          und Reynold-Junge-Mintmaster-Kontinuität 1534-1540."
        en: "Pre-Møntordning phase: the 14½-Lod Daler standard <b>de facto</b> established through Reynold Junge's coinage. Wilcke 1950 Kap. 7-3 p. 242 verbatim: «<i>die 1537 Karbung etabliert das 14½-Lod-Daler-Standard</i>»
          (the 1537 coinage establishes the 14½-Lod Daler standard). Three internal sub-phases: <b>(1) 1534-1536 Counts' Feud emergency-coinage cascade</b> — 2-Mark Klippinge at 10/8/7 Lod (.625/.500/.4375),
          4-Skilling Klippinge at 5/4/3½ Lod (.3125/.250/.219), sub-Skilling tiers at 3-2½ Lod — wartime debasement of the lower-denomination tiers, without altering the Hauptkurant standard (Junge moves
          from Aarhus 1535 to Roskilde 1535-37 — mintmaster movement tracks the civil-war front). <b>(2) 1537 Joachimsdaler anchor Copenhagen</b> — 8 pieces/mark rough at 14½ Lod = 29.232 g rough / 26.494
          g fine (Bruun-4276 + 4277 + 4278 three Stack's Bowers lots ≈ 28.5-28.94 g brutto). <em>Metrically identical to Phase A1 from 1541</em> — the 1537 coinage establishes the Daler standard de facto
          four years before the formal Møntordning. <b>(3) 1538-1540 consolidation transition</b> — sub-Skilling emergency coinage continues, but Junge prepares the central Copenhagen royal mint for the
          Møntordning programme; upon his exposure as fraudster 1540-41 hand-over to Povel Fechtel. <em>Reference specimens</em>: Bruun-4155 2 Mark Klippe 1535 Aarhus (Galster 92B, 11.05 g, variant 2 at
          8 Lod), Bruun-4156 8 Skilling Klippe 1535 Aarhus (Galster 93, 2.72 g), Bruun-4194 1 Mark 1535 Roskilde, Bruun-4232 8 Skilling 1535 Stockholm (Sieg-24), Bruun-4276/4277/4278 Joachimsdaler 1537
          Copenhagen, Bruun-4279 ½ Joachimsdaler 1537.dk Galster-Hede catalogue (continuous listing), Wilcke 1950 metric-continuity statement, and Reynold Junge mintmaster continuity 1534-1540."
        uk: "Pre-Møntordning фаза: стандарт 14½-Lod Daler <b>де факто</b> встановлено карбуванням Reynold Junge. Wilcke 1950 Kap. 7-3 с. 242 verbatim: «<i>die 1537 Karbung etabliert das 14½-Lod-Daler-Standard</i>»
          (карбування 1537 встановлює стандарт 14½-Lod Daler). Три внутрішні sub-фази: <b>(1) 1534-1536 каскад надзвичайної монети Grevens Fejde</b> — 2-Mark Klippinge за 10/8/7 Lod (.625/.500/.4375), 4-Skilling
          Klippinge за 5/4/3½ Lod (.3125/.250/.219), sub-Skilling-tier-и за 3-2½ Lod — воєнна девальвація нижніх tier-ів номіналів, без зміни Hauptkurant-стандарту (Junge переміщується з Aarhus 1535 до
          Roskilde 1535-37 — рух монетмайстра простежує фронт громадянської війни). <b>(2) 1537 Joachimsdaler-якір Копенгаген</b> — 8 шт./марку повної ваги за 14½ Lod = 29,232 г повної / 26,494 г чистого
          (Bruun-4276 + 4277 + 4278 — три Stack''s-Bowers-лоти ≈ 28,5-28,94 г повної). <em>Метрично ідентичний фазі A1 від 1541</em> — карбування 1537 встановлює стандарт Daler де факто за чотири роки до
          формальної Møntordning. <b>(3) 1538-1540 перехідна консолідація</b> — sub-Skilling надзвичайна монета триває, але Junge готує центральний Копенгагенський королівський монетний двір до програми
          Møntordning; з викриттям як шахрая 1540-41 передача Povel Fechtel. <em>Еталонні зразки</em>: Bruun-4155 2 Mark Klippe 1535 Aarhus (Galster 92B, 11,05 г, варіант 2 за 8 Lod), Bruun-4156 8 Skilling
          Klippe 1535 Aarhus (Galster 93, 2,72 г), Bruun-4194 1 Mark 1535 Roskilde, Bruun-4232 8 Skilling 1535 Stockholm (Sieg-24), Bruun-4276/4277/4278 Joachimsdaler 1537 Копенгаген, Bruun-4279 ½ Joachimsdaler
          1537.dk (безперервне списування), заявою Wilcke 1950 про метричну неперервність, та неперервністю Reynold Junge як монетмайстра 1534-1540."
