      uk: Технічний загальний кошик для bulk-імпортованих монет із кількох джерел. Окрема фаза на джерело (<code>A</code> = ucoin-bulk; <code>hede</code> = Hede 1971 через danskmoent.dk, авто-merge при build з <code>data/seed/hede/denmark.yml</code>). При майбутній детальній роботі монети перейдуть у відповідну Müntzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>kronefod</code>, <code>reichsdukatenfuss</code> тощо).
