        uk: <em>Інші прусські розмінні номінали (½/⅙ Thaler, Silbergroschen, Pfennig) дотримуються стандарту 30-Fuß — повні переліки в каталозі Numista для Пруссії.</em><br> <em>Старі Rigsdaler, 
