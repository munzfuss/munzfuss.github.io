        de: Reichsdukat nach Augspurger Reichsmünzordnung 19. Aug. 1559 (67 Stück je Cöllnische Marck Feingold, 23 Karat 8 Grän =.986) · gemeinsamer Goldstandard des HRR und des Königreichs Dänemark 
          und Norwegen · in Holstein erste Glückstadter Prägung um 1640 (Christian IV.); danach Glückstadt → Tönning → Altona biß ~1813 · Reichsweit endet er mit dem Münzgesetz 4. Dezember 1871 
          (Reichsgoldmünzfuß / Goldmark) · in Österreich werden bis heute Restrike-Dukaten geprägt
        en: Reichsdukat under the Augsburg Imperial Coinage Ordinance of 19 August 1559 (67 pieces per Cologne mark of fine gold, 23 carats 8 grains =.986) · the common gold standard of the Holy Roman
          Empire and the Royal Danish-Norwegian Realm · in Holstein the first Glückstadt strikes appear ca. 1640 (Christian IV); afterwards Glückstadt → Tönning → Altona until ~1813 · empire-wide 
          ended by the Coinage Act of 4 December 1871 (Reichsgoldmünzfuß / Goldmark) · Austria still strikes restrike ducats today
        uk: Reichsdukat за Авґсбурзьким імперським монетним ордонансом 19 серпня 1559 (67 штук з кельнської марки чистого золота, 23 карати 8 гран =.986) · спільний золотий стандарт Священної Римської
          імперії та Королівства Данії і Норвегії · у Гольштейні перші ґлюкштадтські карбування близько 1640 (Кристіан IV.); далі Glückstadt → Tönning → Altona до ~1813 · у Рейху закінчується Законом 
          про монету 4 грудня 1871 (Reichsgoldmünzfuß / Goldmark) · в Австрії й досі карбують restrike-дукати
