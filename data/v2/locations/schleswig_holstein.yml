      context:
        de: '<b>Quellengrundlage:</b> physisches Belegexemplar Bruun III, Lot 11222 (NGC MS-61, 5,91 g rau, Verkaufspreis €18 000 am 29. Okt. 2025); Numista N#306974 als typenkanonische Referenz mit drei
          dokumentierten Jahren (1657, 1659, 1660) und drei Legendenvarianten:<br>

          · 1657 — «NORWEGIÆ · VANDA : GOTTO : Q : REX»<br>

          · 1659 — «NORWEG : VAND : GOTHOR : Q : REX»<br>

          · 1660 — «NORWEG : VANDALOR : GOTHOR : Q : REX»<br>

          Avers durchgängig «· FRIDERICVS · III · D · G · DAN ·», gekrönter Wappenschild im Strickkreis. Revers Krone und Devise <i>Dominus Providebit</i> über Datum.<br><br>

          <b>Methodische Anmerkung zur Müntzfuß-Form:</b> Die in den <a href="#guldkrone-grundwerte">Grundwerten</a> angegebene «39-Stück»-Form ergibt sich aus dem Belegexemplar Bruun III, Lot 11222 (5,91
          g rau) und dem Numista-Mittelwert (5,996 g) und entspricht exakt der Hede-typischen Notation «N Stück je Cöllnische Marck Raulegierung» (233,856 ÷ 5,996 ≈ 39). Die Katalog-Synopsis aus Bruun III
          bestätigt Hede 145B als kanonischen Typ.

          '
        en: '<b>Source basis:</b> the physical reference specimen at Bruun III, Lot 11222 (NGC MS-61, 5.91 g rough, hammer price €18,000 on 29 Oct. 2025); Numista N#306974 as the type-canonical reference,
          listing three documented years (1657, 1659, 1660) with three legend variants:<br> · 1657 — «NORWEGIÆ · VANDA : GOTTO : Q : REX»<br> · 1659 — «NORWEG : VAND : GOTHOR : Q : REX»<br> · 1660 — «NORWEG
          : VANDALOR : GOTHOR : Q : REX»<br> Obverse throughout «· FRIDERICVS · III · D · G · DAN ·», crowned coat of arms within rope circle. Reverse: crown and motto <i>Dominus Providebit</i> above the
          date.<br><br> <b>Methodological note on the Müntzfuß form:</b> the «39-piece» form given in the <a href="#guldkrone-grundwerte">base values</a> follows from the reference specimen at Bruun III,
          Lot 11222 (5.91 g rough) and the Numista mean (5.996 g) and matches the Hede-style notation exactly («N pieces per Cologne mark of raw alloy», 233.856 ÷ 5.996 ≈ 39). The catalogue synopsis from
          Bruun III confirms Hede 145B as the canonical type.'
        uk: '<b>Джерельна база:</b> фізичний еталонний зразок Bruun III, лот 11222 (NGC MS-61, 5,91 г повної ваги, ціна молотка €18 000 29 жовтня 2025); Numista N#306974 як типо-канонічне посилання з трьома
          задокументованими роками (1657, 1659, 1660) і трьома варіантами легенди:<br> · 1657 — «NORWEGIÆ · VANDA : GOTTO : Q : REX»<br> · 1659 — «NORWEG : VAND : GOTHOR : Q : REX»<br> · 1660 — «NORWEG
          : VANDALOR : GOTHOR : Q : REX»<br> Аверс наскрізно «· FRIDERICVS · III · D · G · DAN ·», коронований гербовий щит у мотузковому колі. Реверс: корона й девіз <i>Dominus Providebit</i> над датою.<br><br>
          <b>Методична примітка щодо форми Müntzfuß:</b> наведена в <a href="#guldkrone-grundwerte">базових значеннях</a> форма «39 штук» виходить зі зразка-еталона Bruun III, лот 11222 (5,91 г повної ваги)
          і середнього значення Numista (5,996 г) і точно відповідає Hede-типовій нотації «N штук з кельнської марки сплаву» (233,856 ÷ 5,996 ≈ 39). Каталогова синопсис із Bruun III підтверджує Hede 145B
          як канонічний тип.'
methodology_heading:
  de: Methodische Anmerkungen
  en: Methodological notes
  uk: Методичні зауваження
methodology:
  de: '<b>Umfang und Gliederung:</b> Müntzgeschichte des Herzogthums Holstein, 1559–1914 — von der Augspurger Reichsmünzordnung biß zur Suspendierung des Reichsgoldmünzfußes (4. Aug. 1914). Gliederung nach
    Müntzfüßen (nicht chronologisch); innerhalb jedes Fußes die historischen Geltungsphasen in Holstein im Zeitverlauf.<br><br>


    <b>Geographischer und politischer Rahmen:</b> Königsl. dänischer Antheil und Gottorpischer Antheil biß 1773 · vereinigt unter der dänischen Krone 1773–1864 · österreichische Verwaltung 1864–1866 · preußische
    Provinz Schleswig-Holstein ab 1867.<br><br>


    <b>Legende der Spalten «Soll», «Δ» und «Fuß»:</b> <b>Soll</b> — Feingehalt, den die Münze bei vollständiger Erfüllung des Ziel-Fußes hätte. <b>Δ</b> = Ist − Soll in Gramm und Prozent, berechnet als
    <i>Rau × Feingehalt − Soll</i>. «✓» bei Abweichung ≤ 1 % (innerhalb Remedium). <b>Fuß</b> — nominaler Ziel-Müntzfuß und bei relevanter Abweichung auch ableitbarer Ist-Fuß. «—» in der Δ-Spalte = Kupfer-Scheidemünze
    ohne Feinsilber (Ist-Fuß nicht definiert). «(?)» = Feingehalt in keiner Online-Quelle dokumentiert, Berechnung unmöglich.<br><br>


    <b>Dual-Nominale — Münzen mit zwei Wertangaben:</b> Einige Münzen tragen <b>zwei Nominale aus verschiedenen Müntzfüßen</b> zugleich (z. B. «8 RBS / 2½ SCHILLING COURANT») — das eine der offiziellen
    Landeswährung, das andere der regionalen Alltagsrechnung. Der Feinsilber-Gehalt beider Nominale ist nach Silberparität identisch. In der Spalte «Fuß» werden die Müntzfüße explizit zugeordnet:<br>

    · <span style="color:#8a7350;font-weight:600">▸ Primär:</span> offizielle Währungsrechnung (meist Rigsbankdaler 18½-Fuß oder Thaler Species 9¼-Fuß)<br>

    · <span style="color:#8575b0;font-weight:600">▸ Sekundär:</span> Parallelrechnung (in Holstein: Schilling-Sch.-H.-Courant-Theilung, 60 Sch.C. = 1 Thaler Species)<br>Beispiele: <i>Rigsbankskilling (18½-Fuß)
    + Schilling Courant (9¼-Fuß via Schilling-Theilung)</i>; <i>Thaler Species (9¼-Fuß) + 60 Schilling Courant</i> — letzteres Produkt der Schleswig-Holsteinischen Reform Schimmelmanns 1788.<br><br>


    <b>Terminologische Unterscheidung:</b> <em>Müntzfuß</em> — physisch geprägte Münzen vorhanden. <em>Rechnungsfuß</em> — keine Münze, aber eigenständiger Silberstandard (nicht durch einfachen Koefficienten
    aus einem realen Fuß ableitbar). <em>Rechnungseinheit</em> — keine Münze, Bruchteil eines realen Fußes durch einfachen Koefficienten.<br><br>


    <b>Quellentransparenz:</b> Jede Tabellenzeile ist mit mindestens einer Online-Quelle belegt; wo möglich sind Sekundärquellen verknüpft. Hauptsächliche Kategorien: Sammler-Datenbasen (Numista, CoinFactsWiki),
    institutionelle Referenzen (NGC World Coin Price Guide, Smithsonian NMAH, Danmarks Nationalbank), Auktionshäuser mit Zertifizierung und Bruun-Provenienz (Heritage, Stacks Bowers, Künker), nationale
    Fachkataloge (danskmoent.dk mit Hede/Schou/Sieg-Systematik), akademische Abhandlungen (Wilcke 1927, Ernst 1956, Moesgaard 2006).<br><br>


    <b>Unerfaßte Nominale «(?)»:</b> Für die Scheidemünzen der Münzstätte Tönning (Schleswig-Holstein-Gottorp, 1694–1726) unter Herzog Friedrich IV. und Karl Friedrich ist der Feingehalt in keiner Online-Quelle
    präzise dokumentiert. Primäre Fachkataloge (Lange 1908/12, Sieg-Møntkatalog 2018, Storgaard 2001) liegen nicht online vor. Auflösung der meisten «(?)»-Fälle über Bruun-Auktionskatalog (Stack''s Bowers
    Zürich 14.–15. März 2025) kombiniert mit Numista-Klassifikation; einzelne Tönning-Billon-Stücke bleiben Schätzungen nach Analogie.

    '
  en: '<b>Scope and arrangement:</b> Monetary history of the Duchy of Holstein, 1559–1914 — from the Augsburg Imperial Coinage Ordinance to the suspension of the Reichsgoldmünzfuß (4 Aug. 1914). The page
    is organised by Müntzfuß (not chronologically); within each Fuß its successive periods of validity in Holstein are listed in time order.<br><br> <b>Geographical and political frame:</b> the royal Danish
    part and the Gottorp ducal part until 1773 · united under the Danish Crown 1773–1864 · Austrian administration 1864–1866 · Prussian province of Schleswig-Holstein from 1867.<br><br> <b>Legend for the
    columns «Soll», «Δ» and «Fuß»:</b> <b>Soll</b> — the fine weight the coin would have under exact compliance with its target Fuß. <b>Δ</b> = actual − target, in grams and percent, computed as <i>rough
    × fineness − Soll</i>. «✓» when the deviation is ≤ 1 % (within the remedium). <b>Fuß</b> — the nominal target Müntzfuß, plus the implied actual Fuß when the deviation is significant. «—» in the Δ column
    means a copper token with no fine silver (no implied Fuß). «(?)» means the fineness is not documented in any online source — calculation impossible.<br><br> <b>Dual denominations — coins with two face
    values:</b> some coins carry <b>two denominations from different Müntzfüße</b> at once (e.g. «8 RBS / 2½ SCHILLING COURANT») — one in the official territorial currency, the other in regional everyday
    accounting. Both denominations carry the same fine silver content (silver parity). The «Fuß» column assigns each Müntzfuß explicitly:<br> · <span style="color:#8a7350;font-weight:600">▸ Primary:</span>
    the official monetary system (usually Rigsbankdaler 18½-Fuß or Thaler Species 9¼-Fuß)<br> · <span style="color:#8575b0;font-weight:600">▸ Secondary:</span> the parallel accounting system (in Holstein:
    the Schilling-Sch.-H.-Courant subdivision, 60 Sch.C. = 1 Thaler Species)<br> Examples: <i>Rigsbankskilling (18½-Fuß) + Schilling Courant (9¼-Fuß via the subdivision)</i>; <i>Thaler Species (9¼-Fuß)
    + 60 Schilling Courant</i> — the latter is a direct product of Schimmelmann''s Schleswig-Holstein reform of 1788.<br><br> <b>On the term «Müntzfuß»:</b> the German word (literally «coinage foot») is
    preserved throughout this page. It denotes the precise mathematical ratio of <i>how many coins of a given denomination are struck from one unit weight of fine metal</i> — for example, the 11⅓-Thaler-Fuß
    means «11⅓ Thaler per fine Cologne Mark». English does not have a single-word equivalent: «standard» is too abstract, «coin foot» too literal. Academic English-language numismatics (Kindleberger, Spufford,
    Sprenger) leave the term untranslated; this page does the same.<br><br> <b>Terminological distinctions:</b> <em>Müntzfuß</em> — physical coins were actually struck. <em>Rechnungsfuß</em> — no coin,
    but a silver standard in its own right (not derivable from a real Fuß by a simple coefficient). <em>Rechnungseinheit</em> — no coin, simply a fraction of a real Fuß related by a coefficient.<br><br>
    <b>Source transparency:</b> every table row is backed by at least one online source; secondary sources are linked where possible. Main categories: collector databases (Numista, CoinFactsWiki); institutional
    references (NGC World Coin Price Guide, Smithsonian NMAH, Danmarks Nationalbank); auction houses with certification and Bruun provenance (Heritage, Stacks Bowers, Künker); national specialist catalogues
    (danskmoent.dk, with the Hede/Schou/Sieg system); academic works (Wilcke 1927, Ernst 1956, Moesgaard 2006).<br><br> <b>Unrecorded denominations «(?)»:</b> for the petty coinage of the Tönning mint (Schleswig-Holstein-Gottorp,
    1694–1726) under Friedrich IV and Karl Friedrich, fineness is not precisely documented in any online source. The primary specialist catalogues (Lange 1908/12, Sieg Møntkatalog 2018, Storgaard 2001)
    are not online. Most «(?)» cases have been resolved using the Bruun auction catalogue (Stack''s Bowers Zurich, 14–15 Mar. 2025) combined with the Numista classification; individual Tönning billon pieces
    remain estimates by analogy.'
  uk: '<b>Обсяг і структура:</b> історія монетної справи в герцогстві Гольштейн, 1559–1914 — від Авґсбурзького імперського монетного ордонанса до призупинення Reichsgoldmünzfuß (4 серпня 1914). Сторінка
    впорядкована за Müntzfuß (а не хронологічно); у межах кожного Fuß періоди його дії в Гольштейні подано за часовою послідовністю.<br><br> <b>Географічні й політичні рамки:</b> королівська данська частина
    і ґотторпська герцогська частина до 1773 · обʼєднання під данською Короною 1773–1864 · австрійське управління 1864–1866 · прусська провінція Шлезвіг-Гольштейн з 1867.<br><br> <b>Легенда для стовпців
    «Soll», «Δ» і «Fuß»:</b> <b>Soll</b> — чиста вага, яку монета мала б при точному виконанні цільової стопи. <b>Δ</b> = факт − ціль, у грамах і відсотках, обчислюється як <i>повна вага × проба − Soll</i>.
    «✓» при відхиленні ≤ 1 % (у межах ремедіуму). <b>Fuß</b> — номінальна цільова стопа, а при суттєвому відхиленні ще й розрахункова фактична. «—» у стовпці Δ означає мідну розмінну монету без чистого
    срібла (фактичну Fuß неможливо вивести). «(?)» означає, що проба не задокументована в жодному онлайн-джерелі — розрахунок неможливий.<br><br> <b>Подвійні номінали — монети з двома позначеннями вартості:</b>
    деякі монети несуть <b>два номінали з різних Müntzfüße</b> одночасно (напр. «8 RBS / 2½ SCHILLING COURANT») — один в офіційній валюті регіону, другий — у місцевому повсякденному розрахунку. Вміст чистого
    срібла обох номіналів однаковий (срібний паритет). У стовпці «Fuß» Müntzfuß кожного номіналу позначено явно:<br> · <span style="color:#8a7350;font-weight:600">▸ Primär:</span> офіційна грошова система
    (зазвичай Rigsbankdaler 18½-Fuß або Thaler Species 9¼-Fuß)<br> · <span style="color:#8575b0;font-weight:600">▸ Sekundär:</span> паралельний розрахунок (у Гольштейні — поділ Schilling-Sch.-H.-Courant,
    60 Sch.C. = 1 Thaler Species)<br> Приклади: <i>Rigsbankskilling (18½-Fuß) + Schilling Courant (9¼-Fuß через поділ)</i>; <i>Thaler Species (9¼-Fuß) + 60 Schilling Courant</i> — останнє є прямим продуктом
    шлезв.-гольшт. реформи Шіммельмана 1788 року.<br><br> <b>Про термін «Müntzfuß»:</b> німецьке слово (буквально «монетна стопа») збережено в оригінальній формі як технічний термін. Воно позначає математичне
    співвідношення <i>скільки монет даного номіналу карбується з однієї вагової одиниці чистого металу</i> — наприклад, 11⅓-Thaler-Fuß означає «11⅓ талера на чисту кельнську марку». У тексті паралельно
    вживається «стопа» як коротша форма там, де контекст зрозумілий.<br><br> <b>Термінологічні розрізнення:</b> <em>Müntzfuß</em> — реально карбувалися фізичні монети. <em>Rechnungsfuß</em> — монети немає,
    але це окремий срібний стандарт (не виводиться з реальної стопи простим коефіцієнтом). <em>Rechnungseinheit</em> — монети немає; це частка реальної стопи, повʼязана з нею коефіцієнтом.<br><br> <b>Прозорість
    джерел:</b> кожен рядок таблиці підкріплено принаймні одним онлайн-джерелом; де можливо, додано вторинні джерела. Основні категорії: колекціонерські бази (Numista, CoinFactsWiki); інституційні референси
    (NGC World Coin Price Guide, Smithsonian NMAH, Danmarks Nationalbank); аукціонні доми із сертифікацією та провенанс із Bruun (Heritage, Stacks Bowers, Künker); національні фахові каталоги (danskmoent.dk
    із системою Hede/Schou/Sieg); академічні праці (Wilcke 1927, Ernst 1956, Moesgaard 2006).<br><br> <b>Незаповнені номінали «(?)»:</b> для розмінних монет монетного двору Tönning (Шлезвіг-Гольштейн-Готторп,
    1694–1726) за герцогів Friedrich IV і Karl Friedrich проба не задокументована в жодному онлайн-джерелі. Первинні фахові каталоги (Lange 1908/12, Sieg-Møntkatalog 2018, Storgaard 2001) не доступні онлайн.
    Більшість «(?)» розв''язано через аукціонний каталог Bruun (Stack''s Bowers Цюрих, 14–15 березня 2025) у поєднанні з класифікацією Numista; окремі білонні монети Tönning лишаються оцінками за аналогією.'
