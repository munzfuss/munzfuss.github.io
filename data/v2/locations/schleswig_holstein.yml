      title:
        de: Altona-Münze · regelmäßige Prägung
        en: Altona mint · regular issue
        uk: Монетний двір Альтона · регулярне карбування
    - id: IV
      year_from: 1813
      year_to: 1871
      from_label: '1813'
      to_label: '1871'
      title:
        de: Fortgeführt trotz Staatsbankrott
        en: Continued despite the state bankruptcy
        uk: Продовжено попри державне банкрутство
      description:
        de: 'Der Dukat im Reichsdukatenfuß bleibt <b>vom Staatsbankrott 1813 unberührt</b>: die Forordning 5. Januar 1813 betrifft die Silbercourantmünzen (Rigsdaler, Speciedaler) — Goldmünzen sind in §1–§16
          nicht erfaßt. Dukat bleibt Handelsmünze biß zum Reichsgoldmünzfuß (Münzgesetz 4. Dez. 1871).'
        en: 'The ducat in the Reichsdukatenfuß is <b>untouched by the state bankruptcy of 1813</b>: the Forordning of 5 January 1813 covers the silver Courant coinage (Rigsdaler, Speciedaler) — gold coins
          are not within §§1–16. The ducat remains a trade coin right up to the Reichsgoldmünzfuß (Coinage Act of 4 Dec. 1871).'
        uk: 'Дукат у Reichsdukatenfuß <b>не зачеплений державним банкрутством 1813</b>: Forordning 5 січня 1813 р. охоплює срібні Courant-монети (Rigsdaler, Speciedaler) — золоті монети §§1–16 не стосуються.
          Дукат лишається торговою монетою аж до Reichsgoldmünzfuß (Закон про монету 4 грудня 1871 р.).'
      context:
        de: '<b>Spezifische Prägejahre der Frederik-VI.-, Christian-VIII.- und Frederik-VII.-Dukaten konnten für Holstein nicht einzeln mit einer Online-Quelle verifiziert werden.</b> Die dänische Münzproduktion
          erfolgte in dieser Phase überwiegend in Kopenhagen (Altonaer Münze 1863 geschlossen); Handelsdukaten zirkulierten aber im gesamten Gesamtstaat einschließlich Holstein.<br>

          <b>Kondominium 1864–1866:</b> keine Neuprägungen. <b>Ablösung:</b> Münzgesetz 4. Dez. 1871 beendet Dukatenprägung im Deutschen Reich endgültig.

          '
        en: <b>Specific year-of-issue figures for the Frederik VI, Christian VIII and Frederik VII ducats could not be verified individually for Holstein from any online source.</b> Danish minting in 
          this phase took place mainly in Copenhagen (the Altona mint had closed in 1863); trade ducats nevertheless circulated throughout the composite state, Holstein included.<br> <b>Condominium 
          1864–1866:</b> no new issues. <b>Replacement:</b> the Coinage Act of 4 Dec. 1871 ends ducat striking in the German Reich for good.
        uk: <b>Конкретні роки карбування дукатів Фредеріка VI, Кристіана VIII і Фредеріка VII для Гольштейну окремо за онлайн-джерелами підтвердити не вдалося.</b> Данське карбування в цій фазі 
          переважно йшло в Копенгагені (монетний двір в Альтоні було закрито 1863); торгові дукати, втім, перебували в обігу по всій цілісній державі, разом із Гольштейном.<br> <b>Кондомініум 
          1864–1866:</b> нових випусків немає. <b>Заміна:</b> Закон про монету 4 грудня 1871 остаточно припиняє карбування дукатів у Німецькому Рейху.
