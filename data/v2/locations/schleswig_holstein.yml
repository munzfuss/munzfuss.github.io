          even this inter-state act is reckoned in Danish currency.'
        uk: '<b>База:</b> Rigsdaler Rigsmønt (18½-Fuß, 12,64086 г чистого) і Thaler Species (9¼-Fuß, 25,28173 г чистого) лишаються законним платіжним засобом у Гольштейні.<br> <b>Нові випуски:</b> для Гольштейну
          немає; монетний двір в Альтоні був закритий ще 1863. Копенгаген далі карбує Rigsdaler і Thaler Species для решти данської території (Кристіан IX).<br> <b>Продаж Лауенбургу:</b> Ґаштайнська конвенція
          14 серпня 1865 р., ст. 9: Пруссія купує Лауенбург в Австрії за <b>2,5 мільйона данських Thaler</b><sup>[ref:wikipedia-de-sterreichisch-preu-isches-kondominium-in-schleswig-holstein]</sup> — навіть
          у цьому міждержавному акті рахунок ведеться в данській валюті.'
