      to_label: '1771'
      title:
        de: Courantdukat-Fuß durch Courantverbund
        en: Courantdukat standard via the Courant union
        uk: Стопа Courantdukat через Courant-союз
      context:
        de: Mit dem Kurantmøntfod von 1726 entwickelt sich parallel zum Reichsdukatenfuß der <b>Courantdukat</b> — Dukat mit leichter Feingewichtsreduktion zur festen Kurs-Anbindung (2 Rigsdaler 
          Courant = 1 Courantdukat, später 2½ Rigsdaler Courant). Altona-Münze wird erst 1771 eröffnet; Dukaten in dieser Phase werden in Kopenhagen bzw. Glückstadt für den gesamtstaatlichen Handel 
          geprägt.
        en: With the Kurantmøntfod of 1726 a <b>Courantdukat</b> grows up alongside the Reichsdukatenfuß — a ducat with slightly reduced fine weight, designed for a fixed exchange link (2 Rigsdaler 
          Courant = 1 Courantdukat, later 2½ Rigsdaler Courant). The Altona mint is only opened in 1771; the ducats of this phase are struck in Copenhagen and Glückstadt for the trade of the composite
          state.
        uk: З Kurantmøntfod 1726 паралельно до Reichsdukatenfuß виростає <b>Courantdukat</b> — дукат із трохи зниженою чистою вагою, призначений для фіксованої курсової привʼязки (2 Rigsdaler Courant 
          = 1 Courantdukat, пізніше 2½ Rigsdaler Courant). Монетний двір в Альтоні відкриють лише 1771; дукати цієї фази карбують у Копенгагені й Glückstadt для торгівлі цілісної держави.
