    - id: IV
      year_from: 1813
      year_to: 1854
      from_label: 5. Jan. 1813
      to_label: 31. Juli 1854
      title:
        de: Parallel zum Rigsbankdaler
        en: In parallel with the Rigsbankdaler
        uk: Паралельно з Rigsbankdaler
      description:
        de: Nach dänischem Staatsbankrott bleibt Thaler Species als 9¼-Fuß-Reservestandard unverändert. 1 Thaler Species = 2 Rigsbankdaler (konstruktiv 1813 festgelegt).
        en: After the Danish state bankruptcy the Thaler Species continues as the 9¼-Fuß reserve standard, unchanged. 1 Thaler Species = 2 Rigsbankdaler (constructively fixed in 1813).
        uk: Після данського державного банкрутства Thaler Species залишається резервним стандартом у 9¼-Fuß без змін. 1 Thaler Species = 2 Rigsbankdaler (зафіксовано конструктивно 1813 р.).
      mt_caption:
        de: Speciedaler-Prägungen 1819–1854 · Kopenhagen und Altona · Frederik VI., Christian VIII., Frederik VII. «Våbenspecie» biß zur Umbenennung 1854
        en: Speciedaler issues 1819–1854 · Copenhagen and Altona · Frederik VI, Christian VIII, Frederik VII «Våbenspecie» up to the 1854 renaming
        uk: Карбування Speciedaler 1819–1854 · Копенгаген і Альтона · Фредерік VI, Кристіан VIII, Фредерік VII «Våbenspecie» до перейменування 1854
    - id: V
      year_from: 1854
      year_to: 1866
      from_label: 31. Juli 1854
      to_label: 24. Aug. 1866
      title:
        de: Parallel zum Rigsdaler Rigsmønt
        en: In parallel with the Rigsdaler Rigsmønt
        uk: Паралельно з Rigsdaler Rigsmønt
      description:
        de: Renovatio-Bedingung unverändert (18½-Fuß nur umbenannt). Thaler Species bleibt Reserve- und Handelseinheit biß preuß. Annexion.
        en: The underlying conditions are unchanged (the 18½-Fuß is merely renamed). The Thaler Species remains the reserve and trade unit until the Prussian annexation.
        uk: Базові умови не змінилися (18½-Fuß лише перейменовано). Thaler Species лишається одиницею резерву й торгівлі до прусської анексії.
      context:
        de: '<b>Die Speciedaler-Prägung der Frederik-VII.-Regierung</b> lief biß 1854 (siehe «Våbenspecie» KM# 744 in Phase D oben). 1854 erfolgte die Umbenennung der Rigsbankdaler-Einheit zur Rigsdaler
          Rigsmønt; ab diesem Jahr erschienen Frederik VII.s Silber-Courantmünzen nur im 18½-Fuß als Rigsdaler Rigsmønt (siehe dortige Tabelle). Zwei <b>Gedenkprägungen zu 2 Rigsdaler</b> (Silberhochzeit
          1854, Tod 1863) entsprechen rechnerisch 1 Speciedaler (2 × 12,64086 g = 25,28173 g Feinsilber) — siehe Rigsbankdaler Phase C.<br>

          <em>Unter Kondominium 1864–1866: keine Neuprägungen von Thaler Species; Altbestände bleiben gesetzliches Zahlmittel.</em><br>

          <b>Ablösung:</b> 24. Aug. 1866 mit preuß. Annexion; Thaler Species wird sukzessive ausgemünzt zugunsten des Vereinsthalers (30-Fuß).

          '
        en: '<b>Speciedaler issues under Frederik VII</b> ran until 1854 (see «Våbenspecie» KM# 744 in phase D above). In 1854 the Rigsbankdaler unit was renamed to Rigsdaler Rigsmønt; from that year onwards
          Frederik VII''s silver Courant coins appeared only in the 18½-Fuß as Rigsdaler Rigsmønt (see the table there). Two <b>commemorative 2-Rigsdaler issues</b> (the silver wedding of 1854, his death
          in 1863) match arithmetically to 1 Speciedaler (2 × 12.64086 g = 25.28173 g fine silver) — see Rigsbankdaler phase C.<br> <em>Under the condominium of 1864–1866: no new Thaler Species issues;
          existing stocks remain legal tender.</em><br> <b>Replacement:</b> 24 Aug. 1866 with the Prussian annexation; the Thaler Species is gradually demonetised in favour of the Vereinsthaler (30-Fuß).'
        uk: <b>Карбування Speciedaler за правління Фредеріка VII</b> тривало до 1854 р. (див. «Våbenspecie» KM# 744 у фазі D вище). У 1854 р. одиницю Rigsbankdaler перейменовано на Rigsdaler Rigsmønt;
          від цього року срібні Courant-монети Фредеріка VII зʼявляються лише у 18½-Fuß як Rigsdaler Rigsmønt (див. відповідну таблицю). Дві <b>памʼятні монети у 2 Rigsdaler</b> (срібне весілля 1854, 
          смерть 1863) арифметично відповідають 1 Speciedaler (2 × 12,64086 г = 25,28173 г чистого срібла) — див. Rigsbankdaler, фаза C.<br> <em>За кондомініуму 1864–1866 нових Thaler Species не 
          карбують; старі запаси лишаються законним платіжним засобом.</em><br> <b>Заміна:</b> 24 серпня 1866 із прусською анексією; Thaler Species поступово виводять з обігу на користь Vereinsthaler 
          (30-Fuß).
  kronemont:
    - id: I
      year_from: 1644
      year_to: 1669
      from_label: '1644'
      to_label: '1669'
      title:
        de: 10½-Krone-Fuß · Hebræermønt und Frederik-III.-Glückstadt-Serie
        en: 10½-Krone-Fuß · Hebræermønt and Frederik III Glückstadt series
        uk: 10½-Krone-Fuß · Hebræermønt та серія Frederik III Glückstadt
      description:
        de: 'Nach dem 19-jährigen Stillstand 1625–1643 (siehe <i>Christian IVs kroner</i> oben) kehrt die Krone-Mønt 1644 im <b>10½-Krone-Fuß</b> («<i>Grobe Krone</i>») zurück: <b>10½ Krone je rauer Marck</b>
          von 10¾ Loth (.672 Feingehalt, 14,964 g fein je Stück, Hede / Wilcke II p. 203) — ~8 % weniger Feinsilber pro Münze als unter Christian IV. Beginn mit der <b>Hebræermønt</b> (KM# 32, KM# 137)
          und der regulären Glückstadter 4-Marck-Danske-Serie unter Frederik III. Tarif weiterhin 1⅓ Speciedaler.<sup>[ref:danskmoent-1krone]</sup><sup>[ref:danskmoent-hedekron]</sup>'
        en: 'After the 19-year hiatus of 1625–1643 (see <i>Christian IV''s kroner</i> above), the Krone returns in 1644 under the <b>10½-Krone-Fuß</b> («<i>Coarse Krone</i>»): <b>10½ Krone per raw mark</b>
          at 10¾ Loth (.672 fineness, 14.964 g fine per coin, Hede / Wilcke II p. 203) — ~8 % less fine silver per coin than under Christian IV. The series opens with the <b>Hebræermønt</b> (KM# 32, KM#
          137) and the regular Glückstadt 4-Marck-Danske series under Frederik III. The tariff remains 1⅓ Speciedaler.<sup>[ref:danskmoent-1krone]</sup><sup>[ref:danskmoent-hedekron]</sup>'
        uk: 'Після 19-річного припинення 1625–1643 (див. <i>Christian IV''s kroner</i> вище) Krone-Mønt повертається 1644 р. у <b>10½-Krone-Fuß</b> («<i>Груба Крона</i>»): <b>10½ Krone з повної марки</b>
          проби 10¾ Loth (.672 проби, 14,964 г чистого на монету, Hede / Wilcke II с. 203) — ~8 % менше чистого срібла на монету, ніж за Кристіана IV. Серія відкривається <b>Hebræermønt</b> (KM# 32, KM#
          137) та регулярною ґлюкштатською серією 4 Marck Danske за Фредеріка III. Тариф лишається 1⅓ Speciedaler.<sup>[ref:danskmoent-1krone]</sup><sup>[ref:danskmoent-hedekron]</sup>'
      context:
        de: <p>Die <b>Hebræermønt</b> wird parallel in zwei Münzstätten geprägt — København (KM# 137, 1644–1646) und Glückstadt (KM# 32, 1645) — beide mit dem Tetragramm יהוה auf der Rückseite und 
          beide bei.593 Feingehalt (gegen den Kronemønt-Standard.671 reduziert). Bei unverändertem Tarif von ⅓ Speciedaler steigt der kumulative Seigniorage-Aufschlag durch dieses zweite Debasement 
          auf ca. +27,6 % (siehe Sondertabelle).</p><p>Parallel dazu Glückstadter 4-Marck-Danske-Serie unter Frederik III. (KM# A43, B43) am Standardfeingehalt.671 — die Norm­fortsetzung, die später 
          die Christian-V.-Serie ablöst.</p>
        en: <p>The <b>Hebræermønt</b> is struck in parallel at two mints — Copenhagen (KM# 137, 1644–1646) and Glückstadt (KM# 32, 1645) — both bearing the Tetragrammaton יהוה on the reverse and both 
          at.593 fineness (reduced from the Kronemønt standard of.671). At an unchanged tariff of ⅓ Speciedaler, this second debasement raises the cumulative seigniorage premium to about +27.6 % (see 
          separate sub-table).</p><p>Alongside, the Glückstadt 4-Marck-Danske series under Frederik III (KM# A43, B43) at standard fineness.671 — the normative continuation that the Christian V series
          later carries forward.</p>
        uk: <p><b>Hebræermønt</b> карбується паралельно на двох монетних дворах — Копенгаген (KM# 137, 1644–1646) і Glückstadt (KM# 32, 1645) — обидва з тетраграматоном יהוה на реверсі та обидва на 
          пробі.593 (знижено від стандартної kronemønt-проби.671). За незмінним тарифом ⅓ Speciedaler це другий шар debasement піднімає кумулятивну сеньйораж-надбавку до ~+27,6 % (див. окрему 
          підтаблицю).</p><p>Паралельно — ґлюкштатська серія 4 Marck Danske за Фредеріка III (KM# A43, B43) на стандартній пробі.671 — нормативне продовження, яке пізніше підхоплює серія Кристіана 
          V.</p>
    - id: II
      year_from: 1670
      year_to: 1696
      from_label: ca. 1670
      to_label: '1696'
      title:
        de: Christian V. · stabilisierter Tarif ⅔ Speciedaler
        en: Christian V · stabilised tariff ⅔ Speciedaler
        uk: Кристіан V · стабілізований тариф ⅔ Specie
      description:
        de: Christian V. stabilisiert den Tarif auf ⅔ Speciedaler = 2 Marck Danske, was fortan explizit als «2 MARCK» auf den Münzen steht. Hauptbestand des Katalogs (Glückstadt + København + 
          Schleswig-Holstein-Duchy). Endet 1696.
        en: Christian V stabilises the tariff at ⅔ Speciedaler = 2 Marck Danske, henceforth explicit on the coins as «2 MARCK». The bulk of the catalogue (Glückstadt + Copenhagen + Schleswig-Holstein 
          duchy). Ends in 1696.
        uk: Кристіан V стабілізує тариф на ⅔ Speciedaler = 2 Marck Danske, що відтепер явно карбується на монетах як «2 MARCK». Основна маса каталогу (Glückstadt + Копенгаген + 
          Шлезвіг-Гольштейн-герцогство). Завершується 1696 року.
      context:
        de: '<p>Bruun-Lot 13184 (1691, Kopenhagen) trägt explizit «<b>2 Mark</b>» auf der Münze — Beleg für die offene Verankerung der ⅔-Speciedaler-Wertigkeit auf der Prägung selbst.</p><p>Empirisch (Glückstadt
          4 Marck Danske, Hede-Formel: 22,272 g rau ·.672 Feingehalt · 14,964 g fein): bei Tarif ⅔ Specie = 16,854 g fein nominell ergibt sich ein Seigniorage-Aufschlag von ca. <b>+12,6 %</b>. Vergleich
          mit der 1618er Doppelkrone (32,500 g fein, Tarif 1½ Specie = 37,920 g fein nominell): Aufschlag ca. +16,7 % bzw. +11½ % Münzgewinn nach Schrötter<sup>[ref:archive-worterbuchdermun007491mbp]</sup>
          — also vergleichbare Größenordnung des Seigniorage-Aufschlags trotz der unterschiedlichen Nominaltarife.<sup>[ref:danskmoent-hedekron]</sup></p><p>Parallel prägte Glückstadt vollwertige Speciedaler
          im 9¼-Fuß (Bruun-Lots 13098, 13102, 13182) — beide Münzkategorien wurden gleichzeitig produziert, der Speciedaler nach Silbergehalt, die Kronemønt nach königlich gesetztem Tarif.</p>'
        en: '<p>Bruun lot 13184 (1691, Copenhagen) carries «<b>2 Mark</b>» explicitly on the coin — evidence that the ⅔-Speciedaler parity is now openly anchored on the strike itself.</p><p>Empirically
          (Glückstadt 4 Marck Danske, Hede formula: 22.272 g rough ·.672 fineness · 14.964 g fine): at the ⅔ Specie tariff the nominal calls for 16.854 g fine, giving a seigniorage premium of about <b>+12.6
          %</b>. For comparison, the 1618 Doppelkrone (32.500 g fine, 1½ Specie tariff = 37.920 g fine nominal) carried a premium of about +16.7 %, or +11½ % mint gain per Schrötter<sup>[ref:archive-worterbuchdermun007491mbp]</sup>
          — a comparable order of magnitude of seigniorage premium despite the differing nominal tariffs.<sup>[ref:danskmoent-hedekron]</sup></p><p>In parallel Glückstadt also struck full-value Speciedaler
          in the 9¼-Fuß (Bruun lots 13098, 13102, 13182) — both coin categories were produced contemporaneously, the Speciedaler valued by silver content, the Kronemønt by royally set tariff.</p>'
        uk: '<p>Bruun, лот 13184 (1691, Копенгаген), несе на монеті явне «<b>2 Mark</b>» — підтвердження того, що паритет ⅔ Speciedaler відтепер відкрито закріплено на самому карбуванні.</p><p>Емпірично
          (Glückstadt 4 Marck Danske, Hede-формула: 22,272 г повної ваги ·.672 проби · 14,964 г чистого): за тарифом ⅔ Specie номінал вимагає 16,854 г чистого, що дає сеньйораж-надбавку <b>~+12,6 %</b>.
          Для порівняння: Doppelkrone 1618 р. (32,500 г чистого, тариф 1½ Specie = 37,920 г чистого номінально) мала надбавку ~+16,7 % або +11½ % монетного прибутку за Schrötter<sup>[ref:archive-worterbuchdermun007491mbp]</sup>
          — порядково співмірна величина сеньйораж-надбавки попри різні номінальні тарифи.<sup>[ref:danskmoent-hedekron]</sup></p><p>Паралельно Glückstadt карбував і повноцінні Speciedaler у 9¼-Fuß (Bruun-лоти
          13098, 13102, 13182) — обидві категорії монети вироблялись одночасно, Speciedaler за вмістом срібла, Kronemønt — за встановленим королем тарифом.</p>'
