  9_thaler:
    - id: I
      year_from: 1566
      year_to: 1625
      from_label: 30. Mai 1566
      to_label: '1625'
      title:
        de: Reichsmünzordnung in Holstein-Gottorp
        en: Imperial Mint Decree in Holstein-Gottorp
        uk: Імперський монетний ордонанс у Гольштейн-Ґотторпі
      description:
        de: Holsteinische Reichsthaler-Prägungen unter Adolf I., Johann Adolf, frühem Friedrich III. und Hans Jr. von Sonderburg — Kipper-Wipper-Krise (1620–1623), ab 1622 parallel vom leichteren 
          9¼-Fuß abgelöst, letzte Holstein-Prägung 1625.
        en: Holstein Reichsthaler issues under Adolf I, Johann Adolf, early Friedrich III and Hans Jr. of Sonderburg — Kipper-Wipper crisis (1620–1623), superseded in parallel by the lighter 9¼-Fuß 
          from 1622, last Holstein strike 1625.
        uk: Гольштинські карбування Reichsthaler за Адольфа I, Йоганна Адольфа, раннього Фредеріка III та Hans Jr. Sonderburg — Kipper-Wipper-криза (1620–1623); з 1622 паралельно витісняється легшим 
          9¼-Fuß; останнє карбування в Гольштейні — 1625.
      context:
        de: '<b>Reichsstandard biß 1625:</b> Reichsthaler 9-Fuß (.889/14²⁄₉ Loth, 25,984 g fein), Mark-lübisch-Theilstücke (½, ¼, ⅛ Thaler), Schillinge (1/32, 1/48 Thaler), Pfennig-Scheidemünzen (1/96,
          1/128 Thaler).<br>

          <b>Münzstätten:</b> in Holstein-Gottorp vor allem Schleswig und Husum. Nach dem Kipper-Wipper-Zusammenbruch (~1620) verlieren die Reichsstände das einheitliche Münzwesen — ab 1622 setzt sich in
          Holstein der leichtere 9¼-Fuß (Thaler Species, 25,28173 g fein gegen 25,984 g im 9-Fuß) durch, die letzte holsteinische 9-Fuß-Prägung erfolgt 1625 (Hans Jr. Sonderburg, 2 Schilling Lübisch).<br>

          <b>Außerhalb Holsteins lebt der 9-Fuß weiter:</b> Hamburg behält ihn als <i>Bank-Mark</i> der Hamburger Bank, Lübeck als <i>Speciemark</i> — beide biß 1875.

          '
        en: <b>Imperial standard until 1625:</b> Reichsthaler at 9-Fuß (.889/14²⁄₉ Loth, 25.984 g fine), Mark-lübisch sub-units (½, ¼, ⅛ Thaler), Schilling pieces (1/32, 1/48 Thaler), Pfennig petty 
          coins (1/96, 1/128 Thaler).<br> <b>Mints:</b> in Holstein-Gottorp mainly Schleswig and Husum. After the Kipper-Wipper collapse (~1620) the imperial estates lose unified coinage; from 1622 
          the lighter 9¼-Fuß (Thaler Species, 25.28173 g fine vs. 25.984 g in the 9-Fuß) takes over in Holstein, with the last 9-Fuß strike falling in 1625 (Hans Jr. of Sonderburg, 2 Schilling 
          Lübisch).<br> <b>Beyond Holstein the 9-Fuß lived on:</b> Hamburg kept it as the <i>Bank-Mark</i> of the Hamburger Bank, Lübeck as the <i>Speciemark</i> — both until 1875.
        uk: <b>Імперський стандарт до 1625:</b> Reichsthaler у 9-Fuß (.889/14²⁄₉ Loth, 25,984 г чистого), частки Mark lübisch (½, ¼, ⅛ Thaler), Schilling-монети (1/32, 1/48 Thaler), Pfennig-розмінні 
          монети (1/96, 1/128 Thaler).<br> <b>Монетні двори:</b> в Гольштейн-Ґотторпі переважно Шлезвіг і Гузум. Після колапсу Kipper-Wipper (~1620) імперські стани втрачають єдину монетну систему; з 
          1622 у Гольштейні утверджується легший 9¼-Fuß (Thaler Species, 25,28173 г чистого проти 25,984 г у 9-Fuß), а останнє 9-Fuß-карбування припадає на 1625 р. (Hans Jr. Sonderburg, 2 Schilling 
          Lübisch).<br> <b>Поза Гольштейном 9-Fuß продовжує існувати:</b> Гамбург тримає його як <i>Bank-Mark</i> Гамбурзького банку, Любек — як <i>Speciemark</i>; обидва до 1875 р.
    - id: II
      year_from: 1646
      year_to: 1683
      from_label: '1646'
      to_label: '1683'
      title:
        de: Glückstadter Speciedaler nach 9-Fuß (1645/46 + 1683)
        en: Glückstadt Speciedaler at 9-Fuß (1645/46 + 1683)
        uk: Ґлюкштатський Speciedaler за 9-Fuß (1645/46 + 1683)
      description:
        de: Zwei Glückstadter Großstücke nach dem Reichsthaler-9-Fuß — also nach einem Standard, der in Holstein bereits seit 1622 vom 9¼-Fuß abgelöst war. ½ Speciedaler Christians IV. 1645/46 (Hede 
          165, <i>Marken fin udbragt til 9 daler</i>) und Speciedaler Christians V. 1683 (Hede 120<sup>[ref:danskmoent-hedekron]</sup>, <i>9 speciedalere</i>). Glückstadt blieb damit über sechs 
          Dezennien am alten Reichs-Speciesstandard; Auflagen und Anlaß der Prägungen sind aus den uns vorliegenden Quellen nicht ersichtlich.
        en: Two Glückstadt issues on the Reichsthaler-9-Fuß — a standard that had been superseded in Holstein by the 9¼-Fuß since 1622. Christian IV ½ Speciedaler 1645/46 (Hede 165, <i>Marken fin 
          udbragt til 9 daler</i>) and Christian V Speciedaler 1683 (Hede 120<sup>[ref:danskmoent-hedekron]</sup>, <i>9 speciedalere</i>). Glückstadt thus held to the old imperial Specie standard for 
          six decades; mintage figures and the reason for striking on this standard are not given in the available sources.
        uk: Два ґлюкштадські випуски за стандартом Reichsthaler-9-Fuß — стопою, яку в Гольштейні з 1622 р. вже витіснив 9¼-Fuß. ½ Speciedaler Кристіана IV. 1645/46 рр. (Hede 165, <i>Marken fin udbragt
          til 9 daler</i>) і Speciedaler Кристіана V. 1683 р. (Hede 120<sup>[ref:danskmoent-hedekron]</sup>, <i>9 speciedalere</i>). Glückstadt таким чином тримався старого імперського 
          Speciedaler-стандарту понад шість десятиліть; тиражі та обставини карбування у доступних джерелах не зазначені.
  9_25_thaler:
    - id: I
      year_from: 1622
      year_to: 1726
      from_label: '1622'
      to_label: 15. Juli 1726
      title:
        de: Etablierung unter dänischer und gottorpischer Herrschaft
        en: Establishment under Danish and Gottorp rule
        uk: Становлення під данським і ґотторпським правлінням
      description:
        de: 'Holstein zweigetheilt: Königsl. dänischer Antheil (Glückstadt, Pinneberg, Rantzau) und Gottorpischer Antheil (Tönning, Schleswig, Kiel) · keine einheitliche Münzstruktur · Aufgeld zwischen
          Species und Umlaufmünzen üblich.'
        en: 'Holstein divided in two: the royal Danish part (Glückstadt, Pinneberg, Rantzau) and the Gottorp part (Tönning, Schleswig, Kiel) · no unified coinage structure · a premium between Species and
          circulating coins is the norm.'
        uk: 'Гольштейн розділений на дві частини: королівська данська частина (Glückstadt, Pinneberg, Rantzau) і ґотторпська частина (Tönning, Schleswig, Kiel) · єдиної монетної структури немає · надбавка
          (Aufgeld) між Species і обіговими монетами — звична практика.'
      context:
        de: '<b>Dominierende Großsilbermünze:</b> Thaler Species im 9¼-Fuß, nach dänischer Tradition etabliert; daneben lübisch geprägte Schilling-Scheidemünzen. <b>Zeitgenössische Nomenklatur:</b> auf
          den Münzen «SPECIES» oder Mark-Danske-Denomination; in Auktionskatalogen auch «Speciedaler».<br>

          <b>Hauptumlauf in Holstein:</b> Neben heimischen Prägungen zirkulieren lübische, hamburgische und norddeutsche Thaler Species; niederländische Patagonen/Albertusthaler; schwedische 4-Mark-Stücke;
          spanische Piaster — der Handel akzeptiert jede Species nach Silbergehalt.<br>

          <b>Parallel zur Thaler-Species-Prägung: die Kronemønt-Kategorie (1618 → 1696).</b> Siehe eigene Sektion <i>10½-Krone-Fuß · Kronemønt-Tarifmünze</i> unten, wo die Tarifhistorie 1½ → 1⅓ → ⅔ Speciedaler
          und die Prägetabelle 1644–1696 detailliert dokumentiert sind.

          '
        en: <b>Dominant large silver coin:</b> the Thaler Species in the 9¼-Fuß, established by Danish tradition; alongside it, Schilling petty coinage in Lübeck reckoning. <b>Contemporary 
          nomenclature:</b> on the coins themselves «SPECIES» or a Mark-Danske denomination; auction catalogues often use «Speciedaler».<br> <b>Main circulation in Holstein:</b> besides domestic 
          issues, Lübeck, Hamburg and North-German Thaler Species circulate; Dutch Patagonen/Albertusthaler; Swedish 4-Mark pieces; Spanish piastres — trade accepts every Species by silver 
          content.<br> <b>In parallel with the Thaler Species issues — the Kronemønt category (1618 → 1696).</b> See the dedicated section <i>10½-Krone-Fuß · Kronemønt tariff coin</i> below, which 
          documents the tariff history 1½ → 1⅓ → ⅔ Speciedaler and the strike table 1644–1696 in detail.
        uk: <b>Домінантна велика срібна монета:</b> Thaler Species у 9¼-Fuß, закріплений данською традицією; поруч — Schilling-розмінна монета у любецькому рахунку. <b>Сучасна термінологія:</b> на 
          самих монетах «SPECIES» або номінал у Mark-Danske; аукціонні каталоги вживають також «Speciedaler».<br> <b>Основний обіг у Гольштейні:</b> крім місцевих карбувань, обертають любецькі, 
          гамбурзькі й північнонімецькі Thaler Species; нідерландські Patagonen/Albertusthaler; шведські 4-Mark; іспанські піастри — торгівля приймає кожен Species за вмістом срібла.<br> <b>Паралельно
          з карбуванням Thaler Species — категорія Kronemønt (1618 → 1696).</b> Див. окрему секцію <i>10½-Krone-Fuß · тарифна монета Kronemønt</i> нижче, де докладно задокументовано історію тарифу 1½ 
          → 1⅓ → ⅔ Speciedaler і таблицю карбувань 1644–1696.
      mt_caption:
        de: Münzstätte Tönning · Gottorpisches Holstein · 1689–1726 · Scheidemünzen mit lübischer Nominalangabe (im 9¼-Fuß-System) + Thaler Species und Dukaten (aus Bruun Coll. Stack's Bowers Auktion 
          Zürich 14.–15. März 2025)
        en: Tönning mint · Gottorp Holstein · 1689–1726 · petty coins denominated in Lübeck reckoning (within the 9¼-Fuß system) plus Thaler Species and ducats (from the Bruun Coll., Stack's Bowers 
          auction, Zurich 14–15 March 2025)
        uk: Монетний двір Tönning · ґотторпський Гольштейн · 1689–1726 · розмінна монета з номіналом у любецькому рахунку (в межах системи 9¼-Fuß) плюс Thaler Species і дукати (з колекції Bruun, 
          аукціон Stack's Bowers, Цюрих 14–15 березня 2025)
    - id: II
      year_from: 1726
      year_to: 1788
      from_label: 15./31. Juli 1726
      to_label: 29. Febr. 1788
      title:
        de: Parallel zum Dänisch-Norwegischen Kurantmøntfod
        en: In parallel with the Danish-Norwegian Kurantmøntfod
        uk: Паралельно з данським Kurantmøntfod
      description:
        de: Thaler Species wird Großhandels-/Reserveeinheit neben dem neu eingeführten Courantsystem. Gottorp unter dän. Krone vereinigt 1773.
        en: The Thaler Species becomes the wholesale and reserve unit alongside the newly introduced Courant system. Gottorp united under the Danish Crown in 1773.
        uk: Thaler Species стає одиницею оптової торгівлі й резерву поряд із новозапровадженою системою Courant. Готторп обʼєднано під данською Короною 1773 р.
      context:
        de: '<b>Funktion:</b> Fernhandel, Wechselgeschäft, Lohnverträge mit Beamten und Offizieren, Staatsanleihen. Im Alltag ungebräuchlich — dort dominiert der Rigsdaler Courant (siehe 11⅓-Fuß unten).<br>

          <b>Kurs:</b> 1 Thaler Species ≈ 1,225 Rigsdaler Courant biß 1794 · danach per Dekret 1,25 (ohne Silberänderung).<br>

          <b>Opgæld:</b> Wegen unrunden Kursverhältnisses tritt beim Tausch Courant → Species Aufgeld auf — von der Reform 1788 (siehe Phase C unten) abgeschafft.<br><br>

          <em>Keine eigenständigen Thaler-Species-Prägungen in Holstein/Schleswig während dieser Phase — Umlauf der Thaler Species aus Kopenhagen, Hamburg, Lübeck und Norddeutschland (vgl. Phase A und C).</em>

          '
        en: <b>Function:</b> long-distance trade, bills of exchange, salary contracts with officials and officers, state loans. Uncommon in everyday use — there the Rigsdaler Courant dominates (see 
          11⅓-Fuß below).<br> <b>Rate:</b> 1 Thaler Species ≈ 1.225 Rigsdaler Courant until 1794 · thereafter, by decree, 1.25 (with no change in silver content).<br> <b>Opgæld:</b> the awkward ratio 
          meant a premium had to be added when swapping Courant → Species — abolished by the 1788 reform (see Phase C below).<br><br> <em>No standalone Thaler Species issues in Holstein/Schleswig 
          during this phase — circulation of Thaler Species comes from Copenhagen, Hamburg, Lübeck and northern Germany (cf. phases A and C).</em>
        uk: <b>Функція:</b> далека торгівля, вексельний обіг, оплата праці чиновників і офіцерів, державні позики. У повсякденні майже не вживається — там домінує Rigsdaler Courant (див. 11⅓-Fuß 
          нижче).<br> <b>Курс:</b> 1 Thaler Species ≈ 1,225 Rigsdaler Courant до 1794 · потім декретом 1,25 (без зміни срібного вмісту).<br> <b>Opgæld:</b> через нерівне співвідношення при обміні 
          Courant → Species додавали надбавку — реформа 1788 р. (див. Фазу C нижче) її скасувала.<br><br> <em>Власних карбувань Thaler Species у Гольштейні/Шлезвігу в цій фазі немає — Thaler Species в
          обігу надходять із Копенгагена, Гамбурга, Любеку й Північної Німеччини (порівн. фази A і C).</em>
    - id: III
      year_from: 1787
