      description:
        de: 'Einzige Phase der Christian-IV.-Krone: alle Prägungen 1618–1624 laufen unter dem ursprünglichen Tarif <b>1½ Speciedaler</b> — eine Wertigkeit, die im Volksmund die satirische Umdeutung des
          königlichen Wahlspruches <b>RFP</b> (regna firmat pietas) als <b>R(iget) F(attes) P(enge)</b> hervorrief.<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup> Die offizielle Tarifsenkung
          auf 1⅓ Speciedaler erfolgt erst <b>1625</b><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup>, unmittelbar nach Einstellung der Krone-Prägung. Stilistische
          Untergruppen: Corona-Danica-Originalprägungen 1618–1622 (KM# 57–61, 58a, 59a) und «Dicke» / Open-Crown-Varianten 1624 (KM# 94–99) — alle innerhalb desselben Tarifregimes.'
        en: 'Sole phase of the Christian IV Krone: all 1618–1624 issues run under the original <b>1½ Speciedaler</b> tariff — a parity that in folk parlance prompted the satirical reread of the royal motto
          <b>RFP</b> (regna firmat pietas) as <b>R(iget) F(attes) P(enge)</b>.<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup> The official tariff cut to 1⅓ Speciedaler only comes in <b>1625</b><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup>,
          right after Krone production stops. Stylistic sub-groups: Corona Danica original strikes 1618–1622 (KM# 57–61, 58a, 59a) and «Dicke» / Open-Crown variants 1624 (KM# 94–99) — all within the same
          tariff regime.'
        uk: 'Єдина фаза Krone Кристіана IV: усі емісії 1618–1624 під оригінальним тарифом <b>1½ Speciedaler</b> — паритет, який у народі породив сатиричне переосмислення королівського девізу <b>RFP</b>
          (regna firmat pietas) як <b>R(iget) F(attes) P(enge)</b>.<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup> Офіційне зниження тарифу до 1⅓ Speciedaler відбувається лише <b>1625</b><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup>
          — одразу після припинення карбування Krone. Стилістичні підгрупи: оригінальні Corona Danica 1618–1622 (KM# 57–61, 58a, 59a) та варіанти «Dicke» / Open-Crown 1624 (KM# 94–99) — усі в одному тарифному
          режимі.'
