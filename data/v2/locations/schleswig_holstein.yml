fuss_periods:
  9_thaler:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 1566 (Augspurger Reichsmünz-Abschied) → 1625 (letzte Prägung; ab 1622 parallel vom 9¼-Fuß abgelöst) · 59 Jahre'
      en: 'In force in Holstein: 1566 (Augsburg Imperial Mint Decree) → 1625 (last strike; from 1622 already being superseded in parallel by the 9¼-Fuß) · 59 years'
      uk: 'Дія в Гольштейні: 1566 (Авґсбурзький імперський монетний ордонанс) → 1625 (останнє карбування; з 1622 паралельно витісняється 9¼-Fuß) · 59 років'
    hintergrund:
      de: 'Reichsstandard nach dem Augspurger Reichsmüntz-Abschied vom 30. Mai 1566 — verbindlich für sämtliche Reichsstände. In Holstein-Gottorp dominierte er unter Adolf I., Johann Adolf und Friedrich
        III.; Münzstätten Glückstadt und Tönning prägten nach diesem Fuß Thaler Species, Mark-lübisch-Theilstücke und Schillinge. Während der Kipper-Wipper-Krise (1620–1623) brach das einheitliche Reichsmünzwesen
        zusammen — bereits ab 1622 (Friedrich III. von Gottorp, Glückstadt) setzt sich der leichtere 9¼-Thaler-Fuß als Großsilberstandard durch, die letzte holsteinische 9-Fuß-Prägung erfolgt 1625 (Hans
        Jr. von Sonderburg, 2 Schilling Lübisch). <b>Über Holstein hinaus blieb der 9-Fuß als Banktauschmünze in Kraft:</b> Hamburg führte ihn als <i>Bank-Mark</i> der Hamburger Bank weiter, Lübeck als
        <i>Speciemark</i> — beide bis zur Reichsmünzreform 1875.

        '
      en: Imperial standard following the Augsburg Imperial Mint Decree of 30 May 1566 — binding on all imperial estates. In Holstein-Gottorp it dominated under Adolf I, Johann Adolf and Friedrich 
        III; the Glückstadt and Tönning mints struck Thaler Species, Mark-lübisch sub-units and Schilling petty coins on this standard. The Kipper-Wipper crisis (1620–1623) collapsed the unified 
        imperial coinage; from 1622 onward (Friedrich III of Gottorp, Glückstadt) the lighter 9¼-Thaler-Fuß took over as the large-silver standard, and the last Holstein 9-Fuß strike falls in 1625 
        (Hans Jr. of Sonderburg, 2 Schilling Lübisch). <b>Beyond Holstein the 9-Fuß remained in force as bank-exchange money:</b> Hamburg kept it as the <i>Bank-Mark</i> of the Hamburger Bank, Lübeck 
        as the <i>Speciemark</i> — both until the imperial coinage reform of 1875.
      uk: Імперський стандарт за Авґсбурзьким імперським монетним ордонансом 30 травня 1566 р. — обов'язковий для всіх імперських станів. У Гольштейн-Ґотторпі домінував за Адольфа I, Йоганна Адольфа й
        Фредеріка III; монетні двори Glückstadt і Tönning карбували за цим стандартом Thaler Species, частки Mark lübisch і дрібні Schilling-монети. Криза Kipper-Wipper (1620–1623) зруйнувала єдину 
        імперську монетну систему — вже з 1622 (Фредерік III Ґотторпський, Glückstadt) у Гольштейні утверджується легший 9¼-Thaler-Fuß як великосрібний стандарт, а останнє 9-Fuß-карбування припадає на
        1625 р. (Hans Jr. Sonderburg, 2 Schilling Lübisch). <b>Поза Гольштейном 9-Fuß продовжував існувати як банковий рахунок:</b> Гамбург тримав його як <i>Bank-Mark</i> Гамбурзького банку, Любек — 
        як <i>Speciemark</i>; обидва до імперської монетної реформи 1875 р.
    closing_label:
      de: Übergang zum 9¼-Fuß (Thaler Species) ab 1622, letzte Holstein-Prägung 1625
      en: Transition to the 9¼-Fuß (Thaler Species) from 1622; last Holstein strike 1625
      uk: Перехід до 9¼-Fuß (Thaler Species) з 1622; останнє карбування в Гольштейні — 1625
    closing:
      de: 'Der 9-Thaler-Fuß war kurzlebig in Holstein selbst (Adolf I. → Hans Jr. Sonderburg, letzte Prägung 1625; ab 1622 vom 9¼-Fuß abgelöst), bleibt aber <b>außerhalb Holsteins als Hamburger Bank-Mark
        und Lübecker Speciemark Rechnungseinheit biß 1875</b>. Die holsteinischen Reichsthaler unter Johann Adolf gehören zu den frühesten dokumentierten Großsilbermünzen der Region und bilden die Grundlage
        für die spätere 9¼-Fuß-Tradition.

        '
      en: The 9-Thaler-Fuß was short-lived in Holstein itself (Adolf I → Hans Jr. of Sonderburg, last strike 1625; superseded by the 9¼-Fuß from 1622), but it survived <b>beyond Holstein as the 
        Hamburg Bank Mark and the Lübeck Speciemark unit of account until 1875</b>. The Holstein Reichsthaler under Johann Adolf are among the earliest documented large-silver coins in the region and 
        form the foundation for the later 9¼-Fuß tradition.
      uk: 9-Thaler-Fuß у самому Гольштейні був недовговічним (Адольф I → Hans Jr. Sonderburg, останнє карбування 1625; з 1622 витіснений 9¼-Fuß), однак <b>поза Гольштейном залишався розрахунковою 
        одиницею як Гамбурзька Bank-Mark і Любецька Speciemark до 1875 р.</b> Гольштинські рейхсталери за Йоганна Адольфа належать до найдавніших задокументованих великосрібних монет регіону і 
        становлять основу пізнішої традиції 9¼-Fuß.
  9_25_thaler:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 1622 (Friedrich III.) → 24. Aug. 1866 (preuß. Annexion) · 244 Jahre'
      en: 'In force in Holstein: 1622 (Friedrich III) → 24 Aug. 1866 (Prussian annexation) · 244 years'
      uk: 'Дія в Гольштейні: 1622 (Фредерік III) → 24 серпня 1866 (прусська анексія) · 244 роки'
    hintergrund:
      de: 'Großsilbermünze nach dänisch-holsteinischer Tradition; etwas leichter als der Reichs-9-Fuß. Durchgehend stabil seit 1622 (Friedrich III. von Gottorp, Glückstadt) biß zur preußischen Annexion
        1867. Mit der Schleswig-Holsteinischen Reform von 1788 (siehe Phase C) wird er zur Alleingrundmünze aller holsteinischen Courant-Nominale.

        '
      en: A large silver coin in the Danish-Holstein tradition; slightly lighter than the imperial 9-Fuß. Stable without interruption since 1622 (Friedrich III of Gottorp, Glückstadt) until the 
        Prussian annexation of 1867. With the Schleswig-Holstein reform of 1788 (see Phase C) it becomes the sole base coin of all Holstein Courant denominations.
      uk: Велика срібна монета дансько-гольштинської традиції; дещо легша за імперський 9-Fuß. Безперервно стабільна з 1622 р. (Фредерік III Ґотторпський, Glückstadt) до прусської анексії 1867 р. З 
        Шлезв.-Гольштинською реформою 1788 р. (див. Фазу C) стає єдиною базовою монетою для всіх гольштинських Courant-номіналів.
    closing_label:
      de: Zusammenfassung · 240 Jahre Geltung
      en: Summary · 240 years in force
      uk: Підсумок · 240 років чинності
    closing:
      de: 'Der 9¼-Thaler-Fuß ist der <b>längstlebige und stabilste</b> Silberstandard in der holsteinischen Geldgeschichte. Über politische Umwälzungen hinweg (Gottorp-Vereinigung 1773, Staatsbankrott 1813,
        mehrere Herrscherwechsel, Kondominium 1864<sup>[ref:wikipedia-de-sterreichisch-preu-isches-kondominium-in-schleswig-holstein]</sup>) blieb der Feingehalt von 25,28173 g konstant. Die letzte holsteinische
        Speciedaler-Prägung erfolgt 1854 (Frederik VII., Altona, KM#475 / Hede 1) — das Auslaufen der Holstein-Prägung hat einen technisch-wirtschaftlichen Grund (grundlegender Umbau der Altonaer Münze
        1855–56 auf Dampfantrieb; danach Konzentration auf kleinere Rigsmønt-Nominale; Geschäftsverlust durch die internationale Geldkrise 1857; Schließung 1863<sup>[ref:danskmoent-mmjapan]</sup>) und keinen
        rechtlichen — der 9¼-Fuß-Speciedaler bleibt in Kopenhagen biß 1873 in Prägung.<sup>[ref:wikipedia-en-danish-rigsdaler]</sup> Erst die preußische Annexion 1866 beendet seine Funktion als gesetzliches
        Zahlmittel in Holstein. Numismatisch wirkt er biß 1907 nach, als der letzte Vereinsthaler (nachfolger-Fuß) ausser Kurs gesetzt wird.

        '
      en: The 9¼-Thaler-Fuß is the <b>longest-lived and most stable</b> silver standard in Holstein's monetary history. Through every political upheaval (the Gottorp union of 1773, the state 
        bankruptcy of 1813, several royal successions, the condominium of 1864<sup>[ref:wikipedia-de-sterreichisch-preu-isches-kondominium-in-schleswig-holstein]</sup>) the fine weight of 25.28173 g 
        remained unchanged. The final Holstein-mint Speciedaler is struck in 1854 (Frederik VII, Altona, KM#475 / Hede 1) — the end of Holstein-side production has a technical-economic cause (the 
        Altona mint was fundamentally rebuilt 1855–56 with steam-driven presses; afterwards concentrated on smaller rigsmønt denominations; lost most of its business in the international monetary 
        crisis of 1857; closed in 1863<sup>[ref:danskmoent-mmjapan]</sup>), not a legal one — the 9¼-Fuß Speciedaler continued to be minted in Copenhagen until 
        1873.<sup>[ref:wikipedia-en-danish-rigsdaler]</sup> Only the Prussian annexation of 1866 ended its function as legal tender in Holstein. Numismatically it lived on until 1907, when the last 
        Vereinsthaler (its successor standard) was withdrawn from circulation.
      uk: 9¼-Thaler-Fuß — <b>найдовговічніший і найстабільніший</b> срібний стандарт у грошовій історії Гольштейну. Через усі політичні переломи (обʼєднання з Готторпом 1773, державне банкрутство 
        1813, кілька зміни правителів, кондомініум 1864<sup>[ref:wikipedia-de-sterreichisch-preu-isches-kondominium-in-schleswig-holstein]</sup>) чиста вага 25,28173 г залишалася незмінною. Останнє 
        гольштинське карбування Speciedaler — 1854 р. (Фредерік VII, Альтона, KM#475 / Hede 1); припинення гольштинського виробництва має технічно-економічну причину (принципова перебудова 
        Альтонського монетного двору 1855–56 на паровий привід; зосередження на дрібних номіналах rigsmønt-серії; втрата майже всього бізнесу через міжнародну монетну кризу 1857 р.; закриття 1863 
        р.<sup>[ref:danskmoent-mmjapan]</sup>), а не правову — 9¼-Fuß-Speciedaler карбується в Копенгагені до 1873 р.<sup>[ref:wikipedia-en-danish-rigsdaler]</sup> Лише прусська анексія 1866 поклала 
        край його статусу законного платіжного засобу в Гольштейні. Нумізматично він діяв до 1907 року, коли останній Vereinsthaler (стопа-наступник) було вилучено з обігу.
  kronemont:
    pdate_label:
      de: 'Geltungsbereich: 1644 → 1696 · ca. 52 Jahre'
      en: 'Period of validity: 1644 → 1696 · ~52 years'
      uk: 'Період дії: 1644 → 1696 · ~52 років'
    hintergrund:
      de: 'Silberne Tarifmünze des dänisch-norwegischen Verbunds. Die Krone-Tarifprägung beginnt 1618 unter Christian IV. mit der <i>Corona Danica</i> (eigene Münzformel, höhere Lötigkeit und höherer Tarif
        pro Krone als der spätere 10½-Krone-Fuß). 1644 wird in Glückstadt während des Torstenson-Krieges (1643–1648) die <b>Hebræermønt</b> ausgegeben — eine Kriegsmünze mit deutlich unterwertigem Silbergehalt
        (Münzgewinn ca. 22 % bei den 2-Marker-Stücken), deren Feingehalt absichtlich verschleiert wurde; eine formelle Münzfuß-Ordnung lag dieser Phase nicht zugrunde<sup>[ref:danskmoent-aag1]</sup>. Der
        reguläre <b>10½-Krone-Fuß</b> wird formell erst durch die Münzordnung Christians V. vom <b>22. März 1671</b> festgelegt: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» je Marck
        Feinsilber<sup>[ref:danskmoent-c5mord]</sup>. Dieselbe Ordnung verankert die Speciemønt mit 9¼ rd. je Marck als Hauptstandard; die Krone gilt ausdrücklich als untergeordnete, sekundäre Münzfuß-Stufe
        und erreicht zu keiner Zeit Parität mit dem Specie als Primärstandard<sup>[ref:danskmoent-c5mord]</sup>. Im Tagesumlauf verdrängte die übertarifierte Krone den Speciedaler nach Greshamschem Mechanismus:
        gute Specietaler wurden für Auslandszahlungen einbehalten und gelangten kaum in den inländischen Verkehr<sup>[ref:danskmoent-hedekron]</sup><sup>[ref:danskmoent-w2ref]</sup>.'
      en: 'Silver tariff coin of the Danish-Norwegian composite state. Krone tariff coinage begins in 1618 under Christian IV with the <i>Corona Danica</i> (a separate coin formula, with higher fineness
        and a higher per-Krone tariff than the later 10½-Krone-Fuß). In 1644, during the Torstenson War (1643–1648), the <b>Hebræermønt</b> is issued at Glückstadt — a war coinage substantially under-weight
        (mint profit of ca. 22 % on the 2-Marker pieces), with the fineness deliberately concealed; this phase rested on no formal Münzfuß ordinance<sup>[ref:danskmoent-aag1]</sup>. The regular <b>10½-Krone-Fuß</b>
        is formally established only by Christian V''s Mint Ordinance of <b>22 March 1671</b>: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» per mark of fine silver<sup>[ref:danskmoent-c5mord]</sup>.
        The same ordinance anchors Speciemønt at 9¼ rd. per mark as the principal standard; the Krone is explicitly a subordinate, secondary Münzfuß tier and never achieves parity with Specie as a primary
        standard<sup>[ref:danskmoent-c5mord]</sup>. In day-to-day circulation the over-tariffed Krone displaced the Speciedaler by Gresham''s mechanism: good Specie was held back for foreign payments and
        scarcely entered domestic exchange<sup>[ref:danskmoent-hedekron]</sup><sup>[ref:danskmoent-w2ref]</sup>.'
      uk: 'Срібна тарифна монета дансько-норвезького союзу. Тарифне карбування Krone розпочинається 1618 р. за Кристіана IV з <i>Corona Danica</i> (окрема монетна формула, вища проба і вищий тариф на одну
        Krone, ніж пізніший 10½-Krone-Fuß). У 1644 р. під час війни Торстенсона (1643–1648) у Glückstadt випускається <b>Hebræermønt</b> — воєнна монета з суттєво недоваженим вмістом срібла (монетний прибуток
        бл. 22 % на 2-маркерах), пробу свідомо приховано; формальна Münzfuß-постанова в основу цієї фази не покладена<sup>[ref:danskmoent-aag1]</sup>. Регулярний <b>10½-Krone-Fuß</b> формально встановлюється
        лише Монетною постановою Кристіана V від <b>22 березня 1671 р.</b>: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» з марки чистого срібла<sup>[ref:danskmoent-c5mord]</sup>.
        У тій самій постанові Speciemønt закріплено за 9¼ rd. з марки як головний стандарт; Krone виразно є підпорядкованим, вторинним рівнем Münzfuß і ніколи не досягає паритету зі Specie як первинним
        стандартом<sup>[ref:danskmoent-c5mord]</sup>. У повсякденному обігу надтарифікована Krone витіснила Speciedaler за механізмом Грешема: добротні Specie притримували для зовнішньоторговельних розрахунків
        і вони майже не потрапляли у внутрішній обіг<sup>[ref:danskmoent-hedekron]</sup><sup>[ref:danskmoent-w2ref]</sup>.'
    details:
      de: '<p>Der Anfangstarif (1 Krone = 1½ Speciedaler) bedeutete eine Aufschlag von ca. 11 % über dem Silberwert<sup>[ref:danskmoent-w2ref]</sup>; der königliche Wahlspruch <b>RFP</b> (regna firmat pietas
        — «Frömmigkeit stärkt die Reiche») wurde im Volksmund daraufhin als <b>R(iget) F(attes) P(enge)</b> — «Dem Reich fehlt Geld» — gelesen<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup>.
        1625 sank der Tarif auf 1⅓ Specie; um 1670 stabilisierte ihn Christian V. auf <b>⅔ Specie</b> = 2 Marck Danske, eine Wertigkeit, die fortan auf den Münzen explizit als «<b>2 MARCK</b>» eingeprägt
        erscheint.</p>

        <p>Geprägt wurde an der Kopenhagener Hauptmünze und ab 1644 dominant in Glückstadt. Hede 1957<sup>[ref:danskmoent-hedekron]</sup> datiert den 10½-Krone-Fuß: «<i>indført i Norge 1649 og i Danmark
        1652 og sidst slået 1732</i>» — die holsteinische Glückstadter Phase endet 1696, die kopenhagenische Karbung läuft bis 1732 unter Christian VI. (Hede 4). Mit der Forordning vom 15./31. Juli 1726
        (Rigsdaler Courant nach Kurantmøntfod) verliert das Krone-Tarif-System seine Funktion als Hauptträger des Geldumlaufs zugunsten einer Metalläquivalenz-Logik<sup>[ref:danskmoent-hedekron]</sup>;
        lex.dk fixiert allerdings bereits 1692 als faktischen Übergangsmoment: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>».</p>

        <p>Sonderemissionen außerhalb der regulären Karbung: 1665 «Pumphosenkrone» / «Pumpbucksen Thaler» (Schou 39/40) — Krone und ½ Krone Frederiks III. mit höherer Lötigkeit; 1675 2-Krone Christians
        V. (Schou 11–15, Reskript vom 11. März 1675 über den Münzgewinn). Hede 1957<sup>[ref:danskmoent-hedekron]</sup> klassifiziert beide als spezielle Schaumünzen, nicht als Formelfortsetzung des 10½-Krone-Fußes.</p>

        <p>Die Müntzfuß-Werte folgen aus der Münzordnung 1671: 22,272 g Raugewicht × 10,5 = 233,856 g = 1 Cöllnische Marck. Der Feingehalt entspricht der kanonischen Loth-Grän-Stufe ⁴³⁄₆₄ = 10 Loth 12 Grän
        =.671875 (Numista führt.671 als gerundete Form). Hede 1957 verifiziert: «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>» (44,544 g rau für 2-Krone
        = 2 × 22,272 g per 1-Krone ✓). Belegexemplare: N#111284, N#111285, N#108760, N#108735.</p>

        <p>Spezialliteratur zur Glückstadter Phase: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>

        '
      en: '<p>The initial tariff (1 Krone = 1½ Speciedaler) implied a premium of ca. 11 % above the silver value<sup>[ref:danskmoent-w2ref]</sup>; the royal motto <b>RFP</b> (regna firmat pietas — «piety
        strengthens kingdoms») was therefore reread in folk parlance as <b>R(iget) F(attes) P(enge)</b> — «the realm lacks money»<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup>. In 1625
        the tariff fell to 1⅓ Specie; around 1670 Christian V stabilised it at <b>⅔ Specie</b> = 2 Marck Danske, a parity which thereafter appears explicitly on the coins as «<b>2 MARCK</b>».</p>

        <p>Striking took place at the Copenhagen royal mint and, from 1644 onward, predominantly at Glückstadt. Hede 1957<sup>[ref:danskmoent-hedekron]</sup> dates the 10½-Krone-Fuß: «<i>indført i Norge
        1649 og i Danmark 1652 og sidst slået 1732</i>» — the Holstein Glückstadt phase ends in 1696, while the Copenhagen mint continues until 1732 under Christian VI (Hede 4). With the Forordning of 15/31
        July 1726 (Rigsdaler Courant on the Kurantmøntfod) the Krone tariff system loses its function as principal medium of circulation in favour of a metal-equivalence logic<sup>[ref:danskmoent-hedekron]</sup>;
        lex.dk fixes 1692 as the de-facto transition: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>».</p>

        <p>Special issues outside the regular mintage: 1665 «Pumphosenkrone» / «Pumpbucksen Thaler» (Schou 39/40) — Frederik III''s Krone and ½ Krone at higher fineness; 1675 2-Krone of Christian V (Schou
        11–15, rescript of 11 March 1675 regarding the mint gain). Hede 1957<sup>[ref:danskmoent-hedekron]</sup> classifies both as specialised Schaumünzen rather than continuations of the 10½-Krone-Fuß
        formula.</p>

        <p>The Müntzfuß values follow from the 1671 ordinance: 22.272 g rough × 10.5 = 233.856 g = 1 Cologne mark. The fineness matches the canonical Loth-Grän step ⁴³⁄₆₄ = 10 Loth 12 Grän =.671875 (Numista
        gives.671 as a rounded form). Hede 1957 verifies: «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>» (44.544 g rough for the 2-Krone = 2 × 22.272 g
        per single Krone ✓). Reference specimens: N#111284, N#111285, N#108760, N#108735.</p>

        <p>Specialist literature on the Glückstadt phase: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>'
      uk: '<p>Початковий тариф (1 Krone = 1½ Speciedaler) означав надбавку бл. 11 % над срібною вартістю<sup>[ref:danskmoent-w2ref]</sup>; королівський девіз <b>RFP</b> (regna firmat pietas — «побожність
        зміцнює царства») у народі переосмислили як <b>R(iget) F(attes) P(enge)</b> — «Державі бракує грошей»<sup>[ref:natmus-christian-4s-svindler-moent-fylder-400-aar]</sup>. 1625 року тариф знижено до
        1⅓ Specie; близько 1670 року Кристіан V стабілізував його на рівні <b>⅔ Specie</b> = 2 Marck Danske — паритет, який відтоді з''являється на монетах явно як «<b>2 MARCK</b>».</p>

        <p>Карбування здійснювалося на Копенгагенському королівському монетному дворі та з 1644 р. — переважно у Glückstadt. Hede 1957<sup>[ref:danskmoent-hedekron]</sup> датує 10½-Krone-Fuß: «<i>indført
        i Norge 1649 og i Danmark 1652 og sidst slået 1732</i>» — гольштинська ґлюкштадтська фаза завершується 1696 р., копенгагенський монетний двір карбує до 1732 р. за Кристіана VI (Hede 4). З Forordning
        15/31 липня 1726 р. (Rigsdaler Courant за Kurantmøntfod) тарифна система Krone втрачає роль головного носія грошового обігу на користь логіки еквівалентності металу<sup>[ref:danskmoent-hedekron]</sup>;
        lex.dk фіксує 1692 р. як фактичний момент переходу: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>».</p>

        <p>Спец-випуски поза регулярним карбуванням: 1665 «Pumphosenkrone» / «Pumpbucksen Thaler» (Schou 39/40) — Krone і ½ Krone Фредеріка III за вищою пробою; 1675 2-Krone Кристіана V (Schou 11–15, рескрипт
        11 березня 1675 р. про монетний прибуток). Hede 1957<sup>[ref:danskmoent-hedekron]</sup> класифікує обидва як спеціальні Schaumünzen, а не продовження формули 10½-Krone-Fuß.</p>

        <p>Значення Müntzfuß випливають з постанови 1671 р.: 22,272 г повної ваги × 10,5 = 233,856 г = 1 кельнська марка. Проба збігається з канонічною точкою Loth-Grän ⁴³⁄₆₄ = 10 Loth 12 Grän =.671875
        (Numista наводить.671 як округлену форму). Hede 1957 верифікує: «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>» (44,544 г повної ваги на 2-Krone
        = 2 × 22,272 г на 1-Krone ✓). Зразки-приклади: N#111284, N#111285, N#108760, N#108735.</p>

        <p>Спеціальна література по ґлюкштадтській фазі: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>'
    closing_label:
      de: Zusammenfassung · 52 Jahre in Holstein (1644–1696), letzte Glückstadter Prägung
      en: Summary · 52 years in Holstein (1644–1696), last Glückstadt strike
      uk: Підсумок · 52 роки в Гольштейні (1644–1696), останнє карбування в Glückstadt
    closing:
      de: 'Der 10½-Krone-Fuß ist der <b>Hauptträger</b> der dänisch-norwegischen Krone-Tarifprägung — in Holstein von der Hebræermønt 1644 (Glückstadt, Torstenson-Krieg) über die Münzordnung Christians
        V. vom 22. März 1671 biß zur letzten Glückstadter Prägung 1696. Im Tagesumlauf verdrängte die übertarifierte Krone den Speciedaler nach Greshamschem Mechanismus<sup>[ref:danskmoent-w2ref]</sup>.
        Kopenhagen prägte unter Christian VI. weiter biß 1732 (Hede 4); ab 1692 wird das Krone-Tarifsystem schrittweise durch den Kurantmøntfod abgelöst, dessen Forordning vom 15./31. Juli 1726 die Hauptumlauf-Funktion
        endgültig auf den Rigsdaler Courant überträgt.

        '
      en: The 10½-Krone-Fuß is the <b>principal carrier</b> of Danish-Norwegian Krone tariff coinage — in Holstein from the Hebræermønt of 1644 (Glückstadt, Torstenson War) through Christian V's Mint 
        Ordinance of 22 March 1671 to the last Glückstadt strike in 1696. In day-to-day circulation the over-tariffed Krone displaced the Speciedaler by Gresham's 
        mechanism<sup>[ref:danskmoent-w2ref]</sup>. Copenhagen continued striking under Christian VI until 1732 (Hede 4); from 1692 the Krone tariff system is gradually superseded by the 
        Kurantmøntfod, with the Forordning of 15/31 July 1726 finally transferring the principal-circulation function to the Rigsdaler Courant.
      uk: 10½-Krone-Fuß — <b>головний носій</b> дансько-норвезького тарифного карбування Krone — у Гольштейні від Hebræermønt 1644 р. (Glückstadt, війна Торстенсона) через монетну постанову Кристіана 
        V від 22 березня 1671 р. до останнього ґлюкштадтського карбування 1696 р. У повсякденному обігу надтарифікована Krone витіснила Speciedaler за механізмом 
        Грешема<sup>[ref:danskmoent-w2ref]</sup>. Копенгаген за Кристіана VI продовжує карбування до 1732 р. (Hede 4); з 1692 р. тарифна система Krone поступово витісняється Kurantmøntfod-ом, а 
        Forordning 15/31 липня 1726 р. остаточно передає функцію головного обігу Rigsdaler Courant-у.
  11_333_thaler:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 15./31. Juli 1726 → 5. Januar 1813 · ca. 87 Jahre'
      en: 'In force in Holstein: 15/31 July 1726 → 5 January 1813 · ~87 years'
      uk: 'Дія в Гольштейні: 15/31 липня 1726 → 5 січня 1813 · ~87 років'
    hintergrund:
      de: 'Hauptalltagswährung des dänisch-norwegischen Gesamtstaats, einschließlich der dänischen Herzogthümer. Eingeführt unter Friedrich IV. Endet abrupt mit dem Staatsbankrott vom 5. Januar 1813.

        '
      en: Main everyday currency of the Danish-Norwegian composite state, including the Danish duchies. Introduced under Friedrich IV. Ended abruptly with the state bankruptcy of 5 January 1813.
      uk: Основна повсякденна валюта дансько-норвезької цілісної держави, включно з данськими герцогствами. Запроваджено за правління Фрідріха IV. Обривається державним банкрутством 5 січня 1813 р.
    closing_label:
      de: Zusammenfassung · 87 Jahre Geltung (nur 62 in Holstein)
      en: Summary · 87 years in force (only 62 in Holstein)
      uk: Підсумок · 87 років чинності (з них лише 62 у Гольштейні)
    closing:
      de: 'Der 11⅓-Fuß war die Alltagswährung Holsteins von 1726 biß 1788; eigene Holstein-Prägungen entstanden allerdings erst mit der Eröffnung der Altonaer Münze unter Christian VII. im Jahr 1771<sup>[ref:wikipedia-de-k-nigliche-m-nze-zu-altona]</sup>
        — pre-1771 kamen die kuranten Rigsdaler aus Kopenhagen. Mit Schimmelmanns Reform 1788 zog sich Holstein aus dem dänischen Courantverbund zurück und rechnete nach dem 9¼-Fuß Thaler Species mit Schilling-Theilung.
        Der Staatsbankrott 1813 beendete den 11⅓-Fuß in Dänemark selbst; Altbestände kursierten aber noch jahrzehntelang als Scheidemünzen.

        '
      en: The 11⅓-Fuß was Holstein's everyday currency from 1726 to 1788; Holstein-issued Kurantmøntfod coins, however, only began with the opening of the Altona Mint under Christian VII in 
        1771<sup>[ref:wikipedia-de-k-nigliche-m-nze-zu-altona]</sup> — pre-1771 the kurant Rigsdaler were struck in Copenhagen. With Schimmelmann's reform of 1788 Holstein withdrew from the Danish 
        Courant union and switched its accounting to the 9¼-Fuß Thaler Species with the Schilling subdivision. The state bankruptcy of 1813 ended the 11⅓-Fuß in Denmark itself; existing stocks 
        nevertheless circulated for decades as petty coinage.
      uk: 11⅓-Fuß був повсякденною валютою Гольштейну з 1726 до 1788 р.; власні гольштинські карбування Kurantmøntfod з'явилися аж із відкриттям Альтонського монетного двору за Кристіана VII у 1771 
        р.<sup>[ref:wikipedia-de-k-nigliche-m-nze-zu-altona]</sup> — до 1771 р. курантні Rigsdaler карбували в Копенгагені. З реформою Шіммельмана 1788 р. Гольштейн вийшов із данського Courant-союзу й
        перевів рахунок на 9¼-Fuß Thaler Species із поділом на Schilling. Державне банкрутство 1813 р. поклало край 11⅓-Fuß у самій Данії; старі запаси, втім, ще десятиліттями залишались в обігу як 
        розмінна монета.
  18_5_thaler:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 5. Januar 1813 → 24. Aug. 1866 · ca. 53 Jahre (in Dänemark weiter biß 1875)'
      en: 'In force in Holstein: 5 January 1813 → 24 Aug. 1866 · ~53 years (continued in Denmark itself until 1875)'
      uk: 'Дія в Гольштейні: 5 січня 1813 → 24 серпня 1866 · ~53 роки (у самій Данії — до 1875)'
    hintergrund:
      de: 'Nach dem dänischen Staatsbankrott durch Forordning vom 5. Januar 1813 eingeführt; löst den 11⅓-Fuß Courant ab. §10 derselben Forordning setzt den Rücknahmekurs <b>1 Speciedaler = 2 Rigsbankdaler</b>,
        wodurch der neue Fuß als glatter ½-Anteil des bestehenden Thaler-Species-Standards (9¼-Fuß) verankert ist. 1854 in Rigsdaler Rigsmønt umbenannt — rein terminologisch, ohne Fußänderung; der 9¼-Fuß-Speciedaler
        bleibt parallel gültig und wird in Kopenhagen biß 1873 weitergeprägt.<sup>[ref:wikipedia-de-sterreichisch-preu-isches-kondominium-in-schleswig-holstein]</sup><sup>[ref:nationalbanken-historical-coins]</sup><sup>[ref:danmarkshistorien-forordning-om-forandring-i-pengev-senet-5-januar-1813]</sup><sup>[ref:wikipedia-en-danish-rigsdaler]</sup>
        Unter österreichisch-preußischem Kondominium 1864–1866 unverändert weitergeführt.

        '
      en: Introduced by the Forordning of 5 January 1813 after the Danish state bankruptcy; replaces the 11⅓-Fuß Courant. §10 of the same Forordning sets the redemption rate at <b>1 Speciedaler = 2 
        Rigsbankdaler</b>, anchoring the new standard as a clean ½-share of the existing Thaler Species (9¼-Fuß). Renamed to Rigsdaler Rigsmønt in 1854 — purely terminological, with no change of 
        standard; the 9¼-Fuß Speciedaler remains valid in parallel and continues to be struck in Copenhagen until 
        1873.<sup>[ref:wikipedia-de-sterreichisch-preu-isches-kondominium-in-schleswig-holstein]</sup><sup>[ref:nationalbanken-historical-coins]</sup><sup>[ref:danmarkshistorien-forordning-om-forandring-i-pengev-senet-5-januar-1813]</sup><sup>[ref:wikipedia-en-danish-rigsdaler]</sup>
        Carried on unchanged through the Austro-Prussian condominium of 1864–1866.
      uk: Запроваджено Forordning 5 січня 1813 р. після данського державного банкрутства; замінює 11⅓-Fuß Courant. §10 тієї ж Forordning встановлює курс викупу <b>1 Speciedaler = 2 Rigsbankdaler</b>, 
        що закріплює нову стопу як рівну ½ частку чинного стандарту Thaler Species (9¼-Fuß). У 1854 р. перейменовано на Rigsdaler Rigsmønt — суто термінологічно, без зміни стопи; 9¼-Fuß-Speciedaler 
        лишається чинним паралельно і карбується в Копенгагені до 1873 
        р.<sup>[ref:wikipedia-de-sterreichisch-preu-isches-kondominium-in-schleswig-holstein]</sup><sup>[ref:nationalbanken-historical-coins]</sup><sup>[ref:danmarkshistorien-forordning-om-forandring-i-pengev-senet-5-januar-1813]</sup><sup>[ref:wikipedia-en-danish-rigsdaler]</sup>
        За австрійсько-прусського кондомініуму 1864–1866 рр. без змін.
    closing_label:
      de: Zusammenfassung · 53 Jahre Geltung in Holstein
      en: Summary · 53 years in force in Holstein
      uk: Підсумок · 53 роки чинності в Гольштейні
    closing:
      de: 'Der 18½-Fuß war die offizielle Landeswährung Holsteins von 1813 biß 1866. Nach dem Staatsbankrott eingeführt, überstand er die Umbenennung 1854 (Frederik VII.)<sup>[ref:wikipedia-en-danish-rigsdaler]</sup>
        und das österreichisch-preußische Kondominium 1864–1866 unverändert. In Dänemark selbst blieb er biß 1875 in Kraft (weitere 9 Jahre nach Ende in Holstein). Die preußische Annexion 1866 ersetzt ihn
        in Holstein durch den Vereinsthalerfuß.

        '
      en: The 18½-Fuß was Holstein's official territorial currency from 1813 to 1866. Introduced after the state bankruptcy, it survived the renaming of 1854 (Frederik 
        VII)<sup>[ref:wikipedia-en-danish-rigsdaler]</sup> and the Austro-Prussian condominium of 1864–1866 unchanged. In Denmark itself it remained in force until 1875 (a further nine years beyond 
        Holstein). The Prussian annexation of 1866 replaced it in Holstein with the Vereinsthalerfuß.
      uk: 18½-Fuß був офіційною територіальною валютою Гольштейну від 1813 до 1866. Запроваджений після державного банкрутства, без змін пережив перейменування 1854 (Фредерік 
        VII)<sup>[ref:wikipedia-en-danish-rigsdaler]</sup> і австрійсько-прусський кондомініум 1864–1866. У самій Данії діяв до 1875 (ще девʼять років після завершення в Гольштейні). Прусська анексія 
        1866 заміняє його в Гольштейні на Vereinsthalerfuß.
  30_thaler:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 24. Aug. 1866 → 4. Dez. 1871 · ca. 5 Jahre (im Reich als Vereinsthaler biß 1907)'
      en: 'In force in Holstein: 24 Aug. 1866 → 4 Dec. 1871 · ~5 years (across the Reich, as Vereinsthaler, until 1907)'
      uk: 'Дія в Гольштейні: 24 серпня 1866 → 4 грудня 1871 · ~5 років (у Рейху як Vereinsthaler — до 1907)'
    hintergrund:
      de: 'Wiener Münzvertrag 24. Januar 1857: gemeinsamer deutscher Silberstandard, neu auf das Zollpfund bezogen statt auf die bisherige Cöllnische Marck. Preußen führt ihn in Holstein mit der Annexion
        1866 ein; damit endet in Holstein die dänisch-geprägte Geldtradition nach ca. 240 Jahren.

        '
      en: 'Vienna Monetary Treaty of 24 January 1857: a common German silver standard, newly referenced to the Zollpfund instead of the previous Cologne Mark. Prussia introduces it in Holstein with the
        annexation of 1866; this ends the Danish-shaped monetary tradition in Holstein after roughly 240 years.'
      uk: 'Віденська монетна конвенція 24 січня 1857 р.: спільний німецький срібний стандарт, відлічуваний від Zollpfund замість попередньої кельнської марки. Пруссія запроваджує його в Гольштейні з анексією
        1866 р.; це завершує сформовану на данський лад грошову традицію Гольштейну, що тривала приблизно 240 років.'
    closing_label:
      de: Zusammenfassung · 5 Jahre in Holstein, 41 Jahre als gesetzliches Zahlmittel
      en: Summary · 5 years in Holstein, 41 years as legal tender
      uk: Підсумок · 5 років у Гольштейні, 41 рік статусу законного платіжного засобу
    closing:
      de: 'Der 30-Fuß gilt in Holstein formal nur von der preußischen Annexion 1866 biß zur Einführung der Goldmark (Münzgesetz 4. Dez. 1871). Als <b>Vereinsthaler bleibt er aber biß 1907 gesetzliches Zahlmittel
        im Deutschen Kaiserreich</b> (letzter Rückruf-Termin 1. Oktober 1907). Nachhaltigstes Erbe: die «3 Mark»-Stücke der Reichsmünze (1908+) folgen dem Vereinsthaler-Feingewicht (900 ‰, identische Abmessungen),
        sind also faktisch fortgeführte Vereinsthaler.

        '
      en: 'Formally the 30-Fuß applies in Holstein only from the Prussian annexation of 1866 until the introduction of the Goldmark (Coinage Act of 4 Dec. 1871). As the <b>Vereinsthaler, however, it remained
        legal tender in the German Empire until 1907</b> (final recall: 1 October 1907). Its most enduring legacy: the «3 Mark» pieces of the Reichsmünze (1908+) keep the Vereinsthaler''s fine weight (900‰,
        identical dimensions) and are de facto continued Vereinsthaler.'
      uk: 'Формально 30-Fuß діє в Гольштейні лише від прусської анексії 1866 до запровадження Goldmark (Закон про монету 4 грудня 1871). Однак як <b>Vereinsthaler він лишається законним платіжним засобом
        у Німецькому Рейху до 1907</b> (остаточне вилучення — 1 жовтня 1907). Найтриваліша спадщина: «3 Mark» Reichsmünze (1908+) повторюють чисту вагу Vereinsthaler (900 ‰, ідентичні розміри) і де-факто
        є продовженням Vereinsthaler.'
  reichsdukatenfuss:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 17. Jh. (Glückstadt) → 4. Dez. 1871 · ca. 270 Jahre'
      en: 'In force in Holstein: 17th century (Glückstadt) → 4 Dec. 1871 · ~270 years'
      uk: 'Дія в Гольштейні: XVII ст. (Glückstadt) → 4 грудня 1871 · ~270 років'
    hintergrund:
      de: 'Reichs-Dukatenstandard, eingeführt durch die Augspurger Reichsmünzordnung vom 19. August 1559. Gilt einheitlich im HRRDN-Raum biß zum Reichsgoldmünzfuß (Münzgesetz 4. Dezember 1871). In Holstein
        wurden Dukaten in Glückstadt, Gottorp und Altona geprägt; in der historischen Praxis lag das Feingewicht oft etwas unter dem Nominalwert, das Grundprinzip blieb jedoch über die gesamte Geltungsdauer
        unverändert.

        '
      en: Imperial ducat standard introduced by the Augsburg Imperial Coinage Ordinance of 19 August 1559. In force across the Holy Roman Empire until the Reichsgoldmünzfuß (Coinage Act of 4 December 
        1871). In Holstein, ducats were struck at Glückstadt, Gottorp and Altona; in actual practice the fine weight often fell slightly below the nominal target, but the underlying principle remained
        unchanged for the entire period.
      uk: Імперський дукатний стандарт, запроваджений Авґсбурзьким імперським монетним ордонансом 19 серпня 1559 р. Діє в усьому просторі Священної Римської імперії до Reichsgoldmünzfuß (Закон про 
        монету 4 грудня 1871 р.). У Гольштейні дукати карбували Glückstadt, Gottorp і Altona; у фактичній практиці чиста вага часто була трохи нижчою за номінальну, проте основний принцип за весь 
        період незмінний.
    closing_label:
      de: Zusammenfassung · ca. 270 Jahre Geltung
      en: Summary · ~270 years in force
      uk: Підсумок · ~270 років чинності
    closing:
      de: 'Der Reichsdukatenfuß ist der <b>stabilste Müntzfuß</b> in der gesamten Übersicht — stabilere Geltung als jeder Silberfuß: von der Augspurger Reichsmünzordnung 1559 biß zum Reichsgoldmünzfuß 1871
        (312 Jahre Reichsgeltung, davon in Holstein mindestens 250 Jahre). Gold als Wertträger widerstand politischen Krisen, Staatsbankrotten (1813) und Herrschaftswechseln. Erst die strukturelle Umstellung
        auf Goldwährung statt Goldhandelsmünze mit Silber-Parallelwährung (Münzgesetz 4. Dez. 1871) beendet den Dukatenfuß endgültig.

        '
      en: 'The Reichsdukatenfuß is the <b>most stable Müntzfuß</b> in the whole survey — more durable than any silver standard: from the Augsburg Imperial Coinage Ordinance of 1559 to the Reichsgoldmünzfuß
        of 1871 (312 years across the Reich, of which at least 250 in Holstein). Gold as a store of value withstood political crises, the state bankruptcy of 1813 and changes of dynasty. Only the structural
        shift from a gold trade-coin alongside a parallel silver currency to a true gold currency (Coinage Act of 4 Dec. 1871) ended the Dukatenfuß definitively.'
      uk: 'Reichsdukatenfuß — <b>найстабільніша Müntzfuß</b> у всьому огляді: триваліша за будь-який срібний стандарт — від Авґсбурзького імперського монетного ордонансу 1559 до Reichsgoldmünzfuß 1871 (312
        років у Рейху, з яких щонайменше 250 у Гольштейні). Золото як носій вартості витримало політичні кризи, державне банкрутство 1813 і зміни династій. Лише структурний перехід від торгової золотої
        монети з паралельною срібною валютою до власне золотої валюти (Закон про монету 4 грудня 1871) остаточно завершив Dukatenfuß.'
  courantdukatenfuss:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 1771 (Eröffnung Altonaer Münze) → 1796 (letzte Restprägung) · ca. 25 Jahre'
      en: 'In force in Holstein: 1771 (opening of the Altona mint) → 1796 (last restrike) · ~25 years'
      uk: 'Дія в Гольштейні: 1771 (відкриття Альтонського монетного двору) → 1796 (останнє рестрайк-карбування) · ~25 років'
    hintergrund:
      de: 'Kurantdukat-Goldlinie der dänischen Monarchie — <b>tarif-tragendes Goldregime</b> mit fixem Wert <b>1 Kurantdukat = 12 Mark Dansk = 2 Rigsdaler Courant</b>.<sup>[ref:danskmoent-c4h25]</sup> Standard
        75 Stück / rauer Cölln. Marck, 21 Karat (.875), 3,118 g rau, 2,72832 g fein.<sup>[ref:danskmoent-w2ref]</sup> In Holstein durch die <b>Eröffnung der Altonaer Münze am 23. August 1771</b> implementiert
        — explizit «<i>zur Versorgung der Herzogtümer mit dänischer Goldmünze</i>», wo «<i>hamburgische und lübeckische Gelder dominierten</i>».<sup>[ref:portal-christian-4s-guldm-nt-fra-esrum-m-lleg-rd]</sup>
        Reale Hauptemissionen unter Christian VII. 1783–1785 auf Grundlage des Plakat vom <b>2. Dezember 1782</b>, das «<i>jedem ohne Bedingung und Bezahlung</i>» die Goldablieferung zur Kurantdukat-Prägung
        erlaubte («<i>Gold aus der rauen Marck zu 75 Stück bei 21 Karat ausprägen</i>»).<sup>[ref:danskmoent-c7mord]</sup> Plakat-Widerruf 1795; letzte Altonaer Restprägung 1796 (≈ 30 700 Stück mit rückdatiertem
        1785-Stempel).<sup>[ref:danskmoent-w2ref]</sup>

        '
      en: Kurantdukat gold line of the Danish monarchy — a <b>tariff-bearing gold regime</b> at the fixed value <b>1 Kurantdukat = 12 Mark Dansk = 2 Rigsdaler 
        Courant</b>.<sup>[ref:danskmoent-c4h25]</sup> Standard 75 pieces per rough Cologne Mark, 21 carats (.875), 3.118 g rough, 2.72832 g fine.<sup>[ref:danskmoent-w2ref]</sup> Implemented in 
        Holstein with the <b>opening of the Altona mint on 23 August 1771</b> — explicitly «<i>to supply the duchies with Danish gold coin</i>» where «<i>Hamburg and Lübeck currencies 
        dominated</i>».<sup>[ref:portal-christian-4s-guldm-nt-fra-esrum-m-lleg-rd]</sup> The actual main issues run under Christian VII in 1783–1785, on the basis of the Plakat of <b>2 December 
        1782</b> which permitted «<i>anyone without condition or fee</i>» to deliver gold for Kurantdukat coinage («<i>gold to be coined at 75 pieces per rough Mark of 21 
        carats</i>»).<sup>[ref:danskmoent-c7mord]</sup> The plakat is revoked in 1795; the final Altona restrike in 1796 (≈ 30,700 pieces with back-dated 1785 dies).<sup>[ref:danskmoent-w2ref]</sup>
      uk: Kurantdukat-золота лінія данської монархії — <b>тариф-несучий золотий режим</b> з фіксованою вартістю <b>1 Kurantdukat = 12 Mark Dansk = 2 Rigsdaler 
        Courant</b>.<sup>[ref:danskmoent-c4h25]</sup> Стандарт 75 штук з повної Кельнської марки, 21 карат (.875), 3,118 г повної, 2,72832 г чистого.<sup>[ref:danskmoent-w2ref]</sup> У Гольштейні 
        впроваджено через <b>відкриття Альтонського монетного двору 23 серпня 1771 р.</b> — явно «<i>для забезпечення герцогств данською золотою монетою</i>», де «<i>домінували гамбурзькі й любецькі 
        гроші</i>».<sup>[ref:portal-christian-4s-guldm-nt-fra-esrum-m-lleg-rd]</sup> Реальні головні емісії за Christian VII у 1783–1785 рр. на основі Plakat <b>2 грудня 1782 р.</b>, яким 
        «<i>будь-кому без умов і оплати</i>» дозволялось здавати золото на карбування Kurantdukat («<i>золото карбувати по 75 штук з повної марки при 21 караті</i>»).<sup>[ref:danskmoent-c7mord]</sup>
        Plakat скасовано 1795; останнє альтонське рестрайк-карбування 1796 (≈ 30 700 шт. зі зворотньо-датованими штемпелями 1785).<sup>[ref:danskmoent-w2ref]</sup>
    closing_label:
      de: Zusammenfassung · ca. 25 Jahre Kurantdukat-Prägung in Altona
      en: Summary · ~25 years of Kurantdukat coinage in Altona
      uk: Підсумок · ~25 років карбування Kurantdukat в Альтоні
    closing:
      de: 'Der Courantdukatenfuß steht in Holstein als <b>dritte Goldlinie</b> neben Reichsdukatenfuß (Handelsmünze, 3,44 g fein,.986) und Pistolen-Fuß (5-Speciedaler-Tarif, 6,03 g fein,.903) — eine separate
        dänisch-tariffierte Tradition mit eigenem 12-Mark-Tarif, niedrigerer Probe (.875) und kleinerem Stück (2,728 g fein). Die Linie fokussiert sich in den Herzogtümern ausschließlich auf die Altonaer
        Münze (1771–1796); Glückstadt und Tönning prägen weiterhin Reichsdukaten, keine Kurantdukaten. Ende der Neuprägung 1796; faktische Demonetisierung erst 1873 mit der Skandinavischen Münzunion (Krone).

        '
      en: In Holstein the Courantdukatenfuß stands as a <b>third gold line</b> alongside the Reichsdukatenfuß (a trade coin at 3.44 g fine,.986) and the Pistolen-Fuß (5-Speciedaler tariff, 6.03 g 
        fine,.903) — a separate Danish tariff-bearing tradition with its own 12-Mark tariff, lower fineness (.875) and a smaller piece (2.728 g fine). In the duchies the line is exclusive to the 
        Altona mint (1771–1796); Glückstadt and Tönning continue to strike Reichsdukaten, not Kurantdukaten. New coinage ends in 1796; the factual demonetisation only follows in 1873 with the 
        Scandinavian Monetary Union (Krone).
      uk: У Гольштейні Courantdukatenfuß стоїть як <b>третя золота лінія</b> поруч із Reichsdukatenfuß (торгова монета, 3,44 г чистого,.986) і Pistolen-Fuß (тариф 5 Speciedaler, 6,03 г чистого,.903) —
        окрема данська тарифна традиція з власним тарифом 12 Mark, нижчою пробою (.875) і меншою монетою (2,728 г чистого). У герцогствах лінія зосереджена виключно в Альтонському монетному дворі 
        (1771–1796); Glückstadt і Tönning і далі карбують Reichsdukaten, а не Kurantdukaten. Нове карбування закінчується 1796 р.; фактична демонетизація — лише 1873 р. зі Скандинавською монетною 
        унією (Krone).
  pistolenfuss:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 1771 (Eröffnung Altonaer Münze) → 1864 (preuß. Annexion) · ca. 93 Jahre'
      en: 'In force in Holstein: 1771 (opening of the Altona mint) → 1864 (Prussian annexation) · ~93 years'
      uk: 'Дія в Гольштейні: 1771 (відкриття монетного двору в Альтоні) → 1864 (прусська анексія) · ~93 роки'
    hintergrund:
      de: 'Pistolen-Goldfuß der norddeutschen <b>5-Thaler-Tarif</b>-Tradition (Vorbild Wilhelm d''or 1737, Friedrich d''or 1741<sup>[ref:danskmoent-hedekron]</sup>). In Holstein-Altona durch Christian VII.
        mit der Eröffnung der Altonaer Münze 1771 eingeführt — der dänische <b>Christian d''or</b> übernimmt unverändert die Spezifikation des reduzierten preußischen Friedrich d''or (130/144 Probe ≈ 903
        ‰, 6,03 g Feingold; «<i>en efterligning af de franske Louis d''or</i>»<sup>[ref:danskmoent-w2ref]</sup>). Tarif 1 Pistole = 5 Speciedaler = 12 Mark Dansk-Anteil. Die Linie wird unter Frederik VI.
        (Frederik d''or, ab 1808 nach Statsbankerot 1813 fortgesetzt), Christian VIII. (2 Christian d''or 1842) und Frederik VII. (2 Frederik d''or 1852/1859) weitergeführt — alle Holstein-d''or-Prägungen
        erfolgen in Altona. Mit der preußischen Annexion 1864/1867 endet die holsteinische Pistolen-Prägung; in Kopenhagen läuft die Linie biß 1870 (Christian IX.) weiter, bevor das dänische Münzgesetz
        1873 (Skandinavische Münzunion) die d''or-Linie endgültig durch die Krone ablöst.

        '
      en: 'Pistole gold standard of the North-German <b>5-thaler tariff</b> tradition (modelled on the Wilhelm d''or of 1737 and Friedrich d''or of 1741<sup>[ref:danskmoent-hedekron]</sup>). Introduced
        in Holstein-Altona under Christian VII with the opening of the Altona mint in 1771 — the Danish <b>Christian d''or</b> adopts the specification of the reduced Prussian Friedrich d''or unchanged
        (130/144 fineness ≈ 903 ‰, 6.03 g fine gold; «<i>en efterligning af de franske Louis d''or</i>»<sup>[ref:danskmoent-w2ref]</sup>). Tariff: 1 pistole = 5 Speciedaler = 12 Mark Dansk-share. The line
        continues under Frederik VI (Frederik d''or, carried on after the Statsbankerot of 1813 from 1808), Christian VIII (2 Christian d''or 1842) and Frederik VII (2 Frederik d''or 1852/1859) — all Holstein
        d''or issues struck at Altona. The Prussian annexation of 1864/1867 ends Holstein pistole coinage; in Copenhagen the line continues to 1870 (Christian IX) before the Danish Coinage Act of 1873 (Scandinavian
        Monetary Union) finally replaces the d''or with the Krone.'
      uk: 'Pistolen-золотий стандарт північно-німецької <b>тарифної традиції 5 талерів</b> (зразки Wilhelm d''or 1737 і Friedrich d''or 1741<sup>[ref:danskmoent-hedekron]</sup>). У Гольштейні-Альтоні запроваджено
        за Christian VII з відкриттям Альтонського монетного двору 1771 — данський <b>Christian d''or</b> без змін переймає специфікацію редукованого прусського Friedrich d''or (проба 130/144 ≈ 903 ‰, 6,03
        г чистого золота; «<i>en efterligning af de franske Louis d''or</i>»<sup>[ref:danskmoent-w2ref]</sup>). Тариф: 1 пістоль = 5 Speciedaler = частка 12 Mark Dansk. Лінія продовжується за Frederik VI
        (Frederik d''or, з 1808 р. після Statsbankerot 1813), Christian VIII (2 Christian d''or 1842) та Frederik VII (2 Frederik d''or 1852/1859) — усі гольштинські карбування d''or відбуваються в Альтоні.
        З прусською анексією 1864/1867 гольштинська пістольна емісія припиняється; в Копенгагені лінія триває до 1870 р. (Christian IX), доки данський Закон про монету 1873 (Скандинавська монетна унія)
        остаточно не замінює d''or на Krone.'
    closing_label:
      de: Zusammenfassung · ca. 93 Jahre Pistolen-Goldprägung in Altona
      en: Summary · ~93 years of pistole gold coinage in Altona
      uk: Підсумок · ~93 роки Pistolen-карбування золота в Альтоні
    closing:
      de: 'Der Pistolen-Fuß steht als zweite Goldlinie parallel zum Reichsdukatenfuß: nicht eine Sub-Stufe des Dukaten, sondern ein eigener 5-Thaler-Tarifstandard mit niedrigerer Probe (.903 vs..986) und
        doppeltem Stück (≈ 6 g vs. ≈ 3,4 g fein) — die Linien laufen ab 1771 paralllel und schneiden sich erst mit der Reichsgoldmark-Demonetisierung 1871/1876 zusammen. In Holstein konkretisiert sich die
        Pistolen-Linie ausschließlich in der Altonaer Münze; Glückstadt prägt weiterhin Reichsdukaten, keine Pistolen.

        '
      en: 'The Pistolen-Fuß stands as a second gold line in parallel with the Reichsdukatenfuß: not a sub-tier of the ducat but its own 5-thaler tariff standard with lower fineness (.903 vs..986) and roughly
        twice the piece weight (≈ 6 g vs. ≈ 3.4 g fine) — the two lines run side by side from 1771 and converge only at the Reichsgoldmark demonetisation of 1871/1876. In Holstein the pistole line concretises
        exclusively at the Altona mint; Glückstadt continues to strike Reichsdukaten, not pistoles.'
      uk: 'Pistolen-Fuß стоїть як друга золота лінія паралельно з Reichsdukatenfuß: не суб-рівень дуката, а власний тарифний стандарт у 5 талерів із нижчою пробою (.903 проти.986) і приблизно вдвічі важчою
        монетою (≈ 6 г проти ≈ 3,4 г чистого) — обидві лінії йдуть паралельно з 1771 і сходяться лише при демонетизації Reichsgoldmark 1871/1876. У Гольштейні Pistolen-лінія конкретизується виключно в Альтонському
        монетному дворі; Glückstadt і далі карбує Reichsdukaten, а не пістолі.'
  kronemont_fine:
    pdate_label:
      de: 'Geltungsbereich: 31. Dez. 1692 → 1771 · ca. 79 Jahre · in den Herzogtümern Schleswig-Holstein als Helstaten-Münze gültig, jedoch ohne Lokalprägung (ausschließlich an der Kopenhagener Hauptmünze)'
      en: 'Period of validity: 31 Dec. 1692 → 1771 · ~79 years · legal tender in the duchies of Schleswig-Holstein as a Helstaten coin, but with no local issue (struck only at the Copenhagen royal mint)'
      uk: 'Період дії: 31 грудня 1692 → 1771 · ~79 років · у герцогствах Schleswig-Holstein чинна як Helstaten-монета, але без власних місцевих карбувань (карбувалася виключно на Копенгагенському королівському
        монетному дворі)'
    hintergrund:
      de: 'Dritte und letzte Krone-Münzformel der dänischen Monarchie. Reskript vom <b>31. Dezember 1692</b> (Christian V.): höhere nominale Lötigkeit (13⅓ Loth ≈.833) bei reduziertem Raugewicht (17,988
        g) gegenüber dem 10½-Krone-Fuß; der tatsächliche Feinsilbergehalt liegt nur 0,02 g höher pro Stück. Letzte Prägung 1771. Die «<i>Feine Krone</i>» wurde ausschließlich an der Kopenhagener Hauptmünze
        geprägt; in den Herzogtümern Schleswig-Holstein blieb sie als Helstaten-Münze gesetzliches Zahlmittel — Standard biß 1771, im Umlauf biß zur Schimmelmann-Reform 1788, jedoch ohne lokale Prägestätte.
        Innerhalb der Krone-Tarif-Hierarchie steht sie wie der 10½-Krone-Fuß als sekundäre Münzfuß-Stufe unter der primären Speciemønt (9¼-Fuß)<sup>[ref:danskmoent-c5mord]</sup>.

        '
      en: 'The third and final Krone formula of the Danish monarchy. Reskript of <b>31 December 1692</b> (Christian V): higher nominal fineness (13⅓ Loth ≈.833) on a reduced rough weight (17.988 g) versus
        the 10½-Krone-Fuß; the actual fine-silver content is only 0.02 g higher per coin. Last struck 1771. The «<i>Fine Crown</i>» was struck exclusively at the Copenhagen royal mint; in the duchies of
        Schleswig-Holstein it remained legal tender as a Helstaten coin — standard until 1771, in circulation until the Schimmelmann reform of 1788, with no local issue. Within the Krone-tariff hierarchy
        it stands, like the 10½-Krone-Fuß, as a secondary Münzfuß tier below the principal Speciemønt (9¼-Fuß)<sup>[ref:danskmoent-c5mord]</sup>.'
      uk: 'Третя і остання Krone-формула данської монархії. Рескрипт <b>31 грудня 1692 р.</b> (Кристіан V): вища номінальна проба (13⅓ Loth ≈.833) при зменшеній повній вазі (17,988 г) порівняно з 10½-Krone-Fuß;
        фактичний вміст чистого срібла лише на 0,02 г вищий за монету. Востаннє карбувалася 1771 р. «<i>Тонка Крона</i>» карбувалася виключно на Копенгагенському королівському монетному дворі; у герцогствах
        Schleswig-Holstein лишалася законним платіжним засобом як Helstaten-монета — стандарт до 1771 р., в обігу до Schimmelmann-реформи 1788 р., однак без власних місцевих карбувань. У ієрархії Krone-тарифів
        стоїть, як і 10½-Krone-Fuß, як вторинний рівень Müntzfuß нижче від первинного Speciemønt (9¼-Fuß)<sup>[ref:danskmoent-c5mord]</sup>.'
    closing_label:
      de: Zusammenfassung · ausschließlich Kopenhagener Lokalprägung, in Schleswig-Holstein als Helstaten-Münze in Geltung
      en: Summary · Copenhagen-only local issue, legal tender in Schleswig-Holstein as a Helstaten coin
      uk: Підсумок · карбування лише в Копенгагені, у Schleswig-Holstein чинна як Helstaten-монета
    closing:
      de: 'Der 13-Krone-Fuß läuft parallel zum 10½-Krone-Fuß (Glückstadt 1644–1696) und zum 11⅓-Thaler-Fuß (ab 1726). Lokale Prägungen entstanden nur in Kopenhagen; in den Herzogtümern Schleswig-Holstein
        lief die <i>Feine Krone</i> als Helstaten-Zahlmittel um, bis sie mit der Schimmelmann-Reform 1788 aus dem holsteinischen Courantverbund herausfiel. Vollständige Belegtypologie und Stempelvarianten
        finden sich in den Kopenhagener Spezialkatalogen (Sven Aagaard <i>Kronemønt</i>-Studien; Hede / Schou).

        '
      en: The 13-Krone-Fuß runs in parallel with the 10½-Krone-Fuß (Glückstadt 1644–1696) and the 11⅓-Thaler-Fuß (from 1726). Local issues appeared only in Copenhagen; in the duchies of 
        Schleswig-Holstein the <i>Fine Crown</i> circulated as Helstaten currency until the Schimmelmann reform of 1788 removed it from the Holstein Courant union. Full type catalogue and die-variants
        are documented in the Copenhagen specialist literature (Sven Aagaard's <i>Kronemønt</i> studies; Hede / Schou).
      uk: 13-Krone-Fuß проходить паралельно з 10½-Krone-Fuß (Glückstadt 1644–1696) і 11⅓-Thaler-Fuß (з 1726 р.). Місцеві карбування з'явилися лише в Копенгагені; у герцогствах Schleswig-Holstein 
        <i>Тонка Крона</i> оберталась як Helstaten-валюта до Schimmelmann-реформи 1788 р., яка вивела її з гольштинського Courant-союзу. Повна типологія та штемпельні варіанти задокументовані в 
        копенгагенських спеціальних каталогах (студії Sven Aagaard про <i>Kronemønt</i>; Hede / Schou).
  guldkrone:
    pdate_label:
      de: 'Geltungsbereich: 1618 (Christian IV. Helsingør, Hede 25B) → 14. Februar 1671 (Commerce-Collegium-Empfehlung beendet Programm) · zwei Regenten: <b>Christian-IV.-Vorgängerphase 1618–1648</b> (Helsingør/Kopenhagen,
        ausschließlich königlich-dänische Münzen; in Holstein nicht geprägt) + <b>Frederik-III.-Hauptphase 1655–1668</b> (Kopenhagen 1655/1666/1668, Glückstadt 1657–1660 — die einzige Holstein-Phase dieses
        Fußes)'
      en: 'Period of validity: 1618 (Christian IV Helsingør, Hede 25B) → 14 February 1671 (Commerce Collegium recommendation ends the programme) · two rulers: <b>Christian IV predecessor phase 1618–1648</b>
        (Helsingør/Copenhagen, Royal Danish strikes only; not minted in Holstein) + <b>Frederik III main phase 1655–1668</b> (Copenhagen 1655/1666/1668, Glückstadt 1657–1660 — the only Holstein phase of
        this Fuß)'
      uk: 'Період дії: 1618 (Кристіан IV Helsingør, Hede 25B) → 14 лютого 1671 (рекомендація Commerce Collegium припиняє програму) · два правителі: <b>передфаза Кристіана IV 1618–1648</b> (Helsingør/Копенгаген,
        виключно королівсько-данські випуски; у Гольштейні не карбувалися) + <b>головна фаза Фредеріка III 1655–1668</b> (Копенгаген 1655/1666/1668, Ґлюкштадт 1657–1660 — єдина гольштейнська фаза цього
        Fuß)'
    hintergrund:
      de: 'Goldene <b>Tarifmünze</b> der Krone-Mønt-Kategorie — goldenes Pendant zur silbernen Krone mit gleicher Tarif-Logik, in 22-karätigem Gold und mit eigener metrischer Definition (≈ 39 Stück je Cöllnische
        Marck Raulegierung von 22 Karat = 5,996 g rau / 5,498 g fein je Stück). Tarif <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. <b>Christian-IV.-Vorgängerphase</b> beginnt parallel zum åbnen
        Brev vom 12. Juli 1618<sup>[ref:danskmoent-w2ref]</sup> für die silberne Krone — Christian IV. läßt 2-Guldkroner («dobbelt guldkrone», Hede 25/28) schlagen — die Hede-25-Serie reicht biß <b>1648</b>
        (Hede c4h25 Jahrgänge 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648)<sup>[ref:danskmoent-c4h25]</sup>; die Doppelguldkrone Hede 28 biß mindestens 1628 (Esrum-Schatzfund Nordsjælland, Ingvardson
        & Märcher 2010<sup>[ref:portal-christian-4s-guldm-nt-fra-esrum-m-lleg-rd]</sup>: drei Stücke aus 1628, 3 von 12 weltweit bekannten Exemplaren des Typs ≈ 25 % des erhaltenen Korpus). Christian-IV.-Guldkroner
        waren keine Massenkarbung, sondern Hofgeschenk und Soldzahlung. <b>Frederik-III.-Hauptphase:</b> Hede 1957 «Frederik III''s guldkroner» dokumentiert die Datierung: «<i>møntet i København 1655 og
        i Glückstadt 1657, 1659 og 1660</i>» — die <b>erste</b> Frederik-III.-Guldkrone ist demnach die Kopenhagener Prägung 1655, nicht die Glückstadter 1657. Glückstadt-Phase 1657–1660 (Hede 145B, Mzm.
        Jacob Schwieger); Kopenhagener jüngere Müntzformel 1666 (Hede 44/45)<sup>[ref:danskmoent-f3h44]</sup> und 1668 (5,590 g rau / 5,126 g fein = 1½ Speciesdukat nach Forordning 2. Januar 1658, die den
        Speciesdukat auf 12 Mark hob). Programmstop durch Commerce-Collegium-Empfehlung vom <b>14. Februar 1671</b>: «<i>betænkning af 14. februar 1671... de icke paa andre Steder gangbar er</i>» — Christian
        V. setzt die Guldkrone-Karbung nicht fort und prägt in Glückstadt nur noch nach dem Reichsdukatenfuß. Nachgeschichte: königliche Sondergenehmigung vom 2. September 1701 für das Vestindiske Compagni
        zur Karbung von 2-Guldkroner — keine erhaltenen Exemplare, dokumentiert nur in Lauerentsen <i>Museum Regium</i> 2-е Aufl., T. XXIII Nr. 11. <b>Nicht zu verwechseln mit dem Goldgulden</b> (HRR-Goldmünze
        nach Reichsmünzordnung 1559, andere Lineage und andere Tarifeinheit).

        '
      en: 'A gold <b>tariff coin</b> of the Krone-Mønt category — the gold counterpart of the silver Krone with the same tariff logic, in 22-carat gold and with its own metric definition (≈ 39 pieces per
        Cologne mark of raw 22-carat alloy = 5.996 g rough / 5.498 g fine each). Tariff <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. <b>Christian IV predecessor phase</b> begins in parallel with
        the åbne Brev of 12 July 1618<sup>[ref:danskmoent-w2ref]</sup> for the silver Krone — Christian IV strikes 2-Guldkroner («dobbelt guldkrone», Hede 25/28) — the Hede 25 series runs through <b>1648</b>
        (Hede c4h25 years 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648)<sup>[ref:danskmoent-c4h25]</sup>; the Hede 28 double Guldkrone at least until 1628 (Esrum hoard in Nordsjælland, Ingvardson
        & Märcher 2010<sup>[ref:portal-christian-4s-guldm-nt-fra-esrum-m-lleg-rd]</sup>: three specimens of 1628, 3 of 12 known specimens of this type worldwide ≈ 25 % of the surviving corpus). Christian
        IV Guldkroner were not mass production but court gifts and mercenary pay. <b>Frederik III main phase:</b> Hede 1957 «Frederik III''s guldkroner» dates the programme: «<i>møntet i København 1655
        og i Glückstadt 1657, 1659 og 1660</i>» — the <b>first</b> Frederik III Guldkrone is accordingly the Copenhagen 1655 issue, not the Glückstadt 1657. Glückstadt phase 1657–1660 (Hede 145B, mintmaster
        Jacob Schwieger); Copenhagen younger Müntzformel 1666 (Hede 44/45)<sup>[ref:danskmoent-f3h44]</sup> and 1668 (5.590 g rough / 5.126 g fine = 1½ Speciesdukat after the Forordning of 2 January 1658,
        which raised the Speciesdukat to 12 Mark). Programme termination by the Commerce Collegium recommendation of <b>14 February 1671</b>: «<i>betænkning af 14. februar 1671... de icke paa andre Steder
        gangbar er</i>» — Christian V does not continue Guldkrone production and strikes Glückstadt gold only on the Reichsdukatenfuß. Post-history: royal special authorisation of 2 September 1701 for the
        Vestindiske Compagni to mint 2-Guldkroner — no surviving specimens, documented only in Lauerentsen <i>Museum Regium</i> 2nd ed., T. XXIII no. 11. <b>Not to be confused with the Goldgulden</b> (Holy
        Roman Empire gold coin under the Reichsmünzordnung of 1559, separate lineage and a different tariff unit).'
      uk: 'Золота <b>тарифна монета</b> Krone-Mønt-категорії — золотий аналог срібної Krone з тією ж тарифною логікою, у 22-каратному золоті й з власним метричним означенням (≈ 39 штук з кельнської марки
        сплаву 22 карат = 5,996 г повної ваги / 5,498 г чистого на штуку). Тариф <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. <b>Передфаза Кристіана IV</b> починається паралельно з åbnem Brev 12
        липня 1618 р.<sup>[ref:danskmoent-w2ref]</sup> для срібної Krone — Кристіан IV карбує 2-Guldkroner («dobbelt guldkrone», Hede 25/28) — серія Hede 25 триває до <b>1648 р.</b> (Hede c4h25 роки 1619,
        1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648)<sup>[ref:danskmoent-c4h25]</sup>; подвійна Guldkrone Hede 28 принаймні до 1628 р. (Esrum-скарб у Nordsjælland, Ingvardson & Märcher 2010<sup>[ref:portal-christian-4s-guldm-nt-fra-esrum-m-lleg-rd]</sup>:
        три екземпляри 1628 р., 3 з 12 відомих у світі екземплярів цього типу ≈ 25 % збереженого корпусу). Guldkrone Кристіана IV не були масовим карбуванням, а слугували придворними подарунками та платою
        найманцям. <b>Головна фаза Фредеріка III:</b> Hede 1957 «Frederik III''s guldkroner» датує програму: «<i>møntet i København 1655 og i Glückstadt 1657, 1659 og 1660</i>» — отже <b>перша</b> Guldkrone
        Фредеріка III — це копенгагенський випуск 1655 р., а не ґлюкштадтський 1657. Ґлюкштадтська фаза 1657–1660 (Hede 145B, монетмайстер Jacob Schwieger); копенгагенська молодша монетна формула 1666 (Hede
        44/45)<sup>[ref:danskmoent-f3h44]</sup> і 1668 (5,590 г повної ваги / 5,126 г чистого = 1½ Speciesdukat за Forordning 2 січня 1658, яка підняла Speciesdukat до 12 Mark). Завершення програми за рекомендацією
        Commerce Collegium від <b>14 лютого 1671 р.</b>: «<i>betænkning af 14. februar 1671... de icke paa andre Steder gangbar er</i>» — Кристіан V не продовжує карбування Guldkrone і в Glückstadt карбує
        золото лише за Reichsdukatenfuß. Післяісторія: королівський особливий дозвіл 2 вересня 1701 р. для Vestindiske Compagni карбувати 2-Guldkroner — реальних екземплярів не знайдено, документально засвідчено
        лише в Lauerentsen <i>Museum Regium</i> 2-е вид., T. XXIII No. 11. <b>Не плутати з Goldgulden</b> (золота монета Священної Римської імперії за Reichsmünzordnung 1559, окрема лінія й інша тарифна
        одиниця).'
    closing_label:
      de: Zusammenfassung · 53 Jahre Krone-Mønt-Goldparallele (Christian IV 1618–1648 + Frederik III 1655–1668)
      en: Summary · 53 years of the Krone-Mønt gold parallel (Christian IV 1618–1648 + Frederik III 1655–1668)
      uk: Підсумок · 53 роки золотої паралелі Krone-Mønt (Кристіан IV 1618–1648 + Фредерік III 1655–1668)
    closing:
      de: 'Der Guldkrone-Fuß ist die <b>goldene Parallele der Krone-Mønt-Lineage über zwei Regenten</b>: er beginnt 1618 unter Christian IV. als 2-Guldkrone-Vorgängerphase parallel zur silbernen Corona
        Danica — Hofgeschenk- und Soldzahlungs-Karbung, Hede-25-Serie biß 1648<sup>[ref:danskmoent-c4h25]</sup> — und mündet 1655 in Frederik III.s formale Massenkarbung der 1-Guldkrone (Glückstadter Hauptphase
        1657–1660 nach Hede 145B; Kopenhagener Folgeprägung 1666 Hede 44/45<sup>[ref:danskmoent-f3h44]</sup> und 1668 KM-303 bei reduziertem Tarif). Commerce-Collegium-Empfehlung vom 14. Februar 1671 beendet
        das Programm; Christian V. setzt die Linie nicht fort und prägt Glückstadter Gold nur noch nach dem Reichsdukatenfuß.

        '
      en: 'The Guldkrone-Fuß is the <b>gold parallel of the Krone-Mønt lineage spanning two rulers</b>: it begins in 1618 under Christian IV as a 2-Guldkrone predecessor phase running alongside the silver
        Corona Danica — court-gift and mercenary-pay coinage, the Hede 25 series through 1648<sup>[ref:danskmoent-c4h25]</sup> — and flows in 1655 into Frederik III''s formal mass coinage of the 1-Guldkrone
        (Glückstadt main phase 1657–1660 on Hede 145B; Copenhagen follow-up issues 1666 Hede 44/45<sup>[ref:danskmoent-f3h44]</sup> and 1668 KM-303 at a reduced tariff). The Commerce Collegium recommendation
        of 14 February 1671 ends the programme; Christian V does not continue the line and strikes Glückstadt gold only on the Reichsdukatenfuß.'
      uk: 'Guldkrone-Fuß — це <b>золота паралель лінії Krone-Mønt через двох правителів</b>: вона починається 1618 р. за Кристіана IV як передфаза 2-Guldkrone паралельно зі срібною Corona Danica — карбування
        придворного подарунку та плати найманцям, серія Hede 25 до 1648 р.<sup>[ref:danskmoent-c4h25]</sup> — і 1655 р. впадає у формальне масове карбування Frederik III 1-Guldkrone (ґлюкштадтська головна
        фаза 1657–1660 за Hede 145B; копенгагенські наступні випуски 1666 Hede 44/45<sup>[ref:danskmoent-f3h44]</sup> та 1668 KM-303 зі зниженим тарифом). Рекомендація Commerce Collegium від 14 лютого 1671
        завершує програму; Кристіан V лінію не продовжує і ґлюкштадтське золото карбує лише за Reichsdukatenfuß.'
  kronemont_chr_iv:
    pdate_label:
      de: 'Geltungsbereich der Müntzformel: 1618 → 1652 (Hede) · in Holstein keine eigenen Prägungen — Kopenhagener Hauptmünze'
      en: 'Period of validity (Müntzformel): 1618 → 1652 (Hede) · no Holstein issues — Copenhagen royal mint'
      uk: 'Період дії монетної формули: 1618 → 1652 (Hede) · у Гольштейні власних карбувань немає — Копенгагенський королівський монетний двір'
    hintergrund:
      de: 'Christian-IVs-Müntzformel (.859 / 16,250 g fein). Eingeführt durch das <b>åbne Brev af 12. Juli 1618</b><sup>[ref:danskmoent-w2ref]</sup> (Wilcke II Anm. 53 verbatim: «<i>I det aabne Brev af
        12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden...</i>»; Wilcke I S. 156–157). Im Patent wird die Münze als «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» beschrieben — der spätere
        Latin-Name «Corona Danica» ist Numismatik-Usus, nicht Patent-Sprache. Anfangstarif 1½ Speciedaler — eine fiskalische Maßnahme der Krone mit einem Seigniorage-Aufschlag von ca. 11 % über dem Silberwert<sup>[ref:danskmoent-w2ref]</sup>.
        Die personnelle Christian-IV.-Karbung 1618–1624/25; im Folgejahr <b>1625</b> wird der Tarif offiziell auf 1⅓ Speciedaler gesenkt. Hede 1957<sup>[ref:danskmoent-hedekron]</sup> dokumentiert die Müntzformel
        als <b>1618–1652</b> — die Datierung umfasst auch die Frederik-III.-Fortsetzung in Kopenhagen 1651–1652, die noch nach derselben älteren Formel mit 16,25 g Feinsilber lief, bevor 1652 der Übergang
        zum 10½-Krone-Fuß (.672 / 14,964 g fein) vollzogen wurde. Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt
        von 16,25 g Silber, dann von 14,964 g</i>». Sonderemissionen außerhalb der regulären Formel: 1665 «Pumphosenkrone» (Schou 39/40) und 1675 2-Krone (Schou 11–15) — Hede klassifiziert beide als spezielle
        Schaumünzen, nicht als Formelfortsetzung.<sup>[ref:danskmoent-1krone]</sup><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup><sup>[ref:danskmoent-hedekron]</sup><sup>[ref:danskmoent-hedekron]</sup>'
      en: 'Christian IV Müntzformel (.859 / 16.250 g fine). Introduced by the <b>åbne Brev af 12. Juli 1618</b><sup>[ref:danskmoent-w2ref]</sup> (Wilcke II note 53 verbatim: «<i>I det aabne Brev af 12.
        Juli 1618, hvorved Kronemønten førtes frem for Offentligheden...</i>»; Wilcke I pp. 156–157). In the patent the coin is described as «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» — the later Latin
        name «Corona Danica» is a numismatic convention, not patent language. Initial tariff 1½ Speciedaler — a Crown fiscal measure with a seigniorage premium of ca. 11 % above the silver value<sup>[ref:danskmoent-w2ref]</sup>.
        Christian IV personal mintage 1618–1624/25; in the following year, <b>1625</b>, the tariff is officially cut to 1⅓ Speciedaler. Hede 1957<sup>[ref:danskmoent-hedekron]</sup> dates the Müntzformel
        as <b>1618–1652</b> — the period also covers the Frederik III continuation at Copenhagen 1651–1652, which still followed the same older formula at 16.25 g fine silver before transitioning to the
        10½-Krone-Fuß (.672 / 14.964 g fine) from 1652 onward. Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von
        16,25 g Silber, dann von 14,964 g</i>». Special issues outside the regular formula: 1665 «Pumphosenkrone» (Schou 39/40) and 1675 2-Krone (Schou 11–15) — Hede classifies both as specialised Schaumünzen
        rather than formula continuations.<sup>[ref:danskmoent-1krone]</sup><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup><sup>[ref:danskmoent-hedekron]</sup><sup>[ref:danskmoent-hedekron]</sup>'
      uk: 'Монетна формула Кристіана IV (.859 / 16,250 г чистого). Запроваджено <b>åbne Brev af 12. Juli 1618</b><sup>[ref:danskmoent-w2ref]</sup> (Wilcke II прим. 53 verbatim: «<i>I det aabne Brev af 12.
        Juli 1618, hvorved Kronemønten førtes frem for Offentligheden...</i>»; Wilcke I с. 156–157). У патенті монета описана як «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» — пізніша латинська назва
        «Corona Danica» — нумізматична умовність, не мова патенту. Початковий тариф 1½ Speciedaler — фіскальний інструмент Корони з сеньйораж­ною надбавкою бл. 11 % над срібною вартістю<sup>[ref:danskmoent-w2ref]</sup>.
        Персональне карбування Кристіана IV 1618–1624/25; наступного <b>1625</b> року тариф офіційно знижено до 1⅓ Speciedaler. Hede 1957<sup>[ref:danskmoent-hedekron]</sup> датує монетну формулу як <b>1618–1652</b>
        — період охоплює також продовження Фредеріка III у Копенгагені 1651–1652, яке ще йшло за тією самою старішою формулою з 16,25 г чистого срібла, перш ніж 1652 р. відбувся перехід на 10½-Krone-Fuß
        (.672 / 14,964 г чистого). Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964
        g</i>». Спец-випуски поза регулярною формулою: 1665 «Pumphosenkrone» (Schou 39/40) і 1675 2-Krone (Schou 11–15) — Hede класифікує обидва як спеціальні Schaumünzen, а не продовження формули.<sup>[ref:danskmoent-1krone]</sup><sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:archive-worterbuchdermun007491mbp]</sup><sup>[ref:danskmoent-hedekron]</sup><sup>[ref:danskmoent-hedekron]</sup>'
    details:
      de: '<p>Die Christian-IV.-Krone war keine Handelsmünze nach Silbergehalt, sondern eine fiskalische Tarifmünze: ihr Nennwert wurde vom König per Mandat über dem tatsächlichen Silberwert festgesetzt,
        die Differenz floß als Seigniorage in die Staatskasse<sup>[ref:danskmoent-w2ref]</sup>.</p><p><b>Primärkanonische Hede-Formel</b><sup>[ref:danskmoent-hedekron]</sup>: <b>12 ²⁵⁷⁄₇₀₀ Stück je 13¾-lötiger
        Marck</b> = 18,909 g rau bei.859 Feingehalt = 16,250 g fein je Krone. Die Bruchform (12,367 statt 12½) ergibt sich daraus, daß der Münzedikt 1618 den Fuß über die <b>Daler-Ausbringung</b> definiert
        — den nominellen Gesamtwert in Speciedaler aus einer feinen Marck Silber als Krone-Münzen. Bei Anfangstarif 1½ Specie pro Doppelkrone (= ¾ Specie pro Krone) ergeben 233,856 g Feinsilber 14,391 Krone,
        deren Nennwert sich auf 10,793 Speciedaler addiert (Hede H105<sup>[ref:danskmoent-hedekron]</sup>). Nach der Forordning vom 14. Februar 1624 wird die Specie selbst auf 100 Skilling neu tarifiert;
        die physische Krone bleibt unverändert, aber dieselbe Marck Feinsilber bringt nach der neuen Specie-Skala nur noch 10,361 Speciedaler aus (Hede H124<sup>[ref:danskmoent-hedekron]</sup>).</p><p>1618
        wurde nur die 2 Krone (damals einfach «Krone» genannt) nach dieser Formel geprägt; ½, ¼ und ⅛ Krone des Jahres 1618 folgten einer leicht niedrigeren Münzfod. Ab 1619 prägt auch die ½ Krone nach
        der Hauptformel<sup>[ref:danskmoent-hedekron]</sup>.</p><p>Spezialliteratur zur Christian-IV.-Phase: Hede / Schou (H105–H107, H124–H126); Bruun-Lots 13089 ff. (Stack''s Bowers Auktion Part II, Zürich
        14.–15. März 2025).</p>'
      en: '<p>The Christian IV Krone was not a trade coin valued by silver content but a fiscal tariff coin: its face value was set by royal mandate above the actual silver value, the gap accruing to the
        treasury as seigniorage<sup>[ref:danskmoent-w2ref]</sup>.</p><p><b>Primary catalogue formula (Hede)</b><sup>[ref:danskmoent-hedekron]</sup>: <b>12 ²⁵⁷⁄₇₀₀ pieces per 13¾-lødig mark</b> = 18.909
        g rough at.859 fineness = 16.250 g fine per Krone. The fractional form (12.367 rather than 12½) follows from the 1618 mint edict defining the standard via the <b>daler output</b> — the total face
        value, expressed in Speciedaler, that one fine mark of silver yields once struck into Krone coin. At the initial tariff of 1½ Specie per Doppelkrone (= ¾ Specie per Krone), 233.856 g of fine silver
        yields 14.391 Krone, whose face values add up to 10.793 Speciedaler (Hede H105<sup>[ref:danskmoent-hedekron]</sup>). After the Forordning of 14 February 1624 the Specie itself is re-rated to 100
        Skilling; the physical Krone is unchanged, but on the new Specie scale the same fine mark now yields only 10.361 Speciedaler (Hede H124<sup>[ref:danskmoent-hedekron]</sup>).</p><p>In 1618 only the
        2 Krone (then simply called «Krone») was struck on this formula; the ½, ¼ and ⅛ Krone of 1618 followed a slightly lower Münzfod. From 1619 the ½ Krone also follows the main formula<sup>[ref:danskmoent-hedekron]</sup>.</p><p>Specialist
        literature on the Christian IV phase: Hede / Schou (H105–H107, H124–H126); Bruun lots 13089 ff. (Stack''s Bowers auction Part II, Zurich 14–15 March 2025).</p>'
      uk: '<p>Krone Кристіана IV не була торговельною монетою за вмістом срібла, а фіскальною тарифною: її номінал встановлювався королівським мандатом вище фактичної срібної вартості, різниця надходила
        до скарбниці як сеньйораж<sup>[ref:danskmoent-w2ref]</sup>.</p><p><b>Першоджерельна Hede-формула</b><sup>[ref:danskmoent-hedekron]</sup>: <b>12 ²⁵⁷⁄₇₀₀ штук з 13¾-lødig марки</b> = 18,909 г повної
        ваги за проби.859 = 16,250 г чистого на Krone. Дробова форма (12,367 замість 12½) випливає з того, що монетний едикт 1618 р. задавав стопу через <b>вихід у даллерах (daler-udbringning)</b> — сумарну
        номінальну вартість у Speciedaler, яку одна марка чистого срібла «приносила» при карбуванні в Krone-монети. За початкового тарифу 1½ Specie на Doppelkrone (= ¾ Specie на одну Krone) з 233,856 г
        чистого срібла виходить 14,391 Krone, сумарна номінальна вартість яких становить 10,793 Speciedaler (Hede H105<sup>[ref:danskmoent-hedekron]</sup>). Після Forordning 14 лютого 1624 р. сам Specie
        перетарифовано на 100 Skilling; фізично Krone лишається без змін, але та сама марка чистого срібла за новою Specie-шкалою «приносить» уже лише 10,361 Speciedaler (Hede H124<sup>[ref:danskmoent-hedekron]</sup>).</p><p>1618
        р. за цією формулою карбувалась лише 2 Krone (тоді просто «Krone»); ½, ¼ та ⅛ Krone 1618 р. йшли за дещо нижчою møntfod. З 1619 р. ½ Krone теж переходить на головну формулу<sup>[ref:danskmoent-hedekron]</sup>.</p><p>Спеціальна
        література по фазі Кристіана IV: Hede / Schou (H105–H107, H124–H126); лоти Bruun 13089 і далі (Stack''s Bowers auction Part II, Цюрих 14–15 березня 2025).</p>'
    closing_label:
      de: Zusammenfassung · 34 Jahre Müntzformel, in Holstein keine eigenen Prägungen
      en: Summary · 34 years of Müntzformel, no Holstein issues
      uk: Підсумок · 34 роки монетної формули, у Гольштейні власних карбувань немає
    closing:
      de: 'Christian-IVs-Müntzformel ist die <b>Initialphase</b> der dänisch-norwegischen Krone-Tarifprägung — 34 Jahre an einem unverschobenen Feingewichtsstandard (.859 / 16,250 g fein), beendet durch
        den Übergang zum leichteren 10½-Krone-Fuß unter Frederik III. im Jahr 1652. In Holstein wurde der Standard nicht geprägt; die Kopenhagener Stücke gelangten in die Herzogtümer ausschließlich über
        den dänisch-norwegischen Geldumlauf und gehören damit zur Helstaten-Münzgeschichte, nicht zur lokalen Holstein-Prägeüberlieferung.

        '
      en: Christian IV's Müntzformel is the <b>founding phase</b> of the Danish-Norwegian Krone tariff coinage — 34 years on a single unshifted fine-weight standard (.859 / 16.250 g fine), brought to 
        an end by the transition to the lighter 10½-Krone-Fuß under Frederik III in 1652. The standard was never struck in Holstein; the Copenhagen pieces reached the duchies only via the 
        Danish-Norwegian currency flow, and therefore belong to the Helstaten coinage history rather than to the local Holstein minting record.
      uk: Монетна формула Кристіана IV — <b>початкова фаза</b> дансько-норвезького тарифного карбування Krone — 34 роки на одному незмінному стандарті чистої ваги (.859 / 16,250 г чистого), завершена 
        переходом на легший 10½-Krone-Fuß за Фредеріка III 1652 р. У Гольштейні стандарт не карбувався; копенгагенські монети потрапляли в герцогства виключно через дансько-норвезький грошовий обіг, 
        тож належать до монетної історії Helstaten, а не до локальної гольштинської спадщини карбування.
  vereinsgoldmuenze:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 1864 (Wiener Frieden 30. Oktober 1864 — Beitritt zum deutschen Münzverein) → 1. April 1874 (Demonetisierung) · ca. 10 Jahre · in Holstein keine eigenen Prägungen'
      en: 'In force in Holstein: 1864 (Vienna Peace of 30 October 1864 — accession to the German Münzverein) → 1 April 1874 (demonetisation) · ~10 years · no Holstein issues'
      uk: 'Дія в Гольштейні: 1864 (Wiener Frieden 30 жовтня 1864 — приєднання до німецького Münzverein) → 1 квітня 1874 (демонетизація) · ~10 років · у Гольштейні власних карбувань немає'
    hintergrund:
      de: 'Reichsweit standardisierte Goldhandelsmünze nach Wiener Münzvertrag vom <b>24. Januar 1857</b> (in Kraft 1. Mai 1857; Vertragslaufzeit biß Ende 1878 angelegt)<sup>[ref:en-31895]</sup> zwischen
        Österreich, Liechtenstein und den deutschen Zollvereinsstaaten. Standard: <b>50 Vereinskronen / Pfund (500 g) Feingold = 10 g fein je Krone</b> bei Probe 900 ‰ (= 11,111 g rau); halbe Krone analog
        (5 g fein bei 5,555 g rau). Reine <b>Handelsmünze ohne Annahmezwang</b>; Marktkurs bei Au:Ag 1:15,5 ergibt 1 Vereinskrone ≈ 9,3 Taler Talerwährung — staatliche Kassen konnten nur temporär (max.
        6 Monate) Tarife festsetzen. Schleswig-Holstein wurde durch den <b>Wiener Frieden vom 30. Oktober 1864</b> aus dem dänischen Gesamtstaat herausgelöst und ging zunächst unter preußisch-österreichische
        Verwaltung, ab 1867 endgültig zu Preußen über — damit erst dann Teil des Wiener-Münzvertrags-Raums. Da die Altonaer Münze schon <b>1863 geschlossen</b> war, gibt es <em>keine spezifisch holsteinischen
        Vereinskronen-Prägungen</em>; die in den Herzogtümern zirkulierenden Stücke kamen aus den nahen Hauptmintstaaten <b>Hannover (B)</b> und <b>Preußen (A)</b>. Mintage-Stop 1871 mit Reichsgründung;
        Demonetisierung <b>1. April 1874</b>, Einlösungsfrist biß <b>30. Juni 1874</b> — von 2 138 256 geprägten Vollkronen wurden nur 332 091 (≈ 15,5 %) eingelöst.

        '
      en: 'An imperially standardised gold trade coin under the Vienna Coin Treaty of <b>24 January 1857</b> (in force from 1 May 1857; treaty term planned until end of 1878)<sup>[ref:en-31895]</sup> among
        Austria, Liechtenstein and the German Zollverein states. Standard: <b>50 Vereinskronen per pound (500 g) of fine gold = 10 g fine per Krone</b> at 900‰ fineness (= 11.111 g rough); the half Krone
        analogously (5 g fine at 5.555 g rough). A pure <b>trade coin with no compulsory acceptance</b>; the market rate at Au:Ag 1:15.5 yields 1 Vereinskrone ≈ 9.3 Taler Talerwährung — state treasuries
        could only set temporary tariffs (max. six months). Schleswig-Holstein was detached from the Danish composite state by the <b>Vienna Peace of 30 October 1864</b> and at first came under joint Prussian-Austrian
        administration, finally moving to Prussia in 1867 — only at that point did it become part of the Vienna-treaty area. Since the Altona mint had been <b>closed in 1863</b>, there are <em>no Holstein-specific
        Vereinskronen issues</em>; the pieces circulating in the duchies came from the neighbouring main mint states <b>Hanover (B)</b> and <b>Prussia (A)</b>. Mintage stopped in 1871 with the Reich''s
        founding; demonetisation on <b>1 April 1874</b>, redemption deadline <b>30 June 1874</b> — of 2,138,256 full Kronen struck, only 332,091 (≈ 15.5 %) were redeemed.'
      uk: 'Загальноімперсько-стандартизована золота торгова монета за Wiener Münzvertrag <b>24 січня 1857</b> (чинність з 1 травня 1857; термін договору планований до кінця 1878)<sup>[ref:en-31895]</sup>
        між Австрією, Ліхтенштейном і державами німецького Цольферайну. Стандарт: <b>50 Vereinskronen з фунта (500 г) чистого золота = 10 г чистого на Krone</b> за пробою 900 ‰ (= 11,111 г повної); halbe
        Krone аналогічно (5 г чистого при 5,555 г повної). Суто <b>торгова монета без обов''язку прийняття</b>; ринковий курс при Au:Ag 1:15,5 дає 1 Vereinskrone ≈ 9,3 Taler Talerwährung — державні каси
        могли встановлювати лише тимчасові тарифи (макс. 6 місяців). Шлезвіг-Гольштейн був відірваний від данського цілісного союзу <b>Wiener Frieden 30 жовтня 1864</b> і спочатку перейшов під спільну прусько-австрійську
        адміністрацію, остаточно до Пруссії 1867 — лише тоді й увійшов у простір Wiener Münzvertrag. Оскільки Альтонський монетний двір було <b>закрито 1863 р.</b>, специфічно гольштинських Vereinskronen-емісій
        <em>немає</em>; монети, що оберталися в герцогствах, надходили з сусідніх головних мінт-штатів <b>Ганновер (B)</b> і <b>Пруссія (A)</b>. Карбування припинилось 1871 з утворенням Рейху; демонетизація
        <b>1 квітня 1874</b>, термін викупу <b>30 червня 1874</b> — з 2 138 256 викарбуваних повних Kronen викуплено лише 332 091 (≈ 15,5 %).'
    closing_label:
      de: Zusammenfassung · 10 Jahre Tariffähigkeit in SH ohne lokale Prägung
      en: Summary · 10 years of tariff status in SH with no local issue
      uk: Підсумок · 10 років тарифного статусу в SH без власного карбування
    closing:
      de: 'Die Vereinsgoldmünze ist in Schleswig-Holstein eine Helstaten-analoge Helstaten-Münze ohne lokales Prägeerbe — die Altonaer Münze war 1863 geschlossen, der Münzverein-Beitritt erst 1864/1867.
        Sie ist jedoch wichtig als <b>mathematischer Vorläufer der Reichsgoldmark</b> 1871: dieselbe Pfund-Basis (500 g) und dieselbe.900-Probe; lediglich feinerer Stückaufbau (139½ × 10-Mark statt 50 ×
        Krone je Pfund Feingold). Mit der Reichsgoldmark-Einführung 1871 läuft die Vereinsgoldmünze faktisch aus; Demonetisierung 1874 schließt das System.

        '
      en: 'In Schleswig-Holstein the Vereinsgoldmünze is a Helstaten-analogous coin with no local minting heritage — the Altona mint had closed in 1863, and accession to the Münzverein only came in 1864/1867.
        It matters chiefly as the <b>mathematical precursor of the Reichsgoldmark</b> in 1871: the same pound basis (500 g) and the same.900 fineness, only with finer subdivision (139½ × 10-Mark vs. 50
        × Krone per pound of fine gold). With the Reichsgoldmark in 1871 the Vereinsgoldmünze effectively lapses; demonetisation in 1874 closes the system.'
      uk: 'У Шлезвіг-Гольштейні Vereinsgoldmünze — Helstaten-аналогічна монета без локальної спадщини карбування — Альтонський монетний двір було закрито 1863 р., а приєднання до Münzverein сталося лише
        1864/1867. Її значення головне як <b>математичного попередника Reichsgoldmark</b> 1871: та сама фунтова база (500 г) і та сама проба.900, лише з тоншим поділом (139½ × 10-Mark проти 50 × Krone з
        фунта чистого золота). З запровадженням Reichsgoldmark 1871 Vereinsgoldmünze фактично згортається; демонетизація 1874 завершує систему.'
  reichsgoldmuenzfuss:
    pdate_label:
      de: 'Geltungsbereich in Holstein: 4. Dez. 1871 → 4. Aug. 1914 (Goldsuspendierung) · 43 Jahre · in Holstein keine eigenen Prägungen'
      en: 'In force in Holstein: 4 Dec. 1871 → 4 Aug. 1914 (gold-redemption suspension) · 43 years · no Holstein issues'
      uk: 'Дія в Гольштейні: 4 грудня 1871 → 4 серпня 1914 (призупинення золотого розміну) · 43 роки · у Гольштейні власні карбування відсутні'
    hintergrund:
      de: 'Münzgesetz vom 4. Dezember 1871<sup>[ref:wikipedia-de-goldmark]</sup>: gemeinsamer Goldstandard des Deutschen Kaiserreichs. Aus 1 Pfund (500 g) Feingold werden 139½ Zehnmarkstücke = 1395 Mark
        ausgeprägt, Feingehalt 900 ‰; Goldnominale zu 5, 10 und 20 Mark. Geprägt an acht Reichsmünzstätten — Berlin (A), Hannover (B), Frankfurt am Main (C), München (D), Dresden (E), Stuttgart (F), Karlsruhe
        (G), Hamburg (J) — Altona war 1863 geschlossen worden<sup>[ref:wikipedia-de-k-nigliche-m-nze-zu-altona]</sup>, sodaß keine Holstein-eigene Prägestätte am Reichsgoldmünzfuß teilnahm. Die Goldsuspendierung
        der Reichsbank am 4. August 1914 zu Kriegsbeginn beendet die praktische Geltung; formal abgelöst 1924 durch Reichsmark / Rentenmark.

        '
      en: 'Coinage Act of 4 December 1871<sup>[ref:wikipedia-de-goldmark]</sup>: the common gold standard of the German Empire. From 1 Pfund (500 g) of fine gold, 139½ ten-Mark pieces = 1,395 Mark are struck
        at 900‰ fineness; gold denominations of 5, 10 and 20 Mark. Struck at eight imperial mints — Berlin (A), Hannover (B), Frankfurt am Main (C), Munich (D), Dresden (E), Stuttgart (F), Karlsruhe (G),
        Hamburg (J) — the Altona mint had closed in 1863<sup>[ref:wikipedia-de-k-nigliche-m-nze-zu-altona]</sup>, so no Holstein-specific mint took part in the Reichsgoldmünzfuß. The Reichsbank''s suspension
        of gold redemption on 4 August 1914, at the outbreak of war, ends practical operation; formally replaced in 1924 by the Reichsmark / Rentenmark.'
      uk: 'Закон про монету від 4 грудня 1871 р.<sup>[ref:wikipedia-de-goldmark]</sup>: спільний золотий стандарт Німецької імперії. З 1 фунта (500 г) чистого золота карбують 139½ 10-Mark-Stück = 1395 Mark,
        проба 900 ‰; золоті номінали у 5, 10 і 20 Mark. Карбування здійснювалось у восьми імперських монетних дворах — Берлін (A), Ганновер (B), Франкфурт-на-Майні (C), Мюнхен (D), Дрезден (E), Штутгарт
        (F), Карлсруе (G), Гамбург (J). Двір в Альтоні зачинено ще 1863 р.<sup>[ref:wikipedia-de-k-nigliche-m-nze-zu-altona]</sup>, тож жоден гольштинський монетний двір у Reichsgoldmünzfuß не брав участі.
        Призупинення Reichsbank-ом золотого розміну 4 серпня 1914 р. на початку війни припиняє фактичну дію; формально стандарт замінено 1924 р. на Reichsmark / Rentenmark.'
    closing_label:
      de: Zusammenfassung · 43 Jahre Geltung im Reich, in Holstein keine eigenen Prägungen
      en: Summary · 43 years across the Reich, no Holstein issues
      uk: Підсумок · 43 роки чинності в Рейху, у Гольштейні власних карбувань немає
    closing:
      de: 'Der Reichsgoldmünzfuß beendet als reichseinheitlicher Goldstandard 1871 die 312-jährige Geltung des Reichsdukatenfußes, hat aber selbst keine eigene Holstein-Prägestätte (Altona 1863 geschlossen).
        Die in Holstein zirkulierenden 5/10/20-Mark-Goldstücke kommen aus den anderen Reichsmünzstätten — vor allem Hamburg (J) und Berlin (A) — und sind als gemeinsame Reichsmünzen nicht territorial unterscheidbar.
        Mit der Goldsuspendierung 1914 endet die praktische Goldwährung; die formal-rechtliche Demonetisierung 1924 schließt ein 53-jähriges Goldzeitalter ab und überführt Deutschland endgültig in die Papier-Mark-Ära
        (Reichsmark / Rentenmark).

        '
      en: The Reichsgoldmünzfuß, introduced as a Reich-wide gold standard in 1871, ends the 312-year run of the Reichsdukatenfuß; it had no Holstein-specific mint of its own (Altona had closed in 
        1863). The 5/10/20-Mark gold coins circulating in Holstein came from the other imperial mints — chiefly Hamburg (J) and Berlin (A) — and as common imperial coinage cannot be distinguished 
        territorially. The 1914 gold-redemption suspension ends the practical gold currency; formal demonetisation in 1924 closes a 53-year gold era and definitively moves Germany into the paper-Mark 
        era (Reichsmark / Rentenmark).
      uk: Reichsgoldmünzfuß, запроваджений 1871 р. як загальноімперський золотий стандарт, завершує 312-річну дію Reichsdukatenfuß; власної гольштинської монетної установи не має (Альтонський двір 
        закрито ще 1863 р.). Золоті 5/10/20-Mark-Stücke, що оберталися в Гольштейні, надходили з інших імперських монетних дворів — передусім Гамбурга (J) і Берліна (A) — і як спільне імперське 
        карбування не розрізняються територіально. Призупинення золотого розміну 1914 р. припиняє фактичну золоту валюту; формальна демонетизація 1924 р. закриває 53-річну золоту епоху і остаточно 
        переводить Німеччину в епоху Papiermark (Reichsmark / Rentenmark).
