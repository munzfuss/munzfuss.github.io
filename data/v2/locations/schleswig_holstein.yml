id: schleswig_holstein
km_register: SH
name:
  de: Schleswig-Holstein
  en: Schleswig-Holstein
  uk: Шлезвіг-Гольштейн
summary:
  de: Herzogthümer Schleswig und Holstein, 1559–1914 — königlich-holsteinischer Anteil (Glückstadt) und Herzogthum Schleswig-Holstein-Gottorp (Schleswig, Tönning), erweitert um die Sonderburger, 
    Norburger, Glücksburger, Schauenburg-Pinneberger und Rantzauer Sonder-Linien. Vom Augspurger Reichsmüntz-Abschied biß zur preußischen Annexion 1866 und Reichsmark-Einführung 1871.
  en: Duchies of Schleswig and Holstein, 1559–1914 — the royal-Holstein share (Glückstadt) and the Duchy of Schleswig-Holstein-Gottorp (Schleswig, Tönning), extended by the Sonderburg, Norburg, 
    Glücksburg, Schauenburg-Pinneberg and Rantzau collateral branches. From the Augsburg Imperial Mint Ordinance to the Prussian annexation of 1866 and the Reichsmark of 1871.
  uk: Герцогства Шлезвіг і Гольштейн, 1559–1914 — королівсько-гольштинська частка (Glückstadt) і герцогство Шлезвіг-Гольштейн-Ґотторп (Шлезвіг, Tönning), доповнені Зондербурзькою, Норборзькою, 
    Ґлюксбурзькою, Шауенбург-Піннебергською та Рантцауською побічними лініями. Від Авґсбурзького імперського монетного ордонансу до прусської анексії 1866 та запровадження Reichsmark 1871.
