      bar_title:
        de: 'Augspurger Reichsmüntz-Abschied 30. Mai 1566 · drei Datierungs-Anker für das Ende des 9-Fuß: Massen-Carbung empirisch beendet 1667 (Zinnaer Müntzvertrag); Funktion als Hauptumlaufmünze beendet
          ~1700; formell als Reichsmünzfuß durch den Leipziger Fuß abgelöst 1738. In Holstein letzte Prägung 1625 (Hans Jr. von Sonderburg, 2 Schilling Lübisch); ab 1622 parallel vom 9¼-Fuß abgelöst (Friedrich
          III. von Gottorp, Glückstadt). Nach 1700 erhalten als Inseln: Hannover Speciesthaler 1738–1802 (letzte Schaumünze 1797), Hamburg Bank-Speciesthaler 1730–1764 (~110 000 Stück), Lübeck Jubiläumsthaler
          1730 / 1776 · in Hamburg und Lübeck als Banktauschmünze biß 1875.'
        en: 'Augsburg Imperial Mint Decree, 30 May 1566 · three dating anchors for the end of the 9-Fuß: mass minting empirically ends 1667 (Zinnaer Münzvertrag); the role of principal circulating coin
          ends ~1700; formally replaced as Reichsmünzfuß by the Leipziger Fuß in 1738. In Holstein the last strike is 1625 (Hans Jr. of Sonderburg, 2 Schilling Lübisch); from 1622 already being superseded
          in parallel by the 9¼-Fuß (Friedrich III of Gottorp, Glückstadt). Surviving islands after 1700: Hanover Speciesthaler 1738–1802 (last Schaumünze 1797), Hamburg Bank-Speciesthaler 1730–1764 (~110,000
          pieces), Lübeck jubilee Thaler of 1730 / 1776 · in Hamburg and Lübeck retained as bank-exchange money until 1875.'
        uk: 'Авґсбурзький імперський монетний декрет 30 травня 1566 · три датувальні якорі кінця 9-Fuß: масове карбування емпірично завершено 1667 (Zinnaer Münzvertrag); функція головної обігової монети
          завершена ~1700; формально замінено як Reichsmünzfuß на Leipziger Fuß 1738. У Гольштейні останнє карбування 1625 (Hans Jr. Sonderburg, 2 Schilling Lübisch); з 1622 паралельно витіснений 9¼-Fuß
          (Фредерік III Ґотторпський, Glückstadt). Після 1700 збережений як острови: ганноверський Speciesthaler 1738–1802 (остання Schaumünze 1797), гамбурзький Bank-Speciesthaler 1730–1764 (~110 000 штук),
          любецький ювілейний Thaler 1730 / 1776 · у Гамбурзі та Любеку як банковий рахунок до 1875.'
