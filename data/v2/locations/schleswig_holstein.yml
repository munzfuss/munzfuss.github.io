    - id: III
      year_from: 1871
      year_to: 1876
      from_label: 4. Dez. 1871
      to_label: 1. Jan. 1876
      title:
        de: Übergangsphase zur Goldmark
        en: Transitional phase to the Goldmark
        uk: Перехідна фаза до Goldmark
      description:
        de: Münzgesetz 4. Dez. 1871 führt die Mark ein; Münzgesetz 9. Juli 1873 beendet die Neuprägung von Vereinsthalern. Altbestände bleiben als 
          Umlaufmünze.<sup>[ref:wikipedia-en-danish-rigsdaler]</sup>
        en: The Coinage Act of 4 Dec. 1871 introduces the Mark; the Coinage Act of 9 July 1873 ends new strikes of Vereinsthaler. Existing stocks stay in 
          circulation.<sup>[ref:wikipedia-en-danish-rigsdaler]</sup>
        uk: Закон про монету 4 грудня 1871 запроваджує Mark; Закон про монету 9 липня 1873 припиняє нові карбування Vereinsthaler. Старі запаси лишаються в 
          обігу.<sup>[ref:wikipedia-en-danish-rigsdaler]</sup>
      context:
        de: '<b>Umtauschkurs:</b> 1 Vereinsthaler = 3 Mark (biß 1. Oktober 1907 gesetzliches Zahlmittel; alle übrigen vor 1873 in Holstein zirkulierenden Müntzfüße — 9¼-Fuß Speciedaler, 18½-Fuß Rigsdaler
          Rigsmønt, Reichsdukatenfuß-Dukaten — verlieren mit der Mark-Einführung 1. Januar 1876 ihren Zahlmittelcharakter).<br>

          <em>Der Vereinsthaler ist dabei kein spezifisch holsteinischer Standard, sondern allgemeindeutsches Zollvereins-Geld nach dem Wiener Münzvertrag 24. Januar 1857 — in Holstein erst seit der preußischen
          Annexion 1867 alleinige Landeswährung. Dadurch bleibt er das einzige der hier dokumentierten, in Holstein bis 1873 zirkulierenden Müntzfüße, das biß ins 20. Jahrhundert uneingeschränkt gesetzliches
          Zahlmittel ist.</em>

          '
        en: <b>Exchange rate:</b> 1 Vereinsthaler = 3 Mark (legal tender until 1 October 1907; all other Müntzfüße circulating in Holstein before 1873 — the 9¼-Fuß Speciedaler, the 18½-Fuß Rigsdaler 
          Rigsmønt, the Reichsdukatenfuß ducat — lose legal tender status with the introduction of the Mark on 1 January 1876).<br> <em>The Vereinsthaler itself is not a specifically Holstein standard
          but a Zollverein-wide German coinage established by the Wiener Münzvertrag of 24 January 1857 — only in Holstein from the Prussian annexation of 1867 onwards as the sole local currency. As a
          result it is the only one of the Müntzfüße documented here as circulating in Holstein up to 1873 that retains unrestricted legal tender status into the 20th century.</em>
        uk: <b>Курс обміну:</b> 1 Vereinsthaler = 3 Mark (законний платіжний засіб до 1 жовтня 1907 р.; усі інші Müntzfüße, що до 1873 р. оберталися в Гольштейні, — 9¼-Fuß Speciedaler, 18½-Fuß 
          Rigsdaler Rigsmønt, Reichsdukatenfuß-дукати — втрачають цей статус із запровадженням Mark 1 січня 1876 р.).<br> <em>Сам Vereinsthaler — не специфічно гольштинський стандарт, а 
          загальнонімецьке Zollverein-карбування за Wiener Münzvertrag 24 січня 1857 р., у Гольштейні єдина державна валюта лише з прусської анексії 1867 р. Завдяки цьому він — єдиний серед 
          задокументованих тут Müntzfüße, що оберталися в Гольштейні до 1873 р., який зберігав необмежений статус законного платіжного засобу до XX століття.</em>
