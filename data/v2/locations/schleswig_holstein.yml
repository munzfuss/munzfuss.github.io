      from_label: 1787 (erste Prägung Altona) / 29. Febr. 1788 (Forordning)
      to_label: 5. Jan. 1813
      title:
        de: Schleswig-Holsteinische Reform — Thaler Species als Alleingrundmünze
        en: The Schleswig-Holstein reform — Thaler Species as the sole base coin
        uk: Шлезв.-гольшт. реформа — Thaler Species як єдина базова монета
      description:
        de: 'Ernst Schimmelmann: 1 Thaler Species = 60 Schilling Courant · Ende des Aufgelds · Schleswig-Holsteinische Speciesbank Altona gegründet · alle Courant-Nominale werden Teilstücke des Thaler Species
          im 9¼-Fuß. <em>Erste Prägungen unter dem neuen Standard erfolgen bereits 1787 in Altona (Doppelinschrift «1 SPECIES THALER = 60 SCHILLING COURANT»); die formelle Eröffnungsverordnung ist 29. Februar
          1788.</em>'
        en: 'Ernst Schimmelmann: 1 Thaler Species = 60 Schilling Courant · the premium is abolished · the Schleswig-Holstein Speciesbank in Altona is founded · all Courant denominations become exact fractions
          of the Thaler Species in the 9¼-Fuß. <em>The first strikes under the new standard appear already in 1787 at Altona (with the dual-denomination inscription «1 SPECIES THALER = 60 SCHILLING COURANT»);
          the formal founding Forordning is 29 February 1788.</em>'
        uk: 'Ернст Шіммельман: 1 Thaler Species = 60 Schilling Courant · надбавку (Aufgeld) скасовано · засновано шлезв.-гольшт. Speciesbank в Альтоні · усі номінали Courant стають точними частками Thaler
          Species у 9¼-Fuß. <em>Перші карбування за новим стандартом з''являються вже 1787 р. в Альтоні (двономінальний напис «1 SPECIES THALER = 60 SCHILLING COURANT»); формальна установча Forordning датується
          29 лютого 1788.</em>'
      context:
        de: '<b>Grundwerte der Schilling-Sch.-H.-Courant-Theilung</b> (gleichzeitig mit dem Thaler Species eingeführt, Eröffnungsverordnung 29. Febr. 1788):<br>

          · <b>1 Schilling Courant</b> = 0,42136 g fein (= 25,28173 / 60) · 12 Pfennig · Scheidemünze<br>

          · <b>1 Mark Sch.-H. Courant</b> = 6,74179 g fein = 16 Schilling Courant = ⅓ Reichsthaler Sch.-H. Courant = 4/15 Thaler Species · Rechnungseinheit, am 9¼-Fuß-Speciedaler verankert; nicht identisch
          mit der Hamburger Mark Courant (1/3 Rigsdaler Courant = 6,88 g fein, am 11⅓-Fuß verankert)<sup>[ref:wikipedia-en-hamburg-mark]</sup><br>

          · <b>1 Thaler Sch.-H. Courant</b> = 20,22538 g fein = 48 Schilling Courant = 3 Mark Sch.-H. Courant = 4/5 Thaler Species · <em>reine Rechnungseinheit, am Speciedaler verankert</em>; das 5:4-Verhältnis
          war in den Herzogtümern bereits mit der Schimmelmann-Reform 1788 definitorisch festgeschrieben. Plakat 3. Dezember 1794 regelte denselben Tarif erst danach für das Kurantmøntfod-System in Dänemark
          / Norwegen, wo der physische 11⅓-Fuß-Rigsdaler Courant (20,634 g fein) Hauptzahlungsmittel blieb<sup>[ref:wikipedia-en-hamburg-mark]</sup><br><br>

          <b>Rechnungsfraktionen:</b> 1 Thaler Species = 60 Schilling Courant = 720 Pfennig · 1 Thaler Sch.-H. Courant = 48 Schilling Courant = 4/5 Thaler Species · 1 Mark Sch.-H. Courant = 16 Schilling
          Courant = 4/15 Thaler Species · 1 Schilling Courant = 12 Pfennig · ½ Sch. = Sechsling · ¼ Sch. = Dreiling.<br><br>

          <em>Keine 1-Schilling-Münze geprägt — stattdessen 2-Sechsling (lübisch-hanseatisches Erbe). Zur «SP»-Abkürzung: Sämtliche vollwertigen Nominale (ab 5 Schilling) tragen auf dem Reverse «SP» für
          Species.</em>

          '
        en: '<b>Base values of the Schilling-Sch.-H.-Courant subdivision</b> (introduced together with the Thaler Species by the founding decree of 29 Feb. 1788):<br> · <b>1 Schilling Courant</b> = 0.42136
          g fine (= 25.28173 / 60) · 12 Pfennig · petty coin<br> · <b>1 Mark Sch.-H. Courant</b> = 6.74179 g fine = 16 Schilling Courant = ⅓ Reichsthaler Sch.-H. Courant = 4/15 Thaler Species · accounting
          unit, anchored to the 9¼-Fuß Speciedaler; not identical with the Hamburg Mark Courant (1/3 Rigsdaler Courant = 6.88 g fine, anchored to the 11⅓-Fuß)<sup>[ref:wikipedia-en-hamburg-mark]</sup><br>
          · <b>1 Thaler Sch.-H. Courant</b> = 20.22538 g fine = 48 Schilling Courant = 3 Mark Sch.-H. Courant = 4/5 Thaler Species · <em>pure accounting unit, anchored to the Speciedaler</em>; the 5:4 ratio
          was already built into the Schimmelmann reform of 1788 in the duchies by definition. The later Plakat of 3 December 1794 regulated the same tariff for the Kurantmøntfod system in Denmark / Norway
          proper, where the physical 11⅓-Fuß Rigsdaler Courant (20.634 g fine) remained the main currency<sup>[ref:wikipedia-en-hamburg-mark]</sup><br><br> <b>Accounting fractions:</b> 1 Thaler Species
          = 60 Schilling Courant = 720 Pfennig · 1 Thaler Sch.-H. Courant = 48 Schilling Courant = 4/5 Thaler Species · 1 Mark Sch.-H. Courant = 16 Schilling Courant = 4/15 Thaler Species · 1 Schilling
          Courant = 12 Pfennig · ½ Sch. = Sechsling · ¼ Sch. = Dreiling.<br><br> <em>No 1-Schilling coin was struck — a 2-Sechsling stood in instead (a Lübeck-Hanseatic inheritance). On the «SP» abbreviation:
          every full-value denomination (from 5 Schilling upwards) carries «SP» for Species on the reverse.</em>'
        uk: '<b>Базові значення поділу Schilling-Sch.-H.-Courant</b> (запроваджені одночасно зі Thaler Species установчим декретом 29 лют. 1788):<br> · <b>1 Schilling Courant</b> = 0,42136 г чистого (=
          25,28173 / 60) · 12 Pfennig · розмінна монета<br> · <b>1 Mark Sch.-H. Courant</b> = 6,74179 г чистого = 16 Schilling Courant = ⅓ Reichsthaler Sch.-H. Courant = 4/15 Thaler Species · розрахункова
          одиниця, anchored до 9¼-Fuß Speciedaler; не тотожна з Hamburg Mark Courant (1/3 Rigsdaler Courant = 6,88 г чистого, anchored до 11⅓-Fuß)<sup>[ref:wikipedia-en-hamburg-mark]</sup><br> · <b>1 Thaler
          Sch.-H. Courant</b> = 20,22538 г чистого = 48 Schilling Courant = 3 Mark Sch.-H. Courant = 4/5 Thaler Species · <em>розрахункова одиниця, anchored до Speciedaler</em>; курс 5:4 у герцогствах був
          вже закладений у реформу Шіммельмана 1788 за визначенням. Пізніший Plakat 3 грудня 1794 урегулював той самий тариф для Kurantmøntfod-системи в Данії / Норвегії, де фізичний 11⅓-Fuß Rigsdaler Courant
          (20,634 г чистого) лишався основним платіжним засобом<sup>[ref:wikipedia-en-hamburg-mark]</sup><br><br> <b>Розрахункові фракції:</b> 1 Thaler Species = 60 Schilling Courant = 720 Pfennig · 1 Thaler
          Sch.-H. Courant = 48 Schilling Courant = 4/5 Thaler Species · 1 Mark Sch.-H. Courant = 16 Schilling Courant = 4/15 Thaler Species · 1 Schilling Courant = 12 Pfennig · ½ Sch. = Sechsling · ¼ Sch.
          = Dreiling.<br><br> <em>Монети номіналом 1 Schilling не карбували — замість неї йшов 2-Sechsling (любецько-ганзейська спадщина). Про абревіатуру «SP»: усі повноцінні номінали (від 5 Schilling)
          несуть на реверсі «SP» — Species.</em>'
