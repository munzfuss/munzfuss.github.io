        en: 'Goldmark under the Coinage Act of 4 December 1871: 139½ ten-Mark pieces = 1,395 Mark are struck from 1 Pfund (500 g) of fine gold at 900 ‰ · the common gold standard of the German Empire from the 1871 unification · gold 5, 10 and 20 Mark (Kurant), silver 2/3/5 Mark and copper-nickel as Scheidemünze · struck at eight imperial mints (Berlin A, Hamburg J and others) · in force until the Reichsbank gold-redemption suspension on 4 August 1914 at the start of the war · formally replaced in 1924 by the Reichsmark / Rentenmark'
