id: german_empire
name:
  de: Deutsches Reich
  en: German Empire
  uk: Німецька імперія
summary:
  de: Vereinigtes Deutsches Reich ab 1871 — einheitliche Reichswährung (Mark zu 100 Pfennig) per Münzgesetz vom 4. Dezember 1871. Goldtier nach dem Reichsgoldmünzfuß (139½ Zehnmarkstücke aus 1 Pfund Feingold, .900); Silber- und Scheidemünzen reichsweit einheitlich. Karbung bis zum Edelmetall-Anker-Ende 1914.
  en: Unified German Empire from 1871 — single imperial currency (Mark of 100 Pfennig) under the Coinage Act of 4 December 1871. Gold tier on the Reichsgoldmünzfuß (139½ ten-mark pieces from 1 pound fine gold, .900); silver and base coin standardised Reich-wide. Coinage until the precious-metal-anchor end in 1914.
  uk: Обʼєднана Німецька імперія з 1871 — єдина імперська валюта (марка зі 100 пфенігів) за Законом про монету 4 грудня 1871. Золотий тир за Reichsgoldmünzfuß (139½ десятимаркових монет з 1 фунта чистого золота, .900); срібло й розмінна монета уніфіковані по всій імперії. Карбування до кінця епохи дорогоцінно-металевого анкера 1914.
