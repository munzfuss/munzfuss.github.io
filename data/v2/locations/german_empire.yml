id: german_empire
name:
  de: Deutsches Reich
  en: German Empire
  uk: Німецька імперія
summary:
  de: Vereinigtes Deutsches Reich ab 1871 — einheitliche Reichswährung (Mark zu 100 Pfennig) per Münzgesetz vom 4. Dezember 1871. Goldtier nach dem Reichsgoldmünzfuß (139½ Zehnmarkstücke aus 1 Pfund Feingold, .900); Silber- und Scheidemünzen reichsweit einheitlich. Diese Seite sammelt sowohl die reichsweiten Gemeinschaftstypen als auch die Reichswährungs-Karbung der Einzelstaaten mit eigener Locationsseite (Hamburg, Lübeck, Oldenburg, Braunschweig-Lüneburg) — diese Stücke erscheinen sowohl hier als auch auf ihrer Staatsseite. Karbung bis zum Edelmetall-Anker-Ende 1914.
  en: Unified German Empire from 1871 — single imperial currency (Mark of 100 Pfennig) under the Coinage Act of 4 December 1871. Gold tier on the Reichsgoldmünzfuß (139½ ten-mark pieces from 1 pound fine gold, .900); silver and base coin standardised Reich-wide. This page gathers both the Reich-wide common types and the Reichswährung coinage of the member states that have their own location page (Hamburg, Lübeck, Oldenburg, Brunswick-Lüneburg) — those pieces appear both here and on their state page. Coinage until the precious-metal-anchor end in 1914.
  uk: Обʼєднана Німецька імперія з 1871 — єдина імперська валюта (марка зі 100 пфенігів) за Законом про монету 4 грудня 1871. Золотий тир за Reichsgoldmünzfuß (139½ десятимаркових монет з 1 фунта чистого золота, .900); срібло й розмінна монета уніфіковані по всій імперії. Ця сторінка збирає і загальноімперські спільні типи, і Reichswährung-карбування окремих держав з власною сторінкою (Гамбург, Любек, Ольденбург, Брауншвейг-Люнебург) — такі монети показані і тут, і на сторінці своєї держави. Карбування до кінця епохи дорогоцінно-металевого анкера 1914.
