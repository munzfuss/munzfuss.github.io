summary:
  de: Landgrafschaft (ab 1803 Kurfürstentum) Hessen-Kassel mit Hauptmünze Kassel. 1730–1751 in Personalunion mit Schweden unter Frederik I.
  en: Landgraviate (from 1803 Electorate) of Hesse-Kassel with main mint at Kassel. In personal union with Sweden under Frederik I, 1730–1751.
