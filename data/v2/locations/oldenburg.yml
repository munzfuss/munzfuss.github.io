summary:
  de: Grafschaft Oldenburg-Delmenhorst (biß 1667), ab 1774 Herzogthum Oldenburg. Müntzstätten Oldenburg und Jever (Herrschaft
    Jever in Personalunion 1575–1667 unter Anton Günther).
  en: County of Oldenburg-Delmenhorst (until 1667), from 1774 Duchy of Oldenburg. Mints at Oldenburg and Jever (Lordship of
    Jever in personal union 1575–1667 under Anton Günther).
  uk: Графство Ольденбург-Дельменхорст (до 1667), з 1774 герцогство Ольденбург. Монетні двори в Ольденбурзі та Євері (Сеньйорія
    Євер у особистій унії 1575–1667 за Антона Гюнтера).
