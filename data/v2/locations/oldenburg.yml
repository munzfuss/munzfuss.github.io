  reichsgoldmuenzfuss:
    - id: I
      year_from: 1871
      year_to: 1914
      from_label: '1871'
      to_label: '1914'
      title:
        de: 'Reichswährung 1871–1914'
        en: 'Reich currency 1871–1914'
        uk: 'Імперська валюта 1871–1914'
      description:
        de: 'Reichseinheitliche Mark-Währung: Gold 5/10/20 Mark als Kurant nach dem Reichsgoldmünzfuß, Silber 2/3/5 Mark und Kupfer-Nickel als Scheidemünze. In Oldenburg mit dem Landeswappen geprägt. Geltung bis zur Goldsuspendierung 1914.'
        en: 'Reich-wide Mark currency: gold 5/10/20 Mark as Kurant on the Reichsgoldmünzfuß, silver 2/3/5 Mark and copper-nickel as Scheidemünze; the Oldenburg issues carry the state arms. In force until the gold suspension of 1914.'
        uk: 'Загальноімперська марка: золото 5/10/20 Mark як Kurant за Reichsgoldmünzfuß, срібло 2/3/5 Mark і мідно-нікель як Scheidemünze; ольденбурзькі випуски несуть герб держави. Чинна до призупинення золота 1914.'
