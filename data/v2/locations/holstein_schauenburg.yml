id: holstein_schauenburg
name:
  de: Grafschaft Holstein-Schauenburg
  en: County of Holstein-Schauenburg
  uk: Графство Гольштейн-Шауенбург
summary:
  de: Reichslehen der Schauenburger Linie, geographisch zweiteilig — die holsteinische Grafschaft Pinneberg (Müntzstätte Altona, heute Kreis Pinneberg in Schleswig-Holstein) und die niedersächsische
    Stammgrafschaft Schaumburg (Müntzstätten Stadthagen, Bückeburg, Rinteln und Oldendorf, heute Niedersachsen). Jede Hälfte folgte der Müntztradition ihrer Region — die Pinneberger Seite dem
    Schleswig-Holsteinischen Reichsthaler-Courant, die Schaumburger Seite dem niedersächsischen System zu 36 Mariengroschen auf den Reichsthaler. Beide Theile wurden 1601-1622 unter Ernst III.
    gemeinsam regiert; die Linie erlosch 1640 mit Otto V., worauf Pinneberg an den dänisch-königlichen Holsteiner Antheil fiel.
  en: Imperial fief of the Schauenburg line, geographically in two halves — the Holstein County of Pinneberg (Altona mint, today Kreis Pinneberg in Schleswig-Holstein) and the Lower-Saxon ancestral
    County of Schaumburg (mints at Stadthagen, Bückeburg, Rinteln and Oldendorf, today Lower Saxony). Each half followed its region's coinage tradition — the Pinneberg side the Schleswig-Holstein
    Reichsthaler-Courant, the Schaumburg side the Lower-Saxon system of 36 Mariengroschen to the Reichsthaler. Both parts were ruled jointly by Ernst III in 1601-1622; the line died out in 1640 with
    Otto V, whereupon Pinneberg passed to the Royal-Danish portion of Holstein.
  uk: Імперський лен династії Шауенбург, географічно дводільний — гольштейнське графство Піннеберг (монетний двір Altona, сучасний Кreis Піннеберг у Шлезвіг-Гольштейні) та нижньосаксонське родове
    графство Шаумбург (монетні двори Stadthagen, Bückeburg, Rinteln та Oldendorf, сучасна Нижня Саксонія). Кожна половина дотримувалася монетної традиції свого регіону — піннебергзька сторона
    шлезвіг-гольштейнського Reichsthaler-Courant, шаумбурзька — нижньосаксонської системи 36 Mariengroschen на Reichsthaler. Обидві частини правилися спільно Ернстом III у 1601-1622 рр.; лінія
    згасла 1640 р. з Отто V, після чого Піннеберг перейшов до королівсько-данської частини Гольштейну.
