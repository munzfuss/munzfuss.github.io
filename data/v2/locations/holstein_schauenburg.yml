id: holstein_schauenburg
name:
  de: Grafschaft Holstein-Schauenburg
  en: County of Holstein-Schauenburg
  uk: Графство Гольштейн-Шауенбург
summary:
  de: Reichslehen der Schauenburger Linie unter Ernst III. (1601-1622), geographisch geteilt zwischen der Grafschaft Pinneberg (heute Kreis Pinneberg im Schleswig-Holstein) und der Stammgrafschaft 
    Schaumburg (Stadthagen / Bückeburg, heute Niedersachsen). IKMK Berlin trennt diese beiden Territorien nicht — der vorliegende Bestand ist Bulk-Seed (104 Stücke 1616-1622), bis Müntzort und 
    Müntzfuß durch Weinmeister 1908 + Bei der Wieden 1961 für jeden Eintrag geklärt sind.
  en: Imperial fief of the Schauenburg dynasty under Ernst III (1601-1622), geographically split between the County of Pinneberg (today Kreis Pinneberg in Schleswig-Holstein) and the ancestral County 
    of Schaumburg (Stadthagen / Bückeburg, today Lower Saxony). IKMK Berlin doesn't distinguish the two territories — this holding is a bulk seed (104 pieces 1616-1622) pending mint-city and Müntzfuß 
    resolution via Weinmeister 1908 + Bei der Wieden 1961 per coin.
  uk: Імперський лен династії Шауенбург під Ернстом III (1601-1622), географічно розділений між графством Піннеберг (сучасний Кreis Піннеберг у Шлезвіг-Гольштейні) та родовим графством Шаумбург 
    (Stadthagen / Bückeburg, сучасна Нижня Саксонія). IKMK Berlin не розрізняє ці дві території — цей фонд є bulk-сід (104 монети 1616-1622) до встановлення міста карбування та Müntzfuß через 
    Weinmeister 1908 + Bei der Wieden 1961 для кожного запису.
