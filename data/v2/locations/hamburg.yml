id: hamburg
name:
  de: Hamburg
  en: Hamburg
  uk: Гамбург
summary:
  de: Freie und Hansestadt Hamburg — Reichsstadt mit eigener Müntzstätte und der Bancovaluta des Hamburger Banks (gegründet 1619). Reichsthaler im 9-Fuß und Schillinge im 34-Marck-Fuß biß zur 
    Einführung der Reichsmark 1875.
  en: Free and Hanseatic City of Hamburg — imperial city with its own mint and the Bancovaluta of the Hamburger Bank (founded 1619). Reichsthaler at the 9-Fuß and Schilling pieces at the 34-Marck-Fuß 
    until the introduction of the Reichsmark in 1875.
  uk: Вільне ганзейське місто Гамбург — імперське місто з власним монетним двором і Bancovaluta-системою Гамбурзького банку (заснований 1619). Reichsthaler у 9-Fuß та шилінги у 34-Marck-Fuß до 
    запровадження Reichsmark 1875.
consumes_entities:
  - hanseatic_hamburg
fuss_order:
  - reichsgoldmuenzfuss
  - seed_unsorted
fuss_periods:
  seed_unsorted:
    pdate_label:
      de: Bulk-Seed-Sammelbucket — Geltungsbereich pro Münze noch zuzuweisen
      en: Bulk seed bucket — period of validity to be assigned per coin
      uk: Bulk-seed загальний кошик — період дії потрібно призначити per coin
    hintergrund:
      de: Technischer Sammelbucket für bulk-importierte Münzen aus ucoin. Bei künftiger Detail-Bearbeitung wandern die Stücke in den jeweils passenden eigentlichen Müntzfuß ([fuss:9_25_thaler], 
        [fuss:11_333_thaler], [fuss:18_5_thaler], [fuss:30_thaler], [fuss:reichsdukatenfuss] etc.).
      en: Technical catch-all bucket for bulk-imported coins from ucoin. On future detailed work the pieces will move to their proper Münzfuß ([fuss:9_25_thaler], [fuss:11_333_thaler], 
        [fuss:18_5_thaler], [fuss:30_thaler], [fuss:reichsdukatenfuss], etc.).
      uk: Технічний загальний кошик для bulk-імпортованих монет із ucoin. При майбутній детальній роботі монети перейдуть у відповідну Müntzfuß ([fuss:9_25_thaler], [fuss:11_333_thaler], 
        [fuss:18_5_thaler], [fuss:30_thaler], [fuss:reichsdukatenfuss] тощо).
phases:
  reichsgoldmuenzfuss:
    - id: I
      year_from: 1871
      year_to: 1914
      from_label: '1871'
      to_label: '1914'
      title:
        de: 'Reichswährung 1871–1914'
        en: 'Reich currency 1871–1914'
        uk: 'Імперська валюта 1871–1914'
      description:
        de: 'Reichseinheitliche Mark-Währung: Gold 5/10/20 Mark als Kurant nach dem Reichsgoldmünzfuß, Silber 2/3/5 Mark und Kupfer-Nickel als Scheidemünze. Hamburg prägte als Reichsmünzstätte mit dem Münzzeichen J. Geltung bis zur Goldsuspendierung 1914.'
        en: 'Reich-wide Mark currency: gold 5/10/20 Mark as Kurant on the Reichsgoldmünzfuß, silver 2/3/5 Mark and copper-nickel as Scheidemünze. Hamburg struck as an imperial mint under the mint mark J. In force until the gold suspension of 1914.'
        uk: 'Загальноімперська марка: золото 5/10/20 Mark як Kurant за Reichsgoldmünzfuß, срібло 2/3/5 Mark і мідно-нікель як Scheidemünze. Гамбург карбував як імперський монетний двір із монетним знаком J. Чинна до призупинення золота 1914.'
