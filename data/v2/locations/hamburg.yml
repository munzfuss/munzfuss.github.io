      de: Sammelphase für die aus ucoin (ucoin.net per-coin pages) bulk-importierten Stücke — user-edited Münzkatalog (Tier-Äquivalent zu Numista). Quelle ist <code>data/v2/seed/ucoin/&lt;entity&gt;.yml</code>, generiert von <code>scripts/maintenance/build_ucoin_seed.py</code> aus dem ucoin-Cache (<code>scripts/cache/ucoin/*.json</code>). Per-Münze-Verifikation gegen Primärquellen (Hede / Sieg / Lange / NumisMaster / Bruun) vor §BF-Promotion.
      en: Catch-all phase for coins bulk-imported from ucoin (ucoin.net per-coin pages) — user-edited coin catalogue (tier-equivalent to Numista). Source is <code>data/v2/seed/ucoin/&lt;entity&gt;.yml</code>, generated by <code>scripts/maintenance/build_ucoin_seed.py</code> from the ucoin cache (<code>scripts/cache/ucoin/*.json</code>). Per-coin verification against primary sources (Hede / Sieg / Lange / NumisMaster / Bruun) before §BF promotion.
      uk: Збірна фаза для монет, bulk-імпортованих з ucoin (ucoin.net per-coin pages) — користувацький каталог монет (tier-еквівалент до Numista). Джерело — <code>data/v2/seed/ucoin/&lt;entity&gt;.yml</code>, генерує <code>scripts/maintenance/build_ucoin_seed.py</code> з ucoin-кешу (<code>scripts/cache/ucoin/*.json</code>). Покоінна верифікація проти первинних джерел (Hede / Sieg / Lange / NumisMaster / Bruun) перед §BF-промоцією.
