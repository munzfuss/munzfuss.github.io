id: hamburg
name:
  de: Hamburg
  en: Hamburg
  uk: Гамбург
summary:
  de: Freie und Hansestadt Hamburg — Reichsstadt mit eigener Müntzstätte und der Bancovaluta des Hamburger Banks (gegründet 1619). Reichsthaler im 9-Fuß und Schillinge im 34-Marck-Fuß biß zur Einführung der Reichsmark 1875.
  en: Free and Hanseatic City of Hamburg — imperial city with its own mint and the Bancovaluta of the Hamburger Bank (founded 1619). Reichsthaler at the 9-Fuß and Schilling pieces at the 34-Marck-Fuß until the introduction of the Reichsmark in 1875.
  uk: Вільне ганзейське місто Гамбург — імперське місто з власним монетним двором і Bancovaluta-системою Гамбурзького банку (заснований 1619). Reichsthaler у 9-Fuß та шилінги у 34-Marck-Fuß до запровадження Reichsmark 1875.
consumes_entities:
- hanseatic_hamburg
fuss_order:
- seed_unsorted
fuss_periods:
  seed_unsorted:
    pdate_label:
      de: Bulk-Seed-Sammelbucket — Geltungsbereich pro Münze noch zuzuweisen
      en: Bulk seed bucket — period of validity to be assigned per coin
      uk: Bulk-seed загальний кошик — період дії потрібно призначити per coin
    hintergrund:
      de: Technischer Sammelbucket für bulk-importierte Münzen aus ucoin. Bei künftiger Detail-Bearbeitung wandern die Stücke in den jeweils passenden eigentlichen Müntzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>30_thaler</code>, <code>reichsdukatenfuss</code> etc.).
      en: Technical catch-all bucket for bulk-imported coins from ucoin. On future detailed work the pieces will move to their proper Münzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>30_thaler</code>, <code>reichsdukatenfuss</code>, etc.).
      uk: Технічний загальний кошик для bulk-імпортованих монет із ucoin. При майбутній детальній роботі монети перейдуть у відповідну Müntzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>30_thaler</code>, <code>reichsdukatenfuss</code> тощо).
