id: brunswick_lueneburg
name:
  de: Herzogthum Braunschweig-Lüneburg (Wolfenbüttel)
  en: Duchy of Brunswick-Lüneburg (Wolfenbüttel)
  uk: Герцогство Брауншвейг-Люнебург (Вольфенбюттель)
summary:
  de: Welfen-Linie Wolfenbüttel des Herzogthums Braunschweig-Lüneburg, mit Müntzstätte Wolfenbüttel. Im Register das Christian-IV.-Engagement
    im Niedersächsischen Reichskreis während des Dreißigjährigen Krieges (1627).
  en: Wolfenbüttel branch of the Welf dukes of Brunswick-Lüneburg, with mint at Wolfenbüttel. The register holds the Christian
    IV engagement in the Lower Saxon Imperial Circle during the Thirty Years' War (1627).
  uk: Вольфенбюттельська лінія вельфських герцогів Брауншвейг-Люнебург з монетним двором у Вольфенбюттелі. У реєстрі — карбування
    Кристіана IV у Нижньосаксонському імперському окрузі періоду Тридцятилітньої війни (1627).
