summary:
  de: Reichsunmittelbares Hochstift Osnabrück, ab 1648 (Westfälischer Friede) alternierende Besetzung katholisch / lutherisch (Welfen).
  en: Reichsunmittelbar prince-bishopric of Osnabrück, with alternating Catholic and Lutheran (Welf) episcopal succession from 1648 (Peace of Westphalia).
