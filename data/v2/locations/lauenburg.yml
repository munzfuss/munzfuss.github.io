id: lauenburg
name:
  de: Herzogthum Sachsen-Lauenburg
  en: Duchy of Saxe-Lauenburg
  uk: Герцогство Саксен-Лауенбург
summary:
  de: Reichsherzogthum Sachsen-Lauenburg — 1689 in Personalunion mit Hannover, ab 1815 (Wiener Kongreß) unter dänischer Krone, 1864 (Gasteiner Konvention) an Preußen abgetreten. Eigener Lauenburger 
    Konventionsfuß, geprägt an der Königlichen Münze zu Altona.
  en: Imperial Duchy of Saxe-Lauenburg — in personal union with Hanover from 1689, with the Danish crown from 1815 (Congress of Vienna), and ceded to Prussia in 1864 (Gastein Convention). Its own 
    Lauenburg Konventionsfuß, struck at the Royal Mint at Altona.
  uk: Імперське герцогство Саксен-Лауенбург — з 1689 в особистій унії з Ганновером, з 1815 (Віденський конгрес) під данською короною, 1864 (Ґаштайнська конвенція) передане Пруссії. Власний 
    лауенбурзький Konventionsfuß, карбований на Королівському монетному дворі в Альтоні.
consumes_entities:
  - herzogtum_sachsen_lauenburg
