id: lubeck_bishopric
name:
  de: Fürstbisthum Lübeck (Eutin)
  en: Prince-Bishopric of Lübeck (Eutin)
  uk: Князівство-єпископство Любек (Ойтін)
summary:
  de: Reichsfürstbisthum Lübeck mit Sitz in Eutin (Holstein), seit 1586 von der Holstein-Gottorper Linie als Sekundogenitur regiert. Eigenständiges Reichsterritorium — nicht zu verwechseln mit der 
    Freien Hansestadt Lübeck.
  en: Imperial Prince-Bishopric of Lübeck, seated at Eutin in Holstein, governed from 1586 onwards by the Holstein-Gottorp line as a secundogeniture. A separate imperial territory — not to be confused
    with the Free Hanseatic City of Lübeck.
  uk: Імперське князівство-єпископство Любек з резиденцією в Ойтіні (Гольштейн), кероване з 1586 року Гольштейн-Ґотторпською лінією як secundogeniture. Окрема імперська територія — не плутати з 
    Вільним ганзейським містом Любек.
