id: bremen_verden
name:
  de: Erzbisthum Bremen-Verden
  en: Archbishopric of Bremen-Verden
  uk: Архієпископство Бремен-Верден
summary:
  de: Erzbisthum Bremen mit Bisthum Verden — Reichslehen mit Müntzstätten Bremervörde und Stade. Unter dänischen Administratoren
    biß zum Westfälischen Frieden 1648, danach schwedisch (1648–1712). Nicht zu verwechseln mit der Freien Hansestadt Bremen.
  en: Archbishopric of Bremen with the Bishopric of Verden — imperial fief with mints at Bremervörde and Stade. Held under
    Danish administrators until the Peace of Westphalia in 1648, then Swedish (1648–1712). Not to be confused with the Free
    Hanseatic City of Bremen.
  uk: Архієпископство Бремен з єпископством Верден — імперський лен з монетними дворами в Бремерферде та Штаде. Під данськими
    адміністраторами до Вестфальського миру 1648, потім шведське володіння (1648–1712). Не плутати з Вільним ганзейським містом
    Бременом.
