        <b>Wikipedia DE «Zinnaer Münzfuß»</b> — <a href="https://de.wikipedia.org/wiki/Zinnaer_M%C3%BCnzfu%C3%9F" target="_blank">de.wikipedia.org/wiki/Zinnaer Münzfuß</a>. Eigene Wiki-Karte zum Zinnaer Vertrag 1667: «<i>Der Zinnaer Münzvertrag von 1667 wurde im Kloster Zinna ... zwischen Kurbrandenburg ... und Kursachsen geschlossen</i>». Wichtige Klarstellung zum 9-Fuß-Status: «<i>Die beiden Staaten vereinbarten, als Münzfuß den 9-Talerfuß der Augsburger Reichsmünzordnung von 1559 beizubehalten, aber die Scheidemünzen im 10½-Talerfuß auszumünzen</i>» — d. h. der 9-Fuß wird formell <em>nicht</em> aufgegeben, nur die Scheidemünzen wandern in den leichteren 10½-Fuß. Brunswick-Beitritt 1668: «<i>Mit dem Vertragsbeitritt des Herzogtums Braunschweig-Lüneburg im Jahr 1668 wurde zugleich vereinbart, den 10½-Talerfuß auch auf die Ausprägung der 2/3-, 1/3- und 1/6-Taler-Münzen anzuwenden</i>» — formell beginnt die ⅔-Taler-Hauptnominal-Phase 1668, nicht 1667.
      en: |
        <b>Wikipedia DE «Zinnaer Münzfuß»</b> — <a href="https://de.wikipedia.org/wiki/Zinnaer_M%C3%BCnzfu%C3%9F" target="_blank">de.wikipedia.org/wiki/Zinnaer Münzfuß</a>. Dedicated wiki entry for the Zinnaer Vertrag 1667: «<i>Der Zinnaer Münzvertrag von 1667 wurde im Kloster Zinna ... zwischen Kurbrandenburg ... und Kursachsen geschlossen</i>». Important clarification on 9-Fuß status: «<i>Die beiden Staaten vereinbarten, als Münzfuß den 9-Talerfuß der Augsburger Reichsmünzordnung von 1559 beizubehalten, aber die Scheidemünzen im 10½-Talerfuß auszumünzen</i>» — i.e. the 9-Fuß is formally <em>not</em> abandoned, only the petty coinage moves to the lighter 10½-Fuß. Brunswick joins 1668: «<i>Mit dem Vertragsbeitritt des Herzogtums Braunschweig-Lüneburg im Jahr 1668 wurde zugleich vereinbart, den 10½-Talerfuß auch auf die Ausprägung der 2/3-, 1/3- und 1/6-Taler-Münzen anzuwenden</i>» — formally the ⅔-Taler-as-main-denomination phase begins 1668, not 1667.
      uk: |
