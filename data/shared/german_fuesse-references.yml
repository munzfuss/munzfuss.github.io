# References / Quellen — sources for the landing-page German Müntzfüße
# overview catalogue (data/shared/german_fuesse.yml). Each entry has an
# id (ref1, ref2, ...) and content in DE primarily; EN/UK can be added
# incrementally. Inline citations in the prose use
# `<sup><a href="#ref{N}">[N]</a></sup>`.
#
# Conventions (per CLAUDE.md §5):
# - Each entry names the source URL/work and the SPECIFIC claim it
#   backs in the catalogue prose.
# - When a source backs multiple claims, the entry lists them.
# - All entries here were added in the same session as the prose change
#   they support, while the source was open in the editor's context.

heading:
  de: "Quellen · Bibliographie"
  en: "Sources · Bibliography"
  uk: "Джерела · Бібліографія"

entries:
  - id: ref1
    content:
      de: |
        <b>Dukat (Münze)</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Dukat_(M%C3%BCnze)" target="_blank">de.wikipedia.org/wiki/Dukat (Münze)</a>. Hauptquelle für die Reichsdukatenfuß-Spezifikation: «<i>67 Stück sollten aus der rauhen Kölnischen Mark Gold ausgeprägt werden</i>». Backt: Cöllnische Marck rauh = 233,856 g · Raugewicht 3,49039 g · Feingehalt 23 Karat 8 Grän = 986 1/9 ‰ · Feingewicht 3,44191 g.
      en: |
        <b>Dukat (Münze)</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Dukat_(M%C3%BCnze)" target="_blank">de.wikipedia.org/wiki/Dukat (Münze)</a>. Primary source for the Reichsdukatenfuß specification: «<i>67 Stück sollten aus der rauhen Kölnischen Mark Gold ausgeprägt werden</i>». Backs: Cöllnische Marck rough = 233.856 g · rough weight 3.49039 g · fineness 23 carats 8 grains = 986 1/9 ‰ · fine weight 3.44191 g.
      uk: |
        <b>Dukat (Münze)</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Dukat_(M%C3%BCnze)" target="_blank">de.wikipedia.org/wiki/Dukat (Münze)</a>. Першоджерело специфікації Reichsdukatenfuß: «<i>67 Stück sollten aus der rauhen Kölnischen Mark Gold ausgeprägt werden</i>». Підтверджує: Кельнська марка повна = 233,856 г · повна вага 3,49039 г · проба 23 карати 8 гран = 986 1/9 ‰ · чиста вага 3,44191 г.

  - id: ref2
    content:
      de: |
        <b>Goldmark / Mark (1871)</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Goldmark" target="_blank">de.wikipedia.org/wiki/Goldmark</a>. Belegt: «<i>Der Ausdruck Goldmark entstand nach 1914 zur Unterscheidung gegenüber den durch Inflation entwerteten</i>» Papiermark · «<i>Die eigentliche Reichsmark wurde erst 1924 eingeführt</i>». Period-amtliche Bezeichnung 1871–1914: «Mark deutscher Reichswährung» — backt die Reichsgoldmünzfuß-Karte.
      en: |
        <b>Goldmark / Mark (1871)</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Goldmark" target="_blank">de.wikipedia.org/wiki/Goldmark</a>. Documents: «<i>Der Ausdruck Goldmark entstand nach 1914 zur Unterscheidung gegenüber den durch Inflation entwerteten</i>» Papiermark; «<i>Die eigentliche Reichsmark wurde erst 1924 eingeführt</i>». Period-official name 1871–1914: «Mark deutscher Reichswährung» — backs the Reichsgoldmünzfuß card.
      uk: |
        <b>Goldmark / Mark (1871)</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Goldmark" target="_blank">de.wikipedia.org/wiki/Goldmark</a>. Підтверджує: «<i>Der Ausdruck Goldmark entstand nach 1914 zur Unterscheidung gegenüber den durch Inflation entwerteten</i>» Papiermark; «<i>Die eigentliche Reichsmark wurde erst 1924 eingeführt</i>». Період-офіційна назва 1871–1914: «Mark deutscher Reichswährung» — підстава для картки Reichsgoldmünzfuß.

  - id: ref3
    content:
      de: |
        <b>Wiener Münzvertrag</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Wiener_M%C3%BCnzvertrag" target="_blank">de.wikipedia.org/wiki/Wiener Münzvertrag</a>. Drei parallele Müntzfüße auf Zollpfund-Basis (500 g Feinsilber): <b>30-Taler-Fuß</b> (Norddeutschland), <b>52½-Gulden-Fuß</b> (Süddeutschland), <b>45-Gulden-Fuß</b> (Österreich); Vereinstaler als Brückenmünze. Backt die drei numerischen Synonyme im Vereinsmüntzfuß-name.
      en: |
        <b>Wiener Münzvertrag</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Wiener_M%C3%BCnzvertrag" target="_blank">de.wikipedia.org/wiki/Wiener Münzvertrag</a>. Three parallel Müntzfüße on the Zollpfund base (500 g fine silver): <b>30-Taler-Fuß</b> (North Germany), <b>52½-Gulden-Fuß</b> (South Germany), <b>45-Gulden-Fuß</b> (Austria); Vereinstaler as bridge coin. Backs the three numeric synonyms in the Vereinsmüntzfuß `name`.
      uk: |
        <b>Wiener Münzvertrag</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Wiener_M%C3%BCnzvertrag" target="_blank">de.wikipedia.org/wiki/Wiener Münzvertrag</a>. Три паралельні Müntzfüße на основі Zollpfund (500 г чистого срібла): <b>30-Taler-Fuß</b> (Північна Німеччина), <b>52½-Gulden-Fuß</b> (Південна Німеччина), <b>45-Gulden-Fuß</b> (Австрія); Vereinstaler як містова монета. Підстава для трьох числових синонімів у `name` Vereinsmüntzfuß.

  - id: ref4
    content:
      de: |
        <b>Wiener Münzvertrag von 1857</b> — MGM Münzlexikon: <a href="https://www.mgmindex.de/index.php?title=Wiener_M%C3%BCnzvertrag_von_1857" target="_blank">mgmindex.de</a>. Verwendet «Vereinstaler / Vereinsdoppeltaler / Vereinskrone» als kanonische Bezeichnungen; «Zollpfund» nur als Gewichtseinheit (500 g), nicht als Müntzfuß-Suffix. Beleg dafür, dass «Zollpfundfuß» kein period-amtlicher Begriff ist (vgl. CLAUDE.md §0 «no invention»).
      en: |
        <b>Wiener Münzvertrag von 1857</b> — MGM Münzlexikon: <a href="https://www.mgmindex.de/index.php?title=Wiener_M%C3%BCnzvertrag_von_1857" target="_blank">mgmindex.de</a>. Uses «Vereinstaler / Vereinsdoppeltaler / Vereinskrone» as the canonical names; «Zollpfund» only as a weight unit (500 g), not as a Müntzfuß suffix. Evidence that «Zollpfundfuß» is not a period-attested term (cf. CLAUDE.md §0 «no invention»).
      uk: |
        <b>Wiener Münzvertrag von 1857</b> — MGM Münzlexikon: <a href="https://www.mgmindex.de/index.php?title=Wiener_M%C3%BCnzvertrag_von_1857" target="_blank">mgmindex.de</a>. Використовує «Vereinstaler / Vereinsdoppeltaler / Vereinskrone» як канонічні назви; «Zollpfund» — лише як одиницю ваги (500 г), не як суфікс Müntzfuß. Доказ, що «Zollpfundfuß» не є період-атестованим терміном (пор. CLAUDE.md §0 «no invention»).

  - id: ref5
    content:
      de: |
        <b>Blutdollar</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Blutdollar" target="_blank">de.wikipedia.org/wiki/Blutdollar</a>. «<i>Der Blutdollar oder Sterntaler ist ein ausgeprägter Rechnungstaler im 13⅓ Talerfuß zu 24 Gute Groschen</i>». Belegt 13⅓-Talerfuß als period-korrekte numerische Bezeichnung der Conventionscouranttaler-Stufe; «Konventionscouranttaler» = Münzname (24-Groschen-Variante gegenüber Konventionstaler bei 32 Groschen), nicht eigenständige Müntzfuß-Bezeichnung.
      en: |
        <b>Blutdollar</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Blutdollar" target="_blank">de.wikipedia.org/wiki/Blutdollar</a>. «<i>Der Blutdollar oder Sterntaler ist ein ausgeprägter Rechnungstaler im 13⅓ Talerfuß zu 24 Gute Groschen</i>». Establishes 13⅓-Talerfuß as the period-correct numeric designation; «Konventionscouranttaler» is the COIN name (24-Groschen variant vs. Konventionstaler at 32 Groschen), not a separate Müntzfuß designation.
      uk: |
        <b>Blutdollar</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Blutdollar" target="_blank">de.wikipedia.org/wiki/Blutdollar</a>. «<i>Der Blutdollar oder Sterntaler ist ein ausgeprägter Rechnungstaler im 13⅓ Talerfuß zu 24 Gute Groschen</i>». Підтверджує 13⅓-Talerfuß як період-правильну числову назву; «Konventionscouranttaler» — це назва МОНЕТИ (24-Groschen-варіант на відміну від Konventionstaler при 32 Groschen), а не окрема назва Müntzfuß.

  - id: ref6
    content:
      de: |
        Hagen Bobzin: <b>Münzfüße · Geschichte einiger europäischer Währungen</b> — <a href="http://www.hagen-bobzin.de/hobby/muenzfuesse.html" target="_blank">hagen-bobzin.de/hobby/muenzfuesse.html</a>. «<i>Konventionsfuß von 1753 legt einen 20-Guldenfuß (13⅓-Talerfuß bzw. 10-Talerfuß für den Konventionstaler) fest</i>» — bestätigt 13⅓-Talerfuß als alternative numerische Form des Konventionsfußes ohne separate «-Fuß»-Bezeichnung. Belegt zugleich «Conventions-Courant-Fuß» als nicht period-amtlich.<br>Backt zudem für die 9-Fuß-Karte: «<i>Der Reichstag zu Augsburg (1566) beschließt, im Heiligen Römischen Reich den Reichstaler im 9-Talerfuß zu prägen.</i>», «<i>Der Leipziger Fuß ist 1690 zwischen Kurbrandenburg, Kursachsen und Braunschweig-Lüneburg vereinbart worden</i>», «<i>Der Leipziger Fuß wird 1738 zum Reichsfuß erhoben</i>», «<i>Der österreichisch-bayrische Konventionsfuß von 1753</i>».
      en: |
        Hagen Bobzin: <b>Münzfüße · Geschichte einiger europäischer Währungen</b> — <a href="http://www.hagen-bobzin.de/hobby/muenzfuesse.html" target="_blank">hagen-bobzin.de/hobby/muenzfuesse.html</a>. «<i>Konventionsfuß von 1753 legt einen 20-Guldenfuß (13⅓-Talerfuß bzw. 10-Talerfuß für den Konventionstaler) fest</i>» — confirms 13⅓-Talerfuß as an alternative numeric form of the Konventionsfuß without a separate «-Fuß» designation. Also evidence against «Conventions-Courant-Fuß» as a period-attested term.<br>Also backs the 9-Fuß card: «<i>Der Reichstag zu Augsburg (1566) beschließt, im Heiligen Römischen Reich den Reichstaler im 9-Talerfuß zu prägen.</i>», «<i>Der Leipziger Fuß ist 1690 zwischen Kurbrandenburg, Kursachsen und Braunschweig-Lüneburg vereinbart worden</i>», «<i>Der Leipziger Fuß wird 1738 zum Reichsfuß erhoben</i>», «<i>Der österreichisch-bayrische Konventionsfuß von 1753</i>».
      uk: |
        Hagen Bobzin: <b>Münzfüße · Geschichte einiger europäischer Währungen</b> — <a href="http://www.hagen-bobzin.de/hobby/muenzfuesse.html" target="_blank">hagen-bobzin.de/hobby/muenzfuesse.html</a>. «<i>Konventionsfuß von 1753 legt einen 20-Guldenfuß (13⅓-Talerfuß bzw. 10-Talerfuß für den Konventionstaler) fest</i>» — підтверджує 13⅓-Talerfuß як альтернативну числову форму Konventionsfuß без окремої «-Fuß»-назви. Водночас доказ, що «Conventions-Courant-Fuß» — не період-атестований термін.<br>Підтверджує також для 9-Fuß-картки: «<i>Der Reichstag zu Augsburg (1566) beschließt, im Heiligen Römischen Reich den Reichstaler im 9-Talerfuß zu prägen.</i>», «<i>Der Leipziger Fuß ist 1690 zwischen Kurbrandenburg, Kursachsen und Braunschweig-Lüneburg vereinbart worden</i>», «<i>Der Leipziger Fuß wird 1738 zum Reichsfuß erhoben</i>», «<i>Der österreichisch-bayrische Konventionsfuß von 1753</i>».

  - id: ref7
    content:
      de: |
        <b>Meyers Konversationslexikon 1888 — Müntzfuß</b> (Wikisource): <a href="https://de.wikisource.org/wiki/MKL1888:M%C3%BCnzfu%C3%9F" target="_blank">de.wikisource.org/wiki/MKL1888:Münzfuß</a>. Period-Enzyklopädie zur Müntzfuß-Terminologie. «<i>der Konventions- oder 20-Guldenfuß, nach welchem … die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>» — keine separate «-Courant-Fuß»-Bezeichnung in der zeitgenössischen Quelle.
      en: |
        <b>Meyers Konversationslexikon 1888 — Müntzfuß</b> (Wikisource): <a href="https://de.wikisource.org/wiki/MKL1888:M%C3%BCnzfu%C3%9F" target="_blank">de.wikisource.org/wiki/MKL1888:Münzfuß</a>. Period encyclopaedia for Müntzfuß terminology. «<i>der Konventions- oder 20-Guldenfuß, nach welchem … die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>» — no separate «-Courant-Fuß» term in the period source.
      uk: |
        <b>Meyers Konversationslexikon 1888 — Müntzfuß</b> (Wikisource): <a href="https://de.wikisource.org/wiki/MKL1888:M%C3%BCnzfu%C3%9F" target="_blank">de.wikisource.org/wiki/MKL1888:Münzfuß</a>. Період-енциклопедія з термінології Müntzfuß. «<i>der Konventions- oder 20-Guldenfuß, nach welchem … die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>» — у період-джерелі немає окремої «-Courant-Fuß»-назви.

  - id: ref8
    content:
      de: |
        Hagen Bobzin: <b>Lübisches Münzsystem · Wendischer Münzverein</b> — <a href="https://www.hagen-bobzin.de/hobby/muenzverein_wendisch.html" target="_blank">hagen-bobzin.de/hobby/muenzverein_wendisch.html</a>. Persönlicher numismatischer Blog. Tabelliert «1769 Hamburger Bankfuß 27⅝ / 1777 Altonaer Bankfuß 27¾» und «1726 Hamburger Courantfuß 34 Mark Courant». <em>Vorsicht:</em> die Zwei-Datums-Tabelle Hamburg/Altona kollidiert mit Soetbeer 1869 und Meyers 1907 — wahrscheinlich verwechselt Bobzin Hamburgs Bid/Ask-Spread (27⅝/27¾, gemeinsam aus der Reform von 1770) mit zwei eigenständigen Banco-Füßen, und datiert die Altonaer Bankgründung auf 1777 statt 1776. Für den 1726er Lübisch-Hamburger 34-Mark-Fuß bleibt diese Quelle zuverlässig (siehe ref14 unten für die Hamburg-Bank-Korrekturen).
      en: |
        Hagen Bobzin: <b>Lübisches Münzsystem · Wendischer Münzverein</b> — <a href="https://www.hagen-bobzin.de/hobby/muenzverein_wendisch.html" target="_blank">hagen-bobzin.de/hobby/muenzverein_wendisch.html</a>. Personal numismatic blog. Tabulates «1769 Hamburger Bankfuß 27⅝ / 1777 Altonaer Bankfuß 27¾» and «1726 Hamburger Courantfuß 34 Mark Courant». <em>Caveat:</em> the two-date Hamburg/Altona table collides with Soetbeer 1869 and Meyers 1907 — Bobzin most likely conflates Hamburg's bid/ask spread (27⅝/27¾, jointly from the 1770 reform) with two separate Banco-Füße, and dates the Altona bank's founding to 1777 instead of 1776. For the 1726 Lübisch-Hamburg 34-Marck standard the source remains reliable (see ref14 below for the Hamburg-Bank corrections).
      uk: |
        Hagen Bobzin: <b>Lübisches Münzsystem · Wendischer Münzverein</b> — <a href="https://www.hagen-bobzin.de/hobby/muenzverein_wendisch.html" target="_blank">hagen-bobzin.de/hobby/muenzverein_wendisch.html</a>. Особистий нумізматичний блог. Таблицює «1769 Hamburger Bankfuß 27⅝ / 1777 Altonaer Bankfuß 27¾» і «1726 Hamburger Courantfuß 34 Mark Courant». <em>Застереження:</em> двохдатна Hamburg/Altona-таблиця суперечить Soetbeer 1869 та Meyers 1907 — Bobzin, найімовірніше, плутає Hamburgs bid/ask-spread (27⅝/27¾, разом з реформи 1770) з двома окремими Banco-Füße і датує заснування Альтонського банку 1777-м замість 1776. Для Lübisch-Hamburger 34-маркового стандарту 1726 року це джерело надійне (див. ref14 нижче для уточнення про Hamburger Bank).

  - id: ref9
    content:
      de: |
        <b>Schleswig-Holsteinische Speciesbank</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank" target="_blank">de.wikipedia.org/wiki/Schleswig-Holsteinische Speciesbank</a>. Gegründet 29. Februar 1788 in Altona; erste Banknoten in Thaler Specie und Schilling Schleswig-Holsteinisch Courant; Aufgehen in der Rigsbank 1813 nach dem dänischen Staatsbankrott.
      en: |
        <b>Schleswig-Holsteinische Speciesbank</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank" target="_blank">de.wikipedia.org/wiki/Schleswig-Holsteinische Speciesbank</a>. Founded 29 February 1788 in Altona; first banknotes in Thaler Specie and Schilling Schleswig-Holsteinisch Courant; absorbed by the Rigsbank in 1813 after the Danish state bankruptcy.
      uk: |
        <b>Schleswig-Holsteinische Speciesbank</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank" target="_blank">de.wikipedia.org/wiki/Schleswig-Holsteinische Speciesbank</a>. Заснована 29 лютого 1788 в Альтоні; перші банкноти у Thaler Specie та Schilling Schleswig-Holsteinisch Courant; влита у Rigsbank 1813 після данського державного банкрутства.

  - id: ref10
    content:
      de: |
        <b>Königliche Münze zu Altona</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/K%C3%B6nigliche_M%C3%BCnze_zu_Altona" target="_blank">de.wikipedia.org/wiki/Königliche Münze zu Altona</a>. Eröffnet 1771 unter Christian VII.; Hauptprägestätte für die Schleswig-Holsteinische Specie- und Courant-Währung 1788–1849; Schließung 1863 nach dem Mint-Umbau 1855–56 und der internationalen Geldkrise 1857.
      en: |
        <b>Königliche Münze zu Altona</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/K%C3%B6nigliche_M%C3%BCnze_zu_Altona" target="_blank">de.wikipedia.org/wiki/Königliche Münze zu Altona</a>. Opened 1771 under Christian VII; principal mint for the Schleswig-Holstein Specie and Courant currency 1788–1849; closed 1863 after the 1855–56 mint rebuild and the international monetary crisis of 1857.
      uk: |
        <b>Königliche Münze zu Altona</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/K%C3%B6nigliche_M%C3%BCnze_zu_Altona" target="_blank">de.wikipedia.org/wiki/Königliche Münze zu Altona</a>. Відкрито 1771 за Крістіана VII; головний монетний двір для шлезвіг-гольштейнських Specie та Courant валют 1788–1849; закриття 1863 після перебудови двору 1855–56 та міжнародної грошової кризи 1857.

  - id: ref11
    content:
      de: |
        <b>Hamburger Bank</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Hamburger_Bank" target="_blank">de.wikipedia.org/wiki/Hamburger Bank</a>. Gegründet 2. März 1619 nach dem Vorbild der Amsterdamer Wisselbank; reine Giro- und Wechselbank ohne eigene Münzprägung; Mark Banco als Recheneinheit; Aufhebung am 31. Dezember 1875 (Aufgehen in der Reichsbank).
      en: |
        <b>Hamburger Bank</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Hamburger_Bank" target="_blank">de.wikipedia.org/wiki/Hamburger Bank</a>. Founded 2 March 1619 on the model of the Amsterdam Wisselbank; pure giro and exchange bank, no own coinage; Mark Banco as unit of account; dissolved 31 December 1875 (absorbed by the Reichsbank).
      uk: |
        <b>Hamburger Bank</b> — Wikipedia (DE): <a href="https://de.wikipedia.org/wiki/Hamburger_Bank" target="_blank">de.wikipedia.org/wiki/Hamburger Bank</a>. Заснований 2 березня 1619 за зразком Amsterdamer Wisselbank; суто розрахунково-обмінний банк без власного карбування; Mark Banco як розрахункова одиниця; ліквідовано 31 грудня 1875 (влитий у Reichsbank).

  - id: ref12
    content:
      de: |
        <b>Adolf Soetbeer</b>: <i>Denkschrift betreffend deutsche Münzeinigung</i>. Berlin (Liebheit & Thiesen) 1869 — <a href="https://archive.org/details/bub_gb_O-BvAAAAIAAJ" target="_blank">archive.org</a>. Period-Hauptquelle (Soetbeer war Archivar der Hamburger Commerz-Deputation): «<i>In Hamburg besteht … eine auf Feinsilber in Barren begründete besondere Hamburger Bankvaluta, 59⅓ Mark auf das Zollpfund Feinsilber.</i>» Umrechnung 59⅓ × 233,856/500 ≈ 27,74 ≈ <b>27¾</b> M.B./Cölln. Marck — Soetbeer kennt nur <em>einen</em> Hamburger Bankfuß und nennt keinen 1777-Übergang.
      en: |
        <b>Adolf Soetbeer</b>: <i>Denkschrift betreffend deutsche Münzeinigung</i>. Berlin (Liebheit & Thiesen) 1869 — <a href="https://archive.org/details/bub_gb_O-BvAAAAIAAJ" target="_blank">archive.org</a>. Period primary source (Soetbeer was archivist of the Hamburg Commerz-Deputation): «<i>In Hamburg besteht … eine auf Feinsilber in Barren begründete besondere Hamburger Bankvaluta, 59⅓ Mark auf das Zollpfund Feinsilber.</i>» Conversion: 59⅓ × 233.856/500 ≈ 27.74 ≈ <b>27¾</b> M.B. per Cölln. Marck — Soetbeer documents only ONE Hamburger Bankfuß and references no 1777 transition.
      uk: |
        <b>Adolf Soetbeer</b>: <i>Denkschrift betreffend deutsche Münzeinigung</i>. Berlin (Liebheit & Thiesen) 1869 — <a href="https://archive.org/details/bub_gb_O-BvAAAAIAAJ" target="_blank">archive.org</a>. Період-першоджерело (Soetbeer був архіваріусом Hamburger Commerz-Deputation): «<i>In Hamburg besteht … eine auf Feinsilber in Barren begründete besondere Hamburger Bankvaluta, 59⅓ Mark auf das Zollpfund Feinsilber.</i>» Перерахунок: 59⅓ × 233,856/500 ≈ 27,74 ≈ <b>27¾</b> M.B. на Кельнську марку — Soetbeer фіксує ОДИН Hamburger Bankfuß і не згадує жодного переходу 1777.

  - id: ref13
    content:
      de: |
        <b>Meyers Großes Konversations-Lexikon</b>, Bd. 8 (Leipzig 1907), S. 690 — <a href="http://www.zeno.org/Meyers-1905/A/Hamburger%20Bankfu%C3%9F" target="_blank">zeno.org/Meyers-1905</a>. Period-Enzyklopädie zum kanonischen Hamburger Bankfuß: «<i>Hamburger Bankfuß, Rechnungsmünzfuß der frühern Hamburger Girobank: <b>27¾ Bankmark</b> auf eine Mark Feinsilber.</i>» — eindeutig <em>ein</em> Wert für die Hamburger Bank.
      en: |
        <b>Meyers Großes Konversations-Lexikon</b>, vol. 8 (Leipzig 1907), p. 690 — <a href="http://www.zeno.org/Meyers-1905/A/Hamburger%20Bankfu%C3%9F" target="_blank">zeno.org/Meyers-1905</a>. Period encyclopaedia on the canonical Hamburger Bankfuß: «<i>Hamburger Bankfuß, the unit-of-account standard of the former Hamburger Girobank: <b>27¾ Bankmark</b> per Mark of fine silver.</i>» — unambiguously a SINGLE value for the Hamburger Bank.
