        <b>Wikipedia DE «Sächsische Münzgeschichte»</b> — <a href="https://de.wikipedia.org/wiki/S%C3%A4chsische_M%C3%BCnzgeschichte" target="_blank">de.wikipedia.org/wiki/Sächsische Münzgeschichte</a>. Quelle für den entscheidenden Saxon-Pivot 1667: «<i>kam es zur zweiten oder kleinen Kipperzeit, die allerdings Kurbrandenburg und Kursachsen verhinderten, indem sie in Zinna 1667 einen Münzfuß vereinbarten</i>»; «<i>Der ⅔ Taler (⅔ Kuranttaler) oder Gulden zu 16 Groschen wurde das neue Hauptnominal. Der Kuranttaler zu 24 Groschen, bisher Reichstaler genannt, wurde bis auf wenige Ausnahmen nicht ausgeprägt</i>»; «<i>Der Reichstaler wurde lediglich für die Zahlungsverpflichtung der sächsischen Bergbauverwaltung als Speciesreichstaler zu 28 Groschen weitergeprägt</i>». Klärt das 1690er Verhältnis: «<i>Die Speciesreichstaler wurden weiterhin im Reichsmünzfuß geprägt, jedoch mit erhöhtem Wert zu 32 Groschen</i>» — d. h. nach 1690 Speciesreichstaler weiter im 9-Fuß, nur mit Tarif-Revaluation. Datierungs-Variante: «<i>den der Regensburger Reichstag 1735 zum neuen Münzfuß erklärte</i>» — Sächs. Wiki nennt 1735, Wikipedia DE «Leipziger Fuß» und Bobzin nennen 1738.
      en: |
        <b>Wikipedia DE «Sächsische Münzgeschichte»</b> — <a href="https://de.wikipedia.org/wiki/S%C3%A4chsische_M%C3%BCnzgeschichte" target="_blank">de.wikipedia.org/wiki/Sächsische Münzgeschichte</a>. Source for the decisive Saxon pivot 1667: «<i>kam es zur zweiten oder kleinen Kipperzeit, die allerdings Kurbrandenburg und Kursachsen verhinderten, indem sie in Zinna 1667 einen Münzfuß vereinbarten</i>»; «<i>Der ⅔ Taler (⅔ Kuranttaler) oder Gulden zu 16 Groschen wurde das neue Hauptnominal. Der Kuranttaler zu 24 Groschen, bisher Reichstaler genannt, wurde bis auf wenige Ausnahmen nicht ausgeprägt</i>»; «<i>Der Reichstaler wurde lediglich für die Zahlungsverpflichtung der sächsischen Bergbauverwaltung als Speciesreichstaler zu 28 Groschen weitergeprägt</i>». Clarifies the 1690 relationship: «<i>Die Speciesreichstaler wurden weiterhin im Reichsmünzfuß geprägt, jedoch mit erhöhtem Wert zu 32 Groschen</i>» — i.e. after 1690 Speciesreichstaler continue in the 9-Fuß with tariff revaluation only. Dating variant: «<i>den der Regensburger Reichstag 1735 zum neuen Münzfuß erklärte</i>» — Sax. Wiki says 1735, Wikipedia DE «Leipziger Fuß» and Bobzin say 1738.
      uk: |
        <b>Wikipedia DE «Sächsische Münzgeschichte»</b> — <a href="https://de.wikipedia.org/wiki/S%C3%A4chsische_M%C3%BCnzgeschichte" target="_blank">de.wikipedia.org/wiki/Sächsische Münzgeschichte</a>. Джерело для вирішального саксонського переломного моменту 1667: «<i>kam es zur zweiten oder kleinen Kipperzeit, die allerdings Kurbrandenburg und Kursachsen verhinderten, indem sie in Zinna 1667 einen Münzfuß vereinbarten</i>»; «<i>Der ⅔ Taler (⅔ Kuranttaler) oder Gulden zu 16 Groschen wurde das neue Hauptnominal. Der Kuranttaler zu 24 Groschen, bisher Reichstaler genannt, wurde bis auf wenige Ausnahmen nicht ausgeprägt</i>»; «<i>Der Reichstaler wurde lediglich für die Zahlungsverpflichtung der sächsischen Bergbauverwaltung als Speciesreichstaler zu 28 Groschen weitergeprägt</i>». Уточнює 1690-відносини: «<i>Die Speciesreichstaler wurden weiterhin im Reichsmünzfuß geprägt, jedoch mit erhöhtem Wert zu 32 Groschen</i>» — тобто після 1690 Speciesreichstaler-и далі в 9-Fuß, лише з тарифною ревалоризацією. Варіант датування: «<i>den der Regensburger Reichstag 1735 zum neuen Münzfuß erklärte</i>» — Сакс. Вікі каже 1735, Wikipedia DE «Leipziger Fuß» і Bobzin кажуть 1738.

