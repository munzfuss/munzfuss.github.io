  - id: ref26
    content:
      de: |
        <b>Meyers Großes Konversations-Lexikon, 4. Aufl. (1885–1892), s.v. «Münzfuß»</b> — eLexikon: <a href="https://elexikon.ch/Leipziger+M%C3%BCnzfu%C3%9F" target="_blank">elexikon.ch/Leipziger Münzfuß</a> (verweist auf den Müntzfuß-Hauptartikel Bd. 11, S. 890). Period-Lexikon des späten 19. Jh., backt verbatim alle vier Anker-Daten der Müntzfuß-Geschichte: <em>Zinna 1667</em> «<i>der zwischen Sachsen und Brandenburg 1667 verabredete sogen. zinnaische Münzfuß, nach welchem die Mark Silber zu 10½ Thlr. oder 15¾ Guld. ausgeprägt wurde</i>»; <em>Leipziger 1690 + 1738 Erhebung</em> «<i>der Leipziger oder 18-Guldenfuß von 1690, der die Mark zu 12 Thlr. oder 18 Guld. ausbrachte, und der zwar 1738 zum Reichsfuß erhoben, aber nicht allgemein eingeführt wurde</i>»; <em>Konvention 1753 + 1763 Diffusion</em> «<i>der Konventions- oder 20-Guldenfuß, nach welchem infolge einer 1753 zwischen Österreich und Bayern abgeschlossenen Konvention, welcher später bis 1763 der bayrische, schwäbische, ober- und niederrheinische Kreis sowie der Kurfürst und die Herzöge von Sachsen beitraten, die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>»; <em>Graumann 1750 + 1764</em> «<i>der preußische oder (nach dem damaligen Generalmünzdirektor Philipp Graumann genannte) Graumannsche Münzfuß von 1750 (durch das Edikt vom 29. März 1764 fester gestaltet), nach welchem die Mark zu 14 Thlr. ausgeprägt wurde</i>». Wichtige Period-Beobachtung: 1738 war «aber nicht allgemein eingeführt» — die Reichsfuß-Erhebung war formal, nicht Empire-weit durchgesetzt.
      en: |
        <b>Meyers Großes Konversations-Lexikon, 4th ed. (1885–1892), s.v. «Münzfuß»</b> — eLexikon: <a href="https://elexikon.ch/Leipziger+M%C3%BCnzfu%C3%9F" target="_blank">elexikon.ch/Leipziger Münzfuß</a> (cross-refers to the Müntzfuß main article, vol. 11, p. 890). Period encyclopaedia of the late 19th century, backs verbatim all four anchor dates of Müntzfuß history: <em>Zinna 1667</em> «<i>der zwischen Sachsen und Brandenburg 1667 verabredete sogen. zinnaische Münzfuß, nach welchem die Mark Silber zu 10½ Thlr. oder 15¾ Guld. ausgeprägt wurde</i>»; <em>Leipziger 1690 + 1738 erhebung</em> «<i>der Leipziger oder 18-Guldenfuß von 1690, der die Mark zu 12 Thlr. oder 18 Guld. ausbrachte, und der zwar 1738 zum Reichsfuß erhoben, aber nicht allgemein eingeführt wurde</i>»; <em>Convention 1753 + 1763 diffusion</em> «<i>der Konventions- oder 20-Guldenfuß, nach welchem infolge einer 1753 zwischen Österreich und Bayern abgeschlossenen Konvention, welcher später bis 1763 der bayrische, schwäbische, ober- und niederrheinische Kreis sowie der Kurfürst und die Herzöge von Sachsen beitraten, die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>»; <em>Graumann 1750 + 1764</em> «<i>der preußische oder (nach dem damaligen Generalmünzdirektor Philipp Graumann genannte) Graumannsche Münzfuß von 1750 (durch das Edikt vom 29. März 1764 fester gestaltet), nach welchem die Mark zu 14 Thlr. ausgeprägt wurde</i>». Key period observation: 1738 was «aber nicht allgemein eingeführt» — the Reichsfuß elevation was formal, not Empire-wide enforced.
      uk: |
        <b>Meyers Großes Konversations-Lexikon, 4-те вид. (1885–1892), s.v. «Münzfuß»</b> — eLexikon: <a href="https://elexikon.ch/Leipziger+M%C3%BCnzfu%C3%9F" target="_blank">elexikon.ch/Leipziger Münzfuß</a> (відсилає до головної статті Müntzfuß, т. 11, с. 890). Період-енциклопедія кінця XIX ст., підтверджує verbatim усі чотири якірних дати історії Müntzfuß: <em>Zinna 1667</em> «<i>der zwischen Sachsen und Brandenburg 1667 verabredete sogen. zinnaische Münzfuß, nach welchem die Mark Silber zu 10½ Thlr. oder 15¾ Guld. ausgeprägt wurde</i>»; <em>Leipziger 1690 + 1738 erhebung</em> «<i>der Leipziger oder 18-Guldenfuß von 1690, der die Mark zu 12 Thlr. oder 18 Guld. ausbrachte, und der zwar 1738 zum Reichsfuß erhoben, aber nicht allgemein eingeführt wurde</i>»; <em>Конвенція 1753 + 1763 поширення</em> «<i>der Konventions- oder 20-Guldenfuß, nach welchem infolge einer 1753 zwischen Österreich und Bayern abgeschlossenen Konvention, welcher später bis 1763 der bayrische, schwäbische, ober- und niederrheinische Kreis sowie der Kurfürst und die Herzöge von Sachsen beitraten, die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>»; <em>Graumann 1750 + 1764</em> «<i>der preußische oder (nach dem damaligen Generalmünzdirektor Philipp Graumann genannte) Graumannsche Münzfuß von 1750 (durch das Edikt vom 29. März 1764 fester gestaltet), nach welchem die Mark zu 14 Thlr. ausgeprägt wurde</i>». Ключове період-спостереження: 1738 було «aber nicht allgemein eingeführt» — піднесення до Reichsfuß'у було формальним, не загальноімперським.
