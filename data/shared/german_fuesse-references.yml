        <b>DeWiki «Taler»</b> — <a href="https://dewiki.de/Lexikon/Taler" target="_blank">dewiki.de/Lexikon/Taler</a>. Backt das Bild des graduellen Volumenrückgangs für ganz Norddeutschland: «<i>Ganze Reichstaler nach dem Reichsmünzfuß wurden zusehends weniger ausgeprägt</i>» (qualitative Beschreibung des 17.-Jh.-Trends, kein 1690-Schalter); «<i>Diese Zweidritteltaler wurden für längere Zeit ein vorherrschender Münztypus in Norddeutschland</i>» (post-1667-Bild). Zugleich Beleg für die Substitution des Reichsthaler-Hauptumlaufs durch Écus blancs: «<i>Vor allem die seit 1641 geprägten französischen Taler, die Écus blancs, bildeten in der ersten Hälfte des 18. Jahrhunderts in weiten Theilen Deutschlands die Hauptumlaufmünze</i>».
      en: |
        <b>DeWiki «Taler»</b> — <a href="https://dewiki.de/Lexikon/Taler" target="_blank">dewiki.de/Lexikon/Taler</a>. Backs the picture of gradual volume decline for all of Northern Germany: «<i>Ganze Reichstaler nach dem Reichsmünzfuß wurden zusehends weniger ausgeprägt</i>» (qualitative description of the 17th-c. trend, not a 1690 switch); «<i>Diese Zweidritteltaler wurden für längere Zeit ein vorherrschender Münztypus in Norddeutschland</i>» (post-1667 picture). Also documents substitution of the Reichsthaler-as-Hauptumlaufmünze by Écus blancs: «<i>Vor allem die seit 1641 geprägten französischen Taler, die Écus blancs, bildeten in der ersten Hälfte des 18. Jahrhunderts in weiten Teilen Deutschlands die Hauptumlaufmünze</i>».
      uk: |
