        <b>Meyers Großes Konversations-Lexikon</b>, т. 8 (Leipzig 1907), с. 690 — <a href="http://www.zeno.org/Meyers-1905/A/Hamburger%20Bankfu%C3%9F" target="_blank">zeno.org/Meyers-1905</a>. Період-енциклопедія про канонічний Hamburger Bankfuß: «<i>Hamburger Bankfuß, Rechnungsmünzfuß колишньої Hamburger Girobank: <b>27¾ Bankmark</b> на марку чистого срібла.</i>» — однозначно ОДНЕ значення для Hamburger Bank.

  - id: ref14
    content:
      de: |
        <b>William Arthur Shaw</b>: <i>The History of Currency 1252–1894</i>. London 1896, S. 387 — Google Books id <i>GrJCAAAAIAAJ</i>. Belegt, dass <b>27⅝ und 27¾ Mark Banco Bid/Ask eines einzigen Reformakts (1770)</b> sind, nicht zwei Phasen: «<i>by 1770 the surviving supply of these coins have been reduced in weight to around 25.4 g. Henceforth the bank has turned to accepting bullion as well as coin, with each Cologne mark of silver bought for 27⅝ marks banco (9⁵⁄₂₄ thalers) and sold for 27¾ marks (9¼ thalers).</i>» Auflösung der Bobzin-Datierungsdiskrepanz.<br>Ergänzend: <b>Ulrich Bindseil</b>, <i>Central Banking Before 1800: A Rehabilitation</i>, Oxford University Press 2019, S. 99, 149: «<i>silver content created difficulties to the bank, which were eventually solved by the reform of 1770 in which the Marc Banco was no longer defined with the reference to any species, but in terms of fine silver content only (8.40 gram).</i>»<br>Ergänzend zur Altonaer Datierung: Wikipedia DE «Schleswig-Holsteinische Speciesbank»: «<i>Als erste Bank der Herzogtümer wurde 1776 die Species, Giro- und Leihbank zu Altona zur Förderung von Handel, Verkehr und Industrie eingerichtet.</i>» — die Altonaer Bank war 1776, nicht 1777.
      en: |
        <b>William Arthur Shaw</b>: <i>The History of Currency 1252–1894</i>. London 1896, p. 387 — Google Books id <i>GrJCAAAAIAAJ</i>. Documents that <b>27⅝ and 27¾ Mark Banco are the bid/ask spread of a single reform act (1770)</b>, not two phases: «<i>by 1770 the surviving supply of these coins have been reduced in weight to around 25.4 g. Henceforth the bank has turned to accepting bullion as well as coin, with each Cologne mark of silver bought for 27⅝ marks banco (9⁵⁄₂₄ thalers) and sold for 27¾ marks (9¼ thalers).</i>» Resolves Bobzin's dating discrepancy.<br>Supplementary: <b>Ulrich Bindseil</b>, <i>Central Banking Before 1800: A Rehabilitation</i>, OUP 2019, pp. 99, 149: «<i>silver content created difficulties to the bank, which were eventually solved by the reform of 1770 in which the Marc Banco was no longer defined with the reference to any species, but in terms of fine silver content only (8.40 gram).</i>»<br>On the Altona bank's founding date: Wikipedia DE «Schleswig-Holsteinische Speciesbank»: «<i>Als erste Bank der Herzogtümer wurde 1776 die Species, Giro- und Leihbank zu Altona … eingerichtet.</i>» — the Altona bank was founded 1776, not 1777.
      uk: |
        <b>William Arthur Shaw</b>: <i>The History of Currency 1252–1894</i>. London 1896, с. 387 — Google Books id <i>GrJCAAAAIAAJ</i>. Підтверджує, що <b>27⅝ і 27¾ Mark Banco — це bid/ask-spread однієї реформи (1770)</b>, а не дві фази: «<i>by 1770 the surviving supply of these coins have been reduced in weight to around 25.4 g. Henceforth the bank has turned to accepting bullion as well as coin, with each Cologne mark of silver bought for 27⅝ marks banco (9⁵⁄₂₄ thalers) and sold for 27¾ marks (9¼ thalers).</i>» Розвʼязує датувальну розбіжність у Bobzin.<br>Додатково: <b>Ulrich Bindseil</b>, <i>Central Banking Before 1800: A Rehabilitation</i>, OUP 2019, с. 99, 149: «<i>silver content created difficulties to the bank, which were eventually solved by the reform of 1770 in which the Marc Banco was no longer defined with the reference to any species, but in terms of fine silver content only (8.40 gram).</i>»<br>Щодо дати заснування Альтонського банку: Wikipedia DE «Schleswig-Holsteinische Speciesbank»: «<i>Als erste Bank der Herzogtümer wurde 1776 die Species, Giro- und Leihbank zu Altona … eingerichtet.</i>» — Альтонський банк заснований 1776, не 1777.

