          - key: {de: "Münzbeleg Sachsen-Weimar-Eisenach", en: Saxe-Weimar-Eisenach attestation, uk: Атестація Саксен-Веймар-Айзенаха}
            value: {de: "1760 · Aufschrift «13⅓ ST. EINE FEINE MARCK» · 17,539 g fein ✓ · einzige bekannte Prägung als vollwertiger Thaler mit expliziter Stufenangabe", en: 1760 · legend «13⅓ ST. EINE FEINE MARCK» · 17.539 g fine ✓ · sole known striking as a full-weight thaler with an explicit standard designation, uk: '1760 · напис «13⅓ ST. EINE FEINE MARCK» · 17,539 г чистого ✓ · єдине відоме карбування як повновагового Thaler з явним зазначенням стопи'}
          - key: {de: "Münzbeleg Hessen-Kassel · Sterntaler", en: Hesse-Kassel attestation · Sterntaler, uk: Атестація Гессен-Касселя · Sterntaler}
            value: {de: "Friedrich II. · 1776, 1778, 1779 · 750 ‰ (12 Lot) · 23,38 g rau → <b>17,535 g</b> fein ≈ 17,539 g ✓ (nach Gerhard Schön, DM 18. Jh.) · Wikipedia: «ausgeprägter Rechnungsthaler im 13⅓-Thalerfuß zu 24 Guten Groschen» · bekannt als «Blutdollar» (Nordamerika) und «Sterntaler» (Namensgeber des Grimm-Märchens)", en: 'Frederick II · 1776, 1778, 1779 · 750 ‰ (12 Lot) · 23.38 g rough → <b>17.535 g</b> fine ≈ 17.539 g ✓ (per Gerhard Schön, DM 18. Jh.) · Wikipedia: «struck as an accounting thaler on the 13⅓-Thalerfuß at 24 Gute Groschen» · known as the «Blood Dollar» (North America) and «Sterntaler» (eponym of the Grimm fairy tale)', uk: 'Фрідріх II · 1776, 1778, 1779 · 750 ‰ (12 Лот) · 23,38 г повної → <b>17,535 г</b> чистого ≈ 17,539 г ✓ (за Gerhard Schön, DM 18. Jh.) · Wikipedia: «карбувався як розрахунковий Thaler за 13⅓-Thalerfuß по 24 Gute Groschen» · відомий як «Кровний долар» (Північна Америка) і «Sterntaler» (епонім казки братів Грімм)'}
          - key: {de: "Münzbeleg Oldenburg", en: Oldenburg attestation, uk: Ольденбурзька атестація}
            value: {de: "Friedrich V. · ⅙ Thaler 1761, 1763–65 (500‰, 5,85 g rau → 2,925 g × 6 = 17,550 g ≈ 17,539 g ✓) · ⅟₁₂ Thaler 1761, 1763–64 (500‰, 2,92 g rau → 1,460 g × 12 = 17,520 g ≈ 17,539 g ✓) · Abweich. unter 0,11% = innerhalb Remedium · Scheidemünzen desselben Herrschers folgten einem ~14,5-Fuß (typisch für Billon)", en: "Frederick V · ⅙ Thaler 1761, 1763–65 (500‰, 5.85 g rough → 2.925 g × 6 = 17.550 g ≈ 17.539 g ✓) · ⅟₁₂ Thaler 1761, 1763–64 (500‰, 2.92 g rough → 1.460 g × 12 = 17.520 g ≈ 17.539 g ✓) · deviation under 0.11% = within tolerance · this ruler's petty coin followed a ~14.5 standard (typical for billon)", uk: 'Фрідріх V · ⅙ Thaler 1761, 1763–65 (500‰, 5,85 г повної → 2,925 г × 6 = 17,550 г ≈ 17,539 г ✓) · ⅟₁₂ Thaler 1761, 1763–64 (500‰, 2,92 г повної → 1,460 г × 12 = 17,520 г ≈ 17,539 г ✓) · відхилення менше 0,11% = в межах допуску · розмінні монети того ж правителя слідували ~14,5-стопі (типово для білону)'}
      - kind: prose
        label: {de: "Rechnungsfraktionen", en: "Accounting fractions", uk: "Розрахункові фракції"}
        content:
          de: |
            <b>1 Couranttaler</b> = 24 Gute Groschen = <b>17,53920 g</b> fein<br>
            <b>1 Conventionsthaler</b> = 1⅓ Couranttaler = 32 Gute Groschen = 23,38560 g fein<br>
            <b>Rechnungseinheit:</b> In ganz Norddeutschland (Sachsen, Braunschweig, Hannover, Oldenburg u. a.) wurde im Conventionsfuß-Raum in Couranttaler zu 24 Groschen gerechnet, obwohl der Thaler selbst meist nicht geprägt wurde.<br>
            <em>Benennung: «Conventionscouranttaler» (Münzkataloge) · «Rechnungsreichsthaler im Conventionsfuß» (Historiographie) · Als eigenständiger Münzfuß: 13⅓-Thalerfuß aus der feinen Marck</em>
          en: "<b>1 Couranttaler</b> = 24 Gute Groschen = <b>17.53920 g</b> fine<br>\n<b>1 Conventionsthaler</b> = 1⅓ Couranttaler = 32 Gute Groschen = 23.38560 g fine<br>\n<b>Accounting unit:</b> Throughout North Germany (Saxony, Brunswick, Hanover, Oldenburg etc.) reckoning in the Convention-standard region used the Couranttaler at 24 Groschen, even though the thaler itself was usually not struck.<br>\n<em>Naming: «Conventionscouranttaler» (mint catalogues) · «Accounting Reichsthaler in the Conventions-Fuß» (historiography) · as a separate standard: 13⅓-Thaler from the fine Marck</em>\n"
          uk: "<b>1 Couranttaler</b> = 24 Gute Groschen = <b>17,53920 г</b> чистого<br>\n<b>1 Conventionsthaler</b> = 1⅓ Couranttaler = 32 Gute Groschen = 23,38560 г чистого<br>\n<b>Розрахункова одиниця:</b> по всій Північній Німеччині (Саксонія, Брауншвайг, Ганновер, Ольденбург та ін.) у конвенційній зоні рахували в Couranttaler по 24 Groschen, хоча сам Thaler зазвичай не карбувався.<br>\n<em>Назва: «Conventionscouranttaler» (монетні каталоги) · «розрахунковий Reichsthaler у Конвенційній стопі» (історіографія) · як самостійна стопа: 13⅓-Thalerfuß з чистої Кельнської марки</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Als Rechnungseinheit:</b> Norddeutschland allgemein (Sachsen, Braunschweig, Hannover, Thüringen) — überall dort, wo nach Conventionsfuß gerechnet, aber in Guten Groschen zu 24/Thaler geteilt wurde.<br>
          <b>Sachsen-Weimar-Eisenach:</b> 1760 — einzige bekannte Prägung als vollwertiger Thaler (Aufschrift «13⅓ ST. EINE FEINE MARCK»).<br>
          <b>Hessen-Kassel:</b> 1776, 1778, 1779 — Sterntaler (Blutdollar), Friedrich II.; 750‰, 23,38 g rau, 17,535 g fein; ausgeprägt als «Rechnungsthaler» zu 24 Guten Groschen = 32 Hessen-Albus.<br>
          <b>Oldenburg:</b> 1761–1765 (⅙ und ⅟₁₂ Thaler, Friedrich V.) — Courantmünzen nach 13⅓-Fuß; nach 1800 Übergang auf 14-Thaler-Fuß.<br>
          <b>Bremen (Thaler Gold ab 1840):</b> 17,539 g = Raugewicht des bremischen Thaler Gold (986 1/9‰) — dieselbe Zahl, aber andere Logik: dort Raumark-Basis.
        en: |
          <b>As a unit of account:</b> Northern Germany generally (Saxony, Brunswick, Hanover, Thuringia) — wherever reckoning was on the Conventions-Fuß but divided into Gute Groschen at 24/Thaler.<br>
          <b>Saxe-Weimar-Eisenach:</b> 1760 — sole known striking as a full-weight thaler (legend «13⅓ ST. EINE FEINE MARCK»).<br>
          <b>Hesse-Kassel:</b> 1776, 1778, 1779 — Sterntaler (Blood Dollar), Frederick II; 750‰, 23.38 g rough, 17.535 g fine; struck as a «unit-of-account thaler» at 24 Gute Groschen = 32 Hesse-Albus.<br>
          <b>Oldenburg:</b> 1761–1765 (⅙ and ⅟₁₂ Thaler, Frederick V) — Courant coins on the 13⅓ standard; after 1800 shifted to the 14-Thalerfuß.<br>
          <b>Bremen (Thaler Gold from 1840):</b> 17.539 g = rough weight of the Bremen Thaler Gold (986 1/9‰) — same number, different logic: there it derives from the rough mark.
        uk: |
          <b>Як розрахункова одиниця:</b> Північна Німеччина загалом (Саксонія, Брауншвайг, Ганновер, Тюрінгія) — скрізь, де рахували за Конвенційною стопою, але ділили в Gute Groschen по 24/Thaler.<br>
          <b>Саксен-Веймар-Айзенах:</b> 1760 — єдине відоме карбування як повновагового Thaler (легенда «13⅓ ST. EINE FEINE MARCK»).<br>
          <b>Гессен-Кассель:</b> 1776, 1778, 1779 — Sterntaler («Blutdollar»), Фрідріх II; 750‰, 23,38 г повної, 17,535 г чистої; карбувався як «розрахунковий Thaler» по 24 Gute Groschen = 32 гессен-альбус.<br>
          <b>Ольденбург:</b> 1761–1765 (⅙ і ⅟₁₂ Thaler, Фрідріх V) — курантні монети за 13⅓-Thalerfuß; після 1800 перехід до 14-Thalerfuß.<br>
          <b>Бремен (Thaler Gold з 1840):</b> 17,539 г = повна вага бременського Thaler Gold (986 1/9‰) — те саме число, але інша логіка: там виводиться з повної (rauhe) марки.

