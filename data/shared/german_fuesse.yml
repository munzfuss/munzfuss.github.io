        de: "<b>1813–1854 — Rigsbankdaler:</b> Neue dänische Münze nach dem Staatsbankrott. Im holsteinischen Deutschen ohne eigene etablierte Übersetzung — auf Kassenanweisungen erscheint er lediglich als Wertangabe in der alten Courant-Währung (30 Schilling S.-H. Courant)."
    - kind: phase_summary
      content:
        de: "<b>1854–1864 — Thaler Reichsmünze</b> (dän. Rigsdaler R.M., Rigsmønt): Nur Umbenennung durch König Friedrich VII. — kein Münzfuß-, kein Wertänderung. Im Nominaltext der Kassenanweisungen: »Reichsthaler« oben, »Thaler Reichsmünze« im Fließtext als Synonym."
    - kind: phase_header
      title:
        de: "I. Dänische Münze (Rigsbankdaler-System)"
        en: "I. Danish coinage (Rigsbankdaler system)"
        uk: "I. Данські монети (Rigsbankdaler-система)"
    - kind: rows
      items:
        - key: {de: "Feingewicht Rigsbankdaler"}
          value: {de: "<b>12,64086 g</b> (= 233,856 / 18,5) · 14,44670 g rau · 875 ‰ · Münzbeleg ✓✓"}
    - kind: prose
      label: {de: "Dänische Rechnungsfraktionen (offiziell)", en: "Danish accounting fractions (official)", uk: "Данські розрахункові фракції (офіційно)"}
