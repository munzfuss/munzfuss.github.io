        - key: {de: "Verhältniß zum Conventions-Fuß"}
          value: {de: "¾ Conventionsthaler (23,38560 g) = 1 Couranttaler (17,53920 g) · d. h. 1 Conventionsthaler = 32 Groschen = 4/3 Couranttaler (zu 24 Groschen)"}
        - key: {de: "Münzbeleg Sachsen-Weimar-Eisenach"}
          value: {de: "1760 · Aufschrift «13⅓ ST. EINE FEINE MARCK» · 17,539 g fein ✓ · einzige bekannte Prägung als vollwertiger Thaler mit expliziter Stufenangabe"}
        - key: {de: "Münzbeleg Hessen-Kassel · Sterntaler"}
          value: {de: "Friedrich II. · 1776, 1778, 1779 · 750 ‰ (12 Lot) · 23,38 g rau → <b>17,535 g</b> fein ≈ 17,539 g ✓ (nach Gerhard Schön, DM 18. Jh.) · Wikipedia: «ausgeprägter Rechnungsthaler im 13⅓-Thalerfuß zu 24 Guten Groschen» · bekannt als «Blutdollar» (Nordamerika) und «Sterntaler» (Namensgeber des Grimm-Märchens)"}
        - key: {de: "Münzbeleg Oldenburg"}
          value: {de: "Friedrich V. · ⅙ Thaler 1761, 1763–65 (500‰, 5,85 g rau → 2,925 g × 6 = 17,550 g ≈ 17,539 g ✓) · ⅟₁₂ Thaler 1761, 1763–64 (500‰, 2,92 g rau → 1,460 g × 12 = 17,520 g ≈ 17,539 g ✓) · Abweich. unter 0,11% = innerhalb Remedium · Scheidemünzen desselben Herrschers folgten einem ~14,5-Fuß (typisch für Billon)"}
    - kind: prose
      label: {de: "Rechnungsfraktionen", en: "Accounting fractions", uk: "Розрахункові фракції"}
      content:
        de: |
          <b>1 Couranttaler</b> = 24 Gute Groschen = <b>17,53920 g</b> fein<br>
          <b>1 Conventionsthaler</b> = 1⅓ Couranttaler = 32 Gute Groschen = 23,38560 g fein<br>
          <b>Rechnungseinheit:</b> In ganz Norddeutschland (Sachsen, Braunschweig, Hannover, Oldenburg u. a.) wurde im Conventionsfuß-Raum in Couranttaler zu 24 Groschen gerechnet, obwohl der Thaler selbst meist nicht geprägt wurde.<br>
          <em>Benennung: «Conventionscouranttaler» (Münzkataloge) · «Rechnungsreichsthaler im Conventionsfuß» (Historiographie) · Als eigenständiger Münzfuß: 13⅓-Thalerfuß aus der feinen Marck</em>
  territories:
    label: {de: "Territorien", en: "Territories", uk: "Території"}
    content:
      de: |
        <b>Als Rechnungseinheit:</b> Norddeutschland allgemein (Sachsen, Braunschweig, Hannover, Thüringen) — überall dort, wo nach Conventionsfuß gerechnet, aber in Guten Groschen zu 24/Thaler geteilt wurde.<br>
        <b>Sachsen-Weimar-Eisenach:</b> 1760 — einzige bekannte Prägung als vollwertiger Thaler (Aufschrift «13⅓ ST. EINE FEINE MARCK»).<br>
        <b>Hessen-Kassel:</b> 1776, 1778, 1779 — Sterntaler (Blutdollar), Friedrich II.; 750‰, 23,38 g rau, 17,535 g fein; ausgeprägt als «Rechnungsthaler» zu 24 Guten Groschen = 32 Hessen-Albus.<br>
        <b>Oldenburg:</b> 1761–1765 (⅙ und ⅟₁₂ Thaler, Friedrich V.) — Courantmünzen nach 13⅓-Fuß; nach 1800 Übergang auf 14-Thaler-Fuß.<br>
        <b>Bremen (Thaler Gold ab 1840):</b> 17,539 g = Raugewicht des bremischen Thaler Gold (986 1/9‰) — dieselbe Zahl, aber andere Logik: dort Raumark-Basis.

