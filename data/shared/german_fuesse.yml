# German Müntzfüße — landing-page reference catalogue
# ====================================================
#
# A flat enumeration of the principal Müntzfüße that operated in the
# German lands (HRR + Hansestädte + Bremen + Schleswig-Holstein
# +  Vereinsstaaten + Reichsgoldmünzfuß) from the Reichsmüntzordnung
# of 1559/1566 to the Reichsmark of 1871/1875.
#
# Rendered as a secondary section on the landing page, beneath the
# location cards. Independent from `data/shared/fuesse.yml` (which
# defines the Müntzfüße referenced by individual coin entries via
# coin.fuss); this file is purely a presentation catalogue and is not
# cross-validated against coins.
#
# Translation policy:
#   - Tier 1 (always tri-lingual): years_label, title, subtitle, badge,
#     body-block labels (Rechnungsfraktionen, Territorien, phase headers).
#   - Tier 2 (DE primary, falls back via i18n.t): body rows, prose
#     blocks. The landing template renders a small banner on EN/UK
#     pages noting that detailed body text is in period German.
#
# Body block schema (ordered list under `body:`):
#   - kind: rows
#     items: [{key: {...}, value: {...}}, ...]
#   - kind: prose
#     label: {de, en, uk}        # «Rechnungsfraktionen» / «Accounting fractions» / …
#     content: {de}               # period-German prose; safe HTML
#   - kind: phase_header
#     title: {de, en, uk}
#   - kind: phase_summary
#     content: {de}               # short framed paragraph (rendered as .ps-block)

entries:

# ------------------------------------------------------------------
# 1. Reichsmüntzfuß · 9-Thalerfuß (1566)
# ------------------------------------------------------------------
  - id: reichsmuentzfuss_9thaler
    metal: silver
    years_label:
      de: "1566 → ca. 1700"
      en: "1566 → ca. 1700"
      uk: "1566 → бл. 1700"
    name: 9-Thalerfuß
    historical_name: Reichsmüntzfuß
    subtitle:
      de: "Augspurgischer Reichsmüntz-Abschied 30. May 1566 · Cöllnische Marck = 233,856 g Feinsilber · biß 1871 als Rechnungsmünze fortgeführt"
      en: "Augsburg Imperial Mint Decree of 30 May 1566 · Cöllnische Marck = 233.856 g fine silver · retained as unit of account until 1871"
      uk: "Аугсбурзький імператорський монетний регламент 30 травня 1566 · Кельнська марка = 233,856 г чистого срібла · як розрахункова одиниця збережено до 1871"
    body:
      - kind: rows
        items:
          - key: {de: "Feingewicht Thaler", en: 'Fine weight, thaler', uk: Чиста вага Thaler}
            value: {de: "<b>25,98400 g</b> (= 233,856 / 9)", en: <b>25.98400 g</b> (= 233.856 / 9), uk: '<b>25,98400 г</b> (= 233,856 / 9)'}
          - key: {de: "Raugewicht", en: Rough weight, uk: Повна вага}
            value: {de: "29,23200 g · 889 ‰ (= 14²/₉ Loth)", en: 29.23200 g · 889 ‰ (= 14²/₉ Loth), uk: '29,23200 г · 889 ‰ (= 14²/₉ Лот)'}
          - key: {de: "½ Reichsthaler", en: ½ Reichsthaler, uk: ½ Reichsthaler}
            value: {de: "<b>12,99200 g</b> fein · 14,61600 g rau", en: <b>12.99200 g</b> fine · 14.61600 g rough, uk: '<b>12,99200 г</b> чистого · 14,61600 г повної'}
          - key: {de: "¼ Reichsthaler", en: ¼ Reichsthaler, uk: ¼ Reichsthaler}
            value: {de: "<b>6,49600 g</b> fein", en: <b>6.49600 g</b> fine, uk: '<b>6,49600 г</b> чистого'}
      - kind: prose
        label:
          de: "Rechnungsfraktionen"
          en: "Accounting fractions"
          uk: "Розрахункові фракції"
        content:
          de: |
            <b>1 Reichsthaler</b> (norddeutsch) = 24 Gute Groschen Species = 288 Pfennig Species<br>
            <b>1 Reichsthaler</b> (norddeutsch) = 32 Schilling lübisch<br>
            <b>1 Reichsthaler</b> (hannöverisch) = 36 Mariengroschen<br>
            <b>1 Reichsthaler</b> (süddeutsch, ab ca. 1623) = 90 Kreutzer = 1½ Gulden<br>
            <b>½ Reichsthaler</b> = 12 Gute Groschen Species = 45 Kreutzer<br>
            <b>¼ Reichsthaler</b> = 6 Gute Groschen Species = 22½ Kreutzer<br>
            <b>1 Guter Groschen Species</b> = 12 Pfennig Species = 3¾ Kreutzer = 1,08267 g fein<br>
            <b>1 Mariengroschen</b> = 8 Pfennig Species = 2½ Kreutzer (= 1/36 Reichsthaler; 36 × 8 = 288 ✓)<br>
            <b>1 Schilling lübisch</b> = 12 Pfennig lübisch; ½ Sch. = Sechsling; ¼ Sch. = Dreiling
          en: "<b>1 Reichsthaler</b> (North German) = 24 Gute Groschen Species = 288 Pfennig Species<br>\n<b>1 Reichsthaler</b> (North German) = 32 Schilling lübisch<br>\n<b>1 Reichsthaler</b> (Hanoverian) = 36 Mariengroschen<br>\n<b>1 Reichsthaler</b> (South German, from c. 1623) = 90 Kreutzer = 1½ Gulden<br>\n<b>½ Reichsthaler</b> = 12 Gute Groschen Species = 45 Kreutzer<br>\n<b>¼ Reichsthaler</b> = 6 Gute Groschen Species = 22½ Kreutzer<br>\n<b>1 Guter Groschen Species</b> = 12 Pfennig Species = 3¾ Kreutzer = 1.08267 g fine<br>\n<b>1 Mariengroschen</b> = 8 Pfennig Species = 2½ Kreutzer (= 1/36 Reichsthaler; 36 × 8 = 288 ✓)<br>\n<b>1 Schilling lübisch</b> = 12 Pfennig lübisch; ½ Sch. = Sechsling; ¼ Sch. = Dreiling\n"
          uk: "<b>1 Reichsthaler</b> (північно-німецький) = 24 Gute Groschen Species = 288 Pfennig Species<br>\n<b>1 Reichsthaler</b> (північно-німецький) = 32 Schilling lübisch<br>\n<b>1 Reichsthaler</b> (ганноверський) = 36 Mariengroschen<br>\n<b>1 Reichsthaler</b> (південно-німецький, з бл. 1623) = 90 Kreutzer = 1½ Gulden<br>\n<b>½ Reichsthaler</b> = 12 Gute Groschen Species = 45 Kreutzer<br>\n<b>¼ Reichsthaler</b> = 6 Gute Groschen Species = 22½ Kreutzer<br>\n<b>1 Guter Groschen Species</b> = 12 Pfennig Species = 3¾ Kreutzer = 1,08267 г чистого<br>\n<b>1 Mariengroschen</b> = 8 Pfennig Species = 2½ Kreutzer (= 1/36 Reichsthaler; 36 × 8 = 288 ✓)<br>\n<b>1 Schilling lübisch</b> = 12 Pfennig lübisch; ½ Sch. = Sechsling; ¼ Sch. = Dreiling\n"
      - kind: phase_header
        title:
          de: "Hamburg und Lübeck — Beibehaltung des Reichsmüntzfußes"
          en: "Hamburg and Lübeck — retention of the Reichsmüntzfuß"
          uk: "Гамбург і Любек — збереження Reichsmüntzfuß"
      - kind: rows
        items:
          - key: {de: "Thaler Specie (Hamburg/Lübeck)", en: Thaler Specie (Hamburg/Lübeck), uk: Thaler Specie (Гамбург/Любек)}
            value: {de: "<b>25,98400 g</b> fein · 888 8/9 ‰ · 29,232 g rau · = 48 Schilling Species = 3 Marck (Hamburger Rechnungseinheit)", en: <b>25.98400 g</b> fine · 888 8/9 ‰ · 29.232 g rough · = 48 Schilling Species = 3 Marck (Hamburg accounting unit), uk: '<b>25,98400 г</b> чистого · 888 8/9 ‰ · 29,232 г повної · = 48 Schilling Species = 3 Marck (гамбурзька розрахункова одиниця)'}
          - key: {de: "Münzbeleg Hamburg", en: Hamburg attestation, uk: Гамбурзька атестація}
            value: {de: "Thaler 1730: 28,97 g × 888‰ = 25,73 g ✓ · Thaler 1776: 29,2 g × 888‰ = 25,93 g ✓", en: 'Thaler 1730: 28.97 g × 888‰ = 25.73 g ✓ · Thaler 1776: 29.2 g × 888‰ = 25.93 g ✓', uk: 'Талер 1730: 28,97 г × 888‰ = 25,73 г ✓ · Талер 1776: 29,2 г × 888‰ = 25,93 г ✓'}
          - key: {de: "Münzbeleg Lübeck", en: Lübeck attestation, uk: Любекська атестація}
            value: {de: "Thaler 1730 (Jubiläum): 888‰ · Thaler 1776: 888‰ — beide im 9-Fuß ✓", en: 'Thaler 1730 (jubilee): 888‰ · Thaler 1776: 888‰ — both on the 9-Fuß ✓', uk: 'Талер 1730 (ювілейний): 888‰ · Талер 1776: 888‰ — обидва за 9-Thalerfuß ✓'}
      - kind: prose
        label:
          de: "Hamburgisch-Lübeckische Rechnungsfraktionen (biß 1875)"
          en: "Hamburg/Lübeck accounting fractions (until 1875)"
          uk: "Гамбурзько-любекські розрахункові фракції (до 1875)"
        content:
          de: |
            <b>1 Thaler Specie</b> = 48 Schilling Species = 3 Marck = <b>25,98400 g</b><br>
            <b>1 Marck</b> (Rechnungseinheit) = 16 Schilling Species = 192 Pfennig<br>
            <b>1 Schilling Species</b> = 12 Pfennig<br>
            <em>Hamburg und Lübeck behielten den ursprünglichen Reichsmüntzfuß von 1566 als Speciesthaler-Standard unverändert biß 1875 bei — während das übrige Reich längst zu anderen Stempeln übergegangen war.</em>
          en: "<b>1 Thaler Specie</b> = 48 Schilling Species = 3 Marck = <b>25.98400 g</b><br>\n<b>1 Marck</b> (accounting unit) = 16 Schilling Species = 192 Pfennig<br>\n<b>1 Schilling Species</b> = 12 Pfennig<br>\n<em>Hamburg and Lübeck retained the original Reichsmüntzfuß of 1566 as their Speciesthaler standard, unchanged, until 1875 — while the rest of the Empire had long since moved to other standards.</em>\n"
          uk: "<b>1 Thaler Specie</b> = 48 Schilling Species = 3 Marck = <b>25,98400 г</b><br>\n<b>1 Marck</b> (розрахункова одиниця) = 16 Schilling Species = 192 Pfennig<br>\n<b>1 Schilling Species</b> = 12 Pfennig<br>\n<em>Гамбург і Любек зберігали початковий Reichsmüntzfuß 1566 року як Speciesthaler-стандарт незмінним до 1875 — у той час як решта імперії вже давно перейшла до інших стандартів.</em>\n"
    territories:
      label:
        de: "Territorien"
        en: "Territories"
        uk: "Території"
      content:
        de: |
          <b>Formal:</b> Gesamtes Heiliges Römisches Reich Deutscher Nation (Reichsbeschluß).<br>
          <b>Hauptprägestände:</b> Kursachsen (Wettiner), Braunschweig-Lüneburg (Welfen), Habsburger Erblande, Westfälische Stände.<br>
          <b>Hamburg:</b> Rechnungsmünze (Bancothaler) ab 1619; geprägt 1730–1764; als Rechnungseinheit biß 1875.<br>
          <b>Lübeck:</b> Rechnungseinheit biß 1875; geprägt (Jubiläumstaler) 1730, 1776 — keine kontinuierliche Prägung (Münzprägung endgültig 1801 eingestellt).<br>
          <b>Als Rechnungsmünze biß 1871:</b> Hannover; Norddeutschland allgemein.<br>
          <b>Nur formal:</b> Süddeutschland (rechnete nach Gulden, prägte kaum Thaler Specie); Österreich (eigene Praxis).
        en: |
          <b>Formally:</b> Entire Holy Roman Empire of the German Nation (imperial decree).<br>
          <b>Principal mints:</b> Electoral Saxony (Wettin), Brunswick-Lüneburg (Welf), Habsburg hereditary lands, Westphalian estates.<br>
          <b>Hamburg:</b> Unit of account (Bancothaler) from 1619; struck 1730–1764; as unit of account until 1875.<br>
          <b>Lübeck:</b> Unit of account until 1875; struck (jubilee thaler) 1730, 1776 — no continuous coinage (mint finally closed 1801).<br>
          <b>As unit of account until 1871:</b> Hanover; Northern Germany generally.<br>
          <b>Formally only:</b> Southern Germany (reckoned in Gulden, scarcely struck Thaler Specie); Austria (own practice).
        uk: |
          <b>Формально:</b> уся Священна Римська імперія німецької нації (імперський декрет).<br>
          <b>Головні монетні двори:</b> Курсаксонія (Веттіни), Брауншвайг-Люнебург (Вельфи), габсбурзькі спадкові землі, вестфальські стани.<br>
          <b>Гамбург:</b> розрахункова монета (Bancothaler) від 1619; карбувалось 1730–1764; як розрахункова одиниця до 1875.<br>
          <b>Любек:</b> розрахункова одиниця до 1875; карбувалось (ювілейний Thaler) 1730, 1776 — без безперервного карбування (монетний двір остаточно закрито 1801).<br>
          <b>Як розрахункова одиниця до 1871:</b> Ганновер; Північна Німеччина загалом.<br>
          <b>Лише формально:</b> Південна Німеччина (рахувала в Gulden, Thaler Specie майже не карбувала); Австрія (власна практика).

# ------------------------------------------------------------------
# 1a. Reichsdukatenfuß (1559, Gold)
# ------------------------------------------------------------------
  - id: reichsdukatenfuss
    metal: gold
    years_label:
      de: "1559 → 1871"
      en: "1559 → 1871"
      uk: "1559 → 1871"
    name: Reichsdukatenfuß
    subtitle:
      de: 'Augspurgische Reichsmüntzordnung 19. Aug. 1559 (Ferdinand I.) · Cöllnische Marck rauh = 233,856 g Goldlegierung · Feingehalt 23 Karat 8 Grän = 986 1/9 ‰<sup><a href="#ref1">[1]</a></sup> · Hauptgoldmünze des Reiches biß zur Reichsgoldmark 1871'
      en: 'Augsburg Imperial Mint Ordinance, 19 Aug. 1559 (Ferdinand I) · Cöllnische Marck rough = 233.856 g gold alloy · fineness 23 carats 8 grains = 986 1/9 ‰<sup><a href="#ref1">[1]</a></sup> · principal imperial gold coin until the Reichsgoldmark of 1871'
      uk: 'Аугсбурзький імператорський монетний регламент, 19 серпня 1559 (Фердинанд I) · Кельнська марка повна = 233,856 г золотого сплаву · проба 23 карати 8 гран = 986 1/9 ‰<sup><a href="#ref1">[1]</a></sup> · головна імперська золота монета до Reichsgoldmark 1871'
    body:
      - kind: rows
        items:
          - key: {de: "Feinheit", en: Fineness, uk: Проба}
            value: {de: "23 Karat 8 Grän = 284/288 = <b>986 1/9 ‰</b> (= 0,98611...)", en: "23 carats 8 grains = 284/288 = <b>986 1/9 ‰</b> (= 0.98611...)", uk: "23 карати 8 гран = 284/288 = <b>986 1/9 ‰</b> (= 0,98611...)"}
          - key: {de: "Raugewicht", en: Rough weight, uk: Повна вага}
            value: {de: '<b>3,49039 g</b> (= 233,856 / 67) · 67 Dukaten aus der rauen Cöllnischen Marck Gold<sup><a href="#ref1">[1]</a></sup>', en: '<b>3.49039 g</b> (= 233.856 / 67) · 67 ducats per rough Cöllnische Marck of gold alloy<sup><a href="#ref1">[1]</a></sup>', uk: '<b>3,49039 г</b> (= 233,856 / 67) · 67 Dukat з повної Кельнської марки золотого сплаву<sup><a href="#ref1">[1]</a></sup>'}
          - key: {de: "Feingewicht", en: Fine weight, uk: Чиста вага}
            value: {de: "<b>3,44191 g</b> (= 3,49039 × 284/288) Feingold", en: <b>3.44191 g</b> (= 3.49039 × 284/288) fine gold, uk: '<b>3,44191 г</b> (= 3,49039 × 284/288) чистого золота'}
          - key: {de: "Kurs 1559", en: 'Rate, 1559', uk: Курс 1559}
            value: {de: "1 Dukat = <b>104 Kreutzer</b> (Reichsmüntzordnung) · ≈ 1 Gulden 44 Kreutzer (kein ganzzahliges Gulden-Verhältniß)", en: 1 ducat = <b>104 Kreutzer</b> (Imperial Mint Ordinance) · ≈ 1 Gulden 44 Kreutzer (no integer Gulden ratio), uk: 1 Dukat = <b>104 Kreutzer</b> (Імператорський монетний регламент) · ≈ 1 Gulden 44 Kreutzer (без цілочислового співвідношення в Gulden)}
      - kind: prose
        label:
          de: "Fraktionen und Kurse"
          en: "Fractions and rates"
          uk: "Фракції та курси"
        content:
          de: |
            <b>1 Dukat</b> = 104 Kreutzer (1559) · <b>3,44191 g</b> Feingold<br>
            <b>Kein Unterteiler:</b> Der Dukat war die kleinste Einheit des Reichsdukatenfußes; geprägt wurden nur Vielfache (2-, 5-, 10-Dukaten-Stücke).<br>
            <b>Kurs zu Silber:</b> Schwebend — kein festes Silberäquivalent; im 18. Jh. meist 2–2½ Reichsthaler je Dukat (Marktpreis, nicht Tarif).<br>
            <em>Passierdukat (praktischer Handelsstandard): 67,944 Dukaten auf die feine Cöllnische Marck Gold; leicht minderwertige Dukaten zum mittleren Goldgehalt.</em>
          en: "<b>1 ducat</b> = 104 Kreutzer (1559) · <b>3.44191 g</b> fine gold<br>\n<b>No sub-unit:</b> the ducat was the smallest unit of the Reichsdukatenfuß; only multiples (2-, 5-, 10-ducat pieces) were struck.<br>\n<b>Rate to silver:</b> floating — no fixed silver equivalent; in the 18th century typically 2–2½ Reichsthaler per ducat (market price, not tariff).<br>\n<em>Passierdukat (practical trade standard): 67.944 ducats per fine Cöllnische Marck of gold; slightly under-weight ducats at the average gold content.</em>\n"
          uk: "<b>1 Dukat</b> = 104 Kreutzer (1559) · <b>3,44191 г</b> чистого золота<br>\n<b>Без поділки:</b> Dukat був найменшою одиницею Reichsdukatenfuß; карбувались лише кратні (2-, 5-, 10-Dukaten-Stücke).<br>\n<b>Курс до срібла:</b> плаваючий — без фіксованого срібного еквіваленту; у XVIII ст. зазвичай 2–2½ Reichsthaler за Dukat (ринкова ціна, не тариф).<br>\n<em>Passierdukat (практичний торговельний стандарт): 67,944 Dukat з чистої Кельнської марки золота; ледь нижчевагові Dukat за середнім вмістом золота.</em>\n"
    territories:
      label:
        de: "Territorien"
        en: "Territories"
        uk: "Території"
      content:
        de: |
          <b>Formal:</b> Gesamtes Heiliges Römisches Reich ab 1559; Hauptgoldmünze des Reiches nach Verdrängung des Goldgulden.<br>
          <b>Praktisch:</b> Geprägt in fast allen deutschen Münzstätten (Hamburg, Lübeck, Hannover, Sachsen, Österreich u.v.m.) sowie in Skandinavien biß ins 19. Jh.<br>
          <b>Lübeck:</b> Dukaten 1730 (Jubiläum), 1789–1801 (letzte Prägungen) — alle 986‰, ca. 3,44–3,46 g fein ✓<br>
          <b>Fortbestand:</b> Der Reichsdukatenfuß blieb als De-facto-Standard für Goldmünzen biß zur Einführung der Reichsgoldmark 1871; Handelsgold-Dukaten wurden biß weit ins 20. Jh. nach diesem Fuß geprägt.
        en: |
          <b>Formally:</b> Entire Holy Roman Empire from 1559; principal imperial gold coin after the displacement of the Goldgulden.<br>
          <b>In practice:</b> Struck at virtually all German mints (Hamburg, Lübeck, Hanover, Saxony, Austria etc.) and across Scandinavia into the 19th century.<br>
          <b>Lübeck:</b> Dukaten 1730 (jubilee), 1789–1801 (last issues) — all 986‰, c. 3.44–3.46 g fine ✓<br>
          <b>Continuation:</b> The Reichsdukatenfuß remained the de facto standard for gold coins until the introduction of the Reichsgoldmark in 1871; trade-gold ducats continued to be struck on this standard well into the 20th century.
        uk: |
          <b>Формально:</b> уся Священна Римська імперія від 1559; головна імперська золота монета після витіснення Goldgulden.<br>
          <b>На практиці:</b> карбувалось майже у всіх німецьких монетних дворах (Гамбург, Любек, Ганновер, Саксонія, Австрія та ін.) і у Скандинавії до XIX ст.<br>
          <b>Любек:</b> Dukat 1730 (ювілейні), 1789–1801 (останні випуски) — усі 986‰, бл. 3,44–3,46 г чистого ✓<br>
          <b>Тривкість:</b> Reichsdukatenfuß залишався де-факто-стандартом для золотих монет до запровадження Reichsgoldmark 1871; торговельні золоті Dukat карбувалися за цим стандартом далеко в XX ст.

# ------------------------------------------------------------------
# 1b. Burgundischer / Zinnaischer Müntzfuß · 10½-Thalerfuß
# ------------------------------------------------------------------
  - id: burgundischer_zinnaisch
    metal: silver
    years_label:
      de: "ca. 1600 → 1797"
      en: "ca. 1600 → 1797"
      uk: "бл. 1600 → 1797"
    name: 10½-Thalerfuß
    historical_name: Burgundischer Fuß · Zinnaischer Müntzfuß
    subtitle:
      de: "Albertustaler-Tradition (Spanische Niederlande) · Müntzreceß von Zinna 27. Aug. 1667 (Inlandsreform) · Cöllnische Marck = 233,856 g Feinsilber"
      en: "Albertustaler tradition (Spanish Netherlands) · Müntzreceß of Zinna 27 Aug. 1667 (domestic reform) · Cöllnische Marck = 233.856 g fine silver"
      uk: "Традиція Albertustaler (Іспанські Нідерланди) · Циннський монетний рецес 27 серпня 1667 (Кляштер Цинна, внутрішня реформа) · Кельнська марка = 233,856 г чистого срібла"
    body:
      - kind: phase_header
        title:
          de: "Zwei Verwendungen desselben Fußes"
          en: "Two uses of the same standard"
          uk: "Два застосування тієї самої стопи"
      - kind: phase_summary
        content:
          de: "<b>Zinnaischer Fuß (Inlands-Kleingeld, 1667–1690):</b> Für Teilstücke des Reichsthalers (Groschen, Schillinge) — ganze Thaler blieben im 9-Fuß. Thaler Courant (22,27200 g) war Rechnungsmünze, nur selten geprägt. 1690 durch den Leipziger Fuß (12-Fuß) abgelöst."
          en: "<b>Zinnaischer Müntzfuß (domestic small coin, 1667–1690):</b> For subdivisions of the Reichsthaler (Groschen, Schilling) — whole thalers remained on the 9-Fuß. Thaler Courant (22.27200 g) was a unit of account, rarely struck. Replaced by the Leipziger Fuß (12-Fuß) in 1690."
          uk: "<b>Циннська стопа (внутрішня дрібна монета, 1667–1690):</b> для поділок Reichsthaler (Groschen, Schilling) — цілі Thaler залишались у 9-Thalerfuß. Thaler Courant (22,27200 г) був розрахунковою монетою, карбувався рідко. 1690 заміщено Лейпцизькою стопою (12-Thalerfuß)."
      - kind: phase_summary
        content:
          de: "<b>Burgundischer Wechselthaler-Fuß (internationale Handelsmünze):</b> Tradition des Albertustalers/Patagons. Derselbe Feingehalt (22,27200 g), aber höheres Korn (861–875 ‰ statt 750 ‰). Feingewicht als Handelsstandard im Nord- und Ostseeraum."
          en: "<b>Burgundian trade-thaler standard (international trade coin):</b> tradition of the Albertustaler/Patagon. Same fine weight (22.27200 g) but higher fineness (861–875 ‰ instead of 750 ‰). Fine weight served as a trade standard throughout the North and Baltic Sea regions."
          uk: "<b>Бургундський Wechselthaler-Fuß (міжнародна торгова монета):</b> традиція Albertustaler / Patagon. Той самий чистий вміст (22,27200 г), але вища проба (861–875 ‰ замість 750 ‰). Чиста вага слугувала торговельним стандартом усього Північного й Балтійського регіонів."
      - kind: rows
        items:
          - key: {de: "Feingewicht Thaler", en: 'Fine weight, thaler', uk: Чиста вага Thaler}
            value: {de: "<b>22,27200 g</b> (= 233,856 / 10,5)", en: <b>22.27200 g</b> (= 233.856 / 10.5), uk: '<b>22,27200 г</b> (= 233,856 / 10,5)'}
          - key: {de: "Raugewicht Zinnaisch", en: 'Rough weight, Zinna', uk: 'Повна вага, циннська'}
            value: {de: "ca. 29,696 g · 750 ‰ (= 12 Loth)", en: c. 29.696 g · 750 ‰ (= 12 Loth), uk: 'бл. 29,696 г · 750 ‰ (= 12 Лот)'}
          - key: {de: "Raugewicht Burgundisch", en: 'Rough weight, Burgundian', uk: 'Повна вага, бургундська'}
            value: {de: "ca. 25,85–25,92 g · 861–875 ‰ (14 Loth)", en: c. 25.85–25.92 g · 861–875 ‰ (14 Loth), uk: 'бл. 25,85–25,92 г · 861–875 ‰ (14 Лот)'}
          - key: {de: "Verhältniß zu Thaler Specie", en: Ratio to Thaler Specie, uk: Співвідношення до Thaler Specie}
            value: {de: "22,27200 / 25,984 = 6/7 — oder: 1 Thaler Specie = 7/6 = 1 1/6 Thaler Courant (10½-Fuß)", en: 22.27200 / 25.984 = 6/7 — i.e. 1 Thaler Specie = 7/6 = 1 1/6 Thaler Courant (10½-Fuß), uk: '22,27200 / 25,984 = 6/7 — тобто: 1 Thaler Specie = 7/6 = 1 1/6 Thaler Courant (10½-Thalerfuß)'}
          - key: {de: "Preuß. Thaler Banco 1765", en: Prussian Thaler Banco 1765, uk: Прусський Thaler Banco 1765}
            value: {de: "<b>22,27200 g</b> fein · 875 ‰ (14 Loth) · 25,45371 g rau · Burgundischer Fuß", en: <b>22.27200 g</b> fine · 875 ‰ (14 Loth) · 25.45371 g rough · Burgundischer Fuß, uk: '<b>22,27200 г</b> чистого · 875 ‰ (14 Лот) · 25,45371 г повної · Бургундська стопа'}
          - key: {de: "Thaler Banco Münzstätte", en: Thaler Banco — mint, uk: Thaler Banco — монетний двір}
            value: {de: "Berlin (A) · geprägt 1766 mit Jz. 1765 · 100.000 Stück", en: 'Berlin (A) · struck 1766 with date 1765 · 100,000 pieces', uk: Берлін (A) · карбувалось 1766 з датою 1765 · 100 000 штук}
          - key: {de: "Thaler Banco Geschichte", en: Thaler Banco — history, uk: Thaler Banco — історія}
            value: {de: "Einlagemünze für die Königl. Giro- und Lehn-Banco Berlin · nie ausgegeben · 1790 eingeschmolzen", en: "Reserve coin for the Königliche Giro- und Lehn-Banco Berlin · never issued · melted down 1790", uk: "Резервна монета Königliche Giro- und Lehn-Banco Berlin · ніколи не випущена · переплавлена 1790"}
      - kind: prose
        label:
          de: "Rechnungsfraktionen (Zinnaischer Fuß)"
          en: "Accounting fractions (Zinnaischer Müntzfuß)"
          uk: "Розрахункові фракції (Циннська стопа)"
        content:
          de: |
            <b>1 Thaler Specie</b> (9-Fuß) = 28 Gute Groschen Courant = 105 Kreutzer = 336 Pfennig Courant<br>
            <b>1 Thaler Courant</b> (10½-Fuß, Rechnung) = 24 Gute Groschen Courant = 90 Kreutzer = 288 Pfennig Courant<br>
            <b>1 Guter Groschen Courant</b> = 12 Pfennig Courant<br>
            <b>1 Thaler Specie</b> = 25,984 / 22,27200 = 7/6 = 1 1/6 Thaler Courant (glatter Bruch ✓)<br>
            <b>1 Preuß. Thaler Banco</b> (Einlagemünze) = 1⅓ Thaler Courant (14-Thaler-Fuß) = 6/7 Reichsthaler Species (9-Fuß)<br>
            <em>Zinnaisch (750 ‰) und Burgundisch (861–875 ‰) haben dasselbe Feingewicht aber verschiedene Feinheit — beide gelten im Norddeutschen Handel als Wechselthaler</em>
          en: "<b>1 Thaler Specie</b> (9-Fuß) = 28 Gute Groschen Courant = 105 Kreutzer = 336 Pfennig Courant<br>\n<b>1 Thaler Courant</b> (10½-Fuß, accounting) = 24 Gute Groschen Courant = 90 Kreutzer = 288 Pfennig Courant<br>\n<b>1 Guter Groschen Courant</b> = 12 Pfennig Courant<br>\n<b>1 Thaler Specie</b> = 25.984 / 22.27200 = 7/6 = 1 1/6 Thaler Courant (clean fraction ✓)<br>\n<b>1 Prussian Thaler Banco</b> (reserve coin) = 1⅓ Thaler Courant (14-Thalerfuß) = 6/7 Reichsthaler Species (9-Fuß)<br>\n<em>Zinna (750 ‰) and Burgundian (861–875 ‰) have the same fine weight but different fineness — both are considered trade thalers in North German commerce</em>\n"
          uk: "<b>1 Thaler Specie</b> (9-Thalerfuß) = 28 Gute Groschen Courant = 105 Kreutzer = 336 Pfennig Courant<br>\n<b>1 Thaler Courant</b> (10½-Thalerfuß, розрахунково) = 24 Gute Groschen Courant = 90 Kreutzer = 288 Pfennig Courant<br>\n<b>1 Guter Groschen Courant</b> = 12 Pfennig Courant<br>\n<b>1 Thaler Specie</b> = 25,984 / 22,27200 = 7/6 = 1 1/6 Thaler Courant (чистий дріб ✓)<br>\n<b>1 прусський Thaler Banco</b> (резервна монета) = 1⅓ Thaler Courant (14-Thalerfuß) = 6/7 Reichsthaler Species (9-Thalerfuß)<br>\n<em>Циннська (750 ‰) і Бургундська (861–875 ‰) мають ту саму чисту вагу, але різну пробу — обидві вважаються в північно-німецькій торгівлі обмінними Thaler</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Zinnaischer Fuß (Kleingeld, 1667–1690):</b> Kurbrandenburg, Kursachsen, Braunschweig-Lüneburg.<br>
          <b>Burgundischer Wechselthaler-Fuß (Handelsmünze):</b> Spanische/Österreichische Niederlande (Albertustaler ab 1612 – ca. 1800); Vereinigte Niederlande (Zilveren Dukaat, 1659–1806); Kursachsen (Wechselthaler 1670–71; Bankotaler 1702); Brandenburg-Preußen (Albertustaler 1695–96, 1767–68, 1797; Thaler Banco 1765); Schleswig-Holstein-Gottorp (1753); Kurland (1780); Dänemark (1781, 1784); Köln (1699–1702, 1726).<br>
          <b>Als Handelsstandard:</b> Gesamter Norddeutscher und Ostseehandel (Hamburg, Lübeck, Amsterdam, Kopenhagen, Stockholm).
        en: |
          <b>Zinnaischer Müntzfuß (small coin, 1667–1690):</b> Electoral Brandenburg, Electoral Saxony, Brunswick-Lüneburg.<br>
          <b>Burgundian trade-thaler standard (trade coin):</b> Spanish/Austrian Netherlands (Albertustaler from 1612 – c. 1800); United Provinces (Zilveren Dukaat, 1659–1806); Electoral Saxony (Wechselthaler 1670–71; Bankotaler 1702); Brandenburg-Prussia (Albertustaler 1695–96, 1767–68, 1797; Thaler Banco 1765); Schleswig-Holstein-Gottorp (1753); Courland (1780); Denmark (1781, 1784); Cologne (1699–1702, 1726).<br>
          <b>As a trade standard:</b> The whole of the North German and Baltic trade (Hamburg, Lübeck, Amsterdam, Copenhagen, Stockholm).
        uk: |
          <b>Циннська стопа (дрібна монета, 1667–1690):</b> Курбранденбург, Курсаксонія, Брауншвайг-Люнебург.<br>
          <b>Бургундський торговельний-Thaler-стандарт (торгова монета):</b> Іспанські/Австрійські Нідерланди (Albertustaler з 1612 – бл. 1800); Сполучені провінції (Zilveren Dukaat, 1659–1806); Курсаксонія (Wechselthaler 1670–71; Bankotaler 1702); Бранденбург-Пруссія (Albertustaler 1695–96, 1767–68, 1797; Thaler Banco 1765); Шлезвіг-Гольштейн-Готторп (1753); Курляндія (1780); Данія (1781, 1784); Кельн (1699–1702, 1726).<br>
          <b>Як торговельний стандарт:</b> уся північно-німецька і балтійська торгівля (Гамбург, Любек, Амстердам, Копенгаген, Стокгольм).

