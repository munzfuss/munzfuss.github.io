      en: "Cabinet money of the Hanoverian state treasuries (Electorate of Hanover) · 1801 as trial issue, then main run · «I THALER HANNOVERISCH CASSEN GELD» · Cöllnische Marck = 233.856 g fine silver · official until adoption of the Conventions-Fuß in 1817"
      uk: "Кабінетні Groschen ганноверських державних кас (Курганновер) · 1801 як пробне карбування, потім основний випуск · «I THALER HANNOVERISCH CASSEN GELD» · Кельнська марка = 233,856 г чистого срібла · офіційно до прийняття конвенційної стопи 1817"
    body:
      - kind: rows
        items:
          - key: {de: "Begriffsherkunft", en: Origin of the term, uk: Походження терміну}
            value: {de: "«Cassengeld» = in Hannover seit Mitte 18. Jh. das von Staatskassen offiziell akzeptierte Münzgeld nach dem <b>Leipziger Fuß (12-Thaler-Fuß)</b>; fremdes Leichtgeld (Conventionsmünzen etc.) nur mit Abschlag (8–10%) angenommen", en: '«Cassengeld» = in Hanover from the mid-18th century onward, the coin money officially accepted by the state treasuries on the <b>Leipziger Fuß (12-Thaler)</b>; foreign light coin (Convention coins etc.) accepted only at a discount (8–10%)', uk: '«Cassengeld» = у Ганновері з середини XVIII ст. — монетні Groschen, офіційно прийняті державними касами за <b>Лейпцизькою стопою (12-Thalerfuß)</b>; чужа легша монета (конвенційна тощо) приймалась лише зі знижкою (8–10%)'}
          - key: {de: "Münzfuß 1801", en: 'Standard, 1801', uk: Стопа 1801}
            value: {de: "12⅓ Thaler aus der feinen Cöllnischen Marck · Feingewicht <b>18,961 g</b> (= 233,856 × 3/37) · leicht unter dem Leipziger Standard (19,488 g) · nicht vollwertig im Sinne des Graumannschen Fußes (nach Gerhard Schön)", en: 12⅓ thaler per fine Cöllnische Marck · fine weight <b>18.961 g</b> (= 233.856 × 3/37) · slightly below the Leipziger Fuß (19.488 g) · not full-weight in the Graumann sense (per Gerhard Schön), uk: '12⅓ Thaler з чистої Кельнської марки · чиста вага <b>18,961 г</b> (= 233,856 × 3/37) · трохи нижче Лейпцизького стандарту (19,488 г) · неповновагова в розумінні стопи Грауманна (за Gerhard Schön)'}
          - key: {de: "Feingehalt", en: Fineness, uk: Проба}
            value: {de: "ca. 12⅓ Lot ≈ <b>770‰</b> · Raugewicht ≈ <b>24,60 g</b> (empirisch: 18,961 / 0,7708)", en: 'c. 12⅓ Lot ≈ <b>770‰</b> · rough weight ≈ <b>24.60 g</b> (empirical: 18.961 / 0.7708)', uk: 'бл. 12⅓ Лот ≈ <b>770‰</b> · повна вага ≈ <b>24,60 г</b> (емпірично: 18,961 / 0,7708)'}
          - key: {de: "Nominale mit «Cassengeld»-Aufschrift", en: Denominations with the «Cassengeld» legend, uk: Номінали з написом «Cassengeld»}
            value: {de: "Nur <b>1 Thaler</b> (Welter 2804, Knyphausen 3548) und <b>½ Thaler</b> (Welter 2820/2849) trugen den Schriftzug «HANNOVERISCH CASSEN GELD» · Auflage 1801: 126 ganze, 372 halbe Thaler (Probemünzung); danach weitergeprägt in größerer Stückzahl", en: 'Only <b>1 Thaler</b> (Welter 2804, Knyphausen 3548) and <b>½ Thaler</b> (Welter 2820/2849) bore the legend «HANNOVERISCH CASSEN GELD» · 1801 issue: 126 whole, 372 half thalers (trial run); subsequently struck in larger quantities', uk: 'Лише <b>1 Thaler</b> (Welter 2804, Knyphausen 3548) і <b>½ Thaler</b> (Welter 2820/2849) несли напис «HANNOVERISCH CASSEN GELD» · накладом 1801: 126 цілих, 372 ½ Thaler (пробне карбування); відтак карбувалось у більшій кількості'}
          - key: {de: "Verwandte Nominale (ohne Cassengeld-Aufschrift)", en: Related denominations (without the Cassengeld legend), uk: Споріднені номінали (без напису Cassengeld)}
            value: {de: "2/3 Thaler (Welter 2810) · 3 Mariengroschen «Cassenmünze nach Conventionsmünze» (Welter 2848) · als Cassengeld-Scheidemünzen konzipiert, aber anders bezeichnet", en: 2/3 Thaler (Welter 2810) · 3 Mariengroschen «Cassenmünze nach Conventionsmünze» (Welter 2848) · conceived as Cassengeld petty coin but designated differently, uk: '2/3 Thaler (Welter 2810) · 3 Mariengroschen «Cassenmünze nach Conventionsmünze» (Welter 2848) · задумано як Cassengeld-розмінні, позначено інакше'}
      - kind: prose
        label: {de: "Rechnungsfraktionen", en: "Accounting fractions", uk: "Розрахункові фракції"}
        content:
          de: |
            <b>1 Thaler</b> Cassengeld = 24 Gute Groschen = 288 Pfennig = 36 Mariengroschen<br>
            <b>½ Thaler</b> = 12 Gute Groschen<br>
            <b>2/3 Thaler</b> = 16 Gute Groschen<br>
            <b>1 Guter Groschen</b> (n.d.L.F.) = 12 Pfennig ≈ 2 Groschen Conventionsmünze (Abschlag 8,33%)<br>
            <b>3 Mariengroschen</b> (n.d.L.F.) ≈ 3 Mgr. 2 Pf. Conventionsmünze (Abschlag 5,26%)<br>
            <em>Silber: 2250 Banco-Speciesthaler (= 250 Mark Feinsilber) umgemünzt → 126 Cassenthaler + 372 halbe + weitere Nominale; Münzgewinn 88 Thaler 23 Mgr. (nach Kretzschmar)</em>
          en: "<b>1 Thaler</b> Cassengeld = 24 Gute Groschen = 288 Pfennig = 36 Mariengroschen<br>\n<b>½ Thaler</b> = 12 Gute Groschen<br>\n<b>2/3 Thaler</b> = 16 Gute Groschen<br>\n<b>1 Guter Groschen</b> (per Leipziger Fuß) = 12 Pfennig ≈ 2 Groschen Convention coinage (discount 8.33%)<br>\n<b>3 Mariengroschen</b> (per Leipziger Fuß) ≈ 3 Mgr. 2 Pf. Convention coinage (discount 5.26%)<br>\n<em>Silver: 2250 Banco Speciedaler (= 250 Mark fine silver) recoined → 126 Cassenthaler + 372 halves + further denominations; mint profit 88 Thaler 23 Mgr. (per Kretzschmar)</em>\n"
          uk: "<b>1 Thaler</b> Cassengeld = 24 Gute Groschen = 288 Pfennig = 36 Mariengroschen<br>\n<b>½ Thaler</b> = 12 Gute Groschen<br>\n<b>2/3 Thaler</b> = 16 Gute Groschen<br>\n<b>1 Guter Groschen</b> (за Лейпцизькою стопою) = 12 Pfennig ≈ 2 Groschen конвенційної монети (знижка 8,33%)<br>\n<b>3 Mariengroschen</b> (за Лейпцизькою стопою) ≈ 3 Mgr. 2 Pf. конвенційної монети (знижка 5,26%)<br>\n<em>Срібло: 2250 Banco-Speciedaler (= 250 марок чистого срібла) перекарбовано → 126 Cassenthaler + 372 половинні + інші номінали; монетний прибуток 88 Thaler 23 Mgr. (за Kretzschmar)</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Nur:</b> Kurfürstentum/Königreich Hannover (Braunschweig-Lüneburg-Calenberg) · Georg III. (1760–1820).<br>
          <b>Münzstätten:</b> Hannover (Wiedereröffnung 1801 nach Schließung 1781) · Clausthal (verwandte Nominale ohne «Cassengeld»-Aufschrift).<br>
          <b>Übergang:</b> 1817 Hannover → Conventionsfuß · 1834 → preuß. 14-Thaler-Fuß.<br>
          <b>Kontext:</b> Hannover hielt als einer der letzten Staaten am Leipziger 12-Thaler-Fuß fest. Eigentliche Cassengeld-Münzen (1 Thaler, ½ Thaler mit Aufschrift) wurden 1801 als einmalige Versuchsprägung und danach in regulärer Auflage ausgegeben; in anderen deutschen Staaten wurde das Wort «Cassengeld» nur als Buchungsbegriff verwendet, nie auf Münzen graviert.
        en: |
          <b>Only:</b> Electorate / Kingdom of Hanover (Brunswick-Lüneburg-Calenberg) · George III (1760–1820).<br>
          <b>Mints:</b> Hanover (re-opened 1801 after closure in 1781) · Clausthal (related denominations without the «Cassengeld» legend).<br>
          <b>Transition:</b> 1817 Hanover → Conventions-Fuß · 1834 → Prussian 14-Thalerfuß.<br>
          <b>Context:</b> Hanover was among the last states to hold to the Leipzig 12-Thalerfuß. The actual Cassengeld coins (1 Thaler, ½ Thaler with the legend) were issued in 1801 as a one-off trial run and then in regular issues; in other German states the word «Cassengeld» was only a bookkeeping term, never engraved onto coins.
        uk: |
          <b>Лише:</b> Курфюрство / Королівство Ганновер (Брауншвайг-Люнебург-Каленберг) · Георг III (1760–1820).<br>
          <b>Монетні двори:</b> Ганновер (заново відкрито 1801 після закриття 1781) · Клаусталь (споріднені номінали без напису «Cassengeld»).<br>
          <b>Перехід:</b> 1817 Ганновер → Конвенційна стопа · 1834 → прусська 14-Thalerfuß.<br>
          <b>Контекст:</b> Ганновер був серед останніх держав, що трималися Лейпцизької 12-Thalerfuß. Справжні Cassengeld-монети (1 Thaler, ½ Thaler з написом) вперше випущено 1801 як одноразову пробу, потім регулярним накладом; у інших німецьких державах слово «Cassengeld» було лише бухгалтерським терміном, ніколи не вигравірованим на монетах.

