            <b>¼ Thaler</b> = 6 Gute Groschen Courant (biß 1821) = 7½ Silbergroschen (ab 1821)<br>
            <em>Ggr. Courant hier (0,69600 g) ≠ Ggr. Courant des Leipziger Fußes (0,81200 g)</em>
          en: "<b>until 1821 — 1 Thaler Courant</b> = 24 Gute Groschen Courant = 288 Pfennig Courant<br>\n<b>until 1821 — 1/6 Thaler</b> = 4 Gute Groschen Courant = 48 Pfennig Courant<br>\n<b>from 1821 — 1 Thaler</b> = 30 Silbergroschen = 360 Pfennig<br>\n<b>1 Silbergroschen</b> (from 1821) = 12 Pfennig = 0.55680 g fine<br>\n<b>1 Guter Groschen Courant</b> (until 1821) = 12 Pfennig Courant = 0.69600 g fine<br>\n<b>¼ Thaler</b> = 6 Gute Groschen Courant (until 1821) = 7½ Silbergroschen (from 1821)<br>\n<em>Ggr. Courant here (0.69600 g) ≠ Ggr. Courant of the Leipziger Fuß (0.81200 g)</em>\n"
          uk: "<b>до 1821 — 1 Thaler Courant</b> = 24 Gute Groschen Courant = 288 Pfennig Courant<br>\n<b>до 1821 — 1/6 Thaler</b> = 4 Gute Groschen Courant = 48 Pfennig Courant<br>\n<b>з 1821 — 1 Thaler</b> = 30 Silbergroschen = 360 Pfennig<br>\n<b>1 Silbergroschen</b> (з 1821) = 12 Pfennig = 0,55680 г чистого<br>\n<b>1 Guter Groschen Courant</b> (до 1821) = 12 Pfennig Courant = 0,69600 г чистого<br>\n<b>¼ Thaler</b> = 6 Gute Groschen Courant (до 1821) = 7½ Silbergroschen (з 1821)<br>\n<em>Ggr. Courant тут (0,69600 г) ≠ Ggr. Courant Лейпцизької стопи (0,81200 г)</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Preußen:</b> 1750–1856 (Hauptprägung); Vereinsthaler biß 1871; als 3-Mark-Stück biß 1907.<br>
          <b>Nach Dresdner Münzvertrag (1838):</b> Hannover (1834–1866); Kurhessen (de facto 1819, de jure 1834–1866); Sachsen (1841–1871); Baden, Württemberg, Bayern, Hessen-Darmstadt, Nassau, Frankfurt (1838–1871); Braunschweig, Lippe, Oldenburg.<br>
          <b>Mecklenburg-Schwerin, Mecklenburg-Strelitz:</b> 1848–1871.<br>
          <b>Hamburg, Lübeck:</b> de facto ab 1856 (preuß. Thaler als Hauptumlaufmünze); offiziell 1866.<br>
          <b>Nicht angenommen:</b> Österreich (Conventions-Fuß biß 1856); Bremen (Pistolenwährung); Schleswig-Holstein (eigene Münzfüße biß 1864).
        en: |
          <b>Prussia:</b> 1750–1856 (main coinage); Vereinsthaler until 1871; as 3-Mark piece until 1907.<br>
          <b>After the Dresden Mint Treaty (1838):</b> Hanover (1834–1866); Electoral Hesse (de facto 1819, de jure 1834–1866); Saxony (1841–1871); Baden, Württemberg, Bavaria, Hesse-Darmstadt, Nassau, Frankfurt (1838–1871); Brunswick, Lippe, Oldenburg.<br>
          <b>Mecklenburg-Schwerin, Mecklenburg-Strelitz:</b> 1848–1871.<br>
          <b>Hamburg, Lübeck:</b> de facto from 1856 (Prussian thaler as principal circulating coin); officially 1866.<br>
          <b>Did not adopt:</b> Austria (Conventions-Fuß until 1856); Bremen (pistole currency); Schleswig-Holstein (own standards until 1864).
        uk: |
          <b>Пруссія:</b> 1750–1856 (основне карбування); Vereinsthaler до 1871; як 3-Marckfuß монета до 1907.<br>
          <b>Після Дрезденської монетної угоди (1838):</b> Ганновер (1834–1866); Курхессен (де-факто 1819, де-юре 1834–1866); Саксонія (1841–1871); Баден, Вюртемберг, Баварія, Гессен-Дармштадт, Нассау, Франкфурт (1838–1871); Брауншвайг, Ліппе, Ольденбург.<br>
          <b>Мекленбург-Шверін, Мекленбург-Стреліц:</b> 1848–1871.<br>
          <b>Гамбург, Любек:</b> де-факто від 1856 (прусський Thaler як головна обігова монета); офіційно 1866.<br>
          <b>Не прийняли:</b> Австрія (Конвенційна стопа до 1856); Бремен (Pistolenwährung); Шлезвіг-Гольштейн (власні монетні стопи до 1864).

# ------------------------------------------------------------------
# 3b. Preußischer Banco-Fuß · 10⅔-Pfund-Banco-Fuß (Giralgeld)
# ------------------------------------------------------------------
  - id: preussischer_bancofuss
    metal: giro
    years_label:
      de: "1765 → 1806"
      en: "1765 → 1806"
      uk: "1765 → 1806"
    name: 10⅔-Pfund-Banco-Fuß · 16-Guldenfuß
    historical_name: Preußischer Banco-Fuß
    subtitle:
      de: "Königliche Giro- und Lehn-Banco Berlin · gegründet 17. Juni 1765 · Preußische Müntzmarck = 233,856 g Feinsilber · Nomineller Pari: 1 Pfund Banco = ¼ Friedrichsdor (Kursstabilität beabsichtigt aber nicht gehalten — das Bancopfund sank sofort im Kurs) · Rechnungssystem biß 1847 fortgeführt"
      en: "Königliche Giro- und Lehn-Banco Berlin · founded 17 June 1765 · Prussian Müntzmarck = 233.856 g fine silver · nominal par: 1 Pfund Banco = ¼ Friedrichsdor (intended stability not held — the Banco-Pfund fell below par immediately) · book-money system continued until 1847"
      uk: "Königliche Giro- und Lehn-Banco Berlin · засновано 17 червня 1765 · Прусська монетна марка = 233,856 г чистого срібла · номінальний паритет: 1 Pfund Banco = ¼ Friedrichsdor (стабільність короткотермінова — Banco-Pfund одразу впав нижче паритету) · розрахункова система зберігалась до 1847"
    body:
      - kind: rows
        items:
          - key: {de: "1 Pfund Banco (Rechnung, 10⅔-Fuß)", en: "1 Pfund Banco (accounting, 10⅔-Fuß)", uk: "1 Pfund Banco (розрахунково, 10⅔-Pfund-Banco-Fuß)"}
            value: {de: "<b>21,92400 g</b> Silber-Äquiv. (= 233,856 / 10⅔) — theoretisch; in der Praxis schwankend", en: <b>21.92400 g</b> silver equivalent (= 233.856 / 10⅔) — theoretical; in practice fluctuating, uk: '<b>21,92400 г</b> срібного еквіваленту (= 233,856 / 10⅔) — теоретично; на практиці коливалось'}
          - key: {de: "Einlagemünze", en: Reserve coin, uk: Резервна монета}
            value: {de: "Preuß. Thaler Banco (10½-Fuß, Burgundischer Standard) — eigener Münzfuß; nie ausgegeben → vgl. Karte: Burgundischer Fuß · 10½-Thalerfuß", en: 'Prussian Thaler Banco (10½-Fuß, Burgundischer Fuß) — own coinage standard; never issued → see card: Burgundischer Fuß · 10½-Thaler', uk: 'Прусський Thaler Banco (10½-Thalerfuß, Бургундський стандарт) — власна стопа; ніколи не випущена → див. картку: Бургундська стопа · 10½-Thalerfuß'}
      - kind: prose
        label:
          de: "Rechnungsfraktionen"
          en: "Accounting fractions"
          uk: "Розрахункові фракції"
        content:
          de: |
            <b>1 Pfund Banco</b> = ¼ Friedrichsdor (nomineller Pari bei Gründung; in der Praxis schwankend und meist unter pari)<br>
            <b>1 Pfund Banco</b> = 27/32 (0,84375) Reichsthaler Species (9-Fuß) · oder: 1 Thaler Specie = 32/27 (1,185...) Pfund Banco<br>
            <b>1 Pfund Banco</b> = 21/16 (1,3125) Thaler Courant (Graumannscher, 14-Fuß) · oder: 1 Thaler Courant = 16/21 (0,761...) Pfund Banco<br>
            <b>1 Pfund Banco</b> = 24 Groschen Banco = 288 Pfennig Banco<br>
            <b>1 Groschen Banco</b> = 12 Pfennig Banco<br>
            <b>Pfennig Banco</b> = nur Rechnungseinheit, nie als Münze geprägt<br>
            <b>1 Gulden</b> (Rechenäquivalent) = ⅔ Pfund Banco = 16 Groschen Banco = 192 Pfennig Banco = <b>14,61600 g</b> fein = 9/16 (0,5625) Thaler Specie (9-Fuß)<br>
            <b>4 Pfund Banco</b> = 1 Friedrichsdor (6,05 g Feingold biß 1770; 6,03 g ab 1770)<br>
            <b>100 Pfund Banco</b> = 25 Friedrichsdor<br>
            <em>Pfund Banco (10⅔-Fuß, 21,92400 g) und Thaler-Banco-Einlagemünze (10½-Fuß, 22,27200 g) sind verschiedene Münzfüße — Verhältniß 63:64. Das Bancopfund sank trotz Stützungskäufen sofort unter pari.</em>
          en: "<b>1 Pfund Banco</b> = ¼ Friedrichsdor (nominal par at foundation; in practice fluctuating and mostly below par)<br>\n<b>1 Pfund Banco</b> = 27/32 (0.84375) Reichsthaler Species (9-Fuß) · or: 1 Thaler Specie = 32/27 (1.185...) Pfund Banco<br>\n<b>1 Pfund Banco</b> = 21/16 (1.3125) Thaler Courant (Graumann, 14-Fuß) · or: 1 Thaler Courant = 16/21 (0.761...) Pfund Banco<br>\n<b>1 Pfund Banco</b> = 24 Groschen Banco = 288 Pfennig Banco<br>\n<b>1 Groschen Banco</b> = 12 Pfennig Banco<br>\n<b>Pfennig Banco</b> = accounting unit only, never struck as a coin<br>\n<b>1 Gulden</b> (computed equivalent) = ⅔ Pfund Banco = 16 Groschen Banco = 192 Pfennig Banco = <b>14.61600 g</b> fine = 9/16 (0.5625) Thaler Specie (9-Fuß)<br>\n<b>4 Pfund Banco</b> = 1 Friedrichsdor (6.05 g fine gold until 1770; 6.03 g from 1770)<br>\n<b>100 Pfund Banco</b> = 25 Friedrichsdor<br>\n<em>Pfund Banco (10⅔-Fuß, 21.92400 g) and the Thaler-Banco reserve coin (10½-Fuß, 22.27200 g) are different standards — ratio 63:64. The Banco-pound, despite support purchases, fell below par immediately.</em>\n"
          uk: "<b>1 Pfund Banco</b> = ¼ Friedrichsdor (номінальний паритет при заснуванні; на практиці коливався і здебільшого був нижче паритету)<br>\n<b>1 Pfund Banco</b> = 27/32 (0,84375) Reichsthaler Species (9-Thalerfuß) · або: 1 Thaler Specie = 32/27 (1,185...) Pfund Banco<br>\n<b>1 Pfund Banco</b> = 21/16 (1,3125) Thaler Courant (Грауманн, 14-Thalerfuß) · або: 1 Thaler Courant = 16/21 (0,761...) Pfund Banco<br>\n<b>1 Pfund Banco</b> = 24 Groschen Banco = 288 Pfennig Banco<br>\n<b>1 Groschen Banco</b> = 12 Pfennig Banco<br>\n<b>Pfennig Banco</b> = лише розрахункова одиниця, як монета не карбувався<br>\n<b>1 Gulden</b> (розрахунковий еквівалент) = ⅔ Pfund Banco = 16 Groschen Banco = 192 Pfennig Banco = <b>14,61600 г</b> чистого = 9/16 (0,5625) Thaler Specie (9-Thalerfuß)<br>\n<b>4 Pfund Banco</b> = 1 Friedrichsdor (6,05 г чистого золота до 1770; 6,03 г з 1770)<br>\n<b>100 Pfund Banco</b> = 25 Friedrichsdor<br>\n<em>Pfund Banco (10⅔-Thalerfuß, 21,92400 г) і Thaler-Banco-резервна монета (10½-Thalerfuß, 22,27200 г) — різні стопи; співвідношення 63:64. Banco-Pfund, попри підтримуючі викупи, одразу впав нижче паритету.</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Nur:</b> Preußen / Berlin (Königliche Giro- und Lehn-Banco, 1765–1806).<br>
          <b>1806:</b> Ausgabe von Banknoten eingestellt (napoleonische Besetzung Berlins).<br>
          <b>1847:</b> Umbenennung in Preußische Bank; Pfund Banco als Einheit aufgegeben.
        en: |
          <b>Only:</b> Prussia / Berlin (Royal Giro and Loan Banco, 1765–1806).<br>
          <b>1806:</b> Banknote issuance suspended (Napoleonic occupation of Berlin).<br>
          <b>1847:</b> Renamed Prussian Bank; Pfund Banco abandoned as a unit.
        uk: |
          <b>Лише:</b> Пруссія / Берлін (Königliche Giro- und Lehn-Banco, 1765–1806).<br>
          <b>1806:</b> випуск банкнот припинено (наполеонівська окупація Берліна).<br>
          <b>1847:</b> перейменовано на Прусський банк; Pfund Banco скасовано як одиницю.

# ------------------------------------------------------------------
# 4. Conventions-Fuß · 20-Guldenfuß / 10-Thalerfuß
# ------------------------------------------------------------------
  - id: conventions_fuss
    metal: silver
    years_label:
      de: "1750/1753 → 1856"
      en: "1750/1753 → 1856"
      uk: "1750/1753 → 1856"
    name: 20-Guldenfuß · 10-Thalerfuß
    historical_name: Conventions-Fuß
    subtitle:
      de: "AD NORMAM CONVENTIONIS · Müntzconvention 20. Sept. 1753 · Wiener Müntzmarck = 233,890 g · Bayrische Müntzmarck = 233,950 g · Normwert (Cöllnische Marck) = 233,856 g Feinsilber · in Deutschland biß 1838, in Österreich biß 1856"
      en: "AD NORMAM CONVENTIONIS · Convention 20 Sept. 1753 · Wiener Müntzmarck = 233.890 g · Bayrische Müntzmarck = 233.950 g · normative Cöllnische Marck = 233.856 g fine silver · in Germany until 1838, in Austria until 1856"
      uk: "AD NORMAM CONVENTIONIS · Конвенція 20 вересня 1753 · Віденська монетна марка = 233,890 г · Баварська = 233,950 г · нормативна Кельнська марка = 233,856 г чистого срібла · у Німеччині до 1838, в Австрії до 1856"
    body:
      - kind: rows
        items:
          - key: {de: "Feingewicht (Wien)", en: Fine weight (Vienna), uk: Чиста вага (Відень)}
            value: {de: "<b>23,38900 g</b> (= 233,890 / 10) · »X EINE FEINE MARK«", en: <b>23.38900 g</b> (= 233.890 / 10) · «X EINE FEINE MARK», uk: '<b>23,38900 г</b> (= 233,890 / 10) · «X EINE FEINE MARK»'}
          - key: {de: "Feingewicht (Bayern)", en: Fine weight (Bavaria), uk: Чиста вага (Баварія)}
            value: {de: "<b>23,39500 g</b> (= 233,950 / 10)", en: <b>23.39500 g</b> (= 233.950 / 10), uk: '<b>23,39500 г</b> (= 233,950 / 10)'}
          - key: {de: "Feingewicht (Normwert)", en: Fine weight (normative), uk: Чиста вага (нормативна)}
            value: {de: "<b>23,3856 g</b> (= 233,856 / 10)", en: <b>23.3856 g</b> (= 233.856 / 10), uk: '<b>23,3856 г</b> (= 233,856 / 10)'}
          - key: {de: "Raugewicht", en: Rough weight, uk: Повна вага}
            value: {de: "28,06680 g · 833,33 ‰", en: 28.06680 g · 833.33 ‰, uk: '28,06680 г · 833,33 ‰'}
          - key: {de: "½ Conv.-Thaler (Wien)", en: ½ Conv. Thaler (Vienna), uk: ½ Conv. Thaler (Відень)}
            value: {de: "<b>11,6945 g</b> fein", en: <b>11.6945 g</b> fine, uk: '<b>11,6945 г</b> чистого'}
      - kind: prose
        label:
          de: "Rechnungsfraktionen"
          en: "Accounting fractions"
          uk: "Розрахункові фракції"
        content:
          de: |
            <b>1 Conventionsthaler</b> (Österreich) = 120 Kreutzer = 2 Conventionsgulden<br>
            <b>1 Conventionsthaler</b> (Süddtl., ab 1754) = 144 Kreutzer = 2 Gulden 24 Kreutzer<br>
            <b>1 Conventionsgulden</b> = 60 Kreutzer = 240 Pfennig<br>
            <b>¼ Conventionsthaler</b> = 30 Kreutzer (Österr.) = 36 Kreutzer (Süddtl.)<br>
            <b>1 Kreutzer</b> = 4 Pfennig = 8 Heller<br>
            <b>1 Pfennig</b> = 2 Heller<br>
            <b>1 Conventionsthaler</b> (norddeutsch bewertet) = 32 Gute Groschen Courant = 4/3 Thaler Courant (14-Thaler-Fuß)<br>
            <em>Nach Silbergehalt: 1 Conv.thaler ≈ 9/10 Thaler Specie (23,386 / 25,984 = 0,900)</em><br>
            <em><b>Woher 13⅓-Fuß:</b> 10 Conventionsthaler je Mark, aber 1 Conv.thaler = 32 Groschen = 4/3 alter Rechnungsreichsthaler (zu 24 Groschen) → 10 × 4/3 = <b>40/3 = 13⅓</b> Rechnungsreichsthaler je Mark. Als Rechnungseinheit in Norddeutschland allgemein gebräuchlich; als eigenständige Münze im <b>13⅓-Couranttaler-Fuß</b> geprägt — siehe eigene Kartei.</em>
          en: "<b>1 Conventionsthaler</b> (Austria) = 120 Kreutzer = 2 Conventionsgulden<br>\n<b>1 Conventionsthaler</b> (South Germany, from 1754) = 144 Kreutzer = 2 Gulden 24 Kreutzer<br>\n<b>1 Conventionsgulden</b> = 60 Kreutzer = 240 Pfennig<br>\n<b>¼ Conventionsthaler</b> = 30 Kreutzer (Austria) = 36 Kreutzer (South Germany)<br>\n<b>1 Kreutzer</b> = 4 Pfennig = 8 Heller<br>\n<b>1 Pfennig</b> = 2 Heller<br>\n<b>1 Conventionsthaler</b> (valued in North German terms) = 32 Gute Groschen Courant = 4/3 Thaler Courant (14-Thalerfuß)<br>\n<em>By silver content: 1 Conv. thaler ≈ 9/10 Thaler Specie (23.386 / 25.984 = 0.900)</em><br>\n<em><b>Why 13⅓-Fuß:</b> 10 Conventionsthaler per mark, but 1 Conv. thaler = 32 Groschen = 4/3 of the old accounting Reichsthaler (at 24 Groschen) → 10 × 4/3 = <b>40/3 = 13⅓</b> accounting Reichsthaler per mark. Used universally as an accounting unit in North Germany; struck as a separate coin on the <b>13⅓-Couranttaler standard</b> — see its own card.</em>\n"
          uk: "<b>1 Conventionsthaler</b> (Австрія) = 120 Kreutzer = 2 Conventionsgulden<br>\n<b>1 Conventionsthaler</b> (Південна Німеччина, з 1754) = 144 Kreutzer = 2 Gulden 24 Kreutzer<br>\n<b>1 Conventionsgulden</b> = 60 Kreutzer = 240 Pfennig<br>\n<b>¼ Conventionsthaler</b> = 30 Kreutzer (Австрія) = 36 Kreutzer (Південна Німеччина)<br>\n<b>1 Kreutzer</b> = 4 Pfennig = 8 Heller<br>\n<b>1 Pfennig</b> = 2 Heller<br>\n<b>1 Conventionsthaler</b> (за північно-німецькою оцінкою) = 32 Gute Groschen Courant = 4/3 Thaler Courant (14-Thalerfuß)<br>\n<em>За вмістом срібла: 1 Conv. Thaler ≈ 9/10 Thaler Specie (23,386 / 25,984 = 0,900)</em><br>\n<em><b>Звідки 13⅓-Thalerfuß:</b> 10 Conventionsthaler з марки, але 1 Conv. Thaler = 32 Groschen = 4/3 старого розрахункового Reichsthaler (по 24 Groschen) → 10 × 4/3 = <b>40/3 = 13⅓</b> розрахункових Reichsthaler з марки. Як розрахункова одиниця широко вживалось у Північній Німеччині; як самостійна монета карбувалась за <b>13⅓-Couranttaler-Fuß</b> — див. окрему картку.</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Österreich:</b> 1750–1856 (einschließlich aller Habsburger Erblande; Tirol, Böhmen, Mähren, Ungarn, Österreichische Niederlande).<br>
          <b>Bayern:</b> 1753–1754 (dann Übergang zum 24-Guldenfuß mit Kurs 144 Kreutzer statt 120).<br>
          <b>Kursachsen:</b> 1763–1838.<br>
          <b>Hannover:</b> 1817–1834 (Annahme des Conventionsfußes 1817; 1834 Übergang zum preußischen 14-Thaler-Fuß).<br>
          <b>Weitere Stände:</b> Hildesheim (biß 1803); Oldenburg; Mecklenburg-Strelitz; Braunschweig-Wolfenbüttel (zeitweise).<br>
          <b>Nicht angenommen:</b> Preußen, Hansestädte, Holstein.
        en: |
          <b>Austria:</b> 1750–1856 (including all Habsburg hereditary lands; Tyrol, Bohemia, Moravia, Hungary, Austrian Netherlands).<br>
          <b>Bavaria:</b> 1753–1754 (then shifted to the 24-Guldenfuß with a rate of 144 Kreutzer instead of 120).<br>
          <b>Electoral Saxony:</b> 1763–1838.<br>
          <b>Hanover:</b> 1817–1834 (adopted Conventions-Fuß 1817; 1834 shifted to the Prussian 14-Thalerfuß).<br>
          <b>Other estates:</b> Hildesheim (until 1803); Oldenburg; Mecklenburg-Strelitz; Brunswick-Wolfenbüttel (intermittently).<br>
          <b>Did not adopt:</b> Prussia, the Hanseatic cities, Holstein.
        uk: |
          <b>Австрія:</b> 1750–1856 (включно з усіма габсбурзькими спадковими землями; Тироль, Богемія, Моравія, Угорщина, Австрійські Нідерланди).<br>
          <b>Баварія:</b> 1753–1754 (потім перехід до 24-Guldenfuß з курсом 144 Kreutzer замість 120).<br>
          <b>Курсаксонія:</b> 1763–1838.<br>
          <b>Ганновер:</b> 1817–1834 (прийняття Конвенційної стопи 1817; 1834 перехід до прусської 14-Thalerfuß).<br>
          <b>Інші стани:</b> Гільдесгайм (до 1803); Ольденбург; Мекленбург-Стреліц; Брауншвайг-Вольфенбюттель (час від часу).<br>
          <b>Не прийняли:</b> Пруссія, ганзейські міста, Гольштейн.

# ------------------------------------------------------------------
# 4b. Conventionscouranttaler-Fuß · 13⅓-Thalerfuß
# ------------------------------------------------------------------
  - id: conventionscouranttaler_fuss
    metal: silver
    years_label:
      de: "1760 → 1779"
      en: "1760 → 1779"
      uk: "1760 → 1779"
    name: 13⅓-Thalerfuß
    # historical_name: synthesised compound (CLAUDE.md §0 narrow
    # exception). Period sources do not attest a separate «-Fuß»
    # name for this 24-Groschen variant of the Konventionsfuß
    # (verified: Meyers 1888, Bobzin, Wikipedia DE «Blutdollar» —
    # see ref5/ref6/ref7); «Conventionscouranttaler» is the COIN
    # name, not a standard. User-approved synthesis: «Conventions-
    # Courant-Fuß» as the closest descriptive identifier formed
    # from the period-correct «Conventions-Fuß» + «Courant»
    # qualifier (the 24-Groschen accounting register).
    historical_name: Conventions-Courant-Fuß
    subtitle:
