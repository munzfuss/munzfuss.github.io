            <b>1 Thaler Specie</b> = 3 Marck Banco (Altonaer Banco-Fuß з 1777: 27¾ Marck Banco з чистої Кельнської марки)<br>
            <b>1 Thaler Specie</b> = 2 Rigsbankdaler (з 1813)<br>
