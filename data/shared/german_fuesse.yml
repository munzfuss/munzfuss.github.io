          en: "<b>1 Thaler Specie</b> = 1⅓ Thaler Courant = 32 Gute Groschen Courant = 384 Pfennig Courant<br>\n<b>1 Thaler Courant</b> (accounting unit) = ¾ Thaler Specie = 24 Gute Groschen Courant = 288 Pfennig Courant<br>\n<b>1× ⅔-Thaler</b> (Gulden) = ½ Thaler Specie = ⅔ Thaler Courant = 16 Gute Groschen Courant = 192 Pfennig Courant<br>\n<b>1× ⅓-Thaler</b> = ¼ Thaler Specie = ⅓ Thaler Courant = 8 Gute Groschen Courant = 96 Pfennig Courant<br>\n<b>2× ⅔-Thaler</b> = 1 Thaler Specie (2 × 12.992 = 25.98400 g ✓)<br>\n<b>1 Guter Groschen Courant</b> = 12 Pfennig Courant = 0.81200 g fine<br>\n<em>Ggr. Courant (0.81200 g) ≠ Ggr. Species (1.08267 g) — same name, different silver content</em>\n"
          uk: "<b>1 Thaler Specie</b> = 1⅓ Thaler Courant = 32 Gute Groschen Courant = 384 Pfennig Courant<br>\n<b>1 Thaler Courant</b> (розрахункова одиниця) = ¾ Thaler Specie = 24 Gute Groschen Courant = 288 Pfennig Courant<br>\n<b>1× ⅔-Thaler</b> (Gulden) = ½ Thaler Specie = ⅔ Thaler Courant = 16 Gute Groschen Courant = 192 Pfennig Courant<br>\n<b>1× ⅓-Thaler</b> = ¼ Thaler Specie = ⅓ Thaler Courant = 8 Gute Groschen Courant = 96 Pfennig Courant<br>\n<b>2× ⅔-Thaler</b> = 1 Thaler Specie (2 × 12,992 = 25,98400 г ✓)<br>\n<b>1 Guter Groschen Courant</b> = 12 Pfennig Courant = 0,81200 г чистого<br>\n<em>Ggr. Courant (0,81200 г) ≠ Ggr. Species (1,08267 г) — однакова назва, різний вміст срібла</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Vertragsgründer (16. Januar 1690):</b> Kurbrandenburg, Kursachsen, Braunschweig-Lüneburg<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup>.<br>
          <b>Rasch beigetreten:</b> Nahezu alle nord- und mitteldeutschen Stände; Hansestädte (als Umlaufmünze).<br>
          <b>Mecklenburg-Schwerin:</b> 1738 als Landeswährung erklärt; ⅔-Thaler geprägt biß 1829.<br>
          <b>Hannover:</b> Prägte ⅔-Thaler weiter auch nach Annahme des Conventions-Fußes.<br>
          <b>Reichsfuß-Status — 1692:</b> Leopolds I. Decret erklärt den Leipziger Müntzfuß ausdrücklich nicht zum Reichsmünzfuß — die nach diesem Fuß ausgeprägten ⅔-, ⅓- und ⅙-Taler galten nicht als Reichsmünzen<sup><a href="#ref17">[17]</a></sup>.<br>
          <b>Reichsfuß-Status — 1738:</b> Karl-VI.-Kommissionsedikt erhebt den Leipziger Müntzfuß zum Reichsmünzfuß<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup>; nunmehr einschließlich Halbtaler, Vierteltaler, Achteltaler, Zwölfteltaler, niederrheinische Blaffert / 9-Kreuzer-Stück sowie Dukaten und Goldgulden<sup><a href="#ref17">[17]</a></sup>. Variante Datierung: der Regensburger Reichstag erklärte den Fuß bereits 1735 als neuen Müntzfuß<sup><a href="#ref19">[19]</a></sup>; wahrscheinlich zwei Akte (Reichstagsbeschluß 1735 und Vollzugsedikt 1738).<br>
          <b>Period-Beleg Meyers:</b> der Leipziger / 18-Gulden-Fuß von 1690 wurde 1738 zwar zum Reichsfuß erhoben, aber nicht allgemein eingeführt<sup><a href="#ref26">[26]</a></sup> — die Erhebung blieb formal, nicht reichsweit durchgesetzt.<br>
          <b>Nicht angenommen:</b> Süddeutschland (Gulden-Länder); Österreich (eigener Fuß).
        en: |
          <b>Treaty signatories (16 January 1690):</b> Electoral Brandenburg, Electoral Saxony, Brunswick-Lüneburg<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup>.<br>
          <b>Quickly acceded:</b> Nearly all North and Central German estates; the Hanseatic cities (as circulating currency).<br>
          <b>Mecklenburg-Schwerin:</b> Declared territorial currency 1738; ⅔-Thaler struck until 1829.<br>
          <b>Hanover:</b> Continued striking ⅔-Thaler even after adopting the Conventions-Fuß.<br>
          <b>Reichsfuß status — 1692:</b> Leopold I's decree expressly declared the Leipziger Müntzfuß not to be the Reichsmünzfuß — ⅔-, ⅓-, and ⅙-Taler struck on this standard were held not to be Reichsmünzen<sup><a href="#ref17">[17]</a></sup>.<br>
          <b>Reichsfuß status — 1738:</b> Karl VI's Kommissionsedikt elevates the Leipziger Müntzfuß to Reichsmünzfuß<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup>; now covering Halbtaler, Vierteltaler, Achteltaler, Zwölfteltaler, Niederrheinische Blaffert / 9-Kreuzer-Stück, Dukaten and Goldgulden<sup><a href="#ref17">[17]</a></sup>. Dating variant: the Regensburg Reichstag had already declared the standard the new Müntzfuß in 1735<sup><a href="#ref19">[19]</a></sup>; likely two separate acts (Reichstag resolution 1735 and execution edict 1738).<br>
          <b>Meyers period-source:</b> the Leipziger / 18-Gulden-Fuß of 1690 was elevated to Reichsfuß in 1738 but was not generally introduced across the empire<sup><a href="#ref26">[26]</a></sup> — the elevation remained formal, not Empire-wide enforced.<br>
          <b>Did not adopt:</b> Southern Germany (Gulden lands); Austria (own standard).
        uk: |
          <b>Сторони угоди (16 січня 1690):</b> Курбранденбург, Курсаксонія, Брауншвайг-Люнебург<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup>.<br>
          <b>Швидко приєднались:</b> майже всі північно- й центральнонімецькі стани; ганзейські міста (як обігова монета).<br>
          <b>Мекленбург-Шверін:</b> 1738 проголошено як земельна валюта; ⅔-Thaler карбувались до 1829.<br>
          <b>Ганновер:</b> продовжував карбувати ⅔-Thaler і після прийняття Конвенційної стопи.<br>
          <b>Статус Reichsfuß — 1692:</b> декрет Леопольда I прямо оголошує, що Leipziger Müntzfuß не є Reichsmünzfuß — карбовані за ним ⅔-, ⅓- та ⅙-Taler не вважалися Reichsmünzen<sup><a href="#ref17">[17]</a></sup>.<br>
          <b>Статус Reichsfuß — 1738:</b> Kommissionsedikt Карла VI підносить Leipziger Müntzfuß до Reichsmünzfuß<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup>; тепер охоплює Halbtaler, Vierteltaler, Achteltaler, Zwölfteltaler, Niederrheinische Blaffert / 9-Kreuzer-Stück, Dukaten і Goldgulden<sup><a href="#ref17">[17]</a></sup>. Варіант датування: Reichstag у Регенсбурзі вже 1735 р. оголосив цю стопу новою Müntzfuß<sup><a href="#ref19">[19]</a></sup>; імовірно два окремі акти (постанова Reichstag 1735 і виконавчий едикт 1738).<br>
          <b>Період-джерело Meyers:</b> Leipziger / 18-Gulden-Fuß 1690 р. було піднесено до Reichsfuß 1738 р., однак він не був загально запроваджений у Імперії<sup><a href="#ref26">[26]</a></sup> — піднесення лишилось формальним, не загальноімперським.<br>
          <b>Не прийняли:</b> Південна Німеччина (землі Gulden); Австрія (власна стопа).

