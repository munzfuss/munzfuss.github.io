          uk: "<b>1 Thaler Courant</b> = 3 Marck Courant = 48 Schilling Courant = 576 Pfennig = <b>20,63435 г</b><br>\n<b>1 Thaler Specie</b> (9-Thalerfuß) ≈ 1¼ Thaler Courant ≈ 60 Schilling Courant = <b>25,98400 г</b><br>\n<b>1 Marck Courant</b> = 16 Schilling = 192 Pfennig<br>\n<b>1 Schilling Courant</b> = 12 Pfennig · ½ Sch. = Sechsling · ¼ Sch. = Dreiling\n"
      - kind: phase_header
