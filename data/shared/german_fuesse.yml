      uk: 'Самостійна числова форма Konventionsfuß — 13⅓-Talerfuß є альтернативним поділом поряд з 20-Guldenfuß / 10-Talerfuß (Konventionstaler) · Konventionscouranttaler — це відповідна монета (24 Gute Groschen, проти 32 Gute Groschen у Konventionstaler)<sup><a href="#ref5">[5]</a></sup><sup><a href="#ref6">[6]</a></sup><sup><a href="#ref7">[7]</a></sup> · Кельнська марка = 233,856 г чистого срібла · <em>«Conventions-Courant-Fuß» — синтезований ідентифікатор, не період-атестований термін (див. ref5/ref6/ref7)</em>'
    body:
      - kind: rows
