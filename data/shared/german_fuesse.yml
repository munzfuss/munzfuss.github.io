          - key: {de: "Münzbeleg Hessen-Kassel · Sterntaler", en: Hesse-Kassel attestation · Sterntaler, uk: Атестація Гессен-Касселя · Sterntaler}
            value: {de: "Friedrich II. · 1776, 1778, 1779 · 750 ‰ (12 Lot) · 23,38 g rau → <b>17,535 g</b> fein ≈ 17,539 g ✓ (nach Gerhard Schön, DM 18. Jh.) · Wikipedia: «ausgeprägter Rechnungsthaler im 13⅓-Thaler-Fuß zu 24 Guten Groschen» · bekannt als «Blutdollar» (Nordamerika) und «Sterntaler» (Namensgeber des Grimm-Märchens)", en: 'Frederick II · 1776, 1778, 1779 · 750 ‰ (12 Lot) · 23.38 g rough → <b>17.535 g</b> fine ≈ 17.539 g ✓ (per Gerhard Schön, DM 18. Jh.) · Wikipedia: «struck as an accounting thaler on the 13⅓-Thaler-Fuß at 24 Gute Groschen» · known as the «Blood Dollar» (North America) and «Sterntaler» (eponym of the Grimm fairy tale)', uk: 'Фрідріх II · 1776, 1778, 1779 · 750 ‰ (12 Лот) · 23,38 г повної → <b>17,535 г</b> чистого ≈ 17,539 г ✓ (за Gerhard Schön, DM 18. Jh.) · Wikipedia: «карбувався як розрахунковий Thaler за 13⅓-Thaler-Fuß по 24 Gute Groschen» · відомий як «Кровний долар» (Північна Америка) і «Sterntaler» (епонім казки братів Грімм)'}
