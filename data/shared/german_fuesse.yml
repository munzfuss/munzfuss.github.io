  - id: rigsbankdaler_18_5
    metal: silver
    years_label:
      de: "1813 → 1864"
      en: "1813 → 1864"
      uk: "1813 → 1864"
    name: 18½-Thalerfuß
    historical_name: Rigsbankdalerfuß / Rigsdaler R.M. (Rigsmønt)
    subtitle:
      de: "Holstein und Schleswig nach dänischem Staatsbankrott 1813 · Cöllnische Marck = 233,856 g Feinsilber"
      en: "Holstein and Schleswig after the Danish state bankruptcy 1813 · Cöllnische Marck = 233.856 g fine silver"
      uk: "Гольштейн і Шлезвіг після данського державного банкрутства 1813 · Кельнська марка = 233,856 г чистого срібла"
    body:
      - kind: phase_header
        title: {de: "Phasen", en: "Phases", uk: "Фази"}
      - kind: phase_summary
        content:
          de: "<b>1813–1854 — Rigsbankdaler:</b> Neue dänische Münze nach dem Staatsbankrott. Im holsteinischen Deutschen ohne eigene etablierte Übersetzung — auf Kassenanweisungen erscheint er lediglich als Wertangabe in der alten Courant-Währung (30 Schilling S.-H. Courant)."
          en: "<b>1813–1854 — Rigsbankdaler:</b> The new Danish coin issued after the state bankruptcy. In Holstein German it has no established equivalent term — on treasury notes it appears only as a value statement in the old Courant currency (30 Schilling S.-H. Courant)."
          uk: "<b>1813–1854 — Rigsbankdaler:</b> Нова данська монета після державного банкрутства. У гольштейнсько-німецькій без усталеного перекладу — на казначейських розписках з'являється лише як вартісне позначення у старій курантній валюті (30 Schilling S.-H. Courant)."
      - kind: phase_summary
        content:
          de: "<b>1854–1864 — Thaler Reichsmünze</b> (dän. Rigsdaler R.M., Rigsmønt): Nur Umbenennung durch König Friedrich VII. — kein Münzfuß-, kein Wertänderung. Im Nominaltext der Kassenanweisungen: »Reichsthaler« oben, »Thaler Reichsmünze« im Fließtext als Synonym."
          en: "<b>1854–1864 — Thaler Reichsmünze</b> (Dan. Rigsdaler R.M., Rigsmønt): Only a renaming by King Frederick VII — no change in standard or value. On treasury notes: «Reichsthaler» above, «Thaler Reichsmünze» in the running text as a synonym."
          uk: "<b>1854–1864 — Thaler Reichsmünze</b> (дан. Rigsdaler R.M., Rigsmønt): лише перейменування королем Фредеріком VII — без зміни стопи чи вартості. На казначейських розписках: «Reichsthaler» зверху, «Thaler Reichsmünze» у тексті як синонім."
      - kind: phase_header
        title:
          de: "I. Dänische Münze (Rigsbankdaler-System)"
          en: "I. Danish coinage (Rigsbankdaler system)"
          uk: "I. Данські монети (Rigsbankdaler-система)"
      - kind: rows
        items:
          - key: {de: "Feingewicht Rigsbankdaler", en: 'Fine weight, Rigsbankdaler', uk: Чиста вага Rigsbankdaler}
            value: {de: "<b>12,64086 g</b> (= 233,856 / 18,5) · 14,44670 g rau · 875 ‰ · Münzbeleg ✓✓", en: <b>12.64086 g</b> (= 233.856 / 18.5) · 14.44670 g rough · 875 ‰ · attestation ✓✓, uk: '<b>12,64086 г</b> (= 233,856 / 18,5) · 14,44670 г повної · 875 ‰ · атестовано ✓✓'}
      - kind: prose
        label: {de: "Dänische Rechnungsfraktionen (offiziell)", en: "Danish accounting fractions (official)", uk: "Данські розрахункові фракції (офіційно)"}
        content:
          de: |
            <b>1 Rigsbankdaler</b> = 96 Rigsbankskilling = <b>12,64086 g</b><br>
            <b>1 Rigsbankskilling</b> = <b>0,13168 g</b> fein
          en: "<b>1 Rigsbankdaler</b> = 96 Rigsbankskilling = <b>12.64086 g</b><br>\n<b>1 Rigsbankskilling</b> = <b>0.13168 g</b> fine\n"
          uk: "<b>1 Rigsbankdaler</b> = 96 Rigsbankskilling = <b>12,64086 г</b><br>\n<b>1 Rigsbankskilling</b> = <b>0,13168 г</b> чистого\n"
      # II. Holsteinische Alltagswährung was previously rendered here
      # but its contents (Thaler Specie / Marck S.-H. Courant /
      # Schilling S.-H. Courant) describe the 9¼-Thalerfuß standard,
      # not the 18½-Thalerfuß. They have been moved to the merged
      # `thaler_specie_9_25` card (Phases A/B/C). What remains here
      # is the BRIDGE prose that shows the cross-rate Rigsbankdaler ↔
      # Schilling S.-H. Courant — useful in this card because it
      # explains how the two coexisting standards interlocked.
      - kind: phase_header
        title:
          de: "II. Brücke zum Schleswig-Holsteinischen 9¼-Thalerfuß"
          en: "II. Bridge to the Schleswig-Holstein 9¼-Thalerfuß"
          uk: "II. Місток до шлезвіг-гольштейнської 9¼-Thalerfuß"
      - kind: prose
        label: {de: "Brücke", en: "Bridge", uk: "Місток"}
        content:
          de: |
            <b>1 Rigsbankdaler</b> = <b>30 Schilling S.-H. Courant</b> = 1⅞ Marck S.-H. Courant<br>
            <b>2 Rigsbankdaler</b> = 1 Thaler Specie = 60 Schilling S.-H. Courant<br>
            <b>1 Reichsthaler Sch.-H. Courant</b> = 8/5 (1,6) Rigsbankdaler (= 48/30 Schilling)<br>
            <b>1 Rigsbankdaler</b> = 5/8 (0,625) Reichsthaler Sch.-H. Courant<br>
            <em>Der Rigsbankdaler teilte sich nicht ganzzahlig in Marck S.-H. Courant (30 ÷ 16 = 1,875) — daher blieb die holsteinische Alltagsrechnung in der alten Courant-Währung.</em><br>
            <b>ab 1854:</b> Rigsbankdaler → Thaler Reichsmünze (Rigsdaler R.M.); Rigsbankskilling → Schilling Reichsmünze (Wert unverändert)
          en: "<b>1 Rigsbankdaler</b> = <b>30 Schilling S.-H. Courant</b> = 1⅞ Marck S.-H. Courant<br>\n<b>2 Rigsbankdaler</b> = 1 Thaler Specie = 60 Schilling S.-H. Courant<br>\n<b>1 Reichsthaler Sch.-H. Courant</b> = 8/5 (1.6) Rigsbankdaler (= 48/30 Schilling)<br>\n<b>1 Rigsbankdaler</b> = 5/8 (0.625) Reichsthaler Sch.-H. Courant<br>\n<em>The Rigsbankdaler did not divide into Marck S.-H. Courant in whole numbers (30 ÷ 16 = 1.875) — for that reason Holstein everyday accounting remained in the old Courant currency.</em><br>\n<b>From 1854:</b> Rigsbankdaler → Thaler Reichsmünze (Rigsdaler R.M.); Rigsbankskilling → Schilling Reichsmünze (value unchanged)\n"
          uk: "<b>1 Rigsbankdaler</b> = <b>30 Schilling S.-H. Courant</b> = 1⅞ Marck S.-H. Courant<br>\n<b>2 Rigsbankdaler</b> = 1 Thaler Specie = 60 Schilling S.-H. Courant<br>\n<b>1 Reichsthaler Sch.-H. Courant</b> = 8/5 (1,6) Rigsbankdaler (= 48/30 Schilling)<br>\n<b>1 Rigsbankdaler</b> = 5/8 (0,625) Reichsthaler Sch.-H. Courant<br>\n<em>Rigsbankdaler не ділився цілочислово на Marck S.-H. Courant (30 ÷ 16 = 1,875) — тому гольштейнський щоденний рахунок залишався у старій курантній валюті.</em><br>\n<b>З 1854:</b> Rigsbankdaler → Thaler Reichsmünze (Rigsdaler R.M.); Rigsbankskilling → Schilling Reichsmünze (вартість незмінна)\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Herzogtum Holstein, Herzogtum Schleswig:</b> 1813–1864.<br>
          <b>Gleichzeitig in Dänemark selbst:</b> Rigsbankdaler als gesamtdänische Einheit (1813–1875).<br>
          <b>Münzstätten:</b> Altona (bis 1863); Kopenhagen.<br>
          <b>1864:</b> Ende mit preuß./österr. Annexion; Übergang zum Vereinsthalerfuß.
        en: |
          <b>Duchy of Holstein, Duchy of Schleswig:</b> 1813–1864.<br>
          <b>Concurrently in Denmark itself:</b> Rigsbankdaler as the all-Danish unit (1813–1875).<br>
          <b>Mints:</b> Altona (until 1863); Copenhagen.<br>
          <b>1864:</b> Ends with Prussian/Austrian annexation; transition to the Vereinsthaler standard.
        uk: |
          <b>Герцогство Гольштейн, Герцогство Шлезвіг:</b> 1813–1864.<br>
          <b>Одночасно в самій Данії:</b> Rigsbankdaler як загальноданська одиниця (1813–1875).<br>
          <b>Монетні двори:</b> Альтона (до 1863); Копенгаген.<br>
          <b>1864:</b> кінець із прусько-австрійською анексією; перехід до Vereinsthaler-стопи.

