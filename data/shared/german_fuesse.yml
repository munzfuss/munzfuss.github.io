# 13. Vereinsmünzfuß · 30-Thalerfuß
# ------------------------------------------------------------------
  - id: vereinsmuenzfuss
    metal: silver
    years_label:
      de: "1857 → 1871"
      en: "1857 → 1871"
      uk: "1857 → 1871"
    name: 30-Thalerfuß · 52½-Guldenfuß · 45-Guldenfuß
    historical_name: Vereinsmünzfuß
    subtitle:
      de: 'Wiener Münzvertrag 24. Januar 1857 · Zollpfund = 500,000 g Feinsilber (ersetzt Kölnische Mark) · drei parallele Müntzfüße: 30-Taler-Fuß (Norddtl.), 52½-Gulden-Fuß (Süddtl.), 45-Gulden-Fuß (Österreich)<sup><a href="#ref3">[3]</a></sup><sup><a href="#ref4">[4]</a></sup> · Vereinsthaler als gesetzliches Zahlmittel biß 1907'
      en: 'Vienna Mint Treaty 24 January 1857 · Zollpfund = 500.000 g fine silver (replaces Cöllnische Marck) · three parallel Müntzfüße: 30-Taler-Fuß (north), 52½-Gulden-Fuß (south), 45-Gulden-Fuß (Austria)<sup><a href="#ref3">[3]</a></sup><sup><a href="#ref4">[4]</a></sup> · Vereinsthaler as legal tender until 1907'
      uk: 'Віденська монетна угода 24 січня 1857 · Zollpfund = 500,000 г чистого срібла (замінює Кельнську марку) · три паралельні Müntzfüße: 30-Taler-Fuß (північ), 52½-Gulden-Fuß (південь), 45-Gulden-Fuß (Австрія)<sup><a href="#ref3">[3]</a></sup><sup><a href="#ref4">[4]</a></sup> · Vereinsthaler як законний платіжний засіб до 1907'
    body:
      # The Vereinsmünzfuß had three parallel currency zones (Nord/Süd/AT).
      # Rendered as a rows table — each zone is a key:value pair — so it
      # naturally pairs side-by-side with the Rechnungsfraktionen prose
      # to the right. The «Drei parallele Währungsgebiete» framing line
      # was previously a phase_header with three phase_summaries below;
      # restructured into rows-table form per the same pattern as every
      # other entry in this catalogue.
      - kind: rows
        items:
          - key: {de: "Nord", en: "North", uk: "Північ"}
            value:
              de: "30 Vereinsthaler/Pfund · Feingewicht 500/30 = <b>16,66667 g</b> · 18,51852 g rau · 900 ‰ · »XXX EIN PFUND FEIN«"
              en: "30 Vereinsthaler/pound · fine weight 500/30 = <b>16.66667 g</b> · 18.51852 g rough · 900 ‰ · «XXX EIN PFUND FEIN»"
              uk: "30 Vereinsthaler/фунт · чиста вага 500/30 = <b>16,66667 г</b> · 18,51852 г повної · 900 ‰ · «XXX EIN PFUND FEIN»"
          - key: {de: "Süd", en: "South", uk: "Південь"}
            value:
              de: "52½ südd. Gulden/Pfund · 1 Gulden = 500/52,5 = <b>9,52381 g</b> fein"
              en: "52½ South-German Gulden/pound · 1 Gulden = 500/52.5 = <b>9.52381 g</b> fine"
              uk: "52½ південно-німецьких Gulden/фунт · 1 Gulden = 500/52,5 = <b>9,52381 г</b> чистого"
          - key: {de: "Österreich", en: "Austria", uk: "Австрія"}
            value:
              de: "45 österr. Gulden/Pfund · 1 Gulden = 500/45 = <b>11,11111 g</b> fein"
              en: "45 Austrian Gulden/pound · 1 Gulden = 500/45 = <b>11.11111 g</b> fine"
              uk: "45 австрійських Gulden/фунт · 1 Gulden = 500/45 = <b>11,11111 г</b> чистого"
      - kind: prose
        label: {de: "Rechnungsfraktionen", en: "Accounting fractions", uk: "Розрахункові фракції"}
        content:
          de: |
            <b>1 Vereinsthaler</b> (Nord) = 30 Silbergroschen = 360 Pfennig<br>
            <b>1 Silbergroschen</b> = 12 Pfennig<br>
            <b>1 Vereinsthaler</b> (Süd) = 1¾ südd. Gulden = 105 Kreutzer<br>
            <b>1 Vereinsthaler</b> (Österreich) = 1½ österr. Gulden = 150 Neukreutzer<br>
            <b>2 Vereinsthaler</b> = 3½ südd. Gulden = 3 österr. Gulden (Brückenmünze)
          en: "<b>1 Vereinsthaler</b> (North) = 30 Silbergroschen = 360 Pfennig<br>\n<b>1 Silbergroschen</b> = 12 Pfennig<br>\n<b>1 Vereinsthaler</b> (South) = 1¾ South-German Gulden = 105 Kreutzer<br>\n<b>1 Vereinsthaler</b> (Austria) = 1½ Austrian Gulden = 150 Neukreutzer<br>\n<b>2 Vereinsthaler</b> = 3½ South-German Gulden = 3 Austrian Gulden (bridge coin)\n"
          uk: "<b>1 Vereinsthaler</b> (Північ) = 30 Silbergroschen = 360 Pfennig<br>\n<b>1 Silbergroschen</b> = 12 Pfennig<br>\n<b>1 Vereinsthaler</b> (Південь) = 1¾ південно-німецьких Gulden = 105 Kreutzer<br>\n<b>1 Vereinsthaler</b> (Австрія) = 1½ австрійських Gulden = 150 нових Kreutzer<br>\n<b>2 Vereinsthaler</b> = 3½ південно-німецьких Gulden = 3 австрійських Gulden (місткова монета)\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Alle Zollvereinsstaaten:</b> Preußen, Hannover, Bayern, Sachsen, Württemberg, Baden, Kurhessen, Hessen-Darmstadt, Nassau, Frankfurt u.a. (1857–1871).<br>
          <b>Österreich und Liechtenstein:</b> 1857–1866 (Österreich schied nach Königgrätz faktisch aus, blieb aber formell bis 1867).<br>
          <b>Dem Wiener Münzvertrag nicht beigetreten:</b> Bremen, Hamburg, Lübeck (Hansestädte; eigene Währungen bis 1875); Mecklenburg-Schwerin und -Strelitz; Luxemburg.<br>
          <b>Vereinsthaler:</b> Biß 1907 gesetzliches Zahlmittel im Deutschen Kaiserreich (= 3 Mark).
        en: |
          <b>All German Customs Union (Zollverein) states:</b> Prussia, Hanover, Bavaria, Saxony, Württemberg, Baden, Electoral Hesse, Hesse-Darmstadt, Nassau, Frankfurt and others (1857–1871).<br>
          <b>Austria and Liechtenstein:</b> 1857–1866 (Austria effectively withdrew after Königgrätz but formally remained until 1867).<br>
          <b>Did not accede to the Wiener Münzvertrag:</b> Bremen, Hamburg, Lübeck (Hanseatic cities; own currencies until 1875); Mecklenburg-Schwerin and -Strelitz; Luxembourg.<br>
          <b>Vereinsthaler:</b> Legal tender in the German Empire (= 3 Mark) until 1907.
        uk: |
          <b>Усі держави Німецького митного союзу (Zollverein):</b> Пруссія, Ганновер, Баварія, Саксонія, Вюртемберг, Баден, Курхессен, Гессен-Дармштадт, Нассау, Франкфурт та ін. (1857–1871).<br>
          <b>Австрія і Ліхтенштейн:</b> 1857–1866 (Австрія фактично вийшла після Кеніггреца, формально лишалась до 1867).<br>
          <b>Не приєдналися до Wiener Münzvertrag:</b> Бремен, Гамбург, Любек (ганзейські міста; власні валюти до 1875); Мекленбург-Шверін і -Стреліц; Люксембург.<br>
          <b>Vereinsthaler:</b> законний платіжний засіб у Німецькій імперії (= 3 марки) до 1907.

