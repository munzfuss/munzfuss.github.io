          - key: {de: "Vereinsmünze 1838", en: Vereinsmünze 1838, uk: Vereinsmünze 1838}
            value: {de: "<b>33,40786 g</b> fein · 900 ‰ · 37,11984 g rau · Ø 41 mm · »VII EINE FEINE MARK«", en: <b>33.40786 g</b> fine · 900 ‰ · 37.11984 g rough · Ø 41 mm · «VII EINE FEINE MARK», uk: '<b>33,40786 г</b> чистого · 900 ‰ · 37,11984 г повної · Ø 41 мм · «VII EINE FEINE MARK»'}
