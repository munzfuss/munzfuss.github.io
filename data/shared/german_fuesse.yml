          en: "<b>1 Reichsthaler</b> (North German) = 24 Gute Groschen Species = 288 Pfennig Species<br>\n<b>1 Reichsthaler</b> (North German) = 32 Schilling lübisch<br>\n<b>1 Reichsthaler</b> (Hanoverian) = 36 Mariengroschen<br>\n<b>1 Reichsthaler</b> (South German, from c. 1623) = 90 Kreutzer = 1½ Gulden<br>\n<b>½ Reichsthaler</b> = 12 Gute Groschen Species = 45 Kreutzer<br>\n<b>¼ Reichsthaler</b> = 6 Gute Groschen Species = 22½ Kreutzer<br>\n<b>1 Guter Groschen Species</b> = 12 Pfennig Species = 3¾ Kreutzer = 1.08267 g fine<br>\n<b>1 Mariengroschen</b> = 8 Pfennig Species = 2½ Kreutzer (= 1/36 Reichsthaler; 36 × 8 = 288 ✓)<br>\n<b>1 Schilling lübisch</b> = 12 Pfennig lübisch; ½ Sch. = Sechsling; ¼ Sch. = Dreiling\n"
          uk: "<b>1 Reichsthaler</b> (північно-німецький) = 24 Gute Groschen Species = 288 Pfennig Species<br>\n<b>1 Reichsthaler</b> (північно-німецький) = 32 Schilling lübisch<br>\n<b>1 Reichsthaler</b> (ганноверський) = 36 Mariengroschen<br>\n<b>1 Reichsthaler</b> (південно-німецький, з бл. 1623) = 90 Kreutzer = 1½ Gulden<br>\n<b>½ Reichsthaler</b> = 12 Gute Groschen Species = 45 Kreutzer<br>\n<b>¼ Reichsthaler</b> = 6 Gute Groschen Species = 22½ Kreutzer<br>\n<b>1 Guter Groschen Species</b> = 12 Pfennig Species = 3¾ Kreutzer = 1,08267 г чистого<br>\n<b>1 Mariengroschen</b> = 8 Pfennig Species = 2½ Kreutzer (= 1/36 Reichsthaler; 36 × 8 = 288 ✓)<br>\n<b>1 Schilling lübisch</b> = 12 Pfennig lübisch; ½ Sch. = Sechsling; ¼ Sch. = Dreiling\n"
      - kind: phase_header
        title:
          de: "Periodisierung des 9-Fuß-Carbunghens (1566 → ~1700)"
          en: "Periodisation of 9-Fuß minting (1566 → ~1700)"
          uk: "Періодизація карбування 9-Fuß (1566 → ~1700)"
      - kind: phase_summary
        content:
          de: '<b>Phase I — Hochzeit (1566 → ~1620):</b> Reichsstandard für alle Münzstätten, Hauptproduzenten Wettiner (Sachsen) und Welfen (Braunschweig-Lüneburg)<sup><a href="#ref23">[23]</a></sup>. Stückzahlen in den Zehntausenden je Jahr; Silberbasis Erzgebirge und Harz.'
          en: '<b>Phase I — peak (1566 → ~1620):</b> imperial standard for all mints; main producers were the Wettin (Saxony) and Welf (Brunswick-Lüneburg) houses<sup><a href="#ref23">[23]</a></sup>. Five-figure annual mintages; silver supply from the Erzgebirge and the Harz.'
          uk: '<b>Фаза I — пік (1566 → ~1620):</b> імперський стандарт для всіх монетних дворів; головні виробники — Веттіни (Саксонія) і Вельфи (Брауншвайг-Люнебург)<sup><a href="#ref23">[23]</a></sup>. Десятки тисяч штук на рік; срібна база Erzgebirge і Harz.'
      - kind: phase_summary
        content:
          de: '<b>Phase II — Tridecennium-Krise (1618 → 1648):</b> Kipper-Wipper-Zeit; der Reichsthaler-Specie wird im 9-Fuß formell <em>nicht</em> verschlechtert (anders als die Talerteilstücke), aber die Volumina sinken drastisch.'
          en: '<b>Phase II — Thirty-Years crisis (1618 → 1648):</b> Kipper-Wipper period; the Reichsthaler-Specie is formally <em>not</em> debased on the 9-Fuß (unlike the Talerteilstücke), but volumes drop sharply.'
          uk: '<b>Фаза II — Тридцятилітня криза (1618 → 1648):</b> період Kipper-Wipper; Reichsthaler-Specie у 9-Fuß формально <em>не</em> девальвується (на відміну від Talerteilstücke), проте обсяги різко падають.'
      - kind: phase_summary
        content:
          de: '<b>Phase III — Saxon-Pivot (1667 → 1690):</b> der Zinnaer Münzvertrag von 1667 zwischen Kurbrandenburg und Kursachsen<sup><a href="#ref20">[20]</a><a href="#ref26">[26]</a></sup> behält den 9-Fuß formell für die Speciesthaler bei, lagert aber die Scheidemünzen in den 10½-Fuß aus<sup><a href="#ref20">[20]</a></sup>; mit dem Beitritt Brunswick-Lüneburgs 1668 wird der 10½-Fuß auf ⅔/⅓/⅙-Taler ausgedehnt<sup><a href="#ref20">[20]</a></sup>. Der ⅔-Taler wird zum neuen Hauptnominal — der 24-Groschen-Kuranttaler, bisher als Reichstaler bezeichnet, wird mit wenigen Ausnahmen nicht mehr ausgeprägt<sup><a href="#ref19">[19]</a></sup>; nur die Bergbau-Speciesreichstaler zu 28 Groschen für die sächsische Bergbauverwaltung laufen weiter<sup><a href="#ref19">[19]</a></sup>.'
          en: '<b>Phase III — Saxon pivot (1667 → 1690):</b> the Zinnaer Münzvertrag of 1667 between Brandenburg and Saxony<sup><a href="#ref20">[20]</a><a href="#ref26">[26]</a></sup> kept the 9-Fuß formally for the Speciesthaler but moved the petty coinage onto the 10½-Fuß<sup><a href="#ref20">[20]</a></sup>; with Brunswick-Lüneburg''s accession in 1668 the 10½-Fuß was extended to ⅔/⅓/⅙ Taler<sup><a href="#ref20">[20]</a></sup>. The ⅔-Taler became the new principal denomination — the 24-Groschen Kuranttaler, until then called the Reichstaler, was, with few exceptions, no longer struck<sup><a href="#ref19">[19]</a></sup>; only the 28-Groschen Bergbau-Speciesreichstaler for the Saxon mining administration continued<sup><a href="#ref19">[19]</a></sup>.'
          uk: '<b>Фаза III — саксонський перелом (1667 → 1690):</b> Zinnaer Münzvertrag 1667 між Бранденбургом і Саксонією<sup><a href="#ref20">[20]</a><a href="#ref26">[26]</a></sup> формально зберігає 9-Fuß для Speciesthaler, але переводить розмінну монету у 10½-Fuß<sup><a href="#ref20">[20]</a></sup>; із приєднанням Brunswick-Lüneburg 1668 р. 10½-Fuß поширюється на ⅔/⅓/⅙-Taler<sup><a href="#ref20">[20]</a></sup>. ⅔-Taler стає новим головним номіналом — 24-грошевий куранттталер, який доти називали Reichstaler, за поодинокими винятками більше не карбується<sup><a href="#ref19">[19]</a></sup>; залишається лише 28-грошевий Bergbau-Speciesreichstaler для саксонського гірничого управління<sup><a href="#ref19">[19]</a></sup>.'
      - kind: phase_summary
        content:
          de: '<b>Phase IV — Codifikation und Funktionsende (1690 → ~1700):</b> der Leipziger Müntzvertrag vom 16. Januar 1690<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup> setzt den 12-Fuß für die Talerteilstücke; 1692 erklärt Leopolds I. Decret den Leipziger Fuß ausdrücklich nicht zum Reichsmünzfuß<sup><a href="#ref17">[17]</a></sup>; 1738 holt Karl VI. mit dem Kommissionsedikt diese Erhebung nach<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup>, ohne sie reichsweit allgemein einzuführen<sup><a href="#ref26">[26]</a></sup>. Speciesreichstaler werden auch nach 1690 weiter im Reichsmünzfuß geprägt, jedoch mit auf 32 Groschen erhöhtem Tarif<sup><a href="#ref19">[19]</a></sup> — der Münzfuß bleibt formell, die Funktion wandert von der Hauptumlaufmünze zur Schaumünze. Bis etwa 1700 bleibt der Speciestaler die Hauptmünze des Reichs<sup><a href="#ref16">[16]</a></sup>; danach übernehmen ⅔-Thaler (12-Fuß) und französische Écus blancs die Hauptumlauf-Rolle in weiten Theilen Deutschlands<sup><a href="#ref22">[22]</a></sup>.'
          en: '<b>Phase IV — codification and end of function (1690 → ~1700):</b> the Leipziger Münzvertrag of 16 January 1690<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup> set the 12-Fuß for the Talerteilstücke; in 1692 Leopold I''s decree expressly declared the Leipziger Fuß not to be the Reichsmünzfuß<sup><a href="#ref17">[17]</a></sup>; in 1738 Karl VI''s Kommissionsedikt completed that elevation<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup>, although it was not generally adopted across the empire<sup><a href="#ref26">[26]</a></sup>. Speciesreichstaler continued to be struck on the Reichsmünzfuß after 1690, but at a tariff raised to 32 Groschen<sup><a href="#ref19">[19]</a></sup> — the standard remained formal while its function shifted from main circulation to that of a Schaumünze. The Speciestaler remained the empire''s principal coin until about 1700<sup><a href="#ref16">[16]</a></sup>; thereafter the ⅔-Thaler (12-Fuß) and French Écus blancs took over the main-circulation role across large parts of Germany<sup><a href="#ref22">[22]</a></sup>.'
          uk: '<b>Фаза IV — кодифікація і кінець функції (1690 → ~1700):</b> Leipziger Münzvertrag 16 січня 1690<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup> встановлює 12-Fuß для Talerteilstücke; 1692 декрет Леопольда I прямо оголошує, що Leipziger Fuß не є Reichsmünzfuß<sup><a href="#ref17">[17]</a></sup>; 1738 Karl VI своїм Kommissionsedikt завершує піднесення<sup><a href="#ref17">[17]</a><a href="#ref26">[26]</a></sup>, проте без загального запровадження по Імперії<sup><a href="#ref26">[26]</a></sup>. Speciesreichstaler-и продовжують карбуватися за Reichsmünzfuß і після 1690 р., але з тарифом, піднятим до 32 грошів<sup><a href="#ref19">[19]</a></sup> — стандарт лишається формальним, функція переходить від головної обігової монети до парадної (Schaumünze). До приблизно 1700 р. Speciestaler залишається головною монетою Імперії<sup><a href="#ref16">[16]</a></sup>; далі ⅔-Thaler (12-Fuß) і французькі Écus blancs перебирають роль головного засобу обігу у великих частинах Німеччини<sup><a href="#ref22">[22]</a></sup>.'
      - kind: phase_header
        title:
          de: "Hamburg und Lübeck — Beibehaltung des Reichsmüntzfußes"
          en: "Hamburg and Lübeck — retention of the Reichsmüntzfuß"
          uk: "Гамбург і Любек — збереження Reichsmüntzfuß"
      - kind: rows
        items:
          - key: {de: "Thaler Specie (Hamburg/Lübeck)", en: Thaler Specie (Hamburg/Lübeck), uk: Thaler Specie (Гамбург/Любек)}
            value: {de: "<b>25,98400 g</b> fein · 888 8/9 ‰ · 29,232 g rau · = 48 Schilling Species = 3 Marck (Hamburger Rechnungseinheit)", en: <b>25.98400 g</b> fine · 888 8/9 ‰ · 29.232 g rough · = 48 Schilling Species = 3 Marck (Hamburg accounting unit), uk: '<b>25,98400 г</b> чистого · 888 8/9 ‰ · 29,232 г повної · = 48 Schilling Species = 3 Marck (гамбурзька розрахункова одиниця)'}
          - key: {de: "Münzbeleg Hamburg", en: Hamburg attestation, uk: Гамбурзька атестація}
            value:
              de: 'Thaler 1730: 28,97 g × 888‰ = 25,73 g ✓ · Thaler 1776: 29,2 g × 888‰ = 25,93 g ✓ · in Hamburg wurden 1730–1764 etwa 110 000 Speciestaler geprägt<sup><a href="#ref16">[16]</a></sup>'
              en: 'Thaler 1730: 28.97 g × 888‰ = 25.73 g ✓ · Thaler 1776: 29.2 g × 888‰ = 25.93 g ✓ · ~110,000 Speciestaler were struck in Hamburg between 1730 and 1764<sup><a href="#ref16">[16]</a></sup>'
              uk: 'Талер 1730: 28,97 г × 888‰ = 25,73 г ✓ · Талер 1776: 29,2 г × 888‰ = 25,93 г ✓ · у Гамбурзі 1730–1764 рр. карбувалося близько 110 000 Speciestaler<sup><a href="#ref16">[16]</a></sup>'
          - key: {de: "Münzbeleg Lübeck", en: Lübeck attestation, uk: Любекська атестація}
            value: {de: "Thaler 1730 (Jubiläum): 888‰ · Thaler 1776: 888‰ — beide im 9-Fuß ✓", en: 'Thaler 1730 (jubilee): 888‰ · Thaler 1776: 888‰ — both on the 9-Fuß ✓', uk: 'Талер 1730 (ювілейний): 888‰ · Талер 1776: 888‰ — обидва за 9-Thaler-Fuß ✓'}
          - key:
              de: "Spätprägungen nach 1700"
              en: "Late strikes after 1700"
              uk: "Пізні карбування після 1700"
            value:
              de: 'Hannover Speciesthaler 1738–1802 in 8⁄9-Feinheit nach 9-Fuß<sup><a href="#ref16">[16]</a></sup> (letzte Schaumünze 1797); Hamburg Bank-Speciesthaler 1730–1764 (~110.000 Stück)<sup><a href="#ref16">[16]</a></sup>; Lübeck Jubiläumsthaler 1730 und 1776; Schleswig-Holstein KM# 105 Glückstadt 1683 als 71-Jahre-Spätschuß ohne Mintkette.'
              en: 'Hanover Speciesthaler 1738–1802 in 8⁄9 fineness on the 9-Fuß<sup><a href="#ref16">[16]</a></sup> (last Schaumünze 1797); Hamburg Bank-Speciesthaler 1730–1764 (~110,000 pieces)<sup><a href="#ref16">[16]</a></sup>; Lübeck jubilee Thaler of 1730 and 1776; Schleswig-Holstein KM# 105 Glückstadt 1683 as a 71-year solitary late strike without a mint chain.'
              uk: 'ганноверський Speciesthaler 1738–1802 у пробі 8⁄9 за 9-Fuß<sup><a href="#ref16">[16]</a></sup> (остання парадна монета 1797); гамбурзький Bank-Speciesthaler 1730–1764 (~110 000 штук)<sup><a href="#ref16">[16]</a></sup>; любецький ювілейний Thaler 1730 і 1776; Schleswig-Holstein KM# 105 Glückstadt 1683 — одиничний пізній випуск без mint-chain (71 рік розриву).'
      - kind: prose
        label:
          de: "Hamburgisch-Lübeckische Rechnungsfraktionen (biß 1875)"
          en: "Hamburg/Lübeck accounting fractions (until 1875)"
          uk: "Гамбурзько-любекські розрахункові фракції (до 1875)"
        content:
          de: |
            <b>1 Thaler Specie</b> = 48 Schilling Species = 3 Marck = <b>25,98400 g</b><br>
            <b>1 Marck</b> (Rechnungseinheit) = 16 Schilling Species = 192 Pfennig<br>
            <b>1 Schilling Species</b> = 12 Pfennig<br>
            <em>Hamburg und Lübeck behielten den ursprünglichen Reichsmüntzfuß von 1566 als Speciesthaler-Standard unverändert biß 1875 bei — während das übrige Reich längst zu anderen Stempeln übergegangen war.</em>
          en: "<b>1 Thaler Specie</b> = 48 Schilling Species = 3 Marck = <b>25.98400 g</b><br>\n<b>1 Marck</b> (accounting unit) = 16 Schilling Species = 192 Pfennig<br>\n<b>1 Schilling Species</b> = 12 Pfennig<br>\n<em>Hamburg and Lübeck retained the original Reichsmüntzfuß of 1566 as their Speciesthaler standard, unchanged, until 1875 — while the rest of the Empire had long since moved to other standards.</em>\n"
          uk: "<b>1 Thaler Specie</b> = 48 Schilling Species = 3 Marck = <b>25,98400 г</b><br>\n<b>1 Marck</b> (розрахункова одиниця) = 16 Schilling Species = 192 Pfennig<br>\n<b>1 Schilling Species</b> = 12 Pfennig<br>\n<em>Гамбург і Любек зберігали початковий Reichsmüntzfuß 1566 року як Speciesthaler-стандарт незмінним до 1875 — у той час як решта імперії вже давно перейшла до інших стандартів.</em>\n"
    territories:
      label:
        de: "Territorien"
        en: "Territories"
        uk: "Території"
      content:
        de: |
          <b>Formal:</b> Gesamtes Heiliges Römisches Reich Deutscher Nation (Reichsabschied 30. May 1566)<sup><a href="#ref21">[21]</a></sup>.<br>
          <b>Hauptprägestände:</b> Kursachsen (Wettiner), Braunschweig-Lüneburg (Welfen)<sup><a href="#ref23">[23]</a></sup>, Habsburger Erblande, Westfälische Stände, Brandenburg, Magdeburg.<br>
          <b>Hamburg:</b> Mark-Banco-Rechnungsmünze (Bancothaler) ab 1619<sup><a href="#ref11">[11]</a></sup>; physisch geprägt 1730–1764 (~110.000 Speciestaler nach 9-Fuß)<sup><a href="#ref16">[16]</a></sup>; als Rechnungseinheit biß 1875<sup><a href="#ref11">[11]</a></sup>.<br>
          <b>Lübeck:</b> Speciemark-Rechnungseinheit biß 1875; Jubiläumsthaler 1730 und 1776 (keine kontinuierliche Prägung; Münzprägung endgültig 1801 eingestellt).<br>
          <b>Hannover:</b> Speciesthaler 1738–1802 in 8⁄9 Feinheit nach 9-Fuß<sup><a href="#ref16">[16]</a></sup>; letzte Schaumünze 1797<sup><a href="#ref16">[16]</a></sup> — die längste fortgesetzte 9-Fuß-Prägung nach 1700 im HRR.<br>
          <b>Als Rechnungsmünze biß 1871:</b> Norddeutschland allgemein.<br>
          <b>Nur formal:</b> Süddeutschland (rechnete nach Gulden, prägte kaum Thaler Specie); Österreich (eigene Praxis seit Konventionsthaler-Einführung 7. Nov. 1750)<sup><a href="#ref18">[18]</a></sup>.
        en: |
          <b>Formally:</b> the entire Holy Roman Empire of the German Nation (Reichsabschied 30 May 1566)<sup><a href="#ref21">[21]</a></sup>.<br>
          <b>Principal mints:</b> Electoral Saxony (Wettin), Brunswick-Lüneburg (Welf)<sup><a href="#ref23">[23]</a></sup>, Habsburg hereditary lands, Westphalian estates, Brandenburg, Magdeburg.<br>
          <b>Hamburg:</b> Mark-Banco unit of account (Bancothaler) from 1619<sup><a href="#ref11">[11]</a></sup>; physically struck 1730–1764 (~110,000 Speciestaler on the 9-Fuß)<sup><a href="#ref16">[16]</a></sup>; as unit of account until 1875<sup><a href="#ref11">[11]</a></sup>.<br>
          <b>Lübeck:</b> Speciemark unit of account until 1875; jubilee thalers 1730 and 1776 (no continuous coinage; mint finally closed 1801).<br>
          <b>Hanover:</b> Speciesthaler 1738–1802 in 8⁄9 fineness on the 9-Fuß<sup><a href="#ref16">[16]</a></sup>; last Schaumünze 1797<sup><a href="#ref16">[16]</a></sup> — the longest sustained 9-Fuß minting after 1700 in the HRR.<br>
          <b>As unit of account until 1871:</b> Northern Germany generally.<br>
          <b>Formally only:</b> Southern Germany (reckoned in Gulden, scarcely struck Thaler Specie); Austria (own practice from the Konventionsthaler introduction of 7 Nov. 1750)<sup><a href="#ref18">[18]</a></sup>.
        uk: |
          <b>Формально:</b> уся Священна Римська імперія німецької нації (Reichsabschied 30 травня 1566)<sup><a href="#ref21">[21]</a></sup>.<br>
          <b>Головні монетні двори:</b> Курсаксонія (Веттіни), Брауншвайг-Люнебург (Вельфи)<sup><a href="#ref23">[23]</a></sup>, габсбурзькі спадкові землі, вестфальські стани, Бранденбург, Магдебург.<br>
          <b>Гамбург:</b> розрахункова Mark Banco (Bancothaler) від 1619<sup><a href="#ref11">[11]</a></sup>; фізично карбувалось 1730–1764 (~110 000 Speciestaler за 9-Fuß)<sup><a href="#ref16">[16]</a></sup>; як розрахункова одиниця до 1875<sup><a href="#ref11">[11]</a></sup>.<br>
          <b>Любек:</b> розрахункова Speciemark до 1875; ювілейні Thaler 1730 і 1776 (без безперервного карбування; монетний двір остаточно закрито 1801).<br>
          <b>Ганновер:</b> Speciesthaler 1738–1802 у пробі 8⁄9 за 9-Fuß<sup><a href="#ref16">[16]</a></sup>; остання Schaumünze 1797<sup><a href="#ref16">[16]</a></sup> — найдовше тривале карбування 9-Fuß після 1700 р. у СРІ.<br>
          <b>Як розрахункова одиниця до 1871:</b> Північна Німеччина загалом.<br>
          <b>Лише формально:</b> Південна Німеччина (рахувала в Gulden, Thaler Specie майже не карбувала); Австрія (власна практика з введення Konventionsthaler 7 листопада 1750)<sup><a href="#ref18">[18]</a></sup>.

# ------------------------------------------------------------------
# 1a. Reichsdukatenfuß (1559, Gold)
# ------------------------------------------------------------------
  - id: reichsdukatenfuss
    metal: gold
    years_label:
      de: "1559 → 1871"
      en: "1559 → 1871"
      uk: "1559 → 1871"
    name: Reichsdukatenfuß
    subtitle:
      de: 'Augspurgische Reichsmüntzordnung 19. Aug. 1559 (Ferdinand I.) · Cöllnische Marck rauh = 233,856 g Goldlegierung · Feingehalt 23 Karat 8 Grän = 986 1/9 ‰<sup><a href="#ref1">[1]</a></sup> · Hauptgoldmünze des Reiches biß zur Reichsgoldmark 1871'
      en: 'Augsburg Imperial Mint Ordinance, 19 Aug. 1559 (Ferdinand I) · Cöllnische Marck rough = 233.856 g gold alloy · fineness 23 carats 8 grains = 986 1/9 ‰<sup><a href="#ref1">[1]</a></sup> · principal imperial gold coin until the Reichsgoldmark of 1871'
      uk: 'Аугсбурзький імператорський монетний регламент, 19 серпня 1559 (Фердинанд I) · Кельнська марка повна = 233,856 г золотого сплаву · проба 23 карати 8 гран = 986 1/9 ‰<sup><a href="#ref1">[1]</a></sup> · головна імперська золота монета до Reichsgoldmark 1871'
    body:
      - kind: rows
        items:
          - key: {de: "Feinheit", en: Fineness, uk: Проба}
            value: {de: "23 Karat 8 Grän = 284/288 = <b>986 1/9 ‰</b> (= 0,98611...)", en: "23 carats 8 grains = 284/288 = <b>986 1/9 ‰</b> (= 0.98611...)", uk: "23 карати 8 гран = 284/288 = <b>986 1/9 ‰</b> (= 0,98611...)"}
          - key: {de: "Raugewicht", en: Rough weight, uk: Повна вага}
            value: {de: '<b>3,49039 g</b> (= 233,856 / 67) · 67 Dukaten aus der rauen Cöllnischen Marck Gold<sup><a href="#ref1">[1]</a></sup>', en: '<b>3.49039 g</b> (= 233.856 / 67) · 67 ducats per rough Cöllnische Marck of gold alloy<sup><a href="#ref1">[1]</a></sup>', uk: '<b>3,49039 г</b> (= 233,856 / 67) · 67 Dukat з повної Кельнської марки золотого сплаву<sup><a href="#ref1">[1]</a></sup>'}
          - key: {de: "Feingewicht", en: Fine weight, uk: Чиста вага}
            value: {de: "<b>3,44191 g</b> (= 3,49039 × 284/288) Feingold", en: <b>3.44191 g</b> (= 3.49039 × 284/288) fine gold, uk: '<b>3,44191 г</b> (= 3,49039 × 284/288) чистого золота'}
          - key: {de: "Kurs 1559", en: 'Rate, 1559', uk: Курс 1559}
            value: {de: "1 Dukat = <b>104 Kreutzer</b> (Reichsmüntzordnung) · ≈ 1 Gulden 44 Kreutzer (kein ganzzahliges Gulden-Verhältniß)", en: 1 ducat = <b>104 Kreutzer</b> (Imperial Mint Ordinance) · ≈ 1 Gulden 44 Kreutzer (no integer Gulden ratio), uk: 1 Dukat = <b>104 Kreutzer</b> (Імператорський монетний регламент) · ≈ 1 Gulden 44 Kreutzer (без цілочислового співвідношення в Gulden)}
      - kind: prose
        label:
          de: "Fraktionen und Kurse"
          en: "Fractions and rates"
          uk: "Фракції та курси"
        content:
          de: |
            <b>1 Dukat</b> = 104 Kreutzer (1559) · <b>3,44191 g</b> Feingold<br>
            <b>Kein Unterteiler:</b> Der Dukat war die kleinste Einheit des Reichsdukatenfußes; geprägt wurden nur Vielfache (2-, 5-, 10-Dukaten-Stücke).<br>
            <b>Kurs zu Silber:</b> Schwebend — kein festes Silberäquivalent; im 18. Jh. meist 2–2½ Reichsthaler je Dukat (Marktpreis, nicht Tarif).<br>
            <em>Passierdukat (praktischer Handelsstandard): 67,944 Dukaten auf die feine Cöllnische Marck Gold; leicht minderwertige Dukaten zum mittleren Goldgehalt.</em>
          en: "<b>1 ducat</b> = 104 Kreutzer (1559) · <b>3.44191 g</b> fine gold<br>\n<b>No sub-unit:</b> the ducat was the smallest unit of the Reichsdukatenfuß; only multiples (2-, 5-, 10-ducat pieces) were struck.<br>\n<b>Rate to silver:</b> floating — no fixed silver equivalent; in the 18th century typically 2–2½ Reichsthaler per ducat (market price, not tariff).<br>\n<em>Passierdukat (practical trade standard): 67.944 ducats per fine Cöllnische Marck of gold; slightly under-weight ducats at the average gold content.</em>\n"
          uk: "<b>1 Dukat</b> = 104 Kreutzer (1559) · <b>3,44191 г</b> чистого золота<br>\n<b>Без поділки:</b> Dukat був найменшою одиницею Reichsdukatenfuß; карбувались лише кратні (2-, 5-, 10-Dukaten-Stücke).<br>\n<b>Курс до срібла:</b> плаваючий — без фіксованого срібного еквіваленту; у XVIII ст. зазвичай 2–2½ Reichsthaler за Dukat (ринкова ціна, не тариф).<br>\n<em>Passierdukat (практичний торговельний стандарт): 67,944 Dukat з чистої Кельнської марки золота; ледь нижчевагові Dukat за середнім вмістом золота.</em>\n"
    territories:
      label:
        de: "Territorien"
        en: "Territories"
        uk: "Території"
      content:
        de: |
          <b>Formal:</b> Gesamtes Heiliges Römisches Reich ab 1559; Hauptgoldmünze des Reiches nach Verdrängung des Goldgulden.<br>
          <b>Praktisch:</b> Geprägt in fast allen deutschen Münzstätten (Hamburg, Lübeck, Hannover, Sachsen, Österreich u.v.m.) sowie in Skandinavien biß ins 19. Jh.<br>
          <b>Lübeck:</b> Dukaten 1730 (Jubiläum), 1789–1801 (letzte Prägungen) — alle 986‰, ca. 3,44–3,46 g fein ✓<br>
          <b>Fortbestand:</b> Der Reichsdukatenfuß blieb als De-facto-Standard für Goldmünzen biß zur Einführung der Reichsgoldmark 1871; Handelsgold-Dukaten wurden biß weit ins 20. Jh. nach diesem Fuß geprägt.
        en: |
          <b>Formally:</b> Entire Holy Roman Empire from 1559; principal imperial gold coin after the displacement of the Goldgulden.<br>
          <b>In practice:</b> Struck at virtually all German mints (Hamburg, Lübeck, Hanover, Saxony, Austria etc.) and across Scandinavia into the 19th century.<br>
          <b>Lübeck:</b> Dukaten 1730 (jubilee), 1789–1801 (last issues) — all 986‰, c. 3.44–3.46 g fine ✓<br>
          <b>Continuation:</b> The Reichsdukatenfuß remained the de facto standard for gold coins until the introduction of the Reichsgoldmark in 1871; trade-gold ducats continued to be struck on this standard well into the 20th century.
        uk: |
          <b>Формально:</b> уся Священна Римська імперія від 1559; головна імперська золота монета після витіснення Goldgulden.<br>
          <b>На практиці:</b> карбувалось майже у всіх німецьких монетних дворах (Гамбург, Любек, Ганновер, Саксонія, Австрія та ін.) і у Скандинавії до XIX ст.<br>
          <b>Любек:</b> Dukat 1730 (ювілейні), 1789–1801 (останні випуски) — усі 986‰, бл. 3,44–3,46 г чистого ✓<br>
          <b>Тривкість:</b> Reichsdukatenfuß залишався де-факто-стандартом для золотих монет до запровадження Reichsgoldmark 1871; торговельні золоті Dukat карбувалися за цим стандартом далеко в XX ст.

