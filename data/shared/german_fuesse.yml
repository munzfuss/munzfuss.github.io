    subtitle:
      de: 'Münzgesetz 4. Decembr. 1871 (Goldmünzen) · Münzgesetz 9. Juli 1873 · ab 1876 alleiniges Zahlmittel · Zollpfund = 500,000 g (Silber); Goldgrundlage: 69¾ Stück à 20 Mark je Pfund Feingold · period-amtlicher Name: «Mark deutscher Reichswährung»; «Goldmark» entstand nach 1914 zur Abgrenzung von der Papiermark; mit der Reichsmark von 1924 nicht zu verwechseln<sup><a href="#ref2">[2]</a></sup>'
      en: 'Coinage Act 4 Dec. 1871 (gold coins) · Coinage Act 9 July 1873 · sole legal tender from 1876 · Zollpfund = 500.000 g (silver); gold base: 69¾ pieces of 20 Mark per pound of fine gold · period-official name: «Mark deutscher Reichswährung»; «Goldmark» emerged after 1914 to distinguish it from the Papiermark; not to be confused with the Reichsmark of 1924<sup><a href="#ref2">[2]</a></sup>'
      uk: 'Закон про карбування 4 грудня 1871 (золоті монети) · 9 липня 1873 · з 1876 єдиний платіжний засіб · Zollpfund = 500,000 г (срібло); золота основа: 69¾ штук по 20 марок на фунт чистого золота · період-офіційна назва: «Mark deutscher Reichswährung»; «Goldmark» зʼявилась після 1914 для розрізнення від Papiermark; не плутати з Reichsmark 1924 року<sup><a href="#ref2">[2]</a></sup>'
    body:
      - kind: rows
        items:
          - key: {de: "20-Mark-Stück", en: 20-Mark piece, uk: 20-Marckfuß монета}
            value: {de: "7,96495 g rau · <b>7,16846 g</b> Gold · 900 ‰ · Ø 22,5 mm", en: 7.96495 g rough · <b>7.16846 g</b> gold · 900 ‰ · Ø 22.5 mm, uk: '7,96495 г повної · <b>7,16846 г</b> золота · 900 ‰ · Ø 22,5 мм'}
          - key: {de: "10-Mark-Stück", en: 10-Mark piece, uk: 10-Marckfuß монета}
            value: {de: "3,98248 g rau · <b>3,58423 g</b> Gold · 900 ‰", en: 3.98248 g rough · <b>3.58423 g</b> gold · 900 ‰, uk: '3,98248 г повної · <b>3,58423 г</b> золота · 900 ‰'}
          - key: {de: "5-Mark-Stück (Gold)", en: 5-Mark piece (gold), uk: 5-Marckfuß монета (золото)}
            value: {de: "<b>1,79211 g</b> Gold · nur 1877–1878 geprägt", en: <b>1.79211 g</b> gold · struck only 1877–1878, uk: '<b>1,79211 г</b> золота · карбувалось лише 1877–1878'}
          - key: {de: "1 Mark (Gold)", en: 1 Mark (gold), uk: 1 марка (золото)}
            value: {de: "<b>100/279 g</b> = 0,35842 g Feingold · 900 ‰ · 1395-Markfuß (= 1395 Mark je Pfund Feingold = 2790 Mark/kg) — Goldgrundlage der Währung", en: <b>100/279 g</b> = 0.35842 g fine gold · 900 ‰ · 1395-Mark standard (= 1395 Mark per pound of fine gold = 2790 Mark/kg) — gold base of the currency, uk: '<b>100/279 г</b> = 0,35842 г чистого золота · 900 ‰ · 1395-Marckfuß (= 1395 марок на фунт чистого золота = 2790 марок/кг) — золота основа валюти'}
          - key: {de: "1 Mark (Silber)", en: 1 Mark (silver), uk: 1 марка (срібло)}
            value: {de: "6,17284 g rau · <b>5,00000 g</b> fein (900 ‰) · Scheidemünze (nicht Kurantgeld)", en: 6.17284 g rough · <b>5.00000 g</b> fine (900 ‰) · petty coin (not full-value currency), uk: '6,17284 г повної · <b>5,00000 г</b> чистого (900 ‰) · розмінна монета (не повноцінні Groschen)'}
      - kind: prose
        label: {de: "Rechnungsfraktionen", en: "Accounting fractions", uk: "Розрахункові фракції"}
        content:
          de: |
            <b>1 Mark</b> = 100 Pfennig<br>
            <b>1 Vereinsthaler</b> = 3 Mark = 300 Pfennig (bis 1907 gültig)<br>
            <b>1 südd. Gulden</b> = 12/7 Mark = 1 Mark 71³/₇ Pfennig<br>
            <b>1 österr. Gulden</b> = 2 Mark<br>
            <b>20 Mark</b> = 1 Doppelkrone; <b>10 Mark</b> = 1 Krone<br>
            <b>1 Mark</b> (Silber) = 5,000 g fein = ⅓ Vereinsthaler
          en: "<b>1 Mark</b> = 100 Pfennig<br>\n<b>1 Vereinsthaler</b> = 3 Mark = 300 Pfennig (valid until 1907)<br>\n<b>1 South-German Gulden</b> = 12/7 Mark = 1 Mark 71³/₇ Pfennig<br>\n<b>1 Austrian Gulden</b> = 2 Mark<br>\n<b>20 Mark</b> = 1 Doppelkrone; <b>10 Mark</b> = 1 Krone<br>\n<b>1 Mark</b> (silver) = 5.000 g fine = ⅓ Vereinsthaler\n"
          uk: "<b>1 марка</b> = 100 Pfennig<br>\n<b>1 Vereinsthaler</b> = 3 марки = 300 Pfennig (чинно до 1907)<br>\n<b>1 південно-німецький Gulden</b> = 12/7 марки = 1 марка 71³/₇ Pfennig<br>\n<b>1 австрійський Gulden</b> = 2 марки<br>\n<b>20 марок</b> = 1 Doppelkrone; <b>10 марок</b> = 1 Krone<br>\n<b>1 марка</b> (срібло) = 5,000 г чистого = ⅓ Vereinsthaler\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Ab 1871/1876:</b> Gesamtes Deutsches Kaiserreich (alle 25 Bundesstaaten + Elsaß-Lothringen).<br>
          <b>Bremen, Hamburg, Lübeck:</b> Ab 1875 nach Ende der Sonderstellung der Hansestädte vollständig integriert.<br>
          <b>Goldstandard:</b> De facto 1871–1914; de jure (Goldeinlösungspflicht der Reichsbank) bis 1914; Aufhebung bis 1918 (Kriegsende).
        en: |
          <b>From 1871/1876:</b> The entire German Empire (all 25 federal states + Alsace-Lorraine).<br>
          <b>Bremen, Hamburg, Lübeck:</b> Fully integrated from 1875 after the end of the Hanseatic cities' special status.<br>
          <b>Gold standard:</b> De facto 1871–1914; de jure (Reichsbank gold-redemption obligation) until 1914; abolished by 1918 (war's end).
        uk: |
          <b>З 1871/1876:</b> уся Німецька імперія (усі 25 союзних держав + Ельзас-Лотарингія).<br>
          <b>Бремен, Гамбург, Любек:</b> повністю інтегровані з 1875 після кінця особливого статусу ганзейських міст.<br>
          <b>Золотий стандарт:</b> де-факто 1871–1914; де-юре (зобовʼязання Reichsbank про золотий розмін) до 1914; скасовано до 1918 (кінець війни).
