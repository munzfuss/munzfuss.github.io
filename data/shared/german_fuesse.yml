      en: 'Augsburg Imperial Mint Decree of 30 May 1566<sup><a href="#ref21">[21]</a></sup> · Cöllnische Marck = 233.856 g fine silver · retained as unit of account until 1871<sup><a href="#ref15">[15]</a><a href="#ref23">[23]</a></sup>'
      uk: 'Ауґсбурзький імператорський монетний регламент 30 травня 1566<sup><a href="#ref21">[21]</a></sup> · Кельнська марка = 233,856 г чистого срібла · як розрахункова одиниця збережено до 1871<sup><a href="#ref15">[15]</a><a href="#ref23">[23]</a></sup>'
