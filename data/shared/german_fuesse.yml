          - key: {de: "1 Thaler Courant", en: 1 Thaler Courant, uk: 1 Thaler Courant}
            value: {de: "<b>20,04480 g</b> fein = 3 Marck Courant = 48 Schilling", en: <b>20.04480 g</b> fine = 3 Marck Courant = 48 Schilling, uk: '<b>20,04480 г</b> чистого = 3 Marck Courant = 48 Schilling'}
          - key: {de: "Bezug: preuß. Thaler", en: 'Reference: Prussian thaler', uk: 'Звʼязок: прусський Thaler'}
            value: {de: "2½ Marck Courant = 1 preuß. Thaler (14-Fuß, 16,70400 g) — exakt ✓; 35 = 14 × 2,5", en: '2½ Marck Courant = 1 Prussian thaler (14-Fuß, 16.70400 g) — exact ✓; 35 = 14 × 2.5', uk: '2½ Marck Courant = 1 прусський Thaler (14-Thalerfuß, 16,70400 г) — точно ✓; 35 = 14 × 2,5'}
      - kind: prose
