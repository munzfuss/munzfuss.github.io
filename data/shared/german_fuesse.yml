  - id: leipziger_fuss
    metal: silver
    years_label:
      de: "1690 → ca. 1760"
      en: "1690 → ca. 1760"
      uk: "1690 → бл. 1760"
    name: 12-Thalerfuß · 18-Guldenfuß
    historical_name: Leipziger Fuß · Torgauer Müntzfuß
    subtitle:
      de: "Müntzreceß Leipzig 16. Jan. 1690 · 1738 als Reichsmünzfuß durch Kaiserliches Commissionsedikt erhoben · Cöllnische Marck = 233,856 g Feinsilber · biß 1871 als Rechnungsmünze fortgeführt"
      en: "Müntzreceß Leipzig 16 Jan. 1690 · raised to imperial standard by commission edict 1738 · Cöllnische Marck = 233.856 g fine silver · retained as unit of account until 1871"
      uk: "Лейпцизька конвенція 16 січня 1690 · 1738 піднесено до імперського стандарту імператорським едиктом · Кельнська марка = 233,856 г чистого срібла · як розрахункова одиниця збережено до 1871"
    body:
      - kind: rows
        items:
          - key: {de: "Feingewicht ⅔-Thaler", en: 'Fine weight, ⅔-Thaler', uk: Чиста вага ⅔-Thaler}
            value: {de: "<b>12,99200 g</b> (= 233,856 / 18) · 17,32267 g rau · 750 ‰", en: <b>12.99200 g</b> (= 233.856 / 18) · 17.32267 g rough · 750 ‰, uk: '<b>12,99200 г</b> (= 233,856 / 18) · 17,32267 г повної · 750 ‰'}
          - key: {de: "Feingewicht ⅓-Thaler", en: 'Fine weight, ⅓-Thaler', uk: Чиста вага ⅓-Thaler}
            value: {de: "<b>6,49600 g</b> (= 233,856 / 36)", en: <b>6.49600 g</b> (= 233.856 / 36), uk: '<b>6,49600 г</b> (= 233,856 / 36)'}
          - key: {de: "Thaler Courant (Rechnung)", en: Thaler Courant (accounting), uk: Thaler Courant (розрахунковий)}
            value: {de: "<b>19,48800 g</b> (= 233,856 / 12) — nicht geprägt", en: <b>19.48800 g</b> (= 233.856 / 12) — not struck, uk: '<b>19,48800 г</b> (= 233,856 / 12) — не карбувалось'}
          - key: {de: "Torgauer Münzfuß (Kleingeld)", en: Torgau standard (small coin), uk: Торгауська стопа (дрібне)}
            value: {de: "Scheidemünzen nach leichterem Fuß: 1- und 2-Groschen-Stücke im <b>12½-Thalerfuß</b> (= 18,70848 g je Thaler); Pfennige im <b>13-Thalerfuß</b> (= 17,98892 g) · <em>Torgauer Münzfuß = auch als Synonym für den Leipziger Fuß insgesamt gebräuchlich</em>", en: 'Petty coin on a lighter standard: 1- and 2-Groschen pieces on the <b>12½-Thalerfuß</b> (= 18.70848 g per thaler); Pfennig on the <b>13-Thalerfuß</b> (= 17.98892 g) · <em>Torgauer Münzfuß is also used as a synonym for the Leipziger Fuß as a whole</em>', uk: 'Розмінні монети за легшою стопою: 1- і 2-грошові монети за <b>12½-Thalerfuß</b> (= 18,70848 г на Thaler); Pfennig за <b>13-Thalerfuß</b> (= 17,98892 г) · <em>Торгауська стопа також вживається як синонім Лейпцизької стопи в цілому</em>'}
      - kind: prose
        label:
          de: "Rechnungsfraktionen"
          en: "Accounting fractions"
          uk: "Розрахункові фракції"
        content:
          de: |
            <b>1 Thaler Specie</b> = 1⅓ Thaler Courant = 32 Gute Groschen Courant = 384 Pfennig Courant<br>
            <b>1 Thaler Courant</b> (Rechnungseinheit) = ¾ Thaler Specie = 24 Gute Groschen Courant = 288 Pfennig Courant<br>
            <b>1× ⅔-Thaler</b> (Gulden) = ½ Thaler Specie = ⅔ Thaler Courant = 16 Gute Groschen Courant = 192 Pfennig Courant<br>
            <b>1× ⅓-Thaler</b> = ¼ Thaler Specie = ⅓ Thaler Courant = 8 Gute Groschen Courant = 96 Pfennig Courant<br>
            <b>2× ⅔-Thaler</b> = 1 Thaler Specie (2 × 12,992 = 25,98400 g ✓)<br>
            <b>1 Guter Groschen Courant</b> = 12 Pfennig Courant = 0,81200 g fein<br>
            <em>Ggr. Courant (0,81200 g) ≠ Ggr. Species (1,08267 g) — gleicher Name, verschiedener Silbergehalt</em>
          en: "<b>1 Thaler Specie</b> = 1⅓ Thaler Courant = 32 Gute Groschen Courant = 384 Pfennig Courant<br>\n<b>1 Thaler Courant</b> (accounting unit) = ¾ Thaler Specie = 24 Gute Groschen Courant = 288 Pfennig Courant<br>\n<b>1× ⅔-Thaler</b> (Gulden) = ½ Thaler Specie = ⅔ Thaler Courant = 16 Gute Groschen Courant = 192 Pfennig Courant<br>\n<b>1× ⅓-Thaler</b> = ¼ Thaler Specie = ⅓ Thaler Courant = 8 Gute Groschen Courant = 96 Pfennig Courant<br>\n<b>2× ⅔-Thaler</b> = 1 Thaler Specie (2 × 12.992 = 25.98400 g ✓)<br>\n<b>1 Guter Groschen Courant</b> = 12 Pfennig Courant = 0.81200 g fine<br>\n<em>Ggr. Courant (0.81200 g) ≠ Ggr. Species (1.08267 g) — same name, different silver content</em>\n"
          uk: "<b>1 Thaler Specie</b> = 1⅓ Thaler Courant = 32 Gute Groschen Courant = 384 Pfennig Courant<br>\n<b>1 Thaler Courant</b> (розрахункова одиниця) = ¾ Thaler Specie = 24 Gute Groschen Courant = 288 Pfennig Courant<br>\n<b>1× ⅔-Thaler</b> (Gulden) = ½ Thaler Specie = ⅔ Thaler Courant = 16 Gute Groschen Courant = 192 Pfennig Courant<br>\n<b>1× ⅓-Thaler</b> = ¼ Thaler Specie = ⅓ Thaler Courant = 8 Gute Groschen Courant = 96 Pfennig Courant<br>\n<b>2× ⅔-Thaler</b> = 1 Thaler Specie (2 × 12,992 = 25,98400 г ✓)<br>\n<b>1 Guter Groschen Courant</b> = 12 Pfennig Courant = 0,81200 г чистого<br>\n<em>Ggr. Courant (0,81200 г) ≠ Ggr. Species (1,08267 г) — однакова назва, різний вміст срібла</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Vertragsgründer (1690):</b> Kurbrandenburg, Kursachsen, Braunschweig-Lüneburg.<br>
          <b>Rasch beigetreten:</b> Nahezu alle nord- und mitteldeutschen Stände; Hansestädte (als Umlaufmünze).<br>
          <b>Mecklenburg-Schwerin:</b> 1738 als Landeswährung erklärt; ⅔-Thaler geprägt biß 1829.<br>
          <b>Hannover:</b> Prägte ⅔-Thaler weiter auch nach Annahme des Conventions-Fußes.<br>
          <b>1738:</b> Durch Kaiserliches Commissionsedikt offiziell zum Reichsmünzfuß erhoben.<br>
          <b>Nicht angenommen:</b> Süddeutschland (Gulden-Länder); Österreich (eigener Fuß).
        en: |
          <b>Treaty signatories (1690):</b> Electoral Brandenburg, Electoral Saxony, Brunswick-Lüneburg.<br>
          <b>Quickly acceded:</b> Nearly all North and Central German estates; the Hanseatic cities (as circulating currency).<br>
          <b>Mecklenburg-Schwerin:</b> Declared territorial currency 1738; ⅔-Thaler struck until 1829.<br>
          <b>Hanover:</b> Continued striking ⅔-Thaler even after adopting the Conventions-Fuß.<br>
          <b>1738:</b> Officially elevated to imperial standard by imperial commission edict.<br>
          <b>Did not adopt:</b> Southern Germany (Gulden lands); Austria (own standard).
        uk: |
          <b>Сторони угоди (1690):</b> Курбранденбург, Курсаксонія, Брауншвайг-Люнебург.<br>
          <b>Швидко приєднались:</b> майже всі північно- й центральнонімецькі стани; ганзейські міста (як обігова монета).<br>
          <b>Мекленбург-Шверін:</b> 1738 проголошено як земельна валюта; ⅔-Thaler карбувались до 1829.<br>
          <b>Ганновер:</b> продовжував карбувати ⅔-Thaler і після прийняття Конвенційної стопи.<br>
          <b>1738:</b> офіційно піднесено до імперського стандарту імператорським едиктом.<br>
          <b>Не прийняли:</b> Південна Німеччина (землі Gulden); Австрія (власна стопа).

