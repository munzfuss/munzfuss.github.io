        content:
          de: |
            <b>1 Thaler Specie</b> (9¼-Fuß) = <b>25,28173 g</b> fein<br>
            <b>1 Thaler Specie</b> = 120 Skilling Danske (biß 1788, Dänisch-norwegischer Verbund)<br>
            <b>1 Thaler Specie</b> = 60 Schilling Schleswig-Holsteinisch Courant = 720 Pfennig (ab 29. Febr. 1788)<br>
            <b>1 Thaler Specie</b> = 1¼ Reichsthaler Sch.-H. Courant (5:4-Tarif)<br>
