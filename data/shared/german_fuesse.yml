  body:
    - kind: rows
      items:
        - key: {de: "Friedrich d'or (biß 1770)"}
          value: {de: "<b>6,055 g</b> Feingold · 900 ‰ · (Quelle: MGM Münzlexikon)"}
        - key: {de: "Friedrich d'or (ab 1770)"}
          value: {de: "<b>6,032 g</b> Feingold · 900 ‰ · (Quelle: MGM Münzlexikon)"}
        - key: {de: "Kurs Bremen"}
          value: {de: "1 Pistole = 5 Thaler Gold = 360 Grote = 1800 Schwaren"}
        - key: {de: "Thaler Gold · Münzfuß (ab 1840)"}
          value: {de: "13⅓ Thaler je rauhe Kölnische Marck · Raugewicht <b>17,53920 g</b> · Feingehalt 986 1/9‰ (= 284/288 = Dukatenfuß) · Feingewicht <b>17,29560 g</b> · Gerechnet in der rauhen Mark (nicht der feinen); kein eigener Stufenname — die Stope ergab sich direkt aus dem Pistolenpreis"}
    - kind: prose
      label: {de: "Rechnungsfraktionen", en: "Accounting fractions", uk: "Розрахункові фракції"}
      content:
        de: |
          <b>1 Pistole</b> = 5 Thaler Gold = 360 Grote = 1800 Schwaren<br>
          <b>1 Thaler Gold</b> = 72 Grote = 360 Schwaren = <b>17,53920 g</b> rau · <b>17,29560 g</b> fein Silber<br>
          <b>1 Thaler Gold</b> = 1,21100 g Feingold (biß 1770, 6,055 g / 5) · 1,20640 g Feingold (ab 1770, 6,032 g / 5)<br>
          <b>1 Grote</b> = 5 Schwaren<br>
          <em>Impliziertes Au:Ag-Verhältnis: 1 : 14,282 (biß 1770) · 1 : 14,337 (ab 1770)</em><br>
          <b>Preisung 1863:</b> 1 Vereinsgold-Krone (= 10 g Feingold, Referenzmoneta der Münzunionsverhandlungen, nicht Bremer Prägung) = 8,4 = 42/5 Thaler Gold → 1 Thaler Gold = <b>25/21 g Feingold</b> ≈ 1,190 g · Au:Ag ≈ 1:14,528 · Dieser Goldgehalt entspricht exakt der späteren Reichsmark-Umrechnung (93/28 Mark × 100/279 g/Mark = 25/21 g ✓ — Bremens Preisung 1863 antizipierte den späteren Goldstandard)<br>
          <b>«Thaler Courant» (Banknoten Bremer Bank 1870):</b> Ab 1870 war der Thaler Gold in Bremen gesetzliches Zahlungsmittel (Courantgeld) — damit wurde «Thaler Gold» zum «Thaler Courant»: die einzige umlaufende Großsilbermünze Bremens, deren Münzfuß so selbstverständlich war, dass er auf der Banknote nicht mehr angegeben werden musste. Auf den Gedenkmünzen (1863, 1865, 1871) stand noch «EIN THALER GOLD», um ihn vom alten Silber-Reichsthaler zu unterscheiden; als er Courantstatus erhielt, war diese Unterscheidung überflüssig geworden.<br>
          <b>Umrechnung 1872:</b> Münzgesetz 4. Decembr. 1871: 10 Mark (Gold) = 3 1/93 Thaler Gold → <b>1 Thaler Gold = 93/28 Mark ≈ 3,321 Mark</b> · 1 Grote = 31/672 Mark ≈ 0,046 Mark · Gesetz 30. April 1872: ab 1. Juli 1872 kein gesetzliches Zahlungsmittel mehr (früher als der Rest des Reichs — da Bremen bereits Goldstandard hatte)
  territories:
    label: {de: "Territorien", en: "Territories", uk: "Території"}
    content:
      de: |
        <b>Nur:</b> Freie Hansestadt Bremen (18. Jh.–1875).<br>
        <b>Hintergrund:</b> Bremen führte nie eine eigene Silberleitwährung ein; orientierte sich am Goldkurs des Friedrich d'or (Pistole) — die einzige de-facto-Goldwährung im deutschen Raum vor 1871.

