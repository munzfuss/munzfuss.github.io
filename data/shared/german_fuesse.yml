          - key: {de: "Thaler Specie (9-Fuß)", en: Thaler Specie (9-Fuß), uk: Thaler Specie (9-Thalerfuß)}
            value: {de: "<b>25,98400 g</b> fein · Hamburg 1730–1764 geprägt · 888 8/9 ‰ · Kurs: ≈ 60 Schilling Courant (Marktpreis; rechnerisch 60 Sch. 5 Pf., Abweich. −0,046%) · 25,98400 / 20,63435 = 34/27 ≈ 1¼ (Tarif, Abweich. +0,74%)", en: '<b>25.98400 g</b> fine · Hamburg struck 1730–1764 · 888 8/9 ‰ · rate: ≈ 60 Schilling Courant (market price; computed 60 Sch. 5 Pf., deviation −0.046%) · 25.98400 / 20.63435 = 34/27 ≈ 1¼ (tariff, deviation +0.74%)', uk: '<b>25,98400 г</b> чистого · Гамбург карбував 1730–1764 · 888 8/9 ‰ · курс: ≈ 60 Schilling Courant (ринкова ціна; розрахунково 60 Sch. 5 Pf., відхилення −0,046%) · 25,98400 / 20,63435 = 34/27 ≈ 1¼ (тариф, відхилення +0,74%)'}
          - key: {de: "Schilling Species vs. Courant", en: Schilling Species vs. Courant, uk: Schilling Species vs. Courant}
            value: {de: "Auf Lübecker/Hamburger Prägungen 1761–1764 ausdrücklich «48 Schilling Species» angegeben — da Schilling Courant (34-Fuß) nur 5/6 des Schilling Species enthielt. Kein sauberer Bruch zwischen 9-Fuß und 34-Marckfuß.", en: "On Lübeck/Hamburg coinage 1761–1764 explicitly marked «48 Schilling Species» — since the Schilling Courant (34-Marckfuß) contained only 5/6 of the Schilling Species. No clean fraction between the 9-Thalerfuß and the 34-Marckfuß.", uk: "На любекських/гамбурзьких карбуваннях 1761–1764 явно зазначено «48 Schilling Species» — оскільки Schilling Courant (34-Marckfuß) містив лише 5/6 Schilling Species. Чистого дробу між 9-Thalerfuß і 34-Marckfuß немає."}
      - kind: prose
        label: {de: "Rechnungsfraktionen 1726–1854", en: "Accounting fractions 1726–1854", uk: "Розрахункові фракції 1726–1854"}
        content:
