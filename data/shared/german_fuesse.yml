        de: |
          <b>Gründer (Münchener Vertrag 25. Aug. 1837):</b> Bayern, Württemberg, Baden, Hessen-Darmstadt, Nassau, Frankfurt.<br>
          <b>Beigetreten 1838–1839:</b> Sachsen-Meiningen; Hohenzollern-Sigmaringen und -Hechingen; Hessen-Homburg; Schwarzburg-Rudolstadt.<br>
          <b>Sachsen:</b> Prägte ab 1838 die gemeinsame Vereinsmünze (2 Thaler = 3½ Gulden).<br>
          <b>1857:</b> Übergang zum Wiener Münzvertrag (30-Thaler-Fuß); Gulden-Rechnung bleibt mit neuem Grundgewicht (Zollpfund).
        en: |
          <b>Founders (Munich Treaty, 25 Aug. 1837):</b> Bavaria, Württemberg, Baden, Hesse-Darmstadt, Nassau, Frankfurt.<br>
          <b>Acceded 1838–1839:</b> Saxe-Meiningen; Hohenzollern-Sigmaringen and -Hechingen; Hesse-Homburg; Schwarzburg-Rudolstadt.<br>
          <b>Saxony:</b> Struck the joint Vereinsmünze (2 Thaler = 3½ Gulden) from 1838.<br>
          <b>1857:</b> Transition to the Vienna Mint Treaty (30-Thaler-Fuß); Gulden reckoning continues with a new base weight (Zollpfund).
        uk: |
          <b>Засновники (Мюнхенський договір, 25 серпня 1837):</b> Баварія, Вюртемберг, Баден, Гессен-Дармштадт, Нассау, Франкфурт.<br>
          <b>Приєднались 1838–1839:</b> Саксен-Майнінген; Гогенцоллерн-Зіґмарінген і -Гехінген; Гессен-Гомбург; Шварцбург-Рудольштадт.<br>
          <b>Саксонія:</b> від 1838 карбувала спільну Vereinsmünze (2 Thaler = 3½ Gulden).<br>
          <b>1857:</b> перехід до Віденської монетної угоди (30-Thaler-Fuß); лічба в Gulden зберігається з новою базовою вагою (Zollpfund).

# ------------------------------------------------------------------
# 12. Rigsbankdalerfuß · 18½-Thaler-Fuß
# ------------------------------------------------------------------
  - id: rigsbankdaler_18_5
    metal: silver
    years_label:
      de: "1813 → 1864"
      en: "1813 → 1864"
      uk: "1813 → 1864"
    name: 18½-Thaler-Fuß
    historical_name: Rigsbankdalerfuß / Rigsdaler R.M. (Rigsmønt)
    subtitle:
      de: "Holstein und Schleswig nach dänischem Staatsbankrott 1813 · Cöllnische Marck = 233,856 g Feinsilber"
      en: "Holstein and Schleswig after the Danish state bankruptcy 1813 · Cöllnische Marck = 233.856 g fine silver"
      uk: "Гольштейн і Шлезвіг після данського державного банкрутства 1813 · Кельнська марка = 233,856 г чистого срібла"
    body:
      - kind: phase_header
        title: {de: "Phasen", en: "Phases", uk: "Фази"}
      - kind: phase_summary
        content:
          de: "<b>1813–1854 — Rigsbankdaler:</b> Neue dänische Münze nach dem Staatsbankrott. Im holsteinischen Deutschen ohne eigene etablierte Übersetzung — auf Kassenanweisungen erscheint er lediglich als Wertangabe in der alten Courant-Währung (30 Schilling S.-H. Courant)."
          en: "<b>1813–1854 — Rigsbankdaler:</b> The new Danish coin issued after the state bankruptcy. In Holstein German it has no established equivalent term — on treasury notes it appears only as a value statement in the old Courant currency (30 Schilling S.-H. Courant)."
          uk: "<b>1813–1854 — Rigsbankdaler:</b> Нова данська монета після державного банкрутства. У гольштейнсько-німецькій без усталеного перекладу — на казначейських розписках з'являється лише як вартісне позначення у старій курантній валюті (30 Schilling S.-H. Courant)."
      - kind: phase_summary
        content:
          de: "<b>1854–1864 — Thaler Reichsmünze</b> (dän. Rigsdaler R.M., Rigsmønt): Nur Umbenennung durch König Friedrich VII. — kein Münzfuß-, kein Wertänderung. Im Nominaltext der Kassenanweisungen: »Reichsthaler« oben, »Thaler Reichsmünze« im Fließtext als Synonym."
          en: "<b>1854–1864 — Thaler Reichsmünze</b> (Dan. Rigsdaler R.M., Rigsmønt): Only a renaming by King Frederick VII — no change in standard or value. On treasury notes: «Reichsthaler» above, «Thaler Reichsmünze» in the running text as a synonym."
          uk: "<b>1854–1864 — Thaler Reichsmünze</b> (дан. Rigsdaler R.M., Rigsmønt): лише перейменування королем Фредеріком VII — без зміни стопи чи вартості. На казначейських розписках: «Reichsthaler» зверху, «Thaler Reichsmünze» у тексті як синонім."
      - kind: phase_header
        title:
          de: "I. Dänische Münze (Rigsbankdaler-System)"
          en: "I. Danish coinage (Rigsbankdaler system)"
          uk: "I. Данські монети (Rigsbankdaler-система)"
      - kind: rows
        items:
          - key: {de: "Feingewicht Rigsbankdaler", en: 'Fine weight, Rigsbankdaler', uk: Чиста вага Rigsbankdaler}
            value: {de: "<b>12,64086 g</b> (= 233,856 / 18,5) · 14,44670 g rau · 875 ‰ · Münzbeleg", en: "<b>12.64086 g</b> (= 233.856 / 18.5) · 14.44670 g rough · 875 ‰ · attestation", uk: '<b>12,64086 г</b> (= 233,856 / 18,5) · 14,44670 г повної · 875 ‰ · атестовано'}
      - kind: prose
        label: {de: "Dänische Rechnungsfraktionen (offiziell)", en: "Danish accounting fractions (official)", uk: "Данські розрахункові фракції (офіційно)"}
        content:
          de: |
            <b>1 Rigsbankdaler</b> = 96 Rigsbankskilling = <b>12,64086 g</b><br>
            <b>1 Rigsbankskilling</b> = <b>0,13168 g</b> fein
          en: "<b>1 Rigsbankdaler</b> = 96 Rigsbankskilling = <b>12.64086 g</b><br>\n<b>1 Rigsbankskilling</b> = <b>0.13168 g</b> fine\n"
          uk: "<b>1 Rigsbankdaler</b> = 96 Rigsbankskilling = <b>12,64086 г</b><br>\n<b>1 Rigsbankskilling</b> = <b>0,13168 г</b> чистого\n"
      # II. Holsteinische Alltagswährung was previously rendered here
      # but its contents (Thaler Specie / Marck S.-H. Courant /
      # Schilling S.-H. Courant) describe the 9¼-Thaler-Fuß standard,
      # not the 18½-Thaler-Fuß. They have been moved to the merged
      # `thaler_specie_9_25` card (Phases A/B/C). What remains here
      # is the BRIDGE prose that shows the cross-rate Rigsbankdaler ↔
      # Schilling S.-H. Courant — useful in this card because it
      # explains how the two coexisting standards interlocked.
      - kind: phase_header
        title:
          de: "II. Brücke zum Schleswig-Holsteinischen 9¼-Thaler-Fuß"
          en: "II. Bridge to the Schleswig-Holstein 9¼-Thaler-Fuß"
          uk: "II. Місток до шлезвіг-гольштейнської 9¼-Thaler-Fuß"
      - kind: prose
        label: {de: "Brücke", en: "Bridge", uk: "Місток"}
        content:
          de: |
            <b>1 Rigsbankdaler</b> = <b>30 Schilling S.-H. Courant</b> = 1⅞ Marck S.-H. Courant<br>
            <b>2 Rigsbankdaler</b> = 1 Thaler Specie = 60 Schilling S.-H. Courant<br>
            <b>1 Reichsthaler Sch.-H. Courant</b> = 8/5 (1,6) Rigsbankdaler (= 48/30 Schilling)<br>
            <b>1 Rigsbankdaler</b> = 5/8 (0,625) Reichsthaler Sch.-H. Courant<br>
            <em>Der Rigsbankdaler teilte sich nicht ganzzahlig in Marck S.-H. Courant (30 ÷ 16 = 1,875) — daher blieb die holsteinische Alltagsrechnung in der alten Courant-Währung.</em><br>
            <b>ab 1854:</b> Rigsbankdaler → Thaler Reichsmünze (Rigsdaler R.M.); Rigsbankskilling → Schilling Reichsmünze (Wert unverändert)
          en: "<b>1 Rigsbankdaler</b> = <b>30 Schilling S.-H. Courant</b> = 1⅞ Marck S.-H. Courant<br>\n<b>2 Rigsbankdaler</b> = 1 Thaler Specie = 60 Schilling S.-H. Courant<br>\n<b>1 Reichsthaler Sch.-H. Courant</b> = 8/5 (1.6) Rigsbankdaler (= 48/30 Schilling)<br>\n<b>1 Rigsbankdaler</b> = 5/8 (0.625) Reichsthaler Sch.-H. Courant<br>\n<em>The Rigsbankdaler did not divide into Marck S.-H. Courant in whole numbers (30 ÷ 16 = 1.875) — for that reason Holstein everyday accounting remained in the old Courant currency.</em><br>\n<b>From 1854:</b> Rigsbankdaler → Thaler Reichsmünze (Rigsdaler R.M.); Rigsbankskilling → Schilling Reichsmünze (value unchanged)\n"
          uk: "<b>1 Rigsbankdaler</b> = <b>30 Schilling S.-H. Courant</b> = 1⅞ Marck S.-H. Courant<br>\n<b>2 Rigsbankdaler</b> = 1 Thaler Specie = 60 Schilling S.-H. Courant<br>\n<b>1 Reichsthaler Sch.-H. Courant</b> = 8/5 (1,6) Rigsbankdaler (= 48/30 Schilling)<br>\n<b>1 Rigsbankdaler</b> = 5/8 (0,625) Reichsthaler Sch.-H. Courant<br>\n<em>Rigsbankdaler не ділився цілочислово на Marck S.-H. Courant (30 ÷ 16 = 1,875) — тому гольштейнський щоденний рахунок залишався у старій курантній валюті.</em><br>\n<b>З 1854:</b> Rigsbankdaler → Thaler Reichsmünze (Rigsdaler R.M.); Rigsbankskilling → Schilling Reichsmünze (вартість незмінна)\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Herzogtum Holstein, Herzogtum Schleswig:</b> 1813–1864.<br>
          <b>Gleichzeitig in Dänemark selbst:</b> Rigsbankdaler als gesamtdänische Einheit (1813–1875).<br>
          <b>Münzstätten:</b> Altona (bis 1863); Kopenhagen.<br>
          <b>1864:</b> Ende mit preuß./österr. Annexion; Übergang zum Vereinsthalerfuß.
        en: |
          <b>Duchy of Holstein, Duchy of Schleswig:</b> 1813–1864.<br>
          <b>Concurrently in Denmark itself:</b> Rigsbankdaler as the all-Danish unit (1813–1875).<br>
          <b>Mints:</b> Altona (until 1863); Copenhagen.<br>
          <b>1864:</b> Ends with Prussian/Austrian annexation; transition to the Vereinsthaler standard.
        uk: |
          <b>Герцогство Гольштейн, Герцогство Шлезвіг:</b> 1813–1864.<br>
          <b>Одночасно в самій Данії:</b> Rigsbankdaler як загальноданська одиниця (1813–1875).<br>
          <b>Монетні двори:</b> Альтона (до 1863); Копенгаген.<br>
          <b>1864:</b> кінець із прусько-австрійською анексією; перехід до Vereinsthaler-стопи.

# ------------------------------------------------------------------
# 13. Vereinsmünzfuß · 30-Thaler-Fuß
# ------------------------------------------------------------------
  - id: vereinsmuenzfuss
    metal: silver
    years_label:
      de: "1857 → 1871"
      en: "1857 → 1871"
      uk: "1857 → 1871"
    name: 30-Thaler-Fuß · 52½-Gulden-Fuß · 45-Gulden-Fuß
    historical_name: Vereinsmünzfuß
    subtitle:
      de: 'Wiener Münzvertrag 24. Januar 1857 · Zollpfund = 500,000 g Feinsilber (ersetzt Kölnische Mark) · drei parallele Müntzfüße: 30-Taler-Fuß (Norddtl.), 52½-Gulden-Fuß (Süddtl.), 45-Gulden-Fuß (Österreich)<sup><a href="#ref3">[3]</a></sup><sup><a href="#ref4">[4]</a></sup> · Vereinsthaler als gesetzliches Zahlmittel biß 1907'
      en: 'Vienna Mint Treaty 24 January 1857 · Zollpfund = 500.000 g fine silver (replaces Cöllnische Marck) · three parallel Müntzfüße: 30-Taler-Fuß (north), 52½-Gulden-Fuß (south), 45-Gulden-Fuß (Austria)<sup><a href="#ref3">[3]</a></sup><sup><a href="#ref4">[4]</a></sup> · Vereinsthaler as legal tender until 1907'
      uk: 'Віденська монетна угода 24 січня 1857 · Zollpfund = 500,000 г чистого срібла (замінює Кельнську марку) · три паралельні Müntzfüße: 30-Taler-Fuß (північ), 52½-Gulden-Fuß (південь), 45-Gulden-Fuß (Австрія)<sup><a href="#ref3">[3]</a></sup><sup><a href="#ref4">[4]</a></sup> · Vereinsthaler як законний платіжний засіб до 1907'
    body:
      # The Vereinsmünzfuß had three parallel currency zones (Nord/Süd/AT).
      # Rendered as a rows table — each zone is a key:value pair — so it
      # naturally pairs side-by-side with the Rechnungsfraktionen prose
      # to the right. The «Drei parallele Währungsgebiete» framing line
      # was previously a phase_header with three phase_summaries below;
      # restructured into rows-table form per the same pattern as every
      # other entry in this catalogue.
      - kind: rows
        items:
          - key: {de: "Nord", en: "North", uk: "Північ"}
            value:
              de: "30 Vereinsthaler/Pfund · Feingewicht 500/30 = <b>16,66667 g</b> · 18,51852 g rau · 900 ‰ · »XXX EIN PFUND FEIN«"
              en: "30 Vereinsthaler/pound · fine weight 500/30 = <b>16.66667 g</b> · 18.51852 g rough · 900 ‰ · «XXX EIN PFUND FEIN»"
              uk: "30 Vereinsthaler/фунт · чиста вага 500/30 = <b>16,66667 г</b> · 18,51852 г повної · 900 ‰ · «XXX EIN PFUND FEIN»"
          - key: {de: "Süd", en: "South", uk: "Південь"}
            value:
              de: "52½ südd. Gulden/Pfund · 1 Gulden = 500/52,5 = <b>9,52381 g</b> fein"
              en: "52½ South-German Gulden/pound · 1 Gulden = 500/52.5 = <b>9.52381 g</b> fine"
              uk: "52½ південно-німецьких Gulden/фунт · 1 Gulden = 500/52,5 = <b>9,52381 г</b> чистого"
          - key: {de: "Österreich", en: "Austria", uk: "Австрія"}
            value:
              de: "45 österr. Gulden/Pfund · 1 Gulden = 500/45 = <b>11,11111 g</b> fein"
              en: "45 Austrian Gulden/pound · 1 Gulden = 500/45 = <b>11.11111 g</b> fine"
              uk: "45 австрійських Gulden/фунт · 1 Gulden = 500/45 = <b>11,11111 г</b> чистого"
      - kind: prose
        label: {de: "Rechnungsfraktionen", en: "Accounting fractions", uk: "Розрахункові фракції"}
        content:
          de: |
            <b>1 Vereinsthaler</b> (Nord) = 30 Silbergroschen = 360 Pfennig<br>
            <b>1 Silbergroschen</b> = 12 Pfennig<br>
            <b>1 Vereinsthaler</b> (Süd) = 1¾ südd. Gulden = 105 Kreutzer<br>
            <b>1 Vereinsthaler</b> (Österreich) = 1½ österr. Gulden = 150 Neukreutzer<br>
            <b>2 Vereinsthaler</b> = 3½ südd. Gulden = 3 österr. Gulden (Brückenmünze)
          en: "<b>1 Vereinsthaler</b> (North) = 30 Silbergroschen = 360 Pfennig<br>\n<b>1 Silbergroschen</b> = 12 Pfennig<br>\n<b>1 Vereinsthaler</b> (South) = 1¾ South-German Gulden = 105 Kreutzer<br>\n<b>1 Vereinsthaler</b> (Austria) = 1½ Austrian Gulden = 150 Neukreutzer<br>\n<b>2 Vereinsthaler</b> = 3½ South-German Gulden = 3 Austrian Gulden (bridge coin)\n"
          uk: "<b>1 Vereinsthaler</b> (Північ) = 30 Silbergroschen = 360 Pfennig<br>\n<b>1 Silbergroschen</b> = 12 Pfennig<br>\n<b>1 Vereinsthaler</b> (Південь) = 1¾ південно-німецьких Gulden = 105 Kreutzer<br>\n<b>1 Vereinsthaler</b> (Австрія) = 1½ австрійських Gulden = 150 нових Kreutzer<br>\n<b>2 Vereinsthaler</b> = 3½ південно-німецьких Gulden = 3 австрійських Gulden (місткова монета)\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Alle Zollvereinsstaaten:</b> Preußen, Hannover, Bayern, Sachsen, Württemberg, Baden, Kurhessen, Hessen-Darmstadt, Nassau, Frankfurt u.a. (1857–1871).<br>
          <b>Österreich und Liechtenstein:</b> 1857–1866 (Österreich schied nach Königgrätz faktisch aus, blieb aber formell bis 1867).<br>
          <b>Dem Wiener Münzvertrag nicht beigetreten:</b> Bremen, Hamburg, Lübeck (Hansestädte; eigene Währungen bis 1875); Mecklenburg-Schwerin und -Strelitz; Luxemburg.<br>
          <b>Vereinsthaler:</b> Biß 1907 gesetzliches Zahlmittel im Deutschen Kaiserreich (= 3 Mark).
        en: |
          <b>All German Customs Union (Zollverein) states:</b> Prussia, Hanover, Bavaria, Saxony, Württemberg, Baden, Electoral Hesse, Hesse-Darmstadt, Nassau, Frankfurt and others (1857–1871).<br>
          <b>Austria and Liechtenstein:</b> 1857–1866 (Austria effectively withdrew after Königgrätz but formally remained until 1867).<br>
          <b>Did not accede to the Wiener Münzvertrag:</b> Bremen, Hamburg, Lübeck (Hanseatic cities; own currencies until 1875); Mecklenburg-Schwerin and -Strelitz; Luxembourg.<br>
          <b>Vereinsthaler:</b> Legal tender in the German Empire (= 3 Mark) until 1907.
        uk: |
          <b>Усі держави Німецького митного союзу (Zollverein):</b> Пруссія, Ганновер, Баварія, Саксонія, Вюртемберг, Баден, Курхессен, Гессен-Дармштадт, Нассау, Франкфурт та ін. (1857–1871).<br>
          <b>Австрія і Ліхтенштейн:</b> 1857–1866 (Австрія фактично вийшла після Кеніггреца, формально лишалась до 1867).<br>
          <b>Не приєдналися до Wiener Münzvertrag:</b> Бремен, Гамбург, Любек (ганзейські міста; власні валюти до 1875); Мекленбург-Шверін і -Стреліц; Люксембург.<br>
          <b>Vereinsthaler:</b> законний платіжний засіб у Німецькій імперії (= 3 Mark) до 1907.

# ------------------------------------------------------------------
# 13a. Vereinsgoldmünze · Krone und ½ Krone (1857, Wiener Münzvertrag)
# ------------------------------------------------------------------
  - id: vereinsgoldmuenze
    metal: gold
    years_label:
      de: "1857 → 1874"
      en: "1857 → 1874"
      uk: "1857 → 1874"
    name: Vereinsgoldmünze
    historical_name: Vereinskrone · ½ Vereinskrone
    subtitle:
      de: 'Wiener Münzvertrag vom 24. Januar 1857 (in Kraft 1. Mai 1857) zwischen Österreich, Liechtenstein und den deutschen Zollvereinsstaaten<sup><a href="#ref41">[41]</a></sup> · 50 Vereinskronen je Pfund Feingold (= 10 g fein je Krone) bei Probe 900 ‰ · reine Handelsmünze ohne Annahmezwang · letzte Prägung 1871 · demonetisiert 1. April 1874<sup><a href="#ref41">[41]</a></sup>'
      en: 'Vienna Coin Treaty of 24 January 1857 (in force from 1 May 1857) between Austria, Liechtenstein and the German Zollverein states<sup><a href="#ref41">[41]</a></sup> · 50 Vereinskronen per pound of fine gold (= 10 g fine per Krone) at 900‰ fineness · pure trade coin with no compulsory acceptance · last issue 1871 · demonetised 1 April 1874<sup><a href="#ref41">[41]</a></sup>'
      uk: 'Wiener Münzvertrag 24 січня 1857 (чинний з 1 травня 1857) між Австрією, Ліхтенштейном і державами німецького Цольферайну<sup><a href="#ref41">[41]</a></sup> · 50 Vereinskronen з фунта чистого золота (= 10 г чистого на Krone) за пробою 900 ‰ · суто торгова монета без обов''язку прийняття · остання прягеа 1871 · демонетизована 1 квітня 1874<sup><a href="#ref41">[41]</a></sup>'
    body:
      - kind: rows
        items:
          - key: {de: "Feinheit", en: Fineness, uk: Проба}
            value:
              de: "<b>900 ‰</b> (= 9/10) · Gold .900 + Kupfer .100<sup><a href=\"#ref41\">[41]</a></sup>"
              en: "<b>900 ‰</b> (= 9/10) · gold .900 + copper .100<sup><a href=\"#ref41\">[41]</a></sup>"
              uk: "<b>900 ‰</b> (= 9/10) · золото .900 + мідь .100<sup><a href=\"#ref41\">[41]</a></sup>"
          - key: {de: "Vereinskrone (1 Krone)", en: "Vereinskrone (1 Krone)", uk: "Vereinskrone (1 Krone)"}
            value:
              de: "<b>11,111 g</b> rau · <b>10,000 g</b> Feingold (= 500 / 50) · 50 Stück je Pfund Feingold"
              en: "<b>11.111 g</b> rough · <b>10.000 g</b> fine gold (= 500 / 50) · 50 pieces per pound of fine gold"
              uk: "<b>11,111 г</b> повної · <b>10,000 г</b> чистого золота (= 500 / 50) · 50 штук з фунта чистого золота"
          - key: {de: "Halbe Vereinskrone (½ Krone)", en: "Half Vereinskrone (½ Krone)", uk: "Halbe Vereinskrone (½ Krone)"}
            value:
              de: "<b>5,555 g</b> rau · <b>5,000 g</b> Feingold (= 500 / 100) · 100 Stück je Pfund Feingold"
              en: "<b>5.555 g</b> rough · <b>5.000 g</b> fine gold (= 500 / 100) · 100 pieces per pound of fine gold"
              uk: "<b>5,555 г</b> повної · <b>5,000 г</b> чистого золота (= 500 / 100) · 100 штук з фунта чистого золота"
          - key: {de: "Tarif", en: Tariff, uk: Тариф}
            value:
              de: "<b>kein fester Tarif</b> — reine Handelsmünze ohne Annahmezwang · Marktkurs bei Au:Ag 1:15,5: <b>1 Vereinskrone ≈ 9,3 Taler Talerwährung</b><sup><a href=\"#ref41\">[41]</a></sup>"
              en: "<b>no fixed tariff</b> — pure trade coin with no compulsory acceptance · market rate at Au:Ag 1:15.5: <b>1 Vereinskrone ≈ 9.3 Taler Talerwährung</b><sup><a href=\"#ref41\">[41]</a></sup>"
              uk: "<b>фіксованого тарифу немає</b> — суто торгова монета без обов'язку прийняття · ринковий курс при Au:Ag 1:15,5: <b>1 Vereinskrone ≈ 9,3 Taler Talerwährung</b><sup><a href=\"#ref41\">[41]</a></sup>"
          - key: {de: "Mintage gesamt", en: "Total mintage", uk: "Сукупна прягеа"}
            value:
              de: "≈ <b>2 138 256</b> Vollkronen 1857–1871 in sechs Vertragsstaaten · von diesen wurden bei der Demonetisierung 1874 nur <b>332 091</b> (≈ 15,5 %) eingelöst — Rest ins Ausland geflossen und eingeschmolzen<sup><a href=\"#ref42\">[42]</a></sup>"
              en: "≈ <b>2,138,256</b> full Vereinskronen 1857–1871 across six treaty states · only <b>332,091</b> (≈ 15.5 %) were redeemed at the 1874 demonetisation — the remainder flowed abroad and was melted down<sup><a href=\"#ref42\">[42]</a></sup>"
              uk: "≈ <b>2 138 256</b> повних Vereinskronen 1857–1871 у шести державах-учасницях · з них при демонетизації 1874 викуплено лише <b>332 091</b> (≈ 15,5 %) — решта осіла за кордоном і переплавлена<sup><a href=\"#ref42\">[42]</a></sup>"
      - kind: phase_header
        title:
          de: "Periodisierung der Vereinsgoldmünze (1857 → 1874)"
          en: "Periodisation of the Vereinsgoldmünze (1857 → 1874)"
          uk: "Періодизація Vereinsgoldmünze (1857 → 1874)"
      - kind: phase_summary
        content:
          de: '<b>24. Januar 1857 · Wiener Münzvertrag:</b> Österreich, Liechtenstein und die deutschen Zollvereinsstaaten unterzeichnen den gemeinsamen Münzvertrag; in Kraft am <b>1. Mai 1857</b>; ursprünglich biß Ende 1878 angelegt.<sup><a href="#ref41">[41]</a></sup> Vertragsstandard: 50 Vereinskronen je Pfund (500 g) Feingold = 10 g fein je Stück bei 900 ‰ Probe — die <em>erste</em> Reichs-Goldmünze in metrischer Pfund-Definition (nicht mehr Cölln. Marck).'
          en: '<b>24 January 1857 · Vienna Coin Treaty:</b> Austria, Liechtenstein and the German Zollverein states sign the common Coin Treaty; in force from <b>1 May 1857</b>; originally to run until end of 1878.<sup><a href="#ref41">[41]</a></sup> Treaty standard: 50 Vereinskronen per pound (500 g) of fine gold = 10 g fine per piece at 900‰ fineness — the <em>first</em> imperial gold coin defined on the metric pound (no longer the Cöllnische Marck).'
          uk: '<b>24 січня 1857 · Wiener Münzvertrag:</b> Австрія, Ліхтенштейн і держави німецького Цольферайну підписують спільний монетний договір; чинність з <b>1 травня 1857</b>; спочатку планований до кінця 1878.<sup><a href="#ref41">[41]</a></sup> Стандарт договору: 50 Vereinskronen з фунта (500 г) чистого золота = 10 г чистого на штуку за пробою 900 ‰ — <em>перша</em> імперська золота монета в метричному фунтовому означенні (більше не Кельнська марка).'
      - kind: phase_summary
        content:
          de: '<b>1857 — 1864 · Hauptphase mit Mintage-Schwankungen:</b> sechs Vertragsstaaten beginnen Prägung. Hauptmintstaaten Hannover (≈ 784 000 Stück), Österreich (≈ 499 000), Preußen (≈ 278 000); Sachsen, Braunschweig und Bayern in deutlich kleineren Volumina; Liechtenstein als Vertragspartner ohne eigene Prägung.<sup><a href="#ref41">[41]</a></sup> Die Finanzkrise 1857–1859 (Insolvenz amerikanischer Banken) drückt die Stückzahlen zwischenzeitlich.<sup><a href="#ref42">[42]</a></sup>'
          en: '<b>1857 — 1864 · Main phase with mintage fluctuations:</b> six treaty states begin striking. Main mint states are Hanover (≈ 784,000 pieces), Austria (≈ 499,000), Prussia (≈ 278,000); Saxony, Brunswick and Bavaria in markedly smaller volumes; Liechtenstein a treaty party with no own issue.<sup><a href="#ref41">[41]</a></sup> The financial crisis of 1857–1859 (insolvency of American banks) temporarily depresses mintages.<sup><a href="#ref42">[42]</a></sup>'
          uk: '<b>1857 — 1864 · Головна фаза з коливаннями прягеи:</b> шість держав-учасниць починають карбування. Головні мінт-штати — Ганновер (≈ 784 000 шт.), Австрія (≈ 499 000), Пруссія (≈ 278 000); Саксонія, Брауншвайг і Баварія — у значно менших обсягах; Ліхтенштейн — учасник договору без власних емісій.<sup><a href="#ref41">[41]</a></sup> Фінансова криза 1857–1859 (банкрутство американських банків) тимчасово знижує обсяги.<sup><a href="#ref42">[42]</a></sup>'
      - kind: phase_summary
        content:
          de: '<b>Nach 30. Oktober 1864 · Beitritt Schleswig-Holsteins:</b> mit dem <b>Wiener Frieden</b> der Deutsch-Dänischen Krise tritt Schleswig-Holstein in den deutschen Raum über und damit auch in den Münzverein. Der Altonaer Münzhof war 1863 geschlossen, daher gibt es keine spezifisch holsteinischen Vereinskronen-Prägungen — die zirkulierenden Stücke kamen vor allem aus den nahen Hauptmintstaaten Hannover (B) und Preußen (A). Quantitative Schätzung der SH-Zirkulation in den vorliegenden Quellen nicht greifbar.<sup><a href="#ref43">[43]</a></sup>'
          en: '<b>After 30 October 1864 · Schleswig-Holstein joins:</b> with the <b>Vienna Peace</b> ending the German-Danish crisis, Schleswig-Holstein enters the German sphere and so the Münzverein. The Altona mint had closed in 1863, so there are no specifically Holstein-issued Vereinskronen — circulating pieces came chiefly from the neighbouring main mint states Hanover (B) and Prussia (A). The available sources offer no quantitative estimate of SH circulation.<sup><a href="#ref43">[43]</a></sup>'
          uk: '<b>Після 30 жовтня 1864 · Приєднання Шлезвіг-Гольштейну:</b> з <b>Wiener Frieden</b>, який поклав край німецько-данській кризі, Schleswig-Holstein переходить у німецький простір і тим самим у Münzverein. Альтонський монетний двір закрито 1863 р., тому специфічно гольштинських Vereinskronen-емісій немає — обіг забезпечували передусім сусідні головні мінт-штати Ганновер (B) і Пруссія (A). Кількісних оцінок обігу в SH у наявних джерелах не подано.<sup><a href="#ref43">[43]</a></sup>'
      - kind: phase_summary
        content:
          de: '<b>4. Dezember 1871 · Reichsgründung und Mintage-Stop:</b> mit dem <b>Münzgesetz vom 4. Dezember 1871</b> wird die Reichsgoldmark als alleiniger Goldstandard des Reichs eingeführt; die Vereinskronen-Prägung läuft <em>nicht</em> formal aus, sondern wird durch den neuen Standard schlicht überholt — die Vertragsstaaten stellen die Prägung 1871 ein. Mathematischer Anschluss: die Reichsgoldmark übernimmt die Pfund-Basis (500 g) und die .900-Probe direkt von der Vereinskrone, lediglich mit feinerer Unterteilung (139½ Stück 10-Mark / Pfund statt 50 Stück Krone / Pfund).'
          en: '<b>4 December 1871 · Founding of the Reich and end of mintage:</b> the <b>Coinage Act of 4 December 1871</b> establishes the Reichsgoldmark as the Reich''s sole gold standard; Vereinskronen mintage does not formally end but is superseded by the new standard — the treaty states stop striking in 1871. Mathematical succession: the Reichsgoldmark inherits the pound basis (500 g) and the .900 fineness directly from the Vereinskrone, only at a finer subdivision (139½ ten-Mark pieces per pound vs. 50 Krone per pound).'
          uk: '<b>4 грудня 1871 · Утворення Рейху і кінець прягеи:</b> <b>Закон про монету 4 грудня 1871</b> запроваджує Reichsgoldmark як єдиний золотий стандарт Рейху; прягеа Vereinskronen <em>не</em> завершується формально, а просто витісняється новим стандартом — держави-учасниці припиняють карбування 1871. Математична спадковість: Reichsgoldmark переймає фунтову базу (500 г) і пробу .900 безпосередньо від Vereinskrone, лише з тоншим поділом (139½ десятимаркових з фунта проти 50 Krone з фунта).'
      - kind: phase_summary
        content:
          de: '<b>1. April 1874 · Demonetisierung; 30. Juni 1874 · Einlösungsfrist:</b> die Vereinskronen verlieren den Status als gesetzliches Zahlungsmittel; bis zum 30. Juni 1874 können sie zum Goldwert eingelöst werden.<sup><a href="#ref41">[41]</a></sup> Von 2 138 256 geprägten Vollkronen werden nur <b>332 091</b> (≈ 15,5 %) fristgerecht eingelöst — die Mehrzahl floß ins Ausland und wurde dort eingeschmolzen, da die Vereinskrone bei festem Tarifwert von 9,3 Taler gegenüber dem Au-Marktpreis untertarifiert blieb (Goldarbitrage).<sup><a href="#ref42">[42]</a></sup>'
          en: '<b>1 April 1874 · Demonetisation; 30 June 1874 · Redemption deadline:</b> the Vereinskronen lose legal-tender status; by 30 June 1874 they can be redeemed at their gold value.<sup><a href="#ref41">[41]</a></sup> Of 2,138,256 full Kronen struck, only <b>332,091</b> (≈ 15.5 %) are redeemed in time — the majority had flowed abroad and been melted down, the Vereinskrone being under-tariffed at the fixed 9.3-Taler value against the market gold price (gold arbitrage).<sup><a href="#ref42">[42]</a></sup>'
          uk: '<b>1 квітня 1874 · Демонетизація; 30 червня 1874 · Термін викупу:</b> Vereinskronen втрачають статус законного платіжного засобу; до 30 червня 1874 їх можна викупити за вартістю золота.<sup><a href="#ref41">[41]</a></sup> З 2 138 256 викарбуваних повних Kronen вчасно викуплено лише <b>332 091</b> (≈ 15,5 %) — решта осіла за кордоном і там переплавлена, оскільки Vereinskrone за фіксованим тарифом 9,3 Taler була недотарифікована відносно ринкової ціни золота (золота арбітражна торгівля).<sup><a href="#ref42">[42]</a></sup>'
    territories:
      label:
        de: "Territorien"
        en: "Territories"
        uk: "Території"
      content:
        de: |
          <b>Vertragsstaaten 1857:</b> Österreichisches Kaiserreich, Fürstentum Liechtenstein, alle deutschen Zollvereinsstaaten.<br>
          <b>Hauptmintstaaten:</b> Hannover (≈ 784 000 Stück), Österreich (≈ 499 000), Preußen (≈ 278 000); Sachsen (≈ 57 000), Braunschweig (≈ 45 000), Bayern (≈ 4 000).<br>
          <b>Liechtenstein:</b> Vertragspartner, ohne eigene Prägung.<br>
          <b>Schleswig-Holstein:</b> tritt nach Wiener Frieden 30. Oktober 1864 mit dem deutschen Raum in den Münzverein ein; keine eigenen SH-Prägungen (Altona-Münze 1863 geschlossen). Zirkulation aus Hannover und Preußen.<br>
          <b>Status:</b> Handelsmünze ohne Annahmezwang in allen Vertragsstaaten — kein gesetzliches Zahlungsmittel im engen Sinne, staatliche Kassen konnten temporäre Tarife (max. 6 Monate) festsetzen.<br>
          <b>Beziehung zu skandinavischer Krone:</b> trotz Namensgleichheit sind die deutsche <i>Vereinskrone</i> 1857 und die skandinavische <i>Krone</i> der Münzunion 1873 (Schweden, Norwegen, Dänemark) <em>verschiedene Münzfüße</em> mit unterschiedlichen Standards.
        en: |
          <b>Treaty states 1857:</b> the Austrian Empire, the Principality of Liechtenstein, all German Zollverein states.<br>
          <b>Main mint states:</b> Hanover (≈ 784,000 pieces), Austria (≈ 499,000), Prussia (≈ 278,000); Saxony (≈ 57,000), Brunswick (≈ 45,000), Bavaria (≈ 4,000).<br>
          <b>Liechtenstein:</b> a treaty party with no own issue.<br>
          <b>Schleswig-Holstein:</b> joins the German sphere via the Vienna Peace of 30 October 1864 and so the Münzverein; no Holstein-specific issues (the Altona mint had closed in 1863). Circulation came from Hanover and Prussia.<br>
          <b>Status:</b> trade coin without compulsory acceptance in all treaty states — not legal tender in the strict sense; state treasuries could set temporary tariffs (max. six months).<br>
          <b>Relation to the Scandinavian Krone:</b> despite the shared name, the German <i>Vereinskrone</i> of 1857 and the Scandinavian <i>Krone</i> of the Mint Union of 1873 (Sweden, Norway, Denmark) are <em>distinct Münzfüße</em> on different standards.
        uk: |
          <b>Учасники договору 1857:</b> Австрійська імперія, Князівство Ліхтенштейн, усі держави німецького Цольферайну.<br>
          <b>Головні мінт-штати:</b> Ганновер (≈ 784 000 шт.), Австрія (≈ 499 000), Пруссія (≈ 278 000); Саксонія (≈ 57 000), Брауншвайг (≈ 45 000), Баварія (≈ 4 000).<br>
          <b>Ліхтенштейн:</b> учасник договору без власних емісій.<br>
          <b>Шлезвіг-Гольштейн:</b> приєднується до німецького простору з Wiener Frieden 30 жовтня 1864 і тим самим до Münzverein; власних SH-емісій немає (Альтонський двір закрито 1863). Обіг — з Ганновера й Пруссії.<br>
          <b>Статус:</b> торгова монета без обов'язку прийняття в усіх державах-учасницях — у вузькому сенсі не законний платіжний засіб; державні каси могли встановлювати тимчасові тарифи (макс. 6 місяців).<br>
          <b>Відношення до скандинавської Krone:</b> попри однакову назву, німецька <i>Vereinskrone</i> 1857 і скандинавська <i>Krone</i> монетної унії 1873 (Швеція, Норвегія, Данія) — <em>різні Müntzfüße</em> на різних стандартах.

