        en: "II. Holstein everyday currency (Schleswig-Holst. Courant — continued)"
        uk: "II. Гольштейнська повсякденна валюта (Schleswig-Holst. Courant — продовжено)"
    - kind: rows
      items:
        - key: {de: "1 Thaler Specie"}
          value: {de: "<b>25,28173 g</b> fein · 875 ‰ · 9¼-Thalerfuß"}
        - key: {de: "1 Reichsthaler Sch.-H. Courant"}
          value: {de: "<b>20,22538 g</b> fein = 4/5 Thaler Specie = 3 Marck Courant = 48 Schilling S.-H. Courant"}
        - key: {de: "1 Marck S.-H. Courant"}
          value: {de: "<b>6,74179 g</b> fein = 16 Schilling S.-H. Courant · Beleg: Kassenanweisung Kiel 1851 ✓"}
        - key: {de: "1 Schilling S.-H. Courant"}
          value: {de: "<b>0,42136 g</b> fein · 12 Pfennig"}
    - kind: prose
      label: {de: "Holsteinische Rechnungsfraktionen", en: "Holstein accounting fractions", uk: "Гольштейнські розрахункові фракції"}
      content:
        de: |
          <b>1 Thaler Specie</b> = 1¼ Reichsthaler Sch.-H. Courant = 60 Schilling S.-H. Courant = <b>25,28173 g</b><br>
          <b>1 Reichsthaler Sch.-H. Courant</b> = 3 Marck S.-H. Courant = 48 Schilling S.-H. Courant = <b>20,22538 g</b><br>
          <b>1 Marck S.-H. Courant</b> = 16 Schilling S.-H. Courant = <b>6,74179 g</b><br>
          <em>Kettenprüfung: 3 × 16 × 0,42136 / 0,8 = 25,28173 g ✓</em>
    - kind: phase_header
      title:
        de: "III. Brücke zwischen beiden Systemen"
        en: "III. Bridge between the two systems"
        uk: "III. Місток між системами"
    - kind: prose
      label: {de: "Brücke", en: "Bridge", uk: "Місток"}
      content:
        de: |
          <b>1 Rigsbankdaler</b> = <b>30 Schilling S.-H. Courant</b> = 1⅞ Marck S.-H. Courant<br>
          <b>2 Rigsbankdaler</b> = 1 Thaler Specie = 60 Schilling S.-H. Courant<br>
          <b>1 Reichsthaler Sch.-H. Courant</b> = 8/5 (1,6) Rigsbankdaler (= 48/30 Schilling)<br>
          <b>1 Rigsbankdaler</b> = 5/8 (0,625) Reichsthaler Sch.-H. Courant<br>
          <em>Der Rigsbankdaler teilte sich nicht ganzzahlig in Marck S.-H. Courant (30 ÷ 16 = 1,875) — daher blieb die holsteinische Alltagsrechnung in der alten Courant-Währung.</em><br>
          <b>ab 1854:</b> Rigsbankdaler → Thaler Reichsmünze (Rigsdaler R.M.); Rigsbankskilling → Schilling Reichsmünze (Wert unverändert)
  territories:
    label: {de: "Territorien", en: "Territories", uk: "Території"}
    content:
      de: |
        <b>Herzogtum Holstein, Herzogtum Schleswig:</b> 1813–1864.<br>
        <b>Gleichzeitig in Dänemark selbst:</b> Rigsbankdaler als gesamtdänische Einheit (1813–1875).<br>
        <b>Münzstätten:</b> Altona (bis 1863); Kopenhagen.<br>
        <b>1864:</b> Ende mit preuß./österr. Annexion; Übergang zum Vereinsthalerfuß.

