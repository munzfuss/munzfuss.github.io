# 1b. Burgundischer / Zinnaischer Müntzfuß · 10½-Thalerfuß
# ------------------------------------------------------------------
- id: burgundischer_zinnaisch
  metal: silver
  years_label:
    de: "ca. 1600 → 1797"
    en: "ca. 1600 → 1797"
    uk: "бл. 1600 → 1797"
  title:
    de: "Burgundischer Fuß · Zinnaischer Müntzfuß · 10½-Thalerfuß"
    en: "Burgundian standard · Zinna standard · 10½-Thaler standard"
    uk: "Бургундська стопа · Циннська стопа · 10½-талерна стопа"
  subtitle:
    de: "Albertustaler-Tradition (Spanische Niederlande) · Müntzreceß von Zinna 27. Aug. 1667 (Inlandsreform) · Cöllnische Marck = 233,856 g Feinsilber"
    en: "Albertustaler tradition (Spanish Netherlands) · Müntzreceß of Zinna 27 Aug. 1667 (domestic reform) · Cöllnische Marck = 233.856 g fine silver"
    uk: "Традиція альбертусталера (Іспанські Нідерланди) · Циннський монетний рецес 27 серпня 1667 (Кляштер Цинна, внутрішня реформа) · Кельнська марка = 233,856 г чистого срібла"
  body:
    - kind: phase_header
      title:
        de: "Zwei Verwendungen desselben Fußes"
        en: "Two uses of the same standard"
        uk: "Два застосування тієї самої стопи"
    - kind: phase_summary
      content:
        de: "<b>Zinnaischer Fuß (Inlands-Kleingeld, 1667–1690):</b> Für Teilstücke des Reichsthalers (Groschen, Schillinge) — ganze Thaler blieben im 9-Fuß. Thaler Courant (22,27200 g) war Rechnungsmünze, nur selten geprägt. 1690 durch den Leipziger Fuß (12-Fuß) abgelöst."
    - kind: phase_summary
      content:
        de: "<b>Burgundischer Wechselthaler-Fuß (internationale Handelsmünze):</b> Tradition des Albertustalers/Patagons. Derselbe Feingehalt (22,27200 g), aber höheres Korn (861–875 ‰ statt 750 ‰). Feingewicht als Handelsstandard im Nord- und Ostseeraum."
    - kind: rows
      items:
        - key: {de: "Feingewicht Thaler"}
          value: {de: "<b>22,27200 g</b> (= 233,856 / 10,5)"}
        - key: {de: "Raugewicht Zinnaisch"}
          value: {de: "ca. 29,696 g · 750 ‰ (= 12 Loth)"}
        - key: {de: "Raugewicht Burgundisch"}
          value: {de: "ca. 25,85–25,92 g · 861–875 ‰ (14 Loth)"}
        - key: {de: "Verhältniß zu Thaler Specie"}
          value: {de: "22,27200 / 25,984 = 6/7 — oder: 1 Thaler Specie = 7/6 = 1 1/6 Thaler Courant (10½-Fuß)"}
        - key: {de: "Preuß. Thaler Banco 1765"}
          value: {de: "<b>22,27200 g</b> fein · 875 ‰ (14 Loth) · 25,45371 g rau · Burgundischer Fuß"}
        - key: {de: "Thaler Banco Münzstätte"}
          value: {de: "Berlin (A) · geprägt 1766 mit Jz. 1765 · 100.000 Stück"}
        - key: {de: "Thaler Banco Geschichte"}
          value: {de: "Einlagemünze für die Königl. Giro- und Lehn-Banco Berlin · nie ausgegeben · 1790 eingeschmolzen"}
    - kind: prose
      label:
        de: "Rechnungsfraktionen (Zinnaischer Fuß)"
        en: "Accounting fractions (Zinna standard)"
        uk: "Розрахункові фракції (Циннська стопа)"
      content:
        de: |
          <b>1 Thaler Specie</b> (9-Fuß) = 28 Gute Groschen Courant = 105 Kreutzer = 336 Pfennig Courant<br>
          <b>1 Thaler Courant</b> (10½-Fuß, Rechnung) = 24 Gute Groschen Courant = 90 Kreutzer = 288 Pfennig Courant<br>
          <b>1 Guter Groschen Courant</b> = 12 Pfennig Courant<br>
          <b>1 Thaler Specie</b> = 25,984 / 22,27200 = 7/6 = 1 1/6 Thaler Courant (glatter Bruch ✓)<br>
          <b>1 Preuß. Thaler Banco</b> (Einlagemünze) = 1⅓ Thaler Courant (14-Thaler-Fuß) = 6/7 Reichsthaler Species (9-Fuß)<br>
          <em>Zinnaisch (750 ‰) und Burgundisch (861–875 ‰) haben dasselbe Feingewicht aber verschiedene Feinheit — beide gelten im Norddeutschen Handel als Wechselthaler</em>
  territories:
    label: {de: "Territorien", en: "Territories", uk: "Території"}
    content:
      de: |
        <b>Zinnaischer Fuß (Kleingeld, 1667–1690):</b> Kurbrandenburg, Kursachsen, Braunschweig-Lüneburg.<br>
        <b>Burgundischer Wechselthaler-Fuß (Handelsmünze):</b> Spanische/Österreichische Niederlande (Albertustaler ab 1612 – ca. 1800); Vereinigte Niederlande (Zilveren Dukaat, 1659–1806); Kursachsen (Wechselthaler 1670–71; Bankotaler 1702); Brandenburg-Preußen (Albertustaler 1695–96, 1767–68, 1797; Thaler Banco 1765); Schleswig-Holstein-Gottorp (1753); Kurland (1780); Dänemark (1781, 1784); Köln (1699–1702, 1726).<br>
        <b>Als Handelsstandard:</b> Gesamter Norddeutscher und Ostseehandel (Hamburg, Lübeck, Amsterdam, Kopenhagen, Stockholm).

# ------------------------------------------------------------------
# 2. Leipziger Fuß · 12-Thalerfuß
# ------------------------------------------------------------------
- id: leipziger_fuss
  metal: silver
  years_label:
    de: "1690 → ca. 1760"
    en: "1690 → ca. 1760"
    uk: "1690 → бл. 1760"
  title:
    de: "Leipziger Fuß · 12-Thalerfuß · 18-Guldenfuß · Torgauer Münzfuß"
    en: "Leipzig standard · 12-Thaler / 18-Gulden · Torgauer Münzfuß"
    uk: "Лейпцизька стопа · 12-талерна / 18-гульденна · Торгауська стопа"
  subtitle:
    de: "Müntzreceß Leipzig 16. Jan. 1690 · 1738 als Reichsmünzfuß durch Kaiserliches Commissionsedikt erhoben · Cöllnische Marck = 233,856 g Feinsilber · biß 1871 als Rechnungsmünze fortgeführt"
    en: "Müntzreceß Leipzig 16 Jan. 1690 · raised to imperial standard by commission edict 1738 · Cöllnische Marck = 233.856 g fine silver · retained as unit of account until 1871"
    uk: "Лейпцизька конвенція 16 січня 1690 · 1738 піднесено до імперського стандарту імператорським едиктом · Кельнська марка = 233,856 г чистого срібла · як розрахункова одиниця збережено до 1871"
  body:
    - kind: rows
      items:
        - key: {de: "Feingewicht ⅔-Thaler"}
          value: {de: "<b>12,99200 g</b> (= 233,856 / 18) · 17,32267 g rau · 750 ‰"}
        - key: {de: "Feingewicht ⅓-Thaler"}
          value: {de: "<b>6,49600 g</b> (= 233,856 / 36)"}
        - key: {de: "Thaler Courant (Rechnung)"}
          value: {de: "<b>19,48800 g</b> (= 233,856 / 12) — nicht geprägt"}
        - key: {de: "Torgauer Münzfuß (Kleingeld)"}
          value: {de: "Scheidemünzen nach leichterem Fuß: 1- und 2-Groschen-Stücke im <b>12½-Thalerfuß</b> (= 18,70848 g je Thaler); Pfennige im <b>13-Thalerfuß</b> (= 17,98892 g) · <em>Torgauer Münzfuß = auch als Synonym für den Leipziger Fuß insgesamt gebräuchlich</em>"}
    - kind: prose
      label:
        de: "Rechnungsfraktionen"
        en: "Accounting fractions"
        uk: "Розрахункові фракції"
      content:
        de: |
          <b>1 Thaler Specie</b> = 1⅓ Thaler Courant = 32 Gute Groschen Courant = 384 Pfennig Courant<br>
          <b>1 Thaler Courant</b> (Rechnungseinheit) = ¾ Thaler Specie = 24 Gute Groschen Courant = 288 Pfennig Courant<br>
          <b>1× ⅔-Thaler</b> (Gulden) = ½ Thaler Specie = ⅔ Thaler Courant = 16 Gute Groschen Courant = 192 Pfennig Courant<br>
          <b>1× ⅓-Thaler</b> = ¼ Thaler Specie = ⅓ Thaler Courant = 8 Gute Groschen Courant = 96 Pfennig Courant<br>
          <b>2× ⅔-Thaler</b> = 1 Thaler Specie (2 × 12,992 = 25,98400 g ✓)<br>
          <b>1 Guter Groschen Courant</b> = 12 Pfennig Courant = 0,81200 g fein<br>
          <em>Ggr. Courant (0,81200 g) ≠ Ggr. Species (1,08267 g) — gleicher Name, verschiedener Silbergehalt</em>
  territories:
    label: {de: "Territorien", en: "Territories", uk: "Території"}
    content:
      de: |
        <b>Vertragsgründer (1690):</b> Kurbrandenburg, Kursachsen, Braunschweig-Lüneburg.<br>
        <b>Rasch beigetreten:</b> Nahezu alle nord- und mitteldeutschen Stände; Hansestädte (als Umlaufmünze).<br>
        <b>Mecklenburg-Schwerin:</b> 1738 als Landeswährung erklärt; ⅔-Thaler geprägt biß 1829.<br>
        <b>Hannover:</b> Prägte ⅔-Thaler weiter auch nach Annahme des Conventions-Fußes.<br>
        <b>1738:</b> Durch Kaiserliches Commissionsedikt offiziell zum Reichsmünzfuß erhoben.<br>
        <b>NICHT:</b> Süddeutschland (Gulden-Länder); Österreich (eigener Fuß).

