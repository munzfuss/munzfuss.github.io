          - key: {de: "Phase II — Raugewicht (Frederik V., ab 1757)", en: "Phase II — rough weight (Frederik V, from 1757)", uk: "Фаза II — повна вага (Frederik V, з 1757)"}
            value:
              de: "<b>3,118 g</b> (= 233,856 / 75) · 75 Stück je rauer Cölln. Marck"
              en: "<b>3.118 g</b> (= 233.856 / 75) · 75 pieces per rough Cölln. Marck"
              uk: "<b>3,118 г</b> (= 233,856 / 75) · 75 штук з повної Кельнської марки"
          - key: {de: "Phase II — Feingewicht", en: "Phase II — fine weight", uk: "Фаза II — чиста вага"}
            value:
              de: "<b>2,72832 g</b> Feingold (= 3,118 × 21/24)<sup><a href=\"#ref36\">[36]</a></sup>"
              en: "<b>2.72832 g</b> fine gold (= 3.118 × 21/24)<sup><a href=\"#ref36\">[36]</a></sup>"
              uk: "<b>2,72832 г</b> чистого золота (= 3,118 × 21/24)<sup><a href=\"#ref36\">[36]</a></sup>"
          - key: {de: "Phase I — Raugewicht (Frederik IV., 1714–1717)", en: "Phase I — rough weight (Frederik IV, 1714–1717)", uk: "Фаза I — повна вага (Frederik IV, 1714–1717)"}
            value:
              de: "≈ 2,87 g · 81½ Stück je Marck · Feingewicht <b>2,511 g</b> · 1727 auf 11 Mark gesenkt; 1757 zur Einschmelzung eingezogen<sup><a href=\"#ref36\">[36]</a></sup>"
              en: "≈ 2.87 g · 81½ pieces per Mark · fine weight <b>2.511 g</b> · reduced to 11 Mark in 1727; called in for melting in 1757<sup><a href=\"#ref36\">[36]</a></sup>"
              uk: "≈ 2,87 г · 81½ штук з марки · чиста вага <b>2,511 г</b> · 1727 знижено до 11 Mark; 1757 кличуть на переплав<sup><a href=\"#ref36\">[36]</a></sup>"
          - key: {de: "Tarif", en: Tariff, uk: Тариф}
            value:
              de: "<b>1 Kurantdukat = 12 Mark Dansk Kurant = 2 Rigsdaler Courant = 192 Skilling Danske</b> (biß 1813)<sup><a href=\"#ref39\">[39]</a></sup>"
              en: "<b>1 Kurantdukat = 12 Mark Dansk Kurant = 2 Rigsdaler Courant = 192 Skilling Danske</b> (until 1813)<sup><a href=\"#ref39\">[39]</a></sup>"
              uk: "<b>1 Kurantdukat = 12 Mark Dansk Kurant = 2 Rigsdaler Courant = 192 Skilling Danske</b> (до 1813)<sup><a href=\"#ref39\">[39]</a></sup>"
          - key: {de: "Subnominale", en: Sub-denominations, uk: Субномінали}
            value:
              de: "½ Kurantdukat (Frederik IV. 1715: 598 Stück; Frederik V.: einzelne Belege) · 1 Kurantdukat (Hauptnominal) · 2 Kurantdukat (Doppel-) <em>nur als Probemønt belegt — kein Umlauf</em><sup><a href=\"#ref36\">[36]</a></sup>"
              en: "½ Kurantdukat (Frederik IV 1715: 598 pieces; Frederik V: individual specimens) · 1 Kurantdukat (main denomination) · 2 Kurantdukat (Doppel-) <em>documented only as a Probemønt pattern — never circulated</em><sup><a href=\"#ref36\">[36]</a></sup>"
              uk: "½ Kurantdukat (Frederik IV 1715: 598 шт.; Frederik V: поодинокі зразки) · 1 Kurantdukat (головний номінал) · 2 Kurantdukat (Doppel-) <em>задокументовано лише як Probemønt-зразок — в обіг не виходив</em><sup><a href=\"#ref36\">[36]</a></sup>"
      - kind: phase_header
        title:
          de: "Periodisierung des Kurantdukaten (1714 → 1796)"
          en: "Periodisation of the Kurantdukat (1714 → 1796)"
          uk: "Періодизація Kurantdukat (1714 → 1796)"
      - kind: phase_summary
        content:
          de: '<b>1714 — 1717 · Phase I: Frederik IV. (Großer Nordischer Krieg):</b> Erstprägung des Kurantdukaten als Kriegsfinanzierungsmaßnahme; bis Ende 1717 ca. 150 000 Stück (Finanzkollegium 1791) bzw. 27 071 ganze + 598 halbe (Spezialschätzung). Standard 81½ Stück / rauer Cölln. Marck, 21 Karat (.875), Feingewicht 2,511 g. Tarif 12 Mark Kurant = 2 Rigsdaler Courant.<sup><a href="#ref36">[36]</a></sup>'
          en: '<b>1714 — 1717 · Phase I: Frederik IV (Great Northern War):</b> first issue of the Kurantdukat as a war-finance measure; by end-1717 about 150,000 pieces (Finanzkollegium 1791) or 27,071 whole + 598 half (specialist estimate). Standard 81½ pieces per rough Cologne Mark, 21 carats (.875), fine weight 2.511 g. Tariff 12 Mark Kurant = 2 Rigsdaler Courant.<sup><a href="#ref36">[36]</a></sup>'
          uk: '<b>1714 — 1717 · Фаза I: Frederik IV (Велика Північна війна):</b> перша емісія Kurantdukat як засіб фінансування війни; до кінця 1717 р. близько 150 000 шт. (Finanzkollegium 1791) або 27 071 цілих + 598 половинних (спеціалізована оцінка). Стандарт 81½ штук з повної Кельнської марки, 21 карат (.875), чиста вага 2,511 г. Тариф 12 Mark Kurant = 2 Rigsdaler Courant.<sup><a href="#ref36">[36]</a></sup>'
      - kind: phase_summary
        content:
          de: '<b>1727 — 1757 · «Reducerede Kurant-Dukater»:</b> Forordning vom <b>9. Juli 1727</b> senkt den Tarif der Frederik-IV.-Stücke von 12 auf 11 Mark Kurant — eine Tarif-Devaluation ohne metrische Änderung. Die Münze bleibt unter dem Beinamen «<i>reducerede Kurant-Dukater</i>» in Umlauf, biß sie durch Forordning vom <b>4. Juli 1757</b> zur Einschmelzung eingezogen wird; das eingeschmolzene Gold dient als Rohstoff für die unmittelbar folgende Frederik-V.-Reform.<sup><a href="#ref36">[36]</a></sup>'
          en: '<b>1727 — 1757 · «Reducerede Kurant-Dukater»:</b> the Forordning of <b>9 July 1727</b> reduces the Frederik IV tariff from 12 to 11 Mark Kurant — a tariff devaluation with no metric change. The coin continues to circulate under the by-name «<i>reducerede Kurant-Dukater</i>» until it is called in for melting by the Forordning of <b>4 July 1757</b>; the resulting gold supplies the raw material for the immediately following Frederik V reform.<sup><a href="#ref36">[36]</a></sup>'
          uk: '<b>1727 — 1757 · «Reducerede Kurant-Dukater»:</b> Forordning від <b>9 липня 1727</b> знижує тариф Frederik IV з 12 на 11 Mark Kurant — тариф-девальвація без метричної зміни. Монета залишається в обігу під назвою «<i>reducerede Kurant-Dukater</i>», доки Forordning від <b>4 липня 1757</b> не кличе її на переплав; отримане золото становить сировину для негайної реформи Frederik V.<sup><a href="#ref36">[36]</a></sup>'
      - kind: phase_summary
        content:
          de: '<b>1757 — 1765 · Phase II: Frederik-V.-Reform und Massenprägung:</b> im <b>Juni 1757</b> Genehmigung Frederiks V. zur Neuprägung im verbesserten Standard <b>75 Stück / Marck, 21 Karat, 3,118 g rau, 2,72832 g fein</b> — der ursprüngliche 12-Mark-Tarif wird wiederhergestellt. 1757–1765 prägen Kopenhagen und (ab 1771) Altona insgesamt <b>≈ 3 030 742 Stück</b><sup><a href="#ref36">[36]</a></sup> (alternative Nathanson-Zählung 3 188 851, davon 2 Mio. allein 1761 + 1762) — die größte Goldmünzproduktion in der dänischen Geschichte, ≈ 8,3 Tonnen Feingold.'
          en: '<b>1757 — 1765 · Phase II: Frederik V reform and mass coinage:</b> in <b>June 1757</b> Frederik V grants permission for new strikings on the improved standard <b>75 pieces per Mark, 21 carats, 3.118 g rough, 2.72832 g fine</b> — restoring the original 12-Mark tariff. From 1757 to 1765 Copenhagen and (from 1771) Altona strike <b>≈ 3,030,742 pieces</b> in total<sup><a href="#ref36">[36]</a></sup> (Nathanson''s alternative count 3,188,851, of which 2 million in 1761 + 1762 alone) — the largest gold-coin production in Danish history, ≈ 8.3 t fine gold.'
          uk: '<b>1757 — 1765 · Фаза II: реформа Frederik V і масова прягеа:</b> у <b>червні 1757</b> Frederik V надає дозвіл на нову прягеу за поліпшеним стандартом <b>75 штук з марки, 21 карат, 3,118 г повної, 2,72832 г чистого</b> — оригінальний 12-Mark-тариф відновлено. 1757–1765 рр. Копенгаген і (з 1771) Альтона карбують загалом <b>≈ 3 030 742 штук</b><sup><a href="#ref36">[36]</a></sup> (альтернативний підрахунок Nathanson — 3 188 851, з яких 2 млн лише 1761 + 1762) — найбільше виробництво золотих монет в історії Данії, ≈ 8,3 т чистого золота.'
      - kind: phase_summary
        content:
          de: '<b>1771 · Eröffnung Altonaer Münze und Schleswig-Holstein-Versorgung:</b> am <b>23. August 1771</b> meldet Münzdirektor Knoph die Fertigstellung der Altonaer Münze; Münzmeister Caspar Henrich Lyng, Guardein Diedrich Christian Liebst.<sup><a href="#ref37">[37]</a></sup> Die Münze dient explizit der Zirkulation in den Herzogtümern Schleswig-Holstein, wo «<i>hamburgische und lübeckische Gelder dominierten</i>». Christian-VII.-Geburtstagsstrich am <b>27. Januar 1771</b> in Kopenhagen — 131 Exemplare als dynastisches Memorial.<sup><a href="#ref36">[36]</a></sup>'
          en: '<b>1771 · Opening of the Altona mint and supply of Schleswig-Holstein:</b> on <b>23 August 1771</b> mint director Knoph reports the Altona mint complete; mintmaster Caspar Henrich Lyng, guardein Diedrich Christian Liebst.<sup><a href="#ref37">[37]</a></sup> The mint is explicitly intended for circulation in the duchies of Schleswig-Holstein, where «<i>Hamburg and Lübeck currencies dominated</i>». Christian-VII-birthday strike on <b>27 January 1771</b> in Copenhagen — 131 pieces as a dynastic memorial.<sup><a href="#ref36">[36]</a></sup>'
          uk: '<b>1771 · Відкриття Альтонського монетного двору і забезпечення Шлезвіг-Гольштейну:</b> <b>23 серпня 1771</b> монетний директор Knoph повідомляє про завершення Альтонського двору; монетмейстер Caspar Henrich Lyng, guardein Diedrich Christian Liebst.<sup><a href="#ref37">[37]</a></sup> Двір призначений саме для обігу в герцогствах Шлезвіг-Гольштейн, де «<i>домінували гамбурзькі й любецькі гроші</i>». Меморіальний strike Christian VII <b>27 січня 1771</b> у Копенгагені — 131 шт. як династичний меморіал.<sup><a href="#ref36">[36]</a></sup>'
      - kind: phase_summary
        content:
          de: '<b>1781 — 1796 · Christian-VII.-Hauptphase und Plakat 1782:</b> mit dem <b>Plakat vom 2. Dezember 1782</b> erlaubt Christian VII. <em>jedem</em> die Goldablieferung zur Kurantdukat-Prägung — Wortlaut: «<i>guld udmønte til kurantdukater med 75 stykker pr. mark brutto af 21 karat</i>»<sup><a href="#ref38">[38]</a></sup>; Brandon-Lizenz 12. Juni 1783 (100 000 R. + 150 000 R.).<sup><a href="#ref37">[37]</a></sup> Insgesamt <b>≈ 237 000 Stück</b> in Altona + Kopenhagen 1781–1796 (KM-641.2 1783 Mzm. CHL; KM-641.4 1785 Mzm. DCL = Didrik Christian Lange).<sup><a href="#ref36">[36]</a></sup> <b>Plakat-Widerruf 1795</b>; <b>letzte Prägung 1796</b> in Altona — 30 703 Stück mit rückdatiertem 1785-Stempel.'
          en: '<b>1781 — 1796 · Christian VII main phase and the 1782 Plakat:</b> with the <b>Plakat of 2 December 1782</b> Christian VII permits <em>anyone</em> to deliver gold for Kurantdukat coinage — verbatim: «<i>guld udmønte til kurantdukater med 75 stykker pr. mark brutto af 21 karat</i>»<sup><a href="#ref38">[38]</a></sup>; the Brandon licence of 12 June 1783 (100,000 R. + 150,000 R.).<sup><a href="#ref37">[37]</a></sup> In total <b>≈ 237,000 pieces</b> in Altona + Copenhagen 1781–1796 (KM-641.2 of 1783 mintmaster CHL; KM-641.4 of 1785 mintmaster DCL = Didrik Christian Lange).<sup><a href="#ref36">[36]</a></sup> <b>The plakat is revoked in 1795</b>; <b>last issue 1796</b> in Altona — 30,703 pieces with back-dated 1785 dies.'
          uk: '<b>1781 — 1796 · Головна фаза Christian VII і Plakat 1782:</b> з <b>Plakat від 2 грудня 1782</b> Christian VII дозволяє <em>кожному</em> здавати золото на прягеу Kurantdukat — verbatim: «<i>guld udmønte til kurantdukater med 75 stykker pr. mark brutto af 21 karat</i>»<sup><a href="#ref38">[38]</a></sup>; ліцензія Brandon від 12 червня 1783 (100 000 R. + 150 000 R.).<sup><a href="#ref37">[37]</a></sup> Загалом <b>≈ 237 000 шт.</b> в Альтоні + Копенгагені 1781–1796 (KM-641.2 1783 mzm. CHL; KM-641.4 1785 mzm. DCL = Didrik Christian Lange).<sup><a href="#ref36">[36]</a></sup> <b>Plakat скасовано 1795</b>; <b>остання прягеа 1796</b> в Альтоні — 30 703 шт. зі зворотньо-датованими штемпелями 1785.'
      - kind: phase_summary
        content:
          de: '<b>Demonetisierung — graduell und ohne formalen Akt:</b> nach 1796 keine Neuprägungen. Der Statsbankerot von <b>5. Januar 1813</b> reformiert nur die Silber-Courantlinie (Kurantdaler → Rigsbankdaler im Verhältnis 6 : 1)<sup><a href="#ref40">[40]</a></sup>; Goldmünzen sind in den §§1–16 der Forordning nicht erfaßt — der Kurantdukat behält rechtlich Zahlungsmittelstatus zum 12-Mark-Tarif. <b>1873 Skandinavische Münzunion</b> ersetzt Speciedaler / Kurantdukat durch die Krone — faktischer Endpunkt der Tariflinie.<sup><a href="#ref33">[33]</a></sup>'
          en: '<b>Demonetisation — gradual and with no formal act:</b> after 1796 there are no new strikings. The Statsbankerot of <b>5 January 1813</b> reforms only the silver Courant line (Kurantdaler → Rigsbankdaler at 6 : 1)<sup><a href="#ref40">[40]</a></sup>; gold coins are not covered by §§1–16 of the Forordning — the Kurantdukat retains legal-tender status at the 12-Mark tariff. The <b>1873 Scandinavian Monetary Union</b> replaces Speciedaler / Kurantdukat with the Krone — the factual endpoint of the tariff line.<sup><a href="#ref33">[33]</a></sup>'
          uk: '<b>Демонетизація — поступова, без формального акту:</b> після 1796 нових емісій немає. Statsbankerot <b>5 січня 1813</b> реформує лише срібну Courant-лінію (Kurantdaler → Rigsbankdaler у пропорції 6 : 1)<sup><a href="#ref40">[40]</a></sup>; золоті монети §§1–16 Forordning не охоплюють — Kurantdukat юридично зберігає статус законного платіжного засобу за 12-Mark-тарифом. <b>1873 Скандинавська монетна унія</b> замінює Speciedaler / Kurantdukat на Krone — фактичний кінець тарифної лінії.<sup><a href="#ref33">[33]</a></sup>'
    territories:
      label:
        de: "Territorien"
        en: "Territories"
        uk: "Території"
      content:
        de: |
          <b>Königreich Dänemark (Kopenhagen):</b> Hauptmünzstätte über die ganze Geltungszeit; Massenprägung 1757–1765 unter Frederik V.<sup><a href="#ref36">[36]</a></sup><br>
          <b>Herzogtümer Schleswig-Holstein (Altona):</b> Münzstätte Altona seit 23. August 1771<sup><a href="#ref37">[37]</a></sup>; KM-641.2 1783 (Mzm. CHL) und KM-641.4 1785 (Mzm. DCL) als belegte Hauptemissionen.<br>
          <b>Status:</b> in Dänemark per Forordning gesetzliches Zahlungsmittel zum festen 12-Mark-Tarif; in Schleswig-Holstein quasi-offizielle Tariftragung über die Altonaer Prägung. <em>In keinen anderen deutschen Landen</em> hat der Kurantdukat Zahlungsmittelstatus erlangt — der norddeutsche Pendant ist der Friedrich-d'or / Pistolen-Fuß (siehe separate Karte).<br>
          <b>Quellenkritisch:</b> Diese Karte stützt sich auf danskmoent.dk (Axel Ernst, Wilcke III, c7mord-Übersicht), CoinVarieties und lex.dk-Forordning-Belege. Wilcke II (1929) <i>Kurantmønten 1726–1788</i> als Primärquelle, Schou (1926) und Sieg (2018) als Standardkataloge sind im aktuellen Stand nicht direkt eingesehen.
        en: |
          <b>Kingdom of Denmark (Copenhagen):</b> the principal mint throughout; mass coinage 1757–1765 under Frederik V.<sup><a href="#ref36">[36]</a></sup><br>
          <b>Duchies of Schleswig-Holstein (Altona):</b> the Altona mint operated from 23 August 1771<sup><a href="#ref37">[37]</a></sup>; KM-641.2 of 1783 (mintmaster CHL) and KM-641.4 of 1785 (mintmaster DCL) are the documented main issues.<br>
          <b>Status:</b> in Denmark legal tender by Forordning at the fixed 12-Mark tariff; in Schleswig-Holstein quasi-official as the territorial gold currency through the Altona issues. <em>In no other German lands</em> did the Kurantdukat acquire legal-tender status — the North-German counterpart is the Friedrich d'or / Pistolen-Fuß (see separate card).<br>
          <b>On the sources:</b> this card draws on danskmoent.dk (Axel Ernst, Wilcke III, c7mord survey), CoinVarieties and the lex.dk Forordning records. Wilcke II (1929) <i>Kurantmønten 1726–1788</i> as a primary source, and the standard catalogues Schou (1926) and Sieg (2018), have not been consulted directly in the present state.
        uk: |
          <b>Королівство Данія (Копенгаген):</b> головний монетний двір протягом усього періоду; масова прягеа 1757–1765 за Frederik V.<sup><a href="#ref36">[36]</a></sup><br>
          <b>Герцогства Шлезвіг-Гольштейн (Альтона):</b> Альтонський монетний двір діє з 23 серпня 1771<sup><a href="#ref37">[37]</a></sup>; KM-641.2 1783 (mzm. CHL) і KM-641.4 1785 (mzm. DCL) — задокументовані головні емісії.<br>
          <b>Статус:</b> у Данії — законний платіжний засіб за Forordning з фіксованим 12-Mark-тарифом; у Шлезвіг-Гольштейні квазі-офіційно як територіальна золота валюта через Альтонські емісії. <em>У жодних інших німецьких землях</em> Kurantdukat статусу законного платіжного засобу не здобув — північно-німецький еквівалент — Friedrich d'or / Pistolen-Fuß (див. окрему картку).<br>
          <b>Про джерела:</b> картка спирається на danskmoent.dk (Axel Ernst, Wilcke III, огляд c7mord), CoinVarieties і Forordning-записи lex.dk. Wilcke II (1929) <i>Kurantmønten 1726–1788</i> як першоджерело, та стандартні каталоги Schou (1926) і Sieg (2018) у поточному стані безпосередньо не консультовано.

# ------------------------------------------------------------------
# 1ab. Pistolen-Fuß · 5-Thaler-Fuß · d'Or-Familie (1737, Gold)
# ------------------------------------------------------------------
  - id: pistolenfuss
    metal: gold
    years_label:
      de: "1737 → 1873"
      en: "1737 → 1873"
      uk: "1737 → 1873"
    name: Pistolen-Fuß
    historical_name: 5-Thaler-Fuß · d'Or-Familie
    subtitle:
      de: 'Vorbild: spanische Doblón (1537) und französische Louis d''or (1640) · preußischer Wilhelm d''or 1737 / Friedrich d''or 1741<sup><a href="#ref32">[32]</a></sup> · dänischer Christian d''or ab 1771<sup><a href="#ref33">[33]</a></sup> · ≈ 6 g Feingold bei 130/144 Probe (≈ 903 ‰) · 5-Thaler-Tarif (Norddt.) bzw. 5-Speciedaler-Tarif (Dänemark) · Handelsmünze ohne Reichs-Müntzfuß-Status<sup><a href="#ref34">[34]</a></sup>'
      en: 'Modelled on the Spanish doblón (1537) and the French Louis d''or (1640) · Prussian Wilhelm d''or 1737 / Friedrich d''or 1741<sup><a href="#ref32">[32]</a></sup> · Danish Christian d''or from 1771<sup><a href="#ref33">[33]</a></sup> · ≈ 6 g fine gold at 130/144 fineness (≈ 903 ‰) · 5-thaler tariff (North-German) or 5-Speciedaler tariff (Denmark) · trade coin, never an imperial Münzfuß<sup><a href="#ref34">[34]</a></sup>'
      uk: 'За зразком іспанської Doblón (1537) і французького Louis d''or (1640) · прусський Wilhelm d''or 1737 / Friedrich d''or 1741<sup><a href="#ref32">[32]</a></sup> · данський Christian d''or з 1771<sup><a href="#ref33">[33]</a></sup> · ≈ 6 г чистого золота за пробою 130/144 (≈ 903 ‰) · тариф 5 талерів (Пн. Німеччина) або 5 Speciedaler (Данія) · торгова монета без статусу імперської Müntzfuß<sup><a href="#ref34">[34]</a></sup>'
    body:
      - kind: rows
        items:
          - key: {de: "Feinheit", en: Fineness, uk: Проба}
            value:
              de: "130/144 ≈ <b>903 ‰</b> (= 21¾ Karat) — Initialstandard 1741; ab 1770 leichte Reduktion auf 129/144 ≈ 896 ‰<sup><a href=\"#ref32\">[32]</a></sup>"
              en: "130/144 ≈ <b>903 ‰</b> (= 21¾ carats) — initial 1741 standard; from 1770 a slight reduction to 129/144 ≈ 896 ‰<sup><a href=\"#ref32\">[32]</a></sup>"
              uk: "130/144 ≈ <b>903 ‰</b> (= 21¾ карата) — початковий стандарт 1741; з 1770 невелика редукція до 129/144 ≈ 896 ‰<sup><a href=\"#ref32\">[32]</a></sup>"
          - key: {de: "Raugewicht", en: Rough weight, uk: Повна вага}
            value:
              de: "<b>≈ 6,68 g</b> (= 233,856 / 35) · 35 Pistolen aus der rauen Cöllnischen Marck Goldlegierung"
              en: "<b>≈ 6.68 g</b> (= 233.856 / 35) · 35 pistoles per rough Cöllnische Marck of gold alloy"
              uk: "<b>≈ 6,68 г</b> (= 233,856 / 35) · 35 пістолей з повної Кельнської марки золотого сплаву"
          - key: {de: "Feingewicht", en: Fine weight, uk: Чиста вага}
            value:
              de: "<b>6,0322 g</b> Feingold (Initialstandard) · <b>6,03 g</b> nach Reduktion 1770<sup><a href=\"#ref32\">[32]</a></sup>"
              en: "<b>6.0322 g</b> fine gold (initial) · <b>6.03 g</b> after the 1770 reduction<sup><a href=\"#ref32\">[32]</a></sup>"
              uk: "<b>6,0322 г</b> чистого золота (початковий) · <b>6,03 г</b> після редукції 1770<sup><a href=\"#ref32\">[32]</a></sup>"
          - key: {de: "Tarif", en: Tariff, uk: Тариф}
            value:
              de: "<b>1 Pistole = 5 Thaler</b> (Norddt. Reichsthaler / Vereinsthaler) · <b>1 Christian d'or = 5 Speciedaler</b> (Dänemark, ≈ 12 Mark Dansk-Anteil)<sup><a href=\"#ref34\">[34]</a></sup>"
              en: "<b>1 pistole = 5 thalers</b> (North-German Reichsthaler / Vereinsthaler) · <b>1 Christian d'or = 5 Speciedaler</b> (Denmark, ≈ 12 Mark Dansk-share)<sup><a href=\"#ref34\">[34]</a></sup>"
              uk: "<b>1 пістоль = 5 талерів</b> (Reichsthaler / Vereinsthaler) · <b>1 Christian d'or = 5 Speciedaler</b> (Данія, ≈ частка 12 Mark Dansk)<sup><a href=\"#ref34\">[34]</a></sup>"
          - key: {de: "Subnominale", en: Sub-denominations, uk: Субномінали}
            value:
              de: "½ Pistole (ab 1749, 2½ Thaler) · 1 Pistole · 2 Pistolen (ab 1747, 10 Thaler) · Wilhelm d'or 1737 ist <em>ab origine</em> eine Doppelpistole<sup><a href=\"#ref32\">[32]</a></sup>"
              en: "½ pistole (from 1749, 2½ thalers) · 1 pistole · 2 pistoles (from 1747, 10 thalers) · the Wilhelm d'or of 1737 is <em>ab origine</em> a double pistole<sup><a href=\"#ref32\">[32]</a></sup>"
              uk: "½ пістолі (з 1749, 2½ талера) · 1 пістоль · 2 пістолі (з 1747, 10 талерів) · Wilhelm d'or 1737 — <em>ab origine</em> подвійна пістоль<sup><a href=\"#ref32\">[32]</a></sup>"
      - kind: phase_header
        title:
          de: "Periodisierung der Pistolen-Familie (1737 → 1873)"
          en: "Periodisation of the Pistolen family (1737 → 1873)"
          uk: "Періодизація Pistolen-родини (1737 → 1873)"
      - kind: phase_summary
        content:
          de: '<b>1737 — 1741 · Wilhelm d''or und Friedrich d''or (Preußen):</b> Friedrich Wilhelm I. läßt 1737 den <b>Wilhelm d''or</b> als Doppelpistole zu 10 Thalern ausprägen, um den Strom ausländischer Goldmünzen ins Königreich zu kanalisieren. Friedrich II. setzt 1741 mit dem <b>Friedrich d''or</b> die Standardform fest: 5 Reichsthaler, 6,05 g Feingold bei 130/144 Probe, 35 Stück aus der rauen Cöllnischen Marck.<sup><a href="#ref32">[32]</a></sup><sup><a href="#ref34">[34]</a></sup> Vorbild sind die spanische Doblón (1537) und die französische Louis d''or (1640).<sup><a href="#ref35">[35]</a></sup>'
          en: '<b>1737 — 1741 · Wilhelm d''or and Friedrich d''or (Prussia):</b> in 1737 Friedrich Wilhelm I has the <b>Wilhelm d''or</b> struck as a double pistole worth 10 thalers, to channel the inflow of foreign gold into the kingdom. Friedrich II fixes the standard form in 1741 with the <b>Friedrich d''or</b>: 5 Reichsthaler, 6.05 g fine gold at 130/144 fineness, 35 pieces from the rough Cologne mark.<sup><a href="#ref32">[32]</a></sup><sup><a href="#ref34">[34]</a></sup> Modelled on the Spanish doblón (1537) and the French Louis d''or (1640).<sup><a href="#ref35">[35]</a></sup>'
          uk: '<b>1737 — 1741 · Wilhelm d''or і Friedrich d''or (Пруссія):</b> 1737 р. Friedrich Wilhelm I карбує <b>Wilhelm d''or</b> як подвійну пістоль вартістю 10 талерів — щоб каналізувати приплив іноземного золота до королівства. Friedrich II 1741 р. <b>Friedrich d''or</b> фіксує стандартну форму: 5 Reichsthaler, 6,05 г чистого золота за пробою 130/144, 35 штук з повної Кельнської марки.<sup><a href="#ref32">[32]</a></sup><sup><a href="#ref34">[34]</a></sup> Зразок — іспанська Doblón (1537) і французький Louis d''or (1640).<sup><a href="#ref35">[35]</a></sup>'
      - kind: phase_summary
        content:
          de: '<b>1747 — 1749 · Stückelung:</b> 1747 wird der <b>2 Friedrich d''or</b> (10-Thaler-Stück) eingeführt, 1749 der <b>½ Friedrich d''or</b> (2½-Thaler-Stück)<sup><a href="#ref32">[32]</a></sup>. Die preußische Pistolen-Familie verbreitet sich rasch in den norddeutschen Staaten als <em>August d''or</em> (Sachsen), <em>Wilhelm d''or</em> / <em>Friedrich d''or</em> (Hessen-Kassel), <em>Carl d''or</em> (Braunschweig) — alle nach derselben Spezifikation.<sup><a href="#ref34">[34]</a></sup>'
          en: '<b>1747 — 1749 · Sub-denominations:</b> the <b>2 Friedrich d''or</b> (a 10-thaler piece) is introduced in 1747 and the <b>½ Friedrich d''or</b> (a 2½-thaler piece) in 1749<sup><a href="#ref32">[32]</a></sup>. The Prussian pistole family spreads rapidly across the North-German states as <em>August d''or</em> (Saxony), <em>Wilhelm d''or</em> / <em>Friedrich d''or</em> (Hesse-Kassel), <em>Carl d''or</em> (Brunswick) — all on the same specification.<sup><a href="#ref34">[34]</a></sup>'
          uk: '<b>1747 — 1749 · Стікелажі:</b> 1747 р. запроваджено <b>2 Friedrich d''or</b> (10-талерову монету), 1749 р. — <b>½ Friedrich d''or</b> (2½-талерову)<sup><a href="#ref32">[32]</a></sup>. Прусська пістольна родина швидко поширюється по північно-німецьких державах як <em>August d''or</em> (Саксонія), <em>Wilhelm d''or</em> / <em>Friedrich d''or</em> (Гессен-Кассель), <em>Carl d''or</em> (Брауншвайг) — усі за тією самою специфікацією.<sup><a href="#ref34">[34]</a></sup>'
      - kind: phase_summary
        content:
          de: '<b>1756 — 1763 · Mittel-Friedrich d''or (Siebenjähriger Krieg):</b> Sondernotmünzen mit nur 4,2 g Feingold statt der regulären 6,05 g — formal Pistolen, real Kipper-Münzen mit ca. 30 % Goldverlust gegenüber dem Standard.<sup><a href="#ref32">[32]</a></sup> Sie sind <em>nicht</em> Teil des regulären Pistolen-Fußes und gehören in eine separate fiskalische Kategorie.'
          en: '<b>1756 — 1763 · Mittel-Friedrich d''or (Seven Years'' War):</b> emergency war coinages at only 4.2 g fine gold instead of the regular 6.05 g — formally pistoles but in fact Kipper coins about 30 % below standard.<sup><a href="#ref32">[32]</a></sup> They are <em>not</em> part of the regular Pistolen-Fuß and belong to a separate fiscal category.'
          uk: '<b>1756 — 1763 · Mittel-Friedrich d''or (Семирічна війна):</b> воєнні нотмонети лише з 4,2 г чистого золота замість звичних 6,05 г — формально пістолі, фактично Kipper-монети з втратою приблизно 30 % золота проти стандарту.<sup><a href="#ref32">[32]</a></sup> Вони <em>не</em> належать до регулярного Pistolen-Fuß і йдуть окремою фіскальною категорією.'
      - kind: phase_summary
        content:
          de: '<b>1770 · Reduktion des Standards:</b> das Feingewicht des Friedrich d''or sinkt geringfügig von 6,05 g auf 6,03 g, die Probe von 130/144 auf 129/144 (≈ 896 ‰).<sup><a href="#ref32">[32]</a></sup> Die zugehörige Stempelarbeit am preußischen Münzstand definiert den Standard, an den sich nachfolgende d''or-Prägungen — auch der dänische Christian d''or 1771 — orientieren.'
          en: '<b>1770 · Reduction of the standard:</b> the fine weight of the Friedrich d''or falls slightly from 6.05 g to 6.03 g, and the fineness from 130/144 to 129/144 (≈ 896 ‰).<sup><a href="#ref32">[32]</a></sup> The corresponding die-work at the Prussian mint sets the standard that subsequent d''or issues — including the Danish Christian d''or of 1771 — adopt.'
          uk: '<b>1770 · Редукція стандарту:</b> чиста вага Friedrich d''or дещо знижується з 6,05 г до 6,03 г, проба — з 130/144 до 129/144 (≈ 896 ‰).<sup><a href="#ref32">[32]</a></sup> Відповідна штемпельна робота на прусському монетному дворі задає стандарт, якого дотримуються наступні d''or-прецеденти — включно з данським Christian d''or 1771 р.'
      - kind: phase_summary
        content:
          de: '<b>1771 — 1870 · Christian d''or und Frederik d''or (Dänemark):</b> Christian VII. läßt 1771 in der neu eröffneten Altonaer Münze den <b>Christian d''or</b> nach dem Vorbild der französischen Louis d''or prägen — derselbe Standard wie der reduzierte preußische Friedrich d''or (130/144 Probe, 6,03 g fein).<sup><a href="#ref33">[33]</a></sup> Die Linie wird unter Frederik VI. (ab 1808 als <b>Frederik d''or</b>), Christian VIII., Frederik VII. und Christian IX. fortgeführt — letzte Prägung 1870 (Christian IX.).<sup><a href="#ref33">[33]</a></sup> Tarif: <b>1 Christian d''or = 5 Speciedaler = 12 Mark Dansk-Anteil</b>; Verwendung «<i>mest til internationale betalinger</i>» — Außenhandelsmünze, kein gesetzliches Zahlungsmittel im Inland.<sup><a href="#ref33">[33]</a></sup>'
          en: '<b>1771 — 1870 · Christian d''or and Frederik d''or (Denmark):</b> in 1771 Christian VII has the <b>Christian d''or</b> struck at the newly opened Altona mint, modelled on the French Louis d''or — at the same standard as the reduced Prussian Friedrich d''or (130/144 fineness, 6.03 g fine).<sup><a href="#ref33">[33]</a></sup> The line continues under Frederik VI (from 1808 as the <b>Frederik d''or</b>), Christian VIII, Frederik VII and Christian IX — last issue 1870 under Christian IX.<sup><a href="#ref33">[33]</a></sup> Tariff: <b>1 Christian d''or = 5 Speciedaler = 12 Mark Dansk-share</b>; the coin was used «<i>mest til internationale betalinger</i>» — a foreign-trade coin, not domestic legal tender.<sup><a href="#ref33">[33]</a></sup>'
          uk: '<b>1771 — 1870 · Christian d''or і Frederik d''or (Данія):</b> 1771 р. Christian VII у новому монетному дворі Альтони карбує <b>Christian d''or</b> за зразком французького Louis d''or — за тим самим стандартом, що й редукований прусський Friedrich d''or (проба 130/144, 6,03 г чистого).<sup><a href="#ref33">[33]</a></sup> Лінія продовжується за Frederik VI (з 1808 р. як <b>Frederik d''or</b>), Christian VIII, Frederik VII і Christian IX — остання емісія 1870 р. за Christian IX.<sup><a href="#ref33">[33]</a></sup> Тариф: <b>1 Christian d''or = 5 Speciedaler = частка 12 Mark Dansk</b>; вживалися «<i>mest til internationale betalinger</i>» — як зовнішньоторговельна монета, не як внутрішній законний платіжний засіб.<sup><a href="#ref33">[33]</a></sup>'
      - kind: phase_summary
        content:
          de: '<b>1855 — 1873 · Demonetisierung:</b> 1855 prägt Preußen unter Friedrich Wilhelm IV. den letzten Friedrich d''or; ab dem Vereinsmünzvertrag vom 24. Januar 1857 ersetzen Vereinsgoldmünzen (Krone, ½ Krone) administrativ die Pistole im Deutschen Bund. Münzgesetz 4. Dezember 1871 (Reichsgoldmark) demonetisiert die deutsche Pistolen-Familie endgültig; ab 1. Januar 1876 sind Mark und Vereinsthaler die einzigen gesetzlichen Zahlungsmittel im Reich. In Dänemark beendet die Krone-Reform 1873 (Skandinavische Münzunion) die d''or-Linie.<sup><a href="#ref32">[32]</a></sup>'
          en: '<b>1855 — 1873 · Demonetisation:</b> in 1855 Prussia under Friedrich Wilhelm IV strikes the last Friedrich d''or; from the Vereinsmünzvertrag of 24 January 1857 onward Vereinsgoldmünzen (Krone, ½ Krone) administratively replace the pistole in the German Bund. The Coinage Act of 4 December 1871 (Reichsgoldmark) demonetises the German pistole family definitively; from 1 January 1876 only Mark and Vereinsthaler are legal tender in the Reich. In Denmark the Krone reform of 1873 (Scandinavian Monetary Union) ends the d''or line.<sup><a href="#ref32">[32]</a></sup>'
          uk: '<b>1855 — 1873 · Демонетизація:</b> 1855 р. Пруссія за Friedrich Wilhelm IV карбує останній Friedrich d''or; з Vereinsmünzvertrag 24 січня 1857 Vereinsgoldmünzen (Krone, ½ Krone) адміністративно витісняють пістоль у Німецькому Союзі. Закон про монету 4 грудня 1871 (Reichsgoldmark) остаточно демонетизує німецьку Pistolen-родину; з 1 січня 1876 у Рейху законним платіжним засобом є лише Mark і Vereinsthaler. У Данії Krone-реформа 1873 (Скандинавська монетна унія) кінчає лінію d''or.<sup><a href="#ref32">[32]</a></sup>'
    territories:
      label:
        de: "Territorien"
        en: "Territories"
        uk: "Території"
      content:
        de: |
          <b>Preußen:</b> Wilhelm d'or (1737, Doppelpistole), Friedrich d'or (1741 → 1855) · Hauptträger der Pistolen-Familie.<br>
          <b>Sachsen:</b> August d'or, Friedrich-August d'or (18. Jh.).<br>
          <b>Hessen-Kassel:</b> Wilhelm d'or, Friedrich d'or (Stern-Pistole) — verschiedene Regenten.<br>
          <b>Hannover (mit GB-Personalunion):</b> Wilhelm d'or, Karl d'or — analog 5-Thaler-Tarif.<br>
          <b>Braunschweig-Wolfenbüttel:</b> Karl d'or.<br>
          <b>Dänemark (Königreich + Holstein-Altona):</b> Christian d'or und Frederik d'or 1771 — 1870 unter fünf Regenten.<br>
          <b>Status:</b> in Deutschland Handels- und Umlaufmünze ohne Reichs-Müntzfuß-Status; in Dänemark «<i>mest til internationale betalinger</i>» — Außenhandelsmünze, kein gesetzliches Zahlungsmittel im Inland<sup><a href="#ref33">[33]</a></sup>.
        en: |
          <b>Prussia:</b> Wilhelm d'or (1737, double pistole), Friedrich d'or (1741 → 1855) · principal carrier of the pistole family.<br>
          <b>Saxony:</b> August d'or, Friedrich-August d'or (18th c.).<br>
          <b>Hesse-Kassel:</b> Wilhelm d'or, Friedrich d'or (Stern-Pistole) — multiple rulers.<br>
          <b>Hanover (Personal Union with GB):</b> Wilhelm d'or, Karl d'or — same 5-thaler tariff.<br>
          <b>Brunswick-Wolfenbüttel:</b> Karl d'or.<br>
          <b>Denmark (Kingdom + Holstein-Altona):</b> Christian d'or and Frederik d'or, 1771 — 1870, under five rulers.<br>
          <b>Status:</b> in Germany a trade and circulating coin without imperial Münzfuß status; in Denmark «<i>mest til internationale betalinger</i>» — a foreign-trade coin, not domestic legal tender<sup><a href="#ref33">[33]</a></sup>.
        uk: |
          <b>Пруссія:</b> Wilhelm d'or (1737, подвійна пістоль), Friedrich d'or (1741 → 1855) · основний носій Pistolen-родини.<br>
          <b>Саксонія:</b> August d'or, Friedrich-August d'or (XVIII ст.).<br>
          <b>Гессен-Кассель:</b> Wilhelm d'or, Friedrich d'or (Stern-Pistole) — за різних регентів.<br>
          <b>Ганновер (особиста унія з ВБ):</b> Wilhelm d'or, Karl d'or — той самий 5-талерний тариф.<br>
          <b>Брауншвайг-Вольфенбюттель:</b> Karl d'or.<br>
          <b>Данія (Королівство + Гольштейн-Альтона):</b> Christian d'or і Frederik d'or, 1771 — 1870, за п'яти регентів.<br>
          <b>Статус:</b> у Німеччині — торгова й обігова монета без статусу імперської Müntzfuß; у Данії «<i>mest til internationale betalinger</i>» — зовнішньоторговельна, не внутрішній законний платіжний засіб<sup><a href="#ref33">[33]</a></sup>.

# ------------------------------------------------------------------
# 1b. Burgundischer / Zinnaischer Müntzfuß · 10½-Thaler-Fuß
# ------------------------------------------------------------------
  - id: burgundischer_zinnaisch
    metal: silver
    years_label:
      de: "ca. 1600 → 1797"
      en: "ca. 1600 → 1797"
      uk: "бл. 1600 → 1797"
    name: 10½-Thaler-Fuß
    historical_name: Burgundischer Fuß · Zinnaischer Müntzfuß
    subtitle:
      de: 'Albertustaler-Tradition (Spanische Niederlande) · Müntzreceß von Zinna 1667 (Kloster Zinna, Brandenburg + Sachsen)<sup><a href="#ref20">[20]</a><a href="#ref26">[26]</a></sup>; Brunswick-Lüneburg-Beitritt 1668<sup><a href="#ref20">[20]</a></sup> · Cöllnische Marck = 233,856 g Feinsilber'
      en: 'Albertustaler tradition (Spanish Netherlands) · Müntzreceß of Zinna 1667 (Kloster Zinna, Brandenburg + Saxony)<sup><a href="#ref20">[20]</a><a href="#ref26">[26]</a></sup>; Brunswick-Lüneburg joins 1668<sup><a href="#ref20">[20]</a></sup> · Cöllnische Marck = 233.856 g fine silver'
      uk: 'Традиція Albertustaler (Іспанські Нідерланди) · Müntzreceß від Zinna 1667 (Kloster Zinna, Бранденбург + Саксонія)<sup><a href="#ref20">[20]</a><a href="#ref26">[26]</a></sup>; приєднання Brunswick-Lüneburg 1668<sup><a href="#ref20">[20]</a></sup> · Кельнська марка = 233,856 г чистого срібла'
    body:
      - kind: phase_header
        title:
          de: "Zwei Verwendungen desselben Fußes"
          en: "Two uses of the same standard"
          uk: "Два застосування тієї самої стопи"
      - kind: phase_summary
        content:
          de: '<b>Zinnaischer Fuß (Inlands-Kleingeld, 1667–1690):</b> Sachsen und Kurbrandenburg vereinbarten, den 9-Taler-Fuß der Augsburger Reichsmünzordnung von 1559 für die Speciesthaler beizubehalten, die Scheidemünzen aber in den 10½-Taler-Fuß auszumünzen<sup><a href="#ref20">[20]</a></sup>. Mit dem Beitritt des Herzogtums Braunschweig-Lüneburg 1668 wurde der 10½-Taler-Fuß zugleich auf die Ausprägung der ⅔-, ⅓- und ⅙-Taler ausgedehnt<sup><a href="#ref20">[20]</a></sup> — aus 1 Mark Silber gingen 10½ Thaler bzw. 15¾ Gulden hervor<sup><a href="#ref26">[26]</a></sup>. 1690 durch den Leipziger Fuß (12-Fuß) abgelöst<sup><a href="#ref17">[17]</a></sup>.'
          en: '<b>Zinnaischer Müntzfuß (domestic small coin, 1667–1690):</b> Saxony and Brandenburg agreed to retain the 9-Taler-Fuß of the 1559 Augsburg Imperial Mint Ordinance for the Speciesthaler while striking petty coinage on the 10½-Taler-Fuß<sup><a href="#ref20">[20]</a></sup>. With the accession of Brunswick-Lüneburg in 1668 the 10½-Taler-Fuß was extended to ⅔-, ⅓- and ⅙-Taler<sup><a href="#ref20">[20]</a></sup> — one Mark of silver yielded 10½ Thaler or 15¾ Gulden<sup><a href="#ref26">[26]</a></sup>. Replaced by the Leipziger Fuß (12-Fuß) in 1690<sup><a href="#ref17">[17]</a></sup>.'
          uk: '<b>Циннська стопа (внутрішня дрібна монета, 1667–1690):</b> Саксонія і Бранденбург домовилися зберегти 9-Taler-Fuß Авґсбурзького монетного ордонансу 1559 р. для Speciesthaler, а розмінну монету карбувати за 10½-Taler-Fuß<sup><a href="#ref20">[20]</a></sup>. З приєднанням герцогства Брауншвайг-Люнебург 1668 р. 10½-Taler-Fuß поширився також на ⅔-, ⅓- та ⅙-Taler<sup><a href="#ref20">[20]</a></sup> — з 1 марки срібла виходило 10½ Thaler або 15¾ Gulden<sup><a href="#ref26">[26]</a></sup>. 1690 р. замінено Leipziger Fuß (12-Taler-Fuß)<sup><a href="#ref17">[17]</a></sup>.'
      - kind: phase_summary
        content:
          de: '<b>Burgundischer Wechselthaler-Fuß (internationale Handelsmünze, 17.–18. Jh.):</b> in der Tradition des burgundischen Andreaskreuz-Talers — Albertustaler bzw. Patagon, geprägt in den Spanischen Niederlanden ab 1612 und in den Vereinigten Niederlanden 1659–1802; Haupthandelsmünze im Ostseeraum.<sup><a href="#ref31">[31]</a></sup> Dasselbe Feingewicht (22,27200 g) wie im Zinnaischen Fuß, aber höheres Korn (861–875 ‰ statt 750 ‰).'
          en: '<b>Burgundian Wechselthaler-Fuß (international trade coin, 17th–18th c.):</b> in the tradition of the Burgundian St Andrew''s-cross thaler — Albertustaler / Patagon, struck in the Spanish Netherlands from 1612 and in the United Provinces 1659–1802; the principal trade coin of the Baltic region.<sup><a href="#ref31">[31]</a></sup> Same fine weight (22.27200 g) as the Zinna standard, but higher fineness (861–875 ‰ instead of 750 ‰).'
          uk: '<b>Бургундський Wechselthaler-Fuß (міжнародна торгова монета, XVII–XVIII ст.):</b> у традиції бургундського талера з Андрієвим хрестом — Albertustaler / Patagon, карбувався в Іспанських Нідерландах від 1612 р. і в Обʼєднаних провінціях 1659–1802 рр.; головна торгова монета Балтійського регіону.<sup><a href="#ref31">[31]</a></sup> Та сама чиста вага (22,27200 г), що й у Циннській стопі, але вища проба (861–875 ‰ замість 750 ‰).'
      - kind: rows
        items:
          - key: {de: "Feingewicht Thaler", en: 'Fine weight, thaler', uk: Чиста вага Thaler}
            value: {de: "<b>22,27200 g</b> (= 233,856 / 10,5)", en: <b>22.27200 g</b> (= 233.856 / 10.5), uk: '<b>22,27200 г</b> (= 233,856 / 10,5)'}
          - key: {de: "Raugewicht Zinnaisch", en: 'Rough weight, Zinna', uk: 'Повна вага, циннська'}
            value: {de: "ca. 29,696 g · 750 ‰ (= 12 Loth)", en: c. 29.696 g · 750 ‰ (= 12 Loth), uk: 'бл. 29,696 г · 750 ‰ (= 12 Лот)'}
          - key: {de: "Raugewicht Burgundisch", en: 'Rough weight, Burgundian', uk: 'Повна вага, бургундська'}
            value: {de: "ca. 25,85–25,92 g · 861–875 ‰ (14 Loth)", en: c. 25.85–25.92 g · 861–875 ‰ (14 Loth), uk: 'бл. 25,85–25,92 г · 861–875 ‰ (14 Лот)'}
          - key: {de: "Verhältniß zu Thaler Specie", en: Ratio to Thaler Specie, uk: Співвідношення до Thaler Specie}
            value: {de: "22,27200 / 25,984 = 6/7 — oder: 1 Thaler Specie = 7/6 = 1 1/6 Thaler Courant (10½-Fuß)", en: 22.27200 / 25.984 = 6/7 — i.e. 1 Thaler Specie = 7/6 = 1 1/6 Thaler Courant (10½-Fuß), uk: '22,27200 / 25,984 = 6/7 — тобто: 1 Thaler Specie = 7/6 = 1 1/6 Thaler Courant (10½-Thaler-Fuß)'}
          - key: {de: "Preuß. Thaler Banco 1765", en: Prussian Thaler Banco 1765, uk: Прусський Thaler Banco 1765}
            value: {de: "<b>22,27200 g</b> fein · 875 ‰ (14 Loth) · 25,45371 g rau · Burgundischer Fuß", en: <b>22.27200 g</b> fine · 875 ‰ (14 Loth) · 25.45371 g rough · Burgundischer Fuß, uk: '<b>22,27200 г</b> чистого · 875 ‰ (14 Лот) · 25,45371 г повної · Бургундська стопа'}
          - key: {de: "Thaler Banco Münzstätte", en: Thaler Banco — mint, uk: Thaler Banco — монетний двір}
            value: {de: "Berlin (A) · geprägt 1766 mit Jz. 1765 · 100.000 Stück", en: 'Berlin (A) · struck 1766 with date 1765 · 100,000 pieces', uk: Берлін (A) · карбувалось 1766 з датою 1765 · 100 000 штук}
          - key: {de: "Thaler Banco Geschichte", en: Thaler Banco — history, uk: Thaler Banco — історія}
            value:
              de: '100 000 Stück 1766 mit Jahreszahl 1765 für die Königl. Giro- und Lehn-Banco Berlin geprägt; Stempelschneider Jakob Abraham. Niemals in Umlauf gesetzt — die Berliner Bank war zunächst nicht erfolgreich; der Bestand verblieb im Staatsschatz und wurde 1790 vollständig eingeschmolzen<sup><a href="#ref27">[27]</a></sup>.'
              en: '100,000 pieces struck in 1766 dated 1765 for the Königliche Giro- und Lehn-Banco Berlin; dies by Jakob Abraham. None entered circulation — the Berlin bank was initially unsuccessful; the holdings remained in the state treasury and were melted down in their entirety in 1790<sup><a href="#ref27">[27]</a></sup>.'
              uk: '100 000 штук накарбовано 1766 з датою 1765 для Königliche Giro- und Lehn-Banco Berlin; штемпельник Jakob Abraham. В обіг не випущено — Берлінський банк спочатку не мав успіху; запас лежав у державній скарбниці і 1790 р. повністю переплавлений<sup><a href="#ref27">[27]</a></sup>.'
      - kind: prose
        label:
          de: "Rechnungsfraktionen (Zinnaischer Fuß)"
          en: "Accounting fractions (Zinnaischer Müntzfuß)"
          uk: "Розрахункові фракції (Циннська стопа)"
        content:
          de: |
            <b>1 Thaler Specie</b> (9-Fuß) = 28 Gute Groschen Courant = 105 Kreutzer = 336 Pfennig Courant<br>
            <b>1 Thaler Courant</b> (10½-Fuß, Rechnung) = 24 Gute Groschen Courant = 90 Kreutzer = 288 Pfennig Courant<br>
            <b>1 Guter Groschen Courant</b> = 12 Pfennig Courant<br>
            <b>1 Thaler Specie</b> = 25,984 / 22,27200 = 7/6 = 1 1/6 Thaler Courant (glatter Bruch ✓)<br>
            <b>1 Preuß. Thaler Banco</b> (Einlagemünze) = 1⅓ Thaler Courant (14-Thaler-Fuß) = 6/7 Reichsthaler Species (9-Fuß)<br>
            <em>Zinnaisch (750 ‰) und Burgundisch (861–875 ‰) haben dasselbe Feingewicht aber verschiedene Feinheit — beide gelten im Norddeutschen Handel als Wechselthaler</em>
          en: "<b>1 Thaler Specie</b> (9-Fuß) = 28 Gute Groschen Courant = 105 Kreutzer = 336 Pfennig Courant<br>\n<b>1 Thaler Courant</b> (10½-Fuß, accounting) = 24 Gute Groschen Courant = 90 Kreutzer = 288 Pfennig Courant<br>\n<b>1 Guter Groschen Courant</b> = 12 Pfennig Courant<br>\n<b>1 Thaler Specie</b> = 25.984 / 22.27200 = 7/6 = 1 1/6 Thaler Courant (clean fraction ✓)<br>\n<b>1 Prussian Thaler Banco</b> (reserve coin) = 1⅓ Thaler Courant (14-Thaler-Fuß) = 6/7 Reichsthaler Species (9-Fuß)<br>\n<em>Zinna (750 ‰) and Burgundian (861–875 ‰) have the same fine weight but different fineness — both are considered trade thalers in North German commerce</em>\n"
          uk: "<b>1 Thaler Specie</b> (9-Thaler-Fuß) = 28 Gute Groschen Courant = 105 Kreutzer = 336 Pfennig Courant<br>\n<b>1 Thaler Courant</b> (10½-Thaler-Fuß, розрахунково) = 24 Gute Groschen Courant = 90 Kreutzer = 288 Pfennig Courant<br>\n<b>1 Guter Groschen Courant</b> = 12 Pfennig Courant<br>\n<b>1 Thaler Specie</b> = 25,984 / 22,27200 = 7/6 = 1 1/6 Thaler Courant (чистий дріб ✓)<br>\n<b>1 прусський Thaler Banco</b> (резервна монета) = 1⅓ Thaler Courant (14-Thaler-Fuß) = 6/7 Reichsthaler Species (9-Thaler-Fuß)<br>\n<em>Циннська (750 ‰) і Бургундська (861–875 ‰) мають ту саму чисту вагу, але різну пробу — обидві вважаються в північно-німецькій торгівлі обмінними Thaler</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Zinnaischer Fuß (Kleingeld, 1667–1690):</b> Kurbrandenburg, Kursachsen, Braunschweig-Lüneburg.<br>
          <b>Burgundischer Wechselthaler-Fuß (Handelsmünze):</b> Spanische/Österreichische Niederlande (Albertustaler ab 1612 – ca. 1800); Vereinigte Niederlande (Zilveren Dukaat, 1659–1806); Kursachsen (Wechselthaler 1670–71; Bankotaler 1702); Brandenburg-Preußen (Albertustaler 1695–96, 1767–68, 1797; Thaler Banco 1765); Schleswig-Holstein-Gottorp (1753); Kurland (1780); Dänemark (1781, 1784); Köln (1699–1702, 1726).<br>
          <b>Als Handelsstandard:</b> Gesamter Norddeutscher und Ostseehandel (Hamburg, Lübeck, Amsterdam, Kopenhagen, Stockholm).
        en: |
          <b>Zinnaischer Müntzfuß (small coin, 1667–1690):</b> Electoral Brandenburg, Electoral Saxony, Brunswick-Lüneburg.<br>
          <b>Burgundian trade-thaler standard (trade coin):</b> Spanish/Austrian Netherlands (Albertustaler from 1612 – c. 1800); United Provinces (Zilveren Dukaat, 1659–1806); Electoral Saxony (Wechselthaler 1670–71; Bankotaler 1702); Brandenburg-Prussia (Albertustaler 1695–96, 1767–68, 1797; Thaler Banco 1765); Schleswig-Holstein-Gottorp (1753); Courland (1780); Denmark (1781, 1784); Cologne (1699–1702, 1726).<br>
          <b>As a trade standard:</b> The whole of the North German and Baltic trade (Hamburg, Lübeck, Amsterdam, Copenhagen, Stockholm).
        uk: |
          <b>Циннська стопа (дрібна монета, 1667–1690):</b> Курбранденбург, Курсаксонія, Брауншвайг-Люнебург.<br>
          <b>Бургундський торговельний-Thaler-стандарт (торгова монета):</b> Іспанські/Австрійські Нідерланди (Albertustaler з 1612 – бл. 1800); Сполучені провінції (Zilveren Dukaat, 1659–1806); Курсаксонія (Wechselthaler 1670–71; Bankotaler 1702); Бранденбург-Пруссія (Albertustaler 1695–96, 1767–68, 1797; Thaler Banco 1765); Шлезвіг-Гольштейн-Готторп (1753); Курляндія (1780); Данія (1781, 1784); Кельн (1699–1702, 1726).<br>
          <b>Як торговельний стандарт:</b> уся північно-німецька і балтійська торгівля (Гамбург, Любек, Амстердам, Копенгаген, Стокгольм).

