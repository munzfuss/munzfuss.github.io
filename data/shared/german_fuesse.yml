# 7. Hamburgische Bancovaluta
# ------------------------------------------------------------------
  - id: hamburgische_bancovaluta
    metal: giro
    years_label:
      de: "1619 → 1875"
      en: "1619 → 1875"
      uk: "1619 → 1875"
    name: Hamburgische Bancovaluta
    subtitle:
      de: 'Hamburger Bank 1619<sup><a href="#ref11">[11]</a></sup> · Hamburger Bankreform 1770<sup><a href="#ref14">[14]</a></sup> · kanonischer Hamburger Bankfuß: <b>27¾ Mark Banco = 1 feine Cöllnische Marck</b> = <b>59⅓ Mark Banco / Zollpfund Feinsilber</b> (zwei äquivalente Formulierungen: ältere auf Cölln. Marck = 233,856 g, jüngere auf Zollpfund = 500 g)<sup><a href="#ref12">[12]</a></sup><sup><a href="#ref13">[13]</a></sup> · Aufhebung der Bank am 31. Dezember 1875'
      en: 'Hamburger Bank 1619<sup><a href="#ref11">[11]</a></sup> · Hamburger Bankreform 1770<sup><a href="#ref14">[14]</a></sup> · canonical Hamburger Bankfuß: <b>27¾ Mark Banco = 1 fine Cöllnische Marck</b> = <b>59⅓ Mark Banco / Zollpfund of fine silver</b> (two equivalent statements: older on the Cölln. Marck = 233.856 g, later on the Zollpfund = 500 g)<sup><a href="#ref12">[12]</a></sup><sup><a href="#ref13">[13]</a></sup> · bank dissolved 31 December 1875'
      uk: 'Гамбурзький банк 1619<sup><a href="#ref11">[11]</a></sup> · Hamburger Bankreform 1770<sup><a href="#ref14">[14]</a></sup> · канонічний Hamburger Bankfuß: <b>27¾ Mark Banco = 1 чиста Кельнська марка</b> = <b>59⅓ Mark Banco / Zollpfund чистого срібла</b> (дві еквівалентні форми: давніша на Кельнську марку = 233,856 г, пізніша на Zollpfund = 500 г)<sup><a href="#ref12">[12]</a></sup><sup><a href="#ref13">[13]</a></sup> · ліквідовано банк 31 грудня 1875'
    body:
      - kind: rows
        items:
          - key:
              de: "1619/1622 – 1770 · Münzbasierte Phase"
              en: "1619/1622 – 1770 · Coin-backed phase"
              uk: "1619/1622 – 1770 · Монетно-забезпечена фаза"
            value:
              de: '1 Reichsthaler (9-Fuß) = 3 Marck Banco; 1 Marck Banco = 25,984 / 3 = <b>8,66133 g</b> fein · = 27-Marck-Fuß (233,856 / 27 = 8,66133 g) · Nominell stabile Deckung, aber de facto: Reichsthaler im Umlauf wurde zunehmend gemischt (leichtere Prägungen nach Zinnaischem und Leipziger Fuß), Bankfonds enthielt zunehmend minderwertigere Münzen → reales Silberdeckung sank unter 8,66 g; nach dem Siebenjährigen Krieg 1756–1763 wurde das Problem systemisch.<sup><a href="#ref11">[11]</a></sup>'
              en: '1 Reichsthaler (9-Fuß) = 3 Marck Banco; 1 Marck Banco = 25.984 / 3 = <b>8.66133 g</b> fine · = 27-Marck-Fuß (233.856 / 27 = 8.66133 g) · Nominally stable backing, but de facto: Reichsthaler in circulation became increasingly mixed (lighter strikes on the Zinna and Leipzig standards), the bank''s reserves held progressively lower-quality coin → real silver backing fell below 8.66 g; after the Seven Years'' War (1756–1763) the problem became systemic.<sup><a href="#ref11">[11]</a></sup>'
              uk: '1 Reichsthaler (9-Thaler-Fuß) = 3 Marck Banco; 1 Marck Banco = 25,984 / 3 = <b>8,66133 г</b> чистого · = 27-Marck-Fuß (233,856 / 27 = 8,66133 г) · Номінально стабільне покриття, але де-факто: Reichsthaler в обігу ставав дедалі змішаним (легші карбування за Циннською і Лейпцизькою стопами), резерви банку містили все більше монет нижчої якості → реальне срібне покриття впало нижче 8,66 г; після Семирічної війни (1756–1763) проблема стала системною.<sup><a href="#ref11">[11]</a></sup>'
          - key:
              de: "1770 · Hamburger Bankreform"
              en: "1770 · Hamburger bank reform"
              uk: "1770 · Реформа Hamburger Bank"
            value:
              de: 'Mark Banco wird endgültig vom Münznominal abgekoppelt und als reine Feinsilberreferenz neu definiert.<sup><a href="#ref14">[14]</a></sup> Bid/Ask-Spread der Bank: <b>27⅝</b> M.B. Ankauf (= 8,46538 g fein), <b>27¾</b> M.B. Verkauf (= 8,42724 g fein) je Cöllnische Marck Feinsilber; die Verkaufsrate <b>27¾</b> ist die kanonische Form des Hamburger Bankfußes.<sup><a href="#ref12">[12]</a></sup><sup><a href="#ref13">[13]</a></sup>'
              en: "Mark Banco definitively detached from the coin nominal and redefined as a pure fine-silver reference.<sup><a href=\"#ref14\">[14]</a></sup> Bank's bid/ask spread: <b>27⅝</b> M.B. on intake (= 8.46538 g fine), <b>27¾</b> M.B. on outgoing (= 8.42724 g fine) per Cöllnische Marck of fine silver; the <b>27¾</b> outgoing rate is the canonical form of the Hamburger Bankfuß.<sup><a href=\"#ref12\">[12]</a></sup><sup><a href=\"#ref13\">[13]</a></sup>"
              uk: 'Mark Banco остаточно відірвано від монетного номіналу і перевизначено як чисто-срібну референцію.<sup><a href="#ref14">[14]</a></sup> Bid/Ask-spread банку: <b>27⅝</b> M.B. на прийнятті (= 8,46538 г чистого), <b>27¾</b> M.B. на виході (= 8,42724 г чистого) на Кельнську марку чистого срібла; курс на виході <b>27¾</b> — канонічна форма Hamburger Bankfuß.<sup><a href="#ref12">[12]</a></sup><sup><a href="#ref13">[13]</a></sup>'
          - key:
              de: "1857/1868 · Zollpfund-Reformulierung"
              en: "1857/1868 · Zollpfund restatement"
              uk: "1857/1868 · Переформулювання на Zollpfund"
            value:
              de: 'Mit dem Wiener Münzvertrag 1857 wurde das Zollpfund (500 g Feinsilber) als gemeinsames deutsches Gewichtsbasis eingeführt. <b>1868</b> wurde der Hamburger Bankfuß in der neuen Einheit ausgedrückt: <b>59⅓ Mark Banco / Zollpfund Feinsilber</b> (= 1 Mark Banco zu 8,42724 g fein)<sup><a href="#ref12">[12]</a></sup><sup><a href="#ref30">[30]</a></sup> — mathematisch identisch mit den vorherigen 27¾ M.B. / Cöllnische Marck (Umrechnung 59⅓ × 233,856/500 ≈ 27,74 ≈ 27¾). Keine metallische Änderung — nur Wechsel der Bezugseinheit.'
              en: "The Vienna Mint Treaty of 1857 introduced the Zollpfund (500 g of fine silver) as the common German weight base. In <b>1868</b> the Hamburger Bankfuß was expressed in the new unit: <b>59⅓ Mark Banco / Zollpfund of fine silver</b> (= 1 Mark Banco at 8.42724 g fine)<sup><a href=\"#ref12\">[12]</a></sup><sup><a href=\"#ref30\">[30]</a></sup> — mathematically identical to the prior 27¾ M.B. / Cöllnische Marck (conversion 59⅓ × 233.856/500 ≈ 27.74 ≈ 27¾). No metallic change — only a change of reference unit."
              uk: 'Віденський монетний договір 1857 запровадив Zollpfund (500 г чистого срібла) як спільну німецьку вагову базу. <b>1868 р.</b> Hamburger Bankfuß було виражено в новій одиниці: <b>59⅓ Mark Banco / Zollpfund чистого срібла</b> (= 1 Mark Banco при 8,42724 г чистого)<sup><a href="#ref12">[12]</a></sup><sup><a href="#ref30">[30]</a></sup> — математично тотожно з попередніми 27¾ M.B. / Кельнська марка (перерахунок 59⅓ × 233,856/500 ≈ 27,74 ≈ 27¾). Жодної металевої зміни — лише зміна референсної одиниці.'
      # «1769 Hamburger Banco-Fuß 27⅝» / «1777 Altonaer Banco-Fuß 27¾»
      # in Bobzin's blog table is interpreted as a misreading: 27⅝ and
      # 27¾ are the bid/ask spread of Hamburg's 1770 reform (Shaw 1896,
      # Bindseil 2019); period encyclopaedias treat 27¾ as the single
      # canonical Hamburger Bankfuß (Soetbeer 1869, Meyers 1907). The
      # SEPARATE Altonaer institution («Species, Giro- und Leihbank zu
      # Altona», founded 1776 — not 1777) is documented in Phase B of
      # the merged 9¼-Thaler-Fuß card.
      - kind: prose
        label: {de: "Rechnungsfraktionen", en: "Accounting fractions", uk: "Розрахункові фракції"}
        content:
          de: |
            <b>1 Marck Banco</b> = 16 Schilling Banco = 192 Pfennig Banco<br>
            <b>1 Thaler Specie</b> = 3 Marck Banco (ab 1622; bestätigt: 27,75 / 9,25 = 3,0 ✓)<br>
            <b>1 preuß. Thaler</b> (Graumannscher) ≈ 2 Marck Banco (Näherung: 27,75 / 14 = 1,982)<br>
            <b>1 Schilling Banco</b> = 12 Pfennig Banco<br>
            <em>Nur Buchgeld (Giralgeld); keine eigene Münzprägung</em>
          en: "<b>1 Marck Banco</b> = 16 Schilling Banco = 192 Pfennig Banco<br>\n<b>1 Thaler Specie</b> = 3 Marck Banco (from 1622; confirmed: 27.75 / 9.25 = 3.0 ✓)<br>\n<b>1 Prussian thaler</b> (Graumann) ≈ 2 Marck Banco (approximation: 27.75 / 14 = 1.982)<br>\n<b>1 Schilling Banco</b> = 12 Pfennig Banco<br>\n<em>Bank money only (Giralgeld); no own coin striking</em>\n"
          uk: "<b>1 Marck Banco</b> = 16 Schilling Banco = 192 Pfennig Banco<br>\n<b>1 Thaler Specie</b> = 3 Marck Banco (з 1622; підтверджено: 27,75 / 9,25 = 3,0 ✓)<br>\n<b>1 прусський Thaler</b> (Грауманн) ≈ 2 Marck Banco (наближення: 27,75 / 14 = 1,982)<br>\n<b>1 Schilling Banco</b> = 12 Pfennig Banco<br>\n<em>Лише безготівкові Groschen (Giralgeld); власне карбування монет не велося</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Hamburg:</b> 1619–1875 (als Girowährung der Hamburger Bank; Wechselgeschäft und Großhandel).<br>
          <b>Als Handelsstandard:</b> Schleswig-Holstein; Mecklenburg; dänische Häfen; skandinavische Handelsstädte; Teile des Baltikums.<br>
          <b>1875:</b> Aufhebung der Hamburger Bank; Übergang zur Reichsmark.
        en: |
          <b>Hamburg:</b> 1619–1875 (as the giro currency of the Hamburger Bank; bills of exchange and wholesale trade).<br>
          <b>As a trade standard:</b> Schleswig-Holstein; Mecklenburg; Danish ports; Scandinavian trade cities; parts of the Baltic.<br>
          <b>1875:</b> Hamburger Bank dissolved; transition to the Reichsmark.
        uk: |
          <b>Гамбург:</b> 1619–1875 (як розрахункова валюта Гамбурзького банку; вексельні операції та оптова торгівля).<br>
          <b>Як торговельний стандарт:</b> Шлезвіг-Гольштейн; Мекленбург; данські порти; скандинавські торгові міста; частини Балтії.<br>
          <b>1875:</b> ліквідовано Гамбурзький банк; перехід до Reichsmark.

# ------------------------------------------------------------------
# 8. Bremische Louisdor-Währung / Pistolenwährung
# ------------------------------------------------------------------
  - id: bremische_louisdorwaehrung
    metal: giro_gold
    years_label:
      de: "18. Jh. → 1875"
      en: "18th c. → 1875"
      uk: "XVIII ст. → 1875"
    name: Bremische Pistolenwährung
    historical_name: Louisdor-Währung · ideelle Goldwährung
    subtitle:
      de: "Buchgeld-System mit Goldverankerung — Bremen prägte keine eigenen Goldmünzen, sondern rechnete in Pistolen (Louisdor / Friedrich d'or aus Frankreich bzw. Preußen). Wikipedia DE «Bremische Münzen»: «<i>Da Bremen davon abgesehen keine eigenen Goldmünzen prägte, war die ideelle Goldwährung des 18. Jahrhunderts in Bremen ein Sonderfall der deutschen Münzgeschichte.</i>»<sup><a href=\"#ref28\">[28]</a></sup>"
      en: "Book-money system with gold backing — Bremen struck no gold coins of its own and reckoned instead in Pistolen (Louisdor / Friedrich d'or from France and Prussia); a unique exception in German monetary history of the 18th century<sup><a href=\"#ref28\">[28]</a></sup>."
      uk: "Безготівкова система із золотою прив'язкою — Бремен власних золотих монет не карбував, а вів облік у Pistolen (Louisdor / Friedrich d'or з Франції та Пруссії); унікальний виняток у німецькій монетній історії XVIII ст.<sup><a href=\"#ref28\">[28]</a></sup>."
    body:
      - kind: rows
        items:
          - key: {de: "Friedrich d'or (biß 1770)", en: Friedrich d'or (until 1770), uk: Friedrich d'or (до 1770)}
            value: {de: "<b>6,055 g</b> Feingold · 900 ‰ · (Quelle: MGM Münzlexikon)", en: '<b>6.055 g</b> fine gold · 900 ‰ · (source: MGM Münzlexikon)', uk: '<b>6,055 г</b> чистого золота · 900 ‰ · (джерело: MGM Münzlexikon)'}
          - key: {de: "Friedrich d'or (ab 1770)", en: Friedrich d'or (from 1770), uk: Friedrich d'or (з 1770)}
            value: {de: "<b>6,032 g</b> Feingold · 900 ‰ · (Quelle: MGM Münzlexikon)", en: '<b>6.032 g</b> fine gold · 900 ‰ · (source: MGM Münzlexikon)', uk: '<b>6,032 г</b> чистого золота · 900 ‰ · (джерело: MGM Münzlexikon)'}
          - key: {de: "Kurs Bremen", en: Bremen rate, uk: Курс Бремена}
            value: {de: "1 Pistole = 5 Thaler Gold = 360 Grote = 1800 Schwaren", en: 1 pistole = 5 Thaler Gold = 360 Grote = 1800 Schwaren, uk: 1 Pistole = 5 Thaler Gold = 360 Grote = 1800 Schwaren}
          - key: {de: "Thaler Gold · Münzfuß (ab 1840)", en: Thaler Gold · standard (from 1840), uk: Thaler Gold · стопа (з 1840)}
            value: {de: "13⅓ Thaler je rauhe Kölnische Marck · Raugewicht <b>17,53920 g</b> · Feingehalt 986 1/9‰ (= 284/288 = Dukatenfuß) · Feingewicht <b>17,29560 g</b> · Gerechnet in der rauhen Mark (nicht der feinen); kein eigener Stufenname — die Stope ergab sich direkt aus dem Pistolenpreis", en: 13⅓ thaler per rough Cöllnische Marck · rough weight <b>17.53920 g</b> · fineness 986 1/9‰ (= 284/288 = ducat standard) · fine weight <b>17.29560 g</b> · reckoned in the rough mark (not the fine); no own standard name — the standard derived directly from the pistole price, uk: '13⅓ Thaler на повну Кельнську марку · повна вага <b>17,53920 г</b> · проба 986 1/9‰ (= 284/288 = Dukatenfuß) · чиста вага <b>17,29560 г</b> · розраховано в повній (rauhe) марці, а не чистій; власної назви Müntzfuß немає — стандарт виводиться прямо з ціни Pistole'}
          - key: {de: "25. Juli 1870 · Goldwährung gesetzlich", en: "25 July 1870 · gold currency legalised", uk: "25 липня 1870 · узаконення золотого стандарту"}
            value:
              de: 'Mit Obrigkeitlicher Verordnung vom 25. Juli 1870 wurde der Thaler Gold in Bremen gesetzliches Zahlungsmittel; zugleich wurden britische, US-amerikanische, russische, französische und weitere zeitgenössische Goldmünzen als Zahlungsmittel anerkannt.<sup><a href="#ref29">[29]</a></sup>'
              en: 'By Obrigkeitliche Verordnung of 25 July 1870 the Thaler Gold became legal tender in Bremen; British, US-American, Russian, French and other contemporary gold coins were simultaneously recognised as means of payment.<sup><a href="#ref29">[29]</a></sup>'
              uk: 'Obrigkeitliche Verordnung 25 липня 1870 надає Thaler Gold у Бремені статус законного платіжного засобу; одночасно як платіжні засоби визнано британські, американські, російські, французькі та інші тогочасні золоті монети.<sup><a href="#ref29">[29]</a></sup>'
      - kind: prose
        label: {de: "Rechnungsfraktionen", en: "Accounting fractions", uk: "Розрахункові фракції"}
        content:
          de: |
            <b>1 Pistole</b> = 5 Thaler Gold = 360 Grote = 1800 Schwaren<br>
            <b>1 Thaler Gold</b> = 72 Grote = 360 Schwaren = <b>17,53920 g</b> rau · <b>17,29560 g</b> fein Silber<br>
            <b>1 Thaler Gold</b> = 1,21100 g Feingold (biß 1770, 6,055 g / 5) · 1,20640 g Feingold (ab 1770, 6,032 g / 5)<br>
            <b>1 Grote</b> = 5 Schwaren<br>
            <em>Impliziertes Au:Ag-Verhältnis: 1 : 14,282 (biß 1770) · 1 : 14,337 (ab 1770)</em><br>
            <b>Preisung 1863:</b> 1 Vereinsgold-Krone (= 10 g Feingold, Referenzmoneta der Münzunionsverhandlungen, nicht Bremer Prägung) = 8,4 = 42/5 Thaler Gold → 1 Thaler Gold = <b>25/21 g Feingold</b> ≈ 1,190 g · Au:Ag ≈ 1:14,528 · Dieser Goldgehalt entspricht exakt der späteren Reichsmark-Umrechnung (93/28 Mark × 100/279 g/Mark = 25/21 g ✓ — Bremens Preisung 1863 antizipierte den späteren Goldstandard)<br>
            <b>Umrechnung 1872:</b> Münzgesetz 4. Decembr. 1871: 10 Mark (Gold) = 3 1/93 Thaler Gold → <b>1 Thaler Gold = 93/28 Mark ≈ 3,321 Mark</b> · 1 Grote = 31/672 Mark ≈ 0,046 Mark · Gesetz 30. April 1872: ab 1. Juli 1872 kein gesetzliches Zahlungsmittel mehr (früher als der Rest des Reichs — da Bremen bereits Goldstandard hatte)
          en: "<b>1 pistole</b> = 5 Thaler Gold = 360 Grote = 1800 Schwaren<br>\n<b>1 Thaler Gold</b> = 72 Grote = 360 Schwaren = <b>17.53920 g</b> rough · <b>17.29560 g</b> silver-fine equivalent<br>\n<b>1 Thaler Gold</b> = 1.21100 g fine gold (until 1770, 6.055 g / 5) · 1.20640 g fine gold (from 1770, 6.032 g / 5)<br>\n<b>1 Grote</b> = 5 Schwaren<br>\n<em>Implied Au:Ag ratio: 1 : 14.282 (until 1770) · 1 : 14.337 (from 1770)</em><br>\n<b>Pricing 1863:</b> 1 Vereinsgold-Krone (= 10 g fine gold, the reference coin of the mint-union negotiations, not a Bremen striking) = 8.4 = 42/5 Thaler Gold → 1 Thaler Gold = <b>25/21 g fine gold</b> ≈ 1.190 g · Au:Ag ≈ 1:14.528 · This gold content corresponds exactly to the later Reichsmark conversion (93/28 Mark × 100/279 g/Mark = 25/21 g ✓ — Bremen's 1863 pricing anticipated the later gold standard)<br>\n<b>Conversion 1872:</b> Coinage Act of 4 Dec. 1871: 10 Mark (gold) = 3 1/93 Thaler Gold → <b>1 Thaler Gold = 93/28 Mark ≈ 3.321 Mark</b> · 1 Grote = 31/672 Mark ≈ 0.046 Mark · Act of 30 April 1872: from 1 July 1872 no longer legal tender (earlier than the rest of the Empire — since Bremen was already on the gold standard)\n"
          uk: "<b>1 Pistole</b> = 5 Thaler Gold = 360 Grote = 1800 Schwaren<br>\n<b>1 Thaler Gold</b> = 72 Grote = 360 Schwaren = <b>17,53920 г</b> повної · <b>17,29560 г</b> срібного еквіваленту<br>\n<b>1 Thaler Gold</b> = 1,21100 г чистого золота (до 1770, 6,055 г / 5) · 1,20640 г чистого золота (з 1770, 6,032 г / 5)<br>\n<b>1 Grote</b> = 5 Schwaren<br>\n<em>Похідне Au:Ag-співвідношення: 1 : 14,282 (до 1770) · 1 : 14,337 (з 1770)</em><br>\n<b>Оцінка 1863:</b> 1 Vereinsgold-Krone (= 10 г чистого золота, референсна монета переговорів про монетну унію, не бременська) = 8,4 = 42/5 Thaler Gold → 1 Thaler Gold = <b>25/21 г чистого золота</b> ≈ 1,190 г · Au:Ag ≈ 1:14,528 · Цей вміст золота точно відповідає пізнішому Reichsmark-перерахунку (93/28 Mark × 100/279 г/Mark = 25/21 г ✓ — оцінка Бремена 1863 випередила пізніший золотий стандарт)<br>\n<b>Перерахунок 1872:</b> Закон про карбування 4 грудня 1871: 10 Mark (золото) = 3 1/93 Thaler Gold → <b>1 Thaler Gold = 93/28 Mark ≈ 3,321 Mark</b> · 1 Grote = 31/672 Mark ≈ 0,046 Mark · Закон 30 квітня 1872: з 1 липня 1872 — не законний платіжний засіб (раніше, ніж у решті імперії — адже Бремен уже мав золотий стандарт)\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Nur:</b> Freie Hansestadt Bremen (18. Jh.–1875).<br>
          <b>Hintergrund:</b> Bremen führte nie eine eigene Silberleitwährung ein; orientierte sich am Goldkurs des Friedrich d'or (Pistole) — die einzige de-facto-Goldwährung im deutschen Raum vor 1871.
        en: |
          <b>Only:</b> Free Hanseatic City of Bremen (18th century–1875).<br>
          <b>Background:</b> Bremen never introduced its own silver-leading currency; it tracked the gold rate of the Friedrich d'or (pistole) — the only de facto gold currency in the German lands before 1871.
        uk: |
          <b>Лише:</b> Вільне ганзейське місто Бремен (XVIII ст.–1875).<br>
          <b>Контекст:</b> Бремен ніколи не запроваджував власної срібної ведучої валюти; орієнтувався на золотий курс Friedrich d'or (Pistole) — єдина де-факто-золота валюта на німецьких теренах до 1871.

