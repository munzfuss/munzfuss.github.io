# German Müntzfüße — landing-page reference catalogue
# ====================================================
#
# A flat enumeration of the principal Müntzfüße that operated in the
# German lands (HRR + Hansestädte + Bremen + Schleswig-Holstein
# +  Vereinsstaaten + Reichsgoldmünzfuß) from the Reichsmüntzordnung
# of 1559/1566 to the Reichsmark of 1871/1875.
#
# Rendered as a secondary section on the landing page, beneath the
# location cards. Independent from `data/shared/fuesse.yml` (which
# defines the Müntzfüße referenced by individual coin entries via
# coin.fuss); this file is purely a presentation catalogue and is not
# cross-validated against coins.
#
# Translation policy:
#   - Tier 1 (always tri-lingual): years_label, title, subtitle, badge,
#     body-block labels (Rechnungsfraktionen, Territorien, phase headers).
#   - Tier 2 (DE primary, falls back via i18n.t): body rows, prose
#     blocks. The landing template renders a small banner on EN/UK
#     pages noting that detailed body text is in period German.
#
# Body block schema (ordered list under `body:`):
#   - kind: rows
#     items: [{key: {...}, value: {...}}, ...]
#   - kind: prose
#     label: {de, en, uk}        # «Rechnungsfraktionen» / «Accounting fractions» / …
#     content: {de}               # period-German prose; safe HTML
#   - kind: phase_header
#     title: {de, en, uk}
#   - kind: phase_summary
#     content: {de}               # short framed paragraph (rendered as .ps-block)
#
# Sort order on the landing page is CHRONOLOGICAL — by start year,
# parsed from the `years_label.de` prefix (handles forms like
# «1559 → 1871», «ca. 1600 → 1797», «18. Jh. → 1875»: a 4-digit
# 1500–1999 year wins; otherwise an «NN. Jh.» century-form parses
# to (NN-1) × 100). Per-entry escape hatch: an explicit
# `year_from: int` field overrides the parser. Stable secondary
# sort by YAML insertion order resolves ties. The `order: float`
# mechanism that drives location-page timeline bars does NOT
# apply here — the landing intentionally surfaces a chronological
# view.

entries:

