          - key: {de: "Marck S.-H. Courant", en: "Marck S.-H. Courant", uk: "Marck S.-H. Courant"}
            value:
              de: "<b>6,74179 g</b> fein (= 20,22538 / 3) = 16 Schilling S.-H. Courant"
              en: "<b>6.74179 g</b> fine (= 20.22538 / 3) = 16 Schilling S.-H. Courant"
              uk: "<b>6,74179 г</b> чистого (= 20,22538 / 3) = 16 Schilling S.-H. Courant"
      - kind: prose
        label:
          de: "Rechnungsfraktionen (Schilling S.-H. Courant)"
          en: "Accounting fractions (Schilling S.-H. Courant)"
          uk: "Розрахункові фракції (Schilling S.-H. Courant)"
        content:
          de: |
            <b>1 Reichsthaler Species</b> = 60 Schilling S.-H. Courant = 720 Pfennig<br>
            <b>1 Reichsthaler Sch.-H. Courant</b> = 4/5 Reichsthaler Species = 48 Schilling S.-H. Courant = 576 Pfennig<br>
            <b>1 Marck S.-H. Courant</b> = 16 Schilling S.-H. Courant = 192 Pfennig<br>
            <b>1 Schilling S.-H. Courant</b> = 12 Pfennig; ½ Sch. = Sechsling; ¼ Sch. = Dreiling<br>
            <em>Keine 1-Schilling-Münze geprägt; stattdessen 2-Sechsling.</em><br>
            <em>Abgeleiteter Marckfuß: 34 11/16 — nur moderner Vergleichswert (Bobzin), nicht zeitgenössische Bezeichnung.</em>
          en: |
            <b>1 Reichsthaler Species</b> = 60 Schilling S.-H. Courant = 720 Pfennig<br>
            <b>1 Reichsthaler Sch.-H. Courant</b> = 4/5 Reichsthaler Species = 48 Schilling S.-H. Courant = 576 Pfennig<br>
            <b>1 Marck S.-H. Courant</b> = 16 Schilling S.-H. Courant = 192 Pfennig<br>
            <b>1 Schilling S.-H. Courant</b> = 12 Pfennig; ½ Sch. = Sechsling; ¼ Sch. = Dreiling<br>
            <em>No 1-Schilling coin was struck; in its place the 2-Sechsling.</em><br>
            <em>Derived Marck standard: 34 11/16 — modern comparative value (Bobzin) only, not a period term.</em>
          uk: |
            <b>1 Reichsthaler Species</b> = 60 Schilling S.-H. Courant = 720 Pfennig<br>
            <b>1 Reichsthaler Sch.-H. Courant</b> = 4/5 Reichsthaler Species = 48 Schilling S.-H. Courant = 576 Pfennig<br>
            <b>1 Marck S.-H. Courant</b> = 16 Schilling S.-H. Courant = 192 Pfennig<br>
            <b>1 Schilling S.-H. Courant</b> = 12 Pfennig; ½ Sch. = Sechsling; ¼ Sch. = Dreiling<br>
            <em>1-Schilling монета не карбувалась; натомість карбувався 2-Sechsling.</em><br>
            <em>Похідний Marckfuß: 34 11/16 — лише сучасний порівняльний показник (Bobzin), не період-атестована назва.</em>
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Regionaler Standard 17. Jh.:</b> Schleswig-Holstein, Hamburg, Lübeck — gemeinsamer Speciesthaler-Standard vor Einführung der Courantwährungen.<br>
          <b>biß 1788 — Dänisch-norwegischer Verbund:</b> Holstein, Schleswig, Pinneberg, Rantzau als Teil des Dänischen Gesamtstaats.<br>
          <b>Münzstätten:</b> Kopenhagen (Hauptprägestätte); Glückstadt (Holstein, biß 1771); Altona (ab 1771)<sup><a href="#ref10">[10]</a></sup>.<br>
          <b>ab 1777 — Altonaer Bank:</b> 9¼-Fuß als formaler Bancostandard (Altonaer Banco-Fuß); löste den Hamburgischen 9-Fuß-Banco im regionalen Verkehr ab<sup><a href="#ref8">[8]</a></sup>.<br>
          <b>ab 29. Februar 1788 — Schleswig-Holsteinische Speciesbank, Altona:</b> gegründet zugleich mit der Forordning vom 29. Febr. 1788; erste Banknoten (Species Bank-Zettel) in Thaler Specie; weitere Banknoten auf Schilling S.-H. Courant lautend. Holstein/Schleswig/Pinneberg/Rantzau als eigenständiger Währungsraum<sup><a href="#ref9">[9]</a></sup>.<br>
          <b>Münzprägung Specie 1788–1808 und 1825–1849</b> (Altona, Kopenhagen).<br>
          <b>1813:</b> Münzprägung Specie eingestellt (dänischer Staatsbankrott → Rigsbankdalerfuß tritt in Kraft); Specie als Rechnungsbasis im holsteinischen Alltag fortgeführt.<br>
          <b>1864:</b> Ende der Schleswig-Holsteinischen Courantrechnung mit preuß./österr. Annexion nach Deutsch-Dänischem Krieg.<br>
          <b>1868:</b> Letzte Holstein-Speciedaler-Prägung (2-Rigsdaler unter Christian IX., Altona).<br>
          <b>Dänemark-weit:</b> als Rigsdaler Species im dänisch-norwegischen Gesamtstaat fortlaufend gebräuchlich; Handelsmünze im gesamten Ostseeraum.
        en: |
          <b>Regional standard, 17th century:</b> Schleswig-Holstein, Hamburg, Lübeck — common Speciedaler standard before the introduction of the Courant currencies.<br>
          <b>Until 1788 — Danish-Norwegian union:</b> Holstein, Schleswig, Pinneberg, Rantzau as part of the Danish realm.<br>
          <b>Mints:</b> Copenhagen (principal); Glückstadt (Holstein, until 1771); Altona (from 1771)<sup><a href="#ref10">[10]</a></sup>.<br>
          <b>From 1777 — Altonaer Bank:</b> the 9¼-Fuß formalised as the bank's coinage standard (Altonaer Banco-Fuß); replaced the Hamburg 9-Fuß banco in regional commerce<sup><a href="#ref8">[8]</a></sup>.<br>
          <b>From 29 February 1788 — Schleswig-Holstein Speciesbank, Altona:</b> founded together with the Forordning of 29 Feb. 1788; first banknotes (Species Bank-Zettel) in Thaler Specie; later banknotes denominated in Schilling S.-H. Courant. Holstein/Schleswig/Pinneberg/Rantzau as an independent monetary zone<sup><a href="#ref9">[9]</a></sup>.<br>
          <b>Specie coinage 1788–1808 and 1825–1849</b> (Altona, Copenhagen).<br>
          <b>1813:</b> Specie coinage suspended (Danish state bankruptcy → Rigsbankdalerfuß takes effect); Specie retained as the accounting base in everyday Holstein use.<br>
          <b>1864:</b> End of Schleswig-Holstein Courant accounting with Prussian/Austrian annexation after the Second Schleswig War.<br>
          <b>1868:</b> Last Holstein Speciedaler issue (2-Rigsdaler under Christian IX, Altona).<br>
          <b>Denmark-wide:</b> as Rigsdaler Species, continuously in use within the Danish-Norwegian realm; trade coin throughout the entire Baltic region.
        uk: |
          <b>Регіональний стандарт XVII ст.:</b> Шлезвіг-Гольштейн, Гамбург, Любек — спільний Speciedaler-стандарт до запровадження курантних валют.<br>
          <b>До 1788 — данcько-норвезький союз:</b> Гольштейн, Шлезвіг, Піннеберг, Ранцау як частина Данського королівства.<br>
          <b>Монетні двори:</b> Копенгаген (головний); Глюкштадт (Гольштейн, до 1771); Альтона (з 1771)<sup><a href="#ref10">[10]</a></sup>.<br>
          <b>З 1777 — Altonaer Bank:</b> 9¼-Fuß формалізовано як банковий монетний стандарт (Altonaer Banco-Fuß); замістила гамбурзьку 9-Fuß-banco в регіональному обігу<sup><a href="#ref8">[8]</a></sup>.<br>
          <b>З 29 лютого 1788 — Schleswig-Holsteinische Speciesbank, Альтона:</b> заснована одночасно з Forordning від 29 лютого 1788; перші банкноти (Species Bank-Zettel) у Thaler Specie; пізніші банкноти номіновані в Schilling S.-H. Courant. Гольштейн/Шлезвіг/Піннеберг/Ранцау як самостійна валютна зона<sup><a href="#ref9">[9]</a></sup>.<br>
          <b>Карбування Specie 1788–1808 та 1825–1849</b> (Альтона, Копенгаген).<br>
          <b>1813:</b> карбування Specie припинено (данське державне банкрутство → запроваджено Rigsbankdaler-стопу); Specie збережено як розрахункову основу у повсякденному гольштейнському обігу.<br>
          <b>1864:</b> кінець шлезвіг-гольштейнської курантної лічби з прусько-австрійською анексією після Другої шлезвізької війни.<br>
          <b>1868:</b> останнє карбування гольштейнського Speciedaler (2-Rigsdaler за Крістіана IX, Альтона).<br>
          <b>По всій Данії:</b> як Rigsdaler Species, безперервно в обігу в данcько-норвезькій державі; торгова монета по всьому Балтійському регіону.

