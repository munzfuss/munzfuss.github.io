    subtitle:
      de: "Cöllnische Marck = 233,856 g Feinsilber · 875 ‰ (14 Loth) · gemeinsamer Speciesthaler-Standard von Schleswig-Holstein, Hamburg und Lübeck im 17. Jh. · drei territorial-administrative Stempelungen: Dänisch-norwegischer Verbund (biß 1788), Altonaer Banco-Fuß (ab 1777), Schleswig-Holsteinische Courantwährung (ab 1788) · Münzprägung 1813 eingestellt, als Rechnungsbasis biß 1864 fortgeführt; letzte Holsteinprägung 1868."
      en: "Cöllnische Marck = 233.856 g fine silver · 875 ‰ (14 Loth) · the common Speciedaler standard of Schleswig-Holstein, Hamburg and Lübeck in the 17th century · three territorial-administrative stamps: Danish-Norwegian union (until 1788), Altona Banco standard (from 1777), Schleswig-Holstein Courant currency (from 1788) · coinage suspended 1813, retained as accounting base until 1864; last Holstein issue 1868."
      uk: "Кельнська марка = 233,856 г чистого срібла · 875 ‰ (14 Лот) · спільний Speciedaler-стандарт Шлезвіг-Гольштейну, Гамбурга й Любека у XVII ст. · три територіально-адміністративні редакції: данcько-норвезький союз (до 1788), Альтонська Banco-Fuß (з 1777), шлезвіг-гольштейнська курантна валюта (з 1788) · карбування припинено 1813, як розрахункова основа збережено до 1864; останнє карбування в Гольштейні 1868."
