        de: |
          <b>biß 1821 — 1 Thaler Courant</b> = 24 Gute Groschen Courant = 288 Pfennig Courant<br>
          <b>biß 1821 — 1/6 Thaler</b> = 4 Gute Groschen Courant = 48 Pfennig Courant<br>
          <b>ab 1821 — 1 Thaler</b> = 30 Silbergroschen = 360 Pfennig<br>
