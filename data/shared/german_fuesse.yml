          uk: "<b>1 Thaler Courant</b> = 3 Marck Courant = 48 Schilling Courant = 576 Pfennig = <b>20,04480 г</b><br>\n<b>2½ Marck Courant</b> = 1 прусський Thaler (14-Thalerfuß) = <b>16,70400 г</b> (точно)<br>\n<b>1 Marck Courant</b> = 16 Schilling = 192 Pfennig<br>\n<b>1 Schilling Courant</b> = 12 Pfennig · ½ Sch. = Sechsling · ¼ Sch. = Dreiling<br>\n<em>Speciedaler більше не виступає базою; 25,98400 / 20,04480 = 1,2963 — чистого дробу немає</em>\n"
    territories:
