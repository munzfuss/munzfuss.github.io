      # Phase B — 1777 Altonaer Banco-Fuß
      - kind: phase_header
        title:
          de: "ab 1777 · Altonaer Banco-Fuß · Mark-Banco-Stückelung"
          en: "From 1777 · Altona Banco standard · Mark Banco denomination"
          uk: "Від 1777 · Альтонська Banco-Fuß · номінал у Mark Banco"
      - kind: phase_summary
        content:
          de: '<b>27¾ Marck Banco = 9¼ Reichsthaler = 1 feine Cöllnische Marck</b> — formaler Müntzfuß der königlich-dänischen Altonaer Bank nach Altonaer Bankordnung §19; numerisch identisch mit dem 9¼-Thaler-Fuß-Speciedaler-Standard, nur in Mark Banco statt Reichsthaler stückeliert (1 Marck Banco = ⅓ Thaler Specie ≈ 8,42724 g fein)<sup><a href="#ref8">[8]</a></sup>. Bevorzugung gegenüber dem Hamburger 27⅝ Banco-Fuß: Silber strömte zur Altonaer Bank (Greshamsche Wirkung). Löste den Hamburgischen 9-Fuß-Banco im regionalen holsteinischen Verkehr ab.'
          en: '<b>27¾ Marck Banco = 9¼ Reichsthaler = 1 fine Cöllnische Marck</b> — formal coinage standard of the Royal Danish Altonaer Bank per Altonaer Bankordnung §19; numerically identical with the 9¼-Thaler-Fuß Speciedaler standard, just denominated in Marck Banco rather than Reichsthaler (1 Marck Banco = ⅓ Thaler Specie ≈ 8.42724 g fine)<sup><a href="#ref8">[8]</a></sup>. Favoured over the Hamburg 27⅝ Banco standard: silver flowed to the Altonaer Bank (Gresham''s effect). Replaced the Hamburg 9-Fuß banco in regional Holstein commerce.'
          uk: '<b>27¾ Marck Banco = 9¼ Reichsthaler = 1 чиста Кельнська марка</b> — формальний Müntzfuß королівсько-данської Altonaer Bank за Altonaer Bankordnung §19; числово тотожний 9¼-Thaler-Fuß-Speciedaler-стандарту, лише виражений у Marck Banco замість Reichsthaler (1 Marck Banco = ⅓ Thaler Specie ≈ 8,42724 г чистого)<sup><a href="#ref8">[8]</a></sup>. Перевага над гамбурзькою 27⅝-Banco-Fuß: срібло перетікало до Altonaer Bank (ефект Грешема). Замістила гамбурзьку 9-Fuß-banco в регіональному гольштейнському обігу.'

