    uk: "Королівський жиро- і ломбардний банк Берлін · засновано 17 червня 1765 · Прусська монетна марка = 233,856 г чистого срібла · номінальний паритет: 1 фунт Banco = ¼ Friedrichsdor (стабільність короткотермінова — Banco-фунт одразу впав нижче паритету) · розрахункова система зберігалась до 1847"
