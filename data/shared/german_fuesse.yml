    subtitle:
      de: 'Frederik IV. 1714 (Großer Nordischer Krieg, 81½/Mark, 2,511 g fein) · Frederik-V-Reform 1757 (75/Mark, 2,728 g fein, .875 Probe) · spezifisch dänisches tarif-tragendes Goldregime: <b>1 Kurantdukat = 12 Mark Dansk = 2 Rigsdaler Courant</b><sup><a href="#ref39">[39]</a></sup> · in Schleswig-Holstein durch Altonaer Münze ab 1771<sup><a href="#ref37">[37]</a></sup> · letzte Prägung 1796<sup><a href="#ref36">[36]</a></sup> · faktische Demonetisierung 1873 (Skandinavische Münzunion)'
      en: 'Frederik IV 1714 (Great Northern War, 81½ per Mark, 2.511 g fine) · Frederik V reform 1757 (75 per Mark, 2.728 g fine, .875 fineness) · a specifically Danish tariff-bearing gold regime: <b>1 Kurantdukat = 12 Mark Dansk = 2 Rigsdaler Courant</b><sup><a href="#ref39">[39]</a></sup> · in Schleswig-Holstein via the Altona mint from 1771<sup><a href="#ref37">[37]</a></sup> · last issue 1796<sup><a href="#ref36">[36]</a></sup> · factual demonetisation 1873 (Scandinavian Monetary Union)'
      uk: 'Frederik IV 1714 (Велика Північна війна, 81½/марки, 2,511 г чистого) · реформа Frederik V 1757 (75/марки, 2,728 г чистого, проба .875) · специфічно данський тариф-несучий золотий режим: <b>1 Kurantdukat = 12 Mark Dansk = 2 Rigsdaler Courant</b><sup><a href="#ref39">[39]</a></sup> · у Шлезвіг-Гольштейні через Альтонський монетний двір з 1771<sup><a href="#ref37">[37]</a></sup> · остання прягеа 1796<sup><a href="#ref36">[36]</a></sup> · фактична демонетизація 1873 (Скандинавська монетна унія)'
    body:
      - kind: rows
        items:
          - key: {de: "Feinheit", en: Fineness, uk: Проба}
            value:
              de: "21 Karat = <b>875 ‰</b> (= 0,875) · konstant in beiden Phasen<sup><a href=\"#ref36\">[36]</a></sup>"
              en: "21 carats = <b>875 ‰</b> (= 0.875) · constant in both phases<sup><a href=\"#ref36\">[36]</a></sup>"
