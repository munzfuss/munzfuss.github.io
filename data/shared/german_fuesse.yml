# 4. Conventions-Fuß · 20-Gulden-Fuß / 10-Thaler-Fuß
# ------------------------------------------------------------------
  - id: conventions_fuss
    metal: silver
    years_label:
      de: "1750/1753 → 1856"
      en: "1750/1753 → 1856"
      uk: "1750/1753 → 1856"
    name: 20-Gulden-Fuß · 10-Thaler-Fuß
    historical_name: Conventions-Fuß
    subtitle:
      de: 'AD NORMAM CONVENTIONIS · Konventionsthaler in Österreich 7. November 1750<sup><a href="#ref18">[18]</a></sup> · Müntzconvention mit Bayern 20. September 1753<sup><a href="#ref18">[18]</a><a href="#ref26">[26]</a></sup> · Wiener Müntzmarck = 233,890 g · Bayrische Müntzmarck = 233,950 g · Normwert (Cöllnische Marck) = 233,856 g Feinsilber · in Deutschland biß 1838, in Österreich biß 1856'
      en: 'AD NORMAM CONVENTIONIS · Konventionsthaler in Austria 7 November 1750<sup><a href="#ref18">[18]</a></sup> · Convention with Bavaria 20 September 1753<sup><a href="#ref18">[18]</a><a href="#ref26">[26]</a></sup> · Wiener Müntzmarck = 233.890 g · Bayrische Müntzmarck = 233.950 g · normative Cöllnische Marck = 233.856 g fine silver · in Germany until 1838, in Austria until 1856'
      uk: 'AD NORMAM CONVENTIONIS · Konventionsthaler в Австрії 7 листопада 1750<sup><a href="#ref18">[18]</a></sup> · Конвенція з Баварією 20 вересня 1753<sup><a href="#ref18">[18]</a><a href="#ref26">[26]</a></sup> · Віденська монетна марка = 233,890 г · Баварська = 233,950 г · нормативна Кельнська марка = 233,856 г чистого срібла · у Німеччині до 1838, в Австрії до 1856'
    body:
      - kind: rows
        items:
          - key: {de: "Feingewicht (Wien)", en: Fine weight (Vienna), uk: Чиста вага (Відень)}
            value: {de: "<b>23,38900 g</b> (= 233,890 / 10) · »X EINE FEINE MARK«", en: <b>23.38900 g</b> (= 233.890 / 10) · «X EINE FEINE MARK», uk: '<b>23,38900 г</b> (= 233,890 / 10) · «X EINE FEINE MARK»'}
          - key: {de: "Feingewicht (Bayern)", en: Fine weight (Bavaria), uk: Чиста вага (Баварія)}
            value: {de: "<b>23,39500 g</b> (= 233,950 / 10)", en: <b>23.39500 g</b> (= 233.950 / 10), uk: '<b>23,39500 г</b> (= 233,950 / 10)'}
          - key: {de: "Feingewicht (Normwert)", en: Fine weight (normative), uk: Чиста вага (нормативна)}
            value: {de: "<b>23,3856 g</b> (= 233,856 / 10)", en: <b>23.3856 g</b> (= 233.856 / 10), uk: '<b>23,3856 г</b> (= 233,856 / 10)'}
          - key: {de: "Raugewicht", en: Rough weight, uk: Повна вага}
            value: {de: "28,06680 g · 833,33 ‰", en: 28.06680 g · 833.33 ‰, uk: '28,06680 г · 833,33 ‰'}
          - key: {de: "½ Conv.-Thaler (Wien)", en: ½ Conv. Thaler (Vienna), uk: ½ Conv. Thaler (Відень)}
            value: {de: "<b>11,6945 g</b> fein", en: <b>11.6945 g</b> fine, uk: '<b>11,6945 г</b> чистого'}
      - kind: prose
        label:
          de: "Rechnungsfraktionen"
          en: "Accounting fractions"
          uk: "Розрахункові фракції"
        content:
          de: |
            <b>1 Conventionsthaler</b> (Österreich) = 120 Kreutzer = 2 Conventionsgulden<br>
            <b>1 Conventionsthaler</b> (Süddtl., ab 1754) = 144 Kreutzer = 2 Gulden 24 Kreutzer<br>
            <b>1 Conventionsgulden</b> = 60 Kreutzer = 240 Pfennig<br>
            <b>¼ Conventionsthaler</b> = 30 Kreutzer (Österr.) = 36 Kreutzer (Süddtl.)<br>
            <b>1 Kreutzer</b> = 4 Pfennig = 8 Heller<br>
            <b>1 Pfennig</b> = 2 Heller<br>
            <b>1 Conventionsthaler</b> (norddeutsch bewertet) = 32 Gute Groschen Courant = 4/3 Thaler Courant (14-Thaler-Fuß)<br>
            <em>Nach Silbergehalt: 1 Conv.thaler ≈ 9/10 Thaler Specie (23,386 / 25,984 = 0,900)</em><br>
            <em><b>Woher 13⅓-Fuß:</b> 10 Conventionsthaler je Mark, aber 1 Conv.thaler = 32 Groschen = 4/3 alter Rechnungsreichsthaler (zu 24 Groschen) → 10 × 4/3 = <b>40/3 = 13⅓</b> Rechnungsreichsthaler je Mark. Als Rechnungseinheit in Norddeutschland allgemein gebräuchlich; als eigenständige Münze im <b>13⅓-Couranttaler-Fuß</b> geprägt — siehe eigene Kartei.</em>
          en: "<b>1 Conventionsthaler</b> (Austria) = 120 Kreutzer = 2 Conventionsgulden<br>\n<b>1 Conventionsthaler</b> (South Germany, from 1754) = 144 Kreutzer = 2 Gulden 24 Kreutzer<br>\n<b>1 Conventionsgulden</b> = 60 Kreutzer = 240 Pfennig<br>\n<b>¼ Conventionsthaler</b> = 30 Kreutzer (Austria) = 36 Kreutzer (South Germany)<br>\n<b>1 Kreutzer</b> = 4 Pfennig = 8 Heller<br>\n<b>1 Pfennig</b> = 2 Heller<br>\n<b>1 Conventionsthaler</b> (valued in North German terms) = 32 Gute Groschen Courant = 4/3 Thaler Courant (14-Thaler-Fuß)<br>\n<em>By silver content: 1 Conv. thaler ≈ 9/10 Thaler Specie (23.386 / 25.984 = 0.900)</em><br>\n<em><b>Why 13⅓-Fuß:</b> 10 Conventionsthaler per mark, but 1 Conv. thaler = 32 Groschen = 4/3 of the old accounting Reichsthaler (at 24 Groschen) → 10 × 4/3 = <b>40/3 = 13⅓</b> accounting Reichsthaler per mark. Used universally as an accounting unit in North Germany; struck as a separate coin on the <b>13⅓-Couranttaler standard</b> — see its own card.</em>\n"
          uk: "<b>1 Conventionsthaler</b> (Австрія) = 120 Kreutzer = 2 Conventionsgulden<br>\n<b>1 Conventionsthaler</b> (Південна Німеччина, з 1754) = 144 Kreutzer = 2 Gulden 24 Kreutzer<br>\n<b>1 Conventionsgulden</b> = 60 Kreutzer = 240 Pfennig<br>\n<b>¼ Conventionsthaler</b> = 30 Kreutzer (Австрія) = 36 Kreutzer (Південна Німеччина)<br>\n<b>1 Kreutzer</b> = 4 Pfennig = 8 Heller<br>\n<b>1 Pfennig</b> = 2 Heller<br>\n<b>1 Conventionsthaler</b> (за північно-німецькою оцінкою) = 32 Gute Groschen Courant = 4/3 Thaler Courant (14-Thaler-Fuß)<br>\n<em>За вмістом срібла: 1 Conv. Thaler ≈ 9/10 Thaler Specie (23,386 / 25,984 = 0,900)</em><br>\n<em><b>Звідки 13⅓-Thaler-Fuß:</b> 10 Conventionsthaler з марки, але 1 Conv. Thaler = 32 Groschen = 4/3 старого розрахункового Reichsthaler (по 24 Groschen) → 10 × 4/3 = <b>40/3 = 13⅓</b> розрахункових Reichsthaler з марки. Як розрахункова одиниця широко вживалось у Північній Німеччині; як самостійна монета карбувалась за <b>13⅓-Couranttaler-Fuß</b> — див. окрему картку.</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Österreich:</b> 7. November 1750–1856 (einschließlich aller Habsburger Erblande; Tirol, Böhmen, Mähren, Ungarn, Österreichische Niederlande)<sup><a href="#ref18">[18]</a></sup>.<br>
          <b>Bayern:</b> Müntzconvention mit Österreich 20. September 1753<sup><a href="#ref18">[18]</a></sup>; 1753–1754 nach 20-Gulden-Fuß, dann Übergang zum 24-Gulden-Fuß mit Kurs 144 Kreutzer statt 120.<br>
          <b>Verbreitung biß 1763 (Meyers eLexikon period-source):</b> «<i>infolge einer 1753 zwischen Österreich und Bayern abgeschlossenen Konvention, welcher später bis 1763 der bayrische, schwäbische, ober- und niederrheinische Kreis sowie der Kurfürst und die Herzöge von Sachsen beitraten</i>»<sup><a href="#ref26">[26]</a></sup> — d. h. die vier Reichskreise Bayern, Schwaben, Ober- und Niederrhein sowie das Kurfürstentum Sachsen folgen biß 1763.<br>
          <b>Kursachsen:</b> 1763–1838 (volle Annahme nach Siebenjährigem Krieg).<br>
          <b>Hannover:</b> 1817–1834 (Annahme des Conventionsfußes 1817; 1834 Übergang zum preußischen 14-Thaler-Fuß).<br>
          <b>Weitere Stände:</b> Hildesheim (biß 1803); Oldenburg; Mecklenburg-Strelitz; Braunschweig-Wolfenbüttel (zeitweise).<br>
          <b>Nicht angenommen:</b> Preußen (Graumannscher 14-Thaler-Fuß seit 14. Julii 1750, fester gestaltet durch Edikt vom 29. März 1764)<sup><a href="#ref26">[26]</a></sup>; Hansestädte; Holstein.<br>
          <b>9 → 13⅓-Substitution (Künker):</b> «<i>Umgerechnet in den theoretischen (Zähl-)Reichstaler des alten deutschen Reiches zu 24 Groschen entsprach der Konventionstaler einem 13⅓-Taler-Fuß ... anstelle des 1566 vereinbarten 9-Taler-Fußes</i>»<sup><a href="#ref24">[24]</a></sup> — der Konventionstaler ist mathematisch der formale Nachfolger des Reichsthaler-Specie 9-Fuß im Empire-Standard-Sinn (Wikipedia DE «Konventionstaler»: «<i>als Quasi-Nachfolger des Reichstalers</i>»)<sup><a href="#ref18">[18]</a></sup>.
        en: |
          <b>Austria:</b> 7 November 1750–1856 (including all Habsburg hereditary lands; Tyrol, Bohemia, Moravia, Hungary, Austrian Netherlands)<sup><a href="#ref18">[18]</a></sup>.<br>
          <b>Bavaria:</b> Müntzconvention with Austria 20 September 1753<sup><a href="#ref18">[18]</a></sup>; 1753–1754 on the 20-Gulden-Fuß, then shifted to the 24-Gulden-Fuß with a rate of 144 Kreutzer instead of 120.<br>
          <b>Spread by 1763 (Meyers eLexikon period source):</b> «<i>infolge einer 1753 zwischen Österreich und Bayern abgeschlossenen Konvention, welcher später bis 1763 der bayrische, schwäbische, ober- und niederrheinische Kreis sowie der Kurfürst und die Herzöge von Sachsen beitraten</i>»<sup><a href="#ref26">[26]</a></sup> — i.e. by 1763 the four Reichskreise Bavaria, Swabia, Upper and Lower Rhine plus the Electorate of Saxony joined.<br>
          <b>Electoral Saxony:</b> 1763–1838 (full adoption after the Seven Years' War).<br>
          <b>Hanover:</b> 1817–1834 (adopted Conventions-Fuß 1817; 1834 shifted to the Prussian 14-Thaler-Fuß).<br>
          <b>Other estates:</b> Hildesheim (until 1803); Oldenburg; Mecklenburg-Strelitz; Brunswick-Wolfenbüttel (intermittently).<br>
          <b>Did not adopt:</b> Prussia (Graumannscher 14-Thaler-Fuß from 14 July 1750, consolidated by edict of 29 March 1764)<sup><a href="#ref26">[26]</a></sup>; the Hanseatic cities; Holstein.<br>
          <b>9 → 13⅓ substitution (Künker):</b> «<i>Umgerechnet in den theoretischen (Zähl-)Reichstaler des alten deutschen Reiches zu 24 Groschen entsprach der Konventionstaler einem 13⅓-Taler-Fuß ... anstelle des 1566 vereinbarten 9-Taler-Fußes</i>»<sup><a href="#ref24">[24]</a></sup> — the Konventionstaler is mathematically the formal successor of the Reichsthaler-Specie 9-Fuß in the Empire-standard sense (Wikipedia DE «Konventionstaler»: «<i>als Quasi-Nachfolger des Reichstalers</i>»)<sup><a href="#ref18">[18]</a></sup>.
        uk: |
          <b>Австрія:</b> 7 листопада 1750–1856 (включно з усіма габсбурзькими спадковими землями; Тироль, Богемія, Моравія, Угорщина, Австрійські Нідерланди)<sup><a href="#ref18">[18]</a></sup>.<br>
          <b>Баварія:</b> Müntzconvention з Австрією 20 вересня 1753<sup><a href="#ref18">[18]</a></sup>; 1753–1754 за 20-Gulden-Fuß, потім перехід до 24-Gulden-Fuß з курсом 144 Kreutzer замість 120.<br>
          <b>Поширення до 1763 (Meyers eLexikon, період-джерело):</b> «<i>infolge einer 1753 zwischen Österreich und Bayern abgeschlossenen Konvention, welcher später bis 1763 der bayrische, schwäbische, ober- und niederrheinische Kreis sowie der Kurfürst und die Herzöge von Sachsen beitraten</i>»<sup><a href="#ref26">[26]</a></sup> — тобто до 1763 приєднались чотири імперські кола Баварія, Швабія, Верхньо- і Нижньорейнський + Курфюрство Саксонія.<br>
          <b>Курсаксонія:</b> 1763–1838 (повне прийняття після Семирічної війни).<br>
          <b>Ганновер:</b> 1817–1834 (прийняття Конвенційної стопи 1817; 1834 перехід до прусської 14-Thaler-Fuß).<br>
          <b>Інші стани:</b> Гільдесгайм (до 1803); Ольденбург; Мекленбург-Стреліц; Брауншвайг-Вольфенбюттель (час від часу).<br>
          <b>Не прийняли:</b> Пруссія (Graumannscher 14-Thaler-Fuß з 14 липня 1750, закріплено едиктом від 29 березня 1764)<sup><a href="#ref26">[26]</a></sup>; ганзейські міста; Гольштейн.<br>
          <b>9 → 13⅓-заміщення (Künker):</b> «<i>Umgerechnet in den theoretischen (Zähl-)Reichstaler des alten deutschen Reiches zu 24 Groschen entsprach der Konventionstaler einem 13⅓-Taler-Fuß ... anstelle des 1566 vereinbarten 9-Taler-Fußes</i>»<sup><a href="#ref24">[24]</a></sup> — Konventionstaler математично є формальним наступником Reichsthaler-Specie 9-Fuß у сенсі імперського стандарту (Wikipedia DE «Konventionstaler»: «<i>als Quasi-Nachfolger des Reichstalers</i>»)<sup><a href="#ref18">[18]</a></sup>.

