          en: "<b>1 Vereinsmünze</b> = 2 Thaler = 3½ Gulden = 210 Kreutzer<br>\n<b>1 Gulden</b> = 60 Kreutzer = 15 Batzen = 240 Pfennig<br>\n<b>1 Batzen</b> = 4 Kreutzer = 16 Pfennig<br>\n<b>1 Kreutzer</b> = 4 Pfennig<br>\n<b>1 Thaler</b> = 1¾ Gulden = 105 Kreutzer = 26¼ Batzen<br>\n<b>½ Gulden</b> = 30 Kreutzer = 7½ Batzen\n"
          uk: "<b>1 Vereinsmünze</b> = 2 Thaler = 3½ Gulden = 210 Kreutzer<br>\n<b>1 Gulden</b> = 60 Kreutzer = 15 Batzen = 240 Pfennig<br>\n<b>1 Batzen</b> = 4 Kreutzer = 16 Pfennig<br>\n<b>1 Kreutzer</b> = 4 Pfennig<br>\n<b>1 Thaler</b> = 1¾ Gulden = 105 Kreutzer = 26¼ Batzen<br>\n<b>½ Gulden</b> = 30 Kreutzer = 7½ Batzen\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Gründer (Münchener Vertrag 25. Aug. 1837):</b> Bayern, Württemberg, Baden, Hessen-Darmstadt, Nassau, Frankfurt.<br>
          <b>Beigetreten 1838–1839:</b> Sachsen-Meiningen; Hohenzollern-Sigmaringen und -Hechingen; Hessen-Homburg; Schwarzburg-Rudolstadt.<br>
          <b>Sachsen:</b> Prägte ab 1838 die gemeinsame Vereinsmünze (2 Thaler = 3½ Gulden).<br>
          <b>1857:</b> Übergang zum Wiener Münzvertrag (30-Thalerfuß); Gulden-Rechnung bleibt mit neuem Grundgewicht (Zollpfund).
        en: |
          <b>Founders (Munich Treaty, 25 Aug. 1837):</b> Bavaria, Württemberg, Baden, Hesse-Darmstadt, Nassau, Frankfurt.<br>
          <b>Acceded 1838–1839:</b> Saxe-Meiningen; Hohenzollern-Sigmaringen and -Hechingen; Hesse-Homburg; Schwarzburg-Rudolstadt.<br>
          <b>Saxony:</b> Struck the joint Vereinsmünze (2 Thaler = 3½ Gulden) from 1838.<br>
          <b>1857:</b> Transition to the Vienna Mint Treaty (30-Thalerfuß); Gulden reckoning continues with a new base weight (Zollpfund).
        uk: |
          <b>Засновники (Мюнхенський договір, 25 серпня 1837):</b> Баварія, Вюртемберг, Баден, Гессен-Дармштадт, Нассау, Франкфурт.<br>
          <b>Приєднались 1838–1839:</b> Саксен-Майнінген; Гогенцоллерн-Зіґмарінген і -Гехінген; Гессен-Гомбург; Шварцбург-Рудольштадт.<br>
          <b>Саксонія:</b> від 1838 карбувала спільну Vereinsmünze (2 Thaler = 3½ Gulden).<br>
          <b>1857:</b> перехід до Віденської монетної угоди (30-Thalerfuß); лічба в Gulden зберігається з новою базовою вагою (Zollpfund).

