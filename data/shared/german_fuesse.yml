        content:
          de: |
            <b>1 Thaler</b> Cassengeld = 24 Gute Groschen = 288 Pfennig = 36 Mariengroschen<br>
            <b>½ Thaler</b> = 12 Gute Groschen<br>
            <b>2/3 Thaler</b> = 16 Gute Groschen<br>
            <b>1 Guter Groschen</b> (n.d.L.F.) = 12 Pfennig ≈ 2 Groschen Conventionsmünze (Abschlag 8,33%)<br>
            <b>3 Mariengroschen</b> (n.d.L.F.) ≈ 3 Mgr. 2 Pf. Conventionsmünze (Abschlag 5,26%)<br>
            <em>Silber: 2250 Banco-Speciesthaler (= 250 Mark Feinsilber) umgemünzt → 126 Cassenthaler + 372 halbe + weitere Nominale; Münzgewinn 88 Thaler 23 Mgr. (nach Kretzschmar)</em>
          en: "<b>1 Thaler</b> Cassengeld = 24 Gute Groschen = 288 Pfennig = 36 Mariengroschen<br>\n<b>½ Thaler</b> = 12 Gute Groschen<br>\n<b>2/3 Thaler</b> = 16 Gute Groschen<br>\n<b>1 Guter Groschen</b> (per Leipziger Fuß) = 12 Pfennig ≈ 2 Groschen Convention coinage (discount 8.33%)<br>\n<b>3 Mariengroschen</b> (per Leipziger Fuß) ≈ 3 Mgr. 2 Pf. Convention coinage (discount 5.26%)<br>\n<em>Silver: 2250 Banco Speciedaler (= 250 Mark fine silver) recoined → 126 Cassenthaler + 372 halves + further denominations; mint profit 88 Thaler 23 Mgr. (per Kretzschmar)</em>\n"
          uk: "<b>1 Thaler</b> Cassengeld = 24 Gute Groschen = 288 Pfennig = 36 Mariengroschen<br>\n<b>½ Thaler</b> = 12 Gute Groschen<br>\n<b>2/3 Thaler</b> = 16 Gute Groschen<br>\n<b>1 Guter Groschen</b> (за Лейпцизькою стопою) = 12 Pfennig ≈ 2 Groschen конвенційної монети (знижка 8,33%)<br>\n<b>3 Mariengroschen</b> (за Лейпцизькою стопою) ≈ 3 Mgr. 2 Pf. конвенційної монети (знижка 5,26%)<br>\n<em>Срібло: 2250 Banco-Speciedaler (= 250 марок чистого срібла) перекарбовано → 126 Cassenthaler + 372 половинні + інші номінали; монетний прибуток 88 Thaler 23 Mgr. (за Kretzschmar)</em>\n"
    territories:
      label: {de: "Territorien", en: "Territories", uk: "Території"}
      content:
        de: |
          <b>Nur:</b> Kurfürstentum/Königreich Hannover (Braunschweig-Lüneburg-Calenberg) · Georg III. (1760–1820).<br>
          <b>Münzstätten:</b> Hannover (Wiedereröffnung 1801 nach Schließung 1781) · Clausthal (verwandte Nominale ohne «Cassengeld»-Aufschrift).<br>
          <b>Übergang:</b> 1817 Hannover → Conventionsfuß · 1834 → preuß. 14-Thaler-Fuß.<br>
          <b>Kontext:</b> Hannover hielt als einer der letzten Staaten am Leipziger 12-Thaler-Fuß fest. Eigentliche Cassengeld-Münzen (1 Thaler, ½ Thaler mit Aufschrift) wurden 1801 als einmalige Versuchsprägung und danach in regulärer Auflage ausgegeben; in anderen deutschen Staaten wurde das Wort «Cassengeld» nur als Buchungsbegriff verwendet, nie auf Münzen graviert.
        en: |
          <b>Only:</b> Electorate / Kingdom of Hanover (Brunswick-Lüneburg-Calenberg) · George III (1760–1820).<br>
          <b>Mints:</b> Hanover (re-opened 1801 after closure in 1781) · Clausthal (related denominations without the «Cassengeld» legend).<br>
          <b>Transition:</b> 1817 Hanover → Conventions-Fuß · 1834 → Prussian 14-Thaler-Fuß.<br>
          <b>Context:</b> Hanover was among the last states to hold to the Leipzig 12-Thaler-Fuß. The actual Cassengeld coins (1 Thaler, ½ Thaler with the legend) were issued in 1801 as a one-off trial run and then in regular issues; in other German states the word «Cassengeld» was only a bookkeeping term, never engraved onto coins.
        uk: |
          <b>Лише:</b> Курфюрство / Королівство Ганновер (Брауншвайг-Люнебург-Каленберг) · Георг III (1760–1820).<br>
          <b>Монетні двори:</b> Ганновер (заново відкрито 1801 після закриття 1781) · Клаусталь (споріднені номінали без напису «Cassengeld»).<br>
          <b>Перехід:</b> 1817 Ганновер → Конвенційна стопа · 1834 → прусська 14-Thaler-Fuß.<br>
          <b>Контекст:</b> Ганновер був серед останніх держав, що трималися Лейпцизької 12-Thaler-Fuß. Справжні Cassengeld-монети (1 Thaler, ½ Thaler з написом) вперше випущено 1801 як одноразову пробу, потім регулярним накладом; у інших німецьких державах слово «Cassengeld» було лише бухгалтерським терміном, ніколи не вигравірованим на монетах.

