    en: "Cabinet money of the Hanoverian state treasuries (Electorate of Hanover) · 1801 as trial issue, then main run · «I THALER HANNOVERISCH CASSEN GELD» · Cöllnische Marck = 233.856 g fine silver · official until adoption of the Convention standard in 1817"
    uk: "Кабінетні гроші ганноверських державних кас (Курганновер) · 1801 як пробне карбування, потім основний випуск · «I THALER HANNOVERISCH CASSEN GELD» · Кельнська марка = 233,856 г чистого срібла · офіційно до прийняття конвенційної стопи 1817"
  body:
    - kind: rows
      items:
        - key: {de: "Begriffsherkunft"}
          value: {de: "«Cassengeld» = in Hannover seit Mitte 18. Jh. das von Staatskassen offiziell akzeptierte Münzgeld nach dem <b>Leipziger Fuß (12-Thaler-Fuß)</b>; fremdes Leichtgeld (Conventionsmünzen etc.) nur mit Abschlag (8–10%) angenommen"}
        - key: {de: "Münzfuß 1801"}
          value: {de: "12⅓ Thaler aus der feinen Cöllnischen Marck · Feingewicht <b>18,961 g</b> (= 233,856 × 3/37) · leicht unter dem Leipziger Standard (19,488 g) · nicht vollwertig im Sinne des Graumannschen Fußes (nach Gerhard Schön)"}
        - key: {de: "Feingehalt"}
          value: {de: "ca. 12⅓ Lot ≈ <b>770‰</b> · Raugewicht ≈ <b>24,60 g</b> (empirisch: 18,961 / 0,7708)"}
        - key: {de: "Nominale mit «Cassengeld»-Aufschrift"}
          value: {de: "Nur <b>1 Thaler</b> (Welter 2804, Knyphausen 3548) und <b>½ Thaler</b> (Welter 2820/2849) trugen den Schriftzug «HANNOVERISCH CASSEN GELD» · Auflage 1801: 126 ganze, 372 halbe Thaler (Probemünzung); danach weitergeprägt in größerer Stückzahl"}
        - key: {de: "Verwandte Nominale (ohne Cassengeld-Aufschrift)"}
          value: {de: "2/3 Thaler (Welter 2810) · 3 Mariengroschen «Cassenmünze nach Conventionsmünze» (Welter 2848) · als Cassengeld-Scheidemünzen konzipiert, aber anders bezeichnet"}
    - kind: prose
      label: {de: "Rechnungsfraktionen", en: "Accounting fractions", uk: "Розрахункові фракції"}
      content:
        de: |
          <b>1 Thaler</b> Cassengeld = 24 Gute Groschen = 288 Pfennig = 36 Mariengroschen<br>
          <b>½ Thaler</b> = 12 Gute Groschen<br>
          <b>2/3 Thaler</b> = 16 Gute Groschen<br>
          <b>1 Guter Groschen</b> (n.d.L.F.) = 12 Pfennig ≈ 2 Groschen Conventionsmünze (Abschlag 8,33%)<br>
          <b>3 Mariengroschen</b> (n.d.L.F.) ≈ 3 Mgr. 2 Pf. Conventionsmünze (Abschlag 5,26%)<br>
          <em>Silber: 2250 Banco-Speciesthaler (= 250 Mark Feinsilber) umgemünzt → 126 Cassenthaler + 372 halbe + weitere Nominale; Münzgewinn 88 Thaler 23 Mgr. (nach Kretzschmar)</em>
  territories:
    label: {de: "Territorien", en: "Territories", uk: "Території"}
    content:
      de: |
        <b>Nur:</b> Kurfürstentum/Königreich Hannover (Braunschweig-Lüneburg-Calenberg) · Georg III. (1760–1820).<br>
        <b>Münzstätten:</b> Hannover (Wiedereröffnung 1801 nach Schließung 1781) · Clausthal (verwandte Nominale ohne «Cassengeld»-Aufschrift).<br>
        <b>Übergang:</b> 1817 Hannover → Conventionsfuß · 1834 → preuß. 14-Thaler-Fuß.<br>
        <b>Kontext:</b> Hannover hielt als einer der letzten Staaten am Leipziger 12-Thaler-Fuß fest. Eigentliche Cassengeld-Münzen (1 Thaler, ½ Thaler mit Aufschrift) wurden 1801 als einmalige Versuchsprägung und danach in regulärer Auflage ausgegeben; in anderen deutschen Staaten wurde das Wort «Cassengeld» nur als Buchungsbegriff verwendet, nie auf Münzen graviert.

