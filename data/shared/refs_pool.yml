wikipedia-de-goldmark:
  de: "<b>Münzgesetz vom 4. Dezember 1871</b> (Reichsgesetz zur Einführung der Goldmark) · Sekundärquelle Wikipedia (de): <i>Goldmark</i> — <a href=\"https://de.wikipedia.org/wiki/Goldmark\" target=\"_blank\">de.wikipedia.org/wiki/Goldmark</a>. Definiert den Reichsgoldmünzfuß (1395 Mark / Zollpfund Feingold, 900 ‰); löst den Reichsdukatenfuß ab."
  en: "<b>Münzgesetz of 4 December 1871</b> (imperial law introducing the Goldmark) · secondary source Wikipedia (de): <i>Goldmark</i> — <a href=\"https://de.wikipedia.org/wiki/Goldmark\" target=\"_blank\">de.wikipedia.org/wiki/Goldmark</a>. Defines the Reichsgoldmünzfuß (1,395 Mark per Zollpfund of fine gold, 900 ‰); supersedes the Reichsdukatenfuß."
  uk: "<b>Münzgesetz від 4 грудня 1871</b> (імперський закон про запровадження Goldmark) · вторинне джерело Wikipedia (de): <i>Goldmark</i> — <a href=\"https://de.wikipedia.org/wiki/Goldmark\" target=\"_blank\">de.wikipedia.org/wiki/Goldmark</a>. Визначає Reichsgoldmünzfuß (1395 Mark з цольфунта чистого золота, 900 ‰); приходить на зміну Reichsdukatenfuß."

danskmoent-mmjapan:
  de: "<b>Skjoldager, Mogens</b> (Hg.): <i>The 19th century development in minting technology in Denmark and Japan — and monetary transitions in Denmark, Japan, and Bornholm</i>, danskmoent.dk — <a href=\"https://www.danskmoent.dk/artikler/mmJapan.htm\" target=\"_blank\">danskmoent.dk/artikler/mmJapan.htm</a>. Beleg für den Umbau der Altonaer Münze 1855–56 und ihre Schließung 1863 nach der Geldkrise 1857."
  en: "<b>Skjoldager, Mogens</b> (ed.): <i>The 19th century development in minting technology in Denmark and Japan — and monetary transitions in Denmark, Japan, and Bornholm</i>, danskmoent.dk — <a href=\"https://www.danskmoent.dk/artikler/mmJapan.htm\" target=\"_blank\">danskmoent.dk/artikler/mmJapan.htm</a>. Source for the 1855–56 rebuild of the Altona mint and its closure in 1863 after the 1857 monetary crisis."
  uk: "<b>Skjoldager, Mogens</b> (ред.): <i>The 19th century development in minting technology in Denmark and Japan — and monetary transitions in Denmark, Japan, and Bornholm</i>, danskmoent.dk — <a href=\"https://www.danskmoent.dk/artikler/mmJapan.htm\" target=\"_blank\">danskmoent.dk/artikler/mmJapan.htm</a>. Джерело про перебудову Альтонського двору 1855–56 рр. та його закриття 1863 р. після монетної кризи 1857."

wikipedia-en-hamburg-mark:
  de: "Wikipedia (en): <i>Hamburg mark</i> — <a href=\"https://en.wikipedia.org/wiki/Hamburg_mark\" target=\"_blank\">en.wikipedia.org/wiki/Hamburg_mark</a>. Beleg für die Hamburger Mark Courant (= 13⁄16 Marck Banco ≈ 6,88 g fein) am 11⅓-Thaler-Fuß-Rigsdaler Courant — abzugrenzen von der Mark Sch.-H. Courant ab 1788 am 9¼-Thaler-Fuß-Speciedaler."
  en: "Wikipedia (en): <i>Hamburg mark</i> — <a href=\"https://en.wikipedia.org/wiki/Hamburg_mark\" target=\"_blank\">en.wikipedia.org/wiki/Hamburg_mark</a>. Source for the Hamburg Mark Courant (= 13⁄16 Marck Banco ≈ 6.88 g fine) anchored to the 11⅓-Thaler-Fuß Rigsdaler Courant — to be distinguished from the Mark Sch.-H. Courant after 1788 anchored to the 9¼-Thaler-Fuß Speciedaler."
  uk: "Wikipedia (en): <i>Hamburg mark</i> — <a href=\"https://en.wikipedia.org/wiki/Hamburg_mark\" target=\"_blank\">en.wikipedia.org/wiki/Hamburg_mark</a>. Джерело для Hamburg Mark Courant (= 13⁄16 Marck Banco ≈ 6,88 г чистого) на основі 11⅓-Thaler-Fuß Rigsdaler Courant — слід відрізняти від Mark Sch.-H. Courant з 1788 р. на основі 9¼-Thaler-Fuß Speciedaler."

hagen-bobzin-muenzfuesse:
  de: "<b>Bobzin, Hagen und Gudrun</b>: <i>Münzfüße</i> — <a href=\"http://www.hagen-bobzin.de/hobby/muenzfuesse.html\" target=\"_blank\">hagen-bobzin.de/hobby/muenzfuesse.html</a>. Tabellarische Übersicht der norddeutschen Müntzfüße einschließlich des Altonaer Banco-Fußes 1777 (27¾ Mark Banco = 9¼ Reichsthaler je feine Cöllnische Marck)."
  en: "<b>Bobzin, Hagen and Gudrun</b>: <i>Münzfüße</i> — <a href=\"http://www.hagen-bobzin.de/hobby/muenzfuesse.html\" target=\"_blank\">hagen-bobzin.de/hobby/muenzfuesse.html</a>. Tabular overview of the North German Müntzfuß systems including the Altona Banco-Fuß of 1777 (27¾ Mark Banco = 9¼ Reichsthaler per fine Cologne mark)."
  uk: "<b>Bobzin, Hagen і Gudrun</b>: <i>Münzfüße</i> — <a href=\"http://www.hagen-bobzin.de/hobby/muenzfuesse.html\" target=\"_blank\">hagen-bobzin.de/hobby/muenzfuesse.html</a>. Табличний огляд північнонімецьких Müntzfuß-стандартів, у т.ч. альтонського Banco-Fuß 1777 (27¾ Mark Banco = 9¼ Reichsthaler з чистої кельнської марки)."

danskmoent-c7mord:
  de: "<b>danskmoent.dk</b>: <i>Møntforordninger m.v. under Christian 7. (1766–1808)</i> — <a href=\"https://www.danskmoent.dk/artikler/c7mord.htm\" target=\"_blank\">danskmoent.dk/artikler/c7mord.htm</a>. Beleg für die wörtliche Plakat-Klausel vom 2. Dezember 1782 («<i>guld udmønte til kurantdukater med 75 stykker pr. mark brutto af 21 karat</i>») und die Aufhebung des Plakats 1795."
  en: "<b>danskmoent.dk</b>: <i>Møntforordninger m.v. under Christian 7. (1766–1808)</i> — <a href=\"https://www.danskmoent.dk/artikler/c7mord.htm\" target=\"_blank\">danskmoent.dk/artikler/c7mord.htm</a>. Source for the verbatim clause of the Plakat of 2 December 1782 («<i>guld udmønte til kurantdukater med 75 stykker pr. mark brutto af 21 karat</i>») and its revocation in 1795."
  uk: "<b>danskmoent.dk</b>: <i>Møntforordninger m.v. under Christian 7. (1766–1808)</i> — <a href=\"https://www.danskmoent.dk/artikler/c7mord.htm\" target=\"_blank\">danskmoent.dk/artikler/c7mord.htm</a>. Джерело verbatim-формулювання Plakat 2 грудня 1782 («<i>guld udmønte til kurantdukater med 75 stykker pr. mark brutto af 21 karat</i>») та скасування plakat 1795."

en-31895:
  de: "<b>Numista N#31895</b>: <i>2 Sechsling — Christian VII (Danish duchies of Schleswig and Holstein, 1787-1800)</i> — <a href=\"https://en.numista.com/31895\" target=\"_blank\">numista.com/31895</a>. Reverse-Legende verbatim: «<i>SCHLESW· HOLST·SCHEIDE MÜNZE. 1799. M·F·</i>». Mint <b>Altona, Schleswig-Holstein</b>; Mzm. <b>Michael Flor (MF)</b> 1787-1818. Auflagen pro Prägejahr: 1787 = 761 000, 1796 = 538 000, 1799 = 960 000, 1800 = 480 000; 1788 ohne Numista-Mintage. KM# 120, Billon .250, 1,499 g, ⌀ 18 mm. Belegt die Korrektur des V1-Eintrags «mint: Royal Mint (Tower Hill)» auf <b>Altona/MF</b>."
  en: "<b>Numista N#31895</b>: <i>2 Sechsling — Christian VII (Danish duchies of Schleswig and Holstein, 1787-1800)</i> — <a href=\"https://en.numista.com/31895\" target=\"_blank\">numista.com/31895</a>. Reverse legend verbatim: «<i>SCHLESW· HOLST·SCHEIDE MÜNZE. 1799. M·F·</i>». Mint <b>Altona, Schleswig-Holstein</b>; mintmaster <b>Michael Flor (MF)</b> 1787-1818. Per-year mintages: 1787 = 761 000, 1796 = 538 000, 1799 = 960 000, 1800 = 480 000; 1788 mintage not given. KM# 120, billon .250, 1.499 g, ⌀ 18 mm. Establishes the correction of the V1 entry «mint: Royal Mint (Tower Hill)» to <b>Altona/MF</b>."
  uk: "<b>Numista N#31895</b>: <i>2 Sechsling — Christian VII (Danish duchies of Schleswig and Holstein, 1787-1800)</i> — <a href=\"https://en.numista.com/31895\" target=\"_blank\">numista.com/31895</a>. Реверсна легенда verbatim: «<i>SCHLESW· HOLST·SCHEIDE MÜNZE. 1799. M·F·</i>». Монетний двір <b>Альтона, Шлезвіг-Гольштейн</b>; мінт-майстер <b>Michael Flor (MF)</b> 1787-1818. Наклади по роках: 1787 = 761 000, 1796 = 538 000, 1799 = 960 000, 1800 = 480 000; для 1788 Numista наклад не подає. KM# 120, біллон .250, 1,499 г, ⌀ 18 мм. Документує виправлення запису V1 «mint: Royal Mint (Tower Hill)» на <b>Альтона/MF</b>."

en-pieces59482:
  de: "<b>Numista N#59482</b> · 1 Thaler / 32 Schilling Lübisch (Speciesthaler) 1776 · KM-185 · Davenport 2422 · Behrens 312. Dokumentiert: Silber 888 8/9 ‰, 29,20 g rau, 25,93 g fein, ⌀ 41 mm. Verfügbar unter <a href=\"https://en.numista.com/catalogue/pieces59482.html\" target=\"_blank\">en.numista.com/catalogue/pieces59482.html</a> — Stand April 2026. Abgeglichen mit <b>Davenport, J. S.</b>: <i>European Crowns 1700–1800</i> (Springfield/IL 1961, Eintrag 2422)."
  en: "<b>Numista N#59482</b> · 1 Thaler / 32 Schilling Lübisch (Speciesthaler) 1776 · KM-185 · Davenport 2422 · Behrens 312. Documents: silver 888 8/9 ‰, 29.20 g rough, 25.93 g fine, ⌀ 41 mm. Available at <a href=\"https://en.numista.com/catalogue/pieces59482.html\" target=\"_blank\">en.numista.com/catalogue/pieces59482.html</a> — accessed April 2026. Cross-checked against <b>Davenport, J. S.</b>: <i>European Crowns 1700–1800</i> (Springfield/IL 1961, entry 2422)."
  uk: "<b>Numista N#59482</b> · 1 Thaler / 32 Schilling Lübisch (Speciesthaler) 1776 · KM-185 · Davenport 2422 · Behrens 312. Документує: срібло 888 8/9 ‰, 29,20 г повної ваги, 25,93 г чистого, ⌀ 41 мм. Доступно на <a href=\"https://en.numista.com/catalogue/pieces59482.html\" target=\"_blank\">en.numista.com/catalogue/pieces59482.html</a> — станом на квітень 2026. Перехресно перевірено за <b>Davenport, J. S.</b>: <i>European Crowns 1700–1800</i> (Springfield/IL 1961, запис 2422)."

lubeck-ref4-no-url:
  de: "<b>MGM Münzlexikon</b> — Einträge «Lübischer Münzfuß / 34-Marck-Fuß» und «Reichsmüntzfuß». Diskutiert die Parallelität von 34-Marck-Fuß-Courant und 9-Thaler-Fuß-Speciesthaler in Hamburg und Lübeck zwischen 1726 und 1875; Aufhebung des 34-Marck-Fuß durch das Reichsmünzgesetz vom 9. Juli 1873 (Übergang zur Reichsmark)."
  en: "<b>MGM Münzlexikon</b> — entries «Lübischer Münzfuß / 34-Marck-Fuß» and «Reichsmüntzfuß». Discusses the parallel use of the 34-Marck-Fuß courant and the 9-Thaler-Fuß Speciesthaler in Hamburg and Lübeck between 1726 and 1875; abolition of the 34-Marck-Fuß by the Reichsmünzgesetz of 9 July 1873 (transition to the Reichsmark)."
  uk: "<b>MGM Münzlexikon</b> — статті «Lübischer Münzfuß / 34-Marck-Fuß» та «Reichsmüntzfuß». Обговорює паралельне використання 34-Marck-Fuß-Courant та 9-Thaler-Fuß Speciesthaler у Гамбурзі та Любеку між 1726 та 1875 рр.; скасування 34-Marck-Fuß за Reichsmünzgesetz від 9 липня 1873 р. (перехід до Reichsmark)."

mgmindex-index-php-title-reichsdukat:
  de: "<b>MGM Münzlexikon</b>: <i>Reichsdukat</i> — <a href=\"https://www.mgmindex.de/index.php?title=Reichsdukat\" target=\"_blank\">mgmindex.de/Reichsdukat</a>. Beleg für die Codifizierung des Reichsdukaten als kaiserliche Hauptgoldmünze durch die Augsburger Reichsmünzordnung 1559: «<i>Bezeichnung für den Dukat (Rauhgewicht 3,49 g, Feinheit 986/1000 = 23 Karat 8 Grän), nachdem er auf der Augsburger Reichsmünzordnung 1559 zur Hauptgoldmünze erklärt worden war</i>»."
  en: "<b>MGM Münzlexikon</b>: <i>Reichsdukat</i> — <a href=\"https://www.mgmindex.de/index.php?title=Reichsdukat\" target=\"_blank\">mgmindex.de/Reichsdukat</a>. Sources the codification of the Reichsdukat as principal imperial gold coin by the Augsburger Reichsmünzordnung of 1559: «<i>Bezeichnung für den Dukat (Rauhgewicht 3,49 g, Feinheit 986/1000 = 23 Karat 8 Grän), nachdem er auf der Augsburger Reichsmünzordnung 1559 zur Hauptgoldmünze erklärt worden war</i>»."
  uk: "<b>MGM Münzlexikon</b>: <i>Reichsdukat</i> — <a href=\"https://www.mgmindex.de/index.php?title=Reichsdukat\" target=\"_blank\">mgmindex.de/Reichsdukat</a>. Джерело про кодифікацію Reichsdukat як головної імперської золотої монети Augsburger Reichsmünzordnung 1559 р.: «<i>Bezeichnung für den Dukat (Rauhgewicht 3,49 g, Feinheit 986/1000 = 23 Karat 8 Grän), nachdem er auf der Augsburger Reichsmünzordnung 1559 zur Hauptgoldmünze erklärt worden war</i>»."

wikipedia-de-l-beck:
  de: "<b>Wikipedia DE «Lübeck»</b> — <a href=\"https://de.wikipedia.org/wiki/L%C3%BCbeck\" target=\"_blank\">de.wikipedia.org/wiki/Lübeck</a>, Abschnitt «Geschichte». Beleg für die Verleihung des Goldmünzrechts an Lübeck: «<i>Kaiser Ludwig der Bayer verlieh Lübeck 1340 das Goldmünzrecht</i>». Zugleich Beleg für den reichsstädtischen Status biß 1806: «<i>Mit dem Reichsdeputationshauptschluss 1803 blieb Lübeck noch reichsunmittelbare Stadt, um dann nach dem Ende des Heiligen Römischen Reiches 1806 ein souveräner deutscher Staat zu werden</i>»."
  en: "<b>Wikipedia DE «Lübeck»</b> — <a href=\"https://de.wikipedia.org/wiki/L%C3%BCbeck\" target=\"_blank\">de.wikipedia.org/wiki/Lübeck</a>, section «Geschichte». Source for the grant of the gold-minting privilege to Lübeck: «<i>Kaiser Ludwig der Bayer verlieh Lübeck 1340 das Goldmünzrecht</i>». Also documents the city's imperial status until 1806: «<i>Mit dem Reichsdeputationshauptschluss 1803 blieb Lübeck noch reichsunmittelbare Stadt, um dann nach dem Ende des Heiligen Römischen Reiches 1806 ein souveräner deutscher Staat zu werden</i>»."
  uk: "<b>Wikipedia DE «Lübeck»</b> — <a href=\"https://de.wikipedia.org/wiki/L%C3%BCbeck\" target=\"_blank\">de.wikipedia.org/wiki/Lübeck</a>, розділ «Geschichte». Джерело про надання Любеку права карбування золота: «<i>Kaiser Ludwig der Bayer verlieh Lübeck 1340 das Goldmünzrecht</i>». Також документує статус міста як вільного імперського до 1806 р.: «<i>Mit dem Reichsdeputationshauptschluss 1803 blieb Lübeck noch reichsunmittelbare Stadt, um dann nach dem Ende des Heiligen Römischen Reiches 1806 ein souveräner deutscher Staat zu werden</i>»."

wikipedia-de-m-nzgesetz-deutsches-reich:
  de: "<b>Wikipedia DE «Münzgesetz (Deutsches Reich)»</b> — <a href=\"https://de.wikipedia.org/wiki/M%C3%BCnzgesetz_(Deutsches_Reich)\" target=\"_blank\">de.wikipedia.org/wiki/Münzgesetz (Deutsches Reich)</a>. Beleg für das Ende des Reichsdukatenfußes durch das Reichsmünzgesetz vom 4. Dezember 1871 und seine Erweiterung vom 9. Juli 1873: «<i>Durch das Gesetz vom 4. Dezember 1871 wurde mit der Reichsgoldmünze der Goldgehalt der neuen gemeinsamen Währung „Mark\" festgelegt</i>»."
  en: "<b>Wikipedia DE «Münzgesetz (Deutsches Reich)»</b> — <a href=\"https://de.wikipedia.org/wiki/M%C3%BCnzgesetz_(Deutsches_Reich)\" target=\"_blank\">de.wikipedia.org/wiki/Münzgesetz (Deutsches Reich)</a>. Source for the end of the Reichsdukatenfuß by the Reichsmünzgesetz of 4 December 1871 and its extension of 9 July 1873: «<i>Durch das Gesetz vom 4. Dezember 1871 wurde mit der Reichsgoldmünze der Goldgehalt der neuen gemeinsamen Währung „Mark\" festgelegt</i>»."
  uk: "<b>Wikipedia DE «Münzgesetz (Deutsches Reich)»</b> — <a href=\"https://de.wikipedia.org/wiki/M%C3%BCnzgesetz_(Deutsches_Reich)\" target=\"_blank\">de.wikipedia.org/wiki/Münzgesetz (Deutsches Reich)</a>. Джерело про завершення Reichsdukatenfuß через Reichsmünzgesetz 4 грудня 1871 р. та його розширення 9 липня 1873 р.: «<i>Durch das Gesetz vom 4. Dezember 1871 wurde mit der Reichsgoldmünze der Goldgehalt der neuen gemeinsamen Währung „Mark\" festgelegt</i>»."

museum-grafschaft-rantzau-taler-und-dukaten-das-geld-der-neuzeit:
  de: "<b>Museum der Grafschaft Rantzau, Barmstedt</b>: <i>Taler und Dukaten — das Geld der Neuzeit</i> — <a href=\"https://www.museum-grafschaft-rantzau.de/das-geld-der-grafen/taler-und-dukaten-das-geld-der-neuzeit\" target=\"_blank\">museum-grafschaft-rantzau.de</a>. Beleg für das Prinzip, daß umlaufende Goldmünzen «<i>ihren Wert durch den Edelmetallgehalt</i>» erhielten — fremde Dukaten desselben Standards (ungarische, venezianische, türkische) wurden unabhängig vom Prägeort nach Metallgehalt angenommen."
  en: "<b>Museum der Grafschaft Rantzau, Barmstedt</b>: <i>Taler und Dukaten — das Geld der Neuzeit</i> — <a href=\"https://www.museum-grafschaft-rantzau.de/das-geld-der-grafen/taler-und-dukaten-das-geld-der-neuzeit\" target=\"_blank\">museum-grafschaft-rantzau.de</a>. Source for the principle that circulating gold coins «<i>derived their value from precious-metal content</i>» — foreign ducats of the same standard (Hungarian, Venetian, Ottoman) were accepted by metal content regardless of mint origin."
  uk: "<b>Museum der Grafschaft Rantzau, Barmstedt</b>: <i>Taler und Dukaten — das Geld der Neuzeit</i> — <a href=\"https://www.museum-grafschaft-rantzau.de/das-geld-der-grafen/taler-und-dukaten-das-geld-der-neuzeit\" target=\"_blank\">museum-grafschaft-rantzau.de</a>. Джерело про принцип, що золоті монети в обігу «<i>отримували свою вартість через вміст дорогоцінного металу</i>» — іноземні дукати того ж стандарту (угорські, венеційські, турецькі) приймались за вмістом металу незалежно від місця карбування."

mgmindex-index-php-title-handelsdukat:
  de: "<b>MGM Münzlexikon</b>: <i>Handelsdukat</i> — <a href=\"https://www.mgmindex.de/index.php?title=Handelsdukat\" target=\"_blank\">mgmindex.de/Handelsdukat</a>. Beleg für die Rolle der niederländischen Handelsdukaten als maßgebliche Welthandelsmünze des 17. und 18. Jahrhunderts: «<i>Bedeutende Welthandelsmünze des 17. und 18. Jh., besonders von den Niederlanden für den Ostseehandel</i>»."
  en: "<b>MGM Münzlexikon</b>: <i>Handelsdukat</i> — <a href=\"https://www.mgmindex.de/index.php?title=Handelsdukat\" target=\"_blank\">mgmindex.de/Handelsdukat</a>. Source for the role of Dutch Handelsdukaten as principal world trade gold coin of the 17th-18th centuries: «<i>Bedeutende Welthandelsmünze des 17. und 18. Jh., besonders von den Niederlanden für den Ostseehandel</i>»."
  uk: "<b>MGM Münzlexikon</b>: <i>Handelsdukat</i> — <a href=\"https://www.mgmindex.de/index.php?title=Handelsdukat\" target=\"_blank\">mgmindex.de/Handelsdukat</a>. Джерело про роль нідерландських Handelsdukaten як головної світової торгової монети XVII–XVIII ст.: «<i>Bedeutende Welthandelsmünze des 17. und 18. Jh., besonders von den Niederlanden für den Ostseehandel</i>»."

wikipedia-de-dukat-m-nze:
  de: "<b>Dukat (Münze)</b> — Wikipedia (DE): <a href=\"https://de.wikipedia.org/wiki/Dukat_(M%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Dukat (Münze)</a>. Hauptquelle für die Reichsdukatenfuß-Spezifikation: «<i>67 Stück sollten aus der rauhen Kölnischen Mark Gold ausgeprägt werden</i>». Backt: Cöllnische Marck rauh = 233,856 g · Raugewicht 3,49039 g · Feingehalt 23 Karat 8 Grän = 986 1/9 ‰ · Feingewicht 3,44191 g."
  en: "<b>Dukat (Münze)</b> — Wikipedia (DE): <a href=\"https://de.wikipedia.org/wiki/Dukat_(M%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Dukat (Münze)</a>. Primary source for the Reichsdukatenfuß specification: «<i>67 Stück sollten aus der rauhen Kölnischen Mark Gold ausgeprägt werden</i>». Backs: Cöllnische Marck rough = 233.856 g · rough weight 3.49039 g · fineness 23 carats 8 grains = 986 1/9 ‰ · fine weight 3.44191 g."
  uk: "<b>Dukat (Münze)</b> — Wikipedia (DE): <a href=\"https://de.wikipedia.org/wiki/Dukat_(M%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Dukat (Münze)</a>. Першоджерело специфікації Reichsdukatenfuß: «<i>67 Stück sollten aus der rauhen Kölnischen Mark Gold ausgeprägt werden</i>». Підтверджує: Кельнська марка повна = 233,856 г · повна вага 3,49039 г · проба 23 карати 8 гран = 986 1/9 ‰ · чиста вага 3,44191 г."

wikipedia-de-wiener-m-nzvertrag:
  de: "Wikipedia (DE): <i>Wiener Münzvertrag</i> — <a href=\"https://de.wikipedia.org/wiki/Wiener_M%C3%BCnzvertrag\" target=\"_blank\">de.wikipedia.org/wiki/Wiener Münzvertrag</a>. Drei parallele Müntzfüße auf Zollpfund-Basis (500 g Feinsilber): <b>30-Taler-Fuß</b> (Norddeutschland), <b>52½-Gulden-Fuß</b> (Süddeutschland), <b>45-Gulden-Fuß</b> (Österreich); Vereinstaler als Brückenmünze."
  en: "Wikipedia (DE): <i>Wiener Münzvertrag</i> — <a href=\"https://de.wikipedia.org/wiki/Wiener_M%C3%BCnzvertrag\" target=\"_blank\">de.wikipedia.org/wiki/Wiener Münzvertrag</a>. Three parallel Müntzfüße on the Zollpfund base (500 g fine silver): <b>30-Taler-Fuß</b> (North Germany), <b>52½-Gulden-Fuß</b> (South Germany), <b>45-Gulden-Fuß</b> (Austria); Vereinstaler as the bridge coin."
  uk: "Wikipedia (DE): <i>Wiener Münzvertrag</i> — <a href=\"https://de.wikipedia.org/wiki/Wiener_M%C3%BCnzvertrag\" target=\"_blank\">de.wikipedia.org/wiki/Wiener Münzvertrag</a>. Три паралельні Müntzfüße на основі Zollpfund (500 г чистого срібла): <b>30-Taler-Fuß</b> (Північна Німеччина), <b>52½-Gulden-Fuß</b> (Південна Німеччина), <b>45-Gulden-Fuß</b> (Австрія); Vereinstaler як міжсистемна монета."

mgmindex-index-php-title-wiener-m-nzvertrag-von-1857:
  de: "MGM Münzlexikon: <i>Wiener Münzvertrag von 1857</i> — <a href=\"https://www.mgmindex.de/index.php?title=Wiener_M%C3%BCnzvertrag_von_1857\" target=\"_blank\">mgmindex.de</a>. Verwendet «Vereinstaler / Vereinsdoppeltaler / Vereinskrone» als kanonische Bezeichnungen; «Zollpfund» erscheint dort ausschließlich als Gewichtseinheit (500 g), nicht als Suffix eines Müntzfuß-Namens."
  en: "MGM Münzlexikon: <i>Wiener Münzvertrag von 1857</i> — <a href=\"https://www.mgmindex.de/index.php?title=Wiener_M%C3%BCnzvertrag_von_1857\" target=\"_blank\">mgmindex.de</a>. Uses «Vereinstaler / Vereinsdoppeltaler / Vereinskrone» as the canonical names; «Zollpfund» appears there exclusively as a weight unit (500 g), not as a Müntzfuß-name suffix."
  uk: "MGM Münzlexikon: <i>Wiener Münzvertrag von 1857</i> — <a href=\"https://www.mgmindex.de/index.php?title=Wiener_M%C3%BCnzvertrag_von_1857\" target=\"_blank\">mgmindex.de</a>. Використовує «Vereinstaler / Vereinsdoppeltaler / Vereinskrone» як канонічні назви; «Zollpfund» там фіґурує винятково як одиниця ваги (500 г), а не як суфікс назви Müntzfuß."

wikipedia-de-blutdollar:
  de: "Wikipedia (DE): <i>Blutdollar</i> — <a href=\"https://de.wikipedia.org/wiki/Blutdollar\" target=\"_blank\">de.wikipedia.org/wiki/Blutdollar</a>. Beleg für die period-korrekte Bezeichnung 13⅓-Taler-Fuß: der Blutdollar / Sterntaler ist ein Rechnungstaler im 13⅓-Taler-Fuß zu 24 Gute Groschen — Konventionscouranttaler entsprechend, gegenüber dem 32-Groschen-Konventionstaler."
  en: "Wikipedia (DE): <i>Blutdollar</i> — <a href=\"https://de.wikipedia.org/wiki/Blutdollar\" target=\"_blank\">de.wikipedia.org/wiki/Blutdollar</a>. Source for the period-correct 13⅓-Taler-Fuß designation: the Blutdollar / Sterntaler is a Rechnungstaler on the 13⅓-Taler-Fuß valued at 24 Gute Groschen — the Konventionscouranttaler counterpart to the 32-Groschen Konventionstaler."
  uk: "Wikipedia (DE): <i>Blutdollar</i> — <a href=\"https://de.wikipedia.org/wiki/Blutdollar\" target=\"_blank\">de.wikipedia.org/wiki/Blutdollar</a>. Джерело для період-правильної назви 13⅓-Taler-Fuß: Blutdollar / Sterntaler — розрахунковий Thaler у 13⅓-Taler-Fuß за 24 Gute Groschen, що є Konventionscouranttaler — варіантом до 32-Groschen-Konventionstaler."

de-mkl1888-m-nzfu:
  de: "<b>Meyers Konversationslexikon 1888 — Müntzfuß</b> (Wikisource, Band 11, S. 890–891): <a href=\"https://de.wikisource.org/wiki/MKL1888:M%C3%BCnzfu%C3%9F\" target=\"_blank\">de.wikisource.org/wiki/MKL1888:Münzfuß</a>. Period-Enzyklopädie zur Müntzfuß-Terminologie. «<i>der Konventions- oder 20-Gulden-Fuß, nach welchem … die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>» (S. 890) — keine separate «-Courant-Fuß»-Bezeichnung in der zeitgenössischen Quelle."
  en: "<b>Meyers Konversationslexikon 1888 — Müntzfuß</b> (Wikisource, vol. 11, pp. 890–891): <a href=\"https://de.wikisource.org/wiki/MKL1888:M%C3%BCnzfu%C3%9F\" target=\"_blank\">de.wikisource.org/wiki/MKL1888:Münzfuß</a>. Period encyclopaedia for Müntzfuß terminology. «<i>der Konventions- oder 20-Gulden-Fuß, nach welchem … die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>» (p. 890) — no separate «-Courant-Fuß» term in the period source."
  uk: "<b>Meyers Konversationslexikon 1888 — Müntzfuß</b> (Wikisource, том 11, с. 890–891): <a href=\"https://de.wikisource.org/wiki/MKL1888:M%C3%BCnzfu%C3%9F\" target=\"_blank\">de.wikisource.org/wiki/MKL1888:Münzfuß</a>. Період-енциклопедія з термінології Müntzfuß. «<i>der Konventions- oder 20-Gulden-Fuß, nach welchem … die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>» (с. 890) — у період-джерелі немає окремої «-Courant-Fuß»-назви."

wikipedia-de-schleswig-holsteinische-speciesbank:
  de: "<b>Schleswig-Holsteinische Speciesbank</b> — Wikipedia (DE): <a href=\"https://de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank\" target=\"_blank\">de.wikipedia.org/wiki/Schleswig-Holsteinische Speciesbank</a>. Gegründet 29. Februar 1788 in Altona; erste Banknoten in Thaler Specie und Schilling Schleswig-Holsteinisch Courant; Aufgehen in der Rigsbank 1813 nach dem dänischen Staatsbankrott."
  en: "<b>Schleswig-Holsteinische Speciesbank</b> — Wikipedia (DE): <a href=\"https://de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank\" target=\"_blank\">de.wikipedia.org/wiki/Schleswig-Holsteinische Speciesbank</a>. Founded 29 February 1788 in Altona; first banknotes in Thaler Specie and Schilling Schleswig-Holsteinisch Courant; absorbed by the Rigsbank in 1813 after the Danish state bankruptcy."
  uk: "<b>Schleswig-Holsteinische Speciesbank</b> — Wikipedia (DE): <a href=\"https://de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank\" target=\"_blank\">de.wikipedia.org/wiki/Schleswig-Holsteinische Speciesbank</a>. Заснована 29 лютого 1788 в Альтоні; перші банкноти у Thaler Specie та Schilling Schleswig-Holsteinisch Courant; влита у Rigsbank 1813 після данського державного банкрутства."

wikipedia-de-hamburger-bank:
  de: "<b>Hamburger Bank</b> — Wikipedia (DE): <a href=\"https://de.wikipedia.org/wiki/Hamburger_Bank\" target=\"_blank\">de.wikipedia.org/wiki/Hamburger Bank</a>. Gegründet 2. März 1619 nach dem Vorbild der Amsterdamer Wisselbank; reine Giro- und Wechselbank ohne eigene Münzprägung; Mark Banco als Recheneinheit; Aufhebung am 31. Dezember 1875 (Aufgehen in der Reichsbank)."
  en: "<b>Hamburger Bank</b> — Wikipedia (DE): <a href=\"https://de.wikipedia.org/wiki/Hamburger_Bank\" target=\"_blank\">de.wikipedia.org/wiki/Hamburger Bank</a>. Founded 2 March 1619 on the model of the Amsterdam Wisselbank; pure giro and exchange bank, no own coinage; Mark Banco as unit of account; dissolved 31 December 1875 (absorbed by the Reichsbank)."
  uk: "<b>Hamburger Bank</b> — Wikipedia (DE): <a href=\"https://de.wikipedia.org/wiki/Hamburger_Bank\" target=\"_blank\">de.wikipedia.org/wiki/Hamburger Bank</a>. Заснований 2 березня 1619 за зразком Amsterdamer Wisselbank; суто розрахунково-обмінний банк без власного карбування; Mark Banco як розрахункова одиниця; ліквідовано 31 грудня 1875 (влитий у Reichsbank)."

archive-bub-gb-o-bvaaaaiaaj:
  de: "<b>Adolf Soetbeer</b>: <i>Denkschrift betreffend deutsche Münzeinigung</i>. Berlin (Liebheit & Thiesen) 1869, S. 4 — <a href=\"https://archive.org/details/bub_gb_O-BvAAAAIAAJ\" target=\"_blank\">archive.org</a>. Period-Hauptquelle (Soetbeer war Archivar der Hamburger Commerz-Deputation): «<i>In Hamburg besteht … eine auf Feinsilber in Barren begründete besondere Hamburger Bankvaluta, 59⅓ Mark auf das Zollpfund Feinsilber.</i>» (S. 4) Umrechnung 59⅓ × 233,856/500 ≈ 27,74 ≈ <b>27¾</b> M.B./Cölln. Marck — Soetbeer kennt nur <em>einen</em> Hamburger Bankfuß und nennt keinen 1777-Übergang."
  en: "<b>Adolf Soetbeer</b>: <i>Denkschrift betreffend deutsche Münzeinigung</i>. Berlin (Liebheit & Thiesen) 1869, p. 4 — <a href=\"https://archive.org/details/bub_gb_O-BvAAAAIAAJ\" target=\"_blank\">archive.org</a>. Period primary source (Soetbeer was archivist of the Hamburg Commerz-Deputation): «<i>In Hamburg besteht … eine auf Feinsilber in Barren begründete besondere Hamburger Bankvaluta, 59⅓ Mark auf das Zollpfund Feinsilber.</i>» (p. 4) Conversion: 59⅓ × 233.856/500 ≈ 27.74 ≈ <b>27¾</b> M.B. per Cölln. Marck — Soetbeer documents only ONE Hamburger Bankfuß and references no 1777 transition."
  uk: "<b>Adolf Soetbeer</b>: <i>Denkschrift betreffend deutsche Münzeinigung</i>. Berlin (Liebheit & Thiesen) 1869, с. 4 — <a href=\"https://archive.org/details/bub_gb_O-BvAAAAIAAJ\" target=\"_blank\">archive.org</a>. Період-першоджерело (Soetbeer був архіваріусом Hamburger Commerz-Deputation): «<i>In Hamburg besteht … eine auf Feinsilber in Barren begründete besondere Hamburger Bankvaluta, 59⅓ Mark auf das Zollpfund Feinsilber.</i>» (с. 4) Перерахунок: 59⅓ × 233,856/500 ≈ 27,74 ≈ <b>27¾</b> M.B. на Кельнську марку — Soetbeer фіксує ОДИН Hamburger Bankfuß і не згадує жодного переходу 1777."

zeno-hamburger-bankfu:
  de: "<b>Meyers Großes Konversations-Lexikon</b>, Bd. 8 (Leipzig 1907), S. 690 — <a href=\"http://www.zeno.org/Meyers-1905/A/Hamburger%20Bankfu%C3%9F\" target=\"_blank\">zeno.org/Meyers-1905</a>. Period-Enzyklopädie zum kanonischen Hamburger Bankfuß: «<i>Hamburger Bankfuß, Rechnungsmünzfuß der frühern Hamburger Girobank: <b>27¾ Bankmark</b> auf eine Mark Feinsilber.</i>» — eindeutig <em>ein</em> Wert für die Hamburger Bank."
  en: "<b>Meyers Großes Konversations-Lexikon</b>, vol. 8 (Leipzig 1907), p. 690 — <a href=\"http://www.zeno.org/Meyers-1905/A/Hamburger%20Bankfu%C3%9F\" target=\"_blank\">zeno.org/Meyers-1905</a>. Period encyclopaedia on the canonical Hamburger Bankfuß: «<i>Hamburger Bankfuß, the unit-of-account standard of the former Hamburger Girobank: <b>27¾ Bankmark</b> per Mark of fine silver.</i>» — unambiguously a SINGLE value for the Hamburger Bank."
  uk: "<b>Meyers Großes Konversations-Lexikon</b>, т. 8 (Leipzig 1907), с. 690 — <a href=\"http://www.zeno.org/Meyers-1905/A/Hamburger%20Bankfu%C3%9F\" target=\"_blank\">zeno.org/Meyers-1905</a>. Період-енциклопедія про канонічний Hamburger Bankfuß: «<i>Hamburger Bankfuß, Rechnungsmünzfuß колишньої Hamburger Girobank: <b>27¾ Bankmark</b> на марку чистого срібла.</i>» — однозначно ОДНЕ значення для Hamburger Bank."

german_fuesse-ref14-no-url:
  de: "<b>William Arthur Shaw</b>: <i>The History of Currency 1252–1894</i>. London 1896, S. 387 — Google Books id <i>GrJCAAAAIAAJ</i>. Belegt, dass <b>27⅝ und 27¾ Mark Banco Bid/Ask eines einzigen Reformakts (1770)</b> sind, nicht zwei Phasen: «<i>by 1770 the surviving supply of these coins have been reduced in weight to around 25.4 g. Henceforth the bank has turned to accepting bullion as well as coin, with each Cologne mark of silver bought for 27⅝ marks banco (9⁵⁄₂₄ thalers) and sold for 27¾ marks (9¼ thalers).</i>» Auflösung der Bobzin-Datierungsdiskrepanz.<br>Ergänzend: <b>Ulrich Bindseil</b>, <i>Central Banking Before 1800: A Rehabilitation</i>, Oxford University Press 2019, S. 99, 149: «<i>silver content created difficulties to the bank, which were eventually solved by the reform of 1770 in which the Marc Banco was no longer defined with the reference to any species, but in terms of fine silver content only (8.40 gram).</i>»<br>Ergänzend zur Altonaer Datierung: Wikipedia DE «Schleswig-Holsteinische Speciesbank»: «<i>Als erste Bank der Herzogtümer wurde 1776 die Species, Giro- und Leihbank zu Altona zur Förderung von Handel, Verkehr und Industrie eingerichtet.</i>» — die Altonaer Bank war 1776, nicht 1777."
  en: "<b>William Arthur Shaw</b>: <i>The History of Currency 1252–1894</i>. London 1896, p. 387 — Google Books id <i>GrJCAAAAIAAJ</i>. Documents that <b>27⅝ and 27¾ Mark Banco are the bid/ask spread of a single reform act (1770)</b>, not two phases: «<i>by 1770 the surviving supply of these coins have been reduced in weight to around 25.4 g. Henceforth the bank has turned to accepting bullion as well as coin, with each Cologne mark of silver bought for 27⅝ marks banco (9⁵⁄₂₄ thalers) and sold for 27¾ marks (9¼ thalers).</i>» Resolves Bobzin's dating discrepancy.<br>Supplementary: <b>Ulrich Bindseil</b>, <i>Central Banking Before 1800: A Rehabilitation</i>, OUP 2019, pp. 99, 149: «<i>silver content created difficulties to the bank, which were eventually solved by the reform of 1770 in which the Marc Banco was no longer defined with the reference to any species, but in terms of fine silver content only (8.40 gram).</i>»<br>On the Altona bank's founding date: Wikipedia DE «Schleswig-Holsteinische Speciesbank»: «<i>Als erste Bank der Herzogtümer wurde 1776 die Species, Giro- und Leihbank zu Altona … eingerichtet.</i>» — the Altona bank was founded 1776, not 1777."
  uk: "<b>William Arthur Shaw</b>: <i>The History of Currency 1252–1894</i>. London 1896, с. 387 — Google Books id <i>GrJCAAAAIAAJ</i>. Підтверджує, що <b>27⅝ і 27¾ Mark Banco — це bid/ask-spread однієї реформи (1770)</b>, а не дві фази: «<i>by 1770 the surviving supply of these coins have been reduced in weight to around 25.4 g. Henceforth the bank has turned to accepting bullion as well as coin, with each Cologne mark of silver bought for 27⅝ marks banco (9⁵⁄₂₄ thalers) and sold for 27¾ marks (9¼ thalers).</i>» Розвʼязує датувальну розбіжність у Bobzin.<br>Додатково: <b>Ulrich Bindseil</b>, <i>Central Banking Before 1800: A Rehabilitation</i>, OUP 2019, с. 99, 149: «<i>silver content created difficulties to the bank, which were eventually solved by the reform of 1770 in which the Marc Banco was no longer defined with the reference to any species, but in terms of fine silver content only (8.40 gram).</i>»<br>Щодо дати заснування Альтонського банку: Wikipedia DE «Schleswig-Holsteinische Speciesbank»: «<i>Als erste Bank der Herzogtümer wurde 1776 die Species, Giro- und Leihbank zu Altona … eingerichtet.</i>» — Альтонський банк заснований 1776, не 1777."

wikipedia-de-reichstaler:
  de: "<b>Wikipedia DE «Reichstaler»</b> — <a href=\"https://de.wikipedia.org/wiki/Reichstaler\" target=\"_blank\">de.wikipedia.org/wiki/Reichstaler</a>. Backt die kanonische 9-Fuß-Spezifikation: «<i>die einzelne Münze bei einem Gewicht von 29,23 g, einem Feingehalt von 889/1000 und einem Feingewicht von 25,98 g</i>» und die 1566-Etablierung als Hauptwährungsmünze des Reichs. Backt zugleich den Funktionsende-Anker «<i>als Währungsmünze des Reichs ungefähr bis zum Jahr 1700</i>» (Phase-IV-Marker für unser Periodisierungs-Schema 1566 → 1620 → 1667 → 1690 → ~1700)."
  en: "<b>Wikipedia DE «Reichstaler»</b> — <a href=\"https://de.wikipedia.org/wiki/Reichstaler\" target=\"_blank\">de.wikipedia.org/wiki/Reichstaler</a>. Backs the canonical 9-Fuß specification: «<i>die einzelne Münze bei einem Gewicht von 29,23 g, einem Feingehalt von 889/1000 und einem Feingewicht von 25,98 g</i>» and the 1566 establishment as principal Reich currency. Also backs the function-end anchor «<i>als Währungsmünze des Reichs ungefähr bis zum Jahr 1700</i>» (Phase IV marker in our 1566 → 1620 → 1667 → 1690 → ~1700 scheme)."
  uk: "<b>Wikipedia DE «Reichstaler»</b> — <a href=\"https://de.wikipedia.org/wiki/Reichstaler\" target=\"_blank\">de.wikipedia.org/wiki/Reichstaler</a>. Підтверджує канонічну специфікацію 9-Fuß: «<i>die einzelne Münze bei einem Gewicht von 29,23 g, einem Feingehalt von 889/1000 und einem Feingewicht von 25,98 g</i>» та встановлення 1566 як головної валютної монети Райху. Підтверджує також якір функціонального кінця «<i>als Währungsmünze des Reichs ungefähr bis zum Jahr 1700</i>» (маркер фази IV у нашій періодизації 1566 → 1620 → 1667 → 1690 → ~1700)."

wikipedia-de-speciestaler:
  de: "Wikipedia (DE): <i>Speciestaler</i> — <a href=\"https://de.wikipedia.org/wiki/Speciestaler\" target=\"_blank\">de.wikipedia.org/wiki/Speciestaler</a>. Beleg für das Funktionsende des 9-Fuß um 1700, den Hamburger Bank-Speciesthaler-Tirage 1730–1764 und die hannöversche 9-Fuß-Insel 1738–1802."
  en: "Wikipedia (DE): <i>Speciestaler</i> — <a href=\"https://de.wikipedia.org/wiki/Speciestaler\" target=\"_blank\">de.wikipedia.org/wiki/Speciestaler</a>. Source for the end of the 9-Fuß circulation function around 1700, the Hamburg Bank-Speciesthaler mintage 1730–1764, and the Hanover 9-Fuß island 1738–1802."
  uk: "Wikipedia (DE): <i>Speciestaler</i> — <a href=\"https://de.wikipedia.org/wiki/Speciestaler\" target=\"_blank\">de.wikipedia.org/wiki/Speciestaler</a>. Джерело про кінець функції 9-Fuß як обігової монети близько 1700 р., гамбурзький Bank-Speciesthaler-тираж 1730–1764 та ганноверський «острів» 9-Fuß 1738–1802."

wikipedia-de-leipziger-fu:
  de: "Wikipedia (DE): <i>Leipziger Fuß</i> — <a href=\"https://de.wikipedia.org/wiki/Leipziger_Fu%C3%9F\" target=\"_blank\">de.wikipedia.org/wiki/Leipziger Fuß</a>. Beleg für Datum (16. Januar 1690), Vertragsparteien (Kurbrandenburg, Kursachsen, Braunschweig-Lüneburg) und die Status-Nuance: 1692 nicht zum Reichsmünzfuß erhoben, erst 1738 durch Karl VI. erhoben."
  en: "Wikipedia (DE): <i>Leipziger Fuß</i> — <a href=\"https://de.wikipedia.org/wiki/Leipziger_Fu%C3%9F\" target=\"_blank\">de.wikipedia.org/wiki/Leipziger Fuß</a>. Source for the date (16 January 1690), the treaty parties (Brandenburg, Saxony, Brunswick-Lüneburg) and the status nuance: not elevated to Reichsmünzfuß in 1692, only by Karl VI in 1738."
  uk: "Wikipedia (DE): <i>Leipziger Fuß</i> — <a href=\"https://de.wikipedia.org/wiki/Leipziger_Fu%C3%9F\" target=\"_blank\">de.wikipedia.org/wiki/Leipziger Fuß</a>. Джерело про дату (16 січня 1690), сторони договору (Бранденбург, Саксонія, Брауншвайг-Люнебург) та статусний нюанс: 1692 р. не піднесено до Reichsmünzfuß, лише 1738 р. за Карла VI."

wikipedia-de-konventionstaler:
  de: "<b>Wikipedia DE «Konventionstaler»</b> — <a href=\"https://de.wikipedia.org/wiki/Konventionstaler\" target=\"_blank\">de.wikipedia.org/wiki/Konventionstaler</a>. Backt verbatim die zwei kanonischen Daten: «<i>Der Konventionstaler wurde als Quasi-Nachfolger des Reichstalers am 7. November 1750 in den österreichischen Ländern eingeführt</i>» und «<i>Durch den Konventionsfuß vom 20. September 1753 fand er im Kurfürstentum Bayern Anwendung</i>». Allgemeine Verbreitung: «<i>Nach und nach breitete er sich in Süddeutschland und Sachsen aus.</i>»."
  en: "<b>Wikipedia DE «Konventionstaler»</b> — <a href=\"https://de.wikipedia.org/wiki/Konventionstaler\" target=\"_blank\">de.wikipedia.org/wiki/Konventionstaler</a>. Verbatim backs the two canonical dates: «<i>Der Konventionstaler wurde als Quasi-Nachfolger des Reichstalers am 7. November 1750 in den österreichischen Ländern eingeführt</i>» and «<i>Durch den Konventionsfuß vom 20. September 1753 fand er im Kurfürstentum Bayern Anwendung</i>». General spread: «<i>Nach und nach breitete er sich in Süddeutschland und Sachsen aus.</i>»."
  uk: "<b>Wikipedia DE «Konventionstaler»</b> — <a href=\"https://de.wikipedia.org/wiki/Konventionstaler\" target=\"_blank\">de.wikipedia.org/wiki/Konventionstaler</a>. Verbatim підтверджує дві канонічні дати: «<i>Der Konventionstaler wurde als Quasi-Nachfolger des Reichstalers am 7. November 1750 in den österreichischen Ländern eingeführt</i>» та «<i>Durch den Konventionsfuß vom 20. September 1753 fand er im Kurfürstentum Bayern Anwendung</i>». Загальне поширення: «<i>Nach und nach breitete er sich in Süddeutschland und Sachsen aus.</i>»."

wikipedia-de-s-chsische-m-nzgeschichte:
  de: "<b>Wikipedia DE «Sächsische Münzgeschichte»</b> — <a href=\"https://de.wikipedia.org/wiki/S%C3%A4chsische_M%C3%BCnzgeschichte\" target=\"_blank\">de.wikipedia.org/wiki/Sächsische Münzgeschichte</a>. Quelle für den entscheidenden Saxon-Pivot 1667: «<i>kam es zur zweiten oder kleinen Kipperzeit, die allerdings Kurbrandenburg und Kursachsen verhinderten, indem sie in Zinna 1667 einen Münzfuß vereinbarten</i>»; «<i>Der ⅔ Taler (⅔ Kuranttaler) oder Gulden zu 16 Groschen wurde das neue Hauptnominal. Der Kuranttaler zu 24 Groschen, bisher Reichstaler genannt, wurde bis auf wenige Ausnahmen nicht ausgeprägt</i>»; «<i>Der Reichstaler wurde lediglich für die Zahlungsverpflichtung der sächsischen Bergbauverwaltung als Speciesreichstaler zu 28 Groschen weitergeprägt</i>». Klärt das 1690er Verhältnis: «<i>Die Speciesreichstaler wurden weiterhin im Reichsmünzfuß geprägt, jedoch mit erhöhtem Wert zu 32 Groschen</i>» — d. h. nach 1690 Speciesreichstaler weiter im 9-Fuß, nur mit Tarif-Revaluation. Datierungs-Variante: «<i>den der Regensburger Reichstag 1735 zum neuen Münzfuß erklärte</i>» — Sächs. Wiki nennt 1735, Wikipedia DE «Leipziger Fuß» und Bobzin nennen 1738."
  en: "<b>Wikipedia DE «Sächsische Münzgeschichte»</b> — <a href=\"https://de.wikipedia.org/wiki/S%C3%A4chsische_M%C3%BCnzgeschichte\" target=\"_blank\">de.wikipedia.org/wiki/Sächsische Münzgeschichte</a>. Source for the decisive Saxon pivot 1667: «<i>kam es zur zweiten oder kleinen Kipperzeit, die allerdings Kurbrandenburg und Kursachsen verhinderten, indem sie in Zinna 1667 einen Münzfuß vereinbarten</i>»; «<i>Der ⅔ Taler (⅔ Kuranttaler) oder Gulden zu 16 Groschen wurde das neue Hauptnominal. Der Kuranttaler zu 24 Groschen, bisher Reichstaler genannt, wurde bis auf wenige Ausnahmen nicht ausgeprägt</i>»; «<i>Der Reichstaler wurde lediglich für die Zahlungsverpflichtung der sächsischen Bergbauverwaltung als Speciesreichstaler zu 28 Groschen weitergeprägt</i>». Clarifies the 1690 relationship: «<i>Die Speciesreichstaler wurden weiterhin im Reichsmünzfuß geprägt, jedoch mit erhöhtem Wert zu 32 Groschen</i>» — i.e. after 1690 Speciesreichstaler continue in the 9-Fuß with tariff revaluation only. Dating variant: «<i>den der Regensburger Reichstag 1735 zum neuen Münzfuß erklärte</i>» — Sax. Wiki says 1735, Wikipedia DE «Leipziger Fuß» and Bobzin say 1738."
  uk: "<b>Wikipedia DE «Sächsische Münzgeschichte»</b> — <a href=\"https://de.wikipedia.org/wiki/S%C3%A4chsische_M%C3%BCnzgeschichte\" target=\"_blank\">de.wikipedia.org/wiki/Sächsische Münzgeschichte</a>. Джерело для вирішального саксонського переломного моменту 1667: «<i>kam es zur zweiten oder kleinen Kipperzeit, die allerdings Kurbrandenburg und Kursachsen verhinderten, indem sie in Zinna 1667 einen Münzfuß vereinbarten</i>»; «<i>Der ⅔ Taler (⅔ Kuranttaler) oder Gulden zu 16 Groschen wurde das neue Hauptnominal. Der Kuranttaler zu 24 Groschen, bisher Reichstaler genannt, wurde bis auf wenige Ausnahmen nicht ausgeprägt</i>»; «<i>Der Reichstaler wurde lediglich für die Zahlungsverpflichtung der sächsischen Bergbauverwaltung als Speciesreichstaler zu 28 Groschen weitergeprägt</i>». Уточнює 1690-відносини: «<i>Die Speciesreichstaler wurden weiterhin im Reichsmünzfuß geprägt, jedoch mit erhöhtem Wert zu 32 Groschen</i>» — тобто після 1690 Speciesreichstaler-и далі в 9-Fuß, лише з тарифною ревалоризацією. Варіант датування: «<i>den der Regensburger Reichstag 1735 zum neuen Münzfuß erklärte</i>» — Сакс. Вікі каже 1735, Wikipedia DE «Leipziger Fuß» і Bobzin кажуть 1738."

wikipedia-de-zinnaer-m-nzfu:
  de: "<b>Wikipedia DE «Zinnaer Münzfuß»</b> — <a href=\"https://de.wikipedia.org/wiki/Zinnaer_M%C3%BCnzfu%C3%9F\" target=\"_blank\">de.wikipedia.org/wiki/Zinnaer Münzfuß</a>. Eigene Wiki-Karte zum Zinnaer Vertrag 1667: «<i>Der Zinnaer Münzvertrag von 1667 wurde im Kloster Zinna... zwischen Kurbrandenburg... und Kursachsen geschlossen</i>». Wichtige Klarstellung zum 9-Fuß-Status: «<i>Die beiden Staaten vereinbarten, als Münzfuß den 9-Taler-Fuß der Augsburger Reichsmünzordnung von 1559 beizubehalten, aber die Scheidemünzen im 10½-Taler-Fuß auszumünzen</i>» — d. h. der 9-Fuß wird formell <em>nicht</em> aufgegeben, nur die Scheidemünzen wandern in den leichteren 10½-Fuß. Brunswick-Beitritt 1668: «<i>Mit dem Vertragsbeitritt des Herzogtums Braunschweig-Lüneburg im Jahr 1668 wurde zugleich vereinbart, den 10½-Taler-Fuß auch auf die Ausprägung der 2/3-, 1/3- und 1/6-Taler-Münzen anzuwenden</i>» — formell beginnt die ⅔-Taler-Hauptnominal-Phase 1668, nicht 1667."
  en: "<b>Wikipedia DE «Zinnaer Münzfuß»</b> — <a href=\"https://de.wikipedia.org/wiki/Zinnaer_M%C3%BCnzfu%C3%9F\" target=\"_blank\">de.wikipedia.org/wiki/Zinnaer Münzfuß</a>. Dedicated wiki entry for the Zinnaer Vertrag 1667: «<i>Der Zinnaer Münzvertrag von 1667 wurde im Kloster Zinna... zwischen Kurbrandenburg... und Kursachsen geschlossen</i>». Important clarification on 9-Fuß status: «<i>Die beiden Staaten vereinbarten, als Münzfuß den 9-Taler-Fuß der Augsburger Reichsmünzordnung von 1559 beizubehalten, aber die Scheidemünzen im 10½-Taler-Fuß auszumünzen</i>» — i.e. the 9-Fuß is formally <em>not</em> abandoned, only the petty coinage moves to the lighter 10½-Fuß. Brunswick joins 1668: «<i>Mit dem Vertragsbeitritt des Herzogtums Braunschweig-Lüneburg im Jahr 1668 wurde zugleich vereinbart, den 10½-Taler-Fuß auch auf die Ausprägung der 2/3-, 1/3- und 1/6-Taler-Münzen anzuwenden</i>» — formally the ⅔-Taler-as-main-denomination phase begins 1668, not 1667."
  uk: "<b>Wikipedia DE «Zinnaer Münzfuß»</b> — <a href=\"https://de.wikipedia.org/wiki/Zinnaer_M%C3%BCnzfu%C3%9F\" target=\"_blank\">de.wikipedia.org/wiki/Zinnaer Münzfuß</a>. Окрема вікі-стаття про Zinnaer Vertrag 1667: «<i>Der Zinnaer Münzvertrag von 1667 wurde im Kloster Zinna... zwischen Kurbrandenburg... und Kursachsen geschlossen</i>». Важливе уточнення статусу 9-Fuß: «<i>Die beiden Staaten vereinbarten, als Münzfuß den 9-Taler-Fuß der Augsburger Reichsmünzordnung von 1559 beizubehalten, aber die Scheidemünzen im 10½-Taler-Fuß auszumünzen</i>» — тобто 9-Fuß формально <em>не</em> відмінено, лише розмінна монета переходить у легший 10½-Fuß. Brunswick приєднується 1668: «<i>Mit dem Vertragsbeitritt des Herzogtums Braunschweig-Lüneburg im Jahr 1668 wurde zugleich vereinbart, den 10½-Taler-Fuß auch auf die Ausprägung der 2/3-, 1/3- und 1/6-Taler-Münzen anzuwenden</i>» — формально фаза «⅔-Thaler як головний номінал» починається 1668, не 1667."

wikipedia-de-augsburger-reichsm-nzordnung:
  de: "<b>Wikipedia DE «Augsburger Reichsmünzordnung»</b> — <a href=\"https://de.wikipedia.org/wiki/Augsburger_Reichsm%C3%BCnzordnung\" target=\"_blank\">de.wikipedia.org/wiki/Augsburger Reichsmünzordnung</a>. Backt die 1559/1566-Doppeldatierung: «<i>Acht Jahre später legte Kaiser Ferdinand I. dem Reichstag in Augsburg mit der sogenannten „Keysers Ferdinandi newe Münzordnung zu Augspurg M.D.LIX\" ein Münzedikt vor</i>» (1559er Edikt) und «<i>1566 akzeptierte der Reichstag diese Situation und machte den Silbertaler (Raugewicht 29,23 Gramm, 889/1000 Teile Silber) zur allgemeinen Währungsmünze im Reich</i>» — der Reichsabschied 1566 ist formelle Anerkennung des bereits in der Praxis verbreiteten Talers, nicht Neuformulierung."
  en: "<b>Wikipedia DE «Augsburger Reichsmünzordnung»</b> — <a href=\"https://de.wikipedia.org/wiki/Augsburger_Reichsm%C3%BCnzordnung\" target=\"_blank\">de.wikipedia.org/wiki/Augsburger Reichsmünzordnung</a>. Backs the 1559/1566 double dating: «<i>Acht Jahre später legte Kaiser Ferdinand I. dem Reichstag in Augsburg mit der sogenannten „Keysers Ferdinandi newe Münzordnung zu Augspurg M.D.LIX\" ein Münzedikt vor</i>» (1559 edict) and «<i>1566 akzeptierte der Reichstag diese Situation und machte den Silbertaler (Raugewicht 29,23 Gramm, 889/1000 Teile Silber) zur allgemeinen Währungsmünze im Reich</i>» — the 1566 Reichsabschied is the formal recognition of an already-established practice, not a new formulation."
  uk: "<b>Wikipedia DE «Augsburger Reichsmünzordnung»</b> — <a href=\"https://de.wikipedia.org/wiki/Augsburger_Reichsm%C3%BCnzordnung\" target=\"_blank\">de.wikipedia.org/wiki/Augsburger Reichsmünzordnung</a>. Підтверджує подвійне датування 1559/1566: «<i>Acht Jahre später legte Kaiser Ferdinand I. dem Reichstag in Augsburg mit der sogenannten „Keysers Ferdinandi newe Münzordnung zu Augspurg M.D.LIX\" ein Münzedikt vor</i>» (едикт 1559) та «<i>1566 akzeptierte der Reichstag diese Situation und machte den Silbertaler (Raugewicht 29,23 Gramm, 889/1000 Teile Silber) zur allgemeinen Währungsmünze im Reich</i>» — Reichsabschied 1566 є формальним визнанням уже усталеної практики, а не новою формулою."

dewiki-taler:
  de: "<b>DeWiki «Taler»</b> — <a href=\"https://dewiki.de/Lexikon/Taler\" target=\"_blank\">dewiki.de/Lexikon/Taler</a>. Backt das Bild des graduellen Volumenrückgangs für ganz Norddeutschland: «<i>Ganze Reichstaler nach dem Reichsmünzfuß wurden zusehends weniger ausgeprägt</i>» (qualitative Beschreibung des 17.-Jh.-Trends, kein 1690-Schalter); «<i>Diese Zweidritteltaler wurden für längere Zeit ein vorherrschender Münztypus in Norddeutschland</i>» (post-1667-Bild). Zugleich Beleg für die Substitution des Reichsthaler-Hauptumlaufs durch Écus blancs: «<i>Vor allem die seit 1641 geprägten französischen Taler, die Écus blancs, bildeten in der ersten Hälfte des 18. Jahrhunderts in weiten Theilen Deutschlands die Hauptumlaufmünze</i>»."
  en: "<b>DeWiki «Taler»</b> — <a href=\"https://dewiki.de/Lexikon/Taler\" target=\"_blank\">dewiki.de/Lexikon/Taler</a>. Backs the picture of gradual volume decline for all of Northern Germany: «<i>Ganze Reichstaler nach dem Reichsmünzfuß wurden zusehends weniger ausgeprägt</i>» (qualitative description of the 17th-c. trend, not a 1690 switch); «<i>Diese Zweidritteltaler wurden für längere Zeit ein vorherrschender Münztypus in Norddeutschland</i>» (post-1667 picture). Also documents substitution of the Reichsthaler-as-Hauptumlaufmünze by Écus blancs: «<i>Vor allem die seit 1641 geprägten französischen Taler, die Écus blancs, bildeten in der ersten Hälfte des 18. Jahrhunderts in weiten Teilen Deutschlands die Hauptumlaufmünze</i>»."
  uk: "<b>DeWiki «Taler»</b> — <a href=\"https://dewiki.de/Lexikon/Taler\" target=\"_blank\">dewiki.de/Lexikon/Taler</a>. Підтверджує картину поступового падіння обсягів для всієї Північної Німеччини: «<i>Ganze Reichstaler nach dem Reichsmünzfuß wurden zusehends weniger ausgeprägt</i>» (якісний опис тренду XVII ст., не перемикач 1690 р.); «<i>Diese Zweidritteltaler wurden für längere Zeit ein vorherrschender Münztypus in Norddeutschland</i>» (картина після 1667). Також документує заміщення Reichsthaler-Hauptumlaufmünze французькими Écus blancs: «<i>Vor allem die seit 1641 geprägten französischen Taler, die Écus blancs, bildeten in der ersten Hälfte des 18. Jahrhunderts in weiten Teilen Deutschlands die Hauptumlaufmünze</i>»."

wikipedia-de-deutsche-w-hrungsgeschichte-vor-1871:
  de: "<b>Wikipedia DE «Deutsche Währungsgeschichte vor 1871»</b> — <a href=\"https://de.wikipedia.org/wiki/Deutsche_W%C3%A4hrungsgeschichte_vor_1871\" target=\"_blank\">de.wikipedia.org/wiki/Deutsche Währungsgeschichte vor 1871</a>. Backt die 1566-Etablierung als Hauptwährungsmünze («<i>Der Reichstaler von 1566 wurde mit der Augsburger Reichsmünzordnung von 1559 geschaffen und wurde bald zur Hauptwährungsmünze Deutschlands</i>»), die Hauptproduzenten («<i>Reichstaler... wurden in der Mehrzahl von den Wettinern (Sachsen) und Welfen (Braunschweig-Lüneburg) geprägt</i>»), und die graduelle Erosion («<i>Schließlich wurden auch die Reichstaler selbst nicht mehr streng nach dem 9-Taler-Fuß geprägt; der Feingehalt der umlaufenden Reichstaler sank und konnte nicht mehr als Wertstandard dienen</i>»)."
  en: "<b>Wikipedia DE «Deutsche Währungsgeschichte vor 1871»</b> — <a href=\"https://de.wikipedia.org/wiki/Deutsche_W%C3%A4hrungsgeschichte_vor_1871\" target=\"_blank\">de.wikipedia.org/wiki/Deutsche Währungsgeschichte vor 1871</a>. Backs the 1566 establishment as principal currency («<i>Der Reichstaler von 1566 wurde mit der Augsburger Reichsmünzordnung von 1559 geschaffen und wurde bald zur Hauptwährungsmünze Deutschlands</i>»), the main producers («<i>Reichstaler... wurden in der Mehrzahl von den Wettinern (Sachsen) und Welfen (Braunschweig-Lüneburg) geprägt</i>»), and the gradual erosion («<i>Schließlich wurden auch die Reichstaler selbst nicht mehr streng nach dem 9-Taler-Fuß geprägt; der Feingehalt der umlaufenden Reichstaler sank und konnte nicht mehr als Wertstandard dienen</i>»)."
  uk: "<b>Wikipedia DE «Deutsche Währungsgeschichte vor 1871»</b> — <a href=\"https://de.wikipedia.org/wiki/Deutsche_W%C3%A4hrungsgeschichte_vor_1871\" target=\"_blank\">de.wikipedia.org/wiki/Deutsche Währungsgeschichte vor 1871</a>. Підтверджує встановлення 1566 як головної валюти («<i>Der Reichstaler von 1566 wurde mit der Augsburger Reichsmünzordnung von 1559 geschaffen und wurde bald zur Hauptwährungsmünze Deutschlands</i>»), головних продуцентів («<i>Reichstaler... wurden in der Mehrzahl von den Wettinern (Sachsen) und Welfen (Braunschweig-Lüneburg) geprägt</i>») та поступову ерозію («<i>Schließlich wurden auch die Reichstaler selbst nicht mehr streng nach dem 9-Taler-Fuß geprägt; der Feingehalt der umlaufenden Reichstaler sank und konnte nicht mehr als Wertstandard dienen</i>»)."

kuenker-numismatik-taler-praegungen:
  de: "<b>Künker — Taler-Prägungen</b> — <a href=\"https://www.kuenker-numismatik.de/taler-praegungen/\" target=\"_blank\">kuenker-numismatik.de/taler-praegungen</a>. Modernes Auktionshaus-Sourcing der 1566-Spec («<i>Aus einer Kölner Mark Silber (233,85 g) sollten künftig neun Taler ausgeprägt werden (sog. 9-Taler-Fuß)</i>») und der zentralen 9 → 13⅓-Substitutionsformel: «<i>Umgerechnet in den theoretischen (Zähl-)Reichstaler des alten deutschen Reiches zu 24 Groschen entsprach der Konventionstaler einem 13⅓-Taler-Fuß (13 1/3 Stück aus der feinen Silbermark zu 233,855 g) anstelle des 1566 vereinbarten 9-Taler-Fußes</i>»."
  en: "<b>Künker — Taler-Prägungen</b> — <a href=\"https://www.kuenker-numismatik.de/taler-praegungen/\" target=\"_blank\">kuenker-numismatik.de/taler-praegungen</a>. Modern auction-house sourcing of the 1566 spec («<i>Aus einer Kölner Mark Silber (233,85 g) sollten künftig neun Taler ausgeprägt werden (sog. 9-Taler-Fuß)</i>») and the central 9 → 13⅓ substitution formula: «<i>Umgerechnet in den theoretischen (Zähl-)Reichstaler des alten deutschen Reiches zu 24 Groschen entsprach der Konventionstaler einem 13⅓-Taler-Fuß (13 1/3 Stück aus der feinen Silbermark zu 233,855 g) anstelle des 1566 vereinbarten 9-Taler-Fußes</i>»."
  uk: "<b>Künker — Taler-Prägungen</b> — <a href=\"https://www.kuenker-numismatik.de/taler-praegungen/\" target=\"_blank\">kuenker-numismatik.de/taler-praegungen</a>. Сучасне аукціон-сорсінг специфікації 1566 («<i>Aus einer Kölner Mark Silber (233,85 g) sollten künftig neun Taler ausgeprägt werden (sog. 9-Taler-Fuß)</i>») та центральної формули заміщення 9 → 13⅓: «<i>Umgerechnet in den theoretischen (Zähl-)Reichstaler des alten deutschen Reiches zu 24 Groschen entsprach der Konventionstaler einem 13⅓-Taler-Fuß (13 1/3 Stück aus der feinen Silbermark zu 233,855 g) anstelle des 1566 vereinbarten 9-Taler-Fußes</i>»."

mgmindex-index-php-title-species:
  de: "<b>MGM Münzlexikon — Species</b> — <a href=\"https://www.mgmindex.de/index.php?title=Species\" target=\"_blank\">mgmindex.de/Species</a>. Backt die Definition Species ↔ Rechnungsmünze: «<i>die konkrete Münze im Gegensatz zur (ideellen) → Rechnungsmünze (Zähltaler)</i>» und die zentrale terminologische Bindung des Species-Begriffs an den 9-Fuß-Reichstaler bis ~1750: «<i>Bis zur Mitte des 18. Jh. (Einführung des → Konventionsfußes) wurden die Reichstaler im 9-Taler-Fuß als „Speciestaler\" bezeichnet</i>»."
  en: "<b>MGM Münzlexikon — Species</b> — <a href=\"https://www.mgmindex.de/index.php?title=Species\" target=\"_blank\">mgmindex.de/Species</a>. Backs the Species ↔ Rechnungsmünze definition: «<i>die konkrete Münze im Gegensatz zur (ideellen) → Rechnungsmünze (Zähltaler)</i>» and the central terminological binding of «Species» to the 9-Fuß-Reichstaler until ~1750: «<i>Bis zur Mitte des 18. Jh. (Einführung des → Konventionsfußes) wurden die Reichstaler im 9-Taler-Fuß als „Speciestaler\" bezeichnet</i>»."
  uk: "<b>MGM Münzlexikon — Species</b> — <a href=\"https://www.mgmindex.de/index.php?title=Species\" target=\"_blank\">mgmindex.de/Species</a>. Підтверджує визначення Species ↔ Rechnungsmünze: «<i>die konkrete Münze im Gegensatz zur (ideellen) → Rechnungsmünze (Zähltaler)</i>» та центральну термінологічну прив'язку Species до 9-Fuß-Reichstaler до ~1750: «<i>Bis zur Mitte des 18. Jh. (Einführung des → Konventionsfußes) wurden die Reichstaler im 9-Taler-Fuß als „Speciestaler\" bezeichnet</i>»."

elexikon-leipziger-m-nzfu:
  de: "<b>Meyers Großes Konversations-Lexikon, 4. Aufl. (1885–1892), s.v. «Münzfuß»</b> — eLexikon: <a href=\"https://elexikon.ch/Leipziger+M%C3%BCnzfu%C3%9F\" target=\"_blank\">elexikon.ch/Leipziger Münzfuß</a> (verweist auf den Müntzfuß-Hauptartikel Bd. 11, S. 890). Period-Lexikon des späten 19. Jh., backt verbatim alle vier Anker-Daten der Müntzfuß-Geschichte: <em>Zinna 1667</em> «<i>der zwischen Sachsen und Brandenburg 1667 verabredete sogen. zinnaische Münzfuß, nach welchem die Mark Silber zu 10½ Thlr. oder 15¾ Guld. ausgeprägt wurde</i>»; <em>Leipziger 1690 + 1738 Erhebung</em> «<i>der Leipziger oder 18-Gulden-Fuß von 1690, der die Mark zu 12 Thlr. oder 18 Guld. ausbrachte, und der zwar 1738 zum Reichsfuß erhoben, aber nicht allgemein eingeführt wurde</i>»; <em>Konvention 1753 + 1763 Diffusion</em> «<i>der Konventions- oder 20-Gulden-Fuß, nach welchem infolge einer 1753 zwischen Österreich und Bayern abgeschlossenen Konvention, welcher später bis 1763 der bayrische, schwäbische, ober- und niederrheinische Kreis sowie der Kurfürst und die Herzöge von Sachsen beitraten, die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>»; <em>Graumann 1750 + 1764</em> «<i>der preußische oder (nach dem damaligen Generalmünzdirektor Philipp Graumann genannte) Graumannsche Münzfuß von 1750 (durch das Edikt vom 29. März 1764 fester gestaltet), nach welchem die Mark zu 14 Thlr. ausgeprägt wurde</i>». Wichtige Period-Beobachtung: 1738 war «aber nicht allgemein eingeführt» — die Reichsfuß-Erhebung war formal, nicht Empire-weit durchgesetzt."
  en: "<b>Meyers Großes Konversations-Lexikon, 4th ed. (1885–1892), s.v. «Münzfuß»</b> — eLexikon: <a href=\"https://elexikon.ch/Leipziger+M%C3%BCnzfu%C3%9F\" target=\"_blank\">elexikon.ch/Leipziger Münzfuß</a> (cross-refers to the Müntzfuß main article, vol. 11, p. 890). Period encyclopaedia of the late 19th century, backs verbatim all four anchor dates of Müntzfuß history: <em>Zinna 1667</em> «<i>der zwischen Sachsen und Brandenburg 1667 verabredete sogen. zinnaische Münzfuß, nach welchem die Mark Silber zu 10½ Thlr. oder 15¾ Guld. ausgeprägt wurde</i>»; <em>Leipziger 1690 + 1738 erhebung</em> «<i>der Leipziger oder 18-Gulden-Fuß von 1690, der die Mark zu 12 Thlr. oder 18 Guld. ausbrachte, und der zwar 1738 zum Reichsfuß erhoben, aber nicht allgemein eingeführt wurde</i>»; <em>Convention 1753 + 1763 diffusion</em> «<i>der Konventions- oder 20-Gulden-Fuß, nach welchem infolge einer 1753 zwischen Österreich und Bayern abgeschlossenen Konvention, welcher später bis 1763 der bayrische, schwäbische, ober- und niederrheinische Kreis sowie der Kurfürst und die Herzöge von Sachsen beitraten, die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>»; <em>Graumann 1750 + 1764</em> «<i>der preußische oder (nach dem damaligen Generalmünzdirektor Philipp Graumann genannte) Graumannsche Münzfuß von 1750 (durch das Edikt vom 29. März 1764 fester gestaltet), nach welchem die Mark zu 14 Thlr. ausgeprägt wurde</i>». Key period observation: 1738 was «aber nicht allgemein eingeführt» — the Reichsfuß elevation was formal, not Empire-wide enforced."
  uk: "<b>Meyers Großes Konversations-Lexikon, 4-те вид. (1885–1892), s.v. «Münzfuß»</b> — eLexikon: <a href=\"https://elexikon.ch/Leipziger+M%C3%BCnzfu%C3%9F\" target=\"_blank\">elexikon.ch/Leipziger Münzfuß</a> (відсилає до головної статті Müntzfuß, т. 11, с. 890). Період-енциклопедія кінця XIX ст., підтверджує verbatim усі чотири якірних дати історії Müntzfuß: <em>Zinna 1667</em> «<i>der zwischen Sachsen und Brandenburg 1667 verabredete sogen. zinnaische Münzfuß, nach welchem die Mark Silber zu 10½ Thlr. oder 15¾ Guld. ausgeprägt wurde</i>»; <em>Leipziger 1690 + 1738 erhebung</em> «<i>der Leipziger oder 18-Gulden-Fuß von 1690, der die Mark zu 12 Thlr. oder 18 Guld. ausbrachte, und der zwar 1738 zum Reichsfuß erhoben, aber nicht allgemein eingeführt wurde</i>»; <em>Конвенція 1753 + 1763 поширення</em> «<i>der Konventions- oder 20-Gulden-Fuß, nach welchem infolge einer 1753 zwischen Österreich und Bayern abgeschlossenen Konvention, welcher später bis 1763 der bayrische, schwäbische, ober- und niederrheinische Kreis sowie der Kurfürst und die Herzöge von Sachsen beitraten, die kölnische Mark fein Silber zu 20 Guld. oder 13⅓ Thlr. ausgeprägt wurde</i>»; <em>Graumann 1750 + 1764</em> «<i>der preußische oder (nach dem damaligen Generalmünzdirektor Philipp Graumann genannte) Graumannsche Münzfuß von 1750 (durch das Edikt vom 29. März 1764 fester gestaltet), nach welchem die Mark zu 14 Thlr. ausgeprägt wurde</i>». Ключове період-спостереження: 1738 було «aber nicht allgemein eingeführt» — піднесення до Reichsfuß'у було формальним, не загальноімперським."

wikipedia-de-bancotaler:
  de: "Wikipedia (DE): <i>Bancotaler</i> — <a href=\"https://de.wikipedia.org/wiki/Bancotaler\" target=\"_blank\">de.wikipedia.org/wiki/Bancotaler</a>. Beleg für die preußische Bancotaler-Prägung 1766 mit Jahreszahl 1765 (100 000 Stück, Stempelschneider Jakob Abraham), die Nicht-Inumlaufsetzung wegen anfänglicher Erfolgslosigkeit der Berliner Bank und die Einschmelzung 1790."
  en: "Wikipedia (DE): <i>Bancotaler</i> — <a href=\"https://de.wikipedia.org/wiki/Bancotaler\" target=\"_blank\">de.wikipedia.org/wiki/Bancotaler</a>. Source for the Prussian Bancotaler struck in 1766 but dated 1765 (100,000 pieces, dies by Jakob Abraham), the fact that none entered circulation owing to the early failure of the Berlin Bank, and the melting down in 1790."
  uk: "Wikipedia (DE): <i>Bancotaler</i> — <a href=\"https://de.wikipedia.org/wiki/Bancotaler\" target=\"_blank\">de.wikipedia.org/wiki/Bancotaler</a>. Джерело про прусський Bancotaler, накарбований 1766 р. з датою 1765 (100 000 штук, штемпельник Jakob Abraham), невипуск в обіг через початкову невдачу Берлінського банку та переплавлення 1790 р."

wikipedia-de-bremische-m-nzen:
  de: "Wikipedia (DE): <i>Bremische Münzen</i> — <a href=\"https://de.wikipedia.org/wiki/Bremische_M%C3%BCnzen\" target=\"_blank\">de.wikipedia.org/wiki/Bremische Münzen</a>. Beleg für die ideelle Goldwährung Bremens als Sonderfall der deutschen Münzgeschichte des 18. Jahrhunderts: keine eigene Goldprägung, Rechnung im Louisdor / Pistole."
  en: "Wikipedia (DE): <i>Bremische Münzen</i> — <a href=\"https://de.wikipedia.org/wiki/Bremische_M%C3%BCnzen\" target=\"_blank\">de.wikipedia.org/wiki/Bremische Münzen</a>. Source for Bremen's notional gold standard as an exceptional case in 18th-century German monetary history: no local gold mintage, all reckoning carried out in the Louisdor / Pistole."
  uk: "Wikipedia (DE): <i>Bremische Münzen</i> — <a href=\"https://de.wikipedia.org/wiki/Bremische_M%C3%BCnzen\" target=\"_blank\">de.wikipedia.org/wiki/Bremische Münzen</a>. Джерело про ідеальну золоту валюту Бремена як виняток у німецькій монетній історії XVIII ст.: власне золоте карбування відсутнє, увесь облік у Louisdor / Pistole."

helmutcaspar-bremen:
  de: "<b>Caspar, Helmut</b>: <i>Thaler Gold aus Bremen</i> — <a href=\"http://www.helmutcaspar.de/aktuelles17/muenzmed17/bremen.htm\" target=\"_blank\">helmutcaspar.de/aktuelles17/muenzmed17/bremen.htm</a>. Beleg für die Obrigkeitliche Verordnung vom 25. Juli 1870, mit der der Thaler Gold in Bremen gesetzliches Zahlungsmittel wurde."
  en: "<b>Caspar, Helmut</b>: <i>Thaler Gold aus Bremen</i> — <a href=\"http://www.helmutcaspar.de/aktuelles17/muenzmed17/bremen.htm\" target=\"_blank\">helmutcaspar.de/aktuelles17/muenzmed17/bremen.htm</a>. Source for the Obrigkeitliche Verordnung of 25 July 1870, by which the Thaler Gold became legal tender in Bremen."
  uk: "<b>Caspar, Helmut</b>: <i>Thaler Gold aus Bremen</i> — <a href=\"http://www.helmutcaspar.de/aktuelles17/muenzmed17/bremen.htm\" target=\"_blank\">helmutcaspar.de/aktuelles17/muenzmed17/bremen.htm</a>. Джерело про Obrigkeitliche Verordnung 25 липня 1870 р., якою Thaler Gold отримав статус законного платіжного засобу в Бремені."

bankstil-steffen-krug-ueber-mark-banco-silberstandard-und-das-jahr-1873:
  de: "<b>Krug, Steffen</b>: <i>Die Geschichte der Mark Banco und der Hamburger Bank</i> — <a href=\"https://bankstil.de/steffen-krug-ueber-mark-banco-silberstandard-und-das-jahr-1873/\" target=\"_blank\">bankstil.de</a>. Beleg für das Datum 1868 als formelle Umstellung des Hamburger Bankfußes von der Cöllnischen Marck auf das Zollpfund."
  en: "<b>Krug, Steffen</b>: <i>Die Geschichte der Mark Banco und der Hamburger Bank</i> — <a href=\"https://bankstil.de/steffen-krug-ueber-mark-banco-silberstandard-und-das-jahr-1873/\" target=\"_blank\">bankstil.de</a>. Source for the date 1868 as the formal switch of the Hamburger Bankfuß from the Cöllnische Marck to the Zollpfund."
  uk: "<b>Krug, Steffen</b>: <i>Die Geschichte der Mark Banco und der Hamburger Bank</i> — <a href=\"https://bankstil.de/steffen-krug-ueber-mark-banco-silberstandard-und-das-jahr-1873/\" target=\"_blank\">bankstil.de</a>. Джерело для дати 1868 р. як формального переходу Hamburger Bankfuß з Кельнської марки на Zollpfund."

wikipedia-de-albertustaler:
  de: "Wikipedia (DE): <i>Albertustaler</i> — <a href=\"https://de.wikipedia.org/wiki/Albertustaler\" target=\"_blank\">de.wikipedia.org/wiki/Albertustaler</a>. Beleg für die Einführung des Albertustalers / Patagon in den Spanischen Niederlanden 1612, die Fortprägung in den Vereinigten Niederlanden 1659–1802 und die Rolle als Haupthandelsmünze im Ostseeraum."
  en: "Wikipedia (DE): <i>Albertustaler</i> — <a href=\"https://de.wikipedia.org/wiki/Albertustaler\" target=\"_blank\">de.wikipedia.org/wiki/Albertustaler</a>. Source for the introduction of the Albertustaler / Patagon in the Spanish Netherlands from 1612, its continued issue in the United Provinces 1659–1802, and its role as the principal trade coin of the Baltic region."
  uk: "Wikipedia (DE): <i>Albertustaler</i> — <a href=\"https://de.wikipedia.org/wiki/Albertustaler\" target=\"_blank\">de.wikipedia.org/wiki/Albertustaler</a>. Джерело про запровадження Albertustaler / Patagon в Іспанських Нідерландах 1612 р., продовження карбування в Об'єднаних провінціях 1659–1802 рр. та роль як головної торгової монети Балтійського регіону."

wikipedia-de-friedrich-d-or:
  de: "Wikipedia (DE): <i>Friedrich d'or</i> — <a href=\"https://de.wikipedia.org/wiki/Friedrich_d%27or\" target=\"_blank\">de.wikipedia.org/wiki/Friedrich d'or</a>. Beleg für Einführungsdatum 1741 (Friedrich II.), Vorgängerprägung Wilhelm d'or 1737, 1770-Reduktion des Feingewichts von 6,05 auf 6,03 g, Mittel-Friedrich d'or 1756–1763 mit nur 4,2 g fein, Subnominale ½ / 1 / 2 Friedrich d'or, Einziehung ab 1855."
  en: "Wikipedia (DE): <i>Friedrich d'or</i> — <a href=\"https://de.wikipedia.org/wiki/Friedrich_d%27or\" target=\"_blank\">de.wikipedia.org/wiki/Friedrich d'or</a>. Source for introduction in 1741 (Friedrich II), the predecessor Wilhelm d'or of 1737, the 1770 fine-weight reduction from 6.05 to 6.03 g, the Mittel-Friedrich d'or of 1756–1763 at only 4.2 g fine, the ½ / 1 / 2 Friedrich d'or sub-denominations, and the withdrawal from 1855."
  uk: "Wikipedia (DE): <i>Friedrich d'or</i> — <a href=\"https://de.wikipedia.org/wiki/Friedrich_d%27or\" target=\"_blank\">de.wikipedia.org/wiki/Friedrich d'or</a>. Джерело про запровадження 1741 р. (Friedrich II), попередник Wilhelm d'or 1737, редукція чистої ваги 1770 р. з 6,05 до 6,03 г, Mittel-Friedrich d'or 1756–1763 з лише 4,2 г чистого, субномінали ½ / 1 / 2 Friedrich d'or, вилучення з 1855 р."

danskmoent-2chrdor:
  de: "danskmoent.dk: <i>2 Christian d'or</i> — <a href=\"https://www.danskmoent.dk/2chrdor.htm\" target=\"_blank\">danskmoent.dk/2chrdor.htm</a>. Beleg für Erstprägung 1771 unter Christian VII., letzte Prägung 1870 unter Christian IX., Vorbild Louis d'or, Verwendung «<i>mest til internationale betalinger</i>»."
  en: "danskmoent.dk: <i>2 Christian d'or</i> — <a href=\"https://www.danskmoent.dk/2chrdor.htm\" target=\"_blank\">danskmoent.dk/2chrdor.htm</a>. Source for the first issue in 1771 under Christian VII, the last issue in 1870 under Christian IX, the Louis d'or model, and the use «<i>mest til internationale betalinger</i>» (mostly for international payments)."
  uk: "danskmoent.dk: <i>2 Christian d'or</i> — <a href=\"https://www.danskmoent.dk/2chrdor.htm\" target=\"_blank\">danskmoent.dk/2chrdor.htm</a>. Джерело про першу емісію 1771 р. за Christian VII, останню 1870 р. за Christian IX, зразок Louis d'or, та вживання «<i>mest til internationale betalinger</i>» (переважно для міжнародних розрахунків)."

wikipedia-de-pistole-m-nze:
  de: "Wikipedia (DE): <i>Pistole (Münze)</i> — <a href=\"https://de.wikipedia.org/wiki/Pistole_(M%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Pistole (Münze)</a>. Beleg für die spanische Doppel-Escudo-Tradition seit 1537 / 1566, die französische Übernahme 1640 unter dem Namen «Pistole» (Wert 10 Livre, später Louis d'or), und die Verwendung der Bezeichnung im 18.–19. Jh. in Deutschland für 5-Taler-Goldmünzen wie den Friedrich d'or."
  en: "Wikipedia (DE): <i>Pistole (Münze)</i> — <a href=\"https://de.wikipedia.org/wiki/Pistole_(M%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Pistole (Münze)</a>. Source for the Spanish double-escudo tradition from 1537/1566, the French adoption in 1640 under the name «Pistole» (worth 10 livres, later struck as the Louis d'or), and the 18th–19th-century use of the term in Germany for 5-thaler gold coins such as the Friedrich d'or."
  uk: "Wikipedia (DE): <i>Pistole (Münze)</i> — <a href=\"https://de.wikipedia.org/wiki/Pistole_(M%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Pistole (Münze)</a>. Джерело про іспанську подвійно-escudo-традицію з 1537/1566, французьке запозичення 1640 р. під назвою «Pistole» (вартість 10 livre, пізніше карбувалась як Louis d'or), і вживання терміна у XVIII–XIX ст. у Німеччині щодо 5-талерних золотих монет на кшталт Friedrich d'or."

danskmoent-kuduaxel:
  de: "<b>Ernst, Axel</b>: <i>Kurantdukaten — en dansk Dukat</i> — <a href=\"https://danskmoent.dk/ernst/kuduaxel.htm\" target=\"_blank\">danskmoent.dk/ernst/kuduaxel.htm</a>. Hauptquelle für Phase-I-Standard 1714–1717 (81½ Stück / Mark, 21 Karat, 2,511 g fein), Tarifreduktion 9. Juli 1727, Wiedereinziehung 4. Juli 1757, Frederik-V-Reform 1757 (75/Mark, 2,728 g fein), Massenprägung 1757–1765 (3 030 742 Stück), Christian-VII-Geburtstagsstrich 1771 (131 Stück), Hauptphase 1781–1796 (≈ 237 000 Stück), Subnominale."
  en: "<b>Ernst, Axel</b>: <i>Kurantdukaten — en dansk Dukat</i> — <a href=\"https://danskmoent.dk/ernst/kuduaxel.htm\" target=\"_blank\">danskmoent.dk/ernst/kuduaxel.htm</a>. Main source for the Phase I standard 1714–1717 (81½ pieces / Mark, 21 carats, 2.511 g fine), the tariff reduction of 9 July 1727, the call-in for melting of 4 July 1757, the Frederik V reform of 1757 (75 / Mark, 2.728 g fine), the mass coinage 1757–1765 (3,030,742 pieces), the Christian VII birthday strike of 1771 (131 pieces), the 1781–1796 main phase (≈ 237,000 pieces) and the sub-denominations."
  uk: "<b>Ernst, Axel</b>: <i>Kurantdukaten — en dansk Dukat</i> — <a href=\"https://danskmoent.dk/ernst/kuduaxel.htm\" target=\"_blank\">danskmoent.dk/ernst/kuduaxel.htm</a>. Головне джерело для стандарту фази I 1714–1717 (81½ штук з марки, 21 карат, 2,511 г чистого), зниження тарифу 9 липня 1727, скликання на переплав 4 липня 1757, реформи Frederik V 1757 (75 з марки, 2,728 г чистого), масового карбування 1757–1765 (3 030 742 шт.), меморіального карбування Christian VII 1771 (131 шт.), головної фази 1781–1796 (≈ 237 000 шт.) та субномінали."

danskmoent-w3alto:
  de: "<b>Wilcke, Julius</b>: <i>Specie-, Kurant- og Rigsbankdaler</i>, Bd. III, Kap. 4: «Mønten i Altona, 1771–1788» — <a href=\"https://www.danskmoent.dk/wilcke/w3alto.htm\" target=\"_blank\">danskmoent.dk/wilcke/w3alto.htm</a>. Beleg für Eröffnung der Altonaer Münze am 23. August 1771, Personal (Mzm. Caspar Henrich Lyng, Guardein Diedrich Christian Liebst), Brandon-Lizenz vom 12. Juni 1783, Funktion der Münze für die Versorgung der Herzogtümer Schleswig-Holstein."
  en: "<b>Wilcke, Julius</b>: <i>Specie-, Kurant- og Rigsbankdaler</i>, vol. III, ch. 4: «Mønten i Altona, 1771–1788» — <a href=\"https://www.danskmoent.dk/wilcke/w3alto.htm\" target=\"_blank\">danskmoent.dk/wilcke/w3alto.htm</a>. Source for the opening of the Altona mint on 23 August 1771, its personnel (mintmaster Caspar Henrich Lyng, guardein Diedrich Christian Liebst), the Brandon licence of 12 June 1783, and the mint's role in supplying the duchies of Schleswig-Holstein."
  uk: "<b>Wilcke, Julius</b>: <i>Specie-, Kurant- og Rigsbankdaler</i>, т. III, розд. 4: «Mønten i Altona, 1771–1788» — <a href=\"https://www.danskmoent.dk/wilcke/w3alto.htm\" target=\"_blank\">danskmoent.dk/wilcke/w3alto.htm</a>. Джерело про відкриття Альтонського монетного двору 23 серпня 1771, кадри (mzm. Caspar Henrich Lyng, guardein Diedrich Christian Liebst), ліцензію Brandon від 12 червня 1783 і призначення двору забезпечувати герцогства Шлезвіг-Гольштейн."

coinvarieties-denmark-1771-k-12-mark-fr-280:
  de: "<b>CoinVarieties</b>: <i>Denmark 1771-K 12 mark Fr-280</i> — <a href=\"https://coinvarieties.com/index.php/Denmark_1771-K_12_mark_Fr-280\" target=\"_blank\">coinvarieties.com</a>. Beleg für die Tarifformel «<i>Until 1813, one ducat = 2 speciedaler = 12 mark = 192 skilling Danske</i>» und die Charakterisierung des Kurantdukaten als «<i>too light and too low in fineness to qualify as full ducats</i>» — entscheidend für die numerische Abgrenzung Kurantdukat / Reichsdukat."
  en: "<b>CoinVarieties</b>: <i>Denmark 1771-K 12 mark Fr-280</i> — <a href=\"https://coinvarieties.com/index.php/Denmark_1771-K_12_mark_Fr-280\" target=\"_blank\">coinvarieties.com</a>. Source for the tariff formula «<i>Until 1813, one ducat = 2 speciedaler = 12 mark = 192 skilling Danske</i>» and for the characterisation of the Kurantdukat as «<i>too light and too low in fineness to qualify as full ducats</i>» — decisive for the numerical Kurantdukat / Reichsdukat distinction."
  uk: "<b>CoinVarieties</b>: <i>Denmark 1771-K 12 mark Fr-280</i> — <a href=\"https://coinvarieties.com/index.php/Denmark_1771-K_12_mark_Fr-280\" target=\"_blank\">coinvarieties.com</a>. Джерело для формули тарифу «<i>Until 1813, one ducat = 2 speciedaler = 12 mark = 192 skilling Danske</i>» і характеристики Kurantdukat як «<i>too light and too low in fineness to qualify as full ducats</i>» — визначальне для нумеричного розмежування Kurantdukat / Reichsdukat."

wikipedia-de-krone-vereinsgoldm-nze:
  de: "Wikipedia (DE): <i>Krone (Vereinsgoldmünze)</i> — <a href=\"https://de.wikipedia.org/wiki/Krone_(Vereinsgoldm%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Krone (Vereinsgoldmünze)</a>. Hauptquelle für Wiener Münzvertrag 24. Januar 1857 (in Kraft 1. Mai 1857), Standard «50 Krone / Pfund Feingold» bzw. «100 ½ Krone / Pfund», Probe 900 ‰, beide Stückelungen, Mintage pro Vertragsstaat (Hannover 784 296, Österreich 498 657, Preußen 278 491, Sachsen 56 739, Braunschweig 45 298, Bayern 3 867), Demonetisierung 1. April 1874 mit Einlösungsfrist 30. Juni 1874, kein Annahmezwang, Marktkurs 9,3 Taler bei Au:Ag 1:15,5."
  en: "Wikipedia (DE): <i>Krone (Vereinsgoldmünze)</i> — <a href=\"https://de.wikipedia.org/wiki/Krone_(Vereinsgoldm%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Krone (Vereinsgoldmünze)</a>. Main source for the Vienna Coin Treaty of 24 January 1857 (in force 1 May 1857), the standard «50 Krone / Pfund of fine gold» and «100 ½ Krone / Pfund», 900‰ fineness, both denominations, mintage by treaty state (Hanover 784,296, Austria 498,657, Prussia 278,491, Saxony 56,739, Brunswick 45,298, Bavaria 3,867), demonetisation 1 April 1874 with redemption deadline 30 June 1874, no compulsory acceptance, market rate 9.3 Taler at Au:Ag 1:15.5."
  uk: "Wikipedia (DE): <i>Krone (Vereinsgoldmünze)</i> — <a href=\"https://de.wikipedia.org/wiki/Krone_(Vereinsgoldm%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Krone (Vereinsgoldmünze)</a>. Головне джерело для Wiener Münzvertrag 24 січня 1857 (чинність з 1 травня 1857), стандарт «50 Krone з фунта чистого золота» та «100 ½ Krone з фунта», проба 900 ‰, обидва номінали, обсяги карбування по державах (Ганновер 784 296, Австрія 498 657, Пруссія 278 491, Саксонія 56 739, Брауншвайг 45 298, Баварія 3 867), демонетизація 1 квітня 1874 з терміном викупу 30 червня 1874, відсутність обов'язку прийняття, ринковий курс 9,3 Taler при Au:Ag 1:15,5."

austria-forum-krone-vereinsgoldm-nze:
  de: "<b>Austria-Forum / AustriaWiki</b>: <i>Krone (Vereinsgoldmünze)</i> — <a href=\"https://austria-forum.org/af/AustriaWiki/Krone_(Vereinsgoldm%C3%BCnze)\" target=\"_blank\">austria-forum.org</a>. Quelle für Mintage-Schwankungen 1857–1859 wegen weltweiter Finanzkrise (Insolvenz amerikanischer Banken), Goldarbitrage-Schmelzung im Ausland und niedrige Einlösungsquote (332 091 von 2 138 256 Stück = ≈ 15,5 %)."
  en: "<b>Austria-Forum / AustriaWiki</b>: <i>Krone (Vereinsgoldmünze)</i> — <a href=\"https://austria-forum.org/af/AustriaWiki/Krone_(Vereinsgoldm%C3%BCnze)\" target=\"_blank\">austria-forum.org</a>. Source for mintage fluctuations 1857–1859 due to the global financial crisis (insolvency of American banks), gold arbitrage melting abroad, and the low redemption rate (332,091 of 2,138,256 pieces ≈ 15.5 %)."
  uk: "<b>Austria-Forum / AustriaWiki</b>: <i>Krone (Vereinsgoldmünze)</i> — <a href=\"https://austria-forum.org/af/AustriaWiki/Krone_(Vereinsgoldm%C3%BCnze)\" target=\"_blank\">austria-forum.org</a>. Джерело про коливання обсягів карбування 1857–1859 через світову фінансову кризу (банкрутство американських банків), переплавлення через золоту арбітражну торгівлю за кордоном і низький рівень викупу (332 091 з 2 138 256 шт. ≈ 15,5 %)."

muenzen-online-d-nemarks-w-hrungsreformen-der-lange-weg-zur-krone:
  de: "<b>Münzen-online.com</b>: <i>Dänemarks Währungsreformen — Der lange Weg zur Krone</i> — <a href=\"https://www.muenzen-online.com/post/d%C3%A4nemarks-w%C3%A4hrungsreformen-der-lange-weg-zur-krone\" target=\"_blank\">muenzen-online.com</a>. Quelle für die Abgrenzung dänische Krone (Skandinavische Münzunion 1873) ↔ deutsche Vereinskrone (Wiener Münzvertrag 1857) sowie für den Beitritt Schleswig-Holsteins zum deutschen Münzverein nach dem Wiener Frieden vom 30. Oktober 1864."
  en: "<b>Münzen-online.com</b>: <i>Dänemarks Währungsreformen — Der lange Weg zur Krone</i> — <a href=\"https://www.muenzen-online.com/post/d%C3%A4nemarks-w%C3%A4hrungsreformen-der-lange-weg-zur-krone\" target=\"_blank\">muenzen-online.com</a>. Source for the distinction between the Danish Krone (Scandinavian Monetary Union 1873) and the German Vereinskrone (Vienna Coin Treaty 1857), and for Schleswig-Holstein joining the German Münzverein after the Vienna Peace of 30 October 1864."
  uk: "<b>Münzen-online.com</b>: <i>Dänemarks Währungsreformen — Der lange Weg zur Krone</i> — <a href=\"https://www.muenzen-online.com/post/d%C3%A4nemarks-w%C3%A4hrungsreformen-der-lange-weg-zur-krone\" target=\"_blank\">muenzen-online.com</a>. Джерело для розмежування данської Krone (Скандинавська монетна унія 1873) ↔ німецької Vereinskrone (Wiener Münzvertrag 1857) і для приєднання Шлезвіг-Гольштейну до німецького Münzverein після Wiener Frieden 30 жовтня 1864."
