# Shared reference pool — bibliographic entries by stable string key.
#
# Used by the inline-refs system (introduced 2026-05-25). Prose anywhere
# in the project can cite an entry by writing `<sup>[ref:KEY]</sup>`;
# the build's post-render pass scans these markers per page, resolves
# the KEY against this pool (or a per-fuss / per-location override),
# numbers them in appearance order, and injects the entries into the
# page's bibliography section.
#
# Adding a new ref:
#   1. Pick a stable key — lowercase-hyphenated identifier that names
#      the source unambiguously (`ernst-axel-kurantdukat`,
#      `wilcke-1950-vol3-altona`, `bobzin-1894`, etc.).
#   2. Add an entry below with DE/EN/UK content following §5a — Wikipedia-
#      style bibliographic citation + concrete page hint + verbatim quote.
#   3. Cite from prose: `<sup>[ref:your-key]</sup>`.
#
# DO NOT renumber existing keys — they are stable identifiers, NOT
# display numbers. The renderer assigns display numbers per page.

ernst-axel-kurantdukat:
  de: '<b>Ernst, Axel</b>: <i>Kurantdukaten — en dansk Dukat</i> — <a href="https://danskmoent.dk/ernst/kuduaxel.htm" target="_blank">danskmoent.dk/ernst/kuduaxel.htm</a>. Hauptquelle für Phase-I-Standard 1714–1717 (81½ Stück / Mark, 21 Karat, 2,511 g fein), Tarifreduktion 9. Juli 1727, Wiedereinziehung 4. Juli 1757, Frederik-V-Reform 1757 (75/Mark, 2,728 g fein), Massenkarbung 1757–1765 (3 030 742 Stück), Christian-VII-Geburtstagsstrich 1771 (131 Stück), Hauptphase 1781–1796 (≈ 237 000 Stück), Subnominale.'
  en: '<b>Ernst, Axel</b>: <i>Kurantdukaten — en dansk Dukat</i> — <a href="https://danskmoent.dk/ernst/kuduaxel.htm" target="_blank">danskmoent.dk/ernst/kuduaxel.htm</a>. Main source for the Phase I standard 1714–1717 (81½ pieces / Mark, 21 carats, 2.511 g fine), the tariff reduction of 9 July 1727, the call-in for melting of 4 July 1757, the Frederik V reform of 1757 (75 / Mark, 2.728 g fine), the mass coinage 1757–1765 (3,030,742 pieces), the Christian VII birthday strike of 1771 (131 pieces), the 1781–1796 main phase (≈ 237,000 pieces) and the sub-denominations.'
  uk: '<b>Ernst, Axel</b>: <i>Kurantdukaten — en dansk Dukat</i> — <a href="https://danskmoent.dk/ernst/kuduaxel.htm" target="_blank">danskmoent.dk/ernst/kuduaxel.htm</a>. Головне джерело для стандарту фази I 1714–1717 (81½ штук з марки, 21 карат, 2,511 г чистого), зниження тарифу 9 липня 1727, скликання на переплав 4 липня 1757, реформи Frederik V 1757 (75 з марки, 2,728 г чистого), масового карбування 1757–1765 (3 030 742 шт.), меморіального карбування Christian VII 1771 (131 шт.), головної фази 1781–1796 (≈ 237 000 шт.) та субномінали.'

danskmoent-c7mord-plakat-1782:
  de: '<b>danskmoent.dk</b>: <i>Møntforordninger m.v. under Christian 7. (1766–1808)</i> — <a href="https://www.danskmoent.dk/artikler/c7mord.htm" target="_blank">danskmoent.dk/artikler/c7mord.htm</a>. Beleg für die wörtliche Plakat-Klausel vom 2. Dezember 1782 («guld udmønte til kurantdukater med 75 stykker pr. mark brutto af 21 karat») und die Aufhebung des Plakats 1795.'
  en: '<b>danskmoent.dk</b>: <i>Møntforordninger m.v. under Christian 7. (1766–1808)</i> — <a href="https://www.danskmoent.dk/artikler/c7mord.htm" target="_blank">danskmoent.dk/artikler/c7mord.htm</a>. Source for the verbatim clause of the Plakat of 2 December 1782 («guld udmønte til kurantdukater med 75 stykker pr. mark brutto af 21 karat») and its revocation in 1795.'
  uk: '<b>danskmoent.dk</b>: <i>Møntforordninger m.v. under Christian 7. (1766–1808)</i> — <a href="https://www.danskmoent.dk/artikler/c7mord.htm" target="_blank">danskmoent.dk/artikler/c7mord.htm</a>. Джерело для verbatim-формулювання Plakat 2 грудня 1782 («guld udmønte til kurantdukater med 75 stykker pr. mark brutto af 21 karat») та скасування plakat 1795.'

forordning-pengevaesenet-1813:
  de: '<b>danmarkshistorien.lex.dk</b>: <i>Forordning om Forandring i Pengevæsenet, 5. januar 1813</i> — <a href="https://danmarkshistorien.lex.dk/Forordning_om_Forandring_i_Pengev%C3%A6senet,_5._januar_1813" target="_blank">danmarkshistorien.lex.dk</a>. Beleg für den Statsbankerot vom 5. Januar 1813 als reine Silberreform: Kurantdaler durch Rigsbankdaler im Verhältnis 6 : 1 abgelöst; Goldmünzen (Reichsdukaten, Kurantdukaten, Christian d''or) sind von §§1–16 nicht erfaßt.'
  en: '<b>danmarkshistorien.lex.dk</b>: <i>Forordning om Forandring i Pengevæsenet, 5. januar 1813</i> — <a href="https://danmarkshistorien.lex.dk/Forordning_om_Forandring_i_Pengev%C3%A6senet,_5._januar_1813" target="_blank">danmarkshistorien.lex.dk</a>. Source for the Statsbankerot of 5 January 1813 as a purely silver reform: Kurantdaler replaced by Rigsbankdaler at the ratio 6 : 1; gold coins (Reichsdukaten, Kurantdukaten, Christian d''or) are not covered by §§1–16.'
  uk: '<b>danmarkshistorien.lex.dk</b>: <i>Forordning om Forandring i Pengevæsenet, 5. januar 1813</i> — <a href="https://danmarkshistorien.lex.dk/Forordning_om_Forandring_i_Pengev%C3%A6senet,_5._januar_1813" target="_blank">danmarkshistorien.lex.dk</a>. Джерело про Statsbankerot 5 січня 1813 як суто срібну реформу: Kurantdaler замінено Rigsbankdaler у пропорції 6 : 1; золоті монети (Reichsdukaten, Kurantdukaten, Christian d''or) §§1–16 не охоплюють.'

coinvarieties-kurantdukat-tariff:
  de: '<b>CoinVarieties</b>: <i>Denmark 1771-K 12 mark Fr-280</i> — <a href="https://coinvarieties.com/index.php/Denmark_1771-K_12_mark_Fr-280" target="_blank">coinvarieties.com</a>. Beleg für die Tarifformel «<i>Until 1813, one ducat = 2 speciedaler = 12 mark = 192 skilling Danske</i>» und die Charakterisierung des Kurantdukaten als «<i>too light and too low in fineness to qualify as full ducats</i>» — entscheidend für die numerische Abgrenzung Kurantdukat / Reichsdukat.'
  en: '<b>CoinVarieties</b>: <i>Denmark 1771-K 12 mark Fr-280</i> — <a href="https://coinvarieties.com/index.php/Denmark_1771-K_12_mark_Fr-280" target="_blank">coinvarieties.com</a>. Source for the tariff formula «<i>Until 1813, one ducat = 2 speciedaler = 12 mark = 192 skilling Danske</i>» and for the characterisation of the Kurantdukat as «<i>too light and too low in fineness to qualify as full ducats</i>» — decisive for the numerical Kurantdukat / Reichsdukat distinction.'
  uk: '<b>CoinVarieties</b>: <i>Denmark 1771-K 12 mark Fr-280</i> — <a href="https://coinvarieties.com/index.php/Denmark_1771-K_12_mark_Fr-280" target="_blank">coinvarieties.com</a>. Джерело для формули тарифу «<i>Until 1813, one ducat = 2 speciedaler = 12 mark = 192 skilling Danske</i>» і характеристики Kurantdukat як «<i>too light and too low in fineness to qualify as full ducats</i>» — визначальне для нумеричного розмежування Kurantdukat / Reichsdukat.'

wilcke-1950-renaissance-moent:
  de: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481–1588</i> (København: Munksgaard, 1950). Kap. 7-4 «Christian IIIs møntreform 1541-1547», pp. 13-26. Verbatim aus der Møntordning vom 20. September 1541: «<i>Allffue Daler aff Hallffemtandeskab Lod (= 14½ Lod) findt Sølff aff en Cølnschk Marck</i>» (S. 13) — Acht Daler aus einer Cölln. Marck fein bei 14½ Lod Probe. Quelle für mf 8,827 (Phase A1 baseline) + mf 9,481 (Phase A2 nach Tillæg 27. September 1544, S. 14-15) + 14¼ Lod Flensborg-Bestalling 22. Januar 1547 (pp. 25-26)."
  en: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481–1588</i> (Copenhagen: Munksgaard, 1950). Kap. 7-4 «Christian III's møntreform 1541-1547», pp. 13-26. Verbatim from the Møntordning of 20 September 1541: «<i>Allffue Daler aff Hallffemtandeskab Lod (= 14½ Lod) findt Sølff aff en Cølnschk Marck</i>» (p. 13) — eight Daler per Cologne mark fine at 14½ Lod fineness. Source for mf 8.827 (Phase A1 baseline) + mf 9.481 (Phase A2 after the Tillæg of 27 September 1544, pp. 14-15) + 14¼ Lod Flensborg Bestalling of 22 January 1547 (pp. 25-26)."
  uk: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481–1588</i> (Копенгаген: Munksgaard, 1950). Kap. 7-4 «Christian III's møntreform 1541-1547», pp. 13-26. Дослівно з Møntordning 20 вересня 1541: «<i>Allffue Daler aff Hallffemtandeskab Lod (= 14½ Lod) findt Sølff aff en Cølnschk Marck</i>» (с. 13) — вісім Daler з кельнської марки чистого срібла за пробою 14½ Lod. Джерело для mf 8,827 (фаза A1 baseline) + mf 9,481 (фаза A2 після Tillæg 27 вересня 1544, с. 14-15) + 14¼ Lod Flensborg Bestalling 22 січня 1547 (pp. 25-26)."

wilcke-1950-rentemesterregnskaber:
  de: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481-1588</i>, Kap. 6 «Rentemesterregnskaber under Frederik 2.» — <a href=\"https://www.danskmoent.dk/wilcke/w6b1.htm\" target=\"_blank\">danskmoent.dk/wilcke/w6b1.htm</a>. Primärquellenauszug aus den Rentmeister-Rechnungen Frederiks II.: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — direkter archivalischer Beleg für die Karbung der Frederik-II-Guldkrone am 17. Oktober 1563: 66½ Marck Kroneguld-Legierung wurden zu 4860 Krone-Klippingen ausgeprägt. Erste belegfähige Stückzahl + Materialeinsatz der Karbung. Mintmaster Hans de Wüllers (Guldsmeed, 1563), Hans Köppelin (Møntmester, 1564), Laurits Hammer (Bremerholm, 1565). Belegt drei parallele Gold-Linien Frederiks II.: Ungersk Gylden (Reichsdukatenfuß), Rhinsk Gylden (Rhinsk-Gyldenfod), Kroneguld (eigener Müntzfuß)."
  en: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481-1588</i>, Kap. 6 «Rentemesterregnskaber under Frederik 2.» — <a href=\"https://www.danskmoent.dk/wilcke/w6b1.htm\" target=\"_blank\">danskmoent.dk/wilcke/w6b1.htm</a>. Primary-source excerpt from Frederik II's Rentmeister (treasurer) account records: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — direct archival attestation of the Frederik II Guldkrone minting on 17 October 1563: 66½ marks of Kroneguld alloy struck into 4,860 Krone clippings. First documented piece count + material input for the coinage. Mintmasters: Hans de Wüllers (goldsmith, 1563), Hans Köppelin (mint-master, 1564), Laurits Hammer (Bremerholm, 1565). Records three parallel Frederik II gold lines: Ungersk Gylden (Reichsdukatenfuß), Rhinsk Gylden (Rhinsk-Gyldenfod), Kroneguld (its own Müntzfuß)."
  uk: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481-1588</i>, Kap. 6 «Rentemesterregnskaber under Frederik 2.» — <a href=\"https://www.danskmoent.dk/wilcke/w6b1.htm\" target=\"_blank\">danskmoent.dk/wilcke/w6b1.htm</a>. Першоджерельна виписка з рент-майстерських (скарбничих) рахунків Фредеріка II: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — пряме архівне підтвердження карбування Frederik-II-Guldkrone 17 жовтня 1563: 66½ марки сплаву Kroneguld перекарбовано на 4860 Krone-Klippinge. Перша задокументована кількість штук + матеріальний вклад карбування. Монетмайстри: Hans de Wüllers (золотар, 1563), Hans Köppelin (монетмайстер, 1564), Laurits Hammer (Bremerholm, 1565). Документує три паралельні золоті лінії Frederik II: Ungersk Gylden (Reichsdukatenfuß), Rhinsk Gylden (Rhinsk-Gyldenfod), Kroneguld (власний Müntzfuß)."

wilcke-1927-kurantmoenten:
  de: "<b>Wilcke, Julius</b>: <i>Kurantmønten 1726–1788</i>. København: G. E. C. Gads Forlag, 1927 — Online: <a href=\"https://www.danskmoent.dk/wilcke/w3b.htm\" target=\"_blank\">danskmoent.dk/wilcke/w3b.htm</a>. Hauptquelle zur faktischen Kurantmøntfod 11⅓ (Feinsilber 20,63435 g je Rigsdaler Courant)."
  en: "<b>Wilcke, Julius</b>: <i>Kurantmønten 1726–1788</i>. Copenhagen: G. E. C. Gads Forlag, 1927 — Online: <a href=\"https://www.danskmoent.dk/wilcke/w3b.htm\" target=\"_blank\">danskmoent.dk/wilcke/w3b.htm</a>. Principal source for the de-facto Kurantmøntfod 11⅓ (fine silver 20.63435 g per Rigsdaler Courant)."
  uk: "<b>Wilcke, Julius</b>: <i>Kurantmønten 1726–1788</i>. Копенгаген: G. E. C. Gads Forlag, 1927 — Онлайн: <a href=\"https://www.danskmoent.dk/wilcke/w3b.htm\" target=\"_blank\">danskmoent.dk/wilcke/w3b.htm</a>. Головне джерело для фактичної Kurantmøntfod 11⅓ (чисте срібло 20,63435 г на Rigsdaler Courant)."

wikipedia-de-friedrich-dor:
  de: "Wikipedia (DE): <i>Friedrich d'or</i> — <a href=\"https://de.wikipedia.org/wiki/Friedrich_d%27or\" target=\"_blank\">de.wikipedia.org/wiki/Friedrich d'or</a>. Beleg für Einführungsdatum 1741 (Friedrich II.), Vorgängerprägung Wilhelm d'or 1737, 1770-Reduktion des Feingewichts von 6,05 auf 6,03 g, Mittel-Friedrich d'or 1756–1763 mit nur 4,2 g fein, Subnominale ½ / 1 / 2 Friedrich d'or, Einziehung ab 1855."
  en: "Wikipedia (DE): <i>Friedrich d'or</i> — <a href=\"https://de.wikipedia.org/wiki/Friedrich_d%27or\" target=\"_blank\">de.wikipedia.org/wiki/Friedrich d'or</a>. Source for introduction in 1741 (Friedrich II), the predecessor Wilhelm d'or of 1737, the 1770 fine-weight reduction from 6.05 to 6.03 g, the Mittel-Friedrich d'or of 1756–1763 at only 4.2 g fine, the ½ / 1 / 2 Friedrich d'or sub-denominations, and the withdrawal from 1855."
  uk: "Wikipedia (DE): <i>Friedrich d'or</i> — <a href=\"https://de.wikipedia.org/wiki/Friedrich_d%27or\" target=\"_blank\">de.wikipedia.org/wiki/Friedrich d'or</a>. Джерело про запровадження 1741 р. (Friedrich II), попередник Wilhelm d'or 1737, редукція чистої ваги 1770 р. з 6,05 до 6,03 г, Mittel-Friedrich d'or 1756–1763 з лише 4,2 г чистого, субномінали ½ / 1 / 2 Friedrich d'or, вилучення з 1855 р."

wikipedia-en-pistole:
  de: "Wikipedia (EN): <i>Pistole</i> — <a href=\"https://en.wikipedia.org/wiki/Pistole\" target=\"_blank\">en.wikipedia.org/wiki/Pistole</a>. Beleg für 5-Thaler-Tarif (Friedrich d'or, 1741), Standardvariation «35 to a Cologne Mark of gold 130/144 fine, or 6.032 g fine gold; and at worst 35⅙ to a Mark 129/144 fine, or 5.957 g fine gold», Geltungsdauer norddeutsche Pistole 1741 — 1855, Verbreitung in mehreren Norddt. Staaten unter den Namen August-, Friedrich-August- oder Christian d'or."
  en: "Wikipedia (EN): <i>Pistole</i> — <a href=\"https://en.wikipedia.org/wiki/Pistole\" target=\"_blank\">en.wikipedia.org/wiki/Pistole</a>. Source for the 5-thaler tariff of the Friedrich d'or (1741), the standard variation «35 to a Cologne Mark of gold 130/144 fine, or 6.032 g fine gold; and at worst 35⅙ to a Mark 129/144 fine, or 5.957 g fine gold», the North-German pistole's validity 1741 — 1855, and its spread across several North-German states under the names August-, Friedrich-August- or Christian d'or."
  uk: "Wikipedia (EN): <i>Pistole</i> — <a href=\"https://en.wikipedia.org/wiki/Pistole\" target=\"_blank\">en.wikipedia.org/wiki/Pistole</a>. Джерело для тарифу 5 талерів Friedrich d'or (1741), варіації стандарту «35 to a Cologne Mark of gold 130/144 fine, or 6.032 g fine gold; and at worst 35⅙ to a Mark 129/144 fine, or 5.957 g fine gold», дії північно-німецької пістолі 1741 — 1855 рр. і її поширення в кількох північно-німецьких державах як August d'or, Friedrich-August d'or або Christian d'or."

wikipedia-de-krone-vereinsgoldmuenze:
  de: "Wikipedia (DE): <i>Krone (Vereinsgoldmünze)</i> — <a href=\"https://de.wikipedia.org/wiki/Krone_(Vereinsgoldm%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Krone (Vereinsgoldmünze)</a>. Hauptquelle für Wiener Münzvertrag 24. Januar 1857 (in Kraft 1. Mai 1857), Standard «50 Krone / Pfund Feingold» bzw. «100 ½ Krone / Pfund», Probe 900 ‰, beide Stückelungen, Mintage pro Vertragsstaat (Hannover 784 296, Österreich 498 657, Preußen 278 491, Sachsen 56 739, Braunschweig 45 298, Bayern 3 867), Demonetisierung 1. April 1874 mit Einlösungsfrist 30. Juni 1874, kein Annahmezwang, Marktkurs 9,3 Taler bei Au:Ag 1:15,5."
  en: "Wikipedia (DE): <i>Krone (Vereinsgoldmünze)</i> — <a href=\"https://de.wikipedia.org/wiki/Krone_(Vereinsgoldm%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Krone (Vereinsgoldmünze)</a>. Main source for the Vienna Coin Treaty of 24 January 1857 (in force 1 May 1857), the standard «50 Krone / Pfund of fine gold» and «100 ½ Krone / Pfund», 900‰ fineness, both denominations, mintage by treaty state (Hanover 784,296, Austria 498,657, Prussia 278,491, Saxony 56,739, Brunswick 45,298, Bavaria 3,867), demonetisation 1 April 1874 with redemption deadline 30 June 1874, no compulsory acceptance, market rate 9.3 Taler at Au:Ag 1:15.5."
  uk: "Wikipedia (DE): <i>Krone (Vereinsgoldmünze)</i> — <a href=\"https://de.wikipedia.org/wiki/Krone_(Vereinsgoldm%C3%BCnze)\" target=\"_blank\">de.wikipedia.org/wiki/Krone (Vereinsgoldmünze)</a>. Головне джерело для Wiener Münzvertrag 24 січня 1857 (чинність з 1 травня 1857), стандарт «50 Krone з фунта чистого золота» та «100 ½ Krone з фунта», проба 900 ‰, обидва номінали, обсяги карбування по державах (Ганновер 784 296, Австрія 498 657, Пруссія 278 491, Саксонія 56 739, Брауншвайг 45 298, Баварія 3 867), демонетизація 1 квітня 1874 з терміном викупу 30 червня 1874, відсутність обов'язку прийняття, ринковий курс 9,3 Taler при Au:Ag 1:15,5."

wikipedia-de-corona-danica:
  de: "Wikipedia (de): <i>Corona Danica</i> — <a href=\"https://de.wikipedia.org/wiki/Corona_Danica\" target=\"_blank\">de.wikipedia.org/wiki/Corona_Danica</a>. Standardparameter der Christian-IV.-Krone 1618 und Datierung des Tarif-Schnitts 1625."
  en: "Wikipedia (de): <i>Corona Danica</i> — <a href=\"https://de.wikipedia.org/wiki/Corona_Danica\" target=\"_blank\">de.wikipedia.org/wiki/Corona_Danica</a>. Standard parameters for the Christian IV Krone of 1618 and dating of the 1625 tariff cut."
  uk: "Wikipedia (de): <i>Corona Danica</i> — <a href=\"https://de.wikipedia.org/wiki/Corona_Danica\" target=\"_blank\">de.wikipedia.org/wiki/Corona_Danica</a>. Стандартні параметри Krone Кристіана IV 1618 р. та датування зниження тарифу 1625 р."

mgm-handelsdukat:
  de: "<b>MGM Münzlexikon</b>: <i>Handelsdukat</i> — <a href=\"https://www.mgmindex.de/index.php?title=Handelsdukat\" target=\"_blank\">mgmindex.de/index.php?title=Handelsdukat</a>. Beleg für die Rolle der niederländischen Handelsdukaten als maßgebliche Welthandelsmünze des 17.–18. Jh., insbesondere im Ostseehandel."
  en: "<b>MGM Münzlexikon</b>: <i>Handelsdukat</i> — <a href=\"https://www.mgmindex.de/index.php?title=Handelsdukat\" target=\"_blank\">mgmindex.de/index.php?title=Handelsdukat</a>. Source for the role of Dutch Handelsdukaten as the principal world-trade gold coin of the 17th-18th centuries, especially in the Baltic trade."
  uk: "<b>MGM Münzlexikon</b>: <i>Handelsdukat</i> — <a href=\"https://www.mgmindex.de/index.php?title=Handelsdukat\" target=\"_blank\">mgmindex.de/index.php?title=Handelsdukat</a>. Джерело для ролі нідерландських Handelsdukaten як головної світової торговельної монети XVII–XVIII ст., особливо в балтійській торгівлі."

museum-rantzau-taler-dukaten:
  de: "<b>Museum der Grafschaft Rantzau, Barmstedt</b>: <i>Taler und Dukaten — das Geld der Neuzeit</i> — <a href=\"https://www.museum-grafschaft-rantzau.de/das-geld-der-grafen/taler-und-dukaten-das-geld-der-neuzeit\" target=\"_blank\">museum-grafschaft-rantzau.de</a>. Regionale schleswig-holsteinische Quelle für das Prinzip, daß umlaufende Goldmünzen «<i>ihren Wert durch den Edelmetallgehalt</i>» erhielten — Annahme fremder Dukaten unabhängig von Prägeort."
  en: "<b>Museum der Grafschaft Rantzau, Barmstedt</b>: <i>Taler und Dukaten — das Geld der Neuzeit</i> — <a href=\"https://www.museum-grafschaft-rantzau.de/das-geld-der-grafen/taler-und-dukaten-das-geld-der-neuzeit\" target=\"_blank\">museum-grafschaft-rantzau.de</a>. Regional Schleswig-Holstein source for the principle that circulating gold coins «<i>derived their value from precious-metal content</i>» — foreign ducats were accepted regardless of mint origin."
  uk: "<b>Museum der Grafschaft Rantzau, Barmstedt</b>: <i>Taler und Dukaten — das Geld der Neuzeit</i> — <a href=\"https://www.museum-grafschaft-rantzau.de/das-geld-der-grafen/taler-und-dukaten-das-geld-der-neuzeit\" target=\"_blank\">museum-grafschaft-rantzau.de</a>. Регіональне шлезвіг-гольштейнське джерело для принципу, що золоті монети в обігу «<i>отримували свою вартість через вміст дорогоцінного металу</i>» — іноземні дукати приймались незалежно від місця карбування."

schroetter-wb-muenzkunde-1930:
  de: "<b>Schrötter, Friedrich Frhr. v.</b> (Hg.): <i>Wörterbuch der Münzkunde</i> (Berlin: Walter de Gruyter, 1930), Eintrag «Corona Danica», S. 113–114 — <a href=\"https://archive.org/details/worterbuchdermun007491mbp\" target=\"_blank\">archive.org/details/worterbuchdermun007491mbp</a>. Primärquelle für die Christian-IV.-Krone-Parameter und den Tarif-Schnitt 1625."
  en: "<b>Schrötter, Friedrich Frhr. v.</b> (ed.): <i>Wörterbuch der Münzkunde</i> (Berlin: Walter de Gruyter, 1930), entry «Corona Danica», pp. 113–114 — <a href=\"https://archive.org/details/worterbuchdermun007491mbp\" target=\"_blank\">archive.org/details/worterbuchdermun007491mbp</a>. Primary source for the Christian IV Krone parameters and the 1625 tariff cut."
  uk: "<b>Schrötter, Friedrich Frhr. v.</b> (ред.): <i>Wörterbuch der Münzkunde</i> (Берлін: Walter de Gruyter, 1930), стаття «Corona Danica», с. 113–114 — <a href=\"https://archive.org/details/worterbuchdermun007491mbp\" target=\"_blank\">archive.org/details/worterbuchdermun007491mbp</a>. Першоджерело параметрів Krone Кристіана IV та дати зниження тарифу 1625."

bobzin-muenzfuesse:
  de: "<b>Bobzin, Hagen und Gudrun</b>: <i>Münzfüße</i> — <a href=\"http://www.hagen-bobzin.de/hobby/muenzfuesse.html\" target=\"_blank\">hagen-bobzin.de/hobby/muenzfuesse.html</a>. Tabellarische Übersicht der norddeutschen Müntzfüße einschließlich des Altonaer Banco-Fußes 1777 (27¾ Mark Banco = 9¼ Reichsthaler je feine Cöllnische Marck)."
  en: "<b>Bobzin, Hagen and Gudrun</b>: <i>Münzfüße</i> — <a href=\"http://www.hagen-bobzin.de/hobby/muenzfuesse.html\" target=\"_blank\">hagen-bobzin.de/hobby/muenzfuesse.html</a>. Tabular overview of the North German Müntzfuß systems including the Altona Banco-Fuß of 1777 (27¾ Mark Banco = 9¼ Reichsthaler per fine Cologne mark)."
  uk: "<b>Bobzin, Hagen і Gudrun</b>: <i>Münzfüße</i> — <a href=\"http://www.hagen-bobzin.de/hobby/muenzfuesse.html\" target=\"_blank\">hagen-bobzin.de/hobby/muenzfuesse.html</a>. Табличний огляд північнонімецьких Müntzfuß-стандартів, у т.ч. альтонського Banco-Fuß 1777 (27¾ Mark Banco = 9¼ Reichsthaler з чистої кельнської марки)."

hede-c4h25-2-guldkrone:
  de: "<b>Hede c4h25</b>: Christian IV. 2 Guldkrone (Hede 25) — <a href=\"https://www.danskmoent.dk/chr/c4h25.htm\" target=\"_blank\">danskmoent.dk/chr/c4h25.htm</a>. Verbatim Pålydende «<i>2 Guldkrone</i>» · Bruttovægt <b>5,996 g</b> · Finhed <b>0,917</b> · Finvægt <b>5,496 g</b> · København · Jahrgänge 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648 — direkter Hede-Beleg, daß die Christian-IV.-Hede-25-Serie metrisch identisch zur späteren Frederik-III.-Guldkrone-Definition ist und in Hedes eigener Klassifikation als «Guldkrone» geführt wird. Schlüsselgrundlage der pre-I-Phase-Placement im Guldkrone-Fuß."
  en: "<b>Hede c4h25</b>: Christian IV 2 Guldkrone (Hede 25) — <a href=\"https://www.danskmoent.dk/chr/c4h25.htm\" target=\"_blank\">danskmoent.dk/chr/c4h25.htm</a>. Verbatim Pålydende «<i>2 Guldkrone</i>» · Bruttovægt <b>5.996 g</b> · Finhed <b>0.917</b> · Finvægt <b>5.496 g</b> · Copenhagen · years 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648 — direct Hede attestation that the Christian IV Hede 25 series is metrically identical to the later Frederik III Guldkrone definition and named «Guldkrone» in Hede's own classification. Key basis for the pre-I phase placement under the Guldkrone-Fuß."
  uk: "<b>Hede c4h25</b>: Кристіан IV 2 Guldkrone (Hede 25) — <a href=\"https://www.danskmoent.dk/chr/c4h25.htm\" target=\"_blank\">danskmoent.dk/chr/c4h25.htm</a>. Verbatim Pålydende «<i>2 Guldkrone</i>» · Bruttovægt <b>5,996 г</b> · Finhed <b>0,917</b> · Finvægt <b>5,496 г</b> · Копенгаген · роки 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648 — прямий доказ Hede, що серія Кристіана IV Hede 25 метрично ідентична пізнішому означенню Frederik III Guldkrone і у власній класифікації Hede названа «Guldkrone». Ключова основа для розташування у фазі pre-I Guldkrone-Fuß."

hede-f3h44-1-guldkrone:
  de: "<b>Hede f3h44</b>: Frederik III. 1 Guldkrone (Hede 44) — <a href=\"https://www.danskmoent.dk/fr/f3h44.htm\" target=\"_blank\">danskmoent.dk/fr/f3h44.htm</a>. Verbatim Pålydende «<i>1 Guldkrone</i>» · Bruttovægt <b>5,590 g</b> · Finhed <b>0,917</b> · Finvægt <b>5,126 g</b> · København 1666 · auf der Seite ausdrücklich «1 og 2 Guldkrone 1666, København» (Hede 45 ist die Doppel-Variante mit 11,181 g rau) — direkter Beleg für die spät-Frederik-III.-Kopenhagener Folgeprägung der Guldkrone-Linie außerhalb der kanonischen Glückstadter Hauptphase 1657–1660."
  en: "<b>Hede f3h44</b>: Frederik III 1 Guldkrone (Hede 44) — <a href=\"https://www.danskmoent.dk/fr/f3h44.htm\" target=\"_blank\">danskmoent.dk/fr/f3h44.htm</a>. Verbatim Pålydende «<i>1 Guldkrone</i>» · Bruttovægt <b>5.590 g</b> · Finhed <b>0.917</b> · Finvægt <b>5.126 g</b> · Copenhagen 1666 · the page states «1 og 2 Guldkrone 1666, København» (Hede 45 is the double variant at 11.181 g rough) — direct attestation for the late Frederik III Copenhagen follow-up issue of the Guldkrone line outside the canonical Glückstadt 1657–1660 main phase."
  uk: "<b>Hede f3h44</b>: Фредерік III 1 Guldkrone (Hede 44) — <a href=\"https://www.danskmoent.dk/fr/f3h44.htm\" target=\"_blank\">danskmoent.dk/fr/f3h44.htm</a>. Verbatim Pålydende «<i>1 Guldkrone</i>» · Bruttovægt <b>5,590 г</b> · Finhed <b>0,917</b> · Finvægt <b>5,126 г</b> · Копенгаген 1666 · сторінка явно зазначає «1 og 2 Guldkrone 1666, København» (Hede 45 — подвійна варіація з 11,181 г повної ваги) — прямий доказ пізнього копенгагенського продовження Frederik III лінії Guldkrone поза канонічною ґлюкштадтською головною фазою 1657–1660."

hede-1957-f3-guldkroner-nnum:
  de: "<b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — <a href=\"https://www.danskmoent.dk/artikler/f3guldkr.htm\" target=\"_blank\">danskmoent.dk/artikler/f3guldkr.htm</a>. Fußnote (1) verbatim: «<i>Betegnelsen guldkrone dækker under Frederik III den mønt, Christian IV kaldte 2 guldkrone</i>» — direkter Beleg für den nomenklatorischen Wechsel: die unter Frederik III. als «1 Guldkrone» geführte Münze (Hede 44/145, 5,996 g rau) ist physisch dieselbe wie Christian IVs «2 Guldkrone» (Hede 25). Christian IV.'s eigene «1 Guldkrone» (Hede 26, ~3 g) entspricht damit physisch der ½ Guldkrone unter Frederik III.'s Definition."
  en: "<b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — <a href=\"https://www.danskmoent.dk/artikler/f3guldkr.htm\" target=\"_blank\">danskmoent.dk/artikler/f3guldkr.htm</a>. Footnote (1) verbatim: «<i>Betegnelsen guldkrone dækker under Frederik III den mønt, Christian IV kaldte 2 guldkrone</i>» — direct attestation of the nomenclature shift: the coin called «1 Guldkrone» under Frederik III (Hede 44/145, 5.996 g rough) is physically the same coin Christian IV called «2 Guldkrone» (Hede 25). Christian IV's own «1 Guldkrone» (Hede 26, ~3 g) therefore physically corresponds to ½ Guldkrone under Frederik III's definition."
  uk: "<b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — <a href=\"https://www.danskmoent.dk/artikler/f3guldkr.htm\" target=\"_blank\">danskmoent.dk/artikler/f3guldkr.htm</a>. Виноска (1) verbatim: «<i>Betegnelsen guldkrone dækker under Frederik III den mønt, Christian IV kaldte 2 guldkrone</i>» — прямий доказ номенклатурного зсуву: монета, яку Фредерік III назвав «1 Guldkrone» (Hede 44/145, 5,996 г повної ваги), фізично та сама, що Кристіан IV називав «2 Guldkrone» (Hede 25). Тому «1 Guldkrone» самого Кристіана IV (Hede 26, ~3 г) фізично відповідає ½ Guldkrone в означенні Фредеріка III."

hede-1957-kronemoenten-nnum:
  de: "<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, Nordisk Numismatisk Unions Medlemsblad (NNUM) 1957, S. 129–134 — <a href=\"https://danskmoent.dk/artikler/hedekron.htm\" target=\"_blank\">danskmoent.dk/artikler/hedekron.htm</a>. Kanonische Werte der drei dänischen Krone-Münzformeln (1618, 1671, 1693) auf Grundlage von Wilcke I/II."
  en: "<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, Nordisk Numismatisk Unions Medlemsblad (NNUM) 1957, pp. 129–134 — <a href=\"https://danskmoent.dk/artikler/hedekron.htm\" target=\"_blank\">danskmoent.dk/artikler/hedekron.htm</a>. Canonical values for the three Danish Krone standards (1618, 1671, 1693), drawing on Wilcke I/II."
  uk: "<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, Nordisk Numismatisk Unions Medlemsblad (NNUM) 1957, с. 129–134 — <a href=\"https://danskmoent.dk/artikler/hedekron.htm\" target=\"_blank\">danskmoent.dk/artikler/hedekron.htm</a>. Канонічні значення трьох данських Krone-стандартів (1618, 1671, 1693) за Wilcke I/II."

danskmoent-1nobel:
  de: "<b>danskmoent.dk «1 Nobel»</b> — <a href=\"https://www.danskmoent.dk/1nobel.htm\" target=\"_blank\">danskmoent.dk/1nobel.htm</a>. Hede-Übersichtsseite für die dänischen Nobler über drei Regenten: <b>Hans</b> (1496 Malmø/København Galster 24 / Schou 2-3 RRR; 1502 Malmø Galster 24 / Schou 2-3 unik); <b>Christian II.</b> (1516 Malmø Galster 37 / Schou 1 RRR; 1518 Malmø Galster 37 / Schou 1 RRR); <b>Frederik I.</b> (1532 København / Malmø Galster 45 / Schou 1 RRR; undatiert Ribe Galster 68 + Galster 69 unik). Belegt-Mintstätten: Malmø (primär), København, Ribe. Bilddarstellung: «<i>Siddende konge med glorie (Sct. Knud), bagside: våbenskjold</i>» (Hans) / «<i>Siddende konge, bagside: våbenskjold</i>» (Christian II / Frederik I) — Sct. Knud-Glorie ist Hans-spezifisch."
  en: "<b>danskmoent.dk «1 Nobel»</b> — <a href=\"https://www.danskmoent.dk/1nobel.htm\" target=\"_blank\">danskmoent.dk/1nobel.htm</a>. Hede overview page for the Danish Nobler across three rulers: <b>Hans</b> (1496 Malmø/Copenhagen Galster 24 / Schou 2-3 RRR; 1502 Malmø Galster 24 / Schou 2-3 unique); <b>Christian II</b> (1516 Malmø Galster 37 / Schou 1 RRR; 1518 Malmø Galster 37 / Schou 1 RRR); <b>Frederik I</b> (1532 Copenhagen / Malmø Galster 45 / Schou 1 RRR; undated Ribe Galster 68 + Galster 69 unique). Documented mints: Malmø (primary), Copenhagen, Ribe. Image description: «<i>Seated king with halo (Saint Canute), reverse: coat of arms</i>» (Hans) / «<i>Seated king, reverse: coat of arms</i>» (Christian II / Frederik I) — the Saint Canute halo is Hans-specific."
  uk: "<b>danskmoent.dk «1 Nobel»</b> — <a href=\"https://www.danskmoent.dk/1nobel.htm\" target=\"_blank\">danskmoent.dk/1nobel.htm</a>. Hede-оглядова сторінка для данських Nobler через трьох правителів: <b>Hans</b> (1496 Malmø/Копенгаген Galster 24 / Schou 2-3 RRR; 1502 Malmø Galster 24 / Schou 2-3 унікат); <b>Christian II</b> (1516 Malmø Galster 37 / Schou 1 RRR; 1518 Malmø Galster 37 / Schou 1 RRR); <b>Frederik I</b> (1532 Копенгаген / Malmø Galster 45 / Schou 1 RRR; недатовано Ribe Galster 68 + Galster 69 унікат). Задокументовані монетні двори: Malmø (головний), Копенгаген, Ribe. Опис зображення: «<i>Сидячий король з ореолом (Свт. Канут), реверс: гербовий щит</i>» (Hans) / «<i>Сидячий король, реверс: гербовий щит</i>» (Christian II / Frederik I) — ореол Святого Канута специфічний для Hans."

danskmoent-1rosenobel:
  de: "<b>danskmoent.dk «1 Rosenobel»</b> — <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">danskmoent.dk/1rosenob.htm</a>. Hede-Übersichtsseite für die dänischen Rosenobler: <b>Frederik II.</b> 1584 (Frederiksborg, Hede 7B / Schou 2 / Sieg 29, unik); <b>Christian IV.</b> Typ A (1611-1613 + 1627 + 1629, Hede 23A / Schou 1-5/1-4/1-3/1 / Sieg 149); Typ B (Hede 23B / Schou 2-3 / Sieg 149). Hauptmünzstätte Kopenhagen für Christian IVs Karbung. Verbatim Etymologie: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — die dänische Rosenobel-Karbung ist eine späte Anpassung des englischen Rose-Noble-Modells."
  en: "<b>danskmoent.dk «1 Rosenobel»</b> — <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">danskmoent.dk/1rosenob.htm</a>. Hede overview page for the Danish Rosenobler: <b>Frederik II</b> 1584 (Frederiksborg, Hede 7B / Schou 2 / Sieg 29, unique); <b>Christian IV</b> Type A (1611-1613 + 1627 + 1629, Hede 23A / Schou 1-5/1-4/1-3/1 / Sieg 149); Type B (Hede 23B / Schou 2-3 / Sieg 149). Principal mint Copenhagen for Christian IV's coinage. Verbatim etymology: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — the Danish Rosenobel coinage is a late adaptation of the English Rose Noble model."
  uk: "<b>danskmoent.dk «1 Rosenobel»</b> — <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">danskmoent.dk/1rosenob.htm</a>. Hede-оглядова сторінка для данських Rosenobler: <b>Frederik II</b> 1584 (Frederiksborg, Hede 7B / Schou 2 / Sieg 29, унікат); <b>Christian IV</b> Тип A (1611-1613 + 1627 + 1629, Hede 23A / Schou 1-5/1-4/1-3/1 / Sieg 149); Тип B (Hede 23B / Schou 2-3 / Sieg 149). Головний монетний двір Копенгаген для карбування Christian IV. Verbatim етимологія: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — данське карбування Rosenobel — пізня адаптація моделі англійського Rose Noble."

danskmoent-1guldkrone:
  de: "<b>danskmoent.dk «1 Guldkrone»</b> — <a href=\"https://www.danskmoent.dk/1guldkro.htm\" target=\"_blank\">danskmoent.dk/1guldkro.htm</a>. Hede-Übersichtsseite für die Frederik-II-Guldkrone-Klippinge: «<i>Hede 2</i>» (1563, unikat) und «<i>Hede 5</i>» (1564), Kopenhagen, Brutto 3,341 g, Lødighed 0,934, Feingewicht 3,120 g. Drei parallele Goldarten dieser Karbung: <b>Ungersk Gylden</b> (ungarisch, Reichsdukatenfuß), <b>Rhinsk Gylden</b> (rheinisch, Rhinsk-Gyldenfod), <b>Kroneguld</b> (eigene Krone-Legierung, dieser Müntzfuß). Reversinschrift verbatim: «<i>I GOLT KRONE</i>» (parallel zu «I GOLT GILDEN» und «I DOK KATE» der Schwester-Goldarten)."
  en: "<b>danskmoent.dk «1 Guldkrone»</b> — <a href=\"https://www.danskmoent.dk/1guldkro.htm\" target=\"_blank\">danskmoent.dk/1guldkro.htm</a>. Hede overview page for the Frederik II Guldkrone Klippinge: «<i>Hede 2</i>» (1563, unique) and «<i>Hede 5</i>» (1564), Copenhagen, brutto 3.341 g, lødighed 0.934, fine weight 3.120 g. Three parallel gold types in this coinage: <b>Ungersk Gylden</b> (Hungarian, Reichsdukatenfuß), <b>Rhinsk Gylden</b> (Rhenish, Rhinsk-Gyldenfod), <b>Kroneguld</b> (own crown-gold alloy, this Müntzfuß). Reverse inscription verbatim: «<i>I GOLT KRONE</i>» (paralleling «I GOLT GILDEN» and «I DOK KATE» of the sister gold types)."
  uk: "<b>danskmoent.dk «1 Guldkrone»</b> — <a href=\"https://www.danskmoent.dk/1guldkro.htm\" target=\"_blank\">danskmoent.dk/1guldkro.htm</a>. Hede-оглядова сторінка для Frederik-II-Guldkrone-Klippinge: «<i>Hede 2</i>» (1563, унікат) і «<i>Hede 5</i>» (1564), Копенгаген, повна вага 3,341 г, проба 0,934, чиста вага 3,120 г. Три паралельні золоті типи цього карбування: <b>Ungersk Gylden</b> (угорський, Reichsdukatenfuß), <b>Rhinsk Gylden</b> (рейнський, Rhinsk-Gyldenfod), <b>Kroneguld</b> (власна Krone-легура, цей Müntzfuß). Реверс-напис verbatim: «<i>I GOLT KRONE</i>» (паралельно «I GOLT GILDEN» та «I DOK KATE» сестринських золотих типів)."

historyofwar-kalmar-war-1611:
  de: "<b>Historyofwar.org «Kalmar War, 1611-1613»</b> — <a href=\"https://www.historyofwar.org/articles/wars_kalmar.html\" target=\"_blank\">historyofwar.org/articles/wars_kalmar.html</a>. Hintergrundsynthese des Kriegs zwischen Dänemark-Norwegen und Schweden 1611-1613. Christian IV. greift 1611 Schweden an mit dem Hauptziel, Schweden zur Rückkehr in die Kalmarer Union zu zwingen — Ziel verfehlt, aber Schweden zahlt im Frieden von Knäred 1613 eine Kriegsschadensbild von <b>1 Million Riksdaler Silber</b> (sogenanntes Älvsborg-Lösegeld). Der Kriegsfinanzierungs-Bedarf in den Jahren 1611-1613 erklärt die Karbung der Christian-IV-Rosenobler (Hede 23A) als Prestige-Goldemission zur Söldnerbezahlung; die spätere Rosenobel-Karbung 1627 + 1629 fällt in den Beginn der dänischen Beteiligung am Dreißigjährigen Krieg (Kaiserlich-Dänischer Krieg 1625-1629)."
  en: "<b>Historyofwar.org «Kalmar War, 1611-1613»</b> — <a href=\"https://www.historyofwar.org/articles/wars_kalmar.html\" target=\"_blank\">historyofwar.org/articles/wars_kalmar.html</a>. Background synthesis of the war between Denmark-Norway and Sweden 1611-1613. Christian IV attacks Sweden in 1611 with the main aim of forcing Sweden back into the Kalmar Union — the aim fails, but in the Treaty of Knäred 1613 Sweden pays a war indemnity of <b>1 million silver riksdaler</b> (the so-called Älvsborg ransom). The wartime-financing pressure of 1611-1613 explains the coinage of Christian IV's Rosenobler (Hede 23A) as a prestige gold issue for mercenary pay; the later Rosenobel coinage 1627 + 1629 falls within the start of Danish involvement in the Thirty Years' War (Imperial-Danish War 1625-1629)."
  uk: "<b>Historyofwar.org «Kalmar War, 1611-1613»</b> — <a href=\"https://www.historyofwar.org/articles/wars_kalmar.html\" target=\"_blank\">historyofwar.org/articles/wars_kalmar.html</a>. Фонова синтеза війни між Данією-Норвегією та Швецією 1611-1613. Christian IV нападає на Швецію 1611 р. з головною метою примусити Швецію повернутися до Кальмарської унії — мети не досягнуто, але за договором Knäred 1613 Швеція виплачує військову контрибуцію в <b>1 мільйон срібних riksdaler</b> (так званий Älvsborg-викуп). Воєнно-фінансовий тиск 1611-1613 пояснює карбування Rosenobler Кристіана IV (Hede 23A) як престижної золотої емісії для оплати найманців; пізніше карбування Rosenobel 1627 + 1629 припадає на початок данської участі у Тридцятилітній війні (Імперсько-данська війна 1625-1629)."

frantzen-bender-nordiske-syvaarskrig:
  de: "<b>Frantzen, Ole L.</b> / <b>Bender Jørgensen, Lise</b>: <i>Den Nordiske Syvårskrig 1563-1570</i> (Historieforskning, mit Aufsatzbänden in Den Danske Krigshistorie). Hauptkonflikt zwischen Dänemark-Norwegen + Lübeck + Polen vs Schweden 1563-1570 — «<i>den største krise i Frederik II.s regering</i>» («the greatest crisis of Frederik II's reign») per dänischer Historiographie. Direkter wirtschaftlicher Kontext für die Karbung der Klipping-Goldmünzen Frederiks II. 1563-1564: massive Kriegsfinanzierungs-Notwendigkeit erzwingt die parallele Karbung dreier Goldarten (Ungersk + Rhinsk + Krone) in Kopenhagen + Bremerholm. Siehe auch Historyofwar.org «<a href=\"https://www.historyofwar.org/articles/wars_nordic_seven_years.html\" target=\"_blank\">Nordic Seven Years War, 1563-1570</a>» für englischsprachige Synthese der Kriegsverlauf und Finanzierungs-Probleme der dänischen Söldnerarmee."
  en: "<b>Frantzen, Ole L.</b> / <b>Bender Jørgensen, Lise</b>: <i>Den Nordiske Syvårskrig 1563-1570</i> (Danish historical research, with essays in <i>Den Danske Krigshistorie</i>). The main conflict between Denmark-Norway + Lübeck + Poland against Sweden in 1563-1570 — «<i>den største krise i Frederik II's regering</i>» («the greatest crisis of Frederik II's reign») per Danish historiography. Direct economic context for the minting of Frederik II's 1563-1564 Klipping gold coins: massive wartime-financing pressure forced the parallel coining of three gold types (Ungersk + Rhinsk + Krone) at Copenhagen + Bremerholm. See also Historyofwar.org «<a href=\"https://www.historyofwar.org/articles/wars_nordic_seven_years.html\" target=\"_blank\">Nordic Seven Years War, 1563-1570</a>» for an English-language synthesis of the war's course and the Danish mercenary-army financing crisis."
  uk: "<b>Frantzen, Ole L.</b> / <b>Bender Jørgensen, Lise</b>: <i>Den Nordiske Syvårskrig 1563-1570</i> (данська історична розвідка, з нарисами у <i>Den Danske Krigshistorie</i>). Головний конфлікт між Данією-Норвегією + Любеком + Польщею проти Швеції 1563-1570 — «<i>den største krise i Frederik II's regering</i>» («найбільша криза у правлінні Фредеріка II») за данською історіографією. Прямий економічний контекст для карбування Klipping-золотих монет Frederik II 1563-1564: масивна воєнно-фінансова потреба змушує до паралельного карбування трьох золотих типів (Ungersk + Rhinsk + Krone) у Копенгагені + Bremerholm. Див. також Historyofwar.org «<a href=\"https://www.historyofwar.org/articles/wars_nordic_seven_years.html\" target=\"_blank\">Nordic Seven Years War, 1563-1570</a>» — англомовна синтеза перебігу війни та фінансової кризи данської найманської армії."

danskmoent-1rhinsk-gylden:
  de: "<b>danskmoent.dk «1 Rhinsk Gylden»</b> — <a href=\"https://www.danskmoent.dk/1rhinskgylden.htm\" target=\"_blank\">danskmoent.dk/1rhinskgylden.htm</a>. Hede-Übersichtsseite für die dänischen Rhinsk-Gylden-Goldmünzen: Frederik II 1563-1564 (Hede f2h3, f2h6) und Christian IV 1625-1632 (Hede c4h29). Belegt 72-Stück-aus-der-Marck-Standard bei .77 (Phase I) / .76 (Phase II)."
  en: "<b>danskmoent.dk «1 Rhinsk Gylden»</b> — <a href=\"https://www.danskmoent.dk/1rhinskgylden.htm\" target=\"_blank\">danskmoent.dk/1rhinskgylden.htm</a>. Hede overview page for the Danish Rhinsk-Gylden gold coins: Frederik II 1563-1564 (Hede f2h3, f2h6) and Christian IV 1625-1632 (Hede c4h29). Attests the 72-pieces-per-mark standard at .77 (Phase I) / .76 (Phase II)."
  uk: "<b>danskmoent.dk «1 Rhinsk Gylden»</b> — <a href=\"https://www.danskmoent.dk/1rhinskgylden.htm\" target=\"_blank\">danskmoent.dk/1rhinskgylden.htm</a>. Hede-оглядова сторінка для данських Rhinsk-Gylden золотих монет: Frederik II 1563-1564 (Hede f2h3, f2h6) і Christian IV 1625-1632 (Hede c4h29). Підтверджує стандарт 72 штук з марки за пробою .77 (фаза I) / .76 (фаза II)."
