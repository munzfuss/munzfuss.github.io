  uk: "<b>Numista — срібні авксиліари Krone-Mønt</b> · <a href=\"https://en.numista.com/8493\" target=\"_blank\">2 Kroner Christian IX (KM# 798.1) 1875–1899</a> — 15 г повної ваги, Ø 31 мм, .800 Ag · 1 Krone (KM# 797.1) — 7,5 г повної ваги, Ø 25 мм, .800 Ag · <a href=\"https://en.numista.com/catalogue/pieces9392.html\" target=\"_blank\">25 Øre (KM# 796.1) 1874–1905</a> — 2,42 г повної ваги, Ø 17 мм, .600 Ag · <a href=\"https://en.numista.com/catalogue/pieces5567.html\" target=\"_blank\">10 Øre (KM# 795.1) 1874–1905</a> — 1,45 г повної ваги, Ø 16 мм, .400 Ag · 5/2/1 øre — бронза 8/4/2 г (Wikipedia DA «Den Skandinaviske Møntunion»: «<i>bronzemønter [...] med en vægt på hhv. 8, 4 og 2 g</i>»)."

en-tid-163075:
  de: "<b>ucoin — 10 Ducat 1588 (Frederik II.)</b> · <a href=\"https://en.ucoin.net/coin/denmark-10-ducat-1588/?tid=163075\" target=\"_blank\">ucoin.net tid 163075</a>. Attestiert Gold, 39,45 g rauh, Ø 51 mm; ucoin-Hauseintrag <i>UC# 10</i> (kein Krause-KM, kein Hede-Eintrag in der Frederik-II.-Reihe). Quelle für Existenz und physische Parameter des Stücks; die Zuordnung als Trauer-/Gedenkprägung zum Tod Frederiks II. (4. April 1588) ist Interpretation, kein direktes ucoin-Zitat."
  en: "<b>ucoin — 10 Ducat 1588 (Frederik II)</b> · <a href=\"https://en.ucoin.net/coin/denmark-10-ducat-1588/?tid=163075\" target=\"_blank\">ucoin.net tid 163075</a>. Attests gold, 39.45 g raw, 51 mm Ø; ucoin in-house ref <i>UC# 10</i> (no Krause KM, no Hede entry in the Frederik II run). Source for the existence and physical parameters of the piece; the attribution as a mourning / commemorative strike for Frederik II's death (4 April 1588) is the editor's reading, not a direct ucoin citation."
  uk: "<b>ucoin — 10 Ducat 1588 (Frederik II)</b> · <a href=\"https://en.ucoin.net/coin/denmark-10-ducat-1588/?tid=163075\" target=\"_blank\">ucoin.net tid 163075</a>. Засвідчує: золото, 39,45 г повної ваги, Ø 51 мм; внутрішнє посилання ucoin <i>UC# 10</i> (без Krause KM, без Hede-запису в серії Frederik II). Джерело існування й фізичних параметрів монети; кваліфікація як траурно/меморіальна емісія до смерті Фредеріка II (4 квітня 1588) — інтерпретація редактора, не пряма цитата з ucoin."

wikipedia-de-friedrich-ii-d-nemark-und-norwegen:
  de: "<b>Wikipedia DE «Friedrich II. (Dänemark und Norwegen)»</b> — <a href=\"https://de.wikipedia.org/wiki/Friedrich_II._(D%C3%A4nemark_und_Norwegen)\" target=\"_blank\">de.wikipedia.org/wiki/Friedrich II. (Dänemark und Norwegen)</a>. Datum Todes 4. April 1588 (Anfang Christian IV.); Regentschaftsrat 1588–1596 für den minderjährigen Christian IV. — Quelle für die historische Chronologie der pre-I-Phase."
  en: "<b>Wikipedia DE «Friedrich II. (Dänemark und Norwegen)»</b> — <a href=\"https://de.wikipedia.org/wiki/Friedrich_II._(D%C3%A4nemark_und_Norwegen)\" target=\"_blank\">de.wikipedia.org/wiki/Friedrich II. (Dänemark und Norwegen)</a>. Date of death 4 April 1588 (start of Christian IV's reign); regency council 1588–1596 for the minor Christian IV — source for the historical chronology of the pre-I phase."
  uk: "<b>Wikipedia DE «Friedrich II. (Dänemark und Norwegen)»</b> — <a href=\"https://de.wikipedia.org/wiki/Friedrich_II._(D%C3%A4nemark_und_Norwegen)\" target=\"_blank\">de.wikipedia.org/wiki/Friedrich II. (Dänemark und Norwegen)</a>. Дата смерті 4 квітня 1588 (початок правління Кристіана IV); регентська рада 1588–1596 при неповнолітньому Кристіані IV — джерело для історичної хронології pre-I фази."

wikipedia-de-abschlag-numismatik:
  de: "<b>Wikipedia DE «Abschlag (Numismatik)»</b> — <a href=\"https://de.wikipedia.org/wiki/Abschlag_(Numismatik)\" target=\"_blank\">de.wikipedia.org/wiki/Abschlag (Numismatik)</a>. Begriff für eine Münzprägung in einem Metall, für das der betreffende Münzstempel nicht bestimmt ist (Goldabschlag eines Silberstempels, dänisch <i>Guldafslag</i>); meist Sammelprägung oder Repräsentationsstück, nicht für den Umlauf."
  en: "<b>Wikipedia DE «Abschlag (Numismatik)»</b> — <a href=\"https://de.wikipedia.org/wiki/Abschlag_(Numismatik)\" target=\"_blank\">de.wikipedia.org/wiki/Abschlag (Numismatik)</a>. Term for a coin strike in a metal other than that for which the die was made (gold strike of a silver die, Danish <i>Guldafslag</i>); typically a collector or presentation issue, not for circulation."
  uk: "<b>Wikipedia DE «Abschlag (Numismatik)»</b> — <a href=\"https://de.wikipedia.org/wiki/Abschlag_(Numismatik)\" target=\"_blank\">de.wikipedia.org/wiki/Abschlag (Numismatik)</a>. Термін для карбування монети в металі, для якого штемпель не призначався (золоте карбування зі срібного штемпеля, данською <i>Guldafslag</i>); зазвичай колекційний або презентаційний випуск, не для обігу."

danskmoent-c4h25:
  de: "<b>Hede c4h25</b>: Christian IV. 2 Guldkrone (Hede 25) — <a href=\"https://www.danskmoent.dk/chr/c4h25.htm\" target=\"_blank\">danskmoent.dk/chr/c4h25.htm</a>. Verbatim Pålydende «<i>2 Guldkrone</i>» · Bruttovægt <b>5,996 g</b> · Finhed <b>0,917</b> · Finvægt <b>5,496 g</b> · København · Jahrgänge 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648 — direkter Hede-Beleg, daß die Christian-IV.-Hede-25-Serie metrisch identisch zur späteren Frederik-III.-Guldkrone-Definition ist und in Hedes eigener Klassifikation als «Guldkrone» geführt wird (nicht als «Gold Krone»). Schlüsselgrundlage der pre-I-Phase-Placement im Guldkrone-Fuß."
  en: "<b>Hede c4h25</b>: Christian IV 2 Guldkrone (Hede 25) — <a href=\"https://www.danskmoent.dk/chr/c4h25.htm\" target=\"_blank\">danskmoent.dk/chr/c4h25.htm</a>. Verbatim Pålydende «<i>2 Guldkrone</i>» · Bruttovægt <b>5.996 g</b> · Finhed <b>0.917</b> · Finvægt <b>5.496 g</b> · Copenhagen · years 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648 — direct Hede attestation that the Christian IV Hede 25 series is metrically identical to the later Frederik III Guldkrone definition and is named «Guldkrone» in Hede's own classification (not «Gold Krone»). Key basis for the pre-I phase placement under the Guldkrone-Fuß."
  uk: "<b>Hede c4h25</b>: Кристіан IV 2 Guldkrone (Hede 25) — <a href=\"https://www.danskmoent.dk/chr/c4h25.htm\" target=\"_blank\">danskmoent.dk/chr/c4h25.htm</a>. Verbatim Pålydende «<i>2 Guldkrone</i>» · Bruttovægt <b>5,996 г</b> · Finhed <b>0,917</b> · Finvægt <b>5,496 г</b> · Копенгаген · роки 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648 — прямий доказ Hede, що серія Кристіана IV Hede 25 метрично ідентична пізнішому означенню Frederik III Guldkrone і у власній класифікації Hede названа «Guldkrone» (не «Gold Krone»). Ключова основа для розташування у фазі pre-I Guldkrone-Fuß."

danskmoent-f3h44:
  de: "<b>Hede f3h44</b>: Frederik III. 1 Guldkrone (Hede 44) — <a href=\"https://www.danskmoent.dk/fr/f3h44.htm\" target=\"_blank\">danskmoent.dk/fr/f3h44.htm</a>. Verbatim Pålydende «<i>1 Guldkrone</i>» · Bruttovægt <b>5,590 g</b> · Finhed <b>0,917</b> · Finvægt <b>5,126 g</b> · København 1666 · auf der Seite ausdrücklich «1 og 2 Guldkrone 1666, København» (Hede 45 ist die Doppel-Variante mit 11,181 g rau) — direkter Beleg für die spät-Frederik-III.-Kopenhagener Folgeprägung der Guldkrone-Linie außerhalb der kanonischen Glückstadter Hauptphase 1657–1660."
  en: "<b>Hede f3h44</b>: Frederik III 1 Guldkrone (Hede 44) — <a href=\"https://www.danskmoent.dk/fr/f3h44.htm\" target=\"_blank\">danskmoent.dk/fr/f3h44.htm</a>. Verbatim Pålydende «<i>1 Guldkrone</i>» · Bruttovægt <b>5.590 g</b> · Finhed <b>0.917</b> · Finvægt <b>5.126 g</b> · Copenhagen 1666 · the page states «1 og 2 Guldkrone 1666, København» (Hede 45 is the double variant at 11.181 g rough) — direct attestation for the late Frederik III Copenhagen follow-up issue of the Guldkrone line outside the canonical Glückstadt 1657–1660 main phase."
  uk: "<b>Hede f3h44</b>: Фредерік III 1 Guldkrone (Hede 44) — <a href=\"https://www.danskmoent.dk/fr/f3h44.htm\" target=\"_blank\">danskmoent.dk/fr/f3h44.htm</a>. Verbatim Pålydende «<i>1 Guldkrone</i>» · Bruttovægt <b>5,590 г</b> · Finhed <b>0,917</b> · Finvægt <b>5,126 г</b> · Копенгаген 1666 · сторінка явно зазначає «1 og 2 Guldkrone 1666, København» (Hede 45 — подвійна варіація з 11,181 г повної ваги) — прямий доказ пізнього копенгагенського продовження Frederik III лінії Guldkrone поза канонічною ґлюкштадтською головною фазою 1657–1660."

denmark-ref29-no-url:
  de: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481–1588</i> (København: Munksgaard, 1950). Kap. 7-4 «Christian IIIs møntreform 1541-1547», pp. 13-26. Verbatim aus der Møntordning vom 20. September 1541: «<i>Allffue Daler aff Hallffemtandeskab Lod (= 14½ Lod) findt Sølff aff en Cølnschk Marck</i>» (S. 13) — Acht Daler aus einer Cölln. Marck fein bei 14½ Lod Probe. Quelle für mf 8,827 (Phase A1 baseline) + mf 9,481 (Phase A2 nach Tillæg 27. September 1544, S. 14-15) + 14¼ Lod Flensborg-Bestalling 22. Januar 1547 (pp. 25-26)."
  en: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481–1588</i> (Copenhagen: Munksgaard, 1950). Kap. 7-4 «Christian III's møntreform 1541-1547», pp. 13-26. Verbatim from the Møntordning of 20 September 1541: «<i>Allffue Daler aff Hallffemtandeskab Lod (= 14½ Lod) findt Sølff aff en Cølnschk Marck</i>» (p. 13) — eight Daler per Cologne mark fine at 14½ Lod fineness. Source for mf 8.827 (Phase A1 baseline) + mf 9.481 (Phase A2 after the Tillæg of 27 September 1544, pp. 14-15) + 14¼ Lod Flensborg Bestalling of 22 January 1547 (pp. 25-26)."
  uk: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481–1588</i> (Копенгаген: Munksgaard, 1950). Kap. 7-4 «Christian III's møntreform 1541-1547», pp. 13-26. Дослівно з Møntordning 20 вересня 1541: «<i>Allffue Daler aff Hallffemtandeskab Lod (= 14½ Lod) findt Sølff aff en Cølnschk Marck</i>» (с. 13) — вісім Daler з кельнської марки чистого срібла за пробою 14½ Lod. Джерело для mf 8,827 (фаза A1 baseline) + mf 9,481 (фаза A2 після Tillæg 27 вересня 1544, с. 14-15) + 14¼ Lod Flensborg Bestalling 22 січня 1547 (pp. 25-26)."

denmark-ref30-no-url:
  de: "<b>Paus, Hans</b>: <i>Samling af Gamle Norske Love</i>, Vol. II (København, 1752). Pp. 247-251 verbatim Transkript des Tillæg «<i>Om Maal og Vægt</i>» vom 27. September 1544 — sekundärer Quellennachweis für die Christian-III-Daler-fod Phase A2 Debasierung (mf 9,481, Raugewicht reduziert, Feingehalt unverändert 14½ Lod). Paus übernimmt den Wortlaut aus Rigsarkivet T.K. nr. 160 und schließt damit die archivalisch-publizierte Quellenkette für die A2-Phase."
  en: "<b>Paus, Hans</b>: <i>Samling af Gamle Norske Love</i>, Vol. II (Copenhagen, 1752). Pp. 247-251 verbatim transcript of the Tillæg «<i>Om Maal og Vægt</i>» of 27 September 1544 — a secondary source documenting the 8-Daler-Fod Phase A2 debasement (mf 9.481, reduced rough weight, fineness unchanged at 14½ Lod). Paus reproduces the wording from Rigsarkivet T.K. nr. 160, closing the archival-published source chain for the A2 phase."
  uk: "<b>Paus, Hans</b>: <i>Samling af Gamle Norske Love</i>, Vol. II (Копенгаген, 1752). Pp. 247-251 дослівний транскрипт Tillæg «<i>Om Maal og Vægt</i>» від 27 вересня 1544 — вторинне джерелознавче підтвердження фази A2 девальвації 8-Daler-Fod (mf 9,481, повна вага зменшена, проба незмінна 14½ Lod). Paus відтворює формулювання з Rigsarkivet T.K. nr. 160, закриваючи архівно-публіковану джерелознавчу ланку фази A2."

denmark-ref31-no-url:
  de: "<b>Rigsarkivet T.K. nr. 160</b>: «<i>Diverse møntsager 1523-1619</i>» (Statens Arkiver, København). Fol. 12r-15v primärquellen-archivalischer Korpus der Møntordning af 20. September 1541 + Tillæg af 27. September 1544. Primäres Archivanker für die 8-Daler-Fod-Metriken (mf 8,827 baseline, mf 9,481 debasiert) vor der Sekundärquellenkette Paus 1752 + Wilcke 1950."
  en: "<b>Rigsarkivet T.K. nr. 160</b>: «<i>Diverse møntsager 1523-1619</i>» (Statens Arkiver, Copenhagen). Fol. 12r-15v primary-source archival corpus of the Møntordning af 20. September 1541 + Tillæg af 27. September 1544. Primary archival anchor for the 8-Daler-Fod metrics (mf 8.827 baseline, mf 9.481 debased) preceding the secondary-source chain Paus 1752 + Wilcke 1950."
  uk: "<b>Rigsarkivet T.K. nr. 160</b>: «<i>Diverse møntsager 1523-1619</i>» (Statens Arkiver, Копенгаген). Fol. 12r-15v первинно-джерельний архівний корпус Møntordning af 20. September 1541 + Tillæg af 27. September 1544. Первинний архівний якір для метрики 8-Daler-Fod (mf 8,827 baseline, mf 9,481 знижений) перед вторинно-джерельною ланкою Paus 1752 + Wilcke 1950."

denmark-ref32-no-url:
  de: "<b>Galster, Georg</b>: <i>Danmarks mønter 1481-1559</i> (København: Nationalmuseet, 1965). Quote aus dem Tillæg vom 27. September 1544 «<i>8 stk per 14½-lødig Cölln. Marck</i>» (8 Stück je 14½-lodige Cölln. Marck) — period-Vokabular für die Christian-III-Daler-fod Marken-fin-Formel (Daler @ 14½ Lod, 8-pcs-per-Marck-rauh-Grid). Sekundäre numismatische Synthese der Galster-Schule, die Wilcke 1950 ergänzt und für die Flensborg-track (c3h15-c3h22 Sølvgylden + Søsling lybsk Hauptmünzen) das Primär-Katalog-Register liefert (zusammen mit Jensen-Skjoldager 2021 — Paper-Source-Import pending, §AZ)."
  en: "<b>Galster, Georg</b>: <i>Danmarks mønter 1481-1559</i> (Copenhagen: Nationalmuseet, 1965). Quoting the Tillæg of 27 September 1544 «<i>8 stk per 14½-lødig Cölln. Marck</i>» (8 pieces per 14½-Lod Cologne mark) — period vocabulary for the 8-Daler-Fod Marken-fin formula (Daler at 14½ Lod, 8-pcs-per-Marck-rough grid). Secondary numismatic synthesis of the Galster school, complementing Wilcke 1950 and providing the primary-catalogue register for the Flensborg track (c3h15-c3h22 Sølvgylden + Søsling lybsk main coinage; together with Jensen-Skjoldager 2021 — paper-source import pending, §AZ)."
  uk: "<b>Galster, Georg</b>: <i>Danmarks mønter 1481-1559</i> (Копенгаген: Nationalmuseet, 1965). Цитата з Tillæg 27 вересня 1544 «<i>8 stk per 14½-lødig Cölln. Marck</i>» (8 шт. з 14½-lodiсteine кельнської марки) — period-вокабулар для формули Marken-fin 8-Daler-Fod (Daler за 14½ Lod, 8-шт-на-марку-повної-сітка). Вторинна нумізматична синтеза галстерівської школи, доповнює Wilcke 1950 і дає первинний каталоговий реєстр для Flensborg-track (основне карбування c3h15-c3h22 Sølvgylden + Søsling lybsk; разом з Jensen-Skjoldager 2021 — paper-source імпорт очікується, §AZ)."

danskmoent-w6b1:
  de: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481-1588</i>, Kap. 6 «Rentemesterregnskaber under Frederik 2.» — <a href=\"https://www.danskmoent.dk/wilcke/w6b1.htm\" target=\"_blank\">danskmoent.dk/wilcke/w6b1.htm</a>. Primärquellenauszug aus den Rentmeister-Rechnungen Frederiks II.: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — direkter archivalischer Beleg für die Karbung der Frederik-II-Guldkrone am 17. Oktober 1563: 66½ Marck Kroneguld-Legierung wurden zu 4860 Krone-Klippingen ausgeprägt. Erste belegfähige Stückzahl + Materialeinsatz der Karbung. Mintmaster Hans de Wüllers (Guldsmeed, 1563), Hans Köppelin (Møntmester, 1564), Laurits Hammer (Bremerholm, 1565). Belegt drei parallele Gold-Linien Frederiks II.: Ungersk Gylden (Reichsdukatenfuß), Rhinsk Gylden (Rhinsk-Gyldenfod), Kroneguld (eigener Müntzfuß)."
  en: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481-1588</i>, Kap. 6 «Rentemesterregnskaber under Frederik 2.» — <a href=\"https://www.danskmoent.dk/wilcke/w6b1.htm\" target=\"_blank\">danskmoent.dk/wilcke/w6b1.htm</a>. Primary-source excerpt from Frederik II's Rentmeister (treasurer) account records: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — direct archival attestation of the Frederik II Guldkrone minting on 17 October 1563: 66½ marks of Kroneguld alloy struck into 4,860 Krone clippings. First documented piece count + material input for the coinage. Mintmasters: Hans de Wüllers (goldsmith, 1563), Hans Köppelin (mint-master, 1564), Laurits Hammer (Bremerholm, 1565). Records three parallel Frederik II gold lines: Ungersk Gylden (Reichsdukatenfuß), Rhinsk Gylden (Rhinsk-Gyldenfod), Kroneguld (its own Müntzfuß)."
  uk: "<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481-1588</i>, Kap. 6 «Rentemesterregnskaber under Frederik 2.» — <a href=\"https://www.danskmoent.dk/wilcke/w6b1.htm\" target=\"_blank\">danskmoent.dk/wilcke/w6b1.htm</a>. Першоджерельна виписка з рент-майстерських (скарбничих) рахунків Фредеріка II: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — пряме архівне підтвердження карбування Frederik-II-Guldkrone 17 жовтня 1563: 66½ марки сплаву Kroneguld перекарбовано на 4860 Krone-Klippinge. Перша задокументована кількість штук + матеріальний вклад карбування. Монетмайстри: Hans de Wüllers (золотар, 1563), Hans Köppelin (монетмайстер, 1564), Laurits Hammer (Bremerholm, 1565). Документує три паралельні золоті лінії Frederik II: Ungersk Gylden (Reichsdukatenfuß), Rhinsk Gylden (Rhinsk-Gyldenfod), Kroneguld (власний Müntzfuß)."

danskmoent-1guldkro:
  de: "<b>danskmoent.dk «1 Guldkrone»</b> — <a href=\"https://www.danskmoent.dk/1guldkro.htm\" target=\"_blank\">danskmoent.dk/1guldkro.htm</a>. Hede-Übersichtsseite für die Frederik-II-Guldkrone-Klippinge: «<i>Hede 2</i>» (1563, unikat) und «<i>Hede 5</i>» (1564), Kopenhagen, Brutto 3,341 g, Lødighed 0,934, Feingewicht 3,120 g. Drei parallele Goldarten dieser Karbung: <b>Ungersk Gylden</b> (ungarisch, Reichsdukatenfuß), <b>Rhinsk Gylden</b> (rheinisch, Rhinsk-Gyldenfod), <b>Kroneguld</b> (eigene Krone-Legierung, dieser Müntzfuß). Reversinschrift verbatim: «<i>I GOLT KRONE</i>» (parallel zu «I GOLT GILDEN» und «I DOK KATE» der Schwester-Goldarten)."
  en: "<b>danskmoent.dk «1 Guldkrone»</b> — <a href=\"https://www.danskmoent.dk/1guldkro.htm\" target=\"_blank\">danskmoent.dk/1guldkro.htm</a>. Hede overview page for the Frederik II Guldkrone Klippinge: «<i>Hede 2</i>» (1563, unique) and «<i>Hede 5</i>» (1564), Copenhagen, brutto 3.341 g, lødighed 0.934, fine weight 3.120 g. Three parallel gold types in this coinage: <b>Ungersk Gylden</b> (Hungarian, Reichsdukatenfuß), <b>Rhinsk Gylden</b> (Rhenish, Rhinsk-Gyldenfod), <b>Kroneguld</b> (own crown-gold alloy, this Müntzfuß). Reverse inscription verbatim: «<i>I GOLT KRONE</i>» (paralleling «I GOLT GILDEN» and «I DOK KATE» of the sister gold types)."
  uk: "<b>danskmoent.dk «1 Guldkrone»</b> — <a href=\"https://www.danskmoent.dk/1guldkro.htm\" target=\"_blank\">danskmoent.dk/1guldkro.htm</a>. Hede-оглядова сторінка для Frederik-II-Guldkrone-Klippinge: «<i>Hede 2</i>» (1563, унікат) і «<i>Hede 5</i>» (1564), Копенгаген, повна вага 3,341 г, проба 0,934, чиста вага 3,120 г. Три паралельні золоті типи цього карбування: <b>Ungersk Gylden</b> (угорський, Reichsdukatenfuß), <b>Rhinsk Gylden</b> (рейнський, Rhinsk-Gyldenfod), <b>Kroneguld</b> (власна Krone-легура, цей Müntzfuß). Реверс-напис verbatim: «<i>I GOLT KRONE</i>» (паралельно «I GOLT GILDEN» та «I DOK KATE» сестринських золотих типів)."

historyofwar-wars-nordic-seven-years:
  de: "<b>Frantzen, Ole L.</b> / <b>Bender Jørgensen, Lise</b>: <i>Den Nordiske Syvårskrig 1563-1570</i> (Historieforskning, mit Aufsatzbänden in Den Danske Krigshistorie). Hauptkonflikt zwischen Dänemark-Norwegen + Lübeck + Polen vs Schweden 1563-1570 — «<i>den største krise i Frederik II.s regering</i>» («the greatest crisis of Frederik II's reign») per dänischer Historiographie. Direkter wirtschaftlicher Kontext für die Karbung der Klipping-Goldmünzen Frederiks II. 1563-1564: massive Kriegsfinanzierungs-Notwendigkeit erzwingt die parallele Karbung dreier Goldarten (Ungersk + Rhinsk + Krone) in Kopenhagen + Bremerholm. Siehe auch Historyofwar.org «<a href=\"https://www.historyofwar.org/articles/wars_nordic_seven_years.html\" target=\"_blank\">Nordic Seven Years War, 1563-1570</a>» für englischsprachige Synthese der Kriegsverlauf und Finanzierungs-Probleme der dänischen Söldnerarmee."
  en: "<b>Frantzen, Ole L.</b> / <b>Bender Jørgensen, Lise</b>: <i>Den Nordiske Syvårskrig 1563-1570</i> (Danish historical research, with essays in <i>Den Danske Krigshistorie</i>). The main conflict between Denmark-Norway + Lübeck + Poland against Sweden in 1563-1570 — «<i>den største krise i Frederik II's regering</i>» («the greatest crisis of Frederik II's reign») per Danish historiography. Direct economic context for the minting of Frederik II's 1563-1564 Klipping gold coins: massive wartime-financing pressure forced the parallel coining of three gold types (Ungersk + Rhinsk + Krone) at Copenhagen + Bremerholm. See also Historyofwar.org «<a href=\"https://www.historyofwar.org/articles/wars_nordic_seven_years.html\" target=\"_blank\">Nordic Seven Years War, 1563-1570</a>» for an English-language synthesis of the war's course and the Danish mercenary-army financing crisis."
  uk: "<b>Frantzen, Ole L.</b> / <b>Bender Jørgensen, Lise</b>: <i>Den Nordiske Syvårskrig 1563-1570</i> (данська історична розвідка, з нарисами у <i>Den Danske Krigshistorie</i>). Головний конфлікт між Данією-Норвегією + Любеком + Польщею проти Швеції 1563-1570 — «<i>den største krise i Frederik II's regering</i>» («найбільша криза у правлінні Фредеріка II») за данською історіографією. Прямий економічний контекст для карбування Klipping-золотих монет Frederik II 1563-1564: масивна воєнно-фінансова потреба змушує до паралельного карбування трьох золотих типів (Ungersk + Rhinsk + Krone) у Копенгагені + Bremerholm. Див. також Historyofwar.org «<a href=\"https://www.historyofwar.org/articles/wars_nordic_seven_years.html\" target=\"_blank\">Nordic Seven Years War, 1563-1570</a>» — англомовна синтеза перебігу війни та фінансової кризи данської найманської армії."

stacksbowers-the-l-e-bruun-collection:
  de: "<b>Stack's Bowers Galleries</b>: <i>The L. E. Bruun Collection</i> — Auktionsreihe 2024-2026, Odd Fellow Palace Kopenhagen / Zürich. «<i>The L. E. Bruun Collection comprises Scandinavian coins amassed by Lars Emil Bruun (1852-1923).</i>» — <a href=\"https://stacksbowers.com/the-l-e-bruun-collection/\" target=\"_blank\">stacksbowers.com/the-l-e-bruun-collection</a>. Auktionskataloge Parts I-IV mit per-Lot-Metriken (Galster-, Hede-, Sieg-, Schou-Referenzen, Brutto-Gewichte, NGC-Grading-Daten) — Primärbeleg für die in unseren Daten verwendeten Bruun-Lot-Nummern."
  en: "<b>Stack's Bowers Galleries</b>: <i>The L. E. Bruun Collection</i> — auction series 2024-2026, Odd Fellow Palace Copenhagen / Zurich. «<i>The L. E. Bruun Collection comprises Scandinavian coins amassed by Lars Emil Bruun (1852-1923).</i>» — <a href=\"https://stacksbowers.com/the-l-e-bruun-collection/\" target=\"_blank\">stacksbowers.com/the-l-e-bruun-collection</a>. Auction catalogues Parts I-IV provide per-lot metrics (Galster, Hede, Sieg, Schou references, gross weights, NGC grading data) — primary attestation for the Bruun-lot numbers used in our data."
  uk: "<b>Stack's Bowers Galleries</b>: <i>The L. E. Bruun Collection</i> — аукціонна серія 2024-2026, Odd Fellow Palace Копенгаген / Цюрих. «<i>The L. E. Bruun Collection comprises Scandinavian coins amassed by Lars Emil Bruun (1852-1923).</i>» — <a href=\"https://stacksbowers.com/the-l-e-bruun-collection/\" target=\"_blank\">stacksbowers.com/the-l-e-bruun-collection</a>. Аукціонні каталоги Parts I-IV містять покоінні метрики (Galster, Hede, Sieg, Schou-референси, повні ваги, NGC-grading) — первинне підтвердження для номерів Bruun-лотів, які ми використовуємо у наших даних."

wikipedia-en-sovereign-english-coin:
  de: "<b>Wikipedia EN «Sovereign (English coin)»</b> — <a href=\"https://en.wikipedia.org/wiki/Sovereign_(English_coin)\" target=\"_blank\">en.wikipedia.org/wiki/Sovereign_(English_coin)</a>. «<i>It had a diameter of 42 millimetres (1.7 in), and weighed 15.55 grams (0.500 oz t), twice the weight of the existing gold coin, the ryal.</i>» — englischer Sovereign Heinrichs VII. von 1489: 15,55 g brutto, 42 mm Durchmesser, doppelte Schwerung des Ryal / Rose Noble (7,78 g), 23-Karat-Gold (.9583, später .917). Die Noble-Stammlinie nach demselben Artikel: Edward III. 1344 Noble (8,97 g) → Edward IV. 1465 Rose Noble / Ryal (7,78 g) → Heinrich VII. 1489 Sovereign (15,55 g)."
  en: "<b>Wikipedia EN «Sovereign (English coin)»</b> — <a href=\"https://en.wikipedia.org/wiki/Sovereign_(English_coin)\" target=\"_blank\">en.wikipedia.org/wiki/Sovereign_(English_coin)</a>. «<i>It had a diameter of 42 millimetres (1.7 in), and weighed 15.55 grams (0.500 oz t), twice the weight of the existing gold coin, the ryal.</i>» — Henry VII's English Sovereign of 1489: 15.55 g brutto, 42 mm diameter, double the Ryal / Rose Noble weight (7.78 g), 23-carat gold (.9583, later .917). The Noble lineage per the same article: Edward III 1344 Noble (8.97 g) → Edward IV 1465 Rose Noble / Ryal (7.78 g) → Henry VII 1489 Sovereign (15.55 g)."
  uk: "<b>Wikipedia EN «Sovereign (English coin)»</b> — <a href=\"https://en.wikipedia.org/wiki/Sovereign_(English_coin)\" target=\"_blank\">en.wikipedia.org/wiki/Sovereign_(English_coin)</a>. «<i>It had a diameter of 42 millimetres (1.7 in), and weighed 15.55 grams (0.500 oz t), twice the weight of the existing gold coin, the ryal.</i>» — англійський Sovereign Генрі VII 1489: 15,55 г повної ваги, 42 мм діаметр, подвоєна вага Ryal / Rose Noble (7,78 г), 23-каратне золото (.9583, пізніше .917). Лінія Noble за тією ж статтею: Edward III 1344 Noble (8,97 г) → Edward IV 1465 Rose Noble / Ryal (7,78 г) → Генрі VII 1489 Sovereign (15,55 г)."

danskmoent-1rosenob:
  de: "<b>danskmoent.dk «1 Rosenobel»</b> — <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">danskmoent.dk/1rosenob.htm</a>. Hede-Übersichtsseite für die dänischen Rosenobler: <b>Frederik II.</b> 1584 (Frederiksborg, Hede 7B / Schou 2 / Sieg 29, unik); <b>Christian IV.</b> Typ A (1611-1613 + 1627 + 1629, Hede 23A / Schou 1-5/1-4/1-3/1 / Sieg 149); Typ B (Hede 23B / Schou 2-3 / Sieg 149). Hauptmünzstätte Kopenhagen für Christian IVs Karbung. Verbatim Etymologie: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — die dänische Rosenobel-Karbung ist eine späte Anpassung des englischen Rose-Noble-Modells."
  en: "<b>danskmoent.dk «1 Rosenobel»</b> — <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">danskmoent.dk/1rosenob.htm</a>. Hede overview page for the Danish Rosenobler: <b>Frederik II</b> 1584 (Frederiksborg, Hede 7B / Schou 2 / Sieg 29, unique); <b>Christian IV</b> Type A (1611-1613 + 1627 + 1629, Hede 23A / Schou 1-5/1-4/1-3/1 / Sieg 149); Type B (Hede 23B / Schou 2-3 / Sieg 149). Principal mint Copenhagen for Christian IV's coinage. Verbatim etymology: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — the Danish Rosenobel coinage is a late adaptation of the English Rose Noble model."
  uk: "<b>danskmoent.dk «1 Rosenobel»</b> — <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">danskmoent.dk/1rosenob.htm</a>. Hede-оглядова сторінка для данських Rosenobler: <b>Frederik II</b> 1584 (Frederiksborg, Hede 7B / Schou 2 / Sieg 29, унікат); <b>Christian IV</b> Тип A (1611-1613 + 1627 + 1629, Hede 23A / Schou 1-5/1-4/1-3/1 / Sieg 149); Тип B (Hede 23B / Schou 2-3 / Sieg 149). Головний монетний двір Копенгаген для карбування Christian IV. Verbatim етимологія: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — данське карбування Rosenobel — пізня адаптація моделі англійського Rose Noble."

historyofwar-wars-kalmar:
  de: "<b>Historyofwar.org «Kalmar War, 1611-1613»</b> — <a href=\"https://www.historyofwar.org/articles/wars_kalmar.html\" target=\"_blank\">historyofwar.org/articles/wars_kalmar.html</a>. Hintergrundsynthese des Kriegs zwischen Dänemark-Norwegen und Schweden 1611-1613. Christian IV. greift 1611 Schweden an mit dem Hauptziel, Schweden zur Rückkehr in die Kalmarer Union zu zwingen — Ziel verfehlt, aber Schweden zahlt im Frieden von Knäred 1613 eine Kriegsschadensbild von <b>1 Million Riksdaler Silber</b> (sogenanntes Älvsborg-Lösegeld). Der Kriegsfinanzierungs-Bedarf in den Jahren 1611-1613 erklärt die Karbung der Christian-IV-Rosenobler (Hede 23A) als Prestige-Goldemission zur Söldnerbezahlung; die spätere Rosenobel-Karbung 1627 + 1629 fällt in den Beginn der dänischen Beteiligung am Dreißigjährigen Krieg (Kaiserlich-Dänischer Krieg 1625-1629)."
  en: "<b>Historyofwar.org «Kalmar War, 1611-1613»</b> — <a href=\"https://www.historyofwar.org/articles/wars_kalmar.html\" target=\"_blank\">historyofwar.org/articles/wars_kalmar.html</a>. Background synthesis of the war between Denmark-Norway and Sweden 1611-1613. Christian IV attacks Sweden in 1611 with the main aim of forcing Sweden back into the Kalmar Union — the aim fails, but in the Treaty of Knäred 1613 Sweden pays a war indemnity of <b>1 million silver riksdaler</b> (the so-called Älvsborg ransom). The wartime-financing pressure of 1611-1613 explains the coinage of Christian IV's Rosenobler (Hede 23A) as a prestige gold issue for mercenary pay; the later Rosenobel coinage 1627 + 1629 falls within the start of Danish involvement in the Thirty Years' War (Imperial-Danish War 1625-1629)."
  uk: "<b>Historyofwar.org «Kalmar War, 1611-1613»</b> — <a href=\"https://www.historyofwar.org/articles/wars_kalmar.html\" target=\"_blank\">historyofwar.org/articles/wars_kalmar.html</a>. Фонова синтеза війни між Данією-Норвегією та Швецією 1611-1613. Christian IV нападає на Швецію 1611 р. з головною метою примусити Швецію повернутися до Кальмарської унії — мети не досягнуто, але за договором Knäred 1613 Швеція виплачує військову контрибуцію в <b>1 мільйон срібних riksdaler</b> (так званий Älvsborg-викуп). Воєнно-фінансовий тиск 1611-1613 пояснює карбування Rosenobler Кристіана IV (Hede 23A) як престижної золотої емісії для оплати найманців; пізніше карбування Rosenobel 1627 + 1629 припадає на початок данської участі у Тридцятилітній війні (Імперсько-данська війна 1625-1629)."

nationalmuseet-frederik-ii-1584-rosenobel:
  de: "<b>Nationalmuseet i Danmark — Frederik II 1584 Rosenobel</b> (Frederiksborg-Münzstätte, Hede 7B / Schou 2 / Sieg 29, Unikum). Avers «<i>FRIDERICVS Z D.G. DA. NO. SLA.GO.O. REX</i>», Revers mit der zentralen vierzeiligen Legende «<i>ROSEN / NOWEL / 1584 / ※</i>», umrandet vom Wahlspruch Frederik II. «<i>ALLEIN MEIN HOFFNUNG ZV GOTT</i>». «ROSEN NOWEL» ist die zeitgenössische dänische Inschriftform 1584 für das, was Wilcke 1950 und die moderne numismatische Literatur retrospektiv zu «Rosenobel» standardisiert haben."
  en: "<b>Nationalmuseet i Danmark — Frederik II 1584 Rosenobel</b> (Frederiksborg mint, Hede 7B / Schou 2 / Sieg 29, unique specimen). Obverse «<i>FRIDERICVS Z D.G. DA. NO. SLA.GO.O. REX</i>», reverse central four-line legend «<i>ROSEN / NOWEL / 1584 / ※</i>» ringed by Frederik II's Wahlspruch «<i>ALLEIN MEIN HOFFNUNG ZV GOTT</i>». «ROSEN NOWEL» is the contemporary Danish 1584 inscription form for what Wilcke 1950 and the modern numismatic literature retrospectively standardised to «Rosenobel»."
  uk: "<b>Nationalmuseet i Danmark — Frederik II 1584 Rosenobel</b> (монетний двір Frederiksborg, Hede 7B / Schou 2 / Sieg 29, унікат). Аверс «<i>FRIDERICVS Z D.G. DA. NO. SLA.GO.O. REX</i>», реверс із центральною чотирирядковою легендою «<i>ROSEN / NOWEL / 1584 / ※</i>», обрамленою девізом Frederik II «<i>ALLEIN MEIN HOFFNUNG ZV GOTT</i>». «ROSEN NOWEL» — сучасна данська форма інскрипції 1584 р. для того, що Wilcke 1950 та сучасна нумізматична література ретроспективно стандартизували до «Rosenobel»."

