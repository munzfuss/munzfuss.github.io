danmarkshistorien-forordning-om-forandring-i-pengev-senet-5-januar-1813:
  de: "<b>Forordning om Forandring i Pengevæsenet, 5. januar 1813</b> · danmarkshistorien.dk (Aarhus Universitet) — <a href=\"https://danmarkshistorien.lex.dk/Forordning_om_Forandring_i_Pengev%C3%A6senet,_5._januar_1813\" target=\"_blank\">danmarkshistorien.lex.dk</a>. Primärrechtlicher Text der dänischen Münzreform; §5 setzt den 18½-Thaler-Fuß, §10 fixiert 1 Speciedaler = 2 Rigsbankdaler."
