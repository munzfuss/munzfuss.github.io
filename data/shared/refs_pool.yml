  de: "<b>Numista — Krone-Mønt-Silberauxiliare</b> · <a href=\"https://en.numista.com/8493\" target=\"_blank\">2 Kroner Christian IX (KM# 798.1) 1875–1899</a> — 15 g rauh, 31 mm Ø, .800 Ag · 1 Krone (KM# 797.1) — 7,5 g rauh, 25 mm Ø, .800 Ag · <a href=\"https://en.numista.com/catalogue/pieces9392.html\" target=\"_blank\">25 Øre (KM# 796.1) 1874–1905</a> — 2,42 g rauh, 17 mm Ø, .600 Ag · <a href=\"https://en.numista.com/catalogue/pieces5567.html\" target=\"_blank\">10 Øre (KM# 795.1) 1874–1905</a> — 1,45 g rauh, 16 mm Ø, .400 Ag · 5/2/1 øre — Bronze 8/4/2 g (Wikipedia DA «Den Skandinaviske Møntunion»: «<i>bronzemønter [...] med en vægt på hhv. 8, 4 og 2 g</i>»)."
