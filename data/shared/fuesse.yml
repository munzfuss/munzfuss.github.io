  name:
    de: 9¼-Thalerfuß
    en: 9¼-Thaler-Fuß
    uk: 9¼-Thaler-Fuß
  metal: silver
  grid_unit_g: 233.856
  grid_stops: 9.25
  fineness_standard: 0.875    # 14 Loth
  fineness_display: "875 ‰ (14 Loth)"
  grundwerte:
    heading:
      de: "Grundwerte · Silberstandard"
      en: "Base values · Silver standard"
      uk: "Базові значення · срібний стандарт"
    subheading:
      de: "Cöllnische Marck = 233,856 g Feinsilber · 9¼ Thaler Species aus der feinen Marck"
      en: "Cologne Mark = 233.856 g fine silver · 9¼ Thaler Species from one fine Cologne Mark"
      uk: "Кельнська марка = 233,856 г чистого срібла · 9¼ Thaler Species з чистої марки"
    badge:
      de: "Müntzfuß · Silber"
      en: "Müntzfuß · Silver"
      uk: "Стопа · срібло"
    rows:
      - key:
          de: "Feingewicht Thaler Species"
          en: "Fine weight, Thaler Species"
          uk: "Чиста вага Thaler Species"
        value:
          de: "<b>25,28173 g</b> (= 233,856 / 9,25) · 28,89341 g rau · 875 ‰ (14 Loth)"
          en: "<b>25.28173 g</b> (= 233.856 / 9.25) · 28.89341 g rough · 875‰ (14 Loth)"
          uk: "<b>25,28173 г</b> (= 233,856 / 9,25) · 28,89341 г повної ваги · 875 ‰ (14 Loth)"
      - key:
          de: "Cölln. Marck Feinsilber"
          en: "Cologne Mark, fine silver"
          uk: "Кельнська марка чистого срібла"
        value:
          de: "9¼ Thaler Species · zeitgenössisch «9¼ eine feine Marck»"
          en: "9¼ Thaler Species · period phrasing «9¼ to one fine Mark»"
          uk: "9¼ Thaler Species · сучасник казав «9¼ на одну чисту марку»"
      - key:
          de: "Verhältnis zum Reichsthaler-9-Fuß"
          en: "Ratio to the Reichsthaler 9-Fuß"
          uk: "Співвідношення до Reichsthaler-9-Fuß"
        value:
          de: "Thaler Species 25,28173 g &lt; Reichsthaler Species 25,98400 g · das Verhältnis 9 zu 9¼ beträgt 36/37, d. h. der holsteinische Species ist 1/37 ≈ 2,7 % leichter"
          en: "Thaler Species 25.28173 g &lt; Reichsthaler Species 25.98400 g · the ratio 9 to 9¼ is 36/37, i.e. the Holstein Species is 1/37 ≈ 2.7 % lighter"
          uk: "Thaler Species 25,28173 г &lt; Reichsthaler Species 25,98400 г · відношення 9 до 9¼ = 36/37, тобто гольштинський Species на 1/37 ≈ 2,7 % легший"
    rechnungsfraktionen_label:
      de: "Rechnungsfraktionen"
      en: "Accounting fractions"
      uk: "Розрахункові фракції"
    rechnungsfraktionen:
      de: |
        <b>1 Thaler Species</b> = <b>25,28173 g</b> fein = 3 Mark lübisch = 48 Schilling lübisch = 576 Pfennig (hanseatisch 1622–1775) · identisch mit: 1 Rigsdaler Species (dän.), 1 Reichsthaler Species (hanseat.). Die Bezeichnungen sind regional, die Münze ist eine.<br>
        <b>1 Mark lübisch</b> = <b>8,427 g</b> fein (<i>Rechnungseinheit</i>) = ⅓ Thaler Species = 16 Schilling lübisch = 192 Pfennig<br><br>
        <b>Der Skilling Danske</b> (<b>0,21494 g</b> fein) ist die praktische Unterfraktion aller Rechnungssysteme. Die Rechnungskonvention «120 Skilling = 1 Rigsdaler Species» gilt seit Beginn der Kurantmøntfod (1726) als amtliche Unterteilung. Das resultierende Silberäquivalent (120 × 0,21494 = 25,79 g) überschreitet das tatsächliche Silbergewicht des Species (25,28 g) um ~2 %; diese Differenz war historisch als <em>Opgæld</em> auf dem Wechselmarkt sichtbar und wurde erst durch Plakat 3. Dezember 1794 amtlich beseitigt.<br><br>
        <b>Hanseatisches Zählsystem (Wendischer Münzverein, Hamburg/Lübeck) nach Phasen:</b><br>
         · <i>ab 1572:</i> 1 Rtlr. = 2 Mark lübisch = 32 Schilling lübisch = 64 Sechslinge = 384 Pfennig<br>
         · <i>1622–1775:</i> 1 Rtlr. = 3 Mark lübisch = 4 Ort = 16 Düttchen = 48 Schilling lübisch = 96 Sechslinge = 192 Dreilinge = 576 Pfennig<br><br>
        <b>Schleswig-Holstein (Thaler-Species-Rechnung):</b> folgte dem hanseatischen System · ½ Schilling = Sechsling · ¼ Schilling = Dreiling<br><br>
        <b>Kurse Species ↔ Courant:</b><br>
         · <i>1726–1794:</i> Rechnungskonvention 1 RSp = 1¼ RCour = 120 Skilling Danske amtlich fixiert; Marktkurs ~122½:100 war die Silberparität. Differenz hieß <em>Opgæld</em><br>
         · <i>ab 1794</i> (<b>Plakat 3. Dezember 1794</b>): Opgæld-Marktkurs abgeschafft; 1 RSp = 1¼ RCour = 5:4 einzig gültige Wechselrelation. RCour ~2 % unter Silberwert — Seigniorage-Gewinn der Krone<br>
         · <i>ab 1788:</i> 1 Thaler Species = 60 Schilling Schleswig-Holsteinisch Courant (S.-H.-Reform 1788)<br>
         · <i>ab 1813:</i> 1 Thaler Species = 2 Rigsbankdaler = 192 Rigsbankskilling (Forordning 5. Jan. 1813)<br><br>
        <em>Physische Teilstücke: ½, ⅓, ¼, ⅙, ⅛, 1/12, 1/16, 1/24, 1/48 Thaler Species</em>
      en: |-
        <b>1 Thaler Species</b> = <b>25.28173 g</b> fine = 3 Mark lübisch = 48 Schilling lübisch = 576 Pfennig (Hanseatic 1622–1775) · identical with: 1 Rigsdaler Species (Danish), 1 Reichsthaler Species (Hanseatic). The names are regional, the coin is one and the same.<br> <b>1 Mark lübisch</b> = <b>8.427 g</b> fine (<i>accounting unit</i>) = ⅓ Thaler Species = 16 Schilling lübisch = 192 Pfennig<br><br> <b>The Skilling Danske</b> (<b>0.21494 g</b> fine) is the practical sub-fraction of every accounting system. The convention «120 Skilling = 1 Rigsdaler Species» served as the official subdivision from the start of the Kurantmøntfod (1726). Its silver equivalent (120 × 0.21494 = 25.79 g) exceeds the real silver weight of the Species (25.28 g) by ~2 %; this gap appeared historically as <em>Opgæld</em> on the exchange market and was only abolished by the Placard of 3 December 1794.<br><br> <b>Hanseatic counting system (Wendish Mint Union, Hamburg/Lübeck), by period:</b><br> · <i>from 1572:</i> 1 Rtlr. = 2 Mark lübisch = 32 Schilling lübisch = 64 Sechslinge = 384 Pfennig<br> · <i>1622–1775:</i> 1 Rtlr. = 3 Mark lübisch = 4 Ort = 16 Düttchen = 48 Schilling lübisch = 96 Sechslinge = 192 Dreilinge = 576 Pfennig<br><br> <b>Schleswig-Holstein (Thaler-Species accounting):</b> followed the Hanseatic system · ½ Schilling = Sechsling · ¼ Schilling = Dreiling<br><br> <b>Species ↔ Courant rates:</b><br> · <i>1726–1794:</i> the convention 1 RSp = 1¼ RCour = 120 Skilling Danske was officially fixed; the market rate ~122½:100 reflected the true silver parity. The gap was called <em>Opgæld</em><br> · <i>from 1794</i> (<b>Placard of 3 Dec. 1794</b>): the Opgæld market rate was abolished; 1 RSp = 1¼ RCour = 5:4 became the sole legal exchange ratio. RCour now sat ~2 % below its silver value — a seigniorage gain for the Crown<br> · <i>from 1788:</i> 1 Thaler Species = 60 Schilling Schleswig-Holsteinisch Courant (S.-H. Reform 1788)<br> · <i>from 1813:</i> 1 Thaler Species = 2 Rigsbankdaler = 192 Rigsbankskilling (Forordning 5 Jan. 1813)<br><br> <em>Physical sub-units actually struck: ½, ⅓, ¼, ⅙, ⅛, 1/12, 1/16, 1/24, 1/48 Thaler Species</em>
      uk: |-
        <b>1 Thaler Species</b> = <b>25,28173 г</b> чистого = 3 Mark lübisch = 48 Schilling lübisch = 576 Pfennig (ганз. 1622–1775) · ідентичний з: 1 Rigsdaler Species (дан.), 1 Reichsthaler Species (ганз.). Назви регіональні — монета одна.<br> <b>1 Mark lübisch</b> = <b>8,427 г</b> чистого (<i>розрахункова одиниця</i>) = ⅓ Thaler Species = 16 Schilling lübisch = 192 Pfennig<br><br> <b>Skilling Danske</b> (<b>0,21494 г</b> чистого) — практична субодиниця всіх розрахункових систем. Конвенція «120 Skilling = 1 Rigsdaler Species» діє з початку Kurantmøntfod (1726) як офіційний поділ. Її срібний еквівалент (120 × 0,21494 = 25,79 г) перевищує справжню срібну вагу Species (25,28 г) на ~2 %; історично цю різницю позначали як <em>Opgæld</em> на валютному ринку — її скасував лише Plakat 3 грудня 1794 р.<br><br> <b>Ганзейська система рахунку (Wendischer Münzverein, Гамбург/Любек) за періодами:</b><br> · <i>з 1572:</i> 1 Rtlr. = 2 Mark lübisch = 32 Schilling lübisch = 64 Sechsling = 384 Pfennig<br> · <i>1622–1775:</i> 1 Rtlr. = 3 Mark lübisch = 4 Ort = 16 Düttchen = 48 Schilling lübisch = 96 Sechsling = 192 Dreiling = 576 Pfennig<br><br> <b>Шлезвіг-Гольштейн (рахунок у Thaler Species):</b> наслідував ганзейську систему · ½ Schilling = Sechsling · ¼ Schilling = Dreiling<br><br> <b>Курси Species ↔ Courant:</b><br> · <i>1726–1794:</i> конвенція 1 RSp = 1¼ RCour = 120 Skilling Danske була офіційно зафіксована; ринковий курс ~122½:100 відображав справжній срібний паритет. Різниця називалася <em>Opgæld</em><br> · <i>з 1794</i> (<b>Plakat 3 грудня 1794</b>): ринковий Opgæld-курс скасовано; 1 RSp = 1¼ RCour = 5:4 — єдине дійсне відношення. RCour опинився ~2 % нижче своєї срібної вартості — сеньйораж на користь Корони<br> · <i>з 1788:</i> 1 Thaler Species = 60 Schilling Schleswig-Holsteinisch Courant (Шлезв.-Гольшт. реформа 1788)<br> · <i>з 1813:</i> 1 Thaler Species = 2 Rigsbankdaler = 192 Rigsbankskilling (Forordning 5 січня 1813)<br><br> <em>Реально карбовані частки: ½, ⅓, ¼, ⅙, ⅛, 1/12, 1/16, 1/24, 1/48 Thaler Species</em>
  description:
    de: |
      9¼-Thalerfuß · Thaler-Species-Standard für Holstein, Hamburg, Lübeck,
      Schleswig. 233,856 g ÷ 9¼ = 25,28173 g Feinsilber je Thaler Species.
      Raugewicht 28,89341 g bei 875 ‰. Parallele zum Konventionsfuß
      (anders als 9-Fuß der Reichsreform 1566).
    en: |-
      9¼-Thaler-Fuß · Thaler Species for Holstein, Hamburg, Lübeck, Schleswig. 233.856 g ÷ 9.25 = 25.28173 g fine silver per Thaler Species. Rough weight 28.89341 g at 875‰. Parallel to the Convention Standard (distinct from 9-Thaler-Fuß of 1566 Imperial reform).
    uk: |-
      9¼-Thaler-Fuß · спецієсталер для Гольштейну, Гамбургу, Любеку, Шлезвігу. 233,856 г ÷ 9¼ = 25,28173 г чистого срібла на один талер. Повна вага 28,89341 г при 875‰. Паралельний до конвенційного стандарту.
  fractions:
    "1": {soll_fein_g: 25.28173}        # 1 Thaler Species
    "3/2": {soll_fein_g: 37.92260}      # 1½ Thaler Species (Sterbethaler etc.)
    "2/3": {soll_fein_g: 16.85449}      # ⅔ Thaler Species = 40 Sch.C.
    "1/3": {soll_fein_g: 8.42724}       # ⅓ Thaler Species = 20 Sch.C.
    "1/6": {soll_fein_g: 4.21362}       # ⅙ Thaler Species = 10 Sch.C. (or 8 Sch.Lüb.)
    "1/12": {soll_fein_g: 2.10681}      # 1/12 = 5 Sch.C. (or 4 Sch.Lüb.)
    "1/16": {soll_fein_g: 1.58011}      # 1/16 Thaler Species (= 3 Sch.Lüb.)
    "1/24": {soll_fein_g: 1.05341}      # 1/24 = 2½ Sch.C. or 1 Groschen (early)
    "1/32": {soll_fein_g: 0.79005}      # 1 Schilling (pre-Kipper, John Adolphus era)
    "1/48": {soll_fein_g: 0.52670}      # 1/48 = 1 Sch.Lüb. (post-Kipper)
    "1/60": {soll_fein_g: 0.42136}      # 1/60 = 1 Sch.C. (= 2 Sechsling)
    "1/64": {soll_fein_g: 0.39503}      # 1/64 = 6 Pfennig
    "1/96": {soll_fein_g: 0.26335}      # 1/96 = 4 Pfennig
    "1/128": {soll_fein_g: 0.19751}     # 1/128 = 3 Pfennig
    "1/2": {soll_fein_g: 12.64086}      # ½ Speciedaler
    "1/4": {soll_fein_g: 6.32043}       # ¼ Speciedaler
    "1/8": {soll_fein_g: 3.16022}       # ⅛ Speciedaler
    "1/15": {soll_fein_g: 1.68545}      # 1/15 Specie = 4 Schilling lübisch (Sonderburg-Mode)
    "1/30": {soll_fein_g: 0.84272}      # 1/30 Specie = 2 Schilling lübisch (Sonderburg-Mode)

