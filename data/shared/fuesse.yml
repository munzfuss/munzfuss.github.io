          uk: "<b>25,578 г</b> чистого (= 29,232 г повної × 87,5 % проби; 233,856 г ÷ 8 = 29,232 г повної на Sølvgylden) — Marken-fin <b>mf 9,143</b>"
      - key:
          de: "Verhältnis zum Vorgänger (Christian II Lovkompleks)"
          en: "Relation to predecessor (Christian II Lovkompleks)"
          uk: "Відношення до попередника (Christian II Lovkompleks)"
        value:
          de: "<b>Sølvgylden-Stückzahl von 8½/M auf 8/M gestrafft</b> — Frederik I erhöht das Per-Stück-Gewicht von 27,51 g auf 29,232 g rauh, hält dabei die <b>14-Lod (.875) Probe</b> unverändert. Per-Fein-Wert steigt von 24,07 g auf 25,578 g — eine ~6,3-%-Aufwertung. Hintergrund: Frederik Is Streben nach «<i>solidt og godt Møntvæsen</i>» (Wilcke 7-2 S. 184 verbatim) nach dem Chaos der Klipping-Zeit Christians II."
          en: "<b>Sølvgylden count tightened from 8½/M to 8/M</b> — Frederik I raises the per-piece weight from 27.51 g to 29.232 g rough while keeping the <b>14-Lod (.875) fineness</b> unchanged. Per-fine value rises from 24.07 g to 25.578 g — a ~6.3 % revaluation. Context: Frederik I's pursuit of «<i>solidt og godt Møntvæsen</i>» (Wilcke 7-2 p. 184 verbatim) after the chaos of Christian II's Klipping era."
          uk: "<b>Кількість Sølvgylden стиснута з 8½/M до 8/M</b> — Frederik I підвищує вагу на штуку з 27,51 г до 29,232 г повної, зберігаючи при цьому <b>пробу 14 Lod (.875)</b> незмінною. Чиста вага на штуку зростає з 24,07 г до 25,578 г — ~6,3-% переоцінка. Контекст: прагнення Frederik I до «<i>solidt og godt Møntvæsen</i>» (Wilcke 7-2 с. 184 verbatim) після хаосу Klipping-епохи Кристіана II."
      - key:
          de: "Sub-Mark-Tier (Mark Danske)"
          en: "Sub-Mark tier (Mark Danske)"
          uk: "Sub-Mark-tier (Mark Danske)"
        value:
          de: "<b>2 Mark Danske</b>: 11/M @ 14 Lod, 21,259 g rauh / 18,602 g fein (Tarif 2 Mark = ½ Sølvgylden) · <b>1 Mark (12 ß)</b>: 22/M, 10,629 g / 9,301 g · <b>½ Mark (6 ß)</b>: 44/M, 5,314 g / 4,650 g · <b>4 ß</b>: 78/M, 3,0 g / 2,625 g · alle bei 14-Lod Probe — Hauptkurant-Linie. Subdivision: 1 Sølvgylden = 2 Mark à 12 ß = 24 ß (Lybsk-aligned, NICHT 32-ß Christian-II-Tarif)<sup>[ref:wilcke-1950-renaissance-moent]</sup>"
          en: "<b>2 Mark Danske</b>: 11/M at 14 Lod, 21.259 g rough / 18.602 g fine (tariff 2 Mark = ½ Sølvgylden) · <b>1 Mark (12 ß)</b>: 22/M, 10.629 g / 9.301 g · <b>½ Mark (6 ß)</b>: 44/M, 5.314 g / 4.650 g · <b>4 ß</b>: 78/M, 3.0 g / 2.625 g · all at 14-Lod fineness — Hauptkurant line. Subdivision: 1 Sølvgylden = 2 Mark of 12 ß = 24 ß (Lybsk-aligned, NOT the 32-ß Christian II tariff)<sup>[ref:wilcke-1950-renaissance-moent]</sup>"
          uk: "<b>2 Mark Danske</b>: 11/M за 14 Lod, 21,259 г повної / 18,602 г чистого (тариф 2 Mark = ½ Sølvgylden) · <b>1 Mark (12 ß)</b>: 22/M, 10,629 г / 9,301 г · <b>½ Mark (6 ß)</b>: 44/M, 5,314 г / 4,650 г · <b>4 ß</b>: 78/M, 3,0 г / 2,625 г · усі за пробою 14 Lod — лінія Hauptkurant. Підструктура: 1 Sølvgylden = 2 Mark по 12 ß = 24 ß (Lybsk-aligned, НЕ 32-ß тариф Кристіана II)<sup>[ref:wilcke-1950-renaissance-moent]</sup>"
      - key:
          de: "Scheidemünz- + Klein-Tier"
          en: "Scheidemünze and small-change tier"
          uk: "Scheidemünze + дрібний tier"
        value:
          de: "<b>4-Hvid ß</b>: 96/M @ 5 Lod 2 Grän (.319), 2,438 g rauh / 0,778 g fein · <b>Hvid</b>: 300/M @ 4 Lod (.250), 0,779 g rauh / 0,195 g fein · <b>14 % («14 Penning-Stück»)</b>: separate Akt 26. Februar 1524 (Wilcke 7-2 S. 187 «<i>14 %</i>»-Eintrag), ≈ 3 Lod 6 Grän (.20) — Frederik Is Klipping-Indfrielse-Mønt: Christian IIs Klippinge wurden gegen 14-Penning-Stücke umgetauscht (Wilcke 7-2 S. 192-193). Numista-Belege: 14 Penny / 14 Penning aus Kopenhagen 1524 (Frederik I)."
          en: "<b>4-Hvid ß</b>: 96/M at 5 Lod 2 grän (.319), 2.438 g rough / 0.778 g fine · <b>Hvid</b>: 300/M at 4 Lod (.250), 0.779 g rough / 0.195 g fine · <b>14 % («14 Penning piece»)</b>: separate act of 26 February 1524 (Wilcke 7-2 p. 187 «<i>14 %</i>» entry), ≈ 3 Lod 6 grän (.20) — Frederik I's Klipping redemption coin: Christian II's Klippinge were exchanged for 14-Penning pieces (Wilcke 7-2 pp. 192-193). Numista records: 14 Penny / 14 Penning from Copenhagen 1524 (Frederik I)."
          uk: "<b>4-Hvid ß</b>: 96/M за 5 Lod 2 grän (.319), 2,438 г повної / 0,778 г чистого · <b>Hvid</b>: 300/M за 4 Lod (.250), 0,779 г повної / 0,195 г чистого · <b>14 % («14 Penning-штука»)</b>: окремий акт 26 лютого 1524 (Wilcke 7-2 с. 187 «<i>14 %</i>»-запис), ≈ 3 Lod 6 grän (.20) — Klipping-обмінна монета Frederik I: Klippinge Кристіана II обмінювали на 14-Penning штуки (Wilcke 7-2 с. 192-193). Numista засвідчує: 14 Penny / 14 Penning з Копенгагена 1524 (Frederik I)."
    rechnungsfraktionen_label:
      de: "Rechnungsfraktionen (Sølvgylden-Mark-Skilling-Hvid, 12-ß-Mark)"
      en: "Accounting fractions (Sølvgylden-Mark-Skilling-Hvid, 12-ß-Mark)"
      uk: "Розрахункові фракції (Sølvgylden-Mark-Skilling-Hvid, 12-ß-Mark)"
    rechnungsfraktionen:
      de: |
        <b>1 Sølvgylden</b> = 29,232 g rauh / <b>25,578 g fein</b> @ 14 Lod (Wilcke 1950 Kap. 7-2 S. 187)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br>
        <b>1 Sølvgylden</b> = <b>2 Mark Danske</b> = <b>24 ß</b> = 72 Hvid (Wilcke 7-2 S. 192-193 Lybsk-aligned subdivision)<br>
        <b>1 Mark</b> (12 ß) = <b>9,301 g</b> fein · <b>½ Mark</b> (6 ß) = 4,650 g · <b>4 ß</b> = 2,625 g · <b>4-Hvid ß</b> (Scheide) = 0,778 g fein<br>
        <em>Frederik I's Lybsk-aligned 12-ß-Mark (24 ß = 1 Sølvgylden) ist ein Übergang in Richtung Hansestädernes Münzgewohnheit — Wilcke 7-2 S. 193 verbatim «<i>Mynten ville udgøre eens og liig ved vores Mynt (o: Hertugdømmets) og udi de Vendiske Stæder</i>» — aber die Fein-Probe bleibt 14 Lod, NICHT die Lybsk-Standard 14½ Lod. Reine Reckoning-Annäherung; volle metrische Konvergenz mit Schleswig-Holstein-Lybsk erst 1547 (Flensborg Bestalling).</em>
      en: |-
        <b>1 Sølvgylden</b> = 29.232 g rough / <b>25.578 g fine</b> at 14 Lod (Wilcke 1950 Kap. 7-2 p. 187)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br><b>1 Sølvgylden</b> = <b>2 Mark Danske</b> = <b>24 ß</b> = 72 Hvid (Wilcke 7-2 pp. 192-193 Lybsk-aligned subdivision)<br><b>1 Mark</b> (12 ß) = <b>9.301 g</b> fine · <b>½ Mark</b> (6 ß) = 4.650 g · <b>4 ß</b> = 2.625 g · <b>4-Hvid ß</b> (Scheide) = 0.778 g fine<br><em>Frederik I's Lybsk-aligned 12-ß-Mark (24 ß = 1 Sølvgylden) is a step toward Hansestädernes coinage habits — Wilcke 7-2 p. 193 verbatim «<i>Mynten ville udgøre eens og liig ved vores Mynt (o: Hertugdømmets) og udi de Vendiske Stæder</i>» — but the fineness stays at 14 Lod, NOT the Lybsk standard 14½ Lod. Pure reckoning convergence; full metric convergence with Schleswig-Holstein-Lybsk only in 1547 (Flensborg Bestalling).</em>
      uk: |-
        <b>1 Sølvgylden</b> = 29,232 г повної / <b>25,578 г чистого</b> за 14 Lod (Wilcke 1950 Kap. 7-2 с. 187)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br><b>1 Sølvgylden</b> = <b>2 Mark Danske</b> = <b>24 ß</b> = 72 Hvid (Wilcke 7-2 с. 192-193 Lybsk-aligned-підструктура)<br><b>1 Mark</b> (12 ß) = <b>9,301 г</b> чистого · <b>½ Mark</b> (6 ß) = 4,650 г · <b>4 ß</b> = 2,625 г · <b>4-Hvid ß</b> (Scheide) = 0,778 г чистого<br><em>Lybsk-aligned 12-ß-Mark Frederik I (24 ß = 1 Sølvgylden) — крок до монетних звичаїв Hansestäder — Wilcke 7-2 с. 193 verbatim «<i>Mynten ville udgøre eens og liig ved vores Mynt (o: Hertugdømmets) og udi de Vendiske Stæder</i>» — але проба залишається 14 Lod, НЕ Lybsk-стандарт 14½ Lod. Виключно reckoning-зближення; повна метрична конвергенція з Schleswig-Holstein-Lybsk лише 1547 р. (Flensborg Bestalling).</em>
  description:
    de: '<b>Frederik Is Müntzfuß-Norm nach der Absetzung Christians II.</b>, etabliert durch die <b>Møntordning vom 25. Februar 1524</b> (København, Wilcke 1950 Kap. 7-2 S. 184-187)<sup>[ref:denmark-ref29-no-url]</sup>. Königliche Verordnung verbatim: «<i>Vi Fr. ... at slaa, i Guld: Nobler (den vegne Mark skal holde 23½ Karat og skraade 16 Stkr.), Rinske Gylden (18 Karat, 72 Stkr.) ...</i>» — und auf der Silber-Seite: <b>acht Sølvgylden</b> aus der Cölln. Marck rauh bei <b>14 Lod (.875)</b>, 29,232 g rauh / 25,578 g fein je Stück, Marken-fin <b>mf 9,143</b>. Gegenüber Christian IIs Lovkompleks 1514 wird die Sølvgylden-Stückzahl von 8½/M auf 8/M gestrafft — Frederik I erhöht das Per-Stück-Gewicht um 6,3 % bei unveränderter 14-Lod-Probe. Innovation: <b>Lybsk-aligned 24-ß-Mark-Subdivision</b> (vs Christian-IIs 32-ß-Tarif) — Wilcke 7-2 S. 193 verbatim «<i>Mynten ville udgøre eens og liig ved vores Mynt (o: Hertugdømmets) og udi de Vendiske Stæder</i>». Vollständiger Sub-Mark-Apparat: 2 Mark Danske / 1 Mark / ½ Mark / 4 ß / 4-Hvid ß / Hvid. Separater Akt 26. Februar 1524 etabliert das <b>14-Penning-Stück</b> («14 %») als Klipping-Indfrielse-Mønt — Christian-IIs Klippinge werden gegen 14-Penning-Stücke umgetauscht. Hauptphase 1524-1531; finale Konsolidierung 1532 (Galster 47-52 Sølvgylden-Serie). Standard endet mit Frederik Is Tod 10. April 1533; der Christian-III-Interregnum 1534-1540 läuft unter [fuss:8_daler_fod] Phase 0, de jure konsolidiert durch Christian IIIs Møntordning von 1541 (14½ Lod, 8 Daler/M).'
    en: '<b>Frederik I''s Müntzfuß norm after the deposition of Christian II</b>, established by the <b>Møntordning of 25 February 1524</b> (Copenhagen, Wilcke 1950 Kap. 7-2 pp. 184-187)<sup>[ref:denmark-ref29-no-url]</sup>. Royal decree verbatim: «<i>Vi Fr. ... at slaa, i Guld: Nobler (den vegne Mark skal holde 23½ Karat og skraade 16 Stkr.), Rinske Gylden (18 Karat, 72 Stkr.) ...</i>» — and on the silver side: <b>eight Sølvgylden</b> per Cologne mark rough at <b>14 Lod (.875)</b>, 29.232 g rough / 25.578 g fine per piece, Marken-fin <b>mf 9.143</b>. Compared with Christian II''s Lovkompleks of 1514, the Sølvgylden count is tightened from 8½/M to 8/M — Frederik I raises the per-piece weight by 6.3 % at unchanged 14-Lod fineness. Innovation: <b>Lybsk-aligned 24-ß Mark subdivision</b> (vs Christian II''s 32-ß tariff) — Wilcke 7-2 p. 193 verbatim «<i>Mynten ville udgøre eens og liig ved vores Mynt (o: Hertugdømmets) og udi de Vendiske Stæder</i>». Full sub-Mark apparatus: 2 Mark Danske / 1 Mark / ½ Mark / 4 ß / 4-Hvid ß / Hvid. Separate act of 26 February 1524 establishes the <b>14-Penning piece</b> («14 %») as Klipping redemption coin — Christian II''s Klippinge are exchanged for 14-Penning pieces. Main phase 1524-1531; final consolidation 1532 (Galster 47-52 Sølvgylden series). Standard ends with Frederik I''s death 10 April 1533; the Christian III interregnum 1534-1540 runs under [fuss:8_daler_fod] Phase 0, consolidated de jure by Christian III''s Møntordning of 1541 (14½ Lod, 8 Daler/M).'
    uk: '<b>Müntzfuß-норма Frederik I після скинення Кристіана II</b>, запроваджена <b>Møntordning від 25 лютого 1524</b> (Копенгаген, Wilcke 1950 Kap. 7-2 с. 184-187)<sup>[ref:denmark-ref29-no-url]</sup>. Королівський декрет verbatim: «<i>Vi Fr. ... at slaa, i Guld: Nobler (den vegne Mark skal holde 23½ Karat og skraade 16 Stkr.), Rinske Gylden (18 Karat, 72 Stkr.) ...</i>» — а на срібному боці: <b>вісім Sølvgylden</b> з повної кельнської марки за <b>14 Lod (.875)</b>, 29,232 г повної / 25,578 г чистого на штуку, Marken-fin <b>mf 9,143</b>. Порівняно з Lovkompleks Кристіана II 1514, кількість Sølvgylden стиснута з 8½/M до 8/M — Frederik I підвищує вагу на штуку на 6,3 % за незмінної 14-Lod проби. Інновація: <b>Lybsk-aligned 24-ß Mark-підструктура</b> (vs тариф Кристіана II 32 ß) — Wilcke 7-2 с. 193 verbatim «<i>Mynten ville udgøre eens og liig ved vores Mynt (o: Hertugdømmets) og udi de Vendiske Stæder</i>». Повний sub-Mark-апарат: 2 Mark Danske / 1 Mark / ½ Mark / 4 ß / 4-Hvid ß / Hvid. Окремий акт 26 лютого 1524 встановлює <b>14-Penning-штуку</b> («14 %») як Klipping-обмінну монету — Klippinge Кристіана II обмінюються на 14-Penning штуки. Головна фаза 1524-1531; фінальна консолідація 1532 (серія Galster 47-52 Sølvgylden). Стандарт завершується смертю Frederik I 10 квітня 1533; інтеррегнум Кристіана III 1534-1540 проходить під [fuss:8_daler_fod] Phase 0, де-юре консолідований Møntordning Кристіана III 1541 р. (14½ Lod, 8 Daler/M).'
