  events:
    first_adoption:
      anywhere: 1618
      holstein: 1618
      note: 'Christian IV''s kroner — Copenhagen-mint Müntzformel (.859 / 16.250 g fine). Royal Danish Tarifmünze decree applied throughout Christian IV''s realm including royal Holstein, but no Holstein mint participated in striking; coins reached Holstein via royal-Danish currency flow. Primary attestation: Wilcke II (1924) note 53 verbatim: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden, ligesom ogsaa i de to Forørdninger af 4. Juli 1616 og 1. Maj 1618 om Dalerens Forhøjelse til 80 og 84 ß d., henvises til, at Markerne saa let eftergjordes af fremmede og Udlendiske…</i>» — the «åbent Brev af 12. Juli 1618» is the formal patent that brought the Krone to the public; cross-reference to Wilcke I (1919) pp. 156-157 for archival context (NOT p. 152, which Hede 1957 cites for the deviating Müntzfod of the 1618 small denominations). Terminology: in the 1618 patent the coin is described as «1½-Specie / ¾-Specie (Krone / ½-Krone)», not yet as «Corona Danica» — the Latinised name is later numismatic usage. Wikipedia DE «Corona Danica» summary: «<i>Im Jahr 1618 führte Christian IV. die Corona Danica ein</i>».'
    first_mint:
      anywhere: 1618
      holstein:
    last_mint:
      anywhere: 1652
      holstein:
      note: 'anywhere last-mint 1652 = Hede 1957 «Kronemønten 1618-1771» dates the Christian-IV-Müntzformel «<i>1618-1652</i>» — covers Christian IV personnel mintage 1618-1624/25 plus Frederik III continuation 1651-1652 at the same .859/16.250 g fine formula before the transition to the new 10½-Krone-Fuß (.672/14.964 g fine) from 1652 onward. Wikipedia DE «Corona Danica» confirms: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Aagaard 2004 «Frederik III Kronemønt København 1651-1670» supplies the finest typology of the 1651-1652 transition. Was previously set to 1624 (Christian IV personnel mintage only), which captured the Wikipedia DE «<i>nur bis 1624, teilweise bis 1625</i>» phrasing but conflated «who minted» with «which formula was in use» — Hede''s authoritative grouping is by Müntzformel, hence 1652. Special issues outside this dating: 1665 Schou 39/40 «Pumphosenkrone» / «Pumpbucksen Thaler» under Frederik III with higher fineness for a more attractive strike; 1675 2-Krone Schou 11-15 under Christian V with Reskript 11. März 1675 about the mint gain — both treated by Hede as «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>», not formula continuations.'
    std_end:
      anywhere: 1652
      holstein: 1652
