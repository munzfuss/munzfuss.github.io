    aside:
      de: "Das schwerste Goldstück seiner Zeit, mit rund dem vierfachen Gewicht der zeitgleichen Goldgulden: der Rhinsk Gylden ([fuss:rhinsk_gylden_fod], ~3,25 g) und der Ungersk Gylden ([fuss:reichsdukatenfuss], ~3,49 g). In der Feinheit (.979) liegt der Nobel zwischen beiden: über dem Rhinsk Gylden (.770), aber unter dem Ungersk Gylden (.986). <b>Nicht</b> Vorgänger des [fuss:reichsdukatenfuss] (der Dukat bleibt im Goldgulden-Gewichtsband, nicht im Nobel-Band) und <b>nicht</b> verwandt mit der späteren [fuss:rosenobel_fod]-Linie Christians IV. (1611-1629, separate Probe .833, Tarif-Logik der Kalmar-Krieges-Finanzierung)."
      en: "The heaviest gold piece of its time, about four times the weight of the contemporary Goldgulden: the Rhinsk Gylden ([fuss:rhinsk_gylden_fod], ~3.25 g) and the Ungersk Gylden ([fuss:reichsdukatenfuss], ~3.49 g). In fineness (.979) the Nobel sits between the two: above the Rhinsk Gylden (.770) but below the Ungersk Gylden (.986). <b>Not</b> a predecessor of [fuss:reichsdukatenfuss] (the Dukat stays in the Goldgulden weight band, not the Nobel's) and <b>not</b> related to the later Christian IV [fuss:rosenobel_fod] line (1611-1629, separate fineness .833, the tariff logic of Kalmar-War financing)."
      uk: "Найважча золота монета свого часу, приблизно вчетверо більша вага за тогочасні Goldgulden: Rhinsk Gylden ([fuss:rhinsk_gylden_fod], ~3,25 г) і Ungersk Gylden ([fuss:reichsdukatenfuss], ~3,49 г). За пробою (.979) Nobel лежить між обома: вищий за Rhinsk Gylden (.770), але нижчий за Ungersk Gylden (.986). <b>Не</b> попередник [fuss:reichsdukatenfuss] (Dukat лишається у ваговому діапазоні Goldgulden, а не Nobel) і <b>не</b> пов'язана з пізнішою лінією Christian IV [fuss:rosenobel_fod] (1611-1629, окрема проба .833, тарифна логіка фінансування Кальмарської війни)."
  description:
    de: |-
      <b>Dänisch-norwegischer Goldstandard 1496–1532.</b> König Hans prägt 1496 in Malmø und Kopenhagen den ersten dänischen Nobel<sup>[ref:danskmoent-1nobel]</sup> — die erste datierte Goldmünze Dänemarks<sup>[ref:stacksbowers-bruun-1496-nobel]</sup>. Vorbild ist nach Galster nicht der englische Nobel, sondern der holländische «groote gouden reaal» von 1487, dem das dänische Stück in Gepräge und Gewicht folgt, wenn auch bei etwas geringerer Feinheit<sup>[ref:galster-unionstidens-nobel]</sup>. Es handelt sich um Prachtmünzen — kein Umlauf-, sondern Repräsentations- und Soldgold, geschlagen im Zusammenhang mit der Rüstung gegen Schweden und deutlich schwerer als die zeitgleichen Goldgulden — der Rhinsk Gylden ([fuss:rhinsk_gylden_fod]) und der Ungersk Gylden ([fuss:reichsdukatenfuss])<sup>[ref:galster-unionstidens-nobel]</sup>. Seine maßgebliche Spezifikation — 16 Stück aus der Cöllnischen Marck zu 23½ Karat — erhält der Nobel de jure in der Christian-II-Møntordning vom Sommer 1514 zu Malmø, die das seit 1496 de facto geprägte schwere Goldstück normiert<sup>[ref:wilcke-1950-nobel-ordinance]</sup>; die Probe der vor 1514 geschlagenen Hans-Nobler ist unabhängig nicht belegt. Die niedrigere Probe der Frederik-I-Ordnung von 1524 ist an keinem erhaltenen Stück belegt — die datierten 1532-Nobler tragen dieselbe höhere Feinheit wie die Vorgabe von 1514, und eine einheitliche Nobel-Probe geben die Quellen insgesamt nicht her<sup>[ref:danskmoent-nobel-finhed-f1g45]</sup>. Über drei Regenten hinweg bleibt die Linie eine Reihe seltener Einzelprägungen — Hans 1496 und 1502, Christian II. 1516 und 1518, Frederik I. 1532 —, geschlagen zu Malmø und Kopenhagen — für die Hans- und Frederik-I-Jahrgänge läßt Galster die Münzstätte zwischen beiden offen — sowie, undatiert, zu Ribe<sup>[ref:danskmoent-1nobel]</sup>. Mit dem Tod Frederiks I. 1533 endet die Karbung; Christian III. (1534–1559) führt die schwere Nobel-Linie nicht fort; sein Goldgeld bleibt bei den leichteren Goldgulden — Rhinsk Gylden und Ungersk Gylden<sup>[ref:danskmoent-1nobel]</sup>.
    en: |-
      <b>Danish-Norwegian gold standard 1496–1532.</b> King Hans strikes the first Danish Nobel at Malmø and Copenhagen in 1496<sup>[ref:danskmoent-1nobel]</sup> — the first dated gold coin of Denmark<sup>[ref:stacksbowers-bruun-1496-nobel]</sup>. Per Galster the model is not the English Noble but the Dutch «groote gouden reaal» of 1487, which the Danish piece follows in design and weight, though at a slightly lower fineness<sup>[ref:galster-unionstidens-nobel]</sup>. These are prestige coins — not circulation money but display and military-pay gold, struck in connection with the armament against Sweden and markedly heavier than the contemporary Goldgulden — the Rhinsk Gylden ([fuss:rhinsk_gylden_fod]) and the Ungersk Gylden ([fuss:reichsdukatenfuss])<sup>[ref:galster-unionstidens-nobel]</sup>. The Nobel receives its governing specification — 16 pieces from the Cologne mark at 23½ carats — de jure in the Christian II Møntordning of Summer 1514 at Malmø, which codifies the heavy gold piece struck de facto since 1496<sup>[ref:wilcke-1950-nobel-ordinance]</sup>; the fineness of the pre-1514 Hans Nobler is not independently attested. The lower fineness of the Frederik I ordinance of 1524 is borne out by no surviving piece — the dated 1532 Nobler carry the same higher fineness as the 1514 specification, and the sources give no single Nobel fineness overall<sup>[ref:danskmoent-nobel-finhed-f1g45]</sup>. Across three rulers the line stays a series of rare individual issues — Hans 1496 and 1502, Christian II 1516 and 1518, Frederik I 1532 — struck at Malmø and Copenhagen — for the Hans and Frederik I issues Galster leaves the mint undecided between the two — and, undated, at Ribe<sup>[ref:danskmoent-1nobel]</sup>. With the death of Frederik I in 1533 the coinage ends; Christian III (1534–1559) does not continue the heavy Nobel line; his gold coinage stays with the lighter Goldgulden — Rhinsk Gylden and Ungersk Gylden<sup>[ref:danskmoent-1nobel]</sup>.
    uk: |-
      <b>Дансько-норвезький золотий стандарт 1496–1532.</b> Король Hans 1496 р. карбує перший данський Nobel у Malmø і Копенгагені<sup>[ref:danskmoent-1nobel]</sup> — першу датовану золоту монету Данії<sup>[ref:stacksbowers-bruun-1496-nobel]</sup>. За Galster прообразом є не англійський Noble, а голландський «groote gouden reaal» 1487 р., якому данська монета слідує у гравіруванні й вазі, хоч і за дещо нижчої проби<sup>[ref:galster-unionstidens-nobel]</sup>. Це престижні монети — не для звичайного обігу, а репрезентативне й платіжне золото, карбоване у звʼязку з озброєнням проти Швеції й помітно важче за тогочасні Goldgulden — Rhinsk Gylden ([fuss:rhinsk_gylden_fod]) і Ungersk Gylden ([fuss:reichsdukatenfuss])<sup>[ref:galster-unionstidens-nobel]</sup>. Свою визначальну специфікацію — 16 штук з кельнської марки за 23½ карати — Nobel дістає de jure в Møntordning Christian II літа 1514 р. у Malmø, що кодифікує важке золоте карбування, наявне de facto від 1496 р.<sup>[ref:wilcke-1950-nobel-ordinance]</sup>; проба до-1514 нобелів Hans незалежно не засвідчена. Нижча проба Ordnung Frederik I 1524 р. не засвідчена на жодному збереженому примірнику — датовані 1532-нобелі мають ту саму вищу пробу, що й специфікація 1514, а єдиної проби Nobel джерела загалом не дають<sup>[ref:danskmoent-nobel-finhed-f1g45]</sup>. Через трьох правителів лінія лишається низкою рідкісних поодиноких випусків — Hans 1496 і 1502, Christian II 1516 і 1518, Frederik I 1532 —, карбованих у Malmø і Копенгагені — для випусків Hans і Frederik I двір за Galster лишається невизначеним між обома — та, недатовано, у Ribe<sup>[ref:danskmoent-1nobel]</sup>. Зі смертю Frederik I 1533 р. карбування припиняється; Christian III (1534–1559) важку лінію Nobel не продовжує; його золоте карбування лишається при легших Goldgulden — Rhinsk Gylden і Ungersk Gylden<sup>[ref:danskmoent-1nobel]</sup>.
