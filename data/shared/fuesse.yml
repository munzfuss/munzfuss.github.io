          en: "Six treaty states 1857–1871: Hanover (784,296 pieces), Austria (498,657), Prussia (278,491), Saxony (56,739), Brunswick (45,298), Bavaria (3,867); Liechtenstein a treaty party, no own issue<sup>[ref:wikipedia-de-krone-vereinsgoldmuenze]</sup>"
