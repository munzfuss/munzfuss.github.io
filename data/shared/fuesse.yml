  grid_unit_convention: rauh
  fineness_standard: 0.934              # Hede-belegt für f2h2 (1563) + f2h5 (1564); modernes generisches «Kroneguld» = 22 Karat (.9167), Frederik-II-Spezial-Emission liegt 1,9 % über dem generischen Standard
  fineness_period: 'Kroneguld (934‰ per Hede f2h2+f2h5)'
