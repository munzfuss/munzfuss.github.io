          uk: "Субномінали (Scheide-tier)"
        value:
          de: "<b>1 Skilling</b> @ 5¾ Lod (≈ 359 ‰): 96 Stk./Cölln. Marck = 2,436 g rauh / 0,875 g fein, period-Tarif 32 Skilling = 1 Sølvgylden · <b>1 Hvid (Alb.)</b> @ 4½ Lod (≈ 281 ‰): 222 Stk./Cölln. Marck = 1,053 g rauh / 0,296 g fein, period-Tarif 96 Hvid = 1 Rhinsk Gylden Gold (gold-Tarif-Anker) · 3 Hvid = 1 Skilling"
          en: "<b>1 Skilling</b> at 5¾ Lod (≈ 359 ‰): 96 pieces/Cologne mark = 2.436 g rough / 0.875 g fine, period tariff 32 Skilling = 1 Sølvgylden · <b>1 Hvid (Alb.)</b> at 4½ Lod (≈ 281 ‰): 222 pieces/Cologne mark = 1.053 g rough / 0.296 g fine, period tariff 96 Hvid = 1 Rhinsk Gulden gold (gold-tariff anchor) · 3 Hvid = 1 Skilling"
          uk: "<b>1 Skilling</b> за 5¾ Lod (≈ 359 ‰): 96 шт./кельнська марка = 2,436 г повної / 0,875 г чистого, period-тариф 32 Skilling = 1 Sølvgylden · <b>1 Hvid (Alb.)</b> за 4½ Lod (≈ 281 ‰): 222 шт./кельнська марка = 1,053 г повної / 0,296 г чистого, period-тариф 96 Hvid = 1 Rhinsk Gylden золотий (золотий-тариф-анкер) · 3 Hvid = 1 Skilling"
      - key:
          de: "Klipping-Debasierung 1518-1522 (Phase A2)"
          en: "Klipping debasement 1518-1522 (Phase A2)"
          uk: "Klipping-девальвація 1518-1522 (фаза A2)"
        value:
          de: "1518 Klipping-Ordnung führt radikal abgesenkte Wertmarken ein — Wilcke 7-2 S. 157 charakterisiert die Klippinge als «<i>ydel Kobber</i>» (im Wesen Kupfer). 18-Penning- und 1-Skilling-Klippinge (Galster S. 26-27 + S. 29-31) tragen kleine Bruchteile der Lovkompleks-1514-Norm; Karbung im Vorfeld der Christian-II.-Absetzung 1523."
          en: "The 1518 Klipping ordinance introduces radically devalued token issues — Wilcke 7-2 p. 157 characterises the Klippinge as «<i>ydel Kobber</i>» (essentially copper). The 18-Penning and 1-Skilling Klippinge (Galster S. 26-27 and S. 29-31) carry small fractions of the Lovkompleks-1514 norm; struck in the run-up to Christian II's deposition 1523."
          uk: "Klipping-ордонанс 1518 запроваджує радикально девальвовані token-випуски — Wilcke 7-2 с. 157 характеризує Klippinge як «<i>ydel Kobber</i>» (по суті мідь). 18-Penning та 1-Skilling Klippinge (Galster S. 26-27 та S. 29-31) несуть малі частки норми Lovkompleks-1514; карбування напередодні скинення Christian II 1523 р."
      - key:
          de: "1523 Final-Konsolidierung (Phase A3)"
          en: "1523 final consolidation (Phase A3)"
          uk: "Фінальна консолідація 1523 (фаза A3)"
        value:
