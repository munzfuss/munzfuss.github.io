      en: "Coinage Act of 4 December 1871 · 1 Zollpfund (500 g) of fine gold = 139½ ten-Mark pieces = 1,395 Mark · 900 ‰ fineness · the common gold standard of the German Empire"
      uk: "Закон про монету від 4 грудня 1871 р. · 1 цольфунт (500 г) чистого золота = 139½ десятимаркових монет = 1395 марок · проба 900 ‰ · спільний золотий стандарт Німецької імперії"
