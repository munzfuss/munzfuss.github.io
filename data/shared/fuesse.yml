          de: "<b>14 Lod = 14 ÷ 16 = 875 ‰</b> — Wendisch-Lübisch-Tradition mit ½-Lod Abstand vom späteren Christian-III-Standard (14½ Lod 1541). Hauptkurant-Tier; subsidiäre Skillinger und Hvide sind dramatisch tiefer (5¾ Lod / 4½ Lod) — Scheidemünz-Logik."
