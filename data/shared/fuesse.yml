        value:
          de: "<b>≈ 15,628 Krone je Marck Feinsilber</b> (= 10½ × ⁶⁴⁄₄₃) · <em>kein einfacher kanonischer Bruch — der 10½-Krone-Fuß wurde nach Raugewicht festgelegt, nicht nach Feinsilber-Stückzahl</em> · zum Vergleich: Thaler Species 9¼-Fuß, Reichsthaler 9-Fuß, Kurantdaler 11⅓-Fuß"
          en: "<b>≈ 15.628 Krone per Mark of fine silver</b> (= 10½ × ⁶⁴⁄₄₃) · <em>not a clean canonical fraction — the 10½-Krone-Fuß was specified by rough weight, not by fine-silver piece count</em> · for comparison: Thaler Species 9¼-Fuß, Reichsthaler 9-Fuß, Kurantdaler 11⅓-Fuß"
          uk: "<b>≈ 15,628 Krone з марки чистого срібла</b> (= 10½ × ⁶⁴⁄₄₃) · <em>це не «красивий» канонічний дріб — 10½-Krone-Fuß задавався за повною вагою, а не за кількістю штук на чисте срібло</em> · для порівняння: Thaler Species 9¼-Fuß, Reichsthaler 9-Fuß, Kurantdaler 11⅓-Fuß"
      - key:
          de: "Tarifhistorie und Specie-Äquivalent (königliche Verordnung)"
          en: "Tariff history and Specie equivalent (royal decree)"
          uk: "Історія тарифу та Specie-еквівалент (королівський декрет)"
        value:
          de: "<b>1670</b> (Chr. V., auf Münze «2 MARCK» = ⅔ Specie explizit): 1 Krone = <b>⅔ Specie</b> → 15,628 × ⅔ ≈ <b>10,42 Specie-Nominale je Marck Feinsilber</b> (Hauptbestand des Katalogs — stabilisierte Endphase der Krone-Mønt)<br>· Vorgängerformel <i>Christian IVs kroner</i> (1618–1652) hatte höheren Feingehalt und höheren Tarif (1½ Specie/Krone), siehe oben.<br><em>Specie-Nominale ≠ Stück-pro-Marck-Münzfuß — die Specie-Skala bemißt nominellen Tarifwert, nicht Münzfuß.</em>"
          en: "<b>1670</b> (Christian V, with «2 MARCK» = ⅔ Specie explicit on the coin): 1 Krone = <b>⅔ Specie</b> → 15.628 × ⅔ ≈ <b>10.42 Specie nominals per Mark of fine silver</b> (bulk of the catalogue — stabilised final phase of the Krone-Mønt)<br>· The predecessor formula <i>Christian IV's kroner</i> (1618–1652) had higher fineness and a higher tariff (1½ Specie/Krone), see above.<br><em>Specie nominals ≠ coins-per-Mark standard — the Specie scale measures nominal tariff value, not Münzfuß.</em>"
          uk: "<b>1670</b> (Кристіан V, на монеті явно «2 MARCK» = ⅔ Specie): 1 Krone = <b>⅔ Specie</b> → 15,628 × ⅔ ≈ <b>10,42 Specie-номіналів з марки чистого срібла</b> (основна частина каталогу — стабілізована фінальна фаза Krone-Mønt)<br>· Попередня формула <i>Christian IV's kroner</i> (1618–1652) мала вищу пробу і вищий тариф (1½ Specie/Krone), див. вище.<br><em>Specie-номінали ≠ «монет з марки» — Specie-шкала вимірює номінальну вартість за тарифом, а не Münzfuß.</em>"
    rechnungsfraktionen_label:
      de: Rechnungsfraktionen (Krone-Tarif-Theilung)
      en: Accounting fractions (Krone-tariff subdivision)
      uk: Розрахункові фракції (поділ за Krone-тарифом)
    rechnungsfraktionen:
      de: <b>1 Krone</b> = <b>4 Marck Danske</b> = <b>14,964 g</b> Feinsilber = <b>⅔ Speciedaler</b> (Tarif Christian V., 1670+) — 22,272 g rau bei .672 Feingehalt<br><b>½ Krone</b> = <b>2 Marck Danske</b> = <b>7,482 g</b> fein = <b>⅓ Speciedaler</b> · 11,136 g rau (KM# 65, 80.1, 80.2, 377, 406.3)<br><b>¼ Krone</b> = <b>1 Marck Danske</b> = <b>3,741 g</b> fein = <b>⅙ Speciedaler</b> · 5,568 g rau (KM# 342, 350, 381 — Kopenhagener Prägungen Christian V.)<br><br><em><b>Marck Danske</b> ist die Rechnungsfraktion der Krone in diesem Müntzfuß — nicht zu verwechseln mit <b>Mark lübisch</b> (1/3 Reichsthaler im 9-Fuß), <b>Mark Sch.-H. Courant</b> (1/3 Thaler Species ab 1788) oder dem späteren <b>Rigsbankdaler</b> (1813+). Die hier verwendete Marck Danske gehört speziell zur dänischen Kronemønt-Tarifsystemik 1644–1696.</em><br><br><em>Die ältere Krone-Münzformel <i>Christian IVs kroner</i> 1618–1652 (siehe oben) übernimmt denselben Krone-Begriff, aber mit höherem Feingehalt (.859 statt .672) und höherem Tarif (1½ → 1⅓ Specie statt ⅔). Eine spätere dritte Formel — der <b>13-Krone-Fuß</b> («<i>Feine Krone</i>») 1693–1771 — folgt unten.</em>
      en: <b>1 Krone</b> = <b>4 Marck Danske</b> = <b>14.964 g</b> fine silver = <b>⅔ Speciedaler</b> (Christian V tariff, 1670+) — 22.272 g rough at .672 fineness<br><b>½ Krone</b> = <b>2 Marck Danske</b> = <b>7.482 g</b> fine = <b>⅓ Speciedaler</b> · 11.136 g rough (KM# 65, 80.1, 80.2, 377, 406.3)<br><b>¼ Krone</b> = <b>1 Marck Danske</b> = <b>3.741 g</b> fine = <b>⅙ Speciedaler</b> · 5.568 g rough (KM# 342, 350, 381 — Copenhagen Christian V issues)<br><br><em><b>Marck Danske</b> is the accounting fraction of the Krone in this standard — not to be confused with <b>Mark lübisch</b> (1/3 Reichsthaler in the 9-Fuß), <b>Mark Sch.-H. Courant</b> (1/3 Thaler Species from 1788) or the later <b>Rigsbankdaler</b> (1813+). The Marck Danske used here belongs specifically to the Danish Kronemønt tariff system 1644–1696.</em><br><br><em>The earlier Krone formula <i>Christian IV's kroner</i> 1618–1652 (see above) uses the same «Krone» label but at higher fineness (.859 vs .672) and higher tariff (1½ → 1⅓ Specie rather than ⅔). A later third formula — the <b>13-Krone-Fuß</b> («<i>Fine Krone</i>») 1693–1771 — follows below.</em>
      uk: <b>1 Krone</b> = <b>4 Marck Danske</b> = <b>14,964 г</b> чистого срібла = <b>⅔ Speciedaler</b> (тариф Кристіана V, 1670+) — 22,272 г повної ваги за проби .672<br><b>½ Krone</b> = <b>2 Marck Danske</b> = <b>7,482 г</b> чистого = <b>⅓ Speciedaler</b> · 11,136 г повної ваги (KM# 65, 80.1, 80.2, 377, 406.3)<br><b>¼ Krone</b> = <b>1 Marck Danske</b> = <b>3,741 г</b> чистого = <b>⅙ Speciedaler</b> · 5,568 г повної ваги (KM# 342, 350, 381 — копенгагенські емісії Кристіана V)<br><br><em><b>Marck Danske</b> у цій стопі — розрахункова частка Krone, не плутати з <b>Mark lübisch</b> (1/3 Reichsthaler у 9-Fuß), <b>Mark Sch.-H. Courant</b> (1/3 Thaler Species з 1788) чи пізнішим <b>Rigsbankdaler</b> (1813+). Використана тут Marck Danske належить саме до данської Kronemønt-тарифної системи 1644–1696.</em><br><br><em>Старіша Krone-формула <i>Christian IV's kroner</i> 1618–1652 (див. вище) використовує той самий термін «Krone», але з вищою пробою (.859 проти .672) і вищим тарифом (1½ → 1⅓ Specie замість ⅔). Ще одна, третя формула — <b>13-Krone-Fuß</b> («<i>Тонка Крона</i>») 1693–1771 — далі нижче.</em>
  description:
    de: |
      Fiskalische Tarifmünze, Christian IV. bis Christian V. (1618–1696).
      KEIN vollwertiger Thaler Species — folgt eigenem Münzfuß mit reduziertem
      Feingehalt, der sich weder mathematisch noch konzeptionell aus dem 9¼-Fuß
      ableiten läßt. Empirisch ≈ 15,65 Kronen je Cöllnische Marck Feinsilber.
      Fundamental ist nicht der Feingehalt, sondern der TARIF: Die Krone wurde
      zu einem königlich festgesetzten Nennwert ÜBER dem Silberwert gehandelt.
      Die Differenz war Seigniorage-Gewinn der Krone, nicht Marktpreis.
    en: |-
      Fiscal tariff coin, Christian IV through Christian V (1618–1696). NOT a full-value Thaler Species — follows its own standard with reduced fineness that cannot be mathematically or conceptually derived from the 9¼-Thaler-Fuß. Empirically ≈ 15.65 Krones per fine Cologne mark. The fundamental feature is not the fineness but the TARIFF: the Krone was traded at a king-set face value ABOVE silver content. The difference was state seigniorage, not market price.
    uk: |-
      Фіскальна тарифна монета, від Крістіана IV до Крістіана V (1618–1696). НЕ повноцінний спецієсталер — має власний стандарт зі зниженою пробою, який не виводиться математично зі 9¼-стандарту. Емпірично ≈ 15,65 крон з чистої кельнської марки. Фундаментальною рисою є не проба, а ТАРИФ: крона обігала за встановленою королем вартістю ВИЩЕ вмісту срібла. Різниця — сеньйораж, а не ринкова ціна.
