      de: |
        <b>20 Mark</b> = 7,16846 g fein · 7,96496 g rau · ⌀ 22,5 mm · «Doppelkrone»<br>
        <b>10 Mark</b> = 3,58423 g fein · 3,98248 g rau · ⌀ 19,5 mm · «Krone»<br>
        <b>5 Mark</b>  = 1,79211 g fein · 1,99124 g rau · ⌀ 17,0 mm · 1873–1878 (kurze Prägeperiode, abgelöst durch eine 5-Mark-Silbermünze)<br>
        <em>Die Mark wurde nicht physisch in Gold geprägt; die kleinste Gold-Stückelung ist die 5 Mark. 1, 2 und 5 Mark wurden ab 1873 als Silbermünzen ausgeprägt; ½ Mark, 50, 25, 20, 10, 5, 2, 1 Pfennig in Silber/Billon/Kupfer.</em>
      en: |-
        <b>20 Mark</b> = 7.16846 g fine · 7.96496 g rough · ⌀ 22.5 mm · "Doppelkrone"<br> <b>10 Mark</b> = 3.58423 g fine · 3.98248 g rough · ⌀ 19.5 mm · "Krone"<br> <b>5 Mark</b>  = 1.79211 g fine · 1.99124 g rough · ⌀ 17.0 mm · 1873–1878 (short coinage run, replaced by a 5-Mark silver coin)<br> <em>The Mark was not physically struck in gold; the smallest gold denomination is the 5 Mark. From 1873 onwards, 1, 2 and 5 Mark were also struck as silver coins; ½ Mark, 50, 25, 20, 10, 5, 2 and 1 Pfennig in silver, billon, or copper.</em>
      uk: |-
        <b>20 Mark</b> = 7,16846 г чистого · 7,96496 г повної ваги · ⌀ 22,5 мм · «Doppelkrone»<br> <b>10 Mark</b> = 3,58423 г чистого · 3,98248 г повної ваги · ⌀ 19,5 мм · «Krone»<br> <b>5 Mark</b>  = 1,79211 г чистого · 1,99124 г повної ваги · ⌀ 17,0 мм · 1873–1878 (короткий період карбування, замінена срібною монетою у 5 Mark)<br> <em>Власне Mark у золоті не карбувалася; найменший золотий номінал — 5 Mark. З 1873 р. 1, 2 і 5 Mark карбували також у сріблі; ½ Mark, 50, 25, 20, 10, 5, 2, 1 Pfennig — у сріблі / білоні / міді.</em>
  description:
    de: |
      Münzgesetz vom 4. Dezember 1871: gemeinsamer Goldstandard des Deutschen
      Kaiserreichs. Aus 1 Pfund (500 g) Feingold werden 139½ Zehnmarkstücke
      = 1395 Mark ausgeprägt · 900 ‰ Feingehalt. Goldmünzen zu 5, 10 und
      20 Mark; in Holstein keine eigenen Prägungen (Altona-Münze geschlossen
      1863). Goldsuspendierung bei Kriegsbeginn 4. August 1914; formal
      abgelöst 1924 durch Reichsmark / Rentenmark.
    en: |-
      Coinage Act of 4 December 1871: the common gold standard of the German Empire. From 1 Pfund (500 g) of fine gold, 139½ ten-Mark pieces = 1,395 Mark are struck · 900‰ fineness. Gold coins of 5, 10 and 20 Mark; no Holstein issues (the Altona mint closed in 1863). Gold-redemption suspended at the outbreak of war on 4 August 1914; formally replaced in 1924 by the Reichsmark / Rentenmark.
    uk: |-
      Закон про монету від 4 грудня 1871 р.: спільний золотий стандарт Німецької імперії. З 1 фунта (500 г) чистого золота карбують 139½ 10-Mark-Stück = 1395 Mark · проба 900 ‰. Золоті монети у 5, 10 і 20 Mark; у Гольштейні власних карбувань немає (двір в Альтоні закритий 1863 р.). Золотий розмін призупинено на початку війни 4 серпня 1914 р.; формально замінено 1924 р. Reichsmark / Rentenmark.
  fractions:
    "5": {soll_rau_g: 1.99124, soll_fein_g: 1.79211}     # 5 Mark
    "10": {soll_rau_g: 3.98248, soll_fein_g: 3.58423}    # 10 Mark / Krone
    "20": {soll_rau_g: 7.96496, soll_fein_g: 7.16846}    # 20 Mark / Doppelkrone

  events:
    first_adoption:
      anywhere: 1871
      holstein: 1871
      note: Reichsmünzgesetz 4. Dec 1871; Holstein under the Kaiserreich 1871–1914.
    first_mint:
      anywhere: 1871
      holstein:
      note: No Holstein local mint. Reichsgoldmünzen struck at Berlin / Hamburg / München etc.
    last_mint:
      anywhere: 1914
      holstein:
    std_end:
      anywhere: 1914
      holstein: 1914
      note: Gold-standard convertibility suspended 1914 (WWI); minting effectively halts.
    demonetisation:
      anywhere: 1924
      holstein: 1924
      note: Formal demonetisation 1924 = Rentenmark / Reichsmark reform.
    sole_start:
      anywhere: 1907
      holstein: 1907
      note: '«Sole» here = the only standalone Münzfuß carrying Reich-wide legal-tender status; subsidiary Reichsmünzen denominations (½/1/2/3/5 Mark silver post-1908; ½/1/2/5/10/20/25 Pfennig copper-nickel) are denominations WITHIN the Goldmark system, not parallel Münzfüße. After Vereinsthaler demonetisation by Bankgesetz 1907 the Goldmark stood alone among full-standard Münzfüße — the «two-metal tail» 1871-1907 (Goldmark + Vereinsthaler dual) ended.'
    sole_end:
      anywhere: 1914
      holstein: 1914
      note: Gold-standard convertibility suspended 4 Aug. 1914 at the outbreak of WWI; Goldmark coins continued as nominal legal tender but were practically replaced by paper Reichsbanknoten. Coincides with std_end for the standard itself.
    anywhere_label:
      de: Deutsches Kaiserreich
      en: German Empire
      uk: Німецька імперія
