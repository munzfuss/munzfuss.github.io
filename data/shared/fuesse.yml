  events:
    first_adoption:
      anywhere: 1524
      note: "Møntordning af 25. Februar 1524 (Frederik I, København) — establishes the silver Sølvgylden + Mark Danske + Hvid system at 14 Lod, 8 Sølvgylden per Cölln. Marck rauh. Wilcke 1950 Kap. 7-2 pp. 184-187 verbatim quote: «Vi Fr. ... at slaa, i Guld: Nobler (den vegne Mark skal holde 23½ Karat og skraade 16 Stkr.), Rinske Gylden (18 Karat, 72 Stkr.) ...»"
    first_mint:
      anywhere: 1524
      note: "First dated issues: 14 Penning 1524 København (Numista + Bruun specimens, Klipping-Indfrielse-Mønt), 4 Skilling 1525 København (Galster f1g specimens). Sølvgylden series Galster f1g-47 onwards from 1531-1532."
    last_mint:
      anywhere: 1532
      note: "Latest dated issues 1532 København + Malmø (Galster f1g-47 1 Sølvgylden, f1g-48 1½ Sølvgylden, f1g-49+50 Halv Sølvgylden, f1g-52 ¼ Sølvgylden — final consolidation series). Frederik I dies 10 April 1533; Christian III's accession is delayed by the Counts' Feud 1534-1536 until coronation 1537."
    std_end:
      anywhere: 1541
      approx_anywhere: true
      note: "Standard formally superseded by Christian III's Møntordning of 20 September 1541, which introduces a metrically distinct 8-Daler standard at 14½ Lod (Marken-fin mf 8.827, ≈ 26.494 g fine per Daler). Practical interregnum 1534-1540 was the Grevens Fejde civil-war Klipping cascade."
    demonetisation:
      anywhere: 1559
      approx_anywhere: true
      note: "Approximate practical-circulation tail terminus — by the 1559 Reichsmünzordnung and Frederik II's 9-Fuß adoption from 1566, Frederik-I-era Sølvgylden are predominantly remelt fodder for the new Reichsthaler standard."
    anywhere_label:
      de: Königreich Dänemark und Norwegen (Frederik I, 25. Februar 1524)
      en: Royal Danish-Norwegian Realm (Frederik I, 25 February 1524)
      uk: Королівство Данії і Норвегії (Frederik I, 25 лютого 1524)

