      uk: "Кельнська марка = 233,856 г чистого золота · від імперського ордонансу 1559 · 67 дукатів із чистої кельнської марки"
    badge:
      de: "Müntzfuß · Gold"
      en: "Müntzfuß · Gold"
      uk: "Стопа · золото"
