      note: 'Skandinavische Münzunion 1873 (Krone) ersetzt die Speciedaler-Tariflinie und damit auch den Kurantdukat de facto. Reichsmünzgesetz 4. Dec 1871 in Holstein wirkt ähnlich, ab 1. Januar 1876 sind Mark und Vereinsthaler die einzigen gesetzlichen Zahlungsmittel.'

