# Global Münzfuß (coinage standard) definitions.
#
# These are universal mathematical constructs, not location-specific.
# A Müntzfuß is defined by: grid_unit_g / grid_stops = soll_fein_g per 1-unit coin.
#
# Each fraction specifies the Feingewicht (and for gold, Raugewicht) expected
# for that denominational fraction, computed from the standard.
#
# Locations reference these by `id`. Multiple locations can share the same fuss;
# each applies it during its own chronological phases.

reichsdukatenfuss:
  name:
    de: Reichsdukatenfuß
    en: Reichsdukatenfuß
    uk: Reichsdukatenfuß
  metal: gold
  grid_unit_g: 233.856    # Cöllnische Marck rauh (Goldlegierung)
  grid_stops: 67          # 67 Dukaten aus der rauen Marck Gold
  fineness_standard: 0.98611111    # 23 Karat 8 Grän = 284/288
  fineness_display: "986 1/9 ‰ (23 Karat 8 Grän = 284/288)"
  grundwerte:
    heading:
      de: "Grundwerte · Dukatenfuß"
      en: "Base values · Ducat standard"
      uk: "Базові значення · дукатний стандарт"
    subheading:
      de: "Cöllnische Marck rauh = 233,856 g Goldlegierung · Feingehalt 23 Karat 8 Grän = 986 1/9 ‰ · seit Reichsmünzordnung 1559 · 67 Dukaten aus der rauen Cöllnischen Marck Gold"
      en: "Cologne Mark rough = 233.856 g gold alloy · fineness 23 carats 8 grains = 986 1/9 ‰ · since the Imperial Ordinance of 1559 · 67 ducats from one rough Cologne Mark of gold"
      uk: "Кельнська марка повна = 233,856 г золотого сплаву · проба 23 карати 8 гран = 986 1/9 ‰ · від імперського ордонансу 1559 · 67 дукатів з повної Кельнської марки золота"
    badge:
      de: "Gold"
      en: "Gold"
      uk: "Золото"
    rows:
      - key:
          de: "Feingewicht Dukat"
          en: "Fine weight, ducat"
          uk: "Чиста вага дуката"
        value:
          de: "<b>3,44191 g</b> Feingold (= 233,856 × 284/288 / 67)"
          en: "<b>3.44191 g</b> fine gold (= 233.856 × 284/288 / 67)"
          uk: "<b>3,44191 г</b> чистого золота (= 233,856 × 284/288 / 67)"
      - key:
          de: "Raugewicht"
          en: "Rough weight"
          uk: "Повна вага"
        value:
          de: "3,49039 g (= 233,856 / 67) · 986 1/9 ‰ (= 23 Karat 8 Grän)"
          en: "3.49039 g (= 233.856 / 67) · 986 1/9‰ (= 23 carats 8 grains)"
          uk: "3,49039 г (= 233,856 / 67) · 986 1/9 ‰ (= 23 карати 8 гран)"
      - key:
          de: "Handelskurs"
          en: "Trade rate"
          uk: "Торговий курс"
        value:
          de: "Kein festes Silberverhältnis; Marktkurs zu Thaler Species ca. 2,0–2,5 im 18. Jh."
          en: "No fixed silver ratio; market rate to Thaler Species roughly 2.0–2.5 throughout the 18th century."
          uk: "Жорсткого срібного співвідношення немає; ринковий курс до Thaler Species у XVIII ст. ≈ 2,0–2,5."
      - key:
          de: "Verbreitung"
          en: "Geographic reach"
          uk: "Поширення"
        value:
          de: "Universale Handelsmünze im Norden und Ostseeraum · gemeinsamer Goldstandard des Heiligen Römischen Reichs + Königreichs Dänemark und Norwegen + Schweden"
          en: "Universal trade coin across the North and Baltic Sea region · common gold standard of the Holy Roman Empire + the Royal Danish-Norwegian Realm + Sweden"
          uk: "Універсальна торгова монета північного й балтійського регіону · спільний золотий стандарт Священної Римської імперії + Королівства Данії і Норвегії + Швеції"
    rechnungsfraktionen_label:
      de: "Rechnungs- und Kursbindungen"
      en: "Accounting and exchange links"
      uk: "Розрахункові та курсові звʼязки"
    rechnungsfraktionen:
      de: |
        <b>1 Dukat</b> = <b>3,44191 g</b> Feingold · kein festes Silberäquivalent<br>
        <b>Kurs in Holstein 1790er:</b> 1 Dukat ≈ 2½ Thaler Species = 150 Schilling Courant (Marktkurs)<br>
        <b>Courantdukat (Altona ab 1771):</b> Dukat mit festem Kurs von 2½ Rigsdaler Courant (= ca. 12½ Marck Danske)<br>
        <em>Als Handelsgold zirkulierten in Holstein auch niederländische, venezianische, ungarische und türkische Dukaten desselben Fußes nach Silbergehalt.</em>
      en: |-
        <b>1 Dukat</b> = <b>3.44191 g</b> fine gold · no fixed silver equivalent<br> <b>Rate in Holstein, 1790s:</b> 1 Dukat ≈ 2½ Thaler Species = 150 Schilling Courant (market rate)<br> <b>Courantdukat (Altona, from 1771):</b> ducat with a fixed rate of 2½ Rigsdaler Courant (≈ 12½ Marck Danske)<br> <em>As trade gold, Dutch, Venetian, Hungarian and Turkish ducats of the same standard also circulated in Holstein, accepted by silver content.</em>
      uk: |-
        <b>1 дукат</b> = <b>3,44191 г</b> чистого золота · фіксованого срібного еквівалента немає<br> <b>Курс у Гольштейні 1790-х:</b> 1 дукат ≈ 2½ Thaler Species = 150 Schilling Courant (ринковий курс)<br> <b>Courantdukat (Альтона, з 1771):</b> дукат із фіксованим курсом 2½ Rigsdaler Courant (≈ 12½ Marck Danske)<br> <em>Як торгове золото в Гольштейні перебували в обігу також нідерландські, венеційські, угорські й турецькі дукати тієї самої стопи — приймались за вмістом срібла.</em>
  description:
    de: |
      Augspurgische Reichsmünzordnung 19. Aug. 1559 · 67 Dukaten aus der rauen
      Cöllnischen Marck Gold (233,856 g, Goldlegierung) bei Feingehalt 23 Karat
      8 Grän = 986 1/9 ‰. Grundstandard für Goldmünzen im Heiligen Römischen
      Reich biß 1871.
    en: |-
      Imperial Coinage Ordinance of Augsburg, 19 Aug. 1559. 67 ducats struck from the rough Cologne mark of gold (233.856 g of gold alloy) at a fineness of 23 carats 8 grains = 986 1/9 ‰. Fundamental gold standard in the Holy Roman Empire until 1871.
    uk: |-
      Імперський монетний ордонанс Ауґсбургу від 19 серпня 1559 р. 67 дукатів з повної Кельнської марки золота (233,856 г золотого сплаву) при пробі 23 карати 8 гран = 986 1/9 ‰. Фундаментальний золотий стандарт Священної Римської імперії до 1871 р.
  fractions:
    "1": {soll_rau_g: 3.49039, soll_fein_g: 3.44191}
    "1/2": {soll_rau_g: 1.74520, soll_fein_g: 1.72096}
    "1/4": {soll_rau_g: 0.87260, soll_fein_g: 0.86048}
    "1/16": {soll_rau_g: 0.21815, soll_fein_g: 0.21512}   # 1/16 Dukat (rare petty-gold)
    "5/4": {soll_rau_g: 4.36299, soll_fein_g: 4.30239}    # ½ Rose Noble (Christian IV 1611 Hede-24A, ~4.4 g)
    "2": {soll_rau_g: 6.98078, soll_fein_g: 6.88382}
    "5/2": {soll_rau_g: 8.72598, soll_fein_g: 8.60478}    # 1/4 Portugaloser = 2½ Ducats (Haderslev 1592-93); also Rose Noble (~8.7 g)
    "3/2": {soll_rau_g: 5.23559, soll_fein_g: 5.16287}
    "3": {soll_rau_g: 10.47117, soll_fein_g: 10.32574}    # Sovereign (Christian IV 1608 Hede-19, ~10 g)
    "4": {soll_rau_g: 13.96156, soll_fein_g: 13.76764}    # Largesse 4 Ducats Klippe (Frederik III coronation 1648 Hede-3); also 4 Ducats 1663 Hede-61
    "5": {soll_rau_g: 17.45196, soll_fein_g: 17.20955}
    "8": {soll_rau_g: 27.92314, soll_fein_g: 27.53528}    # 8 Daler Klippe (Christian IV 1604 Hede-10, gold tariff piece)
    "10": {soll_rau_g: 34.90392, soll_fein_g: 34.41910}
  events:
    first_adoption:
      anywhere: 1559
      holstein: 1559
      note: Reichsmünzordnung Augsburg 19. Aug 1559; HRR-wide adoption applied to all Holstein duchies.
    first_mint:
      anywhere: 1559
      holstein: 1640
      note: 'anywhere = first imperial dukaten under the 1559 ordinance. H first-mint 1640 = km-29-chr-iv-1640 (1640–1646 Glückstadt under Christian IV.) — earliest documented Holstein-mint Reichsdukat in our base.'
    last_mint:
      anywhere: 1871
      holstein: 1802
      note: anywhere = last German Reichsdukaten before Reichsmünzgesetz. H last-mint 1802 = KM#650 Christian VII Altona-Dukat 1791-1802. The Glückstadt mint operated until 1812 but no later Reichsdukatenfuß-Dukat is documented from a Holstein mint.
    std_end:
      anywhere: 1871
      holstein: 1871
      note: Reichsmünzgesetz 4. Dec 1871 superseded the Dukatenfuß Reich-wide; Holstein, as part of the Empire, exits the standard at the same date — no separate Holstein-specific reform.
    demonetisation:
      anywhere: 1876
      holstein: 1876
      note: 'Reichsmünzgesetz 4. Dec 1871 (gold) and 9. Jul 1873 (extended to silver) phased in the new Goldmark; 1 Jan 1876 — Mark + Vereinsthaler became the SOLE legal tenders, so all older coinage including Reichsdukaten lost legal-tender status from that date. Std end (1871) marks the formal-standard cutoff; demon (1876) marks actual loss of currency status. Austrian restrike-Dukaten dated 1915 are commemorative bullion, out-of-system.'

    anywhere_label:
      de: Heiliges Römisches Reich + Königreich Dänemark und Norwegen
      en: Holy Roman Empire + Royal Danish-Norwegian Realm
      uk: Священна Римська імперія + Королівство Данії і Норвегії
pistolenfuss:
