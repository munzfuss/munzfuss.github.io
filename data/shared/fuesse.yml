      note: '«Sole» here = the only standalone Münzfuß carrying Reich-wide legal-tender status; subsidiary Reichsmünzen denominations (½/1/2/3/5 Mark silver post-1908; ½/1/2/5/10/20/25 Pfennig copper-nickel) are denominations WITHIN the Goldmark system, not parallel Münzfüße. After Vereinsthaler demonetisation by Bankgesetz 1907 the Goldmark stood alone among full-standard Münzfüße — the «two-metal tail» 1871-1907 (Goldmark + Vereinsthaler dual) ended.'
    sole_end:
      anywhere: 1914
      holstein: 1914
      note: Gold-standard convertibility suspended 4 Aug. 1914 at the outbreak of WWI; Goldmark coins continued as nominal legal tender but were practically replaced by paper Reichsbanknoten. Coincides with std_end for the standard itself.
    anywhere_label:
      de: Deutsches Kaiserreich
      en: German Empire
      uk: Німецька імперія

# -----------------------------------------------------------------------------
# Krone-fod (Skandinavisk Møntunion) — Denmark / Sweden 1873, Norway 1875.
# Distinct from Reichsgoldmünzfuß (German Empire 1871) — the gold parity
# is mathematically related (8 Kroner = 9 Mark gold-fine equivalent), but
# the standard is established by a separate Coinage Act (Møntloven of
# 23 May 1873, effective 1 January 1875).
#
# Single Müntzfuß with a HIERARCHICAL METAL-TIER STRUCTURE:
#   tier 1 (anchor)     gold .900     — 5 / 10 / 20 Kroner (Hauptkurant)
#   tier 2 (silver-Kur) silver .800   — 1 / 2 Kroner       (Silber-Kurant)
#   tier 3 (silver-Sch) silver .600   — 25 øre              (Silber-Scheide)
#                       silver .400   — 10 øre              (Silber-Scheide)
#   tier 4 (Cu-Scheide) bronze        — 1 / 2 / 5 øre        (Kupfer-Scheide)
#
# Same modelling pattern as other multi-tier silver Fuesse in the
# project (9_25_thaler, 11_333_thaler, 18_5_thaler, kronemont_chr_iv,
# kronemont_fine) — `fineness_standard` captures the anchor-metal-tier's
# fineness; per-fraction `soll_fein_g` reflects each denomination's
# actual fine-metal content; per-coin `metal` + `fineness` document the
# physical specimen; rendering routes by `kind` (kurant / scheide /
# tarif). See `docs/research/hierarchical_metal_tiers.md` for the documented
# convention.
# -----------------------------------------------------------------------------
kronefod:
  name:
    de: Krone-Fuß
    en: Krone-fod
    uk: Krone-fod
  # Period-attested Danish/Swedish term for the Scandinavian Monetary
  # Union — the «umbrella» name above the per-country Fuß term. Same
  # «name (Fuß-form) + historical_name (period synonym)» pattern other
  # DK fuesse follow: 9¼-Thaler-Fuß / Speciesfuß; 11⅓-Thaler-Fuß /
  # Kurantmøntfod; 18½-Thaler-Fuß / Rigsbankfod.
  historical_name: Skandinavisk Møntunion
  # Anchor metal of the Müntzfuß. Gold is the legal-tender Hauptkurant
  # by Mønlov 1873; silver and bronze coins are subsidiary tiers of
  # the same Fuß, not a separate standard.
  metal: gold
  # Krone-fod is anchored directly in the metric system, not in the
  # Cölln-Marck the older silver Fuesse use: 2480 Kroner per kilogram
  # of fine gold (Møntloven §1, 1873). Grid-unit therefore is 1 kg
  # fine gold expressed in grams.
  grid_unit_g: 1000.0
  grid_unit_name: Kilogramm
  grid_stops: 2480
  grid_unit_convention: fein
  fineness_standard: 0.9
  fineness_period: '900‰ Feingold'
  fineness_display: "Anchor: 900 ‰ Gold · subsidiary tiers: 800 ‰ Silber (1/2 Kr) → 600 ‰ (25 øre) → 400 ‰ (10 øre) → Bronze (5/2/1 øre)"
  grundwerte:
    heading:
      de: "Grundwerte · Krone-fod"
      en: "Base values · Krone-fod"
      uk: "Базові значення · Krone-fod"
