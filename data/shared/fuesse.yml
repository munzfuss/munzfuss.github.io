  events:
    first_adoption:
      anywhere: 1566
      holstein: 1566
      note: Reichsabschied Augsburg 1566 (Reichsmünzordnung); HRR-wide adoption.
    first_mint:
      anywhere: 1566
      holstein: 1567
    last_mint:
      anywhere: 1667
      holstein: 1629
      approx_anywhere: false
      note: 'anywhere last-mint 1667 = empirical end of Reich-wide mass-minting via Zinnaer Münzvertrag (Brandenburg + Sachsen, Brunswick-Lüneburg-Beitritt 1668; refs 19+20+26): ⅔-Thaler im 10½-Fuß becomes the new Hauptnominal in the largest producer states and the whole Reichsthaler-Specie minting collapses to «bis auf wenige Ausnahmen nicht ausgeprägt» (Sächs. Wiki, ref19). Post-1700 islands — Hannover Speciesthaler 1738–1802 (letzte Schaumünze 1797, ref16), Hamburg ~110.000 Speciesthaler 1730–1764 (ref16), Lübeck Jubiläumsthaler 1730/1776 — are regional Sonderfall and are documented on the per-location pages (`hamburg.yml`, `lubeck.yml`) and in `docs/research/9_thalerfuss.md` rather than stretched into the global anywhere envelope. Earlier values: 1764 (Hamburg-only, Hanseatic Sonderfall), 1797 (Hannover Schaumünze, also Sonderfall) — both stretched the global event with regional islands; switching to 1667 keeps the events model focused on the general HRR-wide picture. H last-mint 1629 = closing transition strikes at Glückstadt under Christian IV (km-A4-chr-iv-1617, struck 1617–1629), the latest in-scope mint year of the standard in Holstein. The KM#105 1683 Christian V Speciedaler (Glückstadt, Hede c5h120) is a one-off struck 54 years later and treated as exceptional rather than as a continuation of the mint period — see km-105 verification_note.'
    std_end:
      anywhere: 1738
      holstein: 1622
      approx_anywhere: false
      note: 'anywhere std_end 1738 = Karl-VI.-Kommissionsedikt elevates Leipziger Fuß to Reichsmünzfuß, formally replacing the 9-Fuß as THE Reichsmünzfuß for the bulk of denominations (Halbtaler, Vierteltaler, Achteltaler, Zwölfteltaler, niederrheinische Blaffert / 9-Kreuzer-Stück + Dukaten + Goldgulden — ref17). Three independent sources converge on 1738: Wikipedia DE «Leipziger Fuß» («Damit wurde der Leipziger Fuß Reichsmünzfuß», ref17), Bobzin («Der Leipziger Fuß wird 1738 zum Reichsfuß erhoben», ref6), Meyers eLexikon («1738 zum Reichsfuß erhoben, aber nicht allgemein eingeführt», ref26). Sächsische Wiki names 1735 (Regensburger Reichstag erklärt zum neuen Münzfuß, ref19) — likely the Reichstagsbeschluss preceding the 1738 Karl-VI. Vollzugsedikt; both acts together mark the formal transition. This is the third of three end-anchors for the 9-Fuß: (1) empirical mass-minting end at 1667 (Saxon-Pivot — captured by `last_mint.anywhere`); (2) functional Hauptumlaufmünze end at ~1700 (Wikipedia DE «Speciestaler»/«Reichstaler» — captured by `demonetisation.anywhere`); (3) formal Reichsmünzfuß-status end at 1738 (this `std_end` anchor). After 1738 Speciesreichstaler continued to be struck «weiterhin im Reichsmünzfuß» (ref19) but as marginal Bergbau-Speciereichstaler at 32-Groschen tariff and post-1700 islands (Hannover 1738-1802, Hamburg 1730-1764, Lübeck 1730/1776), not as dominant Reichswährung. Konventionsthaler displaces it formally as alternative imperial standard from 7 Nov 1750 (Austria) / 20 Sept 1753 (Bavaria) / by 1763 wider HRR adoption (Bayern, Schwaben, Ober-+Niederrheinisch, Sachsen — Meyers eLexikon, ref26). Was previously set to 1857 (Wiener Münzvertrag — wrong, conflated regional Hamburg/Lübeck Bank-Mark continuation with imperial standard status), then briefly to 1667 (right concept for mass-minting end but conflated with formal-status end). H std_end 1622 = Friedrich III. von Gottorp''s switch to 9¼-Thaler-Fuß (predates H last-mint 1625 — transition strikes ran past the formal switch).'
    demonetisation:
      anywhere: 1700
      holstein: 1700
      approx_anywhere: true
      approx_holstein: true
      note: 'anywhere demon ~1700 = end of Hauptumlaufmünze function (Wikipedia DE «Speciestaler»: «<i>blieb bis etwa 1700 die Hauptmünze des Reichs</i>», ref16; concurrent Wikipedia DE «Reichstaler»: «<i>als Währungsmünze des Reichs ungefähr bis zum Jahr 1700</i>», ref15). After ~1700 the Hauptumlaufmünze role passes to ⅔-Thaler (12-Fuß) and French Écus blancs (DeWiki «Taler», ref22). Hamburg/Lübeck Bank-Mark continuation as a regional accounting unit until 1875 is per-location Sonderfall and documented on `hamburg.yml` / `lubeck.yml`, not stretched into the global anywhere envelope. Was previously set to 1875 (HH/HL Bank-Mark final Reichsmünzgesetz aftermath — but that conflated regional bank-money use with HRR-wide circulation status). H demon ~1700 = realistic active-circulation end in Holstein: Holstein-side production ceased 1629 (km-A4 Glückstadt last; Friedrich III. von Gottorp switched to 9¼-Fuß 1622); 71 years of uninterrupted 9¼-Fuß minting at Glückstadt/Schleswig/Tönning/Reinfeld between then and 1700, plus Krone melt-programs (Hebræermønt 1644-1648, 10½-Krone-Fuß 1644-1696, 13-Krone-Fuß 1693+) consuming older silver, plus Gresham-law incentive to melt the slightly-higher-silver 9-Fuß Reichstaler (25.98 g fein vs 9¼-Fuß 25.28 g fein, ~2.7 % premium) into newer Speciedaler — by ~1700 (3 generations of replacement) active currency role had faded. The KM#105 1683 Christian V Reichsthaler is a one-off late strike (Hede c5h120), not a continuation of mint activity.'
    anywhere_label:
      de: Reichsmünzfuß im Heiligen Römischen Reich
      en: Reichsmünzfuß in the Holy Roman Empire
      uk: Reichsmünzfuß у Священній Римській імперії
