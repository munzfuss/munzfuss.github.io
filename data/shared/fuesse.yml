      note: 'H demon 1788 = Schimmelmann reform: 9¼-Fuß becomes sole silver-Kurant standard for Holstein, demonetising parallel silver-Krone coinage including Christian-IV-Krone remnants. anywhere demon 1813 = Forordning om Forandring i Pengevæsenet 5. Januar 1813 (Statsbankerot): the comprehensive monetary reset swept all older silver-Kurant coinage out of legal circulation through forced exchange at 6:1 into Rigsbankdaler (18½-Fuß). By then the Christian-IV-Krone formula was 161-188 years old and surviving pieces were collector items rather than active currency. Was previously set to ~1650 (active-currency end), but a unified «demonetisation = legal-tender end» semantics is more honest, even if the practical end-of-circulation came much earlier (1625 tariff cut reduced incentive to hold; 1644 Hebræermønt launch absorbed the Krone-class silver niche).'
