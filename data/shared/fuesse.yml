          en: "30 Schilling Sch.-H. Courant = 1 Rigsbankdaler (= ½ Thaler Species; 60/2 = 30 Sch. Courant)"
          uk: "30 Schilling Sch.-H. Courant = 1 Rigsbankdaler (= ½ Thaler Species; 60/2 = 30 Sch. Courant)"
    rechnungsfraktionen_label:
      de: "Rechnungsfraktionen (1813–1854: Rigsbank-Nomenklatur)"
      en: "Accounting fractions (1813–1854: Rigsbank nomenclature)"
      uk: "Розрахункові фракції (1813–1854: номенклатура Rigsbank)"
    rechnungsfraktionen:
      de: |
        <b>1 Rigsbankdaler</b> = <b>12,64086 g</b> Feinsilber = 96 Rigsbankskilling = 1152 Penninge = ½ Thaler Species = 30 Schilling Sch.-H. Courant<br>
        <b>1 Rigsbankskilling</b> = 12 Penninge ≈ <b>0,13168 g</b> fein (<i>Rechenwert</i>)<br>
        <b>6 Rigsbankdaler</b> = 1 Thaler Species (bei Rigsdaler Courant-Umrechnung: 1 RBD = 1,16 Rigsdaler Courant alter Prägung nach Silbergehalt)<br><br>
        <em>Umbenennung 31. Juli 1854 (Frederik VII.): Rigsbankdaler → Rigsdaler Rigsmønt, Rigsbankskilling → Skilling Rigsmønt — kein Fußwechsel, nur Namenswechsel.</em><br>
        <em><b>Hinweis:</b> Die Feinsilberangabe für den Rigsbankdaler gilt für Vollwert-Münzen (par-Silber). Rigsbankskilling-Stücke wurden meist als Scheidemünzen mit reduziertem Feingehalt geprägt — der theoretische Wert 0,13168 g fein ist Rechnungsbezug, nicht tatsächlicher Münz-Silbergehalt.</em>
      en: |-
        <b>1 Rigsbankdaler</b> = <b>12.64086 g</b> fine silver = 96 Rigsbankskilling = 1152 Penninge = ½ Thaler Species = 30 Schilling Sch.-H. Courant<br> <b>1 Rigsbankskilling</b> = 12 Penninge ≈ <b>0.13168 g</b> fine (<i>computed</i>)<br> <b>6 Rigsbankdaler</b> = 1 Thaler Species (when converting old-style Rigsdaler Courant: 1 RBD = 1.16 Rigsdaler Courant of the earlier issue, by silver content)<br><br> <em>Renaming on 31 July 1854 (Frederik VII): Rigsbankdaler → Rigsdaler Rigsmønt, Rigsbankskilling → Skilling Rigsmønt — no change of standard, only of name.</em><br> <em><b>Note:</b> The fine-silver figure for the Rigsbankdaler applies to full-value coins (par silver). Rigsbankskilling pieces were typically struck as petty coins with reduced fineness — the theoretical 0.13168 g fine is a reckoning reference, not actual coin silver content.</em>
      uk: |-
        <b>1 Rigsbankdaler</b> = <b>12,64086 г</b> чистого срібла = 96 Rigsbankskilling = 1152 Penninge = ½ Thaler Species = 30 Schilling Sch.-H. Courant<br> <b>1 Rigsbankskilling</b> = 12 Penninge ≈ <b>0,13168 г</b> чистого (<i>розрахункова</i>)<br> <b>6 Rigsbankdaler</b> = 1 Thaler Species (при перерахунку зі старого Rigsdaler Courant: 1 RBD = 1,16 Rigsdaler Courant попереднього карбування за вмістом срібла)<br><br> <em>Перейменування 31 липня 1854 (Frederik VII.): Rigsbankdaler → Rigsdaler Rigsmønt, Rigsbankskilling → Skilling Rigsmønt — без зміни стопи, лише назви.</em><br> <em><b>Зауваження:</b> Значення чистого срібла для Rigsbankdaler стосується повноцінних монет (par-silver). Rigsbankskilling-монети зазвичай карбувались як розмінні зі зниженою пробою — теоретичні 0,13168 г чистого є розрахунковим орієнтиром, не фактичним вмістом срібла в монеті.</em>
  description:
    de: |
      Eingeführt 5. Januar 1813 nach dem dänischen Staatsbankrott als Rigsbankdaler.
      Umbenannt 31. Juli 1854 in Rigsdaler Rigsmønt (Frederik VII.) — ohne Wertänderung.
      233,856 g ÷ 18½ = 12,64086 g Feinsilber je Rigsbankdaler (14,44670 g rau × 875‰).
      2 Rigsbankdaler = 1 Thaler Species (Silberparität zum 9¼-Fuß).
    en: |-
      Introduced 5 January 1813 after the Danish state bankruptcy as Rigsbankdaler. Renamed 31 July 1854 to Rigsdaler Rigsmønt (Frederik VII) with no value change. 233.856 g ÷ 18.5 = 12.64086 g fine silver per Rigsbankdaler. 2 Rigsbankdaler = 1 Thaler Species (silver parity to the 9¼-Thaler-Fuß).
    uk: |-
      Впроваджений 5 січня 1813 р. після державного банкрутства Данії як рігсбанкдалер. Перейменований 31 липня 1854 р. на рігсдалер рігсмьонт (Фредерік VII) без зміни вартості. 233,856 г ÷ 18½ = 12,64086 г чистого срібла. 2 рігсбанкдалери = 1 спецієсталер (срібний паритет з 9¼-стандартом).
  fractions:
    "1": {soll_fein_g: 12.64086}
    "2": {soll_fein_g: 25.28173}         # 2 Rigsdaler (Sølvbryllup, Tod Fred. VII.)
    "1/2": {soll_fein_g: 6.32043}
    "1/3": {soll_fein_g: 4.21362}       # 32 RBS = 10 Sch.C.
    "1/6": {soll_fein_g: 2.10681}       # 16 RBS = 5 Sch.C.
    "1/12": {soll_fein_g: 1.05341}      # 8 RBS = 2½ Sch.C.
    "1/24": {soll_fein_g: 0.52670}      # 4 RBS = 1¼ Sch.C.
    "1/96": {soll_fein_g: 0.13168}      # 1 RBS
    "1/192": {soll_fein_g: 0.06584}     # ½ RBS

  events:
    first_adoption:
      anywhere: 1813
      holstein: 1813
      note: Forordning 5. Jan 1813 (post-Statsbankerot) → Rigsbankdaler / Rigsmønt.
    first_mint:
      anywhere: 1813
      holstein: 1813
    last_mint:
      anywhere: 1875
      holstein: 1863
      note: 'anywhere last-mint 1875 = Danish krone reform. H last-mint 1863 = km-770 (Christian IX 1 Skilling Rigsmønt 1863, Kopenhagen) and km-761 (Frederik VII 1 Rigsdaler 1854-1863, Altona/Kopenhagen) — exact terminal year confirmed by base coin entries.'
    std_end:
      anywhere: 1875
      holstein: 1866
      note: anywhere std_end 1875 = Danish krone reform. H std_end 1866 = Prussian annexation.
    demonetisation:
      anywhere: 1875
      holstein: 1866
    # sole_start / sole_end intentionally NOT set: 18½-Fuß was the
    # PRINCIPAL Kurant standard / legal tender 1813-1875 (anywhere) /
    # 1813-1866 (H) — i.e. «чинний», not «єдиний». Even within the
    # silver-Kurant niche it was not sole: 9¼-Fuß Speciedaler continued
    # to be minted in parallel (~7 coins in our base 1813-1854 from
    # Altona alone) as the higher-class trade-coinage variant. The two
    # standards relate mathematically (1 Speciedaler = 2 Rigsbankdaler
    # at the same fine-silver content) and were nested into one monetary
    # system rather than one replacing the other. Compare 9¼-Fuß
    # 1788-1813, which DID get sole-marker because it was the operative
    # silver-Kurant standard with no competing silver-Kurant rival.
    anywhere_label:
      de: Dänischer Gesammtstaat (Helstaten)
      en: Danish Unitary State (Helstaten)
      uk: Данська унітарна держава (Helstaten)
