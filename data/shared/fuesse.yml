      - key:
          de: "Raugewicht"
          en: "Rough weight"
          uk: "Повна вага"
        value:
          de: "≈ 6,68 g (= 233,856 / 35) · Probe 130/144 (≈ 903 ‰)"
          en: "≈ 6.68 g (= 233.856 / 35) · fineness 130/144 (≈ 903 ‰)"
          uk: "≈ 6,68 г (= 233,856 / 35) · проба 130/144 (≈ 903 ‰)"
      - key:
          de: "Tarif zum Reichsthaler / Speciedaler"
          en: "Tariff vs. Reichsthaler / Speciedaler"
          uk: "Тариф до Reichsthaler / Speciedaler"
        value:
          de: "<b>1 Pistole = 5 Thaler</b> (Norddt. Reichsthaler, später Vereinsthaler) bzw. <b>5 Speciedaler</b> (Dänemark) — fester Tarif, Marktkurs mit variablem Agio"
          en: "<b>1 pistole = 5 thalers</b> (North-German Reichsthaler, later Vereinsthaler) or <b>5 Speciedaler</b> (Denmark) — fixed tariff, market rate with variable agio"
          uk: "<b>1 пістоль = 5 талерів</b> (північно-нім. Reichsthaler, пізніше Vereinsthaler) або <b>5 Speciedaler</b> (Данія) — фіксований тариф, ринковий курс із плаваючим агіо"
      - key:
          de: "Verbreitung"
          en: "Geographic reach"
          uk: "Поширення"
        value:
          de: "Norddt. Pistolen-Familie · Wilhelm d'or (Preußen 1737), Friedrich d'or (Preußen 1741), August d'or (Sachsen), Carl d'or (Braunschweig), Wilhelm d'or (Hessen-Kassel) · Christian d'or und Frederik d'or (Dänemark, Altona / Kopenhagen) ab 1771"
          en: "North-German Pistolen family · Wilhelm d'or (Prussia 1737), Friedrich d'or (Prussia 1741), August d'or (Saxony), Carl d'or (Brunswick), Wilhelm d'or (Hesse-Kassel) · Christian d'or and Frederik d'or (Denmark, Altona / Copenhagen) from 1771"
          uk: "Північно-німецька Pistolen-родина · Wilhelm d'or (Пруссія 1737), Friedrich d'or (Пруссія 1741), August d'or (Саксонія), Carl d'or (Брауншвайг), Wilhelm d'or (Гессен-Кассель) · Christian d'or і Frederik d'or (Данія, Альтона / Копенгаген) з 1771"
    rechnungsfraktionen_label:
      de: "Tarif und Subnominale"
      en: "Tariff and sub-denominations"
      uk: "Тариф і субномінали"
    rechnungsfraktionen:
      de: |
        <b>1 Pistole</b> = <b>6,0322 g</b> Feingold (Initialstandard 1741) · 6,03 g (Reduktion 1770)<sup><a href="#ref32">[32]</a></sup><br>
        <b>1 Pistole</b> = 5 Reichsthaler / 5 Speciedaler — fester Tarif, Marktkurs mit variablem Agio<sup><a href="#ref34">[34]</a></sup><br>
        <b>Subnominale:</b> ½ Pistole (1749, 2½ Thaler) · 1 Pistole · 2 Pistolen (1747, 10 Thaler) — Wilhelm d'or 1737 ist <em>ab origine</em> eine Doppelpistole<sup><a href="#ref32">[32]</a></sup><br>
        <em>Mittel-Friedrich d'or im Siebenjährigen Krieg (1756–1763): Notmünze mit nur 4,2 g fein statt 6,03 g — Kipper-Münze, formal Pistole, real debasiert.<sup><a href="#ref32">[32]</a></sup></em>
      en: |-
        <b>1 pistole</b> = <b>6.0322 g</b> fine gold (initial 1741 standard) · 6.03 g (after the 1770 reduction)<sup><a href="#ref32">[32]</a></sup><br><b>1 pistole</b> = 5 Reichsthaler / 5 Speciedaler — fixed tariff, market rate with variable agio<sup><a href="#ref34">[34]</a></sup><br><b>Sub-denominations:</b> ½ pistole (from 1749, 2½ thalers) · 1 pistole · 2 pistoles (from 1747, 10 thalers) — the Wilhelm d'or of 1737 is <em>ab origine</em> a double pistole<sup><a href="#ref32">[32]</a></sup><br><em>The Mittel-Friedrich d'or of the Seven Years' War (1756–1763) was an emergency coinage at only 4.2 g fine instead of 6.03 g — a Kipper coin, formally a pistole, in fact debased.<sup><a href="#ref32">[32]</a></sup></em>
      uk: |-
        <b>1 пістоль</b> = <b>6,0322 г</b> чистого золота (початковий стандарт 1741) · 6,03 г (після редукції 1770)<sup><a href="#ref32">[32]</a></sup><br><b>1 пістоль</b> = 5 Reichsthaler / 5 Speciedaler — фіксований тариф, ринковий курс із плаваючим агіо<sup><a href="#ref34">[34]</a></sup><br><b>Субномінали:</b> ½ пістолі (з 1749, 2½ талера) · 1 пістоль · 2 пістолі (з 1747, 10 талерів) — Wilhelm d'or 1737 — це <em>ab origine</em> подвійна пістоль<sup><a href="#ref32">[32]</a></sup><br><em>Mittel-Friedrich d'or Семирічної війни (1756–1763) — воєнна нотмонета з лише 4,2 г чистого замість 6,03 г — Kipper-монета, формально пістоль, фактично знецінена.<sup><a href="#ref32">[32]</a></sup></em>
  description:
    de: |
      Pistolen-Goldmünzen-Familie nach dem Vorbild der spanischen Doblón
      (1537) und der französischen Louis d'or (1640). In Norddeutschland
      eingeführt durch den preußischen Wilhelm d'or 1737 (Friedrich
      Wilhelm I., Doppelpistole zu 10 Thalern) und in seiner Standardform
      durch den Friedrich d'or 1741 (Friedrich II., 5 Reichsthaler).
      Standard ≈ 6 g Feingold bei 130/144 Probe, 5-Thaler-Tarif, kein
      Reichs-Müntzfuß im juristischen Sinne — Handels- und Umlaufmünze
      mit variablem Agio. In Dänemark als Christian d'or 1771 (Christian
      VII., Altona) übernommen, fortgeführt biß Christian IX. 1870.
      Ende: 1855 letzter preußischer Friedrich d'or; durch Vereinsmünz-
      vertrag 1857 administrativ abgelöst, durch Münzgesetz 4. Dezember
      1871 (Reichsgoldmark) demonetisiert; in Dänemark Krone-Reform 1873
      / Skandinavische Münzunion.
    en: |-
      Pistole gold-coin family modelled on the Spanish doblón (1537) and the French Louis d'or (1640). Introduced in northern Germany by the Prussian Wilhelm d'or of 1737 (Friedrich Wilhelm I, a double pistole at 10 thalers) and in its standard form by the Friedrich d'or of 1741 (Friedrich II, 5 Reichsthaler). Standard ≈ 6 g fine gold at 130/144 fineness, 5-thaler tariff, never an imperial Münzfuß in the juridical sense — a trade and circulating coin with variable agio. Adopted in Denmark as the Christian d'or in 1771 (Christian VII, Altona) and continued through Christian IX in 1870. End: 1855 last Prussian Friedrich d'or; superseded administratively by the Vereinsmünzvertrag of 1857, demonetised by the Coinage Act of 4 December 1871 (Reichsgoldmark); in Denmark by the Krone reform of 1873 / Scandinavian Monetary Union.
    uk: |-
      Pistolen-родина золотих монет за зразком іспанської Doblón (1537) і французького Louis d'or (1640). У Північній Німеччині запроваджено прусським Wilhelm d'or 1737 р. (Friedrich Wilhelm I, подвоєна пістоль у 10 талерах), у стандартній формі — Friedrich d'or 1741 р. (Friedrich II, 5 Reichsthaler). Стандарт ≈ 6 г чистого золота за пробою 130/144, тариф 5 талерів, у юридичному сенсі ніколи не імперський Müntzfuß — торгова й обігова монета з плаваючим агіо. У Данії запроваджено як Christian d'or у 1771 р. (Christian VII, Альтона), продовжено до Christian IX у 1870 р. Кінець: 1855 — останній прусський Friedrich d'or; адміністративно витіснено Vereinsmünzvertrag 1857, демонетизовано Законом про монету 4 грудня 1871 (Reichsgoldmark); у Данії — Krone-реформою 1873 / Скандинавською монетною унією.
  fractions:
    "1/2": {soll_rau_g: 3.34080, soll_fein_g: 3.01609}
    "1": {soll_rau_g: 6.68160, soll_fein_g: 6.03219}
    "2": {soll_rau_g: 13.36320, soll_fein_g: 12.06438}
  events:
    first_adoption:
      anywhere: 1737
      holstein: 1771
      note: '1737 = Wilhelm d''or unter Friedrich Wilhelm I. (Preußen, Doppelpistole). 1741 = standardisierter Friedrich d''or unter Friedrich II. Holstein-Adoption 1771 mit Eröffnung der Altonaer Münze und Christian d''or Christian VII.'
    first_mint:
      anywhere: 1737
      holstein: 1771
      note: anywhere = Wilhelm d'or 1737 (Preußen). holstein = Christian d'or 1771 (Altona).
    last_mint:
      anywhere: 1870
      holstein: 1869
      note: anywhere = letzter Christian d'or unter Christian IX. 1870 (Kopenhagen). holstein = letzter Frederik VII / Christian IX d'or in Altona vor preußischer Annexion 1867; tatsächliches Datum aus dem Holstein-Bestand bestimmt.
    std_end:
      anywhere: 1873
      holstein: 1871
      note: '1855 — letzter preußischer Friedrich d''or; 1857 Vereinsmünzvertrag (administrative Vorbereitung); 1871 Münzgesetz Deutsches Reich (Goldmark); 1873 Skandinavische Münzunion löst dänische Pistole ab.'
    demonetisation:
      anywhere: 1876
      holstein: 1876
      note: 'Reichsmünzgesetz 4. Dec 1871 (gold) und 9. Jul 1873; ab 1. Januar 1876 sind Mark und Vereinsthaler die einzigen gesetzlichen Zahlungsmittel im Reich — Pistolen verlieren mit diesem Datum den Zahlungsmittel-Status. In Dänemark verlor der d''or den Status mit der Krone-Reform 1873.'

    anywhere_label:
      de: Heiliges Römisches Reich + Königreich Dänemark und Norwegen
      en: Holy Roman Empire + Royal Danish-Norwegian Realm
      uk: Священна Римська імперія + Королівство Данії і Норвегії
