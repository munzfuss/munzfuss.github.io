          uk: "<b>10½ Krone з кельнської марки сплаву проби 10¾ Loth</b> · 22,272 г повної ваги на Krone · 11,136 г на ½ Krone · 5,568 г на ¼ Krone — Норвегія з 1649 р., Данія з 1652 р., останнє карбування 1732 р.<sup><a href=\"#ref23\">[23]</a></sup>"
