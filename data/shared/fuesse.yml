      de: "Cöllnische Marck rauh = 233,856 g Kroneguld-Legierung · Probe <b>934 ‰</b> (Hede f2h2 + f2h5 verbatim<sup>[ref:danskmoent-1guldkrone]</sup>) · <b>≈ 70 Guldkrone aus der Cölln. Marck rauh</b> · per Stück 3,341 g rauh / <b>3,120 g fein</b> · einmalige Klipping-Karbung 1563-1564 als Kriegsfinanzierung der Nordischen Siebenjährigen Krieges (1563-1570)<sup>[ref:frantzen-bender-nordiske-syvaarskrig]</sup>"
      en: "Cologne mark rough = 233.856 g Kroneguld alloy · fineness <b>934 ‰</b> (Hede f2h2 + f2h5 verbatim<sup>[ref:danskmoent-1guldkrone]</sup>) · <b>≈ 70 Guldkrone per Cologne mark rough</b> · per piece 3.341 g rough / <b>3.120 g fine</b> · one-off Klipping coinage 1563-1564 as wartime financing of the Northern Seven Years' War (1563-1570)<sup>[ref:frantzen-bender-nordiske-syvaarskrig]</sup>"
      uk: "Кельнська марка повна = 233,856 г сплаву Kroneguld · проба <b>934 ‰</b> (Hede f2h2 + f2h5 verbatim<sup>[ref:danskmoent-1guldkrone]</sup>) · <b>≈ 70 Guldkrone з повної кельнської марки</b> · на штуку 3,341 г повної / <b>3,120 г чистого</b> · одноразове Klipping-карбування 1563-1564 як воєнне фінансування Північної Семирічної війни (1563-1570)<sup>[ref:frantzen-bender-nordiske-syvaarskrig]</sup>"
    badge:
      de: "Gold"
      en: "Gold"
      uk: "Золото"
    rows:
      - key:
          de: "Periode-attestierte Belegmenge"
          en: "Period-attested coinage volume"
          uk: "Period-attested обсяг карбування"
        value:
          de: "Rentmeister-Rechnungen Frederiks II., 17. Oktober 1563 (Wilcke 1950 Kap. 6)<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup>: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — direkter archivalischer Beleg: <b>66½ Marck Kroneguld-Legierung wurden zu 4860 Krone-Klippingen ausgeprägt</b>. Folgekarbung 1564 (Hede f2h5) ohne dokumentierte Stückzahl; auf Belegexemplar-Basis."
          en: "Rentmeister account records of Frederik II, 17 October 1563 (Wilcke 1950 Kap. 6)<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup>: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — direct archival attestation: <b>66½ marks of Kroneguld alloy struck into 4,860 Krone clippings</b>. Follow-up coinage 1564 (Hede f2h5) without documented piece count; known from a reference specimen."
          uk: "Рент-майстерські рахунки Фредеріка II, 17 жовтня 1563 (Wilcke 1950 Kap. 6)<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup>: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — пряме архівне підтвердження: <b>66½ марки сплаву Kroneguld перекарбовано на 4860 Krone-Klippinge</b>. Подальше карбування 1564 (Hede f2h5) без задокументованої кількості; на основі еталонного зразка."
      - key:
          de: "Drei parallele Goldarten (Kontextualisierung)"
          en: "Three parallel gold types (contextualisation)"
          uk: "Три паралельні золоті типи (контекстуалізація)"
        value:
          de: "Frederik II. läßt 1563-1564 in Kopenhagen <b>drei verschiedene Goldarten parallel</b> als Klippinge ausprägen<sup>[ref:danskmoent-1guldkrone]</sup>: <b>Ungersk Gylden</b> (Hede f2h1 / f2h4, .986 / 3,49 g — Reichsdukatenfuß-Standard, Reversinschrift <i>«I DOK KATE»</i>); <b>Rhinsk Gylden</b> (Hede f2h3 / f2h6, .77 / 3,248 g — Rhinskgyldenfod, Inschrift <i>«I GOLT GILDEN»</i>); <b>Guldkrone aus Kroneguld</b> (Hede f2h2 / f2h5, .934 / 3,341 g — dieser Müntzfuß, Inschrift <i>«I GOLT KRONE»</i>). Die drei Linien stehen für drei Markt-Bestimmungen: imperialer Handelsreserve (Ungersk), deutsch-norddeutscher Handel (Rhinsk), und dänisch-königliche Kriegsfinanzierung (Krone)."
          en: "In 1563-1564 Frederik II strikes <b>three parallel gold types as Klippinge</b> at Copenhagen<sup>[ref:danskmoent-1guldkrone]</sup>: <b>Ungersk Gylden</b> (Hede f2h1 / f2h4, .986 / 3.49 g — Reichsdukatenfuß standard, reverse inscription <i>«I DOK KATE»</i>); <b>Rhinsk Gylden</b> (Hede f2h3 / f2h6, .77 / 3.248 g — Rhinskgyldenfod, inscription <i>«I GOLT GILDEN»</i>); <b>Guldkrone from Kroneguld</b> (Hede f2h2 / f2h5, .934 / 3.341 g — this Müntzfuß, inscription <i>«I GOLT KRONE»</i>). The three lines serve three market roles: imperial trade reserve (Ungersk), German / northern-German trade (Rhinsk), and Danish-royal wartime financing (Krone)."
          uk: "Frederik II 1563-1564 у Копенгагені карбує <b>три паралельні золоті типи як Klippinge</b><sup>[ref:danskmoent-1guldkrone]</sup>: <b>Ungersk Gylden</b> (Hede f2h1 / f2h4, .986 / 3,49 г — стандарт Reichsdukatenfuß, реверс-напис <i>«I DOK KATE»</i>); <b>Rhinsk Gylden</b> (Hede f2h3 / f2h6, .77 / 3,248 г — Rhinskgyldenfod, напис <i>«I GOLT GILDEN»</i>); <b>Guldkrone з Kroneguld</b> (Hede f2h2 / f2h5, .934 / 3,341 г — цей Müntzfuß, напис <i>«I GOLT KRONE»</i>). Три лінії слугують трьом ринковим ролям: імперський торговельний резерв (Ungersk), німецько-північнонімецька торгівля (Rhinsk), дансько-королівське воєнне фінансування (Krone)."
      - key:
          de: "Mintmaster-Trias"
          en: "Mintmaster triad"
          uk: "Тріада монетмайстрів"
        value:
          de: "Wilcke 1950 Kap. 6 dokumentiert drei verantwortliche Mintmaster für die Frederik-II-Klipping-Periode<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup>: <b>Hans de Wüllers</b> (Guldsmeed, 1563), <b>Hans Köppelin</b> (Møntmester, 1564), <b>Laurits Hammer</b> (Mønthemester, Bremerholm, 1565). Karbung auf der Bremerholm-Kopenhagener Hauptmünze. Klipping-Format (rechteckige, gestanzte Münzen) ist die typische Renaissance-Notmünz-Form — schneller herstellbar als runde Stempelprägung, optimiert für Kriegszeit-Mengen."
          en: "Wilcke 1950 Kap. 6 documents three responsible mintmasters for the Frederik II Klipping period<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup>: <b>Hans de Wüllers</b> (goldsmith, 1563), <b>Hans Köppelin</b> (mint-master, 1564), <b>Laurits Hammer</b> (mint-master, Bremerholm, 1565). Coinage at the Bremerholm-Copenhagen royal mint. The Klipping format (square / rectangular die-cut coins) is the typical Renaissance emergency-money form — faster to produce than round die-struck pieces, optimised for wartime volume."
          uk: "Wilcke 1950 Kap. 6 документує трьох відповідальних монетмайстрів за період Klipping Фредеріка II<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup>: <b>Hans de Wüllers</b> (золотар, 1563), <b>Hans Köppelin</b> (монетмайстер, 1564), <b>Laurits Hammer</b> (монетмайстер, Bremerholm, 1565). Карбування на королівському монетному дворі Bremerholm-Копенгаген. Klipping-формат (квадратні / прямокутні штампові монети) — типова ренесансна форма надзвичайної монети, виготовляється швидше за круглі штемпельні екземпляри, оптимізована для воєнних обсягів."
      - key:
          de: "Verhältnis zur späteren Guldkrone-Tarifmünze (Christian IV. / Frederik III.)"
          en: "Relation to the later Guldkrone tariff coin (Christian IV / Frederik III)"
          uk: "Відношення до пізнішої Guldkrone-тарифної монети (Кристіан IV / Фредерік III)"
        value:
          de: "<b>Separater Müntzfuß-Stamm.</b> Der Frederik-II-Guldkrone-fod (1563-1564, .934 / 3,341 g rauh / 3,120 g fein) ist namensgleich, aber metrisch <em>nicht</em> identisch zur späteren Guldkrone-Tarifmünz-Familie ([fuss:guldkrone]: Christian IV 1618-1648 + Frederik III 1655-1668, .917-.934 / 5,996 g rauh / 5,498 g fein, Tarif 3½ Speciedaler). 55-jähriger Belegfenster-Hiat zwischen 1564 und 1619; metrische Diskontinuität (kleines Stück bei Frederik II. vs großes Tarif-Stück bei Christian IV.); funktionale Diskontinuität (Notmünze bei Frederik II. vs Tarif-Hauptkurant bei Frederik III.). Daher als <em>eigenständiger Müntzfuß</em> klassifiziert, nicht als Phase unter [fuss:guldkrone]."
          en: "<b>Standalone Müntzfuß lineage.</b> The Frederik-II-Guldkrone-fod (1563-1564, .934 / 3.341 g rough / 3.120 g fine) shares the name but is metrically <em>not</em> identical to the later Guldkrone tariff coin family ([fuss:guldkrone]: Christian IV 1618-1648 + Frederik III 1655-1668, .917-.934 / 5.996 g rough / 5.498 g fine, tariff 3½ Speciedaler). 55-year documented-window hiatus between 1564 and 1619; metric discontinuity (small piece under Frederik II vs large tariff piece under Christian IV); functional discontinuity (emergency coin under Frederik II vs tariff Hauptkurant under Frederik III). Therefore classified as a <em>standalone Müntzfuß</em>, not a phase under [fuss:guldkrone]."
          uk: "<b>Самостійна стопа.</b> Frederik-II-Guldkrone-fod (1563-1564, .934 / 3,341 г повної / 3,120 г чистого) має ту саму назву, але метрично <em>не</em> ідентичний пізнішій родині тарифної Guldkrone ([fuss:guldkrone]: Кристіан IV 1618-1648 + Фредерік III 1655-1668, .917-.934 / 5,996 г повної / 5,498 г чистого, тариф 3½ Speciedaler). 55-річна пауза у задокументованому вікні між 1564 і 1619; метрична розривність (мала штука за Frederik II vs велика тарифна штука за Christian IV); функційна розривність (надзвичайна монета за Frederik II vs тарифна Hauptkurant за Frederik III). Тому класифіковано як <em>самостійний Müntzfuß</em>, а не фаза під [fuss:guldkrone]."
    rechnungsfraktionen_label:
      de: "Rechnungsfraktionen (Klipping-Emission)"
      en: "Accounting fractions (Klipping emission)"
      uk: "Розрахункові фракції (Klipping-емісія)"
    rechnungsfraktionen:
      de: |
        <b>1 Guldkrone</b> = 3,341 g rauh / <b>3,120 g fein</b> Kroneguld<sup>[ref:danskmoent-1guldkrone]</sup><br>
        <b>≈ 70 Stück</b> je Cölln. Marck rauh (233,856 g) — rechnerisch aus Hede-Brutto<br>
        <b>1563 dokumentierte Karbung:</b> 4860 Guldkrone-Klippinge aus 66½ Marck Kroneguld am 17. Oktober (Wilcke Rentmeister-Rechnungen)<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup><br>
        Kein formaler Tarif zum Speciedaler in den Rentmeister-Rechnungen erfaßt; Klipping-Notmünze für die Söldnerbezahlung der Nordischen Siebenjährigen Krieges<sup>[ref:frantzen-bender-nordiske-syvaarskrig]</sup>.
      en: |-
        <b>1 Guldkrone</b> = 3.341 g rough / <b>3.120 g fine</b> Kroneguld<sup>[ref:danskmoent-1guldkrone]</sup><br><b>≈ 70 pieces</b> per Cologne mark rough (233.856 g) — computed from Hede brutto<br><b>1563 documented coinage:</b> 4,860 Guldkrone clippings from 66½ marks of Kroneguld on 17 October (Wilcke''s Rentmeister account records)<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup><br>No formal tariff to the Speciedaler recorded in the Rentmeister accounts; a Klipping emergency coin for mercenary pay during the Northern Seven Years'' War<sup>[ref:frantzen-bender-nordiske-syvaarskrig]</sup>.
      uk: |-
        <b>1 Guldkrone</b> = 3,341 г повної / <b>3,120 г чистого</b> Kroneguld<sup>[ref:danskmoent-1guldkrone]</sup><br><b>≈ 70 штук</b> з кельнської марки повної (233,856 г) — обчислено з повної ваги за Hede<br><b>Задокументоване карбування 1563:</b> 4860 Guldkrone-Klippinge з 66½ марок Kroneguld 17 жовтня (рент-майстерські рахунки Wilcke)<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup><br>Формального тарифу до Speciedaler у рент-майстерських рахунках не зафіксовано; Klipping-надзвичайна монета для оплати найманцям під час Північної Семирічної війни<sup>[ref:frantzen-bender-nordiske-syvaarskrig]</sup>.
  description:
    de: |
      <b>Frederik IIs Klipping-Goldmünze 1563-1564 als Kriegsfinanzierung
      der Nordischen Siebenjährigen Krieges</b> (1563-1570, der größten
      nationalen Krise von Frederiks II. Regierung)<sup>[ref:frantzen-bender-nordiske-syvaarskrig]</sup>.
      Hede f2h2 (1563, Unikat) und Hede f2h5 (1564)<sup>[ref:danskmoent-1guldkrone]</sup>
      sind Klipping-Stücke (rechteckige Renaissance-Notmünz-Form) aus
      <b>Kroneguld-Legierung</b> bei 934 ‰ Feingehalt, 3,341 g Brutto /
      3,120 g Feingewicht; ≈ 70 Stück je Cölln. Marck rauh (das moderne generische «Kroneguld» gilt als 22-Karat-Legierung .9167; die Hede-f2h2/f2h5-Belegexemplare attestieren spezifisch .934, ≈ 1,9 % darüber — möglicherweise Renaissance-Zeit-Variation). <b>Karbung 17. Oktober 1563:</b> Frederiks II.
      Rentmeister-Rechnungen dokumentieren verbatim «<i>17. Oktbr., af
      66 1/2 Marck Kroneguld 4,860 Krone Klippinge</i>»<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup>
      — 4860 Stück aus 66½ Marck Kroneguld. Mintmaster: Hans de Wüllers
      (Guldsmeed, 1563), Hans Köppelin (Møntmester, 1564), Laurits Hammer
      (Bremerholm, 1565); Karbung an der Bremerholm-Kopenhagener
      Hauptmünze<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup>. Reversinschrift «<i>I GOLT KRONE</i>» —
      parallel zu den Schwester-Goldarten Ungersk Gylden («<i>I DOK
      KATE</i>») und Rhinsk Gylden («<i>I GOLT GILDEN</i>»)<sup>[ref:danskmoent-1guldkrone]</sup>.
      Drei parallele Goldarten in derselben Karbungs-Periode entsprechen
      drei Markt-Bestimmungen: imperiale Handelsreserve (Reichsdukatenfuß,
      Ungersk), deutsch-norddeutscher Handel (Rhinskgyldenfod, Rhinsk),
      dänisch-königliche Kriegsfinanzierung (dieser Müntzfuß, Krone).
      <b>Eigenständiger Müntzfuß-Stamm</b>, nicht zu verwechseln mit der
      späteren Tarif-Guldkrone Christians IV. und Frederiks III.
      ([fuss:guldkrone], 1618-1668 mit eigener Tarif-Logik 3½
      Speciedaler) — 55-jähriger Belegfenster-Hiat zwischen 1564 und
      1619, metrische und funktionale Diskontinuität.
    en: |-
      <b>Frederik II''s 1563-1564 Klipping gold coinage as wartime financing of the Northern Seven Years'' War</b> (1563-1570, the greatest national crisis of Frederik II''s reign)<sup>[ref:frantzen-bender-nordiske-syvaarskrig]</sup>. Hede f2h2 (1563, unique) and Hede f2h5 (1564)<sup>[ref:danskmoent-1guldkrone]</sup> are Klipping pieces (square / rectangular Renaissance emergency-money form) struck from <b>Kroneguld alloy</b> at 934 ‰ fineness, 3.341 g rough / 3.120 g fine; ≈ 70 pieces per rough Cologne mark (the modern generic «Kroneguld» is taken as the 22-karat alloy .9167; the Hede f2h2/f2h5 reference specimens specifically attest .934, ≈ 1.9 % above — possibly Renaissance-era variation). <b>17 October 1563 coinage:</b> Frederik II''s Rentmeister account records document verbatim «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge</i>»<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup> — 4,860 pieces from 66½ marks of Kroneguld. Mintmasters: Hans de Wüllers (goldsmith, 1563), Hans Köppelin (mint-master, 1564), Laurits Hammer (Bremerholm, 1565); coinage at the Bremerholm-Copenhagen royal mint<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup>. Reverse inscription «<i>I GOLT KRONE</i>» — paralleling the sister gold types Ungersk Gylden («<i>I DOK KATE</i>») and Rhinsk Gylden («<i>I GOLT GILDEN</i>»)<sup>[ref:danskmoent-1guldkrone]</sup>. Three parallel gold types in the same coinage period serve three market roles: imperial trade reserve (Reichsdukatenfuß, Ungersk), German / northern-German trade (Rhinskgyldenfod, Rhinsk), Danish-royal wartime financing (this Müntzfuß, Krone). <b>A standalone Müntzfuß lineage</b>, not to be confused with the later tariff Guldkrone of Christian IV and Frederik III ([fuss:guldkrone], 1618-1668 with its own tariff logic 3½ Speciedaler) — 55-year documented-window hiatus between 1564 and 1619, metric and functional discontinuity.
    uk: |-
      <b>Klipping-золоте карбування Frederik II 1563-1564 як воєнне фінансування Північної Семирічної війни</b> (1563-1570, найбільшої національної кризи правління Frederik II)<sup>[ref:frantzen-bender-nordiske-syvaarskrig]</sup>. Hede f2h2 (1563, унікат) і Hede f2h5 (1564)<sup>[ref:danskmoent-1guldkrone]</sup> — Klipping-зразки (квадратна / прямокутна форма надзвичайної ренесансної монети) зі сплаву <b>Kroneguld</b> при пробі 934 ‰, 3,341 г повної / 3,120 г чистого; ≈ 70 штук з повної кельнської марки (модерне родове «Kroneguld» сьогодні розуміють як 22-каратний сплав .9167; еталонні зразки Hede f2h2/f2h5 специфічно засвідчують .934, ≈ 1,9 % над — можливо ренесансна варіація). <b>Карбування 17 жовтня 1563:</b> рент-майстерські рахунки Frederik II документують verbatim «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge</i>»<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup> — 4860 штук з 66½ марок Kroneguld. Монетмайстри: Hans de Wüllers (золотар, 1563), Hans Köppelin (монетмайстер, 1564), Laurits Hammer (Bremerholm, 1565); карбування на королівському монетному дворі Bremerholm-Копенгаген<sup>[ref:wilcke-1950-rentemesterregnskaber]</sup>. Реверс-напис «<i>I GOLT KRONE</i>» — паралельно сестринським золотим типам Ungersk Gylden («<i>I DOK KATE</i>») і Rhinsk Gylden («<i>I GOLT GILDEN</i>»)<sup>[ref:danskmoent-1guldkrone]</sup>. Три паралельні золоті типи у тому самому періоді карбування слугують трьом ринковим ролям: імперський торговельний резерв (Reichsdukatenfuß, Ungersk), німецько-північнонімецька торгівля (Rhinskgyldenfod, Rhinsk), данcько-королівське воєнне фінансування (цей Müntzfuß, Krone). <b>Самостійна стопа</b>, не плутати з пізнішою тарифною Guldkrone Кристіана IV і Фредеріка III ([fuss:guldkrone], 1618-1668 з власною тарифною логікою 3½ Speciedaler) — 55-річна пауза у задокументованому вікні між 1564 і 1619, метрична і функційна розривність.
  fractions:
    "1": {soll_rau_g: 3.341, soll_fein_g: 3.120}    # 1 Guldkrone Klipping (Hede f2h2 1563 + f2h5 1564)
  events:
    first_adoption:
      anywhere: 1563
      note: "Karbung 17. Oktober 1563 (Wilcke Rentmeister-Rechnungen Kap. 6): 66½ Marck Kroneguld → 4860 Krone-Klippinge in Kopenhagen / Bremerholm. Erste Datierung einer dänischen Klipping-Goldmünze als Kriegsfinanzierung."
    first_mint:
      anywhere: 1563
      note: "Hede f2h2 — 1 Guldkrone 1563, Unikat (Hede-Klassifikation), 3.341 g rauh / 0.934 fineness / 3.120 g fein."
    last_mint:
      anywhere: 1564
      note: "Hede f2h5 — 1 Guldkrone 1564, letzte dokumentierte Karbung. Nordischer Siebenjähriger Krieg dauert biß 1570, aber die Klipping-Goldemission setzt sich nicht über 1564 hinaus fort — vermutlich aufgrund knapper Kroneguld-Bestände bei der Krone."
    std_end:
      anywhere: 1564
      note: "Standard endet mit dem Letztkarbungs-Jahr — keine Wiederaufnahme nach 1564. Frederik II. wechselt für die restliche Kriegszeit (1565-1570) zu silbernen Klippinge-Notmünzen (Mark, Skilling, Hvid in abgesenkter Probe) und zum imperialen 9-Thaler-Fuß für Speciedaler ab 1566."
    demonetisation:
      anywhere: 1600
      approx_anywhere: true
      note: "Approximate practical-circulation tail — der enge Belegfenster-Bereich 1563-1564 und die schwache Stückzahl (4860 dokumentiert für 1563 + Unikat 1564) bedeuten, daß die Frederik-II-Guldkrone schon im späten 16. Jahrhundert ein Numismatik-Sammlerstück war, nicht im Tagesumlauf. Christian IVs neue Guldkrone-Linie 1618 läuft auf eigener metrischer + tarif-tariflicher Logik (Guldkrone-Fuß), funktional ohne Bezug auf die Frederik-II-Klipping-Emission."
    anywhere_label:
      de: Königreich Dänemark und Norwegen
      en: Royal Danish-Norwegian Realm
      uk: Королівство Данії і Норвегії
nobel_fod:
