      Cöllnischen Marck (233,856 g). Grundstandard für Goldmünzen im Heiligen
      Römischen Reich biß 1871. Feinheit 23 Karat 8 Grän.
    en: |-
      Imperial Coinage Ordinance of Augsburg, 19 Aug. 1559. 67 ducats struck from the fine Cologne mark (233.856 g). Fundamental gold standard in the Holy Roman Empire until 1871. Fineness 23 carats 8 grains.
    uk: |-
      Імперський монетний ордонанс Ауґсбургу від 19 серпня 1559 р. 67 дукатів з чистої кельнської марки (233,856 г). Фундаментальний золотий стандарт Священної Римської імперії до 1871 р. Проба 23 карати 8 гран.
  fractions:
    "1": {soll_rau_g: 3.49039, soll_fein_g: 3.44191}
    "1/2": {soll_rau_g: 1.74520, soll_fein_g: 1.72096}
    "1/4": {soll_rau_g: 0.87260, soll_fein_g: 0.86048}
    "2": {soll_rau_g: 6.98078, soll_fein_g: 6.88382}
    "3/2": {soll_rau_g: 5.23559, soll_fein_g: 5.16287}
    "5": {soll_rau_g: 17.45196, soll_fein_g: 17.20955}
    "10": {soll_rau_g: 34.90392, soll_fein_g: 34.41910}
  events:
    first_adoption:
      anywhere: 1559
      holstein: 1559
      note: Reichsmünzordnung Augsburg 19. Aug 1559; HRR-wide adoption applied to all Holstein duchies.
    first_mint:
      anywhere: 1559
      holstein: 1640
      approx_holstein: true
      note: anywhere = first imperial dukaten under the 1559 ordinance. H first-mint ≈ 1640 = first Glückstadt-Tönning Dukaten under Frederik III.
    last_mint:
      anywhere: 1871
      holstein: 1802
      note: anywhere = last German Reichsdukaten before Reichsmünzgesetz. H last-mint 1802 = KM#650 Christian VII Altona-Dukat 1791-1802. The Glückstadt mint operated until 1812 but no later Reichsdukatenfuß-Dukat is documented from a Holstein mint.
    std_end:
      anywhere: 1871
      holstein: 1871
      note: Reichsmünzgesetz 4. Dec 1871 superseded the Dukatenfuß Reich-wide; Holstein, as part of the Empire, exits the standard at the same date — no separate Holstein-specific reform.
    demonetisation:
      anywhere: 1871
      holstein: 1871
      note: Reichsmünzgesetz aftermath. Austrian restrike-Dukaten dated 1915 are out-of-system.

    anywhere_label:
      de: Heiliges Römisches Reich + dänisch-norwegischer Verbund + Schweden
      en: Holy Roman Empire + Danish-Norwegian union + Sweden
      uk: Священна Римська імперія + дансько-норвезький союз + Швеція
