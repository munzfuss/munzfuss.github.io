  # Christian IV's kroner — primärkanonische Hede-Formel (Wilcke I p. 152, NNUM 1957):
  # 12 257/700 Stück je 13¾-lötiger Marck (.859) = 18,909 g rau / 16,250 g fein je Krone.
  # Anwendungszeitraum: 1618 (nur 2 Krone) bzw. 1619-1652 (alle Werte).
  # grid_stops = 233,856 ÷ 16,250 = 14,391 (Stück pro Marck Feinsilber).
  grid_stops: 14.391
  fineness_standard: 0.859375
  fineness_display: "≈ 859 ‰ (13¾ Loth = ⁵⁵⁄₆₄)"
  grundwerte:
    heading:
      de: "Grundwerte · Christian IVs kroner (1618–1652)"
      en: "Base values · Christian IV's kroner (1618–1652)"
      uk: "Базові значення · Christian IV's kroner (1618–1652)"
    subheading:
      de: "Cöllnische Marck (Raulegierung) = 233,856 g · Hede-Formel: <b>12 ²⁵⁷⁄₇₀₀ Stück je 13¾-lötiger Marck</b> = 18,909 g rau bei .859 Feingehalt = <b>16,250 g fein je Krone</b> (Wilcke I p. 152)"
      en: "Cologne mark (raw alloy) = 233.856 g · Hede formula: <b>12 ²⁵⁷⁄₇₀₀ pieces per 13¾-lødig mark</b> = 18.909 g rough at .859 fineness = <b>16.250 g fine per Krone</b> (Wilcke I p. 152)"
      uk: "Кельнська марка (сплав, rau) = 233,856 г · Hede-формула: <b>12 ²⁵⁷⁄₇₀₀ штук з 13¾-lødig марки</b> = 18,909 г повної ваги за проби .859 = <b>16,250 г чистого на Krone</b> (Wilcke I с. 152)"
    badge:
      de: "Müntzfuß · Tarifmünze"
      en: "Müntzfuß · Tariff coin"
      uk: "Стопа · тарифна монета"
    rows:
      - key:
          de: "Münzfuß-Formel (Hede / Wilcke I p. 152)"
          en: "Münzfuß formula (Hede / Wilcke I p. 152)"
          uk: "Формула стопи (Hede / Wilcke I с. 152)"
        value:
          de: "<b>12 ²⁵⁷⁄₇₀₀ Krone (≈ 12,367) je Cöllnische Marck Raulegierung von 13¾ Loth</b> · 18,909 g rau je Krone · 37,819 g rau je Doppelkrone (Corona Danica) · 9,455 g rau je ½ Krone · belegte Hede-Werte aus dem Schou-Katalog (H105, H106, H107, H124, H125, H126)<sup><a href=\"#ref23\">[23]</a></sup>"
          en: "<b>12 ²⁵⁷⁄₇₀₀ Krone (≈ 12.367) per Cologne mark of raw alloy at 13¾ Loth</b> · 18.909 g rough per Krone · 37.819 g rough per Doppelkrone (Corona Danica) · 9.455 g rough per ½ Krone · catalogue values per Hede / Schou (H105, H106, H107, H124, H125, H126)<sup><a href=\"#ref23\">[23]</a></sup>"
          uk: "<b>12 ²⁵⁷⁄₇₀₀ Krone (≈ 12,367) з кельнської марки сплаву проби 13¾ Loth</b> · 18,909 г повної ваги на Krone · 37,819 г на Doppelkrone (Corona Danica) · 9,455 г на ½ Krone · документовані значення за Hede / Schou (H105, H106, H107, H124, H125, H126)<sup><a href=\"#ref23\">[23]</a></sup>"
      - key:
          de: "Feingehalt"
          en: "Fineness"
          uk: "Проба"
        value:
          de: "<b>13¾ Loth = ⁵⁵⁄₆₄ = .8594</b> (Hede / Schou: .859) — direkt aus der Hede-Formel «12 ²⁵⁷⁄₇₀₀ Stück je 13¾-lötiger Marck»<sup><a href=\"#ref23\">[23]</a></sup>"
          en: "<b>13¾ Loth = ⁵⁵⁄₆₄ = .8594</b> (Hede / Schou: .859) — directly from the Hede formula «12 ²⁵⁷⁄₇₀₀ pieces per 13¾-lødig mark»<sup><a href=\"#ref23\">[23]</a></sup>"
          uk: "<b>13¾ Loth = ⁵⁵⁄₆₄ = .8594</b> (Hede / Schou: .859) — прямо з Hede-формули «12 ²⁵⁷⁄₇₀₀ штук з 13¾-lødig марки»<sup><a href=\"#ref23\">[23]</a></sup>"
      - key:
          de: "Feingewicht (Hede)"
          en: "Fine weight (Hede)"
          uk: "Чиста вага (Hede)"
        value:
          de: "<b>16,250 g fein je Krone</b> · 32,500 g fein je Doppelkrone · 8,125 g fein je ½ Krone · 4,0625 g fein je ¼ Krone — direkt aus dem Schou-Katalog (Wikipedia und Schrötter <i>Wörterbuch der Münzkunde</i> 1930 zitieren dieselben 32,5 g für die Doppelkrone)<sup><a href=\"#ref21\">[21]</a><a href=\"#ref22\">[22]</a><a href=\"#ref23\">[23]</a></sup>"
          en: "<b>16.250 g fine per Krone</b> · 32.500 g fine per Doppelkrone · 8.125 g fine per ½ Krone · 4.0625 g fine per ¼ Krone — taken directly from the Schou catalogue (Wikipedia and Schrötter, <i>Wörterbuch der Münzkunde</i> 1930, cite the same 32.5 g for the Doppelkrone)<sup><a href=\"#ref21\">[21]</a><a href=\"#ref22\">[22]</a><a href=\"#ref23\">[23]</a></sup>"
          uk: "<b>16,250 г чистого на Krone</b> · 32,500 г чистого на Doppelkrone · 8,125 г на ½ Krone · 4,0625 г на ¼ Krone — прямі значення зі Schou-каталогу (Wikipedia та Schrötter <i>Wörterbuch der Münzkunde</i> 1930 цитують ті самі 32,5 г для Doppelkrone)<sup><a href=\"#ref21\">[21]</a><a href=\"#ref22\">[22]</a><a href=\"#ref23\">[23]</a></sup>"
      - key:
          de: "Müntzfuß nach Feinsilber (abgeleitet)"
          en: "Müntzfuß by fine silver (derived)"
          uk: "Стопа за чистим сріблом (похідна)"
        value:
          de: "<b>≈ 14,391 Krone je Cöllnische Marck Feinsilber</b> (= 233,856 ÷ 16,250) · kein einfacher kanonischer Bruch — die ungewöhnliche Form <b>12 ²⁵⁷⁄₇₀₀</b> je Raumarck deutet darauf hin, daß der Münzedikt 1618 den Fuß über die Daler-Ausbringung definierte und nicht über eine glatte Stück-Zahl"
          en: "<b>≈ 14.391 Krone per Cologne mark of fine silver</b> (= 233.856 ÷ 16.250) · not a clean canonical fraction — the unusual form <b>12 ²⁵⁷⁄₇₀₀</b> per raw mark suggests that the 1618 mint edict defined the standard via the daler-udbringning rather than via a round piece count"
          uk: "<b>≈ 14,391 Krone з кельнської марки чистого срібла</b> (= 233,856 ÷ 16,250) · це не «красивий» канонічний дріб — незвична форма <b>12 ²⁵⁷⁄₇₀₀</b> з повної марки вказує на те, що едикт 1618 р. задавав стопу через daler-udbringning, а не через круглу кількість штук"
      - key:
          de: "Daler-Ausbringung (Marken fin udbragt til X daler)"
          en: "Daler udbringning (Marken fin udbragt til X daler)"
          uk: "Daler-udbringning (Marken fin udbragt til X daler)"
        value:
          de: "<em>«Marken fin udbragt til X daler»</em> = «aus 1 Marck Feinsilber wurden Krone-Münzen im Nennwert von X Daler ausgeprägt» — die <b>finanzielle Ausbringung</b> einer Feinmarck Silber bei dem damals geltenden Tarif. Es ist die period-korrekte dänische Definition des Münzfußes: nicht über eine runde Stückzahl, sondern über die Daler-Ausbringung.<br><br><b>1618 (Anfangstarif 1½ Specie/Doppelkrone, Hede H105):</b> 1 Marck fein → 10,793 Daler in Kronen (= 14,391 Krone × ¾ Specie/Krone)<br>· <b>1624 (Forordning 14. Februar 1624, Specie auf 100 Skilling neu tarifiert, Hede H124):</b> 1 Marck fein → 10,361 Daler in Kronen<br>· <em>identische physische Münze (37,819 g rau, 32,500 g fein); die Daler-Ausbringung sinkt nur, weil der Specie selbst aufgewertet wurde — nicht weil sich die Krone änderte</em><sup><a href=\"#ref23\">[23]</a></sup>"
          en: "<em>«Marken fin udbragt til X daler»</em> = «one fine mark of silver was struck into Krone coin of face value X daler» — the <b>financial output</b> of one fine Cologne mark of silver at the prevailing tariff. This is the period-correct Danish definition of the Münzfuß: not via a round piece count, but via the daler-udbringning.<br><br><b>1618 (initial 1½ Specie/Doppelkrone tariff, Hede H105):</b> 1 fine mark → 10.793 daler in kroner (= 14.391 Krone × ¾ Specie/Krone)<br>· <b>1624 (Forordning 14 February 1624, Specie re-rated to 100 skilling, Hede H124):</b> 1 fine mark → 10.361 daler in kroner<br>· <em>same physical coin (37.819 g rough, 32.500 g fine); the daler output falls only because the Specie itself was re-rated, not because the Krone changed</em><sup><a href=\"#ref23\">[23]</a></sup>"
          uk: "<em>«Marken fin udbragt til X daler»</em> = «з 1 марки чистого срібла викарбувано Krone-монет на номінальну суму X даллерів» — це <b>фінансовий вихід</b> однієї марки чистого срібла за чинним тарифом. Це період-коректне данське означення Münzfuß: не через круглу кількість штук, а через daler-udbringning.<br><br><b>1618 (початковий тариф 1½ Specie/Doppelkrone, Hede H105):</b> 1 марка чистого → 10,793 даллерів у Кронах (= 14,391 Krone × ¾ Specie/Krone)<br>· <b>1624 (forordning 14 лютого 1624 р., Specie перетарифовано на 100 skilling, Hede H124):</b> 1 марка чистого → 10,361 даллерів у Кронах<br>· <em>фізично та сама монета (37,819 г повної ваги, 32,500 г чистого); daler-вихід падає лише через перетарифування самого Specie, а не через зміну Krone</em><sup><a href=\"#ref23\">[23]</a></sup>"
      - key:
          de: "Tarifhistorie und Specie-Äquivalent (königliche Verordnung)"
          en: "Tariff history and Specie equivalent (royal decree)"
          uk: "Історія тарифу та Specie-еквівалент (королівський декрет)"
        value:
          de: "<b>1618</b> (Corona Danica): 1 Krone = <b>1½ Reichstaler</b> = <b>96 Kroneskilling</b> → 14,391 × 1½ ≈ <b>21,6 Specie-Nominale je Marck Feinsilber</b> (übermäßiger Aufschlag — Anlaß für den Kaufmannsprotest)<br>· <b>1625</b> (offizielle Tarifsenkung): 1 Krone = <b>1⅓ Reichstaler</b> → 14,391 × 1⅓ ≈ <b>19,2 Specie-Nominale je Marck</b> · Münzgewinn der Krone bei der Reduktion ca. 11 %<sup><a href=\"#ref21\">[21]</a><a href=\"#ref22\">[22]</a></sup>"
          en: "<b>1618</b> (Corona Danica): 1 Krone = <b>1½ Reichstaler</b> = <b>96 Kroneskilling</b> → 14.391 × 1½ ≈ <b>21.6 Specie nominals per Mark of fine silver</b> (excessive premium — trigger for the merchant protest)<br>· <b>1625</b> (official tariff reduction): 1 Krone = <b>1⅓ Reichstaler</b> → 14.391 × 1⅓ ≈ <b>19.2 Specie nominals per Mark</b> · the Crown's mint gain on the reduction was about 11 %<sup><a href=\"#ref21\">[21]</a><a href=\"#ref22\">[22]</a></sup>"
          uk: "<b>1618</b> (Corona Danica): 1 Krone = <b>1½ Рейхсталер</b> = <b>96 Kroneskilling</b> → 14,391 × 1½ ≈ <b>21,6 Specie-номіналів з марки чистого срібла</b> (надмірна надбавка — поштовх до купецького протесту)<br>· <b>1625</b> (офіційна тарифна редукція): 1 Krone = <b>1⅓ Рейхсталера</b> → 14,391 × 1⅓ ≈ <b>19,2 Specie-номіналів з марки</b> · монетний прибуток Корони від редукції ~11 %<sup><a href=\"#ref21\">[21]</a><a href=\"#ref22\">[22]</a></sup>"
    rechnungsfraktionen_label:
      de: Rechnungsfraktionen (Krone-Tarif-Theilung)
      en: Accounting fractions (Krone-tariff subdivision)
      uk: Розрахункові фракції (поділ за Krone-тарифом)
    rechnungsfraktionen:
      de: <b>1 Krone</b> = <b>16,250 g</b> Feinsilber = <b>1½ Reichstaler</b> (1618–1624) bzw. <b>1⅓ Reichstaler</b> (ab 1625) = <b>4 Marck Danske</b> = <b>96 Kroneskilling</b><br><b>2 Krone</b> (Doppelkrone, Corona Danica) = <b>32,500 g</b> fein, 37,819 g rau (Hede H105, H124 — KM# 60, 61, 99)<br><b>½ Krone</b> = <b>8,125 g</b> fein, 9,455 g rau = 48 Kroneskilling = 2 Marck Danske (Hede H107, H126 — KM# 58, 58a, 94, 95)<br><b>¼ Krone</b> = <b>4,0625 g</b> fein = 24 Kroneskilling = 1 Marck Danske (KM# 57; Wilcke I p. 152 — 1618 etwas niedrigere Münzfod als die Hauptformel, exakte Werte aus Wilcke nachzutragen)<br><br><b>Kroneskilling-Subeinheit</b> (1619–1621, eigene Prägungen):<br>· <b>1 Kroneskilling</b> = 1/96 Krone (Tarif) — KM# 65 (N#109264)<br>· <b>2 Kroneskilling</b> = 1/48 Krone (Tarif) — KM# 68 (N#142850)<br>· <b>4 Kroneskilling</b> = 1/24 Krone (Tarif) — KM# 70 (Typ I), KM# 81 (Typ II)<br>· <b>8 Kroneskilling</b> = 1/12 Krone (Tarif) — KM# 82 (Typ II)<br><br><em><b>Hinweis:</b> Die Kroneskillinge folgen demselben Feingehalt .859 wie die Krone selbst und sind tarifäre Subeinheiten der Christian-IVs-kroner-Müntzformel (siehe Tabelle unten). Empirisch tragen sie pro Stück bis ~2× mehr Feinsilber, als der strikte 1/96-Krone-Müntzfuß vorschreibt — typisch für Kleinmünzen, deren Nutzbarkeit im Alltagsumlauf einen Mindestsilbergehalt erfordert. Tarif-Theilungsverhältnis 1:96 bleibt nominell, der Silberanteil pro Kroneskilling weicht positiv davon ab.</em><br><br><em>Nicht zu verwechseln mit Skilling Lybsk (1/48 Reichsthaler im 9-Fuß) oder Skilling Dansk (1/96 Speciedaler im 9¼-Fuß) — Kroneskilling ist eine eigenständige Subeinheit speziell der Corona-Danica-Tarifmünze.</em>
      en: <b>1 Krone</b> = <b>16.250 g</b> fine silver = <b>1½ Reichstaler</b> (1618–1624) or <b>1⅓ Reichstaler</b> (from 1625) = <b>4 Marck Danske</b> = <b>96 Kroneskilling</b><br><b>2 Krone</b> (Doppelkrone, Corona Danica) = <b>32.500 g</b> fine, 37.819 g rough (Hede H105, H124 — KM# 60, 61, 99)<br><b>½ Krone</b> = <b>8.125 g</b> fine, 9.455 g rough = 48 Kroneskilling = 2 Marck Danske (Hede H107, H126 — KM# 58, 58a, 94, 95)<br><b>¼ Krone</b> = <b>4.0625 g</b> fine = 24 Kroneskilling = 1 Marck Danske (KM# 57; Wilcke I p. 152 — a slightly lower Münzfod than the main formula was used in 1618; exact values to be added from Wilcke)<br><br><b>Kroneskilling subunit</b> (separate strikes 1619–1621):<br>· <b>1 Kroneskilling</b> = 1/96 Krone (tariff) — KM# 65 (N#109264)<br>· <b>2 Kroneskilling</b> = 1/48 Krone (tariff) — KM# 68 (N#142850)<br>· <b>4 Kroneskilling</b> = 1/24 Krone (tariff) — KM# 70 (Type I), KM# 81 (Type II)<br>· <b>8 Kroneskilling</b> = 1/12 Krone (tariff) — KM# 82 (Type II)<br><br><em><b>Note:</b> The Kroneskillinge follow the same fineness .859 as the Krone itself and are tariff subunits of the Christian IV's kroner standard (see table below). Empirically they carry up to ~2× more fine silver per piece than the strict 1/96 Krone standard would prescribe — typical for petty coins whose everyday usability requires a minimum silver content. The 1:96 tariff subdivision remains nominal; the silver share per Kroneskilling deviates positively from it.</em><br><br><em>Not to be confused with Skilling Lybsk (1/48 Reichsthaler in the 9-Fuß) or Skilling Dansk (1/96 Speciedaler in the 9¼-Fuß) — Kroneskilling is an independent subunit specific to the Corona Danica tariff coinage.</em>
      uk: <b>1 Krone</b> = <b>16,250 г</b> чистого срібла = <b>1½ Рейхсталер</b> (1618–1624) або <b>1⅓ Рейхсталер</b> (з 1625) = <b>4 Marck Danske</b> = <b>96 Kroneskilling</b><br><b>2 Krone</b> (Doppelkrone, Corona Danica) = <b>32,500 г</b> чистого, 37,819 г повної ваги (Hede H105, H124 — KM# 60, 61, 99)<br><b>½ Krone</b> = <b>8,125 г</b> чистого, 9,455 г повної ваги = 48 Kroneskilling = 2 Marck Danske (Hede H107, H126 — KM# 58, 58a, 94, 95)<br><b>¼ Krone</b> = <b>4,0625 г</b> чистого = 24 Kroneskilling = 1 Marck Danske (KM# 57; Wilcke I с. 152 — 1618 р. застосовувалась дещо нижча møntfod; точні значення треба підняти з Wilcke)<br><br><b>Kroneskilling-субодиниця</b> (окремі карбування 1619–1621):<br>· <b>1 Kroneskilling</b> = 1/96 Krone (тариф) — KM# 65 (N#109264)<br>· <b>2 Kroneskilling</b> = 1/48 Krone (тариф) — KM# 68 (N#142850)<br>· <b>4 Kroneskilling</b> = 1/24 Krone (тариф) — KM# 70 (Тип I), KM# 81 (Тип II)<br>· <b>8 Kroneskilling</b> = 1/12 Krone (тариф) — KM# 82 (Тип II)<br><br><em><b>Зауваження:</b> Kroneskilling-и тримають ту саму пробу .859, що й сама Krone, і є тарифними субодиницями стопи Christian IV's kroner (див. таблицю нижче). Емпірично вони несуть на штуку до ~2× більше чистого срібла, ніж передбачає строга 1/96-Krone-стопа — типова риса дрібних монет, для яких мінімальний срібний вміст потрібен для повсякденної придатності. Тарифне співвідношення поділу 1:96 залишається номінальним; срібна частка на Kroneskilling відхиляється від нього в плюс.</em><br><br><em>Не плутати зі Skilling Lybsk (1/48 Reichsthaler у 9-Fuß) чи Skilling Dansk (1/96 Speciedaler у 9¼-Fuß) — Kroneskilling це самостійна субодиниця, специфічна саме для тарифної монети Corona Danica.</em>
  fractions:
    # Hede-Schou primary catalogue values (H105/H106/H107 + H124/H125/H126).
    # Wikipedia and Schrötter 1930 (Wörterbuch der Münzkunde, p. 113-114) cite
    # the same 32,5 g fine for the Doppelkrone (Corona Danica).
    "2": {soll_fein_g: 32.500}       # 2 Krone / Doppelkrone (Hede H105, H124)
    "1": {soll_fein_g: 16.250}       # 1 Krone (Hede H106, H125)
    "1/2": {soll_fein_g: 8.125}      # ½ Krone (Hede H107, H126)
    "1/4": {soll_fein_g: 4.0625}     # ¼ Krone (1618 only; per Wilcke I p. 152
                                     # the 1618 sub-Krone denominations were
                                     # struck on a slightly worse Münzfod —
                                     # exact values to be added from Wilcke)

    # Kroneskilling subdivisions: nominal 1/96 of the Krone tariff. Empirical
    # Kroneskillinge carry up to ~2× more fine silver than these targets.
    1/96:
      soll_fein_g: 0.16927           # 16.250 ÷ 96
    1/48:
      soll_fein_g: 0.33854           # 16.250 ÷ 48
    1/24:
      soll_fein_g: 0.67708           # 16.250 ÷ 24
    1/12:
      soll_fein_g: 1.35417           # 16.250 ÷ 12
