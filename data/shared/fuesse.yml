# Global Münzfuß (coinage standard) definitions.
#
# These are universal mathematical constructs, not location-specific.
# A Müntzfuß is defined by: grid_unit_g / grid_stops = soll_fein_g per 1-unit coin.
#
# Each fraction specifies the Feingewicht (and for gold, Raugewicht) expected
# for that denominational fraction, computed from the standard.
#
# Locations reference these by `id`. Multiple locations can share the same fuss;
# each applies it during its own chronological phases.

reichsdukatenfuss:
  name:
    de: Reichsdukatenfuß
    en: Reichsdukatenfuß
    uk: Reichsdukatenfuß
  metal: gold
  grid_unit_g: 233.856    # Cöllnische Marck, Feingold
  grid_stops: 67          # 67 Dukaten aus der feinen Marck
  fineness_standard: 0.98611111    # 23 Karat 8 Grän = 284/288
  fineness_display: "986 1/9 ‰ (23 Karat 8 Grän = 284/288)"
  grundwerte:
    heading:
      de: "Grundwerte · Dukatenfuß"
      en: "Base values · Ducat standard"
      uk: "Базові значення · дукатний стандарт"
    subheading:
      de: "Cöllnische Marck = 233,856 g Feingold · seit Reichsmünzordnung 1559 · 67 Dukaten aus der feinen Cöllnischen Marck"
      en: "Cologne Mark = 233.856 g fine gold · since the Imperial Ordinance of 1559 · 67 ducats from one fine Cologne Mark"
      uk: "Кельнська марка = 233,856 г чистого золота · від імперського ордонансу 1559 · 67 дукатів із чистої кельнської марки"
    badge:
      de: "Müntzfuß · Gold"
      en: "Müntzfuß · Gold"
      uk: "Стопа · золото"
    rows:
      - key:
          de: "Feingewicht Dukat"
          en: "Fine weight, ducat"
          uk: "Чиста вага дуката"
        value:
          de: "<b>3,44191 g</b> Feingold (= 233,856 × 284/288 / 67)"
          en: "<b>3.44191 g</b> fine gold (= 233.856 × 284/288 / 67)"
          uk: "<b>3,44191 г</b> чистого золота (= 233,856 × 284/288 / 67)"
      - key:
          de: "Raugewicht"
          en: "Rough weight"
          uk: "Повна вага"
        value:
          de: "3,49039 g (= 233,856 / 67) · 986 1/9 ‰ (= 23 Karat 8 Grän)"
          en: "3.49039 g (= 233.856 / 67) · 986 1/9‰ (= 23 carats 8 grains)"
          uk: "3,49039 г (= 233,856 / 67) · 986 1/9 ‰ (= 23 карати 8 гран)"
      - key:
          de: "Handelskurs"
          en: "Trade rate"
          uk: "Торговий курс"
        value:
          de: "Kein festes Silberverhältnis; Marktkurs zu Thaler Species ca. 2,0–2,5 im 18. Jh."
          en: "No fixed silver ratio; market rate to Thaler Species roughly 2.0–2.5 throughout the 18th century."
          uk: "Жорсткого срібного співвідношення немає; ринковий курс до Thaler Species у XVIII ст. ≈ 2,0–2,5."
      - key:
          de: "Verbreitung"
          en: "Geographic reach"
          uk: "Поширення"
        value:
          de: "Universale Handelsmünze im Norden und Ostseeraum · gemeinsamer Goldstandard HRRDN + dän.-norw. Verbund + Schweden"
          en: "Universal trade coin across the North and Baltic Sea region · common gold standard of the Holy Roman Empire + the Danish-Norwegian union + Sweden"
          uk: "Універсальна торгова монета північного й балтійського регіону · спільний золотий стандарт Священної Римської імперії + дансько-норвезького союзу + Швеції"
    rechnungsfraktionen_label:
      de: "Rechnungs- und Kursbindungen"
      en: "Accounting and exchange links"
      uk: "Розрахункові та курсові звʼязки"
    rechnungsfraktionen:
      de: |
        <b>1 Dukat</b> = <b>3,44191 g</b> Feingold · kein festes Silberäquivalent<br>
        <b>Kurs in Holstein 1790er:</b> 1 Dukat ≈ 2½ Thaler Species = 150 Schilling Courant (Marktkurs)<br>
        <b>Courantdukat (Altona ab 1771):</b> Dukat mit festem Kurs von 2½ Rigsdaler Courant (= ca. 12½ Marck Danske)<br>
        <em>Als Handelsgold zirkulierten in Holstein auch niederländische, venezianische, ungarische und türkische Dukaten desselben Fußes nach Silbergehalt.</em>
      en: |-
        <b>1 Dukat</b> = <b>3.44191 g</b> fine gold · no fixed silver equivalent<br> <b>Rate in Holstein, 1790s:</b> 1 Dukat ≈ 2½ Thaler Species = 150 Schilling Courant (market rate)<br> <b>Courantdukat (Altona, from 1771):</b> ducat with a fixed rate of 2½ Rigsdaler Courant (≈ 12½ Marck Danske)<br> <em>As trade gold, Dutch, Venetian, Hungarian and Turkish ducats of the same standard also circulated in Holstein, accepted by silver content.</em>
      uk: |-
        <b>1 дукат</b> = <b>3,44191 г</b> чистого золота · фіксованого срібного еквівалента немає<br> <b>Курс у Гольштейні 1790-х:</b> 1 дукат ≈ 2½ Thaler Species = 150 Schilling Courant (ринковий курс)<br> <b>Courantdukat (Альтона, з 1771):</b> дукат із фіксованим курсом 2½ Rigsdaler Courant (≈ 12½ Marck Danske)<br> <em>Як торгове золото в Гольштейні перебували в обігу також нідерландські, венеційські, угорські й турецькі дукати тієї самої стопи — приймались за вмістом срібла.</em>
  description:
    de: |
      Augspurgische Reichsmünzordnung 19. Aug. 1559 · 67 Dukaten aus der feinen
      Cöllnischen Marck (233,856 g). Grundstandard für Goldmünzen im Heiligen
      Römischen Reich biß 1871. Feinheit 23 Karat 8 Grän.
    en: |-
      Imperial Coinage Ordinance of Augsburg, 19 Aug. 1559. 67 ducats struck from the fine Cologne mark (233.856 g). Fundamental gold standard in the Holy Roman Empire until 1871. Fineness 23 carats 8 grains.
    uk: |-
      Імперський монетний ордонанс Ауґсбургу від 19 серпня 1559 р. 67 дукатів з чистої кельнської марки (233,856 г). Фундаментальний золотий стандарт Священної Римської імперії до 1871 р. Проба 23 карати 8 гран.
  fractions:
    "1": {soll_rau_g: 3.49039, soll_fein_g: 3.44191}
    "1/2": {soll_rau_g: 1.74520, soll_fein_g: 1.72096}
    "1/4": {soll_rau_g: 0.87260, soll_fein_g: 0.86048}
    "2": {soll_rau_g: 6.98078, soll_fein_g: 6.88382}
    "3/2": {soll_rau_g: 5.23559, soll_fein_g: 5.16287}
    "5": {soll_rau_g: 17.45196, soll_fein_g: 17.20955}
    "10": {soll_rau_g: 34.90392, soll_fein_g: 34.41910}

