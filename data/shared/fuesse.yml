        <em>Die Mark wurde nicht physisch in Gold geprägt; die kleinste Gold-Stückelung ist die 5 Mark. 1, 2 und 5 Mark wurden ab 1873 als Silbermünzen ausgeprägt; ½ Mark, 50, 25, 20, 10, 5, 2, 1 Pfennig in Silber/Billon/Kupfer.</em>
