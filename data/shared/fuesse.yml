    rechnungsfraktionen:
      de: |
        <b>1 Daler</b> = <b>3 Mark</b> = <b>24 Skilling</b> = 288 Penning (Wilcke 1950 Kap. 7-4)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br>
        <b>1 Daler</b> = <b>26,494 g</b> Feinsilber (Phase A1, 1541-1543) bzw. <b>24,67 g</b> (Phase A2, 1544-1555 nach Tillæg 27. September 1544)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br>
        <b>1 Mark</b> = <b>8,830 g</b> Feinsilber (Phase A1) · <b>8 Skilling</b> = <b>4,415 g</b> · <b>4 Skilling</b> = <b>2,208 g</b><br>
        <em>Reichsmünzordnung 1559 (Imperial 9-Fuß): zum Vergleich 9 Reichsthaler aus der Cölln. Marck fein @ 14 Lod 4 Grän (888,8 ‰) ⇒ 25,983 g fein je Reichsthaler. 8-Daler-Fod liegt mit 26,494 g (A1) bzw. 24,67 g (A2) als regional gehaltene Norm <em>vor</em> der imperialen Standardisierung 1559.</em>
      en: |-
        <b>1 Daler</b> = <b>3 Mark</b> = <b>24 Skilling</b> = 288 Penning (Wilcke 1950 Kap. 7-4)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br><b>1 Daler</b> = <b>26.494 g</b> fine silver (Phase A1, 1541-1543) or <b>24.67 g</b> (Phase A2, 1544-1555 after the 27 September 1544 supplement)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br><b>1 Mark</b> = <b>8.830 g</b> fine silver (Phase A1) · <b>8 Skilling</b> = <b>4.415 g</b> · <b>4 Skilling</b> = <b>2.208 g</b><br><em>Imperial Münzordnung of 1559 (9-Fuß): for comparison, 9 Reichsthaler per Cologne mark fine at 14 Lod 4 Grän (888.8 ‰) ⇒ 25.983 g fine per Reichsthaler. 8-Daler-Fod at 26.494 g (A1) or 24.67 g (A2) is the regional standard <em>preceding</em> the imperial standardisation of 1559.</em>
      uk: |-
        <b>1 Daler</b> = <b>3 Mark</b> = <b>24 Skilling</b> = 288 Penning (Wilcke 1950 Kap. 7-4)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br><b>1 Daler</b> = <b>26,494 г</b> чистого срібла (фаза A1, 1541-1543) або <b>24,67 г</b> (фаза A2, 1544-1555 після Tillæg 27 вересня 1544)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br><b>1 Mark</b> = <b>8,830 г</b> чистого срібла (фаза A1) · <b>8 Skilling</b> = <b>4,415 г</b> · <b>4 Skilling</b> = <b>2,208 г</b><br><em>Reichsmünzordnung 1559 (імперський 9-Fuß): для порівняння 9 Reichsthaler з кельнської марки чистого срібла за 14 Lod 4 Grän (888,8 ‰) ⇒ 25,983 г чистого на Reichsthaler. 8-Daler-Fod при 26,494 г (A1) або 24,67 г (A2) — регіональний стандарт <em>до</em> імперської стандартизації 1559.</em>
  description:
    de: |
      <b>Erste systematische Müntzfuß-Norm des dänisch-norwegischen
      Reichs nach der Reformation</b>, formal kodifiziert durch die
      <b>Møntordning vom 20. September 1541</b> Christians III.<sup>[ref:wilcke-1950-renaissance-moent]</sup>,
      aber metrisch bereits <em>de facto</em> etabliert durch die
      Joachimsdaler-Karbung Reynold Junges 1537 in Kopenhagen — vier
      Jahre vor der formalen Verordnung. Die Møntordning legt acht
      Daler aus einer Cölln. Marck fein bei 14½ Lod (906¼ ‰,
      period-attestiert «Hallffemtandeskab Lod») Probe
      fest — entspricht Marken-fin <b>mf 8,827</b> bzw. <b>26,494 g
      fein</b> je Daler. Drei-stufige Stückelung: vollwertige
      Kurantmünze (Daler / Mark / 8 Skilling / 4 Skilling) @ 14½ Lod,
      abgesenkte Scheidemünze (1 Skilling) @ 4 Lod (250 ‰), Billon
      (Hvid 4 Lod, Penning 2 Lod). Der 3,6-fache Feingehaltsabfall zwischen 4 Skilling Kurant und Hvid Scheide markiert den Übergang von vollwertiger Müntze zu Sub-Mark-Token mit Tariffung über dem Metallwert. <b>Phase 0 (1534-1540) — de-facto-
      Etablierung</b>: Notmünz-Kaskade der Grevens Fejde (Aarhus +
      Roskilde + Stockholm + Ribe Klippinge bei 10/8/7 Lod, 5/4/3½
      Lod, 3/2½ Lod — typische Kriegszeit-Tier-Debasierung) + 1537
      Joachimsdaler 14½-Lod-Anker (Kopenhagen, Wilcke 1950 Kap. 7-3
      S. 242 verbatim «die 1537 Karbung etabliert das 14½-Lod-Daler-
      Standard») unter Mzm. Reynold Junge<sup>[ref:wilcke-1950-renaissance-moent]</sup>. <b>Phase A1
      (1541-1543) — de-jure-Kodifikation</b>: zentralisierte Karbung
      im Kopenhagener Klarekloster unter neuem Mzm. Povel Fechtel
      (Junge nach Aufdeckung als Betrüger 1541 entlassen, Wilcke 7-4
      S. 116). <b>Phase A2 (1544-1555) — Tillæg-Debasierung</b>: am
      27. September 1544 hebt ein Tillæg den Marken-fin auf 9,481
      (≈ 24,67 g fein je Daler) an; Feingehalt unverändert 14½ Lod,
      Raugewicht reduziert. Norwegische Münzanstalt zu Trondheim
      folgt ab 1546 demselben Standard (Møntordning af 3. August
      1514 erweitert auf das Norge-Reich). Standard endet faktisch
      mit der <b>Reichsmünzordnung 1559</b> + Frederik IIs Adoption
      des imperialen 9-Fuß ab 1566; Christian-III-Daler zirkulieren
      neben Reichsthalern biß zur Münzconvention 1566. Die Flensborger
      Sub-Mark- und 14¼-Lod-Daler-Linie ab 1547 trägt einen
      <em>eigenen Müntzfuß</em> ([fuss:8_daler_lybsk_fod]) —
      siehe dort.
    en: |-
      <b>The first systematic Müntzfuß norm of the Danish-Norwegian realm after the Reformation</b>, formally codified by the <b>Møntordning of 20 September 1541</b> of Christian III<sup>[ref:wilcke-1950-renaissance-moent]</sup>, but metrically already <em>de facto</em> established by Reynold Junge's Joachimsdaler coinage of 1537 in Copenhagen — four years before the formal ordinance. The ordinance fixes eight Daler per Cologne mark fine at 14½ Lod (906¼ ‰, period-attested «Hallffemtandeskab Lod») fineness — Marken-fin <b>mf 8.827</b> and <b>26.494 g fine</b> per Daler. Three-tier denomination: full-value Kurantmünze (Daler / Mark / 8 Skilling / 4 Skilling) at 14½ Lod; reduced Scheidemünze (1 Skilling) at 4 Lod (250 ‰); billon (Hvid 4 Lod, Penning 2 Lod). The 3.6× fineness drop between 4 Skilling Kurant and Hvid Scheide marks the step from full-value coin to sub-Mark token tariffed above metal value. <b>Phase 0 (1534-1540) — de facto establishment</b>: Notmünz cascade of the Grevens Fejde (Aarhus + Roskilde + Stockholm + Ribe Klippinge at 10/8/7 Lod, 5/4/3½ Lod, 3/2½ Lod — typical wartime tier-debasement) plus the 1537 Joachimsdaler 14½-Lod anchor (Copenhagen, Wilcke 1950 Kap. 7-3 p. 242 verbatim: «die 1537 Karbung etabliert das 14½-Lod-Daler-Standard») under mintmaster Reynold Junge<sup>[ref:wilcke-1950-renaissance-moent]</sup>. <b>Phase A1 (1541-1543) — de jure codification</b>: centralised coinage at the Copenhagen Klarekloster under the new mintmaster Povel Fechtel (Junge dismissed after exposure as a fraudster in 1541, Wilcke 7-4 p. 116). <b>Phase A2 (1544-1555) — Tillæg debasement</b>: on <b>27 September 1544</b> a Tillæg raises the Marken-fin to 9.481 (≈ 24.67 g fine per Daler); fineness unchanged at 14½ Lod, rough weight reduced. The Norwegian mint at Trondheim followed the same standard from 1546 (Møntordning of 3 August 1514 extended to the Norwegian realm). The standard effectively ends with the <b>Reichsmünzordnung of 1559</b> and Frederik II's adoption of the imperial 9-Fuß from 1566; Christian-III Dalers circulated alongside Reichsthalers until the 1566 Münzconvention unification. The Flensborg sub-Mark and 14¼ Lod Daler line from 1547 carries a <em>separate Müntzfuß</em> ([fuss:8_daler_lybsk_fod]) — see there.
    uk: |-
      <b>Перша систематична Müntzfuß-норма дансько-норвезької держави після Реформації</b>, формально кодифікована <b>Møntordning від 20 вересня 1541</b> Кристіана III<sup>[ref:wilcke-1950-renaissance-moent]</sup>, але метрично вже <em>de facto</em> запроваджена карбуванням Joachimsdaler 1537 р. у Копенгагені за монетмайстра Reynold Junge — за чотири роки до формального ордонансу. Ордонанс встановлює вісім Daler з кельнської марки чистого срібла за пробою 14½ Lod (906¼ ‰, period-attested «Hallffemtandeskab Lod») — Marken-fin <b>mf 8,827</b> і <b>26,494 г чистого</b> на Daler. Триступенева структура номіналів: повноцінна Kurantmünze (Daler / Mark / 8 Skilling / 4 Skilling) за 14½ Lod; знижена Scheidemünze (1 Skilling) за 4 Lod (250 ‰); billon (Hvid 4 Lod, Penning 2 Lod). 3,6-кратне падіння проби між 4 Skilling Kurant і Hvid Scheide позначає перехід від повноцінної монети до Sub-Mark-токена з тарифом понад металеву вартість. <b>Фаза 0 (1534-1540) — de facto-запровадження</b>: каскад Notmünz часів Grevens Fejde (Aarhus + Roskilde + Stockholm + Ribe Klippinge за 10/8/7 Lod, 5/4/3½ Lod, 3/2½ Lod — типове воєнно-ярусне знецінення) плюс копенгагенський 14½-Lod-якір Joachimsdaler 1537 р. (Wilcke 1950 Kap. 7-3 с. 242 verbatim: «die 1537 Karbung etabliert das 14½-Lod-Daler-Standard») за монетмайстра Reynold Junge<sup>[ref:wilcke-1950-renaissance-moent]</sup>. <b>Фаза A1 (1541-1543) — de jure-кодифікація</b>: централізоване карбування в копенгагенському Klarekloster за нового монетмайстра Povel Fechtel (Junge усунуто після викриття як шахрая 1541 р., Wilcke 7-4 с. 116). <b>Фаза A2 (1544-1555) — Tillæg-знецінення</b>: <b>27 вересня 1544</b> Tillæg підвищує Marken-fin до 9,481 (≈ 24,67 г чистого на Daler); проба незмінна 14½ Lod, повна вага знижена. Норвезький монетний двір у Тронгеймі дотримується того самого стандарту з 1546 р. (Møntordning af 3. August 1514 поширено на Норге-реалм). Стандарт фактично завершується <b>Reichsmünzordnung 1559</b> та запровадженням імперського 9-Fuß Фредеріком II з 1566 р.; Кристіанові III Daler циркулювали поряд з Reichsthaler-ами до уніфікації Müntzconvention 1566. Flensborg-ська sub-Mark та 14¼ Lod Daler-лінія з 1547 р. несе <em>окрему Müntzfuß-стопу</em> ([fuss:8_daler_lybsk_fod]) — див. там.
  fractions:
    "1":     {soll_rau_g: 29.232, soll_fein_g: 26.494}    # 1 Daler @ 14½ Lod, mf 8.827, A1 baseline (c3h3 sub-3A specimen)
    "1/3":   {soll_rau_g: 9.744,  soll_fein_g: 8.830}     # 1 Mark = 1/3 Daler (c3h3)
    "1/6":   {soll_rau_g: 4.872,  soll_fein_g: 4.415}     # 8 Skilling = 1/2 Mark = 1/6 Daler (c3h4)
    "1/12":  {soll_rau_g: 2.436,  soll_fein_g: 2.208}     # 4 Skilling = 1/4 Mark = 1/12 Daler (c3h5)
    "1/48":  {soll_rau_g: 0.609,  soll_fein_g: 0.552}     # 1 Skilling Kurant (extrapolated; in practice Scheide-tier — see kind=scheide overrides)
  events:
    first_adoption:
      anywhere: 1537
      note: "De-facto-Etablierung 1537 durch die Joachimsdaler-Karbung Reynold Junges in Kopenhagen (Wilcke 1950 Kap. 7-3 S. 242 verbatim «die 1537 Karbung etabliert das 14½-Lod-Daler-Standard»). De-jure-Kodifikation durch die Møntordning af 20. September 1541 (Christian III, København) — first systematic Daler-Mark-Skilling-Penning standard. Wilcke 1950 Kap. 7-4, Rigsarkivet T.K. nr. 160 «Diverse møntsager 1523-1619» fol. 12r-15v, Paus 1752 «Samling af Gamle Norske Love» Vol. II p. 247-251 verbatim transcript."
    first_mint:
      anywhere: 1534
      note: "First dated Christian-III silver issues are the Counts' Feud Klippinge 1535 (Bruun-4155 2 Mark Klippe 1535 Aarhus / Galster 92B, Bruun-4156 8 Skilling Klippe 1535 Aarhus / Galster 93) struck under mintmaster Reynold Junge — Notmünz-Kaskade-Tier of the broader 14½-Lod standard. First metric-anchor specimen at full 14½ Lod is the 1537 Joachimsdaler København (Bruun-4276 + 4277 + 4278, ½ Joachimsdaler Bruun-4279). First post-Møntordning issue Hede c3h3-3A (1 Mark, 1541, 14½ Lod, 9.744 g rough) under new mintmaster Povel Fechtel."
    last_mint:
      anywhere: 1555
      note: "Latest dated København issue under this Fuß is c3h3 1 Mark 1555 (Phase A2 debased mf 9.481). Frederik II succeeded Christian III on 1 January 1559; the Reichsmünzordnung was promulgated later that year and Frederik II's 9-Fuß adoption from 1566 superseded the Dalerfod for new issues."
    std_end:
      anywhere: 1566
      approx_anywhere: true
      note: "Standard formally superseded by Reichsmünzordnung 1566 (Reichsabschied formal adoption — German lands). Practical circulation tail continued because Christian-III Daler (26.494 g fein, mf 8.827) was HEAVIER than the imperial Reichsthaler (25.983 g fein, mf 9.000) and was thus undervalued at market — surviving pieces tended to be melted into Reichsthalers, but legal-tender status persisted into the 1570s."
    demonetisation:
      anywhere: 1582
      approx_anywhere: true
      note: "By Frederik II's mid-reign (~1582, mass mintage of 9-Fuß Daler underway since 1573) the Christian-III standard is no longer struck and surviving specimens are predominantly remelt fodder. 1582 is the approximate practical-circulation tail terminus."
    anywhere_label:
      de: Königreich Dänemark und Norwegen
      en: Royal Danish-Norwegian Realm
      uk: Королівство Данії і Норвегії
8_daler_lybsk_fod:
  name:
    de: 8-Daler-Lybsk-Fod
    en: 8-Daler-Lybsk-Fod
    uk: 8-Daler-Lybsk-Fod
  historical_name: Flensborg-fod (Lybsk-aligned ducal track, 14¼ Lod)
  metal: silver
  grid_unit_g: 233.856                  # Cöllnische Marck rauh (Silberlegierung)
  grid_stops: 8                         # 8 Daler aus der Cölln. Marck rauh (same brutto-grid as dalerfod; differs only in fineness)
  fineness_standard: 0.890625           # 14¼ Lod = 14.25 / 16 = 890.625 ‰
  fineness_display: "890⅝ ‰ (14¼ Lod, Flensborg Bestalling 22. Januar 1547)"
  grundwerte:
    heading:
      de: "Grundwerte · 8-Daler-Lybsk-Fod"
      en: "Base values · 8-Daler-Lybsk-Fod"
      uk: "Базові значення · 8-Daler-Lybsk-Fod"
    subheading:
      de: "Cöllnische Marck rauh = 233,856 g Silberlegierung · Probe <b>14¼ Lod = 890⅝ ‰</b> (Flensborg Bestalling 22. Januar 1547, Wilcke 1950 pp. 25-26) · Marken-fin <b>mf 8,982</b> ⇒ <b>26,029 g fein</b> je Daler · Lybsk-Untertheilung (1 Gylden = 24 ß lybsk) vs königlicher Daler-Standard (1 Daler = 48 ß danske)"
      en: "Cologne mark rough = 233.856 g silver alloy · fineness <b>14¼ Lod = 890⅝ ‰</b> (Flensborg Bestalling of 22 January 1547, Wilcke 1950 pp. 25-26) · Marken-fin <b>mf 8.982</b> ⇒ <b>26.029 g fine</b> per Daler · Lybsk subdivision (1 Gylden = 24 ß lybsk) vs the royal Daler standard (1 Daler = 48 ß danske)"
      uk: "Кельнська марка повна = 233,856 г срібного сплаву · проба <b>14¼ Lod = 890⅝ ‰</b> (Flensborg Bestalling 22 січня 1547, Wilcke 1950 pp. 25-26) · Marken-fin <b>mf 8,982</b> ⇒ <b>26,029 г чистого</b> на Daler · Любекська підструктура (1 Gylden = 24 ß lybsk) на відміну від королівського стандарту Daler (1 Daler = 48 ß danske)"
    badge:
      de: "Silber"
      en: "Silver"
      uk: "Срібло"
    rows:
      - key:
          de: "Feingewicht je Daler"
          en: "Fine weight per Daler"
          uk: "Чиста вага на Daler"
        value:
          de: "<b>26,029 g</b> fein (= 29,232 g rauh × 89,0625 % Probe = 233,856 g ÷ mf 8,982). Im Vergleich zum königlichen Christian-III-Daler (14½ Lod, 26,494 g fein) ist der Flensborg-Daler um 1,75 % leichter (0,465 g fein-Differenz)."
          en: "<b>26.029 g</b> fine (= 29.232 g rough × 89.0625 % fineness = 233.856 g ÷ mf 8.982). Compared to the royal Christian-III-Daler (14½ Lod, 26.494 g fine), the Flensborg Daler is 1.75 % lighter (0.465 g fine difference)."
          uk: "<b>26,029 г</b> чистого (= 29,232 г повної × 89,0625 % проби = 233,856 г ÷ mf 8,982). Порівняно з королівським Christian-III-Daler (14½ Lod, 26,494 г чистого), Flensborg-Daler на 1,75 % легший (різниця 0,465 г чистого)."
      - key:
          de: "Feingehalt"
          en: "Fineness"
          uk: "Проба"
        value:
          de: "<b>14¼ Lod = 14,25 ÷ 16 = 890⅝ ‰</b> — Wilcke 1950 pp. 25-26 verbatim aus Flensborg Bestalling vom 22. Januar 1547 (Jørgen Kock der Jüngere, Mzm.). Der Sprung vom königlichen 14½ Lod zum dukalen 14¼ Lod erlaubt Flensborg den Handel mit dem Lybsk-Reichshandels-Raum unter Beibehaltung des Daler-Nennwerts."
          en: "<b>14¼ Lod = 14.25 ÷ 16 = 890⅝ ‰</b> — Wilcke 1950 pp. 25-26 verbatim from the Flensborg Bestalling of 22 January 1547 (Jørgen Kock the Younger, mintmaster). The drop from the royal 14½ Lod to the ducal 14¼ Lod allows Flensborg to trade with the Lybsk imperial-commerce zone while keeping the Daler face value."
          uk: "<b>14¼ Lod = 14,25 ÷ 16 = 890⅝ ‰</b> — Wilcke 1950 pp. 25-26 дослівно з Flensborg Bestalling від 22 січня 1547 (Jørgen Kock молодший, монетмайстер). Перехід від королівського 14½ Lod до герцогського 14¼ Lod дозволяє Flensborg торгувати з любекським імперсько-торговельним простором, зберігаючи номінальну вартість Daler."
      - key:
          de: "Stückelung (Lybsk-Standard)"
          en: "Denomination structure (Lybsk standard)"
          uk: "Структура номіналів (любекського зразка)"
        value:
          de: "<b>1 Gylden</b> = <b>24 ß lybsk</b> = 288 Penning lybsk (Wilcke 1950 p. 26). Sub-Gylden-Stücke: <b>1 ß lybsk</b>, <b>1 Søsling lybsk</b> (= 1/16 ß lybsk), <b>1 Hvid lybsk</b>. Output 1545-1554: Hede c3h15-c3h22 (Rhinsk Gylden + Sølvgylden + Søsling lybsk)."
          en: "<b>1 Gylden</b> = <b>24 ß lybsk</b> = 288 Penning lybsk (Wilcke 1950 p. 26). Sub-Gylden pieces: <b>1 ß lybsk</b>, <b>1 Søsling lybsk</b> (= 1/16 ß lybsk), <b>1 Hvid lybsk</b>. Output 1545-1554: Hede c3h15-c3h22 (Rhinsk Gylden + Sølvgylden + Søsling lybsk)."
          uk: "<b>1 Gylden</b> = <b>24 ß lybsk</b> = 288 Penning lybsk (Wilcke 1950 p. 26). Суб-Gylden номінали: <b>1 ß lybsk</b>, <b>1 Søsling lybsk</b> (= 1/16 ß lybsk), <b>1 Hvid lybsk</b>. Output 1545-1554: Hede c3h15-c3h22 (Rhinsk Gylden + Sølvgylden + Søsling lybsk)."
      - key:
          de: "Genealogische Bedeutung"
          en: "Genealogical significance"
          uk: "Генеалогічне значення"
        value:
          de: "<b>Saatkorn der späteren 18½-Thaler-Fuß-Linie.</b> Die Lybsk-aligned sub-Mark-Logik (24 ß lybsk = 1 Gylden) wird unter Christian IV in der Glückstadt-Krone-Mønt fortgesetzt und unter Frederik III formal als Reichsbankdaler-Standard kodifiziert (18½ Thaler je Cölln. Marck fein). Der königliche Daler-Stamm (14½ Lod, 48 ß danske) führt umgekehrt zur 9-Thaler / 9¼-Thaler-Speciedaler-Linie. 1547 markiert den Punkt, an dem beide Linien strukturell auseinandertreten."
          en: "<b>Seed of the later 18½-Thaler-Fuß lineage.</b> The Lybsk-aligned sub-Mark logic (24 ß lybsk = 1 Gylden) continues under Christian IV in the Glückstadt Krone-Mønt and is formally codified under Frederik III as the Rigsbankdaler standard (18½ Thaler per Cologne mark fine). The royal Daler stem (14½ Lod, 48 ß danske) leads conversely to the 9-Thaler / 9¼-Thaler Speciedaler line. 1547 marks the point where the two lines structurally diverge."
          uk: "<b>Зерно подальшої лінії 18½-Thaler-Fuß.</b> Логіка любекського sub-Mark (24 ß lybsk = 1 Gylden) продовжується за Кристіана IV у ґлюкштадтській Krone-Mønt і формально кодифікується за Фредеріка III як стандарт Rigsbankdaler (18½ Thaler з кельнської марки чистого срібла). Королівський стам Daler (14½ Lod, 48 ß danske) натомість веде до лінії 9-Thaler / 9¼-Thaler-Speciedaler. 1547 рік — точка, де обидві лінії структурно розходяться."
    rechnungsfraktionen_label:
      de: "Rechnungsfraktionen (Lybsk-Untertheilung)"
      en: "Accounting fractions (Lybsk subdivision)"
      uk: "Розрахункові фракції (любекська підструктура)"
    rechnungsfraktionen:
      de: |
        <b>1 Daler</b> (Flensborg) = <b>26,029 g</b> Feinsilber @ 14¼ Lod = 29,232 g rauh<sup>[ref:wilcke-1950-renaissance-moent]</sup><br>
        <b>1 Gylden</b> = <b>24 ß lybsk</b> = 288 Penning lybsk (Wilcke 1950 p. 26)<br>
        Royal-Ducal tariff parity: <b>1 Flensborg-Daler ≈ 1 königlicher Daler</b> auf Nennwert-Ebene, aber Flensborg-Daler trägt 1,75 % weniger Feingewicht — Differenz wird über Markthandel mit Lybsk realisiert, nicht über Tarif-Konversion.
      en: |-
        <b>1 Daler</b> (Flensborg) = <b>26.029 g</b> fine silver at 14¼ Lod = 29.232 g rough<sup>[ref:wilcke-1950-renaissance-moent]</sup><br><b>1 Gylden</b> = <b>24 ß lybsk</b> = 288 Penning lybsk (Wilcke 1950 p. 26)<br>Royal-ducal tariff parity: <b>1 Flensborg Daler ≈ 1 royal Daler</b> at face value, but the Flensborg Daler carries 1.75 % less fine weight — the gap is realised through market trade with Lybsk, not through tariff conversion.
      uk: |-
        <b>1 Daler</b> (Flensborg) = <b>26,029 г</b> чистого срібла за 14¼ Lod = 29,232 г повної ваги<sup>[ref:wilcke-1950-renaissance-moent]</sup><br><b>1 Gylden</b> = <b>24 ß lybsk</b> = 288 Penning lybsk (Wilcke 1950 p. 26)<br>Тарифна паритетність королівсько-герцогська: <b>1 Flensborg-Daler ≈ 1 королівський Daler</b> на рівні номіналу, але Flensborg-Daler несе на 1,75 % менше чистої ваги — різниця реалізується через ринкову торгівлю з Любеком, не через тарифну конверсію.
  description:
    de: '<b>Dukal-zone Müntzfuß-Stamm</b> für die Flensborger Münzanstalt (1545-1554 Hauptphase, 1554-1571 Auslauf), eingeführt durch die <b>Flensborg Bestalling vom 22. Januar 1547</b> Christians III. unter Mzm. Jørgen Kock dem Jüngeren<sup>[ref:denmark-ref29-no-url]</sup>. Strukturell ein paralleler Standard zum [fuss:8_daler_fod]: gleiches Cölln.-Marck-Raulegierungs-Brutto (29,232 g je Daler), gleiches 8-stk-pro-Marck-Grid — aber abgesenkter Feingehalt von <b>14¼ Lod (890⅝ ‰)</b> statt königlichem 14½ Lod, und Lybsk-aligned Untertheilung (24 ß lybsk = 1 Gylden) statt der königlichen 48-ß-Danske-Theilung. Marken-fin <b>mf 8,982</b> ⇒ <b>26,029 g fein je Daler</b> (1,75 % leichter als der königliche Christian-III-Daler) — die Differenz wird über Markthandel mit Lybsk realisiert, nicht über Tarif-Konversion. Genealogisch das <em>Saatkorn der späteren 18½-Thaler-Fuß-Linie</em>, das unter Christian IV in der Glückstadt-Krone-Mønt fortgeführt und unter Frederik III als Rigsbankdaler-Standard formalisiert wird. Münzstand Hauptmünzen Hede c3h15-c3h22 (Rhinsk Gylden + Sølvgylden + Søsling lybsk). Standard endet faktisch mit Frederik IIs 9-Thaler-Fuß-Adoption ab 1571.'
    en: '<b>Ducal-zone Müntzfuß lineage</b> for the Flensborg mint (1545-1554 main phase, 1554-1571 tail), established by the <b>Flensborg Bestalling of 22 January 1547</b> of Christian III under mintmaster Jørgen Kock the Younger<sup>[ref:denmark-ref29-no-url]</sup>. Structurally parallel to [fuss:8_daler_fod]: same Cologne-mark rough-alloy brutto (29.232 g per Daler), same 8-pcs-per-mark grid — but reduced fineness of <b>14¼ Lod (890⅝ ‰)</b> instead of the royal 14½ Lod, and Lybsk-aligned subdivision (24 ß lybsk = 1 Gylden) instead of the royal 48-ß-danske division. Marken-fin <b>mf 8.982</b> ⇒ <b>26.029 g fine per Daler</b> (1.75 % lighter than the royal Christian-III-Daler) — the gap is realised through market trade with Lybsk, not through tariff conversion. Genealogically the <em>seed of the later 18½-Thaler-Fuß lineage</em>, continued under Christian IV in the Glückstadt Krone-Mønt and formalised under Frederik III as the Rigsbankdaler standard. Main coinage Hede c3h15-c3h22 (Rhinsk Gylden + Sølvgylden + Søsling lybsk). The standard effectively ends with Frederik II''s adoption of the 9-Thaler-Fuß from 1571.'
    uk: '<b>Герцогська стопа</b> для Flensborg-ського монетного двору (1545-1554 головна фаза, 1554-1571 заник), запроваджена <b>Flensborg Bestalling від 22 січня 1547</b> Кристіана III за монетмайстра Jørgen Kock молодшого<sup>[ref:denmark-ref29-no-url]</sup>. Структурно паралельна до [fuss:8_daler_fod]: те саме кельнсько-маркове повне (29,232 г на Daler), та сама 8-шт-на-марку сітка — але знижена проба <b>14¼ Lod (890⅝ ‰)</b> замість королівського 14½ Lod, та любекська підструктура (24 ß lybsk = 1 Gylden) замість королівського поділу 48 ß danske. Marken-fin <b>mf 8,982</b> ⇒ <b>26,029 г чистого на Daler</b> (на 1,75 % легший за королівський Christian-III-Daler) — різниця реалізується через ринкову торгівлю з Любеком, не через тарифну конверсію. Генеалогічно <em>зерно подальшої лінії 18½-Thaler-Fuß</em>, продовжене за Кристіана IV у ґлюкштадтській Krone-Mønt і формалізоване за Фредеріка III як стандарт Rigsbankdaler. Основне карбування Hede c3h15-c3h22 (Rhinsk Gylden + Sølvgylden + Søsling lybsk). Стандарт фактично завершується з прийняттям 9-Thaler-Fuß Фредеріком II з 1571 р.'
  fractions:
    "1":     {soll_rau_g: 29.232, soll_fein_g: 26.029}    # 1 Daler @ 14¼ Lod, mf 8.982
    "1/2":   {soll_rau_g: 14.616, soll_fein_g: 13.015}    # ½ Daler (extrapolated; period attestation pending)
    "1/24":  {soll_rau_g: 1.218,  soll_fein_g: 1.085}     # 1 ß lybsk (extrapolated; canonical Lybsk-shilling unit)
    "1/48":  {soll_rau_g: 0.609,  soll_fein_g: 0.542}     # 1/2 ß lybsk (extrapolated)
    "1/384": {soll_rau_g: 0.076,  soll_fein_g: 0.068}     # 1 Søsling lybsk = 1/16 ß (Hede c3h21/c3h22 — harvest pending)
  events:
    first_adoption:
      anywhere: 1547
      note: "Flensborg Bestalling af 22. Januar 1547 (Christian III, Flensborg) — Jørgen Kock der Jüngere mintmaster. Wilcke 1950 pp. 25-26 verbatim. Establishes the 14¼ Lod Daler + Lybsk sub-Mark structure as the ducal-zone parallel to the København 14½ Lod royal standard."
    first_mint:
      anywhere: 1545
      approx_anywhere: true
      note: "Flensborg mint re-established 1545 (Wilcke 1950 p. 25 «Flensborg, hvorfra der i årene 1545-54 udgik rhinske gylden, sølvgylden, og søsling lybsk»). Earliest dated specimens 1545-1547 Rhinsk Gylden / Sølvgylden. Bestalling formally codifying the 14¼ Lod standard arrives January 1547; pre-1547 strikes used a similar but not formally fixed metric (1545 «approx_anywhere: true» marks this)."
    last_mint:
      anywhere: 1554
      note: "Flensborg main-phase mintage end 1554 (Wilcke 1950 p. 25 — output range «1545-54»). Some specimens may extend into 1555-1571 tail under Frederik II's continuation of the Lybsk-track before full 9-Thaler adoption."
    std_end:
      anywhere: 1571
      approx_anywhere: true
      note: "Standard superseded by Frederik II's full adoption of the 9-Thaler-Fuß (Reichsmünzordnung-aligned imperial standard) from 1571 onwards. The Lybsk-aligned sub-Mark logic does not disappear — it migrates north to the Glückstadt mint under Christian IV (1619+, Krone-Mønt) and is eventually formalised under Frederik III as the Rigsbankdaler standard (18½-Thaler-Fuß)."
    demonetisation:
      anywhere: 1582
      approx_anywhere: true
      note: "By Frederik II's mid-reign (~1582, 9-Fuß mass mintage underway) the Flensborg 14¼ Lod standard is no longer struck and surviving specimens are remelt fodder. Same approximate practical-circulation tail as 8_daler_fod."
    anywhere_label:
      de: Herzogthum Schleswig-Holstein
      en: Duchy of Schleswig-Holstein
      uk: Герцогство Шлезвіг-Гольштейн
