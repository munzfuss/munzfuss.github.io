        value:
          de: "<b>≈ 14,391 Krone je Cöllnische Marck Feinsilber</b> (= 233,856 ÷ 16,250) · kein einfacher kanonischer Bruch — die ungewöhnliche Form <b>12 ²⁵⁷⁄₇₀₀</b> je Raumarck deutet darauf hin, daß der Münzedikt 1618 den Fuß über die Daler-Ausbringung definierte und nicht über eine glatte Stück-Zahl"
          en: "<b>≈ 14.391 Krone per Cologne mark of fine silver</b> (= 233.856 ÷ 16.250) · not a clean canonical fraction — the unusual form <b>12 ²⁵⁷⁄₇₀₀</b> per raw mark suggests that the 1618 mint edict defined the standard via the daler-udbringning rather than via a round piece count"
          uk: "<b>≈ 14,391 Krone з кельнської марки чистого срібла</b> (= 233,856 ÷ 16,250) · це не «красивий» канонічний дріб — незвична форма <b>12 ²⁵⁷⁄₇₀₀</b> з повної марки вказує на те, що едикт 1618 р. задавав стопу через daler-udbringning, а не через круглу кількість штук"
      - key:
          de: "Daler-Ausbringung — wieviel Specie aus einer Marck Feinsilber als Krone-Münzen herauskommt"
          en: "Daler output — how much Specie one fine mark of silver yields when struck as Krone coin"
          uk: "Вихід у даллерах — скільки Specie приносить марка чистого срібла, викарбувана як Krone"
        value:
          de: "Period-korrekte dänische Definition des Münzfußes: nicht «soundsoviel Stück je Marck», sondern <b>nomineller Gesamtwert in Speciedaler, der aus einer feinen Cöllnischen Marck Silber als Krone-Münzen herauskam</b>. Bei dem jeweils geltenden Tarif (Krone ↔ Specie) übersetzt sich die Stück-Zahl pro Marck unmittelbar in einen Daler-Nennwert.<br><br><b>1618</b> (Anfangstarif: 1½ Specie pro Doppelkrone, also ¾ Specie pro Krone): 1 Marck Feinsilber → 14,391 Krone × ¾ Specie/Krone = <b>10,793 Speciedaler</b> Gesamtnennwert (Hede H105<sup>[ref:hede-1957-kronemoenten-nnum]</sup>)<br>· <b>1624</b> (Forordning 14. Februar 1624: Specie auf 100 Skilling neu tarifiert): dieselbe Marck Feinsilber → <b>10,361 Speciedaler</b> Gesamtnennwert (Hede H124<sup>[ref:hede-1957-kronemoenten-nnum]</sup>)<br>· <em>identische physische Münze (37,819 g rau, 32,500 g fein); die Daler-Ausbringung sinkt nur, weil der Specie selbst aufgewertet wurde — nicht weil sich die Krone änderte</em>"
          en: "The period-correct Danish definition of the Münzfuß: not «so many pieces per mark» but rather <b>the total face value, in Speciedaler, that one fine Cologne mark of silver yielded once struck into Krone coin</b>. At the prevailing Krone-to-Specie tariff, the pieces-per-mark count translates directly into a daler face-value sum.<br><br><b>1618</b> (initial tariff: 1½ Specie per Doppelkrone, i.e. ¾ Specie per Krone): 1 fine mark → 14.391 Krone × ¾ Specie/Krone = <b>10.793 Speciedaler</b> in total face value (Hede H105<sup>[ref:hede-1957-kronemoenten-nnum]</sup>)<br>· <b>1624</b> (Forordning of 14 February 1624: Specie re-rated to 100 Skilling): the same fine mark → <b>10.361 Speciedaler</b> in total face value (Hede H124<sup>[ref:hede-1957-kronemoenten-nnum]</sup>)<br>· <em>same physical coin (37.819 g rough, 32.500 g fine); the daler output falls only because the Specie itself was re-rated, not because the Krone changed</em>"
          uk: "Період-коректне данське означення Münzfuß: не «стільки-то штук з марки», а <b>сумарна номінальна вартість у Speciedaler, яку марка чистого кельнського срібла «приносила» при карбуванні в Krone-монети</b>. За чинним тарифом Krone ↔ Specie кількість штук з марки безпосередньо переводиться в сумарну номінальну вартість у даллерах.<br><br><b>1618</b> (початковий тариф: 1½ Specie на Doppelkrone, тобто ¾ Specie на одну Krone): з 1 марки чистого виходить 14,391 Krone × ¾ Specie/Krone = <b>10,793 Speciedaler</b> сумарної номінальної вартості (Hede H105<sup>[ref:hede-1957-kronemoenten-nnum]</sup>)<br>· <b>1624</b> (Forordning 14 лютого 1624 р.: Specie перетарифовано на 100 Skilling): та сама марка чистого → <b>10,361 Speciedaler</b> сумарної номінальної вартості (Hede H124<sup>[ref:hede-1957-kronemoenten-nnum]</sup>)<br>· <em>фізично та сама монета (37,819 г повної ваги, 32,500 г чистого); вихід у даллерах падає лише через перетарифування самого Specie, а не через зміну Krone</em>"
      - key:
          de: "Tarifhistorie und Specie-Äquivalent (königliche Verordnung)"
          en: "Tariff history and Specie equivalent (royal decree)"
          uk: "Історія тарифу та Specie-еквівалент (королівський декрет)"
        value:
          de: "<b>1618</b> (Corona Danica): 1 Krone = <b>1½ Reichstaler</b> = <b>96 Kroneskilling</b> → 14,391 × 1½ ≈ <b>21,6 Specie-Nominale je Marck Feinsilber</b> (übermäßiger Aufschlag — Anlaß für den Kaufmannsprotest)<br>· <b>1625</b> (offizielle Tarifsenkung): 1 Krone = <b>1⅓ Reichstaler</b> → 14,391 × 1⅓ ≈ <b>19,2 Specie-Nominale je Marck</b> · Münzgewinn der Krone bei der Reduktion ca. 11 %<sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:schroetter-wb-muenzkunde-1930]</sup>"
          en: "<b>1618</b> (Corona Danica): 1 Krone = <b>1½ Reichstaler</b> = <b>96 Kroneskilling</b> → 14.391 × 1½ ≈ <b>21.6 Specie nominals per Mark of fine silver</b> (excessive premium — trigger for the merchant protest)<br>· <b>1625</b> (official tariff reduction): 1 Krone = <b>1⅓ Reichstaler</b> → 14.391 × 1⅓ ≈ <b>19.2 Specie nominals per Mark</b> · the Crown's mint gain on the reduction was about 11 %<sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:schroetter-wb-muenzkunde-1930]</sup>"
          uk: "<b>1618</b> (Corona Danica): 1 Krone = <b>1½ Рейхсталер</b> = <b>96 Kroneskilling</b> → 14,391 × 1½ ≈ <b>21,6 Specie-номіналів з марки чистого срібла</b> (надмірна надбавка — поштовх до купецького протесту)<br>· <b>1625</b> (офіційна тарифна редукція): 1 Krone = <b>1⅓ Рейхсталера</b> → 14,391 × 1⅓ ≈ <b>19,2 Specie-номіналів з марки</b> · монетний прибуток Корони від редукції ~11 %<sup>[ref:wikipedia-de-corona-danica]</sup><sup>[ref:schroetter-wb-muenzkunde-1930]</sup>"
    rechnungsfraktionen_label:
      de: Rechnungsfraktionen (Krone-Tarif-Theilung)
      en: Accounting fractions (Krone-tariff subdivision)
      uk: Розрахункові фракції (поділ за Krone-тарифом)
    rechnungsfraktionen:
      de: <b>1 Krone</b> = <b>16,250 g</b> Feinsilber = <b>1½ Reichstaler</b> (1618–1624) bzw. <b>1⅓ Reichstaler</b> (ab 1625) = <b>4 Marck Danske</b> = <b>96 Kroneskilling</b><br><b>2 Krone</b> (Doppelkrone, Corona Danica) = <b>32,500 g</b> fein, 37,819 g rau (Hede H105, H124 — KM# 60, 61, 99)<br><b>½ Krone</b> = <b>8,125 g</b> fein, 9,455 g rau = 48 Kroneskilling = 2 Marck Danske (Hede H107, H126 — KM# 58, 58a, 94, 95)<br><b>¼ Krone</b> = <b>4,0625 g</b> fein = 24 Kroneskilling = 1 Marck Danske (KM# 57; Wilcke I p. 152 — 1618 etwas niedrigere Münzfod als die Hauptformel, exakte Werte aus Wilcke nachzutragen)<br><br><b>Kroneskilling-Subeinheit</b> (1619–1621, eigene Prägungen):<br>· <b>1 Kroneskilling</b> = 1/96 Krone (Tarif) — KM# 65 (N#109264)<br>· <b>2 Kroneskilling</b> = 1/48 Krone (Tarif) — KM# 68 (N#142850)<br>· <b>4 Kroneskilling</b> = 1/24 Krone (Tarif) — KM# 70 (Typ I), KM# 81 (Typ II)<br>· <b>8 Kroneskilling</b> = 1/12 Krone (Tarif) — KM# 82 (Typ II)<br><br><em><b>Hinweis:</b> Die Kroneskillinge folgen demselben Feingehalt .859 wie die Krone selbst und sind tarifäre Subeinheiten der Christian-IVs-kroner-Müntzformel (siehe Tabelle unten). Empirisch tragen sie pro Stück bis ~2× mehr Feinsilber, als der strikte 1/96-Krone-Müntzfuß vorschreibt — typisch für Kleinmünzen, deren Nutzbarkeit im Alltagsumlauf einen Mindestsilbergehalt erfordert. Tarif-Theilungsverhältnis 1:96 bleibt nominell, der Silberanteil pro Kroneskilling weicht positiv davon ab.</em><br><br><em>Nicht zu verwechseln mit Skilling Lybsk (1/48 Reichsthaler im 9-Fuß) oder Skilling Dansk (1/96 Speciedaler im 9¼-Fuß) — Kroneskilling ist eine eigenständige Subeinheit speziell der Corona-Danica-Tarifmünze.</em>
      en: <b>1 Krone</b> = <b>16.250 g</b> fine silver = <b>1½ Reichstaler</b> (1618–1624) or <b>1⅓ Reichstaler</b> (from 1625) = <b>4 Marck Danske</b> = <b>96 Kroneskilling</b><br><b>2 Krone</b> (Doppelkrone, Corona Danica) = <b>32.500 g</b> fine, 37.819 g rough (Hede H105, H124 — KM# 60, 61, 99)<br><b>½ Krone</b> = <b>8.125 g</b> fine, 9.455 g rough = 48 Kroneskilling = 2 Marck Danske (Hede H107, H126 — KM# 58, 58a, 94, 95)<br><b>¼ Krone</b> = <b>4.0625 g</b> fine = 24 Kroneskilling = 1 Marck Danske (KM# 57; Wilcke I p. 152 — a slightly lower Münzfod than the main formula was used in 1618; exact values to be added from Wilcke)<br><br><b>Kroneskilling subunit</b> (separate strikes 1619–1621):<br>· <b>1 Kroneskilling</b> = 1/96 Krone (tariff) — KM# 65 (N#109264)<br>· <b>2 Kroneskilling</b> = 1/48 Krone (tariff) — KM# 68 (N#142850)<br>· <b>4 Kroneskilling</b> = 1/24 Krone (tariff) — KM# 70 (Type I), KM# 81 (Type II)<br>· <b>8 Kroneskilling</b> = 1/12 Krone (tariff) — KM# 82 (Type II)<br><br><em><b>Note:</b> The Kroneskillinge follow the same fineness .859 as the Krone itself and are tariff subunits of the Christian IV's kroner standard (see table below). Empirically they carry up to ~2× more fine silver per piece than the strict 1/96 Krone standard would prescribe — typical for petty coins whose everyday usability requires a minimum silver content. The 1:96 tariff subdivision remains nominal; the silver share per Kroneskilling deviates positively from it.</em><br><br><em>Not to be confused with Skilling Lybsk (1/48 Reichsthaler in the 9-Fuß) or Skilling Dansk (1/96 Speciedaler in the 9¼-Fuß) — Kroneskilling is an independent subunit specific to the Corona Danica tariff coinage.</em>
      uk: <b>1 Krone</b> = <b>16,250 г</b> чистого срібла = <b>1½ Рейхсталер</b> (1618–1624) або <b>1⅓ Рейхсталер</b> (з 1625) = <b>4 Marck Danske</b> = <b>96 Kroneskilling</b><br><b>2 Krone</b> (Doppelkrone, Corona Danica) = <b>32,500 г</b> чистого, 37,819 г повної ваги (Hede H105, H124 — KM# 60, 61, 99)<br><b>½ Krone</b> = <b>8,125 г</b> чистого, 9,455 г повної ваги = 48 Kroneskilling = 2 Marck Danske (Hede H107, H126 — KM# 58, 58a, 94, 95)<br><b>¼ Krone</b> = <b>4,0625 г</b> чистого = 24 Kroneskilling = 1 Marck Danske (KM# 57; Wilcke I с. 152 — 1618 р. застосовувалась дещо нижча møntfod; точні значення треба підняти з Wilcke)<br><br><b>Kroneskilling-субодиниця</b> (окремі карбування 1619–1621):<br>· <b>1 Kroneskilling</b> = 1/96 Krone (тариф) — KM# 65 (N#109264)<br>· <b>2 Kroneskilling</b> = 1/48 Krone (тариф) — KM# 68 (N#142850)<br>· <b>4 Kroneskilling</b> = 1/24 Krone (тариф) — KM# 70 (Тип I), KM# 81 (Тип II)<br>· <b>8 Kroneskilling</b> = 1/12 Krone (тариф) — KM# 82 (Тип II)<br><br><em><b>Зауваження:</b> Kroneskilling-и тримають ту саму пробу .859, що й сама Krone, і є тарифними субодиницями стопи Christian IV's kroner (див. таблицю нижче). Емпірично вони несуть на штуку до ~2× більше чистого срібла, ніж передбачає строга 1/96-Krone-стопа — типова риса дрібних монет, для яких мінімальний срібний вміст потрібен для повсякденної придатності. Тарифне співвідношення поділу 1:96 залишається номінальним; срібна частка на Kroneskilling відхиляється від нього в плюс.</em><br><br><em>Не плутати зі Skilling Lybsk (1/48 Reichsthaler у 9-Fuß) чи Skilling Dansk (1/96 Speciedaler у 9¼-Fuß) — Kroneskilling це самостійна субодиниця, специфічна саме для тарифної монети Corona Danica.</em>
