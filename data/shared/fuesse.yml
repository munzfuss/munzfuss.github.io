      de: |
        <b>1 Kurantdukat</b> = <b>12 Mark Dansk Kurant</b> = <b>2 Rigsdaler Courant</b> = 192 Skilling Danske (biß 1813)<sup><a href="#ref39">[39]</a></sup><br>
        <b>1 Kurantdukat</b> = <b>2,72832 g</b> Feingold (Phase II, ab 1757) bzw. 2,511 g (Phase I, 1714–1717)<sup><a href="#ref36">[36]</a></sup><br>
