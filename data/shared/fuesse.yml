          de: "<b>6,0322 g</b> Feingold (= 233,856 × 130/144 / 35) · 6,03 g nach Reduktion 1770<sup><a href=\"#ref32\">[32]</a></sup>"
          en: "<b>6.0322 g</b> fine gold (= 233.856 × 130/144 / 35) · 6.03 g after the 1770 reduction<sup><a href=\"#ref32\">[32]</a></sup>"
