          en: "Last Sølvgylden mass coinage on the eve of the deposition — Wilcke 7-2 p. 156 verbatim «<i>meget almindelig</i>» (very common); Bruun-3933 + Bruun-3934 attest specimen brutto 28.74-29.49 g (≈ 4-7 % over the soll 27.51 g; typical early-modern specimen range)."
          uk: "Остання масова Sølvgylden-карбування напередодні скинення — Wilcke 7-2 с. 156 verbatim «<i>meget almindelig</i>» (дуже поширене), Bruun-3933 + Bruun-3934 засвідчують повну вагу зразка 28,74-29,49 г (≈ 4-7 % понад soll 27,51 г; типовий ранньомодерний specimen-діапазон)."
