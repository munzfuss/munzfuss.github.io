  events:
    first_adoption:
      anywhere: 1622
      holstein: 1622
      note: Friedrich III. von Gottorp at the Schleswig mint — Holstein-first; Christiania (Norway) took it up 1628.
    first_mint:
      anywhere: 1622
      holstein: 1622
    last_mint:
      anywhere: 1873
      holstein: 1854
      note: 'anywhere last-mint 1873 = late Copenhagen Speciedaler before the Krone reform (Lov om Mønten 23 May 1873; new Krone effective 1 Jan 1875). H last-mint 1854 = exact: Frederik VII Altona-Speciedaler 1854 (KM#475 / Hede 1, Mzm. Christian Friedrich Wilhelm Schmiel) is the documented final Holstein-mint Speciedaler. The 1854 cessation in Holstein has a TECHNICAL-ECONOMIC cause, not a legal one: the Altona mint was fundamentally rebuilt 1855–56 (hand-driven screw presses 1771–1855/56 → steam-driven eccentric presses from Darmstadt), and the post-rebuild operation focused on smaller rigsmønt denominations; the investment ended as «an economic tragedy because the mint lost almost all of its business as a result of the international monetary crisis of 1857». Lov om Pengevæsenet of 10 Feb 1854 was a purely terminological reform (Rigsbankdaler → Rigsdaler / Rigsdaler Rigsmønt) and did NOT change the 9¼-Fuß Speciedaler standard, which continued in Copenhagen until 1873. Sources: ref28 (1854 renaming) and ref29 (Altona rebuild + 1857 crisis) in schleswig_holstein-references.yml.'
    std_end:
      anywhere: 1873
      holstein: 1866
      note: anywhere std_end 1873 = Reichsmünzgesetz / Markrechnung. H std_end 1866 = Prussian annexation, transition to 30-Thaler-Fuß.
    demonetisation:
      anywhere: 1875
      holstein: 1866
      note: anywhere demon 1875 = Reichsmünzgesetz aftermath (Hamburg, Lübeck conversion).
    sole_start:
      holstein: 1788
      note: 'H sole-start 1788 = Schimmelmann-Reform: Holstein wird vom dänisch-norwegischen Kurantmøntfod (11⅓-Th-Fuß) ausgegliedert; 9¼-Fuß bleibt der einzige operative Silber-Kurant-Standard für Holstein. Sole hier = sole silver-Kurant standard within its niche; the parallel Reichsdukatenfuß (gold) is a different metal niche and does not disqualify «sole», nor do surviving older coins (Krone, Hebræermønt etc.) circulating as bullion-value money rather than as operating standards. anywhere = null because within the broader Königreich Dänemark und Norwegen 9¼-Fuß ran parallel with the Kurantmøntfod (1726+) until Statsbankerot 1813 (= pre-Helstaten Danish-Norwegian realm; Helstaten only applies 1814–1864 after Treaty of Kiel).'
    sole_end:
      holstein: 1813
      note: 'H sole-end 1813 = Statsbankerot Forordning 5. Jan 1813 introduces 18½-Fuß-Rigsbankdaler as the new principal Kurant unit. Although 18½-Fuß is mathematically a halving of 9¼-Fuß (1 Rigsbankdaler = ½ Speciedaler at the same fine-silver content per Cölln. Marck), we treat them as separate operative standards in this register — so the 9¼-Fuß sole-period closes at the Rigsbankdaler introduction in 1813, not at the broader 1866 Prussian annexation.'
    anywhere_label:
      de: Dänemark + Hansestädte
      en: Denmark + Hanseatic cities
      uk: Данія + ганзейські міста
