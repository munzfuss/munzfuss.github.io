    rechnungsfraktionen_label:
      de: "Rechnungsfraktionen (Rhenish-Gulden-Tarif)"
      en: "Accounting fractions (Rhenish-Gulden tariff)"
      uk: "Розрахункові фракції (тариф Rhenish-Gulden)"
    rechnungsfraktionen:
      de: |
        <b>1 Goldgulden</b> = 3,248 g rauh / <b>2,501 g fein</b> (Phase II) bzw. 2,469 g fein (Phase III)<sup>[ref:danskmoent-1rhinsk-gylden]</sup><br>
        <b>1 Goldgulden</b> ≈ <b>0,71-0,73 Reichsdukat</b> (per Feingewicht, kein formaler Tarif an Reichsdukat oder Speciedaler) ≈ <b>20 ß lybsk</b> Lübisch · ≈ <b>1½ Mark Dansk</b> Stand 1620er
      en: |-
        <b>1 Goldgulden</b> = 3.248 g rough / <b>2.501 g fine</b> (Phase II) or 2.469 g fine (Phase III)<sup>[ref:danskmoent-1rhinsk-gylden]</sup><br><b>1 Goldgulden</b> ≈ <b>0.71-0.73 Reichsdukat</b> (by fine weight, no formal tariff to Reichsdukat or Speciedaler) ≈ <b>20 ß lybsk</b> Lübisch · ≈ <b>1½ Mark Dansk</b> as of the 1620s
      uk: |-
        <b>1 Goldgulden</b> = 3,248 г повної / <b>2,501 г чистого</b> (фаза II) або 2,469 г чистого (фаза III)<sup>[ref:danskmoent-1rhinsk-gylden]</sup><br><b>1 Goldgulden</b> ≈ <b>0,71-0,73 Reichsdukat</b> (за чистою вагою, без формального тарифу до Reichsdukat чи Speciedaler) ≈ <b>20 ß lybsk</b> любекських · ≈ <b>1½ Mark Dansk</b> станом на 1620-ті
  description:
    de: '<b>Dänische Königsmünz-Variante der Rhenish-Gulden-Tradition</b>: Der rheinische Goldgulden war die führende Goldhandels- und Rechnungsmünze des Heiligen Römischen Reichs<sup>[ref:rheinischer-gulden-imperial-handelsmuenze]</sup>, weshalb die dänische Krone ihn als Handelsmünze für den deutsch-norddeutschen Markt nachprägte. Die Probe wurde de jure durch die <b>Christian-II-Møntordning (Sommer 1514)</b> und die <b>Frederik-I-Ordonnanz vom 25. Februar 1524</b> auf <b>18 Karat (.750)</b> bei 72 Stück je rauer Cölln. Marck festgelegt<sup>[ref:wilcke-rhinsk-gylden-1514-standard]</sup><sup>[ref:wilcke-rhinsk-gylden-1524-standard]</sup>. Drei Phasen, geschieden durch Regent und Probe: <b>Phase I</b> (~1496-1547) — das Gründungsband unter <b>Hans</b>, <b>Frederik I.</b><sup>[ref:danskmoent-f1-rhinsk-gylden-1527]</sup> und <b>Christian III.</b><sup>[ref:danskmoent-c3g131-roskilde]</sup> bei der de-jure-Probe 18 Karat (.750); Hans'' Prägung (~1497) wurde zur Soldzahlung an die deutschen Söldner im Krieg gegen Sten Sture geschlagen<sup>[ref:danskmoent-hans-rhinsk-gylden-1497]</sup>; <b>Phase II</b> (<b>Frederik II.</b>, 1563-1564) — die Standardisierung, welche die Probe auf <b>18½ Karat (.77)</b> anhob<sup>[ref:danskmoent-1rhinsk-gylden]</sup>; <b>Phase III</b> (<b>Christian IV.</b>, 1625-1632) — die Wiederaufnahme in der Zeit des <b>Kaiserlich-Dänischen Krieges</b> (1625-1629), bei geringfügig gesenkter Probe <b>18¼ Karat (.76)</b><sup>[ref:danskmoent-1rhinsk-gylden]</sup>. Ihrer Funktion nach eine <b>deutsch-orientierte Marktmünze</b>, kein Tarifgeld — ohne feste Tarifbindung an Speciedaler oder Guldkrone.'
    en: '<b>The Danish royal-mint variant of the Rhenish-Gulden tradition</b>: the Rhenish gold gulden was the leading gold trade and accounting coin of the Holy Roman Empire<sup>[ref:rheinischer-gulden-imperial-handelsmuenze]</sup>, so the Danish crown struck its own to that standard as a trade coin for the German / northern-German market. The fineness was fixed de jure at <b>18 carats (.750)</b>, 72 pieces per rough Cologne mark, by the <b>Christian II Møntordning (Summer 1514)</b> and the <b>Frederik I ordinance of 25 February 1524</b><sup>[ref:wilcke-rhinsk-gylden-1514-standard]</sup><sup>[ref:wilcke-rhinsk-gylden-1524-standard]</sup>. Three phases, distinguished by ruler and fineness: <b>Phase I</b> (~1496-1547) — the founding band under <b>Hans</b>, <b>Frederik I</b><sup>[ref:danskmoent-f1-rhinsk-gylden-1527]</sup> and <b>Christian III</b><sup>[ref:danskmoent-c3g131-roskilde]</sup> at the de jure 18 carats (.750); Hans''s issue (~1497) was struck to pay the German mercenary troops in the war against Sten Sture<sup>[ref:danskmoent-hans-rhinsk-gylden-1497]</sup>; <b>Phase II</b> (<b>Frederik II</b>, 1563-1564) — the standardisation that raised the fineness to <b>18½ carats (.77)</b><sup>[ref:danskmoent-1rhinsk-gylden]</sup>; <b>Phase III</b> (<b>Christian IV</b>, 1625-1632) — the resumption during the <b>Imperial-Danish War</b> (1625-1629), at a slightly reduced <b>18¼ carats (.76)</b><sup>[ref:danskmoent-1rhinsk-gylden]</sup>. By function a <b>German-oriented market coin</b>, not tariff money — with no fixed tariff link to the Speciedaler or the Guldkrone.'
    uk: '<b>Данський королівський варіант традиції Rhenish-Gulden</b>: рейнський золотий гульден був провідною золотою торговою та розрахунковою монетою Священної Римської імперії<sup>[ref:rheinischer-gulden-imperial-handelsmuenze]</sup>, тож данська корона карбувала власну під цей стандарт як торгову монету для німецько-північнонімецького ринку. Пробу de jure зафіксовано на <b>18 карат (.750)</b>, 72 штуки з повної кельнської марки, <b>Møntordning-ом Христіана II (літо 1514)</b> та <b>ордонансом Фредеріка I від 25 лютого 1524</b><sup>[ref:wilcke-rhinsk-gylden-1514-standard]</sup><sup>[ref:wilcke-rhinsk-gylden-1524-standard]</sup>. Три фази, розрізнені правителем і пробою: <b>фаза I</b> (~1496-1547) — засновницьке ядро за <b>Hans</b>, <b>Фредеріка I</b><sup>[ref:danskmoent-f1-rhinsk-gylden-1527]</sup> та <b>Кристіана III</b><sup>[ref:danskmoent-c3g131-roskilde]</sup> за de-jure-пробою 18 карат (.750); монета Hans (~1497) карбувалася для оплати німецьким найманцям у війні проти Sten Sture<sup>[ref:danskmoent-hans-rhinsk-gylden-1497]</sup>; <b>фаза II</b> (<b>Фредерік II</b>, 1563-1564) — стандартизація, що підняла пробу до <b>18½ карат (.77)</b><sup>[ref:danskmoent-1rhinsk-gylden]</sup>; <b>фаза III</b> (<b>Кристіан IV</b>, 1625-1632) — відновлення за часів <b>Імперсько-данської війни</b> (1625-1629), за дещо зниженою пробою <b>18¼ карат (.76)</b><sup>[ref:danskmoent-1rhinsk-gylden]</sup>. За функцією — <b>торгова монета німецького спрямування</b>, не тарифні гроші — без жорсткої тарифної прив''язки до Speciedaler чи Guldkrone.'
  fractions:
    "1": {soll_rau_g: 3.248, soll_fein_g: 2.501, soll_fein_by_phase: {'I': 2.436, 'II': 2.501, 'III': 2.469}}    # 1 Goldgulden — per-phase de-jure Feingewicht (3.248 rauh × Probe): Phase I = .750 → 2.436, Phase II = .77 → 2.501, Phase III = .76 → 2.469. scalar soll_fein_g = Phase-II fallback.
    "2": {soll_rau_g: 6.496, soll_fein_g: 5.002, soll_fein_by_phase: {'I': 4.872, 'II': 5.002, 'III': 4.938}}    # 2 Goldgulden — doppelt: Phase I 4.872, Phase II 5.002, Phase III 4.938 (6.496 rauh × Probe)
  events:
    first_adoption:
      anywhere: 1536
      note: "Christian III adopts the Rhenish-Gulden standard for Danish-royal Gold trade-coin issues already 1536 in Roskilde (Galster 131, .764 fineness, 3.19 g rough). Wormser Reichsabschied 1495 is the imperial precedent (72 stk per Cölln. Marck rauh at 18½ Karat). Galster originally misattributed the mint to Gottorp; danskmoent.dk corrects to Roskilde."
    first_mint:
      anywhere: 1496
      note: "Earliest documented coinage is the undated Hans Rhinsk Gylden ~1496-1497 (Malmø; Bruun coll. 3839 / Galster hg27; danskmoent «formentlig slået omkring 1497»). The earliest DATED specimen remains Galster c3g131 (1 Rhinsk gylden 1536, Christian III, Roskilde, 3.19 g rough / 2.44 g fine / .764). Galster fejlagtigt henført til Gottorp; korrekt mint Roskilde per danskmoent.dk. (first_mint moved 1536->1496 after the Hans specimen was added.)"
    last_mint:
      anywhere: 1632
      note: "Hede c4h29 last dated year 1632 (Christian IV). Coinage stops as the Imperial-Danish War ends (1629) and Christian IV's gold-coin focus shifts to the silver Krone-Mønt programme (1644+ Hebræermønt / Glückstadt 10½-Krone-Fuß)."
    std_end:
      anywhere: 1640
      approx_anywhere: true
      note: "Standard effectively ends post-1632 — Christian IV does not resume Rhinsk Gylden coinage after the Imperial-Danish War. Frederik III pivots gold coinage to the Guldkrone tariff programme from 1655 (separate Müntzfuß family)."
    demonetisation:
      anywhere: 1700
      approx_anywhere: true
      note: "Approximate practical-circulation tail — surviving specimens predominantly remelted into Reichsdukaten during the 17th century. By Christian V's death 1699 the Rhinsk Gylden is collector / numismatic territory."
    anywhere_label:
      de: Königreich Dänemark und Norwegen
      en: Royal Danish-Norwegian Realm
      uk: Королівство Данії і Норвегії
f2_guldkrone_fod:
