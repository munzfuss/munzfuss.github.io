rosenobel_fod:
  name:
    de: Rosenobel-fod
    en: Rosenobel-fod
    uk: Rosenobel-fod
  historical_name: Rosenobel / Guldridder (½-Rosenobel period nickname); Anpassung des englischen Rose-Noble-Modells
  metal: gold
  grid_unit_g: 233.856                  # Cöllnische Marck rauh (Goldlegierung)
  grid_unit_name: Cöllnische Marck
  grid_stops: 26                        # ≈ 26 Rosenobler aus der rauen Cölln. Marck (233.856 / 8.994 ≈ 26.0)
  grid_unit_convention: rauh
  fineness_standard: 0.833              # 20 Karat (= 20/24) — Hede c4h23a/c4h24 verbatim attestiert
  fineness_period: '20 Karat'
  fineness_display: "833 ‰ (20 Karat = 20/24, Hede c4h23/c4h24 verbatim)"
  grundwerte:
    heading:
      de: "Grundwerte · Rosenobel-fod"
      en: "Base values · Rosenobel-fod"
      uk: "Базові значення · Rosenobel-fod"
    subheading:
      de: "Cöllnische Marck rauh = 233,856 g Goldlegierung · Probe <b>833 ‰</b> (20 Karat, Hede c4h23/c4h24 verbatim) · <b>≈ 26 Rosenobler aus der rauen Cölln. Marck</b> · per Stück <b>8,994 g rauh / 7,492 g fein</b> (Hede c4h23a Christian IV.) · zwei Phasen: <b>Phase I</b> Frederik II. 1584 (Frederiksborg, unikat, andere Brutto-Massengewicht 7,69 g, Probe unbekannt) und <b>Phase II</b> Christian IV. 1611-1629 (Kopenhagen, standardisierter .833/8,994 g) · Anpassung des <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">englischen Rose-Noble-Modells</a><sup>[ref:danskmoent-1rosenobel]</sup>"
      en: "Cologne mark rough = 233.856 g gold alloy · fineness <b>833 ‰</b> (20 carats, Hede c4h23/c4h24 verbatim) · <b>≈ 26 Rosenobler per rough Cologne mark</b> · per piece <b>8.994 g rough / 7.492 g fine</b> (Hede c4h23a Christian IV) · two phases: <b>Phase I</b> Frederik II 1584 (Frederiksborg, unique, different gross weight 7.69 g, fineness unknown) and <b>Phase II</b> Christian IV 1611-1629 (Copenhagen, standardised .833 / 8.994 g) · adaptation of the <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">English Rose Noble model</a><sup>[ref:danskmoent-1rosenobel]</sup>"
      uk: "Кельнська марка повна = 233,856 г золотого сплаву · проба <b>833 ‰</b> (20 карат, Hede c4h23/c4h24 verbatim) · <b>≈ 26 Rosenobler з повної кельнської марки</b> · на штуку <b>8,994 г повної / 7,492 г чистого</b> (Hede c4h23a Christian IV) · дві фази: <b>Phase I</b> Frederik II 1584 (Frederiksborg, унікат, інша повна вага 7,69 г, проба невідома) і <b>Phase II</b> Christian IV 1611-1629 (Копенгаген, стандартизовано .833 / 8,994 г) · адаптація <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">моделі англійського Rose Noble</a><sup>[ref:danskmoent-1rosenobel]</sup>"
    badge:
      de: "Gold"
      en: "Gold"
      uk: "Золото"
    rows:
      - key:
          de: "Belegexemplare über zwei Regenten"
          en: "Reference specimens across two rulers"
          uk: "Еталонні зразки через двох правителів"
        value:
          de: "<b>Phase I — Frederik II. 1584</b> (Frederiksborg-Münzstätte): <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">Hede 7B</a> / Schou 2 / Sieg 29, <em>unikat</em>, Brutto 7,69 g, Probe unbekannt (Belegexemplar Hede f2h7b; Avers «<i>FRIDERICVS Z D.G. DA. NO. SLA.GO.O. REX</i>», Revers vierzeilige Legende «<i>ROSEN / NOWEL / 1584</i>» umrandet vom Wahlspruch Frederik II. «<i>ALLEIN MEIN HOFFNUNG ZV GOTT</i>» — die period-attestierte Inschriftform «ROSEN NOWEL» wurde durch Wilcke 1950 und die moderne numismatische Literatur retrospektiv zu «Rosenobel» standardisiert<sup>[ref:nationalmuseet-frederik-ii-1584-rosenobel]</sup>) — wahrscheinlich englisch-Rose-Noble-konform (7,78 g klassisch). <b>Phase II — Christian IV. 1611-1629</b> (Kopenhagen): <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">Hede 23A</a> Typ A (1611-1613 + 1627 + 1629) und Typ B (Hede 23B / Schou 2-3 / Sieg 149); ½-Rosenobel Hede 24 (1611, period-Spitzname «<i>Guldridder</i>» = «Goldritter»). Standardisiertes Brutto 8,994 g @ .833 Probe = 7,492 g fein (Hede c4h23a / c4h24 verbatim)."
          en: "<b>Phase I — Frederik II 1584</b> (Frederiksborg mint): <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">Hede 7B</a> / Schou 2 / Sieg 29, <em>unique</em>, brutto 7.69 g, fineness unknown (reference specimen Hede f2h7b; obverse «<i>FRIDERICVS Z D.G. DA. NO. SLA.GO.O. REX</i>», reverse four-line legend «<i>ROSEN / NOWEL / 1584</i>» ringed by Frederik II's Wahlspruch «<i>ALLEIN MEIN HOFFNUNG ZV GOTT</i>» — the period-attested inscription form «ROSEN NOWEL» was retrospectively standardised to «Rosenobel» by Wilcke 1950 and the modern numismatic literature<sup>[ref:nationalmuseet-frederik-ii-1584-rosenobel]</sup>) — probably conforming to the English Rose Noble (7.78 g classical). <b>Phase II — Christian IV 1611-1629</b> (Copenhagen): <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">Hede 23A</a> Type A (1611-1613 + 1627 + 1629) and Type B (Hede 23B / Schou 2-3 / Sieg 149); ½-Rosenobel Hede 24 (1611, period nickname «<i>Guldridder</i>» = «gold knight»). Standardised brutto 8.994 g at .833 fineness = 7.492 g fine (Hede c4h23a / c4h24 verbatim)."
          uk: "<b>Phase I — Frederik II 1584</b> (монетний двір Frederiksborg): <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">Hede 7B</a> / Schou 2 / Sieg 29, <em>унікат</em>, повна вага 7,69 г, проба невідома (еталонний зразок Hede f2h7b; аверс «<i>FRIDERICVS Z D.G. DA. NO. SLA.GO.O. REX</i>», реверс чотирирядкова легенда «<i>ROSEN / NOWEL / 1584</i>», обрамлена девізом Frederik II «<i>ALLEIN MEIN HOFFNUNG ZV GOTT</i>» — period-attested форму інскрипції «ROSEN NOWEL» Wilcke 1950 та сучасна нумізматична література ретроспективно стандартизували до «Rosenobel»<sup>[ref:nationalmuseet-frederik-ii-1584-rosenobel]</sup>) — імовірно відповідає англійському Rose Noble (7,78 г класично). <b>Phase II — Christian IV 1611-1629</b> (Копенгаген): <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">Hede 23A</a> Тип A (1611-1613 + 1627 + 1629) та Тип B (Hede 23B / Schou 2-3 / Sieg 149); ½-Rosenobel Hede 24 (1611, period-прізвисько «<i>Guldridder</i>» = «золотий лицар»). Стандартизована повна вага 8,994 г за .833 пробою = 7,492 г чистого (Hede c4h23a / c4h24 verbatim)."
      - key:
          de: "Englisches Vorbild und Lineage"
          en: "English model and lineage"
          uk: "Англійська модель і лінія"
        value:
          de: "Verbatim aus <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">danskmoent.dk</a>: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — der Name stammt von der englischen Münze Rose Noble aus dem 13.-14. Jahrhundert<sup>[ref:danskmoent-1rosenobel]</sup>. Das englische Rose Noble (Edward IV. 1465, 7,78 g, 10s = ½ Pfund, .995 Probe) ist das spätmittelalterliche Modell; die dänische Rosenobel-Karbung ist eine späte Anpassung im Renaissance-Kontext, vermittelt über den <a href=\"https://en.wikipedia.org/wiki/Sound_Dues\" target=\"_blank\">Øresund-Zoll</a> (Hans 1497 eingeführt). Frederik IIs einzelnes 1584-Stück (7,69 g) folgt noch dem klassischen 7,78-g-Standard; Christian IVs Massenkarbung 1611-1629 (8,994 g @ .833) verlängert den Standard im Sinne dänischer Renaissance-Münzpraxis."
          en: "Verbatim from <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">danskmoent.dk</a>: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — the name derives from the English Rose Noble coin of the 13th-14th centuries<sup>[ref:danskmoent-1rosenobel]</sup>. The English Rose Noble (Edward IV 1465, 7.78 g, 10s = half-pound, .995 fineness) is the late-medieval model; the Danish Rosenobel coinage is a late adaptation in the Renaissance context, mediated through the <a href=\"https://en.wikipedia.org/wiki/Sound_Dues\" target=\"_blank\">Øresund Toll</a> (introduced by Hans in 1497). Frederik II's single 1584 piece (7.69 g) still follows the classical 7.78-g standard; Christian IV's mass coinage 1611-1629 (8.994 g at .833) extends the standard in the spirit of Danish Renaissance mint practice."
          uk: "Verbatim з <a href=\"https://www.danskmoent.dk/1rosenob.htm\" target=\"_blank\">danskmoent.dk</a>: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — назва походить від англійської монети Rose Noble XIII-XIV століть<sup>[ref:danskmoent-1rosenobel]</sup>. Англійський Rose Noble (Edward IV 1465, 7,78 г, 10s = пів-фунта, .995 проба) — пізньосередньовічна модель; данське карбування Rosenobel — пізня адаптація в ренесансному контексті, опосередкована через <a href=\"https://en.wikipedia.org/wiki/Sound_Dues\" target=\"_blank\">Øresund-мито</a> (запроваджене Hans 1497). Окремий зразок Frederik II 1584 р. (7,69 г) ще слідує класичному стандарту 7,78 г; масове карбування Christian IV 1611-1629 (8,994 г за .833) продовжує стандарт у дусі данської ренесансної монетної практики."
      - key:
          de: "Wirtschaftlicher Hintergrund — Kalmar-Krieg und Söldnerbezahlung"
          en: "Economic background — Kalmar War and mercenary pay"
          uk: "Економічний контекст — Кальмарська війна і оплата найманців"
        value:
          de: "Christian IVs Hauptkarbungsperiode 1611-1613 fällt exakt mit dem <a href=\"https://www.historyofwar.org/articles/wars_kalmar.html\" target=\"_blank\">Kalmar-Krieg</a> (1611-1613)<sup>[ref:historyofwar-kalmar-war-1611]</sup>: «<i>King Christian IV attacked Sweden in the 1611-13 Kalmar War but failed to accomplish his main objective of forcing Sweden to return to the union with Denmark. The war led to no territorial changes, but Sweden was forced to pay a war indemnity of 1 million silver riksdaler to Denmark</i>». Die Prestige-Goldemission diente der Söldnerbezahlung und diplomatischen Repräsentation. Die Folge-Karbung 1627 + 1629 fällt in den Beginn der dänischen Beteiligung am Dreißigjährigen Krieg (Kaiserlich-Dänischer Krieg 1625-1629) — selbe Funktion, anderer Konflikt-Kontext."
          en: "Christian IV's main coinage period 1611-1613 coincides exactly with the <a href=\"https://www.historyofwar.org/articles/wars_kalmar.html\" target=\"_blank\">Kalmar War</a> (1611-1613)<sup>[ref:historyofwar-kalmar-war-1611]</sup>: «<i>King Christian IV attacked Sweden in the 1611-13 Kalmar War but failed to accomplish his main objective of forcing Sweden to return to the union with Denmark. The war led to no territorial changes, but Sweden was forced to pay a war indemnity of 1 million silver riksdaler to Denmark</i>». The prestige gold issue served mercenary pay and diplomatic representation. The follow-up coinage 1627 + 1629 falls within the start of Danish involvement in the Thirty Years' War (Imperial-Danish War 1625-1629) — the same function under a different conflict."
          uk: "Головний період карбування Christian IV 1611-1613 точно збігається з <a href=\"https://www.historyofwar.org/articles/wars_kalmar.html\" target=\"_blank\">Кальмарською війною</a> (1611-1613)<sup>[ref:historyofwar-kalmar-war-1611]</sup>: «<i>King Christian IV attacked Sweden in the 1611-13 Kalmar War but failed to accomplish his main objective of forcing Sweden to return to the union with Denmark. The war led to no territorial changes, but Sweden was forced to pay a war indemnity of 1 million silver riksdaler to Denmark</i>». Престижна золота емісія слугувала оплаті найманців і дипломатичній репрезентації. Наступне карбування 1627 + 1629 припадає на початок данської участі у Тридцятилітній війні (Імперсько-данська війна 1625-1629) — та сама функція, інший конфлікт."
      - key:
          de: "Tarif zum Speciedaler (rechnerisch)"
          en: "Tariff vs. Speciedaler (computed)"
          uk: "Тариф до Speciedaler (розрахунково)"
        value:
          de: "Kein period-attestierter formaler Tarif gefunden. Aus dem Feingewicht 7,492 g Au bei Markt-Au/Ag ≈ 12,5:1 (frühes 17. Jahrhundert) ≈ 93,65 g Feinsilber-Äquivalent. Bei 9¼-Speciedaler-Standard 25,28 g Feinsilber ergibt das ≈ <b>3,7 Speciedaler</b> Metallwert per Rosenobel — typischer Tarif somit vermutlich 3-4 Specie (ähnlich der späteren Frederik-III-Guldkrone mit 3½-Specie-Tarif)."
          en: "No period-attested formal tariff has been found. From the fine weight 7.492 g Au at a market Au/Ag of ≈ 12.5:1 (early 17th century) ≈ 93.65 g fine-silver equivalent. At the 9¼-Speciedaler standard of 25.28 g fine silver this gives ≈ <b>3.7 Speciedaler</b> metal value per Rosenobel — the typical tariff was thus probably 3-4 Specie (similar to the later Frederik-III-Guldkrone with a 3½-Specie tariff)."
          uk: "Period-attested формального тарифу не знайдено. З чистої ваги 7,492 г Au при ринковому Au/Ag ≈ 12,5:1 (початок XVII ст.) ≈ 93,65 г чистого срібла еквівалент. За стандарту 9¼-Speciedaler 25,28 г чистого срібла це дає ≈ <b>3,7 Speciedaler</b> металевого значення на Rosenobel — типовий тариф імовірно 3-4 Specie (подібно до пізнішої Frederik-III-Guldkrone з тарифом 3½ Specie)."
    rechnungsfraktionen_label:
      de: "Rechnungsfraktionen (Rosenobel-Prestige + Sub-Stückelung)"
      en: "Accounting fractions (Rosenobel prestige + sub-denomination)"
      uk: "Розрахункові фракції (Rosenobel-престиж + субномінали)"
    rechnungsfraktionen:
      de: |
        <b>1 Rosenobel</b> = <b>8,994 g rauh / 7,492 g fein</b> @ 20 Karat (.833)<sup>[ref:danskmoent-1rosenobel]</sup><br>
        <b>½ Rosenobel</b> («Guldridder») = 4,497 g rauh / 3,746 g fein @ .833 (Hede 24, Christian IV. 1611)<br>
        <em>Tarif zum Speciedaler:</em> rechnerisch ≈ 3-4 Specie per Feingewicht-Konversion (Au/Ag 12,5:1), kein period-attestierter formaler Tarif.<br>
        Englisches Rose-Noble-Modell (Edward IV. 1465): 7,78 g, 10 Schilling = ½ Pfund Sterling.
      en: |-
        <b>1 Rosenobel</b> = <b>8.994 g rough / 7.492 g fine</b> at 20 carats (.833)<sup>[ref:danskmoent-1rosenobel]</sup><br><b>½ Rosenobel</b> («Guldridder») = 4.497 g rough / 3.746 g fine at .833 (Hede 24, Christian IV 1611)<br><em>Tariff vs. Speciedaler:</em> computed ≈ 3-4 Specie via fine-weight conversion (Au/Ag 12.5:1); no period-attested formal tariff.<br>English Rose Noble model (Edward IV 1465): 7.78 g, 10 shillings = half-pound sterling.
      uk: |-
        <b>1 Rosenobel</b> = <b>8,994 г повної / 7,492 г чистого</b> за 20 карат (.833)<sup>[ref:danskmoent-1rosenobel]</sup><br><b>½ Rosenobel</b> («Guldridder») = 4,497 г повної / 3,746 г чистого за .833 (Hede 24, Christian IV 1611)<br><em>Тариф до Speciedaler:</em> розрахунково ≈ 3-4 Specie через конверсію чистої ваги (Au/Ag 12,5:1); period-attested формального тарифу немає.<br>Англійська модель Rose Noble (Edward IV 1465): 7,78 г, 10 шилінгів = пів-фунта стерлінгів.
  description:
    de: '<b>Renaissance-Anpassung des englischen Rose-Noble-Modells in der dänischen Königsmünze.</b> Verbatim aus <a href="https://www.danskmoent.dk/1rosenob.htm" target="_blank">danskmoent.dk</a>: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>»<sup>[ref:danskmoent-1rosenob]</sup>. Frederik II. prägt 1584 in <b>Frederiksborg</b> einen unikalen Rosenobel-Vorläufer bei klassisch-englischer Brutto-Masse 7,69 g (Hede 7B / Schou 2 / Sieg 29) — wahrscheinlich näher am englischen Original 7,78 g (Edward IV. 1465 Rose Noble). Christian IV. nimmt das Programm 1611 in Kopenhagen wieder auf — standardisiertes Brutto <b>8,994 g bei 20 Karat (.833) Probe = 7,492 g fein</b> per Stück (Hede c4h23a + c4h24 verbatim). Sub-Stückelung <b>½ Rosenobel</b> (Hede 24, 1611, period-Spitzname <i>«Guldridder»</i> = «Goldritter»). Hauptkarbungsperiode 1611-1613 fällt exakt mit dem <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">Kalmar-Krieg</a> (1611-1613)<sup>[ref:historyofwar-wars-kalmar]</sup>: «<i>King Christian IV attacked Sweden in the 1611-13 Kalmar War but failed to accomplish his main objective of forcing Sweden to return to the union with Denmark. The war led to no territorial changes, but Sweden was forced to pay a war indemnity of 1 million silver riksdaler to Denmark.</i>» Folge-Karbung 1627 + 1629 fällt in den Beginn der dänischen Beteiligung am Dreißigjährigen Krieg (Kaiserlich-Dänischer Krieg 1625-1629). Funktion durchgehend: <b>Prestige-Goldemission zur Söldnerbezahlung und diplomatischen Repräsentation</b>, nicht Tagesumlauf. Tarif zum Speciedaler rechnerisch ≈ 3-4 Specie (kein period-attestierter formaler Tarif). <em>Distinkter Müntzfuß-Stamm</em>, nicht zu verwechseln mit der früheren [fuss:nobel_fod] (Sovereign-Tier 14,61 g @ .986, 1496-1532) oder der späteren [fuss:guldkrone]-Tarifmünze Christians IV. (5,996 g @ .917, 1618+).'
    en: '<b>A Renaissance adaptation of the English Rose Noble model in the Danish royal mint.</b> Verbatim from <a href="https://www.danskmoent.dk/1rosenob.htm" target="_blank">danskmoent.dk</a>: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>»<sup>[ref:danskmoent-1rosenob]</sup>. Frederik II strikes a unique Rosenobel predecessor at <b>Frederiksborg</b> in 1584 at the classical English brutto of 7.69 g (Hede 7B / Schou 2 / Sieg 29) — probably closer to the English original 7.78 g (Edward IV 1465 Rose Noble). Christian IV resumes the programme in Copenhagen in 1611 — standardised brutto <b>8.994 g at 20 carats (.833) fineness = 7.492 g fine</b> per piece (Hede c4h23a + c4h24 verbatim). Sub-denomination <b>½ Rosenobel</b> (Hede 24, 1611, period nickname <i>«Guldridder»</i> = «gold knight»). The main coinage period 1611-1613 coincides exactly with the <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">Kalmar War</a> (1611-1613)<sup>[ref:historyofwar-wars-kalmar]</sup>: «<i>King Christian IV attacked Sweden in the 1611-13 Kalmar War but failed to accomplish his main objective of forcing Sweden to return to the union with Denmark. The war led to no territorial changes, but Sweden was forced to pay a war indemnity of 1 million silver riksdaler to Denmark.</i>» The follow-up coinage 1627 + 1629 falls within the start of Danish involvement in the Thirty Years'' War (Imperial-Danish War 1625-1629). Function throughout: <b>a prestige gold issue for mercenary pay and diplomatic representation</b>, not daily circulation. Tariff vs. Speciedaler computed ≈ 3-4 Specie (no period-attested formal tariff). <em>A distinct Müntzfuß lineage</em>, not to be confused with the earlier [fuss:nobel_fod] (Sovereign tier 14.61 g at .986, 1496-1532) or the later [fuss:guldkrone] tariff coin of Christian IV (5.996 g at .917, 1618+).'
    uk: '<b>Ренесансна адаптація моделі англійського Rose Noble у данській королівській монеті.</b> Verbatim з <a href="https://www.danskmoent.dk/1rosenob.htm" target="_blank">danskmoent.dk</a>: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>»<sup>[ref:danskmoent-1rosenob]</sup>. Frederik II карбує унікального попередника Rosenobel у <b>Frederiksborg</b> 1584 р. з класичною англійською повною вагою 7,69 г (Hede 7B / Schou 2 / Sieg 29) — імовірно ближче до англійського оригіналу 7,78 г (Edward IV 1465 Rose Noble). Christian IV відновлює програму в Копенгагені 1611 р. — стандартизована повна вага <b>8,994 г за 20 карат (.833) пробою = 7,492 г чистого</b> на штуку (Hede c4h23a + c4h24 verbatim). Субномінал <b>½ Rosenobel</b> (Hede 24, 1611, period-прізвисько <i>«Guldridder»</i> = «золотий лицар»). Головний період карбування 1611-1613 точно збігається з <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">Кальмарською війною</a> (1611-1613)<sup>[ref:historyofwar-wars-kalmar]</sup>: «<i>King Christian IV attacked Sweden in the 1611-13 Kalmar War but failed to accomplish his main objective of forcing Sweden to return to the union with Denmark. The war led to no territorial changes, but Sweden was forced to pay a war indemnity of 1 million silver riksdaler to Denmark.</i>» Наступне карбування 1627 + 1629 припадає на початок данської участі у Тридцятилітній війні (Імперсько-данська війна 1625-1629). Функція впродовж: <b>престижна золота емісія для оплати найманцям і дипломатичної репрезентації</b>, не щоденний обіг. Тариф до Speciedaler розрахунково ≈ 3-4 Specie (period-attested формального тарифу немає). <em>Окрема стопа</em>, не плутати з ранішою [fuss:nobel_fod] (Sovereign-tier 14,61 г за .986, 1496-1532) чи пізнішою тарифною [fuss:guldkrone] Christian IV (5,996 г за .917, 1618+).'
  fractions:
    "1":   {soll_rau_g: 8.994, soll_fein_g: 7.492}     # 1 Rosenobel Christian IV (Hede c4h23a 1611-1629, .833)
    "1/2": {soll_rau_g: 4.497, soll_fein_g: 3.746}     # ½ Rosenobel «Guldridder» Christian IV (Hede c4h24 1611, .833)
  events:
    first_adoption:
      anywhere: 1584
      note: "Frederik II strikes a unique Rosenobel predecessor in 1584 at Frederiksborg (Hede 7B / Schou 2 / Sieg 29, unique specimen). The date is exact — the coin itself is dated 1584; Wilcke (1931) treats it as a standalone study under the title «Frederik II.s Guldmønt 1584» (Daler, Mark og Kroner 1481-1914, pp. 85-90); the piece is part of «Dronning Sophies gavesæt» (Queen Sophie's gift set, documented by Galster 1959 + Jensen Steen 1975). Brutto 7.69 g — close to the English classical Rose Noble standard 7.78 g. Programme not continued by Frederik II after 1584; the line is dormant until Christian IV revives it in 1611."
    first_mint:
      anywhere: 1584
      note: "Frederik II Rosenobel 1584 — Frederiksborg, Hede 7B, unique specimen (f2h7b), date is exact (specimen dated 1584). Fineness not recorded in the source; weight 7.69 g brutto. Source: danskmoent.dk (Hede 7B)."
    last_mint:
      anywhere: 1629
      note: "Christian IV Hede 23A Type A — last dated emission year 1629. Falls within the Imperial-Danish War (1625-1629). Christian IV does not resume Rosenobel coinage after 1629; the line transitions to other gold formats (Guldkrone from 1618 in parallel, Reichsdukatenfuß continuation)."
    std_end:
      anywhere: 1629
      approx_anywhere: true
      note: "Standard effectively ends with the last Christian IV emission 1629. No successor mint master continues the Rosenobel programme; the Sovereign-prestige niche in Danish gold coinage is filled later by the Frederik-III Guldkrone tariff programme (1655-1668, separate Müntzfuß lineage)."
    demonetisation:
      anywhere: 1700
      approx_anywhere: true
      note: "Approximate practical-circulation tail — Rosenobler served prestige + mercenary-pay functions, not daily circulation. Surviving specimens drift into the collector / numismatic register by the late 17th century. Hede c4h23a confirms emission across 5 years (1611, 1612, 1613, 1627, 1629); ½ Rosenobel only 1611."
    anywhere_label:
      de: Königreich Dänemark und Norwegen
      en: Royal Danish-Norwegian Realm
      uk: Королівство Данії і Норвегії
