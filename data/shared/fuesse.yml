        <b>1 Vereinskrone</b> = 11,111 г повної · <b>10,000 г</b> чистого золота · 900 ‰<sup>[ref:wikipedia-de-krone-vereinsgoldmuenze]</sup><br><b>½ Vereinskrone</b> = 5,555 г повної · <b>5,000 г</b> чистого золота · 900 ‰<sup>[ref:wikipedia-de-krone-vereinsgoldmuenze]</sup><br><b>Ринковий курс (Au:Ag 1:15,5):</b> 1 Vereinskrone ≈ <b>9,3 Taler Talerwährung</b> — без договірного тарифу, без обов'язку прийняття<sup>[ref:wikipedia-de-krone-vereinsgoldmuenze]</sup><br><em>2-Krone (подвійної Vereinskrone) не існує — ані як Probemønt, ані у звичайних емісіях.</em>
  description:
    de: 'Reichsweit standardisierte Goldhandelsmünze nach Wiener Münzvertrag vom <b>24. Januar 1857</b> (in Kraft 1. Mai 1857; Vertragslaufzeit biß Ende 1878 angelegt)<sup>[ref:en-31895]</sup> zwischen Österreich, Liechtenstein und den deutschen Zollvereinsstaaten. Standard: <b>50 Vereinskronen / Pfund (500 g) Feingold = 10 g fein je Krone</b> bei Probe 900 ‰ (= 11,111 g rau); halbe Krone analog (5 g fein bei 5,555 g rau). Reine <b>Handelsmünze ohne Annahmezwang</b>; Marktkurs bei Au:Ag 1:15,5 ergibt 1 Vereinskrone ≈ 9,3 Taler Talerwährung — staatliche Kassen konnten nur temporär (max. 6 Monate) Tarife festsetzen. Schleswig-Holstein wurde durch den <b>Wiener Frieden vom 30. Oktober 1864</b> aus dem dänischen Gesamtstaat herausgelöst und ging zunächst unter preußisch-österreichische Verwaltung, ab 1867 endgültig zu Preußen über — damit erst dann Teil des Wiener-Münzvertrags-Raums. Da die Altonaer Münze schon <b>1863 geschlossen</b> war, gibt es <em>keine spezifisch holsteinischen Vereinskronen-Prägungen</em>; die in den Herzogtümern zirkulierenden Stücke kamen aus den nahen Hauptmintstaaten <b>Hannover (B)</b> und <b>Preußen (A)</b>. Mintage-Stop 1871 mit Reichsgründung; Demonetisierung <b>1. April 1874</b>, Einlösungsfrist biß <b>30. Juni 1874</b> — von 2 138 256 geprägten Vollkronen wurden nur 332 091 (≈ 15,5 %) eingelöst — die Mehrzahl im Ausland eingeschmolzen. Mathematischer Vorläufer der Reichsgoldmark (Pfund-Basis, .900 Probe).
'
    en: 'An imperially standardised gold trade coin under the Vienna Coin Treaty of <b>24 January 1857</b> (in force from 1 May 1857; treaty term planned until end of 1878)<sup>[ref:en-31895]</sup> among Austria, Liechtenstein and the German Zollverein states. Standard: <b>50 Vereinskronen per pound (500 g) of fine gold = 10 g fine per Krone</b> at 900‰ fineness (= 11.111 g rough); the half Krone analogously (5 g fine at 5.555 g rough). A pure <b>trade coin with no compulsory acceptance</b>; the market rate at Au:Ag 1:15.5 yields 1 Vereinskrone ≈ 9.3 Taler Talerwährung — state treasuries could only set temporary tariffs (max. six months). Schleswig-Holstein was detached from the Danish composite state by the <b>Vienna Peace of 30 October 1864</b> and at first came under joint Prussian-Austrian administration, finally moving to Prussia in 1867 — only at that point did it become part of the Vienna-treaty area. Since the Altona mint had been <b>closed in 1863</b>, there are <em>no Holstein-specific Vereinskronen issues</em>; the pieces circulating in the duchies came from the neighbouring main mint states <b>Hanover (B)</b> and <b>Prussia (A)</b>. Mintage stopped in 1871 with the Reich''s founding; demonetisation on <b>1 April 1874</b>, redemption deadline <b>30 June 1874</b> — of 2,138,256 full Kronen struck, only 332,091 (≈ 15.5 %) were redeemed — the majority melted down abroad. The mathematical precursor of the Reichsgoldmark (pound-based, .900 fineness).'
    uk: 'Загальноімперсько-стандартизована золота торгова монета за Wiener Münzvertrag <b>24 січня 1857</b> (чинність з 1 травня 1857; термін договору планований до кінця 1878)<sup>[ref:en-31895]</sup> між Австрією, Ліхтенштейном і державами німецького Цольферайну. Стандарт: <b>50 Vereinskronen з фунта (500 г) чистого золота = 10 г чистого на Krone</b> за пробою 900 ‰ (= 11,111 г повної); halbe Krone аналогічно (5 г чистого при 5,555 г повної). Суто <b>торгова монета без обов''язку прийняття</b>; ринковий курс при Au:Ag 1:15,5 дає 1 Vereinskrone ≈ 9,3 Taler Talerwährung — державні каси могли встановлювати лише тимчасові тарифи (макс. 6 місяців). Шлезвіг-Гольштейн був відірваний від данського цілісного союзу <b>Wiener Frieden 30 жовтня 1864</b> і спочатку перейшов під спільну прусько-австрійську адміністрацію, остаточно до Пруссії 1867 — лише тоді й увійшов у простір Wiener Münzvertrag. Оскільки Альтонський монетний двір було <b>закрито 1863 р.</b>, специфічно гольштинських Vereinskronen-емісій <em>немає</em>; монети, що оберталися в герцогствах, надходили з сусідніх головних мінт-штатів <b>Ганновер (B)</b> і <b>Пруссія (A)</b>. Карбування припинилось 1871 з утворенням Рейху; демонетизація <b>1 квітня 1874</b>, термін викупу <b>30 червня 1874</b> — з 2 138 256 викарбуваних повних Kronen викуплено лише 332 091 (≈ 15,5 %) — більшість переплавлено за кордоном. Математичний попередник Reichsgoldmark (фунтова база, проба .900).'
  fractions:
    "1/2": {soll_rau_g: 5.555, soll_fein_g: 5.000}
    "1": {soll_rau_g: 11.111, soll_fein_g: 10.000}
  events:
    first_adoption:
      anywhere: 1857
      holstein: 1864
      note: '1857 = Wiener Münzvertrag 24. Januar 1857 (in Kraft 1. Mai 1857) zwischen Österreich, Liechtenstein und Zollvereinsstaaten. Holstein-Adoption 1864 mit Wiener Frieden 30. Oktober 1864 / preußisch-österreichischer Verwaltung; eigene SH-Prägungen sind nicht dokumentiert (Altona 1863 geschlossen).'
    first_mint:
      anywhere: 1857
      holstein:
      note: anywhere = erste Vereinskronen aus Hannover, Preußen u.a. holstein = null (keine eigenen SH-Prägungen — Altona-Münze 1863 geschlossen).
    last_mint:
      anywhere: 1871
      holstein:
      note: 1871 = letzte Vereinskronen-Prägung in den Vertragsstaaten; mit Reichsgründung Mintage-Stop. Holstein hatte nie eigene Vereinskronen-Prägungen — `null` markiert die fehlende Holstein-Mint-Spur, sonst würde im Timeline-Render eine entartete 0-0-Schicht entstehen.
    std_end:
      anywhere: 1871
      holstein: 1871
      note: Münzgesetz Deutsches Reich 4. Dezember 1871 (Reichsgoldmark) löst die Vereinsgoldmünze als Reichs-Goldstandard ab.
    demonetisation:
      anywhere: 1874
      holstein: 1874
      note: 'Demonetisierung 1. April 1874; Einlösungsfrist biß 30. Juni 1874. Von 2 138 256 geprägten Vereinskronen wurden nur 332 091 (≈ 15,5 %) eingelöst — die Mehrzahl floß als Goldarbitrage ins Ausland und wurde dort eingeschmolzen.'

    anywhere_label:
      de: Vertragsstaaten des Wiener Münzvertrages 1857 (Österreich + Liechtenstein + dt. Zollverein)
      en: Signatories of the Vienna Coin Treaty 1857 (Austria + Liechtenstein + German Zollverein)
      uk: Учасники Wiener Münzvertrag 1857 (Австрія + Ліхтенштейн + нім. Цольферайн)

