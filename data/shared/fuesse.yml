  description:
    de: |
      Spezifisch dänische tarif-tragende Goldlinie. Eingeführt 1714
      durch Frederik IV. zur Finanzierung des Großen Nordischen
      Krieges (81½ Stück / rauer Cölln. Marck, 21 Karat ≈ .875,
      2,511 g Feingold; Tarif 12 Mark Kurant = 2 Rigsdaler Courant).
      1727 auf 11 Mark gesenkt, 1757 zur Einschmelzung eingezogen.
      Im Juni 1757 Reform Frederiks V.: 75 Stück / Marck, 2,72832 g
      Feingold, Originaltarif 12 Mark wieder hergestellt — größte
      Goldprägung Dänemarks (≈ 3,03 Mio. Stück 1757–1765).
      Christian-VII-Geburtstagsstrich 27. Januar 1771 (131 Stück);
      Eröffnung Altonaer Münze 23. August 1771 versorgt
      Schleswig-Holstein. Plakat 2. Dezember 1782: freie
      Privatprägung für jedermann, 75 Stück / Marck, 21 Karat —
      löst Hauptphase 1781–1796 aus (≈ 237 000 Stück Altona +
      Kopenhagen). 1795 Plakat-Widerruf, 1796 letzte Prägung
      (30 703 Stück mit 1785-Datum). Der Statsbankerot 1813
      reformiert nur die Silber-Courant-Linie; Kurantdukat formal
      nicht demonetisiert. Faktischer Endpunkt: 1873 Skandinavische
      Münzunion.
    en: |-
      A specifically Danish tariff-bearing gold line. Introduced in 1714 by Frederik IV to finance the Great Northern War (81½ pieces per rough Cologne Mark, 21 carats ≈ .875, 2.511 g fine gold; tariff 12 Mark Kurant = 2 Rigsdaler Courant). The tariff was reduced to 11 Mark in 1727 and the older issue was called in for melting in 1757. In June 1757 Frederik V's reform set 75 pieces per Mark, 2.72832 g fine gold, restoring the original 12 Mark tariff — the largest gold coinage in Danish history (≈ 3.03 million pieces 1757–1765). A Christian-VII-birthday strike on 27 January 1771 (131 pieces); the Altona mint opens on 23 August 1771 to supply Schleswig-Holstein. Plakat of 2 December 1782: free private coinage for anyone at 75 pieces per Mark, 21 carats — triggering the main phase of 1781–1796 (≈ 237,000 pieces in Altona + Copenhagen). The plakat is revoked in 1795, with a final issue in 1796 (30,703 pieces with 1785 dies). The Statsbankerot of 1813 reforms only the silver Courant line; the Kurantdukat is not formally demonetised. The factual endpoint is the Scandinavian Monetary Union of 1873.
    uk: |-
      Специфічно данська тариф-несуча золота лінія. Запроваджено 1714 р. Frederik IV для фінансування Великої Північної війни (81½ штук з повної Кельнської марки, 21 карат ≈ .875, 2,511 г чистого золота; тариф 12 Mark Kurant = 2 Rigsdaler Courant). 1727 р. знижено до 11 Mark, 1757 р. скликано на переплав. У червні 1757 р. реформа Frederik V встановила 75 штук з марки, 2,72832 г чистого золота, оригінальний тариф 12 Mark відновлено — найбільше карбування золота в історії Данії (≈ 3,03 млн шт. 1757–1765). Меморіальний strike Christian VII 27 січня 1771 (131 шт.); відкриття Альтонського монетного двору 23 серпня 1771 забезпечує Schleswig-Holstein. Plakat 2 грудня 1782: вільне приватне карбування для всіх — 75 штук з марки, 21 карат — запускає головну фазу 1781–1796 (≈ 237 000 шт. Альтона + Копенгаген). 1795 plakat скасовано, 1796 останнє карбування (30 703 шт. з датою 1785). Statsbankerot 1813 реформує лише срібну Courant-лінію; Kurantdukat формально не демонетизовано. Фактичний кінець: 1873 Скандинавська монетна унія.
  fractions:
    "1/2": {soll_rau_g: 1.55904, soll_fein_g: 1.36416}
    "1": {soll_rau_g: 3.11808, soll_fein_g: 2.72832}
    "2": {soll_rau_g: 6.23616, soll_fein_g: 5.45664}    # Probemønt only — kein Umlauf
  events:
    first_adoption:
      anywhere: 1714
      holstein: 1771
      note: '1714 = erste Frederik-IV.-Kurantdukaten zur Finanzierung des Großen Nordischen Krieges. Holstein-Adoption 1771 mit Eröffnung der Altonaer Münze; reale 12-Mark-Prägung in Altona ab 1783 (KM-641.2).'
    first_mint:
      anywhere: 1714
      holstein: 1783
      note: anywhere = Frederik IV. Kurantdukat 1714–1717. holstein = KM-641.2 1783-Altona Christian VII.
    last_mint:
      anywhere: 1796
      holstein: 1785
      note: 'anywhere = letzte Altonaer Restprägung 1796 mit 1785-Datum (30 703 Stück); auch in Kopenhagen keine späteren Stücke. holstein = KM-641.4 mit Datum 1785.'
    std_end:
      anywhere: 1873
      holstein: 1864
      note: 'Keine formale Demonetisierungs-Forordning ist überliefert. Stations: 1796 letzte Prägung; 1813 Statsbankerot betrifft nur die Silber-Courantlinie (Forordning 5. Januar 1813), Gold nicht erfasst; 1873 Skandinavische Münzunion ersetzt Speciedaler/Kurantdukat durch die Krone — faktischer Endpunkt. holstein 1864 = preußische Annexion ende der dän. Tarifierung.'
    demonetisation:
      anywhere: 1873
      holstein: 1864
      note: 'Skandinavische Münzunion 1873 (Krone) ersetzt die Speciedaler-Tariflinie und damit auch den Kurantdukat de facto. Reichsmünzgesetz 4. Dec 1871 in Holstein wirkt ähnlich, ab 1. Januar 1876 sind Mark und Vereinsthaler die einzigen gesetzlichen Zahlungsmittel.'

