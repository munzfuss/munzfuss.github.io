      - key:
          de: "Münzstätten"
          en: "Mints"
          uk: "Монетні двори"
        value:
          de: "Berlin (A), Hannover (B), Frankfurt am Main (C), München (D), Dresden (E), Stuttgart (F), Karlsruhe (G), Hamburg (J) — keine Holstein-Prägung (Altona-Münze geschlossen 1863)"
          en: "Berlin (A), Hannover (B), Frankfurt am Main (C), Munich (D), Dresden (E), Stuttgart (F), Karlsruhe (G), Hamburg (J) — no Holstein issue (Altona mint closed in 1863)"
          uk: "Берлін (A), Ганновер (B), Франкфурт-на-Майні (C), Мюнхен (D), Дрезден (E), Штутгарт (F), Карлсруе (G), Гамбург (J) — у Гольштейні не карбувалися (двір в Альтоні закритий 1863 р.)"
