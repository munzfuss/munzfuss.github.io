      uk: "Розрахункові фракції"
    rechnungsfraktionen:
      de: |
        <b>1 Vereinsthaler</b> = <b>16,66667 g</b> Feinsilber = 30 Silbergroschen = 360 Pfennig<br>
        <b>1 Silbergroschen</b> = <b>0,55556 g</b> fein (<i>Rechnungseinheit</i>) = 1/30 Vereinsthaler = 12 Pfennig<br>
        <b>2 Vereinsthaler</b> = 3½ südd. Gulden = 3 österr. Gulden (Brückenmünze des Wiener Vertrags)<br>
        <b>Ab 1871:</b> 1 Vereinsthaler = 3 Mark (biß 1907 gesetzliches Zahlmittel)<br>
        <em><b>Hinweis:</b> Vereinsthaler und ½-/⅙-Stücke wurden par-Silber geprägt. Die kleineren Silbergroschen-/Pfennig-Stücke sind <b>Scheidemünzen</b> mit reduziertem Feingehalt — der Rechnungswert von 0,556 g pro Silbergroschen gilt nicht für die tatsächlichen Münzen.</em>
      en: |-
        <b>1 Vereinsthaler</b> = <b>16.66667 g</b> fine silver = 30 Silbergroschen = 360 Pfennig<br> <b>1 Silbergroschen</b> = <b>0.55556 g</b> fine (<i>accounting unit</i>) = 1/30 Vereinsthaler = 12 Pfennig<br> <b>2 Vereinsthaler</b> = 3½ South-German Gulden = 3 Austrian Gulden (the bridge coin of the Vienna treaty)<br> <b>From 1871:</b> 1 Vereinsthaler = 3 Mark (legal tender until 1907)<br> <em><b>Note:</b> Vereinsthaler and ½-/⅙-pieces were struck at par silver. Smaller Silbergroschen and Pfennig pieces are <b>petty coins</b> with reduced fineness — the 0.556 g reckoning value per Silbergroschen does not apply to the actual coins.</em>
      uk: |-
        <b>1 Vereinsthaler</b> = <b>16,66667 г</b> чистого срібла = 30 Silbergroschen = 360 Pfennig<br> <b>1 Silbergroschen</b> = <b>0,55556 г</b> чистого (<i>розрахункова одиниця</i>) = 1/30 Vereinsthaler = 12 Pfennig<br> <b>2 Vereinsthaler</b> = 3½ південнонімецьких Gulden = 3 австрійські Gulden (монета-міст Віденської конвенції)<br> <b>З 1871:</b> 1 Vereinsthaler = 3 Mark (законний платіжний засіб до 1907)<br> <em><b>Зауваження:</b> Vereinsthaler і його ½-/⅙-частки карбувалися за par-silver. Дрібніші Silbergroschen і Pfennig — <b>розмінні монети</b> зі зниженою пробою — розрахунковий орієнтир 0,556 г на Silbergroschen не стосується фактичних монет.</em>
  description:
    de: 'Wiener Münzvertrag 24. Januar 1857: gemeinsamer deutscher Silberstandard, neu auf das Zollpfund (500 g Feinsilber) bezogen statt auf die bisherige Cöllnische Marck — 500 ÷ 30 = 16,66667 g Feinsilber je Vereinsthaler (18,51852 g rau bei 900 ‰), Prägelegende «XXX EIN PFUND FEIN». Preußen führt ihn in Holstein mit der Annexion 1866 ein (24. August 1866); damit endet in Holstein die dänisch-geprägte Geldtradition nach ca. 240 Jahren.'
    en: 'Vienna Monetary Treaty of 24 January 1857: a common German silver standard, newly referenced to the Zollpfund (500 g fine silver) instead of the previous Cologne Mark — 500 ÷ 30 = 16.66667 g fine silver per Vereinsthaler (18.51852 g rough at 900‰), coin legend «XXX EIN PFUND FEIN». Prussia introduces it in Holstein with the annexation of 1866 (24 August 1866); this ends the Danish-shaped monetary tradition in Holstein after roughly 240 years.'
    uk: 'Віденська монетна конвенція 24 січня 1857 р.: спільний німецький срібний стандарт, відлічуваний від Zollpfund (500 г чистого срібла) замість попередньої кельнської марки — 500 ÷ 30 = 16,66667 г чистого срібла на союзний талер (18,51852 г повної за 900 ‰), легенда на монетах «XXX EIN PFUND FEIN». Пруссія запроваджує його в Гольштейні з анексією 1866 р. (24 серпня 1866); це завершує сформовану на данський лад грошову традицію Гольштейну, що тривала приблизно 240 років.'
  fractions:
    "1": {soll_fein_g: 16.66667}        # 1 Vereinsthaler
    "2": {soll_fein_g: 33.33333}        # 2 Vereinsthaler
    "1/6": {soll_fein_g: 2.77778}       # Groschen (Preußen)
    # Skandinavische Krone-Mønt sub-units (Denmark / Sweden / Norway 1873+).
    # 1 Krone in DK = 7.5 g rough at .800 (= 6.0 g fine), tariff'd to 30-Thalerfuss
    # via the gold-Krone-Goldmark parity (3 Krone = 4 Reichsmark). Exact fine-weight
    # arithmetic differs from the strict 30-Thaler-Fuß silver standard above; these
    # Krone-Mønt fractions are kept here as a convenience bucket for project tagging.
    "1/12": {soll_fein_g: 0.5}          # 10 Øre Christian IX (KM-795 / KM-807)
    "1/24": {soll_fein_g: 0.25}         # 25 Øre / 4 Skilling Rigsmønt — also fits 18_5_thaler
    "1/96": {soll_fein_g: 0.0625}       # 2 Øre / 3 Skilling petty
    "1/192": {soll_fein_g: 0.03125}     # 1 Øre — copper Krone-Mønt smallest

