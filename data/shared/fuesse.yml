  events:
    first_adoption:
      anywhere: 1513
      holstein: 1559
      approx_anywhere: true
      firm_anywhere: false
      note: 'De-facto-Etablierung des dänisch-norwegischen .986-Ungersk-Gylden unter Christian II. — frühestes belegtes Stück 1513 (Galster c2g-89/90, reign-span 1513-1523) — als Fortsetzung der Hungarian-Venetian Dukat-Tradition. De-jure-Codification durch Augspurgische Reichsmünzordnung 19. Aug 1559 als Reichsgoldmünze; HRR-wide adoption applied to all Holstein duchies. firm_anywhere=false: der anywhere-Gründungsanker 1513 ist eine reign-span-Schätzung (keine dänisch-bindende Ordonnanz) → die Karbungsschicht startet mit Fade ab der Christian-II.-Münze 1513; die Holstein-Seite 1559 ist die feste Augsburger RMO (firm=default). KORREKTUR 2026-07-10: der frühere Anker 1481 samt Numista-N#355730-Beleg war eine Fehlzuordnung — N#355730 (Hans-«Goldgulden» ~1497, Galster 27) ist eine .75-Rhinsk-Gylden-Prägung und gehört zum rhinsk_gylden_fod, nicht zu diesem .986-Standard (so auch der denmark.yml-Hintergrund); «1481» war zudem nur Hans'' Regierungsbeginn, kein Prägejahr.'
    first_mint:
      anywhere: 1513
      holstein: 1640
      approx_anywhere: true
      note: 'anywhere = Christian II. Ungersk Gylden 1513 (Galster c2g-89/90, reign-span 1513-1523) — earliest specimen-attested Danish royal-mint .986 gold; continues through Frederik I (1531, Galster 46), Christian III (Hede c3h1 1557), Frederik II (Hede f2h1 1563), Christian IV (1591-1611 Hede c4h14-c4h17 .972 specimens), and on through formal Reichsdukatenfuß-codification 1559+. The earlier anchor 1481 (Numista N#355730) was a misattribution — N#355730 is the Hans .75 Rhinsk Gylden (rhinsk_gylden_fod), not a .986 Dukat; corrected 2026-07-10. H first-mint 1640 = km-29-chr-iv-1640 (1640–1646 Glückstadt under Christian IV.) — earliest documented Holstein-mint Reichsdukat in our base.'
    last_mint:
      anywhere: 1871
      holstein: 1802
      note: anywhere = last German Reichsdukaten before Reichsmünzgesetz. H last-mint 1802 = KM#650 Christian VII Altona-Dukat 1791-1802. The Glückstadt mint operated until 1812 but no later Reichsdukatenfuß-Dukat is documented from a Holstein mint.
    std_end:
      anywhere: 1871
      holstein: 1871
      note: Reichsmünzgesetz 4. Dec 1871 superseded the Dukatenfuß Reich-wide; Holstein, as part of the Empire, exits the standard at the same date — no separate Holstein-specific reform.
    demonetisation:
      anywhere: 1876
      holstein: 1876
      note: 'Reichsmünzgesetz 4. Dec 1871 (gold) and 9. Jul 1873 (extended to silver) phased in the new Goldmark; 1 Jan 1876 — Mark + Vereinsthaler became the SOLE legal tenders, so all older coinage including Reichsdukaten lost legal-tender status from that date. Std end (1871) marks the formal-standard cutoff; demon (1876) marks actual loss of currency status. Austrian restrike-Dukaten dated 1915 are commemorative bullion, out-of-system.'

    anywhere_label:
      de: Heiliges Römisches Reich + Königreich Dänemark und Norwegen
      en: Holy Roman Empire + Royal Danish-Norwegian Realm
      uk: Священна Римська імперія + Королівство Данії і Норвегії
