        value:
          de: "<b>Glückstadt 1657–1660:</b> 1 Guldkrone = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · Numista-Wertfeld «1 Gold Krone (7⁄2)» bezogen auf «Currency: Speciedaler»<br>· <b>Kopenhagen 1668</b> (KM# 303, Numista N#308327, hier <em>nicht</em> Bestandteil dieses Müntzfußes): Tarif auf <b>3 Speciedaler = 18 Mark Dansk</b> reduziert, Raugewicht auf 5,47 g abgesenkt. Physikalisch ein anderer Fuß; in der Bruun-/Aagaard-Systematik als separater Typ klassifiziert.<br>· <em>Tarifäquivalent zum Marktwert:</em> 5,498 g fein × Markt-Au/Ag ≈ 14:1 (1660) ≈ 77 g Feinsilber-Äquivalent ≈ 3,05 Speciedaler · Tarif 3,5 Specie ⇒ ≈ 15 % Seigniorage-Aufschlag."
          en: "<b>Glückstadt 1657–1660:</b> 1 Guldkrone = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · Numista value field «1 Gold Krone (7⁄2)» referenced to «Currency: Speciedaler»<br>· <b>Copenhagen 1668</b> (KM# 303, Numista N#308327, <em>not</em> covered by this standard): tariff lowered to <b>3 Speciedaler = 18 Mark Dansk</b>, rough weight reduced to 5.47 g. Physically a different standard; classified as a separate type in the Bruun / Aagaard systematics.<br>· <em>Tariff vs. market value:</em> 5.498 g fine × market Au/Ag ≈ 14:1 (1660) ≈ 77 g fine-silver equivalent ≈ 3.05 Speciedaler · tariff 3.5 Specie ⇒ ≈ 15 % seigniorage premium."
          uk: "<b>Glückstadt 1657–1660:</b> 1 Guldkrone = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · поле вартості Numista «1 Gold Krone (7⁄2)» прив'язане до «Currency: Speciedaler»<br>· <b>Копенгаген 1668</b> (KM# 303, Numista N#308327, <em>не охоплено</em> цією стопою): тариф знижено до <b>3 Speciedaler = 18 Mark Dansk</b>, повну вагу — до 5,47 г. Фізично інша стопа; у систематиці Bruun / Aagaard класифікується як окремий тип.<br>· <em>Тариф проти ринкової вартості:</em> 5,498 г чистого × ринкове Au/Ag ≈ 14:1 (1660 р.) ≈ 77 г чистосрібного еквіваленту ≈ 3,05 Speciedaler · тариф 3,5 Specie ⇒ ≈ 15 % сеньйораж-надбавки."
      - key:
          de: "Verhältnis zu anderen Müntzfüßen"
          en: "Relation to other standards"
          uk: "Відношення до інших стоп"
        value:
          de: "<b>Eigenständige Müntzfuß-Familie:</b> der Guldkrone-Fuß steht weder unter dem Reichsdukatenfuß (.986/3,49 g, Handelsmünze) noch unter dem 10½-Krone-Fuß (.672/22,272 g, Silber-Tarifmünze). Konzeptionell ist die Guldkrone das <b>goldene Pendant der Krone-Mønt-Kategorie</b>: gleicher Krone-Name, gleiche tarifäre Logik (Nennwert per königlichem Mandat über dem Metallwert), aber in Gold und mit eigener metrischer Definition.<br>· <em>Nicht zu verwechseln mit dem Goldgulden</em> (HRR-Goldmünze nach Reichsmünzordnung 1559, Tarif in Gulden, andere Lineage)."
          en: "<b>Standalone Münzfuß family:</b> the Guldkrone-Fuß does not sit under the Reichsdukatenfuß (.986/3.49 g, trade coin) nor under the 10½-Krone-Fuß (.672/22.272 g, silver tariff coin). Conceptually the Guldkrone is the <b>gold counterpart of the Krone-Mønt category</b>: same Krone name, same tariff logic (face value set by royal mandate above metal value), but in gold and with its own metric definition.<br>· <em>Not to be confused with the Goldgulden</em> (Holy Roman Empire gold coin under the Reichsmünzordnung of 1559, tariffed in Gulden, separate lineage)."
          uk: "<b>Самостійна родина Müntzfuß:</b> Guldkrone-Fuß не належить ані до Reichsdukatenfuß (.986/3,49 г, торгова монета), ані до 10½-Krone-Fuß (.672/22,272 г, срібна тарифна монета). Концептуально Guldkrone — це <b>золотий аналог Krone-Mønt-категорії</b>: та сама назва Krone, та сама тарифна логіка (номінал встановлений королівським мандатом вище металевої вартості), але в золоті й зі своїм метричним означенням.<br>· <em>Не плутати з Goldgulden</em> (золота монета Священної Римської імперії за Reichsmünzordnung 1559, тариф у Gulden, окрема лінія)."
    rechnungsfraktionen_label:
      de: Rechnungsfraktionen (Guldkrone-Tarif-Theilung)
      en: Accounting fractions (Guldkrone-tariff subdivision)
      uk: Розрахункові фракції (поділ за Guldkrone-тарифом)
    rechnungsfraktionen:
      de: "<b>1 Guldkrone</b> = <b>5,498 g</b> Feingold (5,996 g rau, 22 Karat) = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · Glückstadt 1657–1660, Mzm. <b>Jacob Schwieger</b>, Mzz. korslagte glødehager · belegt durch Hede 145B / Sieg-160(B) / Schou-2 / Aagaard-4.1 / Bruun-6344 / KM-40.2.<br><br><em>Sub-Nominale (½, ¼ Guldkrone) sind aus dem Glückstadter Programm 1657–1660 hier nicht belegt; sollten Belegexemplare später eingearbeitet werden, sind die jeweiligen soll_fein_g-Werte als 1/2 bzw. 1/4 des Hauptnominals zu führen.</em>"
      en: "<b>1 Guldkrone</b> = <b>5.498 g</b> fine gold (5.996 g rough, 22 carats) = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · Glückstadt 1657–1660, mintmaster <b>Jacob Schwieger</b>, mintmark crossed pokers · documented by Hede 145B / Sieg-160(B) / Schou-2 / Aagaard-4.1 / Bruun-6344 / KM-40.2.<br><br><em>Sub-denominations (½, ¼ Guldkrone) of the Glückstadt 1657–1660 programme are not documented here; if reference specimens are added later, the corresponding soll_fein_g values are 1/2 and 1/4 of the main denomination.</em>"
      uk: "<b>1 Guldkrone</b> = <b>5,498 г</b> чистого золота (5,996 г повної ваги, 22 карати) = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · Glückstadt 1657–1660, монетмайстер <b>Jacob Schwieger</b>, монограма — схрещені граблі · задокументовано Hede 145B / Sieg-160(B) / Schou-2 / Aagaard-4.1 / Bruun-6344 / KM-40.2.<br><br><em>Підрозмінні номінали (½, ¼ Guldkrone) ґлюкштадтської програми 1657–1660 тут не задокументовано; якщо в майбутньому додавати, відповідні soll_fein_g — 1/2 та 1/4 від головного номіналу.</em>"
  description:
    de: |
      Goldene Tarifmünze Frederik III. (1648–1670). 1657 in Glückstadt eingeführt
      und biß 1660 dort geprägt (kanonische Form: 39 Stück je Cöllnische Marck
      Raulegierung, 5,996 g rau / 5,498 g fein, .917 Feingehalt, Hede 145B —
      diese Müntzfuß-Definition); eine späte Folgeprägung Kopenhagen 1668 (KM# 303)
      bei reduziertem Tarif von 3 Specie und kleinerem Raugewicht von 5,47 g
      ist ein verwandter, aber physikalisch eigenständiger Fuß und nicht in dieser
      Definition enthalten. Mit dem Tod Frederiks III. 1670 endet die
      Guldkrone-Tarifprägung; Christian V. setzt sie nicht fort. Goldenes Pendant
      der Krone-Mønt-Kategorie mit derselben Tarif-Logik wie die silberne Krone,
      aber in 22-karätigem Gold und mit höherem Tarif (1 Guldkrone = 3½ Speciedaler
      = 21 Mark Dansk). NICHT zu verwechseln mit dem Goldgulden (HRR-Goldmünze
      nach Reichsmünzordnung 1559, andere Lineage und andere Tarifeinheit).
    en: |-
      A gold tariff coin of Frederik III (1648–1670). Introduced at Glückstadt in 1657 and struck there until 1660 (canonical form: 39 pieces per Cologne mark of raw alloy, 5.996 g rough / 5.498 g fine, .917 fineness, Hede 145B — the Müntzfuß definition used here); a late follow-up issue at Copenhagen in 1668 (KM# 303) at a reduced tariff of 3 Specie and a smaller rough weight of 5.47 g is a related but physically distinct standard and is not included in this definition. With Frederik III's death in 1670 Guldkrone tariff coinage ends; Christian V does not continue it. The gold counterpart of the Krone-Mønt category, with the same tariff logic as the silver Krone but in 22-carat gold and at a higher tariff (1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk). NOT to be confused with the Goldgulden (a Holy Roman Empire gold coin under the Reichsmünzordnung of 1559, separate lineage and a different tariff unit).
    uk: |-
      Золота тарифна монета Фредеріка III (1648–1670). Запроваджена в Glückstadt 1657 р. і карбувалась там до 1660 р. (канонічна форма: 39 штук з кельнської марки сплаву, 5,996 г повної ваги / 5,498 г чистого, проба .917, Hede 145B — це означення Müntzfuß тут і використовується); пізній наступний випуск у Копенгагені 1668 р. (KM# 303) зі зниженим тарифом 3 Specie і меншою повною вагою 5,47 г — споріднена, але фізично окрема стопа й до цього означення не входить. Зі смертю Фредеріка III 1670 р. тарифне карбування Guldkrone завершується; Кристіан V його не продовжує. Золотий аналог Krone-Mønt-категорії з тією ж тарифною логікою, що й срібна Krone, але в 22-каратному золоті й з вищим тарифом (1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk). НЕ плутати з Goldgulden (золота монета Священної Римської імперії за Reichsmünzordnung 1559, окрема лінія та інша тарифна одиниця).
  fractions:
    "1": {soll_rau_g: 5.99631, soll_fein_g: 5.49671}   # 1 Guldkrone (canonical)
    "1/2": {soll_rau_g: 2.99815, soll_fein_g: 2.74835} # ½ Guldkrone (per tariff division — no specimen documented in this programme)
    "1/4": {soll_rau_g: 1.49908, soll_fein_g: 1.37418} # ¼ Guldkrone (per tariff division — no specimen documented in this programme)
  events:
    first_adoption:
      anywhere: 1657
      holstein: 1657
      note: Glückstadt was the originator (Holstein-first); Copenhagen follow-up 1668.
    first_mint:
      anywhere: 1657
      holstein: 1657
    last_mint:
      anywhere: 1668
      holstein: 1660
      note: anywhere last-mint 1668 = last Copenhagen Guldkrone. H last-mint 1660 = last Glückstadt issue.
    std_end:
      anywhere: 1670
      holstein: 1670
      approx_holstein: true
      note: anywhere std_end 1670 = formal program close. H std_end coincides at the same date.
    demonetisation:
      anywhere: 1670
      holstein: 1670
      approx_holstein: true
      note: circulation closes with the standard — no significant post-program legal-tender tail.
    anywhere_label:
      de: Dänemark-Norwegen
      en: Denmark-Norway
      uk: Данія-Норвегія

