        value:
          de: "Thaler Species 25,28173 g ≈ 1,517 Vereinsthaler · Umtausch 3:2 (approximativ)"
          en: "Thaler Species 25.28173 g ≈ 1.517 Vereinsthaler · exchange ratio 3:2 (approximate)"
