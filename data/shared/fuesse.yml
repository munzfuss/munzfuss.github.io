      note: '1855 — letzter preußischer Friedrich d''or; 1857 Vereinsmünzvertrag (administrative Vorbereitung); 1871 Münzgesetz Deutsches Reich (Goldmark); 1873 Skandinavische Münzunion löst dänische Pistole ab.'
    demonetisation:
