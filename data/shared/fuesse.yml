    rechnungsfraktionen_label:
      de: "Rechnungs- und Kursbindungen"
      en: "Accounting and exchange links"
      uk: "Розрахункові та курсові зв'язки"
    rechnungsfraktionen:
      de: |
        <b>I. Untertheilung innerhalb der Krone-fod</b><br>
         · <b>1 Krone</b> = 100 Øre — einheitliches Akkonto-System über alle vier Stückelungs-Stufen<br>
         · <b>1 Krone Silber</b> (.800 Ag, Silber-Kurant-Stufe) = 1 Krone Gold-Hauptkurant — vollwertige Begleitmünze, frei in Gold konvertibel biß 2. August 1914<br>
         · <b>1 Krone</b> = 4 × 25 øre = 10 × 10 øre = 20 × 5 øre = 50 × 2 øre = 100 × 1 øre<br><br>
        <b>II. Übergangstariffe zu den abgelösten Müntzfüßen</b><br>
         · <b>1 Krone</b> = ½ Rigsdaler (DK-Übergangstarif 1873–1875, 18½-Thaler-Fuß)<br>
         · <b>1 Krone</b> = ¼ Speciedaler norsk (NO-Übergangstarif 1873–1875, 9¼-Thaler-Fuß)<br><br>
        <b>III. Internationale Goldparität (Skandinavische Müntzkonvention)</b><br>
         · <b>8 Kroner</b> = 9 Reichsmark — feste Goldparität, 1 Krone = 1,125 Mark<br>
         · <b>8 Kroner</b> ≈ 11,11 französische Goldfranc — über die Goldparität, Lateinische Münzunion-Standard (de facto, nie formal vertraglich)<br>
         · <b>20 Kroner</b> ≈ 1 englisches Sovereign-Pfund (≈ 18,16 Kroner laut Stockholmer Konvention)
      en: |
        <b>I. Subdivisions within Krone-fod</b><br>
         · <b>1 Krone</b> = 100 øre — uniform accounting system across all four denomination tiers<br>
         · <b>1 silver Krone</b> (.800 Ag, silver-Kurant tier) = 1 gold Krone (Hauptkurant) — full-value companion, freely convertible into gold until 2 August 1914<br>
         · <b>1 Krone</b> = 4 × 25 øre = 10 × 10 øre = 20 × 5 øre = 50 × 2 øre = 100 × 1 øre<br><br>
        <b>II. Transition tariffs to the superseded Müntzfüße</b><br>
         · <b>1 Krone</b> = ½ Rigsdaler (DK transition tariff 1873–1875, 18½-Thaler-Fuß)<br>
         · <b>1 Krone</b> = ¼ Norwegian Speciedaler (NO transition tariff 1873–1875, 9¼-Thaler-Fuß)<br><br>
        <b>III. International gold parity (Scandinavian Monetary Convention)</b><br>
         · <b>8 Kroner</b> = 9 Reichsmark — fixed gold parity, 1 Krone = 1.125 Mark<br>
         · <b>8 Kroner</b> ≈ 11.11 French gold francs — via gold parity, Latin Monetary Union standard (de facto, never formally treaty-bound)<br>
         · <b>20 Kroner</b> ≈ 1 English sovereign-pound (≈ 18.16 Kroner per the Stockholm Convention)
      uk: |
        <b>I. Поділ всередині Krone-fod</b><br>
         · <b>1 Krone</b> = 100 øre — єдина облікова система через усі чотири стопи номіналів<br>
         · <b>1 срібна Krone</b> (.800 Ag, срібно-Kurant-стопа) = 1 золота Krone (Hauptkurant) — повноцінний супутник, вільно конвертований у золото до 2 серпня 1914<br>
         · <b>1 Krone</b> = 4 × 25 øre = 10 × 10 øre = 20 × 5 øre = 50 × 2 øre = 100 × 1 øre<br><br>
        <b>II. Перехідні тарифи до заміщених Müntzfüße</b><br>
         · <b>1 Krone</b> = ½ Rigsdaler (DK перехідний тариф 1873–1875, 18½-Thaler-Fuß)<br>
         · <b>1 Krone</b> = ¼ норвезького Speciedaler (NO перехідний тариф 1873–1875, 9¼-Thaler-Fuß)<br><br>
        <b>III. Міжнародна золота паритетність (Скандинавська монетна конвенція)</b><br>
         · <b>8 Krone</b> = 9 Reichsmark — фіксована золота паритетність, 1 Krone = 1,125 Mark<br>
         · <b>8 Krone</b> ≈ 11,11 французьких золотих франків — через золоту паритетність, стандарт Латинського монетного союзу (de facto, ніколи формально договірно)<br>
         · <b>20 Krone</b> ≈ 1 англійський sovereign-фунт (≈ 18,16 Krone за Стокгольмською конвенцією)
  description:
    de: '<b>Krone-fod</b> — gemeinsamer Hauptstandard der dänisch-schwedisch-norwegischen Krone, eingeführt durch das <b>dänische Mønlov vom 23. Mai 1873</b> (Lov nr. 66) und die <b>Skandinavische Müntzkonvention</b> Stockholm 5. Mai 1873.<sup>[ref:danskmoent-aclove3]</sup><sup>[ref:wikipedia-da-den-skandinaviske-m-ntunion]</sup> Wirksam ab 1. Januar 1875; Norwegen tritt 1875 bei. Dänemark hatte zuvor die Lateinische Münzunion (1865) ausdrücklich abgelehnt, da deren bimetallische Goldsilberbindung «<i>både praktisk umuligt og økonomisk ufornuftigt</i>» sei.<sup>[ref:danskmoent-flugt]</sup><br>
<b>Tagesumlauf vs. Reservenrolle:</b> die täglich umlaufenden Stücke waren die Silber- und øre-Scheidemünzen; das Gold-Hauptkurant diente vorrangig als Auslandszahlungsreserve und als Bankdeckung. Die drei nordischen Länder prägten alle Stückelungen in einheitlicher Größe, Gewicht und Feingehalt mit nationalspezifischen Motiven — alle Reihen frei umlauffähig in allen drei Ländern biß 1914.<sup>[ref:wikipedia-da-den-skandinaviske-m-ntunion]</sup> Konvertibilität von Banknoten in Goldmünzen am <b>2. August 1914</b> durch die Danmarks Nationalbank ausgesetzt (Kriegsausbruch).<sup>[ref:econstor-386525536]</sup> Die Skandinavische Müntzunion bleibt für Münzgeld formell biß 1924 in Kraft.
'
    en: '<b>Krone-fod</b> — common principal standard of the Danish-Swedish-Norwegian krone, established by the <b>Danish Mønlov of 23 May 1873</b> (Lov nr. 66) and the <b>Scandinavian Monetary Convention</b> of 5 May 1873 (Stockholm).<sup>[ref:danskmoent-aclove3]</sup><sup>[ref:wikipedia-da-den-skandinaviske-m-ntunion]</sup> Effective from 1 January 1875; Norway accedes in 1875. Denmark had previously rejected joining the Latin Monetary Union (1865) because its bimetallic gold-silver linkage was «<i>both practically impossible and economically irrational</i>».<sup>[ref:danskmoent-flugt]</sup><br>
<b>Daily circulation vs. reserve role:</b> the everyday coins were the silver and øre subsidiary pieces; the gold Hauptkurant primarily served as a foreign-payment reserve and as bank backing. The three Nordic countries struck every denomination to uniform size, weight and fineness with country-specific motifs — all series circulated freely in all three countries until 1914.<sup>[ref:wikipedia-da-den-skandinaviske-m-ntunion]</sup> Convertibility of banknotes into gold coins suspended on <b>2 August 1914</b> by Danmarks Nationalbank (outbreak of war).<sup>[ref:econstor-386525536]</sup> The Scandinavian Monetary Union remained formally in force for coinage until 1924.'
    uk: '<b>Krone-fod</b> — спільний головний стандарт дансько-шведсько-норвезької крони, запроваджений <b>данським Mønlov від 23 травня 1873</b> (Lov nr. 66) і <b>Скандинавською монетною конвенцією</b> 5 травня 1873 р. (Стокгольм).<sup>[ref:danskmoent-aclove3]</sup><sup>[ref:wikipedia-da-den-skandinaviske-m-ntunion]</sup> Чинний з 1 січня 1875; Норвегія приєднується 1875 р. Данія раніше явно відмовилася приєднуватися до Латинського монетного союзу (1865), оскільки його біметалева золото-срібна привʼязка була «<i>både praktisk umuligt og økonomisk ufornuftigt</i>» (практично неможлива та економічно нераціональна).<sup>[ref:danskmoent-flugt]</sup><br>
<b>Повсякденний обіг vs. резервна роль:</b> повсякденними обіговими монетами були срібні та øre-розмінні; золотий Hauptkurant передусім слугував резервом для закордонних платежів і банківським забезпеченням. Три північні країни карбували усі номінали єдиного розміру, ваги й проби з національно-специфічними мотивами — усі серії вільно оберталися в усіх трьох країнах до 1914 р.<sup>[ref:wikipedia-da-den-skandinaviske-m-ntunion]</sup> Конвертованість банкнот у золоті монети призупинено <b>2 серпня 1914 р.</b> Danmarks Nationalbank (початок війни).<sup>[ref:econstor-386525536]</sup> Скандинавська монетна унія формально лишалася чинною для монетного грошового обігу до 1924 р.'
