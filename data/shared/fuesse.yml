          en: "Tariff history and Specie equivalent"
          uk: "Історія тарифу та Specie-еквівалент"
        value:
          de: "<b>Glückstadt 1657–1660:</b> 1 Guldkrone = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · Numista-Wertfeld «1 Gold Krone (7⁄2)» bezogen auf «Currency: Speciedaler»<br>· <b>Kopenhagen 1668</b> (KM# 303, Numista N#308327, hier <em>nicht</em> Bestandteil dieses Müntzfußes): Tarif auf <b>3 Speciedaler = 18 Mark Dansk</b> reduziert, Raugewicht auf 5,47 g abgesenkt. Physikalisch ein anderer Fuß; in der Bruun-/Aagaard-Systematik als separater Typ klassifiziert.<br>· <em>Tarifäquivalent zum Marktwert:</em> 5,498 g fein × Markt-Au/Ag ≈ 14:1 (1660) ≈ 77 g Feinsilber-Äquivalent ≈ 3,05 Speciedaler · Tarif 3,5 Specie ⇒ ≈ 15 % Seigniorage-Aufschlag."
          en: "<b>Glückstadt 1657–1660:</b> 1 Guldkrone = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · Numista value field «1 Gold Krone (7⁄2)» referenced to «Currency: Speciedaler»<br>· <b>Copenhagen 1668</b> (KM# 303, Numista N#308327, <em>not</em> covered by this standard): tariff lowered to <b>3 Speciedaler = 18 Mark Dansk</b>, rough weight reduced to 5.47 g. Physically a different standard; classified as a separate type in the Bruun / Aagaard systematics.<br>· <em>Tariff vs. market value:</em> 5.498 g fine × market Au/Ag ≈ 14:1 (1660) ≈ 77 g fine-silver equivalent ≈ 3.05 Speciedaler · tariff 3.5 Specie ⇒ ≈ 15 % seigniorage premium."
          uk: "<b>Glückstadt 1657–1660:</b> 1 Guldkrone = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · поле вартості Numista «1 Gold Krone (7⁄2)» прив'язане до «Currency: Speciedaler»<br>· <b>Копенгаген 1668</b> (KM# 303, Numista N#308327, <em>не охоплено</em> цією стопою): тариф знижено до <b>3 Speciedaler = 18 Mark Dansk</b>, повну вагу — до 5,47 г. Фізично інша стопа; у систематиці Bruun / Aagaard класифікується як окремий тип.<br>· <em>Тариф проти ринкової вартості:</em> 5,498 г чистого × ринкове Au/Ag ≈ 14:1 (1660 р.) ≈ 77 г чистосрібного еквіваленту ≈ 3,05 Speciedaler · тариф 3,5 Specie ⇒ ≈ 15 % сеньйораж-надбавки."
      - key:
          de: "Verhältnis zu anderen Müntzfüßen"
          en: "Relation to other standards"
          uk: "Відношення до інших стоп"
        value:
          de: "<b>Eigenständige Müntzfuß-Familie:</b> der Guldkrone-Fuß steht weder unter dem Reichsdukatenfuß (.986/3,49 g, Handelsmünze) noch unter dem 10½-Krone-Fuß (.672/22,272 g, Silber-Tarifmünze). Konzeptionell ist die Guldkrone das <b>goldene Pendant der Krone-Mønt-Kategorie</b>: gleicher Krone-Name, gleiche tarifäre Logik (Nennwert per königlichem Mandat über dem Metallwert), aber in Gold und mit eigener metrischer Definition.<br>· <em>Nicht zu verwechseln mit dem Goldgulden</em> (HRR-Goldmünze nach Reichsmünzordnung 1559, Tarif in Gulden, andere Lineage)."
          en: "<b>Standalone Münzfuß family:</b> the Guldkrone-Fuß does not sit under the Reichsdukatenfuß (.986/3.49 g, trade coin) nor under the 10½-Krone-Fuß (.672/22.272 g, silver tariff coin). Conceptually the Guldkrone is the <b>gold counterpart of the Krone-Mønt category</b>: same Krone name, same tariff logic (face value set by royal mandate above metal value), but in gold and with its own metric definition.<br>· <em>Not to be confused with the Goldgulden</em> (Holy Roman Empire gold coin under the Reichsmünzordnung of 1559, tariffed in Gulden, separate lineage)."
          uk: "<b>Самостійна родина Müntzfuß:</b> Guldkrone-Fuß не належить ані до Reichsdukatenfuß (.986/3,49 г, торгова монета), ані до 10½-Krone-Fuß (.672/22,272 г, срібна тарифна монета). Концептуально Guldkrone — це <b>золотий аналог Krone-Mønt-категорії</b>: та сама назва Krone, та сама тарифна логіка (номінал встановлений королівським мандатом вище металевої вартості), але в золоті й зі своїм метричним означенням.<br>· <em>Не плутати з Goldgulden</em> (золота монета Священної Римської імперії за Reichsmünzordnung 1559, тариф у Gulden, окрема лінія)."
    rechnungsfraktionen_label:
      de: Rechnungsfraktionen (Guldkrone-Tarif-Theilung)
      en: Accounting fractions (Guldkrone-tariff subdivision)
      uk: Розрахункові фракції (поділ за Guldkrone-тарифом)
    rechnungsfraktionen:
      de: "<b>1 Guldkrone</b> = <b>5,498 g</b> Feingold (5,996 g rau, 22 Karat) = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · Glückstadt 1657–1660, Mzm. <b>Jacob Schwieger</b>, Mzz. korslagte glødehager · belegt durch Hede 145B / Sieg-160(B) / Schou-2 / Aagaard-4.1 / Bruun-6344 / KM-40.2."
      en: "<b>1 Guldkrone</b> = <b>5.498 g</b> fine gold (5.996 g rough, 22 carats) = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · Glückstadt 1657–1660, mintmaster <b>Jacob Schwieger</b>, mintmark crossed pokers · documented by Hede 145B / Sieg-160(B) / Schou-2 / Aagaard-4.1 / Bruun-6344 / KM-40.2."
      uk: "<b>1 Guldkrone</b> = <b>5,498 г</b> чистого золота (5,996 г повної ваги, 22 карати) = <b>3½ Speciedaler</b> = <b>21 Mark Dansk</b> = 168 Skilling Dansk · Glückstadt 1657–1660, монетмайстер <b>Jacob Schwieger</b>, монограма — схрещені граблі · задокументовано Hede 145B / Sieg-160(B) / Schou-2 / Aagaard-4.1 / Bruun-6344 / KM-40.2."
  description:
    de: |
      Goldene <b>Tarifmünze der Krone-Mønt-Kategorie</b> über zwei Regenten — Christian IV.
      (1618–1648, Vorgängerphase) und Frederik III. (1655–1668, Hauptphase). Christian IV.
      läßt schon 1618 — parallel zum åbnen Brev für die silberne Corona Danica — 2-Guldkroner
      («dobbelt guldkrone», Hede 25/28) schlagen, metrisch identisch zur späteren
      Frederik-III.-Form (.917 Feingehalt, 5,996 g rau / 5,496 g fein)<sup>[ref:hede-c4h25-2-guldkrone]</sup>. Die
      Hede-25-Serie reicht biß 1648, die Hede-28-Doppelguldkrone ist im Esrum-Schatzfund
      Ingvardson &amp; Märcher 2010 dokumentiert (drei Stücke von 1628). Christian-IV.-Guldkroner
      waren keine Massenkarbung, sondern Hofgeschenk und Soldzahlung. <b>Hede 1957 dokumentiert
      den nomenklatorischen Wechsel zwischen den beiden Regenten ausdrücklich in Fußnote (1)</b>:
      «<i>Betegnelsen guldkrone dækker under Frederik III den mønt, Christian IV kaldte
      2 guldkrone</i>»<sup>[ref:hede-1957-f3-guldkroner-nnum]</sup> — was Frederik III. als «1 Guldkrone»
      führt, ist physisch dieselbe Münze, die Christian IV. «2 Guldkrone» nannte; entsprechend
      entspricht Christian IVs eigenes «1 Guldkrone» (Hede 26, ~3 g rau) physisch der
      ½ Guldkrone unter Frederik III.s Definition. Frederik III. nimmt
      das Programm 1655 in Kopenhagen wieder auf (kanonische Hede 145B, 39 Stück je
      Cöllnische Marck Raulegierung von 22 Karat = 5,996 g rau / 5,498 g fein); Glückstadter
      Hauptphase 1657–1660 (Mzm. Jacob Schwieger); Kopenhagener Folgeprägung 1666 (Hede 44/45)<sup>[ref:hede-f3h44-1-guldkrone]</sup>
      und 1668 (KM# 303) mit reduziertem Tarif 3 Specie / 5,47 g rau. Programmstop
      14. Februar 1671 durch Commerce-Collegium-Empfehlung; Christian V. setzt die Linie
      nicht fort und prägt Glückstadter Gold nur noch nach dem Reichsdukatenfuß. Tarif der
      Hauptphase <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. <b>Nicht zu verwechseln
      mit dem Goldgulden</b> (HRR-Goldmünze nach Reichsmünzordnung 1559, andere Lineage und
      andere Tarifeinheit).
    en: |-
      A gold <b>tariff coin of the Krone-Mønt category</b> spanning two rulers — Christian IV (1618–1648, predecessor phase) and Frederik III (1655–1668, main phase). Already in 1618 — in parallel with the åbne Brev for the silver Corona Danica — Christian IV strikes 2-Guldkroner («dobbelt guldkrone», Hede 25/28), metrically identical to the later Frederik III form (.917 fineness, 5.996 g rough / 5.496 g fine)<sup>[ref:hede-c4h25-2-guldkrone]</sup>. The Hede 25 series runs through 1648; Hede 28 (double Guldkrone) is documented in the Esrum hoard, Ingvardson & Märcher 2010 (three 1628 specimens). Christian IV Guldkroner were not mass production but court gifts and mercenary pay. <b>Hede 1957 records the nomenclature shift between the two reigns explicitly in footnote (1)</b>: «<i>Betegnelsen guldkrone dækker under Frederik III den mønt, Christian IV kaldte 2 guldkrone</i>»<sup>[ref:hede-1957-f3-guldkroner-nnum]</sup> — what Frederik III calls «1 Guldkrone» is physically the same coin Christian IV called «2 Guldkrone»; correspondingly, Christian IV's own «1 Guldkrone» (Hede 26, ~3 g rough) physically corresponds to ½ Guldkrone under Frederik III's definition. Frederik III resumes the programme in Copenhagen in 1655 (canonical Hede 145B, 39 pieces per Cologne mark of raw 22-karat alloy = 5.996 g rough / 5.498 g fine); Glückstadt main phase 1657–1660 (mintmaster Jacob Schwieger); Copenhagen follow-up issues 1666 (Hede 44/45)<sup>[ref:hede-f3h44-1-guldkrone]</sup> and 1668 (KM# 303) at the reduced tariff of 3 Specie / 5.47 g rough. The programme is terminated on 14 February 1671 by Commerce Collegium recommendation; Christian V does not continue the line and strikes Glückstadt gold only on the Reichsdukatenfuß. Main-phase tariff <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. <b>Not to be confused with the Goldgulden</b> (Holy Roman Empire gold coin under the Reichsmünzordnung of 1559, separate lineage and a different tariff unit).
    uk: |-
      Золота <b>тарифна монета Krone-Mønt-категорії</b> через двох правителів — Кристіан IV (1618–1648, передфаза) і Фредерік III (1655–1668, головна фаза). Уже 1618 р. — паралельно з åbnem Brev для срібної Corona Danica — Кристіан IV карбує 2-Guldkroner («dobbelt guldkrone», Hede 25/28), метрично ідентичні пізнішій формі Frederik III (.917 проби, 5,996 г повної / 5,496 г чистого)<sup>[ref:hede-c4h25-2-guldkrone]</sup>. Серія Hede 25 триває до 1648; Hede 28 (подвійна Guldkrone) задокументована в Esrum-скарбі Ingvardson & Märcher 2010 (три екземпляри 1628 р.). Guldkrone Кристіана IV не були масовим карбуванням, а слугували придворним подарунком та платою найманцям. <b>Hede 1957 явно фіксує номенклатурний зсув між двома правліннями у виносці (1)</b>: «<i>Betegnelsen guldkrone dækker under Frederik III den mønt, Christian IV kaldte 2 guldkrone</i>»<sup>[ref:hede-1957-f3-guldkroner-nnum]</sup> — те, що Фредерік III називає «1 Guldkrone», фізично та сама монета, яку Кристіан IV називав «2 Guldkrone»; відповідно власна «1 Guldkrone» Кристіана IV (Hede 26, ~3 г повної ваги) фізично відповідає ½ Guldkrone в означенні Фредеріка III. Фредерік III відновлює програму 1655 р. у Копенгагені (канонічна Hede 145B, 39 штук з кельнської марки сплаву 22 карат = 5,996 г повної / 5,498 г чистого); ґлюкштадтська головна фаза 1657–1660 (монетмайстер Jacob Schwieger); копенгагенські наступні випуски 1666 (Hede 44/45)<sup>[ref:hede-f3h44-1-guldkrone]</sup> та 1668 (KM# 303) зі зниженим тарифом 3 Specie / 5,47 г повної ваги. Програма завершується 14 лютого 1671 р. за рекомендацією Commerce Collegium; Кристіан V лінію не продовжує і ґлюкштадтське золото карбує лише за Reichsdukatenfuß. Тариф головної фази <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. <b>Не плутати з Goldgulden</b> (золота монета Священної Римської імперії за Reichsmünzordnung 1559, окрема лінія та інша тарифна одиниця).
  fractions:
    "1": {soll_rau_g: 5.99631, soll_fein_g: 5.49671}   # 1 Guldkrone (canonical)
    "1/2": {soll_rau_g: 2.99815, soll_fein_g: 2.74835} # ½ Guldkrone (per tariff division — no specimen documented in this programme)
    "1/4": {soll_rau_g: 1.49908, soll_fein_g: 1.37418} # ¼ Guldkrone (per tariff division — no specimen documented in this programme)
    "2": {soll_rau_g: 11.99262, soll_fein_g: 10.99342}    # «2 Guldkrone» (Christian IV Hede 25/28 series 1619-1648; Tarifmünze-naming per Hede c4h25 Pålydende — Δ exposes ~50 % Krone-unit-redefinition-seigniorage relative to Frederik III's post-1648 Guldkrone-unit)
  events:
    first_adoption:
      anywhere: 1618
      holstein: 1657
      note: 'anywhere first-adoption 1618 = Christian IV Guldkrone Tarif-Logik (Hede c4h25 «1 Guldkrone (= 2 Speciedaler)» parallel to the silver Corona Danica), earliest documented Royal Danish issue: km-74-1-hede-25b-chr-iv-1619 Hede 25B Helsingør 1618-1619. After 2026-05-13 the project unified the Christian IV Hede 25/28 series (1618-1648, mass and ceremonial mintage) and the Frederik III 1655-1668 series under one Fuß — they share the canonical Guldkrone-Tarif against the Speciedaler. Earlier the anywhere axis was set to 1655 to narrate «mass production», but per CLAUDE.md §0 the bar reflects what the data attests, not a periodisation overlay — the actual span starts 1618. Ingvardson & Märcher 2010 «Christian 4.s guldmønt fra Esrum Møllegård» (Danefæ, Nationalmuseet 2010, pp. 254-257) documents three Christian IV double Guldkroner (Hede 28) of 1628 from the Esrum hoard. H first-adoption 1657 = first Glückstadt issue under Frederik III (km-40-2-fr-iii-1657; no Christian IV Holstein-mint Guldkrone is documented — all Christian IV strikes are København / Helsingør).'
    first_mint:
      anywhere: 1618
      holstein: 1657
      note: 'anywhere first-mint 1618 = first dated Christian IV Guldkrone (Hede 25B, Helsingør). H first-mint 1657 unchanged: first Frederik III Glückstadt Guldkrone.'
    last_mint:
      anywhere: 1668
      holstein: 1660
      note: 'anywhere last-mint 1668 = last Copenhagen Guldkrone (Frederik III''s younger formula 5.590 g rough / 5.126 g fine = 1½ Speciesdukat after the Forordning of 2 January 1658 which raised the Speciesdukat to 12 mark; Hede 1957 «Frederik III''s guldkroner»). H last-mint 1660 = last Glückstadt issue (Hede 145B, Mzm. Jacob Schwieger). Frederik III dies 9 February 1670; Christian V does not continue the Guldkrone program.'
    std_end:
      anywhere: 1671
      holstein: 1671
      approx_anywhere: false
      note: 'std_end 1671 = Commerce Collegium decision 14 February 1671 ending the regular Guldkrone-Karbverfahren (Hede 1957 «Frederik III''s guldkroner» verbatim: «<i>betænkning af 14. februar 1671 ... de icke paa andre Steder gangbar er</i>» — the Commerce Collegium recommended terminating mintage because the Guldkrone was not accepted abroad). Christian V (acceded September 1670) does not continue the program; from 1671 onward Glückstadt and Copenhagen gold strikes follow the Reichsdukatenfuß (Reichsdukat, later Courantdukat) instead. Was previously set to 1670 (Frederik III''s death), but Hede''s explicit Commerce Collegium dating gives 14 February 1671 as the formal terminus. Post-history: Royal Resolution 2 September 1701 grants Det Vestindiske Compagni a special authorisation to strike 2-Guldkroner (Hede verbatim: «<i>Ved kgl. resolution af 2. september 1701 ... fik Det Vestindiske Compagni Tilladelse til at slå 2 guldkroner</i>»; documented in Fogtmanns Rescriptsamling III p. 31 and Lauerentsen, Museum Regium 2nd ed., T. XXIII no. 11) — no surviving specimens are recorded.'
    demonetisation:
      anywhere: 1700
      holstein: 1700
      approx_anywhere: true
      approx_holstein: true
      note: 'Coinage program ended with the Commerce Collegium decision of 14 February 1671 (see std_end note); active circulation tail likely ended within a single generation (~30 yr → ~1700) as Christian V (1670-1699) did not continue the Guldkrone program and surviving pieces were progressively melted into newer gold (Reichsdukaten under the Reichsdukatenfuß standard). By Christian V''s death 1699 the Guldkroner were 30-40 years old and outside everyday commerce. Formal LT status arguably persisted until forced exchange events much later (Krone reform 1875 in DK-Norway, Prussian annexation 1866 in Holstein), but those dates overstate «in circulation» — by then surviving Guldkroner were collector / numismatic items.'
    anywhere_label:
      de: Königreich Dänemark und Norwegen
      en: Royal Danish-Norwegian Realm
      uk: Королівство Данії і Норвегії

vereinsgoldmuenze:
  name:
    de: Vereinsgoldmünze
    en: Vereinsgoldmünze
    uk: Vereinsgoldmünze
  # No `historical_name` — the canonical period reference for this
  # standard IS «Vereinsgoldmünze» itself (used by both the Wiener
  # Münzvertrag of 24 January 1857 in primary sources and by every
  # modern numismatic reference work — MGM Münzlexikon, Wikipedia DE
  # «Krone (Vereinsgoldmünze)», Handelsmünze entry). Neither
  # «Vereinsgoldmünzfuß» nor any -fuß-suffixed compound appears in
  # those sources, so coining one would be a §0 invention. The
  # previous historical_name «Vereinskrone · ½ Vereinskrone» listed
  # the COIN denominations (Krone + ½ Krone), not an alternative
  # standard name — that broke the pattern of every other Müntzfuß
  # whose historical_name is a genuine alternative standard label
  # (Reichsmüntzfuß, Speciesfuß, Kurantmøntfod etc.). Removed; the
  # primary `name` carries the standard's reference function alone.
  metal: gold
  grid_unit_g: 500.0       # Pfund (metrisch, NICHT Cölln. Marck)
  grid_unit_name: Pfund metrisch
  grid_stops: 50           # 50 Vereinskronen je Pfund Feingold
  grid_unit_convention: fein
  fineness_standard: 0.900 # 900 ‰
  fineness_period: '900‰ Feingold'
  fineness_display: "900 ‰ (.900)"
