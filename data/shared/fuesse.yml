          en: "<b>14.984 g fine per Krone</b> (= 17.988 × .8333) · 7.492 g fine per ½ Krone · 29.968 g fine per 2 Krone<sup><a href=\"#ref23\">[23]</a></sup>"
          uk: "<b>14,984 г чистого на Krone</b> (= 17,988 × .8333) · 7,492 г чистого на ½ Krone · 29,968 г чистого на 2 Krone<sup><a href=\"#ref23\">[23]</a></sup>"
      - key:
          de: "Müntzfuß nach Feinsilber"
          en: "Müntzfuß by fine silver"
          uk: "Стопа за чистим сріблом"
        value:
          de: "<b>≈ 15,607 Krone je Marck Feinsilber</b> (= 233,856 ÷ 14,984) · zum Vergleich: <b>10½-Krone-Fuß</b> 15,628; <i>Christian IVs kroner</i> 14,391 — der 13-Krone-Fuß liegt nur 0,02 g Feinsilber über dem 10½-Krone-Fuß (Hede)"
          en: "<b>≈ 15.607 Krone per Mark of fine silver</b> (= 233.856 ÷ 14.984) · for comparison: <b>10½-Krone-Fuß</b> 15.628; <i>Christian IV's kroner</i> 14.391 — the 13-Krone-Fuß sits only 0.02 g of fine silver above the 10½-Krone-Fuß (Hede)"
          uk: "<b>≈ 15,607 Krone з марки чистого срібла</b> (= 233,856 ÷ 14,984) · для порівняння: <b>10½-Krone-Fuß</b> 15,628; <i>Christian IV's kroner</i> 14,391 — 13-Krone-Fuß містить лише на 0,02 г чистого срібла більше, ніж 10½-Krone-Fuß (Hede)"
      - key:
          de: "Reform-Charakter"
          en: "Reform character"
          uk: "Характер реформи"
        value:
          de: "Reskript 31. Dezember 1692 spricht von «<i>der allerbedste Godhed som den nogen Tid udi vores Regerings Tid haver været slagen</i>», setzt aber den tatsächlichen Feinsilbergehalt nur 0,02 g über den bisherigen 10½-Krone-Fuß. Die Reform ist vorwiegend symbolisch — höhere nominale Lötigkeit bei kleinerem Stück, gleicher Feinsilbervorrat<sup><a href=\"#ref23\">[23]</a></sup>"
          en: "The reskript of 31 December 1692 speaks of «<i>der allerbedste Godhed som den nogen Tid udi vores Regerings Tid haver været slagen</i>» («the very best fineness ever struck in our reign»), yet sets the actual fine-silver content only 0.02 g above the existing 10½-Krone-Fuß. The reform is largely symbolic — higher nominal fineness on a smaller coin, same fine-silver content<sup><a href=\"#ref23\">[23]</a></sup>"
          uk: "Рескрипт 31 грудня 1692 р. говорить про «<i>der allerbedste Godhed som den nogen Tid udi vores Regerings Tid haver været slagen</i>» («найкращу пробу за весь час нашого правління»), але фактично встановлює вміст чистого срібла лише на 0,02 г вище за вже існуючий 10½-Krone-Fuß. Реформа здебільшого символічна — вища номінальна проба на меншій монеті, той самий вміст чистого срібла<sup><a href=\"#ref23\">[23]</a></sup>"
    rechnungsfraktionen_label:
      de: Rechnungsfraktionen
      en: Accounting fractions
      uk: Розрахункові фракції
    rechnungsfraktionen:
      de: "<b>2 Krone</b> = <b>29,968 g</b> fein, 35,976 g rau<br><b>1 Krone</b> = <b>14,984 g</b> fein, 17,988 g rau = 4 Marck Danske<br><b>½ Krone</b> = <b>7,492 g</b> fein, 8,994 g rau = 2 Marck Danske<br><br><em>In dieser Fußform wurde die Krone bis zur endgültigen Ablösung 1771 weitergeprägt — vor allem in den Regierungsjahren Christians V. (Schluß), Frederiks IV., Christians VI. und Frederiks V. Glückstadter Prägungen sind selten; der Schwerpunkt lag in Kopenhagen.</em>"
      en: "<b>2 Krone</b> = <b>29.968 g</b> fine, 35.976 g rough<br><b>1 Krone</b> = <b>14.984 g</b> fine, 17.988 g rough = 4 Marck Danske<br><b>½ Krone</b> = <b>7.492 g</b> fine, 8.994 g rough = 2 Marck Danske<br><br><em>The Krone continued to be struck on this formula until its final retirement in 1771 — chiefly under the late Christian V, Frederik IV, Christian VI and Frederik V. Glückstadt strikes are rare; the bulk was minted in Copenhagen.</em>"
      uk: "<b>2 Krone</b> = <b>29,968 г</b> чистого, 35,976 г повної ваги<br><b>1 Krone</b> = <b>14,984 г</b> чистого, 17,988 г повної ваги = 4 Marck Danske<br><b>½ Krone</b> = <b>7,492 г</b> чистого, 8,994 г повної ваги = 2 Marck Danske<br><br><em>За цією формулою Krone карбувалася аж до остаточного припинення 1771 р. — переважно за правління пізнього Кристіана V, Фредеріка IV, Кристіана VI та Фредеріка V. Ґлюкштатські емісії рідкісні; основа карбування — Копенгаген.</em>"
  description:
    de: |
      Dritte und letzte Krone-Münzformel der dänischen Monarchie. Eingeführt durch
      Reskript 31. Dezember 1692 unter Christian V. — höherer Feingehalt (13⅓ Loth)
      bei reduziertem Raugewicht (17,988 g) gegenüber dem 10½-Krone-Fuß. De facto
      nur 0,02 g mehr Feinsilber pro Stück; die Reform ist vorwiegend Symbolik der
      Vertrauenswiederherstellung. Letzte Prägung 1771.
    en: |-
      The third and final Krone formula of the Danish monarchy. Introduced by
      reskript of 31 December 1692 under Christian V — higher fineness (13⅓ Loth)
      on a reduced rough weight (17.988 g) versus the 10½-Krone-Fuß. The actual
      fine-silver content is only 0.02 g higher per coin; the reform is mainly
      symbolic, intended to restore confidence. Last struck 1771.
    uk: |-
      Третя і остання Krone-формула данської монархії. Запроваджена рескриптом
      31 грудня 1692 р. за Кристіана V — вища проба (13⅓ Loth) при зменшеній
      повній вазі (17,988 г) порівняно з 10½-Krone-Fuß. Фактичний вміст чистого
      срібла лише на 0,02 г вищий за монету; реформа переважно символічна, мала
      на меті відновити довіру. Востаннє карбувалася 1771 р.
  fractions:
    "2": {soll_fein_g: 29.968}          # 2 Krone (rare in this formula)
    "1": {soll_fein_g: 14.984}          # 1 Krone (canonical)
    "1/2": {soll_fein_g: 7.492}         # ½ Krone

# -----------------------------------------------------------------------------
# Guldkrone-Fuß. Frederik III's Glückstadt gold tariff coin 1657–1660.
# Goldenes Pendant der Krone-Mønt-Kategorie: gleicher Krone-Name und Tarif-Logik
# wie die silberne Krone-Mønt, aber in Gold (.917 = 22 Karat) bei einem
# eigenständigen physischen Müntzfuß.
#
# Belegexemplar Stacks Bowers Bruun Part III Lot 11222 (NGC MS-61, 5,91 g rau,
# verkauft 29. Okt. 2025) trägt die Katalogsynopsis Hede 145B / Sieg-160(B) /
# Schou-2 / Aagaard-4.1 [57.1-60.4] / Bruun-6344 / KM-40.2 / Friedberg-120 und
# bestätigt Hede 145B als kanonischen Glückstädter Typ. Numista N#306974 listet
# 5,996 g rau (Mittelwert über die drei Jahrgänge 1657, 1659, 1660) und .917
# Feingehalt. Aus diesem Mittelwert folgt direkt die Hede-typische Notation
# «39 Stück je Cöllnische Marck Raulegierung von 22 Karat»:
#   233,856 ÷ 5,996 ≈ 39 · 5,99631 g rau × .91667 = 5,49671 g fein.
#
# Tarif: 1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk (Numista «Value: 1 Gold
# Krone (7⁄2)» bezogen auf «Currency: Speciedaler 1617–1773»). Spätere
# Frederik-III-Guldkrone-Prägung Kopenhagen 1668 (KM# 303, Numista N#308327)
# folgt einem reduzierten Tarif (3 Specie = 18 Mark) bei kleinerem Raugewicht
# 5,47 g — physikalisch ein anderer Müntzfuß und in dieser Definition NICHT
# enthalten (Kopenhagen liegt außerhalb des Holstein-Verzeichnisses).
# -----------------------------------------------------------------------------
  events:
    first_adoption:
      anywhere: 1693
      holstein: 1693
      note: '13-Krone-Fuß («Feine Krone»), introduced by Reskript Christians V. of 31 December 1692 (Hede 1957 verbatim: «<i>rescript 31. december 1692, der indførte de ''fine'' kroner, udtaler, at der vil blive slået kroner ''efter den allerbedste Godhed som den nogen Tid udi vores Regerings Tid haver været slagen''</i>») → first issues 1693. Copenhagen-only mint; the standard applied throughout Royal Danish realm including royal Holstein, but no Holstein mint participated — coins reached Holstein via royal-Danish currency flow. Reform character is largely symbolic: nominal fineness rises from 10¾ Loth (.672) to 13⅓ Loth (.833), but the actual fine-silver content per Krone rises only from 14.964 g to 14.984 g (= +0.02 g) — the change is intended to restore confidence after the Krone-Mønt''s loss of dominance to Kurantmønt around 1692 (lex.dk «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>»).'
    first_mint:
      anywhere: 1693
      holstein:
    last_mint:
      anywhere: 1771
      holstein:
      note: 'anywhere last-mint 1771 = last Krone-Mønt of the Danish monarchy (Christian VII, 1771 Copenhagen, Hede 23) — bears the inscription «<i>DEN 29. JANUARII</i>» commemorating Christian VII''s birthday and is a ceremonial Schaumünze. Hede 1957: «<i>indført 1693 og sidst slået 1771</i>». Skuemønter (commemorative Schaumünzen) outside the regular formula: 3 Kroner 1699 (Frederik IV ascension after death of Christian V) and 1746 (Frederik V ascension after death of Christian VI) — Hede: «<i>3 kroner 1699 og 1746 ... slået i anledning af et tronskifte som skuemønter</i>» — these follow their own non-formal Müntzfod and are dated within the 1693-1771 frame.'
    std_end:
      anywhere: 1771
      holstein: 1771
      note: 'std_end 1771 coincides with last_mint — the 13-Krone-Fuß was never formally repealed before that date. After 1771 the Krone-Mønt as a coinage class is dormant; the modern «Krone» from Møntloven 23. Mai 1873 (in force 1. Januar 1875, Skandinavische Münzunion) is a separate concept without historical continuity.'
    demonetisation:
      anywhere: 1813
      holstein: 1788
      approx_anywhere: true
      note: 'H demon 1788 = Schimmelmann reform: 9¼-Fuß becomes sole silver-Kurant standard for Holstein, demonetising parallel silver-Krone coinage including 13-Krone-Fuß remnants (analog of Bankgesetz 1907 demonetising Vereinsthaler when Goldmark became sole). 17-year tail in Holstein from last_mint 1771. anywhere demon ~1813 = Statsbankerot Forordning 5. Januar 1813: the comprehensive monetary reset swept older silver into the new Rigsbankdaler exchange (forced 6:1 conversion). 42-year tail in DK-Norway from last_mint 1771.'
    anywhere_label:
      de: Königreich Dänemark und Norwegen
      en: Royal Danish-Norwegian Realm
      uk: Королівство Данії і Норвегії
