    rechnungsfraktionen_label:
      de: "Rechnungsfraktionen"
      en: "Accounting fractions"
      uk: "Розрахункові фракції"
    rechnungsfraktionen:
      de: |
        <b>I. ab 1622 · Hanseatische Marck-Schilling-Rechnung</b> <small>(Grundsystem; biß zur S.-H.-Reform 1788 als offizielle Speciedaler-Theilung in Geltung — siehe Periode IV)</small><br>
        Holstein-weit (Holstein-Gottorp, Sonderburg, Norburg-Plön, Schauenburg-Pinneberg, Royal Holstein/Glückstadt) folgt der gemeinsamen hanseatischen Theilung des Speciedaler. <i>Die folgenden Perioden II (Glückstadt-Debasement 1670+) und III (Kurantmøntfod 1726+) sind Teilereignisse innerhalb dieser Geltungsdauer und ändern nur einzelne Untertheilungen, nicht das Grundsystem.</i><br>
         · <b>1 Thaler Species</b> = <b>25,28173 g</b> fein = 3 Marck Lübisch = 48 Schilling Lübisch = 96 Sechslinge = 192 Dreilinge = 576 Pfennig · syn. <em>Reichsthaler Species</em> (hanseat.), <em>Rigsdaler Species/Speciedaler</em> (dän.) — eine Münze, regionale Bezeichnungen<br>
         · <b>1 Marck Lübisch</b> = <b>8,42724 g</b> fein = ⅓ Thaler Species = 16 Schilling Lübisch = 32 Sechslinge = 192 Pfennig · überwiegend Rechnungseinheit; als Münze belegt im Glückstädter Doppelmarck 1681 «II MARCK LVB» (KM #136)<br>
         · <b>1 Schilling Lübisch</b> = <b>0,52670 g</b> fein = 1/48 Thaler Species = 2 Sechslinge = 4 Dreilinge = 12 Pfennig · syn. <em>solidus</em> (lat.), <em>Skilling Lybsk</em> (dän., auf Glückstädter Stempeln)<br>
         · <b>1 Sechsling Lübisch</b> = <b>0,26335 g</b> fein = ½ Schilling Lübisch = 6 Pfennig · syn. <em>Søsling Lybsk</em> (dän., auf Glückstädter Stempeln)<br>
         · <b>1 Dreiling</b> = <b>0,13168 g</b> fein = ¼ Schilling Lübisch = 3 Pfennig<br>
         · <b>1 Pfennig (Lübisch)</b> ≈ <b>0,0439 g</b> fein · Rechnungseinheit, gelegentlich als Kleinmünze geprägt<br>
        <i>Territoriale Varianten:</i><br>
         · <b>Königliches Glückstadt</b> (Christian IV, Frederik III, ab 1623): parallele dänische Bezeichnung — <b>1 Skilling Dansk(e)</b> = ½ Schilling Lübisch = 1 Sechsling Lübisch im Silberwert; 96 Sk Danske = 1 Speciedaler · belegt durch KM #358 «VIII SKILLING DANSKE = 4 Skilling Lybsk = 1/12 Speciedaler»<br>
         · <b>Königliches Glückstadt</b> (1622–1675): <b>1 Düttchen</b> = 3 Schilling Lübisch = 1/16 Thaler Species = 1,580 g fein · livländisch-polnischer Lehnbegriff für das Drei-Schilling-Stück<br>
         · <b>Schauenburg-Holstein-Pinneberg</b>: parallel zur Reichsthaler-9-Fuß-Rechnung — <b>1 Groschen</b> = 1/24 Reichsthaler (Otto V., 1638, KM #150); <b>1 Mariengroschen</b> = 1/36 Reichsthaler ≈ 1⅓ Schilling Lübisch (Oldendorf 1624). Schauenburg fällt 1640 an Holstein-Glückstadt zurück<br>
         · <b>Sonderburg-Norburg-Plön</b>: Sonder-Theilungen <b>1/15 Speciedaler</b> = 4 Schilling Lübisch und <b>1/30 Speciedaler</b> = 2 Schilling Lübisch («Sonderburg-Mode»)<br><br>
        <b>II. 1670–1726 · Übergangsphase (proto-Courant nur in Glückstadt)</b><br>
        Mit <b>Plakat 16. März 1671</b> («Hebræermønt») begann die Krone in Glückstadt, den Skilling Danske unter den hanseatischen Silberwert zu reduzieren — über 50 Jahre vor der formalen Kurantmøntfod von 1726. <i>Außerhalb des königlichen Anteils blieb die hanseatische Marck-Schilling-Rechnung wie unter Periode I unverändert.</i><br>
         · <b>Royal Glückstadt (proto-Courant Skilling Danske)</b>: 1 Sk Danske ≈ <b>0,21494 g</b> fein (statt hanseatisch 0,26335 g) · 8 Sk Danske = 1,720 g fein (KM #82.1 1694, KM #1 1702, KM #3 1711) — entspricht bereits der späteren 11⅓-Fuß-Theilung (8/96 RCour)<br>
         · <b>Royal Glückstadt (Kleinstückelung)</b>: 2 Sk Danske ≈ 0,385–0,404 g fein (KM #78 1693, KM #4 1714) — zusätzliche Scheide-Reduktion auf das kleinste Stück<br>
         · <b>Holstein-Gottorp, Sonderburg, Norburg-Plön</b>: hanseatische Theilung unverändert — Gottorp prägt weiterhin ½ Thaler, ⅔ Thaler, 1/16 Thaler nach voller hanseatischer Lübisch-Rechnung biß 1721<br><br>
        <b>III. 1726–1788 · Kurantmøntfod-Ära (für Speciedaler-Akaunting)</b><br>
        <b>Forordningen 15./31. Juli 1726</b> schufen den neuen Rigsdaler Courant (RCour) im 11⅓-Th-Fuß. Skilling-Danske-Untertheilungen für Holstein wandern damit formal in den 11⅓-Fuß (siehe dort). Im 9¼-Fuß bleibt für die Speciedaler-Akaunting die hanseatische Marck-Lübisch-Rechnung wie unter Periode I unverändert.<br>
         · <b>Crown-Konvention</b>: 1 Speciedaler = 1¼ Rigsdaler Courant = 120 Skilling Danske (rechnerisch — siehe 11⅓-Fuß)<br>
         · 120 × 0,21494 = 25,79 g fein vs. 25,28 g im Speciedaler — die ~2 % Differenz hieß <em>Opgæld</em> und war am Wechselmarkt zwischen Specie und Courant sichtbar<br>
         · <b>Plakat 3. Dezember 1794</b>: Opgæld abgeschafft; 5:4 wird einzig gültige Wechselrelation; RCour ~2 % unter Silberwert (Seigniorage der Krone)<br><br>
        <b>IV. 1788–1813 · Schleswig-Holsteinisch Courant</b><br>
        <b>Reform 7. Juli 1788</b>: die Speciedaler-Untertheilungen werden auf Schleswig-Holsteinisch Courant umbasiert (statt Marck Lübisch). Glückstädter und Altonaer Speciedaler tragen jetzt Doppelinschriften «1 THALER SPECIES = 60 SCHILLING COURANT».<br>
         · <b>1 Thaler Species</b> = <b>1¼ Reichsthaler S.-H.-Courant</b> = 60 Schilling S.-H.-Courant = 120 Sechslinge = 240 Dreilinge<br>
         · <b>1 Reichsthaler S.-H.-Courant</b> = <b>20,22538 g</b> fein = 48 Schilling S.-H.-Courant = 3 Mark S.-H.-Courant = ⅘ Thaler Species · reine Rechnungseinheit, am 9¼-Fuß-Speciedaler verankert; nicht zu verwechseln mit dem physischen Rigsdaler Courant des 11⅓-Fuß (20,634 g fein), der weiterhin im dänisch-norwegischen Königreich kursierte. Das 5:4-Verhältnis (Reichsthaler S.-H.-Courant ↔ Specie) war in den Herzogtümern bereits durch die Schimmelmann-Reform 1788 definitorisch festgeschrieben (60 Schilling S.-H.-Courant = 1 Specie); das spätere <b>Plakat vom 3. Dezember 1794</b> regelte denselben 5:4-Tarif <em>für das Kurantmøntfod-System Dänemark / Norwegen</em>, wo der Marktkurs (Opgæld) bisher schwankte — Schleswig-Holstein war seit 1788 aus diesem System ausgeschieden und nicht Adressat des Plakats<br>
         · <b>1 Mark S.-H.-Courant</b> = <b>6,74179 g</b> fein = 16 Schilling S.-H.-Courant = ⅓ Reichsthaler S.-H.-Courant = 4/15 Thaler Species · Rechnungseinheit, keine Mark-Münze geprägt; <i>nicht identisch mit der Hamburger Mark Courant</i> (1/3 Rigsdaler Courant = 6,88 g fein, am 11⅓-Fuß verankert) — die S.-H. Reform 1788 ankerte das System neu am Speciedaler<br>
         · <b>1 Schilling S.-H.-Courant</b> = <b>0,42136 g</b> fein = 1/60 Thaler Species = 2 Sechslinge = 4 Dreilinge = 12 Pfennig<br>
         · <b>1 Sechsling S.-H.-Courant</b> = <b>0,21068 g</b> fein = ½ Schilling Courant = 6 Pfennig<br>
         · <b>1 Dreiling S.-H.-Courant</b> = <b>0,10534 g</b> fein = ¼ Schilling Courant = 3 Pfennig<br>
        <i>Marck Lübisch lebt als Bankgeld in Hamburg/Lübeck weiter, ist aber nicht mehr offizielle Theilung des Speciedaler in Schleswig-Holstein.</i><br><br>
        <b>V. 1813+ · Rigsbankdaler-Konvertierung und spätere Standards</b><br>
         · <b>Forordning 5. Januar 1813</b>: 1 Thaler Species = 2 Rigsbankdaler = 12 Rigsbankmark = 192 Rigsbankskilling · Rigsbankskilling-Theilungen leben im 18½-Fuß (siehe dort), nicht mehr im 9¼-Fuß<br>
         · <b>Forordning 18. Dezember 1841</b>: Doppelinschriften (Rigsbankskilling / Skilling Rigsmønt) auf den Scheidemünzen<br>
         · <b>Münzgesetz 9. Juli 1873</b>: 1 Vereinsthaler = 3 Reichsmark; der Speciedaler wurde mit ~3,75 ℳ eingelöst<br><br>
        <em>Physisch geprägte Stückelungen unter dem 9¼-Fuß: 2, 1½, 1, ⅔, ½, ⅓, ¼, ⅙, ⅛, 1/12, 1/15, 1/16, 1/24, 1/30, 1/32, 1/48, 1/60, 1/64, 1/96, 1/128 Thaler Species — sowie eigenständige Marck-, Schilling-, Sechsling-, Dreiling-, Düttchen-, Groschen- und Pfennigstücke (siehe territoriale Varianten unter Periode I)</em>
      en: |
        <b>I. from 1622 · Hanseatic Marck-Schilling system</b> <small>(foundational system; remained in force as the official Speciedaler subdivision until the S.-H. reform of 1788 — see Period IV)</small><br>
        Holstein-wide (Holstein-Gottorp, Sonderburg, Norburg-Plön, Schauenburg-Pinneberg, royal Holstein/Glückstadt) under the common Hanseatic subdivision of the Speciedaler. <i>The following Periods II (Glückstadt debasement 1670+) and III (Kurantmøntfod 1726+) are sub-events within this period of validity and modify only individual sub-units, not the foundational system itself.</i><br>
         · <b>1 Thaler Species</b> = <b>25.28173 g</b> fine = 3 Marck Lübisch = 48 Schilling Lübisch = 96 Sechslinge = 192 Dreilinge = 576 Pfennig · syn. <em>Reichsthaler Species</em> (Hanseatic), <em>Rigsdaler Species/Speciedaler</em> (Danish) — one coin, regional names<br>
         · <b>1 Marck Lübisch</b> = <b>8.42724 g</b> fine = ⅓ Thaler Species = 16 Schilling Lübisch = 32 Sechslinge = 192 Pfennig · primarily an accounting unit; struck as a coin in the Glückstadt double-mark of 1681 «II MARCK LVB» (KM #136)<br>
         · <b>1 Schilling Lübisch</b> = <b>0.52670 g</b> fine = 1/48 Thaler Species = 2 Sechslinge = 4 Dreilinge = 12 Pfennig · syn. <em>solidus</em> (Lat.), <em>Skilling Lybsk</em> (Danish, on Glückstadt dies)<br>
         · <b>1 Sechsling Lübisch</b> = <b>0.26335 g</b> fine = ½ Schilling Lübisch = 6 Pfennig · syn. <em>Søsling Lybsk</em> (Danish, on Glückstadt dies)<br>
         · <b>1 Dreiling</b> = <b>0.13168 g</b> fine = ¼ Schilling Lübisch = 3 Pfennig<br>
         · <b>1 Pfennig (Lübisch)</b> ≈ <b>0.0439 g</b> fine · accounting unit, occasionally struck as a small coin<br>
        <i>Territorial variants:</i><br>
         · <b>Royal Glückstadt</b> (Christian IV, Frederik III, from 1623): parallel Danish naming — <b>1 Skilling Dansk(e)</b> = ½ Schilling Lübisch = 1 Sechsling Lübisch in silver value; 96 Sk Danske = 1 Speciedaler · attested by KM #358 «VIII SKILLING DANSKE = 4 Skilling Lybsk = 1/12 Speciedaler»<br>
         · <b>Royal Glückstadt</b> (1622–1675): <b>1 Düttchen</b> = 3 Schilling Lübisch = 1/16 Thaler Species = 1.580 g fine · Livonian-Polish loan term for the three-Schilling piece<br>
         · <b>Schauenburg-Holstein-Pinneberg</b>: parallel Reichsthaler-9-Fuß accounting — <b>1 Groschen</b> = 1/24 Reichsthaler (Otto V., 1638, KM #150); <b>1 Mariengroschen</b> = 1/36 Reichsthaler ≈ 1⅓ Schilling Lübisch (Oldendorf 1624). Schauenburg reverted to Holstein-Glückstadt in 1640<br>
         · <b>Sonderburg-Norburg-Plön</b>: special subdivisions <b>1/15 Speciedaler</b> = 4 Schilling Lübisch and <b>1/30 Speciedaler</b> = 2 Schilling Lübisch («Sonderburg style»)<br><br>
        <b>II. 1670–1726 · Transitional phase (proto-Courant in Glückstadt only)</b><br>
        With the <b>Placard of 16 March 1671</b> («Hebræermønt»), the Crown began debasing the Skilling Danske at Glückstadt below the Hanseatic silver value — over 50 years before the formal Kurantmøntfod of 1726. <i>Outside the royal share, the Hanseatic Marck-Schilling system continued as in Period I, unchanged.</i><br>
         · <b>Royal Glückstadt (proto-Courant Skilling Danske)</b>: 1 Sk Danske ≈ <b>0.21494 g</b> fine (vs. Hanseatic 0.26335 g) · 8 Sk Danske = 1.720 g fine (KM #82.1 1694, KM #1 1702, KM #3 1711) — already at the silver content of the later 11⅓-Fuß subdivision (8/96 RCour)<br>
         · <b>Royal Glückstadt (small denominations)</b>: 2 Sk Danske ≈ 0.385–0.404 g fine (KM #78 1693, KM #4 1714) — additional petty-coin reduction on the smallest piece<br>
         · <b>Holstein-Gottorp, Sonderburg, Norburg-Plön</b>: Hanseatic subdivision unchanged — Gottorp continues to strike ½ Thaler, ⅔ Thaler, 1/16 Thaler at full Hanseatic silver until 1721<br><br>
        <b>III. 1726–1788 · Kurantmøntfod era (for Speciedaler accounting)</b><br>
        The <b>Forordninger of 15/31 July 1726</b> created the new Rigsdaler Courant (RCour) at the 11⅓-Th-Fuß. Skilling-Danske subdivisions for Holstein formally migrate into the 11⅓-Fuß (see there). For 9¼-Fuß Speciedaler accounting, the Hanseatic Marck-Lübisch system as in Period I continues unchanged.<br>
         · <b>Crown convention</b>: 1 Speciedaler = 1¼ Rigsdaler Courant = 120 Skilling Danske (arithmetically — see 11⅓-Fuß)<br>
         · 120 × 0.21494 = 25.79 g fine vs. 25.28 g in the Speciedaler — the ~2 % gap was called <em>Opgæld</em> and showed on the exchange market between Specie and Courant<br>
         · <b>Placard of 3 December 1794</b>: Opgæld abolished; 5:4 became the sole legal exchange ratio; RCour now sat ~2 % below silver value (seigniorage gain for the Crown)<br><br>
        <b>IV. 1788–1813 · Schleswig-Holstein Courant</b><br>
        The <b>Reform of 7 July 1788</b> rebased the Speciedaler subdivisions onto Schleswig-Holstein Courant (instead of Marck Lübisch). Glückstadt and Altona Speciedaler now bear dual-denomination inscriptions «1 THALER SPECIES = 60 SCHILLING COURANT».<br>
         · <b>1 Thaler Species</b> = <b>1¼ Reichsthaler S.-H. Courant</b> = 60 Schilling S.-H. Courant = 120 Sechslinge = 240 Dreilinge<br>
         · <b>1 Reichsthaler S.-H. Courant</b> = <b>20.22538 g</b> fine = 48 Schilling S.-H. Courant = 3 Mark S.-H. Courant = ⅘ Thaler Species · pure accounting unit anchored to the 9¼-Fuß Speciedaler; not to be confused with the physical Rigsdaler Courant on the 11⅓-Fuß (20.634 g fine), which continued to circulate in the Danish-Norwegian kingdom proper. The 5:4 ratio (Reichsthaler S.-H. Courant ↔ Specie) was already built into the Schimmelmann reform of 1788 by definition (60 Schilling S.-H. Courant = 1 Specie); the later <b>Plakat of 3 December 1794</b> regulated the same 5:4 tariff <em>for the Kurantmøntfod system in Denmark / Norway</em>, where the market rate (Opgæld) had until then fluctuated — Schleswig-Holstein had separated from that system in 1788 and was not the addressee of the Plakat<br>
         · <b>1 Mark S.-H. Courant</b> = <b>6.74179 g</b> fine = 16 Schilling S.-H. Courant = ⅓ Reichsthaler S.-H. Courant = 4/15 Thaler Species · accounting unit; no Mark coin was struck; <i>not identical with the Hamburg Mark Courant</i> (1/3 Rigsdaler Courant = 6.88 g fine, anchored to the 11⅓-Fuß) — the S.-H. reform of 1788 re-anchored the system to the Speciedaler<br>
         · <b>1 Schilling S.-H. Courant</b> = <b>0.42136 g</b> fine = 1/60 Thaler Species = 2 Sechslinge = 4 Dreilinge = 12 Pfennig<br>
         · <b>1 Sechsling S.-H. Courant</b> = <b>0.21068 g</b> fine = ½ Schilling Courant = 6 Pfennig<br>
         · <b>1 Dreiling S.-H. Courant</b> = <b>0.10534 g</b> fine = ¼ Schilling Courant = 3 Pfennig<br>
        <i>Marck Lübisch survives as bank money in Hamburg/Lübeck, but is no longer the official subdivision of the Speciedaler in Schleswig-Holstein.</i><br><br>
        <b>V. 1813+ · Conversion to Rigsbankdaler and later standards</b><br>
         · <b>Forordning of 5 January 1813</b>: 1 Thaler Species = 2 Rigsbankdaler = 12 Rigsbankmark = 192 Rigsbankskilling · Rigsbankskilling subdivisions live in the 18½-Fuß (see there), no longer in the 9¼-Fuß<br>
         · <b>Forordning of 18 December 1841</b>: dual-denomination inscriptions (Rigsbankskilling / Skilling Rigsmønt) on the divisional coinage<br>
         · <b>Münzgesetz of 9 July 1873</b>: 1 Vereinsthaler = 3 Reichsmark; the Speciedaler was redeemed at ~3.75 ℳ<br><br>
        <em>Physical denominations actually struck under the 9¼-Fuß: 2, 1½, 1, ⅔, ½, ⅓, ¼, ⅙, ⅛, 1/12, 1/15, 1/16, 1/24, 1/30, 1/32, 1/48, 1/60, 1/64, 1/96, 1/128 Thaler Species — plus independent Marck, Schilling, Sechsling, Dreiling, Düttchen, Groschen and Pfennig pieces (see territorial variants under Period I)</em>
      uk: |
        <b>I. з 1622 · Ганзейська система Marck-Schilling</b> <small>(базова; залишалась чинною як офіційний поділ Speciedaler аж до Шлезв.-Гольшт. реформи 1788 р. — див. Період IV)</small><br>
        По всьому Гольштейну (Holstein-Gottorp, Sonderburg, Norburg-Plön, Schauenburg-Pinneberg, королівський Гольштейн/Ґлюкштадт) — спільний ганзейський поділ Speciedaler. <i>Наступні Періоди II (Ґлюкштадтський debasement з 1670 р.) і III (Kurantmøntfod з 1726 р.) — підподії всередині цього періоду чинності, що змінюють лише окремі субодиниці, а не базову систему.</i><br>
         · <b>1 Thaler Species</b> = <b>25,28173 г</b> чистого = 3 Marck Lübisch = 48 Schilling Lübisch = 96 Sechsling = 192 Dreiling = 576 Pfennig · син. <em>Reichsthaler Species</em> (ганз.), <em>Rigsdaler Species/Speciedaler</em> (дан.) — монета одна, назви регіональні<br>
         · <b>1 Marck Lübisch</b> = <b>8,42724 г</b> чистого = ⅓ Thaler Species = 16 Schilling Lübisch = 32 Sechsling = 192 Pfennig · переважно розрахункова одиниця; як монета засвідчена ґлюкштадським Doppelmarck 1681 р. «II MARCK LVB» (KM #136)<br>
         · <b>1 Schilling Lübisch</b> = <b>0,52670 г</b> чистого = 1/48 Thaler Species = 2 Sechsling = 4 Dreiling = 12 Pfennig · син. <em>solidus</em> (лат.), <em>Skilling Lybsk</em> (дан., саме так на ґлюкштадських штемпелях)<br>
         · <b>1 Sechsling Lübisch</b> = <b>0,26335 г</b> чистого = ½ Schilling Lübisch = 6 Pfennig · син. <em>Søsling Lybsk</em> (дан., на ґлюкштадських штемпелях)<br>
         · <b>1 Dreiling</b> = <b>0,13168 г</b> чистого = ¼ Schilling Lübisch = 3 Pfennig<br>
         · <b>1 Pfennig (Lübisch)</b> ≈ <b>0,0439 г</b> чистого · розрахункова одиниця, інколи карбувалась як дрібна монета<br>
        <i>Територіальні варіанти:</i><br>
         · <b>Королівський Ґлюкштадт</b> (Кристіан IV, Фредерик III, від 1623): паралельна данська назва — <b>1 Skilling Dansk(e)</b> = ½ Schilling Lübisch = 1 Sechsling Lübisch у срібному значенні; 96 Sk Danske = 1 Speciedaler · засвідчено KM #358 «VIII SKILLING DANSKE = 4 Skilling Lybsk = 1/12 Speciedaler»<br>
         · <b>Королівський Ґлюкштадт</b> (1622–1675): <b>1 Düttchen</b> = 3 Schilling Lübisch = 1/16 Thaler Species = 1,580 г чистого · ліфляндсько-польський запозичений термін для тришилінгової монети<br>
         · <b>Schauenburg-Holstein-Pinneberg</b>: паралельний рахунок за Reichsthaler-9-Fuß — <b>1 Groschen</b> = 1/24 Reichsthaler (Otto V., 1638, KM #150); <b>1 Mariengroschen</b> = 1/36 Reichsthaler ≈ 1⅓ Schilling Lübisch (Олдендорф 1624). У 1640 р. Schauenburg повернувся до Holstein-Glückstadt<br>
         · <b>Sonderburg-Norburg-Plön</b>: спеціальні поділи <b>1/15 Speciedaler</b> = 4 Schilling Lübisch і <b>1/30 Speciedaler</b> = 2 Schilling Lübisch («Sonderburg-Mode»)<br><br>
        <b>II. 1670–1726 · Перехідна фаза (proto-Courant лише в Ґлюкштадті)</b><br>
        З <b>Plakat 16 березня 1671</b> («Hebræermønt») Корона у Ґлюкштадті почала знижувати срібну вагу Skilling Danske нижче ганзейського рівня — за понад 50 років до формального Kurantmøntfod 1726 р. <i>Поза королівською часткою ганзейська система Marck-Schilling як у Періоді I залишалась без змін.</i><br>
         · <b>Royal Glückstadt (proto-Courant Skilling Danske)</b>: 1 Sk Danske ≈ <b>0,21494 г</b> чистого (замість ганзейських 0,26335 г) · 8 Sk Danske = 1,720 г чистого (KM #82.1 1694, KM #1 1702, KM #3 1711) — уже відповідає пізнішому поділу 11⅓-Fuß (8/96 RCour)<br>
         · <b>Royal Glückstadt (дрібний номінал)</b>: 2 Sk Danske ≈ 0,385–0,404 г чистого (KM #78 1693, KM #4 1714) — додаткова Scheide-редукція на найменшому номіналі<br>
         · <b>Holstein-Gottorp, Sonderburg, Norburg-Plön</b>: ганзейський поділ без змін — Gottorp продовжує карбувати ½ Thaler, ⅔ Thaler, 1/16 Thaler за повним ганзейським сріблом до 1721 р.<br><br>
        <b>III. 1726–1788 · Епоха Kurantmøntfod (для Speciedaler-акаунтингу)</b><br>
        <b>Forordningen 15/31 липня 1726</b> створили новий Rigsdaler Courant (RCour) у 11⅓-Th-Fuß. Skilling-Danske-поділи для Гольштейну формально переходять у 11⅓-Fuß (див. там). Для Speciedaler-акаунтингу в 9¼-Fuß ганзейська система Marck-Lübisch як у Періоді I залишається без змін.<br>
         · <b>Конвенція Корони</b>: 1 Speciedaler = 1¼ Rigsdaler Courant = 120 Skilling Danske (арифметично — див. 11⅓-Fuß)<br>
         · 120 × 0,21494 = 25,79 г чистого проти 25,28 г у Speciedaler — ~2 % різниця називалась <em>Opgæld</em> і виявлялась на валютному ринку між Specie і Courant<br>
         · <b>Plakat 3 грудня 1794</b>: Opgæld скасовано; 5:4 — єдине дійсне відношення; RCour опинився ~2 % нижче срібної вартості (сеньйораж Корони)<br><br>
        <b>IV. 1788–1813 · Шлезвіг-Гольштейнський Courant</b><br>
        <b>Реформа 7 липня 1788 р.</b> переводить поділи Speciedaler на Schleswig-Holstein-Courant (замість Marck Lübisch). На ґлюкштадських і альтонських Speciedaler з'являються двономінальні написи «1 THALER SPECIES = 60 SCHILLING COURANT».<br>
         · <b>1 Thaler Species</b> = <b>1¼ Reichsthaler Ш.-Г.-Courant</b> = 60 Schilling Ш.-Г.-Courant = 120 Sechsling = 240 Dreiling<br>
         · <b>1 Reichsthaler Ш.-Г.-Courant</b> = <b>20,22538 г</b> чистого = 48 Schilling Ш.-Г.-Courant = 3 Mark Ш.-Г.-Courant = ⅘ Thaler Species · розрахункова одиниця, anchored до 9¼-Fuß Speciedaler; не плутати з фізичним Rigsdaler Courant 11⅓-Fuß (20,634 г чистого), який і далі обертався в самому дансько-норвезькому королівстві. Курс 5:4 (Reichsthaler Ш.-Г.-Courant ↔ Specie) у герцогствах був вже закладений у реформу Шіммельмана 1788 за визначенням (60 Schilling Ш.-Г.-Courant = 1 Specie); пізніший <b>Plakat 3 грудня 1794</b> урегулював той самий тариф 5:4 <em>для Kurantmøntfod-системи в Данії / Норвегії</em>, де ринковий курс (Opgæld) до того коливався — Schleswig-Holstein вийшов із цієї системи ще 1788 і не був адресатом Plakat'а<br>
         · <b>1 Mark Ш.-Г.-Courant</b> = <b>6,74179 г</b> чистого = 16 Schilling Ш.-Г.-Courant = ⅓ Reichsthaler Ш.-Г.-Courant = 4/15 Thaler Species · розрахункова одиниця; монета Mark не карбувалася; <i>не тотожна з Hamburg Mark Courant</i> (1/3 Rigsdaler Courant = 6,88 г чистого, anchored до 11⅓-Fuß) — реформа S.-H. 1788 переанкорувала систему до Speciedaler<br>
         · <b>1 Schilling Ш.-Г.-Courant</b> = <b>0,42136 г</b> чистого = 1/60 Thaler Species = 2 Sechsling = 4 Dreiling = 12 Pfennig<br>
         · <b>1 Sechsling Ш.-Г.-Courant</b> = <b>0,21068 г</b> чистого = ½ Schilling Courant = 6 Pfennig<br>
         · <b>1 Dreiling Ш.-Г.-Courant</b> = <b>0,10534 г</b> чистого = ¼ Schilling Courant = 3 Pfennig<br>
        <i>Marck Lübisch продовжує існувати як банківські гроші в Гамбурзі/Любеку, але вже не є офіційним поділом Speciedaler у Шлезвіг-Гольштейні.</i><br><br>
        <b>V. 1813+ · Перерахунок до Rigsbankdaler і пізніших стандартів</b><br>
         · <b>Forordning 5 січня 1813</b>: 1 Thaler Species = 2 Rigsbankdaler = 12 Rigsbankmark = 192 Rigsbankskilling · поділи Rigsbankskilling живуть у 18½-Fuß (див. там), уже не в 9¼-Fuß<br>
         · <b>Forordning 18 грудня 1841</b>: двономінальні написи (Rigsbankskilling / Skilling Rigsmønt) на розмінних монетах<br>
         · <b>Münzgesetz 9 липня 1873</b>: 1 Vereinsthaler = 3 Reichsmark; Speciedaler викуповувався за ~3,75 ℳ<br><br>
        <em>Реально карбовані частки під 9¼-Fuß: 2, 1½, 1, ⅔, ½, ⅓, ¼, ⅙, ⅛, 1/12, 1/15, 1/16, 1/24, 1/30, 1/32, 1/48, 1/60, 1/64, 1/96, 1/128 Thaler Species — плюс самостійні Marck-, Schilling-, Sechsling-, Dreiling-, Düttchen-, Groschen- та Pfennig-монети (див. територіальні варіанти у Періоді I)</em>
