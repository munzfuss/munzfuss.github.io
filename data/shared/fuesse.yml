    rechnungsfraktionen:
      de: <b>1 Krone</b> = <b>4 Marck Danske</b> = <b>14,964 g</b> Feinsilber = <b>⅔ Speciedaler</b> (Tarif Christian V., 1670+) — 22,272 g rau bei .672 Feingehalt<br><b>½ Krone</b> = <b>2 Marck Danske</b> = <b>7,482 g</b> fein = <b>⅓ Speciedaler</b> · 11,136 g rau (KM# 65, 80.1, 80.2, 377, 406.3)<br><b>¼ Krone</b> = <b>1 Marck Danske</b> = <b>3,741 g</b> fein = <b>⅙ Speciedaler</b> · 5,568 g rau (KM# 342, 350, 381 — Kopenhagener Prägungen Christian V.)<br><br><em><b>Marck Danske</b> ist die Rechnungsfraktion der Krone in diesem Müntzfuß — nicht zu verwechseln mit <b>Mark lübisch</b> (1/3 Reichsthaler im 9-Fuß), <b>Mark Sch.-H. Courant</b> (4/15 Thaler Species ab 1788) oder dem späteren <b>Rigsbankdaler</b> (1813+). Die hier verwendete Marck Danske gehört speziell zur dänischen Kronemønt-Tarifsystemik 1644–1696.</em><br><br><em>Die ältere Krone-Münzformel <i>Christian IVs kroner</i> 1618–1652 (siehe oben) übernimmt denselben Krone-Begriff, aber mit höherem Feingehalt (.859 statt .672) und höherem Tarif (1½ → 1⅓ Specie statt ⅔). Eine spätere dritte Formel — der <b>13-Krone-Fuß</b> («<i>Feine Krone</i>») 1693–1771 — folgt unten.</em>
      en: <b>1 Krone</b> = <b>4 Marck Danske</b> = <b>14.964 g</b> fine silver = <b>⅔ Speciedaler</b> (Christian V tariff, 1670+) — 22.272 g rough at .672 fineness<br><b>½ Krone</b> = <b>2 Marck Danske</b> = <b>7.482 g</b> fine = <b>⅓ Speciedaler</b> · 11.136 g rough (KM# 65, 80.1, 80.2, 377, 406.3)<br><b>¼ Krone</b> = <b>1 Marck Danske</b> = <b>3.741 g</b> fine = <b>⅙ Speciedaler</b> · 5.568 g rough (KM# 342, 350, 381 — Copenhagen Christian V issues)<br><br><em><b>Marck Danske</b> is the accounting fraction of the Krone in this standard — not to be confused with <b>Mark lübisch</b> (1/3 Reichsthaler in the 9-Fuß), <b>Mark Sch.-H. Courant</b> (4/15 Thaler Species from 1788) or the later <b>Rigsbankdaler</b> (1813+). The Marck Danske used here belongs specifically to the Danish Kronemønt tariff system 1644–1696.</em><br><br><em>The earlier Krone formula <i>Christian IV's kroner</i> 1618–1652 (see above) uses the same «Krone» label but at higher fineness (.859 vs .672) and higher tariff (1½ → 1⅓ Specie rather than ⅔). A later third formula — the <b>13-Krone-Fuß</b> («<i>Fine Krone</i>») 1693–1771 — follows below.</em>
      uk: <b>1 Krone</b> = <b>4 Marck Danske</b> = <b>14,964 г</b> чистого срібла = <b>⅔ Speciedaler</b> (тариф Кристіана V, 1670+) — 22,272 г повної ваги за проби .672<br><b>½ Krone</b> = <b>2 Marck Danske</b> = <b>7,482 г</b> чистого = <b>⅓ Speciedaler</b> · 11,136 г повної ваги (KM# 65, 80.1, 80.2, 377, 406.3)<br><b>¼ Krone</b> = <b>1 Marck Danske</b> = <b>3,741 г</b> чистого = <b>⅙ Speciedaler</b> · 5,568 г повної ваги (KM# 342, 350, 381 — копенгагенські емісії Кристіана V)<br><br><em><b>Marck Danske</b> у цій стопі — розрахункова частка Krone, не плутати з <b>Mark lübisch</b> (1/3 Reichsthaler у 9-Fuß), <b>Mark Sch.-H. Courant</b> (4/15 Thaler Species з 1788) чи пізнішим <b>Rigsbankdaler</b> (1813+). Використана тут Marck Danske належить саме до данської Kronemønt-тарифної системи 1644–1696.</em><br><br><em>Старіша Krone-формула <i>Christian IV's kroner</i> 1618–1652 (див. вище) використовує той самий термін «Krone», але з вищою пробою (.859 проти .672) і вищим тарифом (1½ → 1⅓ Specie замість ⅔). Ще одна, третя формула — <b>13-Krone-Fuß</b> («<i>Тонка Крона</i>») 1693–1771 — далі нижче.</em>
  description:
    de: |
      Fiskalische Tarifmünze, Christian IV. bis Christian V. (1618–1696).
      KEIN vollwertiger Thaler Species — folgt eigenem Münzfuß mit reduziertem
      Feingehalt, der sich weder mathematisch noch konzeptionell aus dem 9¼-Fuß
      ableiten läßt. Empirisch ≈ 15,65 Kronen je Cöllnische Marck Feinsilber.
      Fundamental ist nicht der Feingehalt, sondern der TARIF: Die Krone wurde
      zu einem königlich festgesetzten Nennwert ÜBER dem Silberwert gehandelt.
      Die Differenz war Seigniorage-Gewinn der Krone, nicht Marktpreis.
    en: |-
      Fiscal tariff coin, Christian IV through Christian V (1618–1696). NOT a full-value Thaler Species — follows its own standard with reduced fineness that cannot be mathematically or conceptually derived from the 9¼-Thaler-Fuß. Empirically ≈ 15.65 Krones per fine Cologne mark. The fundamental feature is not the fineness but the TARIFF: the Krone was traded at a king-set face value ABOVE silver content. The difference was state seigniorage, not market price.
    uk: |-
      Фіскальна тарифна монета, від Крістіана IV до Крістіана V (1618–1696). НЕ повноцінний спецієсталер — має власний стандарт зі зниженою пробою, який не виводиться математично зі 9¼-стандарту. Емпірично ≈ 15,65 крон з чистої кельнської марки. Фундаментальною рисою є не проба, а ТАРИФ: крона обігала за встановленою королем вартістю ВИЩЕ вмісту срібла. Різниця — сеньйораж, а не ринкова ціна.
  fractions:
    # Hede / Wilcke II p. 203 formula: 22.272 g rough × .671875 = 14.964 g fine.
    "2": {soll_fein_g: 29.928}          # 2 Krone (Doppelkrone)
    "1": {soll_fein_g: 14.964}          # 1 Krone = 4 Marck Danske
    "1/2": {soll_fein_g: 7.482}         # ½ Krone = 2 Marck Danske
    "1/4": {soll_fein_g: 3.741}         # ¼ Krone = 1 Marck Danske

# -----------------------------------------------------------------------------
# 13-Krone-Fuß (Hede-Nickname «fine kroner»). Hede 1957:
#   13 Stück je 13⅓-lötiger Marck (≈ .833) = 17.988 g rau / 14.984 g fein.
# Eingeführt durch Reskript 31. Dezember 1692 (Christian V.); letzte Prägung
# 1771. Höherer Feingehalt als der 10½-Fuß, aber nur 0,02 g mehr Feinsilber pro
# Stück — der Wechsel war eher symbolisch (Vertrauenswiederherstellung) als eine
# echte Aufwertung. grid_stops = 233.856 ÷ 14.984 = 15.607.
# -----------------------------------------------------------------------------
  events:
    first_adoption:
      anywhere: 1644
      holstein: 1644
      note: 'First Krone-class issue at Glückstadt — Christian IV''s Hebræermønt (1644-1648, struck in parallel at Glückstadt and Copenhagen; Aagaard, danskmoent.dk myst/aag1.htm; Numista N#82679/N#133863). Hebræermønt is a war coinage of the Torstenson War (1643-1648) at deliberately concealed fineness — Hede 1957 does NOT classify it under the Grobe Kroner formula proper, which begins formally in Norway 1649 and Denmark 1652 («<i>indført i Norge 1649 og i Danmark 1652</i>»). The 1644 first_adoption captures the Hebræermønt as the in-scope Krone-class predecessor, with the explicit reservation that the formal 10½-Krone-Fuß ordinance follows only with Christian V''s mint ordinance of 22 March 1671 (see std_end note). Frederik III continued with his own Kronemønt programme 1651-1670 (Aagaard 2004 «Frederik III Kronemønt København 1651-1670») — note that the 1651-1652 Kopenhagen issues still followed the older Christian-IV Müntzformel before transitioning to the new 10½-Krone-Fuß formula from 1652 onward. Christian V revived at Glückstadt 1671-1696 (Aagaard 2022 «Christian V Kronemønt Glückstadt 1671-1696»).'
    first_mint:
      anywhere: 1644
      holstein: 1644
    last_mint:
      anywhere: 1732
      holstein: 1696
      note: 'anywhere last-mint 1732 = last Copenhagen Krone strikes under Christian VI (Hede 4) — Hede 1957: «<i>indført i Norge 1649 og i Danmark 1652 og sidst slået 1732</i>». H last-mint 1696 = closure of the Glückstadt Kronemønt (Aagaard 2022). Special issues outside this range: 1665 «Pumphosenkrone» / «Pumpbucksen Thaler» (Schou 39/40, Frederik III Krone and ½ Krone) struck at higher fineness for an attractive strike; 1675 2-Krone (Schou 11-15, Christian V) under Reskript of 11 March 1675 about the mint gain — both are Hede-classified «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» rather than formula continuations.'
    std_end:
      anywhere: 1726
      holstein: 1696
      note: 'anywhere std_end 1726 = Forordning Kurantmøntfod (Friedrich IV, 15./31. Juli 1726) introduces the 11⅓-Thaler-Fuß-Rigsdaler-Courant as the new principal standard, ending the Krone-Mønt''s primary-standard role even though the formal Krone formula continues until 1732 (Christian VI transition strikes). Earlier, lex.dk «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>» fixes 1692 as the de-facto transition to the Kurant-system. Forordning 22 March 1671 (Christian V) had formalised the 10½-Krone-Fuß: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» per mark of fine silver — Hede verifies: «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>» (44.544 g rough for 2-Krone = 2 × 22.272 g per single Krone ✓).'
    demonetisation:
      anywhere: 1813
      holstein: 1788
      approx_anywhere: true
      note: 'H demon 1788 = Schimmelmann reform: by recognising 9¼-Fuß as the SOLE silver-Kurant standard for Holstein from 1788, the reform implicitly ended legal-tender status for older parallel silver-Krone coinage in Holstein. anywhere demon ~1813 = Statsbankerot Forordning 5. Januar 1813: although the Forordning text does not explicitly name older Krone-class coins for recall, the comprehensive 1813 monetary reset (forced exchange at 6:1 into Rigsbankdaler 18½-Fuß = ½ Speciedaler) effectively swept all older silver-Kurant coinage out of legal circulation. By 1813 these coins (last mint 1696 / 1732) were 80-117 years old and in scattered circulation; the reset was the practical end-of-LT moment. Same Goldmark/Vereinsthaler analog as the Holstein 1788 case — a comprehensive monetary reset / sole-standard recognition demonetises competing standards in the same metal-niche. Modern «Krone» from Møntloven 23. Mai 1873 (in force 1. Januar 1875, Skandinavische Münzunion) is a completely separate concept with no historical continuity to the old Krone-Mønt family.'
    anywhere_label:
      de: Königreich Dänemark und Norwegen
      en: Royal Danish-Norwegian Realm
      uk: Королівство Данії і Норвегії
