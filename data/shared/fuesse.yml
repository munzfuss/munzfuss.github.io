      de: "Lov nr. 66 af 23. maj 1873 om Mønten · 2480 Kroner aus 1 kg Feingold bei .900 Feingehalt als <b>Hauptkurant</b> · darunter abgestufte Silber- und Bronze-Tiers als gesetzliche Untertheilungen · gemeinsamer Standard der Skandinavischen Müntzunion (Dänemark + Schweden ab 1873, Norwegen ab 1875)"
      en: "Lov nr. 66 of 23 May 1873 on the Coinage · 2,480 Kroner per kg of fine gold at .900 fineness as <b>Hauptkurant</b> · graded silver and bronze subsidiary tiers below it as legal subdivisions · the common standard of the Scandinavian Monetary Union (Denmark + Sweden from 1873, Norway from 1875)"
      uk: "Lov nr. 66 від 23 травня 1873 om Mønten · 2480 Krone з 1 кг чистого золота за пробою .900 як <b>Hauptkurant</b> · під ним ступенева сходова шкала срібла та бронзи як юридичні підрозділи · спільний стандарт Скандинавської монетної унії (Данія + Швеція з 1873, Норвегія з 1875)"
