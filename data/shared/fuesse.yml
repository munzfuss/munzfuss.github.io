          en: "<b>10¾ Loth = ⁴³⁄₆₄ = .671875</b> (Hede / Schou: .672) — directly from the Hede formula «10½ pieces per 10¾-lødig mark»<sup><a href=\"#ref23\">[23]</a></sup>"
