    rechnungsfraktionen_label:
      de: "Rechnungsfraktionen"
      en: "Accounting fractions"
      uk: "Розрахункові фракції"
    rechnungsfraktionen:
      de: |
        <b>I. 1726–1771 · Einführung des Kurantmøntfod (Versorgung Holsteins aus Kopenhagen)</b><br>
        <b>Forordningen 15./31. Juli 1726</b> schufen den neuen Rigsdaler Courant (RCour) im 11⅓-Th-Fuß als Hauptkurant-Standard für Dänemark, Norwegen und Holstein. <i>Erste tatsächliche Prägung nach diesem Standard: Frederik IV's 4-Skilling 1727 in Kopenhagen, umgeprägt aus eingezogenen 2-Skilling-Beständen (2,751 g rau × 0,312 = 0,860 g fein = 1/24 RCour ✓<sup>[ref:wilcke-1927-kurantmoenten]</sup>). Der kanonische 24-Skilling Rigsort folgte unter Christian VI ab 1731.</i> Holstein hatte zu diesem Zeitpunkt keine eigene Kurantmøntfod-Prägestätte — die Versorgung mit Kurantmünzen kam aus Kopenhagen.<br>
         · <b>1 Rigsdaler Courant</b> = <b>20,63435 g</b> fein (= 233,856 ÷ 11⅓) = 6 Marck Danske = 96 Skilling Danske = 1152 Penninge<br>
         · <b>1 Marck Danske</b> = <b>3,43906 g</b> fein = ⅙ Rigsdaler Courant = 16 Skilling Danske = 192 Penninge · Rechnungseinheit, syn. <em>Mark Dänisch</em> (dt.)<br>
         · <b>1 Skilling Danske</b> = <b>0,21494 g</b> fein = 1/96 RCour = 12 Penninge · auf Stempeln «SKILLING DANSKE» buchstäblich geprägt<br>
         · <b>1 Penning</b> = 1/12 Skilling Danske · Rechnungseinheit<br>
        <i>Crown-Konvention zur Specie:</i> 1 Speciedaler = 1¼ Rigsdaler Courant = 120 Skilling Danske von Anfang an. Marktkurs im Wechselgeschäft ~122½:100 — zugleich Silberparität (122,5 × 20,63435 = 2527,71 g vs. 100 × 25,28173 = 2528,17 g; Δ 0,02 %). Differenz zur Rechnungskonvention hieß <em>Opgæld</em>.<br>
        <i>Bezug zur älteren Krone-Mønt:</i> die parallel weiterprägende Krone (10½- bzw. 13-Krone-Fuß) blieb in Rechnung — <b>1 Krone</b> (Silber) = 4 Marck Danske = 60 Kroneskilling = 64 Skilling Danske = ⅔ Rigsdaler Courant = <b>13,75623 g</b> fein · 1 Kroneskilling = 16/15 Skilling Danske<br><br>
        <b>II. 1771–1788 · Eröffnung der Königlichen Münze zu Altona</b><br>
        1771 öffnete unter Christian VII. die <b>Königliche Münze zu Altona</b> als erste Holstein-lokale Kurantmøntfod-Prägestätte. Die arithmetischen Identitäten bleiben unverändert wie unter Periode I — Holstein prägt jetzt seine Untertheilungen vor Ort, im Verbund mit Kopenhagen und Kongsberg (Norwegen).<br>
         · Holstein-Altona-Prägungen: <b>24 Skilling Danske</b> = ¼ RCour (KM #250, 1772–1788, Silber .562, ein «Rigsort») · <b>4 Skilling Dansk</b> (KM #631, 1783) · <b>2 Skilling Danske</b> (KM #632, 1778–85) · <b>1 Skilling Dansk</b> Kupfer-Token (KM #616, 1771) · <b>½ Skilling Dansk</b> Kupfer-Token (KM #615, 1771) · <b>1 Rigsdaler Courant</b> (1788, letzte Altonaer Prägung)<br>
         · Numismatische Verifikation: 24 Sk Dansk KM #250 — Silber .562 · 9,17 g rau · 5,15354 g fein → 1 Sk = 0,21473 g fein ✓ (Soll: 0,21494 g, Δ 0,1 %)<br><br>
        <b>III. 1788 · Schleswig-Holsteinische Reform (Holstein verläßt 11⅓-Fuß)</b><br>
        Mit der <b>Reform 7. Juli 1788</b> bindet Holstein seine Untertheilungen an die Speciedaler (siehe 9¼-Fuß, Periode IV): 1 Thaler Species = 60 Schilling S.-H.-Courant = 120 Sechslinge. Damit endet die <b>Skilling-Danske-Theilung im Holstein-Anteil</b>; letzte Holstein-Prägung im 11⅓-Fuß ist der Altonaer Rigsdaler Courant 1788. In Dänemark und Norwegen bleibt der Kurantmøntfod weiter im Einsatz.<br><br>
        <b>IV. 1794 · Plakat 3. Dezember 1794 (Dänemark/Norwegen, nicht Holstein)</b><br>
         · Opgæld-Marktkurs abgeschafft; 1 RSp = 1¼ RCour = 5:4 wird einzig gültige Wechselrelation<br>
         · Krone bricht Silberparität zuungunsten des RCour: 125 × 20,63435 = 2579,29 g Silber vs. 100 × 25,28173 = 2528,17 g — RCour gesetzlich ~2 % unter Silberwert (Seigniorage-Gewinn der Krone)<br>
         · Holstein-Anteil seit 1788 nicht mehr betroffen — die Plakat wirkt nur in Dänemark und Norwegen<br><br>
        <b>V. 1813 · Statsbankerot — Ablösung durch Rigsbankdaler</b><br>
         · <b>Forordning 5. Januar 1813</b>: 1 RSp = 2 Rigsbankdaler = 12 Rigsbankmark = 192 Rigsbankskilling · Kurantmøntfod endet Dänemark-weit<br>
         · Untertheilungen wandern in den 18½-Fuß (siehe dort)<br><br>
        <i>Vorläufer:</i> Bereits 1670–1726 prägte Royal Glückstadt 8-Skilling-Danske-Stücke (KM #82.1 1694, KM #1 1702, KM #3 1711) zum proto-Courant-Silbergehalt 0,21494 g je Sk, identisch mit der späteren 11⅓-Fuß-Theilung — siehe 9¼-Fuß, Periode II.<br><br>
        <em>Physisch geprägte Stückelungen unter dem 11⅓-Fuß: 1, ½, ¼, ⅛, 1/12, 1/24, 1/48, 1/96, 1/192 Rigsdaler Courant — als Münzbezeichnungen 1 RCour, 24 Sk, 12 Sk, 8 Sk, 4 Sk, 2 Sk, 1 Sk, ½ Sk Danske</em>
      en: |
        <b>I. 1726–1771 · Introduction of the Kurantmøntfod (Holstein supplied from Copenhagen)</b><br>
        The <b>Forordninger of 15/31 July 1726</b> created the new Rigsdaler Courant (RCour) at the 11⅓-Th-Fuß as the principal courant standard for Denmark, Norway, and Holstein. <i>The first actual mintage under this standard was Frederik IV's 4-Skilling of 1727 in Copenhagen, re-minted from withdrawn 2-Skilling stock (2.751 g rough × 0.312 fineness = 0.860 g fine = 1/24 RCour ✓<sup>[ref:wilcke-1927-kurantmoenten]</sup>). The canonical 24-Skilling Rigsort followed under Christian VI from 1731.</i> Holstein had no Kurantmøntfod mint of its own at this point — the Courant supply for Holstein came from Copenhagen.<br>
         · <b>1 Rigsdaler Courant</b> = <b>20.63435 g</b> fine (= 233.856 ÷ 11⅓) = 6 Marck Danske = 96 Skilling Danske = 1152 Penninge<br>
         · <b>1 Marck Danske</b> = <b>3.43906 g</b> fine = ⅙ Rigsdaler Courant = 16 Skilling Danske = 192 Penninge · accounting unit, syn. <em>Mark Dänisch</em> (Ger.)<br>
         · <b>1 Skilling Danske</b> = <b>0.21494 g</b> fine = 1/96 RCour = 12 Penninge · struck literally on the dies as «SKILLING DANSKE»<br>
         · <b>1 Penning</b> = 1/12 Skilling Danske · accounting unit<br>
        <i>Crown convention to the Species:</i> 1 Speciedaler = 1¼ Rigsdaler Courant = 120 Skilling Danske, in force from the very start. The exchange-market rate of ~122½:100 also reflected the silver parity (122.5 × 20.63435 = 2527.71 g vs. 100 × 25.28173 = 2528.17 g; Δ 0.02 %). The shortfall against the accounting convention was called <em>Opgæld</em>.<br>
        <i>Relation to the older Krone-Mønt:</i> the parallel-running Krone (10½- and 13-Krone-Fuß) remained in account — <b>1 Krone</b> (silver) = 4 Marck Danske = 60 Kroneskilling = 64 Skilling Danske = ⅔ Rigsdaler Courant = <b>13.75623 g</b> fine · 1 Kroneskilling = 16/15 Skilling Danske<br><br>
        <b>II. 1771–1788 · The Royal Mint at Altona opens</b><br>
        In 1771, under Christian VII, the <b>Royal Mint at Altona</b> opened as the first Holstein-local Kurantmøntfod mint. The arithmetic identities of Period I remain unchanged — Holstein now strikes its own subdivisions in-territory, alongside Copenhagen and Kongsberg (Norway).<br>
         · Holstein-Altona issues: <b>24 Skilling Danske</b> = ¼ RCour (KM #250, 1772–1788, silver .562, a «Rigsort») · <b>4 Skilling Dansk</b> (KM #631, 1783) · <b>2 Skilling Danske</b> (KM #632, 1778–85) · <b>1 Skilling Dansk</b> copper token (KM #616, 1771) · <b>½ Skilling Dansk</b> copper token (KM #615, 1771) · <b>1 Rigsdaler Courant</b> (1788, the last Altona strike)<br>
         · Numismatic verification: 24 Sk Dansk KM #250 — silver .562 · 9.17 g rough · 5.15354 g fine → 1 Sk = 0.21473 g fine ✓ (target: 0.21494 g, Δ 0.1 %)<br><br>
        <b>III. 1788 · Schleswig-Holstein reform (Holstein leaves the 11⅓-Fuß)</b><br>
        With the <b>Reform of 7 July 1788</b>, Holstein binds its subdivisions to the Speciedaler (see 9¼-Fuß, Period IV): 1 Thaler Species = 60 Schilling S.-H. Courant = 120 Sechslinge. This ends the <b>Skilling-Danske subdivision in the Holstein share</b>; the last Holstein 11⅓-Fuß strike is the Altona Rigsdaler Courant of 1788. In Denmark and Norway the Kurantmøntfod stays in use.<br><br>
        <b>IV. 1794 · Placard of 3 December 1794 (Denmark/Norway, not Holstein)</b><br>
         · Opgæld market rate abolished; 1 RSp = 1¼ RCour = 5:4 became the sole legal exchange ratio<br>
         · The Crown broke silver parity at the Courant's expense: 125 × 20.63435 = 2579.29 g silver vs. 100 × 25.28173 = 2528.17 g — RCour now sat ~2 % below its silver value (seigniorage gain for the Crown)<br>
         · The Holstein share, having left in 1788, was no longer affected — the Placard worked only in Denmark and Norway<br><br>
        <b>V. 1813 · Statsbankerot — replaced by the Rigsbankdaler</b><br>
         · <b>Forordning of 5 January 1813</b>: 1 RSp = 2 Rigsbankdaler = 12 Rigsbankmark = 192 Rigsbankskilling · Kurantmøntfod ends Denmark-wide<br>
         · Subdivisions migrate into the 18½-Fuß (see there)<br><br>
        <i>Antecedents:</i> as early as 1670–1726, royal Glückstadt was striking 8-Skilling-Danske pieces (KM #82.1 1694, KM #1 1702, KM #3 1711) at the proto-Courant silver content of 0.21494 g per Sk, identical with the later 11⅓-Fuß subdivision — see 9¼-Fuß, Period II.<br><br>
        <em>Physical denominations actually struck under the 11⅓-Fuß: 1, ½, ¼, ⅛, 1/12, 1/24, 1/48, 1/96, 1/192 Rigsdaler Courant — as coin names: 1 RCour, 24 Sk, 12 Sk, 8 Sk, 4 Sk, 2 Sk, 1 Sk, ½ Sk Danske</em>
      uk: |
        <b>I. 1726–1771 · Запровадження Kurantmøntfod (Гольштейн постачається з Копенгагена)</b><br>
        <b>Forordningen 15/31 липня 1726</b> створили новий Rigsdaler Courant (RCour) у 11⅓-Th-Fuß як головний курантний стандарт для Данії, Норвегії та Гольштейну. <i>Перше фактичне карбування за цим стандартом — 4-Skilling Frederik IV 1727 р. у Копенгагені, перекований з вилучених 2-Skilling-запасів (2,751 г повної ваги × 0,312 проби = 0,860 г чистого = 1/24 RCour ✓<sup>[ref:wilcke-1927-kurantmoenten]</sup>). Канонічний 24-Skilling Rigsort з'являється за Christian VI з 1731 р.</i> Гольштейн на цей момент не мав власного монетного двору під Kurantmøntfod — постачання курантних монет ішло з Копенгагена.<br>
         · <b>1 Rigsdaler Courant</b> = <b>20,63435 г</b> чистого (= 233,856 ÷ 11⅓) = 6 Marck Danske = 96 Skilling Danske = 1152 Penninge<br>
         · <b>1 Marck Danske</b> = <b>3,43906 г</b> чистого = ⅙ Rigsdaler Courant = 16 Skilling Danske = 192 Penninge · розрахункова одиниця, син. <em>Mark Dänisch</em> (нім.)<br>
         · <b>1 Skilling Danske</b> = <b>0,21494 г</b> чистого = 1/96 RCour = 12 Penninge · буквально карбувалося на штемпелях як «SKILLING DANSKE»<br>
         · <b>1 Penning</b> = 1/12 Skilling Danske · розрахункова одиниця<br>
        <i>Конвенція Корони до Specie:</i> 1 Speciedaler = 1¼ Rigsdaler Courant = 120 Skilling Danske з самого початку. Ринковий курс на валютній біржі ~122½:100 одночасно відображав срібний паритет (122,5 × 20,63435 = 2527,71 г проти 100 × 25,28173 = 2528,17 г; Δ 0,02 %). Розрив із розрахунковою конвенцією називався <em>Opgæld</em>.<br>
        <i>Зв'язок зі старшою Krone-Mønt:</i> Krone (10½- та 13-Krone-Fuß), що карбувалася паралельно, лишалась у рахунку — <b>1 Krone</b> (срібна) = 4 Marck Danske = 60 Kroneskilling = 64 Skilling Danske = ⅔ Rigsdaler Courant = <b>13,75623 г</b> чистого · 1 Kroneskilling = 16/15 Skilling Danske<br><br>
        <b>II. 1771–1788 · Відкриття Королівської Münze zu Altona</b><br>
        У 1771 р. за Кристіана VII відкрилась <b>Королівська монетна мата в Альтоні</b> як перший локальний для Гольштейну Kurantmøntfod-двір. Арифметичні тотожності Періоду I залишаються без змін — Гольштейн тепер карбує свої поділки на місці, у мережі з Копенгагеном і Конгсбергом (Норвегія).<br>
         · Holstein-Altona-карбування: <b>24 Skilling Danske</b> = ¼ RCour (KM #250, 1772–1788, срібло .562, «Rigsort») · <b>4 Skilling Dansk</b> (KM #631, 1783) · <b>2 Skilling Danske</b> (KM #632, 1778–85) · <b>1 Skilling Dansk</b> мідний токен (KM #616, 1771) · <b>½ Skilling Dansk</b> мідний токен (KM #615, 1771) · <b>1 Rigsdaler Courant</b> (1788, останнє альтонське карбування)<br>
         · Нумізматична перевірка: 24 Sk Dansk KM #250 — срібло .562 · 9,17 г повної ваги · 5,15354 г чистого → 1 Sk = 0,21473 г чистого ✓ (за стандартом: 0,21494 г, Δ 0,1 %)<br><br>
        <b>III. 1788 · Шлезвіг-Гольштейнська реформа (Гольштейн полишає 11⅓-Fuß)</b><br>
        З <b>реформою 7 липня 1788 р.</b> Гольштейн прив'язує свої поділки до Speciedaler (див. 9¼-Fuß, Період IV): 1 Thaler Species = 60 Schilling S.-H.-Courant = 120 Sechsling. Це означає <b>кінець Skilling-Danske-поділу в гольштейнській частці</b>; останнє гольштейнське карбування у 11⅓-Fuß — альтонський Rigsdaler Courant 1788 р. У Данії та Норвегії Kurantmøntfod залишається у вжитку.<br><br>
        <b>IV. 1794 · Plakat 3 грудня 1794 (Данія/Норвегія, не Гольштейн)</b><br>
         · Ринковий Opgæld-курс скасовано; 1 RSp = 1¼ RCour = 5:4 — єдина дійсна валютна формула<br>
         · Корона зламала срібний паритет на шкоду Courant: 125 × 20,63435 = 2579,29 г срібла проти 100 × 25,28173 = 2528,17 г — RCour опинився ~2 % нижче своєї срібної вартості (сеньйораж Корони)<br>
         · Гольштейнська частка, що вийшла ще 1788 р., вже не зачеплена — Plakat діє лише в Данії та Норвегії<br><br>
        <b>V. 1813 · Statsbankerot — заміна на Rigsbankdaler</b><br>
         · <b>Forordning 5 січня 1813</b>: 1 RSp = 2 Rigsbankdaler = 12 Rigsbankmark = 192 Rigsbankskilling · Kurantmøntfod завершується по всій Данії<br>
         · Поділи переходять у 18½-Fuß (див. там)<br><br>
        <i>Попередники:</i> уже 1670–1726 рр. королівський Ґлюкштадт карбував 8-Skilling-Danske (KM #82.1 1694, KM #1 1702, KM #3 1711) при proto-Courant-вмісті срібла 0,21494 г на Sk, ідентично з пізнішим поділом 11⅓-Fuß — див. 9¼-Fuß, Період II.<br><br>
        <em>Реально карбовані частки під 11⅓-Fuß: 1, ½, ¼, ⅛, 1/12, 1/24, 1/48, 1/96, 1/192 Rigsdaler Courant — як назви монет: 1 RCour, 24 Sk, 12 Sk, 8 Sk, 4 Sk, 2 Sk, 1 Sk, ½ Sk Danske</em>
  description:
    de: |
      Dänisch-Norwegischer Kurantmøntfod, eingeführt 15./31. Juli 1726.
      233,856 g ÷ 11⅓ = 20,63435 g Feinsilber je Rigsdaler Courant
      (= 6 Marck Danske = 96 Skilling Danske). Der Hauptkurant-Standard
      Dänemarks und Holsteins biß zur Schleswig-Holsteinischen Reform 1788
      bzw. biß zum Staatsbankrott 1813 (Dänemark).
    en: |-
      Danish-Norwegian Kurantmøntfod, introduced 15/31 July 1726. 233.856 g ÷ 11⅓ = 20.63435 g fine silver per Rigsdaler Courant (= 6 Marck Danske = 96 Skilling Danske). Denmark's and Holstein's main courant standard until the Schleswig-Holstein reform of 1788 / Danish state bankruptcy of 1813.
    uk: |-
      Данський куранттмьонтфод, впроваджений 15/31 липня 1726 р. 233,856 г ÷ 11⅓ = 20,63435 г чистого срібла на рігсдалер курант. Основний курантний стандарт Данії та Гольштейну до реформи 1788 р. чи банкрутства держави 1813 р.
  fractions:
    "1": {soll_fein_g: 20.63435}        # 1 Rigsdaler Courant = 1 Lübisch Thaler Courant (48 Sch. Lüb.)
    "2/3": {soll_fein_g: 13.75623}      # Lübisch 2 Marck = 32 Schilling Lübisch (Doppelmark)
    "1/2": {soll_fein_g: 10.31718}
    "1/3": {soll_fein_g: 6.87811}       # Lübisch 1 Marck Courant = 16 Schilling Lübisch
    "1/4": {soll_fein_g: 5.15859}       # 24 Skilling Danske = Rigsort
    "1/6": {soll_fein_g: 3.43906}       # Lübisch ½ Marck = 8 Schilling Lübisch
    "1/8": {soll_fein_g: 2.57929}       # 12 Skilling
    "1/12": {soll_fein_g: 1.71953}      # 8 Skilling Danske / 4 Schilling Lübisch (¼ Marck)
    "1/24": {soll_fein_g: 0.85976}      # 4 Skilling Danske / 2 Schilling Lübisch (⅛ Marck)
    "1/48": {soll_fein_g: 0.42990}      # 2 Skilling Danske / 1 Schilling Lübisch (1/16 Marck)
    "1/96": {soll_fein_g: 0.21495}      # 1 Skilling Danske / Sechsling Lübisch (½ Sch. Lüb.)
    "1/192": {soll_fein_g: 0.10748}     # ½ Skilling Danske / Dreiling Lübisch (¼ Sch. Lüb.)

  events:
    first_adoption:
      anywhere: 1726
      holstein: 1726
      note: Forordning Kurantmøntfod 1726.
    first_mint:
      anywhere: 1727
      holstein: 1771
      note: 'Forordning Kurantmøntfod 15./31. Juli 1726 set the standard, but the first actual mintage was Frederik IV''s 4-Skilling 1727 in Copenhagen — re-minted from withdrawn 2-Skilling stock at 2.751 g rough × .312 fineness = 0.860 g fein = 1/24 RCour ✓ (Wilcke 1927, danskmoent.dk/artikler/kgl234). The canonical 24-Skilling Rigsort followed under Christian VI from 1731. Holstein had no local Kurantmøntfod mint until the Altona Royal Mint opened in 1771 (Christian VII); pre-1771 supply came from Copenhagen.'
    last_mint:
      anywhere: 1813
      holstein: 1788
      note: H last-mint 1788 = last Altona Rigsdaler Courant.
    std_end:
      anywhere: 1813
      holstein: 1788
      note: anywhere std_end 1813 = Statsbankerot (replaced by Rigsbankdaler).
    demonetisation:
      anywhere: 1875
      holstein: 1866
      note: 'Statsbankerot Forordning 5. Jan 1813 ended the standard and started withdrawal of old Kurantmøntfod coins for replacement with new rigsbankdaler at 18½-Th-Fuß. But Kurantmøntfod silver retained intrinsic bullion value and continued circulating well after the recall — only by 1838 did the post-bankruptcy banknote rate equal the printed silver value, and exchange of old kurantdaler ran throughout the following decades. anywhere demon 1875 = Scandinavian Monetary Union Krone reform (Coinage Act 23 May 1873; new krone effective 1 Jan 1875) — final forced exchange of all pre-reform Danish/Norwegian silver. H demon 1866 = Prussian annexation of Schleswig-Holstein switched the duchies to Vereinsthaler / later Goldmark, ending Danish-side currency status for any remaining 11⅓-Th-Fuß coins in Holstein. Last_mint 1813 = pre-Forordning January strikes (Forordning was 5. Jan 1813); Holstein last_mint 1788 = end of local Altona minting, not loss of status.'
    anywhere_label:
      de: Königreich Dänemark und Norwegen
      en: Royal Danish-Norwegian Realm
      uk: Королівство Данії і Норвегії
