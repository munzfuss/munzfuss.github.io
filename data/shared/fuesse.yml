      de: "Grundwerte · Dukatenfuß"
      en: "Base values · Ducat standard"
      uk: "Базові значення · дукатний стандарт"
    subheading:
      de: "Cöllnische Marck = 233,856 g Feingold · seit Reichsmünzordnung 1559 · 67 Dukaten aus der feinen Cöllnischen Marck"
