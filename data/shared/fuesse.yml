  description:
    de: |
      <b>Hungarian-Venetian Dukat-Tradition in der dänisch-norwegischen Königsmünze, 1513-1876</b> · 67 Dukaten aus der rauen Cöllnischen Marck Gold (233,856 g Goldlegierung) bei Feingehalt 23 Karat 8 Grän = 986 1/9 ‰, per Stück <b>3,49 g rauh / 3,44 g fein</b>. <b>Phase pre-I (1513-1558)</b>: de facto Karbung unter Markt-Konvention der ungar.-venez. Dukat-Tradition (venezianisches Goldducato 1284-, ungarischer Goldgulden Karl Roberts 1325-); frühestes belegtes dänisches .986-Stück ist Christian II. Ungersk Gylden 1513, danach Frederik I. Karbung ab 1531, Christian III. mit Hede c3h1 + c3h2 (Ungersk Gylden 1557 Kopenhagen). <b>Phase I (1559-1876)</b>: de jure Codification durch <b>Augspurgische Reichsmünzordnung 19. Aug. 1559</b> als Reichsgoldmünze. Identischer physikalischer Standard (.986/3,44 g fein) ohne metrischen Bruch beim Übergang 1558→1559. Specimen-attested fineness variiert ±1 % im Remedium (Wikipedia Dukat: «<i>minimum fineness 23 Karat 6½ Grän, .981</i>»); Sophie von Mecklenburg-Güstrows Haderslev-Karbung 1591-1593 unter Christian-IV.-Regentschaft zeigt empirisch .972 — Rigsråd kritisierte als zu niedrig, aber spätere deutsche metallurgische Analyse bewies «<i>1 % deviation from Ferdinand I''s 1559 Reichsmünzordnung</i>» (Wikipedia, Sophie of Mecklenburg-Güstrow). Specimens .972 sind also <em>nicht</em> ein separater Standard, sondern specimen-drift innerhalb des Soll-Remedium. Grundstandard für Goldmünzen im Heiligen Römischen Reich biß 1871; in Dänemark-Norwegen-Holstein über die gesamte Periode präsent. Als Handelsgold zirkulierten neben den Reichsdukaten niederländische Handelsdukaten — die maßgebliche Welthandelsmünze des Ostseehandels im 17. und 18. Jh.<sup>[ref:mgm-handelsdukat]</sup> — sowie ungarische, venezianische und türkische Dukaten desselben Fußes; angenommen wurden sie nach Edelmetallgehalt.<sup>[ref:museum-rantzau-taler-dukaten]</sup>
    en: |-
      <b>The Hungarian-Venetian Dukat tradition in the Danish-Norwegian royal mint, 1513-1876</b> · 67 ducats struck from the rough Cologne mark of gold (233.856 g gold alloy) at a fineness of 23 carats 8 grains = 986 1/9 ‰, per piece <b>3.49 g rough / 3.44 g fine</b>. <b>Phase pre-I (1513-1558)</b>: de facto coinage under the market convention of the Hungarian-Venetian Dukat tradition (Venetian gold ducato 1284-, Hungarian gold gulden of Charles Robert 1325-); the earliest documented Danish .986 specimen is Christian II''s Ungersk Gylden of 1513, followed by Frederik I''s coinage from 1531, Christian III with Hede c3h1 + c3h2 (Ungersk Gylden 1557 Copenhagen). <b>Phase I (1559-1876)</b>: de jure codification through the <b>Imperial Coinage Ordinance of Augsburg, 19 August 1559</b> as imperial gold coin. Identical physical standard (.986/3.44 g fine) with no metric break at the 1558→1559 transition. Specimen-attested fineness varies by ±1 % within the period remedium (Wikipedia Ducat: «<i>minimum fineness 23 karat 6½ grain, .981</i>»); Sophie of Mecklenburg-Güstrow''s 1591-1593 Haderslev coinage under the Christian IV regency shows empirical .972 — the Rigsråd criticised it as too low, but later German metallurgical analysis proved «<i>1 % deviation from Ferdinand I''s 1559 Reichsmünzordnung</i>» (Wikipedia, Sophie of Mecklenburg-Güstrow). Specimens at .972 are therefore <em>not</em> a separate standard but specimen-drift within the Soll remedium. Fundamental gold standard in the Holy Roman Empire until 1871; present throughout Denmark-Norway-Holstein across the entire period. As trade gold, alongside imperial Reichsdukaten Holstein also saw Dutch Handelsdukaten — the dominant Baltic-trade gold coin of the 17th and 18th centuries<sup>[ref:mgm-handelsdukat]</sup> — together with Hungarian, Venetian and Turkish ducats of the same standard; all accepted by precious-metal content.<sup>[ref:museum-rantzau-taler-dukaten]</sup>
    uk: |-
      <b>Hungarian-Venetian Dukat-традиція в дансько-норвезькій королівській монеті, 1513-1876</b> · 67 дукатів з повної Кельнської марки золота (233,856 г золотого сплаву) при пробі 23 карати 8 гран = 986 1/9 ‰, на штуку <b>3,49 г повної / 3,44 г чистого</b>. <b>Фаза pre-I (1513-1558)</b>: де-факто карбування під ринковою конвенцією угорсько-венеційської Dukat-традиції (венеційський золотий ducato 1284-, угорський золотий gulden Карла Роберта 1325-); найраніший задокументований данський .986-екземпляр — Ungersk Gylden Christian II 1513, далі карбування Frederik I з 1531, Christian III з Hede c3h1 + c3h2 (Ungersk Gylden 1557 Копенгаген). <b>Фаза I (1559-1876)</b>: де-юре кодифікація <b>Авґсбурзьким імперським монетним ордонансом 19 серпня 1559 р.</b> як імперська золота монета. Ідентичний фізичний стандарт (.986/3,44 г чистого) без метричного розриву на переході 1558→1559. Засвідчена пробою specimen-mean коливається ±1 % у period-remedium (Wikipedia Ducat: «<i>minimum fineness 23 карати 6½ грейн, .981</i>»); карбування Sophie of Mecklenburg-Güstrow 1591-1593 у Haderslev під час регентства Christian IV показує емпірично .972 — Rigsråd критикував як занадто низьку, але пізніший німецький металургічний аналіз довів «<i>1 % deviation from Ferdinand I''s 1559 Reichsmünzordnung</i>» (Wikipedia, Sophie of Mecklenburg-Güstrow). Зразки з пробою .972 — це <em>не</em> окремий стандарт, а specimen-drift у межах Soll remedium. Фундаментальний золотий стандарт Священної Римської імперії до 1871 р.; присутній у Данії-Норвегії-Гольштейні впродовж усього періоду. Як торгове золото поряд з імперськими Reichsdukaten перебували в обігу нідерландські Handelsdukaten — головна торговельна монета балтійського обігу XVII-XVIII ст.<sup>[ref:mgm-handelsdukat]</sup> — а також угорські, венеційські й турецькі дукати того ж стандарту; усі приймались за вмістом дорогоцінного металу.<sup>[ref:museum-rantzau-taler-dukaten]</sup>
