      uk: "Кельнська марка повна = 233,856 г золотого сплаву · проба ≈ 130/144 = 21¾ карата ≈ 903 ‰ · 35 пістолей з повної Кельнської марки (Friedrich d'or 1741, Christian d'or 1771)"
    badge:
