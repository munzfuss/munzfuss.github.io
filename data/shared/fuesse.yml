  description:
    de: 'Münzgesetz vom 4. Dezember 1871<sup>[ref:wikipedia-de-goldmark]</sup>: gemeinsamer Goldstandard des Deutschen Kaiserreichs. Aus 1 Pfund (500 g) Feingold werden 139½ Zehnmarkstücke = 1395 Mark ausgeprägt, Feingehalt 900 ‰; Goldnominale zu 5, 10 und 20 Mark. Geprägt an acht Reichsmünzstätten — Berlin (A), Hannover (B), Frankfurt am Main (C), München (D), Dresden (E), Stuttgart (F), Karlsruhe (G), Hamburg (J) — Altona war 1863 geschlossen worden<sup>[ref:wikipedia-de-k-nigliche-m-nze-zu-altona]</sup>, sodaß keine Holstein-eigene Prägestätte am Reichsgoldmünzfuß teilnahm. Die Goldsuspendierung der Reichsbank am 4. August 1914 zu Kriegsbeginn beendet die praktische Geltung; formal abgelöst 1924 durch Reichsmark / Rentenmark.
'
    en: 'Coinage Act of 4 December 1871<sup>[ref:wikipedia-de-goldmark]</sup>: the common gold standard of the German Empire. From 1 Pfund (500 g) of fine gold, 139½ ten-Mark pieces = 1,395 Mark are struck at 900‰ fineness; gold denominations of 5, 10 and 20 Mark. Struck at eight imperial mints — Berlin (A), Hannover (B), Frankfurt am Main (C), Munich (D), Dresden (E), Stuttgart (F), Karlsruhe (G), Hamburg (J) — the Altona mint had closed in 1863<sup>[ref:wikipedia-de-k-nigliche-m-nze-zu-altona]</sup>, so no Holstein-specific mint took part in the Reichsgoldmünzfuß. The Reichsbank''s suspension of gold redemption on 4 August 1914, at the outbreak of war, ends practical operation; formally replaced in 1924 by the Reichsmark / Rentenmark.'
    uk: 'Закон про монету від 4 грудня 1871 р.<sup>[ref:wikipedia-de-goldmark]</sup>: спільний золотий стандарт Німецької імперії. З 1 фунта (500 г) чистого золота карбують 139½ 10-Mark-Stück = 1395 Mark, проба 900 ‰; золоті номінали у 5, 10 і 20 Mark. Карбування здійснювалось у восьми імперських монетних дворах — Берлін (A), Ганновер (B), Франкфурт-на-Майні (C), Мюнхен (D), Дрезден (E), Штутгарт (F), Карлсруе (G), Гамбург (J). Двір в Альтоні зачинено ще 1863 р.<sup>[ref:wikipedia-de-k-nigliche-m-nze-zu-altona]</sup>, тож жоден гольштинський монетний двір у Reichsgoldmünzfuß не брав участі. Призупинення Reichsbank-ом золотого розміну 4 серпня 1914 р. на початку війни припиняє фактичну дію; формально стандарт замінено 1924 р. на Reichsmark / Rentenmark.'
  fractions:
