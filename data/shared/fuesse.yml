  grid_stops: 9.25
  fineness_standard: 0.875    # 14 Loth
  fineness_display: "875 ‰ (14 Loth)"
  grundwerte:
    heading:
      de: "Grundwerte · Silberstandard"
      en: "Base values · Silver standard"
      uk: "Базові значення · срібний стандарт"
    subheading:
      de: "Cöllnische Marck = 233,856 g Feinsilber · 9¼ Thaler Species aus der feinen Marck"
      en: "Cologne Mark = 233.856 g fine silver · 9¼ Thaler Species from one fine Cologne Mark"
