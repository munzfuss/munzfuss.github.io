  grid_stops: 35            # 35 Pistolen aus der rauen Cöllnischen Marck
  fineness_standard: 0.9028 # 130/144 = 21¾ Karat
  fineness_display: "≈ 903 ‰ (130/144 = 21¾ Karat)"
  grundwerte:
    heading:
      de: "Grundwerte · Pistolenstandard"
      en: "Base values · Pistole standard"
      uk: "Базові значення · пістольний стандарт"
    subheading:
      de: "Cöllnische Marck rauh = 233,856 g Goldlegierung · Probe ≈ 130/144 = 21¾ Karat ≈ 903 ‰ · 35 Pistolen aus der rauen Cöllnischen Marck (Friedrich d'or 1741, Christian d'or 1771)"
