    rechnungsfraktionen:
      de: |
        <b>1 Vereinsthaler</b> = <b>16,66667 g</b> Feinsilber = 30 Silbergroschen = 360 Pfennig<br>
        <b>1 Silbergroschen</b> = <b>0,55556 g</b> fein (<i>Rechnungseinheit</i>) = 1/30 Vereinsthaler = 12 Pfennig<br>
        <b>2 Vereinsthaler</b> = 3½ südd. Gulden = 3 österr. Gulden (Brückenmünze des Wiener Vertrags)<br>
        <b>Ab 1871:</b> 1 Vereinsthaler = 3 Mark (biß 1907 gesetzliches Zahlmittel)<br>
        <em><b>Hinweis:</b> Vereinsthaler und ½-/⅙-Stücke wurden par-Silber geprägt. Die kleineren Silbergroschen-/Pfennig-Stücke sind <b>Scheidemünzen</b> mit reduziertem Feingehalt — der Rechnungswert von 0,556 g pro Silbergroschen gilt nicht für die tatsächlichen Münzen.</em>
      en: |-
        <b>1 Vereinsthaler</b> = <b>16.66667 g</b> fine silver = 30 Silbergroschen = 360 Pfennig<br> <b>1 Silbergroschen</b> = <b>0.55556 g</b> fine (<i>accounting unit</i>) = 1/30 Vereinsthaler = 12 Pfennig<br> <b>2 Vereinsthaler</b> = 3½ South-German Gulden = 3 Austrian Gulden (the bridge coin of the Vienna treaty)<br> <b>From 1871:</b> 1 Vereinsthaler = 3 Mark (legal tender until 1907)<br> <em><b>Note:</b> Vereinsthaler and ½-/⅙-pieces were struck at par silver. Smaller Silbergroschen and Pfennig pieces are <b>petty coins</b> with reduced fineness — the 0.556 g reckoning value per Silbergroschen does not apply to the actual coins.</em>
      uk: |-
        <b>1 Vereinsthaler</b> = <b>16,66667 г</b> чистого срібла = 30 Silbergroschen = 360 Pfennig<br> <b>1 Silbergroschen</b> = <b>0,55556 г</b> чистого (<i>розрахункова одиниця</i>) = 1/30 Vereinsthaler = 12 Pfennig<br> <b>2 Vereinsthaler</b> = 3½ південнонімецьких Gulden = 3 австрійські Gulden (монета-міст Віденської конвенції)<br> <b>З 1871:</b> 1 Vereinsthaler = 3 Mark (законний платіжний засіб до 1907)<br> <em><b>Зауваження:</b> Vereinsthaler і його ½-/⅙-частки карбувалися за par-silver. Дрібніші Silbergroschen і Pfennig — <b>розмінні монети</b> зі зниженою пробою — розрахунковий орієнтир 0,556 г на Silbergroschen не стосується фактичних монет.</em>
  description:
    de: |
      Wiener Münzvertrag 24. Januar 1857. Ersetzt die Cöllnische Marck durch
      das Zollpfund (500 g Feinsilber). 500 ÷ 30 = 16,66667 g Feinsilber je
      Vereinsthaler · 18,51852 g rau bei 900 ‰. Auf Prägungen «XXX EIN PFUND FEIN».
      In Holstein ab 24. Aug. 1866 (preuß. Annexion).
    en: |-
      Vienna Monetary Treaty, 24 January 1857. Replaced the Cologne mark with the Zollpfund (500 g fine silver). 500 ÷ 30 = 16.66667 g fine silver per Vereinsthaler · 18.51852 g rough at 900‰. Coin legend: "XXX EIN PFUND FEIN". In Holstein from 24 Aug. 1866 (Prussian annexation).
    uk: |-
      Віденська монетна конвенція 24 січня 1857 р. Замінив кельнську марку цольфунтом (500 г чистого срібла). 500 ÷ 30 = 16,66667 г чистого срібла на один союзний талер. У Гольштейні з 24 серпня 1866 р. після прусської анексії.
  fractions:
    "1": {soll_fein_g: 16.66667}        # 1 Vereinsthaler
    "2": {soll_fein_g: 33.33333}        # 2 Vereinsthaler
    "1/6": {soll_fein_g: 2.77778}       # Groschen (Preußen)

