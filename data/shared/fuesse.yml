      en: |-
        <b>1 Pistole</b> = <b>6.0322 g</b> fine gold (initial 1741 standard) · 6.03 g (after the 1770 reduction)<sup>[ref:wikipedia-de-friedrich-dor]</sup><br><b>1 Pistole</b> = 5 Reichsthaler / 5 Speciedaler — fixed tariff, market rate with variable agio<sup>[ref:wikipedia-en-pistole]</sup><br><b>Sub-denominations:</b> ½ Pistole (from 1749, 2½ Thaler) · 1 Pistole · 2 Pistole (from 1747, 10 Thaler) — the Wilhelm d'or of 1737 is <em>ab origine</em> a Doppelpistole<sup>[ref:wikipedia-de-friedrich-dor]</sup><br><em>The Mittel-Friedrich d'or of the Seven Years' War (1756–1763) was an emergency coinage at only 4.2 g fine instead of 6.03 g — a Kipper coin, formally a Pistole, in fact debased.<sup>[ref:wikipedia-de-friedrich-dor]</sup></em>
      uk: |-
        <b>1 Pistole</b> = <b>6,0322 г</b> чистого золота (початковий стандарт 1741) · 6,03 г (після редукції 1770)<sup>[ref:wikipedia-de-friedrich-dor]</sup><br><b>1 Pistole</b> = 5 Reichsthaler / 5 Speciedaler — фіксований тариф, ринковий курс із плаваючим агіо<sup>[ref:wikipedia-en-pistole]</sup><br><b>Субномінали:</b> ½ Pistole (з 1749, 2½ Thaler) · 1 Pistole · 2 Pistole (з 1747, 10 Thaler) — Wilhelm d'or 1737 — це <em>ab origine</em> Doppelpistole<sup>[ref:wikipedia-de-friedrich-dor]</sup><br><em>Mittel-Friedrich d'or Семирічної війни (1756–1763) — воєнна нотмонета з лише 4,2 г чистого замість 6,03 г — Kipper-монета, формально Pistole, фактично знецінена.<sup>[ref:wikipedia-de-friedrich-dor]</sup></em>
  description:
    de: |
      Pistolen-Goldmünzen-Familie nach dem Vorbild der spanischen Doblón
      (1537) und der französischen Louis d'or (1640). In Norddeutschland
      eingeführt durch den preußischen Wilhelm d'or 1737 (Friedrich
      Wilhelm I., Doppelpistole zu 10 Thalern) und in seiner Standardform
      durch den Friedrich d'or 1741 (Friedrich II., 5 Reichsthaler).
      Standard ≈ 6 g Feingold bei 130/144 Probe, 5-Thaler-Tarif, kein
      Reichs-Müntzfuß im juristischen Sinne — Handels- und Umlaufmünze
      mit variablem Agio. In Dänemark als Christian d'or 1771 (Christian
      VII., Altona) übernommen, fortgeführt biß Christian IX. 1870.
      Ende: 1855 letzter preußischer Friedrich d'or; durch Vereinsmünz-
      vertrag 1857 administrativ abgelöst, durch Münzgesetz 4. Dezember
      1871 (Reichsgoldmark) demonetisiert; in Dänemark Krone-Reform 1873
      / Skandinavische Münzunion.
    en: |-
      Pistole gold-coin family modelled on the Spanish doblón (1537) and the French Louis d'or (1640). Introduced in northern Germany by the Prussian Wilhelm d'or of 1737 (Friedrich Wilhelm I, a double pistole at 10 thalers) and in its standard form by the Friedrich d'or of 1741 (Friedrich II, 5 Reichsthaler). Standard ≈ 6 g fine gold at 130/144 fineness, 5-thaler tariff, never an imperial Münzfuß in the juridical sense — a trade and circulating coin with variable agio. Adopted in Denmark as the Christian d'or in 1771 (Christian VII, Altona) and continued through Christian IX in 1870. End: 1855 last Prussian Friedrich d'or; superseded administratively by the Vereinsmünzvertrag of 1857, demonetised by the Coinage Act of 4 December 1871 (Reichsgoldmark); in Denmark by the Krone reform of 1873 / Scandinavian Monetary Union.
    uk: |-
      Pistolen-родина золотих монет за зразком іспанської Doblón (1537) і французького Louis d'or (1640). У Північній Німеччині запроваджено прусським Wilhelm d'or 1737 р. (Friedrich Wilhelm I, подвоєна пістоль у 10 талерах), у стандартній формі — Friedrich d'or 1741 р. (Friedrich II, 5 Reichsthaler). Стандарт ≈ 6 г чистого золота за пробою 130/144, тариф 5 талерів, у юридичному сенсі ніколи не імперський Müntzfuß — торгова й обігова монета з плаваючим агіо. У Данії запроваджено як Christian d'or у 1771 р. (Christian VII, Альтона), продовжено до Christian IX у 1870 р. Кінець: 1855 — останній прусський Friedrich d'or; адміністративно витіснено Vereinsmünzvertrag 1857, демонетизовано Законом про монету 4 грудня 1871 (Reichsgoldmark); у Данії — Krone-реформою 1873 / Скандинавською монетною унією.
