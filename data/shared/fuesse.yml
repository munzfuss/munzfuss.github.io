      en: |-
        <b>1 Kurantdukat</b> = <b>12 Mark Dansk Kurant</b> = <b>2 Rigsdaler Courant</b> = 192 Skilling Danske (until 1813)<sup><a href="#ref39">[39]</a></sup><br><b>1 Kurantdukat</b> = <b>2.72832 g</b> fine gold (Phase II, from 1757) or 2.511 g (Phase I, 1714–1717)<sup><a href="#ref36">[36]</a></sup><br><b>Sub-denominations:</b> ½ Kurantdukat (Frederik IV 1715: 598 pieces; Frederik V: individual specimens) · 1 Kurantdukat (main denomination) · 2 Kurantdukat (Doppel-) <em>documented only as a Probemønt pattern, never released into circulation</em><sup><a href="#ref36">[36]</a></sup><br><em>«<i>although called 'ducats courant' by the government, [the 12-Mark coin was] too light and too low in fineness to qualify as full ducats</i>» (CoinVarieties)<sup><a href="#ref39">[39]</a></sup> — a Kurant coin at a fixed tariff, not a Reichsdukat by silver equivalent.</em>
      uk: |-
        <b>1 Kurantdukat</b> = <b>12 Mark Dansk Kurant</b> = <b>2 Rigsdaler Courant</b> = 192 Skilling Danske (до 1813)<sup><a href="#ref39">[39]</a></sup><br><b>1 Kurantdukat</b> = <b>2,72832 г</b> чистого золота (фаза II, з 1757) або 2,511 г (фаза I, 1714–1717)<sup><a href="#ref36">[36]</a></sup><br><b>Субномінали:</b> ½ Kurantdukat (Frederik IV 1715: 598 шт.; Frederik V: поодинокі зразки) · 1 Kurantdukat (головний номінал) · 2 Kurantdukat (Doppel-) <em>задокументовано лише як Probemønt-зразок, в обіг не випускалось</em><sup><a href="#ref36">[36]</a></sup><br><em>«<i>although called 'ducats courant' by the government, [the 12-Mark coin was] too light and too low in fineness to qualify as full ducats</i>» (CoinVarieties)<sup><a href="#ref39">[39]</a></sup> — Kurant-монета за фіксованим тарифом, не Reichsdukat за срібним еквівалентом.</em>
  description:
    de: |
      Spezifisch dänische tarif-tragende Goldlinie. Eingeführt 1714
      durch Frederik IV. zur Finanzierung des Großen Nordischen
      Krieges (81½ Stück / rauer Cölln. Marck, 21 Karat ≈ .875,
      2,511 g Feingold; Tarif 12 Mark Kurant = 2 Rigsdaler Courant).
      1727 auf 11 Mark gesenkt, 1757 zur Einschmelzung eingezogen.
      Im Juni 1757 Reform Frederiks V.: 75 Stück / Marck, 2,72832 g
      Feingold, Originaltarif 12 Mark wieder hergestellt — größte
      Goldprägung Dänemarks (≈ 3,03 Mio. Stück 1757–1765).
      Christian-VII-Geburtstagsstrich 27. Januar 1771 (131 Stück);
      Eröffnung Altonaer Münze 23. August 1771 versorgt
      Schleswig-Holstein. Plakat 2. Dezember 1782: freie
      Privatprägung für jedermann, 75 Stück / Marck, 21 Karat —
      löst Hauptphase 1781–1796 aus (≈ 237 000 Stück Altona +
      Kopenhagen). 1795 Plakat-Widerruf, 1796 letzte Prägung
      (30 703 Stück mit 1785-Datum). Der Statsbankerot 1813
      reformiert nur die Silber-Courant-Linie; Kurantdukat formal
      nicht demonetisiert. Faktischer Endpunkt: 1873 Skandinavische
      Münzunion.
    en: |-
      A specifically Danish tariff-bearing gold line. Introduced in 1714 by Frederik IV to finance the Great Northern War (81½ pieces per rough Cologne Mark, 21 carats ≈ .875, 2.511 g fine gold; tariff 12 Mark Kurant = 2 Rigsdaler Courant). The tariff was reduced to 11 Mark in 1727 and the older issue was called in for melting in 1757. In June 1757 Frederik V's reform set 75 pieces per Mark, 2.72832 g fine gold, restoring the original 12 Mark tariff — the largest gold coinage in Danish history (≈ 3.03 million pieces 1757–1765). A Christian-VII-birthday strike on 27 January 1771 (131 pieces); the Altona mint opens on 23 August 1771 to supply Schleswig-Holstein. Plakat of 2 December 1782: free private coinage for anyone at 75 pieces per Mark, 21 carats — triggering the main phase of 1781–1796 (≈ 237,000 pieces in Altona + Copenhagen). The plakat is revoked in 1795, with a final issue in 1796 (30,703 pieces with 1785 dies). The Statsbankerot of 1813 reforms only the silver Courant line; the Kurantdukat is not formally demonetised. The factual endpoint is the Scandinavian Monetary Union of 1873.
    uk: |-
      Специфічно данська тариф-несуча золота лінія. Запроваджено 1714 р. Frederik IV для фінансування Великої Північної війни (81½ штук з повної Кельнської марки, 21 карат ≈ .875, 2,511 г чистого золота; тариф 12 Mark Kurant = 2 Rigsdaler Courant). 1727 р. знижено до 11 Mark, 1757 р. скликано на переплав. У червні 1757 р. реформа Frederik V встановила 75 штук з марки, 2,72832 г чистого золота, оригінальний тариф 12 Mark відновлено — найбільше карбування золота в історії Данії (≈ 3,03 млн шт. 1757–1765). Меморіальний strike Christian VII 27 січня 1771 (131 шт.); відкриття Альтонського монетного двору 23 серпня 1771 забезпечує Schleswig-Holstein. Plakat 2 грудня 1782: вільна приватна прягеа для всіх — 75 штук з марки, 21 карат — запускає головну фазу 1781–1796 (≈ 237 000 шт. Альтона + Копенгаген). 1795 plakat скасовано, 1796 остання прягеа (30 703 шт. з датою 1785). Statsbankerot 1813 реформує лише срібну Courant-лінію; Kurantdukat формально не демонетизовано. Фактичний кінець: 1873 Скандинавська монетна унія.
