  events:
    first_adoption:
      anywhere: 1496
      note: "Hans introduces a new heavy gold standard in DK in 1496 (Galster 24 Nobel) alongside the lighter gold-gulden tradition — the Rhinsk Gylden (Hans ~1497); the Ungersk Gylden / Dukat tier follows from ~1513 (Christian II). Metric specification — see grundwerte block."
    first_mint:
      anywhere: 1496
      note: "Hans 1496 Malmø/Copenhagen (Galster 24) — first dated Nobel coinage. Primary mint Malmø."
    last_mint:
      anywhere: 1532
      note: "Frederik I 1532 Copenhagen/Malmø (Galster 45) — last dated Nobel coinage. Plus undated Ribe coinage of Frederik I (Galster 68 + 69). With Frederik I's death 1533 the Nobel line is discontinued; Christian III (1534-1559) does not strike Nobler; his gold coinage stays with the lighter gulden — Rhinsk Gylden (1536, Galster 131) and Ungersk Gylden (1557, Hede c3h1/c3h2)."
    std_end:
      anywhere: 1533
      approx_anywhere: true
      note: "Standard ends with Frederik I's death 1533. Christian III's reign (1534-1559) records no Nobel coinage (per ref37). A heavy gold line is not revived in DK until Christian IV's Rosenobel programme 1611, struck on a different gold standard."
    demonetisation:
      anywhere: 1600
      approx_anywhere: true
      note: "Approximate practical-circulation tail — Nobler are RRR-classified in Galster throughout (надзвичайно рідкісна, per ref37). The Müntzfuß has no successor coinage in DK until Christian IV's Rosenobel programme 1611 reopens a heavy gold line under a separate tariff logic."
    anywhere_label:
      de: Königreich Dänemark und Norwegen
      en: Royal Danish-Norwegian Realm
