# Global Münzfuß (coinage standard) definitions.
#
# These are universal mathematical constructs, not location-specific.
# A Müntzfuß is defined by: grid_unit_g / grid_stops = soll_fein_g per 1-unit coin.
#
# Each fraction specifies the Feingewicht (and for gold, Raugewicht) expected
# for that denominational fraction, computed from the standard.
#
# Locations reference these by `id`. Multiple locations can share the same fuss;
# each applies it during its own chronological phases.

reichsdukatenfuss:
  name:
    de: Reichsdukatenfuß
    en: Reichsdukatenfuß
    uk: Reichsdukatenfuß
  metal: gold
  grid_unit_g: 233.856    # Cöllnische Marck, Feingold
  grid_stops: 67          # 67 Dukaten aus der feinen Marck
  fineness_standard: 0.98611111    # 23 Karat 8 Grän = 284/288
  fineness_display: "986 1/9 ‰ (23 Karat 8 Grän = 284/288)"
  grundwerte:
