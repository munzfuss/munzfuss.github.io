    rechnungsfraktionen:
      de: |
        <b>1 Reichsthaler</b> = <b>25,984 g</b> Feinsilber = 3 Mark lübisch = 48 Schilling lübisch = 576 Pfennig<br>
        <b>1 Mark lübisch</b> = <b>8,661 g</b> fein (<i>Rechnungseinheit</i>) = ⅓ Thaler = 16 Schilling lübisch = 192 Pfennig<br>
        <b>1 Schilling lübisch</b> = 1/48 Thaler = 12 Pfennig<br>
        <b>1 Sechsling</b> = ½ Schilling lübisch = 6 Pfennig<br>
        <b>1 Dreiling</b> = ¼ Schilling lübisch = 3 Pfennig<br>
        <em>Frühe Holstein-Gottorp-Schillingstücke (KM# 6, 1595–1597) tragen «1 SCHILLING» = 1/32 Thaler nach gleicher Münz-Rechnung wie in Norddeutschland.</em><br>
        <em><b>Hinweis:</b> Die Feinsilberangaben für Thaler und Mark gelten für tatsächlich par-Silber geprägte Vollwert-Münzen. Die Schilling-, Sechsling- und Dreiling-Stücke wurden meist als <b>Scheidemünzen</b> mit reduziertem Feingehalt geprägt — der theoretische Silberwert (1 Schilling lübisch ≈ 0,541 g fein) ist Rechnungsbezug, nicht tatsächlicher Münz-Silbergehalt.</em>
      en: |-
        <b>1 Reichsthaler</b> = <b>25.984 g</b> fine silver = 3 Mark lübisch = 48 Schilling lübisch = 576 Pfennig<br> <b>1 Mark lübisch</b> = <b>8.661 g</b> fine (<i>accounting unit</i>) = ⅓ Thaler = 16 Schilling lübisch = 192 Pfennig<br> <b>1 Schilling lübisch</b> = 1/48 Thaler = 12 Pfennig<br> <b>1 Sechsling</b> = ½ Schilling lübisch = 6 Pfennig<br> <b>1 Dreiling</b> = ¼ Schilling lübisch = 3 Pfennig<br> <em>Early Holstein-Gottorp Schilling pieces (KM# 6, 1595–1597) bear «1 SCHILLING» = 1/32 Thaler under the same accounting reckoning as elsewhere in northern Germany.</em><br> <em><b>Note:</b> Fine-silver figures for Thaler and Mark apply to full-value coins struck at par silver. Schilling, Sechsling and Dreiling pieces were typically struck as <b>petty coins (Scheidemünzen)</b> with reduced fineness — the theoretical silver value (1 Schilling lübisch ≈ 0.541 g fine) is a reckoning reference, not actual coin silver content.</em>
      uk: |-
        <b>1 Reichsthaler</b> = <b>25,984 г</b> чистого срібла = 3 Mark lübisch = 48 Schilling lübisch = 576 Pfennig<br> <b>1 Mark lübisch</b> = <b>8,661 г</b> чистого (<i>розрахункова одиниця</i>) = ⅓ Thaler = 16 Schilling lübisch = 192 Pfennig<br> <b>1 Schilling lübisch</b> = 1/48 Thaler = 12 Pfennig<br> <b>1 Sechsling</b> = ½ Schilling lübisch = 6 Pfennig<br> <b>1 Dreiling</b> = ¼ Schilling lübisch = 3 Pfennig<br> <em>Ранні гольштейнсько-ґотторпські шилінгові монети (KM# 6, 1595–1597) несуть «1 SCHILLING» = 1/32 Thaler за тим самим рахунком, що й по всій північній Німеччині.</em><br> <em><b>Зауваження:</b> Значення чистого срібла для Thaler і Mark стосуються повноцінних монет, карбованих за par-silver. Schilling, Sechsling і Dreiling зазвичай карбувались як <b>розмінні монети (Scheidemünzen)</b> зі зниженою пробою — теоретичний срібний еквівалент (1 Schilling lübisch ≈ 0,541 г чистого) є розрахунковим орієнтиром, а не фактичним вмістом срібла в монеті.</em>
  description:
    de: |
      Augspurgischer Reichsmüntz-Abschied 30. Mai 1566. 233,856 g ÷ 9 = 25,984 g
      Feinsilber je Reichsthaler. Reichsstandard biß zur Kipper-Wipper-Krise um 1620,
      danach durch leichteren 9¼-Fuß (Thaler Species) abgelöst. Hamburg/Lübeck
      behielten den 9-Fuß als Bank-Rechnungsmünze biß 1875.
    en: |-
      Imperial Mint Decree of Augsburg, 30 May 1566. 233.856 g ÷ 9 = 25.984 g fine silver per Reichsthaler. Imperial standard until the Kipper-Wipper crisis around 1620, then superseded by the lighter 9¼-Fuß (Thaler Species). Hamburg/Lübeck retained the 9-Fuß as bank money until 1875.
    uk: |-
      Імперський монетний ордонанс Ауґсбургу 30 травня 1566. 233,856 ÷ 9 = 25,984 г чистого срібла на рейхсталер. Імперський стандарт до Kipper-Wipper-кризи близько 1620 р., потім витіснений легшим 9¼-Fuß (Thaler Species). Гамбург і Любек зберігали 9-Fuß як банківську розрахункову монету до 1875 р.
