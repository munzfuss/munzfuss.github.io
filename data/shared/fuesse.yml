        <b>Kurs in Holstein 1790er:</b> 1 Dukat ≈ 2½ Thaler Species = 150 Schilling Courant (Marktkurs)<br>
        <b>Courantdukat (Altona ab 1771):</b> Dukat mit festem Kurs von 2½ Rigsdaler Courant (= ca. 12½ Marck Danske)<br>
        <em>Als Handelsgold zirkulierten in Holstein auch niederländische, venezianische, ungarische und türkische Dukaten desselben Fußes nach Silbergehalt.</em>
      en: |-
        <b>1 Dukat</b> = <b>3.44191 g</b> fine gold · no fixed silver equivalent<br> <b>Rate in Holstein, 1790s:</b> 1 Dukat ≈ 2½ Thaler Species = 150 Schilling Courant (market rate)<br> <b>Courantdukat (Altona, from 1771):</b> ducat with a fixed rate of 2½ Rigsdaler Courant (≈ 12½ Marck Danske)<br> <em>As trade gold, Dutch, Venetian, Hungarian and Turkish ducats of the same standard also circulated in Holstein, accepted by silver content.</em>
      uk: |-
        <b>1 дукат</b> = <b>3,44191 г</b> чистого золота · фіксованого срібного еквівалента немає<br> <b>Курс у Гольштейні 1790-х:</b> 1 дукат ≈ 2½ Thaler Species = 150 Schilling Courant (ринковий курс)<br> <b>Courantdukat (Альтона, з 1771):</b> дукат із фіксованим курсом 2½ Rigsdaler Courant (≈ 12½ Marck Danske)<br> <em>Як торгове золото в Гольштейні перебували в обігу також нідерландські, венеційські, угорські й турецькі дукати тієї самої стопи — приймались за вмістом срібла.</em>
  description:
