        <b>1 Sølvgylden</b> = 27,51 g rauh / <b>24,07 g fein</b> @ 14 Lod (Wilcke 1950 Kap. 7-2 S. 152-153)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br>
        <b>1 Sølvgylden</b> ≈ <b>32 Skilling</b> = 96 Hvid (period-Tarif, Brev Dines Blicher 1514) · NB: Skilling und Hvid sind nach Sølvgylden-Fein-Wert <em>überrtarifiert</em> (Skilling Fein 0,875 g × 32 = 28 g vs Sølvgylden 24,07 g) — Sub-Tier ist <b>Scheidemünz-Token</b>, nicht vollwertige Sub-Kurant.<br>
        <em>Gold-Anker (Rhinsk Gylden): 96 Hvid = 1 Rhinsk Gylden Gold (2,437 g fein) — der Lovkompleks 1514 etabliert die Hvid-Rhinsk-Gylden-Tarifbindung, NICHT die Sølvgylden-Skilling-Bindung in Fein-Logik.</em>
      en: |-
        <b>1 Sølvgylden</b> = 27.51 g rough / <b>24.07 g fine</b> at 14 Lod (Wilcke 1950 Kap. 7-2 pp. 152-153)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br><b>1 Sølvgylden</b> ≈ <b>32 Skilling</b> = 96 Hvid (period tariff, Brev Dines Blicher 1514) · NB: Skilling and Hvid are <em>over-tariffed</em> against Sølvgylden fine value (Skilling fine 0.875 g × 32 = 28 g vs Sølvgylden 24.07 g) — the sub-tier is <b>Scheidemünze token</b>, not full-value sub-Kurant.<br><em>Gold anchor (Rhinsk Gylden): 96 Hvid = 1 Rhinsk Gulden gold (2.437 g fine) — the Lovkompleks of 1514 establishes the Hvid-Rhinsk-Gulden tariff bond, NOT the Sølvgylden-Skilling bond in fine-weight logic.</em>
      uk: |-
        <b>1 Sølvgylden</b> = 27,51 г повної / <b>24,07 г чистого</b> за 14 Lod (Wilcke 1950 Kap. 7-2 с. 152-153)<sup>[ref:wilcke-1950-renaissance-moent]</sup><br><b>1 Sølvgylden</b> ≈ <b>32 Skilling</b> = 96 Hvid (period-тариф, Brev Dines Blicher 1514) · NB: Skilling і Hvid <em>над-тариф</em>овані відносно фейн-вартості Sølvgylden (Skilling fein 0,875 г × 32 = 28 г vs Sølvgylden 24,07 г) — sub-tier це <b>Scheidemünze-token</b>, а не повноцінний sub-Kurant.<br><em>Золотий анкер (Rhinsk Gylden): 96 Hvid = 1 Rhinsk Gylden золотий (2,437 г чистого) — Lovkompleks 1514 встановлює тарифну прив'язку Hvid-Rhinsk-Gylden, НЕ Sølvgylden-Skilling у фейн-логіці.</em>
  description:
    de: '<b>Erste umfassende Müntzgesetzgebung des dänisch-norwegischen Reichs für beide Metalle und beide Königreiche</b>, etabliert durch das <b>Christian-II-Lovkompleks 1514-1515</b><sup>[ref:denmark-ref29-no-url]</sup> — eine vierteilige Aktion: Møntordning af Sommeren 1514 («<i>Dienis Malmø Brev</i>», nach Mzm. Diens (Hans) Blicher), Norge-Forordning 3. August 1514 (Erweiterung auf Norwegen unter Kalmar-Union), Kvittering Paasketid 1515 (Compliance-Quittung des Rigsråd), Sjælland åbent Brev 24. August 1515 (Sjælland-spezifische Erneuerung). Auf der Silber-Seite definiert das Lovkompleks die <b>Sølvgylden-Skilling-Hvid-Triade</b> — 8½ Sølvgylden aus der Cölln. Marck rauh @ 14 Lod (875 ‰), 27,51 g rauh / 24,07 g fein je Stück; Skilling 96 Stk./M @ 5¾ Lod und Hvid 222 Stk./M @ 4½ Lod als Scheidemünzen<sup>[ref:denmark-ref29-no-url]</sup>. Drei Phasen: <b>A1</b> (1514-1517) Lovkompleks-Karbung mit Sølvgylden 1516+1518 aus Malmø (Mzm. Diens Blicher) — vorausgehende 1513-Akte (22. Juli 1513 Haandfæstning + 1. August 1513 Dynes-Blicher-Beskikkelsesbrev) sind PRECURSOR, NICHT Teil des Lovkompleks; <b>A2</b> (1518-1522) Klipping-Debasierung («<i>ydel Kobber</i>», Wilcke 7-2 S. 157) — 18-Penning- und 1-Skilling-Klippinge als Notmünze im Vorfeld der Absetzung; <b>A3</b> (1523) Final-Konsolidierung mit Massen-Sølvgylden-Karbung Malmø am Vorabend der Flucht 13. April 1523 (Wilcke 7-2 S. 156 verbatim «<i>meget almindelig</i>»). Standard endet 1524 mit Frederik Is Møntordning 25. Februar 1524 (separate Fuß [fuss:8_gylden_fod]), die die Sølvgylden-Stückzahl auf 8/M strafft.'
    en: '<b>The first comprehensive coinage legislation of the Danish-Norwegian realm covering both metals and both kingdoms</b>, established through the <b>Christian II Lovkompleks of 1514-1515</b><sup>[ref:denmark-ref29-no-url]</sup> — a four-part act: Møntordning af Sommeren 1514 («<i>Dienis Malmø Brev</i>», after mintmaster Diens (Hans) Blicher), Norge ordinance of 3 August 1514 (extension to Norway under the Kalmar Union), Kvittering Paasketid 1515 (compliance receipt from the Rigsråd), Sjælland åbent Brev of 24 August 1515 (Sjælland-specific renewal). On the silver side the Lovkompleks defines the <b>Sølvgylden-Skilling-Hvid triad</b> — 8½ Sølvgylden per Cologne mark rough at 14 Lod (875 ‰), 27.51 g rough / 24.07 g fine per piece; Skilling 96/M at 5¾ Lod and Hvid 222/M at 4½ Lod as Scheidemünzen<sup>[ref:denmark-ref29-no-url]</sup>. Three phases: <b>A1</b> (1514-1517) Lovkompleks coinage with Sølvgylden 1516+1518 from Malmø (mintmaster Diens Blicher) — preceding 1513 acts (22 July 1513 Haandfæstning + 1 August 1513 Dynes Blicher beskikkelsesbrev) are PRECURSOR, NOT part of the Lovkompleks; <b>A2</b> (1518-1522) Klipping debasement («<i>ydel Kobber</i>», Wilcke 7-2 p. 157) — 18-Penning and 1-Skilling Klippinge as emergency coinage in the run-up to the deposition; <b>A3</b> (1523) final consolidation with mass Sølvgylden coinage at Malmø on the eve of the flight of 13 April 1523 (Wilcke 7-2 p. 156 verbatim «<i>meget almindelig</i>»). The standard ends in 1524 with Frederik I''s Møntordning of 25 February 1524 (separate Fuß [fuss:8_gylden_fod]), which tightens the Sølvgylden count to 8/M.'
    uk: '<b>Перше комплексне монетне законодавство дансько-норвезького реалму, що охоплює обидва метали та обидва королівства</b>, запроваджене через <b>Lovkompleks Кристіана II 1514-1515</b><sup>[ref:denmark-ref29-no-url]</sup> — чотирискладовий акт: Møntordning af Sommeren 1514 («<i>Dienis Malmø Brev</i>», за монетмайстра Diens (Hans) Blicher), норвезький ордонанс 3 серпня 1514 (поширення на Норвегію в Кальмарській унії), Kvittering Paasketid 1515 (compliance-квитанція Rigsråd), Sjælland åbent Brev 24 серпня 1515 (Sjælland-специфічне відновлення). На срібній стороні Lovkompleks визначає <b>тріаду Sølvgylden-Skilling-Hvid</b> — 8½ Sølvgylden з повної кельнської марки за 14 Lod (875 ‰), 27,51 г повної / 24,07 г чистого на штуку; Skilling 96/M за 5¾ Lod і Hvid 222/M за 4½ Lod як Scheidemünzen<sup>[ref:denmark-ref29-no-url]</sup>. Три фази: <b>A1</b> (1514-1517) Lovkompleks-карбування з Sølvgylden 1516+1518 з Мальме (монетмайстер Diens Blicher) — попередні акти 1513 (22 липня 1513 Haandfæstning + 1 серпня 1513 Dynes Blicher Beskikkelsesbrev) — ПРЕКУРСОРНІ, НЕ частина Lovkompleks; <b>A2</b> (1518-1522) Klipping-девальвація («<i>ydel Kobber</i>», Wilcke 7-2 с. 157) — 18-Penning та 1-Skilling Klippinge як надзвичайна монета напередодні скинення; <b>A3</b> (1523) фінальна консолідація з масовою Sølvgylden-карбуванням у Мальме напередодні втечі 13 квітня 1523 (Wilcke 7-2 с. 156 verbatim «<i>meget almindelig</i>»). Стандарт завершується 1524 р. з Møntordning Frederik I 25 лютого 1524 (окрема стопа [fuss:8_gylden_fod]), яка стискає кількість Sølvgylden до 8/M.'
  fractions:
    "1":     {soll_rau_g: 27.51, soll_fein_g: 24.07}    # 1 Sølvgylden @ 14 Lod
    "1/2":   {soll_rau_g: 13.76, soll_fein_g: 12.04}    # ½ Sølvgylden
    "1/4":   {soll_rau_g: 6.88,  soll_fein_g: 6.02}     # ¼ Sølvgylden
    "1/32":  {soll_rau_g: 2.436, soll_fein_g: 0.875}    # 1 Skilling (period-tariff 32 Skilling = 1 Sølvgylden; fein-weight is 27.5× under Sølvgylden — Scheidemünze)
    "1/96":  {soll_rau_g: 1.053, soll_fein_g: 0.296}    # 1 Hvid (period-tariff 96 Hvid = 1 Rhinsk Gylden Gold; Scheidemünze)
  events:
    first_adoption:
      anywhere: 1514
      note: "Møntordning af Sommeren 1514 («Dienis Malmø Brev», after mintmaster Diens (Hans) Blicher) — first systematic Sølvgylden-Skilling-Hvid silver standard for the Danish-Norwegian realm. Wilcke 1950 Kap. 7-2 pp. 152-153."
    first_mint:
      anywhere: 1514
      note: "Lovkompleks-Karbung beginnt 1514 mit der Møntordning af Sommeren 1514 («Dienis Malmø Brev»). PRECURSOR-Akte 1513 (22. Juli 1513 Haandfæstning mit monetären Klauseln + 1. August 1513 Dynes Blicher Beskikkelsesbrev als Mzm. in Malmø, Wilcke 7-2 S. 4 + S. 150) sind NICHT Teil des Lovkompleks selbst — sie sind die vorbereitenden Akte Christians II. unmittelbar nach Hans' Tod 20. Februar 1513 und vor der Krönung 11. Juni 1514. Die formale 4-teilige Lovkompleks-Aktion startet erst Sommer 1514. Frühestes belegte Sølvgylden: Galster c2g-38 1516 Malmø (Bruun-3917+3929+3931 attest Skilling 1514-1518 Belegexemplare)."
    last_mint:
      anywhere: 1523
      note: "Last documented Sølvgylden mass coinage 1523 Malmø (Bruun-3933+3934, Wilcke 7-2 p. 156 «meget almindelig»). Christian II is deposed 13 April 1523; Frederik I's Møntordning 25 February 1524 supersedes the standard."
    std_end:
      anywhere: 1524
      approx_anywhere: true
      note: "Standard superseded by Frederik I's Møntordning of 25 February 1524 (Wilcke 7-2 pp. 184-187, separate Fuß christian-II → 8_gylden_fod transition)."
    demonetisation:
      anywhere: 1541
      approx_anywhere: true
      note: "Approximate practical-circulation tail terminus — by Christian III's 20 September 1541 Møntordning, the Lovkompleks-1514 norm is no longer struck and surviving specimens are remelt fodder for the new 14½-Lod Daler standard. Christian-II-era Sølvgylden gradually demonetised through the 1530s-1540s."
    anywhere_label:
      de: Königreich Dänemark und Norwegen (Christian II Lovkompleks)
      en: Royal Danish-Norwegian Realm (Christian II Lovkompleks)
      uk: Королівство Данії і Норвегії (Lovkompleks Christian II)

