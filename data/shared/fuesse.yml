    subheading:
      de: "Forordningerne af 15. und 31. Juli 1726 · 34 Marck Danske je feine Cöllnische Marck · constante Silberhaltung 20,63435 g pr. Rigsdaler Courant"
      en: "Decrees of 15/31 July 1726 · 34 Marck Danske from one fine Cologne Mark · constant silver content of 20.63435 g per Rigsdaler Courant"
      uk: "Ордонанси 15/31 липня 1726 · 34 Marck Danske з однієї чистої кельнської марки · постійний вміст 20,63435 г на Rigsdaler Courant"
    badge:
      de: "Müntzfuß · Silber"
