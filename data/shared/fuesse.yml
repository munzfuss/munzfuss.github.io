      - key:
          de: "Kurs zur Species"
          en: "Rate to the Species"
          uk: "Курс до Species"
        value:
          de: "Rechnungskonvention seit 1726: 1 RSp = 1¼ RCour = 120 Sk · Marktkurs 1726–1794: ~122½:100 (Opgæld) · <b>Plakat 3. Dezember 1794</b>: Marktkurs abgeschafft, amtliches Verhältnis 1:1¼ einzig gültig"
          en: "Accounting convention since 1726: 1 RSp = 1¼ RCour = 120 Sk · market rate 1726–1794: ~122½:100 (Opgæld) · <b>Placard of 3 Dec. 1794</b>: market rate abolished; the official 1:1¼ ratio became the sole legal relation"
          uk: "Розрахункова конвенція з 1726: 1 RSp = 1¼ RCour = 120 Sk · ринковий курс 1726–1794: ~122½:100 (Opgæld) · <b>Plakat 3 грудня 1794</b>: ринковий курс скасовано, єдиним дійсним стало офіційне 1:1¼"
      - key:
          de: "Opgæld"
          en: "Opgæld"
          uk: "Opgæld"
        value:
          de: "Wegen unrundem Verhältnis beim Tausch Courant → Species · Grund der S.-H.-Reform 1788"
          en: "An uneven ratio at the Courant → Species exchange · the underlying reason for the Schleswig-Holstein reform of 1788"
          uk: "Через нерівне співвідношення при обміні Courant → Species · головна причина шлезв.-гольшт. реформи 1788"
    rechnungsfraktionen_label:
      de: "Rechnungsfraktionen"
      en: "Accounting fractions"
      uk: "Розрахункові фракції"
    rechnungsfraktionen:
      de: |
        <b>Arithmetische Identitäten (juristisch fixiert):</b><br>
        <b>1 Rigsdaler Courant</b> = <b>20,63435 g</b> Feinsilber = 6 Marck Danske = 96 Skilling Danske = 1152 Penninge<br>
        <b>1 Marck Danske</b> = <b>3,43906 g</b> fein (<i>Rechnungseinheit</i>) = ⅙ Rigsdaler = 16 Skilling Danske = 192 Penninge<br>
        <b>1 Skilling Danske</b> = 12 Penninge = <b>0,21494 g</b> fein · Münzbeleg: <i>24 Skilling Danske</i> (KM# 250, Christian VII. 1767–1788): Silber .562 · 9,17 g rau · 5,15354 g fein → 1 Skilling = 0,21473 g fein ✓<br><br>
        <b>Kurs Species ↔ Courant</b> (Rechnungskonvention, Marktkurs, Plakat 1794):<br>
        · <b>1726–1794:</b> Rechnungskonvention 1 Rigsdaler Species = 1¼ Rigsdaler Courant = 120 Skilling Danske von Anfang an. Marktkurs im Wechselgeschäft ~122½:100 — zugleich Silberparität (122,5 × 20,63435 = 2527,71 g vs. 100 × 25,28173 = 2528,17 g; Differenz 0,02 %). Differenz zur Rechnungskonvention hieß <em>Opgæld</em><br>
        · <b>Plakat 3. Dezember 1794</b>: Opgæld-Marktkurs abgeschafft; 1 RSp = 1¼ RCour = 5:4 einzig gültige Wechselrelation. Krone bricht Silberparität zuungunsten des RCour: 125 × 20,63435 = 2579,29 g Silber vs. 100 × 25,28173 = 2528,17 g. RCour gesetzlich ~2 % unter Silberwert → Seigniorage-Gewinn<br><br>
        <b>1 Krone</b> (Silbermünze) = 4 Marck Danske = 60 Kroneskilling = 64 Skilling Danske = ⅔ Rigsdaler Courant = <b>13,75623 g</b> fein · 1 Kroneskilling = 16/15 Skilling Danske<br>
        <em>Die Bezeichnung «Skilling Danske» erscheint buchstäblich auf den Prägungen.</em>
      en: |-
        <b>Arithmetic identities (legally fixed):</b><br> <b>1 Rigsdaler Courant</b> = <b>20.63435 g</b> fine silver = 6 Marck Danske = 96 Skilling Danske = 1152 Penninge<br> <b>1 Marck Danske</b> = <b>3.43906 g</b> fine (<i>accounting unit</i>) = ⅙ Rigsdaler = 16 Skilling Danske = 192 Penninge<br> <b>1 Skilling Danske</b> = 12 Penninge = <b>0.21494 g</b> fine · numismatic check: <i>24 Skilling Danske</i> (KM# 250, Christian VII, 1767–1788): silver .562 · 9.17 g rough · 5.15354 g fine → 1 Skilling = 0.21473 g fine ✓<br><br> <b>Species ↔ Courant rate</b> (accounting convention, market rate, Placard 1794):<br> · <b>1726–1794:</b> the accounting convention 1 Rigsdaler Species = 1¼ Rigsdaler Courant = 120 Skilling Danske held from the start. The exchange-market rate of ~122½:100 also reflected the silver parity (122.5 × 20.63435 = 2527.71 g vs. 100 × 25.28173 = 2528.17 g; gap 0.02 %). The shortfall against the accounting convention was called <em>Opgæld</em><br> · <b>Placard of 3 Dec. 1794</b>: Opgæld market rate abolished; 1 RSp = 1¼ RCour = 5:4 became the sole legal exchange ratio. The Crown broke the silver parity at the Courant's expense: 125 × 20.63435 = 2579.29 g silver vs. 100 × 25.28173 = 2528.17 g. RCour now sat ~2 % below its silver value — a seigniorage gain<br><br> <b>1 Krone</b> (silver coin) = 4 Marck Danske = 60 Kroneskilling = 64 Skilling Danske = ⅔ Rigsdaler Courant = <b>13.75623 g</b> fine · 1 Kroneskilling = 16/15 Skilling Danske<br> <em>The designation «Skilling Danske» appears literally on the coins themselves.</em>
      uk: |-
        <b>Арифметичні тотожності (юридично закріплені):</b><br> <b>1 Rigsdaler Courant</b> = <b>20,63435 г</b> чистого срібла = 6 Marck Danske = 96 Skilling Danske = 1152 Penninge<br> <b>1 Marck Danske</b> = <b>3,43906 г</b> чистого (<i>розрахункова одиниця</i>) = ⅙ Rigsdaler = 16 Skilling Danske = 192 Penninge<br> <b>1 Skilling Danske</b> = 12 Penninge = <b>0,21494 г</b> чистого · нумізматична перевірка: <i>24 Skilling Danske</i> (KM# 250, Christian VII. 1767–1788): срібло .562 · 9,17 г повної ваги · 5,15354 г чистого → 1 Skilling = 0,21473 г чистого ✓<br><br> <b>Курс Species ↔ Courant</b> (розрахункова конвенція, ринковий курс, Plakat 1794):<br> · <b>1726–1794:</b> розрахункова конвенція 1 Rigsdaler Species = 1¼ Rigsdaler Courant = 120 Skilling Danske діяла з самого початку. Ринковий курс на валютній біржі ~122½:100 одночасно відображав срібний паритет (122,5 × 20,63435 = 2527,71 г проти 100 × 25,28173 = 2528,17 г; різниця 0,02 %). Розрив із розрахунковою конвенцією називався <em>Opgæld</em><br> · <b>Plakat 3 грудня 1794</b>: ринковий Opgæld-курс скасовано; 1 RSp = 1¼ RCour = 5:4 — єдина дійсна валютна формула. Корона зламала срібний паритет на шкоду Courant: 125 × 20,63435 = 2579,29 г срібла проти 100 × 25,28173 = 2528,17 г. RCour опинився ~2 % нижче своєї срібної вартості → сеньйораж<br><br> <b>1 Krone</b> (срібна монета) = 4 Marck Danske = 60 Kroneskilling = 64 Skilling Danske = ⅔ Rigsdaler Courant = <b>13,75623 г</b> чистого · 1 Kroneskilling = 16/15 Skilling Danske<br> <em>Напис «Skilling Danske» зʼявляється буквально на самих монетах.</em>
  description:
    de: |
      Dänisch-Norwegischer Kurantmøntfod, eingeführt 15./31. Juli 1726.
      233,856 g ÷ 11⅓ = 20,63435 g Feinsilber je Rigsdaler Courant
      (= 3 Mark Danske = 48 Skilling Danske). Der Hauptkurant-Standard
      Dänemarks und Holsteins biß zur Schleswig-Holsteinischen Reform 1788
      bzw. biß zum Staatsbankrott 1813 (Dänemark).
    en: |-
      Danish-Norwegian Kurantmøntfod, introduced 15/31 July 1726. 233.856 g ÷ 11⅓ = 20.63435 g fine silver per Rigsdaler Courant (= 3 Mark Danske = 48 Skilling Danske). Denmark's and Holstein's main courant standard until the Schleswig-Holstein reform of 1788 / Danish state bankruptcy of 1813.
    uk: |-
      Данський куранттмьонтфод, впроваджений 15/31 липня 1726 р. 233,856 г ÷ 11⅓ = 20,63435 г чистого срібла на рігсдалер курант. Основний курантний стандарт Данії та Гольштейну до реформи 1788 р. чи банкрутства держави 1813 р.
  fractions:
    "1": {soll_fein_g: 20.63435}        # 1 Rigsdaler Courant
