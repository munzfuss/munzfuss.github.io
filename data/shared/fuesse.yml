# 13-Krone-Fuß (Hede-Nickname «fine kroner»). Hede 1957:
#   13 Stück je 13⅓-lötiger Marck (≈ .833) = 17.988 g rau / 14.984 g fein.
# Eingeführt durch Reskript 31. Dezember 1692 (Christian V.); letzte Prägung
# 1771. Höherer Feingehalt als der 10½-Fuß, aber nur 0,02 g mehr Feinsilber pro
# Stück — der Wechsel war eher symbolisch (Vertrauenswiederherstellung) als eine
# echte Aufwertung. grid_stops = 233.856 ÷ 14.984 = 15.607.
# -----------------------------------------------------------------------------
