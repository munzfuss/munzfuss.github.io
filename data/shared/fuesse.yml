    rechnungsfraktionen:
      de: |
        <b>1 Rigsbankdaler</b> = <b>12,64086 g</b> Feinsilber = 96 Rigsbankskilling = 1152 Penninge = ½ Thaler Species = 30 Schilling Sch.-H. Courant<br>
        <b>1 Rigsbankskilling</b> = 12 Penninge ≈ <b>0,13168 g</b> fein (<i>Rechenwert</i>)<br>
        <b>1 Rigsbankdaler</b> = 6 Rigsdaler Courant (Umstellung 1813 des kriegsentwerteten Papier-Courant; nach Silbergehalt 1 RBD ≈ 1,16 Rigsdaler Courant alter vollwertiger Prägung)<sup>[ref:forordning-pengevaesenet-1813]</sup><br><br>
        <em>Umbenennung 31. Juli 1854 (Frederik VII.): Rigsbankdaler → Rigsdaler Rigsmønt, Rigsbankskilling → Skilling Rigsmønt — kein Fußwechsel, nur Namenswechsel.</em><br>
        <em><b>Hinweis:</b> Die Feinsilberangabe für den Rigsbankdaler gilt für Vollwert-Münzen (par-Silber). Rigsbankskilling-Stücke wurden meist als Scheidemünzen mit reduziertem Feingehalt geprägt — der theoretische Wert 0,13168 g fein ist Rechnungsbezug, nicht tatsächlicher Münz-Silbergehalt.</em>
      en: |-
        <b>1 Rigsbankdaler</b> = <b>12.64086 g</b> fine silver = 96 Rigsbankskilling = 1152 Penninge = ½ Thaler Species = 30 Schilling Sch.-H. Courant<br> <b>1 Rigsbankskilling</b> = 12 Penninge ≈ <b>0.13168 g</b> fine (<i>computed</i>)<br> <b>1 Rigsbankdaler</b> = 6 Rigsdaler Courant (1813 conversion of the war-devalued paper Courant; by silver content 1 RBD ≈ 1.16 Rigsdaler Courant of the older full-value issue)<sup>[ref:forordning-pengevaesenet-1813]</sup><br><br> <em>Renaming on 31 July 1854 (Frederik VII): Rigsbankdaler → Rigsdaler Rigsmønt, Rigsbankskilling → Skilling Rigsmønt — no change of standard, only of name.</em><br> <em><b>Note:</b> The fine-silver figure for the Rigsbankdaler applies to full-value coins (par silver). Rigsbankskilling pieces were typically struck as petty coins with reduced fineness — the theoretical 0.13168 g fine is a reckoning reference, not actual coin silver content.</em>
      uk: |-
        <b>1 Rigsbankdaler</b> = <b>12,64086 г</b> чистого срібла = 96 Rigsbankskilling = 1152 Penninge = ½ Thaler Species = 30 Schilling Sch.-H. Courant<br> <b>1 Rigsbankskilling</b> = 12 Penninge ≈ <b>0,13168 г</b> чистого (<i>розрахункова</i>)<br> <b>1 Rigsbankdaler</b> = 6 Rigsdaler Courant (конверсія 1813 знеціненого воєнного паперового Courant; за вмістом срібла 1 RBD ≈ 1,16 Rigsdaler Courant старого повноцінного карбування)<sup>[ref:forordning-pengevaesenet-1813]</sup><br><br> <em>Перейменування 31 липня 1854 (Frederik VII.): Rigsbankdaler → Rigsdaler Rigsmønt, Rigsbankskilling → Skilling Rigsmønt — без зміни стопи, лише назви.</em><br> <em><b>Зауваження:</b> Значення чистого срібла для Rigsbankdaler стосується повноцінних монет (par-silver). Rigsbankskilling-монети зазвичай карбувались як розмінні зі зниженою пробою — теоретичні 0,13168 г чистого є розрахунковим орієнтиром, не фактичним вмістом срібла в монеті.</em>
  description:
    de: |
      Eingeführt 5. Januar 1813 nach dem dänischen Staatsbankrott als Rigsbankdaler.
      Umbenannt 31. Juli 1854 in Rigsdaler Rigsmønt (Frederik VII.) — ohne Wertänderung.
      233,856 g ÷ 18½ = 12,64086 g Feinsilber je Rigsbankdaler (14,44670 g rau × 875‰).
      2 Rigsbankdaler = 1 Thaler Species (Silberparität zum 9¼-Fuß).
    en: |-
      Introduced 5 January 1813 after the Danish state bankruptcy as Rigsbankdaler. Renamed 31 July 1854 to Rigsdaler Rigsmønt (Frederik VII) with no value change. 233.856 g ÷ 18.5 = 12.64086 g fine silver per Rigsbankdaler. 2 Rigsbankdaler = 1 Thaler Species (silver parity to the 9¼-Thaler-Fuß).
    uk: |-
      Впроваджений 5 січня 1813 р. після державного банкрутства Данії як рігсбанкдалер. Перейменований 31 липня 1854 р. на рігсдалер рігсмьонт (Фредерік VII) без зміни вартості. 233,856 г ÷ 18½ = 12,64086 г чистого срібла. 2 рігсбанкдалери = 1 спецієсталер (срібний паритет з 9¼-стандартом).
