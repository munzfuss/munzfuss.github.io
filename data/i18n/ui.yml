  de: "Kurantmünzen — Vollwertmünzen"
  en: "Kurant coins — Full-value coinage"
  uk: "Курантні монети — Повноцінні монети"

label.scheide:
  de: "Billon-Scheidemünzen — unterwertige Silbermünzen"
  en: "Billon petty coins — underweight silver"
  uk: "Білонні розмінні — неповновагові срібні"

label.copper:
  de: "Kupfer-Kleinmünzen — ohne Edelmetall"
  en: "Copper petty coins — no precious metal"
  uk: "Мідні дрібні монети — без дорогоцінного металу"

label.tarif:
  de: "Tarifmünzen — Fiskalprägungen"
  en: "Tariff coins — Fiscal strikes"
  uk: "Тарифні монети — Фіскальні карбування"

label.tarif_deviant:
  de: "Tarifmünzen mit reduziertem Feingehalt — Kriegs-Debasement"
  en: "Tariff coins at reduced fineness — wartime debasement"
  uk: "Тарифні монети зі зниженою пробою — воєнний debasement"

label.tarif_subunit:
  de: "Tarifäre Subeinheiten — überwertige Theilstücke"
  en: "Tariff subunits — overweight subdivisions"
  uk: "Тарифні субодиниці — надвагові поділки"

label.gedenk:
  de: "Gedenkmünzen"
  en: "Commemorative coins"
  uk: "Пам'ятні монети"

kurant.desc:
  de: "Vollwertig · Nennwert ≈ Silberwert · vom Staat ohne oder mit geringem Aufschlag ausgegeben"
  en: "Full-value · face value ≈ silver content · issued by the state without or with minor premium"
  uk: "Повноцінні · номінал ≈ вмісту срібла · випущені державою без або з незначною надбавкою"

scheide.desc:
  de: "Billonmünzen · Nennwert > Silberwert · Differenz deckt Seigniorage-Gewinn der Krone · nur im lokalen Umlauf"
  en: "Billon coins · face value > silver content · difference is state seigniorage · local circulation only"
  uk: "Білонні монети · номінал > вміст срібла · різниця — сеньйораж держави · лише локальний обіг"

copper.desc:
  de: "Reines Kleingeld ohne Silbergehalt · reiner Fiat-Kurs (Fiatgeld) · Δ nicht definiert · nur im lokalen Umlauf · die Zuordnung zum jeweiligen Müntzfuß erfaßt nur die Tarif-Theilung des Nennwerts (S.-H.-Courant bzw. RCour-Skilling-Danske), nicht den Silbergehalt"
  en: "Pure small change with no silver · fiat value only · Δ not defined · local circulation only · placement under the parent Müntzfuß reflects only the tariff subdivision of the face value (S.-H. Courant or RCour Skilling Danske), not silver content"
  uk: "Чисте дрібне без вмісту срібла · лише фіатний курс · Δ не визначається · тільки локальний обіг · розміщення в батьківському Müntzfuß фіксує лише тарифний поділ номіналу (S.-H.-Courant чи RCour Skilling Danske), не вміст срібла"

tarif.desc:
  de: "Nach königlichem Tarif gehandelt · Nennwert über Silberwert festgesetzt · Differenz = fiskalischer Gewinn"
  en: "Traded at royal tariff · face value set above silver content · difference = fiscal gain"
  uk: "Обігають за королівським тарифом · номінал встановлено вище срібла · різниця — фіскальний прибуток"

tarif_deviant.desc:
  de: "Wie Tarifmünze, aber mit zusätzlich reduziertem Feingehalt unter dem Standard des Müntzfußes · doppeltes Debasement im Krieg"
  en: "Like a tariff coin, but at fineness materially below the standard of the Müntzfuß · double debasement in wartime"
  uk: "Як тарифна монета, але з пробою суттєво нижчою за стандарт стопи · подвійний debasement у воєнний час"

tarif_subunit.desc:
  de: "Theilstücke unter demselben Tarif · selber Feingehalt wie die Hauptmünze · Silbergehalt pro Stück übersteigt die strikte Theilungsproportion (Mindestsilbergehalt für Alltagsumlauf)"
  en: "Subdivisions under the same tariff · same fineness as the main coin · per-piece silver content exceeds the strict subdivision proportion (minimum silver needed for everyday usability)"
  uk: "Поділки під тим самим тарифом · та сама проба, що й основна монета · вміст срібла на штуку перевищує строгу пропорцію поділу (мінімум срібла для повсякденної придатності)"

