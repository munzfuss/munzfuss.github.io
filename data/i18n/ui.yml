# Per-layer tooltips on the timeline (mint / status / circulation × anywhere / holstein).
# Each timeline bar decomposes into up to six period × scope layers; each layer carries
# `data-tooltip="{kind} · {scope} · {first}—{last}"`. These keys supply {kind} and the
# {scope=holstein} leg; the anywhere leg uses the per-stope `anywhere_label`
# from the events block in data/shared/fuesse.yml (or the bar in schleswig_holstein.yml).
