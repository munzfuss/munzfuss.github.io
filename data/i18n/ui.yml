# Label used in the per-year mintage marker tooltip as a key:value
# pair: «1640—1646 · Монет: 7» / «Coins: 7» / «Münzen: 7». Putting the
# noun before a colon and the count after sidesteps Ukrainian/German
# pluralisation entirely — the genitive-plural form is grammatically
# valid for any count when used as a label («Of coins: 1»).
tl.coin_year.coins:
  de: "Münzen"
  en: "Coins"
  uk: "Монет"

