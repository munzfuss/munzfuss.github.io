# Political entities that issued coinage circulating in Schleswig-Holstein.
# Referenced by `coin.issuing_entity: <id>` in location YAML files.
#
# Granularity:
#   - Holstein up to 1773: split between Royal Danish portion (Glückstadt/Altona)
#     and Gottorp ducal portion (Tönning/Schleswig/Kiel). These are distinct
#     issuing authorities under different sovereigns.
#   - 1773 onwards: Gottorp share bought out by Denmark → unified Gesamtstaat.
#     All later Holstein coinage is struck under the Danish king's sole
#     authority, even if minted at Altona or Poppenbüttel.
#   - 1850–1851: brief Provisional Government during the First Schleswig War.
#   - 1864–1866: Austrian–Prussian condominium (no separate coinage struck).
#   - 1867+: Prussian Province.

royal_holstein:
  abbrev: "RH"
  name:
    de: "Holsteinischer König-Antheil (kgl. dänisch)"
    en: "Royal Danish portion of Holstein"
    uk: "Гольштейн (королівсько-данська частина)"
  short:
    de: "Kgl. Holstein"
    en: "Royal Holstein"
    uk: "Корол. Гольштейн"
  description:
    de: "Vom dänischen König (Christian IV. → Christian VII., biß 1773) regierter Antheil des Herzogthums Holstein, Münzstätten Glückstadt und Altona/Poppenbüttel. Existierte parallel zum Gottorpischen Antheil biß zur Vereinigung 1773."
    en: "Portion of the Duchy of Holstein ruled by the Danish king (Christian IV → Christian VII, until 1773), minted at Glückstadt and Altona/Poppenbüttel. Co-existed with the Gottorp portion until the 1773 unification."
    uk: "Частина Гольштейну, якою управляв данський король (Кристіан IV → Кристіан VII, до 1773); монетні двори Глюкштадт і Альтона/Поппенбюттель. Існувала паралельно з ґотторпською частиною до обʼєднання 1773."

gottorp_duchy:
  abbrev: "HG"
  name:
    de: "Herzogthum Schleswig-Holstein-Gottorp"
    en: "Duchy of Schleswig-Holstein-Gottorp"
    uk: "Герцогство Шлезвіг-Гольштейн-Ґотторп"
  short:
    de: "Hzgt. Gottorp"
    en: "Gottorp Duchy"
    uk: "Герц. Ґотторп"
  description:
    de: "Selbständige Linie der Holstein-Herzöge (Adolf I. 1544 → Karl Peter Ulrich 1762). Münzstätten Tönning, Schleswig, Kiel. Souveränität endete mit dem Vertrag von Zarskoje Selo 1773 — die Gottorpischen Theile fielen an die dänische Krone im Tausch für Oldenburg/Delmenhorst."
    en: "Independent line of the Holstein dukes (Adolf I 1544 → Karl Peter Ulrich 1762). Mints at Tönning, Schleswig, Kiel. Sovereignty ended with the 1773 Treaty of Tsarskoye Selo — the Gottorp territories passed to the Danish Crown in exchange for Oldenburg/Delmenhorst."
    uk: "Незалежна гілка гольштинських герцогів (Адольф I 1544 → Карл Петер Ульріх 1762). Монетні двори Тьоннінг, Шлезвіг, Кіль. Суверенітет завершився Царськосельським договором 1773 р. — ґотторпські території перейшли данській короні в обмін на Ольденбург/Дельменгорст."

danish_realm:
  abbrev: "DK"
  name:
    de: "Königreich Dänemark"
    en: "Kingdom of Denmark"
    uk: "Королівство Данія"
  short:
    de: "Königreich DK"
    en: "Kingdom DK"
    uk: "Корол. Данія"
  description:
    de: "Münzstätte Kopenhagen (Christiansborg, ab 1739 Den Kongelige Mønt). Reichsweite Prägungen für die gesamte dänische Monarchie, einschließlich der Herzogthümer."
    en: "Royal Danish Mint at Copenhagen (Christiansborg, then Den Kongelige Mønt from 1739). Realm-wide issues for the whole Danish monarchy including the duchies."
    uk: "Королівський монетний двір у Копенгагені (Крістіансборг, з 1739 — Кongelige Mønt). Загальнодержавні випуски для всієї данської монархії, включно з герцогствами."

danish_norway:
  abbrev: "NO"
  name:
    de: "Königreich Norwegen unter dänischer Krone"
    en: "Kingdom of Norway under the Danish crown"
    uk: "Королівство Норвегія під данською короною"
  short:
    de: "Norge (DK-Krone)"
    en: "Norway (DK crown)"
    uk: "Норвегія (дан. корона)"
  description:
    de: "Norwegisches Reich der dänisch-norwegischen Personalunion (1380–1814, Kalmarer Union ab 1397). Müntzstätten Christiania (Kongsberg-Silber ab 1623, eigene Münze ab 1628) und Kongsberg (gegründet 1624 nach Entdeckung der Silberader; Hauptmünzstätte ab 1686, Mzz. ⚒). Eigene Reichsmünzprägung im dänisch-norwegischen Standard — gleicher Müntzfuß wie das Königreich Dänemark, aber norwegische Legenden und Schildführung. Kieler Frieden 14. Januar 1814 trennt Norwegen von Dänemark."
    en: "Norwegian realm of the Danish-Norwegian personal union (1380–1814, Kalmar Union from 1397). Mints at Christiania (Kongsberg silver from 1623, dedicated mint from 1628) and Kongsberg (founded 1624 after the discovery of the silver vein; principal mint from 1686, mintmark ⚒). Distinct realm coinage at the Danish-Norwegian standard — same Müntzfuß as the Kingdom of Denmark, but Norwegian legends and arms. The Treaty of Kiel of 14 January 1814 separates Norway from Denmark."
    uk: "Норвезький реалм данcько-норвезької особистої унії (1380–1814, Кальмарська унія з 1397). Монетні двори Хрістіанія (Сріблярство Конгсберг із 1623, окремий двір із 1628) і Конгсберг (заснований 1624 після відкриття срібної жили; головний двір із 1686, монетна позначка ⚒). Окреме реалмове карбування за данcько-норвезьким стандартом — той самий Müntzfuß, що в Королівстві Данія, але норвезькі легенди й геральдика. Кільський мир 14 січня 1814 відокремлює Норвегію від Данії."

gesamtstaat:
  _deprecated: true
  # Retired by the V2 entity-keyed pipeline (per docs/V2_PIPELINE.md §3.1).
  # Replaced by mint-driven classification: single mint → scalar entity
  # (royal_holstein / danish_realm / danish_norway); joint mint → list-form
  # `issuing_entity: [danish_realm, royal_holstein]` etc. Existing V1 coins
  # are migrated automatically by scripts/maintenance/bootstrap_v2_final_from_v1.py.
  # Manual review required for `gesamtstaat`-tagged coins whose mint is
  # unknown or outside {Altona, Kopenhagen, Kongsberg/Christiania}.
  abbrev: "DK+"
  name:
    de: "Dänische Monarchie · Königreich Dänemark und Norwegen (1773–1814) → Dänischer Gesammtstaat (Helstaten, 1814–1864)"
    en: "Danish monarchy · Royal Danish-Norwegian Realm (1773–1814) → Danish Unitary State (Helstaten, 1814–1864)"
    uk: "Данська монархія · Королівство Данії і Норвегії (1773–1814) → Данська унітарна держава (Helstaten, 1814–1864)"
  short:
    de: "Dän. Monarchie / Helstaten"
    en: "Danish monarchy / Helstaten"
    uk: "Данська монархія / Helstaten"
  description:
    de: "Vereinigte dänische Krone + Herzogthümer. Bis zum Frieden von Kiel 14. Januar 1814 als Königreich Dänemark und Norwegen; danach als Helstaten ohne Norwegen. Münzstätten Altona, Kopenhagen, Glückstadt prägen für den gesamten Realm. Umfaßt Rigsbankdaler-Reform 1813 und Rigsmønt-Reform 1854."
    en: "Unified Danish Crown + duchies. Until the Treaty of Kiel of 14 January 1814 as the Royal Danish-Norwegian Realm; afterwards as the Helstaten (without Norway). Mints at Altona, Copenhagen, Glückstadt strike for the whole realm. Covers the 1813 Rigsbankdaler reform and the 1854 Rigsmønt reform."
    uk: "Обʼєднана данська корона + герцогства. До Кільського миру 14 січня 1814 — Королівство Данії і Норвегії; відтак — Helstaten (без Норвегії). Монетні двори Альтона, Копенгаген, Глюкштадт карбують для всієї держави. Охоплює реформу Rigsbankdaler 1813 і реформу Rigsmønt 1854."

provisional_govt:
  abbrev: "PG"
  name:
    de: "Provisorische Regierung Schleswig-Holstein"
    en: "Provisional Government of Schleswig-Holstein"
    uk: "Тимчасовий уряд Шлезвіг-Гольштейну"
  short:
    de: "Prov. Regierung"
    en: "Prov. Government"
    uk: "Тимчас. уряд"
  description:
    de: "Während des Ersten Schleswig-Krieges (1848–1851) bestehende deutsche Übergangsregierung. Eigene Kupfer-Scheidemünzen (KM# 160, 162, X#6) Münzstätte Altona 1850–1851."
    en: "German transitional government during the First Schleswig War (1848–1851). Issued copper petty coins (KM# 160, 162, X#6) from the Altona mint, 1850–1851."
    uk: "Німецький перехідний уряд часів Першої шлезвізької війни (1848–1851). Карбував мідні розмінні монети (KM# 160, 162, X#6) на монетному дворі Альтона у 1850–1851 рр."

schauenburg_pinneberg:
  abbrev: "SP"
  name:
    de: "Grafschaft Holstein-Schaumburg-Pinneberg"
    en: "County of Holstein-Schauenburg-Pinneberg"
    uk: "Графство Гольштейн-Шауенбург-Піннеберг"
  short:
    de: "Gft. Pinneberg"
    en: "Pinneberg County"
    uk: "Граф. Піннеберг"
  description:
    de: "Selbständiges Reichslehen der Grafen von Schaumburg im nördlichen Holstein (Pinneberg). Die Schaumburger regierten ursprünglich ganz Holstein (1110–1459), behielten ab 1459 nur ihr Stammgrafschaft. Eigene Münzprägung biß zum Aussterben der Linie 1640; danach fiel Pinneberg an den dänischen Kgl. Antheil."
    en: "Independent imperial fief of the Counts of Schaumburg in northern Holstein (Pinneberg). The Schaumburgs originally ruled all of Holstein (1110–1459), keeping only their ancestral county after 1459. Issued its own coinage until the line died out in 1640; Pinneberg then passed to the Royal Danish portion."
    uk: "Самостійний імперський лен графів Шаумбурга в північному Гольштейні (Піннеберг). Шаумбурги первісно правили всім Гольштейном (1110-1459), зберігаючи з 1459 лише своє родове графство. Власне карбування до вимирання роду 1640 р.; після того Піннеберг увійшов до королівсько-данської частини."

sonderburg_duchy:
  abbrev: "SO"
  name:
    de: "Herzogthum Schleswig-Holstein-Sonderburg"
    en: "Duchy of Schleswig-Holstein-Sonderburg"
    uk: "Герцогство Шлезвіг-Гольштейн-Зондербург"
  short:
    de: "Hzgt. Sonderburg"
    en: "Sonderburg Duchy"
    uk: "Герц. Зондербург"
  description:
    de: "Hauptlinie der Sonderburger Herzöge, gestiftet 1564 von Hans dem Jüngeren (1545–1622). Residenz Sonderburg auf Alsen. Eigene Münzprägung biß zum Erbschaftskonkurs der Stammlinie 1668; danach Theilung in Cadettlinien (Plön, Augustenburg, Glücksburg). Münzprägung unter Johann (Hans d. J., 1604–1622) und seinem Sohn Alexander (1622–1627)."
    en: "Main line of the Sonderburg dukes, founded in 1564 by Hans the Younger (1545–1622). Seat at Sønderborg on Als. Issued its own coinage until the bankruptcy of the senior line in 1668; subsequently split into cadet branches (Plön, Augustenburg, Glücksburg). Coinage under Johann (Hans the Younger, 1604–1622) and his son Alexander (1622–1627)."
    uk: "Головна лінія Зондербургівських герцогів, заснована 1564 Гансом Молодшим (1545-1622). Резиденція Зондербург на Альсі. Власне карбування до банкрутства старшої лінії 1668; потім поділ на кадетські гілки (Плен, Аугустенбург, Глюксбург). Карбування за Йоганна (Ганс Молодший, 1604-1622) та його сина Александра (1622-1627)."

norburg_plon_duchy:
  abbrev: "NP"
  name:
    de: "Herzogthum Schleswig-Holstein-Norburg-Plön"
    en: "Duchy of Schleswig-Holstein-Norburg-Plön"
    uk: "Герцогство Шлезвіг-Гольштейн-Норбург-Плен"
  short:
    de: "Hzgt. Plön"
    en: "Plön Duchy"
    uk: "Герц. Плен"
  description:
    de: "Sonderburg-Plöner Nebenlinie der Holsteiner Herzöge (1622–1761), Residenz Schloß Plön. Eigene Münzprägung unter Johann Adolph I. (1690er) und Friedrich Karl (1750er). Mit dem Tod Friedrich Karls 1761 fiel das Herzogthum an die dänische Krone."
    en: "Sonderburg-Plön cadet line of the Holstein dukes (1622–1761), seat at Plön Castle. Own coinage under Johann Adolph I (1690s) and Friedrich Karl (1750s). With the death of Friedrich Karl in 1761 the duchy reverted to the Danish Crown."
    uk: "Sonderburg-Plöner молодша лінія гольштинських герцогів (1622-1761), резиденція замок Плен. Власне карбування за Йоганна Адольфа I (1690-ті) та Фрідріха Карла (1750-ті). Зі смертю Фрідріха Карла 1761 герцогство повернулось до данської корони."

glucksburg_duchy:
  abbrev: "GB"
  name:
    de: "Herzogthum Schleswig-Holstein-Glücksburg"
    en: "Duchy of Schleswig-Holstein-Glücksburg"
    uk: "Герцогство Шлезвіг-Гольштейн-Глюксбург"
  short:
    de: "Hzgt. Glücksburg"
    en: "Glücksburg Duchy"
    uk: "Герц. Глюксбург"
  description:
    de: "Erste Glücksburger Linie der Sonderburger Herzöge (1622–1779). Stifter Philipp (1622–1663), Sohn Hans d. J. von Sonderburg. Residenz Schloß Glücksburg an der Flensburger Förde. Eigene Münzprägung sporadisch unter Philipp (1632) und Christian (Taler 1672) sowie ein Ducat unter Philipp Ernst (1716) — sämtlich seltene Stücke. Linie erloschen 1779; das Herzogthum fiel an die dänische Krone."
    en: "First Glücksburg line of the Sonderburg dukes (1622–1779). Founded by Philipp (1622–1663), son of Hans the Younger of Sonderburg. Seat at Glücksburg Castle on Flensburg Fjord. Sporadic coinage under Philipp (1632) and Christian (Taler 1672), plus a Ducat under Philipp Ernst (1716) — all rare. Line extinct in 1779; the duchy reverted to the Danish Crown."
    uk: "Перша Глюксбурзька лінія Зондербурзьких герцогів (1622–1779). Засновник Філіп (1622–1663), син Ганса Молодшого Зондербурзького. Резиденція замок Глюксбург на Фленсбурзькій затоці. Спорадичне карбування за Філіпа (1632) і Христіяна (Талер 1672), плюс Дукат за Філіпа Ернста (1716) — усі рідкісні. Лінія згасла 1779; герцогство повернулось до данської корони."

rantzau_county:
  abbrev: "RZ"
  name:
    de: "Reichsgrafschaft Rantzau"
    en: "Imperial County of Rantzau"
    uk: "Імперське графство Ранцау"
  short:
    de: "Gft. Rantzau"
    en: "Rantzau County"
    uk: "Граф. Ранцау"
  description:
    de: "Reichsunmittelbare Grafschaft im südlichen Holstein (Barmstedt), 1650 von Christian zu Rantzau aus dem dänischen Lehnsbestand zur Reichsunmittelbarkeit erhoben. Eigene Münzprägung in Rantzau (Ducaten unter Christian, 1655–1657) und Barmstedt (Talern und Ducaten unter Detlef, 1689). 1726 erloschen, fiel an die dänische Krone (Holstein-Glückstadt)."
    en: "Reichsunmittelbar county in southern Holstein (Barmstedt), elevated to imperial immediacy in 1650 from the Danish feudal portfolio by Christian zu Rantzau. Own coinage at Rantzau (Ducats under Christian, 1655–1657) and Barmstedt (Talers and Ducats under Detlef, 1689). Extinct in 1726, reverted to the Danish Crown (Holstein-Glückstadt)."
    uk: "Безпосередньо імперське графство в південному Гольштейні (Бармштедт), 1650 року Христіян Ранцау підніс його до імперської безпосередності з данського ленного фонду. Власне карбування в Ранцау (Дукати за Христіяна, 1655–1657) і Бармштедті (Талери та Дукати за Детлефа, 1689). Згасло 1726, відійшло до данської корони (Гольштейн-Глюкштадт)."

prussian_province:
  abbrev: "PR"
  name:
    de: "Provinz Schleswig-Holstein (Preußen)"
    en: "Prussian Province of Schleswig-Holstein"
    uk: "Прусська провінція Шлезвіг-Гольштейн"
  short:
    de: "Preuß. Provinz"
    en: "Prussian Province"
    uk: "Пр. провінція"
  description:
    de: "Nach der Annexion vom 24. August 1866 als preußische Provinz integriert. Ab 1867 reichsdänische Münzen außer Kraft, ab 1871 Reichsgoldmünzen-Ära."
    en: "After the annexation of 24 August 1866 incorporated as a Prussian province. From 1867 the Danish coinage went out of use; the Reichsgoldmünzen era began in 1871."
    uk: "Після анексії 24 серпня 1866 інтегрована як прусська провінція. З 1867 данські монети виходять з обігу; з 1871 — епоха Reichsgoldmünzen."
hanseatic_hamburg:
  abbrev: HH
  name:
    de: Freie und Hansestadt Hamburg
    en: Free and Hanseatic City of Hamburg
    uk: Вільне ганзейське місто Гамбург
  short:
    de: Hansest. Hamburg
    en: Hans. Hamburg
    uk: Ганз. Гамбург
  description:
    de: Reichs- und später Hansestadt Hamburg, eigene Münzhoheit vom späten Mittelalter biß zur Reichseinigung 1871; Bankthaler / Speciesthaler / Mark-Courant-System.
    en: Imperial city, later Hanseatic city of Hamburg, with its own minting authority from the late Middle Ages until the 1871 imperial unification; Bankthaler / Speciesthaler / Mark-Courant system.
    uk: Вільне імперське, згодом ганзейське місто Гамбург з власним правом карбування від пізнього середньовіччя до імперського обʼєднання 1871; система Bankthaler / Speciesthaler / Mark Courant.
hanseatic_lubeck:
  abbrev: HL
  name:
    de: Freie und Hansestadt Lübeck
    en: Free and Hanseatic City of Lübeck
    uk: Вільне ганзейське місто Любек
  short:
    de: Hansest. Lübeck
    en: Hans. Lübeck
    uk: Ганз. Любек
  description:
    de: Hansestadt Lübeck, Vorort des Wendischen Münzvereins, eigene Münzhoheit biß 1871; Reichsthaler / Mark-Lübisch-System.
    en: Hanseatic city of Lübeck, hub of the Wendish Monetary Union, with its own minting authority until 1871; Reichsthaler / Mark-Lübisch system.
    uk: Ганзейське місто Любек, центр Вендського монетного союзу, з власним правом карбування до 1871; система Reichsthaler / Mark Lübisch.
fuerstbisthum_luebeck:
  abbrev: FBL
  name:
    de: Fürstbisthum Lübeck
    en: Prince-Bishopric of Lübeck
    uk: Князівство-єпископство Любек
  short:
    de: FBist. Lübeck
    en: Lübeck Bishop.
    uk: Княз. Любек
  description:
    de: Reichsfürstbisthum Lübeck mit Sitz in Eutin, ab 1586 als Sekundogenitur der Holstein-Gottorper Linie. Münzstätten Eutin und Kaltenhof. Säkularisiert 1803.
    en: Imperial prince-bishopric of Lübeck seated at Eutin, from 1586 a secundogeniture of the Holstein-Gottorp line. Mints at Eutin and Kaltenhof. Secularised in 1803.
    uk: Імперське князівство-єпископство Любек з резиденцією в Ойтіні, з 1586 — secundogeniture Гольштейн-Готторпської лінії. Монетні двори Ойтін і Кальтенхоф. Секуляризоване 1803.
erzbisthum_bremen_verden:
  abbrev: EBV
  name:
    de: Erzbisthum Bremen-Verden
    en: Archbishopric of Bremen-Verden
    uk: Архієпископство Бремен-Верден
  short:
    de: Erzbist. BV
    en: Bremen-Verden
    uk: Архієп. Бр.-Верд.
  description:
    de: Erzbisthum Bremen mit Bisthum Verden, Reichslehen. Münzstätten Bremervörde und Stade. Dänisch-administrierte Periode endet 1648; ab 1648 unter Schweden, ab 1712 dänisch und 1715 hannoversch.
    en: Archbishopric of Bremen with Bishopric of Verden, imperial fief. Mints at Bremervörde and Stade. The Danish-administered period ends in 1648; from 1648 Swedish, then Danish (1712) and Hanoverian (1715).
    uk: Архієпископство Бремен з єпископством Верден, імперський лен. Монетні двори Бремерферде та Штаде. Данський адміністративний період закінчується 1648; з 1648 — шведський, потім данський (1712) і ганноверський (1715).
landgrafschaft_hessen_kassel:
  abbrev: HK
  name:
    de: Landgrafschaft Hessen-Kassel
    en: Landgraviate of Hesse-Kassel
    uk: Ландграфство Гессен-Кассель
  short:
    de: Lgft. Hessen-K.
    en: Hesse-Kassel
    uk: Ландг. Гессен-К.
  description:
    de: Landgrafschaft Hessen-Kassel (ab 1803 Kurfürstentum). Hauptmünze Kassel. Personalunion mit Schweden 1730–1751 unter Frederik I.
    en: Landgraviate of Hesse-Kassel (from 1803 Electorate). Main mint at Kassel. Personal union with Sweden 1730–1751 under Frederik I.
    uk: Ландграфство Гессен-Кассель (з 1803 курфюрство). Головний монетний двір у Касселі. Особиста унія зі Швецією 1730–1751 за Фредерика I.
hochstift_osnabrueck:
  abbrev: OS
  name:
    de: Hochstift Osnabrück
    en: Prince-Bishopric of Osnabrück
    uk: Князівство-єпископство Оснабрюк
  short:
    de: Hochst. Osnabr.
    en: Osnabrück Bishop.
    uk: Княз. Оснабрюк
  description:
    de: Reichsunmittelbares Hochstift Osnabrück. Ab 1648 alternierende katholische / lutherische Besetzung (Welfen-Linie) per Westfälischem Frieden. Säkularisiert 1803.
    en: Reichsunmittelbar prince-bishopric of Osnabrück. From 1648 alternating Catholic / Lutheran (Welf line) episcopal succession per the Peace of Westphalia. Secularised in 1803.
    uk: Безпосередньо імперське князівство-єпископство Оснабрюк. З 1648 чергування католицького / лютеранського (вельфська лінія) спадкоємства за Вестфальським миром. Секуляризоване 1803.
german_empire:
  abbrev: DR
  name:
    de: Deutsches Reich
    en: German Empire
    uk: Німецька імперія
  short:
    de: Dt. Reich
    en: German Empire
    uk: Нім. імперія
  description:
    de: Vereinigtes Deutsches Reich ab 1871 — einheitliche Reichswährung (Mark zu 100 Pfennig) per Münzgesetz vom 4. Dezember 1871; Goldtier nach dem Reichsgoldmünzfuß (139½ Zehnmarkstücke aus 1 Pfund Feingold, .900). Reichsweite Karbung bis zum Edelmetall-Anker-Ende 1914.
    en: Unified German Empire from 1871 — single imperial currency (Mark of 100 Pfennig) under the Coinage Act of 4 December 1871; gold tier on the Reichsgoldmünzfuß (139½ ten-mark pieces from 1 pound fine gold, .900). Reich-wide coinage until the precious-metal-anchor end in 1914.
    uk: Обʼєднана Німецька імперія з 1871 — єдина імперська валюта (марка зі 100 пфенігів) за Законом про монету 4 грудня 1871; золотий тир за Reichsgoldmünzfuß (139½ десятимаркових монет з 1 фунта чистого золота, .900). Загальноімперське карбування до кінця епохи дорогоцінно-металевого анкера 1914.

grafschaft_oldenburg:
  abbrev: OLD
  name:
    de: Grafschaft / Herzogthum Oldenburg
    en: County / Duchy of Oldenburg
    uk: Графство / Герцогство Ольденбург
  short:
    de: Gft. Oldenburg
    en: Oldenburg
    uk: Графство Олденбург
  description:
    de: Grafschaft Oldenburg-Delmenhorst (1180–1667) — danach an Dänemark; 1774 als Herzogthum Oldenburg neu geschaffen (an Holstein-Gottorper Linie). Münzstätten Oldenburg und Jever.
    en: County of Oldenburg-Delmenhorst (1180–1667) — then to Denmark; 1774 re-established as the Duchy of Oldenburg (to the Holstein-Gottorp line). Mints at Oldenburg and Jever.
    uk: Графство Ольденбург-Дельменхорст (1180–1667) — потім до Данії; 1774 відновлене як герцогство Ольденбург (Гольштейн-Готторпській лінії). Монетні двори Ольденбург і Євер.
herzogtum_braunschweig_lueneburg:
  abbrev: BL
  name:
    de: Herzogthum Braunschweig-Lüneburg (Wolfenbüttel)
    en: Duchy of Brunswick-Lüneburg (Wolfenbüttel)
    uk: Герцогство Брауншвейг-Люнебург (Вольфенбюттель)
  short:
    de: Hzgt. BL-W.
    en: BL-Wolfenbüttel
    uk: Герц. БЛ-В.
  description:
    de: Linie Wolfenbüttel der Welfen-Herzöge. Hauptmünzstätte Wolfenbüttel. Christian IV. von Dänemark prägt hier 1627 als Wahrer der niedersächsischen Reichsstandschaft.
    en: Wolfenbüttel branch of the Welf dukes. Main mint Wolfenbüttel. Christian IV of Denmark mints here in 1627 as guardian of the Lower Saxon imperial estate.
    uk: Лінія Вольфенбюттель вельфських герцогів. Головний монетний двір Вольфенбюттель. Христіян IV Данський карбує тут 1627 як охоронець нижньосаксонського імперського стану.
herzogtum_sachsen_lauenburg:
  abbrev: SL
  name:
    de: Herzogthum Sachsen-Lauenburg
    en: Duchy of Saxe-Lauenburg
    uk: Герцогство Саксен-Лауенбург
  short:
    de: Hzgt. SL.
    en: Saxe-Lauenburg
    uk: Герц. С.-Л.
  description:
    de: Reichsherzogtum Sachsen-Lauenburg. Hannoversche Personalunion 1689–1814; ab 1815 dänische Personalunion biß zur Gasteiner Konvention 1864 (an Preußen).
    en: Imperial Duchy of Saxe-Lauenburg. Personal union with Hanover 1689–1814; from 1815 Danish personal union until the 1864 Gastein Convention (to Prussia).
    uk: Імперське герцогство Саксен-Лауенбург. Особиста унія з Ганновером 1689–1814; з 1815 данська особиста унія до Гаштайнської конвенції 1864 (до Пруссії).
grafschaft_schaumburg:
  abbrev: SBG
  name:
    de: Grafschaft Schaumburg
    en: County of Schaumburg
    uk: Графство Шаумбург
  short:
    de: Gft. Schaumburg
    en: Schaumburg County
    uk: Графство Шаумбург
  description:
    de: 'Niedersächsische Stammgrafschaft der Schauenburger Linie (heute Landkreis Schaumburg) mit den Müntzstätten Stadthagen, Bückeburg, Rinteln und Oldendorf. Geprägt wurde in der Tradition des Niedersächsischen Reichskreises zu 36 Mariengroschen auf den Reichsthaler — Mariengroschen, Fürstengroschen und Arendschilling. Die holsteinische Hälfte der Schauenburger Lande (Grafschaft Pinneberg) bildet die eigene Grafschaft Holstein-Schaumburg-Pinneberg; beide Teile wurden 1601-1622 unter Ernst III. gemeinsam regiert, die Linie erlosch 1640 mit Otto V.'
    en: 'Lower Saxon ancestral county of the Schauenburg line (today Landkreis Schaumburg) with the mints at Stadthagen, Bückeburg, Rinteln and Oldendorf. Coinage followed the Lower Saxon Imperial Circle''s tradition of 36 Mariengroschen to the Reichsthaler — Mariengroschen, Fürstengroschen and Arendschilling. The Holstein half of the Schauenburg lands (County of Pinneberg) forms the separate County of Holstein-Schauenburg-Pinneberg; both parts were ruled jointly by Ernst III in 1601-1622, the line dying out in 1640 with Otto V.'
    uk: 'Нижньосаксонське родове графство династії Шауенбург (сучасний Landkreis Шаумбург) з монетними дворами Stadthagen, Bückeburg, Rinteln та Oldendorf. Карбування велося за традицією Нижньосаксонського імперського округу — 36 Mariengroschen на Reichsthaler: Mariengroschen, Fürstengroschen та Arendschilling. Гольштейнська половина шауенбурзьких земель (графство Піннеберг) утворює окреме графство Гольштейн-Шауенбург-Піннеберг; обидві частини правилися спільно Ернстом III у 1601-1622 рр., лінія згасла 1640 р. з Отто V.'

# ---------------------------------------------------------------------------
# Out-of-scope foreign issuers. A coin struck in a German mint on contract
# (Auftragsprägung) but ISSUED by a foreign state is attributed to its real
# issuer here, so the assembly's issuing-entity intersection guard keeps it
# off the German location pages. These entities have no location page of their
# own — nothing `consumes` them, so their coins render nowhere.
# ---------------------------------------------------------------------------
romania:
  out_of_scope: true   # foreign issuer, no romania.yml by design (audit I1 exempt)
  abbrev: RO
  name:
    de: Königreich Rumänien
    en: Kingdom of Romania
    uk: Королівство Румунія
  short:
    de: Rumänien
    en: Romania
    uk: Румунія
  description:
    de: Königreich Rumänien (ab 1881). Die 20-Lei-Goldmünze Carols I. wurde 1883 in Hamburg geschlagen.
    en: Kingdom of Romania (from 1881). The 20-Lei gold coin of Carol I was struck in Hamburg in 1883.
    uk: Королівство Румунія (від 1881). Золоту монету 20 леїв Кароля I карбовано в Гамбурзі 1883 року.
