        <b>Wikipedia (de)</b>: <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a> (unabhängige Bestätigung des Christian-IV.-Krone-Standards 1618: Raugewicht 2 Krone ca. 37,8 g · Durchmesser 46 mm · Feingehalt <b>13 3/4 lötig</b> = 13 Loth 12 Grän = .8594 · Feinsilber pro 2 Krone ca. 32,5 g · Tarif zunächst 1½ Reichstaler · Reduktion auf 1⅓ Reichstaler erst <b>1625</b> · Münzgewinn der Krone bei der Reduktion ca. 11 % · Subeinheit: 1 Corona Danica = 96 Kroneskilling · Prägezeitraum 1618–1624, teilweise bis 1625 · «Bis 1644 wurden wieder überwiegend ›Skilling Danske‹ geprägt» — Beleg für die 19-jährige Pause der Krone-Prägung)
      en: |
        <b>Wikipedia (de)</b>: <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a> (independent confirmation of the Christian IV Krone standard, 1618: 2 Krone rough weight ca. 37.8 g · diameter 46 mm · fineness <b>13 3/4 lötig</b> = 13 Loth 12 Grän = .8594 · fine silver per 2 Krone ca. 32.5 g · tariff initially 1½ Reichstaler · reduction to 1⅓ Reichstaler only in <b>1625</b> · the Crown's mint gain on the reduction ca. 11 % · subunit: 1 Corona Danica = 96 Kroneskilling · production 1618–1624, partly into 1625 · «Until 1644, predominantly ‹Skilling Danske› were struck again» — evidence for the 19-year hiatus in Krone production)
      uk: |
        <b>Wikipedia (de)</b>: <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a> (незалежне підтвердження стандарту Krone Кристіана IV, 1618: повна вага 2 Krone бл. 37,8 г · діаметр 46 мм · проба <b>13 3/4 lötig</b> = 13 Loth 12 Grän = .8594 · чисте срібло на 2 Krone бл. 32,5 г · початковий тариф 1½ Рейхсталер · зниження до 1⅓ Рейхсталер лише <b>1625</b> · монетний прибуток Корони від редукції ~11 % · субодиниця: 1 Corona Danica = 96 Kroneskilling · карбування 1618–1624, частково до 1625 · «До 1644 знову переважно карбувалися ›Skilling Danske‹» — свідчення 19-річної перерви карбування Krone)
  - id: ref22
    content:
      de: |
        <b>Schrötter, Friedrich Frhr. v. (Hg.) — N. Bauer, K. Regling, A. Suhle, R. Vasmer, J. Wilcke</b>: <i>Wörterbuch der Münzkunde</i>. Verlag von Walter de Gruyter & Co., Berlin 1930, S. 113–114, Eintrag «Corona Danica» — Online: <a href="https://archive.org/details/worterbuchdermun007491mbp" target="_blank">archive.org/details/worterbuchdermun007491mbp</a> (das numismatische Standardwörterbuch der Zwischenkriegszeit; <b>primäre Quelle</b> für die Wikipedia-Zahlen. Wörtliches Zitat: «Er gab die corona danica … — die spätere Doppelkrone — für 1½ Species (Reichstaler) aus, wodurch er einen Gewinn von 11½% erzielte. Sie war 13¾ lötig und hielt nur 32,5 g Silber, während 1½ Species 38,7 g Silber hielten. … Im Jahre 1625 mußte die Krone auf 1⅓ Species herabgesetzt werden.». Wichtige Klarstellung: <b>«Corona Danica» bezeichnet im Sprachgebrauch der Zeit die Doppelkrone (= 2 Krone) als Hauptmünze der Reform; einzelne Krone-Stücke (½ × Doppelkrone) entsprechen ¾ Species 1618–1624 bzw. ⅔ Species ab 1625</b>)
      en: |
        <b>Schrötter, Friedrich Frhr. v. (ed.) — N. Bauer, K. Regling, A. Suhle, R. Vasmer, J. Wilcke</b>: <i>Wörterbuch der Münzkunde</i>. Walter de Gruyter & Co., Berlin 1930, pp. 113–114, entry «Corona Danica» — Online: <a href="https://archive.org/details/worterbuchdermun007491mbp" target="_blank">archive.org/details/worterbuchdermun007491mbp</a> (the standard inter-war numismatic dictionary; <b>primary source</b> for the Wikipedia figures. Verbatim quote: «He issued the corona danica … — the later Doppelkrone — for 1½ Species (Reichstaler), gaining 11½% by doing so. It was 13¾ Loth fine and contained only 32.5 g of silver, while 1½ Species contained 38.7 g of silver. … In the year 1625 the Krone had to be reduced to 1⅓ Species». Important clarification: <b>«Corona Danica» in the period sense denotes the Doppelkrone (= 2 Krone) as the principal coin of the reform; single Krone pieces (½ × Doppelkrone) correspond to ¾ Species 1618–1624 and ⅔ Species from 1625</b>)
      uk: |
        <b>Schrötter, Friedrich Frhr. v. (ред.) — N. Bauer, K. Regling, A. Suhle, R. Vasmer, J. Wilcke</b>: <i>Wörterbuch der Münzkunde</i>. Verlag von Walter de Gruyter & Co., Berlin 1930, с. 113–114, стаття «Corona Danica» — Онлайн: <a href="https://archive.org/details/worterbuchdermun007491mbp" target="_blank">archive.org/details/worterbuchdermun007491mbp</a> (стандартний нумізматичний словник міжвоєнної доби; <b>первинне джерело</b> для цифр Wikipedia. Цитата дослівно: «Er gab die corona danica … — die spätere Doppelkrone — für 1½ Species (Reichstaler) aus, wodurch er einen Gewinn von 11½% erzielte. Sie war 13¾ lötig und hielt nur 32,5 g Silber, während 1½ Species 38,7 g Silber hielten. … Im Jahre 1625 mußte die Krone auf 1⅓ Species herabgesetzt werden.». Важливе уточнення: <b>«Corona Danica» у термінології епохи означає Доппелькрону (= 2 Krone) як головну монету реформи; одиночні Krone (½ × Доппелькрона) відповідають ¾ Species у 1618–1624 та ⅔ Species з 1625</b>)

  - id: ref23
    content:
      de: |
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, Nordisk Numismatisk Unions Medlemsblad (NNUM) 1957, S. 129–134 — Online: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Klassische Synthese der drei dänischen Krone-Münzformeln auf Grundlage von Wilcke I (<i>Christian IV's Møntpolitik 1588–1625</i>, København 1919) und Wilcke II (<i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i>, København 1924). Wörtlich: «<i>Christian IV's kroner, hvis formel blev fulgt 1618-1652: 12 257/700 stykker på den 13 3/4 lødige (0.859) mark (bruttovægt 18.909g, finvægt 16.250g). De «grove kroner», indført i Norge 1649 og i Danmark 1652 og sidst slået 1732: 10 1/2 stykker på den 10 3/4 lødige (0.672) mark (bruttovægt 22.272g, finvægt 14.964g). De «fine» kroner, indført 1693 og sidst slået 1771: 13 stykker på den 13 1/3 lødige (0.833) mark (bruttovægt 17.988 g, finvægt 14.984g)</i>». Note (1): «<i>1618 blev kun 2 kronen (da kaldet krone) slået efter denne formel. 1/1, 1/2, 1/4 og 1/8 kronen blev slået efter en lidt ringere møntfod (Wilcke I p. 152). 1619 og derefter blev også hel- og halvkronerne slået efter ovennævnte formel.</i>» Diese Quelle liefert die primärkanonischen Werte für alle drei Krone-Münzformel-Tabellen. Für H105 (2 Krone Corona Danica 1618–1619): 37,819 g rau, .859 Feingehalt, 32,500 g fein, «Marken fin udbragt til 10,793 daler»; H124 (1624, nach Forordning 14. Februar 1624): identische physische Münze, daler-Ausbringung 10,361 wegen Specie-Neutarifierung auf 100 Skilling.
      en: |
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, Nordisk Numismatisk Unions Medlemsblad (NNUM) 1957, pp. 129–134 — Online: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Classic synthesis of the three Danish Krone formulae, drawing on Wilcke I (<i>Christian IV's Møntpolitik 1588–1625</i>, Copenhagen 1919) and Wilcke II (<i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i>, Copenhagen 1924). Verbatim: «<i>Christian IV's kroner, whose formula was followed 1618-1652: 12 257/700 pieces per 13 3/4 lødig (0.859) mark (rough weight 18.909g, fine weight 16.250g). De «grove kroner», introduced in Norway 1649 and in Denmark 1652 and last struck 1732: 10 1/2 pieces per 10 3/4 lødig (0.672) mark (rough weight 22.272g, fine weight 14.964g). De «fine» kroner, introduced 1693 and last struck 1771: 13 pieces per 13 1/3 lødig (0.833) mark (rough weight 17.988 g, fine weight 14.984g)</i>». Note (1): «<i>In 1618 only the 2 Krone (then called «krone») was struck on this formula. The 1/1, 1/2, 1/4 and 1/8 Krone were struck on a slightly lower møntfod (Wilcke I p. 152). From 1619 onwards the 1/1 and 1/2 Krone were also struck on the above formula.</i>» This source supplies the primary canonical values for all three Krone-standard tables. For H105 (2 Krone Corona Danica 1618–1619): 37.819 g rough, .859 fineness, 32.500 g fine, «Marken fin udbragt til 10.793 daler»; H124 (1624, post Forordning 14 February 1624): physically the same coin, daler-udbringning 10.361 due to the Specie being re-rated at 100 skilling.
      uk: |
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, Nordisk Numismatisk Unions Medlemsblad (NNUM) 1957, с. 129–134 — Онлайн: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Класичний синтез трьох данських Krone-формул на основі Wilcke I (<i>Christian IV's Møntpolitik 1588–1625</i>, Копенгаген 1919) та Wilcke II (<i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i>, Копенгаген 1924). Дослівно: «<i>Christian IV's kroner, формули якої дотримувалися 1618-1652: 12 257/700 штук на 13 3/4 lødig (0.859) марку (повна вага 18.909 г, чиста 16.250 г). «Grove kroner», запроваджена у Норвегії 1649 р. і в Данії 1652 р., востаннє карбована 1732 р.: 10 1/2 штук на 10 3/4 lødig (0.672) марку (повна вага 22.272 г, чиста 14.964 г). «Fine» kroner, запроваджена 1693 р., востаннє карбована 1771 р.: 13 штук на 13 1/3 lødig (0.833) марку (повна вага 17.988 г, чиста 14.984 г)</i>». Примітка (1): «<i>1618 р. за цією формулою карбувалась лише 2 Krone (тоді названа «krone»). 1/1, 1/2, 1/4 та 1/8 Krone карбувалися за дещо нижчою møntfod (Wilcke I с. 152). З 1619 р. і 1/1, і 1/2 Krone теж карбувались за вищезгаданою формулою.</i>» Це джерело дає першоджерельні канонічні значення для всіх трьох Krone-таблиць. Для H105 (2 Krone Corona Danica 1618–1619): 37,819 г повної ваги, .859 проби, 32,500 г чистого, «Marken fin udbragt til 10,793 daler»; H124 (1624, після Forordning 14 лютого 1624 р.): фізично та сама монета, daler-udbringning 10,361 через перетарифування Specie на 100 skilling.
