id: lauenburg
name:
  de: Herzogthum Sachsen-Lauenburg
  en: Duchy of Saxe-Lauenburg
  uk: Герцогство Саксен-Лауенбург
summary:
  de: 'Reichsherzogtum Sachsen-Lauenburg, ab 1689 unter Hannoveraner Personalunion, ab 1815 (Wiener Kongreß) unter dänischer Krone in Personalunion biß 1864 (Gasteiner Konvention → Preußen). Eigene Münzprägung in Altona-Mint nach lauenburgischem Konventionsfuß-Standard. <em>Stub-Datei: 1 Münze aus Bruun seed-importiert; Müntzfuß deferred — siehe docs/TODO.md item E.</em>'
  en: 'Imperial Duchy of Saxe-Lauenburg, in personal union with Hanover from 1689, then with the Danish crown from 1815 (Congress of Vienna) until 1864 (Gastein Convention → Prussia). Distinct Lauenburg-Konventionsfuß coinage at the Altona mint. <em>Stub file: 1 coin seed-imported from Bruun; Müntzfuß deferred — see docs/TODO.md item E.</em>'
  uk: 'Імперське герцогство Саксен-Лауенбург, з 1689 в особистій унії з Ганновером, з 1815 (Віденський конгрес) під данською короною в особистій унії до 1864 (Гаштайнська конвенція → Пруссія). Окреме лауенбурзьке Konventionsfuß-карбування на Альтонському монетному дворі. <em>Stub-файл: 1 монета seed-імпортована з Bruun; Müntzfuß відкладено — див. docs/TODO.md item E.</em>'
