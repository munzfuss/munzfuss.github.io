      de: |
        <b>Königliche Münze zu Altona</b> — Wikipedia (de): <a href="https://de.wikipedia.org/wiki/K%C3%B6nigliche_M%C3%BCnze_zu_Altona" target="_blank">de.wikipedia.org/wiki/Königliche_Münze_zu_Altona</a>. Beleg zur Gründung der Münze 1771 durch Christian VII. (Konzession: kgl. Rescript vom 18. April 1768; Bauausführung Johann Gottfried Rosenberg). Vor 1771 hatte Holstein keine eigene Prägestätte für Kurantmøntfod-Nominale; die Forordning Kurantmøntfod 1726 war zwar in Holstein gültig, aber die kuranten Rigsdaler kamen aus Kopenhagen. Die Altonaer Münze gewinnt mit der Schleswig-Holsteinischen Münzreform 1788 ihre Hauptbedeutung als Hauptprägestätte für die holsteinischen Speciedaler und Courant-Münzen; geschlossen 1863, vor Einführung des Reichsgoldmünzfußes 1871.
      en: |-
        <b>Königliche Münze zu Altona (Royal Mint of Altona)</b> — Wikipedia (de): <a href="https://de.wikipedia.org/wiki/K%C3%B6nigliche_M%C3%BCnze_zu_Altona" target="_blank">de.wikipedia.org/wiki/Königliche_Münze_zu_Altona</a>. Source for the mint's foundation in 1771 by Christian VII (concession: royal rescript of 18 April 1768; building by Johann Gottfried Rosenberg). Before 1771, Holstein had no local mint for Kurantmøntfod denominations; the Forordning Kurantmøntfod of 1726 was in force in Holstein, but Kurant-Rigsdaler were struck in Copenhagen. The Altona mint becomes the main producing mint for the Holstein Speciedaler and Courant coinage after the Schleswig-Holstein currency reform of 1788; closed in 1863, before the introduction of the Reichsgoldmünzfuß in 1871.
      uk: |-
        <b>Королівський монетний двір в Альтоні</b> — Wikipedia (de): <a href="https://de.wikipedia.org/wiki/K%C3%B6nigliche_M%C3%BCnze_zu_Altona" target="_blank">de.wikipedia.org/wiki/Königliche_Münze_zu_Altona</a>. Джерело про заснування двору 1771 р. Кристіаном VII (концесія: королівський рескрипт 18 квітня 1768; будівництво — Johann Gottfried Rosenberg). До 1771 р. Гольштейн не мав власного двору для номіналів Kurantmøntfod; Forordning Kurantmøntfod 1726 діяв у Гольштейні, але курантні Rigsdaler карбували в Копенгагені. Альтонський двір набуває головного значення після Шлезвіг-Гольштинської монетної реформи 1788 р. як основна установа для Speciedaler і Courant-монет Гольштейну; зачинено 1863 р., ще до запровадження Reichsgoldmünzfuß 1871 р.

  - id: ref27
    content:
      de: |
        <b>Münzgesetz vom 4. Dezember 1871</b> · Reichsgesetz zur Einführung der Goldwährung (Goldmark) im Deutschen Kaiserreich. Definiert den Reichsgoldmünzfuß: «<i>Aus einem Pfunde feinen Goldes werden 139½ Zehnmarkstücke ausgeprägt</i>» (= 1395 Mark je Zollpfund Feingold = 500 g; 900 ‰ Feingehalt). Übernimmt das Zollpfund (500 g) des Wiener Münzvertrags 1857 als Bezugseinheit. Goldnominale: 5, 10 und 20 Mark. Geprägt an acht Reichsmünzstätten — Berlin (A), Hannover (B), Frankfurt am Main (C), München (D), Dresden (E), Stuttgart (F), Karlsruhe (G), Hamburg (J). Beendet die 312-jährige Geltung des Reichsdukatenfußes (Augspurger Reichsmünzordnung 1559). Praktisch beendet durch die Reichsbank-Goldsuspendierung 4. August 1914 zu Kriegsbeginn; formal abgelöst 1924 durch Reichsmark / Rentenmark. Zusammenfassende Sekundärquelle: <a href="https://de.wikipedia.org/wiki/Goldmark" target="_blank">de.wikipedia.org/wiki/Goldmark</a>.
      en: |-
        <b>Münzgesetz of 4 December 1871</b> · imperial law introducing the gold currency (Goldmark) in the German Empire. Defines the Reichsgoldmünzfuß: «<i>Aus einem Pfunde feinen Goldes werden 139½ Zehnmarkstücke ausgeprägt</i>» (= 1,395 Mark per Zollpfund of fine gold = 500 g; 900‰ fineness). Carries forward the Zollpfund (500 g) of the Vienna Monetary Treaty of 1857 as the reference unit. Gold denominations: 5, 10 and 20 Mark. Struck at eight imperial mints — Berlin (A), Hannover (B), Frankfurt am Main (C), Munich (D), Dresden (E), Stuttgart (F), Karlsruhe (G), Hamburg (J). Ends the 312-year run of the Reichsdukatenfuß (Augsburg Imperial Coinage Ordinance, 1559). Practically ended by the Reichsbank's suspension of gold redemption on 4 August 1914 at the outbreak of war; formally replaced in 1924 by the Reichsmark / Rentenmark. Summary secondary source: <a href="https://de.wikipedia.org/wiki/Goldmark" target="_blank">de.wikipedia.org/wiki/Goldmark</a>.
      uk: |-
        <b>Закон про монету від 4 грудня 1871 р.</b> · імперський закон про запровадження золотої валюти (Goldmark) у Німецькій імперії. Визначає Reichsgoldmünzfuß: «<i>Aus einem Pfunde feinen Goldes werden 139½ Zehnmarkstücke ausgeprägt</i>» (= 1395 марок з 1 цольфунта чистого золота = 500 г; проба 900 ‰). Переймає цольфунт (500 г) Віденської монетної конвенції 1857 р. як одиницю відліку. Золоті номінали: 5, 10 і 20 Mark. Карбувалися у восьми імперських монетних дворах — Берлін (A), Ганновер (B), Франкфурт-на-Майні (C), Мюнхен (D), Дрезден (E), Штутгарт (F), Карлсруе (G), Гамбург (J). Завершує 312-річну дію Reichsdukatenfuß (Авґсбурзький імперський монетний ордонанс 1559 р.). Практично припинений Reichsbank-ом 4 серпня 1914 р. на початку війни; формально замінено 1924 р. Reichsmark / Rentenmark. Зведене вторинне джерело: <a href="https://de.wikipedia.org/wiki/Goldmark" target="_blank">de.wikipedia.org/wiki/Goldmark</a>.

