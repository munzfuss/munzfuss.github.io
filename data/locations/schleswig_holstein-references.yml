        <b>Ingvardson, Gitte Tarnow & Märcher, Michael</b>: <i>Christian 4.s guldmønt fra Esrum Møllegård</i>. In: M. Andersen & P. O. Nielsen (red.), <i>Danefæ – Skatte fra den danske muld: til Hendes Majestæt Dronning Margrethe 2</i>. København: Nationalmuseet 2010, S. 254–257 — bibliografischer Eintrag: <a href="https://portal.research.lu.se/en/publications/christian-4s-guldm%C3%B8nt-fra-esrum-m%C3%B8lleg%C3%A5rd" target="_blank">portal.research.lu.se/Christian 4 guldmønt Esrum Møllegård</a>. Peer-reviewed Beleg für drei <b>Doppelguldkrone Christians IV. von 1628</b> (Hede 28), gefunden auf den Feldern um Esrum Kloster und Esrum Møllegård (Detektor 2008/2011, Grabung Gilleleje Museum). Aus 12 weltweit bekannten Exemplaren des Typs hält das Nationalmuseet 5, davon 3 aus Esrum (≈ 25 % des erhaltenen Korpus); erster dokumentierter Fundort für diesen Typ. <b>Bedeutung:</b> belegt, daß die Christian-IV.-Guldkrone-Karbung biß mindestens 1628 lief, also über die Wikipedia-DE-«Corona-Danica»-Phase 1618–1622 hinaus.
      en: |-
        <b>Ingvardson, Gitte Tarnow & Märcher, Michael</b>: <i>Christian 4.s guldmønt fra Esrum Møllegård</i>. In: M. Andersen & P. O. Nielsen (eds.), <i>Danefæ – Skatte fra den danske muld: til Hendes Majestæt Dronning Margrethe 2</i>. Copenhagen: Nationalmuseet 2010, pp. 254–257 — bibliographical record: <a href="https://portal.research.lu.se/en/publications/christian-4s-guldm%C3%B8nt-fra-esrum-m%C3%B8lleg%C3%A5rd" target="_blank">portal.research.lu.se/Christian 4 guldmønt Esrum Møllegård</a>. Peer-reviewed source for three <b>Christian IV double Guldkroner of 1628</b> (Hede 28), found in the fields around Esrum Abbey and Esrum Møllegård (detector finds 2008/2011, follow-up Gilleleje Museum excavation). Of the 12 known specimens of this type worldwide, the National Museum holds 5, of which 3 from Esrum (≈ 25 % of the surviving corpus); first documented find spot for the type. <b>Significance:</b> establishes that Christian IV Guldkrone production ran at least until 1628, beyond the Wikipedia DE «Corona Danica» 1618–1622 phase.
      uk: |-
        <b>Ingvardson, Gitte Tarnow & Märcher, Michael</b>: <i>Christian 4.s guldmønt fra Esrum Møllegård</i>. У: M. Andersen & P. O. Nielsen (ред.), <i>Danefæ – Skatte fra den danske muld: til Hendes Majestæt Dronning Margrethe 2</i>. Копенгаген: Nationalmuseet 2010, с. 254–257 — бібліографічний запис: <a href="https://portal.research.lu.se/en/publications/christian-4s-guldm%C3%B8nt-fra-esrum-m%C3%B8lleg%C3%A5rd" target="_blank">portal.research.lu.se/Christian 4 guldmønt Esrum Møllegård</a>. Рецензоване джерело про три <b>подвійні Guldkrone Кристіана IV 1628 р.</b> (Hede 28), знайдені на полях довкола Esrum Kloster і Esrum Møllegård (детекторні знахідки 2008/2011 рр., наступні розкопки Gilleleje Museum). Із 12 відомих у світі екземплярів цього типу Nationalmuseet тримає 5, з них 3 з Esrum (≈ 25 % збереженого корпусу); перше задокументоване місце знахідки для типу. <b>Значення:</b> доводить, що карбування Guldkrone Кристіана IV тривало щонайменше до 1628 р., виходячи за межі Wikipedia-DE-фази «Corona Danica» 1618–1622.

