      de: |
        <b>Forordning om Forandring i Pengevæsenet, 5. januar 1813</b> · primärrechtlicher Text der dänischen Münzreform nach dem Staatsbankrott — Online (danmarkshistorien.dk, Aarhus Universitet): <a href="https://danmarkshistorien.lex.dk/Forordning_om_Forandring_i_Pengev%C3%A6senet,_5._januar_1813" target="_blank">danmarkshistorien.lex.dk/Forordning…1813</a>. <b>§5</b> setzt den Müntzfuß: «<i>18½ Rigsbankdaler udpræges af 1 Mark fiint Sølv, Cøllnsk Vægt</i>». <b>§10</b> setzt den Rücknahmekurs: <b>1 Speciedaler = 2 Rigsbankdaler</b> (bzw. 100 Rigsdaler Specie = 200 Rigsbankdaler). Damit ist die Beziehung 1 Rigsbankdaler = ½ Thaler Species im Forordnungstext direkt verankert; die Müntzfuß-Wahl 18½ ergibt diese Beziehung als rechnerische Folge (9¼ × 2 = 18½ je Cöllnischer Marck).
      en: |
        <b>Forordning om Forandring i Pengevæsenet, 5 January 1813</b> · primary-law text of the Danish monetary reform following the state bankruptcy — Online (danmarkshistorien.dk, Aarhus University): <a href="https://danmarkshistorien.lex.dk/Forordning_om_Forandring_i_Pengev%C3%A6senet,_5._januar_1813" target="_blank">danmarkshistorien.lex.dk/Forordning…1813</a>. <b>§5</b> sets the standard: «<i>18½ Rigsbankdaler udpræges af 1 Mark fiint Sølv, Cøllnsk Vægt</i>» (18½ Rigsbankdaler are struck from 1 mark of fine silver, Cologne weight). <b>§10</b> sets the redemption rate: <b>1 Speciedaler = 2 Rigsbankdaler</b> (i.e. 100 Rigsdaler Specie = 200 Rigsbankdaler). Thereby the relation 1 Rigsbankdaler = ½ Thaler Species is anchored in the text of the Forordning itself; the choice of 18½ as Müntzfuß yields that relation as an arithmetic consequence (9¼ × 2 = 18½ per Cologne mark).
      uk: |
        <b>Forordning om Forandring i Pengevæsenet, 5 січня 1813 р.</b> · текст первинного закону данської монетної реформи після державного банкрутства — Онлайн (danmarkshistorien.dk, Орхуський університет): <a href="https://danmarkshistorien.lex.dk/Forordning_om_Forandring_i_Pengev%C3%A6senet,_5._januar_1813" target="_blank">danmarkshistorien.lex.dk/Forordning…1813</a>. <b>§5</b> встановлює стопу: «<i>18½ Rigsbankdaler udpræges af 1 Mark fiint Sølv, Cøllnsk Vægt</i>» (18½ Rigsbankdaler карбується з 1 марки чистого срібла кельнської ваги). <b>§10</b> встановлює курс викупу: <b>1 Speciedaler = 2 Rigsbankdaler</b> (тобто 100 Rigsdaler Specie = 200 Rigsbankdaler). Тим самим співвідношення 1 Rigsbankdaler = ½ Thaler Species закріплене безпосередньо в тексті Forordning; вибір 18½ як Müntzfuß дає це співвідношення як арифметичний наслідок (9¼ × 2 = 18½ на кельнську марку).

