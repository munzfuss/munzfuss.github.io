        <b>Wilcke, Julius</b>: <i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i> (Wilcke II). København 1924 — Verweis-Sektion <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. <b>Primary attestation des Patents 12. Juli 1618</b> (Wilcke II Anm. 53 verbatim): «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden, ligesom ogsaa i de to Forørdninger af 4. Juli 1616 og 1. Maj 1618 om Dalerens Forhøjelse til 80 og 84 ß d., henvises til, at Markerne saa let eftergjordes af fremmede og Udlendiske…</i>». Wilcke II verweist auf Wilcke I S. 156–157 (mit Bezug auf S. 142–143) als Primärquelle. — Im Patent von 1618 trägt die Münze noch nicht den Latin-Namen «Corona Danica», sondern wird als <b>«1½-Specie» / «¾-Specie» (Krone / ½-Krone)</b> beschrieben. — Wichtige Klarstellung: Hede 1957 (Anm. 1) zitiert Wilcke I <b>S. 152</b> NICHT für das Patent, sondern für die abweichende Müntzfod der 1618er Kleinmünzen.
      en: |-
        <b>Wilcke, Julius</b>: <i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i> (Wilcke II). Copenhagen 1924 — reference page <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. <b>Primary attestation of the 12 July 1618 patent</b> (Wilcke II note 53 verbatim): «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden, ligesom ogsaa i de to Forørdninger af 4. Juli 1616 og 1. Maj 1618 om Dalerens Forhøjelse til 80 og 84 ß d., henvises til, at Markerne saa let eftergjordes af fremmede og Udlendiske…</i>». Wilcke II points to Wilcke I pp. 156–157 (with cross-reference to pp. 142–143) as the primary source. — In the 1618 patent the coin does not yet carry the Latin name «Corona Danica»; it is described as <b>«1½-Specie» / «¾-Specie» (Krone / ½-Krone)</b>. — Page-number disambiguation: Hede 1957 (note 1) cites Wilcke I <b>p. 152</b> NOT for the patent date, but for the deviating Müntzfod of the 1618 small denominations.
      uk: |-
        <b>Wilcke, Julius</b>: <i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i> (Wilcke II). Копенгаген 1924 — виноска: <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. <b>Primary-атестація патенту 12 липня 1618</b> (Wilcke II прим. 53 verbatim): «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden, ligesom ogsaa i de to Forørdninger af 4. Juli 1616 og 1. Maj 1618 om Dalerens Forhøjelse til 80 og 84 ß d., henvises til, at Markerne saa let eftergjordes af fremmede og Udlendiske…</i>». Wilcke II відсилає до Wilcke I с. 156–157 (з перехресним посиланням на с. 142–143) як первинне джерело. — У патенті 1618 р. монета ще не має латинської назви «Corona Danica»; вона описана як <b>«1½-Specie» / «¾-Specie» (Krone / ½-Krone)</b>. — Уточнення сторінки: Hede 1957 (прим. 1) посилається на Wilcke I <b>с. 152</b> НЕ для дати патенту, а для відмінної Müntzfod дрібних номіналів 1618 р.

