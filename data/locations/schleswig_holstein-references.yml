      de: |
        <b>Lov om Pengevæsenet vom 10. Februar 1854</b> — rein terminologische Reform: «<i>rigsbankdaler</i>» wird in <i>rigsdaler</i> bzw. «<i>rigsdaler rigsmønt</i>» umbenannt, «<i>rigsbankskilling</i>» in <i>skilling rigsmønt</i>; die 96-Skilling-Struktur und der 18½-Thaler-Fuß bleiben unverändert. Wikipedia (en): <i>Danish rigsdaler</i> — <a href="https://en.wikipedia.org/wiki/Danish_rigsdaler" target="_blank">en.wikipedia.org/wiki/Danish_rigsdaler</a>: «<i>In 1854 the rigsdaler species name disappeared and the names rigsbankdaler and rigsbank skilling became rigsdaler and skilling rigsmønt</i>». Der Speciedaler-Standard (9¼-Fuß) wurde durch das Gesetz von 1854 <b>nicht</b> abgeschafft — die Speciedaler-Prägung in Kopenhagen läuft biß 1873 weiter; die mathematische Anbindung des neuen Rigsdaler an den 9¼-Fuß wird auf der Münze selbst dokumentiert (Frederik VII., 2 Rigsdaler 1854: Legende «<i>9¼ ST = 1 M·F·S</i>», d. h. 9¼ × 2 Rigsdaler = 1 Cölln. Marck Feinsilber, exakt der 18½-Fuß). Belegt, daß das Auslaufen der Holstein-Prägung 1854 (KM#475 / Hede 1) nicht durch eine Statusänderung des 9¼-Fußes verursacht wurde.
      en: |-
        <b>Lov om Pengevæsenet of 10 February 1854</b> — purely terminological reform: «<i>rigsbankdaler</i>» is renamed to <i>rigsdaler</i> or «<i>rigsdaler rigsmønt</i>», «<i>rigsbankskilling</i>» to <i>skilling rigsmønt</i>; the 96-skilling structure and the 18½-Thaler-Fuß remain unchanged. Wikipedia (en): <i>Danish rigsdaler</i> — <a href="https://en.wikipedia.org/wiki/Danish_rigsdaler" target="_blank">en.wikipedia.org/wiki/Danish_rigsdaler</a>: «<i>In 1854 the rigsdaler species name disappeared and the names rigsbankdaler and rigsbank skilling became rigsdaler and skilling rigsmønt</i>». The Speciedaler standard (9¼-Fuß) was <b>not</b> abolished by the 1854 law — Speciedaler minting in Copenhagen continues until 1873; the new Rigsdaler's mathematical link to the 9¼-Fuß is documented on the coin itself (Frederik VII, 2 Rigsdaler 1854: legend «<i>9¼ ST = 1 M·F·S</i>», i.e. 9¼ × 2 Rigsdaler = 1 Cölln. Marck of fine silver — exactly the 18½-Fuß). Establishes that the end of Holstein-mint Speciedaler production in 1854 (KM#475 / Hede 1) was not caused by a status change to the 9¼-Fuß.
      uk: |-
        <b>Lov om Pengevæsenet від 10 лютого 1854 р.</b> — суто термінологічна реформа: «<i>rigsbankdaler</i>» перейменовано на <i>rigsdaler</i> або «<i>rigsdaler rigsmønt</i>», «<i>rigsbankskilling</i>» — на <i>skilling rigsmønt</i>; структура 96 skilling і 18½-Thaler-Fuß лишаються без змін. Wikipedia (en): <i>Danish rigsdaler</i> — <a href="https://en.wikipedia.org/wiki/Danish_rigsdaler" target="_blank">en.wikipedia.org/wiki/Danish_rigsdaler</a>: «<i>In 1854 the rigsdaler species name disappeared and the names rigsbankdaler and rigsbank skilling became rigsdaler and skilling rigsmønt</i>». Стандарт Speciedaler (9¼-Fuß) законом 1854 р. <b>не скасовано</b> — копенгагенське карбування Speciedaler триває до 1873 р.; математичну прив'язку нового Rigsdaler до 9¼-Fuß задокументовано на самій монеті (Фредерік VII, 2 Rigsdaler 1854: легенда «<i>9¼ ST = 1 M·F·S</i>», тобто 9¼ × 2 Rigsdaler = 1 Cölln. Marck чистого срібла — саме 18½-Fuß). Доводить, що припинення карбування Speciedaler у Гольштейні в 1854 р. (KM#475 / Hede 1) не було спричинене зміною статусу 9¼-Fuß.

  - id: ref29
    content:
      de: |
        <b>Altona-Münze: Umbau 1855–56 und Krise 1857</b> · Mogens Skjoldager (Hg.): <i>The 19th century development in minting technology in Denmark and Japan — and monetary transitions in Denmark, Japan, and Bornholm</i>, danskmoent.dk — <a href="https://www.danskmoent.dk/artikler/mmJapan.htm" target="_blank">danskmoent.dk/artikler/mmJapan.htm</a>. Beleg: in der Altonaer Münze waren 1771–1855/56 hand-getriebene Spindelpressen im Einsatz; 1855–56 wird die Münze grundlegend umgebaut, dampfgetriebene Exzenterpressen aus Darmstadt werden eingeführt. Während des Umbaus war keine Prägung möglich; danach wurde die Produktion auf kleinere Rigsmønt-Nominale (1, 4 Skilling Rigsmønt; 1 Rigsdaler 1855) konzentriert. Die Investition «<i>endete als wirtschaftliche Tragödie, da die Münze infolge der internationalen Geldkrise 1857 fast ihr gesamtes Geschäft verlor</i>». Erklärt, warum nach dem letzten Holstein-Mint-Speciedaler 1854 (Frederik VII., KM#475 / Hede 1) keine weiteren Speciedaler-Prägungen aus Altona folgten — eine technisch-wirtschaftliche, keine rechtliche Ursache. Altona schließt 1863.
      en: |-
        <b>Altona Mint: 1855–56 rebuild and 1857 crisis</b> · Mogens Skjoldager (ed.): <i>The 19th century development in minting technology in Denmark and Japan — and monetary transitions in Denmark, Japan, and Bornholm</i>, danskmoent.dk — <a href="https://www.danskmoent.dk/artikler/mmJapan.htm" target="_blank">danskmoent.dk/artikler/mmJapan.htm</a>. Source: the Altona mint used hand-driven screw presses 1771–1855/56; the mint is fundamentally rebuilt 1855–56 with steam-driven eccentric presses imported from Darmstadt. No coinage was possible during the rebuild; afterwards production focused on smaller rigsmønt denominations (1 and 4 skilling rigsmønt; 1 rigsdaler 1855). The investment «<i>ended as an economic tragedy because the mint lost almost all of its business as a result of the international monetary crisis of 1857</i>». Explains why no further Speciedaler issues followed the final Holstein-mint Speciedaler of 1854 (Frederik VII, KM#475 / Hede 1): a technical-economic cause, not a legal one. Altona closes in 1863.
      uk: |-
        <b>Альтонський монетний двір: перебудова 1855–56 та криза 1857</b> · Mogens Skjoldager (ред.): <i>The 19th century development in minting technology in Denmark and Japan — and monetary transitions in Denmark, Japan, and Bornholm</i>, danskmoent.dk — <a href="https://www.danskmoent.dk/artikler/mmJapan.htm" target="_blank">danskmoent.dk/artikler/mmJapan.htm</a>. Джерело: альтонський двір використовував ручні гвинтові преси 1771–1855/56; у 1855–56 рр. двір зазнає принципової перебудови — встановлюються парові ексцентричні преси з Дармштадту. Під час перебудови карбування неможливе; після відновлення виробництво зосереджено на дрібних номіналах rigsmønt-серії (1 і 4 skilling rigsmønt; 1 rigsdaler 1855). Інвестиція «<i>обернулася економічною трагедією, бо двір через міжнародну монетну кризу 1857 р. втратив майже весь свій бізнес</i>». Пояснює, чому після останнього гольштинського Speciedaler 1854 р. (Фредерік VII, KM#475 / Hede 1) карбування Speciedaler з Альтони більше не відновлювалося — технічно-економічна, а не правова причина. Альтона закривається 1863 р.

  - id: ref30
    content:
      de: |
        <b>Møntforordninger m.v. under Christian 5. (1670–1699)</b> · danskmoent.dk — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" target="_blank">danskmoent.dk/artikler/c5mord.htm</a> (Sammenstellung der Münzedikte Christians V. nach Schou). Die zentrale <b>Münzordnung vom 22. März 1671</b> formalisiert den 10½-Krone-Fuß: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» je Marck Feinsilber. In derselben Ordnung wird Speciemønt mit 9¼ rd. je Marck als Hauptstandard verankert; die Krone wird ausdrücklich als <b>untergeordneter, sekundärer Standard</b> behandelt. Diese hierarchische Anordnung gilt durch Christians V. ganze Regierungszeit; das Reskript vom 31. Dezember 1692 schränkt die zukünftige Prägung auf «<i>kun kurant i kroner, markstykker, 2-skillinger og halvskillinger</i>» ein, hebt den Krone-Fuß aber nicht formell auf. Die Krone hat <b>nie Parität mit dem Specie als Primärstandard</b> erreicht.
      en: |-
        <b>Møntforordninger m.v. under Christian 5. (1670–1699)</b> · danskmoent.dk — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" target="_blank">danskmoent.dk/artikler/c5mord.htm</a> (compilation of Christian V's mint edicts after Schou). The central <b>Mint Ordinance of 22 March 1671</b> formalises the 10½-Krone-Fuß: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» per mark of fine silver. The same ordinance anchors Speciemønt at 9¼ rd. per mark as the principal standard; the Krone is explicitly treated as a <b>subordinate, secondary standard</b>. This hierarchy persists through the entire reign of Christian V; the rescript of 31 December 1692 restricts future minting to «<i>kun kurant i kroner, markstykker, 2-skillinger og halvskillinger</i>», but does not formally revoke the Krone-Fuß. The Krone <b>never achieved parity with Specie as a primary standard</b>.
      uk: |-
        <b>Møntforordninger m.v. under Christian 5. (1670–1699)</b> · danskmoent.dk — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" target="_blank">danskmoent.dk/artikler/c5mord.htm</a> (зведення монетних едиктів Кристіана V за Schou). Центральна <b>Монетна постанова 22 березня 1671 р.</b> формалізує 10½-Krone-Fuß: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» з марки чистого срібла. У тій самій постанові Speciemønt закріплено за 9¼ rd. з марки як головний стандарт; Krone виразно трактується як <b>підпорядкований, вторинний стандарт</b>. Ця ієрархія діє впродовж усього правління Кристіана V; рескрипт 31 грудня 1692 р. обмежує майбутнє карбування до «<i>kun kurant i kroner, markstykker, 2-skillinger og halvskillinger</i>», але формально Krone-Fuß не скасовує. Krone <b>ніколи не досяг паритету зі Specie як первинним стандартом</b>.

  - id: ref31
    content:
      de: |
        <b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href="https://www.danskmoent.dk/myst/aag1.htm" target="_blank">danskmoent.dk/myst/aag1.htm</a>. Belegt, daß die 1644–1648 in Glückstadt ausgegebene Hebræermønt eine <b>Kriegsmünze</b> war (Torstenson-Krieg 1643–1648), keine geplante Münzreform: deutlich unterwertig (Münzgewinn ca. 22 % bei 2-Marker, ca. 50 % bei 4-Skillingen), Feingehalt absichtlich verschleiert; Hamburg lehnte die Münzen im Dezember 1645 ab; das Reichsgericht senkte den Tarif wenige Wochen nach Christians IV. Tod (21. März 1648). Aagaard zeigt: «<i>no evidence these coins operated under an official 10½-Krone-Fuß forordning or possessed formal legal status comparable to standard speciedaler coinage</i>». Die formelle 10½-Krone-Fuß-Ordnung folgt erst 1671 unter Christian V. (siehe ref30).
      en: |-
        <b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href="https://www.danskmoent.dk/myst/aag1.htm" target="_blank">danskmoent.dk/myst/aag1.htm</a>. Establishes that the Hebræermønt issued at Glückstadt 1644–1648 was a <b>war coinage</b> (Torstenson War 1643–1648), not a planned monetary reform: substantially under-weight (mint profit ca. 22 % on 2-markers, ca. 50 % on 4-skillings), the fineness deliberately concealed; Hamburg rejected these coins in December 1645; the privy council reduced the tariff weeks after Christian IV's death (21 March 1648). Aagaard concludes: «<i>no evidence these coins operated under an official 10½-Krone-Fuß forordning or possessed formal legal status comparable to standard speciedaler coinage</i>». A formal 10½-Krone-Fuß ordinance follows only in 1671 under Christian V (see ref30).
      uk: |-
        <b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href="https://www.danskmoent.dk/myst/aag1.htm" target="_blank">danskmoent.dk/myst/aag1.htm</a>. Доводить, що Hebræermønt, випущена у Glückstadt 1644–1648 рр., була <b>воєнною монетою</b> (війна Торстенсона 1643–1648), не запланованою монетною реформою: значно недоважена (монетний прибуток ~22 % на 2-марках, ~50 % на 4-скілінгах), пробу свідомо приховано; Гамбург відмовився приймати ці монети у грудні 1645 р.; Таємна рада знизила тариф за кілька тижнів після смерті Кристіана IV (21 березня 1648). Aagaard: «<i>no evidence these coins operated under an official 10½-Krone-Fuß forordning or possessed formal legal status comparable to standard speciedaler coinage</i>». Формальна постанова про 10½-Krone-Fuß з'являється лише 1671 р. за Кристіана V (див. ref30).

  - id: ref32
    content:
      de: |
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, S. 129–134 — Online: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Knappe Charakterisierung der Krone-Stellung im Geldumlauf: «<i>indførtes af Christian IV 1618, og i omsætningen fortrængte speciemønten for selv at blive fortrængt af kurantmønten</i>» — die Krone verdrängte den Speciedaler aus dem aktiven Umlauf (Mechanismus: Übertarifierung über dem Silberwert, klassische Greshamsche Wirkung), wurde dann selbst durch den Rigsdaler Courant (Forordning 1726) verdrängt. Diese Verdrängung im Umlauf ist nicht gleichbedeutend mit Verdrängung als Standard: der Speciedaler blieb der primäre Münzfuß, während die Krone der dominante Tauschmünze im täglichen Verkehr war.
      en: |-
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, pp. 129–134 — Online: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Concise characterisation of the Krone's position in the money supply: «<i>indførtes af Christian IV 1618, og i omsætningen fortrængte speciemønten for selv at blive fortrængt af kurantmønten</i>» — the Krone displaced the Speciedaler from active circulation (mechanism: over-tariffing above the silver value, classic Gresham effect), then was itself displaced by the Rigsdaler Courant (Forordning 1726). Displacement in circulation is not the same as displacement as a standard: the Speciedaler remained the primary Münzfuß, while the Krone was the dominant medium of exchange in everyday traffic.
      uk: |-
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, с. 129–134 — Онлайн: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Стисла характеристика місця Krone у грошовому обігу: «<i>indførtes af Christian IV 1618, og i omsætningen fortrængte speciemønten for selv at blive fortrængt af kurantmønten</i>» — Krone витіснила Speciedaler з активного обігу (механізм: надтарифікація над срібною вартістю, класичний ефект Грешема), а сама пізніше була витіснена Rigsdaler Courant (Forordning 1726). Витіснення в обігу — не те саме, що витіснення як стандарту: Speciedaler лишався первинним Münzfuß, тоді як Krone була домінантним засобом обміну у повсякденному обороті.

  - id: ref33
    content:
      de: |
        <b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i>. København: G. E. C. Gads Forlag, 1919 — Quellenverweis: <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Sekundärbeleg zur Charakterisierung der Christian-IV.-Krone als fiskalische Spekulation: «<i>the King's speculation in minting poor quality coins and later crowns (Kroner) that were issued with higher nominal value than their silver content justified</i>». Wilcke schildert ferner den Greshamschen Mechanismus — die guten Speciedaler verschwanden aus dem Umlauf nach der Einführung der übertarifierten Krone, weil sie für Auslandszahlungen einbehalten wurden.
      en: |-
        <b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i>. Copenhagen: G. E. C. Gads Forlag, 1919 — source page: <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Secondary source for characterising Christian IV's Krone as fiscal speculation: «<i>the King's speculation in minting poor quality coins and later crowns (Kroner) that were issued with higher nominal value than their silver content justified</i>». Wilcke also describes the Gresham mechanism: the good Speciedalers vanished from circulation after the over-tariffed Krone was introduced, being held back for foreign payments.
      uk: |-
        <b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i>. Копенгаген: G. E. C. Gads Forlag, 1919 — посилання: <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Вторинне джерело про характер Krone Кристіана IV як фіскальної спекуляції: «<i>the King's speculation in minting poor quality coins and later crowns (Kroner) that were issued with higher nominal value than their silver content justified</i>». Wilcke також описує механізм Грешема: добротні Speciedaler зникали з обігу після запровадження надтарифікованої Krone, бо їх притримували для зовнішньоторговельних розрахунків.

  - id: ref34
    content:
      de: |
        <b>Hamburg Mark Courant vs. Schleswig-Holstein Mark Courant</b> · Wikipedia (en): <i>Hamburg mark</i> — <a href="https://en.wikipedia.org/wiki/Hamburg_mark" target="_blank">en.wikipedia.org/wiki/Hamburg_mark</a>; <i>Schilling Schleswig-Holsteinisch Courant</i> — <a href="https://de.wikipedia.org/wiki/Schilling_Schleswig-Holsteinisch_Courant" target="_blank">de.wikipedia.org/wiki/Schilling_Schleswig-Holsteinisch_Courant</a>; <i>Schleswig-Holsteinische Speciesbank</i> — <a href="https://de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank" target="_blank">de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank</a>. Beleg für die Doppelnatur des Begriffs «Mark Courant» nach 1788: <b>Hamburg Mark Courant</b> = «<i>27,625/34 = 13⁄16 einer Hamburger Marck Banco bzw. ca. 6,88 g fein</i>» — am 11⅓-Thaler-Fuß-Rigsdaler Courant verankert; <b>Mark Schleswig-Holsteinisch Courant</b> ab Schimmelmann-Reform 29. Februar 1788 = 1/3 Reichsthaler S.-H.-Courant = 4/15 Speciedaler = <b>6,74179 g fein</b> — explizit am 9¼-Thaler-Fuß-Speciedaler verankert (60 Schilling S.-H.-Courant = 1 Speciedaler). Die beiden Mark-Courant-Einheiten tragen denselben Namen, sind aber numerisch verschiedene Rechnungseinheiten in unterschiedlichen Müntzfuß-Systemen. Wikipedia (de) zur Speciesbank: «<i>Um das Münzwesen der Herzogtümer ganz vom dänischen Staat zu lösen, … erhielten die Herzogtümer Schleswig und Holstein ihre eigene neue Silberwährung</i>» — die Reform 1788 vollzog also eine vollständige Trennung der Herzogtümer vom dänisch-norwegischen Kurantmøntfod-System. Der spätere <i>Plakat vom 3. Dezember 1794</i> regelte das 5:4-Verhältnis Specie ↔ Rigsdaler Courant <b>im dänisch-norwegischen Kurantmøntfod-System</b>, wo der Marktkurs (Opgæld) bisher schwankte; in den Herzogtümern war dasselbe 5:4-Verhältnis bereits seit der Reform 1788 definitorisch festgeschrieben (60 Schilling S.-H.-Courant = 1 Specie ⇔ 48 Schilling S.-H.-Courant = 4/5 Specie = 1 Reichsthaler S.-H.-Courant), Schleswig-Holstein war daher nicht Adressat des Plakats.
      en: |-
        <b>Hamburg Mark Courant vs Schleswig-Holstein Mark Courant</b> · Wikipedia (en): <i>Hamburg mark</i> — <a href="https://en.wikipedia.org/wiki/Hamburg_mark" target="_blank">en.wikipedia.org/wiki/Hamburg_mark</a>; <i>Schilling Schleswig-Holsteinisch Courant</i> — <a href="https://de.wikipedia.org/wiki/Schilling_Schleswig-Holsteinisch_Courant" target="_blank">de.wikipedia.org/wiki/Schilling_Schleswig-Holsteinisch_Courant</a>; <i>Schleswig-Holsteinische Speciesbank</i> — <a href="https://de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank" target="_blank">de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank</a>. Source for the dual nature of the term «Mark Courant» after 1788: the <b>Hamburg Mark Courant</b> is «<i>27.625/34 = 13⁄16 of a Hamburg Mark Banco, i.e. ca. 6.88 g fine silver</i>» — anchored to the 11⅓-Thaler-Fuß Rigsdaler Courant; the <b>Mark Schleswig-Holsteinisch Courant</b> from the Schimmelmann reform of 29 February 1788 = 1/3 Reichsthaler S.-H. Courant = 4/15 Speciedaler = <b>6.74179 g fine</b> — explicitly anchored to the 9¼-Thaler-Fuß Speciedaler (60 Schilling S.-H. Courant = 1 Speciedaler). The two Mark Courant units share a name but are numerically different accounting units in different Müntzfuß systems. Wikipedia (de) on the Speciesbank: «<i>Um das Münzwesen der Herzogtümer ganz vom dänischen Staat zu lösen, … erhielten die Herzogtümer Schleswig und Holstein ihre eigene neue Silberwährung</i>» — the 1788 reform was a complete separation of the duchies from the Danish-Norwegian Kurantmøntfod system. The later <i>Plakat of 3 December 1794</i> regulated the 5:4 Specie ↔ Rigsdaler Courant ratio <b>within the Danish-Norwegian Kurantmøntfod system</b>, where the market rate (Opgæld) had until then fluctuated; in the duchies the same 5:4 ratio was already built into the 1788 reform by definition (60 Schilling S.-H. Courant = 1 Specie ⇔ 48 Schilling S.-H. Courant = 4/5 Specie = 1 Reichsthaler S.-H. Courant), so Schleswig-Holstein was not the addressee of the Plakat.
      uk: |-
        <b>Hamburg Mark Courant проти Schleswig-Holstein Mark Courant</b> · Wikipedia (en): <i>Hamburg mark</i> — <a href="https://en.wikipedia.org/wiki/Hamburg_mark" target="_blank">en.wikipedia.org/wiki/Hamburg_mark</a>; <i>Schilling Schleswig-Holsteinisch Courant</i> — <a href="https://de.wikipedia.org/wiki/Schilling_Schleswig-Holsteinisch_Courant" target="_blank">de.wikipedia.org/wiki/Schilling_Schleswig-Holsteinisch_Courant</a>; <i>Schleswig-Holsteinische Speciesbank</i> — <a href="https://de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank" target="_blank">de.wikipedia.org/wiki/Schleswig-Holsteinische_Speciesbank</a>. Джерело для двозначної природи терміна «Mark Courant» після 1788 р.: <b>Hamburg Mark Courant</b> = «<i>27,625/34 = 13⁄16 Hamburger Marck Banco, тобто бл. 6,88 г чистого срібла</i>» — анкоровано до 11⅓-Thaler-Fuß Rigsdaler Courant; <b>Mark Schleswig-Holsteinisch Courant</b> від Schimmelmann-реформи 29 лютого 1788 р. = 1/3 Reichsthaler S.-H. Courant = 4/15 Speciedaler = <b>6,74179 г чистого</b> — явно анкоровано до 9¼-Thaler-Fuß Speciedaler (60 Schilling S.-H. Courant = 1 Speciedaler). Обидві Mark-Courant-одиниці мають однакову назву, але є чисельно різними розрахунковими одиницями в різних Müntzfuß-системах. Wikipedia (de) про Speciesbank: «<i>Um das Münzwesen der Herzogtümer ganz vom dänischen Staat zu lösen, … erhielten die Herzogtümer Schleswig und Holstein ihre eigene neue Silberwährung</i>» — реформа 1788 здійснила повне відокремлення герцогств від дансько-норвезької Kurantmøntfod-системи. Пізніший <i>Plakat 3 грудня 1794</i> урегулював співвідношення 5:4 Specie ↔ Rigsdaler Courant <b>у дансько-норвезькій Kurantmøntfod-системі</b>, де ринковий курс (Opgæld) до того коливався; у герцогствах те саме 5:4 було вже закладене в реформу 1788 за визначенням (60 Schilling S.-H. Courant = 1 Specie ⇔ 48 Schilling S.-H. Courant = 4/5 Specie = 1 Reichsthaler S.-H. Courant), тож Schleswig-Holstein не був адресатом Plakat'а.

  - id: ref35
    content:
      de: |
        <b>Altonaer Bankfuß und die Altonaer Bank</b> · Bobzin, Hagen und Gudrun: <i>Münzfüße</i> — <a href="http://www.hagen-bobzin.de/hobby/muenzfuesse.html" target="_blank">hagen-bobzin.de/hobby/muenzfuesse.html</a>; ders.: <i>Lübisches Münzsystem</i> — <a href="https://www.hagen-bobzin.de/hobby/muenzverein_wendisch.html" target="_blank">hagen-bobzin.de/hobby/muenzverein_wendisch.html</a>; Wikipedia (en): <i>Bank of Hamburg</i> — <a href="https://en.wikipedia.org/wiki/Bank_of_Hamburg" target="_blank">en.wikipedia.org/wiki/Bank_of_Hamburg</a>; Wikipedia (de): <i>Königliche Münze zu Altona</i> — <a href="https://de.wikipedia.org/wiki/K%C3%B6nigliche_M%C3%BCnze_zu_Altona" target="_blank">de.wikipedia.org/wiki/Königliche_Münze_zu_Altona</a>; period source: <i>Bankwesen und Bankpolitik in Preussen</i> — Internet Archive — zur <b>Altonaer Bankordnung §19</b>: «<i>die Mark fein Silber in der Altonaer Bank um einen kleinen Bruchtheil höher als in der Hamburger angenommen wurde</i>». Bobzin (Lübisches Münzsystem): «<i>1769: Hamburgischer Banko-Fuß: 27 5/8 Mark Banko = 9 5/24 Reichstaler … 1777: Altonaer Banko-Fuß: 27¾ Mark Banko = 9¼ Reichstaler = 13 7/8 Gulden = 1 feine kölner Mark</i>». Der <b>Altonaer Bankfuß (1777)</b> war kein Bobzin-Etikett, sondern der formelle Müntzfuß einer eigenen königlich-dänischen Bankinstitution in Altona — der <b>Altonaer Bank</b> mit eigener Bankordnung, neben der Königlichen Münze zu Altona (gegründet 1771). Das Verhältnis 27¾ Mark Banco / Cölln. Marck = 9¼ Reichsthaler ist <b>numerisch identisch mit dem 9¼-Thaler-Fuß-Speciedaler-Standard</b>, nur in Mark-Banco-Stückelung statt in Reichsthaler. Anders ausgedrückt: Altonaer Bankfuß ist die Bank-Giral-Einheit-Form desselben Speciedaler-Standards, der ab 1788 unter Schimmelmann zur Grundlage der Schleswig-Holsteinischen Courant-Münzreform wurde. <em>Hinweis</em>: Bobzin verwendet ferner den Begriff «Schleswig-Holsteinischer Kurantfuß» (34 11/16 Mark / Cölln. Marck = 11 9/16 Reichsthaler S.-H. Courant) für die Mark-Stückelung der Schimmelmann-Reform 1788 — dieser Begriff erscheint außerhalb Bobzins Webseite in keinem auffindbaren Quellen­bestand und ist analytisch-didaktisch nach dem Muster anderer regionaler «-Kurantfuß»-Bezeichnungen gebildet; period-1788-Dokumente nennen die Stückelung selbst <i>«Schilling Schleswig-Holsteinisch Courant»</i>, nicht «Kurantfuß».
      en: |-
        <b>Altonaer Bankfuß and the Altonaer Bank</b> · Bobzin, Hagen and Gudrun: <i>Münzfüße</i> — <a href="http://www.hagen-bobzin.de/hobby/muenzfuesse.html" target="_blank">hagen-bobzin.de/hobby/muenzfuesse.html</a>; idem: <i>Lübisches Münzsystem</i> — <a href="https://www.hagen-bobzin.de/hobby/muenzverein_wendisch.html" target="_blank">hagen-bobzin.de/hobby/muenzverein_wendisch.html</a>; Wikipedia (en): <i>Bank of Hamburg</i> — <a href="https://en.wikipedia.org/wiki/Bank_of_Hamburg" target="_blank">en.wikipedia.org/wiki/Bank_of_Hamburg</a>; Wikipedia (de): <i>Königliche Münze zu Altona</i> — <a href="https://de.wikipedia.org/wiki/K%C3%B6nigliche_M%C3%BCnze_zu_Altona" target="_blank">de.wikipedia.org/wiki/Königliche_Münze_zu_Altona</a>; period source: <i>Bankwesen und Bankpolitik in Preussen</i> — Internet Archive — on the <b>Altonaer Bankordnung §19</b>: «<i>die Mark fein Silber in der Altonaer Bank um einen kleinen Bruchtheil höher als in der Hamburger angenommen wurde</i>». Bobzin (Lübisches Münzsystem): «<i>1769: Hamburgischer Banko-Fuß: 27 5/8 Mark Banko = 9 5/24 Reichstaler … 1777: Altonaer Banko-Fuß: 27¾ Mark Banko = 9¼ Reichstaler = 13 7/8 Gulden = 1 feine kölner Mark</i>». The <b>Altonaer Bankfuß (1777)</b> was not Bobzin's label but the formal Müntzfuß of a separate royal-Danish banking institution in Altona — the <b>Altonaer Bank</b> with its own Bankordnung, alongside the Königliche Münze zu Altona (founded 1771). The ratio 27¾ Mark Banco / Cölln. Marck = 9¼ Reichsthaler is <b>numerically identical with the 9¼-Thaler-Fuß Speciedaler standard</b>, just denominated in Mark Banco rather than in Reichsthaler. In other words: the Altonaer Bankfuß is the Bank-giro form of the same Speciedaler standard that became the basis of the Schimmelmann Schleswig-Holstein Courant reform of 1788. <em>Note</em>: Bobzin also uses the term «Schleswig-Holsteinischer Kurantfuß» (34 11/16 Mark / Cölln. Marck = 11 9/16 Reichsthaler S.-H. Courant) for the Mark-denominated form of the 1788 Schimmelmann reform — this term does not appear in any findable source outside Bobzin's website and is an analytical-didactic label formed by analogy with other regional «-Kurantfuß» names; period-1788 documents call the subdivision itself <i>«Schilling Schleswig-Holsteinisch Courant»</i>, not «Kurantfuß».
      uk: |-
        <b>Altonaer Bankfuß і Altonaer Bank</b> · Bobzin, Hagen і Gudrun: <i>Münzfüße</i> — <a href="http://www.hagen-bobzin.de/hobby/muenzfuesse.html" target="_blank">hagen-bobzin.de/hobby/muenzfuesse.html</a>; його ж: <i>Lübisches Münzsystem</i> — <a href="https://www.hagen-bobzin.de/hobby/muenzverein_wendisch.html" target="_blank">hagen-bobzin.de/hobby/muenzverein_wendisch.html</a>; Wikipedia (en): <i>Bank of Hamburg</i> — <a href="https://en.wikipedia.org/wiki/Bank_of_Hamburg" target="_blank">en.wikipedia.org/wiki/Bank_of_Hamburg</a>; Wikipedia (de): <i>Königliche Münze zu Altona</i> — <a href="https://de.wikipedia.org/wiki/K%C3%B6nigliche_M%C3%BCnze_zu_Altona" target="_blank">de.wikipedia.org/wiki/Königliche_Münze_zu_Altona</a>; період-джерело: <i>Bankwesen und Bankpolitik in Preussen</i> — Internet Archive — про <b>Altonaer Bankordnung §19</b>: «<i>die Mark fein Silber in der Altonaer Bank um einen kleinen Bruchtheil höher als in der Hamburger angenommen wurde</i>». Bobzin (Lübisches Münzsystem): «<i>1769: Hamburgischer Banko-Fuß: 27 5/8 Mark Banko = 9 5/24 Reichstaler … 1777: Altonaer Banko-Fuß: 27¾ Mark Banko = 9¼ Reichstaler = 13 7/8 Gulden = 1 feine kölner Mark</i>». <b>Altonaer Bankfuß (1777)</b> — це не Bobzin'івський label, а формальний Müntzfuß окремої королівсько-данської банкової установи в Альтоні — <b>Altonaer Bank</b> з власною Bankordnung, паралельно з Königliche Münze zu Altona (заснована 1771). Співвідношення 27¾ Mark Banco / Cölln. Marck = 9¼ Reichsthaler <b>числово тотожне 9¼-Thaler-Fuß Speciedaler-стандарту</b>, лише виражене у Mark Banco, а не в Reichsthaler. Інакше кажучи: Altonaer Bankfuß — це Bank-girо-форма того самого Speciedaler-стандарту, що з 1788 р. за Schimmelmann став основою Schleswig-Holsteinischen Courant-реформи. <em>Примітка</em>: Bobzin також використовує термін «Schleswig-Holsteinischer Kurantfuß» (34 11/16 Mark / Cölln. Marck = 11 9/16 Reichsthaler S.-H. Courant) для Mark-вираження Schimmelmann-реформи 1788 — цей термін поза сайтом Bobzin не зустрічається в жодному знайденому джерелі і є аналітично-дидактичною конструкцією за аналогією з іншими регіональними «-Kurantfuß»-назвами; період-1788 документи називають саму субдивізію <i>«Schilling Schleswig-Holsteinisch Courant»</i>, не «Kurantfuß».

