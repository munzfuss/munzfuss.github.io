id: bremen_verden
name:
  de: Erzbisthum Bremen-Verden
  en: Archbishopric of Bremen-Verden
  uk: Архієпископство Бремен-Верден
summary:
  de: 'Erzbisthum Bremen mit Bisthum Verden — Reichslehen mit Münzstätten Bremervörde und Stade. Unter dänischen Administratoren biß zum Westfälischen Frieden 1648, danach schwedisch (1648–1712). <em>Stub-Datei: 6 Münzen aus Bruun seed-importiert; Müntzfuß-Klassifikation deferred — siehe docs/TODO.md item E.</em><br>NICHT zu verwechseln mit der Freien Hansestadt Bremen.'
  en: 'Archbishopric of Bremen with Bishopric of Verden — imperial fief with mints at Bremervörde and Stade. Under Danish administrators until the Peace of Westphalia 1648, then Swedish (1648–1712). <em>Stub file: 6 coins seed-imported from Bruun; Müntzfuß classification deferred — see docs/TODO.md item E.</em><br>NOT to be confused with the Free Hansestadt of Bremen.'
  uk: 'Архієпископство Бремен з єпископством Верден — імперський лен з монетними дворами Бремерферде та Штаде. Під данськими адміністраторами до Вестфальського миру 1648, потім шведське (1648–1712). <em>Stub-файл: 6 монет seed-імпортовані з Bruun; Müntzfuß-класифікація відкладена — див. docs/TODO.md item E.</em><br>НЕ плутати з Вільним ганзейським містом Бременом.'
fuss_order:
  - seed_unsorted
phases:
  seed_unsorted:
    - id: A
      year_from: 1622
      year_to: 1674
      from_label: (?)
      to_label: (?)
      title:
        de: Bulk-Seed-Phase (Bruun-Import 2026-05)
        en: Bulk seed phase (Bruun import 2026-05)
        uk: Bulk-seed-фаза (Bruun-імпорт 2026-05)
      description:
        de: Sammelphase für die aus Bruun-Auktionskatalogen seed-importierten Stücke. Bei der nächsten Detail-Bearbeitung wandern die einzelnen Münzen in ihre eigene Müntzfuß-Klassifikation.
        en: Catch-all phase for the pieces seed-imported from Bruun auction catalogues. On the next detailed pass each coin will move into its own Müntzfuß classification.
        uk: Збірна фаза для монет, seed-імпортованих з Bruun-аукціонних каталогів. При наступному детальному проходженні кожна монета перейде у власну Müntzfuß-класифікацію.
