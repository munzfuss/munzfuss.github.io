id: brunswick_lueneburg
name:
  de: Herzogthum Braunschweig-Lüneburg (Wolfenbüttel)
  en: Duchy of Brunswick-Lüneburg (Wolfenbüttel)
  uk: Герцогство Брауншвейг-Люнебург (Вольфенбюттель)
summary:
  de: 'Linie Wolfenbüttel der Welfen-Herzöge mit Münzstätte Wolfenbüttel. Hier die Christian-IV.-von-Dänemark-Prägung 1627 (Niedersächsischer Reichskreis-Periode des Dreißigjährigen Krieges) sowie die Lower-Saxony-Klippe. <em>Stub-Datei: 6 Münzen aus Bruun seed-importiert; Müntzfuß deferred — siehe docs/TODO.md item E.</em>'
  en: 'Wolfenbüttel branch of the Welf dukes with mint at Wolfenbüttel. Here the 1627 Christian IV of Denmark issue (Lower Saxon Imperial Circle period of the Thirty Years War) plus the Lower-Saxony klippe. <em>Stub file: 6 coins seed-imported from Bruun; Müntzfuß deferred — see docs/TODO.md item E.</em>'
  uk: 'Лінія Вольфенбюттель вельфських герцогів з монетним двором Вольфенбюттель. Тут карбування Христіяна IV Данського 1627 року (період Нижньосаксонського імперського округу Тридцятилітньої війни) плюс Нижньо-саксонський кліпе. <em>Stub-файл: 6 монет seed-імпортовані з Bruun; Müntzfuß відкладено — див. docs/TODO.md item E.</em>'
fuss_order:
  - seed_unsorted
phases:
  seed_unsorted:
    - id: A
      year_from: 1627
      year_to: 1627
      from_label: (?)
      to_label: (?)
      title:
        de: Bulk-Seed-Phase (Bruun-Import 2026-05)
        en: Bulk seed phase (Bruun import 2026-05)
        uk: Bulk-seed-фаза (Bruun-імпорт 2026-05)
      description:
        de: Sammelphase für die aus Bruun-Auktionskatalogen seed-importierten Stücke. Bei der nächsten Detail-Bearbeitung wandern die einzelnen Münzen in ihre eigene Müntzfuß-Klassifikation.
        en: Catch-all phase for the pieces seed-imported from Bruun auction catalogues. On the next detailed pass each coin will move into its own Müntzfuß classification.
        uk: Збірна фаза для монет, seed-імпортованих з Bruun-аукціонних каталогів. При наступному детальному проходженні кожна монета перейде у власну Müntzfuß-класифікацію.
