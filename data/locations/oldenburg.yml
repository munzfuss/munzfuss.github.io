id: oldenburg
name:
  de: Grafschaft / Herzogthum Oldenburg
  en: County / Duchy of Oldenburg
  uk: Графство / Герцогство Ольденбург
summary:
  de: Grafschaft Oldenburg-Delmenhorst (biß 1667), ab 1774 Herzogthum Oldenburg. Müntzstätten Oldenburg und Jever (Herrschaft Jever in Personalunion 1575–1667 unter Anton Günther).
  en: County of Oldenburg-Delmenhorst (until 1667), from 1774 Duchy of Oldenburg. Mints at Oldenburg and Jever (Lordship of Jever in personal union 1575–1667 under Anton Günther).
  uk: Графство Ольденбург-Дельменхорст (до 1667), з 1774 герцогство Ольденбург. Монетні двори в Ольденбурзі та Євері (Сеньйорія Євер у особистій унії 1575–1667 за Антона Гюнтера).
fuss_order:
  - seed_unsorted
phases:
  seed_unsorted:
    - id: A
      year_from: 1614
      year_to: 1667
      from_label: (?)
      to_label: (?)
      title:
        de: Bulk-Seed-Phase (Bruun-Import 2026-05)
        en: Bulk seed phase (Bruun import 2026-05)
        uk: Bulk-seed-фаза (Bruun-імпорт 2026-05)
      description:
        de: Sammelphase für die aus Bruun-Auktionskatalogen seed-importierten Stücke. Bei der nächsten Detail-Bearbeitung wandern die einzelnen Münzen in ihre eigene Müntzfuß-Klassifikation.
        en: Catch-all phase for the pieces seed-imported from Bruun auction catalogues. On the next detailed pass each coin will move into its own Müntzfuß classification.
        uk: Збірна фаза для монет, seed-імпортованих з Bruun-аукціонних каталогів. При наступному детальному проходженні кожна монета перейде у власну Müntzfuß-класифікацію.
