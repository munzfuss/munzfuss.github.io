summary:
  de: 'Landgrafschaft (ab 1803 Kurfürstentum) Hessen-Kassel mit Hauptmünze Kassel. Im 18. Jh. zeitweise mit Schweden in Personalunion (Frederik I, König von Schweden 1720–1751, gleichzeitig Landgraf 1730–1751). <em>Stub-Datei: 2 Münzen aus Bruun seed-importiert; Müntzfuß deferred — siehe docs/TODO.md item E.</em>'
  en: 'Landgraviate (from 1803 Electorate) of Hesse-Kassel with main mint at Kassel. In the 18th c. briefly in personal union with Sweden (Frederik I, King of Sweden 1720–1751, simultaneously Landgrave 1730–1751). <em>Stub file: 2 coins seed-imported from Bruun; Müntzfuß deferred — see docs/TODO.md item E.</em>'
  uk: 'Ландграфство (з 1803 курфюрство) Гессен-Кассель з головним монетним двором у Касселі. У XVIII ст. тимчасово в особистій унії зі Швецією (Фредерик I, король Швеції 1720–1751, водночас ландграф 1730–1751). <em>Stub-файл: 2 монети seed-імпортовані з Bruun; Müntzfuß відкладено — див. docs/TODO.md item E.</em>'
