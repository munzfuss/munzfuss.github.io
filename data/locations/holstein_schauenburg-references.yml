      uk: '<b>Bei der Wieden, Helge</b>: <i>Fürst Ernst Graf von Holstein-Schaumburg und seine Wirtschaftspolitik</i> (Rinteln 1961). Економічна та монетна політика Ернста III між Піннебергом та Stadthagen — первинне джерело для атрибуції монетного двору.'
