      title:
        de: "Einführung nach dem Staatsbankrott"
        en: "Introduction after the state bankruptcy"
        uk: "Запровадження після державного банкрутства"
      description:
        de: "Neue Rigsbank gegründet · Rigsdaler-Banknoten der alten Kurantbank im Verhältnis 6:1 auf Rigsbankdaler umgestellt · Speciesbank-Banknoten zur Hälfte in Silber, zur Hälfte in Staatsobligationen ausgezahlt."
        en: "A new Rigsbank is founded · Rigsdaler banknotes of the old Kurant bank are converted to Rigsbankdaler at 6:1 · Speciesbank notes are paid out half in silver, half in government bonds."
        uk: "Засновано новий Rigsbank · банкноти Rigsdaler старого Kurant-банку конвертовано на Rigsbankdaler за курсом 6:1 · банкноти Speciesbank виплачено наполовину сріблом, наполовину державними облігаціями."
