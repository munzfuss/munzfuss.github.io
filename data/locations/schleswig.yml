      numista: '133863'
    metal: silver
    fineness: 0.593
    weight_rough_g: 11.136
    note:
      de: 'Berühmte «Hebræermønt» — Glückstadter Prägung 1645 mit dem Tetragramm יהוה (Jahwe) auf der Rückseite, ein Gebetsappell Christians IV. während des Torstensson-Krieges (1643–1645) gegen Schweden. Reduzierter Feingehalt .593 (gegenüber dem Kronemønt-Standard .671) bei gleichbleibendem Tarif von ⅓ Speciedaler. Die Kronemønt tarifiert den Nennwert ohnehin um ca. +12,6 % über dem Silberwert; die Hebræermønt fügt eine zweite Debasement-Schicht hinzu (zusätzlich −11,6 % am Feingehalt), womit der kumulative Seigniorage-Aufschlag auf ca. +27,6 % steigt. KM# 32 · N#133863.'
      en: 'Famous «Hebræermønt» — the 1645 Glückstadt issue carrying the Tetragrammaton יהוה (YHWH) on the reverse, an appeal to God by Christian IV during the Torstensson War (1643–1645) against Sweden. Reduced fineness .593 (against the Kronemønt standard of .671) at an unchanged tariff of ⅓ Speciedaler. The Kronemønt already tariffs face value at about +12.6 % above silver content; the Hebræermønt adds a second debasement layer (a further −11.6 % in fineness), raising the cumulative seigniorage premium to about +27.6 %. KM# 32 · N#133863.'
      uk: 'Знаменита «Hebræermønt» — карбування Glückstadt 1645 з тетраграматоном יהוה (Ягве) на реверсі, молитовне звернення Кристіана IV під час Торстенсонської війни (1643–1645) зі Швецією. Знижена проба .593 (проти стандартної kronemønt-проби .671) при незмінному тарифі ⅓ Speciedaler. Kronemønt і так тарифує номінал на ~+12,6 % вище срібного вмісту; Hebræermønt додає другий шар debasement (ще −11,6 % за пробою), піднімаючи кумулятивну сеньйораж-надбавку до ~+27,6 %. KM# 32 · N#133863.'
