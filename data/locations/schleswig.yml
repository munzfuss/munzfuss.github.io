  - id: km-105-chr-v-1683
    fuss: 9_thaler
    phase: B
    kind: kurant
    fraction: '1'
    nominal: 1 Thaler Species
    year_label: '1683'
    year_first: 1683
    ruler: Christian V. (Kgr. Dänemark, Glückstadt)
    catalog:
      km: '105'
      numista: '301630'
      lange: '82'
      sieg: '140'
      hede: '120'
      others:
        - KM# 73
        - Dav EC II# 3677
    metal: silver
    weight_rough_g: 29.232
    note:
      de: |-
        1 Thaler Species · Christian V. (Kgr. Dänemark, Glückstadt), 1683 · Münzmeister Christoph Friedrich Woltereck (CW) · Edge-Legende «PIETATE · ET · IUSTITIA … ANNO M·DC·LXXXIII · C W». Hede c5h120<sup><a href="#ref23">[23]</a></sup> belegt 9-Fuß (1 Marck Feinsilber → 9 Speciedaler): 29,232 g rau · .888 · 25,984 g fein = 233,856 / 9 — Reichsthaler-Prägung außerhalb der für Holstein zu dieser Zeit etablierten 9¼-Fuß-Reihe. Numista führt zwei parallele Einträge zur selben Davenport-Typologie (Dav EC II# 3677): N#301630 unter «Danish duchies of Schleswig and Holstein» (KM# 105, Lange 82) und N#308517 unter «City of Glückstadt» (KM# 73, Lange 82A) — gleiche Münze, doppelte Numista-Notierung.
      en: |-
        1 Thaler Species · Christian V of Denmark (Glückstadt mint), 1683 · mintmaster Christoph Friedrich Woltereck (CW) · edge legend «PIETATE · ET · IUSTITIA … ANNO M·DC·LXXXIII · C W». Hede c5h120<sup><a href="#ref23">[23]</a></sup> documents the 9-Fuß (1 fine mark → 9 Speciedaler): 29.232 g rough · .888 · 25.984 g fine = 233.856 / 9 — a Reichsthaler issue outside the 9¼-Fuß series established in Holstein at that time. Numista carries two parallel entries for the same Davenport type (Dav EC II# 3677): N#301630 under «Danish duchies of Schleswig and Holstein» (KM# 105, Lange 82) and N#308517 under «City of Glückstadt» (KM# 73, Lange 82A) — same coin, duplicate Numista listing.
      uk: |-
        1 Thaler Species · Кристіан V (король Данії, Глюкштадт), 1683 · монетмайстер Christoph Friedrich Woltereck (CW) · edge-легенда «PIETATE · ET · IUSTITIA … ANNO M·DC·LXXXIII · C W». Hede c5h120<sup><a href="#ref23">[23]</a></sup> фіксує 9-Fuß (1 марка чистого → 9 Speciedaler): 29,232 г повної ваги · .888 · 25,984 г чистого = 233,856 / 9 — карбування Reichsthaler поза 9¼-Fuß-стандартом, утвердженим у Гольштейні на той час. Numista має два паралельні записи для тієї самої Davenport-типології (Dav EC II# 3677): N#301630 під «Danish duchies of Schleswig and Holstein» (KM# 105, Lange 82) і N#308517 під «City of Glückstadt» (KM# 73, Lange 82A) — одна монета з подвійною нотацією.
    sources:
