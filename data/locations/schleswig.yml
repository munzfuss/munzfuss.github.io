  kronemont_chr_iv:
    - id: A
      year_from: 1618
      year_to: 1624
      from_label: '1618'
      to_label: '1624'
      title:
        de: Christian IV. · Corona Danica · Tarif 1½ Speciedaler
        en: Christian IV · Corona Danica · tariff 1½ Speciedaler
        uk: Кристіан IV · Corona Danica · тариф 1½ Specie
      description:
        de: 'Einzige Phase der Christian-IV.-Krone: alle Prägungen 1618–1624 laufen unter dem ursprünglichen Tarif <b>1½ Speciedaler</b> — eine Wertigkeit, die im Volksmund die satirische Umdeutung des königlichen Wahlspruches <b>RFP</b> (regna firmat pietas) als <b>R(iget) F(attes) P(enge)</b> hervorrief.<sup><a href="#ref25">[25]</a></sup> Die offizielle Tarifsenkung auf 1⅓ Speciedaler erfolgt erst <b>1625</b><sup><a href="#ref21">[21]</a><a href="#ref22">[22]</a></sup>, unmittelbar nach Einstellung der Krone-Prägung. Stilistische Untergruppen: Corona-Danica-Originalprägungen 1618–1622 (KM# 57–61, 58a, 59a) und «Dicke» / Open-Crown-Varianten 1624 (KM# 94–99) — alle innerhalb desselben Tarifregimes.'
        en: 'Sole phase of the Christian IV Krone: all 1618–1624 issues run under the original <b>1½ Speciedaler</b> tariff — a parity that in folk parlance prompted the satirical reread of the royal motto <b>RFP</b> (regna firmat pietas) as <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref25">[25]</a></sup> The official tariff cut to 1⅓ Speciedaler only comes in <b>1625</b><sup><a href="#ref21">[21]</a><a href="#ref22">[22]</a></sup>, right after Krone production stops. Stylistic sub-groups: Corona Danica original strikes 1618–1622 (KM# 57–61, 58a, 59a) and «Dicke» / Open-Crown variants 1624 (KM# 94–99) — all within the same tariff regime.'
        uk: 'Єдина фаза Krone Кристіана IV: усі емісії 1618–1624 під оригінальним тарифом <b>1½ Speciedaler</b> — паритет, який у народі породив сатиричне переосмислення королівського девізу <b>RFP</b> (regna firmat pietas) як <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref25">[25]</a></sup> Офіційне зниження тарифу до 1⅓ Speciedaler відбувається лише <b>1625</b><sup><a href="#ref21">[21]</a><a href="#ref22">[22]</a></sup> — одразу після припинення карбування Krone. Стилістичні підгрупи: оригінальні Corona Danica 1618–1622 (KM# 57–61, 58a, 59a) та варіанти «Dicke» / Open-Crown 1624 (KM# 94–99) — усі в одному тарифному режимі.'

