        Reverse-Legende (alle Jahrgänge): «*VIII* SKILLING DANSKE» + Jahreszahl · Die Wertangabe auf der Münze ist <b>ausschließlich «8 Skilling Danske»</b>. Rechnerische Äquivalente (1/12 Speciedaler zu 60 Skilling Danske; ≈ 4 Schilling lübisch nach hanseatischer Rechnung) stehen <i>nicht auf der Münze</i>. · Obverse «C5 · PIETATE & IVSTITIA» mit gekröntem Monogramm · 82.1 (1694): Umschrift gegen den Uhrzeigersinn · 82.2 (1694, 1695, 1697): Umschrift im Uhrzeigersinn · Münzstätte Glückstadt · Ist-Feingehalt entspricht bereits dem 11⅓-Fuß (20,63435 g je Rigsdaler Courant) — Vorläufer des späteren Kurantmøntfod 1726 nach dem Standard «<i>lighter than Species, heavier than Scheidemünze</i>» · 1/12 Speciedaler = 2,10681 g fein (Rechnungsäquivalent nach gemeinem Reichsthaler-Specie-Fuß)

      en: 'reverse legend (all year issues): «*VIII* SKILLING DANSKE» + the year · the value stated on the coin is <b>solely «8 Skilling Danske»</b>. The accounting equivalents (1/12 Speciedaler on the basis of 60 Skilling Danske; ≈ 4 Schilling lübisch under the Hanseatic reckoning) <i>do not appear on the coin</i>. · Obverse «C5 · PIETATE & IVSTITIA» with a crowned monogram · 82.1 (1694): inscription counter-clockwise · 82.2 (1694, 1695, 1697): inscription clockwise · Glückstadt mint · the coin''s actual fine content already matches the 11⅓-Fuß (20.63435 g per Rigsdaler Courant) — a forerunner of the later Kurantmøntfod of 1726, fitting the standard «<i>lighter than Species, heavier than petty coin</i>». · 1/12 Speciedaler = 2.10681 g fine (accounting equivalent under the common Reichsthaler-Specie standard)'
      uk: 'Легенда реверса (усі річні випуски): «*VIII* SKILLING DANSKE» + рік · на монеті вказано <b>виключно «8 Skilling Danske»</b>. Розрахункові еквіваленти (1/12 Speciedaler за 60 Skilling Danske; ≈ 4 Schilling lübisch за ганзейським рахунком) <i>на монеті не зазначені</i>. · Аверс «C5 · PIETATE & IVSTITIA» із коронованим монограмом · 82.1 (1694): напис проти годинникової стрілки · 82.2 (1694, 1695, 1697): напис за годинниковою стрілкою · монетний двір Glückstadt · фактичний вміст чистого срібла вже відповідає 11⅓-Fuß (20,63435 г на Rigsdaler Courant) — попередник пізнішого Kurantmøntfod 1726 року за стандартом «<i>lighter than Species, heavier than розмінна монета</i>». · 1/12 Speciedaler = 2,10681 г чистого (розрахунковий еквівалент за загальною Reichsthaler-Specie-стопою)'
