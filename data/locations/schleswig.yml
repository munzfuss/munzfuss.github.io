      uk: 1 Kroneskilling (KM# 65, N#109264) — субодиниця Corona Danica за офіційним тарифом 1 Krone = 96 Kroneskilling<sup><a href="#ref21">[21]</a><a href="#ref22">[22]</a></sup>. Емпіричне чисте срібло 0,33 г — приблизно 2× більше, ніж передбачає Krone-стопа (16,250÷96 = 0,17 г) — типово для дрібних монет, які несуть більше срібла на тариф, ніж батьківська тарифна монета.
    sources:
