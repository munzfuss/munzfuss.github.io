      de: "Numista N#22576 / KM# 358 fasst Kopenhagener (Hede 74A 1676–77, Hede 74B 1680–81) und Glückstädter (Hede 123 1681) Prägungen unter einem Eintrag zusammen; die dort aufgeführten Maße und Feingehalt-Werte sind über alle Münzstätten gemittelt und nicht nach Glückstadt aufgeschlüsselt."
      en: "Numista N#22576 / KM# 358 conflates Copenhagen (Hede 74A 1676–77, Hede 74B 1680–81) and Glückstadt (Hede 123 1681) issues in a single entry; the weight and fineness given there are pooled across mints and not broken out for Glückstadt."
      uk: "Numista N#22576 / KM# 358 об'єднує копенгагенські (Hede 74A 1676–77, Hede 74B 1680–81) і ґлюкштадтські (Hede 123 1681) карбування в одному записі; зазначені там вагу й пробу усереднено по всіх монетних дворах і не розщеплено для Glückstadt."
    note:
      de: |-
        2 Skilling Dansk Christians V. · Glückstadt-Prägung von 1681 · <b>Hede 123 / Sieg 129</b> · Mzz. <b>korslagte glødehager</b> (gekreuzte Glüheisen) — Münzmeister <b>Christopher Friedrich Woltereck</b> (Glückstadt 1680–1718). Obverse Wappenschild mit gekrönter Krone und Legende «CHRISTIAN · V · D · G · DAN»; Reverse Wertangabe «II SKILL DANS» auf drei Zeilen über dem Mzz., Außenlegende «· NOR · VAN · GOT · REX · 1681». Glückstadter Scheidemünze im 9¼-Fuß-System bei reduziertem Feingehalt .281. <b>Krause-Konflation:</b> KM# 358 fasst die Kopenhagener Hede 74A (1676/77, MT11), Hede 74B (1680/81, GS = Sesemann) und die Glückstadter Hede 123 (1681 nur) unter einer Nummer zusammen; nur die letztere ist eine holsteinische Prägung und gehört in dieses Verzeichnis.
        Quelle der Hede-Aufschlüsselung: danskmoent.dk «<i>2 Skilling/2 Rigsbankskilling</i>» — Eintrag für Christian 5.
      en: |-
        2 Skilling Dansk of Christian V · Glückstadt issue of 1681 · <b>Hede 123 / Sieg 129</b> · mintmark <b>korslagte glødehager</b> (crossed rakes) — mintmaster <b>Christopher Friedrich Woltereck</b> (Glückstadt 1680–1718). Obverse coat of arms with a flat-topped crown and legend «CHRISTIAN · V · D · G · DAN»; reverse value «II SKILL DANS» on three lines above the mintmark, outer legend «· NOR · VAN · GOT · REX · 1681». Glückstadt petty coin within the 9¼-Fuß system at reduced fineness .281. <b>Krause conflation:</b> KM# 358 lumps the Copenhagen Hede 74A (1676/77, MT11), Hede 74B (1680/81, GS = Sesemann) and the Glückstadt Hede 123 (1681 only) under a single number; only the last is a Holstein issue and belongs in this register.
        Source for the Hede split: danskmoent.dk «<i>2 Skilling / 2 Rigsbankskilling</i>» — entry for Christian 5.
      uk: |-
        2 Skilling Dansk Кристіана V · ґлюкштадтське карбування 1681 р. · <b>Hede 123 / Sieg 129</b> · монограма <b>korslagte glødehager</b> (схрещені граблі) — монетмайстер <b>Christopher Friedrich Woltereck</b> (Glückstadt 1680–1718). Аверс — гербовий щит із пласкокупольною короною та легендою «CHRISTIAN · V · D · G · DAN»; реверс — номінал «II SKILL DANS» на трьох рядках над монограмою, зовнішня легенда «· NOR · VAN · GOT · REX · 1681». Ґлюкштадтська розмінна монета в системі 9¼-Fuß зі зниженою пробою .281. <b>Конфлятація Krause:</b> KM# 358 об'єднує копенгагенські Hede 74A (1676/77, MT11), Hede 74B (1680/81, GS = Sesemann) і ґлюкштадтський Hede 123 (тільки 1681) під одним номером; лише останній є гольштинським карбуванням і належить до цього реєстру.
        Джерело розщеплення Hede: danskmoent.dk «<i>2 Skilling / 2 Rigsbankskilling</i>» — запис для Christian 5.
    sources:
      - type: numista
        url: "https://en.numista.com/22576"
        ref: "Numista N#22576 (lumps Copenhagen + Glückstadt)"
      - type: web
        url: "https://www.danskmoent.dk/2skill.htm"
        ref: "danskmoent.dk · Hede 123 = Glückstadt 1681"
