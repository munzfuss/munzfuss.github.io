        Lorbeerkranz-Variante · Münzmeister <b>Christoph Friedrich Woltereck</b> (CW, Glückstadt 1680–1702) — Nachfolger seines Onkels Johann Woltereck (Glückstadt 1664–1679). Obverse-Legende «5CC5 / CW», reverse «IIII · MARCK · DANSKE» mit Datum. <em>Anmerkung:</em> die CW-Initialen sind hier nicht mit Christian Winnecke senior zu verwechseln, der zeitgleich an der Kopenhagener Münze (Mzz. ♡) tätig war — zwei verschiedene Personen mit denselben Initialen. · <em>Hede-Typologie:</em> Hede 125C ist der eindeutige Untertyp «Lorbeerkranz, 1694–1696» innerhalb von Hede 125 (Glückstadt, dobbelt slynget Monogram), Sieg 139<sup><a href="#ref23">[23]</a></sup>; Geschwistertypen sind 125A (Palmkranz, 1692–1694, Sieg 138.1) und 125B (Palmkranz mit Datum unter dem Schild, 1693, Sieg 138.2). · Numista führt zwei parallele Einträge zur selben Hede 125C-Typologie — N#108735 unter «4 Marck Danske» (Issuer: City of Glückstadt) und N#313360 unter «1 Krone» (Issuer: Danish duchies of Schleswig-Holstein), gleiche Münze, doppelte Numista-Notierung; Davenport (Dav EC II# 3680) gibt allen drei Krause-Nummern KM# 80, 83 und 114 denselben Typ. Empirische Stückgewichte 22,19–22,54 g (Schulman E-Auction 19/2060, Schulman 390/27, Stack's Bowers Dec. 2025/13247) liegen im erwarteten 10½-Krone-Fuß-Bereich (Formelwert 22,272 g).

      en: |-
