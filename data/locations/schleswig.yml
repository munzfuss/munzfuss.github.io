      de: 'Reverse-Inschrift: «.II. MARCK. .LVB. 1681» (Numista N#313874) — explizit Marck Lübisch, nicht Marck Danske oder Marck Sch.-H. Courant. Im Wendisch-Lübischen System gilt 2 Marck Lübisch ≈ ⅔ Reichsthaler Specie. Der für solche Stücke übliche Feingehalt liegt nicht bei den .875 der vollwertigen Thaler-Species-Stope, sondern bei rund .750 — daraus die hier angesetzte Probe (mit (?), nicht primär belegt). Theoretisch fällt diese Münze damit nicht in den 9¼-Speciedaler-Fuß; der zutreffende Standard wäre eine eigene Wendisch-Lübisch-Stope (~9⅔-Fuß bei .750 Feingehalt), die in unserem Fuß-Register noch nicht definiert ist. Christian Albrecht v. Gottorp · Dav SG# 576.'
      en: 'Reverse inscription: «.II. MARCK. .LVB. 1681» (Numista N#313874) — explicitly Marck Lübisch, not Marck Danske or Marck Sch.-H. Courant. In the Wendisch-Lübisch system 2 Marck Lübisch ≈ ⅔ Reichsthaler Specie. Coins of this kind were not struck at the full Thaler-Species fineness of .875 but at roughly .750 — hence the value used here (still flagged with (?), no primary documentation). Theoretically the coin therefore does not belong to the 9¼-Speciedaler-Fuß; its proper standard would be a dedicated Wendisch-Lübisch Fuß (~9⅔-Fuß at .750), not yet defined in our Fuß register. Christian Albrecht of Gottorp · Dav SG# 576.'
      uk: 'Реверс-інскрипція: «.II. MARCK. .LVB. 1681» (Numista N#313874) — явно Marck Lübisch, не Marck Danske й не Marck Sch.-H. Courant. У вендсько-любецькій системі 2 Marck Lübisch ≈ ⅔ Reichsthaler Specie. Монети цього типу карбували не за повною пробою Thaler-Species .875, а приблизно на .750 — звідси наша оцінка (з (?), бо первинного документа нема). Теоретично монета не належить до 9¼-Speciedaler-Fuß; її правильний стандарт — окрема вендсько-любецька стопа (~9⅔-Fuß при .750 проби), якої поки нема в нашому реєстрі стоп. Крістіан Альбрехт Ґотторпський · Dav SG# 576.'
