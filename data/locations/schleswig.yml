        Münzmeister <b>Christoph Friedrich Woltereck</b> (CW, Glückstadt 1680–1702) — Nachfolger seines Onkels Johan(n) Woltereck (IW, 1664–1679) · Reverse-Legende «PIETATE. ET. | IUSTITIA . | 1680 . C·⚒·W·». <em>Anmerkung:</em> die CW-Initialen sind hier nicht mit Christian Wineke senior zu verwechseln, der zeitgleich an der Kopenhagener Münze (KM# 414, N#112811, Fr# 201) tätig war — zwei verschiedene CW-Personen. Nach Bruun (Part II, Lot 13180): «<i>The Ducats struck in Glückstadt differ from the ones struck in Copenhagen in being minted for regular trade use rather than just as occasion coins</i>». <b>Glückstadt-Dukat-Praxis</b>: Feingehalt <b>.979</b> (= ⁹⁴⁰⁄₉₆₀ ≈ 23 K 5 Gr) statt der vollen Reichsdukatenfuß-Norm .986 (23 K 8 Gr) — dokumentiert in Hede c5h117 und Bruun-Specimen. Numista N#275959 nennt für diesen Typ allerdings den nominellen Wert .986.
      en: |-
        Mintmaster <b>Christoph Friedrich Woltereck</b> (CW, Glückstadt 1680–1702) — successor to his uncle Johan(n) Woltereck (IW, 1664–1679) · reverse legend «PIETATE. ET. | IUSTITIA . | 1680 . C·⚒·W·». <em>Note:</em> the CW initials here are not to be confused with Christian Wineke senior, who was simultaneously active at the Copenhagen mint (KM# 414, N#112811, Fr# 201) — two different CW persons. Per Bruun (Part II, lot 13180): «<i>The Ducats struck in Glückstadt differ from the ones struck in Copenhagen in being minted for regular trade use rather than just as occasion coins</i>». <b>Glückstadt ducat practice</b>: fineness <b>.979</b> (= ⁹⁴⁰⁄₉₆₀ ≈ 23 K 5 Gr) instead of the full Reichsdukatenfuß .986 (23 K 8 Gr) — documented by Hede c5h117 and Bruun specimens. Numista N#275959 lists the nominal Reichsdukatenfuß value .986 for this type.
      uk: |-
        Монетмайстер <b>Christoph Friedrich Woltereck</b> (CW, Glückstadt 1680–1702) — наступник свого дядька Johan(n) Woltereck (IW, 1664–1679) · легенда реверсу «PIETATE. ET. | IUSTITIA . | 1680 . C·⚒·W·». <em>Зауваження:</em> ініціали CW тут не плутати з Christian Wineke senior, що паралельно працював у копенгагенському монетному дворі (KM# 414, N#112811, Fr# 201) — це дві різні особи з ініціалами CW. За Bruun (частина II, лот 13180), глюкштадтські дукати карбували <i>для регулярного торгового обігу, а не лише як приурочені випуски</i>. <b>Практика ґлюкштатського дуката</b>: проба <b>.979</b> (= ⁹⁴⁰⁄⁹⁶⁰ ≈ 23 K 5 Gr) замість повного Reichsdukatenfuß .986 (23 K 8 Gr) — задокументовано в Hede c5h117 і Bruun-специменах. Numista N#275959, втім, наводить для цього типу номінальний Reichsdukatenfuß-показник .986.
    sources:
