  - id: km-313830-chr-a-1676
    fuss: 9_25_thaler
    phase: A
    kind: kurant
    fraction: 2/3
    nominal: ⅔ Thaler
    year_label: '1676'
    year_first: 1676
    ruler: Christian Albrecht von Gottorp
    metal: silver
    weight_rough_g: 22.11
    note:
      de: 'Reverse-Inschrift: «PER: ASPERA: AD ASTRA. 1676» mit explizitem Wertindex «2/3» (Numista N#313830, Münzmeisterzeichen H L). Anders als KM# 134/136 trägt der Reverse hier nicht «MARCK LVB», sondern nur die ⅔-Wertangabe. Die metrischen Parameter (Raugewicht ~22 g, Frederik-III-/Christian-Albrecht-Gottorper Datierung) entsprechen aber sehr genau dem Wendisch-Lübisch-Typ (≈ ⅔ Reichsthaler Specie); mit den vollen .875 Feingehalt der Speciedaler-Stope ergäbe sich eine unrealistische Feinsilberüberhöhung von ~+15 %. Auf rund .750 Feingehalt — dem für solche Wendisch-Lübisch-Stücke üblichen Standard — fällt das Stück in die Toleranz. Probe deshalb mit (?), nicht primär belegt. Theoretisch wäre eine eigene Wendisch-Lübisch-Stope die korrektere Klassifikation. Christian Albrecht v. Gottorp · Dav SG# 573.'
      en: 'Reverse inscription: «PER: ASPERA: AD ASTRA. 1676» with the explicit value mark «2/3» (Numista N#313830, mintmaster mark H L). Unlike KM# 134/136 the reverse here does not carry «MARCK LVB» — only the ⅔ value. The metric parameters (rough weight ~22 g, dated to the Frederik III / Christian Albrecht Gottorp era) however match the Wendisch-Lübisch type (≈ ⅔ Reichsthaler Specie) very closely; at the full .875 Speciedaler fineness one would obtain an unrealistic +15 % surplus of fine silver. At about .750 — the standard customary for such Wendisch-Lübisch pieces — the coin falls within tolerance. Fineness used here with (?), no primary documentation. Theoretically a dedicated Wendisch-Lübisch Fuß would be the more correct classification. Christian Albrecht of Gottorp · Dav SG# 573.'
      uk: 'Реверс-інскрипція: «PER: ASPERA: AD ASTRA. 1676» з явним позначенням вартості «2/3» (Numista N#313830, знак монетмайстра H L). На відміну від KM# 134/136 на реверсі тут немає «MARCK LVB» — лише ⅔-індекс. Метричні параметри (повна вага ~22 г, час Фредеріка III / Крістіана Альбрехта Ґотторпського) усе ж дуже близькі до вендсько-любецького типу (≈ ⅔ Reichsthaler Specie); при повній пробі Speciedaler .875 виходить нереальний надлишок чистого срібла ~+15 %. На пробі ~.750 — типовій для таких вендсько-любецьких випусків — монета вкладається у толеранс. Тому пробу взято з (?), без первинної документації. Теоретично правильніша класифікація — окрема вендсько-любецька стопа. Крістіан Альбрехт Ґотторпський · Dav SG# 573.'
