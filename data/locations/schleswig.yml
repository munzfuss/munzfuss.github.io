# ---------------------------------------------------------------------
# Per-Müntzfuß framing in this location: validity range, background, closing
# ---------------------------------------------------------------------
fuss_periods:
  9_thaler:
    pdate_label:
      de: "Geltungsbereich in Holstein: 1566 (Augspurger Reichsmünz-Abschied) → ca. 1622 (Kipper-Wipper-Krise) · ~56 Jahre"
      en: "In force in Holstein: 1566 (Augsburg Imperial Mint Decree) → ca. 1622 (Kipper-Wipper crisis) · ~56 years"
      uk: "Дія в Гольштейні: 1566 (Авґсбурзький імперський монетний ордонанс) → бл. 1622 (Kipper-Wipper-криза) · ~56 років"
    hintergrund:
      de: |
        Reichsstandard nach dem Augspurger Reichsmüntz-Abschied vom 30. Mai 1566 — verbindlich für sämtliche Reichsstände. In Holstein-Gottorp dominierte er unter Adolf I., Johann Adolf und Friedrich III.; Münzstätten Glückstadt und Tönning prägten nach diesem Fuß Thaler Species, Mark-lübisch-Theilstücke und Schillinge. Während der Kipper-Wipper-Krise (1620–1623) brach das einheitliche Reichsmünzwesen zusammen — danach setzt sich in Holstein der leichtere 9¼-Thaler-Fuß als Großsilberstandard durch.
      en: |-
        Imperial standard following the Augsburg Imperial Mint Decree of 30 May 1566 — binding on all imperial estates. In Holstein-Gottorp it dominated under Adolf I, Johann Adolf and Friedrich III; the Glückstadt and Tönning mints struck Thaler Species, Mark-lübisch sub-units and Schilling petty coins on this standard. The Kipper-Wipper crisis (1620–1623) collapsed the unified imperial coinage; the lighter 9¼-Thaler-Fuß then established itself in Holstein as the large-silver standard.
      uk: |-
        Імперський стандарт за Авґсбурзьким імперським монетним ордонансом 30 травня 1566 р. — обов'язковий для всіх імперських станів. У Гольштейн-Ґотторпі домінував за Адольфа I, Йоганна Адольфа й Фредеріка III; монетні двори Glückstadt і Tönning карбували за цим стандартом Thaler Species, частки Mark lübisch і дрібні Schilling-монети. Криза Kipper-Wipper (1620–1623) зруйнувала єдину імперську монетну систему — далі в Гольштейні утверджується легший 9¼-Thaler-Fuß як великосрібний стандарт.
    closing_label:
      de: "Übergang zum 9¼-Fuß (Thaler Species) nach 1622"
      en: "Transition to the 9¼-Fuß (Thaler Species) after 1622"
      uk: "Перехід до 9¼-Fuß (Thaler Species) після 1622"
    closing:
      de: |
        Der 9-Thaler-Fuß war kurzlebig in Holstein selbst (Adolf I. → Friedrich III. um 1622), bleibt aber als <b>Hamburger Bank-Mark</b> und <b>Lübecker Speciemark</b> Rechnungseinheit bis 1875. Die holsteinischen Reichsthaler unter Johann Adolf gehören zu den frühesten dokumentierten Großsilbermünzen der Region und bilden die Grundlage für die spätere 9¼-Fuß-Tradition.
      en: |-
        The 9-Thaler-Fuß was short-lived in Holstein itself (Adolf I → Friedrich III, c. 1622), but it survived as the <b>Hamburg Bank Mark</b> and <b>Lübeck Speciemark</b> unit of account until 1875. The Holstein Reichsthaler under Johann Adolf are among the earliest documented large-silver coins in the region and form the foundation for the later 9¼-Fuß tradition.
      uk: |-
        9-Thaler-Fuß у самому Гольштейні був недовговічним (Адольф I → Фредерік III, бл. 1622), однак як <b>Гамбурзька Bank-Mark</b> і <b>Любецька Speciemark</b> залишався розрахунковою одиницею до 1875 р. Гольштинські рейхсталери за Йоганна Адольфа належать до найдавніших задокументованих великосрібних монет регіону і становлять основу пізнішої традиції 9¼-Fuß.

  9_25_thaler:
    pdate_label:
      de: "Geltungsbereich in Holstein: ca. 1622 (Friedrich III.) → 24. Aug. 1866 (preuß. Annexion) · ca. 244 Jahre"
      en: "In force in Holstein: ca. 1622 (Friedrich III) → 24 Aug. 1866 (Prussian annexation) · ~244 years"
      uk: "Дія в Гольштейні: бл. 1622 (Фредерік III) → 24 серпня 1866 (прусська анексія) · ~244 роки"
    hintergrund:
      de: |
        Großsilbermünze nach dänisch-holsteinischer Tradition; etwas leichter als der Reichs-9-Fuß. Durchgehend stabil seit ca. 1622 (Friedrich III. von Gottorp, Glückstadt) biß zur preußischen Annexion 1867. Mit der Schleswig-Holsteinischen Reform von 1788 (siehe Phase C) wird er zur Alleingrundmünze aller holsteinischen Courant-Nominale.
      en: |-
        A large silver coin in the Danish-Holstein tradition; slightly lighter than the imperial 9-Fuß. Stable without interruption since ca. 1622 (Friedrich III of Gottorp, Glückstadt) until the Prussian annexation of 1867. With the Schleswig-Holstein reform of 1788 (see Phase C) it becomes the sole base coin of all Holstein Courant denominations.
      uk: |-
        Велика срібна монета дансько-гольштинської традиції; дещо легша за імперський 9-Fuß. Безперервно стабільна з бл. 1622 р. (Фредерік III Ґотторпський, Glückstadt) до прусської анексії 1867 р. З Шлезв.-Гольштинською реформою 1788 р. (див. Phase C) стає єдиною базовою монетою для всіх гольштинських Courant-номіналів.
    closing_label:
      de: "Zusammenfassung · 240 Jahre Geltung"
      en: "Summary · 240 years in force"
      uk: "Підсумок · 240 років чинності"
    closing:
      de: |
        Der 9¼-Thaler-Fuß ist der <b>längstlebige und stabilste</b> Silberstandard in der holsteinischen Geldgeschichte. Über politische Umwälzungen hinweg (Gottorp-Vereinigung 1773, Staatsbankrott 1813, mehrere Herrscherwechsel, Kondominium 1864<sup><a href="#ref11">[11]</a></sup>) blieb der Feingehalt von 25,28173 g konstant. Erst die preußische Annexion 1866 beendet seine Funktion als gesetzliches Zahlmittel. Numismatisch wirkt er biß 1907 nach, als der letzte Vereinsthaler (nachfolger-Fuß) ausser Kurs gesetzt wird.
      en: |-
        The 9¼-Thaler-Fuß is the <b>longest-lived and most stable</b> silver standard in Holstein's monetary history. Through every political upheaval (the Gottorp union of 1773, the state bankruptcy of 1813, several royal successions, the condominium of 1864<sup><a href="#ref11">[11]</a></sup>) the fine weight of 25.28173 g remained unchanged. Only the Prussian annexation of 1866 ended its function as legal tender. Numismatically it lived on until 1907, when the last Vereinsthaler (its successor standard) was withdrawn from circulation.
      uk: |-
        9¼-Thaler-Fuß — <b>найдовговічніший і найстабільніший</b> срібний стандарт у грошовій історії Гольштейну. Через усі політичні переломи (обʼєднання з Готторпом 1773, державне банкрутство 1813, кілька зміни правителів, кондомініум 1864<sup><a href="#ref11">[11]</a></sup>) чиста вага 25,28173 г залишалася незмінною. Лише прусська анексія 1866 поклала край його статусу законного платіжного засобу. Нумізматично він діяв до 1907 року, коли останній Vereinsthaler (стопа-наступник) було вилучено з обігу.

  kronemont:
    pdate_label:
      de: "Geltungsbereich: 1644 → 1696 · ca. 52 Jahre"
      en: "Period of validity: 1644 → 1696 · ~52 years"
      uk: "Період дії: 1644 → 1696 · ~52 років"
    hintergrund:
      de: |-
        Fiskalische <b>Tarifmünze</b> der dänischen Krone, 1618–1696. Nennwert per königlichem Mandat über dem Silberwert festgesetzt; die Differenz floß als Seigniorage in die Staatskasse. <b>Historischer Vorläufer:</b> der Krone-Standard <b>Christian IVs kroner</b> (Corona Danica 1618–1624) — dieselbe Münzkategorie (Tarifmünze) und derselbe Münzname, aber mit höherem Feingehalt und höherem Tarif pro Krone als der 10½-Krone-Fuß. Der 1644 in Glückstadt wiederaufgenommene <b>10½-Krone-Fuß</b> («<i>Grobe Krone</i>») übernimmt nur die Tarif-Logik der Krone, nicht ihre metrischen Parameter. <b>Paralleler dänischer Standard:</b> der <b>13-Krone-Fuß</b> («<i>Feine Krone</i>», Reskript 31. Dezember 1692) — eine ausschließlich auf die Kopenhagener Hauptmünze beschränkte Reform, in Holstein nicht durchgeführt; daher in diesem Artefakt nicht als eigene Sektion behandelt.
      en: |-
        Fiscal <b>tariff coin</b> of the Danish Crown, 1618–1696. Face value set by royal mandate above the silver value; the gap accrued to the treasury as seigniorage. <b>Historical predecessor:</b> the Krone standard <b>Christian IV's kroner</b> (Corona Danica 1618–1624) — same coin category (tariff coin) and same coin name, but at higher fineness and a higher per-Krone tariff than the 10½-Krone-Fuß. The Glückstadt standard taken up again in 1644 — the <b>10½-Krone-Fuß</b> («<i>Coarse Krone</i>») — inherits only the Krone's tariff logic, not its metric parameters. <b>Parallel Danish standard:</b> the <b>13-Krone-Fuß</b> («<i>Fine Crown</i>», reskript of 31 December 1692) — a reform confined entirely to the Copenhagen royal mint, never carried through in Holstein; therefore not treated as its own section in this artefact.
      uk: |-
        Фіскальна <b>тарифна монета</b> данської Корони, 1618–1696. Номінал встановлювався королівським мандатом вище срібної вартості; різниця надходила до скарбниці як сеньйораж. <b>Історичний предтеча:</b> Krone-стандарт <b>Christian IV's kroner</b> (Corona Danica 1618–1624) — та сама монетна категорія (тарифна монета) і та сама назва монети, але з вищою пробою і вищим тарифом на одну Krone, ніж 10½-Krone-Fuß. Відновлений у Glückstadt 1644 р. <b>10½-Krone-Fuß</b> («<i>Груба Крона</i>») успадковує лише тарифну логіку Krone, не її метричні параметри. <b>Паралельний данський стандарт:</b> <b>13-Krone-Fuß</b> («<i>Тонка Крона</i>», рескрипт 31 грудня 1692 р.) — реформа, що обмежувалась виключно Копенгагенським королівським монетним двором, у Гольштейні не впроваджена; тому в цьому артефакті окремою секцією не подається.
    details:
      de: |
        <p>Die Kronemønt wurde 1618 unter Christian IV. als <i>Corona Danica</i> eingeführt — keine Handelsmünze nach Silbergehalt, sondern eine Binnenwährung mit königlich verfügtem Tarif. Der Aufschlag über dem tatsächlichen Silberwert war Seigniorage-Gewinn der Krone.</p>
        <p>Der ursprüngliche Tarif (1 Krone = 1½ Speciedaler) bedeutete einen erheblichen Seigniorage-Aufschlag über dem reinen Silberwert; im Volksmund wurde der königliche Wahlspruch <b>RFP</b> (regna firmat pietas — «Frömmigkeit stärkt die Reiche») daraufhin als <b>R(iget) F(attes) P(enge)</b> — «Dem Reich fehlt Geld» — gelesen.<sup><a href="#ref25">[25]</a></sup> Im Jahre 1625 wurde der Tarif auf 1⅓ Specie herabgesetzt; um 1670 stabilisierte ihn Christian V. auf <b>⅔ Specie</b> = 2 Marck Danske, eine Wertigkeit, die fortan auf den Münzen explizit als «<b>2 MARCK</b>» eingeprägt erscheint.</p>
        <p>Geprägt wurde in <b>Kopenhagen</b> (königliche Münze) und in <b>Glückstadt</b> (holsteinische Münze, ab 1644 dominant). Die Kronemønt zirkulierte nach dem königlich gesetzten Tarif; parallel prägten Kopenhagen und Glückstadt vollwertige Speciedaler nach 9¼-Fuß (siehe Bruun-Lots im Speciedaler-Abschnitt). Die Serie endet 1696; ab 1726 löst der <b>Rigsdaler Courant (11⅓-Fuß)</b> sie als dänische Hauptmünze ab — auf Grundlage der Metalläquivalenz statt der Tarif-Logik.</p>
        <p><b>Quellengrundlage des Müntzfußes und des Feingehalts:</b> Bei fehlenden Primärtexten der Münzedikte sind die Müntzen selbst die Quelle. Der Müntzfuß <b>10½</b> ergibt sich exakt: 22,272 g Raugewicht × 10,5 = 233,856 g = 1 Cöllnische Marck (ohne Rundung). Der Feingehalt <b>.671</b> auf Numista entspricht der nächstgelegenen kanonischen Loth-Grän-Stufe <b>⁴³⁄₆₄ = 10 Loth 12 Grän = .671875</b> — die Differenz liegt in der vierten Dezimalstelle, innerhalb der üblichen Numista-Rundung auf drei Stellen; benachbarte Stufen (.6641 und .6797) sind ausgeschlossen. Der Müntzfuß <b>10½</b> bezieht sich auf die RAUE Marck, nicht auf Feinsilber wie bei den Thaler-Müntzfüßen. Belegexemplare: N#111284, N#111285, N#108760, N#108735.</p>
        <p><b>Spezialliteratur:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) und <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — beide trennen die Kronemønt-Serie bewußt vom regulären Speciedaler.</p>
      en: |-
        <p>The Kronemønt was introduced in 1618 by Christian IV as the <i>Corona Danica</i> — not a trade coin valued by silver content but a domestic currency with a royally decreed tariff. The premium above the actual silver value was Crown seigniorage.</p>
        <p>The original tariff (1 Krone = 1½ Speciedaler) implied a substantial seigniorage premium above the pure silver value; the royal motto <b>RFP</b> (regna firmat pietas — «piety strengthens kingdoms») was therefore reread in folk parlance as <b>R(iget) F(attes) P(enge)</b> — «the realm lacks money».<sup><a href="#ref25">[25]</a></sup> In 1625 the tariff was lowered to 1⅓ Specie; around 1670 Christian V stabilised it at <b>⅔ Specie</b> = 2 Marck Danske, a parity which thereafter appears explicitly on the coins as «<b>2 MARCK</b>».</p>
        <p>Striking took place at <b>Copenhagen</b> (royal mint) and at <b>Glückstadt</b> (the Holstein mint, dominant from 1644 onwards). The Kronemønt circulated at the royally set tariff; in parallel both Copenhagen and Glückstadt struck full-value Speciedaler on the 9¼-Fuß (see the Bruun lots in the Speciedaler section). The series ends in 1696; from 1726 the <b>Rigsdaler Courant (11⅓-Fuß)</b> succeeds it as the principal Danish coin — on a metal-equivalence basis rather than a tariff basis.</p>
        <p><b>Source basis for the standard and fineness:</b> in the absence of accessible mint-edict texts, the coins themselves are the source. The standard <b>10½</b> follows exactly: 22.272 g rough × 10.5 = 233.856 g = 1 Cologne mark (no rounding). The fineness <b>.671</b> on Numista matches the nearest canonical Loth-Grän step <b>⁴³⁄₆₄ = 10 Loth 12 Grän = .671875</b> — a 4th-decimal difference, within Numista's usual 3-digit rounding; the adjacent steps .6641 and .6797 are ruled out. The standard <b>10½</b> refers to the RAW mark, not to fine silver as in the Thaler standards. Reference specimens: N#111284, N#111285, N#108760, N#108735.</p>
        <p><b>Specialist literature:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) and <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — both deliberately separate the Kronemønt series from the regular Speciedaler.</p>
      uk: |-
        <p>Kronemønt запроваджено 1618 року Кристіаном IV як <i>Corona Danica</i> — не торговельну монету за вмістом срібла, а внутрішню валюту з королівсько встановленим тарифом. Надбавка над фактичною срібною вартістю становила сеньйораж Корони.</p>
        <p>Початковий тариф (1 Krone = 1½ Speciedaler) означав суттєву сеньйораж-надбавку над чистою срібною вартістю; королівський девіз <b>RFP</b> (regna firmat pietas — «побожність зміцнює царства») у народі відтак переосмислили як <b>R(iget) F(attes) P(enge)</b> — «Державі бракує грошей».<sup><a href="#ref25">[25]</a></sup> 1625 року тариф знижено до 1⅓ Specie; близько 1670 року Кристіан V стабілізував його на рівні <b>⅔ Specie</b> = 2 Marck Danske — паритет, який відтоді з'являється на монетах явно як «<b>2 MARCK</b>».</p>
        <p>Карбування здійснювалося в <b>Копенгагені</b> (королівський монетний двір) і в <b>Glückstadt</b> (гольштинський монетний двір, домінантний з 1644). Kronemønt оберталась за встановленим королем тарифом; паралельно Копенгаген і Glückstadt карбували повноцінні Speciedaler за 9¼-Fuß (див. Bruun-лоти в Speciedaler-розділі). Серія завершується 1696 року; з 1726 р. <b>Rigsdaler Courant (11⅓-Fuß)</b> змінює її як головна данська монета — на основі еквівалентності металу, не тарифу.</p>
        <p><b>Джерельна база стопи та проби:</b> за відсутності доступних текстів монетних едиктів первинним джерелом є самі монети. Стопа <b>10½</b> виходить точно: 22,272 г повної ваги × 10,5 = 233,856 г = 1 кельнська марка (без округлення). Проба <b>.671</b> у Numista збігається з найближчою канонічною точкою системи Loth-Grän <b>⁴³⁄₆₄ = 10 Loth 12 Grän = .671875</b> — різниця в четвертій цифрі після коми, у межах звичайного округлення Numista до трьох знаків; сусідні рівні .6641 і .6797 виключаються. Стопа <b>10½</b> рахується від повної (rau) марки, а не від чистого срібла як у Thaler-стопах. Зразки-приклади: N#111284, N#111285, N#108760, N#108735.</p>
        <p><b>Спеціальна література:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) і <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — обидва навмисно відокремлюють серію Kronemønt від звичайного Speciedaler.</p>

  11_333_thaler:
    pdate_label:
      de: "Geltungsbereich in Holstein: 15./31. Juli 1726 → 5. Januar 1813 · ca. 87 Jahre"
      en: "In force in Holstein: 15/31 July 1726 → 5 January 1813 · ~87 years"
      uk: "Дія в Гольштейні: 15/31 липня 1726 → 5 січня 1813 · ~87 років"
    hintergrund:
      de: |
        Hauptalltagswährung des dänisch-norwegischen Gesamtstaats, einschließlich der dänischen Herzogthümer. Eingeführt unter Friedrich IV. Endet abrupt mit dem Staatsbankrott vom 5. Januar 1813.
      en: |-
        Main everyday currency of the Danish-Norwegian composite state, including the Danish duchies. Introduced under Friedrich IV. Ended abruptly with the state bankruptcy of 5 January 1813.
      uk: |-
        Основна повсякденна валюта дансько-норвезької цілісної держави, включно з данськими герцогствами. Запроваджено за правління Фрідріха IV. Обривається державним банкрутством 5 січня 1813 р.
    closing_label:
      de: "Zusammenfassung · 87 Jahre Geltung (nur 62 in Holstein)"
      en: "Summary · 87 years in force (only 62 in Holstein)"
      uk: "Підсумок · 87 років чинності (з них лише 62 у Гольштейні)"
    closing:
      de: |
        Der 11⅓-Fuß war die Alltagswährung Holsteins von 1726 biß 1788. Mit Schimmelmanns Reform 1788 zog sich Holstein aus dem dänischen Courantverbund zurück und rechnete nach dem 9¼-Fuß Thaler Species mit Schilling-Theilung. Der Staatsbankrott 1813 beendete den 11⅓-Fuß in Dänemark selbst; Altbestände kursierten aber noch jahrzehntelang als Scheidemünzen.
      en: |-
        The 11⅓-Fuß was Holstein's everyday currency from 1726 to 1788. With Schimmelmann's reform of 1788 Holstein withdrew from the Danish Courant union and switched its accounting to the 9¼-Fuß Thaler Species with the Schilling subdivision. The state bankruptcy of 1813 ended the 11⅓-Fuß in Denmark itself; existing stocks nevertheless circulated for decades as petty coinage.
      uk: |-
        11⅓-Fuß був повсякденною валютою Гольштейну з 1726 до 1788 р. З реформою Шіммельмана 1788 р. Гольштейн вийшов із данського Courant-союзу й перевів рахунок на 9¼-Fuß Thaler Species із поділом на Schilling. Державне банкрутство 1813 р. поклало край 11⅓-Fuß у самій Данії; старі запаси, втім, ще десятиліттями залишались в обігу як розмінна монета.

  18_5_thaler:
    pdate_label:
      de: "Geltungsbereich in Holstein: 5. Januar 1813 → 24. Aug. 1866 · ca. 53 Jahre (in Dänemark weiter biß 1875)"
      en: "In force in Holstein: 5 January 1813 → 24 Aug. 1866 · ~53 years (continued in Denmark itself until 1875)"
      uk: "Дія в Гольштейні: 5 січня 1813 → 24 серпня 1866 · ~53 роки (у самій Данії — до 1875)"
    hintergrund:
      de: |
        Nach dem dänischen Staatsbankrott durch Forordning vom 5. Januar 1813 eingeführt; löst den 11⅓-Fuß Courant ab. §10 derselben Forordning setzt den Rücknahmekurs <b>1 Speciedaler = 2 Rigsbankdaler</b>, wodurch der neue Fuß als glatter ½-Anteil des bestehenden Thaler-Species-Standards (9¼-Fuß) verankert ist. 1854 in Rigsdaler Rigsmønt umbenannt — ohne Fußänderung. Unter österreichisch-preußischem Kondominium 1864–1866 unverändert weitergeführt.<sup><a href="#ref11">[11]</a><a href="#ref14">[14]</a><a href="#ref24">[24]</a></sup>
      en: |-
        Introduced by the Forordning of 5 January 1813 after the Danish state bankruptcy; replaces the 11⅓-Fuß Courant. §10 of the same Forordning sets the redemption rate at <b>1 Speciedaler = 2 Rigsbankdaler</b>, anchoring the new standard as a clean ½-share of the existing Thaler Species (9¼-Fuß). Renamed to Rigsdaler Rigsmønt in 1854 — with no change of standard. Carried on unchanged through the Austro-Prussian condominium of 1864–1866.<sup><a href="#ref11">[11]</a><a href="#ref14">[14]</a><a href="#ref24">[24]</a></sup>
      uk: |-
        Запроваджено Forordning 5 січня 1813 р. після данського державного банкрутства; замінює 11⅓-Fuß Courant. §10 тієї ж Forordning встановлює курс викупу <b>1 Speciedaler = 2 Rigsbankdaler</b>, що закріплює нову стопу як рівну ½ частку чинного стандарту Thaler Species (9¼-Fuß). У 1854 р. перейменовано на Rigsdaler Rigsmønt — без зміни стопи. За австрійсько-прусського кондомініуму 1864–1866 рр. без змін.<sup><a href="#ref11">[11]</a><a href="#ref14">[14]</a><a href="#ref24">[24]</a></sup>
    closing_label:
      de: "Zusammenfassung · 53 Jahre Geltung in Holstein"
      en: "Summary · 53 years in force in Holstein"
      uk: "Підсумок · 53 роки чинності в Гольштейні"
    closing:
      de: |
        Der 18½-Fuß war die offizielle Landeswährung Holsteins von 1813 biß 1866. Nach dem Staatsbankrott eingeführt, überstand er die Umbenennung 1854 (Frederik VII.) und das österreichisch-preußische Kondominium 1864–1866 unverändert. In Dänemark selbst blieb er biß 1875 in Kraft (weitere 9 Jahre nach Ende in Holstein). Die preußische Annexion 1866 ersetzt ihn in Holstein durch den Vereinsthalerfuß.
      en: |-
        The 18½-Fuß was Holstein's official territorial currency from 1813 to 1866. Introduced after the state bankruptcy, it survived the renaming of 1854 (Frederik VII) and the Austro-Prussian condominium of 1864–1866 unchanged. In Denmark itself it remained in force until 1875 (a further nine years beyond Holstein). The Prussian annexation of 1866 replaced it in Holstein with the Vereinsthalerfuß.
      uk: |-
        18½-Fuß був офіційною територіальною валютою Гольштейну від 1813 до 1866. Запроваджений після державного банкрутства, без змін пережив перейменування 1854 (Фредерік VII) і австрійсько-прусський кондомініум 1864–1866. У самій Данії діяв до 1875 (ще девʼять років після завершення в Гольштейні). Прусська анексія 1866 заміняє його в Гольштейні на Vereinsthalerfuß.

  30_thaler:
    pdate_label:
      de: "Geltungsbereich in Holstein: 24. Aug. 1866 → 4. Dez. 1871 · ca. 5 Jahre (im Reich als Vereinsthaler biß 1907)"
      en: "In force in Holstein: 24 Aug. 1866 → 4 Dec. 1871 · ~5 years (across the Reich, as Vereinsthaler, until 1907)"
      uk: "Дія в Гольштейні: 24 серпня 1866 → 4 грудня 1871 · ~5 років (у Рейху як Vereinsthaler — до 1907)"
    hintergrund:
      de: |
        Wiener Münzvertrag 24. Januar 1857: gemeinsamer deutscher Silberstandard, neu auf das Zollpfund bezogen statt auf die bisherige Cöllnische Marck. Preußen führt ihn in Holstein mit der Annexion 1866 ein; damit endet in Holstein die dänisch-geprägte Geldtradition nach ca. 240 Jahren.
      en: |-
        Vienna Monetary Treaty of 24 January 1857: a common German silver standard, newly referenced to the Zollpfund instead of the previous Cologne Mark. Prussia introduces it in Holstein with the annexation of 1866; this ends the Danish-shaped monetary tradition in Holstein after roughly 240 years.
      uk: |-
        Віденська монетна конвенція 24 січня 1857 р.: спільний німецький срібний стандарт, відлічуваний від Zollpfund замість попередньої кельнської марки. Пруссія запроваджує його в Гольштейні з анексією 1866 р.; це завершує сформовану на данський лад грошову традицію Гольштейну приблизно через 240 років.
    closing_label:
      de: "Zusammenfassung · 5 Jahre in Holstein, 41 Jahre als gesetzliches Zahlmittel"
      en: "Summary · 5 years in Holstein, 41 years as legal tender"
      uk: "Підсумок · 5 років у Гольштейні, 41 рік статусу законного платіжного засобу"
    closing:
      de: |
        Der 30-Fuß gilt in Holstein formal nur von der preußischen Annexion 1866 biß zur Einführung der Goldmark (Münzgesetz 4. Dez. 1871). Als <b>Vereinsthaler bleibt er aber biß 1907 gesetzliches Zahlmittel im Deutschen Kaiserreich</b> (letzter Rückruf-Termin 1. Oktober 1907). Nachhaltigstes Erbe: die «3 Mark»-Stücke der Reichsmünze (1908+) folgen dem Vereinsthaler-Feingewicht (900 ‰, identische Abmessungen), sind also faktisch fortgeführte Vereinsthaler.
      en: |-
        Formally the 30-Fuß applies in Holstein only from the Prussian annexation of 1866 until the introduction of the Goldmark (Coinage Act of 4 Dec. 1871). As the <b>Vereinsthaler, however, it remained legal tender in the German Empire until 1907</b> (final recall: 1 October 1907). Its most enduring legacy: the «3 Mark» pieces of the Reichsmünze (1908+) keep the Vereinsthaler's fine weight (900‰, identical dimensions) and are de facto continued Vereinsthaler.
      uk: |-
        Формально 30-Fuß діє в Гольштейні лише від прусської анексії 1866 до запровадження Goldmark (Закон про монету 4 грудня 1871). Однак як <b>Vereinsthaler він лишається законним платіжним засобом у Німецькому Рейху до 1907</b> (остаточне вилучення — 1 жовтня 1907). Найтриваліша спадщина: «3 Mark» Reichsmünze (1908+) повторюють чисту вагу Vereinsthaler (900 ‰, ідентичні розміри) і де-факто є продовженням Vereinsthaler.

  reichsdukatenfuss:
    pdate_label:
      de: "Geltungsbereich in Holstein: 17. Jh. (Glückstadt) → 4. Dez. 1871 · ca. 270 Jahre"
      en: "In force in Holstein: 17th century (Glückstadt) → 4 Dec. 1871 · ~270 years"
      uk: "Дія в Гольштейні: XVII ст. (Glückstadt) → 4 грудня 1871 · ~270 років"
    hintergrund:
      de: |
        Reichs-Dukatenstandard, eingeführt durch die Augspurger Reichsmünzordnung vom 19. August 1559. Gilt einheitlich im HRRDN-Raum biß zum Reichsgoldmünzfuß (Münzgesetz 4. Dezember 1871). In Holstein wurden Dukaten in Glückstadt, Gottorp und Altona geprägt; in der historischen Praxis lag das Feingewicht oft etwas unter dem Nominalwert, das Grundprinzip blieb jedoch über die gesamte Geltungsdauer unverändert.
      en: |-
        Imperial ducat standard introduced by the Augsburg Imperial Coinage Ordinance of 19 August 1559. In force across the Holy Roman Empire until the Reichsgoldmünzfuß (Coinage Act of 4 December 1871). In Holstein, ducats were struck at Glückstadt, Gottorp and Altona; in actual practice the fine weight often fell slightly below the nominal target, but the underlying principle remained unchanged for the entire period.
      uk: |-
        Імперський дукатний стандарт, запроваджений Авґсбурзьким імперським монетним ордонансом 19 серпня 1559 р. Діє в усьому просторі Священної Римської імперії до Reichsgoldmünzfuß (Закон про монету 4 грудня 1871 р.). У Гольштейні дукати карбували Glückstadt, Gottorp і Altona; у фактичній практиці чиста вага часто була трохи нижчою за номінальну, проте основний принцип за весь період незмінний.
    closing_label:
      de: "Zusammenfassung · ca. 270 Jahre Geltung"
      en: "Summary · ~270 years in force"
      uk: "Підсумок · ~270 років чинності"
    closing:
      de: |
        Der Reichsdukatenfuß ist der <b>stabilste Müntzfuß</b> in der gesamten Übersicht — stabilere Geltung als jeder Silberfuß: von der Augspurger Reichsmünzordnung 1559 biß zum Reichsgoldmünzfuß 1871 (312 Jahre Reichsgeltung, davon in Holstein mindestens 250 Jahre). Gold als Wertträger widerstand politischen Krisen, Staatsbankrotten (1813) und Herrschaftswechseln. Erst die strukturelle Umstellung auf Goldwährung statt Goldhandelsmünze mit Silber-Parallelwährung (Münzgesetz 4. Dez. 1871) beendet den Dukatenfuß endgültig.
      en: |-
        The Reichsdukatenfuß is the <b>most stable Müntzfuß</b> in the whole survey — more durable than any silver standard: from the Augsburg Imperial Coinage Ordinance of 1559 to the Reichsgoldmünzfuß of 1871 (312 years across the Reich, of which at least 250 in Holstein). Gold as a store of value withstood political crises, the state bankruptcy of 1813 and changes of dynasty. Only the structural shift from a gold trade-coin alongside a parallel silver currency to a true gold currency (Coinage Act of 4 Dec. 1871) ended the Dukatenfuß definitively.
      uk: |-
        Reichsdukatenfuß — <b>найстабільніша Müntzfuß</b> у всьому огляді: триваліша за будь-який срібний стандарт — від Авґсбурзького імперського монетного ордонансу 1559 до Reichsgoldmünzfuß 1871 (312 років у Рейху, з яких щонайменше 250 у Гольштейні). Золото як носій вартості витримало політичні кризи, державне банкрутство 1813 і зміни династій. Лише структурний перехід від торгової золотої монети з паралельною срібною валютою до власне золотої валюти (Закон про монету 4 грудня 1871) остаточно завершив Dukatenfuß.

  kronemont_fine:
    pdate_label:
      de: 'Geltungsbereich (Kopenhagen): 31. Dez. 1692 → 1771 · ca. 79 Jahre · in Holstein nicht eingeführt'
      en: 'Period of validity (Copenhagen): 31 Dec. 1692 → 1771 · ~79 years · not introduced in Holstein'
      uk: 'Період дії (Копенгаген): 31 грудня 1692 → 1771 · ~79 років · у Гольштейні не запроваджено'
    hintergrund:
      de: |
        Dritte und letzte Krone-Münzformel der dänischen Monarchie. Reskript vom 31. Dezember 1692 (Christian V.): höhere nominale Lötigkeit (13⅓ Loth ≈ .833) bei reduziertem Raugewicht (17,988 g) gegenüber dem 10½-Krone-Fuß — der tatsächliche Feinsilbergehalt liegt jedoch nur 0,02 g höher pro Stück, die Reform ist vorwiegend Symbolik der Vertrauenswiederherstellung. Letzte Prägung 1771. <b>In Holstein nicht durchgeführt</b> — die «<i>Feine Krone</i>» ist eine ausschließlich auf die Kopenhagener Hauptmünze beschränkte Reform und wird daher in diesem Verzeichnis nur kontextuell aufgeführt (keine Gockstadter oder Tönninger Belege).
      en: |-
        The third and final Krone formula of the Danish monarchy. Reskript of 31 December 1692 (Christian V): higher nominal fineness (13⅓ Loth ≈ .833) on a reduced rough weight (17.988 g) versus the 10½-Krone-Fuß — yet the actual fine-silver content is only 0.02 g higher per coin, the reform is largely symbolic, intended to restore confidence. Last struck 1771. <b>Not introduced in Holstein</b> — the «<i>Fine Crown</i>» is a reform confined entirely to the Copenhagen royal mint and is therefore listed here only for context (no Glückstadt or Tönning specimens).
      uk: |-
        Третя і остання Krone-формула данської монархії. Рескрипт 31 грудня 1692 р. (Кристіан V): вища номінальна проба (13⅓ Loth ≈ .833) при зменшеній повній вазі (17,988 г) порівняно з 10½-Krone-Fuß — однак фактичний вміст чистого срібла лише на 0,02 г вищий за монету, реформа переважно символічна, мала на меті відновити довіру. Востаннє карбувалася 1771 р. <b>У Гольштейні не запроваджено</b> — «<i>Тонка Крона</i>» це реформа, обмежена виключно Копенгагенським королівським монетним двором, тому в цьому реєстрі вона наведена лише контекстуально (ґлюкштадтських чи тенніннгських зразків немає).
    closing_label:
      de: "Zusammenfassung · ausschließlich Kopenhagen, kein Holstein-Bestand"
      en: "Summary · Copenhagen-only, no Holstein register"
      uk: "Підсумок · виключно Копенгаген, гольштинських зразків немає"
    closing:
      de: |
        Der 13-Krone-Fuß ist im Holstein-Verzeichnis ein <b>kontextueller Eintrag</b>: in der dänisch-holsteinischen Zeitlinie parallel zum 10½-Krone-Fuß (Glückstadt 1644–1696) und zum 11⅓-Thaler-Fuß (Holstein ab 1726), aber selbst nie in Holstein eingeführt. Vollständige Belegtypologie und Stempelvarianten finden sich in den Kopenhagener Spezialkatalogen (Sven Aagaard <i>Kronemønt</i>-Studien; Hede / Schou).
      en: |-
        Within the Holstein register the 13-Krone-Fuß is a <b>contextual entry</b>: in the Danish-Holstein timeline it runs in parallel with the 10½-Krone-Fuß (Glückstadt 1644–1696) and the 11⅓-Thaler-Fuß (Holstein from 1726), yet it was never itself introduced in Holstein. Full type catalogue and die-variants are documented in the Copenhagen specialist literature (Sven Aagaard's <i>Kronemønt</i> studies; Hede / Schou).
      uk: |-
        У гольштинському реєстрі 13-Krone-Fuß — <b>контекстуальний запис</b>: у дансько-гольштинській хронології він проходить паралельно з 10½-Krone-Fuß (Glückstadt 1644–1696) і 11⅓-Thaler-Fuß (Гольштейн з 1726), однак сам у Гольштейні не запроваджувався. Повна типологія та штемпельні варіанти задокументовані в копенгагенських спеціальних каталогах (студії Sven Aagaard про <i>Kronemønt</i>; Hede / Schou).

  guldkrone:
    pdate_label:
      de: 'Geltungsbereich: 1657 → 1670 · 13 Jahre (Frederik-III.-Tarifregime; in Holstein nur Glückstadt-Phase 1657–1660)'
      en: 'Period of validity: 1657 → 1670 · 13 years (Frederik III tariff regime; in Holstein only the Glückstadt phase 1657–1660)'
      uk: 'Період дії: 1657 → 1670 · 13 років (тарифний режим Фредеріка III; у Гольштейні лише ґлюкштадтська фаза 1657–1660)'
    hintergrund:
      de: |
        Goldene <b>Tarifmünze</b> Frederik III., 1657 in Glückstadt eingeführt; goldenes Pendant der Krone-Mønt-Kategorie mit gleicher Tarif-Logik wie die silberne Krone, aber in 22-karätigem Gold und mit eigener metrischer Definition (≈ 39 Stück je Cöllnische Marck Raulegierung von 22 Karat = 5,996 g rau / 5,498 g fein je Stück). Tarif <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Geprägt in Glückstadt 1657–1660 (Hede 145B, Mzm. Jacob Schwieger) und in Kopenhagen 1668 (KM# 303, bei reduziertem Tarif von 3 Speciedaler und kleinerem Raugewicht von 5,47 g — ein verwandter, aber physikalisch anderer Müntzfuß). Mit dem Tod Frederiks III. 1670 endet die Guldkrone-Tarifprägung; Christian V. setzt sie nicht fort und prägt in Glückstadt nur noch nach dem Reichsdukatenfuß. <b>Nicht zu verwechseln mit dem Goldgulden</b> (HRR-Goldmünze nach Reichsmünzordnung 1559, andere Lineage und andere Tarifeinheit).
      en: |-
        A gold <b>tariff coin</b> of Frederik III, introduced at Glückstadt in 1657; the gold counterpart of the Krone-Mønt category, with the same tariff logic as the silver Krone but in 22-carat gold and with its own metric definition (≈ 39 pieces per Cologne mark of raw 22-carat alloy = 5.996 g rough / 5.498 g fine each). Tariff <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Struck at Glückstadt 1657–1660 (Hede 145B, mintmaster Jacob Schwieger) and at Copenhagen in 1668 (KM# 303, at a reduced tariff of 3 Speciedaler and a smaller rough weight of 5.47 g — a related but physically distinct standard). With the death of Frederik III in 1670 Guldkrone tariff coinage ends; Christian V does not continue it and strikes Glückstadt gold only on the Reichsdukatenfuß. <b>Not to be confused with the Goldgulden</b> (Holy Roman Empire gold coin under the Reichsmünzordnung of 1559, separate lineage and a different tariff unit).
      uk: |-
        Золота <b>тарифна монета</b> Фредеріка III, запроваджена в Glückstadt 1657 р.; золотий аналог Krone-Mønt-категорії з тією ж тарифною логікою, що й срібна Krone, але в 22-каратному золоті й з власним метричним означенням (≈ 39 штук з кельнської марки сплаву 22 карат = 5,996 г повної ваги / 5,498 г чистого на штуку). Тариф <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Карбувалася в Glückstadt 1657–1660 (Hede 145B, монетмайстер Jacob Schwieger) і в Копенгагені 1668 р. (KM# 303, зі зниженим тарифом 3 Speciedaler і меншою повною вагою 5,47 г — споріднена, але фізично окрема стопа). Зі смертю Фредеріка III 1670 р. тарифне карбування Guldkrone завершується; Кристіан V його не продовжує і в Glückstadt карбує золото лише за Reichsdukatenfuß. <b>Не плутати з Goldgulden</b> (золота монета Священної Римської імперії за Reichsmünzordnung 1559, окрема лінія й інша тарифна одиниця).
    closing_label:
      de: "Zusammenfassung · 13 Jahre Frederik-III.-Tarifregime"
      en: "Summary · 13 years of the Frederik III tariff regime"
      uk: "Підсумок · 13 років тарифного режиму Фредеріка III"
    closing:
      de: |
        Der Guldkrone-Fuß ist eines der <b>kürzlebigsten Tarifregime</b> im Holstein-Verzeichnis: ein einziger Regent (Frederik III., 1648–1670) und zwei Münzstätten (Glückstadt 1657–1660, Kopenhagen 1668). Im Holstein-Skopus liegt nur die Glückstadt-Phase mit dem kanonischen Typ Hede 145B (Mzm. Jacob Schwieger); die Kopenhagener Folgeprägung 1668 ist als eigener Typ erfaßt, gehört aber nicht zu diesem Verzeichnis. Mit Christian V. läuft die Guldkrone-Tarif-Logik aus — Goldprägung in Glückstadt setzt sich nur noch im Reichsdukatenfuß fort.
      en: |-
        The Guldkrone-Fuß is one of the <b>shortest-lived tariff regimes</b> in the Holstein register: a single ruler (Frederik III, 1648–1670) and two mints (Glückstadt 1657–1660, Copenhagen 1668). Only the Glückstadt phase falls within the Holstein scope, with the canonical type Hede 145B (mintmaster Jacob Schwieger); the Copenhagen follow-up of 1668 is registered as its own type but does not belong to this catalogue. With Christian V the Guldkrone tariff logic lapses — gold coinage at Glückstadt continues only on the Reichsdukatenfuß.
      uk: |-
        Guldkrone-Fuß — один із <b>найкоротших тарифних режимів</b> у гольштинському реєстрі: один правитель (Фредерік III, 1648–1670) і два монетні двори (Glückstadt 1657–1660, Копенгаген 1668). У гольштинський скоуп потрапляє лише ґлюкштадтська фаза з канонічним типом Hede 145B (монетмайстер Jacob Schwieger); копенгагенський наступний випуск 1668 р. зафіксовано як окремий тип, але до цього каталогу він не належить. За Кристіана V тарифна логіка Guldkrone згортається — золоте карбування в Glückstadt далі ведеться лише за Reichsdukatenfuß.

# ---------------------------------------------------------------------
# Phase definitions — grouped by fuss
# ---------------------------------------------------------------------

  kronemont_chr_iv:
    pdate_label:
      de: 'Geltungsbereich: 1618 → 1624 · ca. 6 Jahre'
      en: 'Period of validity: 1618 → 1624 · ~6 years'
      uk: 'Період дії: 1618 → 1624 · ~6 років'
    hintergrund:
      de: 'Christian IVs kroner 1618–1624. Tarifmünze, 1618 als <i>Corona Danica</i> mit Tarif 1½ Speciedaler eingeführt; die Prägung endet 1624, im Folgejahr <b>1625</b> wird der Tarif offiziell auf 1⅓ Speciedaler gesenkt; danach folgt eine 19-jährige Pause der Krone-Prägung biß zur Wiederaufnahme im 10½-Krone-Fuß (Glückstadt) 1644.<sup><a href="#ref16">[16]</a><a href="#ref21">[21]</a><a href="#ref22">[22]</a><a href="#ref23">[23]</a></sup>'
      en: 'Christian IV''s kroner 1618–1624. A tariff coin, introduced in 1618 as the <i>Corona Danica</i> at 1½ Speciedaler; production ends in 1624, and in the following year, <b>1625</b>, the tariff is officially cut to 1⅓ Speciedaler; thereafter a 19-year hiatus of Krone production follows, until the revival in the 10½-Krone-Fuß (Glückstadt) in 1644.<sup><a href="#ref16">[16]</a><a href="#ref21">[21]</a><a href="#ref22">[22]</a><a href="#ref23">[23]</a></sup>'
      uk: 'Christian IV''s kroner 1618–1624. Тарифна монета, запроваджена 1618 р. як <i>Corona Danica</i> за тарифом 1½ Speciedaler; карбування завершується 1624 р., наступного <b>1625</b> року тариф офіційно знижено до 1⅓ Speciedaler; далі настає 19-річна перерва карбування Krone — аж до відновлення у 10½-Krone-Fuß (Glückstadt) 1644 р.<sup><a href="#ref16">[16]</a><a href="#ref21">[21]</a><a href="#ref22">[22]</a><a href="#ref23">[23]</a></sup>'
    details:
      de: "<p>Die Christian-IV.-Krone war keine Handelsmünze nach Silbergehalt, sondern eine fiskalische Tarifmünze: ihr Nennwert wurde vom König per Mandat über dem tatsächlichen Silberwert festgesetzt, die Differenz floß als Seigniorage in die Staatskasse.</p><p><b>Primärkanonische Hede-Formel</b><sup><a href=\"#ref23\">[23]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ Stück je 13¾-lötiger Marck</b> = 18,909 g rau bei .859 Feingehalt = 16,250 g fein je Krone. Diese ungewöhnliche Bruchform (12,367 statt eines glatten 12½) deutet darauf hin, daß der Münzedikt 1618 den Fuß nicht über eine runde Stückzahl, sondern über die <b>Daler-Ausbringung</b> definierte — also über den nominellen Gesamtwert in Speciedaler, der aus einer feinen Marck Silber als Krone-Münzen herauskam. Bei Anfangstarif 1½ Specie pro Doppelkrone (= ¾ Specie pro Krone): aus 233,856 g Feinsilber gehen 14,391 Krone, deren Nennwert sich auf 10,793 Speciedaler addiert (Hede H105<sup><a href=\"#ref23\">[23]</a></sup>). Nach der Forordning vom 14. Februar 1624 wird die Specie selbst auf 100 Skilling neu tarifiert; die physische Krone bleibt unverändert, aber dieselbe Marck Feinsilber «bringt» nach der neuen Specie-Skala nur noch 10,361 Speciedaler aus (Hede H124<sup><a href=\"#ref23\">[23]</a></sup>).</p><p>1618 wurde nur die 2 Krone (damals einfach «Krone» genannt) nach dieser Formel geprägt; ½, ¼ und ⅛ Krone des Jahres 1618 folgten einer leicht niedrigeren Münzfod, deren exakte Werte aus Wilcke nachzutragen sind. Ab 1619 prägt auch die ½ Krone nach der Hauptformel<sup><a href=\"#ref23\">[23]</a></sup>.</p><p><b>Spezialliteratur:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) und <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — behandeln vor allem die spätere Wiederaufnahme im 10½-Krone-Fuß («<i>Grobe Krone</i>»); die Christian-IV.-Phase wird primär aus dem Hede-/Schou-Katalog (H105–H107, H124–H126) sowie den Bruun-Lots 13089 ff. (Stack's Bowers Auktion Part II, Zürich 14.–15. März 2025) belegt.</p>"
      en: "<p>The Christian IV Krone was not a trade coin valued by silver content but a fiscal tariff coin: its face value was set by royal mandate above the actual silver value, the gap accruing to the treasury as seigniorage.</p><p><b>Primary catalogue formula (Hede)</b><sup><a href=\"#ref23\">[23]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ pieces per 13¾-lødig mark</b> = 18.909 g rough at .859 fineness = 16.250 g fine per Krone. The unusual fractional form (12.367 rather than a clean 12½) suggests the 1618 mint edict defined the standard not via a round piece count but via the <b>daler output</b> — that is, the total face value, expressed in Speciedaler, that one fine mark of silver yielded once struck into Krone coin. At the initial tariff of 1½ Specie per Doppelkrone (= ¾ Specie per Krone): 233.856 g of fine silver yields 14.391 Krone, whose face values add up to 10.793 Speciedaler (Hede H105<sup><a href=\"#ref23\">[23]</a></sup>). After the Forordning of 14 February 1624 the Specie itself is re-rated to 100 Skilling; the physical Krone is unchanged, but on the new Specie scale the same fine mark now yields only 10.361 Speciedaler (Hede H124<sup><a href=\"#ref23\">[23]</a></sup>).</p><p>In 1618 only the 2 Krone (then simply called «Krone») was struck on this formula; the ½, ¼ and ⅛ Krone of 1618 followed a slightly lower Münzfod whose exact values still need to be lifted from Wilcke. From 1619 the ½ Krone also follows the main formula<sup><a href=\"#ref23\">[23]</a></sup>.</p><p><b>Specialist literature:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) and <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — these treat mainly the later revival under the 10½-Krone-Fuß («<i>Coarse Krone</i>»); the Christian IV phase is documented primarily through the Hede / Schou catalogue (H105–H107, H124–H126) and Bruun lots 13089 ff. (Stack's Bowers auction Part II, Zurich 14–15 March 2025).</p>"
      uk: "<p>Krone Кристіана IV не була торговельною монетою за вмістом срібла, а фіскальною тарифною: її номінал встановлювався королівським мандатом вище фактичної срібної вартості, різниця надходила до скарбниці як сеньйораж.</p><p><b>Першоджерельна Hede-формула</b><sup><a href=\"#ref23\">[23]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ штук з 13¾-lødig марки</b> = 18,909 г повної ваги за проби .859 = 16,250 г чистого на Krone. Незвична дробова форма (12,367 замість «красивого» 12½) вказує на те, що монетний едикт 1618 р. задавав стопу не через круглу кількість штук, а через <b>вихід у даллерах (daler-udbringning)</b> — тобто через сумарну номінальну вартість у Speciedaler, яку одна марка чистого срібла «приносила» при карбуванні в Krone-монети. За початкового тарифу 1½ Specie на Doppelkrone (= ¾ Specie на одну Krone): з 233,856 г чистого срібла виходить 14,391 Krone, сумарна номінальна вартість яких становить 10,793 Speciedaler (Hede H105<sup><a href=\"#ref23\">[23]</a></sup>). Після Forordning 14 лютого 1624 р. сам Specie перетарифовано на 100 Skilling; фізично Krone лишається без змін, але та сама марка чистого срібла за новою Specie-шкалою «приносить» уже лише 10,361 Speciedaler (Hede H124<sup><a href=\"#ref23\">[23]</a></sup>).</p><p>1618 р. за цією формулою карбувалась лише 2 Krone (тоді просто «Krone»); ½, ¼ та ⅛ Krone 1618 р. йшли за дещо нижчою møntfod, точні значення якої треба підняти з Wilcke. З 1619 р. ½ Krone теж переходить на головну формулу<sup><a href=\"#ref23\">[23]</a></sup>.</p><p><b>Спеціальна література:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) і <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — стосуються переважно пізнішого відновлення у 10½-Krone-Fuß («<i>Груба Крона</i>»); фаза Кристіана IV задокументована переважно за Hede/Schou (H105–H107, H124–H126) і лотами Bruun 13089 і далі (Stack's Bowers auction Part II, Цюрих 14–15 березня 2025).</p>"
phases:
  9_thaler:
    - id: A
      year_from: 1566
      year_to: 1622
      from_label: "30. Mai 1566"
      to_label: "ca. 1622"
      title:
        de: "Reichsmünzordnung in Holstein-Gottorp"
        en: "Imperial Mint Decree in Holstein-Gottorp"
        uk: "Імперський монетний ордонанс у Гольштейн-Ґотторпі"
      description:
        de: "Holsteinische Reichsthaler-Prägungen unter Adolf I., Johann Adolf und frühem Friedrich III. — vor der Kipper-Wipper-Krise und vor der Etablierung des leichteren 9¼-Fuß."
        en: "Holstein Reichsthaler issues under Adolf I, Johann Adolf, and early Friedrich III — before the Kipper-Wipper crisis and before the establishment of the lighter 9¼-Fuß."
        uk: "Гольштинські карбування Reichsthaler за Адольфа I, Йоганна Адольфа та раннього Фредеріка III — до Kipper-Wipper-кризи й до запровадження легшого 9¼-Fuß."
      context:
        de: |
          <b>Reichsstandard biß 1622:</b> Reichsthaler 9-Fuß (.889/14²⁄₉ Loth, 25,984 g fein), Mark-lübisch-Theilstücke (½, ¼, ⅛ Thaler), Schillinge (1/32, 1/48 Thaler), Pfennig-Scheidemünzen (1/96, 1/128 Thaler).<br>
          <b>Münzstätten:</b> in Holstein-Gottorp vor allem Schleswig und Husum. Nach dem Kipper-Wipper-Zusammenbruch (~1620) verlieren die Reichsstände das einheitliche Münzwesen — danach setzt sich der leichtere 9¼-Fuß (Thaler Species, 25,28173 g fein gegen 25,984 g im 9-Fuß) durch.
        en: |-
          <b>Imperial standard until 1622:</b> Reichsthaler at 9-Fuß (.889/14²⁄₉ Loth, 25.984 g fine), Mark-lübisch sub-units (½, ¼, ⅛ Thaler), Schilling pieces (1/32, 1/48 Thaler), Pfennig petty coins (1/96, 1/128 Thaler).<br> <b>Mints:</b> in Holstein-Gottorp mainly Schleswig and Husum. After the Kipper-Wipper collapse (~1620) the imperial estates lose unified coinage — the lighter 9¼-Fuß (Thaler Species, 25.28173 g fine vs. 25.984 g in the 9-Fuß) takes over thereafter.
        uk: |-
          <b>Імперський стандарт до 1622:</b> Reichsthaler у 9-Fuß (.889/14²⁄₉ Loth, 25,984 г чистого), частки Mark lübisch (½, ¼, ⅛ Thaler), Schilling-монети (1/32, 1/48 Thaler), Pfennig-розмінні монети (1/96, 1/128 Thaler).<br> <b>Монетні двори:</b> в Гольштейн-Ґотторпі переважно Шлезвіг і Гузум. Після колапсу Kipper-Wipper (~1620) імперські стани втрачають єдину монетну систему — далі утверджується легший 9¼-Fuß (Thaler Species, 25,28173 г чистого проти 25,984 г у 9-Fuß).

    - id: B
      year_from: 1683
      year_to: 1683
      from_label: '1683'
      to_label: '1683'
      title:
        de: Glückstadter Speciedaler nach 9-Fuß (1683)
        en: Glückstadt Speciedaler at 9-Fuß (1683)
        uk: Ґлюкштатський Speciedaler за 9-Fuß (1683)
      description:
        de: 'Speciedaler Christians V. von 1683 (Münzstätte Glückstadt), gemünzt nach dem Reichsthaler-9-Fuß — also nach einem Standard, der in Holstein bereits seit ca. 1622 vom 9¼-Fuß abgelöst war. Dokumentiert als Hede 120 (danskmoent.dk c5h120<sup><a href="#ref23">[23]</a></sup>): aus einer feinen Marck Silber wurden 9 Speciedaler ausgeprägt — kanonisch der 9-Fuß. Auflage und Anlaß der Prägung sind aus den uns vorliegenden Quellen nicht ersichtlich.'
        en: 'A 1683 Speciedaler of Christian V (Glückstadt mint), struck on the Reichsthaler-9-Fuß — a standard that had been superseded in Holstein by the 9¼-Fuß since ca. 1622. Documented as Hede 120 (danskmoent.dk c5h120<sup><a href="#ref23">[23]</a></sup>): one fine mark of silver yielded 9 Speciedaler — the canonical 9-Fuß. Mintage figures and the reason for striking on this standard are not given in the sources available here.'
        uk: 'Speciedaler Кристіана V 1683 р. (монетний двір Glückstadt), викарбуваний за стандартом Reichsthaler-9-Fuß — стопою, яку в Гольштейні з ~1622 р. вже витіснив 9¼-Fuß. Задокументовано як Hede 120 (danskmoent.dk c5h120<sup><a href="#ref23">[23]</a></sup>): з марки чистого срібла викарбувано 9 Speciedaler — канонічний 9-Fuß. Тираж та обставини карбування саме за цим стандартом у доступних нам джерелах не зазначені.'
  9_25_thaler:
    - id: A
      year_from: 1622
      year_to: 1726
      from_label: "ca. 1622"
      to_label: "15. Juli 1726"
      title:
        de: "Etablierung unter dänischer und gottorpischer Herrschaft"
        en: "Establishment under Danish and Gottorp rule"
        uk: "Становлення під данським і ґотторпським правлінням"
      description:
        de: "Holstein zweigetheilt: Königsl. dänischer Antheil (Glückstadt, Pinneberg, Rantzau) und Gottorpischer Antheil (Tönning, Schleswig, Kiel) · keine einheitliche Münzstruktur · Aufgeld zwischen Species und Umlaufmünzen üblich."
        en: "Holstein divided in two: the royal Danish part (Glückstadt, Pinneberg, Rantzau) and the Gottorp part (Tönning, Schleswig, Kiel) · no unified coinage structure · a premium between Species and circulating coins is the norm."
        uk: "Гольштейн розділений на дві частини: королівська данська частина (Glückstadt, Pinneberg, Rantzau) і ґотторпська частина (Tönning, Schleswig, Kiel) · єдиної монетної структури немає · надбавка (Aufgeld) між Species і обіговими монетами — звична практика."
      context:
        de: |
          <b>Dominierende Großsilbermünze:</b> Thaler Species im 9¼-Fuß, nach dänischer Tradition etabliert; daneben lübisch geprägte Schilling-Scheidemünzen. <b>Zeitgenössische Nomenklatur:</b> auf den Münzen «SPECIES» oder Mark-Danske-Denomination; in Auktionskatalogen auch «Speciedaler».<br>
          <b>Hauptumlauf in Holstein:</b> Neben heimischen Prägungen zirkulieren lübische, hamburgische und norddeutsche Thaler Species; niederländische Patagonen/Albertusthaler; schwedische 4-Mark-Stücke; spanische Piaster — der Handel akzeptiert jede Species nach Silbergehalt.<br>
          <b>Parallel zur Thaler-Species-Prägung: die Kronemønt-Kategorie (1618 → 1696).</b> Siehe eigene Sektion <i>10½-Krone-Fuß · Kronemønt-Tarifmünze</i> unten, wo die Tarifhistorie 1½ → 1⅓ → ⅔ Speciedaler und die Prägetabelle 1644–1696 detailliert dokumentiert sind.
        en: |-
          <b>Dominant large silver coin:</b> the Thaler Species in the 9¼-Fuß, established by Danish tradition; alongside it, Schilling petty coinage in Lübeck reckoning. <b>Contemporary nomenclature:</b> on the coins themselves «SPECIES» or a Mark-Danske denomination; auction catalogues often use «Speciedaler».<br> <b>Main circulation in Holstein:</b> besides domestic issues, Lübeck, Hamburg and North-German Thaler Species circulate; Dutch Patagonen/Albertusthaler; Swedish 4-Mark pieces; Spanish piastres — trade accepts every Species by silver content.<br> <b>In parallel with the Thaler Species issues — the Kronemønt category (1618 → 1696).</b> See the dedicated section <i>10½-Krone-Fuß · Kronemønt tariff coin</i> below, which documents the tariff history 1½ → 1⅓ → ⅔ Speciedaler and the strike table 1644–1696 in detail.
        uk: |-
          <b>Домінантна велика срібна монета:</b> Thaler Species у 9¼-Fuß, закріплений данською традицією; поруч — Schilling-розмінна монета у любецькому рахунку. <b>Сучасна термінологія:</b> на самих монетах «SPECIES» або номінал у Mark-Danske; аукціонні каталоги вживають також «Speciedaler».<br> <b>Основний обіг у Гольштейні:</b> крім місцевих карбувань, обертають любецькі, гамбурзькі й північнонімецькі Thaler Species; нідерландські Patagonen/Albertusthaler; шведські 4-Mark; іспанські піастри — торгівля приймає кожен Species за вмістом срібла.<br> <b>Паралельно з карбуванням Thaler Species — категорія Kronemønt (1618 → 1696).</b> Див. окрему секцію <i>10½-Krone-Fuß · тарифна монета Kronemønt</i> нижче, де докладно задокументовано історію тарифу 1½ → 1⅓ → ⅔ Speciedaler і таблицю карбувань 1644–1696.
      mt_caption:
        de: "Münzstätte Tönning · Gottorpisches Holstein · 1689–1726 · Scheidemünzen mit lübischer Nominalangabe (im 9¼-Fuß-System) + Thaler Species und Dukaten (aus Bruun Coll. Stack's Bowers Auktion Zürich 14.–15. März 2025)"
        en: "Tönning mint · Gottorp Holstein · 1689–1726 · petty coins denominated in Lübeck reckoning (within the 9¼-Fuß system) plus Thaler Species and ducats (from the Bruun Coll., Stack's Bowers auction, Zurich 14–15 March 2025)"
        uk: "Монетний двір Tönning · ґотторпський Гольштейн · 1689–1726 · розмінна монета з номіналом у любецькому рахунку (в межах системи 9¼-Fuß) плюс Thaler Species і дукати (з колекції Bruun, аукціон Stack's Bowers, Цюрих 14–15 березня 2025)"

    - id: B
      year_from: 1726
      year_to: 1788
      from_label: "15./31. Juli 1726"
      to_label: "29. Febr. 1788"
      title:
        de: "Parallel zum Dänisch-Norwegischen Kurantmøntfod"
        en: "In parallel with the Danish-Norwegian Kurantmøntfod"
        uk: "Паралельно з данським Kurantmøntfod"
      description:
        de: "Thaler Species wird Großhandels-/Reserveeinheit neben dem neu eingeführten Courantsystem. Gottorp unter dän. Krone vereinigt 1773."
        en: "The Thaler Species becomes the wholesale and reserve unit alongside the newly introduced Courant system. Gottorp united under the Danish Crown in 1773."
        uk: "Thaler Species стає одиницею оптової торгівлі й резерву поряд із новозапровадженою системою Courant. Готторп обʼєднано під данською Короною 1773 р."
      context:
        de: |
          <b>Funktion:</b> Fernhandel, Wechselgeschäft, Lohnverträge mit Beamten und Offizieren, Staatsanleihen. Im Alltag ungebräuchlich — dort dominiert der Rigsdaler Courant (siehe 11⅓-Fuß unten).<br>
          <b>Kurs:</b> 1 Thaler Species ≈ 1,225 Rigsdaler Courant biß 1794 · danach per Dekret 1,25 (ohne Silberänderung).<br>
          <b>Opgæld:</b> Wegen unrunden Kursverhältnisses tritt beim Tausch Courant → Species Aufgeld auf — von der Reform 1788 (siehe Phase C unten) abgeschafft.<br><br>
          <em>Keine eigenständigen Thaler-Species-Prägungen in Holstein/Schleswig während dieser Phase — Umlauf der Thaler Species aus Kopenhagen, Hamburg, Lübeck und Norddeutschland (vgl. Phase A und C).</em>
        en: |-
          <b>Function:</b> long-distance trade, bills of exchange, salary contracts with officials and officers, state loans. Uncommon in everyday use — there the Rigsdaler Courant dominates (see 11⅓-Fuß below).<br> <b>Rate:</b> 1 Thaler Species ≈ 1.225 Rigsdaler Courant until 1794 · thereafter, by decree, 1.25 (with no change in silver content).<br> <b>Opgæld:</b> the awkward ratio meant a premium had to be added when swapping Courant → Species — abolished by the 1788 reform (see Phase C below).<br><br> <em>No standalone Thaler Species issues in Holstein/Schleswig during this phase — circulation of Thaler Species comes from Copenhagen, Hamburg, Lübeck and northern Germany (cf. phases A and C).</em>
        uk: |-
          <b>Функція:</b> далека торгівля, вексельний обіг, оплата праці чиновників і офіцерів, державні позики. У повсякденні майже не вживається — там домінує Rigsdaler Courant (див. 11⅓-Fuß нижче).<br> <b>Курс:</b> 1 Thaler Species ≈ 1,225 Rigsdaler Courant до 1794 · потім декретом 1,25 (без зміни срібного вмісту).<br> <b>Opgæld:</b> через нерівне співвідношення при обміні Courant → Species додавали надбавку — реформа 1788 р. (див. Phase C нижче) її скасувала.<br><br> <em>Власних карбувань Thaler Species у Гольштейні/Шлезвігу в цій фазі немає — Thaler Species в обігу надходять із Копенгагена, Гамбурга, Любеку й Північної Німеччини (порівн. фази A і C).</em>

    - id: C
      year_from: 1788
      year_to: 1813
      from_label: "29. Febr. 1788"
      to_label: "5. Jan. 1813"
      title:
        de: "Schleswig-Holsteinische Reform — Thaler Species als Alleingrundmünze"
        en: "The Schleswig-Holstein reform — Thaler Species as the sole base coin"
        uk: "Шлезв.-гольшт. реформа — Thaler Species як єдина базова монета"
      description:
        de: "Ernst Schimmelmann: 1 Thaler Species = 60 Schilling Courant · Ende des Aufgelds · Schleswig-Holsteinische Speciesbank Altona gegründet · alle Courant-Nominale werden Teilstücke des Thaler Species im 9¼-Fuß."
        en: "Ernst Schimmelmann: 1 Thaler Species = 60 Schilling Courant · the premium is abolished · the Schleswig-Holstein Speciesbank in Altona is founded · all Courant denominations become exact fractions of the Thaler Species in the 9¼-Fuß."
        uk: "Ернст Шіммельман: 1 Thaler Species = 60 Schilling Courant · надбавку (Aufgeld) скасовано · засновано шлезв.-гольшт. Speciesbank в Альтоні · усі номінали Courant стають точними частками Thaler Species у 9¼-Fuß."
      context:
        de: |
          <b>Grundwerte der Schilling-Sch.-H.-Courant-Theilung</b> (gleichzeitig mit dem Thaler Species eingeführt, Eröffnungsverordnung 29. Febr. 1788):<br>
          · <b>1 Schilling Courant</b> = 0,42136 g fein (= 25,28173 / 60) · 12 Pfennig · Scheidemünze<br>
          · <b>1 Mark Sch.-H. Courant</b> = 6,74179 g fein = 16 Schilling Courant = 1/3 Thaler Species · Rechnungseinheit, keine Mark-Münze geprägt<br>
          · <b>1 Thaler Sch.-H. Courant</b> = 20,22538 g fein = 48 Schilling Courant = 3 Mark Sch.-H. Courant = 4/5 Thaler Species · <em>reine Rechnungseinheit, niemals als Münze geprägt</em><br><br>
          <b>Rechnungsfraktionen:</b> 1 Thaler Species = 60 Schilling Courant = 720 Pfennig · 1 Thaler Sch.-H. Courant = 48 Schilling Courant = 4/5 Thaler Species · 1 Schilling Courant = 12 Pfennig · ½ Sch. = Sechsling · ¼ Sch. = Dreiling.<br><br>
          <em>Keine 1-Schilling-Münze geprägt — stattdessen 2-Sechsling (lübisch-hanseatisches Erbe). Zur «SP»-Abkürzung: Sämtliche vollwertigen Nominale (ab 5 Schilling) tragen auf dem Reverse «SP» für Species. «SPECIES DANIÆ» erscheint nicht — «Daniæ» ist ausschließlich Bestandteil des königlichen Titels auf dem Obverse.</em>
        en: |-
          <b>Base values of the Schilling-Sch.-H.-Courant subdivision</b> (introduced together with the Thaler Species by the founding decree of 29 Feb. 1788):<br> · <b>1 Schilling Courant</b> = 0.42136 g fine (= 25.28173 / 60) · 12 Pfennig · petty coin<br> · <b>1 Mark Sch.-H. Courant</b> = 6.74179 g fine = 16 Schilling Courant = 1/3 Thaler Species · accounting unit; no Mark coin was struck<br> · <b>1 Thaler Sch.-H. Courant</b> = 20.22538 g fine = 48 Schilling Courant = 3 Mark Sch.-H. Courant = 4/5 Thaler Species · <em>a pure accounting unit, never struck as a coin</em><br><br> <b>Accounting fractions:</b> 1 Thaler Species = 60 Schilling Courant = 720 Pfennig · 1 Thaler Sch.-H. Courant = 48 Schilling Courant = 4/5 Thaler Species · 1 Schilling Courant = 12 Pfennig · ½ Sch. = Sechsling · ¼ Sch. = Dreiling.<br><br> <em>No 1-Schilling coin was struck — a 2-Sechsling stood in instead (a Lübeck-Hanseatic inheritance). On the «SP» abbreviation: every full-value denomination (from 5 Schilling upwards) carries «SP» for Species on the reverse. «SPECIES DANIÆ» does not appear — «Daniæ» belongs solely to the royal title on the obverse.</em>
        uk: |-
          <b>Базові значення поділу Schilling-Sch.-H.-Courant</b> (запроваджені одночасно зі Thaler Species установчим декретом 29 лют. 1788):<br> · <b>1 Schilling Courant</b> = 0,42136 г чистого (= 25,28173 / 60) · 12 Pfennig · розмінна монета<br> · <b>1 Mark Sch.-H. Courant</b> = 6,74179 г чистого = 16 Schilling Courant = 1/3 Thaler Species · розрахункова одиниця; монета Mark не карбувалася<br> · <b>1 Thaler Sch.-H. Courant</b> = 20,22538 г чистого = 48 Schilling Courant = 3 Mark Sch.-H. Courant = 4/5 Thaler Species · <em>лише розрахункова одиниця, як монета не карбувалася</em><br><br> <b>Розрахункові фракції:</b> 1 Thaler Species = 60 Schilling Courant = 720 Pfennig · 1 Thaler Sch.-H. Courant = 48 Schilling Courant = 4/5 Thaler Species · 1 Schilling Courant = 12 Pfennig · ½ Sch. = Sechsling · ¼ Sch. = Dreiling.<br><br> <em>Монети номіналом 1 Schilling не карбували — замість неї йшов 2-Sechsling (любецько-ганзейська спадщина). Про абревіатуру «SP»: усі повноцінні номінали (від 5 Schilling) несуть на реверсі «SP» — Species. «SPECIES DANIÆ» не зʼявляється — «Daniæ» належить виключно до королівського титулу на аверсі.</em>
      mt_caption:
        de: "Ausgeprägte Nominale · Altona 1787–1813 · Christian VII. (Frederik VI. ab 1808)"
        en: "Denominations actually struck · Altona, 1787–1813 · Christian VII (Frederik VI from 1808)"
        uk: "Номінали, що фактично карбувалися · Альтона, 1787–1813 · Кристіан VII (Фредерік VI з 1808)"

    - id: D
      year_from: 1813
      year_to: 1854
      from_label: "5. Jan. 1813"
      to_label: "31. Juli 1854"
      title:
        de: "Parallel zum Rigsbankdaler"
        en: "In parallel with the Rigsbankdaler"
        uk: "Паралельно з Rigsbankdaler"
      description:
        de: "Nach dänischem Staatsbankrott bleibt Thaler Species als 9¼-Fuß-Reservestandard unverändert. 1 Thaler Species = 2 Rigsbankdaler (konstruktiv 1813 festgelegt)."
        en: "After the Danish state bankruptcy the Thaler Species continues as the 9¼-Fuß reserve standard, unchanged. 1 Thaler Species = 2 Rigsbankdaler (constructively fixed in 1813)."
        uk: "Після данського державного банкрутства Thaler Species залишається резервним стандартом у 9¼-Fuß без змін. 1 Thaler Species = 2 Rigsbankdaler (зафіксовано конструктивно 1813 р.)."
      mt_caption:
        de: "Speciedaler-Prägungen 1819–1854 · Kopenhagen und Altona · Frederik VI., Christian VIII., Frederik VII. «Våbenspecie» biß zur Umbenennung 1854"
        en: "Speciedaler issues 1819–1854 · Copenhagen and Altona · Frederik VI, Christian VIII, Frederik VII «Våbenspecie» up to the 1854 renaming"
        uk: "Карбування Speciedaler 1819–1854 · Копенгаген і Альтона · Фредерік VI, Кристіан VIII, Фредерік VII «Våbenspecie» до перейменування 1854"

    - id: E
      year_from: 1854
      year_to: 1866
      from_label: "31. Juli 1854"
      to_label: "24. Aug. 1866"
      title:
        de: "Parallel zum Rigsdaler Rigsmønt"
        en: "In parallel with the Rigsdaler Rigsmønt"
        uk: "Паралельно з Rigsdaler Rigsmønt"
      description:
        de: "Renovatio-Bedingung unverändert (18½-Fuß nur umbenannt). Thaler Species bleibt Reserve- und Handelseinheit biß preuß. Annexion."
        en: "The underlying conditions are unchanged (the 18½-Fuß is merely renamed). The Thaler Species remains the reserve and trade unit until the Prussian annexation."
        uk: "Базові умови не змінилися (18½-Fuß лише перейменовано). Thaler Species лишається одиницею резерву й торгівлі до прусської анексії."
      context:
        de: |
          <b>Die Speciedaler-Prägung der Frederik-VII.-Regierung</b> lief biß 1854 (siehe «Våbenspecie» KM# 744 in Phase D oben). 1854 erfolgte die Umbenennung der Rigsbankdaler-Einheit zur Rigsdaler Rigsmønt; ab diesem Jahr erschienen Frederik VII.s Silber-Courantmünzen nur im 18½-Fuß als Rigsdaler Rigsmønt (siehe dortige Tabelle). Zwei <b>Gedenkprägungen zu 2 Rigsdaler</b> (Silberhochzeit 1854, Tod 1863) entsprechen rechnerisch 1 Speciedaler (2 × 12,64086 g = 25,28173 g Feinsilber) — siehe Rigsbankdaler Phase C.<br>
          <em>Unter Kondominium 1864–1866: keine Neuprägungen von Thaler Species; Altbestände bleiben gesetzliches Zahlmittel.</em><br>
          <b>Ablösung:</b> 24. Aug. 1866 mit preuß. Annexion; Thaler Species wird sukzessive ausgemünzt zugunsten des Vereinsthalers (30-Fuß).
        en: |-
          <b>Speciedaler issues under Frederik VII</b> ran until 1854 (see «Våbenspecie» KM# 744 in phase D above). In 1854 the Rigsbankdaler unit was renamed to Rigsdaler Rigsmønt; from that year onwards Frederik VII's silver Courant coins appeared only in the 18½-Fuß as Rigsdaler Rigsmønt (see the table there). Two <b>commemorative 2-Rigsdaler issues</b> (the silver wedding of 1854, his death in 1863) match arithmetically to 1 Speciedaler (2 × 12.64086 g = 25.28173 g fine silver) — see Rigsbankdaler phase C.<br> <em>Under the condominium of 1864–1866: no new Thaler Species issues; existing stocks remain legal tender.</em><br> <b>Replacement:</b> 24 Aug. 1866 with the Prussian annexation; the Thaler Species is gradually demonetised in favour of the Vereinsthaler (30-Fuß).
        uk: |-
          <b>Карбування Speciedaler за правління Фредеріка VII</b> тривало до 1854 р. (див. «Våbenspecie» KM# 744 у фазі D вище). У 1854 р. одиницю Rigsbankdaler перейменовано на Rigsdaler Rigsmønt; від цього року срібні Courant-монети Фредеріка VII зʼявляються лише у 18½-Fuß як Rigsdaler Rigsmønt (див. відповідну таблицю). Дві <b>памʼятні монети у 2 Rigsdaler</b> (срібне весілля 1854, смерть 1863) арифметично відповідають 1 Speciedaler (2 × 12,64086 г = 25,28173 г чистого срібла) — див. Rigsbankdaler, фаза C.<br> <em>За кондомініуму 1864–1866 нових Thaler Species не карбують; старі запаси лишаються законним платіжним засобом.</em><br> <b>Заміна:</b> 24 серпня 1866 із прусською анексією; Thaler Species поступово виводять з обігу на користь Vereinsthaler (30-Fuß).

  kronemont:
    - id: A
      year_from: 1644
      year_to: 1669
      from_label: '1644'
      to_label: '1669'
      title:
        de: 10½-Krone-Fuß · Hebræermønt und Frederik-III.-Glückstadt-Serie
        en: 10½-Krone-Fuß · Hebræermønt and Frederik III Glückstadt series
        uk: 10½-Krone-Fuß · Hebræermønt та серія Frederik III Glückstadt
      description:
        de: 'Nach dem 19-jährigen Stillstand 1625–1643 (siehe <i>Christian IVs kroner</i> oben) kehrt die Krone-Mønt 1644 im <b>10½-Krone-Fuß</b> («<i>Grobe Krone</i>») zurück: <b>10½ Krone je rauer Marck</b> von 10¾ Loth (.672 Feingehalt, 14,964 g fein je Stück, Hede / Wilcke II p. 203) — ~8 % weniger Feinsilber pro Münze als unter Christian IV. Beginn mit der <b>Hebræermønt</b> (KM# 32, KM# 137) und der regulären Glückstadter 4-Marck-Danske-Serie unter Frederik III. Tarif weiterhin 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
        en: 'After the 19-year hiatus of 1625–1643 (see <i>Christian IV''s kroner</i> above), the Krone returns in 1644 under the <b>10½-Krone-Fuß</b> («<i>Coarse Krone</i>»): <b>10½ Krone per raw mark</b> at 10¾ Loth (.672 fineness, 14.964 g fine per coin, Hede / Wilcke II p. 203) — ~8 % less fine silver per coin than under Christian IV. The series opens with the <b>Hebræermønt</b> (KM# 32, KM# 137) and the regular Glückstadt 4-Marck-Danske series under Frederik III. The tariff remains 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
        uk: 'Після 19-річного припинення 1625–1643 (див. <i>Christian IV''s kroner</i> вище) Krone-Mønt повертається 1644 р. у <b>10½-Krone-Fuß</b> («<i>Груба Крона</i>»): <b>10½ Krone з повної марки</b> проби 10¾ Loth (.672 проби, 14,964 г чистого на монету, Hede / Wilcke II с. 203) — ~8 % менше чистого срібла на монету, ніж за Кристіана IV. Серія відкривається <b>Hebræermønt</b> (KM# 32, KM# 137) та регулярною ґлюкштатською серією 4 Marck Danske за Фредеріка III. Тариф лишається 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
      context:
        de: <p>Die <b>Hebræermønt</b> wird parallel in zwei Münzstätten geprägt — København (KM# 137, 1644–1646) und Glückstadt (KM# 32, 1645) — beide mit dem Tetragramm יהוה auf der Rückseite und beide bei .593 Feingehalt (gegen den Kronemønt-Standard .671 reduziert). Bei unverändertem Tarif von ⅓ Speciedaler steigt der kumulative Seigniorage-Aufschlag durch dieses zweite Debasement auf ca. +27,6 % (siehe Sondertabelle).</p><p>Parallel dazu Glückstadter 4-Marck-Danske-Serie unter Frederik III. (KM# A43, B43) am Standardfeingehalt .671 — die Norm­fortsetzung, die später die Christian-V.-Serie ablöst.</p>
        en: <p>The <b>Hebræermønt</b> is struck in parallel at two mints — Copenhagen (KM# 137, 1644–1646) and Glückstadt (KM# 32, 1645) — both bearing the Tetragrammaton יהוה on the reverse and both at .593 fineness (reduced from the Kronemønt standard of .671). At an unchanged tariff of ⅓ Speciedaler, this second debasement raises the cumulative seigniorage premium to about +27.6 % (see separate sub-table).</p><p>Alongside, the Glückstadt 4-Marck-Danske series under Frederik III (KM# A43, B43) at standard fineness .671 — the normative continuation that the Christian V series later carries forward.</p>
        uk: <p><b>Hebræermønt</b> карбується паралельно на двох монетних дворах — Копенгаген (KM# 137, 1644–1646) і Glückstadt (KM# 32, 1645) — обидва з тетраграматоном יהוה на реверсі та обидва на пробі .593 (знижено від стандартної kronemønt-проби .671). За незмінним тарифом ⅓ Speciedaler це другий шар debasement піднімає кумулятивну сеньйораж-надбавку до ~+27,6 % (див. окрему підтаблицю).</p><p>Паралельно — ґлюкштатська серія 4 Marck Danske за Фредеріка III (KM# A43, B43) на стандартній пробі .671 — нормативне продовження, яке пізніше підхоплює серія Кристіана V.</p>
    - id: B
      year_from: 1670
      year_to: 1696
      from_label: ca. 1670
      to_label: '1696'
      title:
        de: Christian V. · stabilisierter Tarif ⅔ Speciedaler
        en: Christian V · stabilised tariff ⅔ Speciedaler
        uk: Кристіан V · стабілізований тариф ⅔ Specie
      description:
        de: Christian V. stabilisiert den Tarif auf ⅔ Speciedaler = 2 Marck Danske, was fortan explizit als «2 MARCK» auf den Münzen steht. Hauptbestand des Katalogs (Glückstadt + København + Schleswig-Holstein-Duchy). Endet 1696.
        en: Christian V stabilises the tariff at ⅔ Speciedaler = 2 Marck Danske, henceforth explicit on the coins as «2 MARCK». The bulk of the catalogue (Glückstadt + Copenhagen + Schleswig-Holstein duchy). Ends in 1696.
        uk: Кристіан V стабілізує тариф на ⅔ Speciedaler = 2 Marck Danske, що відтепер явно карбується на монетах як «2 MARCK». Основна маса каталогу (Glückstadt + Копенгаген + Шлезвіг-Гольштейн-герцогство). Завершується 1696 року.
      context:
        de: '<p>Bruun-Lot 13184 (1691, Kopenhagen) trägt explizit «<b>2 Mark</b>» auf der Münze — Beleg für die offene Verankerung der ⅔-Speciedaler-Wertigkeit auf der Prägung selbst.</p><p>Empirisch (Glückstadt 4 Marck Danske, Hede-Formel: 22,272 g rau · .672 Feingehalt · 14,964 g fein): bei Tarif ⅔ Specie = 16,854 g fein nominell ergibt sich ein Seigniorage-Aufschlag von ca. <b>+12,6 %</b>. Vergleich mit der 1618er Doppelkrone (32,500 g fein, Tarif 1½ Specie = 37,920 g fein nominell): Aufschlag ca. +16,7 % bzw. +11½ % Münzgewinn nach Schrötter<sup><a href="#ref22">[22]</a></sup> — also vergleichbare Größenordnung des Seigniorage-Aufschlags trotz der unterschiedlichen Nominaltarife.<sup><a href="#ref23">[23]</a></sup></p><p>Parallel prägte Glückstadt vollwertige Speciedaler im 9¼-Fuß (Bruun-Lots 13098, 13102, 13182) — beide Münzkategorien wurden gleichzeitig produziert, der Speciedaler nach Silbergehalt, die Kronemønt nach königlich gesetztem Tarif.</p>'
        en: '<p>Bruun lot 13184 (1691, Copenhagen) carries «<b>2 Mark</b>» explicitly on the coin — evidence that the ⅔-Speciedaler parity is now openly anchored on the strike itself.</p><p>Empirically (Glückstadt 4 Marck Danske, Hede formula: 22.272 g rough · .672 fineness · 14.964 g fine): at the ⅔ Specie tariff the nominal calls for 16.854 g fine, giving a seigniorage premium of about <b>+12.6 %</b>. For comparison, the 1618 Doppelkrone (32.500 g fine, 1½ Specie tariff = 37.920 g fine nominal) carried a premium of about +16.7 %, or +11½ % mint gain per Schrötter<sup><a href="#ref22">[22]</a></sup> — a comparable order of magnitude of seigniorage premium despite the differing nominal tariffs.<sup><a href="#ref23">[23]</a></sup></p><p>In parallel Glückstadt also struck full-value Speciedaler in the 9¼-Fuß (Bruun lots 13098, 13102, 13182) — both coin categories were produced contemporaneously, the Speciedaler valued by silver content, the Kronemønt by royally set tariff.</p>'
        uk: '<p>Bruun, лот 13184 (1691, Копенгаген), несе на монеті явне «<b>2 Mark</b>» — підтвердження того, що паритет ⅔ Speciedaler відтепер відкрито закріплено на самому карбуванні.</p><p>Емпірично (Glückstadt 4 Marck Danske, Hede-формула: 22,272 г повної ваги · .672 проби · 14,964 г чистого): за тарифом ⅔ Specie номінал вимагає 16,854 г чистого, що дає сеньйораж-надбавку <b>~+12,6 %</b>. Для порівняння: Doppelkrone 1618 р. (32,500 г чистого, тариф 1½ Specie = 37,920 г чистого номінально) мала надбавку ~+16,7 % або +11½ % монетного прибутку за Schrötter<sup><a href="#ref22">[22]</a></sup> — порядково співмірна величина сеньйораж-надбавки попри різні номінальні тарифи.<sup><a href="#ref23">[23]</a></sup></p><p>Паралельно Glückstadt карбував і повноцінні Speciedaler у 9¼-Fuß (Bruun-лоти 13098, 13102, 13182) — обидві категорії монети вироблялись одночасно, Speciedaler за вмістом срібла, Kronemønt — за встановленим королем тарифом.</p>'
  11_333_thaler:
    - id: A
