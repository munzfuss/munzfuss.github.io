  - id: ref3
    content:
      de: |
        <b>Behrens, Hans</b>: <i>Münzen und Medaillen der Stadt Lübeck</i>
        (Berlin 1905). Standardreferenz für Lübecker Münzprägungen 1226–1864;
        Goldducaten 1789–1801 unter den Nummern 641a, 642–647 katalogisiert.
        Reprint Bonn 1971; Original-PDF auf <code>archive.org</code>.
        Abgeglichen mit Numista-IDs N#409002, N#303461, N#32000, N#271072 für
        die jeweiligen Stempelgruppen.
      en: |
        <b>Behrens, Hans</b>: <i>Münzen und Medaillen der Stadt Lübeck</i>
        (Berlin 1905). Standard reference for Lübeck coinage 1226–1864; gold
        ducats 1789–1801 catalogued under numbers 641a, 642–647. Bonn reprint
        1971; original PDF on <code>archive.org</code>. Cross-checked against
        Numista IDs N#409002, N#303461, N#32000, N#271072 for the respective
        die groups.
      uk: |
        <b>Behrens, Hans</b>: <i>Münzen und Medaillen der Stadt Lübeck</i>
        (Берлін 1905). Стандартний довідник з любецького карбування 1226–1864;
        золоті дукати 1789–1801 каталогізовано під номерами 641a, 642–647.
        Передрук Бонн 1971; оригінальний PDF на <code>archive.org</code>.
        Перехресно перевірено з Numista N#409002, N#303461, N#32000, N#271072
        для відповідних штемпельних груп.

  - id: ref4
    content:
      de: |
        <b>MGM Münzlexikon</b> — Einträge «Lübischer Münzfuß / 34-Marck-Fuß» und
        «Reichsmüntzfuß». Diskutiert die Parallelität von 34-Marck-Fuß-Courant
        und 9-Thaler-Fuß-Speciesthaler in Hamburg und Lübeck zwischen 1726 und
        1875; Aufhebung des 34-Marck-Fuß durch das Reichsmünzgesetz vom 9. Juli
        1873 (Übergang zur Reichsmark).
      en: |
        <b>MGM Münzlexikon</b> — entries «Lübischer Münzfuß / 34-Marck-Fuß» and
        «Reichsmüntzfuß». Discusses the parallel use of the 34-Marck-Fuß courant
        and the 9-Thaler-Fuß Speciesthaler in Hamburg and Lübeck between 1726
        and 1875; abolition of the 34-Marck-Fuß by the Reichsmünzgesetz of
        9 July 1873 (transition to the Reichsmark).
      uk: |
        <b>MGM Münzlexikon</b> — статті «Lübischer Münzfuß / 34-Marck-Fuß» та
        «Reichsmüntzfuß». Обговорює паралельне використання 34-Marck-Fuß-Courant
        та 9-Thaler-Fuß Speciesthaler у Гамбурзі та Любеку між 1726 та 1875 рр.;
        скасування 34-Marck-Fuß за Reichsmünzgesetz від 9 липня 1873 р. (перехід
        до Reichsmark).

  - id: ref5
    content:
      de: |
        <b>MGM Münzlexikon</b>: <i>Reichsdukat</i> —
        <a href="https://www.mgmindex.de/index.php?title=Reichsdukat" target="_blank">mgmindex.de/Reichsdukat</a>.
        Beleg für die Codifizierung des Reichsdukaten als kaiserliche Hauptgoldmünze
        durch die Augsburger Reichsmünzordnung 1559: «<i>Bezeichnung für den Dukat
        (Rauhgewicht 3,49 g, Feinheit 986/1000 = 23 Karat 8 Grän), nachdem er auf der
        Augsburger Reichsmünzordnung 1559 zur Hauptgoldmünze erklärt worden war</i>».
      en: |
        <b>MGM Münzlexikon</b>: <i>Reichsdukat</i> —
        <a href="https://www.mgmindex.de/index.php?title=Reichsdukat" target="_blank">mgmindex.de/Reichsdukat</a>.
        Sources the codification of the Reichsdukat as principal imperial gold coin
        by the Augsburger Reichsmünzordnung of 1559: «<i>Bezeichnung für den Dukat
        (Rauhgewicht 3,49 g, Feinheit 986/1000 = 23 Karat 8 Grän), nachdem er auf der
        Augsburger Reichsmünzordnung 1559 zur Hauptgoldmünze erklärt worden war</i>».
      uk: |
        <b>MGM Münzlexikon</b>: <i>Reichsdukat</i> —
        <a href="https://www.mgmindex.de/index.php?title=Reichsdukat" target="_blank">mgmindex.de/Reichsdukat</a>.
        Джерело про кодифікацію Reichsdukat як головної імперської золотої монети
        Augsburger Reichsmünzordnung 1559 р.: «<i>Bezeichnung für den Dukat (Rauhgewicht
        3,49 g, Feinheit 986/1000 = 23 Karat 8 Grän), nachdem er auf der Augsburger
        Reichsmünzordnung 1559 zur Hauptgoldmünze erklärt worden war</i>».

  - id: ref6
    content:
      de: |
        <b>Wikipedia DE «Lübeck»</b> —
        <a href="https://de.wikipedia.org/wiki/L%C3%BCbeck" target="_blank">de.wikipedia.org/wiki/Lübeck</a>,
        Abschnitt «Geschichte». Beleg für die Verleihung des Goldmünzrechts an Lübeck:
        «<i>Kaiser Ludwig der Bayer verlieh Lübeck 1340 das Goldmünzrecht</i>». Zugleich
        Beleg für den reichsstädtischen Status biß 1806: «<i>Mit dem Reichsdeputationshauptschluss
        1803 blieb Lübeck noch reichsunmittelbare Stadt, um dann nach dem Ende des Heiligen
        Römischen Reiches 1806 ein souveräner deutscher Staat zu werden</i>».
      en: |
        <b>Wikipedia DE «Lübeck»</b> —
        <a href="https://de.wikipedia.org/wiki/L%C3%BCbeck" target="_blank">de.wikipedia.org/wiki/Lübeck</a>,
        section «Geschichte». Source for the grant of the gold-minting privilege to Lübeck:
        «<i>Kaiser Ludwig der Bayer verlieh Lübeck 1340 das Goldmünzrecht</i>». Also documents
        the city's imperial status until 1806: «<i>Mit dem Reichsdeputationshauptschluss 1803
        blieb Lübeck noch reichsunmittelbare Stadt, um dann nach dem Ende des Heiligen Römischen
        Reiches 1806 ein souveräner deutscher Staat zu werden</i>».
      uk: |
        <b>Wikipedia DE «Lübeck»</b> —
        <a href="https://de.wikipedia.org/wiki/L%C3%BCbeck" target="_blank">de.wikipedia.org/wiki/Lübeck</a>,
        розділ «Geschichte». Джерело про надання Любеку права карбування золота:
        «<i>Kaiser Ludwig der Bayer verlieh Lübeck 1340 das Goldmünzrecht</i>». Також
        документує статус міста як вільного імперського до 1806 р.: «<i>Mit dem
        Reichsdeputationshauptschluss 1803 blieb Lübeck noch reichsunmittelbare Stadt, um
        dann nach dem Ende des Heiligen Römischen Reiches 1806 ein souveräner deutscher Staat
        zu werden</i>».

  - id: ref7
    content:
      de: |
        <b>Wikipedia DE «Münzgesetz (Deutsches Reich)»</b> —
        <a href="https://de.wikipedia.org/wiki/M%C3%BCnzgesetz_(Deutsches_Reich)" target="_blank">de.wikipedia.org/wiki/Münzgesetz (Deutsches Reich)</a>.
        Beleg für das Ende des Reichsdukatenfußes durch das Reichsmünzgesetz vom 4. Dezember
        1871 und seine Erweiterung vom 9. Juli 1873: «<i>Durch das Gesetz vom 4. Dezember 1871
        wurde mit der Reichsgoldmünze der Goldgehalt der neuen gemeinsamen Währung „Mark"
        festgelegt</i>».
      en: |
        <b>Wikipedia DE «Münzgesetz (Deutsches Reich)»</b> —
        <a href="https://de.wikipedia.org/wiki/M%C3%BCnzgesetz_(Deutsches_Reich)" target="_blank">de.wikipedia.org/wiki/Münzgesetz (Deutsches Reich)</a>.
        Source for the end of the Reichsdukatenfuß by the Reichsmünzgesetz of 4 December 1871
        and its extension of 9 July 1873: «<i>Durch das Gesetz vom 4. Dezember 1871 wurde mit
        der Reichsgoldmünze der Goldgehalt der neuen gemeinsamen Währung „Mark" festgelegt</i>».
      uk: |
        <b>Wikipedia DE «Münzgesetz (Deutsches Reich)»</b> —
        <a href="https://de.wikipedia.org/wiki/M%C3%BCnzgesetz_(Deutsches_Reich)" target="_blank">de.wikipedia.org/wiki/Münzgesetz (Deutsches Reich)</a>.
        Джерело про завершення Reichsdukatenfuß через Reichsmünzgesetz 4 грудня 1871 р. та
        його розширення 9 липня 1873 р.: «<i>Durch das Gesetz vom 4. Dezember 1871 wurde mit
        der Reichsgoldmünze der Goldgehalt der neuen gemeinsamen Währung „Mark" festgelegt</i>».

  - id: ref8
    content:
      de: |
        <b>Museum der Grafschaft Rantzau, Barmstedt</b>: <i>Taler und Dukaten — das Geld
        der Neuzeit</i> —
        <a href="https://www.museum-grafschaft-rantzau.de/das-geld-der-grafen/taler-und-dukaten-das-geld-der-neuzeit" target="_blank">museum-grafschaft-rantzau.de</a>.
        Beleg für das Prinzip, daß umlaufende Goldmünzen «<i>ihren Wert durch den
        Edelmetallgehalt</i>» erhielten — fremde Dukaten desselben Standards (ungarische,
        venezianische, türkische) wurden unabhängig vom Prägeort nach Metallgehalt angenommen.
      en: |
        <b>Museum der Grafschaft Rantzau, Barmstedt</b>: <i>Taler und Dukaten — das Geld
        der Neuzeit</i> —
        <a href="https://www.museum-grafschaft-rantzau.de/das-geld-der-grafen/taler-und-dukaten-das-geld-der-neuzeit" target="_blank">museum-grafschaft-rantzau.de</a>.
        Source for the principle that circulating gold coins «<i>derived their value from
        precious-metal content</i>» — foreign ducats of the same standard (Hungarian,
        Venetian, Ottoman) were accepted by metal content regardless of mint origin.
      uk: |
        <b>Museum der Grafschaft Rantzau, Barmstedt</b>: <i>Taler und Dukaten — das Geld
        der Neuzeit</i> —
        <a href="https://www.museum-grafschaft-rantzau.de/das-geld-der-grafen/taler-und-dukaten-das-geld-der-neuzeit" target="_blank">museum-grafschaft-rantzau.de</a>.
        Джерело про принцип, що золоті монети в обігу «<i>отримували свою вартість через
        вміст дорогоцінного металу</i>» — іноземні дукати того ж стандарту (угорські,
        венеційські, турецькі) приймались за вмістом металу незалежно від місця карбування.

  - id: ref9
    content:
      de: |
        <b>MGM Münzlexikon</b>: <i>Handelsdukat</i> —
        <a href="https://www.mgmindex.de/index.php?title=Handelsdukat" target="_blank">mgmindex.de/Handelsdukat</a>.
        Beleg für die Rolle der niederländischen Handelsdukaten als maßgebliche
        Welthandelsmünze des 17. und 18. Jahrhunderts: «<i>Bedeutende Welthandelsmünze des
        17. und 18. Jh., besonders von den Niederlanden für den Ostseehandel</i>».
      en: |
        <b>MGM Münzlexikon</b>: <i>Handelsdukat</i> —
        <a href="https://www.mgmindex.de/index.php?title=Handelsdukat" target="_blank">mgmindex.de/Handelsdukat</a>.
        Source for the role of Dutch Handelsdukaten as principal world trade gold coin of
        the 17th-18th centuries: «<i>Bedeutende Welthandelsmünze des 17. und 18. Jh.,
        besonders von den Niederlanden für den Ostseehandel</i>».
      uk: |
        <b>MGM Münzlexikon</b>: <i>Handelsdukat</i> —
        <a href="https://www.mgmindex.de/index.php?title=Handelsdukat" target="_blank">mgmindex.de/Handelsdukat</a>.
        Джерело про роль нідерландських Handelsdukaten як головної світової торгової
        монети XVII–XVIII ст.: «<i>Bedeutende Welthandelsmünze des 17. und 18. Jh.,
        besonders von den Niederlanden für den Ostseehandel</i>».
