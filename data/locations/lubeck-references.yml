entries:
  - id: ref1
    content:
      de: |
        <b>Forordningerne af 15. og 31. juli 1726</b> (Forordning om en Ny
        Mynt-Cours i Hans Kongelige Majestæts Riger og Lande). Eingeführt unter
        Frederik IV. den 34-Marck-Fuß als gemeinsamen Lübisch-Hanseatischen
        Courant-Standard (= 11⅓-Thaler-Fuß; 1 Marck Courant = 6,87811 g fein,
        1 Thaler Courant = 3 Marck = 48 Schilling = 20,63432 g fein).
        Originaltexte digitalisiert auf <code>danskmoent.dk/forordning</code>;
        Sekundärbeleg <b>Wilcke, J.</b>: <i>Kurantmønten 1726–1788</i>
        (København: G. E. C. Gads Forlag, 1927) —
        <a href="https://www.danskmoent.dk/wilcke/w3b.htm" target="_blank">danskmoent.dk/wilcke/w3b.htm</a>.
      en: |
        <b>Ordinances of 15 and 31 July 1726</b> (Forordning om en Ny Mynt-Cours
        i Hans Kongelige Majestæts Riger og Lande). Issued under Frederik IV;
        established the 34-Marck-Fuß as the common Lübisch-Hanseatic courant
        standard (= 11⅓-Thaler-Fuß; 1 Marck Courant = 6.87811 g fine,
        1 Thaler Courant = 3 Marck = 48 Schilling = 20.63432 g fine). Original
        texts digitised on <code>danskmoent.dk/forordning</code>; secondary
        attestation <b>Wilcke, J.</b>: <i>Kurantmønten 1726–1788</i>
        (Copenhagen: G. E. C. Gads Forlag, 1927) —
        <a href="https://www.danskmoent.dk/wilcke/w3b.htm" target="_blank">danskmoent.dk/wilcke/w3b.htm</a>.
      uk: |
        <b>Ордонанси 15 і 31 липня 1726 р.</b> (Forordning om en Ny Mynt-Cours
        i Hans Kongelige Majestæts Riger og Lande). Видані за Фредеріка IV;
        встановили 34-Marck-Fuß як спільний любецько-ганзейський курантний стандарт
        (= 11⅓-Thaler-Fuß; 1 Marck Courant = 6,87811 г чистого, 1 Thaler Courant
        = 3 Marck = 48 Schilling = 20,63432 г чистого). Оригінальні тексти
        оцифровані на <code>danskmoent.dk/forordning</code>; вторинне свідчення
        <b>Wilcke, J.</b>: <i>Kurantmønten 1726–1788</i> (Копенгаген:
        G. E. C. Gads Forlag, 1927) —
        <a href="https://www.danskmoent.dk/wilcke/w3b.htm" target="_blank">danskmoent.dk/wilcke/w3b.htm</a>.

  - id: ref2
    content:
      de: |
