  verification_note:
    de: 'ucoin (tid 173635) verzeichnet <i>Composition · Silver .993, 45,29 g</i>. Hede 1971 (f4h41), Numista (N# 190127) und Bruun Part I lot 1136 dokumentieren übereinstimmend die <b>kronemont-Umlaufprägung</b>: Silber .671 Feingehalt, ≈ 67 g rauh. Beide Datenpunkte sind <i>kompatibel auf der Feinsilber-Achse</i>: 67 g × .671 ≈ 44,8 g fein vs 45,29 g × .993 ≈ 45,0 g fein — identisches Silbergewicht in zwei verschiedenen Legierungs-Formaten. Die ucoin-Daten entsprechen also nicht der Umlaufprägung, sondern höchstwahrscheinlich einem <b>sølvafslag</b> (Nahrein-Silber-Abschlag) derselben Stempel — ein bekanntes Phänomen bei Sonderprägungen des 18. Jahrhunderts. Müntzfuß-Zuordnung kronemont/C gilt für die Umlauf-Variante (Hede 41); falls ein eindeutiger sølvafslag dokumentiert werden soll, wäre eine separate Sub-Eintragung mit fineness .993 / weight 45,29 g angebracht.'
    en: 'ucoin (tid 173635) records <i>Composition · Silver .993, 45.29 g</i>. Hede 1971 (f4h41), Numista (N# 190127) and Bruun Part I lot 1136 jointly document the <b>kronemont currency strike</b>: silver .671 fineness, ≈ 67 g raw. The two readings are <i>compatible on the fine-silver axis</i>: 67 g × .671 ≈ 44.8 g fine vs 45.29 g × .993 ≈ 45.0 g fine — identical silver content in two different alloy formats. ucoin''s data therefore does not describe the currency strike but most likely a <b>sølvafslag</b> (near-pure silver off-strike) from the same dies — a known 18th-century phenomenon for special issues. Müntzfuß placement kronemont/C applies to the currency variant (Hede 41); a dedicated sub-entry would be appropriate if a documented sølvafslag is to be carried at fineness .993 / weight 45.29 g.'
    uk: 'ucoin (tid 173635) подає <i>Composition · Silver .993, 45,29 г</i>. Hede 1971 (f4h41), Numista (N# 190127) і Bruun Part I lot 1136 одностайно фіксують <b>обігову kronemont-емісію</b>: срібло проби .671, ≈ 67 г повної ваги. Обидва набори даних <i>збігаються по осі чистого срібла</i>: 67 г × .671 ≈ 44,8 г чистого vs 45,29 г × .993 ≈ 45,0 г чистого — той самий вміст чистого срібла у двох різних варіантах сплаву. Тобто дані ucoin описують не обігову емісію, а найімовірніше <b>sølvafslag</b> (near-pure silver off-strike) тим самим штемпелем — відоме явище для спеціальних випусків XVIII ст. Прив''язка kronemont/C стосується обігової варіанти (Hede 41); якщо потрібно фіксувати документований sølvafslag, варто завести окремий sub-запис із fineness .993 / weight 45,29 г.'
  fraction: '3'
