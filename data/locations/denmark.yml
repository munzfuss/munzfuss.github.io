        de: "Augspurger Reichsmüntz-Abschied 30. Mai 1566 · Reichs-Speciedaler-Standard, der mit dem dänisch-norwegischen Speciedaler praktisch deckungsgleich war (25,98 g fein) · in Kopenhagen begleitet er die Frühphase der dänischen Großsilberprägung biß zur Etablierung des leichteren 9¼-Fuß ab 1622 · in Hamburg/Lübeck als Bank-Mark und Speciemark Rechnungseinheit biß zur Reichsmünzreform 1875"
        en: "Augsburg Imperial Mint Decree of 30 May 1566 · the imperial Speciedaler standard, practically identical with the Danish-Norwegian Speciedaler (25.98 g fine) · in Copenhagen it covers the early phase of Danish large-silver coinage until the lighter 9¼-Fuß is established from 1622 · in Hamburg/Lübeck the Bank-Mark and the Speciemark serve as units of account until the imperial coinage reform of 1875"
        uk: "Авґсбурзький імперський монетний декрет 30 травня 1566 · імперський Speciedaler-стандарт, практично тотожний дансько-норвезькому Speciedaler (25,98 г чистого) · у Копенгагені охоплює ранню фазу данського великосрібного карбування до утвердження легшого 9¼-Fuß з 1622 · у Гамбурзі/Любеку як Bank-Mark і Speciemark — розрахункові одиниці до імперської монетної реформи 1875"
