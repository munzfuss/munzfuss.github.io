id: denmark
km_register: DK
name:
  de: Königreich Dänemark
  en: Kingdom of Denmark
  uk: Королівство Данія
summary:
  de: Die Epoche des standardisierten dänisch-norwegischen Müntzwesens (1514–1914) — vom Christian-II-Lovkompleks 1514–1515 (Müntzordnung Sommer 1514 Kopenhagen, Norge-Forordning 3. August 1514, Sjælland åbent Brev 24. August 1515) als erstem umfassenden Müntzgesetz für beide Königreiche und beide Metalle, über die Christian-III-Müntzordnung vom 20. September 1541, biß zum Ausklingen des Silber-Gold-Standards 1914. Hauptmüntzstätte ist Kopenhagen, weitere Müntzstätten u. a. in Altona, Flensborg, Frederiksborg, Glückstadt, Haderslev, Helsingør, Kristianstad und Kongsberg. Das Register umfaßt das Korpus der dänisch-norwegischen Møntfødder — von Nobler und Rhinsk Gylden des Christian-II-Lovkomplexes über die Christian-III-Daler-Tradition und die Speciedaler-Standards (9- und 9¼-Fuß), Reichsdukaten- und Courantdukatenfuß, Guldkrone und die Kronemønt-Stufen biß zum Rigsbankdaler und der Krone-Reform 1873–1875.
  en: The era of standardised Danish-Norwegian coinage (1514–1914) — from the Christian II Lovkompleks of 1514–1515 (Møntordning Summer 1514 Copenhagen, Norge ordinance 3 August 1514, Sjælland åbent Brev 24 August 1515) as the first comprehensive coinage act for both kingdoms and both metals, through Christian III's Møntordning of 20 September 1541, to the close of the silver-gold standard in 1914. The principal mint is Copenhagen, with additional mints at Altona, Flensborg, Frederiksborg, Glückstadt, Haderslev, Helsingør, Kristianstad and Kongsberg. The register holds the corpus of Danish-Norwegian Møntfødder — from the Nobler and Rhinsk Gylden of the Christian II Lovkompleks through the Christian-III-Daler tradition and the Speciedaler standards (9-Fuß and 9¼-Fuß), Reichsdukatenfuß and Courantdukatenfuß, Guldkrone and the Kronemønt stages, to the Rigsbankdaler and the Krone reform of 1873–1875.
  uk: Доба стандартизованого монетного карбування Дансько-Норвезького королівства (1514–1914) — від Lovkompleks Кристіана II 1514–1515 років (Møntordning літа 1514 у Копенгагені, норвезький ордонанс 3 серпня 1514, sjælland-ський åbent Brev 24 серпня 1515) як першого всеосяжного монетного акту для обох королівств і обох металів, через Møntordning Кристіана III 20 вересня 1541 року, до завершення срібно-золотого стандарту 1914 року. Головний монетний двір — Копенгаген, додаткові — в Альтоні, Фленсборзі, Фредеріксборзі, Ґлюкштадті, Гадерслеві, Гельсінгері, Кристіанстаді та Конгсберзі. У реєстрі — корпус Møntfødder дансько-норвезької корони, від Nobler і Rhinsk Gylden Кристіана-II-Lovkomplekс-у через далерову традицію Кристіана III і стандарти Speciedaler (9-Fuß і 9¼-Fuß), Reichsdukatenfuß і Courantdukatenfuß, Guldkrone та фази Kronemønt — до Rigsbankdaler і Krone-реформи 1873–1875 років.
