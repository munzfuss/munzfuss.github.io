  diameter_mm: 43.7
  note:
    de: '4 Speciedaler 1624 · Christian IV., Kopenhagen, Münzmeister Nicolaus Schwabe (Mzz. Klee, NS) · Davenport EC II 3521. CoinVarieties dokumentiert die Spezifikation als <b>115 g.888</b> bei <b>43,7 mm</b> Durchmesser; das Stück wurde «mit den regulären Speciedaler-Stempeln, jedoch viermal so dick» geprägt. Christian IV. notierte am 31. März die Übergabe von 140 Speciedalern aus Schwabes Werkstatt aus norwegischem Silber — die Serie 1624 (1-, 2-, 3- und 4-Speciedaler) ist die erste dänisch-norwegische Prägung aus Kongsberger Silber (Werk gegründet Sommer 1623). Bruun-Specimen 5364 — gewogen 116,49 g.'
    en: '4 Speciedaler 1624 · Christian IV, Copenhagen, mintmaster Nicolaus Schwabe (clover privy mark, NS) · Davenport EC II 3521. CoinVarieties documents the specification as <b>115 g.888</b> at <b>43.7 mm</b> diameter; the coin was «struck with regular Speciedaler dies but four times as thick». Christian IV recorded on 31 March receiving 140 Speciedalers from Schwabe struck from Norwegian silver — the 1624 series (1-, 2-, 3- and 4-Speciedaler) is the first Danish-Norwegian issue from Kongsberg silver (works established summer 1623). Bruun specimen 5364, — weighed 116.49 g.'
    uk: '4 Speciedaler 1624 · Кристіан IV, Копенгаген, монетмейстер Nicolaus Schwabe (Mzz. конюшина, NS) · Davenport EC II 3521. CoinVarieties фіксує специфікацію як <b>115 г.888</b> при <b>43,7 мм</b>; монета «карбована регулярними штемпелями Speciedaler, але вчетверо товщою». Кристіан IV 31 березня записав отримання 140 Speciedaler-ів від Schwabe, карбованих із норвезького срібла — серія 1624 (1-, 2-, 3- і 4-Speciedaler) — перші дансько-норвезькі емісії зі срібла Конгсберга (копальню засновано влітку 1623). Bruun-екземпляр 5364 — зважено 116,49 г.'
