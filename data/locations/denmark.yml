      bar_title:
        de: "9¼-Thaler-Fuß · Speciedaler nach dänisch-holsteinischer Tradition · ab 1622 (Friedrich III. von Gottorp, Glückstadt) → Krone-Reform 1873–1875 · 251 Jahre durchgehend stabile Hauptsilbermünze des Gesamtstaats · ab Schimmelmann-Reform 1788 alleinige Grundmünze für die holsteinische Seite, in Dänemark parallel zum Rigsdaler Courant (11⅓-Fuß, biß 1813) und dem Rigsbankdaler (18½-Fuß, ab 1813) als Großsilbermünze · letzte Speciedaler-Prägung 1873 (Christian IX.); abgelöst durch die Krone (Skandinavische Münzunion)"
        en: "9¼-Thaler-Fuß · Speciedaler in the Danish-Holstein tradition · from 1622 (Friedrich III of Gottorp, Glückstadt) → the Krone reform of 1873–1875 · 251 years as the continuously stable main silver coin of the composite state · from the Schimmelmann reform of 1788 the sole base coin on the Holstein side, in Denmark running in parallel with the Rigsdaler Courant (11⅓-Fuß, until 1813) and the Rigsbankdaler (18½-Fuß, from 1813) as the large-silver coin · last Speciedaler struck 1873 (Christian IX); replaced by the Krone (Scandinavian Monetary Union)"
        uk: "9¼-Thaler-Fuß · Speciedaler у дансько-гольштинській традиції · з 1622 (Фредерік III Ґотторпський, Glückstadt) → Krone-реформа 1873–1875 · 251 рік незмінно стабільна головна срібна монета цілісної держави · з реформи Шіммельмана 1788 — єдина базова монета для гольштинського боку, у Данії — паралельно з Rigsdaler Courant (11⅓-Fuß, до 1813) та Rigsbankdaler (18½-Fuß, з 1813) як великосрібна монета · останнє карбування Speciedaler 1873 (Кристіан IX); змінена Krone (Скандинавська монетна унія)"
