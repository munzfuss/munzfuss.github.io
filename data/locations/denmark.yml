        de: "Rigsdaler Courant nach dänisch-norwegischem Kurantmøntfod · Forordning 15./31. Juli 1726 (Friedrich IV.) → Statsbankerot 5. Januar 1813 · Hauptalltagswährung des Gesamtstaats; in Holstein nur biß 29. Februar 1788 (Schimmelmann-Reform) · Altbestände kursierten ab 1813 noch jahrzehntelang als Scheidemünzen biß zur Krone-Reform 1875"
        en: "Rigsdaler Courant on the Danish-Norwegian Kurantmøntfod · Forordning of 15/31 July 1726 (Friedrich IV) → Statsbankerot, 5 January 1813 · main everyday currency of the composite state; in Holstein only until 29 February 1788 (Schimmelmann reform) · existing stocks continued to circulate as petty coinage for decades after 1813, until the Krone reform of 1875"
        uk: "Rigsdaler Courant за дансько-норвезьким Kurantmøntfod · Forordning 15/31 липня 1726 (Фредерік IV) → Statsbankerot 5 січня 1813 · основна повсякденна валюта цілісної держави; у Гольштейні лише до 29 лютого 1788 (реформа Шіммельмана) · старі запаси з 1813 ще десятиліттями кружляли як розмінна монета — до Krone-реформи 1875"
      color_class: kr

