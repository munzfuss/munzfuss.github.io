    fineness_verified: true
    diameter_mm_verified: false
    verification_note:
      de: Mzm. ursprünglich als Glückstadt erfaßt; bei späterer Auditierung gegen ucoin Period (Rigsdaler 1625-1699 bzw. Speciedaler 1582-1624 — Royal Danish Copenhagen) und KM-DK# 250 (Royal-Danish-Krause-Index ohne SH-Pendant) als königlich-dänische Kopenhagener Prägung re-attribuiert (1664). Mzm. weiterhin (?) — kein direkter Hede/Wilcke-Beleg.
      en: Mint originally recorded as Glückstadt; on later audit against ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) and KM-DK# 250 (Royal Danish Krause index with no SH counterpart), re-attributed as a Royal Danish Copenhagen issue (1664). Mint still (?) — no direct Hede / Wilcke attestation.
      uk: Монетний двір спочатку записано як Глюкштадт; під час подальшого аудиту проти ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) та KM-DK# 250 (Royal-Danish-Krause-індекс без SH-аналогу) переатрибутовано як королівсько-данську копенгагенську монету (1664). Монетний двір лишається (?) — прямого підтвердження за Hede/Wilcke немає.
