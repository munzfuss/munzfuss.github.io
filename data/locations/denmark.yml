    diameter_mm: 44.5
    note:
      de: |-
        2 Speciedaler Christians IV. (Glückstadt 1624–1634) — <b>nachfolgender Sondertyp zum km-16 (1623)</b> mit reduziertem Feingehalt .875 (vs. nominaler 9¼-Fuß-Norm .888). Visuell laut Quellen unterscheidbar von km-16 (eigene Reverse-/Obverse-Komposition). Im Schleswig-Holstein-KM-Register nicht erfasst, sondern nur als <b>KM-DK# 104</b> im Royal-Danish-Register. ucoin-Eintrag tid 99114; in Numista nicht direkt katalogisiert (N#468489 deckt nur die 1623-Variante km-16).
      en: |-
        2 Speciedaler of Christian IV (Glückstadt 1624–1634) — <b>successor special type to km-16 (1623)</b> with reduced fineness .875 (vs. nominal 9¼-Fuß standard .888). Visually distinct from km-16 per sources (own reverse/obverse composition). Not recorded in the Schleswig-Holstein KM register, only as <b>KM-DK# 104</b> in the Royal Danish register. ucoin entry tid 99114; not catalogued directly by Numista (N#468489 covers only the 1623 km-16 variant).
      uk: |-
        2 Speciedaler Кристіана IV (Glückstadt 1624–1634) — <b>наступний спеціальний тип до km-16 (1623)</b> зі зниженою пробою .875 (vs. номінальний 9¼-Fuß-стандарт .888). Візуально відрізняється від km-16 за джерелами (своя композиція реверсу/аверсу). У шлезвіг-гольштинському KM-реєстрі не зафіксовано, лише як <b>KM-DK# 104</b> у данському Royal-реєстрі. ucoin запис tid 99114; у Numista окремо не каталогізовано (N#468489 покриває лише варіант 1623 km-16).
    sources:
      - type: ucoin
        url: https://en.ucoin.net/coin/denmark-2-speciedaler-1624-1634/?tid=99114
        ref: ucoin
    issuing_entity: danish_realm
    fineness_verified: true

    mint_verified: false
    verification_note:
      de: Mzm. ursprünglich als Glückstadt erfaßt; bei späterer Auditierung gegen ucoin Period (Rigsdaler 1625-1699 bzw. Speciedaler 1582-1624 — Royal Danish Copenhagen) und KM-DK# 104 (Royal-Danish-Krause-Index ohne SH-Pendant) als königlich-dänische Kopenhagener Prägung re-attribuiert (1624–1634). Mzm. weiterhin (?) — kein direkter Hede/Wilcke-Beleg.
      en: Mint originally recorded as Glückstadt; on later audit against ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) and KM-DK# 104 (Royal Danish Krause index with no SH counterpart), re-attributed as a Royal Danish Copenhagen issue (1624–1634). Mint still (?) — no direct Hede / Wilcke attestation.
      uk: Монетний двір спочатку записано як Глюкштадт; під час подальшого аудиту проти ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) та KM-DK# 104 (Royal-Danish-Krause-індекс без SH-аналогу) переатрибутовано як королівсько-данську копенгагенську монету (1624–1634). Монетний двір лишається (?) — прямого підтвердження за Hede/Wilcke немає.
