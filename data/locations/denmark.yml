    uk: "4 Kroneskilling 1620-1621 — варіант Тип II (1,05 г повної ваги проти Типу I 1,57 г) · Christian IV, Копенгаген · варіанти монетмайстра за Hede 115A-D, об'єднані під одним KM-81: 115A Schwabe (Mzz. конюшина, Sieg 51.1, 9 330 daler), 115B Post (схрещені булави, Sieg 51.2), 115C Post (птах, Sieg 51.3, разом із 115B 14 255 daler), 115D Engelbrecht (схрещені вогневі гаки, Sieg 51.4, 1 705 daler) · Bruun-зразок — 115A · реверс-легенда «1/36 krone», звідки тривіальна назва «Kroneskilling»."
