id: denmark
name:
  de: Königreich Dänemark (Kopenhagen)
  en: Kingdom of Denmark (Copenhagen)
  uk: Королівство Данія (Копенгаген)
summary:
  de: 'Müntzwesen des dänisch-norwegischen Reichs — schwerpunktmäßig Kopenhagener, ergänzt durch andere reichsweite Müntzstätten (Kongsberg/Norge), soweit sie einen in diesem Projekt dokumentierten Müntzfuß verwenden. <em>Aktuell ca. 48 Stücke, alle aus dem Schleswig-Holstein-Artefakt ausgegliedert (drei Wellen: Christian-IV.-Kronemønt 1618–1624; weitere königlich-dänische Stücke 1611–1749, die ursprünglich beim ucoin-Import irrtümlich «Glückstadt» erhielten; sowie zwei einzelne Christian-VII.-Stücke — 4 Skilling 1783 (KM# 644 reine Dänemark-Serie, Kopenhagen) und 24 Skilling 1772–1788 (KM# 250 reine Norge-Serie, Kongsberg)). Die vollständige Reichsgeschichte ist nicht Gegenstand dieses Projekts — hier finden sich nur Stücke, die als Referenz für die in Holstein geltenden Standards dienen.</em>'
  en: "Coinage of the Danish-Norwegian Realm — primarily Copenhagen-mint, supplemented by other realm-wide mints (Kongsberg/Norway) when they follow a Münzfuß documented in this project. <em>Currently ~48 pieces, all moved out of the Schleswig-Holstein artefact (three waves: Christian IV's Kronemønt 1618–1624; further Royal Danish pieces 1611–1749 that had been wrongly tagged «Glückstadt» during the ucoin import; plus two single Christian VII pieces — the 4-Skilling 1783 (KM# 644, pure Denmark series, Copenhagen) and the 24-Skilling 1772–1788 (KM# 250, pure Norway series, Kongsberg)). The full realm coin history is out of scope for this project; only pieces that serve as reference for standards in force in Holstein are kept here.</em>"
  uk: 'Монетна справа Дансько-Норвезького союзу — переважно копенгагенські випуски, доповнені іншими реалмовими дворами (Kongsberg/Норвегія), якщо ті слідують задокументованому в проєкті стандарту. <em>Наразі ≈48 монет, усі винесено зі Schleswig-Holstein-артефакту (три хвилі: Kronemønt Кристіана IV 1618–1624; інші королівсько-данські монети 1611–1749, які при ucoin-імпорті помилково отримали ярлик «Glückstadt»; плюс дві окремі монети Кристіана VII — 4 Skilling 1783 р. (KM# 644, чисто данська серія, Копенгаген) і 24 Skilling 1772–1788 рр. (KM# 250, чисто норвезька серія, Kongsberg)). Повна реалмова монетна історія в проєкті не охоплена — тут зберігаються лише монети, які служать референсом до стандартів, чинних у Гольштейні.</em>'
# Section order beneath the timeline mirrors the timeline bar order
# (top-to-bottom on the timeline = top-to-bottom in the section list).
# `seed_unsorted` is kept last as the bulk-import catch-all.
# All Müntzfuß bars on the timeline have a corresponding section
# below — including kronemont_fine, 11_333_thaler, 18_5_thaler,
# which are currently coin-empty placeholders awaiting the future
# Danish-Realm coin import (Copenhagen Speciekrone 1693–1771,
# Rigsdaler Courant 1726–1813, Rigsbankdaler 1813–1875).
fuss_order:
  - reichsdukatenfuss
  - 9_thaler
  - 9_25_thaler
  - kronemont_chr_iv
  - kronemont
  - kronemont_fine
  - guldkrone
  - 11_333_thaler
  - 18_5_thaler
  - seed_unsorted

# ---------------------------------------------------------------------
# Timeline overview — chronological span of every Danish-relevant Müntzfuß
# from the Augsburg Imperial Coinage Ordinance (19 Aug. 1559) to the
# Krone reform (1873–1875). Excluded: 30-Thaler-Fuß (Vereinsthaler)
# and Reichsgoldmünzfuß (Goldmark) — both post-1866 German-Reich
# standards that did not apply in the Danish realm.
#
# `scope_mode: denmark_only` suppresses every holstein-scope layer; on
# this page Holstein is not a separate sub-track. Each bar's anywhere-
# scope range is taken from `data/shared/fuesse.yml` events as-is —
# no per-bar truncation, since the Danish realm continued every Danish
# stope to its full historical end (Statsbankerot 1813 / Krone-reform
# 1875).
# ---------------------------------------------------------------------
