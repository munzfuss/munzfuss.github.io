      bar_title:
        de: "Reichsdukat nach Augspurger Reichsmünzordnung 19. Aug. 1559 (67 Stück je Cöllnische Marck Feingold, 23 Karat 8 Grän = .986) · gemeinsamer Goldstandard des HRR + dän.-norw. Verbund + Schweden · im Königreich Dänemark biß ins 19. Jahrhundert geprägt — Kopenhagener Hauptmünze und Altonaer Münze (letzte holsteinische Reichsdukaten unter Christian VII., KM#650, 1791–1802) · Reichsweit endet er mit dem Münzgesetz 4. Dezember 1871"
        en: "Reichsdukat under the Augsburg Imperial Coinage Ordinance of 19 August 1559 (67 pieces per Cologne mark of fine gold, 23 carats 8 grains = .986) · the common gold standard of the Holy Roman Empire + the Danish-Norwegian union + Sweden · struck in the Kingdom of Denmark into the 19th century — Copenhagen royal mint and Altona mint (the last Holstein-side Reichsdukaten under Christian VII, KM#650, 1791–1802) · empire-wide ends with the Coinage Act of 4 December 1871"
        uk: "Reichsdukat за Авґсбурзьким імперським монетним ордонансом 19 серпня 1559 (67 штук з кельнської марки чистого золота, 23 карати 8 гран = .986) · спільний золотий стандарт Священної Римської імперії, Королівства Данії і Норвегії та Швеції · у Королівстві Данія карбувався до XIX ст. — Копенгагенський королівський монетний двір та монетний двір Альтони (останні гольштинські Reichsdukaten за Кристіана VII, KM#650, 1791–1802) · Reich-wide завершується Münzgesetz 4 грудня 1871"
      color_class: g

