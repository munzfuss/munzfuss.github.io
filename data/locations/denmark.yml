        en: "Corona Danica under Christian IV · 1618 (Forordning of 14 February) → 1624 (last strike) · Copenhagen royal mint · tariff coin, initial tariff 1½ Speciedaler · official tariff reduction to 1⅓ Speciedaler in 1625 · followed by a 19-year hiatus until the revival in the 10½-Krone-Fuß (Glückstadt, 1644)"
