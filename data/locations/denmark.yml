fuss_periods:
  kronemont_chr_iv:
    pdate_label:
      de: 'Geltungsbereich: 1618 → 1624 · ca. 6 Jahre'
      en: 'Period of validity: 1618 → 1624 · ~6 years'
      uk: 'Період дії: 1618 → 1624 · ~6 років'
    hintergrund:
      de: 'Christian IVs kroner 1618–1624. Tarifmünze, 1618 als <i>Corona Danica</i> mit Tarif 1½ Speciedaler eingeführt; die Prägung endet 1624, im Folgejahr <b>1625</b> wird der Tarif offiziell auf 1⅓ Speciedaler gesenkt; danach folgt eine 19-jährige Pause der Krone-Prägung biß zur Wiederaufnahme im 10½-Krone-Fuß (Glückstadt) 1644.<sup><a href="#ref1">[1]</a><a href="#ref2">[2]</a><a href="#ref3">[3]</a><a href="#ref4">[4]</a></sup>'
      en: 'Christian IV''s kroner 1618–1624. A tariff coin, introduced in 1618 as the <i>Corona Danica</i> at 1½ Speciedaler; production ends in 1624, and in the following year, <b>1625</b>, the tariff is officially cut to 1⅓ Speciedaler; thereafter a 19-year hiatus of Krone production follows, until the revival in the 10½-Krone-Fuß (Glückstadt) in 1644.<sup><a href="#ref1">[1]</a><a href="#ref2">[2]</a><a href="#ref3">[3]</a><a href="#ref4">[4]</a></sup>'
      uk: 'Christian IV''s kroner 1618–1624. Тарифна монета, запроваджена 1618 р. як <i>Corona Danica</i> за тарифом 1½ Speciedaler; карбування завершується 1624 р., наступного <b>1625</b> року тариф офіційно знижено до 1⅓ Speciedaler; далі настає 19-річна перерва карбування Krone — аж до відновлення у 10½-Krone-Fuß (Glückstadt) 1644 р.<sup><a href="#ref1">[1]</a><a href="#ref2">[2]</a><a href="#ref3">[3]</a><a href="#ref4">[4]</a></sup>'
    details:
      de: "<p>Die Christian-IV.-Krone war keine Handelsmünze nach Silbergehalt, sondern eine fiskalische Tarifmünze: ihr Nennwert wurde vom König per Mandat über dem tatsächlichen Silberwert festgesetzt, die Differenz floß als Seigniorage in die Staatskasse.</p><p><b>Primärkanonische Hede-Formel</b><sup><a href=\"#ref4\">[4]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ Stück je 13¾-lötiger Marck</b> = 18,909 g rau bei .859 Feingehalt = 16,250 g fein je Krone. Diese ungewöhnliche Bruchform (12,367 statt eines glatten 12½) deutet darauf hin, daß der Münzedikt 1618 den Fuß nicht über eine runde Stückzahl, sondern über die <b>Daler-Ausbringung</b> definierte — also über den nominellen Gesamtwert in Speciedaler, der aus einer feinen Marck Silber als Krone-Münzen herauskam. Bei Anfangstarif 1½ Specie pro Doppelkrone (= ¾ Specie pro Krone): aus 233,856 g Feinsilber gehen 14,391 Krone, deren Nennwert sich auf 10,793 Speciedaler addiert (Hede H105<sup><a href=\"#ref4\">[4]</a></sup>). Nach der Forordning vom 14. Februar 1624 wird die Specie selbst auf 100 Skilling neu tarifiert; die physische Krone bleibt unverändert, aber dieselbe Marck Feinsilber «bringt» nach der neuen Specie-Skala nur noch 10,361 Speciedaler aus (Hede H124<sup><a href=\"#ref4\">[4]</a></sup>).</p><p>1618 wurde nur die 2 Krone (damals einfach «Krone» genannt) nach dieser Formel geprägt; ½, ¼ und ⅛ Krone des Jahres 1618 folgten einer leicht niedrigeren Münzfod, deren exakte Werte aus Wilcke nachzutragen sind. Ab 1619 prägt auch die ½ Krone nach der Hauptformel<sup><a href=\"#ref4\">[4]</a></sup>.</p><p><b>Spezialliteratur:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) und <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — behandeln vor allem die spätere Wiederaufnahme im 10½-Krone-Fuß («<i>Grobe Krone</i>»); die Christian-IV.-Phase wird primär aus dem Hede-/Schou-Katalog (H105–H107, H124–H126) sowie den Bruun-Lots 13089 ff. (Stack's Bowers Auktion Part II, Zürich 14.–15. März 2025) belegt.</p>"
      en: "<p>The Christian IV Krone was not a trade coin valued by silver content but a fiscal tariff coin: its face value was set by royal mandate above the actual silver value, the gap accruing to the treasury as seigniorage.</p><p><b>Primary catalogue formula (Hede)</b><sup><a href=\"#ref4\">[4]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ pieces per 13¾-lødig mark</b> = 18.909 g rough at .859 fineness = 16.250 g fine per Krone. The unusual fractional form (12.367 rather than a clean 12½) suggests the 1618 mint edict defined the standard not via a round piece count but via the <b>daler output</b> — that is, the total face value, expressed in Speciedaler, that one fine mark of silver yielded once struck into Krone coin. At the initial tariff of 1½ Specie per Doppelkrone (= ¾ Specie per Krone): 233.856 g of fine silver yields 14.391 Krone, whose face values add up to 10.793 Speciedaler (Hede H105<sup><a href=\"#ref4\">[4]</a></sup>). After the Forordning of 14 February 1624 the Specie itself is re-rated to 100 Skilling; the physical Krone is unchanged, but on the new Specie scale the same fine mark now yields only 10.361 Speciedaler (Hede H124<sup><a href=\"#ref4\">[4]</a></sup>).</p><p>In 1618 only the 2 Krone (then simply called «Krone») was struck on this formula; the ½, ¼ and ⅛ Krone of 1618 followed a slightly lower Münzfod whose exact values still need to be lifted from Wilcke. From 1619 the ½ Krone also follows the main formula<sup><a href=\"#ref4\">[4]</a></sup>.</p><p><b>Specialist literature:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) and <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — these treat mainly the later revival under the 10½-Krone-Fuß («<i>Coarse Krone</i>»); the Christian IV phase is documented primarily through the Hede / Schou catalogue (H105–H107, H124–H126) and Bruun lots 13089 ff. (Stack's Bowers auction Part II, Zurich 14–15 March 2025).</p>"
      uk: "<p>Krone Кристіана IV не була торговельною монетою за вмістом срібла, а фіскальною тарифною: її номінал встановлювався королівським мандатом вище фактичної срібної вартості, різниця надходила до скарбниці як сеньйораж.</p><p><b>Першоджерельна Hede-формула</b><sup><a href=\"#ref4\">[4]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ штук з 13¾-lødig марки</b> = 18,909 г повної ваги за проби .859 = 16,250 г чистого на Krone. Незвична дробова форма (12,367 замість «красивого» 12½) вказує на те, що монетний едикт 1618 р. задавав стопу не через круглу кількість штук, а через <b>вихід у даллерах (daler-udbringning)</b> — тобто через сумарну номінальну вартість у Speciedaler, яку одна марка чистого срібла «приносила» при карбуванні в Krone-монети. За початкового тарифу 1½ Specie на Doppelkrone (= ¾ Specie на одну Krone): з 233,856 г чистого срібла виходить 14,391 Krone, сумарна номінальна вартість яких становить 10,793 Speciedaler (Hede H105<sup><a href=\"#ref4\">[4]</a></sup>). Після Forordning 14 лютого 1624 р. сам Specie перетарифовано на 100 Skilling; фізично Krone лишається без змін, але та сама марка чистого срібла за новою Specie-шкалою «приносить» уже лише 10,361 Speciedaler (Hede H124<sup><a href=\"#ref4\">[4]</a></sup>).</p><p>1618 р. за цією формулою карбувалась лише 2 Krone (тоді просто «Krone»); ½, ¼ та ⅛ Krone 1618 р. йшли за дещо нижчою møntfod, точні значення якої треба підняти з Wilcke. З 1619 р. ½ Krone теж переходить на головну формулу<sup><a href=\"#ref4\">[4]</a></sup>.</p><p><b>Спеціальна література:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) і <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — стосуються переважно пізнішого відновлення у 10½-Krone-Fuß («<i>Груба Крона</i>»); фаза Кристіана IV задокументована переважно за Hede/Schou (H105–H107, H124–H126) і лотами Bruun 13089 і далі (Stack's Bowers auction Part II, Цюрих 14–15 березня 2025).</p>"

  reichsdukatenfuss:
    pdate_label:
      de: 'Geltungsbereich (in Dänemark katalogisiert): 1738 → 1749 · drei Kopenhagen-Stücke; das Reich-weite Reichsdukatenfuß-Régime selbst gilt 1559 → 1871'
      en: 'Period catalogued (Denmark): 1738 → 1749 · three Copenhagen pieces; the empire-wide Reichsdukatenfuß standard itself runs 1559 → 1871'
      uk: 'Період каталогізації (Данія): 1738 → 1749 · три копенгагенські монети; сам загальноімперський Reichsdukatenfuß-стандарт чинний 1559 → 1871'
    hintergrund:
      de: 'Reichsdukatenfuß der Augsburger Reichsmünzordnung vom 19. August 1559: 67 Dukaten aus der feinen Cöllnischen Marck (233,856 g). Im Königreich Dänemark fortgeführt durch das gesamte 17.–18. Jahrhundert. Die hier erfaßten drei Stücke gehören in die <b>Phase B</b> nach unserer Periodisierung (1726 → 1771: parallele Etablierung des Courantdukat neben dem Reichsdukat).'
      en: 'Reichsdukatenfuß under the Augsburg Imperial Coinage Ordinance of 19 August 1559: 67 ducats from the fine Cologne mark (233.856 g). Continued in the Kingdom of Denmark throughout the 17th–18th century. The three pieces catalogued here fall within <b>Phase B</b> of our periodisation (1726 → 1771: parallel establishment of the Courantdukat alongside the Reichsdukat).'
      uk: 'Reichsdukatenfuß за Аугсбурзькою імперською монетною постановою 19 серпня 1559 р.: 67 дукатів з чистої кельнської марки (233,856 г). У Королівстві Данія дія тривала впродовж усього 17–18 ст. Три каталогізовані тут монети належать до <b>фази B</b> нашої періодизації (1726 → 1771: паралельне становлення Courantdukat поряд із Reichsdukat).'
  9_thaler:
    pdate_label:
      de: "Geltungsbereich in Holstein: 1566 (Augspurger Reichsmünz-Abschied) → 1625 (letzte Prägung; ab 1622 parallel vom 9¼-Fuß abgelöst) · 59 Jahre"
      en: "In force in Holstein: 1566 (Augsburg Imperial Mint Decree) → 1625 (last strike; from 1622 already being superseded in parallel by the 9¼-Fuß) · 59 years"
      uk: "Дія в Гольштейні: 1566 (Авґсбурзький імперський монетний ордонанс) → 1625 (останнє карбування; з 1622 паралельно витісняється 9¼-Fuß) · 59 років"
    hintergrund:
      de: |
        Reichsstandard nach dem Augspurger Reichsmüntz-Abschied vom 30. Mai 1566 — verbindlich für sämtliche Reichsstände. In Holstein-Gottorp dominierte er unter Adolf I., Johann Adolf und Friedrich III.; Münzstätten Glückstadt und Tönning prägten nach diesem Fuß Thaler Species, Mark-lübisch-Theilstücke und Schillinge. Während der Kipper-Wipper-Krise (1620–1623) brach das einheitliche Reichsmünzwesen zusammen — bereits ab 1622 (Friedrich III. von Gottorp, Glückstadt) setzt sich der leichtere 9¼-Thaler-Fuß als Großsilberstandard durch, die letzte holsteinische 9-Fuß-Prägung erfolgt 1625 (Hans Jr. von Sonderburg, 2 Schilling Lübisch). <b>Über Holstein hinaus blieb der 9-Fuß als Banktauschmünze in Kraft:</b> Hamburg führte ihn als <i>Bank-Mark</i> der Hamburger Bank weiter, Lübeck als <i>Speciemark</i> — beide bis zur Reichsmünzreform 1875.
      en: |-
        Imperial standard following the Augsburg Imperial Mint Decree of 30 May 1566 — binding on all imperial estates. In Holstein-Gottorp it dominated under Adolf I, Johann Adolf and Friedrich III; the Glückstadt and Tönning mints struck Thaler Species, Mark-lübisch sub-units and Schilling petty coins on this standard. The Kipper-Wipper crisis (1620–1623) collapsed the unified imperial coinage; from 1622 onward (Friedrich III of Gottorp, Glückstadt) the lighter 9¼-Thaler-Fuß took over as the large-silver standard, and the last Holstein 9-Fuß strike falls in 1625 (Hans Jr. of Sonderburg, 2 Schilling Lübisch). <b>Beyond Holstein the 9-Fuß remained in force as bank-exchange money:</b> Hamburg kept it as the <i>Bank-Mark</i> of the Hamburger Bank, Lübeck as the <i>Speciemark</i> — both until the imperial coinage reform of 1875.
      uk: |-
        Імперський стандарт за Авґсбурзьким імперським монетним ордонансом 30 травня 1566 р. — обов'язковий для всіх імперських станів. У Гольштейн-Ґотторпі домінував за Адольфа I, Йоганна Адольфа й Фредеріка III; монетні двори Glückstadt і Tönning карбували за цим стандартом Thaler Species, частки Mark lübisch і дрібні Schilling-монети. Криза Kipper-Wipper (1620–1623) зруйнувала єдину імперську монетну систему — вже з 1622 (Фредерік III Ґотторпський, Glückstadt) у Гольштейні утверджується легший 9¼-Thaler-Fuß як великосрібний стандарт, а останнє 9-Fuß-карбування припадає на 1625 р. (Hans Jr. Sonderburg, 2 Schilling Lübisch). <b>Поза Гольштейном 9-Fuß продовжував існувати як банковий рахунок:</b> Гамбург тримав його як <i>Bank-Mark</i> Гамбурзького банку, Любек — як <i>Speciemark</i>; обидва до імперської монетної реформи 1875 р.
    closing_label:
      de: "Übergang zum 9¼-Fuß (Thaler Species) ab 1622, letzte Holstein-Prägung 1625"
      en: "Transition to the 9¼-Fuß (Thaler Species) from 1622; last Holstein strike 1625"
      uk: "Перехід до 9¼-Fuß (Thaler Species) з 1622; останнє карбування в Гольштейні — 1625"
    closing:
      de: |
        Der 9-Thaler-Fuß war kurzlebig in Holstein selbst (Adolf I. → Hans Jr. Sonderburg, letzte Prägung 1625; ab 1622 vom 9¼-Fuß abgelöst), bleibt aber <b>außerhalb Holsteins als Hamburger Bank-Mark und Lübecker Speciemark Rechnungseinheit biß 1875</b>. Die holsteinischen Reichsthaler unter Johann Adolf gehören zu den frühesten dokumentierten Großsilbermünzen der Region und bilden die Grundlage für die spätere 9¼-Fuß-Tradition.
      en: |-
        The 9-Thaler-Fuß was short-lived in Holstein itself (Adolf I → Hans Jr. of Sonderburg, last strike 1625; superseded by the 9¼-Fuß from 1622), but it survived <b>beyond Holstein as the Hamburg Bank Mark and the Lübeck Speciemark unit of account until 1875</b>. The Holstein Reichsthaler under Johann Adolf are among the earliest documented large-silver coins in the region and form the foundation for the later 9¼-Fuß tradition.
      uk: |-
        9-Thaler-Fuß у самому Гольштейні був недовговічним (Адольф I → Hans Jr. Sonderburg, останнє карбування 1625; з 1622 витіснений 9¼-Fuß), однак <b>поза Гольштейном залишався розрахунковою одиницею як Гамбурзька Bank-Mark і Любецька Speciemark до 1875 р.</b> Гольштинські рейхсталери за Йоганна Адольфа належать до найдавніших задокументованих великосрібних монет регіону і становлять основу пізнішої традиції 9¼-Fuß.

  9_25_thaler:
    pdate_label:
      de: "Geltungsbereich in Holstein: 1622 (Friedrich III.) → 24. Aug. 1866 (preuß. Annexion) · 244 Jahre"
      en: "In force in Holstein: 1622 (Friedrich III) → 24 Aug. 1866 (Prussian annexation) · 244 years"
      uk: "Дія в Гольштейні: 1622 (Фредерік III) → 24 серпня 1866 (прусська анексія) · 244 роки"
    hintergrund:
      de: |
        Großsilbermünze nach dänisch-holsteinischer Tradition; etwas leichter als der Reichs-9-Fuß. Durchgehend stabil seit 1622 (Friedrich III. von Gottorp, Glückstadt) biß zur preußischen Annexion 1867. Mit der Schleswig-Holsteinischen Reform von 1788 (siehe Phase C) wird er zur Alleingrundmünze aller holsteinischen Courant-Nominale.
      en: |-
        A large silver coin in the Danish-Holstein tradition; slightly lighter than the imperial 9-Fuß. Stable without interruption since 1622 (Friedrich III of Gottorp, Glückstadt) until the Prussian annexation of 1867. With the Schleswig-Holstein reform of 1788 (see Phase C) it becomes the sole base coin of all Holstein Courant denominations.
      uk: |-
        Велика срібна монета дансько-гольштинської традиції; дещо легша за імперський 9-Fuß. Безперервно стабільна з 1622 р. (Фредерік III Ґотторпський, Glückstadt) до прусської анексії 1867 р. З Шлезв.-Гольштинською реформою 1788 р. (див. Фазу C) стає єдиною базовою монетою для всіх гольштинських Courant-номіналів.
    closing_label:
      de: "Zusammenfassung · 240 Jahre Geltung"
      en: "Summary · 240 years in force"
      uk: "Підсумок · 240 років чинності"
    closing:
      de: |
        Der 9¼-Thaler-Fuß ist der <b>längstlebige und stabilste</b> Silberstandard in der holsteinischen Geldgeschichte. Über politische Umwälzungen hinweg (Gottorp-Vereinigung 1773, Staatsbankrott 1813, mehrere Herrscherwechsel, Kondominium 1864<sup><a href="#ref11">[11]</a></sup>) blieb der Feingehalt von 25,28173 g konstant. Erst die preußische Annexion 1866 beendet seine Funktion als gesetzliches Zahlmittel. Numismatisch wirkt er biß 1907 nach, als der letzte Vereinsthaler (nachfolger-Fuß) ausser Kurs gesetzt wird.
      en: |-
        The 9¼-Thaler-Fuß is the <b>longest-lived and most stable</b> silver standard in Holstein's monetary history. Through every political upheaval (the Gottorp union of 1773, the state bankruptcy of 1813, several royal successions, the condominium of 1864<sup><a href="#ref11">[11]</a></sup>) the fine weight of 25.28173 g remained unchanged. Only the Prussian annexation of 1866 ended its function as legal tender. Numismatically it lived on until 1907, when the last Vereinsthaler (its successor standard) was withdrawn from circulation.
      uk: |-
        9¼-Thaler-Fuß — <b>найдовговічніший і найстабільніший</b> срібний стандарт у грошовій історії Гольштейну. Через усі політичні переломи (обʼєднання з Готторпом 1773, державне банкрутство 1813, кілька зміни правителів, кондомініум 1864<sup><a href="#ref11">[11]</a></sup>) чиста вага 25,28173 г залишалася незмінною. Лише прусська анексія 1866 поклала край його статусу законного платіжного засобу. Нумізматично він діяв до 1907 року, коли останній Vereinsthaler (стопа-наступник) було вилучено з обігу.

  kronemont:
    pdate_label:
      de: "Geltungsbereich: 1644 → 1696 · ca. 52 Jahre"
      en: "Period of validity: 1644 → 1696 · ~52 years"
      uk: "Період дії: 1644 → 1696 · ~52 років"
    hintergrund:
      de: |-
        Fiskalische <b>Tarifmünze</b> der dänischen Krone, 1618–1696. Nennwert per königlichem Mandat über dem Silberwert festgesetzt; die Differenz floß als Seigniorage in die Staatskasse. <b>Historischer Vorläufer:</b> der Krone-Standard <b>Christian IVs kroner</b> (Corona Danica 1618–1624) — dieselbe Münzkategorie (Tarifmünze) und derselbe Münzname, aber mit höherem Feingehalt und höherem Tarif pro Krone als der 10½-Krone-Fuß. Der 1644 in Glückstadt wiederaufgenommene <b>10½-Krone-Fuß</b> («<i>Grobe Krone</i>») übernimmt nur die Tarif-Logik der Krone, nicht ihre metrischen Parameter. <b>Paralleler dänischer Standard:</b> der <b>13-Krone-Fuß</b> («<i>Feine Krone</i>», Reskript 31. Dezember 1692) — eine ausschließlich auf die Kopenhagener Hauptmünze beschränkte Reform, in Holstein nicht durchgeführt; daher in diesem Artefakt nicht als eigene Sektion behandelt.
      en: |-
        Fiscal <b>tariff coin</b> of the Danish Crown, 1618–1696. Face value set by royal mandate above the silver value; the gap accrued to the treasury as seigniorage. <b>Historical predecessor:</b> the Krone standard <b>Christian IV's kroner</b> (Corona Danica 1618–1624) — same coin category (tariff coin) and same coin name, but at higher fineness and a higher per-Krone tariff than the 10½-Krone-Fuß. The Glückstadt standard taken up again in 1644 — the <b>10½-Krone-Fuß</b> («<i>Coarse Krone</i>») — inherits only the Krone's tariff logic, not its metric parameters. <b>Parallel Danish standard:</b> the <b>13-Krone-Fuß</b> («<i>Fine Crown</i>», reskript of 31 December 1692) — a reform confined entirely to the Copenhagen royal mint, never carried through in Holstein; therefore not treated as its own section in this artefact.
      uk: |-
        Фіскальна <b>тарифна монета</b> данської Корони, 1618–1696. Номінал встановлювався королівським мандатом вище срібної вартості; різниця надходила до скарбниці як сеньйораж. <b>Історичний предтеча:</b> Krone-стандарт <b>Christian IV's kroner</b> (Corona Danica 1618–1624) — та сама монетна категорія (тарифна монета) і та сама назва монети, але з вищою пробою і вищим тарифом на одну Krone, ніж 10½-Krone-Fuß. Відновлений у Glückstadt 1644 р. <b>10½-Krone-Fuß</b> («<i>Груба Крона</i>») успадковує лише тарифну логіку Krone, не її метричні параметри. <b>Паралельний данський стандарт:</b> <b>13-Krone-Fuß</b> («<i>Тонка Крона</i>», рескрипт 31 грудня 1692 р.) — реформа, що обмежувалась виключно Копенгагенським королівським монетним двором, у Гольштейні не впроваджена; тому в цьому артефакті окремою секцією не подається.
    details:
      de: |
        <p>Die Kronemønt wurde 1618 unter Christian IV. als <i>Corona Danica</i> eingeführt — keine Handelsmünze nach Silbergehalt, sondern eine Binnenwährung mit königlich verfügtem Tarif. Der Aufschlag über dem tatsächlichen Silberwert war Seigniorage-Gewinn der Krone.</p>
        <p>Der ursprüngliche Tarif (1 Krone = 1½ Speciedaler) bedeutete einen erheblichen Seigniorage-Aufschlag über dem reinen Silberwert; im Volksmund wurde der königliche Wahlspruch <b>RFP</b> (regna firmat pietas — «Frömmigkeit stärkt die Reiche») daraufhin als <b>R(iget) F(attes) P(enge)</b> — «Dem Reich fehlt Geld» — gelesen.<sup><a href="#ref25">[25]</a></sup> Im Jahre 1625 wurde der Tarif auf 1⅓ Specie herabgesetzt; um 1670 stabilisierte ihn Christian V. auf <b>⅔ Specie</b> = 2 Marck Danske, eine Wertigkeit, die fortan auf den Münzen explizit als «<b>2 MARCK</b>» eingeprägt erscheint.</p>
        <p>Geprägt wurde in <b>Kopenhagen</b> (königliche Münze) und in <b>Glückstadt</b> (holsteinische Münze, ab 1644 dominant). Die Kronemønt zirkulierte nach dem königlich gesetzten Tarif; parallel prägten Kopenhagen und Glückstadt vollwertige Speciedaler nach 9¼-Fuß (siehe Bruun-Lots im Speciedaler-Abschnitt). Die Serie endet 1696; ab 1726 löst der <b>Rigsdaler Courant (11⅓-Fuß)</b> sie als dänische Hauptmünze ab — auf Grundlage der Metalläquivalenz statt der Tarif-Logik.</p>
        <p><b>Quellengrundlage des Müntzfußes und des Feingehalts:</b> Bei fehlenden Primärtexten der Münzedikte sind die Müntzen selbst die Quelle. Der Müntzfuß <b>10½</b> ergibt sich exakt: 22,272 g Raugewicht × 10,5 = 233,856 g = 1 Cöllnische Marck (ohne Rundung). Der Feingehalt <b>.671</b> auf Numista entspricht der nächstgelegenen kanonischen Loth-Grän-Stufe <b>⁴³⁄₆₄ = 10 Loth 12 Grän = .671875</b> — die Differenz liegt in der vierten Dezimalstelle, innerhalb der üblichen Numista-Rundung auf drei Stellen; benachbarte Stufen (.6641 und .6797) sind ausgeschlossen. Der Müntzfuß <b>10½</b> bezieht sich auf die RAUE Marck, nicht auf Feinsilber wie bei den Thaler-Müntzfüßen. Belegexemplare: N#111284, N#111285, N#108760, N#108735.</p>
        <p><b>Spezialliteratur:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) und <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — beide trennen die Kronemønt-Serie bewußt vom regulären Speciedaler.</p>
      en: |-
        <p>The Kronemønt was introduced in 1618 by Christian IV as the <i>Corona Danica</i> — not a trade coin valued by silver content but a domestic currency with a royally decreed tariff. The premium above the actual silver value was Crown seigniorage.</p>
        <p>The original tariff (1 Krone = 1½ Speciedaler) implied a substantial seigniorage premium above the pure silver value; the royal motto <b>RFP</b> (regna firmat pietas — «piety strengthens kingdoms») was therefore reread in folk parlance as <b>R(iget) F(attes) P(enge)</b> — «the realm lacks money».<sup><a href="#ref25">[25]</a></sup> In 1625 the tariff was lowered to 1⅓ Specie; around 1670 Christian V stabilised it at <b>⅔ Specie</b> = 2 Marck Danske, a parity which thereafter appears explicitly on the coins as «<b>2 MARCK</b>».</p>
        <p>Striking took place at <b>Copenhagen</b> (royal mint) and at <b>Glückstadt</b> (the Holstein mint, dominant from 1644 onwards). The Kronemønt circulated at the royally set tariff; in parallel both Copenhagen and Glückstadt struck full-value Speciedaler on the 9¼-Fuß (see the Bruun lots in the Speciedaler section). The series ends in 1696; from 1726 the <b>Rigsdaler Courant (11⅓-Fuß)</b> succeeds it as the principal Danish coin — on a metal-equivalence basis rather than a tariff basis.</p>
        <p><b>Source basis for the standard and fineness:</b> in the absence of accessible mint-edict texts, the coins themselves are the source. The standard <b>10½</b> follows exactly: 22.272 g rough × 10.5 = 233.856 g = 1 Cologne mark (no rounding). The fineness <b>.671</b> on Numista matches the nearest canonical Loth-Grän step <b>⁴³⁄₆₄ = 10 Loth 12 Grän = .671875</b> — a 4th-decimal difference, within Numista's usual 3-digit rounding; the adjacent steps .6641 and .6797 are ruled out. The standard <b>10½</b> refers to the RAW mark, not to fine silver as in the Thaler standards. Reference specimens: N#111284, N#111285, N#108760, N#108735.</p>
        <p><b>Specialist literature:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) and <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — both deliberately separate the Kronemønt series from the regular Speciedaler.</p>
      uk: |-
        <p>Kronemønt запроваджено 1618 року Кристіаном IV як <i>Corona Danica</i> — не торговельну монету за вмістом срібла, а внутрішню валюту з королівсько встановленим тарифом. Надбавка над фактичною срібною вартістю становила сеньйораж Корони.</p>
        <p>Початковий тариф (1 Krone = 1½ Speciedaler) означав суттєву сеньйораж-надбавку над чистою срібною вартістю; королівський девіз <b>RFP</b> (regna firmat pietas — «побожність зміцнює царства») у народі відтак переосмислили як <b>R(iget) F(attes) P(enge)</b> — «Державі бракує грошей».<sup><a href="#ref25">[25]</a></sup> 1625 року тариф знижено до 1⅓ Specie; близько 1670 року Кристіан V стабілізував його на рівні <b>⅔ Specie</b> = 2 Marck Danske — паритет, який відтоді з'являється на монетах явно як «<b>2 MARCK</b>».</p>
        <p>Карбування здійснювалося в <b>Копенгагені</b> (королівський монетний двір) і в <b>Glückstadt</b> (гольштинський монетний двір, домінантний з 1644). Kronemønt оберталась за встановленим королем тарифом; паралельно Копенгаген і Glückstadt карбували повноцінні Speciedaler за 9¼-Fuß (див. Bruun-лоти в Speciedaler-розділі). Серія завершується 1696 року; з 1726 р. <b>Rigsdaler Courant (11⅓-Fuß)</b> змінює її як головна данська монета — на основі еквівалентності металу, не тарифу.</p>
        <p><b>Джерельна база стопи та проби:</b> за відсутності доступних текстів монетних едиктів первинним джерелом є самі монети. Стопа <b>10½</b> виходить точно: 22,272 г повної ваги × 10,5 = 233,856 г = 1 кельнська марка (без округлення). Проба <b>.671</b> у Numista збігається з найближчою канонічною точкою системи Loth-Grän <b>⁴³⁄₆₄ = 10 Loth 12 Grän = .671875</b> — різниця в четвертій цифрі після коми, у межах звичайного округлення Numista до трьох знаків; сусідні рівні .6641 і .6797 виключаються. Стопа <b>10½</b> рахується від повної (rau) марки, а не від чистого срібла як у Thaler-стопах. Зразки-приклади: N#111284, N#111285, N#108760, N#108735.</p>
        <p><b>Спеціальна література:</b> Sven Aagaard, <i>Frederik III Kronemønt København 1651–1670</i> (2004) і <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022) — обидва навмисно відокремлюють серію Kronemønt від звичайного Speciedaler.</p>

  guldkrone:
    pdate_label:
      de: 'Geltungsbereich: 1657 → 1670 · 13 Jahre (Frederik-III.-Tarifregime; in Holstein nur Glückstadt-Phase 1657–1660)'
      en: 'Period of validity: 1657 → 1670 · 13 years (Frederik III tariff regime; in Holstein only the Glückstadt phase 1657–1660)'
      uk: 'Період дії: 1657 → 1670 · 13 років (тарифний режим Фредеріка III; у Гольштейні лише ґлюкштадтська фаза 1657–1660)'
    hintergrund:
      de: |
        Goldene <b>Tarifmünze</b> Frederik III., 1657 in Glückstadt eingeführt; goldenes Pendant der Krone-Mønt-Kategorie mit gleicher Tarif-Logik wie die silberne Krone, aber in 22-karätigem Gold und mit eigener metrischer Definition (≈ 39 Stück je Cöllnische Marck Raulegierung von 22 Karat = 5,996 g rau / 5,498 g fein je Stück). Tarif <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Geprägt in Glückstadt 1657–1660 (Hede 145B, Mzm. Jacob Schwieger) und in Kopenhagen 1668 (KM# 303, bei reduziertem Tarif von 3 Speciedaler und kleinerem Raugewicht von 5,47 g — ein verwandter, aber physikalisch anderer Müntzfuß). Mit dem Tod Frederiks III. 1670 endet die Guldkrone-Tarifprägung; Christian V. setzt sie nicht fort und prägt in Glückstadt nur noch nach dem Reichsdukatenfuß. <b>Nicht zu verwechseln mit dem Goldgulden</b> (HRR-Goldmünze nach Reichsmünzordnung 1559, andere Lineage und andere Tarifeinheit).
      en: |-
        A gold <b>tariff coin</b> of Frederik III, introduced at Glückstadt in 1657; the gold counterpart of the Krone-Mønt category, with the same tariff logic as the silver Krone but in 22-carat gold and with its own metric definition (≈ 39 pieces per Cologne mark of raw 22-carat alloy = 5.996 g rough / 5.498 g fine each). Tariff <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Struck at Glückstadt 1657–1660 (Hede 145B, mintmaster Jacob Schwieger) and at Copenhagen in 1668 (KM# 303, at a reduced tariff of 3 Speciedaler and a smaller rough weight of 5.47 g — a related but physically distinct standard). With the death of Frederik III in 1670 Guldkrone tariff coinage ends; Christian V does not continue it and strikes Glückstadt gold only on the Reichsdukatenfuß. <b>Not to be confused with the Goldgulden</b> (Holy Roman Empire gold coin under the Reichsmünzordnung of 1559, separate lineage and a different tariff unit).
      uk: |-
        Золота <b>тарифна монета</b> Фредеріка III, запроваджена в Glückstadt 1657 р.; золотий аналог Krone-Mønt-категорії з тією ж тарифною логікою, що й срібна Krone, але в 22-каратному золоті й з власним метричним означенням (≈ 39 штук з кельнської марки сплаву 22 карат = 5,996 г повної ваги / 5,498 г чистого на штуку). Тариф <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Карбувалася в Glückstadt 1657–1660 (Hede 145B, монетмайстер Jacob Schwieger) і в Копенгагені 1668 р. (KM# 303, зі зниженим тарифом 3 Speciedaler і меншою повною вагою 5,47 г — споріднена, але фізично окрема стопа). Зі смертю Фредеріка III 1670 р. тарифне карбування Guldkrone завершується; Кристіан V його не продовжує і в Glückstadt карбує золото лише за Reichsdukatenfuß. <b>Не плутати з Goldgulden</b> (золота монета Священної Римської імперії за Reichsmünzordnung 1559, окрема лінія й інша тарифна одиниця).
    closing_label:
      de: "Zusammenfassung · 13 Jahre Frederik-III.-Tarifregime"
      en: "Summary · 13 years of the Frederik III tariff regime"
      uk: "Підсумок · 13 років тарифного режиму Фредеріка III"
    closing:
      de: |
        Der Guldkrone-Fuß ist eines der <b>kürzlebigsten Tarifregime</b> im Holstein-Verzeichnis: ein einziger Regent (Frederik III., 1648–1670) und zwei Münzstätten (Glückstadt 1657–1660, Kopenhagen 1668). Im Holstein-Skopus liegt nur die Glückstadt-Phase mit dem kanonischen Typ Hede 145B (Mzm. Jacob Schwieger); die Kopenhagener Folgeprägung 1668 ist als eigener Typ erfaßt, gehört aber nicht zu diesem Verzeichnis. Mit Christian V. läuft die Guldkrone-Tarif-Logik aus — Goldprägung in Glückstadt setzt sich nur noch im Reichsdukatenfuß fort.
      en: |-
        The Guldkrone-Fuß is one of the <b>shortest-lived tariff regimes</b> in the Holstein register: a single ruler (Frederik III, 1648–1670) and two mints (Glückstadt 1657–1660, Copenhagen 1668). Only the Glückstadt phase falls within the Holstein scope, with the canonical type Hede 145B (mintmaster Jacob Schwieger); the Copenhagen follow-up of 1668 is registered as its own type but does not belong to this catalogue. With Christian V the Guldkrone tariff logic lapses — gold coinage at Glückstadt continues only on the Reichsdukatenfuß.
      uk: |-
        Guldkrone-Fuß — один із <b>найкоротших тарифних режимів</b> у гольштинському реєстрі: один правитель (Фредерік III, 1648–1670) і два монетні двори (Glückstadt 1657–1660, Копенгаген 1668). У гольштинський скоуп потрапляє лише ґлюкштадтська фаза з канонічним типом Hede 145B (монетмайстер Jacob Schwieger); копенгагенський наступний випуск 1668 р. зафіксовано як окремий тип, але до цього каталогу він не належить. За Кристіана V тарифна логіка Guldkrone згортається — золоте карбування в Glückstadt далі ведеться лише за Reichsdukatenfuß.

