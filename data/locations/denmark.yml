    en: |-
      2 Skilling of Christian IV (1603–1613) — 1/48 Speciedaler. Hede c4h79 publishes the Soll for four mintmark sub-variants (79A trefoil, 79B crossed glødehager) under a single specification block: Bruttovægt 2.088 g, finhed 0.296, finvægt 0.619 g, marken fin udbragt til 11.432 dlr. ucoin tid 163008 publishes specimen readings for the same type (1.78 g, 0.298 fineness) — multi-source observations against the Hede Soll. Krause-DK groups both mintmark sub-variants under KM-DK# 16.1.
    uk: |-
      2 Skilling Кристіана IV (1603–1613) — 1/48 Speciedaler. Hede c4h79 публікує Soll для чотирьох sub-варіантів за карбівником (79A trefoil, 79B схрещені glødehager) під спільною специфікацією: Bruttovægt 2,088 г, finhed 0,296, finvægt 0,619 г, marken fin udbragt til 11,432 dlr. ucoin tid 163008 публікує покоінні значення для того ж типу (1,78 г, 0,298 проба) — мультиджерельні спостереження проти Hede-Soll. Krause-DK групує обидва sub-варіанти за карбівником під KM-DK# 16.1.
