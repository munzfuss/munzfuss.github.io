    - id: kronemont_chr_iv
      label:
        de: Christian IVs kroner · Tarifmünze
        en: Christian IV's kroner · tariff coin
        uk: Christian IV's kroner · тарифна монета
      small:
        de: 16,250 g fein · Silber
        en: 16.250 g fine · silver
        uk: 16,250 г чистого · срібло
      year_from: 1618
      year_to: 1652
      bar_title:
        de: "Christian-IVs-Müntzformel (.859 / 16,250 g fein) · åbent Brev 12. Juli 1618 (Wilcke II Anm. 53; Wilcke I S. 156–157) — im Patent als «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» beschrieben, der spätere Latin-Name «Corona Danica» ist Numismatik-Usus → 1652 (Frederik III. wechselt zum 10½-Krone-Fuß) · Kopenhagener Hauptmünze · Tarifmünze, Anfangstarif 1½ Speciedaler, 1625 auf 1⅓ Speciedaler abgewertet · personnelle Christian-IV.-Karbung 1618–1624/25 + Frederik-III.-Fortsetzung 1651–1652 an derselben Müntzformel (Hede 1957: «<i>1618-1652</i>»; Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 ... Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>») · Sonderemissionen 1665 «Pumphosenkrone» (Schou 39/40) und 1675 2-Krone (Schou 11–15) folgen einer leicht höheren Lötigkeit und sind Hede-klassifiziert als spezielle Schaumünzen, nicht als Formelfortsetzung"
        en: "Christian IV's Müntzformel (.859 / 16.250 g fine) · åbent Brev of 12 July 1618 (Wilcke II note 53; Wilcke I pp. 156–157) — in the patent the coin is described as «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>», the later Latin name «Corona Danica» being a numismatic convention → 1652 (Frederik III shifts to the 10½-Krone-Fuß) · Copenhagen royal mint · tariff coin, initial tariff 1½ Speciedaler, reduced to 1⅓ Speciedaler in 1625 · Christian IV personal mintage 1618–1624/25 plus Frederik III continuation 1651–1652 at the same Müntzformel (Hede 1957: «<i>1618-1652</i>»; Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 ... Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>») · special issues 1665 «Pumphosenkrone» (Schou 39/40) and 1675 2-Krone (Schou 11–15) follow a slightly higher fineness and are Hede-classified as specialised Schaumünzen, not formula continuations"
        uk: "Монетна формула Кристіана IV (.859 / 16,250 г чистого) · åbent Brev 12 липня 1618 р. (Wilcke II прим. 53; Wilcke I с. 156–157) — у патенті монета описана як «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>», пізніша латинська назва «Corona Danica» — нумізматична умовність → 1652 (Фредерік III переходить на 10½-Krone-Fuß) · Копенгагенський королівський монетний двір · тарифна монета, початковий тариф 1½ Speciedaler, 1625 знижено до 1⅓ Speciedaler · персональне карбування Кристіана IV 1618–1624/25 + продовження Фредеріка III 1651–1652 на тій самій формулі (Hede 1957: «<i>1618-1652</i>»; Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 ... Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>») · спец-випуски 1665 «Pumphosenkrone» (Schou 39/40) і 1675 2-Krone (Schou 11–15) йдуть за дещо вищою пробою і Hede-класифіковані як особливі Schaumünzen, а не продовження формули"
      color_class: krm

    - id: "kronemont"
      label:
        de: "10½-Krone-Fuß · «Grobe Krone»"
        en: "10½-Krone-Fuß · «Coarse Krone»"
        uk: "10½-Krone-Fuß · «Груба Крона»"
      small:
        de: "14,964 g fein · Silber"
        en: "14.964 g fine · silver"
        uk: "14,964 г чистого · срібло"
      year_from: 1644
      year_to: 1813
      bar_title:
        de: "10½-Krone-Fuß («Grobe Krone») · Hebræermønt-Vorläufer 1644–1648 in Glückstadt (Aagaard: Kriegsmünze des Torstenson-Krieges, kein formeller Müntzfuß) → reguläre Karbung Norge 1649, Danmark 1652 (Hede 1957) · formelle Festschreibung durch Münzordnung Christians V. vom 22. März 1671: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» je Marck Feinsilber · Hede-Verifikation: «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>» · ⅔-Speciedaler-Tarif (ab Christian V., 1670+) · 1665 Sonderemission «Pumphosenkrone» / «Pumpbucksen Thaler» (Schou 39/40), 1675 2-Krone (Schou 11–15, Reskript 11. März 1675) · letzte Karbung 1732 unter Christian VI. (Hede 4) · ab 1692 Krone-Mønt verliert Dominanz an Kurantmønt (lex.dk: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>») · ältere Bestände kursierten biß zum Statsbankerot 1813"
        en: "10½-Krone-Fuß («Coarse Krone») · Hebræermønt predecessor 1644–1648 at Glückstadt (Aagaard: war coinage of the Torstenson War, no formal Müntzfuß) → regular minting Norge 1649, Danmark 1652 (Hede 1957) · formally codified by Christian V's mint ordinance of 22 March 1671: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» per mark of fine silver · Hede verification: «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>» · ⅔ Speciedaler tariff (from Christian V, 1670 onward) · 1665 special issue «Pumphosenkrone» / «Pumpbucksen Thaler» (Schou 39/40), 1675 2-Krone (Schou 11–15, Reskript of 11 March 1675) · last strike 1732 under Christian VI (Hede 4) · from 1692 the Krone-Mønt loses dominance to Kurantmønt (lex.dk: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>») · older stocks remained in circulation until the Statsbankerot of 1813"
        uk: "10½-Krone-Fuß («Груба Крона») · попередник Hebræermønt 1644–1648 у Glückstadt (Aagaard: воєнна монета Торстенсонської війни, без формальної Müntzfuß-постанови) → регулярне карбування Norge 1649, Danmark 1652 (Hede 1957) · формально закріплено монетною постановою Кристіана V від 22 березня 1671 р.: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» з марки чистого срібла · Hede-верифікація: «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>» · тариф ⅔ Speciedaler (від Кристіана V, з 1670) · 1665 спец-випуск «Pumphosenkrone» / «Pumpbucksen Thaler» (Schou 39/40), 1675 2-Krone (Schou 11–15, Reskript 11 березня 1675) · останнє карбування 1732 за Кристіана VI (Hede 4) · з 1692 Krone-Mønt втрачає домінування на користь Kurantmønt (lex.dk: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>») · старі запаси в обігу до Statsbankerot 1813"
      color_class: krm

