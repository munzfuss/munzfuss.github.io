    note:
      de: |-
        1 Speciedaler Friedrichs III. (Glückstadt 1664) — <b>Sondertyp mit reduziertem Feingehalt .875</b> (vs. dem Standard-9¼-Fuß-Wert .888 für die parallele Hauptemission km-51 1664–1666). Im Schleswig-Holstein-KM-Register nicht erfasst, sondern nur als <b>KM-DK# 250</b> im Royal-Danish-Register. ucoin-Eintrag tid 97365; in Numista nicht direkt katalogisiert.
      en: |-
        1 Speciedaler of Frederik III (Glückstadt 1664) — <b>special type with reduced fineness .875</b> (vs. the standard 9¼-Fuß value .888 of the parallel main issue km-51 1664–1666). Not recorded in the Schleswig-Holstein KM register, only as <b>KM-DK# 250</b> in the Royal Danish register. ucoin entry tid 97365; not catalogued directly by Numista.
      uk: |-
        1 Speciedaler Фредеріка III (Glückstadt 1664) — <b>спеціальний тип зі зниженою пробою .875</b> (vs. стандартне для 9¼-Fuß значення .888 паралельної основної емісії km-51 1664–1666). У шлезвіг-гольштинському KM-реєстрі не зафіксовано, лише як <b>KM-DK# 250</b> у данському Royal-реєстрі. ucoin запис tid 97365; у Numista окремо не каталогізовано.
    sources:
