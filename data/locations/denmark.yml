- id: km-x013-fr-iii-1664
  fuss: 9_25_thaler
  phase: I
  kind: kurant
  fraction: "1"
  nominal: 1 Speciedaler
  year_label: "1664"
  year_first: 1664
  year_last: 1664
  ruler: "Friedrich III."
  mint: "Kopenhagen"
  catalog:
    others:
    - "KM-DK# 250"
  metal: silver
  fineness: 0.875
  weight_rough_g:
  - value: 28.78
    source: ucoin
  note:
    de: |-
      1 Speciedaler Friedrichs III. (Glückstadt 1664) — <b>Sondertyp mit reduziertem Feingehalt .875</b> (vs. dem Standard-9¼-Fuß-Wert .888 für die parallele Hauptemission km-51 1664–1666). Im Schleswig-Holstein-KM-Register nicht erfasst, sondern nur als <b>KM-DK# 250</b> im Royal-Danish-Register. ucoin-Eintrag tid 97365; in Numista nicht direkt katalogisiert.
    en: |-
      1 Speciedaler of Frederik III (Glückstadt 1664) — <b>special type with reduced fineness .875</b> (vs. the standard 9¼-Fuß value .888 of the parallel main issue km-51 1664–1666). Not recorded in the Schleswig-Holstein KM register, only as <b>KM-DK# 250</b> in the Royal Danish register. ucoin entry tid 97365; not catalogued directly by Numista.
    uk: |-
      1 Speciedaler Фредеріка III (Glückstadt 1664) — <b>спеціальний тип зі зниженою пробою .875</b> (vs. стандартне для 9¼-Fuß значення .888 паралельної основної емісії km-51 1664–1666). У шлезвіг-гольштинському KM-реєстрі не зафіксовано, лише як <b>KM-DK# 250</b> у данському Royal-реєстрі. ucoin запис tid 97365; у Numista окремо не каталогізовано.
  sources:
  - type: ucoin
    url: https://en.ucoin.net/coin/denmark-1-speciedaler-1664/?tid=97365
    ref: ucoin
  issuing_entity: danish_realm
  fineness_verified: true
  diameter_mm_verified: false
  verification_note:
    de: Mzm. ursprünglich als Glückstadt erfaßt; bei späterer Auditierung gegen ucoin Period (Rigsdaler 1625-1699 bzw. Speciedaler 1582-1624 — Royal Danish Copenhagen) und KM-DK# 250 (Royal-Danish-Krause-Index ohne SH-Pendant) als königlich-dänische Kopenhagener Prägung re-attribuiert (1664). Mzm. weiterhin (?) — kein direkter Hede/Wilcke-Beleg.
    en: Mint originally recorded as Glückstadt; on later audit against ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) and KM-DK# 250 (Royal Danish Krause index with no SH counterpart), re-attributed as a Royal Danish Copenhagen issue (1664). Mint still (?) — no direct Hede / Wilcke attestation.
    uk: Монетний двір спочатку записано як Глюкштадт; під час подальшого аудиту проти ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) та KM-DK# 250 (Royal-Danish-Krause-індекс без SH-аналогу) переатрибутовано як королівсько-данську копенгагенську монету (1664). Монетний двір лишається (?) — прямого підтвердження за Hede/Wilcke немає.
  mint_verified: false
