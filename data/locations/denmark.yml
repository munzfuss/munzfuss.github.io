  11_333_thaler:
    pdate_label:
      de: 'Geltungsbereich: 15./31. Juli 1726 (Forordning Friedrichs IV., Kurantmøntfod) → 5. Januar 1813 (Statsbankerot, Forordning Friedrichs VI.) · ca. 87 Jahre als Hauptalltagswährung; Altbestände als Scheidemünzen biß zur Krone-Reform 1875'
      en: 'Period of validity: 15/31 July 1726 (Forordning of Friedrich IV, Kurantmøntfod) → 5 January 1813 (Statsbankerot, Forordning of Friedrich VI) · ca. 87 years as main everyday currency; old stocks circulated as petty coinage until the Krone reform of 1875'
      uk: 'Період дії: 15/31 липня 1726 (Forordning Фредеріка IV, Kurantmøntfod) → 5 січня 1813 (Statsbankerot, Forordning Фредеріка VI) · бл. 87 років як основна повсякденна валюта; старі запаси як розмінна монета до Krone-реформи 1875'
    hintergrund:
      de: |
        <b>11⅓-Thaler-Fuß · Rigsdaler Courant</b> — etabliert durch die <b>Forordning vom 15./31. Juli 1726</b> Friedrichs IV. als <i>Kurantmøntfod</i> des dänisch-norwegischen Verbundes. Aus einer feinen Cöllnischen Marck (233,856 g) wurden 11⅓ Rigsdaler Courant ausgeprägt — Feingewicht ≈ 20,63 g pro Daler. <b>Hauptalltagswährung des Gesamtstaats</b> während fast des gesamten 18. Jahrhunderts; läuft im Königreich Dänemark/Norwegen biß zum Staatsbankrott am 5. Januar 1813 (Forordning Friedrichs VI.), als der Rigsbankdaler im 18½-Thaler-Fuß den Kurantfuß ablöst. <b>In Holstein</b> hingegen nur biß zur Schimmelmann-Reform vom 29. Februar 1788 in Geltung. Altbestände aus 1726–1813 blieben ab 1813 noch jahrzehntelang als Scheidemünzen im Umlauf, biß sie mit der Krone-Reform 1875 (Skandinavische Münzunion) endgültig eingezogen wurden.
      en: |
        <b>11⅓-Thaler-Fuß · Rigsdaler Courant</b> — established by Friedrich IV's <b>Forordning of 15/31 July 1726</b> as the <i>Kurantmøntfod</i> of the Danish-Norwegian composite state. From one fine Cologne mark (233.856 g) 11⅓ Rigsdaler Courant were struck — fine weight ≈ 20.63 g per daler. <b>Main everyday currency of the composite state</b> through most of the 18th century; in the Kingdom of Denmark/Norway it remained in force until the state bankruptcy of 5 January 1813 (Forordning of Friedrich VI), when the Rigsbankdaler on the 18½-Thaler-Fuß replaced the Kurantfuß. <b>In Holstein</b>, by contrast, it was in force only until the Schimmelmann reform of 29 February 1788. Old stocks from 1726–1813 remained in circulation as petty coinage for decades after 1813, until they were finally withdrawn by the Krone reform of 1875 (Scandinavian Monetary Union).
      uk: |
        <b>11⅓-Thaler-Fuß · Rigsdaler Courant</b> — встановлений <b>Forordning 15/31 липня 1726</b> Фредеріка IV як <i>Kurantmøntfod</i> Королівства Данії і Норвегії. З однієї марки чистого срібла кельнської ваги (233,856 г) карбувалося 11⅓ Rigsdaler Courant — чиста вага ≈ 20,63 г на одного даллера. <b>Основна повсякденна валюта цілісної держави</b> впродовж майже всього XVIII ст.; у Королівстві Данії/Норвегії дія тривала до державного банкрутства 5 січня 1813 р. (Forordning Фредеріка VI), коли Rigsbankdaler у 18½-Thaler-Fuß замістив Kurantfuß. <b>У Гольштейні</b> ж — лише до реформи Шіммельмана 29 лютого 1788 р. Старі запаси 1726–1813 ще десятиліттями залишалися в обігу як розмінна монета після 1813 — аж до Krone-реформи 1875 р. (Скандинавська монетна унія), коли їх остаточно вилучили з обігу.

  18_5_thaler:
    pdate_label:
      de: 'Geltungsbereich: 5. Januar 1813 (Forordning Friedrichs VI., nach Statsbankerot) → Krone-Reform 1873–1875 · 1854 ohne Fußänderung in Rigsdaler Rigsmønt umbenannt'
      en: 'Period of validity: 5 January 1813 (Forordning of Friedrich VI, after the Statsbankerot) → Krone reform 1873–1875 · renamed Rigsdaler Rigsmønt in 1854 without a change of standard'
      uk: 'Період дії: 5 січня 1813 (Forordning Фредеріка VI, після Statsbankerot) → Krone-реформа 1873–1875 · 1854 перейменовано на Rigsdaler Rigsmønt без зміни стопи'
    hintergrund:
      de: |
        <b>18½-Thaler-Fuß · Rigsbankdaler / Rigsdaler Rigsmønt</b> — Notreform Friedrichs VI. nach dem dänischen Staatsbankrott. Die <b>Forordning vom 5. Januar 1813</b> setzt den neuen Hauptstandard auf 18½ Rigsbankdaler aus einer feinen Cöllnischen Marck (233,856 g) — Feingewicht ≈ 12,64 g pro Daler. <b>§10 der Forordning</b> verankert ausdrücklich <b>1 Speciedaler = 2 Rigsbankdaler</b>, also eine glatte ½-Anteil-Anbindung an den 9¼-Thaler-Fuß. 1854 wird die Münze ohne Fußänderung in <b>Rigsdaler Rigsmønt</b> umbenannt; 1873–1875 ersetzt die <b>Krone</b> der Skandinavischen Münzunion (Schweden, Norwegen, Dänemark) den Rigsdaler. Hauptträger des dänischen Geldumlaufs in der zweiten Hälfte des 19. Jahrhunderts. In Schleswig-Holstein parallel zum 9¼-Thaler-Fuß als kleinerer Realsubstandard im Einsatz biß zur preußischen Annexion 24. August 1866.<br>
        <b>Hinweis:</b> derzeit liegen für diese Sektion noch keine katalogisierten Münzen im Datensatz vor; die Sektion ist als Platzhalter eingerichtet und wird bei künftiger Detail-Bearbeitung mit Belegtypen aus Hede / Sieg / IKMK København befüllt.
      en: |
        <b>18½-Thaler-Fuß · Rigsbankdaler / Rigsdaler Rigsmønt</b> — Friedrich VI's emergency reform after the Danish state bankruptcy. The <b>Forordning of 5 January 1813</b> sets the new principal standard at 18½ Rigsbankdaler per fine Cologne mark (233.856 g) — fine weight ≈ 12.64 g per daler. <b>§10 of the Forordning</b> explicitly anchors <b>1 Speciedaler = 2 Rigsbankdaler</b>, a clean ½-share link to the 9¼-Thaler-Fuß. In 1854 the coin is renamed <b>Rigsdaler Rigsmønt</b> without any change of standard; in 1873–1875 the <b>Krone</b> of the Scandinavian Monetary Union (Sweden, Norway, Denmark) supersedes the Rigsdaler. The main carrier of the Danish money supply in the second half of the 19th century. In Schleswig-Holstein it ran in parallel with the 9¼-Thaler-Fuß as a lesser actual sub-standard until the Prussian annexation of 24 August 1866.<br>
        <b>Note:</b> no catalogued coins for this section are present in the dataset yet; the section is set up as a placeholder and will be populated with reference types from Hede / Sieg / IKMK København in future detailed work.
      uk: |
        <b>18½-Thaler-Fuß · Rigsbankdaler / Rigsdaler Rigsmønt</b> — надзвичайна реформа Фредеріка VI після данського державного банкрутства. <b>Forordning 5 січня 1813</b> встановлює новий головний стандарт на 18½ Rigsbankdaler з однієї марки чистого срібла кельнської ваги (233,856 г) — чиста вага ≈ 12,64 г на даллер. <b>§10 Forordning</b> явно закріплює <b>1 Speciedaler = 2 Rigsbankdaler</b>, тобто чисту привʼязку ½-частки до 9¼-Thaler-Fuß. 1854 р. монета перейменовується на <b>Rigsdaler Rigsmønt</b> без зміни стопи; 1873–1875 рр. <b>Krone</b> Скандинавської монетної унії (Швеція, Норвегія, Данія) витісняє Rigsdaler. Головний носій данського грошового обігу в другій половині XIX ст. У Шлезвіг-Гольштейні діяв паралельно з 9¼-Thaler-Fuß як менший фактичний підстандарт до прусської анексії 24 серпня 1866 р.<br>
        <b>Примітка:</b> наразі в наборі даних немає каталогізованих монет для цієї секції; секція налаштована як заготовка і буде наповнена еталонними типами з Hede / Sieg / IKMK København у майбутній детальній роботі.

  kronefod:
    pdate_label:
      de: 'Geltungsbereich: 23. Mai 1873 (Mønlov, Lov nr. 66) → 2. August 1914 (Aussetzung der Goldkonvertibilität) · 41 Jahre als aktiver Hauptstandard, formell biß 1924'
      en: 'Period of validity: 23 May 1873 (Mønlov, Lov nr. 66) → 2 August 1914 (suspension of gold convertibility) · 41 years as the active principal standard, formally until 1924'
      uk: 'Період дії: 23 травня 1873 (Mønlov, Lov nr. 66) → 2 серпня 1914 (призупинення золотої конвертованості) · 41 рік активним головним стандартом, формально до 1924'
    hintergrund:
      de: |
        <b>Krone-fod</b> — gemeinsamer Hauptstandard der dänisch-schwedisch-norwegischen Krone, eingeführt durch das <b>dänische Mønlov vom 23. Mai 1873</b> (Lov nr. 66) und die <b>Skandinavische Müntzkonvention</b> Stockholm 5. Mai 1873.<sup><a href="#ref18">[18]</a></sup><sup><a href="#ref19">[19]</a></sup> Wirksam ab 1. Januar 1875; Norwegen tritt 1875 bei. Dänemark hatte zuvor die Lateinische Münzunion (1865) ausdrücklich abgelehnt, da deren bimetallische Goldsilberbindung «<i>både praktisk umuligt og økonomisk ufornuftigt</i>» sei.<sup><a href="#ref20">[20]</a></sup><br>
        <b>Tagesumlauf vs. Reservenrolle:</b> die täglich umlaufenden Stücke waren die Silber- und øre-Scheidemünzen; das Gold-Hauptkurant diente vorrangig als Auslandszahlungsreserve und als Bankdeckung. Die drei nordischen Länder prägten alle Stückelungen in einheitlicher Größe, Gewicht und Feingehalt mit nationalspezifischen Motiven — alle Reihen frei umlauffähig in allen drei Ländern biß 1914.<sup><a href="#ref19">[19]</a></sup> Konvertibilität von Banknoten in Goldmünzen am <b>2. August 1914</b> durch die Danmarks Nationalbank ausgesetzt (Kriegsausbruch).<sup><a href="#ref21">[21]</a></sup> Die Skandinavische Müntzunion bleibt für Münzgeld formell biß 1924 in Kraft.
      en: |-
        <b>Krone-fod</b> — common principal standard of the Danish-Swedish-Norwegian krone, established by the <b>Danish Mønlov of 23 May 1873</b> (Lov nr. 66) and the <b>Scandinavian Monetary Convention</b> of 5 May 1873 (Stockholm).<sup><a href="#ref18">[18]</a></sup><sup><a href="#ref19">[19]</a></sup> Effective from 1 January 1875; Norway accedes in 1875. Denmark had previously rejected joining the Latin Monetary Union (1865) because its bimetallic gold-silver linkage was «<i>both practically impossible and economically irrational</i>».<sup><a href="#ref20">[20]</a></sup><br>
        <b>Daily circulation vs. reserve role:</b> the everyday coins were the silver and øre subsidiary pieces; the gold Hauptkurant primarily served as a foreign-payment reserve and as bank backing. The three Nordic countries struck every denomination to uniform size, weight and fineness with country-specific motifs — all series circulated freely in all three countries until 1914.<sup><a href="#ref19">[19]</a></sup> Convertibility of banknotes into gold coins suspended on <b>2 August 1914</b> by Danmarks Nationalbank (outbreak of war).<sup><a href="#ref21">[21]</a></sup> The Scandinavian Monetary Union remained formally in force for coinage until 1924.
      uk: |-
        <b>Krone-fod</b> — спільний головний стандарт дансько-шведсько-норвезької крони, запроваджений <b>данським Mønlov від 23 травня 1873</b> (Lov nr. 66) і <b>Скандинавською монетною конвенцією</b> 5 травня 1873 р. (Стокгольм).<sup><a href="#ref18">[18]</a></sup><sup><a href="#ref19">[19]</a></sup> Чинний з 1 січня 1875; Норвегія приєднується 1875 р. Данія раніше явно відмовилася приєднуватися до Латинського монетного союзу (1865), оскільки його біметалева золото-срібна привʼязка була «<i>både praktisk umuligt og økonomisk ufornuftigt</i>» (практично неможлива та економічно нераціональна).<sup><a href="#ref20">[20]</a></sup><br>
        <b>Повсякденний обіг vs. резервна роль:</b> повсякденними обіговими монетами були срібні та øre-розмінні; золотий Hauptkurant передусім слугував резервом для закордонних платежів і банківським забезпеченням. Три північні країни карбували усі номінали єдиного розміру, ваги й проби з національно-специфічними мотивами — усі серії вільно оберталися в усіх трьох країнах до 1914 р.<sup><a href="#ref19">[19]</a></sup> Конвертованість банкнот у золоті монети призупинено <b>2 серпня 1914 р.</b> Danmarks Nationalbank (початок війни).<sup><a href="#ref21">[21]</a></sup> Скандинавська монетна унія формально лишалася чинною для монетного грошового обігу до 1924 р.
    closing_label:
      de: 'Zusammenfassung · 41 Jahre Krone-fod'
      en: 'Summary · 41 years of the Krone-fod'
      uk: 'Підсумок · 41 рік Krone-fod'
    closing:
      de: |
        Der dänische Krone-fod ist <b>der kürzlebigste reguläre Hauptstandard</b> in der hier behandelten Geldgeschichte — knapp vier Jahrzehnte funktionierender Goldumlauf mit voll integrierter Silber- und Bronze-Subsidiarstruktur. Strukturmerkmal: die abgestufte Feingehalts-Leiter <b>.900 Au → .800 Ag → .600 / .400 Ag → Bronze</b> ist die langlebigste Innovation des Mønlovs — nach der Krone-Goldsuspendierung 1914 prägt Dänemark die Subsidiarstückelungen kontinuierlich weiter (die 25 øre wechselt 1920–1922 von Silber auf Cupro-Nickel, die 10 øre folgt; die Bronze-øre werden 1973 außer Umlauf gesetzt).<sup><a href="#ref23">[23]</a></sup> Die Skandinavische Müntzunion blieb wirtschaftlich erfolgreich, biß der Kriegsausbruch 1914 die einheitliche Goldparität faktisch beendete; danach driften die drei nordischen Kroner auseinander, was 1924 zur formellen Auflösung der Münzunion führt.<sup><a href="#ref19">[19]</a></sup> Dänemark kehrt 1927 mit demselben Goldgehalt wie 1913 zum Goldstandard zurück, gibt ihn 1931 endgültig auf.<sup><a href="#ref21">[21]</a></sup>
      en: |-
        The Danish Krone-fod is <b>the shortest-lived regular principal standard</b> in the monetary history covered here — barely four decades of working gold circulation with a fully integrated silver and bronze subsidiary structure. Structural feature: the graded fineness ladder <b>.900 Au → .800 Ag → .600 / .400 Ag → bronze</b> is the longest-lived innovation of the Mønlov — after the 1914 gold suspension, Denmark continues to mint the subsidiary denominations (the 25 øre transitions from silver to cupro-nickel in 1920–1922, the 10 øre follows; the bronze øre are withdrawn from circulation in 1973).<sup><a href="#ref23">[23]</a></sup> The Scandinavian Monetary Union remained economically successful until the outbreak of war in 1914 effectively ended the unified gold parity; thereafter the three Nordic kroner diverged, leading in 1924 to the formal dissolution of the monetary union.<sup><a href="#ref19">[19]</a></sup> Denmark returned to the gold standard in 1927 at the same gold content as in 1913, and abandoned it permanently in 1931.<sup><a href="#ref21">[21]</a></sup>
      uk: |-
        Данський Krone-fod — <b>найкоротший регулярний основний стандарт</b> в усій розглянутій тут грошовій історії: ледь чотири десятиліття справжнього золотого обігу з повністю інтегрованою срібно-бронзовою субсидіарною структурою. Структурна риса: ступенева сходова шкала проб <b>.900 Au → .800 Ag → .600 / .400 Ag → бронза</b> — найдовговічніша інновація Mønlov; після призупинення золотого Krone 1914 р. Данія продовжує карбувати субсидіарні номінали (25 øre 1920–1922 рр. переходить зі срібла на купроникель, 10 øre йде вслід; бронзові øre виведено з обігу 1973 р.).<sup><a href="#ref23">[23]</a></sup> Скандинавська монетна унія залишалася економічно успішною до 1914, коли початок війни де-факто завершив єдину золоту паритетність; потім три північні крони розходяться, що 1924 р. призводить до формального розпуску монетної унії.<sup><a href="#ref19">[19]</a></sup> Данія повертається до золотого стандарту 1927 р. з тим самим золотим вмістом, що й 1913, остаточно полишає його 1931.<sup><a href="#ref21">[21]</a></sup>

  seed_unsorted:
    pdate_label:
      de: Bulk-Seed-Sammelbucket — Geltungsbereich pro Münze noch zuzuweisen
      en: Bulk seed bucket — period of validity to be assigned per coin
      uk: Bulk-seed загальний кошик — період дії потрібно призначити per coin
    hintergrund:
      de: Technischer Sammelbucket für bulk-importierte Münzen aus mehreren Quellen. Pro Quelle eine eigene Phase (<code>A</code> = ucoin-Bulk; <code>hede</code> = Hede 1971 via danskmoent.dk, automatisch via Build aus <code>data/seed/hede/denmark.yml</code> eingespeist). Bei künftiger Detail-Bearbeitung wandern die Stücke in den jeweils passenden eigentlichen Müntzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>kronefod</code>, <code>reichsdukatenfuss</code> etc.).
      en: Technical catch-all bucket for bulk-imported coins from several sources. One phase per source (<code>A</code> = ucoin bulk; <code>hede</code> = Hede 1971 via danskmoent.dk, auto-merged at build time from <code>data/seed/hede/denmark.yml</code>). On future detailed work the pieces move to their proper Münzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>kronefod</code>, <code>reichsdukatenfuss</code>, etc.).
      uk: Технічний загальний кошик для bulk-імпортованих монет із кількох джерел. Окрема фаза на джерело (<code>A</code> = ucoin-bulk; <code>hede</code> = Hede 1971 через danskmoent.dk, авто-merge при build з <code>data/seed/hede/denmark.yml</code>). При майбутній детальній роботі монети перейдуть у відповідну Müntzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>kronefod</code>, <code>reichsdukatenfuss</code> тощо).
phases:
  kronemont_chr_iv:
  - id: I
    year_from: 1618
    year_to: 1624
    from_label: '1618'
    to_label: '1624'
    title:
      de: Christian IV. · Corona Danica · Tarif 1½ Speciedaler
      en: Christian IV · Corona Danica · tariff 1½ Speciedaler
      uk: Кристіан IV · Corona Danica · тариф 1½ Specie
    description:
      de: 'Erste Phase der Christian-IV.-Müntzformel: eingeführt durch das <b>åbne Brev af 12. Juli 1618</b> (Wilcke II Anm. 53<sup><a href="#ref16">[16]</a></sup>: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I S. 156–157<sup><a href="#ref16">[16]</a></sup>). Im Patent wird die Münze als «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» beschrieben — der spätere Latin-Name «Corona Danica» ist Numismatik-Usus, nicht Patent-Sprache. Alle Prägungen 1618–1624 laufen unter dem ursprünglichen Tarif <b>1½ Speciedaler</b> — eine Wertigkeit, die im Volksmund die satirische Umdeutung des königlichen Wahlspruches <b>RFP</b> (regna firmat pietas) als <b>R(iget) F(attes) P(enge)</b> hervorrief.<sup><a href="#ref5">[5]</a></sup> Die offizielle Tarifsenkung auf 1⅓ Speciedaler erfolgt erst <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup>, unmittelbar nach Einstellung der Karbverfahrensphase. Stilistische Untergruppen: Corona-Danica-Originalprägungen 1618–1622 (KM# 57–61, 58a, 59a) und «Dicke» / Open-Crown-Varianten 1624 (KM# 94–99) — alle innerhalb desselben Tarifregimes. Wikipedia DE «Corona Danica»: «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup><a href="#ref12">[12]</a></sup>.'
      en: 'First phase of the Christian IV Müntzformel: introduced by the <b>åbne Brev af 12. Juli 1618</b> (Wilcke II note 53<sup><a href="#ref16">[16]</a></sup>: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I pp. 156–157<sup><a href="#ref16">[16]</a></sup>). In the patent the coin is described as «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» — the later Latin name «Corona Danica» is a numismatic convention, not patent language. All 1618–1624 issues run under the original <b>1½ Speciedaler</b> tariff — a parity that in folk parlance prompted the satirical reread of the royal motto <b>RFP</b> (regna firmat pietas) as <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref5">[5]</a></sup> The official tariff cut to 1⅓ Speciedaler only comes in <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup>, right after the Christian-IV personnel mintage phase ends. Stylistic sub-groups: Corona Danica original strikes 1618–1622 (KM# 57–61, 58a, 59a) and «Dicke» / Open-Crown variants 1624 (KM# 94–99) — all within the same tariff regime. Wikipedia DE «Corona Danica»: «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup><a href="#ref12">[12]</a></sup>.'
      uk: 'Перша фаза монетної формули Кристіана IV: запроваджено <b>åbne Brev af 12. Juli 1618</b> (Wilcke II прим. 53<sup><a href="#ref16">[16]</a></sup>: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I с. 156–157<sup><a href="#ref16">[16]</a></sup>). У патенті монета описана як «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» — пізніша латинська назва «Corona Danica» — нумізматична умовність, не мова патенту. Усі емісії 1618–1624 під оригінальним тарифом <b>1½ Speciedaler</b> — паритет, який у народі породив сатиричне переосмислення королівського девізу <b>RFP</b> (regna firmat pietas) як <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref5">[5]</a></sup> Офіційне зниження тарифу до 1⅓ Speciedaler відбувається лише <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup> — одразу після припинення фази персонального карбування Кристіана IV. Стилістичні підгрупи: оригінальні Corona Danica 1618–1622 (KM# 57–61, 58a, 59a) та варіанти «Dicke» / Open-Crown 1624 (KM# 94–99) — усі в одному тарифному режимі. Wikipedia DE «Corona Danica»: «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup><a href="#ref12">[12]</a></sup>.'

  - id: II
    year_from: 1651
    year_to: 1652
    from_label: '1651'
    to_label: '1652'
    title:
      de: Frederik III. · Fortsetzung der Christian-IV.-Müntzformel · Übergang zum 10½-Krone-Fuß
      en: Frederik III · Christian IV Müntzformel continuation · transition to 10½-Krone-Fuß
      uk: Фредерік III · продовження монетної формули Кристіана IV · перехід до 10½-Krone-Fuß
    description:
      de: 'Zweite Phase der Christian-IV.-Müntzformel: Frederik III. (1648–1670) nimmt die Krone-Prägung 1651 in Kopenhagen wieder auf und folgt zunächst der älteren Müntzformel mit 16,25 g Feinsilber, bevor er 1652 zum neuen 10½-Krone-Fuß (.672 / 14,964 g fein) übergeht. Wikipedia DE «Corona Danica»<sup><a href="#ref12">[12]</a></sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup><a href="#ref9">[9]</a></sup> klassifiziert die gesamte Müntzformel als <b>1618–1652</b>; die feinste Typologie der Übergangsphase 1651–1652 in Aagaard 2004<sup><a href="#ref13">[13]</a></sup> «Frederik III Kronemønt København 1651–1670».'
      en: 'Second phase of the Christian IV Müntzformel: Frederik III (1648–1670) resumes Krone production at Copenhagen in 1651 and at first follows the older formula with 16.25 g fine silver, before transitioning to the new 10½-Krone-Fuß (.672 / 14.964 g fine) in 1652. Wikipedia DE «Corona Danica»<sup><a href="#ref12">[12]</a></sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup><a href="#ref9">[9]</a></sup> classifies the full Müntzformel as <b>1618–1652</b>; the finest typology of the 1651–1652 transition is in Aagaard 2004<sup><a href="#ref13">[13]</a></sup> «Frederik III Kronemønt København 1651–1670».'
      uk: 'Друга фаза монетної формули Кристіана IV: Фредерік III (1648–1670) поновлює карбування Krone у Копенгагені 1651 р. і спочатку йде за старішою формулою з 16,25 г чистого срібла, перш ніж 1652 р. перейти на нову 10½-Krone-Fuß (.672 / 14,964 г чистого). Wikipedia DE «Corona Danica»<sup><a href="#ref12">[12]</a></sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup><a href="#ref9">[9]</a></sup> класифікує повну монетну формулу як <b>1618–1652</b>; найточніша типологія перехідного періоду 1651–1652 — в Aagaard 2004<sup><a href="#ref13">[13]</a></sup> «Frederik III Kronemønt København 1651–1670».'

  - id: III
    year_from: 1665
    year_to: 1675
    from_label: '1665'
    to_label: '1675'
    title:
      de: Sonderemissionen — Pumphosenkrone (1665) und 2-Krone (1675)
      en: Special issues — Pumphosenkrone (1665) and 2-Krone (1675)
      uk: Спец-випуски — Pumphosenkrone (1665) і 2-Krone (1675)
    description:
      de: 'Hede 1957<sup><a href="#ref9">[9]</a></sup> verzeichnet zwei nachträgliche Sonderemissionen, die der Christian-IV.-Müntzformel-Lötigkeit nahekommen, aber Hede explizit als spezielle Schaumünzen wertet, nicht als Formelfortsetzungen:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Krone und ½ Krone Frederiks III. (Schou 39/40), bei höherer Lötigkeit für ein schöneres Karbverfahren;<br>· <b>1675 2-Krone</b> — Doppelkronenprägung Christians V. (Schou 11–15) unter Reskript vom 11. März 1675 über den Münzgewinn.<br>Beide Stücke werden in Hedes Klassifikation als «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» behandelt — also außerhalb des regulären 10½-Krone-Fußes (Grobe Krone).'
      en: 'Hede 1957<sup><a href="#ref9">[9]</a></sup> records two later special issues that approach the Christian IV Müntzformel''s fineness, but which Hede explicitly classifies as specialised Schaumünzen rather than formula continuations:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Frederik III''s Krone and ½ Krone (Schou 39/40), at higher fineness for a more attractive strike;<br>· <b>1675 2-Krone</b> — Christian V''s double-Krone strike (Schou 11–15) under the rescript of 11 March 1675 regarding the mint gain.<br>Both pieces are handled by Hede as «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» — i.e. outside the regular 10½-Krone-Fuß (Grobe Krone).'
      uk: 'Hede 1957<sup><a href="#ref9">[9]</a></sup> фіксує два пізніші спеціальні випуски, які за пробою наближаються до монетної формули Кристіана IV, але Hede явно класифікує їх як спеціальні Schaumünzen, а не продовження формули:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Krone та ½ Krone Фредеріка III (Schou 39/40), за вищою пробою для красивішого карбування;<br>· <b>1675 2-Krone</b> — карбування подвійної Krone Кристіана V (Schou 11–15) за рескриптом 11 березня 1675 про монетний прибуток.<br>Обидва випуски Hede трактує як «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» — тобто поза регулярною 10½-Krone-Fuß (Grobe Krone).'

  # 13-Krone-Fuß («Feine Krone») — Copenhagen-only standard, no
  # Holstein issues. Listed here as a contextual section so the
  # Krone-Mønt family (Christian IVs kroner → 10½-Krone-Fuß →
  # 13-Krone-Fuß) is presented in full on the timeline. Empty phase
  # array is intentional — no Glückstadt or Tönning specimens.
  reichsdukatenfuss:
  - id: pre-I
    year_from: 1546
    year_to: 1588
    from_label: "1546"
    to_label: "1588"
    title:
      de: "Frederik II. · Goldprägung vor der regulären Christian-IV.-Serie"
      en: "Frederik II · gold issues preceding the regular Christian IV series"
      uk: "Фредерік II · золоті випуски до регулярної серії Кристіана IV"
    description:
      de: 'Diese Vor-Christian-IV.-Phase enthält derzeit ein einziges Stück: das <b>10 Ducat 1588 Frederik II.</b> (Gold, 39,45 g rauh, Ø 51 mm; ucoin <i>UC# 10</i> — kein Krause-KM, kein Hede-Eintrag in der Frederik-II.-Reihe)<sup><a href="#ref24">[24]</a></sup>. Das Jahr fällt mit dem Tod Frederiks II. am 4. April 1588 zusammen<sup><a href="#ref25">[25]</a></sup>, was eine Trauer- oder Gedenkprägung nahelegt; eine direkte Quellenattestierung dieser Zuordnung steht jedoch noch aus.<br><br>Die regulären Goldstücke der frühen Augsburger Reichsmünzordnung-Ära<sup><a href="#ref21">[21]</a></sup> — Hede 1971 c3h1/c3h2 (Christian III. Ungersk Gylden 1557, 3,49 g @ .986) und f2h1/f2h4 (Frederik II. Dukat 1563/1564 @ .986) — sind in Hede dokumentiert, liegen aber außerhalb der Projekt-Untergrenze 1566 und sind hier nicht aufgenommen. Begleitende Hede-Goldeinträge an niedrigeren Standards (Guldkrone @ .934 — c3h17/c3h18, f2h2/f2h5; Rhinsk Gylden @ .77 — f2h3/f2h6) gehören metrisch nicht zur Reichsdukatenfuß-Familie und würden — falls aufgenommen — eigene Müntzfuß-Karten erfordern.'
      en: 'This pre-Christian-IV phase currently holds a single piece: the <b>10 Ducat 1588 Frederik II</b> (gold, 39.45 g raw, 51 mm Ø; ucoin <i>UC# 10</i> — no Krause KM, no Hede entry in the Frederik II run)<sup><a href="#ref24">[24]</a></sup>. The year coincides with Frederik II''s death on 4 April 1588<sup><a href="#ref25">[25]</a></sup>, which suggests a mourning or commemorative strike; a direct source attestation for that attribution is still outstanding.<br><br>The regular gold pieces of the early Augsburg Reichsmünzordnung era<sup><a href="#ref21">[21]</a></sup> — Hede 1971 c3h1/c3h2 (Christian III Ungersk Gylden 1557, 3.49 g @ .986) and f2h1/f2h4 (Frederik II Dukat 1563/1564 @ .986) — are recorded in Hede but sit outside the project''s 1566 lower bound and are not included here. Hede gold entries at lower standards in the same span (Guldkrone @ .934 — c3h17/c3h18, f2h2/f2h5; Rhinsk Gylden @ .77 — f2h3/f2h6) do not belong metrically to the Reichsdukatenfuß family and would require their own Müntzfuß cards if added.'
      uk: 'Ця фаза до Кристіана IV наразі містить один екземпляр: <b>10 Ducat 1588 Фредерік II</b> (золото, 39,45 г повної ваги, Ø 51 мм; ucoin <i>UC# 10</i> — без Krause KM, без Hede-запису в серії Фредеріка II)<sup><a href="#ref24">[24]</a></sup>. Рік збігається зі смертю Фредеріка II 4 квітня 1588<sup><a href="#ref25">[25]</a></sup>, що дає підставу припускати траурно/меморіальну емісію; пряме джерельне підтвердження цієї атрибуції наразі відсутнє.<br><br>Регулярні золоті випуски ранньої доби Augsburger Reichsmünzordnung<sup><a href="#ref21">[21]</a></sup> — Hede 1971 c3h1/c3h2 (Христіан III Ungersk Gylden 1557, 3,49 г @ .986) і f2h1/f2h4 (Фредерік II Dukat 1563/1564 @ .986) — є в Hede, але лежать поза нижньою межею проекту 1566 і сюди не включені. Супутні золоті записи Hede за нижчими стандартами того ж періоду (Guldkrone @ .934 — c3h17/c3h18, f2h2/f2h5; Rhinsk Gylden @ .77 — f2h3/f2h6) метрично не належать до родини Reichsdukatenfuß і потребували б окремих Müntzfuß-карток у разі включення.'
  - id: I
    year_from: 1591
    year_to: 1726
    from_label: "1591 (Haderslev)"
    to_label: "1726"
    title:
      de: "Christian IVs frühe Goldprägung (Haderslev 1591–1599) → Kopenhagen / Glückstadt / Tönning (1600–1726)"
      en: "Christian IV's early gold (Haderslev 1591–1599) → Copenhagen / Glückstadt / Tönning (1600–1726)"
      uk: "Раннє золото Христіяна IV (Haderslev 1591–1599) → Копенгаген / Glückstadt / Tönning (1600–1726)"
    mt_caption:
      de: "Dukat-Prägung nach Reichsdukatenfuß (.986) · zunächst Christian-IV.-Prägungen Haderslev (Portugaloser, Goldgulden 1591–1593) · dann Kopenhagen, Glückstadt (Chr. IV. / Chr. V.) und Tönning (Chr. Albrecht / Fr. IV. / Karl Fr.) · sortiert nach Jahr"
      en: "Ducat issues to the Reichsdukatenfuß (.986) · initially Christian IV's Haderslev issues (Portugaloser, Goldgulden 1591–1593) · then Copenhagen, Glückstadt (Christian IV / Christian V) and Tönning (Christian Albrecht / Frederik IV / Karl Friedrich) · sorted by year"
