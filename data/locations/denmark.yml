id: denmark
name:
  de: Königreich Dänemark (Kopenhagen)
  en: Kingdom of Denmark (Copenhagen)
  uk: Королівство Данія (Копенгаген)
summary:
  de: 'Müntzwesen des Königreichs Dänemark — Prägungen der Kopenhagener Münzstätte, die einen in diesem Projekt dokumentierten Müntzfuß verwenden. <em>Aktuell ca. 46 Stücke, alle aus dem Schleswig-Holstein-Artefakt ausgegliedert (zwei Wellen: Christian-IV.-Kronemønt 1618–1624, sowie weitere königlich-dänische Stücke 1611–1749, die ursprünglich beim ucoin-Import irrtümlich «Glückstadt» erhielten). Die vollständige königlich-dänische Münzgeschichte ist nicht Gegenstand dieses Projekts — hier finden sich nur Stücke, die als Referenz für die in Holstein geltenden Standards dienen.</em>'
  en: "Coinage of the Kingdom of Denmark — Copenhagen-mint issues that follow a Münzfuß documented in this project. <em>Currently ~46 pieces, all moved out of the Schleswig-Holstein artefact (two waves: Christian IV's Kronemønt 1618–1624, plus further Royal Danish pieces 1611–1749 that had been wrongly tagged «Glückstadt» during the ucoin import). The full Royal Danish coin history is out of scope for this project; only pieces that serve as reference for standards in force in Holstein are kept here.</em>"
  uk: 'Монетна справа Королівства Данія — карбування Копенгагенського монетного двору, які слідують одному зі задокументованих у цьому проєкті стандартів. <em>Наразі ≈46 монет, усі винесено зі Schleswig-Holstein-артефакту (дві хвилі: Kronemønt Кристіана IV 1618–1624, плюс інші королівсько-данські монети 1611–1749, які при ucoin-імпорті помилково отримали ярлик «Glückstadt»). Повна королівсько-данська монетна історія в проєкті не охоплена — тут зберігаються лише монети, які служать референсом до стандартів, чинних у Гольштейні.</em>'
fuss_order:
  - 9_thaler
  - 9_25_thaler
  - kronemont
  - reichsdukatenfuss
  - kronemont_chr_iv
  - guldkrone
  - seed_unsorted

# ---------------------------------------------------------------------
# Timeline overview — chronological span of every Danish-relevant Müntzfuß
# from the Augsburg Imperial Coinage Ordinance (19 Aug. 1559) to the
# Krone reform (1873–1875). Excluded: 30-Thaler-Fuß (Vereinsthaler)
# and Reichsgoldmünzfuß (Goldmark) — both post-1866 German-Reich
# standards that did not apply in the Danish realm.
#
# `scope_mode: denmark_only` suppresses every holstein-scope layer; on
# this page Holstein is not a separate sub-track. Each bar's anywhere-
# scope range is taken from `data/shared/fuesse.yml` events as-is —
# no per-bar truncation, since the Danish realm continued every Danish
# stope to its full historical end (Statsbankerot 1813 / Krone-reform
# 1875).
# ---------------------------------------------------------------------
timeline:
  title:
    de: "Zeitliche Überlappung der Müntzfüße im Königreich Dänemark · 1559–1875"
    en: "Overlapping currency standards in the Kingdom of Denmark · 1559–1875"
    uk: "Хронологія монетних стандартів Королівства Данія · 1559–1875"
  year_from: 1559
  year_to: 1875
  axis_step: 50
  scope_mode: denmark_only
