      de: 1 Kroneskilling — Subeinheit der Corona Danica im offiziellen Tarif 1 Krone = 96 Kroneskilling<sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup>. Empirisches Feinsilber 0,33 g ist ca. 2× höher als der Krone-Müntzfuß (16,250÷96 = 0,17 g) prophezeien würde — typisch für Kleinmünzen, die mehr Silber pro Tarif tragen als die übergeordnete Tarifmünze.
