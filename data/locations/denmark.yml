      bar_title:
        de: "Christian-IV.-Vorgängerphase 1618 → mindestens 1628 (Doppelguldkrone Hede 28; Esrum-Schatzfund Ingvardson & Märcher 2010 dokumentiert drei Stücke aus 1628) — keine Massenkarbung, sondern Hofgeschenk und Soldzahlung · Frederik-III.-Hauptphase 1655 (erste Karbung Kopenhagen) → 14. Februar 1671 (Commerce-Collegium-Empfehlung beendet die reguläre Prägung) · Hede 1957 «Frederik III's guldkroner»: «<i>møntet i København 1655 og i Glückstadt 1657, 1659 og 1660</i>» · Glückstadt-Phase 1657–1660 (Hede 145B, Mzm. Jacob Schwieger); Kopenhagen-Folgeprägung 1666, 1668 (jüngere Müntzformel 5,590 g rau / 5,126 g fein = 1½ Speciesdukat nach Forordning 2. Januar 1658) · unter Christian V. nicht fortgeführt; königliche Sondergenehmigung 2. September 1701 für das Vestindiske Compagni — keine erhaltenen Exemplare · Restbestände gegen Ende des Jahrhunderts faktisch außer Umlauf"
        en: "Christian IV predecessor phase 1618 → at least 1628 (double Guldkrone Hede 28; Esrum hoard, Ingvardson & Märcher 2010, documents three 1628 specimens) — not mass production but court gifts and mercenary pay · Frederik III main phase 1655 (first Copenhagen issue) → 14 February 1671 (Commerce Collegium recommendation ends regular mintage) · Hede 1957 «Frederik III's guldkroner»: «<i>møntet i København 1655 og i Glückstadt 1657, 1659 og 1660</i>» · Glückstadt phase 1657–1660 (Hede 145B, mintmaster Jacob Schwieger); Copenhagen follow-up issues 1666, 1668 (younger Müntzformel 5.590 g rough / 5.126 g fine = 1½ Speciesdukat after the Forordning of 2 January 1658) · not continued under Christian V; royal special authorisation of 2 September 1701 for the Vestindiske Compagni — no surviving specimens · remaining pieces effectively out of circulation by the end of the century"
        uk: "Передфаза Кристіана IV 1618 → щонайменше 1628 р. (подвійна Guldkrone Hede 28; Esrum-скарб Ingvardson & Märcher 2010 фіксує три екземпляри 1628 р.) — не масове карбування, а придворний подарунок та плата найманцям · Головна фаза Фредеріка III 1655 (перше копенгагенське карбування) → 14 лютого 1671 (рекомендація Commerce Collegium припиняє регулярне карбування) · Hede 1957 «Frederik III's guldkroner»: «<i>møntet i København 1655 og i Glückstadt 1657, 1659 og 1660</i>» · ґлюкштадтська фаза 1657–1660 (Hede 145B, монетмайстер Jacob Schwieger); копенгагенські наступні випуски 1666, 1668 (новіша монетна формула 5,590 г повної ваги / 5,126 г чистого = 1½ Speciesdukat за Forordning 2 січня 1658) · за Кристіана V не продовжено; королівський особливий дозвіл 2 вересня 1701 р. для Vestindiske Compagni — реальних екземплярів не виявлено · залишки фактично виходять з обігу до кінця століття"
      color_class: g

