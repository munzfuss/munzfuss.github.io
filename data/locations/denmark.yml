        - "KM-DK# 183"
    metal: silver
    fineness: 0.860
    weight_rough_g: 37.82
    diameter_mm: 40.4
    note:
      de: |-
        2 Kroner Friedrichs III. (1651) — frühe Krone-Emission, <b>Vorläufer der Pumphosekrone (1665)</b>. Im kronemont-Fuß einsortiert (Standardprobe .672, in Holstein 1644–1696 gültig); die ucoin-Probe .860 ist deutlich höher als die kronemont-Norm — möglicherweise transitionaler Typ mit eigener Norm zwischen Christian IVs Krone-Programm (1644+) und der Pumphosekrone-Reform 1665, oder ucoin-Datenfehler. Δ wird gegenüber dem kronemont-Standard sichtbar überhöht. Mzm. nicht eindeutig — vorerst als Glückstadt eingetragen. <b>KM-DK# 183</b>; in Numista nicht katalogisiert.
      en: |-
        2 Kroner of Frederik III (1651) — early Krone issue, <b>predecessor to the Pumphosekrone (1665)</b>. Filed under the kronemont fuss (standard fineness .672, valid in Holstein 1644–1696); the ucoin fineness .860 sits well above the kronemont norm — likely a transitional type with its own standard between Christian IV's Krone programme (1644+) and the Pumphosekrone reform of 1665, or a ucoin data error. Δ will read visibly high against the kronemont standard. Mint not unambiguous — provisionally entered as Glückstadt. <b>KM-DK# 183</b>; not catalogued by Numista.
      uk: |-
        2 Kroner Фредеріка III (1651) — рання Krone-емісія, <b>попередник Pumphosekrone (1665)</b>. Внесено в fuss kronemont (стандартна проба .672, у Гольштейні чинний 1644–1696); проба ucoin .860 значно вища за норму kronemont — імовірно транзиційний тип із власним стандартом між Krone-програмою Кристіана IV (1644+) і реформою Pumphosekrone 1665, або помилка даних ucoin. Δ буде помітно завищеним проти стандарту kronemont. Монетний двір неоднозначний — попередньо внесено як Глюкштадт. <b>KM-DK# 183</b>; у Numista не каталогізовано.
    sources:
