        2 Speciedaler of Christian IV (Glückstadt 1624–1634) — <b>successor special type to km-16 (1623)</b> with reduced fineness .875 (vs. nominal 9¼-Fuß standard .888). Visually distinct from km-16 per sources (own reverse/obverse composition). Not recorded in the Schleswig-Holstein KM register, only as <b>KM-DK# 104</b> in the Royal Danish register. ucoin entry tid 99114; not catalogued directly by Numista (N#468489 covers only the 1623 km-16 variant).
      uk: |-
        2 Speciedaler Кристіана IV (Glückstadt 1624–1634) — <b>наступний спеціальний тип до km-16 (1623)</b> зі зниженою пробою .875 (vs. номінальний 9¼-Fuß-стандарт .888). Візуально відрізняється від km-16 за джерелами (своя композиція реверсу/аверсу). У шлезвіг-гольштинському KM-реєстрі не зафіксовано, лише як <b>KM-DK# 104</b> у данському Royal-реєстрі. ucoin запис tid 99114; у Numista окремо не каталогізовано (N#468489 покриває лише варіант 1623 km-16).
