phases:
  kronemont_chr_iv:
    - id: A
      year_from: 1618
      year_to: 1624
      from_label: '1618'
      to_label: '1624'
      title:
        de: Christian IV. · Corona Danica · Tarif 1½ Speciedaler
        en: Christian IV · Corona Danica · tariff 1½ Speciedaler
        uk: Кристіан IV · Corona Danica · тариф 1½ Specie
      description:
        de: 'Erste Phase der Christian-IV.-Müntzformel: eingeführt durch das <b>åbne Brev af 12. Juli 1618</b> (Wilcke II Anm. 53<sup><a href="#ref16">[16]</a></sup>: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I S. 156–157<sup><a href="#ref16">[16]</a></sup>). Im Patent wird die Münze als «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» beschrieben — der spätere Latin-Name «Corona Danica» ist Numismatik-Usus, nicht Patent-Sprache. Alle Prägungen 1618–1624 laufen unter dem ursprünglichen Tarif <b>1½ Speciedaler</b> — eine Wertigkeit, die im Volksmund die satirische Umdeutung des königlichen Wahlspruches <b>RFP</b> (regna firmat pietas) als <b>R(iget) F(attes) P(enge)</b> hervorrief.<sup><a href="#ref5">[5]</a></sup> Die offizielle Tarifsenkung auf 1⅓ Speciedaler erfolgt erst <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup>, unmittelbar nach Einstellung der Karbverfahrensphase. Stilistische Untergruppen: Corona-Danica-Originalprägungen 1618–1622 (KM# 57–61, 58a, 59a) und «Dicke» / Open-Crown-Varianten 1624 (KM# 94–99) — alle innerhalb desselben Tarifregimes. Wikipedia DE «Corona Danica»: «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup><a href="#ref12">[12]</a></sup>.'
        en: 'First phase of the Christian IV Müntzformel: introduced by the <b>åbne Brev af 12. Juli 1618</b> (Wilcke II note 53<sup><a href="#ref16">[16]</a></sup>: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I pp. 156–157<sup><a href="#ref16">[16]</a></sup>). In the patent the coin is described as «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» — the later Latin name «Corona Danica» is a numismatic convention, not patent language. All 1618–1624 issues run under the original <b>1½ Speciedaler</b> tariff — a parity that in folk parlance prompted the satirical reread of the royal motto <b>RFP</b> (regna firmat pietas) as <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref5">[5]</a></sup> The official tariff cut to 1⅓ Speciedaler only comes in <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup>, right after the Christian-IV personnel mintage phase ends. Stylistic sub-groups: Corona Danica original strikes 1618–1622 (KM# 57–61, 58a, 59a) and «Dicke» / Open-Crown variants 1624 (KM# 94–99) — all within the same tariff regime. Wikipedia DE «Corona Danica»: «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup><a href="#ref12">[12]</a></sup>.'
        uk: 'Перша фаза монетної формули Кристіана IV: запроваджено <b>åbne Brev af 12. Juli 1618</b> (Wilcke II прим. 53<sup><a href="#ref16">[16]</a></sup>: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I с. 156–157<sup><a href="#ref16">[16]</a></sup>). У патенті монета описана як «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» — пізніша латинська назва «Corona Danica» — нумізматична умовність, не мова патенту. Усі емісії 1618–1624 під оригінальним тарифом <b>1½ Speciedaler</b> — паритет, який у народі породив сатиричне переосмислення королівського девізу <b>RFP</b> (regna firmat pietas) як <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref5">[5]</a></sup> Офіційне зниження тарифу до 1⅓ Speciedaler відбувається лише <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup> — одразу після припинення фази персонального карбування Кристіана IV. Стилістичні підгрупи: оригінальні Corona Danica 1618–1622 (KM# 57–61, 58a, 59a) та варіанти «Dicke» / Open-Crown 1624 (KM# 94–99) — усі в одному тарифному режимі. Wikipedia DE «Corona Danica»: «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>»<sup><a href="#ref12">[12]</a></sup>.'

    - id: B
      year_from: 1651
      year_to: 1652
      from_label: '1651'
      to_label: '1652'
      title:
        de: Frederik III. · Fortsetzung der Christian-IV.-Müntzformel · Übergang zum 10½-Krone-Fuß
        en: Frederik III · Christian IV Müntzformel continuation · transition to 10½-Krone-Fuß
        uk: Фредерік III · продовження монетної формули Кристіана IV · перехід до 10½-Krone-Fuß
      description:
        de: 'Zweite Phase der Christian-IV.-Müntzformel: Frederik III. (1648–1670) nimmt die Krone-Prägung 1651 in Kopenhagen wieder auf und folgt zunächst der älteren Müntzformel mit 16,25 g Feinsilber, bevor er 1652 zum neuen 10½-Krone-Fuß (.672 / 14,964 g fein) übergeht. Wikipedia DE «Corona Danica»<sup><a href="#ref12">[12]</a></sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup><a href="#ref9">[9]</a></sup> klassifiziert die gesamte Müntzformel als <b>1618–1652</b>; die feinste Typologie der Übergangsphase 1651–1652 in Aagaard 2004<sup><a href="#ref13">[13]</a></sup> «Frederik III Kronemønt København 1651–1670».'
        en: 'Second phase of the Christian IV Müntzformel: Frederik III (1648–1670) resumes Krone production at Copenhagen in 1651 and at first follows the older formula with 16.25 g fine silver, before transitioning to the new 10½-Krone-Fuß (.672 / 14.964 g fine) in 1652. Wikipedia DE «Corona Danica»<sup><a href="#ref12">[12]</a></sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup><a href="#ref9">[9]</a></sup> classifies the full Müntzformel as <b>1618–1652</b>; the finest typology of the 1651–1652 transition is in Aagaard 2004<sup><a href="#ref13">[13]</a></sup> «Frederik III Kronemønt København 1651–1670».'
        uk: 'Друга фаза монетної формули Кристіана IV: Фредерік III (1648–1670) поновлює карбування Krone у Копенгагені 1651 р. і спочатку йде за старішою формулою з 16,25 г чистого срібла, перш ніж 1652 р. перейти на нову 10½-Krone-Fuß (.672 / 14,964 г чистого). Wikipedia DE «Corona Danica»<sup><a href="#ref12">[12]</a></sup>: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Hede 1957<sup><a href="#ref9">[9]</a></sup> класифікує повну монетну формулу як <b>1618–1652</b>; найточніша типологія перехідного періоду 1651–1652 — в Aagaard 2004<sup><a href="#ref13">[13]</a></sup> «Frederik III Kronemønt København 1651–1670».'

    - id: C
      year_from: 1665
      year_to: 1675
      from_label: '1665'
      to_label: '1675'
      title:
        de: Sonderemissionen — Pumphosenkrone (1665) und 2-Krone (1675)
        en: Special issues — Pumphosenkrone (1665) and 2-Krone (1675)
        uk: Спец-випуски — Pumphosenkrone (1665) і 2-Krone (1675)
      description:
        de: 'Hede 1957<sup><a href="#ref9">[9]</a></sup> verzeichnet zwei nachträgliche Sonderemissionen, die der Christian-IV.-Müntzformel-Lötigkeit nahekommen, aber Hede explizit als spezielle Schaumünzen wertet, nicht als Formelfortsetzungen:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Krone und ½ Krone Frederiks III. (Schou 39/40), bei höherer Lötigkeit für ein schöneres Karbverfahren;<br>· <b>1675 2-Krone</b> — Doppelkronenprägung Christians V. (Schou 11–15) unter Reskript vom 11. März 1675 über den Münzgewinn.<br>Beide Stücke werden in Hedes Klassifikation als «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» behandelt — also außerhalb des regulären 10½-Krone-Fußes (Grobe Krone).'
        en: 'Hede 1957<sup><a href="#ref9">[9]</a></sup> records two later special issues that approach the Christian IV Müntzformel''s fineness, but which Hede explicitly classifies as specialised Schaumünzen rather than formula continuations:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Frederik III''s Krone and ½ Krone (Schou 39/40), at higher fineness for a more attractive strike;<br>· <b>1675 2-Krone</b> — Christian V''s double-Krone strike (Schou 11–15) under the rescript of 11 March 1675 regarding the mint gain.<br>Both pieces are handled by Hede as «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» — i.e. outside the regular 10½-Krone-Fuß (Grobe Krone).'
        uk: 'Hede 1957<sup><a href="#ref9">[9]</a></sup> фіксує два пізніші спеціальні випуски, які за пробою наближаються до монетної формули Кристіана IV, але Hede явно класифікує їх як спеціальні Schaumünzen, а не продовження формули:<br>· <b>1665 «Pumphosenkrone» / «Pumpbucksen Thaler»</b> — Krone та ½ Krone Фредеріка III (Schou 39/40), за вищою пробою для красивішого карбування;<br>· <b>1675 2-Krone</b> — карбування подвійної Krone Кристіана V (Schou 11–15) за рескриптом 11 березня 1675 про монетний прибуток.<br>Обидва випуски Hede трактує як «<i>specielle udgaver med finere sølv for at få en smukkere mønt</i>» — тобто поза регулярною 10½-Krone-Fuß (Grobe Krone).'

  # 13-Krone-Fuß («Feine Krone») — Copenhagen-only standard, no
  # Holstein issues. Listed here as a contextual section so the
  # Krone-Mønt family (Christian IVs kroner → 10½-Krone-Fuß →
  # 13-Krone-Fuß) is presented in full on the timeline. Empty phase
  # array is intentional — no Glückstadt or Tönning specimens.
  reichsdukatenfuss:
    - id: A
      year_from: 1591
      year_to: 1726
      from_label: "1591 (Haderslev)"
      to_label: "1726"
      title:
        de: "Christian IVs frühe Goldprägung (Haderslev 1591–1599) → Kopenhagen / Glückstadt / Tönning (1600–1726)"
        en: "Christian IV's early gold (Haderslev 1591–1599) → Copenhagen / Glückstadt / Tönning (1600–1726)"
        uk: "Раннє золото Христіяна IV (Haderslev 1591–1599) → Копенгаген / Glückstadt / Tönning (1600–1726)"
      mt_caption:
        de: "Dukat-Prägung nach Reichsdukatenfuß (.986) · zunächst Christian-IV.-Prägungen Haderslev (Portugaloser, Goldgulden 1591–1593) · dann Kopenhagen, Glückstadt (Chr. IV. / Chr. V.) und Tönning (Chr. Albrecht / Fr. IV. / Karl Fr.) · sortiert nach Jahr"
        en: "Ducat issues to the Reichsdukatenfuß (.986) · initially Christian IV's Haderslev issues (Portugaloser, Goldgulden 1591–1593) · then Copenhagen, Glückstadt (Christian IV / Christian V) and Tönning (Christian Albrecht / Frederik IV / Karl Friedrich) · sorted by year"
        uk: "Карбування дукатів за Reichsdukatenfuß (.986) · спочатку Гадерслевські емісії Христіяна IV (Portugaloser, Goldgulden 1591–1593) · далі Копенгаген, Glückstadt (Христіян IV / Христіян V) і Tönning (Христіян Альбрехт / Фредерік IV / Карл Фрідріх) · впорядковано за роком"

    - id: B
      year_from: 1726
      year_to: 1771
      from_label: "1726"
      to_label: "1771"
      title:
        de: "Courantdukat-Fuß durch Courantverbund"
        en: "Courantdukat standard via the Courant union"
        uk: "Стопа Courantdukat через Courant-союз"
      context:
        de: "Mit dem Kurantmøntfod von 1726 entwickelt sich parallel zum Reichsdukatenfuß der <b>Courantdukat</b> — Dukat mit leichter Feingewichtsreduktion zur festen Kurs-Anbindung (2 Rigsdaler Courant = 1 Courantdukat, später 2½ Rigsdaler Courant). Altona-Münze wird erst 1771 eröffnet; Dukaten in dieser Phase werden in Kopenhagen bzw. Glückstadt für den gesamtstaatlichen Handel geprägt."
        en: "With the Kurantmøntfod of 1726 a <b>Courantdukat</b> grows up alongside the Reichsdukatenfuß — a ducat with slightly reduced fine weight, designed for a fixed exchange link (2 Rigsdaler Courant = 1 Courantdukat, later 2½ Rigsdaler Courant). The Altona mint is only opened in 1771; the ducats of this phase are struck in Copenhagen and Glückstadt for the trade of the composite state."
        uk: "З Kurantmøntfod 1726 паралельно до Reichsdukatenfuß виростає <b>Courantdukat</b> — дукат із трохи зниженою чистою вагою, призначений для фіксованої курсової привʼязки (2 Rigsdaler Courant = 1 Courantdukat, пізніше 2½ Rigsdaler Courant). Монетний двір в Альтоні відкриють лише 1771; дукати цієї фази карбують у Копенгагені й Glückstadt для торгівлі цілісної держави."

  9_thaler:
    - id: A
      year_from: 1566
      year_to: 1625
      from_label: "30. Mai 1566"
      to_label: "1625"
      title:
        de: "Reichsmünzordnung in Holstein-Gottorp"
        en: "Imperial Mint Decree in Holstein-Gottorp"
        uk: "Імперський монетний ордонанс у Гольштейн-Ґотторпі"
      description:
        de: "Holsteinische Reichsthaler-Prägungen unter Adolf I., Johann Adolf, frühem Friedrich III. und Hans Jr. von Sonderburg — Kipper-Wipper-Krise (1620–1623), ab 1622 parallel vom leichteren 9¼-Fuß abgelöst, letzte Holstein-Prägung 1625."
        en: "Holstein Reichsthaler issues under Adolf I, Johann Adolf, early Friedrich III and Hans Jr. of Sonderburg — Kipper-Wipper crisis (1620–1623), superseded in parallel by the lighter 9¼-Fuß from 1622, last Holstein strike 1625."
        uk: "Гольштинські карбування Reichsthaler за Адольфа I, Йоганна Адольфа, раннього Фредеріка III та Hans Jr. Sonderburg — Kipper-Wipper-криза (1620–1623); з 1622 паралельно витісняється легшим 9¼-Fuß; останнє карбування в Гольштейні — 1625."
      context:
        de: |
          <b>Reichsstandard biß 1625:</b> Reichsthaler 9-Fuß (.889/14²⁄₉ Loth, 25,984 g fein), Mark-lübisch-Theilstücke (½, ¼, ⅛ Thaler), Schillinge (1/32, 1/48 Thaler), Pfennig-Scheidemünzen (1/96, 1/128 Thaler).<br>
          <b>Münzstätten:</b> in Holstein-Gottorp vor allem Schleswig und Husum. Nach dem Kipper-Wipper-Zusammenbruch (~1620) verlieren die Reichsstände das einheitliche Münzwesen — ab 1622 setzt sich in Holstein der leichtere 9¼-Fuß (Thaler Species, 25,28173 g fein gegen 25,984 g im 9-Fuß) durch, die letzte holsteinische 9-Fuß-Prägung erfolgt 1625 (Hans Jr. Sonderburg, 2 Schilling Lübisch).<br>
          <b>Außerhalb Holsteins lebt der 9-Fuß weiter:</b> Hamburg behält ihn als <i>Bank-Mark</i> der Hamburger Bank, Lübeck als <i>Speciemark</i> — beide biß 1875.
        en: |-
          <b>Imperial standard until 1625:</b> Reichsthaler at 9-Fuß (.889/14²⁄₉ Loth, 25.984 g fine), Mark-lübisch sub-units (½, ¼, ⅛ Thaler), Schilling pieces (1/32, 1/48 Thaler), Pfennig petty coins (1/96, 1/128 Thaler).<br> <b>Mints:</b> in Holstein-Gottorp mainly Schleswig and Husum. After the Kipper-Wipper collapse (~1620) the imperial estates lose unified coinage; from 1622 the lighter 9¼-Fuß (Thaler Species, 25.28173 g fine vs. 25.984 g in the 9-Fuß) takes over in Holstein, with the last 9-Fuß strike falling in 1625 (Hans Jr. of Sonderburg, 2 Schilling Lübisch).<br> <b>Beyond Holstein the 9-Fuß lived on:</b> Hamburg kept it as the <i>Bank-Mark</i> of the Hamburger Bank, Lübeck as the <i>Speciemark</i> — both until 1875.
        uk: |-
          <b>Імперський стандарт до 1625:</b> Reichsthaler у 9-Fuß (.889/14²⁄₉ Loth, 25,984 г чистого), частки Mark lübisch (½, ¼, ⅛ Thaler), Schilling-монети (1/32, 1/48 Thaler), Pfennig-розмінні монети (1/96, 1/128 Thaler).<br> <b>Монетні двори:</b> в Гольштейн-Ґотторпі переважно Шлезвіг і Гузум. Після колапсу Kipper-Wipper (~1620) імперські стани втрачають єдину монетну систему; з 1622 у Гольштейні утверджується легший 9¼-Fuß (Thaler Species, 25,28173 г чистого проти 25,984 г у 9-Fuß), а останнє 9-Fuß-карбування припадає на 1625 р. (Hans Jr. Sonderburg, 2 Schilling Lübisch).<br> <b>Поза Гольштейном 9-Fuß продовжує існувати:</b> Гамбург тримає його як <i>Bank-Mark</i> Гамбурзького банку, Любек — як <i>Speciemark</i>; обидва до 1875 р.

  9_25_thaler:
    - id: A
      year_from: 1622
      year_to: 1726
      from_label: "1622"
      to_label: "15. Juli 1726"
      title:
        de: "Etablierung unter dänischer und gottorpischer Herrschaft"
        en: "Establishment under Danish and Gottorp rule"
        uk: "Становлення під данським і ґотторпським правлінням"
      description:
        de: "Holstein zweigetheilt: Königsl. dänischer Antheil (Glückstadt, Pinneberg, Rantzau) und Gottorpischer Antheil (Tönning, Schleswig, Kiel) · keine einheitliche Münzstruktur · Aufgeld zwischen Species und Umlaufmünzen üblich."
        en: "Holstein divided in two: the royal Danish part (Glückstadt, Pinneberg, Rantzau) and the Gottorp part (Tönning, Schleswig, Kiel) · no unified coinage structure · a premium between Species and circulating coins is the norm."
        uk: "Гольштейн розділений на дві частини: королівська данська частина (Glückstadt, Pinneberg, Rantzau) і ґотторпська частина (Tönning, Schleswig, Kiel) · єдиної монетної структури немає · надбавка (Aufgeld) між Species і обіговими монетами — звична практика."
      context:
        de: |
          <b>Dominierende Großsilbermünze:</b> Thaler Species im 9¼-Fuß, nach dänischer Tradition etabliert; daneben lübisch geprägte Schilling-Scheidemünzen. <b>Zeitgenössische Nomenklatur:</b> auf den Münzen «SPECIES» oder Mark-Danske-Denomination; in Auktionskatalogen auch «Speciedaler».<br>
          <b>Hauptumlauf in Holstein:</b> Neben heimischen Prägungen zirkulieren lübische, hamburgische und norddeutsche Thaler Species; niederländische Patagonen/Albertusthaler; schwedische 4-Mark-Stücke; spanische Piaster — der Handel akzeptiert jede Species nach Silbergehalt.<br>
          <b>Parallel zur Thaler-Species-Prägung: die Kronemønt-Kategorie (1618 → 1696).</b> Siehe eigene Sektion <i>10½-Krone-Fuß · Kronemønt-Tarifmünze</i> unten, wo die Tarifhistorie 1½ → 1⅓ → ⅔ Speciedaler und die Prägetabelle 1644–1696 detailliert dokumentiert sind.
        en: |-
          <b>Dominant large silver coin:</b> the Thaler Species in the 9¼-Fuß, established by Danish tradition; alongside it, Schilling petty coinage in Lübeck reckoning. <b>Contemporary nomenclature:</b> on the coins themselves «SPECIES» or a Mark-Danske denomination; auction catalogues often use «Speciedaler».<br> <b>Main circulation in Holstein:</b> besides domestic issues, Lübeck, Hamburg and North-German Thaler Species circulate; Dutch Patagonen/Albertusthaler; Swedish 4-Mark pieces; Spanish piastres — trade accepts every Species by silver content.<br> <b>In parallel with the Thaler Species issues — the Kronemønt category (1618 → 1696).</b> See the dedicated section <i>10½-Krone-Fuß · Kronemønt tariff coin</i> below, which documents the tariff history 1½ → 1⅓ → ⅔ Speciedaler and the strike table 1644–1696 in detail.
        uk: |-
          <b>Домінантна велика срібна монета:</b> Thaler Species у 9¼-Fuß, закріплений данською традицією; поруч — Schilling-розмінна монета у любецькому рахунку. <b>Сучасна термінологія:</b> на самих монетах «SPECIES» або номінал у Mark-Danske; аукціонні каталоги вживають також «Speciedaler».<br> <b>Основний обіг у Гольштейні:</b> крім місцевих карбувань, обертають любецькі, гамбурзькі й північнонімецькі Thaler Species; нідерландські Patagonen/Albertusthaler; шведські 4-Mark; іспанські піастри — торгівля приймає кожен Species за вмістом срібла.<br> <b>Паралельно з карбуванням Thaler Species — категорія Kronemønt (1618 → 1696).</b> Див. окрему секцію <i>10½-Krone-Fuß · тарифна монета Kronemønt</i> нижче, де докладно задокументовано історію тарифу 1½ → 1⅓ → ⅔ Speciedaler і таблицю карбувань 1644–1696.
      mt_caption:
        de: "Münzstätte Tönning · Gottorpisches Holstein · 1689–1726 · Scheidemünzen mit lübischer Nominalangabe (im 9¼-Fuß-System) + Thaler Species und Dukaten (aus Bruun Coll. Stack's Bowers Auktion Zürich 14.–15. März 2025)"
        en: "Tönning mint · Gottorp Holstein · 1689–1726 · petty coins denominated in Lübeck reckoning (within the 9¼-Fuß system) plus Thaler Species and ducats (from the Bruun Coll., Stack's Bowers auction, Zurich 14–15 March 2025)"
        uk: "Монетний двір Tönning · ґотторпський Гольштейн · 1689–1726 · розмінна монета з номіналом у любецькому рахунку (в межах системи 9¼-Fuß) плюс Thaler Species і дукати (з колекції Bruun, аукціон Stack's Bowers, Цюрих 14–15 березня 2025)"

  kronemont:
    - id: A
      year_from: 1644
      year_to: 1669
      from_label: '1644'
      to_label: '1669'
      title:
        de: 10½-Krone-Fuß · Hebræermønt und Frederik-III.-Glückstadt-Serie
        en: 10½-Krone-Fuß · Hebræermønt and Frederik III Glückstadt series
        uk: 10½-Krone-Fuß · Hebræermønt та серія Frederik III Glückstadt
      description:
        de: 'Nach dem 19-jährigen Stillstand 1625–1643 (siehe <i>Christian IVs kroner</i> oben) kehrt die Krone-Mønt 1644 im <b>10½-Krone-Fuß</b> («<i>Grobe Krone</i>») zurück: <b>10½ Krone je rauer Marck</b> von 10¾ Loth (.672 Feingehalt, 14,964 g fein je Stück, Hede / Wilcke II p. 203) — ~8 % weniger Feinsilber pro Münze als unter Christian IV. Beginn mit der <b>Hebræermønt</b> (KM# 32, KM# 137) und der regulären Glückstadter 4-Marck-Danske-Serie unter Frederik III. Tarif weiterhin 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
        en: 'After the 19-year hiatus of 1625–1643 (see <i>Christian IV''s kroner</i> above), the Krone returns in 1644 under the <b>10½-Krone-Fuß</b> («<i>Coarse Krone</i>»): <b>10½ Krone per raw mark</b> at 10¾ Loth (.672 fineness, 14.964 g fine per coin, Hede / Wilcke II p. 203) — ~8 % less fine silver per coin than under Christian IV. The series opens with the <b>Hebræermønt</b> (KM# 32, KM# 137) and the regular Glückstadt 4-Marck-Danske series under Frederik III. The tariff remains 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
        uk: 'Після 19-річного припинення 1625–1643 (див. <i>Christian IV''s kroner</i> вище) Krone-Mønt повертається 1644 р. у <b>10½-Krone-Fuß</b> («<i>Груба Крона</i>»): <b>10½ Krone з повної марки</b> проби 10¾ Loth (.672 проби, 14,964 г чистого на монету, Hede / Wilcke II с. 203) — ~8 % менше чистого срібла на монету, ніж за Кристіана IV. Серія відкривається <b>Hebræermønt</b> (KM# 32, KM# 137) та регулярною ґлюкштатською серією 4 Marck Danske за Фредеріка III. Тариф лишається 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
      context:
        de: <p>Die <b>Hebræermønt</b> wird parallel in zwei Münzstätten geprägt — København (KM# 137, 1644–1646) und Glückstadt (KM# 32, 1645) — beide mit dem Tetragramm יהוה auf der Rückseite und beide bei .593 Feingehalt (gegen den Kronemønt-Standard .671 reduziert). Bei unverändertem Tarif von ⅓ Speciedaler steigt der kumulative Seigniorage-Aufschlag durch dieses zweite Debasement auf ca. +27,6 % (siehe Sondertabelle).</p><p>Parallel dazu Glückstadter 4-Marck-Danske-Serie unter Frederik III. (KM# A43, B43) am Standardfeingehalt .671 — die Norm­fortsetzung, die später die Christian-V.-Serie ablöst.</p>
        en: <p>The <b>Hebræermønt</b> is struck in parallel at two mints — Copenhagen (KM# 137, 1644–1646) and Glückstadt (KM# 32, 1645) — both bearing the Tetragrammaton יהוה on the reverse and both at .593 fineness (reduced from the Kronemønt standard of .671). At an unchanged tariff of ⅓ Speciedaler, this second debasement raises the cumulative seigniorage premium to about +27.6 % (see separate sub-table).</p><p>Alongside, the Glückstadt 4-Marck-Danske series under Frederik III (KM# A43, B43) at standard fineness .671 — the normative continuation that the Christian V series later carries forward.</p>
        uk: <p><b>Hebræermønt</b> карбується паралельно на двох монетних дворах — Копенгаген (KM# 137, 1644–1646) і Glückstadt (KM# 32, 1645) — обидва з тетраграматоном יהוה на реверсі та обидва на пробі .593 (знижено від стандартної kronemønt-проби .671). За незмінним тарифом ⅓ Speciedaler це другий шар debasement піднімає кумулятивну сеньйораж-надбавку до ~+27,6 % (див. окрему підтаблицю).</p><p>Паралельно — ґлюкштатська серія 4 Marck Danske за Фредеріка III (KM# A43, B43) на стандартній пробі .671 — нормативне продовження, яке пізніше підхоплює серія Кристіана V.</p>
  guldkrone:
    - id: pre-A
      year_from: 1618
      year_to: 1628
      from_label: '1618'
      to_label: '1628 (Esrum)'
      title:
        de: Christian-IV.-Vorgängerphase · Hofgeschenk und Soldzahlung
        en: Christian IV predecessor phase · court gift and mercenary pay
        uk: Передфаза Кристіана IV · придворний подарунок та плата найманцям
      description:
        de: 'Die Guldkrone-Tarif-Logik beginnt parallel zur silbernen Christian-IV.-Müntzformel mit dem <b>åbne Brev af 12. Juli 1618</b><sup><a href="#ref16">[16]</a></sup>: Christian IV. läßt 2-Guldkroner («dobbelt guldkrone») schlagen, die im Konzept dasselbe 22-Karat-Gold und denselben Tarif tragen wie die spätere Frederik-III.-Form. Belegt durch den <b>Esrum-Schatzfund</b> (Ingvardson & Märcher 2010<sup><a href="#ref17">[17]</a></sup>, peer-reviewed in <i>Danefæ — Skatte fra den danske muld</i>, Nationalmuseet, S. 254–257): drei Doppelguldkroner Hede 28, alle datiert <b>1628</b>, gefunden auf den Feldern um Esrum Kloster und Møllegård (Detektor-Aufnahmen 2008/2011, Grabung Gilleleje Museum). Aus 12 weltweit bekannten Exemplaren des Typs hält das Nationalmuseet nun 5 (≈ 25 % des erhaltenen Korpus); Esrum liefert den ersten dokumentierten Fundort für diesen Typ. <em>Christian-IV.-Guldkroner waren keine Massenkarbung im täglichen Umlauf, sondern dienten als Hofgeschenk und Soldzahlung — daher liegen für den Standard-Datenanker (Frederik-III.-Massenkarbung) die first_mint und first_adoption auf 1655 (Kopenhagen-erste-Karbung Frederik III.); die Christian-IV.-Phase 1618-≥1628 ist als Vorgängerphase auf der Timeline mit eigenem from-/to-Label sichtbar.</em>'
        en: 'The Guldkrone tariff logic begins in parallel with the silver Christian IV Müntzformel via the <b>åbne Brev af 12. Juli 1618</b><sup><a href="#ref16">[16]</a></sup>: Christian IV strikes 2-Guldkroner («dobbelt guldkrone») on the same 22-carat gold and the same tariff as the later Frederik III form. Attested by the <b>Esrum hoard</b> (Ingvardson & Märcher 2010<sup><a href="#ref17">[17]</a></sup>, peer-reviewed in <i>Danefæ — Skatte fra den danske muld</i>, Nationalmuseet, pp. 254–257): three double Guldkroner Hede 28, all dated <b>1628</b>, found in the fields around Esrum Abbey and Møllegård (detector finds 2008 / 2011, follow-up excavation by Gilleleje Museum). Of the 12 known specimens of this type worldwide, the National Museum now holds 5 (≈ 25 % of the surviving corpus); Esrum delivers the first documented find spot for this type. <em>Christian IV Guldkroner were not mass production for daily circulation but served as court gifts and mercenary pay — hence the standard data anchor (Frederik III mass production) keeps first_mint and first_adoption at 1655 (Copenhagen-first issue under Frederik III); the Christian IV phase 1618-≥1628 is shown on the timeline as a predecessor phase with its own from/to label.</em>'
        uk: 'Тарифна логіка Guldkrone починається паралельно зі срібною монетною формулою Кристіана IV через <b>åbne Brev af 12. Juli 1618</b><sup><a href="#ref16">[16]</a></sup>: Кристіан IV карбує 2-Guldkroner («dobbelt guldkrone») на тому самому 22-каратному золоті й за тим самим тарифом, що й пізніша форма Фредеріка III. Засвідчено <b>Esrum-скарбом</b> (Ingvardson & Märcher 2010<sup><a href="#ref17">[17]</a></sup>, рецензоване видання в <i>Danefæ — Skatte fra den danske muld</i>, Nationalmuseet, с. 254–257): три подвійні Guldkrone Hede 28, усі датовані <b>1628 р.</b>, знайдені на полях довкола Esrum Kloster та Møllegård (детекторні знахідки 2008 / 2011 рр., наступні розкопки Gilleleje Museum). Із 12 відомих у світі екземплярів цього типу Nationalmuseet тримає 5 (≈ 25 % збереженого корпусу); Esrum дає перше задокументоване місце знахідки для цього типу. <em>Guldkrone Кристіана IV не були масовим карбуванням для повсякденного обігу, а слугували придворним подарунком та платою найманцям — тому стандартний якір даних (масове карбування Фредеріка III) тримає first_mint і first_adoption на 1655 (перше копенгагенське карбування за Фредеріка III); фазу Кристіана IV 1618-≥1628 показано на таймлайні як передфазу з власним from/to-міткою.</em>'

    - id: B
      year_from: 1668
      year_to: 1668
      from_label: '1668'
      to_label: '1668'
      title:
        de: Frederik III. · Kopenhagen · Tarif 3 Speciedaler (Tarifsenkung)
        en: Frederik III · Copenhagen · tariff 3 Speciedaler (tariff reduction)
        uk: Фредерік III · Копенгаген · тариф 3 Speciedaler (зниження тарифу)
      description:
        de: 'Späte Kopenhagener Folgeprägung der Guldkrone-Serie 1668: Tarif gegenüber der Glückstadter Phase 1657–1660 von 3½ auf <b>3 Speciedaler = 18 Mark Dansk</b> reduziert, Raugewicht von 5,996 auf 5,47 g abgesenkt. Feingehalt unverändert .917 (22 Karat). Belegtyp: <b>KM# 303 / Friedberg# 92 / Numista N#308327</b>; Münzmeister <b>Gotfred Krüger</b> (Kopenhagen 1664–1680), Mzz. <b>GK</b>. Reverslegende «<i>Dominus Providebit</i> XVIII · M · 1668 · G · K ·».'
        en: 'A late Copenhagen follow-up to the Guldkrone series in 1668: tariff reduced from the Glückstadt phase 1657–1660 of 3½ to <b>3 Speciedaler = 18 Mark Dansk</b>, rough weight lowered from 5.996 to 5.47 g. Fineness unchanged at .917 (22 carat). Reference type: <b>KM# 303 / Friedberg# 92 / Numista N#308327</b>; mintmaster <b>Gotfred Krüger</b> (Copenhagen 1664–1680), mintmark <b>GK</b>. Reverse legend «<i>Dominus Providebit</i> XVIII · M · 1668 · G · K ·».'
        uk: 'Пізніший копенгагенський наступний випуск серії Guldkrone 1668 р.: тариф знижено з ґлюкштадтської фази 1657–1660 з 3½ до <b>3 Speciedaler = 18 Mark Dansk</b>, повна вага зменшена з 5,996 до 5,47 г. Проба незмінна .917 (22 карати). Еталонний тип: <b>KM# 303 / Friedberg# 92 / Numista N#308327</b>; монетмайстер <b>Gotfred Krüger</b> (Копенгаген 1664–1680), монограма <b>GK</b>. Легенда реверсу «<i>Dominus Providebit</i> XVIII · M · 1668 · G · K ·».'
      context:
        de: |
          <b>Außerhalb Holsteins, eingearbeitet zur Vollständigkeit der Frederik-III.-Tarif-Serie:</b> die Münze wurde in Kopenhagen geprägt, gehört also nicht zum Kern-Skopus dieses Verzeichnisses. Sie ist hier aufgeführt, weil sie das einzige weitere bekannte Stück der <i>Guldkrone</i>-Tarifserie überhaupt ist und das Tarifregime der Glückstadter Phase 1657–1660 historisch ablöst.<br><br>
          <b>Müntzfuß-Verhältnis zur Glückstadter Form:</b> bei gleichem Feingehalt .917 ist das Raugewicht um ≈ 8,8 % gesenkt (5,47 statt 5,996 g) — das Feinsilberäquivalent geht entsprechend zurück. Aus der Cöllnischen Marck Raulegierung lassen sich nun ≈ 233,856 ÷ 5,47 ≈ 42,75 Stück je Marck schlagen, gegen 39 in Glückstadt. Da die Form keine glatte ganze Zahl ergibt und der Tarif ebenfalls nicht zum 22-karätigen Raugewicht passt (3 Specie ≈ 18 Mark Dansk), liegt physikalisch ein eigener Müntzfuß vor — die Münze wird in der Δ-Spalte daher als «außer Remedium» gegen die kanonische Glückstadter Form ausgewiesen.
        en: |-
          <b>Outside Holstein, included for completeness of the Frederik III tariff series:</b> the coin was struck in Copenhagen, so it does not belong to the core scope of this register. It is listed here because it is the only other known piece of the <i>Guldkrone</i> tariff series and historically supersedes the tariff regime of the Glückstadt phase 1657–1660.<br><br> <b>Standard relative to the Glückstadt form:</b> at the same fineness .917 the rough weight is reduced by ≈ 8.8 % (5.47 g instead of 5.996 g) — fine-silver equivalent falls in step. From a Cologne mark of raw alloy one now strikes ≈ 233.856 ÷ 5.47 ≈ 42.75 pieces per mark, versus 39 at Glückstadt. Since the form does not yield a clean integer and the tariff also fails to match the 22-carat rough weight (3 Specie ≈ 18 Mark Dansk), the coin physically belongs to its own standard — the Δ column accordingly flags it as «outside tolerance» against the canonical Glückstadt form.
        uk: |-
          <b>Поза Гольштейном, наведено для повноти тарифної серії Фредеріка III:</b> монету викарбувано в Копенгагені, тож вона не належить до основного скоупу цього реєстру. Включена тут, бо це єдина інша відома штука серії <i>Guldkrone</i> і вона історично змінює тарифний режим ґлюкштадтської фази 1657–1660.<br><br> <b>Стопа щодо ґлюкштадтської форми:</b> при тій же пробі .917 повна вага знижена на ≈ 8,8 % (5,47 г замість 5,996 г) — чистий срібно-золотий еквівалент пропорційно падає. З кельнської марки сплаву тепер виходить ≈ 233,856 ÷ 5,47 ≈ 42,75 штук на марку проти 39 у Glückstadt. Оскільки форма не дає круглого цілого числа й тариф теж не відповідає 22-каратному повному вагому (3 Specie ≈ 18 Mark Dansk), монета фізично належить до власної стопи — у стовпці Δ її буде відмічено як «поза допуском» щодо канонічної ґлюкштадтської форми.

  kronemont_fine:
    - id: A
      year_from: 1693
      year_to: 1771
      from_label: '1693'
      to_label: '1771'
      title:
        de: Christian V. → Christian VII. · Kopenhagener Hauptmünze · «Feine Krone»
        en: Christian V → Christian VII · Copenhagen royal mint · «Fine Crown»
        uk: Кристіан V → Кристіан VII · Копенгагенський королівський монетний двір · «Тонка Крона»
      description:
        de: 'Einzige Phase der dänischen «Feinen Krone»: nach dem Reskript Christians V. vom 31. Dezember 1692 werden 13 Specieskronen aus 1 feinen Cöllnischen Marck ausgeprägt — Feingewicht ≈ 14,98 g je Krone (gegenüber 14,964 g im Glückstadter 10½-Krone-Fuß). Geprägt ausschließlich an der Kopenhagener Hauptmünze 1693–1771 unter den Münzmeistern der jeweiligen Regenten (Christian V. biß 1699, Friedrich IV. 1699–1730, Christian VI. 1730–1746, Friedrich V. 1746–1766, Christian VII. 1766–1808). Tarif ⅔ Speciedaler durchgehend übernommen. Ältere Bestände kursierten biß zum Statsbankerot 5. Januar 1813.'
        en: 'Sole phase of the Danish «Fine Crown»: per Christian V''s Reskript of 31 December 1692, 13 Specieskronen are struck from 1 fine Cologne mark — fine weight ≈ 14.98 g per Krone (versus 14.964 g in the Glückstadt 10½-Krone-Fuß). Struck exclusively at the Copenhagen royal mint 1693–1771 under the mintmasters of the respective regents (Christian V to 1699, Friedrich IV 1699–1730, Christian VI 1730–1746, Friedrich V 1746–1766, Christian VII 1766–1808). The ⅔-Speciedaler tariff is carried through unchanged. Older stocks remained in circulation until the Statsbankerot of 5 January 1813.'
        uk: 'Єдина фаза данської «Тонкої Корони»: за Рескриптом Кристіана V від 31 грудня 1692 р. карбується 13 Specieskronen з 1 марки чистого срібла кельнської ваги — чиста вага ≈ 14,98 г на одну Krone (проти 14,964 г у ґлюкштадтському 10½-Krone-Fuß). Карбувалася виключно на Копенгагенському королівському монетному дворі 1693–1771 за монетмайстрів відповідних регентів (Кристіан V до 1699, Фредерік IV 1699–1730, Кристіан VI 1730–1746, Фредерік V 1746–1766, Кристіан VII 1766–1808). Тариф ⅔ Speciedaler зберігається без змін. Старі запаси в обігу до Statsbankerot 5 січня 1813.'

  11_333_thaler:
    - id: A
      year_from: 1726
      year_to: 1813
      from_label: '15./31. Juli 1726'
      to_label: '5. Januar 1813'
      title:
        de: Kurantmøntfod im dänisch-norwegischen Verbund · Hauptalltagswährung
        en: Kurantmøntfod in the Danish-Norwegian composite state · main everyday currency
        uk: Kurantmøntfod у Королівстві Данії і Норвегії · основна повсякденна валюта
      description:
        de: 'Etabliert durch die Forordning Friedrichs IV. vom 15./31. Juli 1726: 11⅓ Rigsdaler Courant aus 1 feinen Cöllnischen Marck — Feingewicht ≈ 20,63 g pro Daler. Hauptträger des dänisch-norwegischen Geldumlaufs während fast des gesamten 18. Jahrhunderts (Friedrich IV., Christian VI., Friedrich V., Christian VII., Friedrich VI.). Endet im Königreich Dänemark mit dem Statsbankerot vom 5. Januar 1813 (Forordning Friedrichs VI.); in Holstein hingegen bereits durch die Schimmelmann-Reform vom 29. Februar 1788 vom 9¼-Thaler-Fuß abgelöst. Altbestände 1726–1813 kursierten ab 1813 noch jahrzehntelang als Scheidemünzen biß zur Krone-Reform 1875.'
        en: 'Established by Friedrich IV''s Forordning of 15/31 July 1726: 11⅓ Rigsdaler Courant from 1 fine Cologne mark — fine weight ≈ 20.63 g per daler. Principal vehicle of the Danish-Norwegian money supply through most of the 18th century (Friedrich IV, Christian VI, Friedrich V, Christian VII, Friedrich VI). In the Kingdom of Denmark it ends with the Statsbankerot of 5 January 1813 (Forordning of Friedrich VI); in Holstein it had already been replaced by the 9¼-Thaler-Fuß through the Schimmelmann reform of 29 February 1788. Old stocks from 1726–1813 continued in circulation as petty coinage for decades after 1813, until the Krone reform of 1875.'
        uk: 'Встановлений Forordning Фредеріка IV від 15/31 липня 1726 р.: 11⅓ Rigsdaler Courant з 1 марки чистого срібла кельнської ваги — чиста вага ≈ 20,63 г на даллер. Основний носій дансько-норвезького грошового обігу впродовж майже всього XVIII ст. (Фредерік IV, Кристіан VI, Фредерік V, Кристіан VII, Фредерік VI). У Королівстві Данії дія тривала до Statsbankerot 5 січня 1813 (Forordning Фредеріка VI); у Гольштейні ж замінено на 9¼-Thaler-Fuß ще реформою Шіммельмана 29 лютого 1788 р. Старі запаси 1726–1813 ще десятиліттями кружляли як розмінна монета після 1813 — аж до Krone-реформи 1875.'

  18_5_thaler:
    - id: A
      year_from: 1813
      year_to: 1875
      from_label: '5. Januar 1813'
      to_label: '1873/1875'
      title:
        de: Rigsbankdaler → Rigsdaler Rigsmønt · Krone-Reform
        en: Rigsbankdaler → Rigsdaler Rigsmønt · Krone reform
        uk: Rigsbankdaler → Rigsdaler Rigsmønt · Krone-реформа
      description:
        de: 'Notreform Friedrichs VI. nach dem dänischen Staatsbankrott. Forordning vom 5. Januar 1813 setzt 18½ Rigsbankdaler aus 1 feinen Cöllnischen Marck (≈ 12,64 g fein pro Daler). §10 verankert ausdrücklich 1 Speciedaler = 2 Rigsbankdaler — eine glatte ½-Anteil-Anbindung an den 9¼-Thaler-Fuß, die den Übergang vom Kurantfuß logisch glättet. 1854 ohne Fußänderung in Rigsdaler Rigsmønt umbenannt; 1873–1875 ersetzt die Krone der Skandinavischen Münzunion (Schweden, Norwegen, Dänemark) den Rigsdaler.'
        en: 'Friedrich VI''s emergency reform after the Danish state bankruptcy. The Forordning of 5 January 1813 sets 18½ Rigsbankdaler per fine Cologne mark (≈ 12.64 g fine per daler). §10 explicitly anchors 1 Speciedaler = 2 Rigsbankdaler — a clean ½-share link to the 9¼-Thaler-Fuß that smoothly carries the transition from the Kurantfuß. Renamed Rigsdaler Rigsmønt in 1854 without any change of standard; in 1873–1875 the Krone of the Scandinavian Monetary Union (Sweden, Norway, Denmark) supersedes the Rigsdaler.'
        uk: 'Надзвичайна реформа Фредеріка VI після данського державного банкрутства. Forordning 5 січня 1813 встановлює 18½ Rigsbankdaler з 1 марки чистого срібла кельнської ваги (≈ 12,64 г чистого на даллер). §10 явно закріплює 1 Speciedaler = 2 Rigsbankdaler — чиста привʼязка ½-частки до 9¼-Thaler-Fuß, яка логічно згладжує перехід з Kurantfuß. 1854 р. перейменовується на Rigsdaler Rigsmønt без зміни стопи; 1873–1875 рр. Krone Скандинавської монетної унії (Швеція, Норвегія, Данія) заміщує Rigsdaler.'

