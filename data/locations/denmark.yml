  - id: km-x016-chr-iv-1622
    fuss: 9_25_thaler
    phase: A
    kind: scheide
    fraction: "1/16"
    nominal: 6 Skilling
    year_label: "1622"
    year_first: 1622
    year_last: 1622
    ruler: "Christian IV."
    mint: "Kopenhagen"
    catalog:
      others:
        - "KM-DK# 83"
    metal: silver
    fineness: 0.888
    weight_rough_g: 1.64
    note:
      de: |-
        6 Skilling Christians IV. (1622) — 1/16 Speciedaler in dänischer Theilung (96 Sk Danske = 1 Sp). ucoin gibt keine Feingehaltsangabe; <em>aus dem Reichsmüntzfuß-Standard .888 hergeleitet</em>. Münzstätte nicht eindeutig: ucoin-Periode «Speciedaler 1582–1624» deckt sowohl Glückstadt (gegr. 1617) als auch Copenhagen ab — vorerst als Glückstadt eingetragen. <b>KM-DK# 83</b>; in Numista nicht katalogisiert.
      en: |-
        6 Skilling of Christian IV (1622) — 1/16 Speciedaler in the Danish subdivision (96 Sk Danske = 1 Sp). ucoin does not give the fineness; <em>inferred from the Reichsmüntzfuß standard .888</em>. Mint not unambiguous: the ucoin period «Speciedaler 1582–1624» covers both Glückstadt (founded 1617) and Copenhagen — provisionally entered as Glückstadt. <b>KM-DK# 83</b>; not catalogued by Numista.
      uk: |-
        6 Skilling Кристіана IV (1622) — 1/16 Speciedaler у данському поділі (96 Sk Danske = 1 Sp). ucoin не дає проби; <em>виведено зі стандарту Reichsmüntzfuß .888</em>. Монетний двір неоднозначний: період ucoin «Speciedaler 1582–1624» покриває як Глюкштадт (засн. 1617), так і Копенгаген — попередньо внесено як Глюкштадт. <b>KM-DK# 83</b>; у Numista не каталогізовано.
    sources:
      - type: ucoin
        url: https://en.ucoin.net/coin/denmark-6-skilling-1622/?tid=163036
        ref: ucoin
    issuing_entity: danish_realm
    fineness_verified: false
    mint_verified: false
    diameter_mm_verified: false
    verification_note:
      de: Mzm. ursprünglich als Glückstadt erfaßt; bei späterer Auditierung gegen ucoin Period (Rigsdaler 1625-1699 bzw. Speciedaler 1582-1624 — Royal Danish Copenhagen) und KM-DK# 83 (Royal-Danish-Krause-Index ohne SH-Pendant) als königlich-dänische Kopenhagener Prägung re-attribuiert (1622). Mzm. weiterhin (?) — kein direkter Hede/Wilcke-Beleg.
      en: Mint originally recorded as Glückstadt; on later audit against ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) and KM-DK# 83 (Royal Danish Krause index with no SH counterpart), re-attributed as a Royal Danish Copenhagen issue (1622). Mint still (?) — no direct Hede / Wilcke attestation.
      uk: Монетний двір спочатку записано як Глюкштадт; під час подальшого аудиту проти ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) та KM-DK# 83 (Royal-Danish-Krause-індекс без SH-аналогу) переатрибутовано як королівсько-данську копенгагенську монету (1622). Монетний двір лишається (?) — прямого підтвердження за Hede/Wilcke немає.
