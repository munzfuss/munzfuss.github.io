  note:
    de: "8 Kroneskilling 1620-1621 — größtes Kroneskilling-Stück, Reverse «1/18 krone» · fünf Münzmeister-Varianten nach Hede 114A-E unter KM-82 zusammengefaßt: 114A trekløver (Schwabe, Sieg-1971 64.1), 114B korslagte køller (Sieg-1971 64.2), 114C fugl (Sieg-1971 64.3), 114D korslagte glødehager (Sieg-1971 64.4), 114E ibskal (Johan Post — usikkert, Sieg-1971 64.5, eine der umstrittensten Christian-IV-Raritäten) · Bruttovægt 2,101g · Finvægt 1,806g · Marken-fin 10,793 daler · Numista/ucoin 1,85g vermutlich Schreibfehler (≈ Finvægt statt Brutto) · Literatur: Fornitz in Bruun Rasmussen auktion 752 (2005)."
    en: "8 Kroneskilling 1620-1621 — largest Kroneskilling piece, reverse «1/18 krone» · five mint-master variants per Hede 114A-E folded under KM-82: 114A trekløver (Schwabe, Sieg-1971 64.1), 114B crossed clubs (Sieg-1971 64.2), 114C bird (Sieg-1971 64.3), 114D crossed fire-hooks (Sieg-1971 64.4), 114E scallop (Johan Post — uncertain, Sieg-1971 64.5, one of the most-disputed Christian IV rarities) · Bruttovægt 2.101g · Finvægt 1.806g · 10.793 daler per Marken-fein · Numista/ucoin 1.85g likely typo (≈ Finvægt, not Brutto) · Literature: Fornitz in Bruun Rasmussen auktion 752 (2005)."
    uk: "8 Kroneskilling 1620-1621 — найбільша Kroneskilling-монета, реверс «1/18 krone» · п'ять варіантів монетмейстера за Hede 114A-E об'єднані під KM-82: 114A trekløver (Schwabe, Sieg-1971 64.1), 114B korslagte køller (Sieg-1971 64.2), 114C fugl (Sieg-1971 64.3), 114D korslagte glødehager (Sieg-1971 64.4), 114E ibskal (Johan Post — usikkert, Sieg-1971 64.5, одна з найбільш дискусійних рідкостей Christian IV) · Bruttovægt 2,101г · Finvægt 1,806г · 10,793 daler з Marken-fin · Numista/ucoin 1,85г ймовірно typo (≈ Finvægt, не Brutto) · Література: Fornitz в каталозі Bruun Rasmussen аукціон 752 (2005)."
