  # === Phase 4c, batch 3 — Frederik III 1648-1670 (Bruun-Specimen-Belege)
  # Routing: 9_25_thaler A for silver Speciedalers + multiples (1622-1726);
  #          reichsdukatenfuss A for gold Ducats / Krone / Klippe / Portugaloser (1591-1726);
  #          kronemont A for silver Krone family (1644-1669 in DK).
  # Excluded per §9.1: 3 patterns (KM-PnG16 / PnJ16 / PnA16 Hede-98/99/100A 1659).
