    note:
      de: |-
        1 Speciedaler Friedrichs III. (1655–1656) — frühes Mitte-Regierungs-Stück (zwischen Krönung 1648 und der ersten Pumphosekrone 1665). Schwesterstück zu km-51 (1664–1666) und km-x013 (1664-only .875). Mzm. nicht eindeutig — vorerst als Glückstadt eingetragen. <b>KM-DK# 204</b>; in Numista nicht katalogisiert.
      en: |-
        1 Speciedaler of Frederik III (1655–1656) — early mid-reign piece (between the 1648 coronation and the first Pumphosekrone of 1665). Sister piece to km-51 (1664–1666) and km-x013 (1664-only .875). Mint not unambiguous — provisionally entered as Glückstadt. <b>KM-DK# 204</b>; not catalogued by Numista.
      uk: |-
        1 Speciedaler Фредеріка III (1655–1656) — рання середина правління (між коронацією 1648 і першою Pumphosekrone 1665). Сестринська монета до km-51 (1664–1666) та km-x013 (1664-only .875). Монетний двір неоднозначний — попередньо внесено як Глюкштадт. <b>KM-DK# 204</b>; у Numista не каталогізовано.
    sources:
      - type: ucoin
        url: https://en.ucoin.net/coin/denmark-1-speciedaler-1655-1656/?tid=97361
        ref: ucoin
    issuing_entity: danish_realm
    fineness_verified: true
    mint_verified: false
    verification_note:
      de: Mzm. ursprünglich als Glückstadt erfaßt; bei späterer Auditierung gegen ucoin Period (Rigsdaler 1625-1699 bzw. Speciedaler 1582-1624 — Royal Danish Copenhagen) und KM-DK# 204 (Royal-Danish-Krause-Index ohne SH-Pendant) als königlich-dänische Kopenhagener Prägung re-attribuiert (1655–1656). Mzm. weiterhin (?) — kein direkter Hede/Wilcke-Beleg.
      en: Mint originally recorded as Glückstadt; on later audit against ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) and KM-DK# 204 (Royal Danish Krause index with no SH counterpart), re-attributed as a Royal Danish Copenhagen issue (1655–1656). Mint still (?) — no direct Hede / Wilcke attestation.
      uk: Монетний двір спочатку записано як Глюкштадт; під час подальшого аудиту проти ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) та KM-DK# 204 (Royal-Danish-Krause-індекс без SH-аналогу) переатрибутовано як королівсько-данську копенгагенську монету (1655–1656). Монетний двір лишається (?) — прямого підтвердження за Hede/Wilcke немає.
