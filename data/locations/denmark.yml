# ---------------------------------------------------------------------
# Timeline overview — chronological span of every Danish-relevant Müntzfuß
# from the Christian II Lovkompleks 1514–1515 (Møntordning af Sommeren
# 1514 Kopenhagen + Norge-Møntordning 3. August 1514 + Sjælland åbent
# Brev 24. August 1515 — the Denmark-Norway-track anchor of the project
# per CLAUDE.md «Mission temporal scope — dual anchor by jurisdiction»,
# per Wilcke 1950 p. 183-186 verbatim) to the Krone reform (1873–1875).
# Excluded: 30-Thaler-Fuß (Vereinsthaler) and Reichsgoldmünzfuß
# (Goldmark) — both post-1866 German-Reich standards that did not apply
# in the Danish realm.
#
# `scope_mode: denmark_only` suppresses every holstein-scope layer; on
# this page Holstein is not a separate sub-track. Each bar's anywhere-
# scope range is taken from `data/shared/fuesse.yml` events as-is —
# no per-bar truncation, since the Danish realm continued every Danish
# standard to its full historical end (Statsbankerot 1813 / Krone-reform
# 1875).
# ---------------------------------------------------------------------
