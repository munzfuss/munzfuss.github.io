  note:
    de: |-
      1/16 Dukat Christians IV. (1648 — letztes Regierungsjahr, Christian IV. † 28. Februar 1648). Goldemission der Reichsdukatenfuß-Theilung (3,49 g rau / 16 = 0,218 g pro Stück). Münzstätte ist nicht eindeutig: ucoin-Periode «Rigsdaler 1625–1699» deckt sowohl Glückstadt als auch København ab. ucoin gibt weder Rohgewicht noch Feingehalt an — beide Werte hier <em>aus dem Reichsdukatenfuß-Standard berechnet</em>. ucoin-Eintrag tid 97384 (KM-DK# 174); in Numista nicht direkt katalogisiert.
    en: |-
      1/16 Ducat of Christian IV (1648 — last regnal year, Christian IV. † 28 February 1648). Gold issue at the Reichsdukatenfuß subdivision (3.49 g rough / 16 = 0.218 g per piece). Mint is not unambiguous: the ucoin period «Rigsdaler 1625–1699» covers both Glückstadt and Copenhagen. ucoin gives neither weight nor fineness — both values here are <em>computed from the Reichsdukatenfuß standard</em>. ucoin entry tid 97384 (KM-DK# 174); not catalogued directly by Numista.
    uk: |-
      1/16 Dukat Кристіана IV (1648 — останній рік правління, Кристіан IV † 28 лютого 1648). Золотий випуск Reichsdukatenfuß-поділу (3,49 г груб. / 16 = 0,218 г на штуку). Монетний двір неоднозначний: ucoin-період «Rigsdaler 1625–1699» покриває як Глюкштадт, так і Копенгаген. ucoin не дає ні ваги, ні проби — обидва значення тут <em>обчислено зі стандарту Reichsdukatenfuß</em>. ucoin запис tid 97384 (KM-DK# 174); у Numista окремо не каталогізовано.
