      uk: Технічний загальний кошик для bulk-імпортованих монет із ucoin. При майбутній детальній роботі монети перейдуть у відповідну Müntzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>30_thaler</code>, <code>reichsdukatenfuss</code> тощо).
phases:
  kronemont_chr_iv:
    - id: A
      year_from: 1618
      year_to: 1624
      from_label: '1618'
      to_label: '1624'
      title:
        de: Christian IV. · Corona Danica · Tarif 1½ Speciedaler
        en: Christian IV · Corona Danica · tariff 1½ Speciedaler
        uk: Кристіан IV · Corona Danica · тариф 1½ Specie
      description:
        de: 'Einzige Phase der Christian-IV.-Krone: alle Prägungen 1618–1624 laufen unter dem ursprünglichen Tarif <b>1½ Speciedaler</b> — eine Wertigkeit, die im Volksmund die satirische Umdeutung des königlichen Wahlspruches <b>RFP</b> (regna firmat pietas) als <b>R(iget) F(attes) P(enge)</b> hervorrief.<sup><a href="#ref5">[5]</a></sup> Die offizielle Tarifsenkung auf 1⅓ Speciedaler erfolgt erst <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup>, unmittelbar nach Einstellung der Krone-Prägung. Stilistische Untergruppen: Corona-Danica-Originalprägungen 1618–1622 (KM# 57–61, 58a, 59a) und «Dicke» / Open-Crown-Varianten 1624 (KM# 94–99) — alle innerhalb desselben Tarifregimes.'
        en: 'Sole phase of the Christian IV Krone: all 1618–1624 issues run under the original <b>1½ Speciedaler</b> tariff — a parity that in folk parlance prompted the satirical reread of the royal motto <b>RFP</b> (regna firmat pietas) as <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref5">[5]</a></sup> The official tariff cut to 1⅓ Speciedaler only comes in <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup>, right after Krone production stops. Stylistic sub-groups: Corona Danica original strikes 1618–1622 (KM# 57–61, 58a, 59a) and «Dicke» / Open-Crown variants 1624 (KM# 94–99) — all within the same tariff regime.'
        uk: 'Єдина фаза Krone Кристіана IV: усі емісії 1618–1624 під оригінальним тарифом <b>1½ Speciedaler</b> — паритет, який у народі породив сатиричне переосмислення королівського девізу <b>RFP</b> (regna firmat pietas) як <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref5">[5]</a></sup> Офіційне зниження тарифу до 1⅓ Speciedaler відбувається лише <b>1625</b><sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup> — одразу після припинення карбування Krone. Стилістичні підгрупи: оригінальні Corona Danica 1618–1622 (KM# 57–61, 58a, 59a) та варіанти «Dicke» / Open-Crown 1624 (KM# 94–99) — усі в одному тарифному режимі.'

  # 13-Krone-Fuß («Feine Krone») — Copenhagen-only standard, no
  # Holstein issues. Listed here as a contextual section so the
  # Krone-Mønt family (Christian IVs kroner → 10½-Krone-Fuß →
  # 13-Krone-Fuß) is presented in full on the timeline. Empty phase
  # array is intentional — no Glückstadt or Tönning specimens.
  reichsdukatenfuss:
    - id: A
      year_from: 1600
      year_to: 1726
      from_label: "17. Jh."
      to_label: "1726"
      title:
        de: "Glückstadt und Gottorp · Tönning"
        en: "Glückstadt and Gottorp · Tönning"
        uk: "Glückstadt і Готторп · Tönning"
      mt_caption:
        de: "Dukat-Prägung nach Reichsdukatenfuß (.986) · Glückstadt (Chr. IV. / Chr. V.) und Tönning (Chr. Albrecht / Fr. IV. / Karl Fr.) · sortiert nach Jahr"
        en: "Ducat issues to the Reichsdukatenfuß (.986) · Glückstadt (Christian IV / Christian V) and Tönning (Christian Albrecht / Frederik IV / Karl Friedrich) · sorted by year"
        uk: "Карбування дукатів за Reichsdukatenfuß (.986) · Glückstadt (Кристіан IV / Кристіан V) і Tönning (Кристіан Альбрехт / Фредерік IV / Карл Фрідріх) · впорядковано за роком"

    - id: B
      year_from: 1726
      year_to: 1771
      from_label: "1726"
      to_label: "1771"
      title:
        de: "Courantdukat-Fuß durch Courantverbund"
        en: "Courantdukat standard via the Courant union"
        uk: "Стопа Courantdukat через Courant-союз"
      context:
        de: "Mit dem Kurantmøntfod von 1726 entwickelt sich parallel zum Reichsdukatenfuß der <b>Courantdukat</b> — Dukat mit leichter Feingewichtsreduktion zur festen Kurs-Anbindung (2 Rigsdaler Courant = 1 Courantdukat, später 2½ Rigsdaler Courant). Altona-Münze wird erst 1771 eröffnet; Dukaten in dieser Phase werden in Kopenhagen bzw. Glückstadt für den gesamtstaatlichen Handel geprägt."
        en: "With the Kurantmøntfod of 1726 a <b>Courantdukat</b> grows up alongside the Reichsdukatenfuß — a ducat with slightly reduced fine weight, designed for a fixed exchange link (2 Rigsdaler Courant = 1 Courantdukat, later 2½ Rigsdaler Courant). The Altona mint is only opened in 1771; the ducats of this phase are struck in Copenhagen and Glückstadt for the trade of the composite state."
        uk: "З Kurantmøntfod 1726 паралельно до Reichsdukatenfuß виростає <b>Courantdukat</b> — дукат із трохи зниженою чистою вагою, призначений для фіксованої курсової привʼязки (2 Rigsdaler Courant = 1 Courantdukat, пізніше 2½ Rigsdaler Courant). Монетний двір в Альтоні відкриють лише 1771; дукати цієї фази карбують у Копенгагені й Glückstadt для торгівлі цілісної держави."

  9_thaler:
    - id: A
      year_from: 1566
      year_to: 1625
      from_label: "30. Mai 1566"
      to_label: "1625"
      title:
        de: "Reichsmünzordnung in Holstein-Gottorp"
        en: "Imperial Mint Decree in Holstein-Gottorp"
        uk: "Імперський монетний ордонанс у Гольштейн-Ґотторпі"
      description:
        de: "Holsteinische Reichsthaler-Prägungen unter Adolf I., Johann Adolf, frühem Friedrich III. und Hans Jr. von Sonderburg — Kipper-Wipper-Krise (1620–1623), ab 1622 parallel vom leichteren 9¼-Fuß abgelöst, letzte Holstein-Prägung 1625."
        en: "Holstein Reichsthaler issues under Adolf I, Johann Adolf, early Friedrich III and Hans Jr. of Sonderburg — Kipper-Wipper crisis (1620–1623), superseded in parallel by the lighter 9¼-Fuß from 1622, last Holstein strike 1625."
        uk: "Гольштинські карбування Reichsthaler за Адольфа I, Йоганна Адольфа, раннього Фредеріка III та Hans Jr. Sonderburg — Kipper-Wipper-криза (1620–1623); з 1622 паралельно витісняється легшим 9¼-Fuß; останнє карбування в Гольштейні — 1625."
      context:
        de: |
          <b>Reichsstandard biß 1625:</b> Reichsthaler 9-Fuß (.889/14²⁄₉ Loth, 25,984 g fein), Mark-lübisch-Theilstücke (½, ¼, ⅛ Thaler), Schillinge (1/32, 1/48 Thaler), Pfennig-Scheidemünzen (1/96, 1/128 Thaler).<br>
          <b>Münzstätten:</b> in Holstein-Gottorp vor allem Schleswig und Husum. Nach dem Kipper-Wipper-Zusammenbruch (~1620) verlieren die Reichsstände das einheitliche Münzwesen — ab 1622 setzt sich in Holstein der leichtere 9¼-Fuß (Thaler Species, 25,28173 g fein gegen 25,984 g im 9-Fuß) durch, die letzte holsteinische 9-Fuß-Prägung erfolgt 1625 (Hans Jr. Sonderburg, 2 Schilling Lübisch).<br>
          <b>Außerhalb Holsteins lebt der 9-Fuß weiter:</b> Hamburg behält ihn als <i>Bank-Mark</i> der Hamburger Bank, Lübeck als <i>Speciemark</i> — beide biß 1875.
        en: |-
          <b>Imperial standard until 1625:</b> Reichsthaler at 9-Fuß (.889/14²⁄₉ Loth, 25.984 g fine), Mark-lübisch sub-units (½, ¼, ⅛ Thaler), Schilling pieces (1/32, 1/48 Thaler), Pfennig petty coins (1/96, 1/128 Thaler).<br> <b>Mints:</b> in Holstein-Gottorp mainly Schleswig and Husum. After the Kipper-Wipper collapse (~1620) the imperial estates lose unified coinage; from 1622 the lighter 9¼-Fuß (Thaler Species, 25.28173 g fine vs. 25.984 g in the 9-Fuß) takes over in Holstein, with the last 9-Fuß strike falling in 1625 (Hans Jr. of Sonderburg, 2 Schilling Lübisch).<br> <b>Beyond Holstein the 9-Fuß lived on:</b> Hamburg kept it as the <i>Bank-Mark</i> of the Hamburger Bank, Lübeck as the <i>Speciemark</i> — both until 1875.
        uk: |-
          <b>Імперський стандарт до 1625:</b> Reichsthaler у 9-Fuß (.889/14²⁄₉ Loth, 25,984 г чистого), частки Mark lübisch (½, ¼, ⅛ Thaler), Schilling-монети (1/32, 1/48 Thaler), Pfennig-розмінні монети (1/96, 1/128 Thaler).<br> <b>Монетні двори:</b> в Гольштейн-Ґотторпі переважно Шлезвіг і Гузум. Після колапсу Kipper-Wipper (~1620) імперські стани втрачають єдину монетну систему; з 1622 у Гольштейні утверджується легший 9¼-Fuß (Thaler Species, 25,28173 г чистого проти 25,984 г у 9-Fuß), а останнє 9-Fuß-карбування припадає на 1625 р. (Hans Jr. Sonderburg, 2 Schilling Lübisch).<br> <b>Поза Гольштейном 9-Fuß продовжує існувати:</b> Гамбург тримає його як <i>Bank-Mark</i> Гамбурзького банку, Любек — як <i>Speciemark</i>; обидва до 1875 р.

  9_25_thaler:
    - id: A
      year_from: 1622
      year_to: 1726
      from_label: "1622"
      to_label: "15. Juli 1726"
      title:
        de: "Etablierung unter dänischer und gottorpischer Herrschaft"
        en: "Establishment under Danish and Gottorp rule"
        uk: "Становлення під данським і ґотторпським правлінням"
      description:
        de: "Holstein zweigetheilt: Königsl. dänischer Antheil (Glückstadt, Pinneberg, Rantzau) und Gottorpischer Antheil (Tönning, Schleswig, Kiel) · keine einheitliche Münzstruktur · Aufgeld zwischen Species und Umlaufmünzen üblich."
        en: "Holstein divided in two: the royal Danish part (Glückstadt, Pinneberg, Rantzau) and the Gottorp part (Tönning, Schleswig, Kiel) · no unified coinage structure · a premium between Species and circulating coins is the norm."
        uk: "Гольштейн розділений на дві частини: королівська данська частина (Glückstadt, Pinneberg, Rantzau) і ґотторпська частина (Tönning, Schleswig, Kiel) · єдиної монетної структури немає · надбавка (Aufgeld) між Species і обіговими монетами — звична практика."
      context:
        de: |
          <b>Dominierende Großsilbermünze:</b> Thaler Species im 9¼-Fuß, nach dänischer Tradition etabliert; daneben lübisch geprägte Schilling-Scheidemünzen. <b>Zeitgenössische Nomenklatur:</b> auf den Münzen «SPECIES» oder Mark-Danske-Denomination; in Auktionskatalogen auch «Speciedaler».<br>
          <b>Hauptumlauf in Holstein:</b> Neben heimischen Prägungen zirkulieren lübische, hamburgische und norddeutsche Thaler Species; niederländische Patagonen/Albertusthaler; schwedische 4-Mark-Stücke; spanische Piaster — der Handel akzeptiert jede Species nach Silbergehalt.<br>
          <b>Parallel zur Thaler-Species-Prägung: die Kronemønt-Kategorie (1618 → 1696).</b> Siehe eigene Sektion <i>10½-Krone-Fuß · Kronemønt-Tarifmünze</i> unten, wo die Tarifhistorie 1½ → 1⅓ → ⅔ Speciedaler und die Prägetabelle 1644–1696 detailliert dokumentiert sind.
        en: |-
          <b>Dominant large silver coin:</b> the Thaler Species in the 9¼-Fuß, established by Danish tradition; alongside it, Schilling petty coinage in Lübeck reckoning. <b>Contemporary nomenclature:</b> on the coins themselves «SPECIES» or a Mark-Danske denomination; auction catalogues often use «Speciedaler».<br> <b>Main circulation in Holstein:</b> besides domestic issues, Lübeck, Hamburg and North-German Thaler Species circulate; Dutch Patagonen/Albertusthaler; Swedish 4-Mark pieces; Spanish piastres — trade accepts every Species by silver content.<br> <b>In parallel with the Thaler Species issues — the Kronemønt category (1618 → 1696).</b> See the dedicated section <i>10½-Krone-Fuß · Kronemønt tariff coin</i> below, which documents the tariff history 1½ → 1⅓ → ⅔ Speciedaler and the strike table 1644–1696 in detail.
        uk: |-
          <b>Домінантна велика срібна монета:</b> Thaler Species у 9¼-Fuß, закріплений данською традицією; поруч — Schilling-розмінна монета у любецькому рахунку. <b>Сучасна термінологія:</b> на самих монетах «SPECIES» або номінал у Mark-Danske; аукціонні каталоги вживають також «Speciedaler».<br> <b>Основний обіг у Гольштейні:</b> крім місцевих карбувань, обертають любецькі, гамбурзькі й північнонімецькі Thaler Species; нідерландські Patagonen/Albertusthaler; шведські 4-Mark; іспанські піастри — торгівля приймає кожен Species за вмістом срібла.<br> <b>Паралельно з карбуванням Thaler Species — категорія Kronemønt (1618 → 1696).</b> Див. окрему секцію <i>10½-Krone-Fuß · тарифна монета Kronemønt</i> нижче, де докладно задокументовано історію тарифу 1½ → 1⅓ → ⅔ Speciedaler і таблицю карбувань 1644–1696.
      mt_caption:
        de: "Münzstätte Tönning · Gottorpisches Holstein · 1689–1726 · Scheidemünzen mit lübischer Nominalangabe (im 9¼-Fuß-System) + Thaler Species und Dukaten (aus Bruun Coll. Stack's Bowers Auktion Zürich 14.–15. März 2025)"
        en: "Tönning mint · Gottorp Holstein · 1689–1726 · petty coins denominated in Lübeck reckoning (within the 9¼-Fuß system) plus Thaler Species and ducats (from the Bruun Coll., Stack's Bowers auction, Zurich 14–15 March 2025)"
        uk: "Монетний двір Tönning · ґотторпський Гольштейн · 1689–1726 · розмінна монета з номіналом у любецькому рахунку (в межах системи 9¼-Fuß) плюс Thaler Species і дукати (з колекції Bruun, аукціон Stack's Bowers, Цюрих 14–15 березня 2025)"

  kronemont:
    - id: A
      year_from: 1644
      year_to: 1669
      from_label: '1644'
      to_label: '1669'
      title:
        de: 10½-Krone-Fuß · Hebræermønt und Frederik-III.-Glückstadt-Serie
        en: 10½-Krone-Fuß · Hebræermønt and Frederik III Glückstadt series
        uk: 10½-Krone-Fuß · Hebræermønt та серія Frederik III Glückstadt
      description:
        de: 'Nach dem 19-jährigen Stillstand 1625–1643 (siehe <i>Christian IVs kroner</i> oben) kehrt die Krone-Mønt 1644 im <b>10½-Krone-Fuß</b> («<i>Grobe Krone</i>») zurück: <b>10½ Krone je rauer Marck</b> von 10¾ Loth (.672 Feingehalt, 14,964 g fein je Stück, Hede / Wilcke II p. 203) — ~8 % weniger Feinsilber pro Münze als unter Christian IV. Beginn mit der <b>Hebræermønt</b> (KM# 32, KM# 137) und der regulären Glückstadter 4-Marck-Danske-Serie unter Frederik III. Tarif weiterhin 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
        en: 'After the 19-year hiatus of 1625–1643 (see <i>Christian IV''s kroner</i> above), the Krone returns in 1644 under the <b>10½-Krone-Fuß</b> («<i>Coarse Krone</i>»): <b>10½ Krone per raw mark</b> at 10¾ Loth (.672 fineness, 14.964 g fine per coin, Hede / Wilcke II p. 203) — ~8 % less fine silver per coin than under Christian IV. The series opens with the <b>Hebræermønt</b> (KM# 32, KM# 137) and the regular Glückstadt 4-Marck-Danske series under Frederik III. The tariff remains 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
        uk: 'Після 19-річного припинення 1625–1643 (див. <i>Christian IV''s kroner</i> вище) Krone-Mønt повертається 1644 р. у <b>10½-Krone-Fuß</b> («<i>Груба Крона</i>»): <b>10½ Krone з повної марки</b> проби 10¾ Loth (.672 проби, 14,964 г чистого на монету, Hede / Wilcke II с. 203) — ~8 % менше чистого срібла на монету, ніж за Кристіана IV. Серія відкривається <b>Hebræermønt</b> (KM# 32, KM# 137) та регулярною ґлюкштатською серією 4 Marck Danske за Фредеріка III. Тариф лишається 1⅓ Speciedaler.<sup><a href="#ref16">[16]</a><a href="#ref23">[23]</a></sup>'
      context:
        de: <p>Die <b>Hebræermønt</b> wird parallel in zwei Münzstätten geprägt — København (KM# 137, 1644–1646) und Glückstadt (KM# 32, 1645) — beide mit dem Tetragramm יהוה auf der Rückseite und beide bei .593 Feingehalt (gegen den Kronemønt-Standard .671 reduziert). Bei unverändertem Tarif von ⅓ Speciedaler steigt der kumulative Seigniorage-Aufschlag durch dieses zweite Debasement auf ca. +27,6 % (siehe Sondertabelle).</p><p>Parallel dazu Glückstadter 4-Marck-Danske-Serie unter Frederik III. (KM# A43, B43) am Standardfeingehalt .671 — die Norm­fortsetzung, die später die Christian-V.-Serie ablöst.</p>
        en: <p>The <b>Hebræermønt</b> is struck in parallel at two mints — Copenhagen (KM# 137, 1644–1646) and Glückstadt (KM# 32, 1645) — both bearing the Tetragrammaton יהוה on the reverse and both at .593 fineness (reduced from the Kronemønt standard of .671). At an unchanged tariff of ⅓ Speciedaler, this second debasement raises the cumulative seigniorage premium to about +27.6 % (see separate sub-table).</p><p>Alongside, the Glückstadt 4-Marck-Danske series under Frederik III (KM# A43, B43) at standard fineness .671 — the normative continuation that the Christian V series later carries forward.</p>
        uk: <p><b>Hebræermønt</b> карбується паралельно на двох монетних дворах — Копенгаген (KM# 137, 1644–1646) і Glückstadt (KM# 32, 1645) — обидва з тетраграматоном יהוה на реверсі та обидва на пробі .593 (знижено від стандартної kronemønt-проби .671). За незмінним тарифом ⅓ Speciedaler це другий шар debasement піднімає кумулятивну сеньйораж-надбавку до ~+27,6 % (див. окрему підтаблицю).</p><p>Паралельно — ґлюкштатська серія 4 Marck Danske за Фредеріка III (KM# A43, B43) на стандартній пробі .671 — нормативне продовження, яке пізніше підхоплює серія Кристіана V.</p>
  guldkrone:
    - id: B
      year_from: 1668
      year_to: 1668
      from_label: '1668'
      to_label: '1668'
      title:
        de: Frederik III. · Kopenhagen · Tarif 3 Speciedaler (Tarifsenkung)
        en: Frederik III · Copenhagen · tariff 3 Speciedaler (tariff reduction)
        uk: Фредерік III · Копенгаген · тариф 3 Speciedaler (зниження тарифу)
      description:
        de: 'Späte Kopenhagener Folgeprägung der Guldkrone-Serie 1668: Tarif gegenüber der Glückstadter Phase 1657–1660 von 3½ auf <b>3 Speciedaler = 18 Mark Dansk</b> reduziert, Raugewicht von 5,996 auf 5,47 g abgesenkt. Feingehalt unverändert .917 (22 Karat). Belegtyp: <b>KM# 303 / Friedberg# 92 / Numista N#308327</b>; Münzmeister <b>Gotfred Krüger</b> (Kopenhagen 1664–1680), Mzz. <b>GK</b>. Reverslegende «<i>Dominus Providebit</i> XVIII · M · 1668 · G · K ·».'
        en: 'A late Copenhagen follow-up to the Guldkrone series in 1668: tariff reduced from the Glückstadt phase 1657–1660 of 3½ to <b>3 Speciedaler = 18 Mark Dansk</b>, rough weight lowered from 5.996 to 5.47 g. Fineness unchanged at .917 (22 carat). Reference type: <b>KM# 303 / Friedberg# 92 / Numista N#308327</b>; mintmaster <b>Gotfred Krüger</b> (Copenhagen 1664–1680), mintmark <b>GK</b>. Reverse legend «<i>Dominus Providebit</i> XVIII · M · 1668 · G · K ·».'
        uk: 'Пізніший копенгагенський наступний випуск серії Guldkrone 1668 р.: тариф знижено з ґлюкштадтської фази 1657–1660 з 3½ до <b>3 Speciedaler = 18 Mark Dansk</b>, повна вага зменшена з 5,996 до 5,47 г. Проба незмінна .917 (22 карати). Еталонний тип: <b>KM# 303 / Friedberg# 92 / Numista N#308327</b>; монетмайстер <b>Gotfred Krüger</b> (Копенгаген 1664–1680), монограма <b>GK</b>. Легенда реверсу «<i>Dominus Providebit</i> XVIII · M · 1668 · G · K ·».'
      context:
        de: |
          <b>Außerhalb Holsteins, eingearbeitet zur Vollständigkeit der Frederik-III.-Tarif-Serie:</b> die Münze wurde in Kopenhagen geprägt, gehört also nicht zum Kern-Skopus dieses Verzeichnisses. Sie ist hier aufgeführt, weil sie das einzige weitere bekannte Stück der <i>Guldkrone</i>-Tarifserie überhaupt ist und das Tarifregime der Glückstadter Phase 1657–1660 historisch ablöst.<br><br>
          <b>Müntzfuß-Verhältnis zur Glückstadter Form:</b> bei gleichem Feingehalt .917 ist das Raugewicht um ≈ 8,8 % gesenkt (5,47 statt 5,996 g) — das Feinsilberäquivalent geht entsprechend zurück. Aus der Cöllnischen Marck Raulegierung lassen sich nun ≈ 233,856 ÷ 5,47 ≈ 42,75 Stück je Marck schlagen, gegen 39 in Glückstadt. Da die Form keine glatte ganze Zahl ergibt und der Tarif ebenfalls nicht zum 22-karätigen Raugewicht passt (3 Specie ≈ 18 Mark Dansk), liegt physikalisch ein eigener Müntzfuß vor — die Münze wird in der Δ-Spalte daher als «außer Remedium» gegen die kanonische Glückstadter Form ausgewiesen.
        en: |-
          <b>Outside Holstein, included for completeness of the Frederik III tariff series:</b> the coin was struck in Copenhagen, so it does not belong to the core scope of this register. It is listed here because it is the only other known piece of the <i>Guldkrone</i> tariff series and historically supersedes the tariff regime of the Glückstadt phase 1657–1660.<br><br> <b>Standard relative to the Glückstadt form:</b> at the same fineness .917 the rough weight is reduced by ≈ 8.8 % (5.47 g instead of 5.996 g) — fine-silver equivalent falls in step. From a Cologne mark of raw alloy one now strikes ≈ 233.856 ÷ 5.47 ≈ 42.75 pieces per mark, versus 39 at Glückstadt. Since the form does not yield a clean integer and the tariff also fails to match the 22-carat rough weight (3 Specie ≈ 18 Mark Dansk), the coin physically belongs to its own standard — the Δ column accordingly flags it as «outside tolerance» against the canonical Glückstadt form.
        uk: |-
          <b>Поза Гольштейном, наведено для повноти тарифної серії Фредеріка III:</b> монету викарбувано в Копенгагені, тож вона не належить до основного скоупу цього реєстру. Включена тут, бо це єдина інша відома штука серії <i>Guldkrone</i> і вона історично змінює тарифний режим ґлюкштадтської фази 1657–1660.<br><br> <b>Стопа щодо ґлюкштадтської форми:</b> при тій же пробі .917 повна вага знижена на ≈ 8,8 % (5,47 г замість 5,996 г) — чистий срібно-золотий еквівалент пропорційно падає. З кельнської марки сплаву тепер виходить ≈ 233,856 ÷ 5,47 ≈ 42,75 штук на марку проти 39 у Glückstadt. Оскільки форма не дає круглого цілого числа й тариф теж не відповідає 22-каратному повному вагому (3 Specie ≈ 18 Mark Dansk), монета фізично належить до власної стопи — у стовпці Δ її буде відмічено як «поза допуском» щодо канонічної ґлюкштадтської форми.

