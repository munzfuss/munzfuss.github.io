  verification_note:
    de: "Tarifmünze (§ 6): Daler-Nominaltarif liegt über dem reinen Goldinhalt — Christian IV.s 6-Daler-Klippe trägt nach Bruun «3.5 Ducats» Feingold (≈ 12,17 g empirisch) für einen 6-Daler-Tarif, d. h. ein Aufgeld von rund 40 %. Die Fraktion «6» nennt den Daler-Tarif (Münzaufschrift), die Δ-Spalte zeigt die Differenz zur Reichsdukatenfuß-Soll für 6 Dukaten Feingold (20,65 g) — Δ ≈ −41 % macht den Seigniorage-Aufgeld sichtbar. Schwester-Klippe (km-27, 8 Daler Hede-10) folgt demselben Muster bei ≈ −40 %.\n\nSieg-Ausgabe-Diskrepanz: Bruun (2024) zitiert Sieg-147; Hede c4h11 (online) zitiert Sieg-153 — vermutlich verschiedene Sieg-Ausgaben. Im Catalog beibehalten ist Sieg-147 nach Bruun."
    en: "Tarifmünze (§ 6): the Daler nominal tariff sits above the actual gold content — Christian IV's 6-Daler Klippe carries per Bruun «3.5 Ducats» fein gold (≈ 12.17 g empirically) for a 6-Daler tariff, i.e. a ~ 40 % premium. The fraction «6» names the Daler tariff (coin legend); the Δ column displays the gap vs the Reichsdukatenfuß Soll for 6 Ducats fein gold (20.65 g) — Δ ≈ −41 % makes the seigniorage premium visible. Sister Klippe (km-27, 8 Daler Hede-10) follows the same pattern at ≈ −40 %.\n\nSieg edition discrepancy: Bruun (2024) cites Sieg-147; Hede c4h11 (online) cites Sieg-153 — likely two different Sieg editions. The catalog retains Sieg-147 per Bruun."
    uk: "Tarifmünze (§ 6): Daler-номінальний тариф вище за реальний gold-content — 6-Daler-Klippe Christian IV містить за Bruun «3.5 Ducats» фейн-золота (≈ 12,17 г емпірично) під 6-Daler-тариф, тобто ~ 40 % сеньйораж-надбавки. Фракція «6» означає Daler-тариф (легенда на монеті); колонка Δ показує розрив до Reichsdukatenfuß-Soll за 6 Ducats фейн-золота (20,65 г) — Δ ≈ −41 % робить сеньйораж видимим. Sister-Klippe (km-27, 8 Daler Hede-10) слідує тому ж патерну при ≈ −40 %.\n\nРозбіжність Sieg-видання: Bruun (2024) цитує Sieg-147; Hede c4h11 (online) цитує Sieg-153 — імовірно різні видання Sieg. У каталозі лишено Sieg-147 за Bruun."
  metal_verified: true
  note:
    de: '6 Daler Klippe 1604 — Christian IV., Kopenhagen, Münzmeister Nicolaus Schwabe. Auflage 143 Exemplare (Bruun); EXCESSIVELY RARE. Goldlegierung (Hede c4h11: Bruttovægt 13,175 g · Finhed 0,923 · Finvægt 12,169 g). Der 6-Daler-Tarifkurs entsprach 3,5 Dukaten Reichsstandard (≈ 12,05 g Feingold; Tarifmünze).'
    en: '6 Daler Klippe 1604 — Christian IV, Copenhagen Mint, mintmaster Nicolaus Schwabe. Mintage 143 specimens (Bruun); EXCESSIVELY RARE. Gold alloy (Hede c4h11: Bruttovægt 13.175 g · Finhed 0.923 · Finvægt 12.169 g). The 6-Daler tariff corresponded to 3.5 Ducats at the Imperial standard (≈ 12.05 g fine gold; Tarifmünze).'
    uk: '6 Daler Klippe 1604 — Кристіан IV, Копенгаген, монетмайстер Nicolaus Schwabe. Тираж 143 екземпляри (Bruun); EXCESSIVELY RARE. Золотий сплав (Hede c4h11: Bruttovægt 13,175 г · Finhed 0,923 · Finvægt 12,169 г). Тарифний номінал 6 Daler відповідав 3,5 дукатам імперського стандарту (≈ 12,05 г чистого золота; Tarifmünze).'
