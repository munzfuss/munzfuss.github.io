fuss_periods:
  kronemont_chr_iv:
    pdate_label:
      de: 'Geltungsbereich: 1618 → 1624 · ca. 6 Jahre'
      en: 'Period of validity: 1618 → 1624 · ~6 years'
      uk: 'Період дії: 1618 → 1624 · ~6 років'
    hintergrund:
      de: 'Christian IVs kroner 1618–1624. Tarifmünze, 1618 als <i>Corona Danica</i> mit Anfangstarif 1½ Speciedaler eingeführt — eine fiskalische Maßnahme der Krone mit einem Seigniorage-Aufschlag von ca. 11 % über dem Silberwert<sup><a href="#ref8">[8]</a></sup>. Die Prägung endet 1624; im Folgejahr <b>1625</b> wird der Tarif offiziell auf 1⅓ Speciedaler gesenkt. Danach folgt eine 19-jährige Pause der Krone-Prägung biß zur Wiederaufnahme im 10½-Krone-Fuß (Glückstadt) 1644.<sup><a href="#ref1">[1]</a><a href="#ref2">[2]</a><a href="#ref3">[3]</a><a href="#ref4">[4]</a></sup>'
      en: 'Christian IV''s kroner 1618–1624. A tariff coin, introduced in 1618 as the <i>Corona Danica</i> at an initial tariff of 1½ Speciedaler — a Crown fiscal measure with a seigniorage premium of ca. 11 % above the silver value<sup><a href="#ref8">[8]</a></sup>. Production ends in 1624; in the following year, <b>1625</b>, the tariff is officially cut to 1⅓ Speciedaler. Thereafter a 19-year hiatus of Krone production follows, until the revival in the 10½-Krone-Fuß (Glückstadt) in 1644.<sup><a href="#ref1">[1]</a><a href="#ref2">[2]</a><a href="#ref3">[3]</a><a href="#ref4">[4]</a></sup>'
      uk: 'Christian IV''s kroner 1618–1624. Тарифна монета, запроваджена 1618 р. як <i>Corona Danica</i> за початковим тарифом 1½ Speciedaler — фіскальний інструмент Корони з сеньйораж­ною надбавкою бл. 11 % над срібною вартістю<sup><a href="#ref8">[8]</a></sup>. Карбування завершується 1624 р., наступного <b>1625</b> року тариф офіційно знижено до 1⅓ Speciedaler. Далі настає 19-річна перерва карбування Krone — аж до відновлення у 10½-Krone-Fuß (Glückstadt) 1644 р.<sup><a href="#ref1">[1]</a><a href="#ref2">[2]</a><a href="#ref3">[3]</a><a href="#ref4">[4]</a></sup>'
    details:
      de: "<p>Die Christian-IV.-Krone war keine Handelsmünze nach Silbergehalt, sondern eine fiskalische Tarifmünze: ihr Nennwert wurde vom König per Mandat über dem tatsächlichen Silberwert festgesetzt, die Differenz floß als Seigniorage in die Staatskasse<sup><a href=\"#ref8\">[8]</a></sup>.</p><p><b>Primärkanonische Hede-Formel</b><sup><a href=\"#ref4\">[4]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ Stück je 13¾-lötiger Marck</b> = 18,909 g rau bei .859 Feingehalt = 16,250 g fein je Krone. Die Bruchform (12,367 statt 12½) ergibt sich daraus, daß der Münzedikt 1618 den Fuß über die <b>Daler-Ausbringung</b> definiert — den nominellen Gesamtwert in Speciedaler aus einer feinen Marck Silber als Krone-Münzen. Bei Anfangstarif 1½ Specie pro Doppelkrone (= ¾ Specie pro Krone) ergeben 233,856 g Feinsilber 14,391 Krone, deren Nennwert sich auf 10,793 Speciedaler addiert (Hede H105<sup><a href=\"#ref4\">[4]</a></sup>). Nach der Forordning vom 14. Februar 1624 wird die Specie selbst auf 100 Skilling neu tarifiert; die physische Krone bleibt unverändert, aber dieselbe Marck Feinsilber bringt nach der neuen Specie-Skala nur noch 10,361 Speciedaler aus (Hede H124<sup><a href=\"#ref4\">[4]</a></sup>).</p><p>1618 wurde nur die 2 Krone (damals einfach «Krone» genannt) nach dieser Formel geprägt; ½, ¼ und ⅛ Krone des Jahres 1618 folgten einer leicht niedrigeren Münzfod. Ab 1619 prägt auch die ½ Krone nach der Hauptformel<sup><a href=\"#ref4\">[4]</a></sup>.</p><p>Spezialliteratur zur Christian-IV.-Phase: Hede / Schou (H105–H107, H124–H126); Bruun-Lots 13089 ff. (Stack's Bowers Auktion Part II, Zürich 14.–15. März 2025).</p>"
      en: "<p>The Christian IV Krone was not a trade coin valued by silver content but a fiscal tariff coin: its face value was set by royal mandate above the actual silver value, the gap accruing to the treasury as seigniorage<sup><a href=\"#ref8\">[8]</a></sup>.</p><p><b>Primary catalogue formula (Hede)</b><sup><a href=\"#ref4\">[4]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ pieces per 13¾-lødig mark</b> = 18.909 g rough at .859 fineness = 16.250 g fine per Krone. The fractional form (12.367 rather than 12½) follows from the 1618 mint edict defining the standard via the <b>daler output</b> — the total face value, expressed in Speciedaler, that one fine mark of silver yields once struck into Krone coin. At the initial tariff of 1½ Specie per Doppelkrone (= ¾ Specie per Krone), 233.856 g of fine silver yields 14.391 Krone, whose face values add up to 10.793 Speciedaler (Hede H105<sup><a href=\"#ref4\">[4]</a></sup>). After the Forordning of 14 February 1624 the Specie itself is re-rated to 100 Skilling; the physical Krone is unchanged, but on the new Specie scale the same fine mark now yields only 10.361 Speciedaler (Hede H124<sup><a href=\"#ref4\">[4]</a></sup>).</p><p>In 1618 only the 2 Krone (then simply called «Krone») was struck on this formula; the ½, ¼ and ⅛ Krone of 1618 followed a slightly lower Münzfod. From 1619 the ½ Krone also follows the main formula<sup><a href=\"#ref4\">[4]</a></sup>.</p><p>Specialist literature on the Christian IV phase: Hede / Schou (H105–H107, H124–H126); Bruun lots 13089 ff. (Stack's Bowers auction Part II, Zurich 14–15 March 2025).</p>"
      uk: "<p>Krone Кристіана IV не була торговельною монетою за вмістом срібла, а фіскальною тарифною: її номінал встановлювався королівським мандатом вище фактичної срібної вартості, різниця надходила до скарбниці як сеньйораж<sup><a href=\"#ref8\">[8]</a></sup>.</p><p><b>Першоджерельна Hede-формула</b><sup><a href=\"#ref4\">[4]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ штук з 13¾-lødig марки</b> = 18,909 г повної ваги за проби .859 = 16,250 г чистого на Krone. Дробова форма (12,367 замість 12½) випливає з того, що монетний едикт 1618 р. задавав стопу через <b>вихід у даллерах (daler-udbringning)</b> — сумарну номінальну вартість у Speciedaler, яку одна марка чистого срібла «приносила» при карбуванні в Krone-монети. За початкового тарифу 1½ Specie на Doppelkrone (= ¾ Specie на одну Krone) з 233,856 г чистого срібла виходить 14,391 Krone, сумарна номінальна вартість яких становить 10,793 Speciedaler (Hede H105<sup><a href=\"#ref4\">[4]</a></sup>). Після Forordning 14 лютого 1624 р. сам Specie перетарифовано на 100 Skilling; фізично Krone лишається без змін, але та сама марка чистого срібла за новою Specie-шкалою «приносить» уже лише 10,361 Speciedaler (Hede H124<sup><a href=\"#ref4\">[4]</a></sup>).</p><p>1618 р. за цією формулою карбувалась лише 2 Krone (тоді просто «Krone»); ½, ¼ та ⅛ Krone 1618 р. йшли за дещо нижчою møntfod. З 1619 р. ½ Krone теж переходить на головну формулу<sup><a href=\"#ref4\">[4]</a></sup>.</p><p>Спеціальна література по фазі Кристіана IV: Hede / Schou (H105–H107, H124–H126); лоти Bruun 13089 і далі (Stack's Bowers auction Part II, Цюрих 14–15 березня 2025).</p>"

  reichsdukatenfuss:
    pdate_label:
      de: 'Geltungsbereich (in Dänemark katalogisiert): 1738 → 1749 · drei Kopenhagen-Stücke; das Reich-weite Reichsdukatenfuß-Régime selbst gilt 1559 → 1871'
      en: 'Period catalogued (Denmark): 1738 → 1749 · three Copenhagen pieces; the empire-wide Reichsdukatenfuß standard itself runs 1559 → 1871'
      uk: 'Період каталогізації (Данія): 1738 → 1749 · три копенгагенські монети; сам загальноімперський Reichsdukatenfuß-стандарт чинний 1559 → 1871'
    hintergrund:
      de: 'Reichsdukatenfuß der Augsburger Reichsmünzordnung vom 19. August 1559: 67 Dukaten aus der feinen Cöllnischen Marck (233,856 g). Im Königreich Dänemark fortgeführt durch das gesamte 17.–18. Jahrhundert. Die hier erfaßten drei Stücke fallen in die Periode 1726–1771 mit der parallelen Etablierung des Courantdukat neben dem Reichsdukat.'
      en: 'Reichsdukatenfuß under the Augsburg Imperial Coinage Ordinance of 19 August 1559: 67 ducats from the fine Cologne mark (233.856 g). Continued in the Kingdom of Denmark throughout the 17th–18th century. The three pieces catalogued here fall within the period 1726–1771, when the Courantdukat is established alongside the Reichsdukat.'
      uk: 'Reichsdukatenfuß за Аугсбурзькою імперською монетною постановою 19 серпня 1559 р.: 67 дукатів з чистої кельнської марки (233,856 г). У Королівстві Данія дія тривала впродовж усього 17–18 ст. Три каталогізовані тут монети належать до періоду 1726–1771 рр., коли Courantdukat утверджується поряд із Reichsdukat.'

  courantdukatenfuss:
    pdate_label:
      de: "Geltungsbereich in Dänemark: 1714 (Frederik IV., Großer Nordischer Krieg) → 1796 (letzte Restprägung) · 82 Jahre Neuprägung; faktischer Zahlungsmittelstatus biß 1873 (Skandinavische Münzunion)"
      en: "In force in Denmark: 1714 (Frederik IV, Great Northern War) → 1796 (last restrike) · 82 years of new coinage; factual legal-tender status until 1873 (Scandinavian Monetary Union)"
      uk: "Дія в Данії: 1714 (Frederik IV, Велика Північна війна) → 1796 (останнє рестрайк-карбування) · 82 роки нових емісій; фактичний статус законного платіжного засобу до 1873 (Скандинавська монетна унія)"
    hintergrund:
      de: |
        Spezifisch dänische tarif-tragende Goldlinie, die in <b>zwei metrischen Phasen</b> verläuft. <b>Phase I — Frederik IV. (1714–1717):</b> Erstprägung als Kriegsfinanzierungsmaßnahme im Großen Nordischen Krieg, 81½ Stück / rauer Cölln. Marck, 21 Karat (.875), 2,511 g Feingold; Tarif 12 Mark Kurant = 2 Rigsdaler Courant. Forordning <b>9. Juli 1727</b> senkt Tarif auf 11 Mark («reducerede Kurant-Dukater»); Forordning <b>4. Juli 1757</b> ruft die alten Stücke zur Einschmelzung ein.<sup><a href="#ref36">[36]</a></sup> <b>Phase II — Frederik V. Reform (1757–1796):</b> im Juni 1757 neuer Standard 75 Stück / Marck, 3,118 g rau, 2,72832 g fein; 12-Mark-Tarif zurück. Massenprägung 1757–1765 in Kopenhagen: <b>≈ 3 030 742 Stück</b> (Finanzkollegium 1791) — die größte Goldmünzproduktion in der dänischen Geschichte (≈ 8,3 t Feingold).<sup><a href="#ref36">[36]</a></sup> Christian-VII.-Geburtstagsstrich 27. Januar 1771 (131 Stück Kopenhagen). <b>Plakat 2. Dezember 1782</b> erlaubt jedermann die freie Goldablieferung zur Kurantdukat-Prägung («<i>Gold aus der rauen Marck zu 75 Stück bei 21 Karat ausprägen</i>»)<sup><a href="#ref38">[38]</a></sup> — Hauptphase 1781–1796 in Altona + Kopenhagen, ≈ 237 000 Stück. Plakat-Widerruf 1795; letzte Prägung 1796 in Altona (≈ 30 700 Stück mit 1785-Datum).<sup><a href="#ref36">[36]</a></sup> Der Statsbankerot vom 5. Januar 1813 reformiert nur die Silber-Courantlinie<sup><a href="#ref40">[40]</a></sup>; der Kurantdukat behält rechtlich Zahlungsmittelstatus zum 12-Mark-Tarif biß zur Skandinavischen Münzunion 1873.
      en: |-
        A specifically Danish tariff-bearing gold line in <b>two metric phases</b>. <b>Phase I — Frederik IV (1714–1717):</b> first issue as a war-finance measure in the Great Northern War; 81½ pieces per rough Cologne Mark, 21 carats (.875), 2.511 g fine gold; tariff 12 Mark Kurant = 2 Rigsdaler Courant. The Forordning of <b>9 July 1727</b> reduces the tariff to 11 Mark («reducerede Kurant-Dukater»); the Forordning of <b>4 July 1757</b> calls the old pieces in for melting.<sup><a href="#ref36">[36]</a></sup> <b>Phase II — Frederik V reform (1757–1796):</b> in June 1757 a new standard of 75 pieces per Mark, 3.118 g rough, 2.72832 g fine; the 12-Mark tariff is restored. Mass coinage 1757–1765 at Copenhagen: <b>≈ 3,030,742 pieces</b> (Finanzkollegium 1791) — the largest gold-coin production in Danish history (≈ 8.3 t fine gold).<sup><a href="#ref36">[36]</a></sup> Christian-VII-birthday strike on 27 January 1771 (131 pieces, Copenhagen). <b>Plakat of 2 December 1782</b> permits anyone to deliver gold freely for Kurantdukat coinage («<i>gold to be coined at 75 pieces per rough Mark of 21 carats</i>»)<sup><a href="#ref38">[38]</a></sup> — the main phase 1781–1796 in Altona + Copenhagen, ≈ 237,000 pieces. The plakat is revoked in 1795; the final issue is 1796 in Altona (≈ 30,700 pieces with 1785 dies).<sup><a href="#ref36">[36]</a></sup> The Statsbankerot of 5 January 1813 reforms only the silver Courant line<sup><a href="#ref40">[40]</a></sup>; the Kurantdukat retains legal-tender status at the 12-Mark tariff until the Scandinavian Monetary Union of 1873.
      uk: |-
        Специфічно данська тариф-несуча золота лінія у <b>двох метричних фазах</b>. <b>Фаза I — Frederik IV (1714–1717):</b> перша емісія як засіб фінансування Великої Північної війни; 81½ штук з повної Кельнської марки, 21 карат (.875), 2,511 г чистого золота; тариф 12 Mark Kurant = 2 Rigsdaler Courant. Forordning <b>9 липня 1727</b> знижує тариф до 11 Mark («reducerede Kurant-Dukater»); Forordning <b>4 липня 1757</b> кличе старі монети на переплав.<sup><a href="#ref36">[36]</a></sup> <b>Фаза II — реформа Frederik V (1757–1796):</b> у червні 1757 новий стандарт 75 штук з марки, 3,118 г повної, 2,72832 г чистого; тариф 12 Mark відновлено. Масове карбування 1757–1765 у Копенгагені: <b>≈ 3 030 742 шт.</b> (Finanzkollegium 1791) — найбільше виробництво золотих монет в історії Данії (≈ 8,3 т чистого золота).<sup><a href="#ref36">[36]</a></sup> Меморіальний strike Christian VII 27 січня 1771 (131 шт. Копенгаген). <b>Plakat 2 грудня 1782</b> дозволяє будь-кому вільно здавати золото на карбування Kurantdukat («<i>золото карбувати по 75 штук з повної марки при 21 караті</i>»)<sup><a href="#ref38">[38]</a></sup> — головна фаза 1781–1796 в Альтоні + Копенгагені, ≈ 237 000 шт. Plakat скасовано 1795; останнє карбування 1796 в Альтоні (≈ 30 700 шт. зі штемпелями 1785).<sup><a href="#ref36">[36]</a></sup> Statsbankerot 5 січня 1813 реформує лише срібну Courant-лінію<sup><a href="#ref40">[40]</a></sup>; Kurantdukat юридично зберігає статус законного платіжного засобу за 12-Mark-тарифом до Скандинавської монетної унії 1873.
    closing_label:
      de: "Zusammenfassung · 82 Jahre Neuprägung, biß 1873 Tarif-Zahlungsmittel"
      en: "Summary · 82 years of new coinage, legal-tender at tariff until 1873"
      uk: "Підсумок · 82 роки нового карбування, до 1873 тарифний платіжний засіб"
    closing:
      de: |
        Der Courantdukatenfuß ist die <b>spezifisch dänische Antwort</b> auf das Problem einer domestizierten Goldwährung neben dem Reichsdukat: ein tariffierter, niedriger probiger (.875) Dukat zum festen 12-Mark-Wert, gegenüber dem höheren-probigen (.986) freien Reichsdukat. Über die ganze Phase II (1757–1796) ist er die <b>«almindeligst gangbare Guldmønt»</b> in Dänemark<sup><a href="#ref36">[36]</a></sup> — dominantes Goldgeld der Krone. In den Herzogtümern Schleswig-Holstein dient er ab 1771 als territoriale Goldversorgung der Altonaer Münze.<sup><a href="#ref37">[37]</a></sup> Keine formale Demonetisierungsverordnung; faktischer Endpunkt 1873 mit der Krone-Reform.
      en: |-
        The Courantdukatenfuß is the <b>specifically Danish answer</b> to the problem of a domesticated gold currency alongside the Reichsdukat: a tariffed, lower-fineness (.875) ducat at the fixed 12-Mark value, set against the higher-fineness (.986) free-floating Reichsdukat. Throughout Phase II (1757–1796) it is the <b>«almindeligst gangbare Guldmønt»</b> in Denmark<sup><a href="#ref36">[36]</a></sup> — the Crown's dominant gold currency. In the duchies of Schleswig-Holstein it serves from 1771 onward as the Altona mint's territorial gold supply.<sup><a href="#ref37">[37]</a></sup> No formal demonetisation ordinance; the factual endpoint is 1873 with the Krone reform.
      uk: |-
        Courantdukatenfuß — <b>специфічно данська відповідь</b> на проблему домашньої золотої валюти поруч з Reichsdukat: тарифний дукат із нижчою пробою (.875) за фіксованою вартістю 12 Mark проти вільноторгового вищопробного (.986) Reichsdukat. Протягом усієї фази II (1757–1796) він є <b>«almindeligst gangbare Guldmønt»</b> у Данії<sup><a href="#ref36">[36]</a></sup> — домінантна золота валюта Корони. У герцогствах Шлезвіг-Гольштейн з 1771 р. слугує територіальним золотим забезпеченням Альтонського монетного двору.<sup><a href="#ref37">[37]</a></sup> Формальної демонетизаційної постанови нема; фактичний кінець — 1873 р. з реформою Krone.

  pistolenfuss:
    pdate_label:
      de: "Geltungsbereich in Dänemark: 1771 (Christian VII., Altonaer Münze) → 1870 (Christian IX., letzte Christian-d'or-Prägung) · 99 Jahre"
      en: "In force in Denmark: 1771 (Christian VII, Altona mint) → 1870 (Christian IX, last Christian d'or issue) · 99 years"
      uk: "Дія в Данії: 1771 (Christian VII, монетний двір Альтона) → 1870 (Christian IX, остання емісія Christian d'or) · 99 років"
    hintergrund:
      de: |
        Pistolen-Goldlinie nach norddt. <b>5-Thaler-Tarif</b>-Tradition (Vorbild Wilhelm d'or 1737, Friedrich d'or 1741<sup><a href="#ref32">[32]</a></sup>). In Dänemark eingeführt 1771 unter Christian VII. an der neu eröffneten Altonaer Münze als <b>Christian d'or</b> nach französischem Louis-d'or-Vorbild<sup><a href="#ref33">[33]</a></sup> — derselbe Standard wie der reduzierte preußische Friedrich d'or (130/144 Probe ≈ 903 ‰, 6,03 g Feingold, 5-Speciedaler-Tarif = 12 Mark Dansk-Anteil). Die Linie wird kontinuierlich unter <b>fünf Regenten</b> fortgeführt: Christian VII. (1771–1808), Frederik VI. (1808–1839, von 1808 als Frederik d'or — fortgesetzt trotz Statsbankerot 1813), Christian VIII. (1839–1848), Frederik VII. (1848–1863), Christian IX. (1863–1870, letzte Prägung 1870). Verwendung «<i>mest til internationale betalinger</i>»<sup><a href="#ref33">[33]</a></sup> — Außenhandelsmünze, kein gesetzliches Zahlungsmittel im Inland. Ende: dänisches Münzgesetz 1873 (Skandinavische Münzunion) ersetzt Speciedaler / d'or durch die Krone.
      en: |-
        Pistole gold line of the North-German <b>5-thaler tariff</b> tradition (modelled on the Wilhelm d'or of 1737 and Friedrich d'or of 1741<sup><a href="#ref32">[32]</a></sup>). Introduced in Denmark in 1771 under Christian VII at the newly opened Altona mint as the <b>Christian d'or</b>, on the French Louis-d'or model<sup><a href="#ref33">[33]</a></sup> — at the same standard as the reduced Prussian Friedrich d'or (130/144 fineness ≈ 903 ‰, 6.03 g fine gold, 5-Speciedaler tariff = 12 Mark Dansk-share). The line continues without interruption under <b>five rulers</b>: Christian VII (1771–1808), Frederik VI (1808–1839, from 1808 as the Frederik d'or — kept on through the Statsbankerot of 1813), Christian VIII (1839–1848), Frederik VII (1848–1863), Christian IX (1863–1870, last issue 1870). Used «<i>mest til internationale betalinger</i>»<sup><a href="#ref33">[33]</a></sup> — a foreign-trade coin, not domestic legal tender. End: the Danish Coinage Act of 1873 (Scandinavian Monetary Union) replaces the Speciedaler / d'or with the Krone.
      uk: |-
        Pistolen-золота лінія північно-німецької тарифної традиції <b>5 талерів</b> (зразки Wilhelm d'or 1737 і Friedrich d'or 1741<sup><a href="#ref32">[32]</a></sup>). У Данії запроваджено 1771 р. за Christian VII у новому монетному дворі Альтони як <b>Christian d'or</b> за зразком французького Louis d'or<sup><a href="#ref33">[33]</a></sup> — за тим самим стандартом, що й редукований прусський Friedrich d'or (проба 130/144 ≈ 903 ‰, 6,03 г чистого золота, тариф 5 Speciedaler = частка 12 Mark Dansk). Лінія безперервно продовжується за <b>п'яти регентів</b>: Christian VII (1771–1808), Frederik VI (1808–1839, з 1808 як Frederik d'or — продовжено попри Statsbankerot 1813), Christian VIII (1839–1848), Frederik VII (1848–1863), Christian IX (1863–1870, остання емісія 1870). Вживалися «<i>mest til internationale betalinger</i>»<sup><a href="#ref33">[33]</a></sup> — як зовнішньоторговельна, не як внутрішній законний платіжний засіб. Кінець: данський Закон про монету 1873 (Скандинавська монетна унія) замінює Speciedaler / d'or на Krone.


  9_thaler:
    pdate_label:
      de: "Geltungsbereich in Holstein: 1566 (Augspurger Reichsmünz-Abschied) → 1625 (letzte Prägung; ab 1622 parallel vom 9¼-Fuß abgelöst) · 59 Jahre"
      en: "In force in Holstein: 1566 (Augsburg Imperial Mint Decree) → 1625 (last strike; from 1622 already being superseded in parallel by the 9¼-Fuß) · 59 years"
      uk: "Дія в Гольштейні: 1566 (Авґсбурзький імперський монетний ордонанс) → 1625 (останнє карбування; з 1622 паралельно витісняється 9¼-Fuß) · 59 років"
    hintergrund:
      de: |
        Reichsstandard nach dem Augspurger Reichsmüntz-Abschied vom 30. Mai 1566 — verbindlich für sämtliche Reichsstände. In Holstein-Gottorp dominierte er unter Adolf I., Johann Adolf und Friedrich III.; Münzstätten Glückstadt und Tönning prägten nach diesem Fuß Thaler Species, Mark-lübisch-Theilstücke und Schillinge. Während der Kipper-Wipper-Krise (1620–1623) brach das einheitliche Reichsmünzwesen zusammen — bereits ab 1622 (Friedrich III. von Gottorp, Glückstadt) setzt sich der leichtere 9¼-Thaler-Fuß als Großsilberstandard durch, die letzte holsteinische 9-Fuß-Prägung erfolgt 1625 (Hans Jr. von Sonderburg, 2 Schilling Lübisch). <b>Über Holstein hinaus blieb der 9-Fuß als Banktauschmünze in Kraft:</b> Hamburg führte ihn als <i>Bank-Mark</i> der Hamburger Bank weiter, Lübeck als <i>Speciemark</i> — beide bis zur Reichsmünzreform 1875.
      en: |-
        Imperial standard following the Augsburg Imperial Mint Decree of 30 May 1566 — binding on all imperial estates. In Holstein-Gottorp it dominated under Adolf I, Johann Adolf and Friedrich III; the Glückstadt and Tönning mints struck Thaler Species, Mark-lübisch sub-units and Schilling petty coins on this standard. The Kipper-Wipper crisis (1620–1623) collapsed the unified imperial coinage; from 1622 onward (Friedrich III of Gottorp, Glückstadt) the lighter 9¼-Thaler-Fuß took over as the large-silver standard, and the last Holstein 9-Fuß strike falls in 1625 (Hans Jr. of Sonderburg, 2 Schilling Lübisch). <b>Beyond Holstein the 9-Fuß remained in force as bank-exchange money:</b> Hamburg kept it as the <i>Bank-Mark</i> of the Hamburger Bank, Lübeck as the <i>Speciemark</i> — both until the imperial coinage reform of 1875.
      uk: |-
        Імперський стандарт за Авґсбурзьким імперським монетним ордонансом 30 травня 1566 р. — обов'язковий для всіх імперських станів. У Гольштейн-Ґотторпі домінував за Адольфа I, Йоганна Адольфа й Фредеріка III; монетні двори Glückstadt і Tönning карбували за цим стандартом Thaler Species, частки Mark lübisch і дрібні Schilling-монети. Криза Kipper-Wipper (1620–1623) зруйнувала єдину імперську монетну систему — вже з 1622 (Фредерік III Ґотторпський, Glückstadt) у Гольштейні утверджується легший 9¼-Thaler-Fuß як великосрібний стандарт, а останнє 9-Fuß-карбування припадає на 1625 р. (Hans Jr. Sonderburg, 2 Schilling Lübisch). <b>Поза Гольштейном 9-Fuß продовжував існувати як банковий рахунок:</b> Гамбург тримав його як <i>Bank-Mark</i> Гамбурзького банку, Любек — як <i>Speciemark</i>; обидва до імперської монетної реформи 1875 р.
    closing_label:
      de: "Übergang zum 9¼-Fuß (Thaler Species) ab 1622, letzte Holstein-Prägung 1625"
      en: "Transition to the 9¼-Fuß (Thaler Species) from 1622; last Holstein strike 1625"
      uk: "Перехід до 9¼-Fuß (Thaler Species) з 1622; останнє карбування в Гольштейні — 1625"
    closing:
      de: |
        Der 9-Thaler-Fuß war kurzlebig in Holstein selbst (Adolf I. → Hans Jr. Sonderburg, letzte Prägung 1625; ab 1622 vom 9¼-Fuß abgelöst), bleibt aber <b>außerhalb Holsteins als Hamburger Bank-Mark und Lübecker Speciemark Rechnungseinheit biß 1875</b>. Die holsteinischen Reichsthaler unter Johann Adolf gehören zu den frühesten dokumentierten Großsilbermünzen der Region und bilden die Grundlage für die spätere 9¼-Fuß-Tradition.
      en: |-
        The 9-Thaler-Fuß was short-lived in Holstein itself (Adolf I → Hans Jr. of Sonderburg, last strike 1625; superseded by the 9¼-Fuß from 1622), but it survived <b>beyond Holstein as the Hamburg Bank Mark and the Lübeck Speciemark unit of account until 1875</b>. The Holstein Reichsthaler under Johann Adolf are among the earliest documented large-silver coins in the region and form the foundation for the later 9¼-Fuß tradition.
      uk: |-
        9-Thaler-Fuß у самому Гольштейні був недовговічним (Адольф I → Hans Jr. Sonderburg, останнє карбування 1625; з 1622 витіснений 9¼-Fuß), однак <b>поза Гольштейном залишався розрахунковою одиницею як Гамбурзька Bank-Mark і Любецька Speciemark до 1875 р.</b> Гольштинські рейхсталери за Йоганна Адольфа належать до найдавніших задокументованих великосрібних монет регіону і становлять основу пізнішої традиції 9¼-Fuß.

  9_25_thaler:
    pdate_label:
      de: "Geltungsbereich in Holstein: 1622 (Friedrich III.) → 24. Aug. 1866 (preuß. Annexion) · 244 Jahre"
      en: "In force in Holstein: 1622 (Friedrich III) → 24 Aug. 1866 (Prussian annexation) · 244 years"
      uk: "Дія в Гольштейні: 1622 (Фредерік III) → 24 серпня 1866 (прусська анексія) · 244 роки"
    hintergrund:
      de: |
        Großsilbermünze nach dänisch-holsteinischer Tradition; etwas leichter als der Reichs-9-Fuß. Durchgehend stabil seit 1622 (Friedrich III. von Gottorp, Glückstadt) biß zur preußischen Annexion 1867. Mit der Schleswig-Holsteinischen Reform von 1788 (siehe Phase C) wird er zur Alleingrundmünze aller holsteinischen Courant-Nominale.
      en: |-
        A large silver coin in the Danish-Holstein tradition; slightly lighter than the imperial 9-Fuß. Stable without interruption since 1622 (Friedrich III of Gottorp, Glückstadt) until the Prussian annexation of 1867. With the Schleswig-Holstein reform of 1788 (see Phase C) it becomes the sole base coin of all Holstein Courant denominations.
      uk: |-
        Велика срібна монета дансько-гольштинської традиції; дещо легша за імперський 9-Fuß. Безперервно стабільна з 1622 р. (Фредерік III Ґотторпський, Glückstadt) до прусської анексії 1867 р. З Шлезв.-Гольштинською реформою 1788 р. (див. Фазу C) стає єдиною базовою монетою для всіх гольштинських Courant-номіналів.
    closing_label:
      de: "Zusammenfassung · 240 Jahre Geltung"
      en: "Summary · 240 years in force"
      uk: "Підсумок · 240 років чинності"
    closing:
      de: |
        Der 9¼-Thaler-Fuß ist der <b>längstlebige und stabilste</b> Silberstandard in der holsteinischen Geldgeschichte. Über politische Umwälzungen hinweg (Gottorp-Vereinigung 1773, Staatsbankrott 1813, mehrere Herrscherwechsel, Kondominium 1864<sup><a href="#ref11">[11]</a></sup>) blieb der Feingehalt von 25,28173 g konstant. Erst die preußische Annexion 1866 beendet seine Funktion als gesetzliches Zahlmittel. Numismatisch wirkt er biß 1907 nach, als der letzte Vereinsthaler (nachfolger-Fuß) ausser Kurs gesetzt wird.
      en: |-
        The 9¼-Thaler-Fuß is the <b>longest-lived and most stable</b> silver standard in Holstein's monetary history. Through every political upheaval (the Gottorp union of 1773, the state bankruptcy of 1813, several royal successions, the condominium of 1864<sup><a href="#ref11">[11]</a></sup>) the fine weight of 25.28173 g remained unchanged. Only the Prussian annexation of 1866 ended its function as legal tender. Numismatically it lived on until 1907, when the last Vereinsthaler (its successor standard) was withdrawn from circulation.
      uk: |-
        9¼-Thaler-Fuß — <b>найдовговічніший і найстабільніший</b> срібний стандарт у грошовій історії Гольштейну. Через усі політичні переломи (обʼєднання з Готторпом 1773, державне банкрутство 1813, кілька зміни правителів, кондомініум 1864<sup><a href="#ref11">[11]</a></sup>) чиста вага 25,28173 г залишалася незмінною. Лише прусська анексія 1866 поклала край його статусу законного платіжного засобу. Нумізматично він діяв до 1907 року, коли останній Vereinsthaler (стопа-наступник) було вилучено з обігу.

  kronemont:
    pdate_label:
      de: "Geltungsbereich: 1644 → 1696 · ca. 52 Jahre"
      en: "Period of validity: 1644 → 1696 · ~52 years"
      uk: "Період дії: 1644 → 1696 · ~52 років"
    hintergrund:
      de: |-
        Silberne Tarifmünze des dänisch-norwegischen Verbunds. Die Krone-Tarifprägung beginnt 1618 unter Christian IV. mit der <i>Corona Danica</i> (eigene Münzformel, höhere Lötigkeit und höherer Tarif pro Krone als der spätere 10½-Krone-Fuß). 1644 wird in Glückstadt während des Torstenson-Krieges (1643–1648) die <b>Hebræermønt</b> ausgegeben — eine Kriegsmünze mit deutlich unterwertigem Silbergehalt, deren Feingehalt absichtlich verschleiert wurde; eine formelle Münzfuß-Ordnung lag dieser Phase nicht zugrunde<sup><a href="#ref7">[7]</a></sup>. Der reguläre <b>10½-Krone-Fuß</b> wird formell erst durch die Münzordnung Christians V. vom <b>22. März 1671</b> festgelegt: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» je Marck Feinsilber<sup><a href="#ref6">[6]</a></sup>. Dieselbe Ordnung verankert die Speciemønt mit 9¼ rd. je Marck als Hauptstandard; die Krone gilt ausdrücklich als untergeordnete, sekundäre Münzfuß-Stufe und erreicht zu keiner Zeit Parität mit dem Specie als Primärstandard<sup><a href="#ref6">[6]</a></sup>. Im Tagesumlauf verdrängte die übertarifierte Krone den Speciedaler nach Greshamschem Mechanismus: gute Specietaler wurden für Auslandszahlungen einbehalten und gelangten kaum in den inländischen Verkehr<sup><a href="#ref4">[4]</a></sup><sup><a href="#ref8">[8]</a></sup>.
      en: |-
        Silver tariff coin of the Danish-Norwegian composite state. Krone tariff coinage begins in 1618 under Christian IV with the <i>Corona Danica</i> (a separate coin formula, with higher fineness and a higher per-Krone tariff than the later 10½-Krone-Fuß). In 1644, during the Torstenson War (1643–1648), the <b>Hebræermønt</b> is issued at Glückstadt — a war coinage substantially under-weight, with the fineness deliberately concealed; this phase rested on no formal Münzfuß ordinance<sup><a href="#ref7">[7]</a></sup>. The regular <b>10½-Krone-Fuß</b> is formally established only by Christian V's Mint Ordinance of <b>22 March 1671</b>: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» per mark of fine silver<sup><a href="#ref6">[6]</a></sup>. The same ordinance anchors Speciemønt at 9¼ rd. per mark as the principal standard; the Krone is explicitly a subordinate, secondary Münzfuß tier and never achieves parity with Specie as a primary standard<sup><a href="#ref6">[6]</a></sup>. In day-to-day circulation the over-tariffed Krone displaced the Speciedaler by Gresham's mechanism: good Specie was held back for foreign payments and scarcely entered domestic exchange<sup><a href="#ref4">[4]</a></sup><sup><a href="#ref8">[8]</a></sup>.
      uk: |-
        Срібна тарифна монета Королівства Данії і Норвегії. Тарифне карбування Krone розпочинається 1618 р. за Кристіана IV з <i>Corona Danica</i> (окрема монетна формула, вища проба і вищий тариф на одну Krone, ніж пізніший 10½-Krone-Fuß). У 1644 р. під час війни Торстенсона (1643–1648) у Glückstadt випускається <b>Hebræermønt</b> — воєнна монета з суттєво недоваженим вмістом срібла, пробу свідомо приховано; формальна Münzfuß-постанова в основу цієї фази не покладена<sup><a href="#ref7">[7]</a></sup>. Регулярний <b>10½-Krone-Fuß</b> формально встановлюється лише Монетною постановою Кристіана V від <b>22 березня 1671 р.</b>: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» з марки чистого срібла<sup><a href="#ref6">[6]</a></sup>. У тій самій постанові Speciemønt закріплено за 9¼ rd. з марки як головний стандарт; Krone виразно є підпорядкованим, вторинним рівнем Münzfuß і ніколи не досягає паритету зі Specie як первинним стандартом<sup><a href="#ref6">[6]</a></sup>. У повсякденному обігу надтарифікована Krone витіснила Speciedaler за механізмом Грешема: добротні Specie притримували для зовнішньоторговельних розрахунків і вони майже не потрапляли у внутрішній обіг<sup><a href="#ref4">[4]</a></sup><sup><a href="#ref8">[8]</a></sup>.
    details:
      de: |
        <p>Der Anfangstarif (1 Krone = 1½ Speciedaler) bedeutete eine Aufschlag von ca. 11 % über dem Silberwert<sup><a href="#ref8">[8]</a></sup>; der königliche Wahlspruch <b>RFP</b> (regna firmat pietas — «Frömmigkeit stärkt die Reiche») wurde im Volksmund daraufhin als <b>R(iget) F(attes) P(enge)</b> — «Dem Reich fehlt Geld» — gelesen<sup><a href="#ref5">[5]</a></sup>. 1625 sank der Tarif auf 1⅓ Specie; um 1670 stabilisierte ihn Christian V. auf <b>⅔ Specie</b> = 2 Marck Danske, eine Wertigkeit, die fortan auf den Münzen explizit als «<b>2 MARCK</b>» eingeprägt erscheint.</p>
        <p>Geprägt wurde an der Kopenhagener Hauptmünze und ab 1644 dominant in Glückstadt. Die Serie endet 1696. Mit der Forordning vom 15./31. Juli 1726 (Rigsdaler Courant nach Kurantmøntfod) verliert das Krone-Tarif-System seine Funktion als Hauptträger des Geldumlaufs zugunsten einer Metalläquivalenz-Logik<sup><a href="#ref4">[4]</a></sup>.</p>
        <p>Die Müntzfuß-Werte folgen aus der Münzordnung 1671: 22,272 g Raugewicht × 10,5 = 233,856 g = 1 Cöllnische Marck. Der Feingehalt entspricht der kanonischen Loth-Grän-Stufe ⁴³⁄₆₄ = 10 Loth 12 Grän = .671875 (Numista führt .671 als gerundete Form). Belegexemplare: N#111284, N#111285, N#108760, N#108735.</p>
        <p>Spezialliteratur zur Glückstadter Phase: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>
      en: |-
        <p>The initial tariff (1 Krone = 1½ Speciedaler) implied a premium of ca. 11 % above the silver value<sup><a href="#ref8">[8]</a></sup>; the royal motto <b>RFP</b> (regna firmat pietas — «piety strengthens kingdoms») was therefore reread in folk parlance as <b>R(iget) F(attes) P(enge)</b> — «the realm lacks money»<sup><a href="#ref5">[5]</a></sup>. In 1625 the tariff fell to 1⅓ Specie; around 1670 Christian V stabilised it at <b>⅔ Specie</b> = 2 Marck Danske, a parity which thereafter appears explicitly on the coins as «<b>2 MARCK</b>».</p>
        <p>Striking took place at the Copenhagen royal mint and, from 1644 onward, predominantly at Glückstadt. The series ends in 1696. With the Forordning of 15/31 July 1726 (Rigsdaler Courant on the Kurantmøntfod) the Krone tariff system loses its function as principal medium of circulation in favour of a metal-equivalence logic<sup><a href="#ref4">[4]</a></sup>.</p>
        <p>The Müntzfuß values follow from the 1671 ordinance: 22.272 g rough × 10.5 = 233.856 g = 1 Cologne mark. The fineness matches the canonical Loth-Grän step ⁴³⁄₆₄ = 10 Loth 12 Grän = .671875 (Numista gives .671 as a rounded form). Reference specimens: N#111284, N#111285, N#108760, N#108735.</p>
        <p>Specialist literature on the Glückstadt phase: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>
      uk: |-
        <p>Початковий тариф (1 Krone = 1½ Speciedaler) означав надбавку бл. 11 % над срібною вартістю<sup><a href="#ref8">[8]</a></sup>; королівський девіз <b>RFP</b> (regna firmat pietas — «побожність зміцнює царства») у народі переосмислили як <b>R(iget) F(attes) P(enge)</b> — «Державі бракує грошей»<sup><a href="#ref5">[5]</a></sup>. 1625 року тариф знижено до 1⅓ Specie; близько 1670 року Кристіан V стабілізував його на рівні <b>⅔ Specie</b> = 2 Marck Danske — паритет, який відтоді з'являється на монетах явно як «<b>2 MARCK</b>».</p>
        <p>Карбування здійснювалося на Копенгагенському королівському монетному дворі та з 1644 р. — переважно у Glückstadt. Серія завершується 1696 р. З Forordning 15/31 липня 1726 р. (Rigsdaler Courant за Kurantmøntfod) тарифна система Krone втрачає роль головного носія грошового обігу на користь логіки еквівалентності металу<sup><a href="#ref4">[4]</a></sup>.</p>
        <p>Значення Müntzfuß випливають з постанови 1671 р.: 22,272 г повної ваги × 10,5 = 233,856 г = 1 кельнська марка. Проба збігається з канонічною точкою Loth-Grän ⁴³⁄₆₄ = 10 Loth 12 Grän = .671875 (Numista наводить .671 як округлену форму). Зразки-приклади: N#111284, N#111285, N#108760, N#108735.</p>
        <p>Спеціальна література по ґлюкштадтській фазі: Sven Aagaard, <i>Christian V kronemønt — Glückstadt 1671–1696</i> (2022).</p>

  kronemont_fine:
    pdate_label:
      de: 'Geltungsbereich: 1693 → 1771 (Kopenhagener Hauptmünze) · ältere Bestände kursierten biß zum Statsbankerot 5. Januar 1813'
      en: 'Period of validity: 1693 → 1771 (Copenhagen royal mint) · older stocks remained in circulation until the Statsbankerot of 5 January 1813'
      uk: 'Період дії: 1693 → 1771 (Копенгагенський королівський монетний двір) · старі запаси в обігу до Statsbankerot 5 січня 1813'
    hintergrund:
      de: |
        <b>13-Krone-Fuß («Feine Krone»)</b> — Kopenhagener Sonderstandard, etabliert durch das <b>Reskript vom 31. Dezember 1692</b> Christians V.: aus einer feinen Cöllnischen Marck (233,856 g) sollten <b>13 Specieskronen</b> ausgeprägt werden, was einem Feingewicht von ≈ 14,98 g je Krone entspricht. Geprägt ausschließlich an der Kopenhagener Hauptmünze 1693–1771; läuft chronologisch parallel zur holsteinischen Glückstadter 10½-Krone-Fuß-Phase (1644–1696) und löst diese als Hauptträger der Krone-Tarifprägung in Dänemark ab. Im Gegensatz zur Glückstadter «Groben Krone» trägt die «Feine Krone» einen leicht höheren Feingehalt (≈ 14,98 g vs. 14,964 g) und verzichtet auf die Glückstadter Tradition der Tarif-Reduktionen — der ⅔-Speciedaler-Tarif aus 1670+ wird übernommen.<br>
        <b>Hinweis:</b> derzeit liegen für diese Sektion noch keine katalogisierten Münzen im Datensatz vor; die Sektion ist als Platzhalter eingerichtet und wird bei künftiger Detail-Bearbeitung mit konkreten Belegtypen aus Hede / Bruun / IKMK København befüllt.
      en: |
        <b>13-Krone-Fuß («Fine Crown»)</b> — a Copenhagen-specific standard established by Christian V's <b>Reskript of 31 December 1692</b>: <b>13 Specieskronen</b> were to be struck from one fine Cologne mark (233.856 g), corresponding to a fine weight of ≈ 14.98 g per Krone. Struck exclusively at the Copenhagen royal mint 1693–1771; chronologically parallel to the Holstein-side Glückstadt 10½-Krone-Fuß phase (1644–1696), which it replaces as the principal vehicle of Krone tariff coinage in Denmark. Unlike the Glückstadt «Coarse Krone», the «Fine Crown» carries a slightly higher fine weight (≈ 14.98 g vs. 14.964 g) and dispenses with the Glückstadt tradition of tariff reductions — the ⅔-Speciedaler tariff from 1670 onward is carried forward.<br>
        <b>Note:</b> no catalogued coins for this section are present in the dataset yet; the section is set up as a placeholder and will be populated with concrete reference types from Hede / Bruun / IKMK København in future detailed work.
      uk: |
        <b>13-Krone-Fuß («Тонка Крона»)</b> — копенгагенський особливий стандарт, встановлений <b>Рескриптом 31 грудня 1692 р.</b> Кристіана V: з однієї марки чистого срібла кельнської ваги (233,856 г) мали карбуватись <b>13 Specieskronen</b>, що дає чисту вагу ≈ 14,98 г на одну Krone. Карбувався виключно на Копенгагенському королівському монетному дворі 1693–1771; хронологічно паралельний гольштинській ґлюкштадтській фазі 10½-Krone-Fuß (1644–1696) і змінює її як головний носій тарифного карбування Krone в Данії. На відміну від ґлюкштадтської «Грубої Крони», «Тонка Крона» має дещо вищу чисту вагу (≈ 14,98 г проти 14,964 г) і відмовляється від ґлюкштадтської традиції тарифних знижень — тариф ⅔ Speciedaler з 1670+ зберігається.<br>
        <b>Примітка:</b> наразі в наборі даних немає каталогізованих монет для цієї секції; секція налаштована як заготовка і буде наповнена конкретними еталонними типами з Hede / Bruun / IKMK København у майбутній детальній роботі.

  guldkrone:
    pdate_label:
      de: 'Geltungsbereich: 1618 → 1671 · 53 Jahre (Christian IV. 1618–1648 + Frederik III. 1655–1668)'
      en: 'Period of validity: 1618 → 1671 · 53 years (Christian IV 1618–1648 + Frederik III 1655–1668)'
      uk: 'Період дії: 1618 → 1671 · 53 роки (Кристіан IV 1618–1648 + Фредерік III 1655–1668)'
    hintergrund:
      de: |
        Die Guldkrone-Tarif-Logik beginnt schon 1618 parallel zur silbernen Christian-IV.-Corona-Danica: Christian IV. läßt 2-Guldkronen («dobbelt guldkrone») schlagen, die metrisch identisch zur späteren Frederik-III.-Form sind (.917 Feingehalt, 5,996 g rau / 5,496 g fein)<sup><a href="#ref27">[27]</a></sup>. Die Serie Hede 25 (Jahrgänge 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648) und Hede 28 (Doppelguldkrone 1628, im Esrum-Schatzfund Ingvardson & Märcher 2010 dokumentiert<sup><a href="#ref27">[27]</a></sup>) diente nicht der Massenkarbung sondern als Hofgeschenk und Soldzahlung. Goldene <b>Tarifmünze</b> Frederik III., 1657 in Glückstadt eingeführt; goldenes Pendant der Krone-Mønt-Kategorie mit gleicher Tarif-Logik wie die silberne Krone, aber in 22-karätigem Gold und mit eigener metrischer Definition (≈ 39 Stück je Cöllnische Marck Raulegierung von 22 Karat = 5,996 g rau / 5,498 g fein je Stück). Tarif <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Geprägt in Glückstadt 1657–1660 (Hede 145B, Mzm. Jacob Schwieger), Kopenhagen-Folgeprägung 1666 (Hede 44 «1 Guldkrone» und Hede 45 «2 Guldkrone», jüngere Müntzformel 5,590 g rau / 5,126 g fein)<sup><a href="#ref28">[28]</a></sup> und in Kopenhagen 1668 (KM# 303, bei reduziertem Tarif von 3 Speciedaler und kleinerem Raugewicht von 5,47 g — ein verwandter, aber physikalisch anderer Müntzfuß). Mit dem Tod Frederiks III. 1670 endet die Guldkrone-Tarifprägung; Christian V. setzt sie nicht fort und prägt in Glückstadt nur noch nach dem Reichsdukatenfuß. <b>Nicht zu verwechseln mit dem Goldgulden</b> (HRR-Goldmünze nach Reichsmünzordnung 1559, andere Lineage und andere Tarifeinheit).
      en: |-
        The Guldkrone tariff logic already begins in 1618 in parallel with Christian IV's silver Corona Danica: Christian IV strikes 2-Guldkroner («dobbelt guldkrone») that are metrically identical to the later Frederik III form (.917 fineness, 5.996 g rough / 5.496 g fine)<sup><a href="#ref27">[27]</a></sup>. The Hede 25 series (years 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648) and Hede 28 (double Guldkrone 1628, documented in the Esrum hoard, Ingvardson & Märcher 2010<sup><a href="#ref27">[27]</a></sup>) served as court gifts and mercenary pay rather than mass production. A gold <b>tariff coin</b> of Frederik III, introduced at Glückstadt in 1657; the gold counterpart of the Krone-Mønt category, with the same tariff logic as the silver Krone but in 22-carat gold and with its own metric definition (≈ 39 pieces per Cologne mark of raw 22-carat alloy = 5.996 g rough / 5.498 g fine each). Tariff <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Struck at Glückstadt 1657–1660 (Hede 145B, mintmaster Jacob Schwieger), Copenhagen follow-up 1666 (Hede 44 «1 Guldkrone» and Hede 45 «2 Guldkrone», younger Müntzformel 5.590 g rough / 5.126 g fine)<sup><a href="#ref28">[28]</a></sup> and at Copenhagen in 1668 (KM# 303, at a reduced tariff of 3 Speciedaler and a smaller rough weight of 5.47 g — a related but physically distinct standard). With the death of Frederik III in 1670 Guldkrone tariff coinage ends; Christian V does not continue it and strikes Glückstadt gold only on the Reichsdukatenfuß. <b>Not to be confused with the Goldgulden</b> (Holy Roman Empire gold coin under the Reichsmünzordnung of 1559, separate lineage and a different tariff unit).
      uk: |-
        Тарифна логіка Guldkrone починається вже 1618 р. паралельно зі срібною Corona Danica Кристіана IV: Кристіан IV карбує 2-Guldkroner («dobbelt guldkrone»), метрично ідентичні пізнішій формі Frederik III (.917 проби, 5,996 г повної / 5,496 г чистого)<sup><a href="#ref27">[27]</a></sup>. Серія Hede 25 (роки 1619, 1621, 1626, 1628, 1630, 1633, 1635, 1637, 1648) і Hede 28 (подвійна Guldkrone 1628, задокументована у Esrum-скарбі Ingvardson & Märcher 2010<sup><a href="#ref27">[27]</a></sup>) слугувала придворним подарунком та платою найманцям, а не масовим карбуванням. Золота <b>тарифна монета</b> Фредеріка III, запроваджена в Glückstadt 1657 р.; золотий аналог Krone-Mønt-категорії з тією ж тарифною логікою, що й срібна Krone, але в 22-каратному золоті й з власним метричним означенням (≈ 39 штук з кельнської марки сплаву 22 карат = 5,996 г повної ваги / 5,498 г чистого на штуку). Тариф <b>1 Guldkrone = 3½ Speciedaler = 21 Mark Dansk</b>. Карбувалася в Glückstadt 1657–1660 (Hede 145B, монетмайстер Jacob Schwieger), копенгагенський наступний випуск 1666 (Hede 44 «1 Guldkrone» і Hede 45 «2 Guldkrone», новіша монетна формула 5,590 г повної / 5,126 г чистого)<sup><a href="#ref28">[28]</a></sup> і в Копенгагені 1668 р. (KM# 303, зі зниженим тарифом 3 Speciedaler і меншою повною вагою 5,47 г — споріднена, але фізично окрема стопа). Зі смертю Фредеріка III 1670 р. тарифне карбування Guldkrone завершується; Кристіан V його не продовжує і в Glückstadt карбує золото лише за Reichsdukatenfuß. <b>Не плутати з Goldgulden</b> (золота монета Священної Римської імперії за Reichsmünzordnung 1559, окрема лінія й інша тарифна одиниця).
    closing_label:
      de: "Zusammenfassung · 53 Jahre Krone-Mønt-Goldparallele (Christian IV 1618-1648 + Frederik III 1655-1668)"
      en: "Summary · 53 years of the Krone-Mønt gold parallel (Christian IV 1618-1648 + Frederik III 1655-1668)"
      uk: "Підсумок · 53 роки золотої паралелі Krone-Mønt (Кристіан IV 1618-1648 + Фредерік III 1655-1668)"
    closing:
      de: |-
        Der Guldkrone-Fuß ist die <b>goldene Parallele der Krone-Mønt-Lineage über zwei Regenten</b>: er beginnt 1618 unter Christian IV. als 2-Guldkrone-Vorgängerphase parallel zur silbernen Corona Danica — Hofgeschenk- und Soldzahlungs-Karbung, Hede 25/28-Serie biß 1648<sup><a href="#ref27">[27]</a></sup> — und mündet 1655 in Frederik III.s formale Massenkarbung der 1-Guldkrone (Hede 145B-Glückstadt-Hauptphase 1657–1660; Kopenhagener Folgeprägung 1666 Hede 44/45 und 1668 KM-303 mit reduziertem Tarif)<sup><a href="#ref28">[28]</a></sup><sup><a href="#ref10">[10]</a></sup>. Mit der Commerce-Collegium-Empfehlung vom 14. Februar 1671 endet die reguläre Karbung. Christian V. setzt die Linie nicht fort; die Goldprägung läuft danach nur noch im Reichsdukatenfuß.
      en: |-
        The Guldkrone-Fuß is the <b>gold parallel of the Krone-Mønt lineage spanning two rulers</b>: it begins in 1618 under Christian IV as a 2-Guldkrone predecessor phase running alongside the silver Corona Danica — court-gift and mercenary-pay coinage, the Hede 25/28 series through 1648<sup><a href="#ref27">[27]</a></sup> — and flows in 1655 into Frederik III's formal mass coinage of the 1-Guldkrone (Hede 145B Glückstadt main phase 1657–1660; Copenhagen follow-up issues 1666 Hede 44/45 and 1668 KM-303 at a reduced tariff)<sup><a href="#ref28">[28]</a></sup><sup><a href="#ref10">[10]</a></sup>. The Commerce Collegium recommendation of 14 February 1671 ends regular minting. Christian V does not continue the line; gold coinage thereafter runs only on the Reichsdukatenfuß.
      uk: |-
        Guldkrone-Fuß — це <b>золота паралель лінії Krone-Mønt через двох правителів</b>: вона починається 1618 р. за Кристіана IV як передфаза 2-Guldkrone паралельно зі срібною Corona Danica — карбування придворного подарунку та плати найманцям, серія Hede 25/28 до 1648 р.<sup><a href="#ref27">[27]</a></sup> — і 1655 р. впадає у формальне масове карбування Frederik III 1-Guldkrone (головна фаза Hede 145B Glückstadt 1657–1660; копенгагенські наступні випуски 1666 Hede 44/45 та 1668 KM-303 зі зниженим тарифом)<sup><a href="#ref28">[28]</a></sup><sup><a href="#ref10">[10]</a></sup>. Рекомендація Commerce Collegium від 14 лютого 1671 завершує регулярне карбування. Кристіан V лінію не продовжує; золоте карбування далі ведеться лише за Reichsdukatenfuß.

