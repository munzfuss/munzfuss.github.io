    fuss: reichsdukatenfuss
    phase: A
    kind: kurant
    fraction: "2"
    nominal: 1 Rosenoble
    year_label: "1611–1629"
    year_first: 1611
    year_last: 1629
    ruler: "Christian IV."
    mint: "Kopenhagen"
    catalog:
      others:
        - "KM-DK# 51"
    metal: gold
    fineness: 0.833
    weight_rough_g: 8.99
    diameter_mm: 29.0
    note:
      de: |-
        1 Rosenoble Christians IV. (1611–1629) — Goldhandelsmünze nach englischem Vorbild (Rose-Noble seit 1465). Eigener trade-Standard mit .833 Feingehalt und 8,99 g Rohgewicht — passt nicht in die regulären Reichsdukatenfuß-Theilungen (vorläufig als fraction "2" einsortiert, was nur ein grober rechnerischer Anker ist). Δ wird gegenüber Reichsdukatenfuß-Norm 6,88 g auffällig hoch ausfallen — der Rosenoble folgt einer separaten Trade-Gold-Norm. Mzm. nicht eindeutig — vorerst als Glückstadt eingetragen. <b>KM-DK# 51</b>; in Numista nicht katalogisiert.
      en: |-
        1 Rosenoble of Christian IV (1611–1629) — gold trade coin after the English model (Rose-Noble since 1465). Its own trade standard at .833 fineness and 8.99 g rough — doesn't fit the regular Reichsdukatenfuß subdivisions (provisionally filed under fraction "2", a rough computational anchor only). Δ will read visibly high against the Reichsdukatenfuß norm of 6.88 g — the Rosenoble follows a separate trade-gold norm. Mint not unambiguous — provisionally entered as Glückstadt. <b>KM-DK# 51</b>; not catalogued by Numista.
      uk: |-
        1 Rosenoble Кристіана IV (1611–1629) — золота торгова монета за англійським зразком (Rose-Noble від 1465). Власний trade-стандарт із пробою .833 і грубою вагою 8,99 г — не вписується в регулярні поділи Reichsdukatenfuß (попередньо внесено в fraction "2" як грубий розрахунковий якір). Δ буде помітно завищеним проти норми Reichsdukatenfuß 6,88 г — Rosenoble слідує окремій нормі trade-gold. Монетний двір неоднозначний — попередньо внесено як Глюкштадт. <b>KM-DK# 51</b>; у Numista не каталогізовано.
    sources:
      - type: ucoin
        url: https://en.ucoin.net/coin/denmark-1-rosenoble-1611-1629/?tid=163411
        ref: ucoin
    issuing_entity: danish_realm
    fineness_verified: true
    mint_verified: false
    verification_note:
      de: Mzm. ursprünglich als Glückstadt erfaßt; bei späterer Auditierung gegen ucoin Period (Rigsdaler 1625-1699 bzw. Speciedaler 1582-1624 — Royal Danish Copenhagen) und KM-DK# 51 (Royal-Danish-Krause-Index ohne SH-Pendant) als königlich-dänische Kopenhagener Prägung re-attribuiert (1611–1629). Mzm. weiterhin (?) — kein direkter Hede/Wilcke-Beleg.
      en: Mint originally recorded as Glückstadt; on later audit against ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) and KM-DK# 51 (Royal Danish Krause index with no SH counterpart), re-attributed as a Royal Danish Copenhagen issue (1611–1629). Mint still (?) — no direct Hede / Wilcke attestation.
      uk: Монетний двір спочатку записано як Глюкштадт; під час подальшого аудиту проти ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) та KM-DK# 51 (Royal-Danish-Krause-індекс без SH-аналогу) переатрибутовано як королівсько-данську копенгагенську монету (1611–1629). Монетний двір лишається (?) — прямого підтвердження за Hede/Wilcke немає.
