      uk: |-
        ½ Speciedaler Кристіана IV (1646) — sub-фракція до km-27 (1 Speciedaler 1644–1648) у 9¼-Fuß. Сестринська sub-фракція до раніше доданого km-14 (½ Sp 1623). Монетний двір неоднозначний — попередньо внесено як Глюкштадт. <b>KM-DK# 135</b>; у Numista не каталогізовано.
