  - id: km-303-fr-iii-1668
    fuss: guldkrone
    phase: B
    kind: tarif
    fraction: "1"
    nominal: 1 Guldkrone
    year_label: "1668"
    year_first: 1668
    year_last: 1668
    ruler: "Friedrich III."
    mint: "Kopenhagen"
    mintmaster: "Gotfred Krüger"
    catalog:
      km: "303"
      fr: "92"
      numista: '308327'
    metal: gold
    fineness: 0.91667
    weight_rough_g: 5.47
    diameter_mm: 26.2
    note:
      de: |-
        1 Guldkrone Frederik III. (Kopenhagen 1668) · Mzm. <b>Gotfred Krüger</b> (Kopenhagen 1664–1680), Mzz. <b>GK</b>. Avers «FRID • III • D • G • DAN • NOR • V • G • REX» mit lorbeergeschmückter Büste in Rüstung mit Löwenköpfen auf der Schulter; Revers Krone von Dänemark zentral, Devise «<i>Dominus Providebit</i>» kursiv darüber, Wertangabe und Datum «XVIII • M • 1668 • G • K •» darunter. Tarif gegenüber Glückstadt 1657–1660 von 3½ auf <b>3 Speciedaler = 18 Mark Dansk</b> reduziert; Raugewicht entsprechend von 5,996 auf 5,47 g abgesenkt; Feingehalt unverändert .917 (22 Karat).<br><br>
        <b>Außerhalb Holsteins</b> — Münzstätte Kopenhagen, hier zur Vollständigkeit der Frederik-III.-Tarif-Serie aufgenommen. Δ-Spalte gegen die kanonische Glückstadter Form (5,498 g fein, 39 Stück je Cöllnische Marck) zeigt die ≈ 8,8 % Senkung des Raugewichts.
      en: |-
        1 Guldkrone of Frederik III (Copenhagen 1668) · mintmaster <b>Gotfred Krüger</b> (Copenhagen 1664–1680), mintmark <b>GK</b>. Obverse «FRID • III • D • G • DAN • NOR • V • G • REX» with laureate bust in armour with lion heads on the shoulder; reverse Crown of Denmark in centre, motto «<i>Dominus Providebit</i>» in italic above, value and date «XVIII • M • 1668 • G • K •» below. Tariff reduced from the Glückstadt 1657–1660 standard of 3½ to <b>3 Speciedaler = 18 Mark Dansk</b>; rough weight correspondingly lowered from 5.996 to 5.47 g; fineness unchanged at .917 (22 carat).<br><br>
        <b>Outside Holstein</b> — Copenhagen mint, included here for completeness of the Frederik III tariff series. The Δ column against the canonical Glückstadt form (5.498 g fine, 39 pieces per Cologne mark) reflects the ≈ 8.8 % reduction in rough weight.
      uk: |-
        1 Guldkrone Фредеріка III (Копенгаген 1668) · монетмайстер <b>Gotfred Krüger</b> (Копенгаген 1664–1680), монограма <b>GK</b>. Аверс «FRID • III • D • G • DAN • NOR • V • G • REX» з лавровим бюстом у обладунку з левиними голівками на плечі; реверс — корона Данії в центрі, девіз «<i>Dominus Providebit</i>» курсивом над, номінал і дата «XVIII • M • 1668 • G • K •» під короною. Тариф знижено з ґлюкштадтського 1657–1660 з 3½ до <b>3 Speciedaler = 18 Mark Dansk</b>; повну вагу відповідно зменшено з 5,996 до 5,47 г; пробу не змінено .917 (22 карати).<br><br>
        <b>Поза Гольштейном</b> — копенгагенський монетний двір, включено для повноти тарифної серії Фредеріка III. Стовпець Δ щодо канонічної ґлюкштадтської форми (5,498 г чистого, 39 штук на кельнську марку) відображає ≈ 8,8 % зниження повної ваги.
    sources:
