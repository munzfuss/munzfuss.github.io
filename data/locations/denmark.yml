      uk: 1 Kroneskilling — субодиниця Corona Danica за офіційним тарифом 1 Krone = 96 Kroneskilling<sup><a href="#ref2">[2]</a><a href="#ref3">[3]</a></sup>. Емпіричне чисте срібло 0,33 г — приблизно 2× більше, ніж передбачає Krone-стопа (16,250÷96 = 0,17 г) — типово для дрібних монет, які несуть більше срібла на тариф, ніж батьківська тарифна монета.
