- id: km-x023-fr-iii-1652
  fuss: reichsdukatenfuss
  phase: I
  kind: kurant
  fraction: "1/2"
  nominal: ½ Dukat
  year_label: "1652"
  year_first: 1652
  year_last: 1652
  ruler: "Friedrich III."
  mint: "Kopenhagen"
  catalog:
    others:
    - "KM-DK# 188"
  metal: gold
  fineness: 0.980
  weight_rough_g:
  - value: 1.75
    source: ucoin
  note:
    de: |-
      ½ Dukat Friedrichs III. (1652) — frühe Goldemission. Reichsdukatenfuß-Theilung (3,49 g rau / 2 = 1,745 g pro Stück; ucoin-Wert 1,75 g passt exakt). Probe .980 nahe dem Standard .986 (ucoin-Rundung). Mzm. nicht eindeutig — vorerst als Glückstadt eingetragen. <b>KM-DK# 188</b>; in Numista nicht katalogisiert. Schwesterstück: km-x015-chr-iv-1648 (1/16 Dukat 1648, Christian IV).
    en: |-
      ½ Ducat of Frederik III (1652) — early gold issue. Reichsdukatenfuß subdivision (3.49 g rough / 2 = 1.745 g per piece; ucoin value 1.75 g matches exactly). Fineness .980 close to the standard .986 (ucoin rounding). Mint not unambiguous — provisionally entered as Glückstadt. <b>KM-DK# 188</b>; not catalogued by Numista. Sister type: km-x015-chr-iv-1648 (1/16 Dukat 1648, Christian IV).
    uk: |-
      ½ Dukat Фредеріка III (1652) — рання золота емісія. Reichsdukatenfuß-поділ (3,49 г груб. / 2 = 1,745 г на штуку; значення ucoin 1,75 г точно збігається). Проба .980 близька до стандарту .986 (округлення ucoin). Монетний двір неоднозначний — попередньо внесено як Глюкштадт. <b>KM-DK# 188</b>; у Numista не каталогізовано. Сестринський тип: km-x015-chr-iv-1648 (1/16 Dukat 1648, Кристіан IV).
  sources:
  - type: ucoin
    url: https://en.ucoin.net/coin/denmark-1-2-dukat-1652/?tid=97396
    ref: ucoin
  issuing_entity: danish_realm
  fineness_verified: true
  mint_verified: false
  diameter_mm_verified: false
  verification_note:
    de: Mzm. ursprünglich als Glückstadt erfaßt; bei späterer Auditierung gegen ucoin Period (Rigsdaler 1625-1699 bzw. Speciedaler 1582-1624 — Royal Danish Copenhagen) und KM-DK# 188 (Royal-Danish-Krause-Index ohne SH-Pendant) als königlich-dänische Kopenhagener Prägung re-attribuiert (1652). Mzm. weiterhin (?) — kein direkter Hede/Wilcke-Beleg.
    en: Mint originally recorded as Glückstadt; on later audit against ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) and KM-DK# 188 (Royal Danish Krause index with no SH counterpart), re-attributed as a Royal Danish Copenhagen issue (1652). Mint still (?) — no direct Hede / Wilcke attestation.
    uk: Монетний двір спочатку записано як Глюкштадт; під час подальшого аудиту проти ucoin Period (Rigsdaler 1625-1699 / Speciedaler 1582-1624 — Royal Danish Copenhagen) та KM-DK# 188 (Royal-Danish-Krause-індекс без SH-аналогу) переатрибутовано як королівсько-данську копенгагенську монету (1652). Монетний двір лишається (?) — прямого підтвердження за Hede/Wilcke немає.
