        uk: "10½-Krone-Fuß («Груба Крона») · відновлення тарифного карбування Krone у Glückstadt 1644 (Hebræermønt за Кристіана IV) → Норвегія прийняла 1649, Копенгаген 1652 · пізніше копенгагенське карбування до 1732 (Hede 41A); тариф ⅔ Speciedaler (від Кристіана V, з 1670) · старі запаси в обігу до Statsbankerot 1813"
