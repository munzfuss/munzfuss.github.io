      de: |
        <b>Aagaard, Sven</b>: <i>Frederik III Kronemønt København 1651–1670</i>. København 2004 — Spezialmonographie zur Frederik-III.-Kronemønt-Phase in der Kopenhagener Hauptmünze. Diese Phase verbindet die ältere Christian-IV.-Müntzformel (1651–1652, .859/16,25 g fein) mit dem neuen 10½-Krone-Fuß (ab 1652, .672/14,964 g fein) — Aagaard liefert die feinste verfügbare Typologie der Übergangsperiode 1651–1652 und bestätigt die Wikipedia-DE-Datierung «<i>zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Paper-only Quelle, derzeit nicht digital; Hede/danskmoent.dk und der Schou-Katalog dienen als digital zugängliche Sekundärbelege.
      en: |-
        <b>Aagaard, Sven</b>: <i>Frederik III Kronemønt København 1651–1670</i>. Copenhagen 2004 — specialist monograph on the Frederik III Kronemønt phase at the Copenhagen royal mint. This phase bridges the older Christian IV mint formula (1651–1652, .859/16.25 g fine) with the new 10½-Krone-Fuß (from 1652, .672/14.964 g fine) — Aagaard supplies the finest available typology of the 1651–1652 transition and confirms the Wikipedia-DE dating «<i>zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Paper-only, not yet digital; Hede/danskmoent.dk and the Schou catalogue serve as the digitally accessible secondary attestations.
      uk: |-
        <b>Aagaard, Sven</b>: <i>Frederik III Kronemønt København 1651–1670</i>. Копенгаген, 2004 — спеціалізована монографія про фазу Krone Фредеріка III на Копенгагенському королівському монетному дворі. Ця фаза мостить стару монетну формулу Кристіана IV (1651–1652, .859/16,25 г чистого) з новим 10½-Krone-Fuß (з 1652 р., .672/14,964 г чистого) — Aagaard дає найточнішу типологію перехідного періоду 1651–1652 і підтверджує датування Wikipedia DE «<i>zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Лише паперове джерело, цифрової версії немає; Hede/danskmoent.dk і каталог Schou слугують цифрово доступними вторинними джерелами.

  - id: ref14
    content:
      de: |
        <b>Aagaard, Sven</b>: <i>Frederik III Guldmønt og speciemønt 1648–1670</i>. København 2011 — Spezialmonographie zu Frederik-III.-Goldprägungen, einschließlich der Guldkrone-Tarifserie 1655–1668 und der Speciedukat-/Doppeldukat-Programme. Aagaard liefert die feinste Typologie sowohl der Glückstadter Guldkrone-Phase 1657–1660 (Hede 145B; vergleichbar zu Aagaard-4.1) als auch der Frederik-III.-Speciedukat-Reform vom 2. Januar 1658, die den Speciesdukat auf 12 Mark hob und damit das 1½-Dukat-Niveau für die Guldkrone fixierte. Paper-only, derzeit nicht digital; Hede 1957 «Frederik III's guldkroner» (siehe ref10) ist die digital zugängliche kanonische Sekundärquelle.
      en: |-
        <b>Aagaard, Sven</b>: <i>Frederik III Guldmønt og speciemønt 1648–1670</i>. Copenhagen 2011 — specialist monograph on Frederik III's gold issues, covering the Guldkrone tariff series 1655–1668 as well as the Speciedukat / Double-ducat programmes. Aagaard supplies the finest typology of both the Glückstadt Guldkrone phase 1657–1660 (Hede 145B; cf. Aagaard-4.1) and Frederik III's Speciedukat reform of 2 January 1658, which raised the Speciesdukat to 12 mark and thereby fixed the 1½-ducat level for the Guldkrone. Paper-only, not yet digital; Hede 1957 «Frederik III's guldkroner» (see ref10) is the digitally accessible canonical secondary source.
      uk: |-
        <b>Aagaard, Sven</b>: <i>Frederik III Guldmønt og speciemønt 1648–1670</i>. Копенгаген, 2011 — спеціалізована монографія про золоті випуски Фредеріка III, у тому числі тарифну серію Guldkrone 1655–1668 і програми Speciedukat / Doppel-Dukat. Aagaard дає найточнішу типологію як ґлюкштадтської фази Guldkrone 1657–1660 (Hede 145B; пор. Aagaard-4.1), так і реформи Speciedukat Фредеріка III 2 січня 1658 р., яка підняла Speciesdukat до 12 mark і тим закріпила рівень 1½ дуката для Guldkrone. Лише паперове джерело, цифрової версії немає; Hede 1957 «Frederik III's guldkroner» (див. ref10) — це канонічне цифрово доступне вторинне джерело.

  - id: ref15
    content:
      de: |
        <b>Aagaard, Sven et al.</b>: <i>Christian V — Kronemønt, speciedalere og dukater — Glückstadt 1671–1696</i>. København 2022 — Spezialmonographie zur Glückstadter Krone-Mønt-Phase unter Christian V. Behandelt die formelle Festschreibung des 10½-Krone-Fußes durch die Münzordnung Christians V. vom 22. März 1671 («<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>») und die nachfolgende Glückstadter Hauptphase 1671–1696 (Hede 41A–C, 67A/B, 121, etc.). Hede 1957 (ref9) und danskmoent.dk «c5mord.htm» (ref6) liefern die digital zugänglichen Sekundärbelege; Aagaard 2022 ist die jüngste autoritative Monographie der Glückstadt-Phase.
      en: |-
