  content:
    de: '<b>danskmoent.dk «1 Rosenobel»</b> — <a href="https://www.danskmoent.dk/1rosenob.htm" target="_blank">danskmoent.dk/1rosenob.htm</a>. Hede-Übersichtsseite für die dänischen Rosenobler: <b>Frederik
      II.</b> 1584 (Frederiksborg, Hede 7B / Schou 2 / Sieg 29, unik); <b>Christian IV.</b> Typ A (1611-1613 + 1627 + 1629, Hede 23A / Schou 1-5/1-4/1-3/1 / Sieg 149); Typ B (Hede 23B / Schou 2-3 / Sieg
      149). Hauptmünzstätte Kopenhagen für Christian IVs Karbung. Verbatim Etymologie: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — die dänische Rosenobel-Karbung
      ist eine späte Anpassung des englischen Rose-Noble-Modells.'
    en: '<b>danskmoent.dk «1 Rosenobel»</b> — <a href="https://www.danskmoent.dk/1rosenob.htm" target="_blank">danskmoent.dk/1rosenob.htm</a>. Hede overview page for the Danish Rosenobler: <b>Frederik II</b>
      1584 (Frederiksborg, Hede 7B / Schou 2 / Sieg 29, unique); <b>Christian IV</b> Type A (1611-1613 + 1627 + 1629, Hede 23A / Schou 1-5/1-4/1-3/1 / Sieg 149); Type B (Hede 23B / Schou 2-3 / Sieg 149).
      Principal mint Copenhagen for Christian IV''s coinage. Verbatim etymology: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — the Danish Rosenobel coinage is a
      late adaptation of the English Rose Noble model.'
    uk: '<b>danskmoent.dk «1 Rosenobel»</b> — <a href="https://www.danskmoent.dk/1rosenob.htm" target="_blank">danskmoent.dk/1rosenob.htm</a>. Hede-оглядова сторінка для данських Rosenobler: <b>Frederik
      II</b> 1584 (Frederiksborg, Hede 7B / Schou 2 / Sieg 29, унікат); <b>Christian IV</b> Тип A (1611-1613 + 1627 + 1629, Hede 23A / Schou 1-5/1-4/1-3/1 / Sieg 149); Тип B (Hede 23B / Schou 2-3 / Sieg
      149). Головний монетний двір Копенгаген для карбування Christian IV. Verbatim етимологія: «<i>Navnet Rosenobel stammer fra den engelske mønt Rose noble fra 13-1400-tallet</i>» — данське карбування
      Rosenobel — пізня адаптація моделі англійського Rose Noble.'
- id: ref40
  content:
    de: '<b>Historyofwar.org «Kalmar War, 1611-1613»</b> — <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">historyofwar.org/articles/wars_kalmar.html</a>. Hintergrundsynthese
      des Kriegs zwischen Dänemark-Norwegen und Schweden 1611-1613. Christian IV. greift 1611 Schweden an mit dem Hauptziel, Schweden zur Rückkehr in die Kalmarer Union zu zwingen — Ziel verfehlt, aber
      Schweden zahlt im Frieden von Knäred 1613 eine Kriegsschadensbild von <b>1 Million Riksdaler Silber</b> (sogenanntes Älvsborg-Lösegeld). Der Kriegsfinanzierungs-Bedarf in den Jahren 1611-1613 erklärt
      die Karbung der Christian-IV-Rosenobler (Hede 23A) als Prestige-Goldemission zur Söldnerbezahlung; die spätere Rosenobel-Karbung 1627 + 1629 fällt in den Beginn der dänischen Beteiligung am Dreißigjährigen
      Krieg (Kaiserlich-Dänischer Krieg 1625-1629).'
    en: '<b>Historyofwar.org «Kalmar War, 1611-1613»</b> — <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">historyofwar.org/articles/wars_kalmar.html</a>. Background synthesis
      of the war between Denmark-Norway and Sweden 1611-1613. Christian IV attacks Sweden in 1611 with the main aim of forcing Sweden back into the Kalmar Union — the aim fails, but in the Treaty of Knäred
      1613 Sweden pays a war indemnity of <b>1 million silver riksdaler</b> (the so-called Älvsborg ransom). The wartime-financing pressure of 1611-1613 explains the coinage of Christian IV''s Rosenobler
      (Hede 23A) as a prestige gold issue for mercenary pay; the later Rosenobel coinage 1627 + 1629 falls within the start of Danish involvement in the Thirty Years'' War (Imperial-Danish War 1625-1629).'
    uk: '<b>Historyofwar.org «Kalmar War, 1611-1613»</b> — <a href="https://www.historyofwar.org/articles/wars_kalmar.html" target="_blank">historyofwar.org/articles/wars_kalmar.html</a>. Фонова синтеза
      війни між Данією-Норвегією та Швецією 1611-1613. Christian IV нападає на Швецію 1611 р. з головною метою примусити Швецію повернутися до Кальмарської унії — мети не досягнуто, але за договором Knäred
      1613 Швеція виплачує військову контрибуцію в <b>1 мільйон срібних riksdaler</b> (так званий Älvsborg-викуп). Воєнно-фінансовий тиск 1611-1613 пояснює карбування Rosenobler Кристіана IV (Hede 23A)
      як престижної золотої емісії для оплати найманців; пізніше карбування Rosenobel 1627 + 1629 припадає на початок данської участі у Тридцятилітній війні (Імперсько-данська війна 1625-1629).'
- id: ref41
  content:
    de: '<b>Nationalmuseet i Danmark — Frederik II 1584 Rosenobel</b> (Frederiksborg-Münzstätte, Hede 7B / Schou 2 / Sieg 29, Unikum).
      Avers «<i>FRIDERICVS Z D.G. DA. NO. SLA.GO.O. REX</i>», Revers mit der zentralen vierzeiligen Legende «<i>ROSEN / NOWEL / 1584 / ※</i>»,
      umrandet vom Wahlspruch Frederik II. «<i>ALLEIN MEIN HOFFNUNG ZV GOTT</i>». «ROSEN NOWEL» ist die zeitgenössische dänische
      Inschriftform 1584 für das, was Wilcke 1950 und die moderne numismatische Literatur retrospektiv zu «Rosenobel» standardisiert haben.'
    en: '<b>Nationalmuseet i Danmark — Frederik II 1584 Rosenobel</b> (Frederiksborg mint, Hede 7B / Schou 2 / Sieg 29, unique specimen).
      Obverse «<i>FRIDERICVS Z D.G. DA. NO. SLA.GO.O. REX</i>», reverse central four-line legend «<i>ROSEN / NOWEL / 1584 / ※</i>»
      ringed by Frederik II''s Wahlspruch «<i>ALLEIN MEIN HOFFNUNG ZV GOTT</i>». «ROSEN NOWEL» is the contemporary Danish 1584 inscription form
      for what Wilcke 1950 and the modern numismatic literature retrospectively standardised to «Rosenobel».'
    uk: '<b>Nationalmuseet i Danmark — Frederik II 1584 Rosenobel</b> (монетний двір Frederiksborg, Hede 7B / Schou 2 / Sieg 29, унікат).
      Аверс «<i>FRIDERICVS Z D.G. DA. NO. SLA.GO.O. REX</i>», реверс із центральною чотирирядковою легендою «<i>ROSEN / NOWEL / 1584 / ※</i>»,
      обрамленою девізом Frederik II «<i>ALLEIN MEIN HOFFNUNG ZV GOTT</i>». «ROSEN NOWEL» — сучасна данська форма інскрипції 1584 р.
      для того, що Wilcke 1950 та сучасна нумізматична література ретроспективно стандартизували до «Rosenobel».'
