        <b>danskmoent.dk · dänischer nationaler Fachkatalog</b>: systematische Übersichten aller dänischen Nominale mit Hede/Schou/Sieg-Numerierung. Besonders relevant: <i>1 Krone / 4 Mark</i> — <a href="https://www.danskmoent.dk/1krone.htm" target="_blank">danskmoent.dk/1krone.htm</a> (vollständige Varianten Friedrich III. Glückstadt 1659–60, Christian V. 1672–1682 Glückstadt; dokumentiert die Koexistenz von Kopenhagen-Prägung nach 11,33-Marckfuß und Glückstadt-Prägung nach lokalem leichteren Fuß); <i>Wilcke: Møntvæsenet i den første Guldaldertid 1815–1845</i> — <a href="https://www.danskmoent.dk/wilcke/w3b.htm" target="_blank">danskmoent.dk/wilcke/w3b.htm</a> (Primärtext zum Rigsbankdaler-System)
