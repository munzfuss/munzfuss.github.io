heading:
  de: Quellen · References
  en: References · Sources
  uk: Посилання · Джерела
entries:
  - id: ref1
    content:
      de: '<b>danskmoent.dk</b>: <i>1 Krone / 4 Mark</i> — <a href="https://www.danskmoent.dk/1krone.htm" target="_blank">danskmoent.dk/1krone.htm</a>. Übersicht aller dänischen Krone-Varianten mit Hede/Schou/Sieg-Numerierung; dokumentiert Koexistenz von Kopenhagen- und Glückstadt-Prägungen.'
      en: '<b>danskmoent.dk</b>: <i>1 Krone / 4 Mark</i> — <a href="https://www.danskmoent.dk/1krone.htm" target="_blank">danskmoent.dk/1krone.htm</a>. Overview of all Danish Krone varieties with Hede/Schou/Sieg numbering; documents the coexistence of Copenhagen and Glückstadt issues.'
      uk: '<b>danskmoent.dk</b>: <i>1 Krone / 4 Mark</i> — <a href="https://www.danskmoent.dk/1krone.htm" target="_blank">danskmoent.dk/1krone.htm</a>. Огляд усіх данських Krone-різновидів за нумерацією Hede/Schou/Sieg; задокументоване співіснування копенгагенських і ґлюкштадтських випусків.'
  - id: ref2
    content:
      de: 'Wikipedia (de): <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Standardparameter der Christian-IV.-Krone 1618 und Datierung des Tarif-Schnitts 1625.'
      en: 'Wikipedia (de): <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Standard parameters for the Christian IV Krone of 1618 and dating of the 1625 tariff cut.'
      uk: 'Wikipedia (de): <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Стандартні параметри Krone Кристіана IV 1618 р. та датування зниження тарифу 1625 р.'
  - id: ref3
    content:
      de: '<b>Schrötter, Friedrich Frhr. v.</b> (Hg.): <i>Wörterbuch der Münzkunde</i> (Berlin: Walter de Gruyter, 1930), Eintrag «Corona Danica», S. 113–114 — <a href="https://archive.org/details/worterbuchdermun007491mbp" target="_blank">archive.org/details/worterbuchdermun007491mbp</a>. Primärquelle für die Christian-IV.-Krone-Parameter und den Tarif-Schnitt 1625.'
      en: '<b>Schrötter, Friedrich Frhr. v.</b> (ed.): <i>Wörterbuch der Münzkunde</i> (Berlin: Walter de Gruyter, 1930), entry «Corona Danica», pp. 113–114 — <a href="https://archive.org/details/worterbuchdermun007491mbp" target="_blank">archive.org/details/worterbuchdermun007491mbp</a>. Primary source for the Christian IV Krone parameters and the 1625 tariff cut.'
      uk: '<b>Schrötter, Friedrich Frhr. v.</b> (ред.): <i>Wörterbuch der Münzkunde</i> (Берлін: Walter de Gruyter, 1930), стаття «Corona Danica», с. 113–114 — <a href="https://archive.org/details/worterbuchdermun007491mbp" target="_blank">archive.org/details/worterbuchdermun007491mbp</a>. Першоджерело параметрів Krone Кристіана IV та дати зниження тарифу 1625.'
  - id: ref4
    content:
      de: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, S. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Kanonische Werte der drei dänischen Krone-Münzformeln (1618, 1671, 1693) auf Grundlage von Wilcke I/II.'
      en: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, pp. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Canonical values for the three Danish Krone standards (1618, 1671, 1693), drawing on Wilcke I/II.'
      uk: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, с. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Канонічні значення трьох данських Krone-стандартів (1618, 1671, 1693) за Wilcke I/II.'
  - id: ref5
    content:
      de: '<b>Nationalmuseet</b> (Kopenhagen): <i>Christian 4.s svindler-mønt fylder 400 år</i> — <a href="https://natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar/" target="_blank">natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar</a>. Beleg für die Auflösung «R.F.P» = «regna firmat pietas» und die Volksumdeutung «riget fattes penge» auf der Krone-Münze.'
      en: '<b>Nationalmuseet</b> (Copenhagen): <i>Christian 4.s svindler-mønt fylder 400 år</i> — <a href="https://natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar/" target="_blank">natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar</a>. Source for the «R.F.P» = «regna firmat pietas» abbreviation and the popular reread «riget fattes penge» on the Krone coin.'
      uk: '<b>Nationalmuseet</b> (Копенгаген): <i>Christian 4.s svindler-mønt fylder 400 år</i> — <a href="https://natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar/" target="_blank">natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar</a>. Джерело розшифрування «R.F.P» = «regna firmat pietas» та народної переінтерпретації «riget fattes penge» на Krone-монеті.'
  - id: ref6
    content:
      de: <i>Møntforordninger m.v. under Christian 5. (1670–1699)</i> · danskmoent.dk (nach Schou) — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" target="_blank">danskmoent.dk/artikler/c5mord.htm</a>. Sammlung der Münzedikte Christians V., einschließlich Münzordnung 22. März 1671 (10½-Krone-Fuß) und Reskript 31. Dezember 1692.
      en: <i>Møntforordninger m.v. under Christian 5. (1670–1699)</i> · danskmoent.dk (after Schou) — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" target="_blank">danskmoent.dk/artikler/c5mord.htm</a>. Compilation of Christian V's mint edicts including the Mint Ordinance of 22 March 1671 (10½-Krone-Fuß) and the rescript of 31 December 1692.
      uk: <i>Møntforordninger m.v. under Christian 5. (1670–1699)</i> · danskmoent.dk (за Schou) — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" target="_blank">danskmoent.dk/artikler/c5mord.htm</a>. Зведення монетних едиктів Кристіана V, у т.ч. Монетної постанови 22 березня 1671 (10½-Krone-Fuß) та рескрипту 31 грудня 1692.
  - id: ref7
    content:
      de: "<b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href=\"https://www.danskmoent.dk/myst/aag1.htm\" target=\"_blank\">danskmoent.dk/myst/aag1.htm</a>. Quelle für die Glückstädter Hebræermønt 1644–1648 als Kriegsmünze während des Torstensonkrieges."
      en: "<b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href=\"https://www.danskmoent.dk/myst/aag1.htm\" target=\"_blank\">danskmoent.dk/myst/aag1.htm</a>. Source for the Glückstadt Hebræermønt 1644–1648 as war coinage during the Torstenson War."
      uk: "<b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href=\"https://www.danskmoent.dk/myst/aag1.htm\" target=\"_blank\">danskmoent.dk/myst/aag1.htm</a>. Джерело про Hebræermønt Glückstadt 1644–1648 як воєнну монету часів війни Торстенсона."
  - id: ref8
    content:
      de: '<b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i> (København: G. E. C. Gads Forlag, 1919) — <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Standardwerk zur Christian-IV.-Münzpolitik einschließlich der übertarifierten Krone und des Greshamschen Verdrängungseffekts.'
      en: "<b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i> (Copenhagen: G. E. C. Gads Forlag, 1919) — <a href=\"https://www.danskmoent.dk/wilcke/w2ref.htm\" target=\"_blank\">danskmoent.dk/wilcke/w2ref.htm</a>. Standard work on Christian IV's monetary policy including the over-tariffed Krone and the Gresham displacement effect."
      uk: '<b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i> (Копенгаген: G. E. C. Gads Forlag, 1919) — <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Класична праця про монетну політику Кристіана IV, у т.ч. надтарифіковану Krone і витіснення за Грешемом.'
  - id: ref9
    content:
      de: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, S. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Authoritative Monographie der drei Krone-Müntzfüße (Christian IV, Grove Kroner, Fine Kroner) mit Müntzfod-Tabellen und Sonderemissions-Datierungen.'
      en: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, pp. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Authoritative monograph on the three Krone Müntzfüße (Christian IV, grove kroner, fine kroner) with Müntzfod tables and dating of special issues.'
      uk: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, с. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Авторитетна монографія по трьох Krone-Müntzfüße (Кристіана IV, grove kroner, fine kroner) з таблицями Müntzfod і датуванням спецвипусків.'
  - id: ref10
    content:
      de: "<b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — <a href=\"https://www.danskmoent.dk/artikler/f3guldkr.htm\" target=\"_blank\">danskmoent.dk/artikler/f3guldkr.htm</a>. Spezialmonographie über die goldene Pendant-Münze der Krone-Mønt-Kategorie unter Frederik III. mit Datierungen Glückstadt 1657–1660 und Kopenhagen 1655–1668."
      en: "<b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — <a href=\"https://www.danskmoent.dk/artikler/f3guldkr.htm\" target=\"_blank\">danskmoent.dk/artikler/f3guldkr.htm</a>. Specialist monograph on the gold counterpart of the Krone-Mønt category under Frederik III, with datings for Glückstadt 1657–1660 and Copenhagen 1655–1668."
      uk: "<b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — <a href=\"https://www.danskmoent.dk/artikler/f3guldkr.htm\" target=\"_blank\">danskmoent.dk/artikler/f3guldkr.htm</a>. Спеціалізована монографія про золоту відповідницю Krone-Mønt-категорії за Фредеріка III, з датуваннями Glückstadt 1657–1660 і Копенгаген 1655–1668."
  - id: ref11
    content:
      de: '<b>Den Store Danske / lex.dk</b>: <i>dansk møntvæsen</i> — <a href="https://lex.dk/dansk_m%C3%B8ntv%C3%A6sen" target="_blank">lex.dk/dansk møntvæsen</a>. Periodisierungsmarken: 1692 (Übergang Krone-Mønt → Kurantmønt) und Møntloven 23. Mai 1873 (Krone als Goldhauptmünze).'
      en: '<b>Den Store Danske / lex.dk</b>: <i>dansk møntvæsen</i> — <a href="https://lex.dk/dansk_m%C3%B8ntv%C3%A6sen" target="_blank">lex.dk/dansk møntvæsen</a>. Periodisation markers: 1692 (Krone-Mønt → Kurantmønt transition) and Møntlov of 23 May 1873 (Krone as principal gold coin).'
      uk: '<b>Den Store Danske / lex.dk</b>: <i>dansk møntvæsen</i> — <a href="https://lex.dk/dansk_m%C3%B8ntv%C3%A6sen" target="_blank">lex.dk/dansk møntvæsen</a>. Періодизаційні маркери: 1692 (перехід Krone-Mønt → Kurantmønt) і Møntlov 23 травня 1873 (Krone як головна золота монета).'
  - id: ref12
    content:
      de: 'Wikipedia (de): <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Datierung des Christian-IVs-Krone-Programmes 1618–1624/25 und der Frederik-III.-Fortsetzung 1651–1652 mit Übergang zum 10½-Krone-Fuß.'
      en: "Wikipedia (de): <i>Corona Danica</i> — <a href=\"https://de.wikipedia.org/wiki/Corona_Danica\" target=\"_blank\">de.wikipedia.org/wiki/Corona_Danica</a>. Dating of Christian IV's Krone programme 1618–1624/25 and Frederik III's 1651–1652 continuation, with transition to the 10½-Krone-Fuß."
      uk: 'Wikipedia (de): <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Датування програми Krone Кристіана IV 1618–1624/25 та продовження Фредеріка III 1651–1652 з переходом на 10½-Krone-Fuß.'
  - id: ref13
    content:
      de: '<b>Aagaard, Sven</b>: <i>Frederik III Kronemønt København 1651–1670</i> (København 2004). Spezialmonographie zur Frederik-III.-Krone-Phase in Kopenhagen, mit Übergangsperiode 1651–1652 zwischen alter Christian-IV.-Müntzformel und neuem 10½-Krone-Fuß. Nur Druckausgabe.'
      en: '<b>Aagaard, Sven</b>: <i>Frederik III Kronemønt København 1651–1670</i> (Copenhagen 2004). Specialist monograph on the Frederik III Krone phase at the Copenhagen mint, covering the 1651–1652 transition between the old Christian IV mint formula and the new 10½-Krone-Fuß. Print only.'
      uk: '<b>Aagaard, Sven</b>: <i>Frederik III Kronemønt København 1651–1670</i> (Копенгаген 2004). Спеціалізована монографія про фазу Krone Фредеріка III у Копенгагені, з перехідним періодом 1651–1652 між старою монетною формулою Кристіана IV та новим 10½-Krone-Fuß. Лише друковане видання.'
  - id: ref14
    content:
      de: '<b>Aagaard, Sven</b>: <i>Frederik III Guldmønt og speciemønt 1648–1670</i> (København 2011). Spezialmonographie zu Frederik-III.-Goldprägungen einschließlich der Guldkrone-Tarifserie 1655–1668 und der Speciedukat-Reform vom 2. Januar 1658. Nur Druckausgabe.'
      en: "<b>Aagaard, Sven</b>: <i>Frederik III Guldmønt og speciemønt 1648–1670</i> (Copenhagen 2011). Specialist monograph on Frederik III's gold issues including the Guldkrone tariff series 1655–1668 and the Speciedukat reform of 2 January 1658. Print only."
      uk: '<b>Aagaard, Sven</b>: <i>Frederik III Guldmønt og speciemønt 1648–1670</i> (Копенгаген 2011). Спеціалізована монографія про золоті випуски Фредеріка III, у т.ч. тарифну серію Guldkrone 1655–1668 і реформу Speciedukat 2 січня 1658. Лише друковане видання.'
  - id: ref15
    content:
      de: '<b>Aagaard, Sven et al.</b>: <i>Christian V — Kronemønt, speciedalere og dukater — Glückstadt 1671–1696</i> (København 2022). Spezialmonographie zur Glückstadter Krone-Mønt-Phase unter Christian V., einschließlich der formellen 10½-Krone-Fuß-Festschreibung 1671. Nur Druckausgabe.'
      en: '<b>Aagaard, Sven et al.</b>: <i>Christian V — Kronemønt, speciedalere og dukater — Glückstadt 1671–1696</i> (Copenhagen 2022). Specialist monograph on the Glückstadt Krone-Mønt phase under Christian V, including the formal codification of the 10½-Krone-Fuß in 1671. Print only.'
      uk: '<b>Aagaard, Sven et al.</b>: <i>Christian V — Kronemønt, speciedalere og dukater — Glückstadt 1671–1696</i> (Копенгаген 2022). Спеціалізована монографія про ґлюкштадтську фазу Krone-Mønt за Кристіана V, у т.ч. формальне закріплення 10½-Krone-Fuß 1671 р. Лише друковане видання.'
  - id: ref16
    content:
      de: '<b>Wilcke, Julius</b>: <i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i> (Wilcke II) (København: G. E. C. Gads Forlag, 1924) — <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Primärbeleg für das åbne Brev vom 12. Juli 1618 (Anm. 53), inkl. Querverweis auf Wilcke I S. 156–157.'
      en: '<b>Wilcke, Julius</b>: <i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i> (Wilcke II) (Copenhagen: G. E. C. Gads Forlag, 1924) — <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Primary attestation of the åbne Brev of 12 July 1618 (note 53), with cross-reference to Wilcke I pp. 156–157.'
      uk: '<b>Wilcke, Julius</b>: <i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i> (Wilcke II) (Копенгаген: G. E. C. Gads Forlag, 1924) — <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Першоджерело åbne Brev від 12 липня 1618 (прим. 53) із перехресним посиланням на Wilcke I с. 156–157.'
  - id: ref17
    content:
      de: '<b>Ingvardson, Gitte Tarnow &amp; Märcher, Michael</b>: <i>Christian 4.s guldmønt fra Esrum Møllegård</i>, in: M. Andersen &amp; P. O. Nielsen (red.), <i>Danefæ – Skatte fra den danske muld</i> (København: Nationalmuseet, 2010), S. 254–257 — <a href="https://portal.research.lu.se/en/publications/christian-4s-guldm%C3%B8nt-fra-esrum-m%C3%B8lleg%C3%A5rd" target="_blank">portal.research.lu.se</a>. Belegt drei Doppelguldkronen Christians IV. von 1628 (Hede 28) aus dem Esrum-Schatzfund.'
      en: '<b>Ingvardson, Gitte Tarnow &amp; Märcher, Michael</b>: <i>Christian 4.s guldmønt fra Esrum Møllegård</i>, in: M. Andersen &amp; P. O. Nielsen (eds.), <i>Danefæ – Skatte fra den danske muld</i> (Copenhagen: Nationalmuseet, 2010), pp. 254–257 — <a href="https://portal.research.lu.se/en/publications/christian-4s-guldm%C3%B8nt-fra-esrum-m%C3%B8lleg%C3%A5rd" target="_blank">portal.research.lu.se</a>. Documents three Christian IV double Guldkroner of 1628 (Hede 28) from the Esrum hoard.'
      uk: '<b>Ingvardson, Gitte Tarnow &amp; Märcher, Michael</b>: <i>Christian 4.s guldmønt fra Esrum Møllegård</i>, у: M. Andersen &amp; P. O. Nielsen (ред.), <i>Danefæ – Skatte fra den danske muld</i> (Копенгаген: Nationalmuseet, 2010), с. 254–257 — <a href="https://portal.research.lu.se/en/publications/christian-4s-guldm%C3%B8nt-fra-esrum-m%C3%B8lleg%C3%A5rd" target="_blank">portal.research.lu.se</a>. Документує три подвійні Guldkrone Кристіана IV 1628 (Hede 28) зі скарбу Esrum.'
