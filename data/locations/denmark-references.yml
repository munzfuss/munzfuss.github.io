    uk: '<b>ucoin — 10 Ducat 1588 (Frederik II)</b> · <a href="https://en.ucoin.net/coin/denmark-10-ducat-1588/?tid=163075" target="_blank">ucoin.net tid 163075</a>. Засвідчує: золото, 39,45 г повної ваги,
