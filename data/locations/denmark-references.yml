heading:
  de: Quellen · References
  en: References · Sources
  uk: Посилання · Джерела
entries:
- id: ref1
  content:
    de: '<b>danskmoent.dk</b>: <i>1 Krone / 4 Mark</i> — <a href="https://www.danskmoent.dk/1krone.htm" target="_blank">danskmoent.dk/1krone.htm</a>. Übersicht aller dänischen Krone-Varianten mit Hede/Schou/Sieg-Numerierung;
      dokumentiert Koexistenz von Kopenhagen- und Glückstadt-Prägungen.'
    en: '<b>danskmoent.dk</b>: <i>1 Krone / 4 Mark</i> — <a href="https://www.danskmoent.dk/1krone.htm" target="_blank">danskmoent.dk/1krone.htm</a>. Overview of all Danish Krone varieties with Hede/Schou/Sieg
      numbering; documents the coexistence of Copenhagen and Glückstadt issues.'
    uk: '<b>danskmoent.dk</b>: <i>1 Krone / 4 Mark</i> — <a href="https://www.danskmoent.dk/1krone.htm" target="_blank">danskmoent.dk/1krone.htm</a>. Огляд усіх данських Krone-різновидів за нумерацією Hede/Schou/Sieg;
      задокументоване співіснування копенгагенських і ґлюкштадтських випусків.'
- id: ref2
  content:
    de: 'Wikipedia (de): <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Standardparameter der Christian-IV.-Krone 1618
      und Datierung des Tarif-Schnitts 1625.'
    en: 'Wikipedia (de): <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Standard parameters for the Christian IV Krone
      of 1618 and dating of the 1625 tariff cut.'
    uk: 'Wikipedia (de): <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Стандартні параметри Krone Кристіана IV 1618
      р. та датування зниження тарифу 1625 р.'
- id: ref3
  content:
    de: '<b>Schrötter, Friedrich Frhr. v.</b> (Hg.): <i>Wörterbuch der Münzkunde</i> (Berlin: Walter de Gruyter, 1930), Eintrag «Corona Danica», S. 113–114 — <a href="https://archive.org/details/worterbuchdermun007491mbp"
      target="_blank">archive.org/details/worterbuchdermun007491mbp</a>. Primärquelle für die Christian-IV.-Krone-Parameter und den Tarif-Schnitt 1625.'
    en: '<b>Schrötter, Friedrich Frhr. v.</b> (ed.): <i>Wörterbuch der Münzkunde</i> (Berlin: Walter de Gruyter, 1930), entry «Corona Danica», pp. 113–114 — <a href="https://archive.org/details/worterbuchdermun007491mbp"
      target="_blank">archive.org/details/worterbuchdermun007491mbp</a>. Primary source for the Christian IV Krone parameters and the 1625 tariff cut.'
    uk: '<b>Schrötter, Friedrich Frhr. v.</b> (ред.): <i>Wörterbuch der Münzkunde</i> (Берлін: Walter de Gruyter, 1930), стаття «Corona Danica», с. 113–114 — <a href="https://archive.org/details/worterbuchdermun007491mbp"
      target="_blank">archive.org/details/worterbuchdermun007491mbp</a>. Першоджерело параметрів Krone Кристіана IV та дати зниження тарифу 1625.'
- id: ref4
  content:
    de: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, S. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Kanonische
      Werte der drei dänischen Krone-Münzformeln (1618, 1671, 1693) auf Grundlage von Wilcke I/II.'
    en: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, pp. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Canonical
      values for the three Danish Krone standards (1618, 1671, 1693), drawing on Wilcke I/II.'
    uk: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, с. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Канонічні
      значення трьох данських Krone-стандартів (1618, 1671, 1693) за Wilcke I/II.'
- id: ref5
  content:
    de: '<b>Nationalmuseet</b> (Kopenhagen): <i>Christian 4.s svindler-mønt fylder 400 år</i> — <a href="https://natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar/" target="_blank">natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar</a>.
      Beleg für die Auflösung «R.F.P» = «regna firmat pietas» und die Volksumdeutung «riget fattes penge» auf der Krone-Münze.'
    en: '<b>Nationalmuseet</b> (Copenhagen): <i>Christian 4.s svindler-mønt fylder 400 år</i> — <a href="https://natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar/" target="_blank">natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar</a>.
      Source for the «R.F.P» = «regna firmat pietas» abbreviation and the popular reread «riget fattes penge» on the Krone coin.'
    uk: '<b>Nationalmuseet</b> (Копенгаген): <i>Christian 4.s svindler-mønt fylder 400 år</i> — <a href="https://natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar/" target="_blank">natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar</a>.
      Джерело розшифрування «R.F.P» = «regna firmat pietas» та народної переінтерпретації «riget fattes penge» на Krone-монеті.'
- id: ref6
  content:
    de: <i>Møntforordninger m.v. under Christian 5. (1670–1699)</i> · danskmoent.dk (nach Schou) — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" 
      target="_blank">danskmoent.dk/artikler/c5mord.htm</a>. Sammlung der Münzedikte Christians V., einschließlich Münzordnung 22. März 1671 (10½-Krone-Fuß) und Reskript 31. Dezember 1692.
    en: <i>Møntforordninger m.v. under Christian 5. (1670–1699)</i> · danskmoent.dk (after Schou) — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" 
      target="_blank">danskmoent.dk/artikler/c5mord.htm</a>. Compilation of Christian V's mint edicts including the Mint Ordinance of 22 March 1671 (10½-Krone-Fuß) and the rescript of 31 December 
      1692.
    uk: <i>Møntforordninger m.v. under Christian 5. (1670–1699)</i> · danskmoent.dk (за Schou) — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" 
      target="_blank">danskmoent.dk/artikler/c5mord.htm</a>. Зведення монетних едиктів Кристіана V, у т.ч. Монетної постанови 22 березня 1671 (10½-Krone-Fuß) та рескрипту 31 грудня 1692.
- id: ref7
  content:
    de: "<b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href=\"https://www.danskmoent.dk/myst/aag1.htm\" target=\"_blank\">danskmoent.dk/myst/aag1.htm</a>.
      Quelle für die Glückstädter Hebræermønt 1644–1648 als Kriegsmünze während des Torstensonkrieges."
    en: "<b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href=\"https://www.danskmoent.dk/myst/aag1.htm\" target=\"_blank\">danskmoent.dk/myst/aag1.htm</a>.
      Source for the Glückstadt Hebræermønt 1644–1648 as war coinage during the Torstenson War."
    uk: "<b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href=\"https://www.danskmoent.dk/myst/aag1.htm\" target=\"_blank\">danskmoent.dk/myst/aag1.htm</a>.
      Джерело про Hebræermønt Glückstadt 1644–1648 як воєнну монету часів війни Торстенсона."
- id: ref8
  content:
    de: '<b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i> (København: G. E. C. Gads Forlag, 1919) — <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>.
      Standardwerk zur Christian-IV.-Münzpolitik einschließlich der übertarifierten Krone und des Greshamschen Verdrängungseffekts.'
    en: "<b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i> (Copenhagen: G. E. C. Gads Forlag, 1919) — <a href=\"https://www.danskmoent.dk/wilcke/w2ref.htm\" target=\"_blank\">danskmoent.dk/wilcke/w2ref.htm</a>.
      Standard work on Christian IV's monetary policy including the over-tariffed Krone and the Gresham displacement effect."
    uk: '<b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i> (Копенгаген: G. E. C. Gads Forlag, 1919) — <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>.
      Класична праця про монетну політику Кристіана IV, у т.ч. надтарифіковану Krone і витіснення за Грешемом.'
- id: ref9
  content:
    de: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, S. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Authoritative
      Monographie der drei Krone-Müntzfüße (Christian IV, Grove Kroner, Fine Kroner) mit Müntzfod-Tabellen und Sonderemissions-Datierungen.'
    en: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, pp. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Authoritative
      monograph on the three Krone Müntzfüße (Christian IV, grove kroner, fine kroner) with Müntzfod tables and dating of special issues.'
    uk: '<b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, с. 129–134 — <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Авторитетна
      монографія по трьох Krone-Müntzfüße (Кристіана IV, grove kroner, fine kroner) з таблицями Müntzfod і датуванням спецвипусків.'
- id: ref10
  content:
    de: "<b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — <a href=\"https://www.danskmoent.dk/artikler/f3guldkr.htm\" target=\"_blank\">danskmoent.dk/artikler/f3guldkr.htm</a>. Spezialmonographie
      über die goldene Pendant-Münze der Krone-Mønt-Kategorie unter Frederik III. mit Datierungen Glückstadt 1657–1660 und Kopenhagen 1655–1668."
    en: "<b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — <a href=\"https://www.danskmoent.dk/artikler/f3guldkr.htm\" target=\"_blank\">danskmoent.dk/artikler/f3guldkr.htm</a>. Specialist
      monograph on the gold counterpart of the Krone-Mønt category under Frederik III, with datings for Glückstadt 1657–1660 and Copenhagen 1655–1668."
    uk: "<b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — <a href=\"https://www.danskmoent.dk/artikler/f3guldkr.htm\" target=\"_blank\">danskmoent.dk/artikler/f3guldkr.htm</a>. Спеціалізована
      монографія про золоту відповідницю Krone-Mønt-категорії за Фредеріка III, з датуваннями Glückstadt 1657–1660 і Копенгаген 1655–1668."
- id: ref11
  content:
    de: '<b>Den Store Danske / lex.dk</b>: <i>dansk møntvæsen</i> — <a href="https://lex.dk/dansk_m%C3%B8ntv%C3%A6sen" target="_blank">lex.dk/dansk møntvæsen</a>. Periodisierungsmarken: 1692 (Übergang Krone-Mønt
      → Kurantmønt) und Møntloven 23. Mai 1873 (Krone als Goldhauptmünze).'
    en: '<b>Den Store Danske / lex.dk</b>: <i>dansk møntvæsen</i> — <a href="https://lex.dk/dansk_m%C3%B8ntv%C3%A6sen" target="_blank">lex.dk/dansk møntvæsen</a>. Periodisation markers: 1692 (Krone-Mønt
      → Kurantmønt transition) and Møntlov of 23 May 1873 (Krone as principal gold coin).'
    uk: '<b>Den Store Danske / lex.dk</b>: <i>dansk møntvæsen</i> — <a href="https://lex.dk/dansk_m%C3%B8ntv%C3%A6sen" target="_blank">lex.dk/dansk møntvæsen</a>. Періодизаційні маркери: 1692 (перехід Krone-Mønt
      → Kurantmønt) і Møntlov 23 травня 1873 (Krone як головна золота монета).'
- id: ref12
  content:
    de: 'Wikipedia (de): <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Datierung des Christian-IVs-Krone-Programmes
      1618–1624/25 und der Frederik-III.-Fortsetzung 1651–1652 mit Übergang zum 10½-Krone-Fuß.'
    en: "Wikipedia (de): <i>Corona Danica</i> — <a href=\"https://de.wikipedia.org/wiki/Corona_Danica\" target=\"_blank\">de.wikipedia.org/wiki/Corona_Danica</a>. Dating of Christian IV's Krone programme
      1618–1624/25 and Frederik III's 1651–1652 continuation, with transition to the 10½-Krone-Fuß."
    uk: 'Wikipedia (de): <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Датування програми Krone Кристіана IV 1618–1624/25
      та продовження Фредеріка III 1651–1652 з переходом на 10½-Krone-Fuß.'
- id: ref13
  content:
    de: '<b>Aagaard, Sven</b>: <i>Frederik III Kronemønt København 1651–1670</i> (København 2004). Spezialmonographie zur Frederik-III.-Krone-Phase in Kopenhagen, mit Übergangsperiode 1651–1652 zwischen
      alter Christian-IV.-Müntzformel und neuem 10½-Krone-Fuß. Nur Druckausgabe.'
    en: '<b>Aagaard, Sven</b>: <i>Frederik III Kronemønt København 1651–1670</i> (Copenhagen 2004). Specialist monograph on the Frederik III Krone phase at the Copenhagen mint, covering the 1651–1652 transition
      between the old Christian IV mint formula and the new 10½-Krone-Fuß. Print only.'
    uk: '<b>Aagaard, Sven</b>: <i>Frederik III Kronemønt København 1651–1670</i> (Копенгаген 2004). Спеціалізована монографія про фазу Krone Фредеріка III у Копенгагені, з перехідним періодом 1651–1652
      між старою монетною формулою Кристіана IV та новим 10½-Krone-Fuß. Лише друковане видання.'
- id: ref14
  content:
    de: '<b>Aagaard, Sven</b>: <i>Frederik III Guldmønt og speciemønt 1648–1670</i> (København 2011). Spezialmonographie zu Frederik-III.-Goldprägungen einschließlich der Guldkrone-Tarifserie 1655–1668
      und der Speciedukat-Reform vom 2. Januar 1658. Nur Druckausgabe.'
    en: "<b>Aagaard, Sven</b>: <i>Frederik III Guldmønt og speciemønt 1648–1670</i> (Copenhagen 2011). Specialist monograph on Frederik III's gold issues including the Guldkrone tariff series 1655–1668
      and the Speciedukat reform of 2 January 1658. Print only."
    uk: '<b>Aagaard, Sven</b>: <i>Frederik III Guldmønt og speciemønt 1648–1670</i> (Копенгаген 2011). Спеціалізована монографія про золоті випуски Фредеріка III, у т.ч. тарифну серію Guldkrone 1655–1668
      і реформу Speciedukat 2 січня 1658. Лише друковане видання.'
- id: ref15
  content:
    de: '<b>Aagaard, Sven et al.</b>: <i>Christian V — Kronemønt, speciedalere og dukater — Glückstadt 1671–1696</i> (København 2022). Spezialmonographie zur Glückstadter Krone-Mønt-Phase unter Christian
      V., einschließlich der formellen 10½-Krone-Fuß-Festschreibung 1671. Nur Druckausgabe.'
    en: '<b>Aagaard, Sven et al.</b>: <i>Christian V — Kronemønt, speciedalere og dukater — Glückstadt 1671–1696</i> (Copenhagen 2022). Specialist monograph on the Glückstadt Krone-Mønt phase under Christian
      V, including the formal codification of the 10½-Krone-Fuß in 1671. Print only.'
    uk: '<b>Aagaard, Sven et al.</b>: <i>Christian V — Kronemønt, speciedalere og dukater — Glückstadt 1671–1696</i> (Копенгаген 2022). Спеціалізована монографія про ґлюкштадтську фазу Krone-Mønt за Кристіана
      V, у т.ч. формальне закріплення 10½-Krone-Fuß 1671 р. Лише друковане видання.'
- id: ref16
  content:
    de: '<b>Wilcke, Julius</b>: <i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i> (Wilcke II) (København: G. E. C. Gads Forlag, 1924) — <a href="https://www.danskmoent.dk/wilcke/w2ref.htm"
      target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Primärbeleg für das åbne Brev vom 12. Juli 1618 (Anm. 53), inkl. Querverweis auf Wilcke I S. 156–157.'
    en: '<b>Wilcke, Julius</b>: <i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i> (Wilcke II) (Copenhagen: G. E. C. Gads Forlag, 1924) — <a href="https://www.danskmoent.dk/wilcke/w2ref.htm"
      target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Primary attestation of the åbne Brev of 12 July 1618 (note 53), with cross-reference to Wilcke I pp. 156–157.'
    uk: '<b>Wilcke, Julius</b>: <i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i> (Wilcke II) (Копенгаген: G. E. C. Gads Forlag, 1924) — <a href="https://www.danskmoent.dk/wilcke/w2ref.htm"
      target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Першоджерело åbne Brev від 12 липня 1618 (прим. 53) із перехресним посиланням на Wilcke I с. 156–157.'
- id: ref17
  content:
    de: '<b>Ingvardson, Gitte Tarnow &amp; Märcher, Michael</b>: <i>Christian 4.s guldmønt fra Esrum Møllegård</i>, in: M. Andersen &amp; P. O. Nielsen (red.), <i>Danefæ – Skatte fra den danske muld</i>
      (København: Nationalmuseet, 2010), S. 254–257 — <a href="https://portal.research.lu.se/en/publications/christian-4s-guldm%C3%B8nt-fra-esrum-m%C3%B8lleg%C3%A5rd" target="_blank">portal.research.lu.se</a>.
      Belegt drei Doppelguldkronen Christians IV. von 1628 (Hede 28) aus dem Esrum-Schatzfund.'
    en: '<b>Ingvardson, Gitte Tarnow &amp; Märcher, Michael</b>: <i>Christian 4.s guldmønt fra Esrum Møllegård</i>, in: M. Andersen &amp; P. O. Nielsen (eds.), <i>Danefæ – Skatte fra den danske muld</i>
      (Copenhagen: Nationalmuseet, 2010), pp. 254–257 — <a href="https://portal.research.lu.se/en/publications/christian-4s-guldm%C3%B8nt-fra-esrum-m%C3%B8lleg%C3%A5rd" target="_blank">portal.research.lu.se</a>.
      Documents three Christian IV double Guldkroner of 1628 (Hede 28) from the Esrum hoard.'
    uk: '<b>Ingvardson, Gitte Tarnow &amp; Märcher, Michael</b>: <i>Christian 4.s guldmønt fra Esrum Møllegård</i>, у: M. Andersen &amp; P. O. Nielsen (ред.), <i>Danefæ – Skatte fra den danske muld</i>
      (Копенгаген: Nationalmuseet, 2010), с. 254–257 — <a href="https://portal.research.lu.se/en/publications/christian-4s-guldm%C3%B8nt-fra-esrum-m%C3%B8lleg%C3%A5rd" target="_blank">portal.research.lu.se</a>.
      Документує три подвійні Guldkrone Кристіана IV 1628 (Hede 28) зі скарбу Esrum.'
- id: ref18
  content:
    de: '<b>Lov nr. 66 af 23. maj 1873 om Mønten</b> (Møntloven) — dänisches Coinage Act unter Christian IX., wirksam 1. Januar 1875. Definiert den Krone-Gold-Standard: 2480 Kroner aus 1 kg Feingold bei
      .900 Feingehalt; 100 Øre = 1 Krone. Companion-Regulierungen: <i>Bek. nr. 88 af 26. juni 1873</i> (dänisch-schwedische Münzkonvention), <i>Bek. nr. 115 af 23. august 1873</i> (Stempel für 10-/20-Krone-Goldmünzen),
      <i>Bek. nr. 156 af 16. december 1873</i> (Festlegung der Goldmünzen als gesetzliches Zahlmittel). Übersicht: <a href="https://www.danskmoent.dk/artikler/aclove3.htm" target="_blank">danskmoent.dk/artikler/aclove3.htm</a>.'
    en: '<b>Lov nr. 66 of 23 May 1873 om Mønten</b> (Møntloven) — Danish Coinage Act under Christian IX, effective 1 January 1875. Defines the Krone gold standard: 2,480 Kroner per kg of fine gold at .900
      fineness; 100 øre = 1 Krone. Companion regulations: <i>Bek. nr. 88 of 26 June 1873</i> (Danish-Swedish monetary convention), <i>Bek. nr. 115 of 23 August 1873</i> (dies for the 10/20-Krone gold coins),
      <i>Bek. nr. 156 of 16 December 1873</i> (gold coins established as legal tender). Index: <a href="https://www.danskmoent.dk/artikler/aclove3.htm" target="_blank">danskmoent.dk/artikler/aclove3.htm</a>.'
    uk: '<b>Lov nr. 66 від 23 травня 1873 om Mønten</b> (Møntloven) — данський Coinage Act за Кристіана IX, чинний з 1 січня 1875. Визначає Krone-золотий стандарт: 2480 Krone з 1 кг чистого золота за пробою
      .900; 100 øre = 1 Krone. Супровідні регуляції: <i>Bek. nr. 88 від 26 червня 1873</i> (дансько-шведська монетна конвенція), <i>Bek. nr. 115 від 23 серпня 1873</i> (штемпелі для 10/20-Krone золотих
      монет), <i>Bek. nr. 156 від 16 грудня 1873</i> (встановлення золотих монет як законного платіжного засобу). Огляд: <a href="https://www.danskmoent.dk/artikler/aclove3.htm" target="_blank">danskmoent.dk/artikler/aclove3.htm</a>.'
- id: ref19
  content:
    de: '<b>Den Skandinaviske Møntunion</b> — Skandinavische Müntzkonvention Stockholm 5. Mai 1873 zwischen Dänemark und Schweden; Norwegen tritt 1875 bei. Gemeinsame Krone-Goldwährung; 1 Krone = 1 Krona
      = ½ Rigsdaler (DK) = ¼ Speciedaler (NO). Goldkonvertibilität durch Danmarks Nationalbank am 2. August 1914 ausgesetzt (Beginn des Ersten Weltkriegs); die Müntzunion formell aufgelöst 1924. Wikipedia:
      <a href="https://da.wikipedia.org/wiki/Den_Skandinaviske_M%C3%B8ntunion" target="_blank">da.wikipedia.org</a> · <a href="https://en.wikipedia.org/wiki/Scandinavian_Monetary_Union" target="_blank">en.wikipedia.org</a>
      · Lex.dk: <a href="https://lex.dk/Den_Skandinaviske_M%C3%B8ntunion" target="_blank">lex.dk/Den_Skandinaviske_Møntunion</a>.'
    en: '<b>Den Skandinaviske Møntunion</b> — Scandinavian Monetary Convention of 5 May 1873 (Stockholm) between Denmark and Sweden; Norway accedes in 1875. Common Krone gold currency; 1 Krone = 1 Krona
      = ½ Rigsdaler (DK) = ¼ Speciedaler (NO). Gold convertibility suspended by Danmarks Nationalbank on 2 August 1914 (outbreak of WWI); the monetary union formally dissolved in 1924. Wikipedia: <a href="https://da.wikipedia.org/wiki/Den_Skandinaviske_M%C3%B8ntunion"
      target="_blank">da.wikipedia.org</a> · <a href="https://en.wikipedia.org/wiki/Scandinavian_Monetary_Union" target="_blank">en.wikipedia.org</a> · Lex.dk: <a href="https://lex.dk/Den_Skandinaviske_M%C3%B8ntunion"
      target="_blank">lex.dk/Den_Skandinaviske_Møntunion</a>.'
    uk: '<b>Den Skandinaviske Møntunion</b> — Скандинавська монетна конвенція 5 травня 1873 р. (Стокгольм) між Данією та Швецією; Норвегія приєднується 1875 р. Спільна Krone-золота валюта; 1 Krone = 1 Krona
      = ½ Rigsdaler (DK) = ¼ Speciedaler (NO). Конвертованість у золото призупинено Danmarks Nationalbank 2 серпня 1914 р. (початок Першої світової війни); монетна унія формально розпущена 1924 р. Wikipedia:
      <a href="https://da.wikipedia.org/wiki/Den_Skandinaviske_M%C3%B8ntunion" target="_blank">da.wikipedia.org</a> · <a href="https://en.wikipedia.org/wiki/Scandinavian_Monetary_Union" target="_blank">en.wikipedia.org</a>
      · Lex.dk: <a href="https://lex.dk/Den_Skandinaviske_M%C3%B8ntunion" target="_blank">lex.dk/Den_Skandinaviske_Møntunion</a>.'
- id: ref20
  content:
    de: '<b>«Den skandinaviske flugt fra sølvet»</b> — danskmoent.dk-Artikel zur skandinavischen Übergangsdebatte 1872–1873. Dokumentiert das Kopenhagener Konferenz-Protokoll vom Juli 1872, die explizite
      Ablehnung der Lateinischen Münzunion durch Dänemark («<i>det var både praktisk umuligt og økonomisk ufornuftigt at have et bimetalisk system</i>») und das gewählte Gold-zu-Silber-Verhältnis 1:15.5.
      <a href="https://www.danskmoent.dk/artikler/flugt.htm" target="_blank">danskmoent.dk/artikler/flugt.htm</a>.'
    en: '<b>«Den skandinaviske flugt fra sølvet»</b> — danskmoent.dk article on the 1872-1873 Scandinavian transition debate. Documents the Copenhagen conference protocol of July 1872, Denmark''s explicit
      rejection of the Latin Monetary Union («<i>det var både praktisk umuligt og økonomisk ufornuftigt at have et bimetalisk system</i>»), and the adopted gold:silver ratio of 1:15.5. <a href="https://www.danskmoent.dk/artikler/flugt.htm"
      target="_blank">danskmoent.dk/artikler/flugt.htm</a>.'
    uk: '<b>«Den skandinaviske flugt fra sølvet»</b> — стаття danskmoent.dk про скандинавські перехідні дебати 1872–1873 рр. Документує протокол копенгагенської конференції липня 1872, явну відмову Данії
      від Латинського монетного союзу («<i>det var både praktisk umuligt og økonomisk ufornuftigt at have et bimetalisk system</i>») та обране співвідношення золота до срібла 1:15,5. <a href="https://www.danskmoent.dk/artikler/flugt.htm"
      target="_blank">danskmoent.dk/artikler/flugt.htm</a>.'
- id: ref21
  content:
    de: '<b>Abildgren, Kim</b>: <i>A chronology of Denmark''s exchange-rate policy 1875-2003</i> (Danmarks Nationalbank Working Paper Series, 2004) — <a href="https://www.econstor.eu/bitstream/10419/82375/2/386525536.pdf"
      target="_blank">econstor.eu PDF, 32 S.</a>. Akademische Chronologie der dänischen Wechselkurspolitik von der Krone-Einführung 1875 bis 2003. Goldsuspendierung 2. August 1914 (S. 14: «<i>an Act was
      passed on 2 August 1914 suspending the Nationalbank''s obligation to convert its notes into gold</i>»); Rückkehr zum Goldstandard zur Vorkriegs-Parität 1. Januar 1927 (S. 17: «<i>With effect from
      1 January 1927 the Gold Standard was reintroduced in Denmark ... the Danish krone returned to gold at the pre-war parity</i>»).'
    en: '<b>Abildgren, Kim</b>: <i>A chronology of Denmark''s exchange-rate policy 1875-2003</i> (Danmarks Nationalbank Working Paper Series, 2004) — <a href="https://www.econstor.eu/bitstream/10419/82375/2/386525536.pdf"
      target="_blank">econstor.eu PDF, 32 pp.</a>. Academic chronology of Danish exchange-rate policy from the Krone''s 1875 introduction to 2003. Gold suspension 2 August 1914 (p. 14: «<i>an Act was passed
      on 2 August 1914 suspending the Nationalbank''s obligation to convert its notes into gold</i>»); return to the Gold Standard at pre-war parity on 1 January 1927 (p. 17: «<i>With effect from 1 January
      1927 the Gold Standard was reintroduced in Denmark ... the Danish krone returned to gold at the pre-war parity</i>»).'
    uk: '<b>Abildgren, Kim</b>: <i>A chronology of Denmark''s exchange-rate policy 1875-2003</i> (Danmarks Nationalbank Working Paper Series, 2004) — <a href="https://www.econstor.eu/bitstream/10419/82375/2/386525536.pdf"
      target="_blank">econstor.eu PDF, 32 с.</a>. Академічна хронологія данської політики обмінного курсу від запровадження Krone 1875 до 2003 р. Призупинення золотого стандарту 2 серпня 1914 (с. 14: «<i>an
      Act was passed on 2 August 1914 suspending the Nationalbank''s obligation to convert its notes into gold</i>»); повернення до Gold Standard за довоєнним паритетом 1 січня 1927 (с. 17: «<i>With effect
      from 1 January 1927 the Gold Standard was reintroduced in Denmark ... the Danish krone returned to gold at the pre-war parity</i>»).'
