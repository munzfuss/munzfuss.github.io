        <b>Wikipedia DE</b>: <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Belegt die Datierung des Christian-IVs-Krone-Programmes und die Tarifgeschichte. Verbatim-Belege:<br>· «<i>Im Jahr 1618 führte Christian IV. die Corona Danica ein</i>» — Einführungsdatum.<br>· «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>» — Christian-IV.-personnelle Prägung 1618–1624/25.<br>· «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>» — entscheidender Beleg für die Fortsetzung der Christian-IV.-Münzformel (16,25 g Feinsilber) durch Frederik III. ab 1651, vor dem Übergang zum 10½-Krone-Fuß (14,964 g) ab 1652.<br>· Tarif: «<i>Christian IV. gab die Corona Danica für 1 1/2 Reichstaler aus</i>» und «<i>musste die Corona Danica 1625 auf 1 1/3 Reichstaler abgewertet werden</i>».<br>· Spezifikation: «<i>Sie war jedoch 13 3/4 lötig und enthielt nur 32,5 Gramm Silber</i>» (Doppelkrone).
      en: |-
        <b>Wikipedia DE</b>: <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Establishes the dating of the Christian IV Krone programme and the tariff history. Verbatim points:<br>· «<i>Im Jahr 1618 führte Christian IV. die Corona Danica ein</i>» — introduction date.<br>· «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>» — Christian IV's personal mintage 1618–1624/25.<br>· «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>» — decisive evidence that Frederik III continued the Christian IV mint formula (16.25 g fine silver) from 1651 before transitioning to the 10½-Krone-Fuß (14.964 g) from 1652 onward.<br>· Tariff: «<i>Christian IV. gab die Corona Danica für 1 1/2 Reichstaler aus</i>» and «<i>musste die Corona Danica 1625 auf 1 1/3 Reichstaler abgewertet werden</i>».<br>· Specification: «<i>Sie war jedoch 13 3/4 lötig und enthielt nur 32,5 Gramm Silber</i>» (Doppelkrone).
      uk: |-
        <b>Wikipedia DE</b>: <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a>. Підтверджує датування програми Krone Кристіана IV та історію тарифу. Verbatim-цитати:<br>· «<i>Im Jahr 1618 führte Christian IV. die Corona Danica ein</i>» — дата запровадження.<br>· «<i>Die ursprüngliche Krone und ihre Teilstücke wurden nur bis 1624, teilweise bis 1625 geprägt</i>» — особистий період карбування Кристіана IV 1618–1624/25.<br>· «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>» — вирішальний доказ продовження Фредеріком III монетної формули Кристіана IV (16,25 г чистого срібла) з 1651 р. перед переходом на 10½-Krone-Fuß (14,964 г) з 1652 р.<br>· Тариф: «<i>Christian IV. gab die Corona Danica für 1 1/2 Reichstaler aus</i>» і «<i>musste die Corona Danica 1625 auf 1 1/3 Reichstaler abgewertet werden</i>».<br>· Специфікація: «<i>Sie war jedoch 13 3/4 lötig und enthielt nur 32,5 Gramm Silber</i>» (Doppelkrone).

