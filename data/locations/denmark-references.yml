        <b>Den Store Danske / lex.dk</b>: <i>dansk møntvæsen</i> — <a href="https://lex.dk/dansk_m%C3%B8ntv%C3%A6sen" target="_blank">lex.dk/dansk møntvæsen</a>. Verbatim: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>» — fixiert die zentrale Periodisierungsmarke 1692 als Übergang vom Krone-Mønt-System zum Kurantmønt-System (Speciedaler-/Kurantdaler-dominiert). Ferner zur Modernisierung: «<i>Med Møntloven 1873, hvor guldtyvekronen blev hovedmønt</i>» — Møntloven vom 23. Mai 1873 (Inkrafttreten 1. Januar 1875) etabliert die moderne Krone als Goldhauptmünze und beendet das alte Krone-/Kurant-/Rigsbankdaler-System endgültig.
      en: |-
        <b>Den Store Danske / lex.dk</b>: <i>dansk møntvæsen</i> — <a href="https://lex.dk/dansk_m%C3%B8ntv%C3%A6sen" target="_blank">lex.dk/dansk møntvæsen</a>. Verbatim: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>» — fixes the central periodisation marker 1692 as the transition from the Krone-Mønt system to the Kurantmønt system (Speciedaler-/Kurantdaler-dominated). On the modern reform: «<i>Med Møntloven 1873, hvor guldtyvekronen blev hovedmønt</i>» — the Møntlov of 23 May 1873 (in force 1 January 1875) establishes the modern Krone as the principal gold coin and definitively closes the old Krone / Kurant / Rigsbankdaler system.
      uk: |-
        <b>Den Store Danske / lex.dk</b>: <i>dansk møntvæsen</i> — <a href="https://lex.dk/dansk_m%C3%B8ntv%C3%A6sen" target="_blank">lex.dk/dansk møntvæsen</a>. Verbatim: «<i>Kroneudmøntningen blev fra 1692 afløst af kurantudmøntningen</i>» — фіксує ключовий періодизаційний маркер 1692 як перехід від системи Krone-Mønt до системи Kurantmønt (з домінуванням Speciedaler/Kurantdaler). Про модерну реформу: «<i>Med Møntloven 1873, hvor guldtyvekronen blev hovedmønt</i>» — Møntlov від 23 травня 1873 р. (чинність з 1 січня 1875 р.) встановлює сучасну Krone як головну золоту монету і остаточно закриває стару систему Krone / Kurant / Rigsbankdaler.

