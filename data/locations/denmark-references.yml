- id: ref26
  content:
    de: '<b>Wikipedia DE «Abschlag (Numismatik)»</b> — <a href="https://de.wikipedia.org/wiki/Abschlag_(Numismatik)" target="_blank">de.wikipedia.org/wiki/Abschlag (Numismatik)</a>. Begriff für eine Münzprägung
      in einem Metall, für das der betreffende Münzstempel nicht bestimmt ist (Goldabschlag eines Silberstempels, dänisch <i>Guldafslag</i>); meist Sammelprägung oder Repräsentationsstück, nicht für den
      Umlauf.'
    en: '<b>Wikipedia DE «Abschlag (Numismatik)»</b> — <a href="https://de.wikipedia.org/wiki/Abschlag_(Numismatik)" target="_blank">de.wikipedia.org/wiki/Abschlag (Numismatik)</a>. Term for a coin strike
      in a metal other than that for which the die was made (gold strike of a silver die, Danish <i>Guldafslag</i>); typically a collector or presentation issue, not for circulation.'
    uk: '<b>Wikipedia DE «Abschlag (Numismatik)»</b> — <a href="https://de.wikipedia.org/wiki/Abschlag_(Numismatik)" target="_blank">de.wikipedia.org/wiki/Abschlag (Numismatik)</a>. Термін для карбування
      монети в металі, для якого штемпель не призначався (золоте карбування зі срібного штемпеля, данською <i>Guldafslag</i>); зазвичай колекційний або презентаційний випуск, не для обігу.'
