- id: ref29
  content:
    de: '<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481–1588</i> (København: Munksgaard, 1950). Kap. 7-4 «Christian IIIs møntreform 1541-1547», pp. 13-26. Verbatim aus der Møntordning
      vom 20. September 1541: «<i>Allffue Daler aff Hallffemtandeskab Lod (= 14½ Lod) findt Sølff aff en Cølnschk Marck</i>» (S. 13) — Acht Daler aus einer Cölln. Marck fein bei 14½ Lod Probe. Quelle für
      mf 8,827 (Phase A1 baseline) + mf 9,481 (Phase A2 nach Tillæg 27. September 1544, S. 14-15) + 14¼ Lod Flensborg-Bestalling 22. Januar 1547 (pp. 25-26).'
    en: '<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481–1588</i> (Copenhagen: Munksgaard, 1950). Kap. 7-4 «Christian III''s møntreform 1541-1547», pp. 13-26. Verbatim from the Møntordning
      of 20 September 1541: «<i>Allffue Daler aff Hallffemtandeskab Lod (= 14½ Lod) findt Sølff aff en Cølnschk Marck</i>» (p. 13) — eight Daler per Cologne mark fine at 14½ Lod fineness. Source for mf
      8.827 (Phase A1 baseline) + mf 9.481 (Phase A2 after the Tillæg of 27 September 1544, pp. 14-15) + 14¼ Lod Flensborg Bestalling of 22 January 1547 (pp. 25-26).'
    uk: '<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481–1588</i> (Копенгаген: Munksgaard, 1950). Kap. 7-4 «Christian III''s møntreform 1541-1547», pp. 13-26. Дослівно з Møntordning 20
      вересня 1541: «<i>Allffue Daler aff Hallffemtandeskab Lod (= 14½ Lod) findt Sølff aff en Cølnschk Marck</i>» (с. 13) — вісім Daler з кельнської марки чистого срібла за пробою 14½ Lod. Джерело для
      mf 8,827 (фаза A1 baseline) + mf 9,481 (фаза A2 після Tillæg 27 вересня 1544, с. 14-15) + 14¼ Lod Flensborg Bestalling 22 січня 1547 (pp. 25-26).'
- id: ref30
  content:
    de: '<b>Paus, Hans</b>: <i>Samling af Gamle Norske Love</i>, Vol. II (København, 1752). Pp. 247-251 verbatim Transkript des Tillæg «<i>Om Maal og Vægt</i>» vom 27. September 1544 — sekundärer Quellennachweis
      für die Christian-III-Daler-fod Phase A2 Debasierung (mf 9,481, Raugewicht reduziert, Feingehalt unverändert 14½ Lod). Paus übernimmt den Wortlaut aus Rigsarkivet T.K. nr. 160 und schließt damit die
      archivalisch-publizierte Quellenkette für die A2-Phase.'
    en: '<b>Paus, Hans</b>: <i>Samling af Gamle Norske Love</i>, Vol. II (Copenhagen, 1752). Pp. 247-251 verbatim transcript of the Tillæg «<i>Om Maal og Vægt</i>» of 27 September 1544 — a secondary source
      documenting the 8-Daler-Fod Phase A2 debasement (mf 9.481, reduced rough weight, fineness unchanged at 14½ Lod). Paus reproduces the wording from Rigsarkivet T.K. nr. 160, closing the archival-published
      source chain for the A2 phase.'
    uk: '<b>Paus, Hans</b>: <i>Samling af Gamle Norske Love</i>, Vol. II (Копенгаген, 1752). Pp. 247-251 дослівний транскрипт Tillæg «<i>Om Maal og Vægt</i>» від 27 вересня 1544 — вторинне джерелознавче
      підтвердження фази A2 девальвації 8-Daler-Fod (mf 9,481, повна вага зменшена, проба незмінна 14½ Lod). Paus відтворює формулювання з Rigsarkivet T.K. nr. 160, закриваючи архівно-публіковану
      джерелознавчу ланку фази A2.'
- id: ref31
  content:
    de: '<b>Rigsarkivet T.K. nr. 160</b>: «<i>Diverse møntsager 1523-1619</i>» (Statens Arkiver, København). Fol. 12r-15v primärquellen-archivalischer Korpus der Møntordning af 20. September 1541 + Tillæg
      af 27. September 1544. Primäres Archivanker für die 8-Daler-Fod-Metriken (mf 8,827 baseline, mf 9,481 debasiert) vor der Sekundärquellenkette Paus 1752 + Wilcke 1950.'
    en: '<b>Rigsarkivet T.K. nr. 160</b>: «<i>Diverse møntsager 1523-1619</i>» (Statens Arkiver, Copenhagen). Fol. 12r-15v primary-source archival corpus of the Møntordning af 20. September 1541 + Tillæg
      af 27. September 1544. Primary archival anchor for the 8-Daler-Fod metrics (mf 8.827 baseline, mf 9.481 debased) preceding the secondary-source chain Paus 1752 + Wilcke 1950.'
    uk: '<b>Rigsarkivet T.K. nr. 160</b>: «<i>Diverse møntsager 1523-1619</i>» (Statens Arkiver, Копенгаген). Fol. 12r-15v первинно-джерельний архівний корпус Møntordning af 20. September 1541 + Tillæg
      af 27. September 1544. Первинний архівний якір для метрики 8-Daler-Fod (mf 8,827 baseline, mf 9,481 знижений) перед вторинно-джерельною ланкою Paus 1752 + Wilcke 1950.'
- id: ref32
  content:
    de: '<b>Galster, Georg</b>: <i>Danmarks mønter 1481-1559</i> (København: Nationalmuseet, 1965). Quote aus dem Tillæg vom 27. September 1544 «<i>8 stk per 14½-lødig Cölln. Marck</i>» (8 Stück je 14½-lodige
      Cölln. Marck) — period-Vokabular für die Christian-III-Daler-fod Marken-fin-Formel (Daler @ 14½ Lod, 8-pcs-per-Marck-rauh-Grid). Sekundäre numismatische Synthese der Galster-Schule, die Wilcke 1950
      ergänzt und für die Flensborg-track (c3h15-c3h22 Sølvgylden + Søsling lybsk Hauptmünzen) das Primär-Katalog-Register liefert (zusammen mit Jensen-Skjoldager 2021 — Paper-Source-Import pending, §AZ).'
    en: '<b>Galster, Georg</b>: <i>Danmarks mønter 1481-1559</i> (Copenhagen: Nationalmuseet, 1965). Quoting the Tillæg of 27 September 1544 «<i>8 stk per 14½-lødig Cölln. Marck</i>» (8 pieces per 14½-Lod
      Cologne mark) — period vocabulary for the 8-Daler-Fod Marken-fin formula (Daler at 14½ Lod, 8-pcs-per-Marck-rough grid). Secondary numismatic synthesis of the Galster school, complementing
      Wilcke 1950 and providing the primary-catalogue register for the Flensborg track (c3h15-c3h22 Sølvgylden + Søsling lybsk main coinage; together with Jensen-Skjoldager 2021 — paper-source import pending,
      §AZ).'
    uk: '<b>Galster, Georg</b>: <i>Danmarks mønter 1481-1559</i> (Копенгаген: Nationalmuseet, 1965). Цитата з Tillæg 27 вересня 1544 «<i>8 stk per 14½-lødig Cölln. Marck</i>» (8 шт. з 14½-lodiсteine кельнської
      марки) — period-вокабулар для формули Marken-fin 8-Daler-Fod (Daler за 14½ Lod, 8-шт-на-марку-повної-сітка). Вторинна нумізматична синтеза галстерівської школи, доповнює Wilcke 1950 і дає
      первинний каталоговий реєстр для Flensborg-track (основне карбування c3h15-c3h22 Sølvgylden + Søsling lybsk; разом з Jensen-Skjoldager 2021 — paper-source імпорт очікується, §AZ).'
- id: ref33
  content:
    de: '<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481-1588</i>, Kap. 6 «Rentemesterregnskaber under Frederik 2.» — <a href="https://www.danskmoent.dk/wilcke/w6b1.htm" target="_blank">danskmoent.dk/wilcke/w6b1.htm</a>.
      Primärquellenauszug aus den Rentmeister-Rechnungen Frederiks II.: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — direkter archivalischer Beleg für die Karbung der Frederik-II-Guldkrone
      am 17. Oktober 1563: 66½ Marck Kroneguld-Legierung wurden zu 4860 Krone-Klippingen ausgeprägt. Erste belegfähige Stückzahl + Materialeinsatz der Karbung. Mintmaster Hans de Wüllers (Guldsmeed, 1563),
      Hans Köppelin (Møntmester, 1564), Laurits Hammer (Bremerholm, 1565). Belegt drei parallele Gold-Linien Frederiks II.: Ungersk Gylden (Reichsdukatenfuß), Rhinsk Gylden (Rhinsk-Gyldenfod), Kroneguld
      (eigener Müntzfuß).'
    en: '<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481-1588</i>, Kap. 6 «Rentemesterregnskaber under Frederik 2.» — <a href="https://www.danskmoent.dk/wilcke/w6b1.htm" target="_blank">danskmoent.dk/wilcke/w6b1.htm</a>.
      Primary-source excerpt from Frederik II''s Rentmeister (treasurer) account records: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — direct archival attestation of the Frederik
      II Guldkrone minting on 17 October 1563: 66½ marks of Kroneguld alloy struck into 4,860 Krone clippings. First documented piece count + material input for the coinage. Mintmasters: Hans de Wüllers
      (goldsmith, 1563), Hans Köppelin (mint-master, 1564), Laurits Hammer (Bremerholm, 1565). Records three parallel Frederik II gold lines: Ungersk Gylden (Reichsdukatenfuß), Rhinsk Gylden (Rhinsk-Gyldenfod),
      Kroneguld (its own Müntzfuß).'
    uk: '<b>Wilcke, Julius</b>: <i>Renæssancens Mønt- og Pengeforhold 1481-1588</i>, Kap. 6 «Rentemesterregnskaber under Frederik 2.» — <a href="https://www.danskmoent.dk/wilcke/w6b1.htm" target="_blank">danskmoent.dk/wilcke/w6b1.htm</a>.
      Першоджерельна виписка з рент-майстерських (скарбничих) рахунків Фредеріка II: «<i>17. Oktbr., af 66 1/2 Marck Kroneguld 4,860 Krone Klippinge.</i>» — пряме архівне підтвердження карбування Frederik-II-Guldkrone
      17 жовтня 1563: 66½ марки сплаву Kroneguld перекарбовано на 4860 Krone-Klippinge. Перша задокументована кількість штук + матеріальний вклад карбування. Монетмайстри: Hans de Wüllers (золотар, 1563),
      Hans Köppelin (монетмайстер, 1564), Laurits Hammer (Bremerholm, 1565). Документує три паралельні золоті лінії Frederik II: Ungersk Gylden (Reichsdukatenfuß), Rhinsk Gylden (Rhinsk-Gyldenfod), Kroneguld
      (власний Müntzfuß).'
- id: ref34
  content:
    de: '<b>danskmoent.dk «1 Guldkrone»</b> — <a href="https://www.danskmoent.dk/1guldkro.htm" target="_blank">danskmoent.dk/1guldkro.htm</a>. Hede-Übersichtsseite für die Frederik-II-Guldkrone-Klippinge:
      «<i>Hede 2</i>» (1563, unikat) und «<i>Hede 5</i>» (1564), Kopenhagen, Brutto 3,341 g, Lødighed 0,934, Feingewicht 3,120 g. Drei parallele Goldarten dieser Karbung: <b>Ungersk Gylden</b> (ungarisch,
      Reichsdukatenfuß), <b>Rhinsk Gylden</b> (rheinisch, Rhinsk-Gyldenfod), <b>Kroneguld</b> (eigene Krone-Legierung, dieser Müntzfuß). Reversinschrift verbatim: «<i>I GOLT KRONE</i>» (parallel zu «I GOLT
      GILDEN» und «I DOK KATE» der Schwester-Goldarten).'
    en: '<b>danskmoent.dk «1 Guldkrone»</b> — <a href="https://www.danskmoent.dk/1guldkro.htm" target="_blank">danskmoent.dk/1guldkro.htm</a>. Hede overview page for the Frederik II Guldkrone Klippinge:
      «<i>Hede 2</i>» (1563, unique) and «<i>Hede 5</i>» (1564), Copenhagen, brutto 3.341 g, lødighed 0.934, fine weight 3.120 g. Three parallel gold types in this coinage: <b>Ungersk Gylden</b> (Hungarian,
      Reichsdukatenfuß), <b>Rhinsk Gylden</b> (Rhenish, Rhinsk-Gyldenfod), <b>Kroneguld</b> (own crown-gold alloy, this Müntzfuß). Reverse inscription verbatim: «<i>I GOLT KRONE</i>» (paralleling «I GOLT
      GILDEN» and «I DOK KATE» of the sister gold types).'
    uk: '<b>danskmoent.dk «1 Guldkrone»</b> — <a href="https://www.danskmoent.dk/1guldkro.htm" target="_blank">danskmoent.dk/1guldkro.htm</a>. Hede-оглядова сторінка для Frederik-II-Guldkrone-Klippinge:
      «<i>Hede 2</i>» (1563, унікат) і «<i>Hede 5</i>» (1564), Копенгаген, повна вага 3,341 г, проба 0,934, чиста вага 3,120 г. Три паралельні золоті типи цього карбування: <b>Ungersk Gylden</b> (угорський,
      Reichsdukatenfuß), <b>Rhinsk Gylden</b> (рейнський, Rhinsk-Gyldenfod), <b>Kroneguld</b> (власна Krone-легура, цей Müntzfuß). Реверс-напис verbatim: «<i>I GOLT KRONE</i>» (паралельно «I GOLT GILDEN»
      та «I DOK KATE» сестринських золотих типів).'
- id: ref35
  content:
    de: '<b>Frantzen, Ole L.</b> / <b>Bender Jørgensen, Lise</b>: <i>Den Nordiske Syvårskrig 1563-1570</i> (Historieforskning, mit Aufsatzbänden in Den Danske Krigshistorie). Hauptkonflikt zwischen Dänemark-Norwegen
      + Lübeck + Polen vs Schweden 1563-1570 — «<i>den største krise i Frederik II.s regering</i>» («the greatest crisis of Frederik II''s reign») per dänischer Historiographie. Direkter wirtschaftlicher
      Kontext für die Karbung der Klipping-Goldmünzen Frederiks II. 1563-1564: massive Kriegsfinanzierungs-Notwendigkeit erzwingt die parallele Karbung dreier Goldarten (Ungersk + Rhinsk + Krone) in Kopenhagen
      + Bremerholm. Siehe auch Historyofwar.org «<a href="https://www.historyofwar.org/articles/wars_nordic_seven_years.html" target="_blank">Nordic Seven Years War, 1563-1570</a>» für englischsprachige
      Synthese der Kriegsverlauf und Finanzierungs-Probleme der dänischen Söldnerarmee.'
    en: '<b>Frantzen, Ole L.</b> / <b>Bender Jørgensen, Lise</b>: <i>Den Nordiske Syvårskrig 1563-1570</i> (Danish historical research, with essays in <i>Den Danske Krigshistorie</i>). The main conflict
      between Denmark-Norway + Lübeck + Poland against Sweden in 1563-1570 — «<i>den største krise i Frederik II''s regering</i>» («the greatest crisis of Frederik II''s reign») per Danish historiography.
      Direct economic context for the minting of Frederik II''s 1563-1564 Klipping gold coins: massive wartime-financing pressure forced the parallel coining of three gold types (Ungersk + Rhinsk + Krone)
      at Copenhagen + Bremerholm. See also Historyofwar.org «<a href="https://www.historyofwar.org/articles/wars_nordic_seven_years.html" target="_blank">Nordic Seven Years War, 1563-1570</a>» for an English-language
      synthesis of the war''s course and the Danish mercenary-army financing crisis.'
    uk: '<b>Frantzen, Ole L.</b> / <b>Bender Jørgensen, Lise</b>: <i>Den Nordiske Syvårskrig 1563-1570</i> (данська історична розвідка, з нарисами у <i>Den Danske Krigshistorie</i>). Головний конфлікт між
      Данією-Норвегією + Любеком + Польщею проти Швеції 1563-1570 — «<i>den største krise i Frederik II''s regering</i>» («найбільша криза у правлінні Фредеріка II») за данською історіографією. Прямий економічний
      контекст для карбування Klipping-золотих монет Frederik II 1563-1564: масивна воєнно-фінансова потреба змушує до паралельного карбування трьох золотих типів (Ungersk + Rhinsk + Krone) у Копенгагені
      + Bremerholm. Див. також Historyofwar.org «<a href="https://www.historyofwar.org/articles/wars_nordic_seven_years.html" target="_blank">Nordic Seven Years War, 1563-1570</a>» — англомовна синтеза
      перебігу війни та фінансової кризи данської найманської армії.'
- id: ref36
  content:
    de: '<b>Stack''s Bowers Galleries</b>: <i>The L. E. Bruun Collection</i> — Auktionsreihe 2024-2026, Odd Fellow Palace Kopenhagen / Zürich. «<i>The L. E. Bruun Collection comprises Scandinavian coins amassed by Lars Emil Bruun (1852-1923).</i>» — <a href="https://stacksbowers.com/the-l-e-bruun-collection/" target="_blank">stacksbowers.com/the-l-e-bruun-collection</a>. Auktionskataloge Parts I-IV mit per-Lot-Metriken (Galster-, Hede-, Sieg-, Schou-Referenzen, Brutto-Gewichte, NGC-Grading-Daten) — Primärbeleg für die in unseren Daten verwendeten Bruun-Lot-Nummern.'
    en: '<b>Stack''s Bowers Galleries</b>: <i>The L. E. Bruun Collection</i> — auction series 2024-2026, Odd Fellow Palace Copenhagen / Zurich. «<i>The L. E. Bruun Collection comprises Scandinavian coins amassed by Lars Emil Bruun (1852-1923).</i>» — <a href="https://stacksbowers.com/the-l-e-bruun-collection/" target="_blank">stacksbowers.com/the-l-e-bruun-collection</a>. Auction catalogues Parts I-IV provide per-lot metrics (Galster, Hede, Sieg, Schou references, gross weights, NGC grading data) — primary attestation for the Bruun-lot numbers used in our data.'
    uk: '<b>Stack''s Bowers Galleries</b>: <i>The L. E. Bruun Collection</i> — аукціонна серія 2024-2026, Odd Fellow Palace Копенгаген / Цюрих. «<i>The L. E. Bruun Collection comprises Scandinavian coins amassed by Lars Emil Bruun (1852-1923).</i>» — <a href="https://stacksbowers.com/the-l-e-bruun-collection/" target="_blank">stacksbowers.com/the-l-e-bruun-collection</a>. Аукціонні каталоги Parts I-IV містять покоінні метрики (Galster, Hede, Sieg, Schou-референси, повні ваги, NGC-grading) — первинне підтвердження для номерів Bruun-лотів, які ми використовуємо у наших даних.'
- id: ref37
  content:
    de: '<b>danskmoent.dk «1 Nobel»</b> — <a href="https://www.danskmoent.dk/1nobel.htm" target="_blank">danskmoent.dk/1nobel.htm</a>. Hede-Übersichtsseite für die dänischen Nobler über drei Regenten: <b>Hans</b>
      (1496 Malmø/København Galster 24 / Schou 2-3 RRR; 1502 Malmø Galster 24 / Schou 2-3 unik); <b>Christian II.</b> (1516 Malmø Galster 37 / Schou 1 RRR; 1518 Malmø Galster 37 / Schou 1 RRR); <b>Frederik
      I.</b> (1532 København / Malmø Galster 45 / Schou 1 RRR; undatiert Ribe Galster 68 + Galster 69 unik). Belegt-Mintstätten: Malmø (primär), København, Ribe. Bilddarstellung: «<i>Siddende konge med
      glorie (Sct. Knud), bagside: våbenskjold</i>» (Hans) / «<i>Siddende konge, bagside: våbenskjold</i>» (Christian II / Frederik I) — Sct. Knud-Glorie ist Hans-spezifisch.'
    en: '<b>danskmoent.dk «1 Nobel»</b> — <a href="https://www.danskmoent.dk/1nobel.htm" target="_blank">danskmoent.dk/1nobel.htm</a>. Hede overview page for the Danish Nobler across three rulers: <b>Hans</b>
      (1496 Malmø/Copenhagen Galster 24 / Schou 2-3 RRR; 1502 Malmø Galster 24 / Schou 2-3 unique); <b>Christian II</b> (1516 Malmø Galster 37 / Schou 1 RRR; 1518 Malmø Galster 37 / Schou 1 RRR); <b>Frederik
      I</b> (1532 Copenhagen / Malmø Galster 45 / Schou 1 RRR; undated Ribe Galster 68 + Galster 69 unique). Documented mints: Malmø (primary), Copenhagen, Ribe. Image description: «<i>Seated king with
      halo (Saint Canute), reverse: coat of arms</i>» (Hans) / «<i>Seated king, reverse: coat of arms</i>» (Christian II / Frederik I) — the Saint Canute halo is Hans-specific.'
    uk: '<b>danskmoent.dk «1 Nobel»</b> — <a href="https://www.danskmoent.dk/1nobel.htm" target="_blank">danskmoent.dk/1nobel.htm</a>. Hede-оглядова сторінка для данських Nobler через трьох правителів:
      <b>Hans</b> (1496 Malmø/Копенгаген Galster 24 / Schou 2-3 RRR; 1502 Malmø Galster 24 / Schou 2-3 унікат); <b>Christian II</b> (1516 Malmø Galster 37 / Schou 1 RRR; 1518 Malmø Galster 37 / Schou 1
      RRR); <b>Frederik I</b> (1532 Копенгаген / Malmø Galster 45 / Schou 1 RRR; недатовано Ribe Galster 68 + Galster 69 унікат). Задокументовані монетні двори: Malmø (головний), Копенгаген, Ribe. Опис
      зображення: «<i>Сидячий король з ореолом (Свт. Канут), реверс: гербовий щит</i>» (Hans) / «<i>Сидячий король, реверс: гербовий щит</i>» (Christian II / Frederik I) — ореол Святого Канута специфічний
      для Hans.'
- id: ref38
  content:
    de: '<b>Wikipedia EN «Sovereign (British coin)»</b> — <a href="https://en.wikipedia.org/wiki/Sovereign_(British_coin)" target="_blank">en.wikipedia.org/wiki/Sovereign_(British_coin)</a>. «<i>It had
      a diameter of 42 millimetres (1.7 in), and weighed 15.55 grams (0.500 troy ounces), twice the weight of the existing gold coin, the ryal.</i>» — englischer Sovereign Heinrichs VII. von 1489: 15,55
      g Brutto, 42 mm Durchmesser, doppelt so schwer wie der Ryal/Rose Noble (7,78 g). Sovereign-Tier-Standard, 23 Karat Gold (.9583, später .917) — direktes Vorbild für die dänische Nobel-Karbung Hans''
      1496 (14,67 g, 7 Jahre nach Heinrich VII.). Übergang zwischen Spätmittelalter-Noble-Tradition (Edward III. 1344 Noble 8,97 g → Edward IV. 1465 Rose-Noble/Ryal 7,78 g → Heinrich VII. 1489 Sovereign
      15,55 g). Die dänische Nobel-Linie 1496-1532 entstand im Sog des englischen Sovereign-Vorbildes, vermittelt über den Øresund-Zoll (DK erhob Zoll von englischen Schiffen, Gold-Strom flo direkt in die
      königliche Münzstätte).'
    en: '<b>Wikipedia EN «Sovereign (British coin)»</b> — <a href="https://en.wikipedia.org/wiki/Sovereign_(British_coin)" target="_blank">en.wikipedia.org/wiki/Sovereign_(British_coin)</a>. «<i>It had
      a diameter of 42 millimetres (1.7 in), and weighed 15.55 grams (0.500 troy ounces), twice the weight of the existing gold coin, the ryal.</i>» — Henry VII''s English Sovereign of 1489: 15.55 g brutto,
      42 mm diameter, twice the weight of the Ryal/Rose Noble (7.78 g). Sovereign-tier standard, 23-carat gold (.9583, later .917) — direct model for the Danish Nobel coinage of Hans in 1496 (14.67 g, 7
      years after Henry VII). Transition between the late-medieval Noble tradition (Edward III 1344 Noble 8.97 g → Edward IV 1465 Rose Noble/Ryal 7.78 g → Henry VII 1489 Sovereign 15.55 g). The Danish Nobel
      line 1496-1532 arose in the wake of the English Sovereign''s model, mediated through the Øresund Toll (Denmark levied tolls on English ships; the gold flow ran directly into the royal mint).'
    uk: '<b>Wikipedia EN «Sovereign (British coin)»</b> — <a href="https://en.wikipedia.org/wiki/Sovereign_(British_coin)" target="_blank">en.wikipedia.org/wiki/Sovereign_(British_coin)</a>. «<i>It had
      a diameter of 42 millimetres (1.7 in), and weighed 15.55 grams (0.500 troy ounces), twice the weight of the existing gold coin, the ryal.</i>» — Англійський Sovereign Генрі VII 1489: 14,67 г повної
      ваги, 42 мм діаметр, удвічі важчий за Ryal/Rose Noble (7,78 г). Sovereign-tier стандарт, 23-каратне золото (.9583, пізніше .917) — пряма модель для данського карбування Nobel за Hans 1496 (14,67 г,
      через 7 років після Генрі VII). Перехід між пізньосередньовічною Noble-традицією (Edward III 1344 Noble 8,97 г → Edward IV 1465 Rose Noble/Ryal 7,78 г → Генрі VII 1489 Sovereign 15,55 г). Данська
      лінія Nobel 1496-1532 виникла у фарватері моделі англійського Sovereign, опосередкована через Øresund-мито (Данія стягувала мито з англійських кораблів; потік золота йшов безпосередньо у королівський
      монетний двір).'
