        <b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — Volltext: <a href="https://www.danskmoent.dk/artikler/f3guldkr.htm" target="_blank">danskmoent.dk/artikler/f3guldkr.htm</a>. Spezialmonographie über das goldene Pendant der Krone-Mønt-Kategorie unter Frederik III. (1648–1670). Verbatim-Belege:<br>· Datierung der Glückstadter Phase und der Kopenhagener Erstprägung: «<i>møntet i København 1655 og i Glückstadt 1657, 1659 og 1660</i>» — die <b>erste</b> Frederik-III.-Guldkrone ist demnach die Kopenhagener Prägung 1655, nicht die Glückstadter 1657.<br>· Zwei Müntzformeln: ältere «<i>5.996g - 0.917 - 5.496g</i>», jüngere «<i>5.590g - 0.917 - 5.126g</i>».<br>· Tarifgrundlage: «<i>forordningen af 2. januar 1658</i>» (Speciesdukat auf 12 Mark gehoben), «<i>guldkronen gjaldt 18 mark</i>» = «<i>1 1/2 dukat (5.126g fint guld)</i>».<br>· Programmstop: «<i>betænkning af 14. februar 1671 ... de icke paa andre Steder gangbar er</i>» — Commerce-Collegium-Empfehlung beendet das reguläre Guldkrone-Karbverfahren.<br>· Nachgeschichte: «<i>Ved kgl. resolution af 2. september 1701 ... fik Det Vestindiske Compagni Tilladelse til at slå 2 guldkroner</i>» — königliche Sondergenehmigung für das Vestindiske Compagni; reale Exemplare nicht überliefert, dokumentiert nur in Lauerentsen <i>Museum Regium</i>, 2-е Aufl., T. XXIII Nr. 11.
      en: |-
        <b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — full text: <a href="https://www.danskmoent.dk/artikler/f3guldkr.htm" target="_blank">danskmoent.dk/artikler/f3guldkr.htm</a>. Specialist monograph on the gold counterpart of the Krone-Mønt category under Frederik III (1648–1670). Verbatim points:<br>· Dating of the Glückstadt phase and the Copenhagen first issue: «<i>møntet i København 1655 og i Glückstadt 1657, 1659 og 1660</i>» — accordingly the <b>first</b> Frederik III Guldkrone is the Copenhagen 1655 issue, not the Glückstadt 1657.<br>· Two Münzformulas: older «<i>5.996g - 0.917 - 5.496g</i>», younger «<i>5.590g - 0.917 - 5.126g</i>».<br>· Tariff basis: «<i>forordningen af 2. januar 1658</i>» (Speciesdukat raised to 12 mark), «<i>guldkronen gjaldt 18 mark</i>» = «<i>1 1/2 dukat (5.126g fint guld)</i>».<br>· Programme termination: «<i>betænkning af 14. februar 1671 ... de icke paa andre Steder gangbar er</i>» — the Commerce Collegium recommendation ends the regular Guldkrone coinage.<br>· Post-history: «<i>Ved kgl. resolution af 2. september 1701 ... fik Det Vestindiske Compagni Tilladelse til at slå 2 guldkroner</i>» — royal special authorisation for the Vestindiske Compagni; no actual specimens have been recovered, documented only in Lauerentsen <i>Museum Regium</i>, 2nd ed., T. XXIII no. 11.
      uk: |-
        <b>Hede, Holger</b>: <i>Frederik III's guldkroner</i>, NNUM 1957 — повний текст: <a href="https://www.danskmoent.dk/artikler/f3guldkr.htm" target="_blank">danskmoent.dk/artikler/f3guldkr.htm</a>. Спеціалізована монографія про золоту відповідницю Krone-Mønt-категорії за Фредеріка III (1648–1670). Verbatim-цитати:<br>· Датування ґлюкштадтської фази й копенгагенського першого випуску: «<i>møntet i København 1655 og i Glückstadt 1657, 1659 og 1660</i>» — отже <b>перша</b> Guldkrone Фредеріка III — це копенгагенський випуск 1655 р., а не ґлюкштадтський 1657.<br>· Дві монетні формули: старіша «<i>5.996g - 0.917 - 5.496g</i>», новіша «<i>5.590g - 0.917 - 5.126g</i>».<br>· Тарифна основа: «<i>forordningen af 2. januar 1658</i>» (Speciesdukat підвищено до 12 mark), «<i>guldkronen gjaldt 18 mark</i>» = «<i>1 1/2 dukat (5.126g fint guld)</i>».<br>· Завершення програми: «<i>betænkning af 14. februar 1671 ... de icke paa andre Steder gangbar er</i>» — рекомендація Commerce Collegium припиняє регулярне карбування Guldkrone.<br>· Післяісторія: «<i>Ved kgl. resolution af 2. september 1701 ... fik Det Vestindiske Compagni Tilladelse til at slå 2 guldkroner</i>» — особливий королівський дозвіл для Vestindiske Compagni; реальні екземпляри не знайдено, документально засвідчено лише в Lauerentsen <i>Museum Regium</i>, 2-е вид., T. XXIII No. 11.

