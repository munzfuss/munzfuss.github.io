  - id: ref2
    content:
      de: |
        <b>Wikipedia (de)</b>: <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a> (unabhängige Bestätigung des Christian-IV.-Krone-Standards 1618: Raugewicht 2 Krone ca. 37,8 g · Durchmesser 46 mm · Feingehalt <b>13 3/4 lötig</b> = 13 Loth 12 Grän = .8594 · Feinsilber pro 2 Krone ca. 32,5 g · Tarif zunächst 1½ Reichstaler · Reduktion auf 1⅓ Reichstaler erst <b>1625</b> · Münzgewinn der Krone bei der Reduktion ca. 11 % · Subeinheit: 1 Corona Danica = 96 Kroneskilling · Prägezeitraum 1618–1624, teilweise bis 1625 · «Bis 1644 wurden wieder überwiegend ›Skilling Danske‹ geprägt» — Beleg für die 19-jährige Pause der Krone-Prägung)
      en: |
        <b>Wikipedia (de)</b>: <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a> (independent confirmation of the Christian IV Krone standard, 1618: 2 Krone rough weight ca. 37.8 g · diameter 46 mm · fineness <b>13 3/4 lötig</b> = 13 Loth 12 Grän = .8594 · fine silver per 2 Krone ca. 32.5 g · tariff initially 1½ Reichstaler · reduction to 1⅓ Reichstaler only in <b>1625</b> · the Crown's mint gain on the reduction ca. 11 % · subunit: 1 Corona Danica = 96 Kroneskilling · production 1618–1624, partly into 1625 · «Until 1644, predominantly ‹Skilling Danske› were struck again» — evidence for the 19-year hiatus in Krone production)
      uk: |
        <b>Wikipedia (de)</b>: <i>Corona Danica</i> — <a href="https://de.wikipedia.org/wiki/Corona_Danica" target="_blank">de.wikipedia.org/wiki/Corona_Danica</a> (незалежне підтвердження стандарту Krone Кристіана IV, 1618: повна вага 2 Krone бл. 37,8 г · діаметр 46 мм · проба <b>13 3/4 lötig</b> = 13 Loth 12 Grän = .8594 · чисте срібло на 2 Krone бл. 32,5 г · початковий тариф 1½ Рейхсталер · зниження до 1⅓ Рейхсталер лише <b>1625</b> · монетний прибуток Корони від редукції ~11 % · субодиниця: 1 Corona Danica = 96 Kroneskilling · карбування 1618–1624, частково до 1625 · «До 1644 знову переважно карбувалися ›Skilling Danske‹» — свідчення 19-річної перерви карбування Krone)
  - id: ref3
    content:
      de: |
        <b>Schrötter, Friedrich Frhr. v. (Hg.) — N. Bauer, K. Regling, A. Suhle, R. Vasmer, J. Wilcke</b>: <i>Wörterbuch der Münzkunde</i>. Verlag von Walter de Gruyter & Co., Berlin 1930, S. 113–114, Eintrag «Corona Danica» — Online: <a href="https://archive.org/details/worterbuchdermun007491mbp" target="_blank">archive.org/details/worterbuchdermun007491mbp</a> (das numismatische Standardwörterbuch der Zwischenkriegszeit; <b>primäre Quelle</b> für die Wikipedia-Zahlen. Wörtliches Zitat: «Er gab die corona danica … — die spätere Doppelkrone — für 1½ Species (Reichstaler) aus, wodurch er einen Gewinn von 11½% erzielte. Sie war 13¾ lötig und hielt nur 32,5 g Silber, während 1½ Species 38,7 g Silber hielten. … Im Jahre 1625 mußte die Krone auf 1⅓ Species herabgesetzt werden.». Wichtige Klarstellung: <b>«Corona Danica» bezeichnet im Sprachgebrauch der Zeit die Doppelkrone (= 2 Krone) als Hauptmünze der Reform; einzelne Krone-Stücke (½ × Doppelkrone) entsprechen ¾ Species 1618–1624 bzw. ⅔ Species ab 1625</b>)
      en: |
        <b>Schrötter, Friedrich Frhr. v. (ed.) — N. Bauer, K. Regling, A. Suhle, R. Vasmer, J. Wilcke</b>: <i>Wörterbuch der Münzkunde</i>. Walter de Gruyter & Co., Berlin 1930, pp. 113–114, entry «Corona Danica» — Online: <a href="https://archive.org/details/worterbuchdermun007491mbp" target="_blank">archive.org/details/worterbuchdermun007491mbp</a> (the standard inter-war numismatic dictionary; <b>primary source</b> for the Wikipedia figures. Verbatim quote: «He issued the corona danica … — the later Doppelkrone — for 1½ Species (Reichstaler), gaining 11½% by doing so. It was 13¾ Loth fine and contained only 32.5 g of silver, while 1½ Species contained 38.7 g of silver. … In the year 1625 the Krone had to be reduced to 1⅓ Species». Important clarification: <b>«Corona Danica» in the period sense denotes the Doppelkrone (= 2 Krone) as the principal coin of the reform; single Krone pieces (½ × Doppelkrone) correspond to ¾ Species 1618–1624 and ⅔ Species from 1625</b>)
      uk: |
        <b>Schrötter, Friedrich Frhr. v. (ред.) — N. Bauer, K. Regling, A. Suhle, R. Vasmer, J. Wilcke</b>: <i>Wörterbuch der Münzkunde</i>. Verlag von Walter de Gruyter & Co., Berlin 1930, с. 113–114, стаття «Corona Danica» — Онлайн: <a href="https://archive.org/details/worterbuchdermun007491mbp" target="_blank">archive.org/details/worterbuchdermun007491mbp</a> (стандартний нумізматичний словник міжвоєнної доби; <b>первинне джерело</b> для цифр Wikipedia. Цитата дослівно: «Er gab die corona danica … — die spätere Doppelkrone — für 1½ Species (Reichstaler) aus, wodurch er einen Gewinn von 11½% erzielte. Sie war 13¾ lötig und hielt nur 32,5 g Silber, während 1½ Species 38,7 g Silber hielten. … Im Jahre 1625 mußte die Krone auf 1⅓ Species herabgesetzt werden.». Важливе уточнення: <b>«Corona Danica» у термінології епохи означає Доппелькрону (= 2 Krone) як головну монету реформи; одиночні Krone (½ × Доппелькрона) відповідають ¾ Species у 1618–1624 та ⅔ Species з 1625</b>)

  - id: ref4
    content:
      de: |
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, Nordisk Numismatisk Unions Medlemsblad (NNUM) 1957, S. 129–134 — Online: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Klassische Synthese der drei dänischen Krone-Münzformeln auf Grundlage von Wilcke I (<i>Christian IV's Møntpolitik 1588–1625</i>, København 1919) und Wilcke II (<i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i>, København 1924). Sinngemäß übersetzt: <i>Christian-IV.-Kronen, deren Formel 1618–1652 galt: 12 ²⁵⁷⁄₇₀₀ Stück je 13¾-lötiger (.859) Marck (Raugewicht 18,909 g, Feingewicht 16,250 g). Die «groben» Kronen, in Norwegen 1649 und in Dänemark 1652 eingeführt und zuletzt 1732 geprägt: 10½ Stück je 10¾-lötiger (.672) Marck (Raugewicht 22,272 g, Feingewicht 14,964 g). Die «feinen» Kronen, 1693 eingeführt und zuletzt 1771 geprägt: 13 Stück je 13⅓-lötiger (.833) Marck (Raugewicht 17,988 g, Feingewicht 14,984 g).</i> Anmerkung (1): <i>1618 wurde nur die 2 Krone (damals einfach «Krone» genannt) nach dieser Formel geprägt; ½, ¼ und ⅛ Krone folgten einer leicht niedrigeren Münzfod (Wilcke I S. 152); ab 1619 galt die Hauptformel auch für die ½ Krone.</i> Diese Quelle liefert die primärkanonischen Werte für alle drei Krone-Münzformel-Tabellen. Für H105 (2 Krone Corona Danica 1618–1619): 37,819 g rau, .859 Feingehalt, 32,500 g fein; aus 1 Marck Feinsilber gehen 10,793 Speciedaler an Krone-Münzen heraus. H124 (1624, nach Forordning vom 14. Februar 1624): identische physische Münze, aber durch Neutarifierung der Specie auf 100 Skilling sinkt die Ausbringung auf 10,361 Speciedaler je Marck.
      en: |
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, Nordisk Numismatisk Unions Medlemsblad (NNUM) 1957, pp. 129–134 — Online: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Classic synthesis of the three Danish Krone formulae, drawing on Wilcke I (<i>Christian IV's Møntpolitik 1588–1625</i>, Copenhagen 1919) and Wilcke II (<i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i>, Copenhagen 1924). Translated content: <i>Christian IV's kroner, whose formula was followed 1618–1652: 12 ²⁵⁷⁄₇₀₀ pieces per 13¾-lødig (.859) mark (rough weight 18.909 g, fine weight 16.250 g). The «coarse» kroner, introduced in Norway in 1649 and in Denmark in 1652 and last struck in 1732: 10½ pieces per 10¾-lødig (.672) mark (rough weight 22.272 g, fine weight 14.964 g). The «fine» kroner, introduced in 1693 and last struck in 1771: 13 pieces per 13⅓-lødig (.833) mark (rough weight 17.988 g, fine weight 14.984 g).</i> Note (1): <i>In 1618 only the 2 Krone (then simply called «Krone») was struck on this formula; the ½, ¼ and ⅛ Krone followed a slightly lower Münzfod (Wilcke I p. 152); from 1619 the main formula also applied to the ½ Krone.</i> This source supplies the primary canonical values for all three Krone-standard tables. For H105 (2 Krone Corona Danica 1618–1619): 37.819 g rough, .859 fineness, 32.500 g fine; one fine mark of silver yields 10.793 Speciedaler in Krone face value. For H124 (1624, post Forordning of 14 February 1624): physically the same coin, but the re-rating of the Specie to 100 Skilling lowers the daler output to 10.361 Speciedaler per mark.
      uk: |
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, Nordisk Numismatisk Unions Medlemsblad (NNUM) 1957, с. 129–134 — Онлайн: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Класичний синтез трьох данських Krone-формул на основі Wilcke I (<i>Christian IV's Møntpolitik 1588–1625</i>, Копенгаген 1919) та Wilcke II (<i>Møntvæsenet under Christian IV og Frederik III 1625–1670</i>, Копенгаген 1924). Зміст у перекладі: <i>Krone Кристіана IV, формули якої дотримувалися 1618–1652 рр.: 12 ²⁵⁷⁄₇₀₀ штук з 13¾-лотової (.859) марки (повна вага 18,909 г, чиста 16,250 г). «Грубі» кроне, запроваджені в Норвегії 1649 р. та в Данії 1652 р., востаннє карбовані 1732 р.: 10½ штуки з 10¾-лотової (.672) марки (повна вага 22,272 г, чиста 14,964 г). «Тонкі» кроне, запроваджені 1693 р. і востаннє карбовані 1771 р.: 13 штук з 13⅓-лотової (.833) марки (повна вага 17,988 г, чиста 14,984 г).</i> Примітка (1): <i>1618 р. за цією формулою карбувалась лише 2 Krone (тоді просто «Krone»); ½, ¼ та ⅛ Krone йшли за дещо нижчою møntfod (Wilcke I с. 152); з 1619 р. головна формула діяла й для ½ Krone.</i> Це джерело дає першоджерельні канонічні значення для всіх трьох Krone-таблиць. Для H105 (2 Krone Corona Danica 1618–1619): 37,819 г повної ваги, .859 проби, 32,500 г чистого; з 1 марки чистого срібла виходить 10,793 Speciedaler у номінальній вартості Krone-монет. Для H124 (1624 р., після Forordning 14 лютого 1624 р.): фізично та сама монета, але через перетарифування Specie на 100 Skilling вихід падає до 10,361 Speciedaler з марки.

  - id: ref5
    content:
      de: |
        <b>Nationalmuseet</b> (Dänisches Nationalmuseum, Kopenhagen): <i>Christian 4.s svindler-mønt fylder 400 år</i> — <a href="https://natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar/" target="_blank">natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar</a>. Wörtlich: «<i>På kronemønten står der «R.F.P», som er forkortelsen for Christian 4.s valgsprog «regna firmat pietas»… Men i folkemunde blev det dog gengivet som «riget fattes penge»</i>» — institutioneller Beleg für die Volksumdeutung des königlichen Wahlspruches auf der Krone-Münze.
      en: |
        <b>Nationalmuseet</b> (Danish National Museum, Copenhagen): <i>Christian 4.s svindler-mønt fylder 400 år</i> — <a href="https://natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar/" target="_blank">natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar</a>. Verbatim: «<i>På kronemønten står der «R.F.P», som er forkortelsen for Christian 4.s valgsprog «regna firmat pietas»… Men i folkemunde blev det dog gengivet som «riget fattes penge»</i>» — institutional confirmation of the popular reread of the royal motto on the Krone coin.
      uk: |
        <b>Nationalmuseet</b> (Данський національний музей, Копенгаген): <i>Christian 4.s svindler-mønt fylder 400 år</i> — <a href="https://natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar/" target="_blank">natmus.dk/webdok/christian-4s-svindler-moent-fylder-400-aar</a>. Дослівно: «<i>På kronemønten står der «R.F.P», som er forkortelsen for Christian 4.s valgsprog «regna firmat pietas»… Men i folkemunde blev det dog gengivet som «riget fattes penge»</i>» — інституційне підтвердження народної переінтерпретації королівського девізу на Krone-монеті.

  - id: ref6
    content:
      de: |
        <b>Møntforordninger m.v. under Christian 5. (1670–1699)</b> · danskmoent.dk — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" target="_blank">danskmoent.dk/artikler/c5mord.htm</a> (Sammenstellung der Münzedikte Christians V. nach Schou). Die Münzordnung vom <b>22. März 1671</b> formalisiert den 10½-Krone-Fuß: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» je Marck Feinsilber. In derselben Ordnung wird Speciemønt mit 9¼ rd. je Marck als Hauptstandard verankert; die Krone wird ausdrücklich als untergeordneter, sekundärer Standard behandelt — die Krone hat nie Parität mit dem Specie als Primärstandard erreicht. Das Reskript vom 31. Dezember 1692 schränkt die zukünftige Prägung auf «<i>kun kurant i kroner, markstykker, 2-skillinger og halvskillinger</i>» ein, hebt den Krone-Fuß aber nicht formell auf.
      en: |-
        <b>Møntforordninger m.v. under Christian 5. (1670–1699)</b> · danskmoent.dk — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" target="_blank">danskmoent.dk/artikler/c5mord.htm</a> (compilation of Christian V's mint edicts after Schou). The Mint Ordinance of <b>22 March 1671</b> formalises the 10½-Krone-Fuß: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» per mark of fine silver. The same ordinance anchors Speciemønt at 9¼ rd. per mark as the principal standard; the Krone is explicitly treated as a subordinate, secondary standard — the Krone never achieved parity with Specie as a primary standard. The rescript of 31 December 1692 restricts future minting to «<i>kun kurant i kroner, markstykker, 2-skillinger og halvskillinger</i>», but does not formally revoke the Krone-Fuß.
      uk: |-
        <b>Møntforordninger m.v. under Christian 5. (1670–1699)</b> · danskmoent.dk — <a href="https://www.danskmoent.dk/artikler/c5mord.htm" target="_blank">danskmoent.dk/artikler/c5mord.htm</a> (зведення монетних едиктів Кристіана V за Schou). Монетна постанова <b>22 березня 1671 р.</b> формалізує 10½-Krone-Fuß: «<i>Kronemønt eller sletdalere skal udmøntes til 10 rd. 2½ mark</i>» з марки чистого срібла. У тій самій постанові Speciemønt закріплено за 9¼ rd. з марки як головний стандарт; Krone виразно трактується як підпорядкований, вторинний стандарт — Krone ніколи не досяг паритету зі Specie як первинним стандартом. Рескрипт 31 грудня 1692 р. обмежує майбутнє карбування до «<i>kun kurant i kroner, markstykker, 2-skillinger og halvskillinger</i>», але формально Krone-Fuß не скасовує.

  - id: ref7
    content:
      de: |
        <b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href="https://www.danskmoent.dk/myst/aag1.htm" target="_blank">danskmoent.dk/myst/aag1.htm</a>. Belegt, daß die 1644–1648 in Glückstadt ausgegebene Hebræermønt eine <b>Kriegsmünze</b> des Torstenson-Krieges (1643–1648) war: deutlich unterwertig (Münzgewinn ca. 22 % bei 2-Marker, ca. 50 % bei 4-Skillingen), Feingehalt absichtlich verschleiert; Hamburg lehnte die Münzen im Dezember 1645 ab; das Reichsgericht senkte den Tarif wenige Wochen nach Christians IV. Tod (21. März 1648). Eine formelle 10½-Krone-Fuß-Ordnung folgte erst 1671 unter Christian V. (siehe ref6).
      en: |-
        <b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href="https://www.danskmoent.dk/myst/aag1.htm" target="_blank">danskmoent.dk/myst/aag1.htm</a>. Establishes that the Hebræermønt issued at Glückstadt 1644–1648 was a <b>war coinage</b> of the Torstenson War (1643–1648): substantially under-weight (mint profit ca. 22 % on 2-markers, ca. 50 % on 4-skillings), the fineness deliberately concealed; Hamburg rejected the coins in December 1645; the privy council reduced the tariff weeks after Christian IV's death (21 March 1648). A formal 10½-Krone-Fuß ordinance follows only in 1671 under Christian V (see ref6).
      uk: |-
        <b>Aagaard, Sven</b>: <i>Beskrivelse af Christian IV's hebræermønter 1644–1648</i> — danskmoent.dk: <a href="https://www.danskmoent.dk/myst/aag1.htm" target="_blank">danskmoent.dk/myst/aag1.htm</a>. Доводить, що Hebræermønt, випущена у Glückstadt 1644–1648 рр., була <b>воєнною монетою</b> війни Торстенсона (1643–1648): значно недоважена (монетний прибуток ~22 % на 2-марках, ~50 % на 4-скілінгах), пробу свідомо приховано; Гамбург відмовився приймати ці монети у грудні 1645 р.; Таємна рада знизила тариф за кілька тижнів після смерті Кристіана IV (21 березня 1648). Формальна постанова про 10½-Krone-Fuß з'являється лише 1671 р. за Кристіана V (див. ref6).

  - id: ref8
    content:
      de: |
        <b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i>. København: G. E. C. Gads Forlag, 1919 — Quellenverweis: <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Sekundärbeleg: «<i>the King's speculation in minting poor quality coins and later crowns (Kroner) that were issued with higher nominal value than their silver content justified</i>». Die Christian-IV.-Krone war eine fiskalische Maßnahme der Krone — übertarifiert, mit Seigniorage-Gewinn von ca. 11 % bei der Tarifsenkung 1625; gute Speciedaler verschwanden aus dem Umlauf, weil sie für Auslandszahlungen einbehalten wurden.
      en: |-
        <b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i>. Copenhagen: G. E. C. Gads Forlag, 1919 — source page: <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Secondary source: «<i>the King's speculation in minting poor quality coins and later crowns (Kroner) that were issued with higher nominal value than their silver content justified</i>». The Christian IV Krone was a Crown fiscal measure — over-tariffed, with a seigniorage gain of ca. 11 % on the 1625 tariff reduction; good Speciedalers disappeared from circulation, being held back for foreign payments.
      uk: |-
        <b>Wilcke, Julius</b>: <i>Christian IVs Møntpolitik 1588–1625</i>. Копенгаген: G. E. C. Gads Forlag, 1919 — посилання: <a href="https://www.danskmoent.dk/wilcke/w2ref.htm" target="_blank">danskmoent.dk/wilcke/w2ref.htm</a>. Вторинне джерело: «<i>the King's speculation in minting poor quality coins and later crowns (Kroner) that were issued with higher nominal value than their silver content justified</i>». Krone Кристіана IV була фіскальним інструментом Корони — надтарифікована, з сеньйораж­ним прибутком ~11 % при тарифному зниженні 1625 р.; добротні Speciedaler зникали з обігу, бо їх притримували для зовнішньоторговельних розрахунків.


  - id: ref9
    content:
      de: |
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, S. 129–134 — Volltext: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Authoritative numismatische Monographie der drei Krone-Müntzfüße der dänisch-norwegischen Monarchie. Verbatim-Belege:<br>· <em>Christian IVs kroner</em>: «<i>12 257/700 stykker på den 13 3/4 lødige (0.859) mark (bruttovægt 18.909g, finvægt 16.250g)</i>» · Datierung «<i>1618–1652</i>».<br>· <em>Grove kroner (10½-Krone-Fuß)</em>: «<i>10 1/2 stykker på den 10 3/4 lødige (0.672) mark (bruttovægt 22.272g, finvægt 14.964g)</i>» · «<i>indført i Norge 1649 og i Danmark 1652 og sidst slået 1732</i>» · «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>».<br>· <em>Fine kroner (13-Krone-Fuß)</em>: «<i>13 stykker på den 13 1/3 lødige (0.833) mark (bruttovægt 17.988 g, finvægt 14.984g)</i>» · «<i>indført 1693 og sidst slået 1771</i>» · Reskript-Zitat: «<i>rescript 31. december 1692, der indførte de 'fine' kroner, udtaler, at der vil blive slået kroner 'efter den allerbedste Godhed som den nogen Tid udi vores Regerings Tid haver været slagen'</i>».<br>· <em>Sonderemissionen</em>: 1665 «<i>Pumpbucksen Thaler</i>» (Schou 39/40); 2-Krone 1675 (Schou 11–15) «<i>deviated from standard</i>»; 3 Kroner 1699 og 1746 «<i>slået i anledning af et tronskifte som skuemønter</i>».
      en: |-
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, pp. 129–134 — full text: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. The authoritative numismatic monograph on the three Krone Müntzfüße of the Danish-Norwegian monarchy. Verbatim points:<br>· <em>Christian IV's kroner</em>: «<i>12 257/700 stykker på den 13 3/4 lødige (0.859) mark (bruttovægt 18.909g, finvægt 16.250g)</i>» · dating «<i>1618–1652</i>».<br>· <em>Grove kroner (10½-Krone-Fuß)</em>: «<i>10 1/2 stykker på den 10 3/4 lødige (0.672) mark (bruttovægt 22.272g, finvægt 14.964g)</i>» · «<i>indført i Norge 1649 og i Danmark 1652 og sidst slået 1732</i>» · «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>».<br>· <em>Fine kroner (13-Krone-Fuß)</em>: «<i>13 stykker på den 13 1/3 lødige (0.833) mark (bruttovægt 17.988 g, finvægt 14.984g)</i>» · «<i>indført 1693 og sidst slået 1771</i>» · rescript quote: «<i>rescript 31. december 1692, der indførte de 'fine' kroner, udtaler, at der vil blive slået kroner 'efter den allerbedste Godhed som den nogen Tid udi vores Regerings Tid haver været slagen'</i>».<br>· <em>Special issues</em>: 1665 «<i>Pumpbucksen Thaler</i>» (Schou 39/40); 2-Krone 1675 (Schou 11–15) «<i>deviated from standard</i>»; 3 Kroner 1699 and 1746 «<i>slået i anledning af et tronskifte som skuemønter</i>» (struck on the occasion of a succession as commemoratives).
      uk: |-
        <b>Hede, Holger</b>: <i>Kronemønten 1618–1771</i>, NNUM 1957, с. 129–134 — повний текст: <a href="https://danskmoent.dk/artikler/hedekron.htm" target="_blank">danskmoent.dk/artikler/hedekron.htm</a>. Авторитетна нумізматична монографія по трьох Krone-Müntzfüße дансько-норвезької монархії. Verbatim-цитати:<br>· <em>Christian IV's kroner</em>: «<i>12 257/700 stykker på den 13 3/4 lødige (0.859) mark (bruttovægt 18.909g, finvægt 16.250g)</i>» · датування «<i>1618–1652</i>».<br>· <em>Grove kroner (10½-Krone-Fuß)</em>: «<i>10 1/2 stykker på den 10 3/4 lødige (0.672) mark (bruttovægt 22.272g, finvægt 14.964g)</i>» · «<i>indført i Norge 1649 og i Danmark 1652 og sidst slået 1732</i>» · «<i>Efter forordningen af 22. marts 1671 skulle en 2 krone veje 44.544 g med lødighed 0.672</i>».<br>· <em>Fine kroner (13-Krone-Fuß)</em>: «<i>13 stykker på den 13 1/3 lødige (0.833) mark (bruttovægt 17.988 g, finvægt 14.984g)</i>» · «<i>indført 1693 og sidst slået 1771</i>» · цитата рескрипту: «<i>rescript 31. december 1692, der indførte de 'fine' kroner, udtaler, at der vil blive slået kroner 'efter den allerbedste Godhed som den nogen Tid udi vores Regerings Tid haver været slagen'</i>».<br>· <em>Спец-випуски</em>: 1665 «<i>Pumpbucksen Thaler</i>» (Schou 39/40); 2-Krone 1675 (Schou 11–15) «<i>deviated from standard</i>»; 3 Kroner 1699 і 1746 «<i>slået i anledning af et tronskifte som skuemønter</i>» (карбовано з нагоди тронової зміни як памʼятні).

