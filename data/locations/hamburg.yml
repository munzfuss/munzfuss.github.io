id: hamburg
name:
  de: Hamburg
  en: Hamburg
  uk: Гамбург
summary:
  de: 'Müntzwesen der Freien und Hansestadt Hamburg — <em>Seed-Datei: bulk-importiert aus ucoin (80 Stücke), vollständige Müntzfuß-Klassifikation und Per-Münze-Verifikation pro Hede/Schön/Jaeger noch ausstehend. Sämtliche Stücke vorerst unter dem technischen <code>seed_unsorted</code>-Müntzfuß geführt.</em>'
  en: 'Coinage of the Free and Hanseatic City of Hamburg — <em>Seed file: bulk-imported from ucoin (80 pieces), full Münzfuß classification and per-coin verification against Hede/Schön/Jaeger pending. All pieces are provisionally filed under the technical <code>seed_unsorted</code> Münzfuß.</em>'
  uk: 'Монетна справа Вільного ганзейського міста Гамбург — <em>Seed-файл: bulk-імпортовано з ucoin (80 монет), повна Müntzfuß-класифікація та per-coin-верифікація за Hede/Schön/Jaeger ще очікується. Усі монети тимчасово числяться під технічним <code>seed_unsorted</code>-Müntzfuß.</em>'
fuss_order:
  - seed_unsorted
fuss_periods:
  seed_unsorted:
    pdate_label:
      de: Bulk-Seed-Sammelbucket — Geltungsbereich pro Münze noch zuzuweisen
      en: Bulk seed bucket — period of validity to be assigned per coin
      uk: Bulk-seed загальний кошик — період дії потрібно призначити per coin
    hintergrund:
      de: Technischer Sammelbucket für bulk-importierte Münzen aus ucoin. Bei künftiger Detail-Bearbeitung wandern die Stücke in den jeweils passenden eigentlichen Müntzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>30_thaler</code>, <code>reichsdukatenfuss</code> etc.).
      en: Technical catch-all bucket for bulk-imported coins from ucoin. On future detailed work the pieces will move to their proper Münzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>30_thaler</code>, <code>reichsdukatenfuss</code>, etc.).
      uk: Технічний загальний кошик для bulk-імпортованих монет із ucoin. При майбутній детальній роботі монети перейдуть у відповідну Müntzfuß (<code>9_25_thaler</code>, <code>11_333_thaler</code>, <code>18_5_thaler</code>, <code>30_thaler</code>, <code>reichsdukatenfuss</code> тощо).
phases:
  seed_unsorted:
    - id: A
      year_from: 1500
      year_to: 1900
      from_label: (?)
      to_label: (?)
      title:
        de: Bulk-Seed-Phase
        en: Bulk seed phase
        uk: Bulk-seed-фаза
      description:
        de: Sammelphase für die initial bulk-importierten Stücke aus ucoin. Bei der nächsten Detail-Bearbeitung wandern die einzelnen Münzen in eigene Phasen mit korrekter Periodisierung.
        en: Catch-all phase for the initial bulk-imported pieces from ucoin. On the next detailed pass each coin will move into its own properly periodised phase.
        uk: Збірна фаза для початково bulk-імпортованих монет з ucoin. При наступному детальному проходженні кожна монета перейде у власну фазу з коректною періодизацією.
