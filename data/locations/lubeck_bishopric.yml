id: lubeck_bishopric
name:
  de: Fürstbisthum Lübeck (Eutin)
  en: Prince-Bishopric of Lübeck (Eutin)
  uk: Князівство-єпископство Любек (Ойтін)
summary:
  de: 'Reichsfürstbisthum Lübeck mit Sitz in Eutin (Holstein), regiert seit 1586 von der Holstein-Gottorper Linie als Sekundogenitur. <em>Stub-Datei: 15 Münzen aus Bruun-Auktionskatalogen seed-importiert (Phase 4b proper, 2026-05); Müntzfuß-Klassifikation noch nicht ausgearbeitet — provisorisch unter «seed_unsorted» geführt. Siehe docs/TODO.md item E für Promotion-Plan.</em><br>NICHT zu verwechseln mit der Freien Hansestadt Lübeck (eigene Datei <code>data/locations/lubeck.yml</code>).'
  en: 'Imperial prince-bishopric of Lübeck seated at Eutin in Holstein, governed from 1586 onwards by the Holstein-Gottorp line as a secundogeniture. <em>Stub file: 15 coins seed-imported from Bruun auction catalogues (Phase 4b proper, 2026-05); Müntzfuß classification not yet researched — provisionally filed under «seed_unsorted». See docs/TODO.md item E for the promotion plan.</em><br>NOT to be confused with the Free Hansestadt of Lübeck (separate file <code>data/locations/lubeck.yml</code>).'
  uk: 'Імперське князівство-єпископство Любек з резиденцією в Ойтіні (Гольштейн), кероване з 1586 року Гольштейн-Готторпською лінією як secundogeniture. <em>Stub-файл: 15 монет seed-імпортовані з аукціонних каталогів Bruun (Phase 4b proper, 2026-05); Müntzfuß-класифікація ще не виконана — тимчасово числиться під «seed_unsorted». Див. docs/TODO.md item E для плану promotion.</em><br>НЕ плутати з Вільним ганзейським містом Любеком (окремий файл <code>data/locations/lubeck.yml</code>).'
fuss_order:
  - seed_unsorted
phases:
  seed_unsorted:
    - id: A
      year_from: 1606
      year_to: 1776
      from_label: (?)
      to_label: (?)
      title:
        de: Bulk-Seed-Phase (Bruun-Import 2026-05)
        en: Bulk seed phase (Bruun import 2026-05)
        uk: Bulk-seed-фаза (Bruun-імпорт 2026-05)
      description:
        de: Sammelphase für die aus Bruun-Auktionskatalogen seed-importierten Stücke. Bei der nächsten Detail-Bearbeitung wandern die einzelnen Münzen in ihre eigene Müntzfuß-Klassifikation.
        en: Catch-all phase for the pieces seed-imported from Bruun auction catalogues. On the next detailed pass each coin will move into its own Müntzfuß classification.
        uk: Збірна фаза для монет, seed-імпортованих з Bruun-аукціонних каталогів. При наступному детальному проходженні кожна монета перейде у власну Müntzfuß-класифікацію.
