      en: |-
        Reverse legend: «48 SCHILLING COURANT GELDT ANNO 1752»; obverse: double-headed eagle of the Holy Roman Empire with the value on the chest and three ears of wheat as a city-arms element. <em>Moved here from schleswig_holstein.yml on 2026-04-27 — the original entry mis-attributed it as a royal-Holstein Frederik V issue with fabricated parameters (~23.6 g, .875); it is actually the Lübeck city piece per Davenport 2420 / KM# 168.</em> Six KM# sub-variants exist (168.1–168.6) and corresponding Davenport 2420A–2420E.
      uk: |-
        Реверс-легенда: «48 SCHILLING COURANT GELDT ANNO 1752»; аверс: двоголовий орел Священної Римської імперії з номіналом на грудях і трьома колосами як елемент міського герба. <em>Перенесено сюди зі schleswig_holstein.yml 27 квітня 2026 р. — початковий запис помилково атрибутував монету як королівсько-гольштинський випуск Фредеріка V з вигаданими параметрами (~23,6 г, .875); насправді це любецький міський карбунок за Davenport 2420 / KM# 168.</em> Існує шість підваріантів KM# (168.1–168.6) і відповідні Davenport 2420A–2420E.
    sources:
