# Free Hanseatic City of Lübeck — coinage of the Wendischer Münzverein and
# its successors, ca. 1500-1801 (Reichsdeputationshauptschluss).
#
# This file is a STUB for future expansion. Lübeck is referenced from the
# Schleswig-Holstein artifact (the 11⅓-Fuß Kurantdaler is fine-silver-equivalent
# to Lübeck's 48 Schilling Courant), and one Lübeck coin had been incorrectly
# tagged as Holstein-Danish in schleswig_holstein.yml — moved here on 2026-04-27.
#
# Future work:
#   1. Define a proper Wendisch-Lübisch fuss in data/shared/fuesse.yml
#      (the 9⅔-Lübisch standard with .750 fineness — distinct from the
#      Holstein-Danish 11⅓-Fuß at .875).
#   2. Build out phases for the Wendischer Münzverein (1379+), and the
#      late-imperial city issues (1700+).
#   3. Migrate data from reference/lubeck_1750_1850_verified_complete.html
#      (legacy artifact, 18KB).

id: lubeck
name:
  de: Lübeck
  en: Lübeck
  uk: Любек

summary:
  de: |
    Müntzwesen der Freien Hanse­stadt Lübeck — Wendischer Münzverein und seine
    Nachfolger, ca. 1500 biß 1801. <em>Stub-Datei: derzeit eine einzige Münze
    (irrtümlich aus dem Schleswig-Holstein-Artefakt verschoben). Vollständige
    Bearbeitung steht aus.</em>
  en: |-
    Coinage of the Free Hanseatic City of Lübeck — the Wendischer Münzverein and its successors, ca. 1500 to 1801. <em>Stub file: currently a single coin (moved here from the Schleswig-Holstein artifact, where it had been mis-classified). Full treatment pending.</em>
  uk: |-
    Монетна справа Вільного Ганзейського міста Любек — Вендський монетний союз та його наступники, бл. 1500–1801. <em>Stub-файл: наразі одна монета (помилково перенесена з артефакту Шлезвіг-Гольштейну). Повна обробка попереду.</em>

# Order in which fuesse render. We use the Holstein-Danish 11⅓-Fuß as a
# placeholder — the proper Wendisch-Lübisch standard (9⅔-Fuß at .750) needs
# to be added to data/shared/fuesse.yml separately.
fuss_order:
  - 11_333_thaler

# Minimum phase definition so the moved coin validates against the schema.
  - seed_unsorted
phases:
  11_333_thaler:
    - id: A
      year_from: 1500
      year_to: 1801
      from_label: '~1500'
      to_label: '1801'
      title:
        de: Wendisch-Lübisches Müntzwesen (Stub-Phase)
        en: Wendisch-Lübisch coinage (stub phase)
        uk: Вендсько-любецька монетна система (stub-фаза)
      description:
        de: 'Lübeck folgte dem Wendischer Münzverein. Die hier abgebildete einzelne Münze (KM# 168, 1752) entstand am Ende dieses Zeitraums. <em>Diese Phase ist eine Sammelphase für Stub-Zwecke; künftige Verfeinerung folgt.</em>'
        en: 'Lübeck followed the Wendischer Münzverein standard. The single coin shown here (KM# 168, 1752) was struck near the end of that period. <em>This phase is a placeholder; future refinement is planned.</em>'
        uk: 'Любек дотримувався Вендського монетного союзу. Єдина наведена тут монета (KM# 168, 1752 р.) карбувалась наприкінці цього періоду. <em>Ця фаза — заглушка; уточнення в майбутньому.</em>'

  seed_unsorted:
    - id: A
      year_from: 1500
      year_to: 1900
      from_label: (?)
      to_label: (?)
      title:
        de: Bulk-Seed-Phase
        en: Bulk seed phase
        uk: Bulk-seed-фаза
      description:
        de: Sammelphase für die initial bulk-importierten Stücke aus ucoin. Bei der nächsten Detail-Bearbeitung wandern die einzelnen Münzen in eigene Phasen mit korrekter Periodisierung.
        en: Catch-all phase for the initial bulk-imported pieces from ucoin. On the next detailed pass each coin will move into its own properly periodised phase.
        uk: Збірна фаза для початково bulk-імпортованих монет з ucoin. При наступному детальному проходженні кожна монета перейде у власну фазу з коректною періодизацією.
