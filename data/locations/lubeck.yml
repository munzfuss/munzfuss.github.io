# Free Hanseatic City of Lübeck — Lübischer Münzfuß / Lübischer Courant-Fuß
# 1727-1801. Initial scope migrated from the verified Numista + IKMK Berlin
# inventory in reference/lubeck_1750_1850_verified_complete.html (April 2026).
#
# Coverage:
#   * 11⅓-Thaler-Fuß — silver/billon Schilling system 1727-1797 (Dreiling →
#     48 Schilling Courantthaler), seven nominals 1/192 → 1 of the Lübisch
#     Thaler Courant. Dreiling and 1 Schilling carry seigniorage (billon
#     scheide); 2-Sch. and larger are kurant within ±1 % of soll fein.
#   * 9-Thaler-Fuß — Speciesthaler 1776 (KM-185), parallel-circulating
#     Reichsthaler-grade silver alongside the 34-Marck-Fuß courant.
#   * Reichsdukatenfuß — gold ducats 1789-1801 (KM-191, 195, 198, 205) at
#     986 ‰ Au.
#
# Pre-1727 Hansestadt issues and post-1801 Behrens/Lübisch material remain
# in seed_unsorted pending further research.

id: lubeck
name:
  de: Lübeck
  en: Lübeck
  uk: Любек

summary:
  de: Freie Hansestadt Lübeck — Reichsstadt mit eigener Müntzstätte. Der hier dokumentierte Bestand 1727–1801 deckt den Lübischen Müntzfuß (34-Marck-Fuß) für Schillinge und Courantthaler, den Reichsmüntzfuß (9-Thaler-Fuß) für den Speciesthaler 1776 sowie den Reichsdukatenfuß für die Goldducaten 1789–1801.
  en: Free Hanseatic City of Lübeck — imperial city with its own mint. The documented scope (1727–1801) covers the Lübisch Münzfuß (34-Marck-Fuß) for the Schilling pieces and Courantthaler, the Reichsmüntzfuß (9-Thaler-Fuß) for the 1776 Speciesthaler, and the Reichsdukatenfuß for the gold ducats of 1789–1801.
  uk: Вільне ганзейське місто Любек — імперське місто з власним монетним двором. Документований обсяг (1727–1801) охоплює Любецький Müntzfuß (34-Marck-Fuß) для шилінгів і куранттталера, Reichsmüntzfuß (9-Thaler-Fuß) для Speciesthaler 1776 і Reichsdukatenfuß для золотих дукатів 1789–1801.
fuss_order:
  - 11_333_thaler
  - 9_thaler
  - reichsdukatenfuss
  - seed_unsorted

phases:
  11_333_thaler:
    - id: I
      year_from: 1727
      year_to: 1801
      from_label: '1727'
      to_label: '1801'
      title:
        de: Lübischer Münzfuß im 34-Marck-Fuß
        en: Lübischer Münzfuß as 34-Marck-Fuß
        uk: Любецький Münzfuß у 34-Marck-Fuß
      description:
        de: 'Lübeck und Hamburg übernahmen 1726 den 34-Marck-Fuß als gemeinsamen Lübischen Courant-Fuß; die hier abgebildeten Stücke folgen dem System 1 Marck Courant = 6,87811 g fein = 16 Schilling Lübisch · 1 Thaler Courant = 3 Marck = 48 Schilling = 20,63432 g fein.<sup><a href="#ref1">[1]</a></sup>'
        en: 'Lübeck and Hamburg adopted the 34-Marck-Fuß in 1726 as the common Lübisch Courant standard; the issues shown here follow the system 1 Marck Courant = 6.87811 g fine = 16 Schilling Lübisch · 1 Thaler Courant = 3 Marck = 48 Schilling = 20.63432 g fine.<sup><a href="#ref1">[1]</a></sup>'
        uk: 'У 1726 р. Любек і Гамбург ухвалили 34-Marck-Fuß як спільний любецький курантний стандарт; показані тут монети дотримуються системи 1 Marck Courant = 6,87811 г чистого = 16 Schilling Lübisch · 1 Thaler Courant = 3 Marck = 48 Schilling = 20,63432 г чистого.<sup><a href="#ref1">[1]</a></sup>'
  9_thaler:
    - id: I
      year_from: 1776
      year_to: 1776
      from_label: '1776'
      to_label: '1776'
      title:
        de: Reichsmüntzfuß · Speciesthaler 1776
        en: Reichsmüntzfuß · Speciesthaler 1776
        uk: Reichsmüntzfuß · Speciesthaler 1776
      description:
        de: 'Einzelner Lübecker Speciesthaler 1776 (KM-185, Davenport 2422, Behrens 312) am Reichsmüntzfuß im 9-Thaler-Fuß: 233,856 g ÷ 9 = 25,98400 g Feinsilber bei 888 8/9 ‰ Münzlegierung — eigenständige Kurs-Stope neben dem 34-Marck-Fuß-Courant.<sup><a href="#ref2">[2]</a></sup>'
        en: 'Single Lübeck Speciesthaler 1776 (KM-185, Davenport 2422, Behrens 312) at the Reichsmüntzfuß as 9-Thaler-Fuß: 233.856 g ÷ 9 = 25.98400 g fine silver at 888 8/9 ‰ alloy — an independent accounting standard alongside the 34-Marck-Fuß Courant.<sup><a href="#ref2">[2]</a></sup>'
        uk: 'Одинокий любецький Speciesthaler 1776 (KM-185, Davenport 2422, Behrens 312) у Reichsmüntzfuß як 9-Thaler-Fuß: 233,856 г ÷ 9 = 25,98400 г чистого срібла за пробою 888 8/9 ‰ — самостійний розрахунковий стандарт паралельно з 34-Marck-Fuß-Courant.<sup><a href="#ref2">[2]</a></sup>'
  reichsdukatenfuss:
    - id: I
      year_from: 1789
      year_to: 1801
      from_label: '1789'
      to_label: '1801'
      title:
        de: Reichsdukatenfuß · Lübecker Ducaten 1789–1801
        en: Reichsdukatenfuß · Lübeck Ducats 1789–1801
        uk: Reichsdukatenfuß · Любецькі дукати 1789–1801
      description:
        de: 'Der Reichsdukatenfuß ist der reichsweite Goldducaten-Standard, durch die Augsburger Reichsmünzordnung vom 19. August 1559 als kaiserliche Hauptgoldmünze des Heiligen Römischen Reichs eingeführt.<sup><a href="#ref5">[5]</a></sup> Lübeck, dem Kaiser Ludwig der Bayer bereits 1340 das Goldmünzrecht verliehen hatte,<sup><a href="#ref6">[6]</a></sup> schloß seine eigenen Goldducaten an diesen reichsweiten Standard an. Der Fuß endet mit dem Reichsmünzgesetz vom 4. Dezember 1871, mit dem die neue Reichsgoldmünze in Mark zur Grundlage des deutschen Goldgeldes wird.<sup><a href="#ref7">[7]</a></sup>'
        en: 'The Reichsdukatenfuß is the imperial gold-ducat standard, introduced as the empire''s principal gold coin by the Augsburger Reichsmünzordnung of 19 August 1559.<sup><a href="#ref5">[5]</a></sup> Lübeck — granted the gold-minting privilege by Emperor Ludwig the Bavarian as early as 1340<sup><a href="#ref6">[6]</a></sup> — aligned its own gold-ducat issues with this imperial standard. The Fuß ends with the Reichsmünzgesetz of 4 December 1871, by which the new imperial gold coin denominated in Mark became the basis of German gold currency.<sup><a href="#ref7">[7]</a></sup>'
        uk: 'Reichsdukatenfuß — загальноімперський стандарт золотих дукатів, запроваджений Augsburger Reichsmünzordnung від 19 серпня 1559 р. як головна імперська золота монета Священної Римської імперії.<sup><a href="#ref5">[5]</a></sup> Любек, якому імператор Людвіг Баварський ще 1340 р. надав право карбування золота,<sup><a href="#ref6">[6]</a></sup> підпорядкував свої золоті дукати цьому загальноімперському стандарту. Стопа завершується Reichsmünzgesetz 4 грудня 1871 р., згідно з яким нова імперська золота монета у Mark стає основою німецької золотої валюти.<sup><a href="#ref7">[7]</a></sup>'

  seed_unsorted:
    - id: I
      year_from: 1500
      year_to: 1900
      from_label: (?)
      to_label: (?)
      title:
        de: Bulk-Seed-Phase
        en: Bulk seed phase
        uk: Bulk-seed-фаза
      description:
        de: Sammelphase für die initial bulk-importierten Stücke aus ucoin. Bei der nächsten Detail-Bearbeitung wandern die einzelnen Münzen in eigene Phasen mit korrekter Periodisierung.
        en: Catch-all phase for the initial bulk-imported pieces from ucoin. On the next detailed pass each coin will move into its own properly periodised phase.
        uk: Збірна фаза для початково bulk-імпортованих монет з ucoin. При наступному детальному проходженні кожна монета перейде у власну фазу з коректною періодизацією.
