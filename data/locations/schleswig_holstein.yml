        1 Thaler Species · Christian V. (Kgr. Dänemark, Glückstadt), 1683 · Münzmeister Christoph Friedrich Woltereck (CW) · Edge-Legende «PIETATE · ET · IUSTITIA … ANNO M·DC·LXXXIII · C W». Hede c5h120<sup><a href="#ref23">[23]</a></sup> belegt 9-Fuß (1 Marck Feinsilber → 9 Speciedaler): 29,232 g rau · .888 · 25,984 g fein = 233,856 / 9 — Reichsthaler-Prägung außerhalb der für Holstein zu dieser Zeit etablierten 9¼-Fuß-Reihe. Numista führt einen weiteren parallelen Eintrag zur selben Davenport-Typologie (Dav EC II# 3677): N#308517 unter «City of Glückstadt» (KM# 73, Lange 82A) — gleiche Münze, Numista-Duplikatnotierung.
      en: |-
        1 Thaler Species · Christian V of Denmark (Glückstadt mint), 1683 · mintmaster Christoph Friedrich Woltereck (CW) · edge legend «PIETATE · ET · IUSTITIA … ANNO M·DC·LXXXIII · C W». Hede c5h120<sup><a href="#ref23">[23]</a></sup> documents the 9-Fuß (1 fine mark → 9 Speciedaler): 29.232 g rough · .888 · 25.984 g fine = 233.856 / 9 — a Reichsthaler issue outside the 9¼-Fuß series established in Holstein at that time. Numista carries one further parallel entry for the same Davenport type (Dav EC II# 3677): N#308517 under «City of Glückstadt» (KM# 73, Lange 82A) — same coin, Numista duplicate.
      uk: |-
        1 Thaler Species · Кристіан V (король Данії, Глюкштадт), 1683 · монетмайстер Christoph Friedrich Woltereck (CW) · edge-легенда «PIETATE · ET · IUSTITIA … ANNO M·DC·LXXXIII · C W». Hede c5h120<sup><a href="#ref23">[23]</a></sup> фіксує 9-Fuß (1 марка чистого → 9 Speciedaler): 29,232 г повної ваги · .888 · 25,984 г чистого = 233,856 / 9 — карбування Reichsthaler поза 9¼-Fuß-стандартом, утвердженим у Гольштейні на той час. Numista має ще один паралельний запис для тієї самої Davenport-типології (Dav EC II# 3677): N#308517 під «City of Glückstadt» (KM# 73, Lange 82A) — одна монета, дубль у Numista.
