  pistolenfuss:
    - id: A
      year_from: 1771
      year_to: 1864
      from_label: '1771'
      to_label: '1864'
      title:
        de: "Altonaer Münze · Christian d'or und Frederik d'or"
        en: "Altona mint · Christian d'or and Frederik d'or"
        uk: "Монетний двір Альтона · Christian d'or і Frederik d'or"
      description:
        de: "Pistolen-Goldprägung in Holstein-Altona unter dem dänischen Gesamtstaat: Christian d'or unter Christian VII. (ab 1771), Frederik d'or unter Frederik VI., 2 Christian d'or unter Christian VIII., 2 Frederik d'or unter Frederik VII. — derselbe Standard wie der reduzierte preußische Friedrich d'or (130/144 Probe, 6,03 g fein, 5-Speciedaler-Tarif).<sup><a href=\"#ref33\">[33]</a></sup> Mit der preußischen Annexion 1864/1867 endet die holsteinische d'or-Prägung; in Kopenhagen läuft die Linie biß 1870 weiter."
        en: "Pistole gold coinage in Holstein-Altona under the Danish composite state: Christian d'or under Christian VII (from 1771), Frederik d'or under Frederik VI, 2 Christian d'or under Christian VIII, 2 Frederik d'or under Frederik VII — at the same standard as the reduced Prussian Friedrich d'or (130/144 fineness, 6.03 g fine, 5-Speciedaler tariff).<sup><a href=\"#ref33\">[33]</a></sup> With the Prussian annexation of 1864/1867 the Holstein d'or coinage ends; in Copenhagen the line continues until 1870."
        uk: "Pistolen-карбування золота в Гольштейні-Альтоні за данського цілісного союзу: Christian d'or за Christian VII (з 1771), Frederik d'or за Frederik VI, 2 Christian d'or за Christian VIII, 2 Frederik d'or за Frederik VII — за тим самим стандартом, що й редукований прусський Friedrich d'or (проба 130/144, 6,03 г чистого, тариф 5 Speciedaler).<sup><a href=\"#ref33\">[33]</a></sup> Із прусською анексією 1864/1867 рр. гольштинське карбування d'or припиняється; у Копенгагені лінія триває до 1870 р."

  kronemont_chr_iv:
    - id: A
      year_from: 1618
      year_to: 1624
      from_label: '1618'
      to_label: '1624'
      title:
        de: Christian IV. · Corona Danica · Tarif 1½ Speciedaler
        en: Christian IV · Corona Danica · tariff 1½ Speciedaler
        uk: Кристіан IV · Corona Danica · тариф 1½ Specie
      description:
        de: 'Einzige Phase der Christian-IV.-Krone: alle Prägungen 1618–1624 laufen unter dem ursprünglichen Tarif <b>1½ Speciedaler</b> — eine Wertigkeit, die im Volksmund die satirische Umdeutung des königlichen Wahlspruches <b>RFP</b> (regna firmat pietas) als <b>R(iget) F(attes) P(enge)</b> hervorrief.<sup><a href="#ref25">[25]</a></sup> Die offizielle Tarifsenkung auf 1⅓ Speciedaler erfolgt erst <b>1625</b><sup><a href="#ref21">[21]</a><a href="#ref22">[22]</a></sup>, unmittelbar nach Einstellung der Krone-Prägung. Stilistische Untergruppen: Corona-Danica-Originalprägungen 1618–1622 (KM# 57–61, 58a, 59a) und «Dicke» / Open-Crown-Varianten 1624 (KM# 94–99) — alle innerhalb desselben Tarifregimes.'
        en: 'Sole phase of the Christian IV Krone: all 1618–1624 issues run under the original <b>1½ Speciedaler</b> tariff — a parity that in folk parlance prompted the satirical reread of the royal motto <b>RFP</b> (regna firmat pietas) as <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref25">[25]</a></sup> The official tariff cut to 1⅓ Speciedaler only comes in <b>1625</b><sup><a href="#ref21">[21]</a><a href="#ref22">[22]</a></sup>, right after Krone production stops. Stylistic sub-groups: Corona Danica original strikes 1618–1622 (KM# 57–61, 58a, 59a) and «Dicke» / Open-Crown variants 1624 (KM# 94–99) — all within the same tariff regime.'
        uk: 'Єдина фаза Krone Кристіана IV: усі емісії 1618–1624 під оригінальним тарифом <b>1½ Speciedaler</b> — паритет, який у народі породив сатиричне переосмислення королівського девізу <b>RFP</b> (regna firmat pietas) як <b>R(iget) F(attes) P(enge)</b>.<sup><a href="#ref25">[25]</a></sup> Офіційне зниження тарифу до 1⅓ Speciedaler відбувається лише <b>1625</b><sup><a href="#ref21">[21]</a><a href="#ref22">[22]</a></sup> — одразу після припинення карбування Krone. Стилістичні підгрупи: оригінальні Corona Danica 1618–1622 (KM# 57–61, 58a, 59a) та варіанти «Dicke» / Open-Crown 1624 (KM# 94–99) — усі в одному тарифному режимі.'

  # 13-Krone-Fuß («Feine Krone») — Copenhagen-only standard, no
  # Holstein issues. Listed here as a contextual section so the
  # Krone-Mønt family (Christian IVs kroner → 10½-Krone-Fuß →
  # 13-Krone-Fuß) is presented in full on the timeline. Empty phase
  # array is intentional — no Glückstadt or Tönning specimens.
  kronemont_fine: []

  # Reichsgoldmünzfuß (Goldmark) — Reich-wide 1871–1914 (gold standard
  # suspended 4 Aug 1914 at the start of WWI; formal demonetisation
  # 1924 → Rentenmark / Reichsmark). Holstein had no participating
  # mint (the Altona Mint closed in 1863, before the standard was
  # introduced); 5/10/20-Mark gold coins circulating in Holstein
  # came from Berlin (A), Hamburg (J) and the other Reich mints.
  # Empty phase array — included as a contextual section so the
  # gold-standard history closes properly after the Reichsdukatenfuß.
  reichsgoldmuenzfuss: []

  # Vereinsgoldmünze — no Holstein-specific issues. The Altona mint
  # had closed in 1863, before SH joined the German Münzverein
  # (after the Vienna Peace of 30 October 1864 / Prussian annexation
  # 1867). Vereinskronen circulating in the duchies came from
  # Hannover (B) and Prussia (A). Empty phase array — included as a
  # contextual section so the gold-standard history covers the gap
  # between Reichsdukatenfuß / Pistolen-Fuß / Courantdukatenfuß
  # (all ending pre-1871) and Reichsgoldmünzfuß (from 1871).
  vereinsgoldmuenze: []

