        en: "Pistolen-Fuß · d'or"
        uk: "Pistolen-Fuß · d'or"
      small:
        de: "6,03 g fein · Gold"
        en: "6.03 g fine · gold"
        uk: "6,03 г чистого · золото"
      year_from: 1771
      year_to: 1864
      bar_title:
        de: "Pistolen-Fuß (5-Thaler-Tarif, ≈ 903 ‰ · 6,03 g fein) als zweite Goldlinie parallel zum Reichsdukatenfuß · in Holstein-Altona ab 1771 (Christian d'or unter Christian VII. — Vorbild der reduzierte preußische Friedrich d'or 1770) · fortgeführt unter Frederik VI. / Christian VIII. / Frederik VII. (Frederik d'or, 2 Christian d'or, 2 Frederik d'or) · in Altona endet die Linie mit der preußischen Annexion 1864/1867; in Kopenhagen läuft sie biß 1870 (Christian IX.) weiter"
        en: "Pistolen-Fuß (5-thaler tariff, ≈ 903 ‰ · 6.03 g fine) as a second gold line in parallel with the Reichsdukatenfuß · in Holstein-Altona from 1771 (Christian d'or under Christian VII — modelled on the reduced Prussian Friedrich d'or of 1770) · continued under Frederik VI / Christian VIII / Frederik VII (Frederik d'or, 2 Christian d'or, 2 Frederik d'or) · in Altona the line ends with the Prussian annexation of 1864/1867; in Copenhagen it runs on until 1870 (Christian IX)"
        uk: "Pistolen-Fuß (тариф 5 талерів, ≈ 903 ‰ · 6,03 г чистого) як друга золота лінія паралельно з Reichsdukatenfuß · у Гольштейні-Альтоні з 1771 (Christian d'or за Christian VII — зразок редукованого прусського Friedrich d'or 1770) · продовжено за Frederik VI / Christian VIII / Frederik VII (Frederik d'or, 2 Christian d'or, 2 Frederik d'or) · в Альтоні лінія завершується прусською анексією 1864/1867; у Копенгагені триває до 1870 (Christian IX)"
      color_class: g

    - id: "9_thaler"
      order: 8
      label:
        de: "9-Thaler-Fuß · Reichsthaler Species"
        en: "9-Thaler-Fuß · Reichsthaler Species"
        uk: "9-Thaler-Fuß · Reichsthaler Species"
      small:
        de: "25,98 g fein · Silber"
        en: "25.98 g fine · silver"
        uk: "25,98 г чистого · срібло"
      year_from: 1566
      year_to: 1625
      # No per-bar anywhere truncation needed: the three end-anchors
      # (mint=1667, circulation=~1700, status=1738) are now carried
      # by the global events in `data/shared/fuesse.yml#9_thaler`
      # (last_mint.anywhere, demonetisation.anywhere, std_end.anywhere
      # respectively) — these are general HRR-wide facts that apply
      # to every page that references the 9-Fuß. Regional Sonderfall
      # (Hannover Speciesthaler 1738-1802, Hamburg Bank-Speciesthaler
      # 1730-1764, Lübeck Jubiläumsthaler 1730/1776, Hamburg/Lübeck
      # Bank-Mark accounting until 1875) is documented on the
      # respective per-location pages and in `docs/9_thalerfuss.md`,
      # not stretched into the global event envelope.
      # See `docs/9_thalerfuss.md` for the four-phase periodisation
      # and the «Drei Anker» framing that backs these dates.
      bar_title:
        de: "Augspurger Reichsmüntz-Abschied 30. Mai 1566 · drei Datierungs-Anker für das Ende des 9-Fuß: Massen-Carbung empirisch beendet 1667 (Zinnaer Müntzvertrag); Funktion als Hauptumlaufmünze beendet ~1700; formell als Reichsmünzfuß durch den Leipziger Fuß abgelöst 1738. In Holstein letzte Prägung 1625 (Hans Jr. von Sonderburg, 2 Schilling Lübisch); ab 1622 parallel vom 9¼-Fuß abgelöst (Friedrich III. von Gottorp, Glückstadt). Nach 1700 erhalten als Inseln: Hannover Speciesthaler 1738–1802 (letzte Schaumünze 1797), Hamburg Bank-Speciesthaler 1730–1764 (~110 000 Stück), Lübeck Jubiläumsthaler 1730 / 1776 · in Hamburg und Lübeck als Banktauschmünze biß 1875."
        en: "Augsburg Imperial Mint Decree, 30 May 1566 · three dating anchors for the end of the 9-Fuß: mass minting empirically ends 1667 (Zinnaer Münzvertrag); the role of principal circulating coin ends ~1700; formally replaced as Reichsmünzfuß by the Leipziger Fuß in 1738. In Holstein the last strike is 1625 (Hans Jr. of Sonderburg, 2 Schilling Lübisch); from 1622 already being superseded in parallel by the 9¼-Fuß (Friedrich III of Gottorp, Glückstadt). Surviving islands after 1700: Hanover Speciesthaler 1738–1802 (last Schaumünze 1797), Hamburg Bank-Speciesthaler 1730–1764 (~110,000 pieces), Lübeck jubilee Thaler of 1730 / 1776 · in Hamburg and Lübeck retained as bank-exchange money until 1875."
        uk: "Авґсбурзький імперський монетний декрет 30 травня 1566 · три датувальні якорі кінця 9-Fuß: масове карбування емпірично завершено 1667 (Zinnaer Münzvertrag); функція головної обігової монети завершена ~1700; формально замінено як Reichsmünzfuß на Leipziger Fuß 1738. У Гольштейні останнє карбування 1625 (Hans Jr. Sonderburg, 2 Schilling Lübisch); з 1622 паралельно витіснений 9¼-Fuß (Фредерік III Ґотторпський, Glückstadt). Після 1700 збережений як острови: ганноверський Speciesthaler 1738–1802 (остання Schaumünze 1797), гамбурзький Bank-Speciesthaler 1730–1764 (~110 000 штук), любецький ювілейний Thaler 1730 / 1776 · у Гамбурзі та Любеку як банковий рахунок до 1875."
      color_class: rt

