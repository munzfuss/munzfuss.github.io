    note:
      de: |-
        Lorbeerkranz-Variante · Münzmeister <b>Christoph Friedrich Woltereck</b> (CW, Glückstadt 1680–1702) — Nachfolger seines Onkels Johann Woltereck (Glückstadt 1664–1679). Obverse-Legende «5CC5 / CW», reverse «IIII · MARCK · DANSKE» mit Datum. <em>Anmerkung:</em> die CW-Initialen sind hier nicht mit Christian Winnecke senior zu verwechseln, der zeitgleich an der Kopenhagener Münze (Mzz. ♡) tätig war — zwei verschiedene Personen mit denselben Initialen. · <em>Hede-Typologie:</em> Hede 125C ist der eindeutige Untertyp «Lorbeerkranz, 1694–1696» innerhalb von Hede 125 (Glückstadt, dobbelt slynget Monogram), Sieg 139<sup><a href="#ref23">[23]</a></sup>; Geschwistertypen sind 125A (Palmkranz, 1692–1694, Sieg 138.1) und 125B (Palmkranz mit Datum unter dem Schild, 1693, Sieg 138.2). · Numista führt einen weiteren parallelen Eintrag zur selben Hede 125C-Typologie: N#313360 unter «1 Krone» (Issuer: Danish duchies of Schleswig-Holstein) — gleiche Münze, Numista-Duplikatnotierung; Davenport (Dav EC II# 3680) vereint zudem die parallelen Krause-Editionen KM# 83 und 114 mit diesem Eintrag zum selben Typ. Empirische Stückgewichte 22,19–22,54 g (Schulman E-Auction 19/2060, Schulman 390/27, Stack's Bowers Dec. 2025/13247) liegen im erwarteten 10½-Krone-Fuß-Bereich (Formelwert 22,272 g).

      en: |-
        Laurel-wreath variant · mintmaster <b>Christoph Friedrich Woltereck</b> (CW, Glückstadt 1680–1702) — successor to his uncle Johann Woltereck (Glückstadt 1664–1679). Obverse legend «5CC5 / CW», reverse «IIII · MARCK · DANSKE» with date. <em>Note:</em> the CW initials here are not to be confused with Christian Winnecke senior, who was simultaneously active at the Copenhagen mint (mintmark ♡) — two different persons sharing the same initials. · <em>Hede typology:</em> Hede 125C is the single sub-type «laurel wreath, 1694–1696» within Hede 125 (Glückstadt, double interlaced monogram), Sieg 139<sup><a href="#ref23">[23]</a></sup>; sister sub-types are 125A (palm wreath, 1692–1694, Sieg 138.1) and 125B (palm wreath with date below shield, 1693, Sieg 138.2). · Numista carries one further parallel entry for the same Hede 125C: N#313360 under «1 Krone» (issuer: Danish duchies of Schleswig-Holstein) — same coin, Numista duplicate; Davenport (Dav EC II# 3680) further unifies the parallel Krause editions KM# 83 and 114 with this entry into a single type. Recorded specimen weights 22.19–22.54 g (Schulman E-Auction 19/2060, Schulman 390/27, Stack's Bowers Dec. 2025/13247) sit in the expected 10½-Krone-Fuß range (formula 22.272 g).
      uk: |-
        Варіант із лавровим вінком · монетмайстер <b>Christoph Friedrich Woltereck</b> (CW, Glückstadt 1680–1702) — наступник свого дядька Johann Woltereck (Glückstadt 1664–1679). Легенда аверсу «5CC5 / CW», реверс «IIII · MARCK · DANSKE» з датою. <em>Зауваження:</em> ініціали CW тут не плутати з Christian Winnecke senior, який паралельно працював у копенгагенському монетному дворі (монограма ♡) — це дві різні особи зі спільними ініціалами. · <em>Hede-типологія:</em> Hede 125C — це єдиний суб-тип «лавровий вінок, 1694–1696» у складі Hede 125 (Glückstadt, подвійний переплетений монограм), Sieg 139<sup><a href="#ref23">[23]</a></sup>; споріднені суб-типи — 125A (пальмовий вінок, 1692–1694, Sieg 138.1) та 125B (пальма з датою під щитом, 1693, Sieg 138.2). · Numista має ще один паралельний запис для цього самого Hede 125C: N#313360 під «1 Krone» (issuer: Danish duchies of Schleswig-Holstein) — одна монета, дубль у Numista; Davenport (Dav EC II# 3680) додатково об'єднує паралельні Krause-видання KM# 83 і 114 з цим записом в один тип. Зафіксовані ваги специменів 22,19–22,54 г (Schulman E-Auction 19/2060, Schulman 390/27, Stack's Bowers Dec. 2025/13247) лежать у діапазоні 10½-Krone-Fuß (формула 22,272 г).
