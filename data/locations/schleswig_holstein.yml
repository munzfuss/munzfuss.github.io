      context:
        de: "<b>Ausgeprägte Nominale unter Christian VII. · Kopenhagen, Altona (ab 1771), Glückstadt</b> — konsolidierte Darstellung über Phase A und B: die frühen Jahrgänge ab 1767 fielen noch in Phase A; ab 1773 setzt die Vereinigung unter dänischer Krone ein, ab 1771 ist Altona die holsteinische Haupt-Prägestätte."
        en: "<b>Denominations struck under Christian VII · Copenhagen, Altona (from 1771), Glückstadt</b> — a consolidated overview spanning phases A and B: the early years from 1767 still fall in phase A; the union under the Danish Crown begins in 1773, and from 1771 Altona is Holstein's principal mint."
        uk: "<b>Карбовані номінали за Кристіана VII · Копенгаген, Альтона (з 1771), Glückstadt</b> — зведений огляд по фазах A і B: ранні роки з 1767 ще належать до фази A; обʼєднання під данською Короною починається 1773, а з 1771 Альтона стає головним монетним двором Гольштейну."
      mt_caption:
        de: "Prägungen 1773–1788 — Nach Vereinigung Holsteins unter dän. Krone (1. Juni 1773) biß zur S.-H. Reform (29. Febr. 1788)"
        en: "Issues 1773–1788 — after the union of Holstein under the Danish Crown (1 June 1773), up to the Schleswig-Holstein reform (29 Feb. 1788)"
        uk: "Карбування 1773–1788 — після обʼєднання Гольштейну під данською Короною (1 червня 1773) до шлезв.-гольшт. реформи (29 лютого 1788)"

    - id: C
      year_from: 1788
      year_to: 1813
      from_label: "29. Febr. 1788"
      to_label: "5. Jan. 1813"
      title:
        de: "Nur noch in Dänemark, nicht mehr in Holstein"
        en: "Only in Denmark, no longer in Holstein"
        uk: "Лише в Данії, вже не в Гольштейні"
      description:
        de: "Schleswig-Holstein tritt aus dem dänischen Courantverbund aus (siehe Schilling-Sch.-H.-Courant). Der 11⅓-Fuß gilt weiter nur im dänischen Königreich selbst und in Norwegen."
        en: "Schleswig-Holstein leaves the Danish Courant union (see Schilling-Sch.-H.-Courant). The 11⅓-Fuß now applies only inside the Danish kingdom proper and in Norway."
        uk: "Шлезвіг-Гольштейн виходить із данського Courant-союзу (див. Schilling-Sch.-H.-Courant). 11⅓-Fuß далі діє лише в самому Данському королівстві й у Норвегії."
      context:
        de: |
          <b>In Holstein nicht mehr gesetzliches Zahlmittel;</b> dänische Courant-Münzen (Rigsort, 24 Skilling Danske) kursieren aber weiter als Handelsmünzen biß zum Staatsbankrott.<br>
          <b>Endet:</b> Staatsbankrott 5. Januar 1813 → Umstellung auf Rigsbankdaler (18½-Fuß).
        en: |-
          <b>No longer legal tender in Holstein;</b> Danish Courant coins (Rigsort, 24 Skilling Danske) nevertheless go on circulating as trade coins until the state bankruptcy.<br> <b>Ends:</b> the state bankruptcy of 5 January 1813 → switch to the Rigsbankdaler (18½-Fuß).
        uk: |-
          <b>У Гольштейні вже не законний платіжний засіб;</b> данські Courant-монети (Rigsort, 24 Skilling Danske) тим не менш ще обертаються як торгові аж до державного банкрутства.<br> <b>Кінець:</b> державне банкрутство 5 січня 1813 → перехід на Rigsbankdaler (18½-Fuß).

