    metal: silver
    issuing_entity: sonderburg_duchy
    note:
      de: "2 Schilling = 1/16 Thaler · Johann (Hans d. J.) von Schleswig-Holstein-Sonderburg, 1619-1620\n\nStempelvariante mit verkürzter Legende belegt: «IO D G - H NO / DVX SL HOL CO O E D 619» (IKMK Berlin).\n\nStempelvariante mit Lange-Basisnummer 533 (ohne Suffix) neben der katalogisierten 533a belegt — IKMK Berlin.\n\nStempel-Mule (1 Stück, IKMK 18284404): Vorderseite Hans-Sonderburg-Standardstempel «IOH D G - HAE NOR», Rückseite mit Reichslegende «MATTHIAS D G R IM S A 619» — Stempel des Reichskaisers Matthias II. fehlerhaft kombiniert. Die übrigen IKMK-Stücke unter km-9 sind reguläre Stempelvarianten (Lange 533 lange Latin-Form, 533A Standardform, 534 für 1620).\n\nStempelvariante des Jahrgangs 1620 unter KM#9 (Numista N#151527 deckt 1619-1620): Lange II 534 — IKMK 18284697 belegt eine kurz-Legende-Vs. «IO D G - H NO» / Rs. «DVX SL HOL CO O E D 620», passend zur kürzeren Stempel-Familie der 1619-Stücke (Lange 533a-Basis), nur mit Datum 620."
      en: "2 Schilling = 1/16 Thaler · Johann (Hans the Younger), Duke of Schleswig-Holstein-Sonderburg, 1619-1620\n\nVariant die with abbreviated legend documented: «IO D G - H NO / DVX SL HOL CO O E D 619» (IKMK Berlin).\n\nDie-variant with Lange base number 533 (no suffix) documented alongside the catalogued 533a — IKMK Berlin.\n\nDie-mule (1 specimen, IKMK 18284404): obverse standard Hans-Sonderburg die «IOH D G - HAE NOR», reverse with imperial legend «MATTHIAS D G R IM S A 619» — die of Holy Roman Emperor Matthias II combined in error. The other IKMK specimens under km-9 are regular die-variants (Lange 533 long Latin form, 533A canonical form, 534 for 1620).\n\nDie-variant of year 1620 under KM#9 (Numista N#151527 covers 1619-1620): Lange II 534 — IKMK 18284697 attests a short-legend obv. «IO D G - H NO» / rev. «DVX SL HOL CO O E D 620», matching the shorter die family of the 1619 pieces (Lange 533a base), with date 620."
      uk: "2 Schilling = 1/16 Thaler · Йоганн (Ганс Молодший) Гольштейн-Зондербург, 1619-1620\n\nЗадокументований штемпель зі скороченою легендою: «IO D G - H NO / DVX SL HOL CO O E D 619» (IKMK Berlin).\n\nЗадокументований штемпель з базовим Lange-номером 533 (без суфікса) поряд із каталогізованим 533a — IKMK Berlin.\n\nШтемпельний mule (1 екземпляр, IKMK 18284404): аверс — стандартний штемпель Hans-Sonderburg «IOH D G - HAE NOR», реверс — з імператорською легендою «MATTHIAS D G R IM S A 619», штемпель імператора Матвія II помилково поєднаний. Інші IKMK-екземпляри під km-9 — звичайні штемпельні варіанти (Lange 533 довга латинська форма, 533A канонічна, 534 для 1620).\n\nШтемпельний варіант 1620 року під KM#9 (Numista N#151527 покриває 1619-1620): Lange II 534 — IKMK 18284697 фіксує коротку легенду av. «IO D G - H NO» / rev. «DVX SL HOL CO O E D 620», що відповідає коротко-штемпельній родині 1619-х (Lange 533a base), лише з датою 620."
