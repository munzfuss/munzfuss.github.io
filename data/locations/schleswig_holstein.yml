# Phase definitions — grouped by fuss
# ---------------------------------------------------------------------

  kronemont_chr_iv:
    pdate_label:
      de: 'Geltungsbereich der Müntzformel: 1618 → 1652 (Hede) · in Holstein keine eigenen Prägungen — Kopenhagener Hauptmünze'
      en: 'Period of validity (Müntzformel): 1618 → 1652 (Hede) · no Holstein issues — Copenhagen royal mint'
      uk: 'Період дії монетної формули: 1618 → 1652 (Hede) · у Гольштейні власних карбувань немає — Копенгагенський королівський монетний двір'
    hintergrund:
      de: 'Christian-IVs-Müntzformel (.859 / 16,250 g fein). Eingeführt durch das <b>åbne Brev af 12. Juli 1618</b><sup><a href="#ref36">[36]</a></sup> (Wilcke II Anm. 53 verbatim: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I S. 156–157). Im Patent wird die Münze als «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» beschrieben — der spätere Latin-Name «Corona Danica» ist Numismatik-Usus, nicht Patent-Sprache. Anfangstarif 1½ Speciedaler — eine fiskalische Maßnahme der Krone mit einem Seigniorage-Aufschlag von ca. 11 % über dem Silberwert<sup><a href="#ref33">[33]</a></sup>. Die personnelle Christian-IV.-Karbung 1618–1624/25; im Folgejahr <b>1625</b> wird der Tarif offiziell auf 1⅓ Speciedaler gesenkt. Hede 1957<sup><a href="#ref32">[32]</a></sup> dokumentiert die Müntzformel als <b>1618–1652</b> — die Datierung umfasst auch die Frederik-III.-Fortsetzung in Kopenhagen 1651–1652, die noch nach derselben älteren Formel mit 16,25 g Feinsilber lief, bevor 1652 der Übergang zum 10½-Krone-Fuß (.672 / 14,964 g fein) vollzogen wurde. Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Sonderemissionen außerhalb der regulären Formel: 1665 «Pumphosenkrone» (Schou 39/40) und 1675 2-Krone (Schou 11–15) — Hede klassifiziert beide als spezielle Schaumünzen, nicht als Formelfortsetzung.<sup><a href="#ref16">[16]</a><a href="#ref21">[21]</a><a href="#ref22">[22]</a><a href="#ref23">[23]</a><a href="#ref32">[32]</a></sup>'
      en: 'Christian IV Müntzformel (.859 / 16.250 g fine). Introduced by the <b>åbne Brev af 12. Juli 1618</b><sup><a href="#ref36">[36]</a></sup> (Wilcke II note 53 verbatim: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I pp. 156–157). In the patent the coin is described as «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» — the later Latin name «Corona Danica» is a numismatic convention, not patent language. Initial tariff 1½ Speciedaler — a Crown fiscal measure with a seigniorage premium of ca. 11 % above the silver value<sup><a href="#ref33">[33]</a></sup>. Christian IV personal mintage 1618–1624/25; in the following year, <b>1625</b>, the tariff is officially cut to 1⅓ Speciedaler. Hede 1957<sup><a href="#ref32">[32]</a></sup> dates the Müntzformel as <b>1618–1652</b> — the period also covers the Frederik III continuation at Copenhagen 1651–1652, which still followed the same older formula at 16.25 g fine silver before transitioning to the 10½-Krone-Fuß (.672 / 14.964 g fine) from 1652 onward. Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Special issues outside the regular formula: 1665 «Pumphosenkrone» (Schou 39/40) and 1675 2-Krone (Schou 11–15) — Hede classifies both as specialised Schaumünzen rather than formula continuations.<sup><a href="#ref16">[16]</a><a href="#ref21">[21]</a><a href="#ref22">[22]</a><a href="#ref23">[23]</a><a href="#ref32">[32]</a></sup>'
      uk: 'Монетна формула Кристіана IV (.859 / 16,250 г чистого). Запроваджено <b>åbne Brev af 12. Juli 1618</b><sup><a href="#ref36">[36]</a></sup> (Wilcke II прим. 53 verbatim: «<i>I det aabne Brev af 12. Juli 1618, hvorved Kronemønten førtes frem for Offentligheden ...</i>»; Wilcke I с. 156–157). У патенті монета описана як «<i>1½-Specie / ¾-Specie (Krone / ½-Krone)</i>» — пізніша латинська назва «Corona Danica» — нумізматична умовність, не мова патенту. Початковий тариф 1½ Speciedaler — фіскальний інструмент Корони з сеньйораж­ною надбавкою бл. 11 % над срібною вартістю<sup><a href="#ref33">[33]</a></sup>. Персональне карбування Кристіана IV 1618–1624/25; наступного <b>1625</b> року тариф офіційно знижено до 1⅓ Speciedaler. Hede 1957<sup><a href="#ref32">[32]</a></sup> датує монетну формулу як <b>1618–1652</b> — період охоплює також продовження Фредеріка III у Копенгагені 1651–1652, яке ще йшло за тією самою старішою формулою з 16,25 г чистого срібла, перш ніж 1652 р. відбувся перехід на 10½-Krone-Fuß (.672 / 14,964 г чистого). Wikipedia DE «Corona Danica»: «<i>Friedrich III. lässt ab 1651 neben anderen Münzen erneut Kronen prägen, zunächst mit einem Feingehalt von 16,25 g Silber, dann von 14,964 g</i>». Спец-випуски поза регулярною формулою: 1665 «Pumphosenkrone» (Schou 39/40) і 1675 2-Krone (Schou 11–15) — Hede класифікує обидва як спеціальні Schaumünzen, а не продовження формули.<sup><a href="#ref16">[16]</a><a href="#ref21">[21]</a><a href="#ref22">[22]</a><a href="#ref23">[23]</a><a href="#ref32">[32]</a></sup>'
    details:
      de: "<p>Die Christian-IV.-Krone war keine Handelsmünze nach Silbergehalt, sondern eine fiskalische Tarifmünze: ihr Nennwert wurde vom König per Mandat über dem tatsächlichen Silberwert festgesetzt, die Differenz floß als Seigniorage in die Staatskasse<sup><a href=\"#ref33\">[33]</a></sup>.</p><p><b>Primärkanonische Hede-Formel</b><sup><a href=\"#ref23\">[23]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ Stück je 13¾-lötiger Marck</b> = 18,909 g rau bei .859 Feingehalt = 16,250 g fein je Krone. Die Bruchform (12,367 statt 12½) ergibt sich daraus, daß der Münzedikt 1618 den Fuß über die <b>Daler-Ausbringung</b> definiert — den nominellen Gesamtwert in Speciedaler aus einer feinen Marck Silber als Krone-Münzen. Bei Anfangstarif 1½ Specie pro Doppelkrone (= ¾ Specie pro Krone) ergeben 233,856 g Feinsilber 14,391 Krone, deren Nennwert sich auf 10,793 Speciedaler addiert (Hede H105<sup><a href=\"#ref23\">[23]</a></sup>). Nach der Forordning vom 14. Februar 1624 wird die Specie selbst auf 100 Skilling neu tarifiert; die physische Krone bleibt unverändert, aber dieselbe Marck Feinsilber bringt nach der neuen Specie-Skala nur noch 10,361 Speciedaler aus (Hede H124<sup><a href=\"#ref23\">[23]</a></sup>).</p><p>1618 wurde nur die 2 Krone (damals einfach «Krone» genannt) nach dieser Formel geprägt; ½, ¼ und ⅛ Krone des Jahres 1618 folgten einer leicht niedrigeren Münzfod. Ab 1619 prägt auch die ½ Krone nach der Hauptformel<sup><a href=\"#ref23\">[23]</a></sup>.</p><p>Spezialliteratur zur Christian-IV.-Phase: Hede / Schou (H105–H107, H124–H126); Bruun-Lots 13089 ff. (Stack's Bowers Auktion Part II, Zürich 14.–15. März 2025).</p>"
      en: "<p>The Christian IV Krone was not a trade coin valued by silver content but a fiscal tariff coin: its face value was set by royal mandate above the actual silver value, the gap accruing to the treasury as seigniorage<sup><a href=\"#ref33\">[33]</a></sup>.</p><p><b>Primary catalogue formula (Hede)</b><sup><a href=\"#ref23\">[23]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ pieces per 13¾-lødig mark</b> = 18.909 g rough at .859 fineness = 16.250 g fine per Krone. The fractional form (12.367 rather than 12½) follows from the 1618 mint edict defining the standard via the <b>daler output</b> — the total face value, expressed in Speciedaler, that one fine mark of silver yields once struck into Krone coin. At the initial tariff of 1½ Specie per Doppelkrone (= ¾ Specie per Krone), 233.856 g of fine silver yields 14.391 Krone, whose face values add up to 10.793 Speciedaler (Hede H105<sup><a href=\"#ref23\">[23]</a></sup>). After the Forordning of 14 February 1624 the Specie itself is re-rated to 100 Skilling; the physical Krone is unchanged, but on the new Specie scale the same fine mark now yields only 10.361 Speciedaler (Hede H124<sup><a href=\"#ref23\">[23]</a></sup>).</p><p>In 1618 only the 2 Krone (then simply called «Krone») was struck on this formula; the ½, ¼ and ⅛ Krone of 1618 followed a slightly lower Münzfod. From 1619 the ½ Krone also follows the main formula<sup><a href=\"#ref23\">[23]</a></sup>.</p><p>Specialist literature on the Christian IV phase: Hede / Schou (H105–H107, H124–H126); Bruun lots 13089 ff. (Stack's Bowers auction Part II, Zurich 14–15 March 2025).</p>"
      uk: "<p>Krone Кристіана IV не була торговельною монетою за вмістом срібла, а фіскальною тарифною: її номінал встановлювався королівським мандатом вище фактичної срібної вартості, різниця надходила до скарбниці як сеньйораж<sup><a href=\"#ref33\">[33]</a></sup>.</p><p><b>Першоджерельна Hede-формула</b><sup><a href=\"#ref23\">[23]</a></sup>: <b>12 ²⁵⁷⁄₇₀₀ штук з 13¾-lødig марки</b> = 18,909 г повної ваги за проби .859 = 16,250 г чистого на Krone. Дробова форма (12,367 замість 12½) випливає з того, що монетний едикт 1618 р. задавав стопу через <b>вихід у даллерах (daler-udbringning)</b> — сумарну номінальну вартість у Speciedaler, яку одна марка чистого срібла «приносила» при карбуванні в Krone-монети. За початкового тарифу 1½ Specie на Doppelkrone (= ¾ Specie на одну Krone) з 233,856 г чистого срібла виходить 14,391 Krone, сумарна номінальна вартість яких становить 10,793 Speciedaler (Hede H105<sup><a href=\"#ref23\">[23]</a></sup>). Після Forordning 14 лютого 1624 р. сам Specie перетарифовано на 100 Skilling; фізично Krone лишається без змін, але та сама марка чистого срібла за новою Specie-шкалою «приносить» уже лише 10,361 Speciedaler (Hede H124<sup><a href=\"#ref23\">[23]</a></sup>).</p><p>1618 р. за цією формулою карбувалась лише 2 Krone (тоді просто «Krone»); ½, ¼ та ⅛ Krone 1618 р. йшли за дещо нижчою møntfod. З 1619 р. ½ Krone теж переходить на головну формулу<sup><a href=\"#ref23\">[23]</a></sup>.</p><p>Спеціальна література по фазі Кристіана IV: Hede / Schou (H105–H107, H124–H126); лоти Bruun 13089 і далі (Stack's Bowers auction Part II, Цюрих 14–15 березня 2025).</p>"
    closing_label:
      de: "Zusammenfassung · 34 Jahre Müntzformel, in Holstein keine eigenen Prägungen"
      en: "Summary · 34 years of Müntzformel, no Holstein issues"
      uk: "Підсумок · 34 роки монетної формули, у Гольштейні власних карбувань немає"
    closing:
      de: |
        Christian-IVs-Müntzformel ist die <b>Initialphase</b> der dänisch-norwegischen Krone-Tarifprägung — 34 Jahre an einem unverschobenen Feingewichtsstandard (.859 / 16,250 g fein), beendet durch den Übergang zum leichteren 10½-Krone-Fuß unter Frederik III. im Jahr 1652. In Holstein wurde der Standard nicht geprägt; die Kopenhagener Stücke gelangten in die Herzogtümer ausschließlich über den dänisch-norwegischen Geldumlauf und gehören damit zur Helstaten-Münzgeschichte, nicht zur lokalen Holstein-Prägeüberlieferung.
      en: |-
        Christian IV's Müntzformel is the <b>founding phase</b> of the Danish-Norwegian Krone tariff coinage — 34 years on a single unshifted fine-weight standard (.859 / 16.250 g fine), brought to an end by the transition to the lighter 10½-Krone-Fuß under Frederik III in 1652. The standard was never struck in Holstein; the Copenhagen pieces reached the duchies only via the Danish-Norwegian currency flow, and therefore belong to the Helstaten coinage history rather than to the local Holstein minting record.
      uk: |-
        Монетна формула Кристіана IV — <b>початкова фаза</b> дансько-норвезького тарифного карбування Krone — 34 роки на одному незмінному стандарті чистої ваги (.859 / 16,250 г чистого), завершена переходом на легший 10½-Krone-Fuß за Фредеріка III 1652 р. У Гольштейні стандарт не карбувався; копенгагенські монети потрапляли в герцогства виключно через дансько-норвезький грошовий обіг, тож належать до монетної історії Helstaten, а не до локальної гольштинської спадщини карбування.

  vereinsgoldmuenze:
    pdate_label:
      de: "Geltungsbereich in Holstein: 1864 (Wiener Frieden 30. Oktober 1864 — Beitritt zum deutschen Münzverein) → 1. April 1874 (Demonetisierung) · ca. 10 Jahre · in Holstein keine eigenen Prägungen"
      en: "In force in Holstein: 1864 (Vienna Peace of 30 October 1864 — accession to the German Münzverein) → 1 April 1874 (demonetisation) · ~10 years · no Holstein issues"
      uk: "Дія в Гольштейні: 1864 (Wiener Frieden 30 жовтня 1864 — приєднання до німецького Münzverein) → 1 квітня 1874 (демонетизація) · ~10 років · у Гольштейні власних карбувань немає"
    hintergrund:
      de: |
        Reichsweit standardisierte Goldhandelsmünze nach Wiener Münzvertrag vom <b>24. Januar 1857</b> (in Kraft 1. Mai 1857; Vertragslaufzeit biß Ende 1878 angelegt)<sup><a href="#ref41">[41]</a></sup> zwischen Österreich, Liechtenstein und den deutschen Zollvereinsstaaten. Standard: <b>50 Vereinskronen / Pfund (500 g) Feingold = 10 g fein je Krone</b> bei Probe 900 ‰ (= 11,111 g rau); halbe Krone analog (5 g fein bei 5,555 g rau). Reine <b>Handelsmünze ohne Annahmezwang</b>; Marktkurs bei Au:Ag 1:15,5 ergibt 1 Vereinskrone ≈ 9,3 Taler Talerwährung — staatliche Kassen konnten nur temporär (max. 6 Monate) Tarife festsetzen. Schleswig-Holstein wurde durch den <b>Wiener Frieden vom 30. Oktober 1864</b> aus dem dänischen Gesamtstaat herausgelöst und ging zunächst unter preußisch-österreichische Verwaltung, ab 1867 endgültig zu Preußen über — damit erst dann Teil des Wiener-Münzvertrags-Raums.<sup><a href="#ref43">[43]</a></sup> Da die Altonaer Münze schon <b>1863 geschlossen</b> war, gibt es <em>keine spezifisch holsteinischen Vereinskronen-Prägungen</em>; die in den Herzogtümern zirkulierenden Stücke kamen aus den nahen Hauptmintstaaten <b>Hannover (B)</b> und <b>Preußen (A)</b>. Mintage-Stop 1871 mit Reichsgründung; Demonetisierung <b>1. April 1874</b>, Einlösungsfrist biß <b>30. Juni 1874</b> — von 2 138 256 geprägten Vollkronen wurden nur 332 091 (≈ 15,5 %) eingelöst.<sup><a href="#ref42">[42]</a></sup>
      en: |-
        An imperially standardised gold trade coin under the Vienna Coin Treaty of <b>24 January 1857</b> (in force from 1 May 1857; treaty term planned until end of 1878)<sup><a href="#ref41">[41]</a></sup> among Austria, Liechtenstein and the German Zollverein states. Standard: <b>50 Vereinskronen per pound (500 g) of fine gold = 10 g fine per Krone</b> at 900‰ fineness (= 11.111 g rough); the half Krone analogously (5 g fine at 5.555 g rough). A pure <b>trade coin with no compulsory acceptance</b>; the market rate at Au:Ag 1:15.5 yields 1 Vereinskrone ≈ 9.3 Taler Talerwährung — state treasuries could only set temporary tariffs (max. six months). Schleswig-Holstein was detached from the Danish composite state by the <b>Vienna Peace of 30 October 1864</b> and at first came under joint Prussian-Austrian administration, finally moving to Prussia in 1867 — only at that point did it become part of the Vienna-treaty area.<sup><a href="#ref43">[43]</a></sup> Since the Altona mint had been <b>closed in 1863</b>, there are <em>no Holstein-specific Vereinskronen issues</em>; the pieces circulating in the duchies came from the neighbouring main mint states <b>Hanover (B)</b> and <b>Prussia (A)</b>. Mintage stopped in 1871 with the Reich's founding; demonetisation on <b>1 April 1874</b>, redemption deadline <b>30 June 1874</b> — of 2,138,256 full Kronen struck, only 332,091 (≈ 15.5 %) were redeemed.<sup><a href="#ref42">[42]</a></sup>
      uk: |-
        Загальноімперсько-стандартизована золота торгова монета за Wiener Münzvertrag <b>24 січня 1857</b> (чинність з 1 травня 1857; термін договору планований до кінця 1878)<sup><a href="#ref41">[41]</a></sup> між Австрією, Ліхтенштейном і державами німецького Цольферайну. Стандарт: <b>50 Vereinskronen з фунта (500 г) чистого золота = 10 г чистого на Krone</b> за пробою 900 ‰ (= 11,111 г повної); halbe Krone аналогічно (5 г чистого при 5,555 г повної). Суто <b>торгова монета без обов'язку прийняття</b>; ринковий курс при Au:Ag 1:15,5 дає 1 Vereinskrone ≈ 9,3 Taler Talerwährung — державні каси могли встановлювати лише тимчасові тарифи (макс. 6 місяців). Шлезвіг-Гольштейн був відірваний від данського цілісного союзу <b>Wiener Frieden 30 жовтня 1864</b> і спочатку перейшов під спільну прусько-австрійську адміністрацію, остаточно до Пруссії 1867 — лише тоді й увійшов у простір Wiener Münzvertrag.<sup><a href="#ref43">[43]</a></sup> Оскільки Альтонський монетний двір було <b>закрито 1863 р.</b>, специфічно гольштинських Vereinskronen-емісій <em>немає</em>; монети, що оберталися в герцогствах, надходили з сусідніх головних мінт-штатів <b>Ганновер (B)</b> і <b>Пруссія (A)</b>. Карбування припинилось 1871 з утворенням Рейху; демонетизація <b>1 квітня 1874</b>, термін викупу <b>30 червня 1874</b> — з 2 138 256 викарбуваних повних Kronen викуплено лише 332 091 (≈ 15,5 %).<sup><a href="#ref42">[42]</a></sup>
    closing_label:
      de: "Zusammenfassung · 10 Jahre Tariffähigkeit in SH ohne lokale Prägung"
      en: "Summary · 10 years of tariff status in SH with no local issue"
      uk: "Підсумок · 10 років тарифного статусу в SH без власного карбування"
    closing:
      de: |
        Die Vereinsgoldmünze ist in Schleswig-Holstein eine Helstaten-analoge Helstaten-Münze ohne lokales Prägeerbe — die Altonaer Münze war 1863 geschlossen, der Münzverein-Beitritt erst 1864/1867. Sie ist jedoch wichtig als <b>mathematischer Vorläufer der Reichsgoldmark</b> 1871: dieselbe Pfund-Basis (500 g) und dieselbe .900-Probe; lediglich feinerer Stückaufbau (139½ × 10-Mark statt 50 × Krone je Pfund Feingold). Mit der Reichsgoldmark-Einführung 1871 läuft die Vereinsgoldmünze faktisch aus; Demonetisierung 1874 schließt das System.
      en: |-
        In Schleswig-Holstein the Vereinsgoldmünze is a Helstaten-analogous coin with no local minting heritage — the Altona mint had closed in 1863, and accession to the Münzverein only came in 1864/1867. It matters chiefly as the <b>mathematical precursor of the Reichsgoldmark</b> in 1871: the same pound basis (500 g) and the same .900 fineness, only with finer subdivision (139½ × 10-Mark vs. 50 × Krone per pound of fine gold). With the Reichsgoldmark in 1871 the Vereinsgoldmünze effectively lapses; demonetisation in 1874 closes the system.
      uk: |-
        У Шлезвіг-Гольштейні Vereinsgoldmünze — Helstaten-аналогічна монета без локальної спадщини карбування — Альтонський монетний двір було закрито 1863 р., а приєднання до Münzverein сталося лише 1864/1867. Її значення головне як <b>математичного попередника Reichsgoldmark</b> 1871: та сама фунтова база (500 г) і та сама проба .900, лише з тоншим поділом (139½ × 10-Mark проти 50 × Krone з фунта чистого золота). З запровадженням Reichsgoldmark 1871 Vereinsgoldmünze фактично згортається; демонетизація 1874 завершує систему.

  reichsgoldmuenzfuss:
    pdate_label:
      de: "Geltungsbereich in Holstein: 4. Dez. 1871 → 4. Aug. 1914 (Goldsuspendierung) · 43 Jahre · in Holstein keine eigenen Prägungen"
      en: "In force in Holstein: 4 Dec. 1871 → 4 Aug. 1914 (gold-redemption suspension) · 43 years · no Holstein issues"
      uk: "Дія в Гольштейні: 4 грудня 1871 → 4 серпня 1914 (призупинення золотого розміну) · 43 роки · у Гольштейні власні карбування відсутні"
    hintergrund:
      de: |
        Münzgesetz vom 4. Dezember 1871<sup><a href="#ref27">[27]</a></sup>: gemeinsamer Goldstandard des Deutschen Kaiserreichs. Aus 1 Pfund (500 g) Feingold werden 139½ Zehnmarkstücke = 1395 Mark ausgeprägt, Feingehalt 900 ‰; Goldnominale zu 5, 10 und 20 Mark. Geprägt an acht Reichsmünzstätten — Berlin (A), Hannover (B), Frankfurt am Main (C), München (D), Dresden (E), Stuttgart (F), Karlsruhe (G), Hamburg (J) — Altona war 1863 geschlossen worden<sup><a href="#ref26">[26]</a></sup>, sodaß keine Holstein-eigene Prägestätte am Reichsgoldmünzfuß teilnahm. Die Goldsuspendierung der Reichsbank am 4. August 1914 zu Kriegsbeginn beendet die praktische Geltung; formal abgelöst 1924 durch Reichsmark / Rentenmark.
      en: |-
        Coinage Act of 4 December 1871<sup><a href="#ref27">[27]</a></sup>: the common gold standard of the German Empire. From 1 Pfund (500 g) of fine gold, 139½ ten-Mark pieces = 1,395 Mark are struck at 900‰ fineness; gold denominations of 5, 10 and 20 Mark. Struck at eight imperial mints — Berlin (A), Hannover (B), Frankfurt am Main (C), Munich (D), Dresden (E), Stuttgart (F), Karlsruhe (G), Hamburg (J) — the Altona mint had closed in 1863<sup><a href="#ref26">[26]</a></sup>, so no Holstein-specific mint took part in the Reichsgoldmünzfuß. The Reichsbank's suspension of gold redemption on 4 August 1914, at the outbreak of war, ends practical operation; formally replaced in 1924 by the Reichsmark / Rentenmark.
      uk: |-
        Закон про монету від 4 грудня 1871 р.<sup><a href="#ref27">[27]</a></sup>: спільний золотий стандарт Німецької імперії. З 1 фунта (500 г) чистого золота карбують 139½ 10-Mark-Stück = 1395 Mark, проба 900 ‰; золоті номінали у 5, 10 і 20 Mark. Карбування здійснювалось у восьми імперських монетних дворах — Берлін (A), Ганновер (B), Франкфурт-на-Майні (C), Мюнхен (D), Дрезден (E), Штутгарт (F), Карлсруе (G), Гамбург (J). Двір в Альтоні зачинено ще 1863 р.<sup><a href="#ref26">[26]</a></sup>, тож жоден гольштинський монетний двір у Reichsgoldmünzfuß не брав участі. Призупинення Reichsbank-ом золотого розміну 4 серпня 1914 р. на початку війни припиняє фактичну дію; формально стандарт замінено 1924 р. на Reichsmark / Rentenmark.
    closing_label:
      de: "Zusammenfassung · 43 Jahre Geltung im Reich, in Holstein keine eigenen Prägungen"
      en: "Summary · 43 years across the Reich, no Holstein issues"
      uk: "Підсумок · 43 роки чинності в Рейху, у Гольштейні власних карбувань немає"
    closing:
      de: |
        Der Reichsgoldmünzfuß beendet als reichseinheitlicher Goldstandard 1871 die 312-jährige Geltung des Reichsdukatenfußes, hat aber selbst keine eigene Holstein-Prägestätte (Altona 1863 geschlossen). Die in Holstein zirkulierenden 5/10/20-Mark-Goldstücke kommen aus den anderen Reichsmünzstätten — vor allem Hamburg (J) und Berlin (A) — und sind als gemeinsame Reichsmünzen nicht territorial unterscheidbar. Mit der Goldsuspendierung 1914 endet die praktische Goldwährung; die formal-rechtliche Demonetisierung 1924 schließt ein 53-jähriges Goldzeitalter ab und überführt Deutschland endgültig in die Papier-Mark-Ära (Reichsmark / Rentenmark).
      en: |-
        The Reichsgoldmünzfuß, introduced as a Reich-wide gold standard in 1871, ends the 312-year run of the Reichsdukatenfuß; it had no Holstein-specific mint of its own (Altona had closed in 1863). The 5/10/20-Mark gold coins circulating in Holstein came from the other imperial mints — chiefly Hamburg (J) and Berlin (A) — and as common imperial coinage cannot be distinguished territorially. The 1914 gold-redemption suspension ends the practical gold currency; formal demonetisation in 1924 closes a 53-year gold era and definitively moves Germany into the paper-Mark era (Reichsmark / Rentenmark).
      uk: |-
        Reichsgoldmünzfuß, запроваджений 1871 р. як загальноімперський золотий стандарт, завершує 312-річну дію Reichsdukatenfuß; власної гольштинської монетної установи не має (Альтонський двір закрито ще 1863 р.). Золоті 5/10/20-Mark-Stücke, що оберталися в Гольштейні, надходили з інших імперських монетних дворів — передусім Гамбурга (J) і Берліна (A) — і як спільне імперське карбування не розрізняються територіально. Призупинення золотого розміну 1914 р. припиняє фактичну золоту валюту; формальна демонетизація 1924 р. закриває 53-річну золоту епоху і остаточно переводить Німеччину в епоху Papiermark (Reichsmark / Rentenmark).
phases:
  9_thaler:
    - id: A
      year_from: 1566
      year_to: 1625
      from_label: "30. Mai 1566"
      to_label: "1625"
      title:
        de: "Reichsmünzordnung in Holstein-Gottorp"
        en: "Imperial Mint Decree in Holstein-Gottorp"
        uk: "Імперський монетний ордонанс у Гольштейн-Ґотторпі"
      description:
        de: "Holsteinische Reichsthaler-Prägungen unter Adolf I., Johann Adolf, frühem Friedrich III. und Hans Jr. von Sonderburg — Kipper-Wipper-Krise (1620–1623), ab 1622 parallel vom leichteren 9¼-Fuß abgelöst, letzte Holstein-Prägung 1625."
        en: "Holstein Reichsthaler issues under Adolf I, Johann Adolf, early Friedrich III and Hans Jr. of Sonderburg — Kipper-Wipper crisis (1620–1623), superseded in parallel by the lighter 9¼-Fuß from 1622, last Holstein strike 1625."
        uk: "Гольштинські карбування Reichsthaler за Адольфа I, Йоганна Адольфа, раннього Фредеріка III та Hans Jr. Sonderburg — Kipper-Wipper-криза (1620–1623); з 1622 паралельно витісняється легшим 9¼-Fuß; останнє карбування в Гольштейні — 1625."
      context:
        de: |
          <b>Reichsstandard biß 1625:</b> Reichsthaler 9-Fuß (.889/14²⁄₉ Loth, 25,984 g fein), Mark-lübisch-Theilstücke (½, ¼, ⅛ Thaler), Schillinge (1/32, 1/48 Thaler), Pfennig-Scheidemünzen (1/96, 1/128 Thaler).<br>
          <b>Münzstätten:</b> in Holstein-Gottorp vor allem Schleswig und Husum. Nach dem Kipper-Wipper-Zusammenbruch (~1620) verlieren die Reichsstände das einheitliche Münzwesen — ab 1622 setzt sich in Holstein der leichtere 9¼-Fuß (Thaler Species, 25,28173 g fein gegen 25,984 g im 9-Fuß) durch, die letzte holsteinische 9-Fuß-Prägung erfolgt 1625 (Hans Jr. Sonderburg, 2 Schilling Lübisch).<br>
          <b>Außerhalb Holsteins lebt der 9-Fuß weiter:</b> Hamburg behält ihn als <i>Bank-Mark</i> der Hamburger Bank, Lübeck als <i>Speciemark</i> — beide biß 1875.
        en: |-
          <b>Imperial standard until 1625:</b> Reichsthaler at 9-Fuß (.889/14²⁄₉ Loth, 25.984 g fine), Mark-lübisch sub-units (½, ¼, ⅛ Thaler), Schilling pieces (1/32, 1/48 Thaler), Pfennig petty coins (1/96, 1/128 Thaler).<br> <b>Mints:</b> in Holstein-Gottorp mainly Schleswig and Husum. After the Kipper-Wipper collapse (~1620) the imperial estates lose unified coinage; from 1622 the lighter 9¼-Fuß (Thaler Species, 25.28173 g fine vs. 25.984 g in the 9-Fuß) takes over in Holstein, with the last 9-Fuß strike falling in 1625 (Hans Jr. of Sonderburg, 2 Schilling Lübisch).<br> <b>Beyond Holstein the 9-Fuß lived on:</b> Hamburg kept it as the <i>Bank-Mark</i> of the Hamburger Bank, Lübeck as the <i>Speciemark</i> — both until 1875.
        uk: |-
          <b>Імперський стандарт до 1625:</b> Reichsthaler у 9-Fuß (.889/14²⁄₉ Loth, 25,984 г чистого), частки Mark lübisch (½, ¼, ⅛ Thaler), Schilling-монети (1/32, 1/48 Thaler), Pfennig-розмінні монети (1/96, 1/128 Thaler).<br> <b>Монетні двори:</b> в Гольштейн-Ґотторпі переважно Шлезвіг і Гузум. Після колапсу Kipper-Wipper (~1620) імперські стани втрачають єдину монетну систему; з 1622 у Гольштейні утверджується легший 9¼-Fuß (Thaler Species, 25,28173 г чистого проти 25,984 г у 9-Fuß), а останнє 9-Fuß-карбування припадає на 1625 р. (Hans Jr. Sonderburg, 2 Schilling Lübisch).<br> <b>Поза Гольштейном 9-Fuß продовжує існувати:</b> Гамбург тримає його як <i>Bank-Mark</i> Гамбурзького банку, Любек — як <i>Speciemark</i>; обидва до 1875 р.

    - id: B
      year_from: 1683
      year_to: 1683
      from_label: '1683'
      to_label: '1683'
      title:
        de: Glückstadter Speciedaler nach 9-Fuß (1683)
        en: Glückstadt Speciedaler at 9-Fuß (1683)
        uk: Ґлюкштатський Speciedaler за 9-Fuß (1683)
      description:
        de: 'Speciedaler Christians V. von 1683 (Münzstätte Glückstadt), gemünzt nach dem Reichsthaler-9-Fuß — also nach einem Standard, der in Holstein bereits seit 1622 vom 9¼-Fuß abgelöst war. Dokumentiert als Hede 120 (danskmoent.dk c5h120<sup><a href="#ref23">[23]</a></sup>): aus einer feinen Marck Silber wurden 9 Speciedaler ausgeprägt — kanonisch der 9-Fuß. Auflage und Anlaß der Prägung sind aus den uns vorliegenden Quellen nicht ersichtlich.'
        en: 'A 1683 Speciedaler of Christian V (Glückstadt mint), struck on the Reichsthaler-9-Fuß — a standard that had been superseded in Holstein by the 9¼-Fuß since 1622. Documented as Hede 120 (danskmoent.dk c5h120<sup><a href="#ref23">[23]</a></sup>): one fine mark of silver yielded 9 Speciedaler — the canonical 9-Fuß. Mintage figures and the reason for striking on this standard are not given in the sources available here.'
        uk: 'Speciedaler Кристіана V 1683 р. (монетний двір Glückstadt), викарбуваний за стандартом Reichsthaler-9-Fuß — стопою, яку в Гольштейні з 1622 р. вже витіснив 9¼-Fuß. Задокументовано як Hede 120 (danskmoent.dk c5h120<sup><a href="#ref23">[23]</a></sup>): з марки чистого срібла викарбувано 9 Speciedaler — канонічний 9-Fuß. Тираж та обставини карбування саме за цим стандартом у доступних нам джерелах не зазначені.'
  9_25_thaler:
    - id: A
      year_from: 1622
      year_to: 1726
      from_label: "1622"
      to_label: "15. Juli 1726"
      title:
        de: "Etablierung unter dänischer und gottorpischer Herrschaft"
        en: "Establishment under Danish and Gottorp rule"
        uk: "Становлення під данським і ґотторпським правлінням"
      description:
        de: "Holstein zweigetheilt: Königsl. dänischer Antheil (Glückstadt, Pinneberg, Rantzau) und Gottorpischer Antheil (Tönning, Schleswig, Kiel) · keine einheitliche Münzstruktur · Aufgeld zwischen Species und Umlaufmünzen üblich."
        en: "Holstein divided in two: the royal Danish part (Glückstadt, Pinneberg, Rantzau) and the Gottorp part (Tönning, Schleswig, Kiel) · no unified coinage structure · a premium between Species and circulating coins is the norm."
        uk: "Гольштейн розділений на дві частини: королівська данська частина (Glückstadt, Pinneberg, Rantzau) і ґотторпська частина (Tönning, Schleswig, Kiel) · єдиної монетної структури немає · надбавка (Aufgeld) між Species і обіговими монетами — звична практика."
      context:
        de: |
          <b>Dominierende Großsilbermünze:</b> Thaler Species im 9¼-Fuß, nach dänischer Tradition etabliert; daneben lübisch geprägte Schilling-Scheidemünzen. <b>Zeitgenössische Nomenklatur:</b> auf den Münzen «SPECIES» oder Mark-Danske-Denomination; in Auktionskatalogen auch «Speciedaler».<br>
          <b>Hauptumlauf in Holstein:</b> Neben heimischen Prägungen zirkulieren lübische, hamburgische und norddeutsche Thaler Species; niederländische Patagonen/Albertusthaler; schwedische 4-Mark-Stücke; spanische Piaster — der Handel akzeptiert jede Species nach Silbergehalt.<br>
          <b>Parallel zur Thaler-Species-Prägung: die Kronemønt-Kategorie (1618 → 1696).</b> Siehe eigene Sektion <i>10½-Krone-Fuß · Kronemønt-Tarifmünze</i> unten, wo die Tarifhistorie 1½ → 1⅓ → ⅔ Speciedaler und die Prägetabelle 1644–1696 detailliert dokumentiert sind.
        en: |-
          <b>Dominant large silver coin:</b> the Thaler Species in the 9¼-Fuß, established by Danish tradition; alongside it, Schilling petty coinage in Lübeck reckoning. <b>Contemporary nomenclature:</b> on the coins themselves «SPECIES» or a Mark-Danske denomination; auction catalogues often use «Speciedaler».<br> <b>Main circulation in Holstein:</b> besides domestic issues, Lübeck, Hamburg and North-German Thaler Species circulate; Dutch Patagonen/Albertusthaler; Swedish 4-Mark pieces; Spanish piastres — trade accepts every Species by silver content.<br> <b>In parallel with the Thaler Species issues — the Kronemønt category (1618 → 1696).</b> See the dedicated section <i>10½-Krone-Fuß · Kronemønt tariff coin</i> below, which documents the tariff history 1½ → 1⅓ → ⅔ Speciedaler and the strike table 1644–1696 in detail.
        uk: |-
          <b>Домінантна велика срібна монета:</b> Thaler Species у 9¼-Fuß, закріплений данською традицією; поруч — Schilling-розмінна монета у любецькому рахунку. <b>Сучасна термінологія:</b> на самих монетах «SPECIES» або номінал у Mark-Danske; аукціонні каталоги вживають також «Speciedaler».<br> <b>Основний обіг у Гольштейні:</b> крім місцевих карбувань, обертають любецькі, гамбурзькі й північнонімецькі Thaler Species; нідерландські Patagonen/Albertusthaler; шведські 4-Mark; іспанські піастри — торгівля приймає кожен Species за вмістом срібла.<br> <b>Паралельно з карбуванням Thaler Species — категорія Kronemønt (1618 → 1696).</b> Див. окрему секцію <i>10½-Krone-Fuß · тарифна монета Kronemønt</i> нижче, де докладно задокументовано історію тарифу 1½ → 1⅓ → ⅔ Speciedaler і таблицю карбувань 1644–1696.
      mt_caption:
        de: "Münzstätte Tönning · Gottorpisches Holstein · 1689–1726 · Scheidemünzen mit lübischer Nominalangabe (im 9¼-Fuß-System) + Thaler Species und Dukaten (aus Bruun Coll. Stack's Bowers Auktion Zürich 14.–15. März 2025)"
        en: "Tönning mint · Gottorp Holstein · 1689–1726 · petty coins denominated in Lübeck reckoning (within the 9¼-Fuß system) plus Thaler Species and ducats (from the Bruun Coll., Stack's Bowers auction, Zurich 14–15 March 2025)"
        uk: "Монетний двір Tönning · ґотторпський Гольштейн · 1689–1726 · розмінна монета з номіналом у любецькому рахунку (в межах системи 9¼-Fuß) плюс Thaler Species і дукати (з колекції Bruun, аукціон Stack's Bowers, Цюрих 14–15 березня 2025)"

    - id: B
      year_from: 1726
      year_to: 1788
      from_label: "15./31. Juli 1726"
      to_label: "29. Febr. 1788"
      title:
        de: "Parallel zum Dänisch-Norwegischen Kurantmøntfod"
        en: "In parallel with the Danish-Norwegian Kurantmøntfod"
        uk: "Паралельно з данським Kurantmøntfod"
      description:
        de: "Thaler Species wird Großhandels-/Reserveeinheit neben dem neu eingeführten Courantsystem. Gottorp unter dän. Krone vereinigt 1773."
        en: "The Thaler Species becomes the wholesale and reserve unit alongside the newly introduced Courant system. Gottorp united under the Danish Crown in 1773."
        uk: "Thaler Species стає одиницею оптової торгівлі й резерву поряд із новозапровадженою системою Courant. Готторп обʼєднано під данською Короною 1773 р."
      context:
        de: |
          <b>Funktion:</b> Fernhandel, Wechselgeschäft, Lohnverträge mit Beamten und Offizieren, Staatsanleihen. Im Alltag ungebräuchlich — dort dominiert der Rigsdaler Courant (siehe 11⅓-Fuß unten).<br>
          <b>Kurs:</b> 1 Thaler Species ≈ 1,225 Rigsdaler Courant biß 1794 · danach per Dekret 1,25 (ohne Silberänderung).<br>
          <b>Opgæld:</b> Wegen unrunden Kursverhältnisses tritt beim Tausch Courant → Species Aufgeld auf — von der Reform 1788 (siehe Phase C unten) abgeschafft.<br><br>
          <em>Keine eigenständigen Thaler-Species-Prägungen in Holstein/Schleswig während dieser Phase — Umlauf der Thaler Species aus Kopenhagen, Hamburg, Lübeck und Norddeutschland (vgl. Phase A und C).</em>
        en: |-
          <b>Function:</b> long-distance trade, bills of exchange, salary contracts with officials and officers, state loans. Uncommon in everyday use — there the Rigsdaler Courant dominates (see 11⅓-Fuß below).<br> <b>Rate:</b> 1 Thaler Species ≈ 1.225 Rigsdaler Courant until 1794 · thereafter, by decree, 1.25 (with no change in silver content).<br> <b>Opgæld:</b> the awkward ratio meant a premium had to be added when swapping Courant → Species — abolished by the 1788 reform (see Phase C below).<br><br> <em>No standalone Thaler Species issues in Holstein/Schleswig during this phase — circulation of Thaler Species comes from Copenhagen, Hamburg, Lübeck and northern Germany (cf. phases A and C).</em>
        uk: |-
          <b>Функція:</b> далека торгівля, вексельний обіг, оплата праці чиновників і офіцерів, державні позики. У повсякденні майже не вживається — там домінує Rigsdaler Courant (див. 11⅓-Fuß нижче).<br> <b>Курс:</b> 1 Thaler Species ≈ 1,225 Rigsdaler Courant до 1794 · потім декретом 1,25 (без зміни срібного вмісту).<br> <b>Opgæld:</b> через нерівне співвідношення при обміні Courant → Species додавали надбавку — реформа 1788 р. (див. Фазу C нижче) її скасувала.<br><br> <em>Власних карбувань Thaler Species у Гольштейні/Шлезвігу в цій фазі немає — Thaler Species в обігу надходять із Копенгагена, Гамбурга, Любеку й Північної Німеччини (порівн. фази A і C).</em>

    - id: C
      year_from: 1787
      year_to: 1813
      from_label: "1787 (erste Prägung Altona) / 29. Febr. 1788 (Forordning)"
      to_label: "5. Jan. 1813"
      title:
        de: "Schleswig-Holsteinische Reform — Thaler Species als Alleingrundmünze"
        en: "The Schleswig-Holstein reform — Thaler Species as the sole base coin"
        uk: "Шлезв.-гольшт. реформа — Thaler Species як єдина базова монета"
      description:
        de: "Ernst Schimmelmann: 1 Thaler Species = 60 Schilling Courant · Ende des Aufgelds · Schleswig-Holsteinische Speciesbank Altona gegründet · alle Courant-Nominale werden Teilstücke des Thaler Species im 9¼-Fuß. <em>Erste Prägungen unter dem neuen Standard erfolgen bereits 1787 in Altona (Doppelinschrift «1 SPECIES THALER = 60 SCHILLING COURANT»); die formelle Eröffnungsverordnung ist 29. Februar 1788.</em>"
        en: "Ernst Schimmelmann: 1 Thaler Species = 60 Schilling Courant · the premium is abolished · the Schleswig-Holstein Speciesbank in Altona is founded · all Courant denominations become exact fractions of the Thaler Species in the 9¼-Fuß. <em>The first strikes under the new standard appear already in 1787 at Altona (with the dual-denomination inscription «1 SPECIES THALER = 60 SCHILLING COURANT»); the formal founding Forordning is 29 February 1788.</em>"
        uk: "Ернст Шіммельман: 1 Thaler Species = 60 Schilling Courant · надбавку (Aufgeld) скасовано · засновано шлезв.-гольшт. Speciesbank в Альтоні · усі номінали Courant стають точними частками Thaler Species у 9¼-Fuß. <em>Перші карбування за новим стандартом з'являються вже 1787 р. в Альтоні (двономінальний напис «1 SPECIES THALER = 60 SCHILLING COURANT»); формальна установча Forordning датується 29 лютого 1788.</em>"
      context:
        de: |
          <b>Grundwerte der Schilling-Sch.-H.-Courant-Theilung</b> (gleichzeitig mit dem Thaler Species eingeführt, Eröffnungsverordnung 29. Febr. 1788):<br>
          · <b>1 Schilling Courant</b> = 0,42136 g fein (= 25,28173 / 60) · 12 Pfennig · Scheidemünze<br>
          · <b>1 Mark Sch.-H. Courant</b> = 6,74179 g fein = 16 Schilling Courant = ⅓ Reichsthaler Sch.-H. Courant = 4/15 Thaler Species · Rechnungseinheit, am 9¼-Fuß-Speciedaler verankert; nicht identisch mit der Hamburger Mark Courant (1/3 Rigsdaler Courant = 6,88 g fein, am 11⅓-Fuß verankert)<sup><a href="#ref34">[34]</a></sup><br>
          · <b>1 Thaler Sch.-H. Courant</b> = 20,22538 g fein = 48 Schilling Courant = 3 Mark Sch.-H. Courant = 4/5 Thaler Species · <em>reine Rechnungseinheit, am Speciedaler verankert</em>; das 5:4-Verhältnis war in den Herzogtümern bereits mit der Schimmelmann-Reform 1788 definitorisch festgeschrieben. Plakat 3. Dezember 1794 regelte denselben Tarif erst danach für das Kurantmøntfod-System in Dänemark / Norwegen, wo der physische 11⅓-Fuß-Rigsdaler Courant (20,634 g fein) Hauptzahlungsmittel blieb<sup><a href="#ref34">[34]</a></sup><br><br>
          <b>Rechnungsfraktionen:</b> 1 Thaler Species = 60 Schilling Courant = 720 Pfennig · 1 Thaler Sch.-H. Courant = 48 Schilling Courant = 4/5 Thaler Species · 1 Mark Sch.-H. Courant = 16 Schilling Courant = 4/15 Thaler Species · 1 Schilling Courant = 12 Pfennig · ½ Sch. = Sechsling · ¼ Sch. = Dreiling.<br><br>
          <em>Keine 1-Schilling-Münze geprägt — stattdessen 2-Sechsling (lübisch-hanseatisches Erbe). Zur «SP»-Abkürzung: Sämtliche vollwertigen Nominale (ab 5 Schilling) tragen auf dem Reverse «SP» für Species. «SPECIES DANIÆ» erscheint nicht — «Daniæ» ist ausschließlich Bestandteil des königlichen Titels auf dem Obverse.</em>
        en: |-
          <b>Base values of the Schilling-Sch.-H.-Courant subdivision</b> (introduced together with the Thaler Species by the founding decree of 29 Feb. 1788):<br> · <b>1 Schilling Courant</b> = 0.42136 g fine (= 25.28173 / 60) · 12 Pfennig · petty coin<br> · <b>1 Mark Sch.-H. Courant</b> = 6.74179 g fine = 16 Schilling Courant = ⅓ Reichsthaler Sch.-H. Courant = 4/15 Thaler Species · accounting unit, anchored to the 9¼-Fuß Speciedaler; not identical with the Hamburg Mark Courant (1/3 Rigsdaler Courant = 6.88 g fine, anchored to the 11⅓-Fuß)<sup><a href="#ref34">[34]</a></sup><br> · <b>1 Thaler Sch.-H. Courant</b> = 20.22538 g fine = 48 Schilling Courant = 3 Mark Sch.-H. Courant = 4/5 Thaler Species · <em>pure accounting unit, anchored to the Speciedaler</em>; the 5:4 ratio was already built into the Schimmelmann reform of 1788 in the duchies by definition. The later Plakat of 3 December 1794 regulated the same tariff for the Kurantmøntfod system in Denmark / Norway proper, where the physical 11⅓-Fuß Rigsdaler Courant (20.634 g fine) remained the main currency<sup><a href="#ref34">[34]</a></sup><br><br> <b>Accounting fractions:</b> 1 Thaler Species = 60 Schilling Courant = 720 Pfennig · 1 Thaler Sch.-H. Courant = 48 Schilling Courant = 4/5 Thaler Species · 1 Mark Sch.-H. Courant = 16 Schilling Courant = 4/15 Thaler Species · 1 Schilling Courant = 12 Pfennig · ½ Sch. = Sechsling · ¼ Sch. = Dreiling.<br><br> <em>No 1-Schilling coin was struck — a 2-Sechsling stood in instead (a Lübeck-Hanseatic inheritance). On the «SP» abbreviation: every full-value denomination (from 5 Schilling upwards) carries «SP» for Species on the reverse. «SPECIES DANIÆ» does not appear — «Daniæ» belongs solely to the royal title on the obverse.</em>
        uk: |-
          <b>Базові значення поділу Schilling-Sch.-H.-Courant</b> (запроваджені одночасно зі Thaler Species установчим декретом 29 лют. 1788):<br> · <b>1 Schilling Courant</b> = 0,42136 г чистого (= 25,28173 / 60) · 12 Pfennig · розмінна монета<br> · <b>1 Mark Sch.-H. Courant</b> = 6,74179 г чистого = 16 Schilling Courant = ⅓ Reichsthaler Sch.-H. Courant = 4/15 Thaler Species · розрахункова одиниця, anchored до 9¼-Fuß Speciedaler; не тотожна з Hamburg Mark Courant (1/3 Rigsdaler Courant = 6,88 г чистого, anchored до 11⅓-Fuß)<sup><a href="#ref34">[34]</a></sup><br> · <b>1 Thaler Sch.-H. Courant</b> = 20,22538 г чистого = 48 Schilling Courant = 3 Mark Sch.-H. Courant = 4/5 Thaler Species · <em>розрахункова одиниця, anchored до Speciedaler</em>; курс 5:4 у герцогствах був вже закладений у реформу Шіммельмана 1788 за визначенням. Пізніший Plakat 3 грудня 1794 урегулював той самий тариф для Kurantmøntfod-системи в Данії / Норвегії, де фізичний 11⅓-Fuß Rigsdaler Courant (20,634 г чистого) лишався основним платіжним засобом<sup><a href="#ref34">[34]</a></sup><br><br> <b>Розрахункові фракції:</b> 1 Thaler Species = 60 Schilling Courant = 720 Pfennig · 1 Thaler Sch.-H. Courant = 48 Schilling Courant = 4/5 Thaler Species · 1 Mark Sch.-H. Courant = 16 Schilling Courant = 4/15 Thaler Species · 1 Schilling Courant = 12 Pfennig · ½ Sch. = Sechsling · ¼ Sch. = Dreiling.<br><br> <em>Монети номіналом 1 Schilling не карбували — замість неї йшов 2-Sechsling (любецько-ганзейська спадщина). Про абревіатуру «SP»: усі повноцінні номінали (від 5 Schilling) несуть на реверсі «SP» — Species. «SPECIES DANIÆ» не зʼявляється — «Daniæ» належить виключно до королівського титулу на аверсі.</em>
      mt_caption:
        de: "Ausgeprägte Nominale · Altona 1787–1813 · Christian VII. (Frederik VI. ab 1808)"
        en: "Denominations actually struck · Altona, 1787–1813 · Christian VII (Frederik VI from 1808)"
        uk: "Номінали, що фактично карбувалися · Альтона, 1787–1813 · Кристіан VII (Фредерік VI з 1808)"

