        Glückstädter <b>1682-only</b>-Sondertyp Christians V. (Münzmeister CW = Christoph Friedrich Woltereck) · Obverse «CHRISTIAN·V·D: G:REX·D:N:V:GOT·» (kürzere Titulatur als KM# 70.1), Reverse «* PIETATE & IUSTITIA / 1682 / CW / ⚒». <b>Reduzierter Feingehalt .979</b> (= ⁹⁴⁰⁄₉₆₀ ≈ 23 K 5 Gr) gegenüber dem Reichsdukatenfuß-Standard .986 (23 K 8 Gr) — dokumentiert in Hede 118 / c5h118 (Vægterdukat) — kein Belegexemplar in den Bruun-Part-II/III-Auktionen 2025 (das 1682-Vægterdukat ist in beiden Stack's-Bowers-PDF nicht enthalten); ein Numista-Specimen-Bild (Künker) belegt den Typ. Nach Bruun (Part II, Lot 13180): «<i>The Ducats struck in Glückstadt differ from the ones struck in Copenhagen in being minted for regular trade use rather than just as occasion coins</i>». Schwesterstück: KM# 70.1 (1680–1685, volle Standardprobe .986, andere Reverse-Komposition). Numista trennt diesen 1682-only-Typ vom KM# 70.1 (1680–1685, .986, N#275959) als eigene Krause-Typen, nicht bloß Jahrgangsvarianten.
      en: |-
        Glückstadt <b>1682-only</b> special type under Christian V (mintmaster CW = Christoph Friedrich Woltereck) · obverse «CHRISTIAN·V·D: G:REX·D:N:V:GOT·» (shorter titulature than KM# 70.1), reverse «* PIETATE & IUSTITIA / 1682 / CW / ⚒». <b>Reduced fineness .979</b> (= ⁹⁴⁰⁄₉₆₀ ≈ 23 K 5 Gr) vs the Reichsdukatenfuß standard .986 (23 K 8 Gr) — documented in Hede 118 / c5h118 (Vægterdukat) — no specimen in either Bruun Part II / Part III auction 2025 (the 1682 Vægterdukat is absent from both Stack's Bowers PDFs); a Numista specimen image (Künker) attests the type. Per Bruun (Part II, lot 13180): «<i>The Ducats struck in Glückstadt differ from the ones struck in Copenhagen in being minted for regular trade use rather than just as occasion coins</i>». Sister type: KM# 70.1 (1680–1685, full standard fineness .986, different reverse composition). Numista treats this 1682-only type and KM# 70.1 (1680–1685, .986, N#275959) as separate Krause types, not mere year variants.
      uk: |-
        Ґлюкштадтський <b>тільки 1682</b>-окремий тип Кристіана V (монетмайстер CW = Christoph Friedrich Woltereck) · аверс «CHRISTIAN·V·D: G:REX·D:N:V:GOT·» (коротша титулатура ніж у KM# 70.1), реверс «* PIETATE & IUSTITIA / 1682 / CW / ⚒». <b>Знижена проба .979</b> (= ⁹⁴⁰⁄⁹⁶⁰ ≈ 23 K 5 Gr) проти Reichsdukatenfuß-стандарту .986 (23 K 8 Gr) — задокументовано в Hede 118 / c5h118 (Vægterdukat) — еталонний зразок відсутній в обох Bruun-аукціонах 2025 (Part II і Part III); тип засвідчено лише Numista-фото (Künker). За Bruun (частина II, лот 13180), глюкштадтські дукати карбували <i>для регулярного торгового обігу, а не лише як приурочені випуски</i>. Сестринський тип: KM# 70.1 (1680–1685, повна стандартна проба .986, інша композиція реверса). Numista трактує цей 1682-only-тип і KM# 70.1 (1680–1685, .986, N#275959) як окремі Krause-типи, а не варіанти за роком.
