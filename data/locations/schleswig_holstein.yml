      en: Inferred from the reverse inscription «II MARCK LVB» (= 2 Marck Lübisch) and the customary fineness of the Wendisch-Lübisch coinage tradition — not documented in a primary mint edict.
      uk: Виведено з реверс-інскрипції «II MARCK LVB» (= 2 Marck Lübisch) і типової проби вендсько-любецької монетної традиції — не задокументовано первинним монетним едиктом.
