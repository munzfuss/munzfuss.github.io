# Schleswig-Holstein location data.
# Referenced fuesse are defined in data/shared/fuesse.yml.
# Each coin has `fuss` and `phase` keys — the build script looks up
# soll values from fuesse.yml.

id: schleswig_holstein
name:
  de: Schleswig-Holstein
  en: Schleswig-Holstein
  uk: Шлезвіг-Гольштейн

summary:
  de: Herzogthümer Schleswig und Holstein, 1559–1914 — königlich-holsteinischer Anteil (Glückstadt) und Herzogthum Schleswig-Holstein-Gottorp (Schleswig, Tönning), erweitert um die Sonderburger, Norburger, Glücksburger, Schauenburg-Pinneberger und Rantzauer Sonder-Linien. Vom Augspurger Reichsmüntz-Abschied biß zur preußischen Annexion 1866 und Reichsmark-Einführung 1871.
  en: Duchies of Schleswig and Holstein, 1559–1914 — the royal-Holstein share (Glückstadt) and the Duchy of Schleswig-Holstein-Gottorp (Schleswig, Tönning), extended by the Sonderburg, Norburg, Glücksburg, Schauenburg-Pinneberg and Rantzau collateral branches. From the Augsburg Imperial Mint Ordinance to the Prussian annexation of 1866 and the Reichsmark of 1871.
  uk: Герцогства Шлезвіг і Гольштейн, 1559–1914 — королівсько-гольштинська частка (Glückstadt) і герцогство Шлезвіг-Гольштейн-Ґотторп (Шлезвіг, Tönning), доповнені Зондербурзькою, Норборзькою, Ґлюксбурзькою, Шауенбург-Піннебергською та Рантцауською побічними лініями. Від Авґсбурзького імперського монетного ордонансу до прусської анексії 1866 та запровадження Reichsmark 1871.
fuss_order:
  # Matches the timeline-bar order in `timeline.bars` below: Reichsdukatenfuß
  # opens the chronology as the imperial gold standard since 1559 and
  # Reichsgoldmünzfuß closes it as the 1871-Goldmark. List order is
  # additionally re-sorted in categorize() to follow the (sorted) timeline-
  # bar order — so the bar's optional `order` field also drives the
  # post-timeline list position.
  - reichsdukatenfuss
  - courantdukatenfuss
  - pistolenfuss
  - 9_thaler
  - 9_25_thaler
  - kronemont_chr_iv
  - kronemont
  - kronemont_fine
  - guldkrone
  - 11_333_thaler
  - 18_5_thaler
  - 30_thaler
  - vereinsgoldmuenze
  - reichsgoldmuenzfuss

