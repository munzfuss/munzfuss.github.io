      bar_title:
        de: "Courantdukatenfuß (Kurantdukatfod) · dritte Goldlinie der dänischen Monarchie · 12-Mark-Tarif, .875 Probe, 2,728 g fein · in Holstein-Altona durch Münze ab 23. August 1771 (Christian VII.) — explizit zur Versorgung der Herzogtümer mit dänischer Goldmünze, weg vom Hamburg- / Lübeck-Geld · Hauptemissionen 1783–1785 unter Christian VII. · letzte Altonaer Restprägung 1796 mit rückdatierten 1785-Stempeln"
        en: "Courantdukatenfuß (Kurantdukatfod) · third gold line of the Danish monarchy · 12-Mark tariff, .875 fineness, 2.728 g fine · in Holstein-Altona through the mint from 23 August 1771 (Christian VII) — explicitly to supply the duchies with Danish gold coin, away from Hamburg / Lübeck currency · main issues 1783–1785 under Christian VII · final Altona restrike 1796 with back-dated 1785 dies"
        uk: "Courantdukatenfuß (Kurantdukatfod) · третя золота лінія данської монархії · тариф 12 Mark, проба .875, 2,728 г чистого · у Гольштейні-Альтоні через монетний двір з 23 серпня 1771 (Christian VII) — явно для забезпечення герцогств данською золотою монетою, замість гамбурзько-любецьких грошей · головні емісії 1783–1785 за Christian VII · останнє альтонське рестрайк-карбування 1796 зі зворотньо-датованими штемпелями 1785"
      color_class: g

