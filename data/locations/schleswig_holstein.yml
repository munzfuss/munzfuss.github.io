        ref: "Numista"
      - type: auction
        url: "https://auctions.stacksbowers.com/lots/view/3-1LYTJ8/denmark-gold-krone-1660-glckstadt-mint-privy-mark-crossed-pokers-frederik-iii-ngc-ms-61"
