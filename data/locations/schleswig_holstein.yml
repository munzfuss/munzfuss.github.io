        de: "Reskript 31. Dezember 1692 (Christian V.): 13 Specieskronen aus 1 feinen Cöllnischen Marck (≈ 14,98 g fein je Krone) · ausschließlich an der Kopenhagener Hauptmünze geprägt 1693–1771; in den Herzogtümern Schleswig-Holstein als Helstaten-Münze gesetzliches Zahlmittel — Standard biß 1771, im Umlauf biß zur Schimmelmann-Reform 1788, jedoch ohne lokale Lokalprägung · läuft parallel zum holsteinischen 10½-Krone-Fuß (Glückstadt 1644–1696)"
        en: "Reskript of 31 December 1692 (Christian V): 13 specie kroner from 1 fine Cöllnische Marck (≈ 14.98 g fine per Krone) · struck exclusively at the Copenhagen royal mint 1693–1771; in the duchies of Schleswig-Holstein it remained legal tender as a Helstaten coin — standard until 1771, in circulation until the Schimmelmann reform of 1788, with no local issue · runs in parallel with the Holstein 10½-Krone-Fuß (Glückstadt 1644–1696)"
        uk: "Рескрипт 31 грудня 1692 (Кристіан V): 13 Specieskronen з 1 марки чистого срібла кельнської ваги (≈ 14,98 г чистого срібла на одну Krone) · карбувався виключно на Копенгагенському королівському монетному дворі 1693–1771; у герцогствах Schleswig-Holstein як Helstaten-монета лишався законним платіжним засобом — стандарт до 1771, в обігу до Schimmelmann-реформи 1788, однак без власних місцевих карбувань · хронологічно паралельний гольштинському 10½-Krone-Fuß (Glückstadt 1644–1696)"
