    metal: silver
    weight_rough_g:
      - value: 21.47
        source: Numista
      - value: 21.76
        source: Bruun Part II, lot 14221, p. 299
    note:
      de: 'Reverse-Inschrift: «II MARCK LVB 1681» — derselbe Wendisch-Lübisch-Typ wie KM# 134 mit kleiner Stempelvariante (CMB-Münzmeisterzeichen statt CI MB). Inschriftliche Bezeichnung «MARCK LVB» schließt Marck Danske / Sch.-H. Courant aus; die Münze gehört zur Wendisch-Lübischen Reichsthaler-Reihe (2 Marck Lübisch ≈ ⅔ Reichsthaler Specie) und wurde typischerweise auf rund .750 Feingehalt geprägt — hier mit (?) angesetzt, da kein primäres Müntzedikt vorliegt. Eine eigene Wendisch-Lübisch-Stope wäre die korrekte Klassifikation; sie ist in unserem Fuß-Register noch nicht definiert. Christian Albrecht v. Gottorp · Dav SG# 577.'
      en: 'Reverse inscription: «II MARCK LVB 1681» — same Wendisch-Lübisch type as KM# 134 with a minor die variant (CMB mintmark instead of CI MB). The inscriptional label «MARCK LVB» rules out Marck Danske / Sch.-H. Courant; the coin belongs to the Wendisch-Lübisch Reichsthaler series (2 Marck Lübisch ≈ ⅔ Reichsthaler Specie) and was typically struck at about .750 fineness — used here with (?), as no primary mint edict is at hand. A dedicated Wendisch-Lübisch Fuß would be the correct classification; it is not yet defined in our Fuß register. Christian Albrecht of Gottorp · Dav SG# 577.'
      uk: 'Реверс-інскрипція: «II MARCK LVB 1681» — той самий вендсько-любецький тип, що й KM# 134, з невеликою штампуальною варіацією (CMB-знак монетмайстра замість CI MB). Інскрипційна позначка «MARCK LVB» виключає Marck Danske / Sch.-H. Courant; монета належить до вендсько-любецької Reichsthaler-серії (2 Marck Lübisch ≈ ⅔ Reichsthaler Specie) і зазвичай карбувалась на ~.750 проби — тут з (?), бо первинного монетного едикту нема. Правильна класифікація — окрема вендсько-любецька стопа, яка поки не визначена в нашому реєстрі. Крістіан Альбрехт Ґотторпський · Dav SG# 577.'
    sources:
      - type: numista
        url: https://en.numista.com/catalogue/pieces313889.html
        ref: Numista
      - type: auction
        url: https://www.danskmoent.dk/pdf/SBG_Mar2025_LEBruunPtII_WebCatalog_LR.pdf
        ref: Bruun Part II, lot 14221, p. 299
