        Palmkranz-Variante · 77.1 Jahr in der Umschrift, 77.2 Jahr beim Elefantenorden · .671 · 22,272 g (Numista). <em>Hede-Typologie:</em> Hede 125A (Palmkranz, Datum in Umschrift, 1692–1694, Sieg 138.1) und Hede 125B (Palmkranz, Datum unter Schild, nur 1693, Sieg 138.2) — beides Untertypen innerhalb von Hede 125 (Glückstadt, dobbelt slynget Monogram)<sup><a href="#ref23">[23]</a></sup>; Geschwistersubtyp ist 125C (Lorbeerkranz, 1694–1696) = unsere km-80. 1694 ist das Überlappungsjahr beider Designs (Palm- und Lorbeer-Variante). Glückstadter Kronen-Fuß fortgeführt unter Christian V. Numista führt zwei weitere parallele Einträge zu derselben Davenport-Typologie (Dav EC II# 3679/3679A) unter «Schleswig-Holstein duchies»: N#313358 (KM# 108, Hede 125A) und N#313359 (KM# 110, Hede 125B) — gleiche Münze, drei Krause-Editionen.

      en: |-
        Palm-wreath variant · KM# 77.1 carries the year in the legend, 77.2 next to the Order of the Elephant · .671 · 22.272 g (Numista). <em>Hede typology:</em> Hede 125A (palm wreath, date in legend, 1692–1694, Sieg 138.1) and Hede 125B (palm wreath, date below shield, 1693 only, Sieg 138.2) — both sub-types within Hede 125 (Glückstadt, double interlaced monogram)<sup><a href="#ref23">[23]</a></sup>; sister sub-type is 125C (laurel wreath, 1694–1696) = our km-80. 1694 is the overlap year for both designs (palm and laurel). The Glückstadt Kronen-Fuß continues under Christian V. Numista carries two further parallel entries for this same Davenport type (Dav EC II# 3679/3679A) under «Schleswig-Holstein duchies»: N#313358 (KM# 108, Hede 125A) and N#313359 (KM# 110, Hede 125B) — same coin, three Krause editions.
      uk: |-
        Варіант із пальмовим вінком · KM# 77.1 містить рік у легенді, 77.2 — поруч з Орденом Слона · .671 · 22,272 г (Numista). <em>Hede-типологія:</em> Hede 125A (пальмовий вінок, рік у легенді, 1692–1694, Sieg 138.1) і Hede 125B (пальмовий вінок, рік під щитом, лише 1693, Sieg 138.2) — обидва суб-типи у складі Hede 125 (Glückstadt, подвійний переплетений монограм)<sup><a href="#ref23">[23]</a></sup>; споріднений суб-тип — 125C (лавровий вінок, 1694–1696) = наша km-80. 1694 — рік перетину обох дизайнів (пальма й лавр). Ґлюкштатський Kronen-Fuß продовжується за Кристіана V. Numista має два додаткові паралельні записи для цієї Davenport-типології (Dav EC II# 3679/3679A) під «Schleswig-Holstein duchies»: N#313358 (KM# 108, Hede 125A) і N#313359 (KM# 110, Hede 125B) — одна монета, три видання Krause.
