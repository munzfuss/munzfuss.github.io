      uk: Монетний двір Тьоннінг · монетмайстер Hans Heinrich Lüders · лот Bruun 14231 (Stack's Bowers Zürich 2025) наводить повну вагу 25,02 г — помітно нижче канонічних 28,89 г 9¼-Fuß (за .875 = 25,28 г чистого). За відсутності первинного монетного едикту неможливо визначити, чи це канонічна стопа Speciedaler з заниженим зразком, окрема знижена готторпська стопа, чи помилка даних Numista — пробу тому лишено невизначеною.
