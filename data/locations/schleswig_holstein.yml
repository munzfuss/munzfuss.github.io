        en: "Courantdukatenfuß · Ducat Courant"
        uk: "Courantdukatenfuß · Ducat Courant"
      small:
        de: "2,73 g fein · Gold"
        en: "2.73 g fine · gold"
        uk: "2,73 г чистого · золото"
      year_from: 1771
