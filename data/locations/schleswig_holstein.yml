        de: "Österreichisch-preußisches Kondominium"
        en: "Austro-Prussian condominium"
        uk: "Австрійсько-прусський кондомініум"
      description:
        de: "Friede von Wien: Holstein an Österreich, Schleswig an Preußen; Gasteiner Convention 14. Aug. 1865 — Österreich verwaltet Holstein. Kondominium beendet mit Prager Frieden 23. Aug. 1866. <b>Keine Währungsänderung</b> während der gesamten Periode."
        en: "Peace of Vienna: Holstein to Austria, Schleswig to Prussia; the Gastein Convention of 14 Aug. 1865 puts Austria in charge of Holstein's administration. The condominium ends with the Peace of Prague, 23 Aug. 1866. <b>No change of currency</b> throughout the period."
        uk: "Віденський мир: Гольштейн — до Австрії, Шлезвіг — до Пруссії; Ґаштайнська конвенція 14 серпня 1865 передає управління Гольштейном Австрії. Кондомініум завершується Празьким миром 23 серпня 1866. <b>Жодних валютних змін</b> упродовж усього періоду."
      context:
        de: |
          <b>Grundlage:</b> Rigsdaler Rigsmønt (18½-Fuß, 12,64086 g fein) und Thaler Species (9¼-Fuß, 25,28173 g fein) bleiben gesetzliches Zahlmittel in Holstein.<br>
          <b>Neuprägungen:</b> keine für Holstein; Altonaer Münze bereits 1863 geschlossen. Kopenhagen prägt Rigsdaler und Thaler Species weiterhin für das verbleibende dänische Gebiet (Christian IX.).<br>
          <b>Ablösung Lauenburg:</b> Gasteiner Convention 14. Aug. 1865, Art. 9: Preußen erwirbt Lauenburg von Österreich für <b>2,5 Millionen dänische Thaler</b><sup><a href="#ref11">[11]</a></sup> — auch in diesem zwischenstaatlichen Akt wird in dänischer Währung gerechnet.
        en: |-
          <b>Basis:</b> the Rigsdaler Rigsmønt (18½-Fuß, 12.64086 g fine) and the Thaler Species (9¼-Fuß, 25.28173 g fine) remain legal tender in Holstein.<br> <b>New issues:</b> none for Holstein; the Altona mint had already closed in 1863. Copenhagen continues to strike Rigsdaler and Thaler Species for the rest of the Danish territory (Christian IX).<br> <b>Sale of Lauenburg:</b> Gastein Convention of 14 Aug. 1865, Art. 9: Prussia acquires Lauenburg from Austria for <b>2.5 million Danish Thaler</b><sup><a href="#ref11">[11]</a></sup> — even this inter-state act is reckoned in Danish currency.
        uk: |-
          <b>База:</b> Rigsdaler Rigsmønt (18½-Fuß, 12,64086 г чистого) і Thaler Species (9¼-Fuß, 25,28173 г чистого) лишаються законним платіжним засобом у Гольштейні.<br> <b>Нові випуски:</b> для Гольштейну немає; монетний двір в Альтоні був закритий ще 1863. Копенгаген далі карбує Rigsdaler і Thaler Species для решти данської території (Кристіан IX).<br> <b>Продаж Лауенбургу:</b> Ґаштайнська конвенція 14 серпня 1865 р., ст. 9: Пруссія купує Лауенбург в Австрії за <b>2,5 мільйона данських Thaler</b><sup><a href="#ref11">[11]</a></sup> — навіть у цьому міждержавному акті рахунок ведеться в данській валюті.

  30_thaler:
    - id: A
      year_from: 1857
      year_to: 1866
      from_label: "24. Jan. 1857"
      to_label: "24. Aug. 1866"
      title:
        de: "Im Reich gültig, in Holstein noch nicht"
        en: "In force across the Reich, not yet in Holstein"
        uk: "Діє в Рейху, в Гольштейні ще ні"
      description:
        de: "Wiener Münzvertrag: Preußen, deutsche Mittelstaaten, Österreich, Liechtenstein — Holstein als Teil des dänischen Gesamtstaats nicht beteiligt. Vereinsthaler zirkuliert aber über die Zollvereinsgrenze hinweg in Hamburg und Holstein im Handel."
        en: "Vienna Monetary Treaty: Prussia, the German middle states, Austria, Liechtenstein — Holstein, as part of the Danish composite state, is not a party. The Vereinsthaler nonetheless circulates across the Zollverein border for commerce in Hamburg and Holstein."
        uk: "Віденська монетна конвенція: Пруссія, середні німецькі держави, Австрія, Ліхтенштейн — Гольштейн як частина данської цілісної держави в ній не бере участі. Vereinsthaler усе ж обертається через кордон Zollverein в торгівлі у Гамбурзі й Гольштейні."

    - id: B
      year_from: 1866
      year_to: 1871
      from_label: "24. Aug. 1866"
      to_label: "4. Dez. 1871"
      title:
        de: "Gesetzliches Zahlmittel in Holstein (preuß. Annexion)"
        en: "Legal tender in Holstein (Prussian annexation)"
        uk: "Законний платіжний засіб у Гольштейні (прусська анексія)"
      description:
        de: "Nach Prager Frieden annektiert Preußen Schleswig und Holstein; Provinz Schleswig-Holstein gebildet 12. Jan. 1867. Vereinsthalerfuß wird alleinige Landeswährung."
        en: "After the Peace of Prague, Prussia annexes Schleswig and Holstein; the province of Schleswig-Holstein is constituted on 12 Jan. 1867. The Vereinsthalerfuß becomes the sole territorial currency."
        uk: "Після Празького миру Пруссія анексує Шлезвіг і Гольштейн; провінцію Шлезвіг-Гольштейн утворено 12 січня 1867. Vereinsthalerfuß стає єдиною територіальною валютою."
      context:
        de: |
          <em>Weitere preußische Scheidemünzen (½/⅙ Thaler, Silbergroschen, Pfennig) folgen dem 30-Fuß-Standard — vollständige Listen im Numista-Katalog Preußen.</em><br>
          <em>Die alten Rigsdaler, Skilling Rigsmønt, Thaler Species und Schilling Courant werden sukzessive eingezogen; im Verkehr bleiben sie aber zum festen Tarif angenommen.</em>
        en: |-
          <em>The other Prussian petty denominations (½/⅙ Thaler, Silbergroschen, Pfennig) follow the 30-Fuß standard — full lists in the Numista catalogue for Prussia.</em><br> <em>The old Rigsdaler, Skilling Rigsmønt, Thaler Species and Schilling Courant are gradually withdrawn; in circulation, however, they are still accepted at a fixed tariff.</em>
        uk: |-
          <em>Інші прусські розмінні номінали (½/⅙ Thaler, Silbergroschen, Pfennig) дотримуються стандарту 30-Fuß — повні переліки в каталозі Numista для Пруссії.</em><br> <em>Старі Rigsdaler, Skilling Rigsmønt, Thaler Species і Schilling Courant поступово вилучаються; в обігу їх, однак, ще приймають за фіксованим тарифом.</em>

    - id: C
      year_from: 1871
      year_to: 1876
      from_label: "4. Dez. 1871"
      to_label: "1. Jan. 1876"
      title:
        de: "Übergangsphase zur Goldmark"
        en: "Transitional phase to the Goldmark"
        uk: "Перехідна фаза до Goldmark"
      description:
        de: "Münzgesetz 4. Dez. 1871 führt die Mark ein; Münzgesetz 9. Juli 1873 beendet die Neuprägung von Vereinsthalern. Altbestände bleiben als Umlaufmünze.<sup><a href=\"#ref7\">[7]</a></sup>"
        en: "The Coinage Act of 4 Dec. 1871 introduces the Mark; the Coinage Act of 9 July 1873 ends new strikes of Vereinsthaler. Existing stocks stay in circulation.<sup><a href=\"#ref7\">[7]</a></sup>"
        uk: "Закон про монету 4 грудня 1871 запроваджує Mark; Закон про монету 9 липня 1873 припиняє нові карбування Vereinsthaler. Старі запаси лишаються в обігу.<sup><a href=\"#ref7\">[7]</a></sup>"
      context:
        de: |
          <b>Umtauschkurs:</b> 1 Vereinsthaler = 3 Mark (biß 1. Oktober 1907 gesetzliches Zahlmittel; alle übrigen vor 1873 in Holstein zirkulierenden Müntzfüße — 9¼-Fuß Speciedaler, 18½-Fuß Rigsdaler Rigsmønt, Reichsdukatenfuß-Dukaten — verlieren mit der Mark-Einführung 1. Januar 1876 ihren Zahlmittelcharakter).<br>
          <em>Der Vereinsthaler ist dabei kein spezifisch holsteinischer Standard, sondern allgemeindeutsches Zollvereins-Geld nach dem Wiener Münzvertrag 24. Januar 1857 — in Holstein erst seit der preußischen Annexion 1867 alleinige Landeswährung. Dadurch bleibt er das einzige der hier dokumentierten, in Holstein bis 1873 zirkulierenden Müntzfüße, das biß ins 20. Jahrhundert uneingeschränkt gesetzliches Zahlmittel ist.</em>
        en: |-
          <b>Exchange rate:</b> 1 Vereinsthaler = 3 Mark (legal tender until 1 October 1907; all other Müntzfüße circulating in Holstein before 1873 — the 9¼-Fuß Speciedaler, the 18½-Fuß Rigsdaler Rigsmønt, the Reichsdukatenfuß ducat — lose legal tender status with the introduction of the Mark on 1 January 1876).<br> <em>The Vereinsthaler itself is not a specifically Holstein standard but a Zollverein-wide German coinage established by the Wiener Münzvertrag of 24 January 1857 — only in Holstein from the Prussian annexation of 1867 onwards as the sole local currency. As a result it is the only one of the Müntzfüße documented here as circulating in Holstein up to 1873 that retains unrestricted legal tender status into the 20th century.</em>
        uk: |-
          <b>Курс обміну:</b> 1 Vereinsthaler = 3 Mark (законний платіжний засіб до 1 жовтня 1907 р.; усі інші Müntzfüße, що до 1873 р. оберталися в Гольштейні, — 9¼-Fuß Speciedaler, 18½-Fuß Rigsdaler Rigsmønt, Reichsdukatenfuß-дукати — втрачають цей статус із запровадженням Mark 1 січня 1876 р.).<br> <em>Сам Vereinsthaler — не специфічно гольштинський стандарт, а загальнонімецьке Zollverein-карбування за Wiener Münzvertrag 24 січня 1857 р., у Гольштейні єдина державна валюта лише з прусської анексії 1867 р. Завдяки цьому він — єдиний серед задокументованих тут Müntzfüße, що оберталися в Гольштейні до 1873 р., який зберігав необмежений статус законного платіжного засобу до XX століття.</em>

  reichsdukatenfuss:
    - id: A
      year_from: 1600
      year_to: 1726
      from_label: "17. Jh."
      to_label: "1726"
      title:
        de: "Glückstadt und Gottorp · Tönning"
        en: "Glückstadt and Gottorp · Tönning"
        uk: "Glückstadt і Готторп · Tönning"
      mt_caption:
        de: "Dukat-Prägung nach Reichsdukatenfuß (.986) · Glückstadt (Chr. IV. / Chr. V.) und Tönning (Chr. Albrecht / Fr. IV. / Karl Fr.) · sortiert nach Jahr"
        en: "Ducat issues to the Reichsdukatenfuß (.986) · Glückstadt (Christian IV / Christian V) and Tönning (Christian Albrecht / Frederik IV / Karl Friedrich) · sorted by year"
        uk: "Карбування дукатів за Reichsdukatenfuß (.986) · Glückstadt (Кристіан IV / Кристіан V) і Tönning (Кристіан Альбрехт / Фредерік IV / Карл Фрідріх) · впорядковано за роком"

    - id: B
      year_from: 1726
      year_to: 1771
      from_label: "1726"
      to_label: "1771"
      title:
        de: "Courantdukat-Fuß durch Courantverbund"
        en: "Courantdukat standard via the Courant union"
        uk: "Стопа Courantdukat через Courant-союз"
      context:
        de: "Mit dem Kurantmøntfod von 1726 entwickelt sich parallel zum Reichsdukatenfuß der <b>Courantdukat</b> — Dukat mit leichter Feingewichtsreduktion zur festen Kurs-Anbindung (2 Rigsdaler Courant = 1 Courantdukat, später 2½ Rigsdaler Courant). Altona-Münze wird erst 1771 eröffnet; Dukaten in dieser Phase werden in Kopenhagen bzw. Glückstadt für den gesamtstaatlichen Handel geprägt."
        en: "With the Kurantmøntfod of 1726 a <b>Courantdukat</b> grows up alongside the Reichsdukatenfuß — a ducat with slightly reduced fine weight, designed for a fixed exchange link (2 Rigsdaler Courant = 1 Courantdukat, later 2½ Rigsdaler Courant). The Altona mint is only opened in 1771; the ducats of this phase are struck in Copenhagen and Glückstadt for the trade of the composite state."
        uk: "З Kurantmøntfod 1726 паралельно до Reichsdukatenfuß виростає <b>Courantdukat</b> — дукат із трохи зниженою чистою вагою, призначений для фіксованої курсової привʼязки (2 Rigsdaler Courant = 1 Courantdukat, пізніше 2½ Rigsdaler Courant). Монетний двір в Альтоні відкриють лише 1771; дукати цієї фази карбують у Копенгагені й Glückstadt для торгівлі цілісної держави."

    - id: C
      year_from: 1771
      year_to: 1813
      from_label: "1771"
      to_label: "1813"
      title:
        de: "Altona-Münze · regelmäßige Prägung"
        en: "Altona mint · regular issue"
        uk: "Монетний двір Альтона · регулярне карбування"
    - id: D
      year_from: 1813
      year_to: 1871
      from_label: "1813"
      to_label: "1871"
      title:
        de: "Fortgeführt trotz Staatsbankrott"
        en: "Continued despite the state bankruptcy"
        uk: "Продовжено попри державне банкрутство"
      description:
        de: "Der Dukat im Reichsdukatenfuß bleibt <b>vom Staatsbankrott 1813 unberührt</b>: die Forordning 5. Januar 1813 betrifft die Silbercourantmünzen (Rigsdaler, Speciedaler) — Goldmünzen sind in §1–§16 nicht erfaßt. Dukat bleibt Handelsmünze biß zum Reichsgoldmünzfuß (Münzgesetz 4. Dez. 1871)."
        en: "The ducat in the Reichsdukatenfuß is <b>untouched by the state bankruptcy of 1813</b>: the Forordning of 5 January 1813 covers the silver Courant coinage (Rigsdaler, Speciedaler) — gold coins are not within §§1–16. The ducat remains a trade coin right up to the Reichsgoldmünzfuß (Coinage Act of 4 Dec. 1871)."
        uk: "Дукат у Reichsdukatenfuß <b>не зачеплений державним банкрутством 1813</b>: Forordning 5 січня 1813 р. охоплює срібні Courant-монети (Rigsdaler, Speciedaler) — золоті монети §§1–16 не стосуються. Дукат лишається торговою монетою аж до Reichsgoldmünzfuß (Закон про монету 4 грудня 1871 р.)."
      context:
        de: |
          <b>Spezifische Prägejahre der Frederik-VI.-, Christian-VIII.- und Frederik-VII.-Dukaten konnten für Holstein nicht einzeln mit einer Online-Quelle verifiziert werden.</b> Die dänische Münzproduktion erfolgte in dieser Phase überwiegend in Kopenhagen (Altonaer Münze 1863 geschlossen); Handelsdukaten zirkulierten aber im gesamten Gesamtstaat einschließlich Holstein.<br>
          <b>Kondominium 1864–1866:</b> keine Neuprägungen. <b>Ablösung:</b> Münzgesetz 4. Dez. 1871 beendet Dukatenprägung im Deutschen Reich endgültig.
        en: |-
          <b>Specific year-of-issue figures for the Frederik VI, Christian VIII and Frederik VII ducats could not be verified individually for Holstein from any online source.</b> Danish minting in this phase took place mainly in Copenhagen (the Altona mint had closed in 1863); trade ducats nevertheless circulated throughout the composite state, Holstein included.<br> <b>Condominium 1864–1866:</b> no new issues. <b>Replacement:</b> the Coinage Act of 4 Dec. 1871 ends ducat striking in the German Reich for good.
        uk: |-
          <b>Конкретні роки карбування дукатів Фредеріка VI, Кристіана VIII і Фредеріка VII для Гольштейну окремо за онлайн-джерелами підтвердити не вдалося.</b> Данське карбування в цій фазі переважно йшло в Копенгагені (монетний двір в Альтоні було закрито 1863); торгові дукати, втім, перебували в обігу по всій цілісній державі, разом із Гольштейном.<br> <b>Кондомініум 1864–1866:</b> нових випусків немає. <b>Заміна:</b> Закон про монету 4 грудня 1871 остаточно припиняє карбування дукатів у Німецькому Рейху.

  courantdukatenfuss:
    - id: A
      year_from: 1771
      year_to: 1796
      from_label: '1771'
      to_label: '1796'
      title:
        de: "Altonaer Münze · 12-Mark-Goldstück (Kurantdukat)"
        en: "Altona mint · 12-Mark gold piece (Kurantdukat)"
        uk: "Монетний двір Альтона · золоті 12 Mark (Kurantdukat)"
      description:
        de: "Kurantdukat-Goldprägung in Holstein-Altona unter Christian VII., auf Grundlage des Plakat vom 2. Dezember 1782 («<i>Gold aus der rauen Marck zu 75 Stück bei 21 Karat ausprägen</i>»).<sup><a href=\"#ref38\">[38]</a></sup> Standard 75 Stück / rauer Cölln. Marck, 21 Karat (.875), 3,118 g rau, 2,72832 g fein. Tarif 12 Mark Dansk = 2 Rigsdaler Courant.<sup><a href=\"#ref36\">[36]</a></sup> Plakat-Widerruf 1795; letzte Altonaer Restprägung 1796 (≈ 30 700 Stück mit rückdatiertem 1785-Stempel)."
        en: "Kurantdukat gold coinage in Holstein-Altona under Christian VII, on the basis of the Plakat of 2 December 1782 («<i>gold to be coined at 75 pieces per rough Mark of 21 carats</i>»).<sup><a href=\"#ref38\">[38]</a></sup> Standard 75 pieces per rough Cölln. Marck, 21 carats (.875), 3.118 g rough, 2.72832 g fine. Tariff 12 Mark Dansk = 2 Rigsdaler Courant.<sup><a href=\"#ref36\">[36]</a></sup> The plakat is revoked in 1795; the final Altona restrike falls in 1796 (≈ 30,700 pieces with back-dated 1785 dies)."
        uk: "Карбування Kurantdukat у Гольштейні-Альтоні за Christian VII, на основі Plakat 2 грудня 1782 («<i>золото карбувати по 75 штук з повної марки при 21 караті</i>»).<sup><a href=\"#ref38\">[38]</a></sup> Стандарт 75 штук з повної Кельнської марки, 21 карат (.875), 3,118 г повної, 2,72832 г чистого. Тариф 12 Mark Dansk = 2 Rigsdaler Courant.<sup><a href=\"#ref36\">[36]</a></sup> Plakat скасовано 1795; останнє альтонське рестрайк-карбування припадає на 1796 р. (≈ 30 700 шт. зі зворотньо-датованими штемпелями 1785)."

